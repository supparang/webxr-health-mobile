<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk Duet Run</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="../favicon.ico" />
  <style>
    :root{
      --bg1:#020617;
      --bg2:#0b1226;
      --panel2:rgba(15,23,42,.94);
      --stroke:rgba(148,163,184,.18);
      --text:#e5e7eb;
      --muted:#94a3b8;
      --shadow:0 24px 64px rgba(0,0,0,.32);
      --duet:#f472b6;
      --duet-soft:#fce7f3;
      --pink:#f9a8d4;
      --sat: env(safe-area-inset-top, 0px);
      --sar: env(safe-area-inset-right, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      min-height:100%;
      background:
        radial-gradient(circle at top, rgba(244,114,182,.18) 0%, transparent 34%),
        linear-gradient(180deg,var(--bg2),var(--bg1));
      color:var(--text);
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      overflow:hidden;
    }
    #app{
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
    }
    #gameMount{
      position:absolute;
      inset:0;
      z-index:1;
      overflow:hidden;
    }
    #duetMeta{
      position:fixed;
      top:calc(10px + var(--sat));
      left:calc(10px + var(--sal));
      z-index:50;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      pointer-events:none;
    }
    .meta-pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background:rgba(2,6,23,.62);
      backdrop-filter:blur(8px);
      color:#cbd5e1;
      font-size:12px;
      font-weight:800;
      box-shadow:0 10px 24px rgba(0,0,0,.18);
    }
    .meta-pill strong{color:#e5e7eb;font-weight:900}

    .overlay{
      position:fixed;
      inset:0;
      z-index:9999;
      display:grid;
      place-items:center;
      padding:calc(16px + var(--sat)) calc(16px + var(--sar)) calc(16px + var(--sab)) calc(16px + var(--sal));
      background:rgba(2,6,23,.76);
      backdrop-filter:blur(8px);
    }
    .overlay[hidden]{display:none !important}

    .overlay-card{
      width:min(94vw,860px);
      max-height:88vh;
      overflow:auto;
      background:var(--panel2);
      border:1px solid var(--stroke);
      border-radius:22px;
      padding:20px 18px 18px;
      color:var(--text);
      box-shadow:var(--shadow);
    }

    .overlay-kicker{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 12px;
      border-radius:999px;
      background:rgba(244,114,182,.12);
      border:1px solid rgba(244,114,182,.25);
      color:var(--duet-soft);
      font-weight:900;
      font-size:13px;
      margin-bottom:12px;
    }

    .overlay-title{
      margin:0 0 8px;
      font-size:30px;
      line-height:1.1;
    }

    .overlay-sub{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.6;
    }

    .count-box{
      font-size:54px;
      line-height:1;
      font-weight:900;
      letter-spacing:.02em;
      min-height:56px;
      margin:12px 0 6px;
      text-align:center;
    }

    .count-note{
      color:var(--muted);
      font-size:13px;
      text-align:center;
    }

    .duet-strip{
      margin-top:16px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
    }

    .duet-card{
      border:1px solid var(--stroke);
      border-radius:18px;
      padding:14px;
      background:rgba(255,255,255,.04);
    }

    .duet-card .label{
      font-size:12px;
      font-weight:900;
      color:#cbd5e1;
      margin-bottom:6px;
      letter-spacing:.04em;
    }

    .duet-card .value{
      font-size:28px;
      font-weight:900;
      color:var(--duet-soft);
    }

    .result-table{
      margin-top:16px;
      border:1px solid var(--stroke);
      border-radius:18px;
      overflow:hidden;
      background:rgba(2,6,23,.45);
    }

    .result-head,.result-row{
      display:grid;
      grid-template-columns:1.4fr .8fr .8fr .8fr;
      gap:10px;
      padding:12px 14px;
      align-items:center;
    }

    .result-head{
      font-weight:900;
      color:#cbd5e1;
      background:rgba(255,255,255,.04);
    }

    .result-row{
      border-top:1px solid rgba(148,163,184,.08);
    }

    .result-row.is-me{
      background:rgba(244,114,182,.10);
      border-top-color:rgba(244,114,182,.25);
    }

    .result-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:18px;
    }

    .btn{
      appearance:none;
      border:0;
      cursor:pointer;
      border-radius:14px;
      padding:12px 16px;
      font-weight:900;
      font-size:14px;
      transition:.12s ease;
    }
    .btn:hover{transform:translateY(-1px);filter:brightness(1.04)}
    .btn:active{transform:translateY(0)}
    .btn:disabled{opacity:.55;cursor:not-allowed;transform:none}

    .btn-pink{background:var(--duet);color:#4a044e}
    .btn-good{background:#22c55e;color:#052e16}
    .btn-blue{background:#38bdf8;color:#082f49}
    .btn-ghost{
      background:rgba(255,255,255,.06);
      color:#e5e7eb;
      border:1px solid var(--stroke);
    }

    #duetRunMessage{
      position:fixed;
      right:calc(10px + var(--sar));
      bottom:calc(10px + var(--sab));
      z-index:60;
      min-width:220px;
      max-width:min(92vw,420px);
      padding:12px 14px;
      border-radius:16px;
      background:rgba(2,6,23,.78);
      border:1px solid var(--stroke);
      backdrop-filter:blur(8px);
      color:#cbd5e1;
      font-size:13px;
      line-height:1.55;
      box-shadow:0 10px 24px rgba(0,0,0,.18);
      display:none;
    }
    #duetRunMessage.show{display:block}

    @media (max-width:700px){
      .overlay-card{
        width:min(96vw,860px);
        padding:18px 14px 16px;
        border-radius:18px;
      }
      .overlay-title{font-size:26px}
      .count-box{font-size:46px}
      .duet-strip{grid-template-columns:1fr}
      .result-head,.result-row{
        grid-template-columns:1.2fr .8fr .8fr .8fr;
        gap:8px;
        padding:10px 12px;
        font-size:13px;
      }
      .result-actions .btn{
        flex:1 1 calc(50% - 10px);
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="gameMount"></div>

    <div id="duetMeta" aria-hidden="true">
      <div class="meta-pill">MODE <strong id="metaMode">-</strong></div>
      <div class="meta-pill">ROOM <strong id="metaRoom">-</strong></div>
      <div class="meta-pill">TIME <strong id="metaTime">-</strong></div>
      <div class="meta-pill">STATUS <strong id="metaStatus">-</strong></div>
    </div>

    <div id="duetGate" class="overlay" hidden>
      <div class="overlay-card" style="width:min(92vw,460px);max-height:none;">
        <div class="overlay-kicker">DUET MODE</div>
        <h2 class="overlay-title">กำลังรอเริ่ม Duet</h2>
        <p id="duetGateText" class="overlay-sub">รอสัญญาณเริ่มจากห้อง...</p>
        <div id="duetGateCount" class="count-box">-</div>
        <div id="duetGateSub" class="count-note">ผู้เล่นทั้ง 2 คนจะเริ่มพร้อมกัน</div>
      </div>
    </div>

    <div id="duetSummary" class="overlay" hidden>
      <div class="overlay-card">
        <div>
          <div class="overlay-kicker">DUET RESULT</div>
          <h2 class="overlay-title">สรุปผลแบบคู่</h2>
          <p id="duetSummarySub" class="overlay-sub">คะแนนฉัน คะแนนเพื่อน และคะแนนรวมคู่</p>
        </div>

        <div class="duet-strip">
          <div class="duet-card">
            <div class="label">MY SCORE</div>
            <div class="value" id="duetMyScore">0</div>
          </div>
          <div class="duet-card">
            <div class="label">PARTNER SCORE</div>
            <div class="value" id="duetPartnerScore">0</div>
          </div>
          <div class="duet-card">
            <div class="label">PAIR SCORE</div>
            <div class="value" id="duetPairScore">0</div>
          </div>
        </div>

        <div class="result-table">
          <div class="result-head">
            <div>ผู้เล่น</div><div>คะแนน</div><div>Miss</div><div>Best Streak</div>
          </div>
          <div id="duetSummaryRows"></div>
        </div>

        <div id="duetSummaryHint" style="margin-top:12px;color:var(--muted);font-size:13px;">
          Duet จะนับคะแนนของทั้งคู่รวมกัน
        </div>

        <div class="result-actions">
          <button id="btnDuetRematch" class="btn btn-pink" type="button">เล่นใหม่</button>
          <button id="btnDuetBackLobby" class="btn btn-good" type="button">กลับ Lobby</button>
          <button id="btnDuetExport" class="btn btn-blue" type="button">Export JSON</button>
          <button id="btnDuetBackHub" class="btn btn-ghost" type="button">กลับ HUB</button>
        </div>
      </div>
    </div>

    <div id="duetRunMessage" role="status" aria-live="polite"></div>
  </div>

  <script>
    (function(){
      const q = new URLSearchParams(location.search);

      const runCtx = {
        pid: q.get('pid') || 'anon',
        name: q.get('name') || '',
        studyId: q.get('studyId') || '',
        roomId: q.get('roomId') || '',
        mode: 'duet',
        diff: q.get('diff') || 'normal',
        time: q.get('time') || '120',
        seed: q.get('seed') || '',
        startAt: Number(q.get('startAt') || 0) || 0,
        hub: q.get('hub') || '../hub.html',
        view: q.get('view') || 'mobile',
        run: q.get('run') || 'play',
        gameId: q.get('gameId') || 'goodjunk'
      };

      window.__GJ_DUET_CTX__ = runCtx;

      document.getElementById('metaMode').textContent = runCtx.mode || '-';
      document.getElementById('metaRoom').textContent = runCtx.roomId || '-';
      document.getElementById('metaTime').textContent = runCtx.time || '-';
      document.getElementById('metaStatus').textContent = 'waiting';

      const msgEl = document.getElementById('duetRunMessage');

      window.__gjShowDuetRunMessage = function(message){
        if (!msgEl) return;
        msgEl.textContent = String(message || '');
        msgEl.classList.toggle('show', !!message);
      };

      window.__gjHideDuetRunMessage = function(){
        if (!msgEl) return;
        msgEl.textContent = '';
        msgEl.classList.remove('show');
      };

      window.__gjDuetUi = {
        setStatus(text) {
          const el = document.getElementById('metaStatus');
          if (el) el.textContent = String(text || '-');
        },
        showGate(msg = 'กำลังรอเริ่ม', count = '-', sub = '') {
          const wrap = document.getElementById('duetGate');
          const text = document.getElementById('duetGateText');
          const num  = document.getElementById('duetGateCount');
          const subEl = document.getElementById('duetGateSub');

          if (wrap) wrap.hidden = false;
          if (text) text.textContent = msg;
          if (num) num.textContent = count;
          if (subEl) subEl.textContent = sub || 'ผู้เล่นทั้ง 2 คนจะเริ่มพร้อมกัน';
        },
        hideGate() {
          const wrap = document.getElementById('duetGate');
          if (wrap) wrap.hidden = true;
        }
      };
    })();
  </script>

  <script src="../firebase-config.js"></script>
  <script type="module" src="./goodjunk.safe.duet.js?v=20260320-duet-run-v1"></script>
</body>
</html>
