<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#071426"><title>CSAI2102 Teaching Activity QA v3</title><style>*{box-sizing:border-box}body{margin:0;background:#071426;color:#e8f1ff;font-family:system-ui,-apple-system,'Segoe UI',sans-serif}main{max-width:1200px;margin:auto;padding:18px}.card{margin:12px 0;padding:16px;border:1px solid #334155;border-radius:16px;background:#101d33}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.metric{padding:12px;border:1px solid #334155;border-radius:12px;background:#142640}.metric b{display:block;font-size:26px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.session{padding:12px;border:1px solid #15803d;border-radius:13px;background:#12213a}.session.bad{border-color:#9f1239}.row{font-size:12px;padding:5px 7px;margin:4px 0;border-radius:8px;background:#052e24;color:#bbf7d0}.row.bad{background:#35101d;color:#fecdd3}.btn{display:inline-flex;padding:9px 12px;border-radius:10px;background:#0284c7;color:#fff;text-decoration:none;font-weight:850}@media(max-width:800px){.grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:520px){main{padding:10px}.summary,.grid{grid-template-columns:1fr}}</style></head><body><main><h1>🧪 Teaching Activity QA v3</h1><p>ตรวจ Curriculum + Coding Lab + Predict/Reason + TODO + Challenge Ladder + Quiz + Takeaways</p><section class="card"><div class="summary"><div class="metric">ด่านทั้งหมด<b>20</b></div><div class="metric">ผ่าน<b id="pass">0</b></div><div class="metric">พบปัญหา<b id="fail">0</b></div><div class="metric">Quiz ทั้งหมด<b id="quiz">0</b></div></div></section><section class="card"><div id="grid" class="grid"></div></section></main><script>(async function(){const order=['S1','S2','S3','B1','S4','S5','S6','B2','S7','S8','S9','B3','S10','S11','S12','B4','S13','S14','S15','B5'];const [c,l,a]=await Promise.all([fetch('./curriculum-v2.json?v=qa3',{cache:'no-store'}).then(r=>r.json()),fetch('./web/labs.json?v=qa3',{cache:'no-store'}).then(r=>r.json()),fetch('./web/learning-activities-v3.json?v=qa3',{cache:'no-store'}).then(r=>r.json())]);let pass=0,fail=0,quiz=0;const grid=document.getElementById('grid');function row(t,ok){return'<div class="row '+(ok?'':'bad')+'">'+(ok?'✓ ':'✗ ')+t+'</div>'}order.forEach(id=>{const cur=c.sessions[id],lab=l[id],act=a[id];const checks={curriculum:!!cur&&cur.outcomes?.length>=2&&cur.coreTopics?.length>=3&&cur.reflection?.length===3,lab:!!lab&&!!lab.starter&&!!lab.modify&&!!lab.challenge,predict:!!act?.predictReason,todos:act?.todos?.length>=3,modify:!!act?.modify,ladder:!!act?.bronze&&!!act?.silver&&!!act?.gold,quiz:act?.quiz?.length===5,takeaways:act?.takeaways?.length>=3};const ok=Object.values(checks).every(Boolean);ok?pass++:fail++;quiz+=act?.quiz?.length||0;const u=new URL('./web/coding-lab-v3.html',location.href);u.searchParams.set('session',id);u.searchParams.set('studentId','12');u.searchParams.set('studentName','KK');u.searchParams.set('section','101');const el=document.createElement('article');el.className='session '+(ok?'':'bad');el.innerHTML='<h3>'+id+' • '+(cur?.title||'Missing')+'</h3>'+Object.entries(checks).map(([k,v])=>row(k,v)).join('')+'<a class="btn" target="_blank" href="'+u+'">เปิดทดสอบ</a>';grid.appendChild(el)});document.getElementById('pass').textContent=pass;document.getElementById('fail').textContent=fail;document.getElementById('quiz').textContent=quiz})().catch(e=>document.body.innerHTML='<pre>'+e+'</pre>');</script></body></html>
