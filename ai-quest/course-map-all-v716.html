<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#071426">
  <title>CSAI2102 • Student Quest Map v716</title>
  <style>
    :root{
      --panel:#101d33;--line:#334155;--text:#e8f1ff;--muted:#a9bad3;
      --green:#059669;--amber:#d97706;--blue:#0284c7;--violet:#7c3aed;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:linear-gradient(135deg,#06101f,#08162a 55%,#111537);
      color:var(--text);
      font-family:system-ui,-apple-system,'Segoe UI',sans-serif
    }
    .wrap{max-width:1200px;margin:auto;padding:18px 14px 48px}
    .card{
      margin-top:14px;padding:16px;border:1px solid var(--line);
      border-radius:18px;background:rgba(15,23,42,.94)
    }
    h1,h2,h3{margin:0}
    .muted{color:var(--muted);line-height:1.55}
    .profile{display:grid;grid-template-columns:1fr 1fr .35fr auto;gap:8px}
    .input,.btn{
      padding:11px 12px;border:1px solid var(--line);border-radius:11px;
      background:#17263f;color:#fff;font:inherit
    }
    .input[readonly]{opacity:.78}
    .btn{
      font-weight:800;cursor:pointer;text-decoration:none;
      display:inline-flex;align-items:center;justify-content:center
    }
    .good{background:var(--green)}
    .warn{background:var(--amber)}
    .info{background:var(--blue)}
    .violet{background:var(--violet)}
    .notice{
      margin-top:10px;padding:11px;border:1px solid var(--line);
      border-radius:12px;background:#132238
    }
    .notice.good{border-color:#168568;color:#bbf7d0}
    .notice.bad{border-color:#b9445f;color:#fecdd3}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .block{
      grid-column:1/-1;margin-top:8px;padding:10px 12px;
      border-left:5px solid #38bdf8;background:#0e1a2e;
      border-radius:12px;font-weight:900
    }
    .mission{
      min-height:250px;padding:14px;border:1px solid var(--line);
      border-radius:16px;background:var(--panel);
      display:flex;flex-direction:column;gap:8px
    }
    .mission.done{border-color:#10b981}
    .mission.active{border-color:#38bdf8}
    .mission.partial{border-color:#f59e0b}
    .mission.locked{opacity:.58;filter:grayscale(.65)}
    .mission.boss{background:#1b1535;border-color:#f59e0b}
    .status{font-size:12px;font-weight:900}
    .parts{display:grid;gap:6px;margin-top:2px}
    .part{
      padding:7px 8px;border:1px solid var(--line);
      border-radius:9px;background:#0c1729;font-size:13px
    }
    .part.ok{border-color:#15803d;color:#bbf7d0;background:#052e24}
    .part.wait{border-color:#a16207;color:#fde68a;background:#351b05}
    .part.lock{opacity:.65}
    .result{
      padding:8px;border:1px solid #15803d;border-radius:11px;
      background:#052e24;color:#bbf7d0
    }
    .actions{margin-top:auto}
    .actions .btn{width:100%}
    @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:620px){.profile,.grid{grid-template-columns:1fr}}
  </style>
  <script src="./js/aiquest-cloud-logger.js?v=20260720-flow716"></script>
  <script src="./js/aiquest-sync-v23.js?v=20260720-flow716"></script>
</head>
<body>
<main class="wrap">
  <h1>🧠 CSAI2102 AI Quest Map v716</h1>
  <p class="muted">
    Google Sheet/Backend เป็นแหล่งข้อมูลทางการเพียงแห่งเดียว •
    ต้องครบ Mission + Coding Lab + Reflection จึงถือว่าผ่านแต่ละด่าน
  </p>

  <section class="card">
    <h2>ข้อมูลผู้เรียน</h2>
    <div class="profile">
      <input id="sid" class="input" placeholder="รหัสนักศึกษา">
      <input id="name" class="input" placeholder="ชื่อ-นามสกุล">
      <input class="input" value="101" readonly>
      <button id="load" class="btn good">โหลดจาก Sheet</button>
    </div>
    <div id="note" class="notice">
      กรอกรหัสนักศึกษา แล้วโหลดข้อมูลจาก Sheet
    </div>
  </section>

  <section class="card">
    <h2>Mission Grid</h2>
    <div id="grid" class="grid"></div>
  </section>
</main>

<script>
(function(){
  'use strict';

  var FLOW_ENDPOINT =
    'https://script.google.com/macros/s/AKfycbwXSUHbhVbZtKcjNIDzs4TawAohdeInm1MxLpomVeST2JilOL3L0LWQtT4_Yb7fbJG9/exec';

  var ORDER = [
    's1','s2','s3','b1',
    's4','s5','s6','b2',
    's7','s8','s9','b3',
    's10','s11','s12','b4',
    's13','s14','s15','b5'
  ];

  var BLOCKS = {
    s1:'Block 1 • AI Foundation',
    s4:'Block 2 • Search Strategy',
    s7:'Block 3 • Knowledge & Reasoning',
    s10:'Block 4 • Machine Learning',
    s13:'Block 5 • Modern AI & Governance'
  };

  var TITLES = {
    s1:'AI Spotter',
    s2:'Agent Builder',
    s3:'Problem Solving Agent',
    b1:'Foundation Boss',
    s4:'Search Explorer',
    s5:'Heuristic & A* Planner',
    s6:'Game Search',
    b2:'Search Strategy Boss',
    s7:'Knowledge Representation',
    s8:'Uncertainty Reasoning',
    s9:'Expert System',
    b3:'Reasoning Boss',
    s10:'ML Pipeline',
    s11:'Supervised Learning',
    s12:'Clustering & Evaluation',
    b4:'ML Evaluation Boss',
    s13:'Neural Network',
    s14:'NLP / Generative AI / RAG',
    s15:'AI System Design',
    b5:'Final AI Quest Boss'
  };

  var progress = {};
  var verified = false;
  var studentId = '';
  var newStudent = false;

  function $(id){ return document.getElementById(id); }

  function say(text, kind){
    $('note').className = 'notice' + (kind ? ' ' + kind : '');
    $('note').textContent = text;
  }

  function norm(value){
    return String(value || '')
      .toLowerCase()
      .replace(/^m/, 's')
      .replace(/^boss/, 'b');
  }

  function bool(value){
    return value === true ||
      ['true','1','yes','passed','completed']
        .indexOf(String(value || '').toLowerCase()) >= 0;
  }

  function emptyRow(id){
    return {
      sessionId:id.toUpperCase(),
      missionPassed:false,
      missionScore:0,
      codingPassed:false,
      codingScore:0,
      reflectionSubmitted:false,
      completed:false,
      passed:false,
      unlocked:id === 's1',
      status:id === 's1' ? 'mission-pending' : 'locked',
      pendingParts:['mission','coding','reflection']
    };
  }

  function parseFlowProgress(response){
    var out = {};
    var src = response && (
      response.progress ||
      (response.data && response.data.progress)
    );

    ORDER.forEach(function(id){
      out[id] = emptyRow(id);
    });

    if (!src || typeof src !== 'object') return out;

    Object.keys(src).forEach(function(key){
      var id = norm(key);
      if (ORDER.indexOf(id) < 0) return;

      var row = src[key] || {};

      out[id] = {
        sessionId:String(row.sessionId || id).toUpperCase(),
        missionPassed:bool(row.missionPassed),
        missionScore:Number(row.missionScore || row.score || 0),
        codingPassed:bool(row.codingPassed),
        codingScore:Number(row.codingScore || 0),
        reflectionSubmitted:bool(
          row.reflectionSubmitted || row.reflectionCompleted
        ),
        completed:bool(row.completed),
        passed:bool(row.completed),
        unlocked:bool(row.unlocked) || id === 's1',
        status:String(row.status || ''),
        pendingParts:Array.isArray(row.pendingParts)
          ? row.pendingParts
          : []
      };
    });

    return out;
  }

  async function flowPost(action, payload){
    var response = await fetch(FLOW_ENDPOINT, {
      method:'POST',
      cache:'no-store',
      redirect:'follow',
      headers:{
        'Content-Type':'text/plain;charset=UTF-8'
      },
      body:JSON.stringify(Object.assign({
        module:'AIQFLOW',
        action:action,
        section:'101'
      }, payload || {}))
    });

    var text = await response.text();
    var data;

    try {
      data = JSON.parse(text);
    } catch (error) {
      throw new Error('Backend did not return JSON');
    }

    data.__httpStatus = response.status;
    return data;
  }

  function rowOf(id){
    return progress[id] || emptyRow(id);
  }

  function isCompleted(id){
    return !!rowOf(id).completed;
  }

  function isOpen(id){
    return verified && !!rowOf(id).unlocked;
  }

  function stageText(row, open){
    if (row.completed) return 'ผ่านครบ 3 ส่วนแล้ว';
    if (!open) {
      if (row.missionPassed) {
        return 'Mission เดิมผ่านแล้ว แต่ยังล็อกจนกว่าด่านก่อนหน้าจะครบ 3 ส่วน';
      }
      return 'ล็อก';
    }
    if (!row.missionPassed) return 'พร้อมทำ Mission';
    if (!row.codingPassed) return 'ผ่าน Mission แล้ว • เหลือ Coding Lab + Reflection';
    if (!row.reflectionSubmitted) return 'ผ่าน Mission + Coding แล้ว • เหลือ Reflection';
    return 'กำลังตรวจสถานะ';
  }

  function buttonText(row){
    if (row.completed) return '↻ ทบทวน / เล่นซ้ำ';
    if (!row.missionPassed) return '▶ เริ่ม Mission';
    if (!row.codingPassed) return '▶ ทำ Coding Lab';
    if (!row.reflectionSubmitted) return '▶ ส่ง Reflection';
    return '▶ เปิดด่าน';
  }

  function link(id){
    var url = new URL('./student-session-integrated-v720.html', location.href);

    url.searchParams.set('mission', id);
    url.searchParams.set('release', 'integrated720');
    url.searchParams.set('studentId', studentId);
    url.searchParams.set('studentName', $('name').value.trim());
    url.searchParams.set('section', '101');

    return url.toString();
  }

  function cacheProfile(){
    var profile = {
      studentId:studentId,
      studentName:$('name').value.trim(),
      section:'101',
      updatedAt:new Date().toISOString(),
      profileSource:newStudent ? 'new' : 'sheet'
    };

    try {
      localStorage.setItem(
        'CSAI2102_AIQUEST_PROFILE_V421',
        JSON.stringify(profile)
      );
    } catch (error) {}

    return profile;
  }

  function part(label, passed, locked){
    var className = passed ? 'part ok' : locked ? 'part lock' : 'part wait';
    var mark = passed ? '✓' : locked ? '🔒' : '○';
    return '<div class="' + className + '">' +
      mark + ' ' + label +
      '</div>';
  }

  function render(){
    var grid = $('grid');
    grid.innerHTML = '';

    ORDER.forEach(function(id){
      if (BLOCKS[id]) {
        grid.insertAdjacentHTML(
          'beforeend',
          '<div class="block">' + BLOCKS[id] + '</div>'
        );
      }

      var row = rowOf(id);
      var open = isOpen(id);
      var locked = !open;
      var classes = ['mission'];

      if (id.charAt(0) === 'b') classes.push('boss');
      if (row.completed) classes.push('done');
      else if (locked) classes.push('locked');
      else if (row.missionPassed || row.codingPassed) classes.push('partial');
      else classes.push('active');

      var card = document.createElement('article');
      card.className = classes.join(' ');

      var scoreBlock = row.missionPassed
        ? '<div class="result"><b>Mission ' +
          Math.round(row.missionScore || 0) +
          '%</b>' +
          (row.codingPassed
            ? ' • Coding ' + Math.round(row.codingScore || 0) + '%'
            : '') +
          '</div>'
        : '';

      var action = open
        ? '<a class="btn ' +
          (row.completed ? 'good' :
            !row.missionPassed ? 'info' :
            !row.codingPassed ? 'violet' : 'warn') +
          '" data-mission="' + id +
          '" href="' + link(id) + '">' +
          buttonText(row) +
          '</a>'
        : '<span class="btn">ต้องครบ 3 ส่วนของด่านก่อนหน้า</span>';

      card.innerHTML =
        '<div class="status">' + stageText(row, open) + '</div>' +
        '<h3>' + id.toUpperCase() + ' • ' + TITLES[id] + '</h3>' +
        '<div class="parts">' +
          part('1. Mission', row.missionPassed, locked && !row.missionPassed) +
          part('2. Coding Lab', row.codingPassed, locked) +
          part('3. Reflection', row.reflectionSubmitted, locked) +
        '</div>' +
        scoreBlock +
        '<div class="actions">' + action + '</div>';

      grid.appendChild(card);
    });
  }

  async function load(){
    studentId = $('sid').value.trim();

    if (!studentId) {
      say('กรุณากรอกรหัสนักศึกษา', 'bad');
      return;
    }

    verified = false;
    newStudent = false;
    progress = {};
    $('name').readOnly = true;
    render();

    say('กำลังตรวจ Profile และสถานะ 3 ส่วนจาก Google Sheets…');

    try {
      var profile = await window.AIQuestSync.lookupProfile({
        studentId:studentId
      });

      if (!(profile && profile.ok && profile.found && profile.profile)) {
        verified = true;
        newStudent = true;
        progress = {};
        $('name').readOnly = false;
        $('name').disabled = false;
        $('name').value = '';
        $('name').focus();
        render();

        say(
          'ไม่พบข้อมูลใน Sheet — ผู้ใช้ใหม่กรอกชื่อ-นามสกุล แล้วเริ่ม S1 ได้',
          'good'
        );
        return;
      }

      $('name').value =
        profile.profile.studentName ||
        profile.profile.name ||
        '';

      $('name').readOnly = true;

      var response = await flowPost('GET_FLOW_PROGRESS', {
        studentId:studentId
      });

      if (!response || !response.ok || !response.progress) {
        verified = false;
        progress = {};
        render();

        say(
          'พบ Profile แต่ AIQFLOW ยังไม่คืน Three-Part Progress',
          'bad'
        );
        return;
      }

      progress = parseFlowProgress(response);
      verified = true;
      render();

      say(
        'โหลดสถานะ Mission + Coding + Reflection จาก Sheet แล้ว: ' +
        studentId + ' • Section 101 • Backend ' +
        (response.version || ''),
        'good'
      );

    } catch (error) {
      verified = false;
      progress = {};
      $('name').readOnly = true;
      render();

      say(
        'เชื่อมต่อ AIQFLOW ไม่สำเร็จ — ระบบไม่ใช้ข้อมูลค้างในเครื่องและไม่ปลดล็อกด่าน',
        'bad'
      );
    }
  }

  $('load').addEventListener('click', load);

  $('sid').addEventListener('keydown', function(event){
    if (event.key === 'Enter') load();
  });

  $('sid').addEventListener('input', function(){
    verified = false;
    newStudent = false;
    progress = {};
    $('name').value = '';
    $('name').readOnly = false;
    $('name').disabled = false;
    render();
    say('กรอกรหัสนักศึกษา แล้วโหลดข้อมูลจาก Sheet');
  });

  $('name').addEventListener('input', function(){
    if (verified) render();
  });

  $('grid').addEventListener('click', async function(event){
    var anchor = event.target.closest('a[data-mission]');
    if (!anchor) return;

    var id = anchor.dataset.mission;

    if (newStudent && id === 's1') {
      event.preventDefault();

      var studentName = $('name').value.trim();

      if (!studentName) {
        $('name').focus();
        say('กรุณากรอกชื่อ-นามสกุลก่อนเริ่ม S1', 'bad');
        return;
      }

      var profile = cacheProfile();
      say('กำลังสร้าง Profile ใหม่และเปิด S1…', 'good');

      try {
        await Promise.race([
          window.AIQuestSync.submitProfile(profile),
          new Promise(function(resolve){ setTimeout(resolve, 700); })
        ]);
      } catch (error) {}

      location.href = link(id);
    }
  });

  render();
})();
</script>
</body>
</html>
