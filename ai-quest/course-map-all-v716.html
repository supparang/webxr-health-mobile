<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#071426">
<title>CSAI2102 • Quest Map v716</title>
<style>
:root{--bg:#071426;--panel:#101d33;--line:#334155;--text:#e8f1ff;--muted:#a9bad3;--green:#059669;--amber:#d97706;--blue:#0284c7;--violet:#7c3aed;--bad:#be3455}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#06101f,#08162a 55%,#111537);color:var(--text);font-family:system-ui,-apple-system,'Segoe UI',sans-serif}.wrap{max-width:1200px;margin:auto;padding:18px 14px 48px}h1,h2,h3,p{margin-top:0}.muted{color:var(--muted);line-height:1.55}.card{margin-top:14px;padding:16px;border:1px solid var(--line);border-radius:18px;background:rgba(15,23,42,.94)}.profile{display:grid;grid-template-columns:1fr 1fr .35fr auto;gap:8px}.input,.btn{min-height:44px;padding:10px 12px;border:1px solid var(--line);border-radius:11px;background:#17263f;color:#fff;font:inherit}.input[readonly]{opacity:.8}.btn{font-weight:850;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}.btn.good{background:var(--green)}.btn.info{background:var(--blue)}.btn.violet{background:var(--violet)}.btn.warn{background:var(--amber)}.btn:disabled{opacity:.5;cursor:not-allowed}.notice{margin-top:10px;padding:11px;border:1px solid var(--line);border-radius:12px;background:#132238;line-height:1.45}.notice.good{border-color:#168568;color:#bbf7d0}.notice.bad{border-color:var(--bad);color:#fecdd3}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.block{grid-column:1/-1;margin-top:8px;padding:10px 12px;border-left:5px solid #38bdf8;background:#0e1a2e;border-radius:12px;font-weight:900}.mission{min-height:250px;padding:14px;border:1px solid var(--line);border-radius:16px;background:var(--panel);display:flex;flex-direction:column;gap:8px}.mission.done{border-color:#10b981}.mission.partial{border-color:#f59e0b}.mission.active{border-color:#38bdf8}.mission.locked{opacity:.58;filter:grayscale(.65)}.mission.boss{background:#1b1535;border-color:#f59e0b}.status{font-size:12px;font-weight:900}.parts{display:grid;gap:6px}.part{padding:7px 8px;border:1px solid var(--line);border-radius:9px;background:#0c1729;font-size:13px}.part.ok{border-color:#15803d;color:#bbf7d0;background:#052e24}.part.wait{border-color:#a16207;color:#fde68a;background:#351b05}.part.lock{opacity:.65}.result{padding:8px;border:1px solid #15803d;border-radius:11px;background:#052e24;color:#bbf7d0}.actions{margin-top:auto}.actions .btn{width:100%}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:620px){.wrap{padding:12px 10px 34px}.wrap>h1{font-size:28px}.wrap>.muted{font-size:14px}.card{padding:13px;margin-top:10px}.profile,.grid{grid-template-columns:1fr}.profile h2{font-size:22px}.mission{min-height:auto}.block{margin-top:4px}.notice{font-size:13px}.profile .input,.profile .btn{min-height:48px}}
</style>
</head>
<body>
<main class="wrap">
<h1>🧠 CSAI2102 AI Quest Map v716</h1>
<p class="muted">Google Sheet/Backend เป็นแหล่งข้อมูลทางการเพียงแห่งเดียว • ต้องครบ Mission + Coding Lab + Reflection จึงถือว่าผ่านแต่ละด่าน</p>
<section class="card">
<h2>ข้อมูลผู้เรียน</h2>
<div class="profile">
<input id="sid" class="input" placeholder="รหัสนักศึกษา">
<input id="name" class="input" placeholder="ชื่อ-นามสกุล">
<input id="section" class="input" value="101" readonly>
<button id="load" class="btn good">โหลดจาก Sheet</button>
</div>
<div id="note" class="notice">กรอกรหัสนักศึกษา แล้วโหลดข้อมูลจาก Sheet</div>
</section>
<section class="card"><h2>Mission Grid</h2><div id="grid" class="grid"></div></section>
</main>
<script>
(function(){'use strict';
const ENDPOINT='https://script.google.com/macros/s/AKfycbwXSUHbhVbZtKcjNIDzs4TawAohdeInm1MxLpomVeST2JilOL3L0LWQtT4_Yb7fbJG9/exec';
const ORDER=['s1','s2','s3','b1','s4','s5','s6','b2','s7','s8','s9','b3','s10','s11','s12','b4','s13','s14','s15','b5'];
const BLOCKS={s1:'Block 1 • AI Foundation',s4:'Block 2 • Search Strategy',s7:'Block 3 • Knowledge & Reasoning',s10:'Block 4 • Machine Learning',s13:'Block 5 • Modern AI & Governance'};
const TITLES={s1:'AI Spotter',s2:'Agent Builder',s3:'Problem Solving Agent',b1:'Foundation Boss',s4:'Search Explorer',s5:'Heuristic & A* Planner',s6:'Game Search',b2:'Search Strategy Boss',s7:'Knowledge Representation',s8:'Uncertainty Reasoning',s9:'Expert System',b3:'Reasoning Boss',s10:'ML Pipeline',s11:'Supervised Learning',s12:'Clustering & Evaluation',b4:'ML Evaluation Boss',s13:'Neural Network',s14:'NLP / Generative AI / RAG',s15:'AI System Design',b5:'Final AI Quest Boss'};
const $=id=>document.getElementById(id);let studentId='',verified=false,newStudent=false,progress={};
function bool(v){return v===true||['true','1','yes','passed','completed','mastered','submitted'].includes(String(v||'').toLowerCase())}
function norm(v){return String(v||'').toLowerCase().replace(/^m/,'s').replace(/^boss/,'b')}
function say(text,kind=''){$('note').className='notice'+(kind?' '+kind:'');$('note').textContent=text}
function emptyRow(id){return{sessionId:id.toUpperCase(),missionPassed:false,missionScore:0,codingPassed:false,codingScore:0,reflectionSubmitted:false,completed:false,unlocked:id==='s1',status:id==='s1'?'mission-pending':'locked'}}
function normalizeRow(id,row){row=row||{};const missionObj=row.mission||{},codingObj=row.coding||{},reflectionObj=row.reflection||{};const missionPassed=bool(row.missionPassed)||bool(missionObj.completed)||bool(row.passed&&row.codingPassed===undefined&&row.reflectionSubmitted===undefined);const codingPassed=bool(row.codingPassed)||bool(row.codingCompleted)||bool(codingObj.completed);const reflectionSubmitted=bool(row.reflectionSubmitted)||bool(row.reflectionCompleted)||bool(reflectionObj.completed);const completed=bool(row.completed)||bool(row.sessionCompleted)||(missionPassed&&codingPassed&&reflectionSubmitted);return{sessionId:String(row.sessionId||id).toUpperCase(),missionPassed,missionScore:Number(row.missionScore||missionObj.bestScore||row.score||0),codingPassed,codingScore:Number(row.codingScore||codingObj.bestScore||0),reflectionSubmitted,completed,unlocked:bool(row.unlocked)||id==='s1',status:String(row.status||'')}}
function deriveUnlocks(rows){ORDER.forEach((id,i)=>{if(!rows[id])rows[id]=emptyRow(id);rows[id].unlocked=id==='s1'||!!rows[ORDER[i-1]]?.completed});return rows}
function parseProgress(response){const out={};ORDER.forEach(id=>out[id]=emptyRow(id));const src=response&&(response.progress||(response.data&&response.data.progress));if(src&&typeof src==='object'){Object.entries(src).forEach(([key,row])=>{const id=norm(key);if(ORDER.includes(id))out[id]=normalizeRow(id,row)})}return deriveUnlocks(out)}
async function post(action,payload){const controller=new AbortController();const timer=setTimeout(()=>controller.abort(),15000);try{const response=await fetch(ENDPOINT,{method:'POST',cache:'no-store',redirect:'follow',headers:{'Content-Type':'text/plain;charset=UTF-8'},body:JSON.stringify(Object.assign({module:'AIQFLOW',action,section:'101'},payload||{})),signal:controller.signal});const text=await response.text();let data;try{data=JSON.parse(text)}catch(e){throw new Error('BACKEND_NOT_JSON')}data.__httpStatus=response.status;return data}finally{clearTimeout(timer)}}
async function lookupProfile(){let result=await post('LOOKUP_PROFILE',{studentId});if(result&&result.ok)return result;throw new Error(result&&result.code||'PROFILE_LOOKUP_FAILED')}
async function fallbackProgress(){const results=await Promise.all(ORDER.map(async id=>{try{const r=await post('GET_SESSION_STATUS',{studentId,sessionId:id.toUpperCase()});return[id,normalizeRow(id,r)]}catch(e){return[id,null]}}));const out={};let success=0;results.forEach(([id,row])=>{out[id]=row||emptyRow(id);if(row)success++});if(!success)throw new Error('SESSION_STATUS_FALLBACK_FAILED');return deriveUnlocks(out)}
function part(label,passed,locked){return '<div class="part '+(passed?'ok':locked?'lock':'wait')+'">'+(passed?'✓':locked?'🔒':'○')+' '+label+'</div>'}
function stageText(row,open){if(row.completed)return'ผ่านครบ 3 ส่วนแล้ว';if(!open)return row.missionPassed?'Mission เดิมผ่านแล้ว แต่รอด่านก่อนหน้าให้ครบ 3 ส่วน':'ล็อก';if(!row.missionPassed)return'พร้อมทำ Mission';if(!row.codingPassed)return'ผ่าน Mission แล้ว • เหลือ Coding Lab + Reflection';if(!row.reflectionSubmitted)return'ผ่าน Mission + Coding แล้ว • เหลือ Reflection';return'กำลังตรวจสถานะ'}
function buttonText(row){if(row.completed)return'↻ ทบทวน / เล่นซ้ำ';if(!row.missionPassed)return'▶ เริ่ม Mission';if(!row.codingPassed)return'▶ ทำ Coding Lab';if(!row.reflectionSubmitted)return'▶ ส่ง Reflection';return'▶ เปิดด่าน'}
function link(id){const u=new URL('./student-session-integrated-v720.html',location.href);u.searchParams.set('mission',id);u.searchParams.set('release','integrated720');u.searchParams.set('studentId',studentId);u.searchParams.set('studentName',$('name').value.trim());u.searchParams.set('section','101');u.searchParams.set('ui','map716-directflow');return u.toString()}
function render(){const grid=$('grid');grid.innerHTML='';ORDER.forEach(id=>{if(BLOCKS[id])grid.insertAdjacentHTML('beforeend','<div class="block">'+BLOCKS[id]+'</div>');const row=progress[id]||emptyRow(id),open=verified&&row.unlocked,locked=!open,classes=['mission'];if(id[0]==='b')classes.push('boss');if(row.completed)classes.push('done');else if(locked)classes.push('locked');else if(row.missionPassed||row.codingPassed)classes.push('partial');else classes.push('active');const score=row.missionPassed?'<div class="result"><b>Mission '+Math.round(row.missionScore||0)+'%</b>'+(row.codingPassed?' • Coding '+Math.round(row.codingScore||0)+'%':'')+'</div>':'';const action=open?'<a class="btn '+(row.completed?'good':!row.missionPassed?'info':!row.codingPassed?'violet':'warn')+'" data-mission="'+id+'" href="'+link(id)+'">'+buttonText(row)+'</a>':'<span class="btn">ต้องครบ 3 ส่วนของด่านก่อนหน้า</span>';const card=document.createElement('article');card.className=classes.join(' ');card.innerHTML='<div class="status">'+stageText(row,open)+'</div><h3>'+id.toUpperCase()+' • '+TITLES[id]+'</h3><div class="parts">'+part('1. Mission',row.missionPassed,locked&&!row.missionPassed)+part('2. Coding Lab',row.codingPassed,locked)+part('3. Reflection',row.reflectionSubmitted,locked)+'</div>'+score+'<div class="actions">'+action+'</div>';grid.appendChild(card)})}
async function load(){studentId=$('sid').value.trim();if(!studentId){say('กรุณากรอกรหัสนักศึกษา','bad');return}verified=false;newStudent=false;progress={};$('name').readOnly=true;render();say('กำลังตรวจ Profile และสถานะ 3 ส่วนจาก Google Sheets…');try{const profile=await lookupProfile();if(!(profile.found&&profile.profile)){verified=true;newStudent=true;$('name').readOnly=false;$('name').value='';progress=deriveUnlocks({});render();say('ไม่พบข้อมูลใน Sheet — ผู้ใช้ใหม่กรอกชื่อ-นามสกุล แล้วเริ่ม S1 ได้','good');return}$('name').value=profile.profile.studentName||profile.profile.name||'';let source='GET_FLOW_PROGRESS';try{const response=await post('GET_FLOW_PROGRESS',{studentId});if(!response||!response.ok||!response.progress)throw new Error('FLOW_PROGRESS_EMPTY');progress=parseProgress(response)}catch(primaryError){source='GET_SESSION_STATUS fallback';progress=await fallbackProgress()}verified=true;render();say('โหลดสถานะ Mission + Coding + Reflection จาก Sheet แล้ว • '+studentId+' • Section 101 • '+source,'good')}catch(error){verified=false;progress={};render();console.error('[Quest Map]',error);say('เชื่อมต่อข้อมูลจาก Sheet ไม่สำเร็จ กรุณากดโหลดอีกครั้ง','bad')}}
$('load').addEventListener('click',load);$('sid').addEventListener('keydown',e=>{if(e.key==='Enter')load()});$('sid').addEventListener('input',()=>{verified=false;newStudent=false;progress={};$('name').value='';$('name').readOnly=false;render();say('กรอกรหัสนักศึกษา แล้วโหลดข้อมูลจาก Sheet')});$('grid').addEventListener('click',async e=>{const a=e.target.closest('a[data-mission]');if(!a)return;if(newStudent&&a.dataset.mission==='s1'){e.preventDefault();const name=$('name').value.trim();if(!name){$('name').focus();say('กรุณากรอกชื่อ-นามสกุลก่อนเริ่ม S1','bad');return}try{await post('LOOKUP_PROFILE',{studentId,studentName:name,section:'101'})}catch(_){}location.href=link('s1')}});
const query=new URLSearchParams(location.search);if(query.get('studentId')){$('sid').value=query.get('studentId');$('name').value=query.get('studentName')||'';setTimeout(load,50)}render();
})();
</script>
</body>
</html>
