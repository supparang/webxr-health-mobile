<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#071426"><title>CSAI2102 • Student Quest Map v714</title><style>:root{--bg:#071426;--panel:#101d33;--line:#334155;--text:#e8f1ff;--muted:#a9bad3;--green:#059669;--amber:#d97706}*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#06101f,#08162a 55%,#111537);color:var(--text);font-family:system-ui,-apple-system,'Segoe UI',sans-serif}.wrap{max-width:1200px;margin:auto;padding:18px 14px 48px}.card{margin-top:14px;padding:16px;border:1px solid var(--line);border-radius:18px;background:rgba(15,23,42,.94)}h1,h2,h3{margin:0}.muted{color:var(--muted);line-height:1.55}.profile{display:grid;grid-template-columns:1fr 1fr .35fr auto;gap:8px}.input,.btn{padding:11px 12px;border:1px solid var(--line);border-radius:11px;background:#17263f;color:#fff;font:inherit}.btn{font-weight:800;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}.good{background:var(--green)}.warn{background:var(--amber)}.notice{margin-top:10px;padding:11px;border:1px solid var(--line);border-radius:12px;background:#132238}.notice.good{border-color:#168568;color:#bbf7d0}.notice.bad{border-color:#b9445f;color:#fecdd3}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.block{grid-column:1/-1;margin-top:8px;padding:10px 12px;border-left:5px solid #38bdf8;background:#0e1a2e;border-radius:12px;font-weight:900}.mission{min-height:210px;padding:14px;border:1px solid var(--line);border-radius:16px;background:var(--panel);display:flex;flex-direction:column;gap:8px}.mission.done{border-color:#10b981}.mission.locked{opacity:.52;filter:grayscale(.8)}.mission.boss{background:#1b1535;border-color:#f59e0b}.status{font-size:12px;font-weight:800}.result{padding:8px;border:1px solid #15803d;border-radius:11px;background:#052e24;color:#bbf7d0}.actions{margin-top:auto}.actions .btn{width:100%}@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:620px){.profile,.grid{grid-template-columns:1fr}}</style><script src="./js/aiquest-cloud-logger.js?v=20260712-sheetonly"></script><script src="./js/aiquest-sync-v23.js?v=20260712-sheetonly"></script></head><body><main class="wrap"><h1>🧠 CSAI2102 AI Quest Map v714</h1><p class="muted">Google Sheet/Backend เป็นแหล่งข้อมูลทางการเพียงแห่งเดียว • Section 101</p><section class="card"><h2>ข้อมูลผู้เรียน</h2><div class="profile"><input id="sid" class="input" placeholder="รหัสนักศึกษา"><input id="name" class="input" placeholder="ชื่อ" readonly><input class="input" value="101" readonly><button id="load" class="btn good">โหลดจาก Sheet</button></div><div id="note" class="notice">กรอกรหัสนักศึกษา แล้วโหลดข้อมูลจาก Sheet</div></section><section class="card"><h2>Mission Grid</h2><div id="grid" class="grid"></div></section></main><script>(()=>{'use strict';const $=id=>document.getElementById(id);const ORDER=['s1','s2','s3','b1','s4','s5','s6','b2','s7','s8','s9','b3','s10','s11','s12','b4','s13','s14','s15','b5'];const BLOCKS={s1:'Block 1 • AI Foundation',s4:'Block 2 • Search Strategy',s7:'Block 3 • Knowledge & Reasoning',s10:'Block 4 • Machine Learning',s13:'Block 5 • Modern AI & Governance'};const TITLES={s1:'AI Spotter',s2:'Agent Builder',s3:'Problem Solving Agent',b1:'Foundation Boss',s4:'Search Explorer',s5:'Heuristic & A* Planner',s6:'Game Search',b2:'Search Strategy Boss',s7:'Knowledge Representation',s8:'Uncertainty Reasoning',s9:'Expert System',b3:'Reasoning Boss',s10:'ML Pipeline',s11:'Supervised Learning',s12:'Clustering & Evaluation',b4:'ML Evaluation Boss',s13:'Neural Network',s14:'NLP / Generative AI / RAG',s15:'AI System Design',b5:'Final AI Quest Boss'};let progress={},verified=false,studentId='';const say=(t,k='')=>{$('note').className='notice'+(k?' '+k:'');$('note').textContent=t};const norm=x=>String(x||'').toLowerCase().replace(/^m/,'s').replace(/^boss/,'b');function parseProgress(r){const out={};const sources=[r?.progress,r?.missions,r?.summary,r?.attempts,r?.data?.progress,r?.data?.missions,r?.data?.attempts];for(const src of sources){if(Array.isArray(src)){for(const a of src){const id=norm(a.sessionId||a.missionId||a.id);if(!ORDER.includes(id))continue;const score=Number(a.score||a.bestScore||0),passed=a.passed===true||String(a.gateStatus||a.status||'').toLowerCase()==='passed'||score>=60;if(passed)out[id]={passed:true,score,stars:Number(a.stars||0),accuracy:Number(a.accuracy||score),correct:Number(a.correct||0),total:Number(a.total||15),submittedAt:a.submittedAt||a.clientTs||a.timestamp||''}}}else if(src&&typeof src==='object'){for(const [k,v] of Object.entries(src)){const id=norm(k);if(ORDER.includes(id)&&v){const score=Number(v.score||v.bestScore||0),passed=v.passed===true||String(v.gateStatus||v.status||'').toLowerCase()==='passed'||score>=60;if(passed)out[id]={...v,passed:true,score}}}}}return out}const done=id=>!!progress[id]?.passed;const open=id=>id==='s1'||done(ORDER[ORDER.indexOf(id)-1]);const link=id=>'./student-core3-mission-v643.html?mission='+id+'&release=challenge711';function render(){const g=$('grid');g.innerHTML='';for(const id of ORDER){if(BLOCKS[id])g.insertAdjacentHTML('beforeend','<div class="block">'+BLOCKS[id]+'</div>');const d=done(id),o=verified&&open(id),p=progress[id]||{};const card=document.createElement('article');card.className='mission '+(id[0]==='b'?'boss ':'')+(d?'done':o?'':'locked');card.innerHTML='<div class="status">'+(d?'ผ่านแล้ว':o?'เปิดเล่น':'ล็อก')+'</div><h3>'+id.toUpperCase()+' • '+TITLES[id]+'</h3><p class="muted">'+(d?'ผลทางการจาก Sheet':o?'พร้อมเริ่มภารกิจ':'ต้องผ่าน '+(ORDER[ORDER.indexOf(id)-1]||'ด่านก่อนหน้า').toUpperCase()+' ก่อน')+'</p>'+(d?'<div class="result"><b>'+Math.round(p.score||0)+'%</b> • Accuracy '+Math.round(p.accuracy||p.score||0)+'% • '+(p.correct||0)+'/'+(p.total||15)+' ข้อ</div>':'')+'<div class="actions">'+(o?'<a class="btn '+(id[0]==='b'?'warn':'good')+'" href="'+link(id)+'">'+(d?'↻ ทบทวน / เล่นซ้ำ':'▶ เริ่ม '+id.toUpperCase())+'</a>':'<span class="btn">ผ่านด่านก่อนหน้า</span>')+'</div>';g.appendChild(card)}}async function load(){studentId=$('sid').value.trim();if(!studentId)return say('กรุณากรอกรหัสนักศึกษา','bad');verified=false;progress={};render();say('กำลังตรวจ Profile และความก้าวหน้าจาก Google Sheets…');try{const profile=await window.AIQuestSync.lookupProfile({studentId});if(!(profile?.ok&&profile?.found&&profile?.profile)){verified=true;$('name').value='';progress={};render();say('ไม่พบข้อมูลใน Sheet — ผู้ใช้ใหม่เริ่มที่ W1/S1 เท่านั้น','good');return}$('name').value=profile.profile.studentName||profile.profile.name||'';let r={};try{r=await window.AIQuestSync.lookupProgress({studentId})}catch(e){r={ok:false,error:String(e.message||e)}}if(!(r?.ok||r?.found||r?.progress||r?.attempts||r?.missions||r?.summary||r?.data)){verified=false;progress={};render();say('พบ Profile แต่ Backend ยังไม่คืน official progress — ระบบไม่ใช้ localStorage และยังไม่ปลดล็อกด่าน กรุณาตรวจ Apps Script action studentProgress','bad');return}progress=parseProgress(r);verified=true;render();say('โหลด official progress จาก Sheet แล้ว: '+studentId+' • Section 101','good')}catch(e){verified=false;progress={};render();say('เชื่อมต่อ Sheet ไม่สำเร็จ — ระบบจะไม่ใช้ข้อมูลค้างในเครื่องและไม่ปลดล็อกด่าน','bad')}}$('load').addEventListener('click',load);$('sid').addEventListener('keydown',e=>{if(e.key==='Enter')load()});render();})();</script></body></html>
