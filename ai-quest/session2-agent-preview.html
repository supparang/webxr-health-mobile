<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>CSAI2102 AI Quest v2.1 • Session 2 Preview</title>
  <meta name="theme-color" content="#0f172a" />
  <style>
    :root{--bg:#06101f;--panel:#0f172a;--text:#f8fafc;--muted:#a8b3c7;--line:rgba(255,255,255,.14);--brand:#38bdf8;--good:#34d399;--warn:#fbbf24;--bad:#fb7185;--shadow:0 18px 44px rgba(0,0,0,.34)}
    *{box-sizing:border-box} body{margin:0;color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 10% 0%,rgba(56,189,248,.25),transparent 32%),var(--bg)}
    .app{width:min(1050px,100%);margin:0 auto;padding:18px 14px 34px}.panel{background:rgba(15,23,42,.86);border:1px solid var(--line);border-radius:24px;padding:16px;margin-top:14px;box-shadow:var(--shadow)}
    h1,h2,h3{margin:0 0 8px} p{color:var(--muted);line-height:1.6}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .btn{border:0;border-radius:15px;padding:11px 14px;font-weight:1000;color:var(--text);background:linear-gradient(135deg,#2563eb,#7c3aed);cursor:pointer}.btn.secondary{background:rgba(255,255,255,.08);border:1px solid var(--line)}
    .choice{display:block;width:100%;text-align:left;margin:8px 0;border:1px solid var(--line);border-radius:16px;padding:12px;background:rgba(255,255,255,.07);color:var(--text);font-weight:800}.choice.correct{border-color:rgba(52,211,153,.55);background:rgba(52,211,153,.12)}.choice.wrong{border-color:rgba(251,113,133,.55);background:rgba(251,113,133,.12)}
    .chip{display:inline-flex;border:1px solid var(--line);background:rgba(255,255,255,.07);border-radius:999px;padding:7px 10px;font-weight:900;font-size:12px;margin:4px}.feedback{border:1px solid var(--line);border-radius:16px;padding:12px;margin-top:10px;background:rgba(255,255,255,.06)}
  </style>
  <script src="./js/mission2-agent-bank-v21.js"></script>
</head>
<body>
<div class="app">
  <section class="panel">
    <h1>🧠 Session 2 Preview: Intelligent Agent</h1>
    <p>v2.1 Template สำหรับ Agent / PEAS / Environment / Rational Agent</p>
    <div class="row">
      <a class="btn secondary" href="./index.html" style="text-decoration:none">กลับเกมหลัก</a>
      <button class="btn" id="btnNew">สุ่มรอบใหม่</button>
      <button class="btn secondary" id="btnExport">Export Round JSON</button>
    </div>
  </section>

  <section class="panel" id="roundBox"></section>
</div>
<script>
(function(){
  'use strict';
  let round = null;

  function newRound(){
    round = buildSession2Round('normal');
    render();
  }

  function render(){
    const box = document.getElementById('roundBox');
    box.innerHTML = `
      <h2>${round.title}</h2>
      <p>${round.phases.map(x => `<span class="chip">${x}</span>`).join('')}</p>
      ${renderAgent()}
      ${renderPEAS()}
      ${renderENV()}
      ${renderBoss()}
    `;
    attachChoiceHandlers();
  }

  function renderAgent(){
    return `<div class="panel"><h3>Phase 1: Agent or Not</h3>${round.agent.map((x,i)=>`
      <div class="feedback">
        <b>${i+1}. ${escapeHtml(x.label)}</b>
        <button class="choice" data-ok="${x.answer==='Agent'}">Agent</button>
        <button class="choice" data-ok="${x.answer==='Maybe Agent'}">Maybe Agent</button>
        <button class="choice" data-ok="${x.answer==='Not Agent'}">Not Agent</button>
        <p>${escapeHtml(x.hint)}</p>
      </div>`).join('')}</div>`;
  }

  function renderPEAS(){
    return `<div class="panel"><h3>Phase 2: PEAS Builder</h3>${round.peas.map((x,i)=>`
      <div class="feedback"><b>${i+1}. ${escapeHtml(x.scenario)}</b>
      ${x.choices.map(c=>`<button class="choice" data-ok="${!!c.correct}">${escapeHtml(c.text)}</button>`).join('')}</div>`).join('')}</div>`;
  }

  function renderENV(){
    return `<div class="panel"><h3>Phase 3: Environment Classifier</h3>${round.env.map((x,i)=>`
      <div class="feedback"><b>${i+1}. ${escapeHtml(x.stem)}</b>
      ${x.choices.map(c=>`<button class="choice" data-ok="${!!c.correct}">${escapeHtml(c.text)}</button>`).join('')}</div>`).join('')}</div>`;
  }

  function renderBoss(){
    return `<div class="panel"><h3>Phase 4: Agent Boss</h3>${round.boss.map((x,i)=>`
      <div class="feedback"><b>Boss ${i+1}: “${escapeHtml(x.claim)}”</b>
      <button class="choice" data-ok="true">${escapeHtml(x.counter)}</button>
      <button class="choice" data-ok="false">ถูก เพราะระบบที่ดูฉลาดทุกระบบคือ intelligent agent</button>
      <button class="choice" data-ok="false">ถูก เพราะถ้ามีข้อมูลหรือ sensor ก็ถือว่าเป็น agent แล้ว</button>
      <button class="choice" data-ok="false">ไม่เกี่ยว เพราะ PEAS ใช้เฉพาะ robot ไม่ใช้กับ software</button>
      <p>${escapeHtml(x.hint)}</p></div>`).join('')}</div>`;
  }

  function attachChoiceHandlers(){
    document.querySelectorAll('.choice').forEach(btn=>{
      btn.onclick = () => {
        const group = btn.parentElement.querySelectorAll('.choice');
        group.forEach(b => {
          b.disabled = true;
          if(b.dataset.ok === 'true') b.classList.add('correct');
        });
        if(btn.dataset.ok !== 'true') btn.classList.add('wrong');
      };
    });
  }

  function exportRound(){
    const blob = new Blob([JSON.stringify(round,null,2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'session2-agent-round.json'; a.click();
    URL.revokeObjectURL(url);
  }

  function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

  document.getElementById('btnNew').onclick = newRound;
  document.getElementById('btnExport').onclick = exportRound;
  newRound();
})();
</script>
</body>
</html>
