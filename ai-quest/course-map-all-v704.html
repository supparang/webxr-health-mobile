ntent-v702.js?v=20260707-all702"></script><script src="./js/aiquest-challenge-layer-v704.js?v=20260708-nolongest704"></script></head><body><main class="wrap"><header class="top"><div class="brand"><div class="logo">⚡</div><div><h1>CSAI2102: AI Quest Challenge v704</h1><div class="sub">S1–S15 / B1–B5 • No longest-answer bias • Section 101</div></div></div><div class="row"><a class="btn good" href="./student-aiquest-all-mission-v704.html?mission=s1&release=challenge704">Start S1</a><a class="btn" href="./content.html?release=challenge704">Content</a></div></header><section class="card"><h2>เส้นทางทดสอบแบบแก้เดาคำตอบยาวสุดแล้ว</h2><div class="route">No longest-correct bias • concise options • feedback อธิบายเต็มหลังตอบ • traps/risk/combo/adaptive ยังครบ</div></section><section class="card"><h2>Mission Grid</h2><div id="grid" class="grid"></div></section></main><script>(function(){'use strict';const C=window.AIQuestAllContentV702,$=id=>document.getElementById(id);function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));}function link(id){return './student-aiquest-all-mission-v704.html?mission='+id+'&release=challenge704';}Object.entries(C.sessions).forEach(([id,s])=>{$('grid').insertAdjacentHTML('beforeend','<section class="mission '+(s.boss?'boss':'')+'"><span class="pill">'+esc(s.w)+' • '+esc(s.code)+'</span><h3>'+esc(s.title)+'</h3><div class="muted">'+esc(s.theme)+'</div><small class="muted">'+esc(s.block)+' • '+esc(s.mission)+'</small><a class="btn '+(s.boss?'warn':'good')+'" href="'+link(id)+'">▶ Challenge '+esc(s.code)+'</a></section>')});})();</script></body></html>
