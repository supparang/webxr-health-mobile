<!doctype html>
<html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#071426"><title>CSAI2102 • Full Course Audit</title>
<style>
:root{--t:#e8f1ff;--m:#9fb2cc;--l:rgba(148,163,184,.2)}*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--t);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:radial-gradient(circle at 10% 5%,rgba(56,189,248,.2),transparent 33%),radial-gradient(circle at 88% 0%,rgba(167,139,250,.18),transparent 33%),linear-gradient(135deg,#06101f,#08162a 48%,#0a1023)}.app{max-width:1280px;margin:auto;padding:18px 14px 44px}.top,.row{display:flex;align-items:center;justify-content:space-between;gap:9px;flex-wrap:wrap}.brand{display:flex;gap:11px;align-items:center}.logo{width:46px;height:46px;display:grid;place-items:center;border-radius:15px;background:linear-gradient(135deg,#0ea5e9,#8b5cf6);font-size:24px}h1,h2{margin:0}.sub,.muted{color:var(--m);line-height:1.6}.sub{font-size:13px}.btn{border:1px solid transparent;border-radius:13px;padding:10px 13px;color:#fff;background:linear-gradient(135deg,#0ea5e9,#8b5cf6);font-weight:850;cursor:pointer;font-size:14px;text-decoration:none}.btn.secondary{background:rgba(255,255,255,.07);border-color:var(--l)}.card{margin-top:14px;padding:17px;border:1px solid var(--l);border-radius:21px;background:rgba(15,23,42,.88);box-shadow:0 18px 38px rgba(0,0,0,.22)}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.metric{padding:12px;border:1px solid var(--l);border-radius:15px;background:rgba(255,255,255,.04)}.metric span{font-size:12px;color:var(--m)}.metric b{display:block;font-size:25px;margin-top:4px}.head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:6px 9px;margin:3px;border:1px solid var(--l);font-size:12px;font-weight:800;background:rgba(148,163,184,.12)}.pill.good{color:#bbf7d0;border-color:rgba(52,211,153,.38);background:rgba(52,211,153,.1)}.pill.warn{color:#fde68a;border-color:rgba(245,158,11,.38);background:rgba(245,158,11,.1)}.table{overflow:auto;margin-top:11px}table{border-collapse:separate;border-spacing:0;width:100%;min-width:950px;overflow:hidden;border-radius:14px}th,td{text-align:left;padding:10px 12px;border-bottom:1px solid rgba(148,163,184,.12);font-size:13px;vertical-align:top}th{position:sticky;top:0;background:#111c31;color:#bae6fd}tr:hover td{background:rgba(56,189,248,.06)}.loading{padding:13px;border:1px solid rgba(56,189,248,.25);border-radius:14px;background:rgba(56,189,248,.08)}.warnbox{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.09)}@media(max-width:760px){.app{padding:14px 10px 34px}.metrics{grid-template-columns:1fr 1fr}}
</style></head><body><div class="app"><header class="top"><div class="brand"><div class="logo">📊</div><div><h1>CSAI2102: Full Course Audit</h1><div class="sub">S1–S15 / B1–B5 • Section 101 • Graded evidence only</div></div></div><div class="row"><a class="btn secondary" href="./course-map-v601.html">Course Map</a><a class="btn secondary" href="./teacher.html?teacher=1">Teacher Console</a><button class="btn" id="refresh">Refresh Google Sheets</button></div></header><section class="metrics"><div class="metric"><span>Students</span><b id="students">-</b></div><div class="metric"><span>Graded attempts</span><b id="attempts">-</b></div><div class="metric"><span>Evidence</span><b id="evidence">-</b></div><div class="metric"><span>Pass checkpoints</span><b id="passes">-</b></div></section><p id="status" class="muted" style="margin:11px 2px">กำลังเตรียม Full Course Audit…</p><section id="core" class="card"><div class="loading">กำลังโหลด Core Audit…</div></section><section id="m3" class="card"><div class="loading">กำลังโหลด Module 3 Audit…</div></section><section id="m4" class="card"><div class="loading">กำลังโหลด Module 4 Audit…</div></section><section id="m5" class="card"><div class="loading">กำลังโหลด Module 5 Audit…</div></section></div>
<script>
(()=>{'use strict';const ENDPOINT='https://script.google.com/macros/s/AKfycbwXSUHbhVbZtKcjNIDzs4TawAohdeInm1MxLpomVeST2JilOL3L0LWQtT4_Yb7fbJG9/exec',SECTION='101';const $=x=>document.getElementById(x),N=x=>{const n=Number(x);return Number.isFinite(n)?n:0},A=x=>Array.isArray(x)?x:[],O=x=>x&&typeof x==='object'&&!Array.isArray(x)?x:{};const E=x=>String(x==null?'':x).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));const GROUPS=[['core','Core + Search','S1–S6 / B1–B2',[['s1','S1 AI Awakening'],['s2','S2 Agent Builder'],['s3','S3 Search Maze'],['b1','B1 Foundation Boss'],['s4','S4 Route Cost'],['s5','S5 A* Rescue'],['s6','S6 Minimax Arena'],['b2','B2 Search & Game AI Boss']]],['m3','Module 3','S7–S9 / B3',[['s7','S7 Knowledge Base Forge'],['s8','S8 Uncertainty & Bayes'],['s9','S9 Expert System'],['b3','B3 Reasoning & Knowledge Boss']]],['m4','Module 4','S10–S12 / B4',[['s10','S10 ML Foundations'],['s11','S11 Supervised Learning'],['s12','S12 Unsupervised Discovery'],['b4','B4 Machine Learning Boss']]],['m5','Module 5','S13–S15 / B5',[['s13','S13 Neural Network Studio'],['s14','S14 Reinforcement Learning'],['s15','S15 NLP, GenAI & Applied AI'],['b5','B5 Final Applied AI Boss']]]];let students=[];function key(v){const x=String(v||'').toLowerCase().trim().replace(/[\s_\-:]+/g,'');const m={m1:'s1',session1:'s1',s1:'s1',m2:'s2',session2:'s2',s2:'s2',m3:'s3',session3:'s3',s3:'s3',boss1:'b1',b1:'b1',m4:'s4',session4:'s4',s4:'s4',m5:'s5',session5:'s5',s5:'s5',m6:'s6',session6:'s6',s6:'s6',boss2:'b2',b2:'b2',m7:'s7',session7:'s7',s7:'s7',m8:'s8',session8:'s8',s8:'s8',m9:'s9',session9:'s9',s9:'s9',boss3:'b3',b3:'b3',m10:'s10',session10:'s10',s10:'s10',m11:'s11',session11:'s11',s11:'s11',m12:'s12',session12:'s12',s12:'s12',boss4:'b4',b4:'b4',m13:'s13',session13:'s13',s13:'s13',m14:'s14',session14:'s14',s14:'s14',m15:'s15',session15:'s15',s15:'s15',boss5:'b5',b5:'b5'};return m[x]||x}function date(v){const n=Date.parse(v||'');return Number.isFinite(n)?n:0}function dateText(v){const n=date(v);return n?new Date(n).toLocaleString():(v||'-')}function practice(a){return String(a.runMode||'').toLowerCase()==='practice'||a.isPractice===true}function extra(a){let x=a.extraJson||a.extra||'';if(x&&typeof x==='object'){try{x=JSON.stringify(x)}catch(e){x=''}}return [a.schemaVersion,a.version,a.gameVersion,a.missionTitle,a.title,a.sessionTitle,x].join(' ').toLowerCase()}function currentCore(a,id){if(id!=='s6'&&id!=='b2')return true;const x=extra(a);return id==='s6'?/v5\.0|s6-minimax|minimax arena|alpha.?beta/.test(x):/v5\.0|search.?game ai|ucs.*a\*.*minimax|minimax.*a\*/.test(x)}function pass(a){const s=String(a.gateStatus||a.status||'').toLowerCase();return a.mastered===true||a.bossWin===true||N(a.stars)>=1||N(a.score)>=60||/pass|master/.test(s)}function accuracy(a){for(const k of ['accuracy','accuracyPct','accuracyPercent']){const v=a[k];if(v===undefined||v===null||String(v).trim()==='')continue;const n=Number(v);if(Number.isFinite(n))return Math.round(n)}return null}function attempts(){return students.flatMap(s=>A(s.attempts).map(a=>Object.assign({studentId:s.studentId,studentName:s.studentName},a)))}function pill(ok,label){return `<span class="pill ${ok?'good':'warn'}">${E(label)}</span>`}function renderGroup(id,title,sub,order,isCore){const all=attempts();const rows=order.map(([sid,label])=>{const raw=all.filter(a=>key(a.sessionId||a.missionId)===sid),graded=raw.filter(a=>!practice(a)),eligible=isCore?graded.filter(a=>currentCore(a,sid)):graded,legacy=isCore?graded.filter(a=>!currentCore(a,sid)):[],latest=eligible.slice().sort((a,b)=>date(b.serverTs||b.clientTs||b.timestamp)-date(a.serverTs||a.clientTs||a.timestamp))[0]||{},best=eligible.reduce((m,a)=>Math.max(m,N(a.score)),0);return{sid,label,eligible,legacy,latest,best,passed:eligible.some(pass),learners:new Set(eligible.map(a=>String(a.studentId||'')).filter(Boolean))}});const ev=rows.filter(r=>r.eligible.length).length,ps=rows.filter(r=>r.passed).length,old=rows.reduce((n,r)=>n+r.legacy.length,0);$(id).innerHTML=`<div class="head"><div><h2>${E(title)}</h2><p class="muted">${E(sub)} • Preview/Lab ไม่นับผ่าน${isCore?' • S6/B2 เฉพาะ Minimax curriculum':''}</p></div><div>${pill(ev===rows.length,'Evidence '+ev+'/'+rows.length)}${pill(ps===rows.length,'Passed '+ps+'/'+rows.length)}${old?`<span class="pill warn">Legacy excluded ${old}</span>`:''}</div></div><div class="table"><table><thead><tr><th>Checkpoint</th><th>Evidence</th><th>Passed</th><th>Attempts</th><th>Students</th><th>Best / Latest</th><th>Latest Accuracy</th><th>Latest Submitted</th></tr></thead><tbody>${rows.map(r=>{const has=r.eligible.length>0,ac=accuracy(r.latest);return`<tr><td><b>${E(r.label)}</b></td><td>${pill(has,has?'มีข้อมูล':'ไม่มีข้อมูล')}${r.legacy.length?`<br><span class="muted">ผลเก่า ${r.legacy.length}</span>`:''}</td><td>${has?pill(r.passed,r.passed?'เคยผ่าน':'ยังไม่ผ่าน'):'-'}</td><td>${r.eligible.length}</td><td>${r.learners.size}</td><td>${has?E(r.best+' / '+N(r.latest.score)):'-'}</td><td>${has&&ac!==null?E(ac)+'%':'–'}</td><td>${has?E(dateText(r.latest.serverTs||r.latest.clientTs||r.latest.timestamp)):'-'}</td></tr>`}).join('')}</tbody></table></div>`;return{ev,ps,total:rows.length}}function extract(payload){const d=O(payload.data||payload),list=[d.allStudents,d.students,payload.allStudents,payload.students].find(Array.isArray)||[];return list.map(x=>Object.assign({},x,{attempts:A(x.attempts)})).filter(x=>!x.section||String(x.section)===SECTION)}async function load(){const btn=$('refresh');btn.disabled=true;$('status').textContent='กำลังอ่าน Google Sheets…';try{const res=await fetch(ENDPOINT+'?action=teacherConsole&section='+SECTION+'&sessionId=all&includeTest=1&t='+Date.now(),{cache:'no-store'}),txt=await res.text();if(!res.ok)throw new Error('HTTP '+res.status);students=extract(JSON.parse(txt));const graded=attempts().filter(a=>!practice(a));$('students').textContent=students.length;$('attempts').textContent=graded.length;let ev=0,ps=0,total=0;GROUPS.forEach(([id,t,s,o])=>{const r=renderGroup(id,t,s,o,id==='core');ev+=r.ev;ps+=r.ps;total+=r.total});$('evidence').textContent=ev+'/'+total;$('passes').textContent=ps+'/'+total;$('status').textContent='โหลดข้อมูลแล้ว • '+new Date().toLocaleString()}catch(e){$('status').textContent='อ่านข้อมูลไม่สำเร็จ: '+(e&&e.message||e);GROUPS.forEach(([id])=>$(id).innerHTML='<div class="loading warnbox">ไม่สามารถโหลด Google Sheets ได้</div>')}finally{btn.disabled=false}}$('refresh').onclick=load;load()})();
</script></body></html>
