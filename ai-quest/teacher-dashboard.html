<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#071426" />
  <title>CSAI2102 AI Quest • Teacher Dashboard</title>
  <style>
    :root{--bg:#071426;--panel:#111c31;--text:#e5eefc;--muted:#9fb2cc;--line:rgba(148,163,184,.18)}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;display:grid;place-items:center;padding:20px;background:radial-gradient(circle at 12% 10%,rgba(56,189,248,.18),transparent 32%),linear-gradient(135deg,#06101f,#08162a 48%,#0a1023);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    main{width:min(560px,100%);padding:24px;border:1px solid var(--line);border-radius:22px;background:rgba(15,23,42,.86);text-align:center;box-shadow:0 18px 40px rgba(0,0,0,.25)}
    h1{margin:0 0 10px;font-size:24px}p{color:var(--muted);line-height:1.6}.btn{display:inline-block;margin-top:8px;padding:11px 16px;border-radius:12px;background:linear-gradient(135deg,#0ea5e9,#8b5cf6);color:#fff;text-decoration:none;font-weight:800}
  </style>
  <script>
  (function(){
    var target = './teacher.html?teacher=1&v=20260703-live';
    try{
      var from = new URL(location.href);
      var to = new URL(target, location.href);
      from.searchParams.forEach(function(value,key){ if(key !== 'teacher') to.searchParams.set(key,value); });
      to.searchParams.set('teacher','1');
      location.replace(to.toString());
    }catch(error){
      location.replace(target);
    }
  })();
  </script>
</head>
<body>
  <main>
    <h1>🧠 กำลังเปิด Teacher Console</h1>
    <p>หน้านี้ถูกเปลี่ยนจากรุ่นนำเข้า CSV เป็น Teacher Console ที่เชื่อม Google Sheets โดยตรงแล้ว</p>
    <a class="btn" href="./teacher.html?teacher=1&v=20260703-live">เปิด Teacher Console</a>
  </main>
</body>
</html>
