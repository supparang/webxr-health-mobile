<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#071426"><title>CSAI2102 • Student Progress</title><style>:root{--bg:#071426;--panel:#101d33;--line:#334155;--text:#e8f1ff;--muted:#a9bad3;--ok:#059669;--warn:#d97706;--bad:#be3455;--blue:#0284c7}*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#06101f,#08162a 55%,#111537);color:var(--text);font-family:system-ui,-apple-system,'Segoe UI',sans-serif}.wrap{max-width:1450px;margin:auto;padding:18px 14px 70px}.card{margin-top:13px;padding:15px;border:1px solid var(--line);border-radius:17px;background:rgba(15,23,42,.96)}h1,h2,p{margin-top:0}.muted{color:var(--muted)}.toolbar{display:grid;grid-template-columns:170px 1fr auto auto;gap:8px}.input,.btn{min-height:43px;padding:9px 11px;border:1px solid var(--line);border-radius:10px;background:#17263f;color:#fff;font:inherit}.btn{font-weight:850;cursor:pointer}.btn.blue{background:var(--blue)}.metrics{display:grid;grid-template-columns:repeat(6,1fr);gap:9px}.metric{padding:12px;border:1px solid var(--line);border-radius:12px;background:#132238}.metric span{color:var(--muted);font-size:12px}.metric b{display:block;font-size:25px}.tableWrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:1050px}th,td{padding:9px;border-bottom:1px solid var(--line);text-align:left}th{position:sticky;top:0;background:#101d33}.badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:12px;font-weight:850}.low{background:#064e3b;color:#bbf7d0}.medium{background:#4a2c04;color:#fde68a}.high{background:#4c1d2b;color:#fecdd3}.bar{height:8px;background:#26364f;border-radius:999px;overflow:hidden;min-width:100px}.bar i{display:block;height:100%;background:#10b981}.linkBtn{border:0;background:transparent;color:#7dd3fc;font-weight:850;cursor:pointer}.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;z-index:30;padding:20px;overflow:auto}.modal.on{display:block}.dialog{max-width:1200px;margin:auto;background:#0f1d33;border:1px solid var(--line);border-radius:18px;padding:16px}.sessionGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}.session{padding:10px;border:1px solid var(--line);border-radius:12px;background:#132238}.parts{font-size:12px;line-height:1.8}.okText{color:#86efac}.waitText{color:#fde68a}@media(max-width:900px){.metrics{grid-template-columns:repeat(3,1fr)}.sessionGrid{grid-template-columns:repeat(2,1fr)}}@media(max-width:620px){.wrap{padding:10px 8px 100px}.toolbar{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}.sessionGrid{grid-template-columns:1fr}.card{padding:11px}.dialog{padding:11px}}</style></head><body><main class="wrap"><h1>👩‍🏫 CSAI2102 Student Progress</h1><p class="muted">ภาพรวมหลายคน • Mission + Coding + Reflection • Section 101</p><section class="card"><div class="toolbar"><input id="section" class="input" value="101" placeholder="Section"><input id="query" class="input" placeholder="ค้นหารหัสหรือชื่อ"><button id="load" class="btn blue">โหลดทั้งชั้น</button><button id="export" class="btn">Export CSV</button></div><p id="status" class="muted">พร้อมโหลดข้อมูลจาก Google Sheet</p></section><section class="card"><div class="metrics"><div class="metric"><span>นักศึกษาทั้งหมด</span><b id="mTotal">0</b></div><div class="metric"><span>เริ่มแล้ว</span><b id="mStarted">0</b></div><div class="metric"><span>จบครบ</span><b id="mComplete">0</b></div><div class="metric"><span>เสี่ยงสูง</span><b id="mHigh">0</b></div><div class="metric"><span>เสี่ยงกลาง</span><b id="mMedium">0</b></div><div class="metric"><span>ผ่านเฉลี่ย</span><b id="mAvg">0</b></div></div></section><section class="card"><h2>รายชื่อนักศึกษา</h2><div class="tableWrap"><table><thead><tr><th>รหัส</th><th>ชื่อ</th><th>ผ่าน</th><th>Mission</th><th>Coding</th><th>Reflection</th><th>ด่านถัดไป</th><th>ค้าง</th><th>ความเสี่ยง</th><th>รายละเอียด</th></tr></thead><tbody id="tbody"></tbody></table></div></section></main><div id="modal" class="modal"><div class="dialog"><button id="close" class="btn">ปิด</button><h2 id="detailTitle"></h2><p id="detailMeta" class="muted"></p><div id="sessionGrid" class="sessionGrid"></div></div></div><script>(function(){'use strict';const ENDPOINT='https://script.google.com/macros/s/AKfycbwXSUHbhVbZtKcjNIDzs4TawAohdeInm1MxLpomVeST2JilOL3L0LWQtT4_Yb7fbJG9/exec';const ORDER=['S1','S2','S3','B1','S4','S5','S6','B2','S7','S8','S9','B3','S10','S11','S12','B4','S13','S14','S15','B5'];const $=id=>document.getElementById(id);let rows=[];async function post(action,payload){const r=await fetch(ENDPOINT,{method:'POST',cache:'no-store',headers:{'Content-Type':'text/plain;charset=UTF-8'},body:JSON.stringify(Object.assign({module:'AIQTEACHER',action},payload||{}))});const t=await r.text();try{return JSON.parse(t)}catch(e){throw Error('Backend ไม่คืน JSON')}}function riskBadge(r){return'<span class="badge '+r.risk+'">'+(r.risk==='high'?'สูง':r.risk==='medium'?'กลาง':'ต่ำ')+'</span>'}function render(data){rows=data.students||[];const s=data.summary||{};$('mTotal').textContent=s.studentCount||0;$('mStarted').textContent=s.startedCount||0;$('mComplete').textContent=s.completeCount||0;$('mHigh').textContent=s.highRiskCount||0;$('mMedium').textContent=s.mediumRiskCount||0;$('mAvg').textContent=(s.averageCompleted||0)+'/20';$('tbody').innerHTML=rows.map((r,i)=>'<tr><td>'+r.studentId+'</td><td>'+r.studentName+'</td><td><div class="bar"><i style="width:'+r.completedSessions*5+'%"></i></div>'+r.completedSessions+'/20</td><td>'+r.missionCount+'</td><td>'+r.codingCount+'</td><td>'+r.reflectionCount+'</td><td>'+r.nextSession+'</td><td>'+r.pendingPart+'</td><td>'+riskBadge(r)+'<br><small>'+r.riskReason+'</small></td><td><button class="linkBtn" data-i="'+i+'">เปิด</button></td></tr>').join('')||'<tr><td colspan="10">ไม่พบข้อมูลนักศึกษา</td></tr>';$('status').textContent='โหลดแล้ว '+rows.length+' คน'}async function load(){try{$('status').textContent='กำลังโหลดข้อมูลทั้งชั้น…';const d=await post('GET_CLASS_OVERVIEW',{section:$('section').value.trim(),query:$('query').value.trim()});if(!d.ok)throw Error(d.code||'LOAD_FAILED');render(d)}catch(e){console.error(e);$('status').textContent='โหลดไม่สำเร็จ: '+String(e.message||e)}}function show(r){$('detailTitle').textContent=r.studentId+' • '+r.studentName;$('detailMeta').textContent='ผ่าน '+r.completedSessions+'/20 • ถัดไป '+r.nextSession+' • ค้าง '+r.pendingPart+' • '+r.riskReason;$('sessionGrid').innerHTML=ORDER.map(id=>{const x=r.sessions[id]||{};return'<div class="session"><b>'+id+'</b><div class="parts"><span class="'+(x.mission?'okText':'waitText')+'">'+(x.mission?'✓':'○')+' Mission '+(x.missionScore||0)+'</span><br><span class="'+(x.coding?'okText':'waitText')+'">'+(x.coding?'✓':'○')+' Coding '+(x.codingScore||0)+'</span><br><span class="'+(x.reflection?'okText':'waitText')+'">'+(x.reflection?'✓':'○')+' Reflection</span></div></div>'}).join('');$('modal').classList.add('on')}function csv(){const h=['studentId','studentName','completedSessions','missionCount','codingCount','reflectionCount','nextSession','pendingPart','risk','riskReason'];const lines=[h.join(',')].concat(rows.map(r=>h.map(k=>'"'+String(r[k]??'').replace(/"/g,'""')+'"').join(',')));const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+lines.join('\n')],{type:'text/csv'}));a.download='AIQuest_Student_Progress_'+$('section').value+'.csv';a.click()}$('load').onclick=load;$('export').onclick=csv;$('query').addEventListener('keydown',e=>{if(e.key==='Enter')load()});$('tbody').onclick=e=>{const b=e.target.closest('[data-i]');if(b)show(rows[Number(b.dataset.i)])};$('close').onclick=()=>$('modal').classList.remove('on');$('modal').onclick=e=>{if(e.target===$('modal'))$('modal').classList.remove('on')};load()})();</script></body></html>
