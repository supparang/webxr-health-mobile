;line-height:1.45;margin:14px 0}.choices{display:grid;grid-template-columns:1fr 1fr;gap:9px}.choice{padding:13px;border:1px solid var(--l);border-radius:15px;background:rgba(255,255,255,.05);color:var(--t);text-align:left;font:inherit;line-height:1.45;cursor:pointer}.choice:hover:not(:disabled){border-color:rgba(56,189,248,.64)}.choice:disabled{cursor:not-allowed}.choice.ok{border-color:rgba(52,211,153,.7);background:rgba(52,211,153,.12)}.choice.no{border-color:rgba(251,113,133,.7);background:rgba(251,113,133,.12)}.fb{display:none;margin-top:13px;padding:13px;border:1px solid var(--l);border-radius:15px;line-height:1.6}.fb.ok,.fb.no,.fb.h{display:block}.fb.ok{border-color:rgba(52,211,153,.38);background:rgba(52,211,153,.12)}.fb.no{border-color:rgba(251,113,133,.38);background:rgba(251,113,133,.12)}.fb.h{border-color:rgba(251,191,36,.38);background:rgba(251,191,36,.12)}.sum{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:13px 0}.cell{padding:10px;border:1px solid var(--l);border-radius:14px;background:rgba(255,255,255,.04);font-size:12px;line-height:1.5}.cell.g{border-color:rgba(52,211,153,.42)}.cell.w{border-color:rgba(251,191,36,.42)}.cell.r{border-color:rgba(251,113,133,.42)}.wrong{margin-top:8px;padding:10px;border:1px solid rgba(251,113,133,.25);border-radius:13px;background:rgba(251,113,133,.07);line-height:1.5}.refl{display:grid;gap:9px;margin-top:14px}.refl label{font-weight:800}.toast{position:fixed;z-index:9;left:50%;bottom:20px;transform:translate(-50%,18px);opacity:0;pointer-events:none;padding:11px 15px;border:1px solid rgba(56,189,248,.35);border-radius:999px;background:#071426;color:#e0f2fe;transition:.18s}.toast.show{opacity:1;transform:translate(-50%,0)}@media(max-width:820px){.hero{grid-template-columns:1fr}.map{grid-template-columns:repeat(2,1fr)}.sum{grid-template-columns:repeat(2,1fr)}}@media(max-width:600px){.app{padding:14px 10px 34px}.profile,.map,.choices,.sum{grid-template-columns:1fr}.q{font-size:18px}}

<script>
(()=>{'use strict';
const CORE='CSAI2102_AIQUEST_V16_M1_GOOGLE_SHEETS',P2='CSAI2102_AIQUEST_PHASE2_V511',VER='v5.2.0-phase2-mission-runner';let R=null;
const qs=new URLSearchParams(location.search),MID=String(qs.get('mission')||'s8').toLowerCase(),PREVIEW=qs.get('preview')==='1';const $=x=>document.getElementById(x),N=x=>{const n=Number(x);return Number.isFinite(n)?n:0},E=x=>String(x==null?'':x).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
function msg(x){$('toast').textContent=x;$('toast').classList.add('show');clearTimeout(msg.t);msg.t=setTimeout(()=>$('toast').classList.remove('show'),2300)}function get(k,d){try{const v=JSON.parse(localStorage.getItem(k)||'null');return v==null?d:v}catch(e){return d}}function wr(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}function main(){return Object.assign({completed:{},stars:{},mastered:{},bestScore:{},difficulty:'normal'},get(CORE,{}))}function p2(){return Object.assign({completed:{},stars:{},mastered:{},bestScore:{},bestTime:{},history:[]},get(P2,{}))}function passed(s,id){return !!((s.completed&&s.completed[id])||N(s.stars&&s.stars[id])>0||(s.mastered&&s.mastered[id])||N(s.bestScore&&s.bestScore[id])>=60)}function b2(){return passed(main(),'b2')}function profile(){try{return window.AIQuestStorage?.getProfile?.()||{}}catch(e){return {}}}function goodProfile(){const p=profile();return !!(p.studentId&&p.studentName&&p.section)}function show(id){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('on'));$(id).classList.add('on');window.scrollTo({top:0,behavior:'smooth'})}function uid(x){return x+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8)}function stars(x){return x>=85?3:x>=70?2:x>=60?1:0}function shuffle(a){const x=(a||[]).slice();for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]]}return x}
function config(){return window.AIQuestPhase2Banks?.CONFIG?.[MID]||null}function level(){const x=main().difficulty||'normal';const c=config();return {easy:{help:4},normal:{help:3},challenge:{help:2}}[x]||{help:3}}function unlocked(c){if(PREVIEW)return true;if(!c)return false;const s=p2();return c.requires.every(id=>passed(s,id))}function stateFor(id){const s=p2();return passed(s,id)?'pass':(unlocked(config())?'open':'lock')}
function profileUI(){const p=profile();$('sid').value=p.studentId||'';$('sn').value=p.studentName||p.name||'';$('sec').value=p.section||'101';$('pinfo').textContent=goodProfile()?`Profile ready: ${p.studentId} • ${p.studentName} • ${p.section}`:'กรุณากรอก Student ID, Name และ Section ก่อนเริ่ม'}function saveProfile(){if(!window.AIQuestStorage){msg('Profile runtime ยังไม่พร้อม');return}const p=window.AIQuestStorage.saveProfile({studentId:$('sid').value,studentName:$('sn').value,section:$('sec').value});window.AIQuestSync?.submitProfile?.(p).catch(()=>{});profileUI();msg('บันทึก Profile แล้ว')}
function mapUI(){const c=config();if(!c){$('mapTitle').textContent='ไม่พบ Mission';$('mapDesc').textContent='กรุณากลับ Phase 2 Map';return}const s=p2(),done=['m7','m8','m9','b3'].filter(x=>passed(s,x)).length,st=stateFor(c.id);$('prog').textContent=done+'/4';$('stars').textContent=Object.values(s.stars||{}).reduce((a,b)=>a+N(b),0);$('currentLabel').textContent=c.sessionId.toUpperCase();$('currentState').textContent=st==='pass'?'Passed':st==='open'?'Open':'Locked';$('mapTitle').textContent=c.title;$('mapDesc').textContent=c.topic;$('route').innerHTML=`<b>เส้นทาง:</b> S7 Knowledge → Week 8 Midterm → S8 Uncertainty & Bayes → S9 Expert System → B3 Reasoning & Knowledge Boss`;$('gate').textContent=unlocked(c)?(PREVIEW?'Preview mode: เปิดทดสอบโดยไม่เช็ก prerequisite':'พร้อมเริ่มตาม prerequisite ของ Phase 2'):'ยังล็อก: ต้องผ่าน '+c.requires.join(' → ');const rows=[['m7','S7','Knowledge Base Forge'],['m8','S8','Uncertainty & Bayes Lab'],['m9','S9','Expert System Studio'],['b3','B3','Reasoning & Knowledge Boss']];$('map').innerHTML=rows.map(r=>{const x=r[0]===c.id?st:(passed(s,r[0])?'pass':'future'),label=x==='pass'?'ผ่านแล้ว':x==='open'?'พร้อมเริ่ม':x==='future'?'รอด่านก่อนหน้า':'ล็อก';return `<button class="mission ${x} ${r[0]==='b3'?'boss':''} ${x==='future'?'future':''}" data-m="${r[0]}" ${r[0]===c.id&&(x==='open'||x==='pass')?'':'disabled'}><span class="tag">${E(r[1])} • ${label}</span><h3>${E(r[2])}</h3><small>${r[0]===c.id?'กดเพื่อเริ่ม / เล่นซ้ำ':'เปิดในลำดับ Phase 2'}</small></button>`}).join('');document.querySelectorAll('[data-m="'+c.id+'"]').forEach(x=>x.onclick=start)}
function ev(type,d={}){if(!R)return;const p=profile(),e={eventId:uid('evt'),attemptId:R.attemptId,studentId:p.studentId||'',section:p.section||'101',sessionId:R.c.sessionId,missionId:R.c.id,eventType:type,phase:d.phase||'',itemId:d.itemId||'',prompt:d.prompt||'',yourAnswer:d.yourAnswer||'',correctAnswer:d.correctAnswer||'',isCorrect:d.isCorrect,combo:d.combo||0,helpLeft:R.m.helpLeft,clientTs:new Date().toISOString(),userAgent:navigator.userAgent,pageUrl:location.href,schemaVersion:VER,extraJson:d.extraJson||{}};R.events.push(e);window.AIQuestSync?.submitEvent?.(e).catch(()=>{})}
function start(){const c=config();if(!c){msg('ไม่พบ Mission configuration');return}if(!goodProfile()){show('mapS');$('sid').focus();msg('กรุณาบันทึก Student Profile ก่อนเริ่ม');return}if(!unlocked(c)){msg('Mission ยังล็อก: ต้องผ่าน prerequisite ก่อน');return}const items=window.AIQuestPhase2Banks?.build?.(MID,main().difficulty||'normal');if(!items?.length){msg('โหลด question bank ไม่สำเร็จ');return}const l=level(),time=PREVIEW?Math.min(180,c.time):c.time,ph={};items.forEach(q=>ph[q.phase]??={correct:0,total:0,wrong:0});R={c,attemptId:uid('att'),items,index:0,left:time,max:time,m:{correct:0,total:0,wrong:0,combo:0,maxCombo:0,helpLeft:l.help,helpUsed:0,phase:ph,wrongItems:[],mis:{}},events:[],started:Date.now(),preview:PREVIEW,answered:false,ended:false,saved:false};ev('session_start',{phase:'start',prompt:c.title+' started',extraJson:{version:VER,itemCount:items.length,preview:PREVIEW}});$('gameTitle').textContent=c.sessionId.toUpperCase()+': '+c.title;$('gameTopic').textContent=c.topic;show('gameS');question();R.timer=setInterval(()=>{R.left--;hud();if(R.left<=0)finish(true)},1000)}
function hud(){if(!R)return;const p=Math.max(0,R.left/R.max*100);$('time').textContent='⏱ '+Math.max(0,R.left)+'s';$('combo').textContent='Combo x'+R.m.combo;$('help').textContent='AI Help '+R.m.helpLeft+'/'+level().help;$('fill').style.width=p+'%';$('fill').classList.toggle('low',p<25)}function question(){if(!R||R.ended)return;R.answered=false;const q=R.items[R.index];if(!q){finish(false);return}const done=R.c.phases.filter(x=>R.m.phase[x]?.total>0),choices=shuffle([q.answer].concat(q.distractors||[]));$('game').innerHTML=`<div class="hud"><span class="chip" id="time"></span><span class="chip" id="combo"></span><span class="chip" id="help"></span><span class="chip">${E(R.c.sessionId.toUpperCase())}</span><div class="bar"><div class="fill" id="fill"></div></div></div><div class="phases">${R.c.phases.map(x=>`<span class="phase ${x===q.phase?'a':''} ${done.includes(x)?'d':''}">${E(x)}</span>`).join('')}</div><div class="intel"><b>Mission Intel</b><br>${MID==='s8'?'แยก Prior, Likelihood และ Posterior แล้วตรวจว่า confidence และ decision threshold เหมาะกับผลกระทบหรือไม่':MID==='s9'?'แยก Knowledge Base, Inference Engine และ Explanation Facility; ตรวจ fact/rule/predicate อย่างเป็นขั้นตอน':'รวม Fact/Rule + Bayesian evidence + Expert explanation ให้เป็นเหตุผลที่ตรวจสอบได้'}</div><div class="q">${E(q.prompt)}</div><div class="choices">${choices.map((x,i)=>`<button class="choice" data-i="${i}">${E(x)}</button>`).join('')}</div><div class="fb" id="fb"></div><div class="row" style="margin-top:14px"><button id="ask" class="btn secondary">AI Help</button><button id="next" class="btn" disabled>${R.index===R.items.length-1?'สรุปผล':'ข้อต่อไป'}</button></div>`;document.querySelectorAll('[data-i]').forEach(x=>x.onclick=()=>answer(q,choices[N(x.dataset.i)]));$('ask').onclick=()=>help(q);$('next').onclick=()=>{R.index++;question()};hud()}
function help(q){if(R.m.helpLeft<=0){msg('AI Help หมดแล้ว');return}R.m.helpLeft--;R.m.helpUsed++;$('fb').className='fb h';$('fb').innerHTML='<b>AI Help:</b> '+E(q.hint||'อ่านเงื่อนไขของโจทย์ให้ครบก่อนเลือก');ev('ai_help_used',{phase:q.phase,itemId:q.id,prompt:q.prompt,extraJson:{hint:q.hint}});hud()}function answer(q,v){if(!R||R.answered||R.ended)return;R.answered=true;const ok=v===q.answer,x=R.m.phase[q.phase];R.m.total++;x.total++;if(ok){R.m.correct++;x.correct++;R.m.combo++;R.m.maxCombo=Math.max(R.m.maxCombo,R.m.combo)}else{R.m.wrong++;x.wrong++;R.m.combo=0;R.m.mis[q.family]=(R.m.mis[q.family]||0)+1;R.m.wrongItems.push({phase:q.phase,prompt:q.prompt,yourAnswer:v,correctAnswer:q.answer,explain:q.explain,itemId:q.id,family:q.family})}document.querySelectorAll('[data-i]').forEach(b=>{b.disabled=true;const z=b.textContent;if(z===q.answer)b.classList.add('ok');else if(z===v)b.classList.add('no')});$('fb').className='fb '+(ok?'ok':'no');$('fb').innerHTML=`<b>${ok?'ถูกต้อง':'ยังไม่ถูกต้อง'}</b><br><b>คำตอบ:</b> ${E(q.answer)}<br>${E(q.explain||'')}`;$('next').disabled=false;ev('answer_submit',{phase:q.phase,itemId:q.id,prompt:q.prompt,yourAnswer:v,correctAnswer:q.answer,isCorrect:ok?1:0,combo:R.m.combo,extraJson:{family:q.family,explain:q.explain}});try{window.AIQuestAdaptiveCoach?.recordAnswer?.({isCorrect:ok,phase:q.phase,itemId:q.id,prompt:q.prompt,misconceptionKey:q.family})}catch(e){}hud()}
function advice(p,pct){if(p.includes('Bayes'))return pct>=70?'ใช้ prior/evidence ได้ดี':'ทบทวน prior, likelihood และ posterior';if(p.includes('Expert'))return pct>=70?'อธิบายองค์ประกอบ expert system ได้ดี':'ทบทวน knowledge base / inference / explanation';if(p.includes('Integrated'))return pct>=70?'เชื่อม reasoning ได้ดี':'ทบทวน fact-rule, uncertainty และ human oversight';if(p.includes('Probability'))return pct>=70?'ตีความ probability ได้เหมาะสม':'ทบทวน base rate และ decision threshold';if(p.includes('Rule'))return pct>=70?'ใช้ rule reasoning ได้ดี':'ทบทวน forward/backward chaining';return pct>=70?'เข้าใจแนวคิดได้ดี':'ทบทวนหลักฐานและข้อจำกัด'}function rows(){return R.c.phases.map(p=>{const x=R.m.phase[p]||{correct:0,total:0,wrong:0},pct=x.total?Math.round(x.correct/x.total*100):0;return {p,...x,pct,a:advice(p,pct)}})}
function finish(timeout){if(!R||R.ended)return;R.ended=true;clearInterval(R.timer);const a=R.m.total?R.m.correct/R.m.total:0,rs=rows(),phasePass=rs.every(x=>!x.total||x.pct>=60),score=Math.max(0,Math.min(100,Math.round(a*88+Math.min(6,R.m.maxCombo)+Math.max(0,Math.round(R.m.helpLeft/Math.max(1,level().help)*6)))),mastered=score>=85&&phasePass&&R.m.helpUsed<=2,boss=R.c.id==='b3'&&score>=60&&phasePass;R.result={score,accuracy:Math.round(a*100),stars:stars(score),mastered,used:Math.round((Date.now()-R.started)/1000),rows:rs,timeout,boss};ev('session_end',{phase:'end',prompt:R.c.title+' ended',extraJson:{score,accuracy:R.result.accuracy,mastered,timeout,bossWin:boss,phaseAnalytics:rs}});$('resultTitle').textContent=R.c.sessionId.toUpperCase()+': '+R.c.title+' Result';$('score').textContent=score;$('starsOut').textContent='★'.repeat(R.result.stars)+'☆'.repeat(3-R.result.stars);$('badge').textContent=R.c.id==='b3'?(boss?'Reasoning Boss Cleared':'Reasoning Boss Review'):mastered?'Mastered':score>=60?'Passed':'Review';$('resText').textContent=R.c.id==='b3'?(boss?'ผ่าน B3: คุณเชื่อม Knowledge, Bayes และ Expert Explanation ได้':'ทบทวน phase ที่ต่ำกว่า 60% แล้วเล่น B3 ซ้ำ'):(mastered?'ยอดเยี่ยม: คุณใช้เหตุผลตามแนวคิดของ Mission ได้ครบ':'ใช้ผลนี้กำหนดจุดทบทวนก่อน Mission ถัดไป');$('summary').innerHTML=rs.map(x=>`<div class="cell ${x.pct>=80?'g':x.pct>=60?'w':'r'}"><b>${E(x.p)}</b><br>${x.correct}/${x.total} • ${x.pct}%<br>${E(x.a)}</div>`).join('');$('review').innerHTML=R.m.wrongItems.length?'<b>Review Wrong Items</b>'+R.m.wrongItems.slice(0,8).map(x=>`<div class="wrong"><b>${E(x.phase)}</b><br>${E(x.prompt)}<br><b>ตอบ:</b> ${E(x.yourAnswer)}<br><b>ควรเป็น:</b> ${E(x.correctAnswer)}<br><span class="muted">${E(x.explain)}</span></div>`).join(''):'<b>Review Wrong Items</b><p class="muted">ยอดเยี่ยม รอบนี้ไม่มีข้อผิดพลาดสำคัญ</p>';const labels=reflectionLabels();$('l1').textContent=labels[0];$('l2').textContent=labels[1];$('l3').textContent=labels[2];$('saveInfo').textContent=R.preview?'Preview mode: ผลทดสอบนี้จะไม่ปลดล็อก progression':'Save Status: พร้อมบันทึกผล';show('resultS')}
function reflectionLabels(){if(MID==='s8')return ['1) Prior, likelihood และ posterior ต่างกันอย่างไร?','2) เหตุใด base rate และ threshold จึงสำคัญต่อการตัดสินใจ?','3) งานใดควรมี human review เมื่อ AI มีความไม่แน่นอน?'];if(MID==='s9')return ['1) Knowledge base และ inference engine ทำงานต่างกันอย่างไร?','2) ยกตัวอย่าง fact + rule → conclusion ที่คุณเข้าใจ','3) Expert system ต้องอธิบายและดูแล rules อย่างไร?'];return ['1) Fact/rule และ probability evidence ทำงานร่วมกันอย่างไร?','2) อธิบายว่าทำไมระบบต้องแสดง reasoning trace และ confidence','3) เสนอ human oversight หรือ mitigation สำหรับ AI ที่มีผลกระทบสูง']}
