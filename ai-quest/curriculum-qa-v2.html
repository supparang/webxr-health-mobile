<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CSAI2102 Curriculum QA v2</title><style>*{box-sizing:border-box}body{margin:0;background:#071426;color:#e8f1ff;font-family:system-ui,-apple-system,'Segoe UI',sans-serif}.wrap{max-width:1200px;margin:auto;padding:16px}.card{background:#101d33;border:1px solid #334155;border-radius:16px;padding:16px;margin:12px 0}.summary{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}.metric{padding:12px;border:1px solid #334155;border-radius:12px;background:#132238}.metric b{display:block;font-size:25px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.session{padding:12px;border:1px solid #334155;border-radius:13px;background:#132238}.session.ok{border-color:#059669}.session.bad{border-color:#be3455}.row{padding:6px;margin:5px 0;border-radius:8px;background:#18263b;font-size:12px}.row.ok{color:#bbf7d0}.row.bad{color:#fecdd3}.btn{display:inline-flex;padding:9px 12px;border-radius:10px;background:#0284c7;color:#fff;text-decoration:none;font-weight:800}.notice{padding:10px;border-radius:10px;background:#132238}.notice.ok{color:#bbf7d0;border:1px solid #059669}.notice.bad{color:#fecdd3;border:1px solid #be3455}@media(max-width:850px){.grid{grid-template-columns:repeat(2,1fr)}.summary{grid-template-columns:repeat(3,1fr)}}@media(max-width:560px){.wrap{padding:9px}.grid,.summary{grid-template-columns:1fr}.card{padding:12px}}</style></head><body><main class="wrap"><h1>📚 CSAI2102 Curriculum QA v2</h1><p>ตรวจ Curriculum → Integrated Session → Coding Lab v2 ครบ S1–S15 และ B1–B5</p><section class="card"><div id="notice" class="notice">กำลังตรวจ…</div></section><section class="card"><div class="summary"><div class="metric">ด่านทั้งหมด<b>20</b></div><div class="metric">Curriculum ครบ<b id="curriculum">0</b></div><div class="metric">Reflection ครบ<b id="reflection">0</b></div><div class="metric">Lab Upgrade<b id="upgrades">0</b></div><div class="metric">ผ่าน QA<b id="passed">0</b></div></div></section><section class="card"><div id="grid" class="grid"></div></section></main><script>(async function(){const ORDER=['S1','S2','S3','B1','S4','S5','S6','B2','S7','S8','S9','B3','S10','S11','S12','B4','S13','S14','S15','B5'],$=id=>document.getElementById(id);function row(t,ok){return'<div class="row '+(ok?'ok':'bad')+'">'+(ok?'✓ ':'✗ ')+t+'</div>'}try{const [cR,bR,uR]=await Promise.all([fetch('./curriculum-v2.json?v=qa',{cache:'no-store'}),fetch('./web/labs.json?v=qa',{cache:'no-store'}),fetch('./web/lab-upgrades-v2.json?v=qa',{cache:'no-store'})]);if(!cR.ok||!bR.ok||!uR.ok)throw Error('LOAD_FAILED');const c=await cR.json(),b=await bR.json(),u=await uR.json();let cp=0,rp=0,pass=0;$('grid').innerHTML='';ORDER.forEach(id=>{const s=c.sessions[id],lab=Object.assign({},b[id]||{},(u.labs||{})[id]||{}),checks={title:!!s?.title,outcomes:Array.isArray(s?.outcomes)&&s.outcomes.length>=3,topics:Array.isArray(s?.coreTopics)&&s.coreTopics.length>=5,mission:!!s?.mission,coding:!!s?.codingFocus,reflection:Array.isArray(s?.reflection)&&s.reflection.length===3,quiz:Array.isArray(s?.quizFocus)&&s.quizFocus.length>=3,lab:!!lab?.starter&&!!lab?.predict&&!!lab?.modify&&!!lab?.challenge};const ok=Object.values(checks).every(Boolean);if(checks.title&&checks.outcomes&&checks.topics&&checks.mission&&checks.coding&&checks.quiz)cp++;if(checks.reflection)rp++;if(ok)pass++;const d=document.createElement('article');d.className='session '+(ok?'ok':'bad');d.innerHTML='<h3>'+id+' • '+(s?.title||'Missing')+'</h3>'+row('Learning Outcomes',checks.outcomes)+row('Core Topics',checks.topics)+row('Mission + Coding Focus',checks.mission&&checks.coding)+row('Reflection 3 ข้อ',checks.reflection)+row('Quiz Focus',checks.quiz)+row('Coding Lab',checks.lab)+'<a class="btn" target="_blank" href="./student-session-integrated-v721.html?mission='+id.toLowerCase()+'&studentId=12&studentName=KK&section=101&qa=curriculum-v2">เปิดทดสอบ</a>';d.querySelector('.btn').style.marginTop='8px';$('grid').appendChild(d)});$('curriculum').textContent=cp;$('reflection').textContent=rp;$('upgrades').textContent=Object.keys(u.labs||{}).length;$('passed').textContent=pass;$('notice').className='notice '+(pass===20?'ok':'bad');$('notice').textContent=pass===20?'✓ Curriculum QA ผ่านครบ 20/20 ด่าน':'พบด่านไม่ครบ '+(20-pass)+' ด่าน'}catch(e){$('notice').className='notice bad';$('notice').textContent='QA ไม่สำเร็จ: '+String(e.message||e)}})();</script></body></html>
