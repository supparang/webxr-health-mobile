<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#071426"><title>CSAI2102 • Challenge v706</title><style>*{box-sizing:border-box}body{margin:0;background:#071426;color:#e8f1ff;font-family:system-ui,-apple-system,'Segoe UI',sans-serif}.wrap{max-width:960px;margin:auto;padding:16px}.card{margin:12px 0;padding:16px;border:1px solid #334155;border-radius:18px;background:#101d33}.top,.row{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}h1,h2,h3{margin:0}.muted{color:#a9bad3;line-height:1.55}.btn{padding:11px 14px;border:1px solid #334155;border-radius:12px;background:#1a2a44;color:#fff;font-weight:850;text-decoration:none}.good{background:#07875a;border-color:#07875a}.warn{background:#b45309;border-color:#b45309}.input,textarea,select{width:100%;padding:12px;border:1px solid #334155;border-radius:12px;background:#17263f;color:#fff;font:inherit}.profile{display:grid;grid-template-columns:1fr 1fr .4fr auto;gap:8px}.screen{display:none}.screen.on{display:block}.chip{display:inline-flex;padding:5px 8px;border:1px solid #334155;border-radius:999px;color:#bae6fd;font-size:12px;font-weight:850}.risk{color:#fde68a;border-color:#a97714}.bar{height:9px;background:#26364f;border-radius:999px;overflow:hidden;min-width:120px;flex:1}.bar i{display:block;height:100%;background:linear-gradient(90deg,#38bdf8,#8b5cf6,#f59e0b)}.arena{border:1px solid #7154b8;border-radius:18px;padding:16px;background:#111f3a}.twist{border-color:#f59e0b}.question{font-size:20px;line-height:1.55;white-space:pre-line;margin:12px 0}.choices{display:grid;grid-template-columns:1fr 1fr;gap:9px}.choice{min-height:72px;text-align:left;line-height:1.45;padding:13px;border:1px solid #334155;border-radius:13px;background:#1a2a44;color:#fff;font:inherit}.ok{border-color:#34d399;background:#103d37}.no{border-color:#fb7185;background:#492033}.notice,.fb{padding:12px;border:1px solid #334155;border-radius:13px;background:#132238;line-height:1.6}.notice.good,.fb.good{border-color:#168568;color:#bbf7d0}.notice.bad,.fb.bad{border-color:#b9445f;color:#fecdd3}.fb{display:none;margin-top:12px}.fb.show{display:block}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.metric{padding:12px;border:1px solid #334155;border-radius:14px;background:#14233a}.metric b{font-size:28px}.wrong{margin-top:8px;padding:11px;border:1px solid #6e3b49;border-radius:13px;background:#1f1726}@media(max-width:780px){.profile,.choices,.summary{grid-template-columns:1fr}}</style><script src="./js/aiquest-storage.js"></script><script src="./js/aiquest-cloud-logger.js"></script><script src="./js/aiquest-sync-v23.js"></script><script src="./js/aiquest-all-content-v702.js?v=20260707-all702"></script><script src="./js/aiquest-challenge-layer-v706.js?v=20260708-expanded706"></script></head><body><main class="wrap"><header class="top"><div><h1>⚡ CSAI2102 Challenge v706</h1><div id="sub" class="muted">Expanded options + 4-deck no-repeat window</div></div><a class="btn" href="./course-map-v640.html">แผนที่</a></header><section id="entry" class="screen on"><div class="card"><h2 id="title">Mission</h2><p id="desc" class="muted"></p><div class="notice good">v706: correct/distractor สร้างใหม่ตาม concept/trap/risk + กัน fingerprint ซ้ำ 4 deck ล่าสุด</div></div><div class="card"><h2>ข้อมูลผู้เรียน</h2><div class="profile"><input id="sid" class="input" placeholder="รหัสนักศึกษา"><input id="name" class="input" placeholder="ชื่อ"><input id="section" class="input" value="101" readonly><button id="saveProfile" class="btn good">บันทึก</button></div><div id="profileNote" class="notice">กรอกข้อมูลก่อนเริ่ม</div></div><div class="card"><button id="start" class="btn good">▶ เริ่ม Challenge Deck</button></div></section><section id="game" class="screen"><div class="top"><div><h2 id="gameTitle"></h2><p id="gameSub" class="muted"></p></div><button id="exit" class="btn">← ออก</button></div><div class="card"><div id="hud" class="row"></div><div id="arena"></div></div></section><section id="result" class="screen"><div class="card"><div id="badge" class="notice"></div><div id="score" style="font-size:58px;font-weight:950;margin:10px 0">0</div><div id="stars" style="font-size:25px;color:#fbbf24">☆☆☆</div><p id="resultText" class="muted"></p><div id="summary" class="summary"></div><div id="review"></div><div id="evidence" class="card"></div><label>1) หลักฐาน/หลักการ</label><textarea id="r1" rows="3"></textarea><label>2) risk/constraint/impact</label><textarea id="r2" rows="3"></textarea><label>3) human review / monitoring</label><textarea id="r3" rows="3"></textarea><div id="saveNote" class="notice">เลือก Case และเขียน Reflection ก่อนส่ง</div><div class="row" style="margin-top:12px"><button id="save" class="btn good">ส่งผล</button><button id="replay" class="btn warn">↻ เล่นใหม่</button></div></div></section></main><script>(function(){'use strict';const C=window.AIQuestAllContentV702,$=id=>document.getElementById(id),q=new URL(location.href).searchParams;let mission=String(q.get('mission')||'s1').toLowerCase().replace('m','s').replace('boss','b');const spec=C.spec(mission);let deck=[],idx=0,correct=0,combo=0,comboMax=0,wrong=[],answered=false,chosenCase=null,saved=false,startedAt=0;function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));}function screen(id){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('on'));$(id).classList.add('on');scrollTo(0,0);}function profile(){try{return window.AIQuestStorage?.getProfile?.()||{}}catch(e){return {}}}function profileNote(){const p=profile();if(p.studentId&&(p.studentName||p.name)){$('profileNote').className='notice good';$('profileNote').textContent='✓ พร้อม '+p.studentId+' • '+(p.studentName||p.name)+' • Section 101'}else{$('profileNote').className='notice';$('profileNote').textContent='กรอกข้อมูลก่อนเริ่ม'}}function loadProfile(){const p=profile();$('sid').value=p.studentId||'';$('name').value=p.studentName||p.name||'';$('section').value='101';profileNote()}async function saveProfile(){const studentId=$('sid').value.trim(),studentName=$('name').value.trim();if(!studentId||!studentName){$('profileNote').className='notice bad';$('profileNote').textContent='กรุณากรอกข้อมูลให้ครบ';return}let p={studentId,studentName,section:'101'};try{p=window.AIQuestStorage?.saveProfile?.(p)||p;await window.AIQuestSync?.submitProfile?.(p)}catch(e){}profileNote()}function options(card){const a=[card.correct,...card.distractors.slice(0,3)];const slot=Math.max(0,Math.min(3,Number(card.answerSlot)||0)),pos=a.indexOf(card.correct);if(pos!==slot)[a[pos],a[slot]]=[a[slot],a[pos]];return a}function start(){const p=profile();if(!p.studentId||!(p.studentName||p.name)){profileNote();return}deck=C.deck(mission,Math.floor(Math.random()*1000)+1);idx=0;correct=0;combo=0;comboMax=0;wrong=[];chosenCase=null;saved=false;startedAt=Date.now();$('gameTitle').textContent=spec.code+' • '+spec.title;screen('game');render()}function hud(){const c=deck[idx],pct=Math.round(idx/deck.length*100);$('hud').innerHTML='<span class="chip">Case '+(idx+1)+'/15</span><span class="chip">'+esc(c.phase)+'</span><span class="chip risk">'+esc(c.riskLevel||'RISK')+'</span><span class="chip">⚡ '+esc(c.comboTitle||C.comboTitle(combo))+'</span><span class="chip">🔥 x'+combo+'</span><div class="bar"><i style="width:'+pct+'%"></i></div>'}function render(){if(idx>=deck.length){finish();return}answered=false;const c=deck[idx],ops=options(c);$('gameSub').textContent='Challenge v706 • '+spec.theme+' • Trap: '+(c.challengeTrap||'—');hud();$('arena').innerHTML='<section class="arena '+(String(c.phase).includes('Twist')?'twist':'')+'"><h3>'+esc(c.phase)+' • '+esc(c.concept)+'</h3><p class="muted">'+esc(c.context)+' • policy: '+esc(c.policy)+' • trap: '+esc(c.challengeTrap||'-')+'</p><div class="question">'+esc(c.prompt)+'</div><div class="choices">'+ops.map(o=>'<button class="choice">'+esc(o)+'</button>').join('')+'</div><div class="row" style="margin-top:12px"><button id="next" class="btn" disabled>'+(idx===14?'สรุปผล':'เคสถัดไป')+'</button></div><div id="fb" class="fb"></div></section>';$('arena').querySelectorAll('.choice').forEach((b,i)=>b.onclick=()=>answer(c,ops[i]));$('next').onclick=()=>{idx++;render()}}function answer(c,value){if(answered)return;answered=true;const ok=value===c.correct;if(ok){correct++;combo++;comboMax=Math.max(comboMax,combo)}else{combo=0;wrong.push(c)}$('arena').querySelectorAll('.choice').forEach(b=>{b.disabled=true;if(b.textContent===c.correct)b.classList.add('ok');else if(b.textContent===value)b.classList.add('no')});const fb=$('fb');fb.className='fb show '+(ok?'good':'bad');fb.innerHTML=(ok?'✅ ถูกต้อง':'⚠ ยังไม่ใช่')+'<br><b>Trap:</b> '+esc(c.challengeTrap||'-')+'<br><b>อธิบายเต็ม:</b> '+esc(c.principle);$('next').disabled=false;hud()}function finish(){const score=Math.round(correct/15*100),pass=score>=60;if(C.rememberMiss)C.rememberMiss(mission,wrong);screen('result');$('badge').className='notice '+(pass?'good':'bad');$('badge').textContent=(pass?'✅ ผ่าน ':'🔁 ยังไม่ผ่าน ')+spec.title+' • Rank: '+(C.rank?C.rank(score):'AI Quest');$('score').textContent=score;$('stars').textContent='★'.repeat(score>=85?3:score>=70?2:score>=60?1:0)+'☆'.repeat(score>=85?0:score>=70?1:score>=60?2:3);$('resultText').textContent='ถูก '+correct+'/15 • Combo สูงสุด x'+comboMax+' • ใช้เวลา '+Math.round((Date.now()-startedAt)/1000)+' วินาที';$('summary').innerHTML='<div class="metric"><span>Correct</span><br><b>'+correct+'/15</b></div><div class="metric"><span>Accuracy</span><br><b>'+score+'%</b></div><div class="metric"><span>Unique</span><br><b style="font-size:18px">'+((deck.challengeAudit||{}).uniqueCorrect||'-')+'/'+((deck.challengeAudit||{}).uniqueDistractors||'-')+'</b></div>';$('review').innerHTML=wrong.length?'<h3>Adaptive Review Focus</h3>'+wrong.map(c=>'<div class="wrong"><b>'+esc(c.concept)+' • '+esc(c.context)+' • '+esc(c.riskLevel||'')+'</b><br><span style="color:#fde68a">Trap: '+esc(c.challengeTrap||'-')+'</span><br><span style="color:#bbf7d0">'+esc(c.principle)+'</span></div>').join(''):'<h3>Perfect Challenge Deck!</h3><p class="muted">ตอบถูกครบทุก Case</p>';renderEvidence()}function renderEvidence(){const ops=deck.map((c,i)=>'<option value="'+esc(c.id)+'">Case '+(i+1)+' • '+esc(c.context)+' — '+esc(c.concept)+' — '+esc(c.riskLevel||'')+'</option>').join('');$('evidence').innerHTML='<b>🔗 Reflection Evidence</b><p class="muted">เลือก 1 Case ที่เล่นจริง</p><select id="caseEvidence"><option value="">— เลือก Case —</option>'+ops+'</select><div id="caseNote" class="notice" style="margin-top:8px">ยังไม่ได้เลือก Case</div>';$('caseEvidence').onchange=()=>{chosenCase=deck.find(c=>c.id===$('caseEvidence').value)||null;$('caseNote').className='notice '+(chosenCase?'good':'');$('caseNote').innerHTML=chosenCase?'✓ เลือกแล้ว: <b>'+esc(chosenCase.context)+'</b><br>'+esc(chosenCase.concept)+' • '+esc(chosenCase.riskLevel||''):'ยังไม่ได้เลือก Case'}}function count(t){return String(t||'').replace(/\s/g,'').length}async function submit(){if(saved)return;const p=profile(),refs=[$('r1').value.trim(),$('r2').value.trim(),$('r3').value.trim()],score=Math.round(correct/15*100);if(!chosenCase){$('saveNote').className='notice bad';$('saveNote').textContent='ต้องเลือก Case ก่อนส่งผล';return}if(refs.some(x=>count(x)<55)){$('saveNote').className='notice bad';$('saveNote').textContent='Reflection ต้องมีอย่างน้อย 55 ตัวอักษรต่อข้อ';return}$('save').disabled=true;$('save').textContent='กำลังส่ง…';const payload={attemptId:'challenge706_'+Date.now().toString(36),studentId:p.studentId,studentName:p.studentName||p.name,section:'101',sessionId:mission,missionId:mission,missionTitle:spec.title,score,stars:score>=85?3:score>=70?2:score>=60?1:0,gateStatus:score>=60?'passed':'review',mastered:score>=85,usedTimeSec:Math.round((Date.now()-startedAt)/1000),accuracy:score,correct,total:15,wrong:15-correct,maxCombo:comboMax,helpUsed:0,reflection1:refs[0],reflection2:refs[1],reflection3:refs[2],schemaVersion:'challenge-v706',runMode:'graded',isGraded:true,clientTs:new Date().toISOString(),extraJson:{coursePack:'full-S1-S15-B1-B5',contentVersion:C.version,challengeLayer:'v7.0.6',optionBiasFix:'expanded-options-and-no-repeat-window',block:spec.block,rank:C.rank?C.rank(score):'',selectedCaseId:chosenCase.id,selectedCaseContext:chosenCase.context,selectedCaseSkill:chosenCase.concept,selectedCaseRisk:chosenCase.riskLevel,selectedCaseTrap:chosenCase.challengeTrap,challengeAudit:deck.challengeAudit||null,replayAudit:{cards:deck.map(c=>({id:c.id,context:c.context,concept:c.concept,answerSlot:c.answerSlot,risk:c.riskLevel,trap:c.challengeTrap,correct:c.correct,distractors:c.distractors,fingerprint:c.fingerprint}))}}};try{await window.AIQuestSync?.submitAttempt?.(payload);$('saveNote').className='notice good';$('saveNote').textContent='✓ ส่งผลเข้า Google Sheets แล้ว'}catch(e){$('saveNote').className='notice good';$('saveNote').textContent='✓ บันทึกในเครื่องแล้ว ระบบจะซิงก์เมื่อพร้อม'}saved=true;$('save').textContent='✓ ส่งผลแล้ว'}$('title').textContent=spec.w+' • '+spec.code+' • '+spec.title;$('desc').textContent=spec.mission;$('sub').textContent=spec.code+' • '+spec.theme+' • Challenge v706';$('saveProfile').onclick=saveProfile;$('start').onclick=start;$('exit').onclick=()=>{if(confirm('ออกจากภารกิจนี้?'))screen('entry')};$('replay').onclick=start;$('save').onclick=submit;loadProfile()})();</script></body></html>
