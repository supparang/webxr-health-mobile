<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#071426">
<title>CSAI2102 • Mission v711 Stable Loader</title>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#071426;color:#e8f1ff;font-family:system-ui,-apple-system,'Segoe UI',sans-serif}#missionFrame{display:block;width:100%;height:100%;border:0;background:#071426}.loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;background:#071426;color:#dbeafe;text-align:center;z-index:10}.loading.hide{display:none}.loading.bad{color:#fecdd3}
</style>
</head>
<body>
<div id="loading" class="loading">กำลังเปิด Mission…</div>
<iframe id="missionFrame" title="CSAI2102 Mission" referrerpolicy="no-referrer"></iframe>
<script>
(function(){
  'use strict';

  var SNAPSHOT = 'https://cdn.jsdelivr.net/gh/supparang/webxr-health-mobile@9eaea23c1bfe2300570ff87ea663b1806563e939/ai-quest/student-aiquest-all-mission-v711.html';
  var params = new URLSearchParams(location.search);
  var frame = document.getElementById('missionFrame');
  var loading = document.getElementById('loading');
  var target = new URL(SNAPSHOT);

  params.forEach(function(value, key){
    target.searchParams.set(key, value);
  });

  target.searchParams.set('snapshot', '20260721-stable-direct');

  var finished = false;

  function hideLoading(){
    if (finished) return;
    finished = true;
    loading.className = 'loading hide';
  }

  frame.addEventListener('load', function(){
    hideLoading();
  }, {once:true});

  frame.addEventListener('error', function(){
    finished = true;
    loading.className = 'loading bad';
    loading.textContent = 'เปิด Mission ไม่สำเร็จ กรุณารีเฟรชหน้าอีกครั้ง';
  }, {once:true});

  frame.src = target.toString();

  setTimeout(function(){
    if (!finished) {
      loading.textContent = 'Mission ใช้เวลาโหลดนานกว่าปกติ กรุณารอสักครู่…';
    }
  }, 5000);

  setTimeout(function(){
    if (!finished) {
      loading.className = 'loading bad';
      loading.textContent = 'เปิด Mission ไม่สำเร็จ กรุณารีเฟรชหน้าอีกครั้ง';
    }
  }, 15000);
})();
</script>
</body>
</html>
