<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#071426">
<title>CSAI2102 • Integrated Session</title>
<style>
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:#071426;color:#e8f1ff}.shell{height:100%;display:grid;grid-template-rows:auto 1fr}.bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:10px 14px;background:#0d1a2d;border-bottom:1px solid #334155}.brand{font-weight:900;margin-right:auto}.btn{border:1px solid #334155;border-radius:11px;padding:9px 12px;background:#17263f;color:#fff;font-weight:800;cursor:pointer;text-decoration:none}.btn.good{background:#07875a;border-color:#07875a}.btn.warn{background:#b45309;border-color:#b45309}.status{padding:8px 10px;border:1px solid #334155;border-radius:10px;background:#132238;font-size:13px}.status.good{border-color:#168568;color:#bbf7d0}.status.bad{border-color:#b9445f;color:#fecdd3}.frame{width:100%;height:100%;border:0;background:#071426}@media(max-width:700px){.brand{width:100%}.bar{gap:7px}.btn,.status{font-size:12px;padding:8px 9px}}
</style>
</head>
<body>
<div class="shell">
  <header class="bar">
    <div class="brand" id="brand">CSAI2102 Integrated Session</div>
    <div id="codingStatus" class="status">Coding: ยังไม่ตรวจ</div>
    <button id="verifyCoding" class="btn">ตรวจ Coding</button>
    <button id="openCoding" class="btn good">💻 Coding Lab</button>
    <a id="mapLink" class="btn" href="./course-map-v640.html">แผนที่</a>
  </header>
  <iframe id="missionFrame" class="frame" title="AI Quest Mission"></iframe>
</div>
<script>
(function(){
'use strict';
const ENDPOINT='https://script.google.com/macros/s/AKfycbwXSUHbhVbZtKcjNIDzs4TawAohdeInm1MxLpomVeST2JilOL3L0LWQtT4_Yb7fbJG9/exec';
const q=new URLSearchParams(location.search);
const mission=String(q.get('mission')||'s1').toLowerCase();
const codingIds=['s1','s2','s3','b1'];
const sid=q.get('studentId')||'';
const sname=q.get('studentName')||'';
const section=q.get('section')||'101';
const frameUrl=new URL('./student-aiquest-all-mission-v711.html',location.href);
q.forEach((v,k)=>frameUrl.searchParams.set(k,v));
frameUrl.searchParams.set('mission',mission);
document.getElementById('missionFrame').src=frameUrl.toString();
document.getElementById('brand').textContent='CSAI2102 • '+mission.toUpperCase()+' • Mission + Coding';
if(!codingIds.includes(mission)){
  document.getElementById('openCoding').style.display='none';
  document.getElementById('verifyCoding').style.display='none';
  document.getElementById('codingStatus').textContent='Coding Lab: ใช้ใน S1–S3 และ B1';
}
function codingUrl(){
  const u=new URL('./web/coding-lab.html',location.href);
  u.searchParams.set('session',mission.toUpperCase());
  u.searchParams.set('studentId',sid);
  u.searchParams.set('studentName',sname);
  u.searchParams.set('section',section);
  u.searchParams.set('returnUrl',location.href);
  return u.toString();
}
document.getElementById('openCoding').onclick=()=>location.href=codingUrl();
async function verify(){
  const box=document.getElementById('codingStatus');
  if(!sid){box.className='status bad';box.textContent='Coding: ไม่มีรหัสนักศึกษา';return;}
  box.className='status';box.textContent='Coding: กำลังตรวจจาก Sheet…';
  try{
    const r=await fetch(ENDPOINT,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({module:'AIQCODING',action:'GET_CODING_STATUS',studentId:sid,section:section,sessionId:mission.toUpperCase()})});
    const data=await r.json();
    if(data.ok&&data.completed){
      box.className='status good';
      box.textContent='Coding ผ่าน '+Number(data.bestScore||data.latestScore||0)+'/100';
      sessionStorage.setItem('AIQ_CODING_VERIFIED_'+sid+'_'+mission,'true');
    }else{
      box.className='status bad';
      box.textContent='Coding ยังไม่ผ่าน';
    }
  }catch(e){box.className='status bad';box.textContent='ตรวจ Coding ไม่สำเร็จ';}
}
document.getElementById('verifyCoding').onclick=verify;
if(q.get('codingReturn')==='1'||sessionStorage.getItem('AIQ_CODING_VERIFIED_'+sid+'_'+mission)==='true')verify();
})();
</script>
</body>
</html>
