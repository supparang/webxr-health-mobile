<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#071426">
<title>CSAI2102 • Mission + Coding</title>
<style>
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:#071426;color:#e8f1ff}.shell{height:100%;display:grid;grid-template-rows:auto 1fr}.bar{padding:10px 14px;background:#0d1a2d;border-bottom:1px solid #334155}.top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.brand{font-weight:950;margin-right:auto}.btn{border:1px solid #334155;border-radius:11px;padding:9px 12px;background:#17263f;color:#fff;font-weight:850;cursor:pointer;text-decoration:none}.btn.good{background:#07875a;border-color:#07875a}.btn.done{background:#065f46;border-color:#10b981;color:#d1fae5}.flow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:9px}.step{padding:8px 10px;border:1px solid #334155;border-radius:11px;background:#132238;font-size:13px}.step b{display:block}.step small{color:#a9bad3}.step.active{border-color:#38bdf8;background:#102744}.step.good{border-color:#10b981;background:#09352e}.step.wait{opacity:.72}.frame{width:100%;height:100%;border:0;background:#071426}.notice{margin-top:8px;padding:8px 10px;border-radius:10px;background:#1d2a3e;color:#dbeafe;font-size:13px;white-space:pre-wrap}.notice.good{background:#064e3b;color:#d1fae5}.notice.bad{background:#4c1d2b;color:#fecdd3}@media(max-width:760px){.brand{width:100%}.flow{grid-template-columns:1fr}.btn{font-size:12px;padding:8px 9px}}
</style>
</head>
<body>
<div class="shell">
<header class="bar">
<div class="top"><div class="brand" id="brand">CSAI2102 • Mission + Coding</div><button id="codingAction" class="btn good">ขั้นที่ 2 • ทำ Coding Lab</button><a id="mapLink" class="btn" href="./course-map-v640.html">แผนที่</a></div>
<div class="flow"><div class="step active"><b>1. เล่น Mission</b><small>ตอบ Case ให้ครบ แล้วไป Coding</small></div><div id="codingStep" class="step wait"><b>2. Coding Lab</b><small id="codingText">ระบบกำลังตรวจจาก Google Sheet…</small></div><div id="reflectionStep" class="step wait"><b>3. Reflection และส่งผล</b><small id="reflectionText">ทำ Coding ให้ผ่านก่อน</small></div></div>
<div id="notice" class="notice">ไม่ต้องกดตรวจเอง ระบบจะตรวจ Coding อัตโนมัติเมื่อเปิดหน้านี้และเมื่อกลับจาก Coding Lab</div>
</header>
<iframe id="missionFrame" class="frame" title="AI Quest Mission"></iframe>
</div>
<script>
(function(){
'use strict';
const ENDPOINT='https://script.google.com/macros/s/AKfycbwXSUHbhVbZtKcjNIDzs4TawAohdeInm1MxLpomVeST2JilOL3L0LWQtT4_Yb7fbJG9/exec';
const q=new URLSearchParams(location.search),mission=String(q.get('mission')||'s1').toLowerCase();
const codingIds=['s1','s2','s3','b1'],sid=q.get('studentId')||'',sname=q.get('studentName')||'',section=q.get('section')||'101';
const $=id=>document.getElementById(id);
const frameUrl=new URL('./student-aiquest-all-mission-v711.html',location.href);q.forEach((v,k)=>frameUrl.searchParams.set(k,v));frameUrl.searchParams.set('mission',mission);$('missionFrame').src=frameUrl.toString();
$('brand').textContent='CSAI2102 • '+mission.toUpperCase()+' • Mission + Coding';
function codingUrl(){const u=new URL('./web/coding-lab.html',location.href);u.searchParams.set('session',mission.toUpperCase());u.searchParams.set('studentId',sid);u.searchParams.set('studentName',sname);u.searchParams.set('section',section);u.searchParams.set('returnUrl',location.href);return u.toString();}
$('codingAction').onclick=()=>location.href=codingUrl();
function setState(kind,msg,score){const step=$('codingStep'),text=$('codingText'),ref=$('reflectionStep'),refText=$('reflectionText'),btn=$('codingAction'),note=$('notice');if(kind==='passed'){step.className='step good';text.textContent='ผ่านแล้ว '+Number(score||0)+'/100 จาก Backend';ref.className='step active';refText.textContent='ทำ Reflection และกดส่งผลใน Mission ด้านล่างได้';btn.className='btn done';btn.textContent='✓ Coding ผ่านแล้ว • เปิดดู/ทำใหม่';note.className='notice good';note.textContent=msg||'Coding ผ่านแล้ว ระบบยืนยันจาก Google Sheet เรียบร้อย';}else if(kind==='failed'){step.className='step wait';text.textContent='ยังไม่ผ่าน — กดปุ่ม “ทำ Coding Lab”';ref.className='step wait';refText.textContent='ทำ Coding ให้ผ่านก่อน';btn.className='btn good';btn.textContent='ขั้นที่ 2 • ทำ Coding Lab ตอนนี้';note.className='notice bad';note.textContent=msg||'ยังไม่มีผล Coding ที่ผ่านใน Google Sheet';}else{text.textContent=msg||'กำลังตรวจจาก Google Sheet…';}}
async function verify(){if(!codingIds.includes(mission)){$('codingAction').style.display='none';setState('passed','',100);return;}if(!sid){setState('failed','ไม่พบรหัสนักศึกษา กรุณากลับแผนที่แล้วโหลด Profile ก่อน');return;}setState('checking','กำลังตรวจจาก Google Sheet…');try{const r=await fetch(ENDPOINT,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({module:'AIQCODING',action:'GET_CODING_STATUS',studentId:sid,section,sessionId:mission.toUpperCase()})});const raw=await r.text();let data={};try{data=raw?JSON.parse(raw):{};}catch(e){setState('failed','Backend ตอบกลับไม่ใช่ JSON\n'+raw.slice(0,500));return;}if(data.ok&&data.completed){setState('passed','Coding ผ่านแล้ว • Backend '+(data.version||'ไม่ระบุเวอร์ชัน'),data.bestScore||data.latestScore||0);}else if(data.ok){setState('failed','ยังไม่พบผล Coding สำหรับ '+sid+' / '+section+' / '+mission.toUpperCase()+'\nBackend: '+(data.version||'ไม่ระบุเวอร์ชัน')+' • attempts: '+Number(data.attemptCount||0));}else{setState('failed','ตรวจ Coding ไม่สำเร็จ: '+(data.code||data.error||'UNKNOWN')+'\nBackend: '+(data.version||'ไม่ระบุเวอร์ชัน'));}}catch(e){setState('failed','ตรวจสถานะ Coding ไม่สำเร็จ: '+(e.message||e));}}
verify();window.addEventListener('focus',verify);window.addEventListener('pageshow',verify);document.addEventListener('visibilitychange',()=>{if(!document.hidden)verify();});
})();
</script>
</body>
</html>
