<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>CSAI2102 AI Quest • Classroom Config v2.7.1 Session 2</title>
  <style>
    :root{--bg:#06101f;--panel:#0f172a;--text:#f8fafc;--muted:#a8b3c7;--line:rgba(255,255,255,.14);--brand:#38bdf8;--good:#34d399;--warn:#fbbf24;--bad:#fb7185;--shadow:0 18px 44px rgba(0,0,0,.34)}
    *{box-sizing:border-box}body{margin:0;color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg)}
    .app{width:min(1050px,100%);margin:0 auto;padding:18px 14px 34px}.panel{background:rgba(15,23,42,.86);border:1px solid var(--line);border-radius:24px;padding:16px;margin-top:14px;box-shadow:var(--shadow)}
    h1,h2{margin:0 0 8px}p{color:var(--muted);line-height:1.6}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    label{font-weight:900;color:#dbeafe;display:block;margin-bottom:5px}input,select,textarea{width:100%;background:#0b1324;color:var(--text);border:1px solid var(--line);border-radius:14px;padding:11px}textarea{min-height:130px}
    .btn{border:0;border-radius:15px;padding:11px 14px;font-weight:1000;color:var(--text);background:linear-gradient(135deg,#2563eb,#7c3aed);cursor:pointer}.btn.secondary{background:rgba(255,255,255,.08);border:1px solid var(--line)}.btn.good{background:linear-gradient(135deg,#059669,#22c55e)}
    .coachBox{margin-top:10px;border:1px solid var(--line);border-radius:16px;padding:12px;background:rgba(255,255,255,.06);line-height:1.6}
    @media(max-width:800px){.grid{grid-template-columns:1fr}}
  </style>
  <script src="./js/aiquest-data-contract-v22.js"></script>
  <script src="./js/aiquest-section-lock-v238.js"></script>
  <script src="./js/aiquest-production-v271.js"></script>
</head>
<body>
<div class="app">
  <section class="panel">
    <h1>⚙️ Classroom Config v2.7.1 Session 2</h1>
    <p>ตั้งค่าห้องเรียนสำหรับใช้งานจริง CSAI2102 Section 101</p>
    <div class="row">
      <a class="btn secondary" href="./index.html" style="text-decoration:none">กลับเกม</a>
      <button class="btn good" id="btnSave">Save Config</button>
      <button class="btn secondary" id="btnReset">Reset Default</button>
      <button class="btn secondary" id="btnExport">Export JSON</button>
    </div>
  </section>

  <section class="panel">
    <h2>Classroom</h2>
    <div class="coachBox"><b>Section Lock:</b> ระบบนี้ใช้ Section <b>101</b> เท่านั้น และ Class ID = <b>CSAI2102-2569-101</b></div>
    <div class="grid">
      <div><label>Course ID</label><input id="courseId"></div>
      <div><label>Course Name</label><input id="courseName"></div>
      <div><label>Term</label><input id="term"></div>
      <div><label>Class ID</label><input id="classId"></div>
      <div><label>Section</label><input id="section"></div>
      <div><label>Teacher ID</label><input id="teacherId"></div>
      <div><label>Active Session</label><input id="activeSession"></div>
      <div><label>Run Mode</label><select id="runMode"><option>practice</option><option>graded</option><option>remedial</option><option>challenge</option><option>demo</option></select></div>
    </div>
  </section>

  <section class="panel">
    <h2>Policy</h2>
    <div class="grid">
      <div><label>Score Policy</label><select id="scorePolicy"><option>best_graded</option><option>latest_graded</option><option>first_graded</option></select></div>
      <div><label>Feedback Policy</label><select id="feedbackPolicy"><option>immediate</option><option>after_finish</option><option>teacher_release</option></select></div>
      <div><label>Timer</label><select id="timerEnabled"><option value="true">ON</option><option value="false">OFF</option></select></div>
      <div><label>Leaderboard</label><select id="leaderboardEnabled"><option value="false">OFF</option><option value="true">ON</option></select></div>
    </div>
  </section>

  <section class="panel">
    <h2>Cloud</h2>
    <div class="grid">
      <div><label>Apps Script URL</label><input id="appsScriptUrl"></div>
      <div><label>Google Sheets</label><select id="googleSheets"><option value="true">ON</option><option value="false">OFF</option></select></div>
      <div><label>Firebase</label><select id="firebase"><option value="false">OFF</option><option value="true">ON</option></select></div>
    </div>
    <label style="margin-top:12px">Firebase Config JSON</label>
    <textarea id="firebaseConfig" placeholder='{"apiKey":"...","projectId":"...","databaseURL":"..."}'></textarea>
    <div id="configPreview"></div>
  </section>
</div>

<script>
(function(){
  const DEFAULT_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwXSUHbhVbZtKcjNIDzs4TawAohdeInm1MxLpomVeST2JilOL3L0LWQtT4_Yb7fbJG9/exec';
  function el(id){return document.getElementById(id);}
  function load(){
    const c = AIQuestDataContract.saveConfig({
      ...AIQuestDataContract.loadConfig(),
      courseId:'CSAI2102',
      classId:'CSAI2102-2569-101',
      section:'101'
    });
    ['courseId','courseName','term','classId','section','teacherId','activeSession','runMode','scorePolicy','feedbackPolicy','appsScriptUrl'].forEach(k => el(k).value = c[k] || '');
    el('timerEnabled').value = String(!!c.timerEnabled);
    el('leaderboardEnabled').value = String(!!c.leaderboardEnabled);
    el('googleSheets').value = String(!!c.cloudTargets?.googleSheets);
    el('firebase').value = String(!!c.cloudTargets?.firebase);
    el('firebaseConfig').value = c.firebaseConfig ? JSON.stringify(c.firebaseConfig,null,2) : '';
    if(!el('appsScriptUrl').value.trim()){ el('appsScriptUrl').value = DEFAULT_APPS_SCRIPT_URL; }
    preview();
  }
  function collect(){
    let fb = null;
    try{ fb = el('firebaseConfig').value.trim() ? JSON.parse(el('firebaseConfig').value) : null; }catch(e){ alert('Firebase JSON ไม่ถูกต้อง'); throw e; }
    return {
      courseId:'CSAI2102',
      courseName:el('courseName').value.trim(),
      term:el('term').value.trim(),
      classId:'CSAI2102-2569-101',
      section:'101',
      teacherId:el('teacherId').value.trim(),
      activeSession:el('activeSession').value.trim(),
      runMode:el('runMode').value,
      scorePolicy:el('scorePolicy').value,
      feedbackPolicy:el('feedbackPolicy').value,
      timerEnabled:el('timerEnabled').value === 'true',
      leaderboardEnabled:el('leaderboardEnabled').value === 'true',
      appsScriptUrl:el('appsScriptUrl').value.trim(),
      cloudTargets:{googleSheets:el('googleSheets').value === 'true', firebase:el('firebase').value === 'true'},
      firebaseConfig:fb
    };
  }
  function preview(){
    AIQuestDataContract.renderConfigPanel(el('configPreview'));
  }
  el('btnSave').onclick = () => { AIQuestDataContract.saveConfig(collect()); preview(); alert('Saved'); };
  el('btnReset').onclick = () => { localStorage.removeItem('CSAI2102_AIQUEST_DATA_CONTRACT_V22'); load(); };
  el('btnExport').onclick = () => {
    const blob = new Blob([JSON.stringify(AIQuestDataContract.loadConfig(),null,2)], {type:'application/json'});
    const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href=url; a.download='aiquest-classroom-config.json'; a.click(); URL.revokeObjectURL(url);
  };
  load();
})();
</script>
</body>
</html>
