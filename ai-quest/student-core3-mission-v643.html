<!doctype html>
<html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#071426"><title>CSAI2102 • Student Mission</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#071426}iframe{display:block;width:100%;height:100%;border:0;visibility:hidden}</style></head><body><iframe id="missionFrame" title="CSAI2102 Student Mission"></iframe><script>
(function(){'use strict';
  var params=new URLSearchParams(location.search);
  var mission=String(params.get('mission')||'s1').toLowerCase();
  var allow=['s1','s2','s3','b1','s4','s5','s6','b2','s7','s8','s9','b3'];
  if(allow.indexOf(mission)<0) mission='s1';
  var frame=document.getElementById('missionFrame');
  frame.src='./core3-mechanic-arena-v640.html?mission='+encodeURIComponent(mission)+'&student=1';
  function removeTeacherUI(doc){
    var style=doc.createElement('style');
    style.textContent='#practice,#gameLab,[data-teacher-only]{display:none!important}';
    doc.head.appendChild(style);

    var practice=doc.getElementById('practice');
    if(practice) practice.remove();
    var gameLab=doc.getElementById('gameLab');
    if(gameLab) gameLab.remove();

    Array.prototype.slice.call(doc.querySelectorAll('a')).forEach(function(link){
      var href=String(link.getAttribute('href')||'').toLowerCase();
      var text=String(link.textContent||'').toLowerCase();
      if(href.indexOf('teacher-course-freeze')>=0 || href.indexOf('teacher-audit')>=0 || text.indexOf('freeze qa')>=0 || text.indexOf('teacher audit')>=0){
        link.remove();
      }
    });

    Array.prototype.slice.call(doc.querySelectorAll('h2')).forEach(function(heading){
      if(String(heading.textContent||'').trim().toLowerCase()==='play mode'){
        heading.textContent='Mission';
        var card=heading.closest('.card');
        if(card){
          var description=card.querySelector('p');
          if(description) description.textContent='ทำภารกิจ Graded เพื่อสร้างผลการเรียน, คะแนน, Combo, Mechanic score และ Reflection';
        }
      }
    });
  }
  frame.addEventListener('load',function(){
    try{
      var doc=frame.contentDocument;
      removeTeacherUI(doc);
      frame.style.visibility='visible';
      var observer=new MutationObserver(function(){ removeTeacherUI(doc); });
      observer.observe(doc.body,{childList:true,subtree:true});
    }catch(err){
      frame.style.visibility='visible';
    }
  });
})();
</script></body></html>
