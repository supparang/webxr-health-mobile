  <script>
  (() => {

    const make = d => ({

      stages:{
        diagnose:{prompt:'อะไรคือภาระที่ระบบทำให้ผู้ใช้คิดมากเกินจำเป็นและควรแก้ก่อน',hint:'แยกให้ได้ว่าอะไรเป็นความยากของงานจริง และอะไรเกิดจากหน้าจอที่ทำให้ผู้ใช้ต้องเดาหรือจำเกินจำเป็น',options:[
          {label:d.a[0],description:d.a[1],correct:true,rationale:d.a[2]},
          {label:'ผู้ใช้ควรจำทุกอย่างเองให้ได้',description:'ไม่ควรช่วยเพราะจะทำให้ผู้ใช้ไม่เก่ง',rationale:'การบังคับให้ผู้ใช้จำสิ่งที่ระบบควรบอก คือภาระที่หลีกเลี่ยงได้'},
          {label:'เพิ่มข้อมูลทุกอย่างในหน้าเดียว',description:'ให้ครบที่สุดในครั้งเดียว',rationale:'ข้อมูลมากโดยไม่มีลำดับทำให้ผู้ใช้สแกนและเลือกยากขึ้น'},
          {label:'เปลี่ยนภาพพื้นหลังให้สดขึ้น',description:'ทำให้หน้าดูน่าสนใจ',rationale:'ความสวยไม่ได้แก้สาเหตุที่ทำให้ผู้ใช้ตัดสินใจยาก'}]},
        prioritize:{prompt:'ควรจัดลำดับบนหน้าจออย่างไรให้ผู้ใช้เห็นสิ่งสำคัญก่อน',hint:'ให้สิ่งที่ผู้ใช้ต้องทำตอนนี้เด่นกว่าข้อมูลรอง ไม่ใช่ทำทุกอย่างแข่งกันเด่น',options:[
          {label:d.b[0],description:d.b[1],correct:true,rationale:d.b[2]},
          {label:'ทำทุกปุ่มให้สีสดและขนาดเท่ากัน',description:'เพื่อไม่ให้สิ่งใดสำคัญกว่า',rationale:'เมื่อทุกอย่างเด่นเท่ากัน ผู้ใช้ยิ่งหาสิ่งสำคัญยาก'},
          {label:'ย้ายสิ่งที่ต้องทำลงไปท้ายหน้า',description:'บังคับให้อ่านทุกอย่างก่อน',rationale:'เพิ่มการค้นหาโดยไม่จำเป็น โดยเฉพาะเมื่อผู้ใช้มีเวลาจำกัด'},
          {label:'ใช้สัญลักษณ์อย่างเดียวแทนข้อความ',description:'ลดจำนวนคำบนหน้าจอ',rationale:'ผู้ใช้อาจต้องเดาความหมายของสัญลักษณ์ จึงยิ่งเพิ่มภาระ'}]},
        reduce:{prompt:'วิธีใดลดภาระโดยยังรักษาข้อมูลสำคัญไว้',hint:'จัดข้อมูลเป็นกลุ่ม เปิดรายละเอียดเมื่อจำเป็น และใช้ค่าเริ่มต้นที่ช่วยให้เริ่มได้',options:[
          {label:d.c[0],description:d.c[1],correct:true,rationale:d.c[2]},

          {label:'ถามเพียงว่าหน้าจอสวยไหม',description:'ใช้ความชอบแทนผลการใช้งาน',rationale:'ความชอบไม่บอกว่าผู้ใช้เห็นสิ่งสำคัญและทำงานสำเร็จหรือไม่'},
          {label:'นับจำนวนองค์ประกอบที่ลบออก',description:'ยิ่งลบมากยิ่งถือว่าดี',rationale:'จำนวนสิ่งบนหน้าไม่ได้แทนความเข้าใจหรือความสำเร็จของงาน'},

    const CASES=[
      make({id:'registration',title:'คดีลงทะเบียนเรียนสับสน',service:'ระบบลงทะเบียนเรียน',user:'รินต้องเลือกวิชาให้ครบภายใน 10 นาทีก่อนที่นั่งเต็ม',symptom:'หน้าจอแสดงรายวิชา ตาราง เวลา เงื่อนไข และคำเตือนพร้อมกันจนไม่รู้ควรเริ่มจากอะไร',a:['ข้อมูลหลายระดับถูกแสดงพร้อมกันโดยไม่มีลำดับเลือกวิชา → ตรวจตาราง → ยืนยัน','ผู้ใช้ต้องคัดแยกสิ่งสำคัญเองขณะมีเวลาจำกัด','เป็นภาระที่เกิดจากการจัดข้อมูล ไม่ใช่ความยากจำเป็นของการเลือกวิชา'],b:['แสดงความคืบหน้าว่าเลือกแล้วกี่วิชา และทำปุ่มตรวจตารางให้เด่นเมื่อเลือกครบ','ข้อมูลรองอยู่ในลำดับถัดไป','ช่วยให้ผู้ใช้รู้สถานะและสิ่งที่ต้องทำต่อ'],c:['แสดงสรุปรายวิชาก่อน แล้วเปิดรายละเอียดเงื่อนไขเมื่อผู้ใช้ต้องการ','เข้าถึงข้อมูลได้ แต่ไม่บังคับให้อ่านทุกอย่างก่อนเริ่ม','ลดข้อมูลที่เห็นพร้อมกันและยังให้ผู้ใช้ควบคุมได้'],d:['ให้ผู้ใช้ใหม่เลือก 5 วิชาตามเงื่อนไข แล้วถามว่าอยู่ขั้นใดและต้องทำอะไรต่อ','เก็บเวลา ความผิดพลาด และจุดที่ผู้ใช้ลังเล','ตรวจได้ทั้งการทำงานสำเร็จ ความเข้าใจสถานะ และภาระในการคิด']}),
      make({id:'scholarship-status',title:'คดีสถานะทุนการศึกษาซับซ้อน',service:'หน้าติดตามสถานะทุนการศึกษา',user:'เอิร์ธต้องรู้ก่อนวันพรุ่งนี้ว่าต้องส่งเอกสารเพิ่มหรือไม่',symptom:'มีหลายสถานะ เช่น กำลังตรวจสอบ ดำเนินการ รอข้อมูล แต่ผู้ใช้ไม่รู้ว่าข้อใดเกี่ยวกับตน',a:['สถานะใช้คำคล้ายกันแต่ไม่บอกความหมายหรือสิ่งที่ผู้ใช้ต้องทำ','ผู้ใช้ต้องจำความต่างของคำและเดาว่ามีงานค้างหรือไม่','ปัญหาเกิดจากภาษาของระบบที่ไม่ตรงความเข้าใจผู้ใช้'],b:['จัดกลุ่มสถานะเป็น ทำทันที / รอเจ้าหน้าที่ / เสร็จแล้ว และทำสิ่งที่ต้องทำให้เด่น','ทำให้ผู้ใช้เห็นงานสำคัญก่อน','ลดการเปรียบเทียบคำหลายคำและบอกการกระทำต่อ'],c:['แสดงเฉพาะสถานะหลักก่อน พร้อมปุ่มดูรายละเอียดสำหรับคนที่ต้องการ','ไม่ซ่อนข้อมูลสำคัญแต่ไม่บังคับให้อ่านทั้งหมด','ช่วยลดการสแกนข้อมูลจำนวนมาก'],d:['ให้ผู้ใช้ดูตัวอย่างสถานะ 4 แบบ แล้วบอกว่าต้องทำอะไรต่อ','วัดความถูกต้อง เวลา และจุดที่ผู้ใช้ยังตีความผิด','ตรวจได้ว่าการจัดคำและลำดับข้อมูลช่วยให้ตัดสินใจได้จริง']}),
      make({id:'exam-portal',title:'คดีเข้าห้องสอบออนไลน์ไม่ทัน',service:'ระบบเข้าสอบออนไลน์',user:'แพรวต้องเข้าห้องสอบผ่านมือถือในเวลาจำกัดและอินเทอร์เน็ตไม่เสถียร',symptom:'ผู้ใช้เห็นปุ่มและข้อความหลายอย่าง แต่ไม่รู้ว่าต้องตรวจอะไรเพื่อเข้าห้องสอบให้ทัน',a:['หน้าจอแสดงคำเตือน กล้อง ไมโครโฟน รหัสสอบ และปุ่มเข้าห้องพร้อมกันโดยไม่บอกลำดับ','ผู้ใช้ต้องตัดสินใจเองว่าอะไรสำคัญก่อนเวลาเริ่ม','ภาระเกิดจากการไม่จัดลำดับงานที่เร่งด่วน'],b:['ทำรายการเตรียมพร้อมทีละขั้นและแสดงปุ่มเข้าห้องเมื่อครบ','ผู้ใช้เห็นงานปัจจุบันและความคืบหน้า','ช่วยลดการสแกนหลายสิ่งพร้อมกัน'],c:['แสดงเฉพาะขั้นตอนถัดไป พร้อมเปิดรายละเอียดการแก้ปัญหาเมื่อกดดู','ผู้ใช้ไม่ต้องอ่านคู่มือทั้งหมดก่อนเริ่ม','ลดข้อมูลที่ไม่จำเป็นในจังหวะเร่งด่วน'],d:['ให้ผู้ใช้ใหม่ลองเข้าห้องสอบจำลองภายในเวลาที่กำหนด','ดูเวลา ความผิดพลาด และจุดที่ผู้ใช้หยุดนาน','วัดได้ว่าลำดับใหม่ช่วยให้เข้าห้องได้เร็วและถูกต้อง']})
    ];
    UXQMissionEngine.init({id:'w3',title:'ด่านลดภาระความคิด',subtitle:'W3 • ลดภาระความคิด',intro:'จัดข้อมูลให้ผู้ใช้เห็นสิ่งสำคัญ ตัดสินใจง่าย และไม่ต้องเดา',bank:CASES,caseCount:2,stages:['diagnose','prioritize','reduce','validate'],threeStarAccuracy:84,threeStarVerified:75,recentLimit:6,requires:'w2',nextHref:'./b1-cognitive-storm.html',nextLabel:'เข้าสู่ด่านบอส B1'});
  })();
  </script>
