<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CSAI2601 Portfolio Builder</title><style>body{font-family:system-ui,sans-serif;margin:0;background:#eef3fb;color:#13213d}.wrap{max-width:1100px;margin:auto;padding:24px}.toolbar{position:sticky;top:0;background:#fff;border:1px solid #cad5e8;border-radius:14px;padding:12px;display:flex;gap:8px;flex-wrap:wrap;z-index:5}.toolbar input,.toolbar button{font:inherit;padding:10px;border:1px solid #9fb0cd;border-radius:9px}.toolbar button{background:#173a70;color:#fff;font-weight:800}.cover,.section{background:#fff;border:1px solid #cad5e8;border-radius:16px;padding:22px;margin-top:16px}.cover h1{font-size:2.2rem;margin:0}.meta{color:#5a6c89}.node{break-inside:avoid;border-top:1px solid #d9e2f0;padding:16px 0}.node:first-child{border-top:0}.node h3{margin:0 0 8px}.field{margin:8px 0}.field b{display:block;color:#173a70}.reflection{background:#f2f6fc;border-left:4px solid #6b8fc7;padding:12px}.status{display:inline-block;border-radius:999px;padding:5px 9px;background:#e8eef8}.approved{background:#dff6e8}.need_revision{background:#ffe2e6}.missing{color:#a23846}@media print{body{background:#fff}.toolbar{display:none}.wrap{max-width:none;padding:0}.cover,.section{border:0;border-radius:0;margin:0;padding:18mm 15mm}.section{page-break-before:always}.node{page-break-inside:avoid}}</style></head><body><div class="wrap"><div class="toolbar"><input id="studentId" placeholder="Student ID"><input id="section" placeholder="Section" value="201"><button onclick="loadPortfolio()">สร้าง Portfolio</button><button onclick="window.print()">Print / Save PDF</button></div><main id="out"><section class="cover"><h1>CSAI2601 UX/UI Case Study Portfolio</h1><p class="meta">กรอกรหัสนักศึกษาและ Section เพื่อดึง Artifact และ Reflection จาก Google Sheet</p></section></main></div><script>const ORDER=['w1','w2','w3','b1','w4','w5','w6','w7','b2','w8','w9','w10','w11','b3','w12','w13','w14','b4','w15'];const TITLES={w1:'UX First Impression Audit',w2:'HCD Sprint Brief',w3:'Cognitive Load Repair',b1:'Foundation UX Defense',w4:'Interview Note + Persona Lite',w5:'Problem Statement + HMW + Storyboard',w6:'Sitemap + User Flow',w7:'Low-fi Wireframe',b2:'Flow/Wireframe Defense',w8:'Midterm UX Blueprint',w9:'UI Kit Charter',w10:'Responsive + Accessibility',w11:'Visual Style Guide',b3:'Interface System Defense',w12:'Component State Spec',w13:'Clickable Hi-fi Prototype',w14:'Usability Iteration Log',b4:'Prototype Validation Defense',w15:'Final UX/UI Case Study Portfolio'};const $=id=>document.getElementById(id);function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function loadPortfolio(){const studentId=$('studentId').value.trim(),section=$('section').value.trim();if(!studentId||!section){alert('กรุณากรอกรหัสและ Section');return}$('out').innerHTML='<section class="cover"><h1>กำลังสร้าง Portfolio…</h1></section>';google.script.run.withSuccessHandler(render).withFailureHandler(e=>$('out').innerHTML=`<section class="cover"><h1>เกิดข้อผิดพลาด</h1><p>${esc(e.message)}</p></section>`).UXQ_teacherPortfolioData({studentId,section})}function render(d){const progress=d.progress||{},nodes=progress.nodes||{},art={};(d.artifacts||[]).forEach(x=>art[x.missionId]=x);const projectIds=[...new Set((d.artifacts||[]).map(x=>x.projectId).filter(Boolean))];let html=`<section class="cover"><h1>CSAI2601 UX/UI Case Study Portfolio</h1><p><b>Student:</b> ${esc(d.studentId)} &nbsp; <b>Section:</b> ${esc(d.section)}</p><p><b>Project ID:</b> ${esc(projectIds.join(', ')||'ยังไม่พบ')}</p><p class="meta">Studio submitted ${progress.summary?.submittedCount||0}/${progress.summary?.totalNodes||19} • Approved ${progress.summary?.approvedCount||0} • Need revision ${progress.summary?.revisionCount||0}</p></section>`;ORDER.forEach((id,index)=>{const a=art[id]||{},n=nodes[id]||{},fields=Array.isArray(a.artifactFields)?a.artifactFields:[];html+=`<section class="section"><div class="node"><h2>${esc(id.toUpperCase())} • ${esc(TITLES[id])}</h2><span class="status ${esc(n.reviewStatus||'')}">${esc(n.reviewStatus||'not_submitted')}</span>${a.figmaUrl?`<p><a href="${esc(a.figmaUrl)}" target="_blank">Open Figma / Evidence</a></p>`:'<p class="missing">ยังไม่มี Figma/Evidence URL</p>'}${fields.filter(f=>!['projectId','figmaUrl','reflection','selfCheckEvidence'].includes(f.key)).map(f=>`<div class="field"><b>${esc(f.label||f.key)}</b><div>${esc(f.value||'—')}</div></div>`).join('')}<div class="reflection"><b>Reflection</b><p>${esc(a.reflection||n.reflection||'ยังไม่มี Reflection')}</p></div>${n.teacherComment?`<div class="field"><b>Teacher Comment</b><div>${esc(n.teacherComment)}</div></div>`:''}</div></section>`});$('out').innerHTML=html}</script></body></html>
