<script>
(function(){
'use strict';
var root=function(){return document.getElementById('uxqTeacherActionDashboard')};
var modal=function(){return document.getElementById('uxqTeacherActionModal')};
var cache={};
var esc=function(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')};
var n=function(v){return Number(v||0)};
var mission=function(v){var m={w1:'W1 • นักสืบปัญหา UX',w2:'W2 • คิดเชิงออกแบบ',w3:'W3 • ลดภาระความคิด',b1:'B1 • บอสพายุความสับสน',w4:'W4 • ห้องแล็บถอดรหัสผู้ใช้'};return m[String(v||'').toLowerCase()]||v||'ภารกิจ'};
var stage=function(v){var m={evidence:'หลักฐาน',hypothesis:'สมมติฐาน',fix:'วิธีแก้',test:'ทดสอบ',empathize:'เข้าใจผู้ใช้',define:'ตั้งโจทย์',ideate:'สร้างแนวคิด',prototype:'ต้นแบบ',diagnose:'หาจุดที่ทำให้คิดเกินจำเป็น',prioritize:'จัดลำดับสิ่งสำคัญ',reduce:'ลดภาระความคิด',validate:'ตรวจผล',process:'กระบวนการออกแบบ',listen:'ฟังสัญญาณผู้ใช้',separate:'แยกสิ่งที่เห็นจริง',insight:'สกัดความเข้าใจเชิงลึก'};return m[String(v||'').toLowerCase()]||v||'ตรวจเหตุผล'};
var empty=function(t){return '<div class="uxq-ta-empty">'+esc(t)+'</div>'};
var focus=function(s){var f=Array.isArray(s.focus)?s.focus.slice(0,2):[];return f.length?f.map(function(i){return stage(i.stageKey)}).join(' + '):'ตรวจเหตุผล'};
function person(s){return '<div class="uxq-ta-item"><div><b>'+esc(s.studentName||s.studentId||'ผู้เรียน')+'</b><small>'+esc(s.section||'')+' • '+esc(focus(s))+' • เหตุผลผ่าน '+n(s.latest&&s.latest.verifiedAccuracy)+'%</small></div><div><span class="uxq-ta-badge '+esc(s.supportLevel)+'">'+esc(s.actionLabel)+'</span><button class="uxq-ta-button" type="button" data-uxq-student="'+esc(s.studentId||s.studentName)+'">ดูเหตุผล</button></div></div>'}
function pattern(p){return '<div class="uxq-ta-pattern"><b>'+esc(mission(p.mission))+' • '+esc(stage(p.stageKey))+' <span class="uxq-ta-badge review">'+n(p.studentCount)+' คน / '+n(p.incidents)+' ครั้ง</span></b><span>'+esc(p.lesson)+'</span><small style="display:block;color:#ffe5a7;margin-top:5px">กิจกรรม 3 นาที: '+esc(p.prompt)+'</small></div>'}
function stretch(s){return '<div class="uxq-ta-item"><div><b>'+esc(s.studentName||s.studentId||'ผู้เรียน')+'</b><small>เหตุผลผ่านดีที่สุด '+n(s.best&&s.best.verifiedAccuracy)+'% • '+esc(s.actionText)+'</small></div><span class="uxq-ta-badge stretch">ต่อยอด</span></div>'}
window.renderUXQTeacherActionDashboard=function(data){cache=data||{};var r=root();if(!r)return;var help=Array.isArray(cache.needsHelp)?cache.needsHelp:[];var patterns=Array.isArray(cache.classPatterns)?cache.classPatterns:[];var ready=Array.isArray(cache.stretchReady)?cache.stretchReady:[];r.innerHTML='<div class="uxq-ta__head"><div><h2>แดชบอร์ดสำหรับตัดสินใจสอน</h2><p>สรุปว่า “ต้องช่วยใคร • ทบทวนอะไร • ต่อยอดใคร” โดยไม่แสดงชื่อผู้เรียนในภาพรวมทั้งห้อง</p></div><span class="uxq-ta__stamp">อัปเดต '+esc(cache.generatedAt||'—')+'</span></div><div class="uxq-ta-grid"><article class="uxq-ta-card"><span class="uxq-ta-kicker">1. ต้องช่วยตอนนี้ · '+n(cache.summary&&cache.summary.needsHelp)+'</span><h3>ช่วยรายบุคคล</h3><p>เปิดดูเฉพาะคน แล้วใช้ประโยคสะท้อนกลับที่ระบบสรุปไว้</p><div class="uxq-ta-list">'+(help.length?help.map(person).join(''):empty('ยังไม่มีผู้เรียนที่ต้องช่วยเป็นพิเศษ'))+'</div></article><article class="uxq-ta-card"><span class="uxq-ta-kicker">2. ทบทวนทั้งห้อง · '+n(cache.summary&&cache.summary.classPatterns)+'</span><h3>รูปแบบที่พบในชั้นเรียน</h3><p>เรียงจากจำนวนผู้เรียนที่ได้รับผลกระทบก่อน โดยไม่แสดงรายชื่อในมุมมองรวม</p><div class="uxq-ta-list">'+(patterns.length?patterns.slice(0,3).map(pattern).join(''):empty('ยังไม่พบประเด็นที่ควรหยุดทบทวนทั้งห้อง'))+'</div></article><article class="uxq-ta-card"><span class="uxq-ta-kicker">3. พร้อมต่อยอด · '+n(cache.summary&&cache.summary.stretchReady)+'</span><h3>ภารกิจต่อยอด</h3><p>ใช้เป็นคู่คิด หรือให้เปรียบเทียบแนวทางออกแบบที่ต่างกัน</p><div class="uxq-ta-list">'+(ready.length?ready.map(stretch).join(''):empty('เมื่อเหตุผลผ่าน ≥ 85% ผู้เรียนจะปรากฏในส่วนนี้'))+'</div></article></div>';Array.prototype.forEach.call(r.querySelectorAll('[data-uxq-student]'),function(b){b.addEventListener('click',function(){show(b.getAttribute('data-uxq-student'))})})};
function show(key){var list=cache.students||[];var s=list.filter(function(x){return String(x.studentId||x.studentName)===String(key)})[0];if(!s)return;var f=Array.isArray(s.focus)?s.focus:[];var ex=[];f.forEach(function(i){(i.examples||[]).forEach(function(x){if(ex.length<3)ex.push({stage:i.stageKey,selected:x.selected,reasonSelected:x.reasonSelected})})});var html='<div class="uxq-ta-modal__panel"><div class="uxq-ta-modal__top"><div><span class="uxq-ta-kicker">มุมมองครูรายบุคคล</span><h3>'+esc(s.studentName||s.studentId)+'</h3><p style="margin:5px 0 0;color:#b8c7e7">'+esc(s.section||'')+'</p></div><button class="uxq-ta-close" type="button" data-uxq-close>ปิด</button></div><div class="uxq-ta-detail"><div class="uxq-ta-detail__block"><b>ครูควรทำตอนนี้</b><p>'+esc(s.actionText)+'</p></div><div class="uxq-ta-detail__block"><b>ประโยคสะท้อนกลับที่ใช้ได้</b><p>'+esc(s.feedbackPrompt)+'</p></div><div class="uxq-ta-detail__block"><b>ผลล่าสุด</b><p>ความถูกต้อง '+n(s.latest&&s.latest.accuracy)+'% • เหตุผลผ่าน '+n(s.latest&&s.latest.verifiedAccuracy)+'%</p></div><div class="uxq-ta-detail__block"><b>จุดที่การตรวจเหตุผลยังไม่ตรง</b>'+(f.length?f.map(function(i){return '<p><strong>'+esc(stage(i.stageKey))+'</strong> · '+n(i.count)+' ครั้ง</p>'}).join(''):'<p>ไม่พบช่องว่างจากผลล่าสุด</p>')+(ex.length?ex.map(function(i){return '<div class="uxq-ta-detail__example"><b>'+esc(stage(i.stage))+'</b><br>คำตอบที่เลือก: '+esc(i.selected||'—')+'<br>เหตุผลที่เลือก: '+esc(i.reasonSelected||'—')+'</div>'}).join(''):'')+'</div></div></div>';var m=modal();m.innerHTML=html;m.classList.add('is-open');m.setAttribute('aria-hidden','false');m.querySelector('[data-uxq-close]').addEventListener('click',close);m.addEventListener('click',function(e){if(e.target===m)close()},{once:true})}
function close(){var m=modal();m.classList.remove('is-open');m.setAttribute('aria-hidden','true');m.innerHTML=''}
function load(){if(!(window.google&&google.script&&google.script.run))return;google.script.run.withSuccessHandler(window.renderUXQTeacherActionDashboard).withFailureHandler(function(e){var r=root();if(r)r.innerHTML=empty('โหลดแดชบอร์ดสำหรับตัดสินใจสอนไม่สำเร็จ: '+(e&&e.message||e))}).uxqGetTeacherActionView()}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',load,{once:true});else load();
})();
</script>
