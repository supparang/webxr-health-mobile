<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CSAI2601 Studio Dashboard</title><style>body{font-family:system-ui,sans-serif;margin:0;background:#071124;color:#eef6ff}.wrap{max-width:1400px;margin:auto;padding:20px}.toolbar,.card{background:#101f3d;border:1px solid #2d4775;border-radius:16px;padding:14px;margin-bottom:14px}.toolbar{display:flex;gap:10px;flex-wrap:wrap}.toolbar input,.toolbar select,.toolbar button,textarea{font:inherit;border-radius:10px;border:1px solid #405d91;padding:10px;background:#08162f;color:#fff}.toolbar button,.btn{background:#6ee7ff;color:#061126;font-weight:800;cursor:pointer}.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.stat{background:#0a1935;border:1px solid #2d4775;border-radius:14px;padding:12px}.stat b{font-size:1.6rem;display:block}.grid{display:grid;grid-template-columns:1.25fr .75fr;gap:14px}.table{overflow:auto}.row{display:grid;grid-template-columns:90px 1fr 70px 100px 100px 90px;gap:8px;align-items:center;border-bottom:1px solid #263c65;padding:10px}.row.head{font-weight:800;position:sticky;top:0;background:#101f3d}.chip{display:inline-block;border:1px solid #405d91;border-radius:999px;padding:5px 8px;font-size:.8rem}.submitted{color:#ffd166}.approved{color:#79eda5}.need_revision{color:#ff96a8}.reviewing{color:#6ee7ff}.review{display:grid;gap:10px}.review label{display:grid;gap:5px}.scores{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.scores input{width:100%}.muted{color:#a9b9d9}.danger{color:#ff96a8}.ok{color:#79eda5}@media(max-width:950px){.grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.row{grid-template-columns:70px 1fr 70px}.row>*:nth-child(n+4){display:none}.scores{grid-template-columns:1fr}}</style></head><body><div class="wrap"><h1>CSAI2601 • Studio Progress & Review</h1><div class="toolbar"><input id="section" placeholder="Section"><input id="query" placeholder="ค้นหารหัส/ชื่อ/Project"><button onclick="loadData()">โหลดข้อมูล</button><button onclick="window.print()">Print/PDF</button></div><div id="stats" class="stats"></div><div class="grid"><section class="card table"><div class="row head"><span>Node</span><span>Student / Project</span><span>Section</span><span>Status</span><span>Score</span><span>Open</span></div><div id="rows"></div></section><aside class="card review"><h2>Teacher Review</h2><div id="selected" class="muted">เลือกรายการจากตาราง</div><label>Status<select id="reviewStatus"><option value="reviewing">Reviewing</option><option value="need_revision">Need Revision</option><option value="approved">Approved</option></select></label><div class="scores"><label>Evidence<input id="s1" type="number" min="0" max="4" value="3"></label><label>Reason<input id="s2" type="number" min="0" max="4" value="3"></label><label>Artifact<input id="s3" type="number" min="0" max="4" value="3"></label><label>Validation<input id="s4" type="number" min="0" max="4" value="3"></label><label>Reflection<input id="s5" type="number" min="0" max="4" value="3"></label></div><label>Teacher Comment<textarea id="comment" rows="7" placeholder="ข้อดี จุดที่ต้องแก้ และหลักฐานที่ควรเพิ่ม"></textarea></label><button class="btn" onclick="saveReview()">บันทึก Review</button><div id="msg" class="muted"></div></aside></div></div><script>let DATA={records:[]},CURRENT=null;const $=id=>document.getElementById(id);function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function loadData(){msg('กำลังโหลด...');google.script.run.withSuccessHandler(render).withFailureHandler(e=>msg(e.message,'danger')).UXQ_teacherStudioOverview({section:$('section').value,query:$('query').value})}function render(d){DATA=d||{records:[]};const r=DATA.records||[];const approved=r.filter(x=>x.reviewStatus==='approved').length,rev=r.filter(x=>x.reviewStatus==='need_revision').length,projects=new Set(r.map(x=>x.projectId).filter(Boolean));$('stats').innerHTML=[['Submissions',r.length],['Approved',approved],['Need revision',rev],['Projects',projects.size]].map(x=>`<div class="stat"><span>${x[0]}</span><b>${x[1]}</b></div>`).join('');$('rows').innerHTML=r.map((x,i)=>`<div class="row"><b>${esc((x.missionId||'').toUpperCase())}</b><div><b>${esc(x.studentId)} • ${esc(x.studentName)}</b><div class="muted">${esc(x.projectId||'ไม่มี Project ID')}</div></div><span>${esc(x.section)}</span><span class="chip ${esc(x.reviewStatus)}">${esc(x.reviewStatus)}</span><span>${esc(x.totalScore||'-')}</span><button onclick="selectRow(${i})">Review</button></div>`).join('')||'<p class="muted">ไม่พบข้อมูล</p>';msg(`โหลด ${r.length} รายการ`,'ok')}function selectRow(i){CURRENT=DATA.records[i];$('selected').innerHTML=`<b>${esc(CURRENT.studentId)} • ${esc(CURRENT.studentName)}</b><br>${esc((CURRENT.missionId||'').toUpperCase())} • ${esc(CURRENT.projectId||'')}<br><a href="${esc(CURRENT.figmaUrl||'#')}" target="_blank" style="color:#6ee7ff">เปิด Figma/Evidence</a><p>${esc(CURRENT.reflection||'ไม่มี reflection')}</p>`;$('reviewStatus').value=CURRENT.reviewStatus==='submitted'?'reviewing':CURRENT.reviewStatus;$('comment').value=CURRENT.teacherComment||''}function saveReview(){if(!CURRENT)return msg('กรุณาเลือกรายการ','danger');const p={courseId:CURRENT.courseId,section:CURRENT.section,studentId:CURRENT.studentId,studentName:CURRENT.studentName,projectId:CURRENT.projectId,missionId:CURRENT.missionId,artifactEventId:CURRENT.eventId,linkedAttemptId:CURRENT.linkedAttemptId,reviewStatus:$('reviewStatus').value,evidenceScore:$('s1').value,reasoningScore:$('s2').value,artifactScore:$('s3').value,validationScore:$('s4').value,reflectionScore:$('s5').value,teacherComment:$('comment').value};msg('กำลังบันทึก...');google.script.run.withSuccessHandler(()=>{msg('บันทึก Review แล้ว','ok');loadData()}).withFailureHandler(e=>msg(e.message,'danger')).UXQ_teacherReviewStudio(p)}function msg(t,c='muted'){$('msg').className=c;$('msg').textContent=t}loadData();</script></body></html>
