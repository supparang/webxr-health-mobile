<!doctype html>
<html lang="th">
<head><meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" /><title>AR-1 Field Ops • Teacher Demo</title><link rel="stylesheet" href="../css/uxq-core.css" /><link rel="stylesheet" href="../css/uxq-mobile.css" /></head>
<body><main class="app-shell"><header class="topbar"><a class="brand" href="../index.html"><span class="brand-mark">UX</span><span><strong>UX Quest</strong><small>Teacher Demo Dashboard</small></span></a><button id="refreshBtn" class="ghost-btn" type="button">รีเฟรช</button></header><section class="mission-banner"><div><p class="eyebrow">AR-1 // LOCAL DEMO ANALYTICS</p><h1>Signal Hunt Dashboard</h1><p>สำหรับทดลองบนเครื่องเดียวกัน: ดู Best Attempt, จุดอ่อน และ Event Log จาก LocalStorage. เมื่อนำขึ้นใช้จริงให้เชื่อม Student Context Bridge/Apps Script ต่อ.</p></div></section><section id="dash" class="game-stage"></section></main><script src="../js/uxq-core.js"></script><script>
function render(){const p=UXQ.get(),r=p.missions?.ar1||null;const ev=(p.events||[]).filter(e=>e.missionId==='ar1'||e.type==='ar1_station').slice().reverse();document.getElementById('dash').innerHTML=`<section class="stage-card"><p class="eyebrow">PLAYER</p><h2>${p.name} • ${UXQ.level(p.dxp).name}</h2>${r?`<div class="simulation-result"><article class="metric-card"><span>Best Score</span><b class="metric-good">${r.bestScore||0}</b></article><article class="metric-card"><span>Stars</span><b>${'★'.repeat(r.stars||0)+'☆'.repeat(3-(r.stars||0))}</b></article><article class="metric-card"><span>Mode</span><b>${r.mode||'—'}</b></article><article class="metric-card"><span>Tokens</span><b>${r.tokens||0}</b></article></div><div class="summary-grid"><article><span>Evidence</span><b>${r.evidence||0}/4</b></article><article><span>War Room</span><b>${r.warRoom||0}%</b></article><article><span>Explain</span><b>${r.explain||0}%</b></article></div>`:'<p class="muted">ยังไม่มีผล AR-1 บนเครื่องนี้</p>'}<hr style="border-color:var(--line);margin:22px 0"><p class="eyebrow">EVENT LOG</p><div class="found-list">${ev.length?ev.map(e=>`<div class="found-item"><strong>${e.type}</strong><small>${new Date(e.at).toLocaleString()} ${e.station?`• Station ${e.station}`:''} ${e.score!==undefined?`• Score ${e.score}`:''}</small></div>`).join(''):'<div class="found-item"><strong>ยังไม่มี Event</strong><small>เริ่มเล่น AR-1 เพื่อบันทึกเหตุการณ์</small></div>'}</div></section>`}
render();document.getElementById('refreshBtn').addEventListener('click',render);
</script></body></html>
