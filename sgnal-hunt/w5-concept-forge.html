  <script>
  (() => {
    'use strict';

    const make = (d) => ({
      id:d.id, title:d.title, tag:'CONCEPT FORGE', service:d.service, user:d.user, symptom:d.symptom,
      stages:{
        problem:{
          prompt:'Problem Frame: ข้อใดนิยามปัญหาโดยเริ่มจากผู้ใช้ เป้าหมาย และอุปสรรคได้ชัดที่สุด',
          hint:'Problem statement ที่ดีบอกว่าใครพยายามทำอะไร ในบริบทใด และอะไรขัดขวาง โดยไม่กระโดดไปบอกว่าต้องสร้างปุ่มหรือฟีเจอร์ใด',
          options:[
            {label:d.p[0],description:d.p[1],correct:true,rationale:d.p[2]},
            {label:'เราต้องทำหน้าใหม่ให้สวยและมีสีสันมากขึ้น',description:'เริ่มจากหน้าตาของ solution',rationale:'ยังไม่ระบุผู้ใช้ เป้าหมาย หรืออุปสรรค จึงไม่ช่วยให้ทีมตัดสินใจว่าอะไรควรแก้ก่อน'},
            {label:'ระบบควรใส่ทุกฟีเจอร์ที่ผู้ใช้เคยขอ',description:'วัดคุณค่าด้วยจำนวนความสามารถ',rationale:'ฟีเจอร์มากไม่ได้เท่ากับช่วย task สำคัญ และอาจทำให้ผู้ใช้สับสนกว่าเดิม'},
            {label:'ผู้ใช้ควรอ่านคู่มือก่อนทุกครั้ง',description:'ย้ายภาระกลับไปให้ผู้ใช้',rationale:'การออกแบบควรช่วยผู้ใช้ในบริบทจริง ไม่ใช่ตั้งเงื่อนไขให้ผู้ใช้ต้องจำทุกขั้นเอง'}
          ]
        },
        hmw:{
          prompt:'HMW Forge: ข้อใดเป็นคำถาม How Might We ที่เปิดทางเลือกได้ แต่ยังยึดความต้องการผู้ใช้',
          hint:'คำถาม HMW ที่ดีเปิดพื้นที่ให้คิดหลายแนวทาง ระบุผู้ใช้/ผลลัพธ์ และไม่ล็อกว่าต้องใช้สี ปุ่ม หรือเทคโนโลยีใด',
          options:[
            {label:d.h[0],description:d.h[1],correct:true,rationale:d.h[2]},

          options:[
            {label:d.i[0],description:d.i[1],correct:true,rationale:d.i[2]},
            {label:'เพิ่มแชตบอตเต็มหน้าจอทุกหน้าของระบบ',description:'เพิ่มเทคโนโลยีโดยไม่เจาะจงจุดติดขัด',rationale:'แชตบอตอาจสร้างภาระใหม่หากผู้ใช้ต้องการเห็นสถานะหรือทำ action ที่ชัดเจนกว่า'},
            {label:'ทำภาพเคลื่อนไหวและเสียงเตือนทุกครั้งที่แตะ',description:'เน้นความตื่นเต้นของหน้าจอ',rationale:'เอฟเฟกต์ไม่ได้แก้ปัญหาหากยังไม่ทำให้ผู้ใช้เข้าใจสถานะหรือไปต่อได้'},
            {label:'พัฒนาระบบจริงครบทุกหน้าก่อนทดสอบ',description:'ลงทุนสูงตั้งแต่รอบแรก',rationale:'การทำครบก่อนทดสอบเพิ่มความเสี่ยง เพราะทีมยังไม่รู้ว่าแนวคิดหลักช่วยผู้ใช้ได้จริงหรือไม่'}
          ]
        },
        storyboard:{
          prompt:'Storyboard Check: ลำดับเหตุการณ์ใดช่วยให้ทีมทดสอบแนวคิดกับ task จริงได้ดีที่สุด',
          hint:'Storyboard ที่ดีเริ่มจากบริบทและเป้าหมายของผู้ใช้ แสดงจุดตัดสินใจ/ความช่วยเหลือ แล้วจบด้วยผลลัพธ์ที่ผู้ใช้ตรวจสอบได้',
          options:[
            {label:d.s[0],description:d.s[1],correct:true,rationale:d.s[2]},
            {label:'เปิดด้วยโลโก้ → โชว์สีของระบบ → แสดงทุกเมนู → จบด้วยภาพโปรโมต',description:'เล่าแบรนด์มากกว่าการทำงานของผู้ใช้',rationale:'ยังไม่เห็นว่าในสถานการณ์จริงผู้ใช้ต้องทำอะไร ติดตรงไหน และแนวคิดใหม่ช่วยอย่างไร'},
            {label:'เริ่มจากหน้าสวยที่สุด → ใส่ทุกฟีเจอร์ → ให้ผู้ใช้เลือกเองทั้งหมด',description:'เล่า solution ก่อนปัญหา',rationale:'ทำให้ทีมไม่เห็นลำดับการตัดสินใจหรือเงื่อนไขที่ผู้ใช้ต้องผ่านเพื่อทำ task สำเร็จ'},

          ]
        },
        prototype:{
          prompt:'Prototype Scope: ต้นแบบแรกและแผนทดสอบใดให้ข้อมูลเพียงพอสำหรับตัดสินใจรอบต่อไป',

          options:[
            {label:d.t[0],description:d.t[1],correct:true,rationale:d.t[2]},

            {label:'ถามทีมว่าแนวคิดไหนน่ารักกว่า',description:'ใช้รสนิยมภายในเป็นหลัก',rationale:'ทีมไม่ใช่หลักฐานแทนพฤติกรรมของผู้ใช้เป้าหมายในสถานการณ์จริง'},

    const CASES = [

        symptom:'ผู้ใช้เลือกเวลาได้ แต่กลับมาเปิดหน้าจองซ้ำและโทรถามเจ้าหน้าที่ว่า “นัดยืนยันแล้วหรือยัง?”',
        p:['นักศึกษาที่รีบจองคิวบนมือถือ ต้องการเลือกเวลาและตรวจวันนัดได้มั่นใจ เพราะหน้าสรุปไม่ทำให้เห็นสถานะและเวลานัดอย่างชัดเจน','ระบุผู้ใช้ task บริบท และอุปสรรคโดยไม่ล็อก solution','อธิบายพฤติกรรมกดซ้ำ/ถามซ้ำจากจุดที่ระบบไม่ช่วยยืนยันความเข้าใจ'],
        h:['เราจะช่วยนักศึกษาที่รีบจองคิวบนมือถือ ให้เลือกเวลาและตรวจวันนัดได้มั่นใจก่อนออกจากระบบได้อย่างไร?','เปิดหลายแนวทาง เช่น การจัดลำดับข้อมูล การยืนยัน หรือการช่วยตรวจความเข้าใจ','ยึดผู้ใช้และผลลัพธ์ โดยไม่บังคับว่าแก้ด้วยปุ่ม สี หรือฟีเจอร์เดียว'],
        i:['แสดงคิวที่ว่างใกล้สุดก่อน พร้อมหน้าสรุปวัน เวลา สถานที่ และปุ่มเพิ่มลงปฏิทินก่อนยืนยัน','ลดการสแกนข้อมูลและช่วยให้ผู้ใช้ตรวจความเข้าใจในจังหวะสำคัญ','ตอบทั้งการหาเวลาและความมั่นใจหลังจอง โดยทดสอบเฉพาะ flow นี้ได้ทันที'],
        s:['ฝนรีบจองบนมือถือ → เห็นคิวว่างที่เหมาะ → ตรวจวัน/เวลา/สถานที่ในสรุป → ยืนยัน → เห็นเลขอ้างอิงและเพิ่มลงปฏิทิน','เล่าบริบท จุดตัดสินใจ และผลลัพธ์ที่ตรวจสอบได้','ช่วยให้ทีมเห็นว่าต้องทดสอบการเลือกคิว การตรวจนัด และความมั่นใจหลังยืนยัน'],
        t:['ทำ low-fi prototype เฉพาะการเลือกคิวและหน้าสรุป แล้วให้ผู้ใช้ใหม่ 5 คนจองคิวจำลองและบอกวัน เวลา สิ่งที่ต้องทำต่อ','วัด task success เวลา ความผิดพลาด และการกลับไปกดซ้ำ','เป็นการทดสอบคำถามที่เสี่ยงที่สุดก่อนพัฒนาระบบจริงทั้งชุด']
      }),
      make({
        id:'scholarship-resume', title:'คดีทุนไม่หลุดมือ', service:'ระบบสมัครทุนการศึกษาออนไลน์',
        user:'เมย์ทำงานพิเศษช่วงเย็น จึงกรอกใบสมัครบนมือถือทีละช่วงและต้องหยุดกลางทางบ่อยครั้ง',
        symptom:'ผู้สมัครหลายคนถ่ายภาพหน้าจอไว้ แล้วกลับมาเริ่มตรวจจากหน้าแรกเพราะไม่แน่ใจว่าไฟล์ใดถูกบันทึกแล้ว',
        p:['ผู้สมัครทุนที่ต้องทำงานเป็นช่วง ๆ ต้องการกลับมาทำใบสมัครต่อได้โดยไม่กลัวข้อมูลหรือเอกสารหาย เพราะระบบไม่บอกสถานะความคืบหน้าและงานค้างอย่างชัดเจน','เชื่อมบริบทการหยุด-กลับมากับความต้องการต่อเนื่องของงาน','ไม่โทษผู้ใช้ และชี้คอขวดที่เกิดจากสถานะงานไม่ชัด'],
        h:['เราจะช่วยผู้สมัครทุนที่ทำใบสมัครไม่จบในครั้งเดียว ให้กลับมารู้ทันทีว่างานใดบันทึกแล้วและต้องทำอะไรต่อได้อย่างไร?','เปิดทางคิดเรื่อง progress, state, reminder หรือ review โดยยังยึดผลลัพธ์ผู้ใช้','คำถามไม่ได้ล็อกเทคโนโลยี แต่ชัดว่าต้องลดความไม่มั่นใจในการกลับมาทำต่อ'],
        i:['สร้างหน้า “ทำต่อจากจุดเดิม” ที่สรุปความคืบหน้า ไฟล์ที่อัปโหลดแล้ว และงานค้างที่ต้องทำต่อทีละข้อ','เปลี่ยนงานยาวให้เห็นสถานะและ next step ชัดเจน','แก้ friction ที่ทำให้ผู้ใช้ถ่ายภาพหน้าจอและเริ่มตรวจใหม่ โดยทำ prototype เพียงส่วน resume ได้'],
        s:['เมย์หยุดกรอกเพราะต้องไปทำงาน → กลับมาเปิดลิงก์เดิม → เห็นว่างานบันทึกแล้ว 60% และเหลือเอกสาร 2 รายการ → อัปโหลดต่อ → เห็นว่าส่งใบสมัครสำเร็จ','แสดงการกลับมาทำงานต่อและ state ที่ช่วยตัดสินใจ','ทำให้ทีมทดสอบได้ชัดว่าผู้ใช้เข้าใจความคืบหน้าโดยไม่ต้องค้นหาหรือถามเจ้าหน้าที่'],
        t:['ทำต้นแบบ flow “บันทึกแล้ว/ยังขาดอะไร/ทำต่อ” แล้วให้ผู้ใช้ที่หยุดงานกลางทาง 5 คนกลับเข้ามาทำต่อในวันถัดไป','วัดว่าพบจุดทำต่อได้ไหม ระบุไฟล์ที่ขาดได้ถูกหรือไม่ และเริ่มใหม่โดยไม่จำเป็นหรือไม่','พิสูจน์แนวคิดเรื่อง continuity ก่อนลงทุนพัฒนาฟอร์มสมัครทั้งระบบ']
      }),
      make({
        id:'study-room', title:'คดีหาห้องติวไม่ทัน', service:'ระบบจองห้องอ่านหนังสือและห้องติว',
        user:'บาสและเพื่อนต้องการหาห้องติวก่อนสอบ พวกเขาอยู่คนละอาคารและมีเวลาเตรียมตัวจำกัด',
