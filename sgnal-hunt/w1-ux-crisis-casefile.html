<body>
  <main id="uxqApp" aria-live="polite"></main>
  <script src="./js/uxq-classroom-config-v2.js?v=20260702-w1-thai-v1"></script>
  <script src="./js/uxq-progress-v3.js?v=20260702-w1-thai-v1"></script>
  <script src="./js/uxq-identity-v1.js?v=20260702-w1-thai-v1"></script>
  <script src="./js/uxq-analytics-v2.js?v=20260702-w1-thai-v1"></script>
  <script src="./js/uxq-w1-data-contract-hardening-v1.js?v=20260712-verified-pass-v1"></script>
  <script src="./js/uxq-mission-engine-v3.js?v=20260702-w1-thai-v1"></script>
  <script>
  (() => {
    'use strict';
    const makeCase = (d) => ({
      id:d.id,title:d.title,tag:'คดีบริการมหาวิทยาลัย',service:d.service,user:d.user,symptom:d.symptom,
      stages:{
        evidence:{prompt:'หลักฐานใดช่วยให้ทีมเห็นต้นตอปัญหาได้ชัดที่สุด',hint:'เลือกสิ่งที่เห็นจากพฤติกรรมจริง ไม่ใช่ความเห็นหรือความชอบของทีม',options:[
          {label:d.e[0],description:d.e[1],correct:true,rationale:d.e[2]},
          {label:'ถามว่าผู้ใช้ชอบสีใด',description:'ใช้ความชอบด้านหน้าตาเป็นคำตอบหลัก',rationale:'สีอาจมีผลต่อความรู้สึก แต่ยังไม่อธิบายว่าผู้ใช้ทำงานพลาดตรงไหน'},
          {label:'นับจำนวนผู้เข้าชมหน้าแรก',description:'ดูเพียงปริมาณการเข้าใช้',rationale:'จำนวนผู้เข้าชมไม่บอกว่าผู้ใช้กำลังพยายามทำอะไรและติดขัดเพราะอะไร'},
          {label:'เลือกความเห็นที่ทีมชอบที่สุด',description:'เริ่มจากรสนิยมของผู้ออกแบบ',rationale:'ความเห็นทีมไม่ใช่หลักฐานจากผู้ใช้เป้าหมาย'}]},
        hypothesis:{prompt:'สมมติฐานใดอธิบายหลักฐานได้ตรงที่สุด',hint:'เชื่อมสิ่งที่ผู้ใช้ทำกับสิ่งที่ผู้ใช้อาจยังไม่เข้าใจ',options:[
          {label:d.h[0],description:d.h[1],correct:true,rationale:d.h[2]},
          {label:'ผู้ใช้ทุกคนไม่เก่งเทคโนโลยี',description:'สรุปลักษณะผู้ใช้จากข้อมูลน้อย',rationale:'เป็นการเหมารวม ไม่ใช่คำอธิบายที่ยึดหลักฐานของคดีนี้'},
          {label:'ระบบต้องเพิ่มเมนูให้มากขึ้น',description:'รีบเสนอวิธีแก้ก่อนรู้สาเหตุ',rationale:'ยังไม่พิสูจน์ว่าผู้ใช้ขาดเมนูหรือกำลังสับสนเรื่องใด'},
          {label:'ควรทำหน้าแรกให้มีภาพเคลื่อนไหว',description:'เน้นความสวยงาม',rationale:'ไม่ตอบว่าผู้ใช้ทำงานไม่สำเร็จเพราะอะไร'}]},
        fix:{prompt:'ภายใต้เวลาจำกัด ควรแก้อะไรก่อน',hint:'เลือกการแก้ที่ตรงสาเหตุและช่วยให้ผู้ใช้รู้ว่าต้องทำอะไรต่อ',options:[
          {label:d.f[0],description:d.f[1],correct:true,rationale:d.f[2]},
          {label:'ทำทุกปุ่มให้ใหญ่และสีสดเท่ากัน',description:'ทำให้ทุกอย่างเด่นพร้อมกัน',rationale:'เมื่อทุกอย่างเด่นเท่ากัน ผู้ใช้ยิ่งหาสิ่งสำคัญยากขึ้น'},
          {label:'เพิ่มข้อความอธิบายยาว ๆ หน้าแรก',description:'อธิบายทุกขั้นตอนก่อนเริ่ม',rationale:'ข้อความยาวไม่ช่วยในจังหวะที่ผู้ใช้ต้องรู้สถานะหรือทำขั้นตอนต่อไป'},
          {label:'สร้างระบบใหม่ทั้งหมดทันที',description:'ลงทุนมากก่อนตรวจคำตอบ',rationale:'ควรเริ่มจากการแก้ที่ทดสอบผลได้เร็วและตรงจุด'}]},
        test:{prompt:'จะทดสอบอย่างไรจึงรู้ว่าการแก้ช่วยผู้ใช้จริง',hint:'ให้ผู้ใช้ทำงานจริง แล้วดูทั้งความสำเร็จ เวลา ความผิดพลาด และสิ่งที่ผู้ใช้เข้าใจ',options:[
          {label:d.t[0],description:d.t[1],correct:true,rationale:d.t[2]},
          {label:'ถามทีมว่าแบบใหม่สวยขึ้นหรือไม่',description:'ใช้ความชอบภายในทีม',rationale:'ความสวยของทีมไม่ใช่หลักฐานว่าผู้ใช้ทำงานสำเร็จ'},
          {label:'รอให้มีคนร้องเรียน',description:'เก็บปัญหาหลังเกิดผลกระทบ',rationale:'ช้าเกินไปและพลาดผู้ใช้ที่เลิกใช้โดยไม่บอกเหตุผล'},
          {label:'นับจำนวนไลก์ของโพสต์ประชาสัมพันธ์',description:'วัดการตอบรับที่ไม่ตรงกับงานหลัก',rationale:'ยอดไลก์ไม่บอกว่าผู้ใช้ทำภารกิจในระบบสำเร็จหรือไม่'}]}
      }
    });
    const CASES = [
      makeCase({id:'receipt',title:'คดีใบเสร็จยืนยันไม่ชัด',service:'ระบบชำระค่ากิจกรรมของมหาวิทยาลัย',user:'นกจ่ายเงินสำเร็จแล้ว แต่ไม่แน่ใจว่าระบบรับรายการหรือยัง',symptom:'ผู้ใช้หลายคนย้อนกลับไปกดชำระเงินซ้ำ',e:['สังเกตผู้ใช้หลังชำระเงิน','6 จาก 8 คนกลับไปกดชำระเงินอีกครั้ง และไม่มีใครเปิดประวัติรายการ','พฤติกรรมซ้ำชี้ว่าผู้ใช้ไม่เห็นหรือไม่เข้าใจสถานะยืนยัน'],h:['หน้าจอยืนยันไม่ทำให้ผู้ใช้รู้ว่ารายการเสร็จสมบูรณ์','ผู้ใช้จึงย้อนกลับไปกดปุ่มเดิมเพื่อสร้างความมั่นใจ','อธิบายทั้งการกดซ้ำและการไม่ไปดูประวัติรายการจากพฤติกรรมจริง'],f:['เพิ่มหน้าสำเร็จที่มีเลขอ้างอิง สถานะ และปุ่มดูประวัติรายการ','ทำให้ผู้ใช้เห็นผลลัพธ์และขั้นตอนต่อไปชัดเจน','ตรงสาเหตุและช่วยลดความคลุมเครือได้เร็ว'],t:['ให้ผู้ใช้ 5 คนชำระเงินจำลอง แล้วถามสถานะและสิ่งที่ต้องทำต่อ','บันทึกการกดซ้ำ เวลาที่ใช้ และความเข้าใจหลังทำงาน','ตรวจได้ตรงว่าผู้ใช้รู้ว่าจ่ายสำเร็จและไม่กดซ้ำ']}),
      makeCase({id:'clinic',title:'คดีคิวคลินิกสับสน',service:'ระบบจองคิวคลินิกนักศึกษา',user:'พีทต้องจองคิวพบแพทย์ก่อนเข้าเรียนและใช้มือถือระหว่างเดินทาง',symptom:'ผู้ใช้เลือกเวลาได้ แต่หลายคนมาผิดวันหรือไม่แน่ใจว่าจองสำเร็จ',e:['ดูผู้ใช้จองคิวบนมือถือและถามหลังทำงาน','ผู้ใช้ 4 คนอ่านวันนัดผิดเพราะหน้าสรุปแสดงวันและเวลาไม่เด่น','เห็นทั้งพฤติกรรม จุดสับสน และผลกระทบต่อการเดินทาง'],h:['หน้าสรุปนัดหมายไม่ช่วยให้ผู้ใช้ตรวจวันและเวลาได้มั่นใจ','ผู้ใช้จึงจำข้อมูลผิดแม้กดจองสำเร็จ','เชื่อมหลักฐานกับความเข้าใจผิดที่เกิดในจังหวะยืนยันนัด'],f:['ทำหน้าสรุปวันและเวลาเต็มรูปแบบก่อนยืนยัน พร้อมปุ่มเพิ่มลงปฏิทิน','ช่วยตรวจความเข้าใจและเก็บนัดหมายไว้ใช้อ้างอิง','ช่วยลดการจำผิดโดยไม่ต้องเปลี่ยนระบบจองทั้งหมด'],t:['ให้ผู้ใช้จองคิวจำลองแล้วถามวัน เวลา และสถานที่นัดหลังออกจากหน้า','บันทึกคำตอบผิดและจุดที่ผู้ใช้ลังเล','วัดได้ว่าผู้ใช้เข้าใจนัดจริง ไม่ใช่แค่กดจบขั้นตอน']}),
      makeCase({id:'scholarship',title:'คดีสถานะทุนการศึกษาคลุมเครือ',service:'ระบบติดตามทุนการศึกษา',user:'มีนต้องรู้ก่อนพรุ่งนี้ว่าต้องส่งเอกสารเพิ่มหรือไม่',symptom:'หน้าจอมีหลายสถานะ แต่ผู้ใช้ไม่รู้ว่าตนต้องทำอะไรต่อ',e:['สังเกตผู้ใช้ตรวจสถานะทุนและให้เล่าเหตุผลที่เลือกกดแต่ละจุด','ผู้ใช้สลับดูหลายกล่องแล้วโทรถามเจ้าหน้าที่ว่าเอกสารของตนขาดหรือไม่','พฤติกรรมชี้ว่าข้อมูลมีอยู่แต่ไม่บอกความหมายและงานที่ต้องทำ'],h:['สถานะใช้คำคล้ายกันแต่ไม่เชื่อมกับสิ่งที่ผู้ใช้ต้องทำต่อ','ผู้ใช้จึงไม่รู้ว่าต้องรอ ส่งเอกสาร หรือแก้ไขข้อมูล','อธิบายทั้งการสลับดูหลายจุดและการต้องโทรถาม'],f:['เปลี่ยนแต่ละสถานะให้บอกความหมาย เจ้าของเรื่อง และขั้นตอนต่อไป','ผู้ใช้เห็นชัดว่าต้องทำอะไรหรือรออะไร','ลดการเดาและช่วยให้ผู้ใช้จัดการงานของตนได้'],t:['ให้ผู้ใช้ใหม่ตรวจสถานะตัวอย่าง 3 แบบ แล้วบอกว่าต้องทำอะไรต่อ','เก็บความถูกต้อง เวลา และคำถามที่ยังค้าง','ตรวจได้ว่าข้อความสถานะช่วยให้ผู้ใช้ตัดสินใจได้จริง']})
    ];
    UXQMissionEngine.init({id:'w1',title:'คดี UX: ตามหาต้นตอปัญหา',subtitle:'W1 • นักสืบปัญหา UX',intro:'เลือกหลักฐาน ตั้งสมมติฐาน เลือกวิธีแก้ และทดสอบกับผู้ใช้จริง',bank:CASES,caseCount:2,stages:['evidence','hypothesis','fix','test'],threeStarAccuracy:84,threeStarVerified:75,recentLimit:6,nextHref:'./w2-design-thinking-sprint.html',nextLabel:'ไปต่อ W2'});
  })();
  </script>
</body>
</html>
