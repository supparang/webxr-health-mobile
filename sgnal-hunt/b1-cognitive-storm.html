  <script>
  (() => {
    'use strict';
    const makeBoss = d => ({
      id:d.id,title:d.title,tag:'ด่านบอส: พายุความสับสน',service:d.service,user:d.user,symptom:d.symptom,
      stages:{
        evidence:{prompt:'สัญญาณใดควรเป็นหลักฐานตั้งต้นของทีม',hint:'เลือกสิ่งที่เชื่อมพฤติกรรมผู้ใช้กับจุดที่ระบบทำให้ทำงานล้มเหลว',options:[
          {label:d.a[0],description:d.a[1],correct:true,rationale:d.a[2]},
          {label:'ทีมคิดว่าหน้าจอเดิมดูเก่า',description:'ใช้รสนิยมภายในเป็นจุดเริ่มต้น',rationale:'อาจเป็นมุมมองหนึ่ง แต่ไม่ใช่หลักฐานว่าผู้ใช้ล้มเหลวที่ใด'},
          {label:'ระบบมีความสามารถมากกว่าคู่แข่ง',description:'คิดว่าความครบเท่ากับใช้งานง่าย',rationale:'จำนวนความสามารถไม่อธิบายว่าผู้ใช้ทำงานสำเร็จหรือไม่'},
          {label:'เลือกหน้าตาที่คล้ายบริการยอดนิยม',description:'เริ่มจากภาพลักษณ์ของคนอื่น',rationale:'ใช้เป็นแนวอ้างอิงได้ แต่ไม่แทนพฤติกรรมผู้ใช้ในคดีนี้'}]},
        define:{prompt:'โจทย์ออกแบบใดรวมความต้องการผู้ใช้และอุปสรรคได้ดีที่สุด',hint:'อย่าเขียนเป็นรายการสิ่งที่จะสร้าง หรือเลือกวิธีแก้ก่อนเห็นทางเลือก',options:[
          {label:d.b[0],description:d.b[1],correct:true,rationale:d.b[2]},
          {label:'เราจะทำหน้าสรุปใหม่ทั้งหมดให้ทันสมัยได้อย่างไร?',description:'เริ่มจากวิธีแก้ที่ทีมอยากทำ',rationale:'ยังไม่ระบุความต้องการผู้ใช้หรือสาเหตุที่ทำงานไม่สำเร็จ'},
          {label:'เราจะเพิ่มเมนูให้ครบทุกบริการได้อย่างไร?',description:'เน้นความครบของระบบ',rationale:'เพิ่มเมนูอาจทำให้ผู้ใช้หาไม่เจอยิ่งกว่าเดิม'},
          {label:'เราจะลดจำนวนคำถามที่ผู้ใช้ถามได้อย่างไร?',description:'มองเพื่อลดงานเจ้าหน้าที่เป็นหลัก',rationale:'คำถามผู้ใช้อาจเป็นสัญญาณว่าระบบควรสื่อสารให้ดีขึ้น'}]},
        process:{prompt:'หลังตั้งโจทย์แล้ว ทีมควรวางลำดับการทำงานอย่างไรจึงลดความเสี่ยงได้มากที่สุด',hint:'เริ่มจากผู้ใช้ แล้วกลับมาทดสอบแนวคิดกับผู้ใช้อีกครั้ง',options:[
          {label:d.c[0],description:d.c[1],correct:true,rationale:d.c[2]},
          {label:'ทำหน้าจอละเอียดก่อน แล้วค่อยถามว่าชอบหรือไม่',description:'ข้ามการกำหนดขั้นตอนและสมมติฐานหลัก',rationale:'ลงทุนกับรายละเอียดก่อนรู้ว่าแนวคิดช่วยผู้ใช้ทำงานได้หรือไม่'},

        reduce:{prompt:'การปรับลำดับหน้าจอใดช่วยลดความสับสนได้ตรงเป้า',hint:'เน้นสิ่งที่ผู้ใช้ต้องทำตอนนี้ ลดทางเลือกที่แข่งกัน และบอกสถานะกับขั้นตอนต่อไปให้ชัด',options:[

          {label:'ซ่อนข้อมูลทั้งหมดไว้ในเมนูเล็ก ๆ',description:'ทำให้หน้าหลักดูสะอาดที่สุด',rationale:'อาจทำให้ผู้ใช้หาเรื่องสำคัญไม่พบ'},

        prototype:{prompt:'ต้นแบบใดเหมาะที่สุดเพื่อพิสูจน์แนวทางก่อนพัฒนาจริง',hint:'ทำให้พอเห็นการเดินงานที่เสี่ยงที่สุดและตรวจว่าผู้ใช้เข้าใจหรือไม่',options:[

        test:{prompt:'ผลทดสอบแบบใดจึงอนุญาตให้ทีมเดินหน้าต่อได้อย่างรับผิดชอบ',hint:'ต้องมีเกณฑ์จากผู้ใช้เป้าหมาย พร้อมข้อมูลเชิงเหตุผลเพื่อปรับรอบต่อไป',options:[

          {label:'ทีมเห็นตรงกันว่าแนวคิดนี้ดีพอ',description:'ใช้ความเห็นภายในเป็นเกณฑ์ผ่าน',rationale:'ไม่แทนหลักฐานว่าผู้ใช้ทำงานสำเร็จและเข้าใจสถานะ'},
          {label:'หน้าจอใหม่มีองค์ประกอบน้อยลง 20%',description:'ใช้จำนวนสิ่งบนหน้าเป็นเกณฑ์เดียว',rationale:'สิ่งน้อยลงอาจดีหรือแย่ ต้องดูผลต่อการทำงานจริง'},

    const BOSSES=[
      makeBoss({id:'student-service-storm',title:'บอส: ศูนย์บริการนักศึกษาวุ่นวาย',service:'ศูนย์รวมบริการนักศึกษา',user:'กานต์ต้องเช็กทุน ชำระเงิน และจองคิวในเวลาไม่กี่นาทีก่อนเข้าเรียน',symptom:'ผู้ใช้เปิดหลายเมนูสลับกัน ไม่รู้ว่างานใดสำเร็จแล้วและควรทำอะไรก่อน',a:['สังเกตผู้ใช้ 6 คนที่สลับระหว่างทุน การเงิน และคิวบริการ แล้วถามว่ากำลังหาข้อมูลอะไร','ผู้ใช้หลายคนเปิดหน้าเดิมซ้ำและถามเจ้าหน้าที่ว่าสิ่งใดต้องทำก่อน','ชี้ทั้งพฤติกรรมล้มเหลวและจุดที่ระบบไม่ช่วยจัดลำดับ'],b:['เราจะช่วยนักศึกษาที่มีเวลาจำกัด เห็นงานสำคัญ สถานะ และขั้นตอนต่อไปจากจุดเดียวได้อย่างไร?','ระบุผู้ใช้ ข้อจำกัด และผลลัพธ์โดยไม่ล็อกวิธี','รวมความต้องการหลักและอุปสรรคจากหลักฐาน'],c:['ดูผู้ใช้ทำงานจริง → ตั้งโจทย์ → สร้างแนวคิดหลายแบบ → ทำต้นแบบ → ทดสอบและปรับ','เริ่มจากหลักฐานและกลับไปเรียนรู้กับผู้ใช้','ลดความเสี่ยงของการสร้างผิดปัญหา'],d:['แสดงแผงงานปัจจุบันที่บอกงานเร่งด่วน สถานะ และปุ่มทำสิ่งต่อไปเพียงจุดเดียว','ข้อมูลรองเปิดดูเพิ่มได้เมื่อผู้ใช้ต้องการ','ช่วยผู้ใช้โฟกัสสิ่งที่ต้องทำตอนนี้'],e:['ทำต้นแบบเส้นทาง 3 งานสำคัญ ตั้งแต่เห็นสถานะจนทำงานเสร็จ','ให้ผู้ใช้ลองทำงานที่เสี่ยงที่สุด','พิสูจน์ลำดับและความเข้าใจก่อนลงทุนพัฒนา'],f:['ผู้ใช้เป้าหมาย 5 คนทำ 3 งานสำคัญสำเร็จอย่างน้อย 4 คน และอธิบายขั้นตอนต่อไปได้ถูกต้อง','เก็บเวลา ความผิดพลาด และเหตุผลที่ยังสับสน','มีทั้งเกณฑ์วัดและข้อมูลเพื่อปรับปรุง']}),
      makeBoss({id:'exam-storm',title:'บอส: วันสอบที่ข้อมูลชนกัน',service:'ระบบจัดการสอบและตารางเรียน',user:'ออมต้องเข้าห้องสอบให้ทัน ขณะมีประกาศเปลี่ยนห้องและลิงก์สอบหลายจุด',symptom:'ผู้ใช้เห็นข้อมูลหลายแหล่งแต่ไม่รู้ว่าอันใดล่าสุดและต้องเตรียมอะไรบ้าง',a:['ติดตามผู้ใช้ตั้งแต่เห็นประกาศจนเข้าห้องสอบ พร้อมบันทึกจุดที่เปลี่ยนไปถามเพื่อน','หลายคนมีข้อมูลครบเป็นชิ้น ๆ แต่ไม่รู้แหล่งใดล่าสุดและต้องทำอะไรตามลำดับ','ชี้ปัญหาข้อมูลกระจัดกระจายและการตัดสินใจภายใต้เวลา'],b:['เราจะช่วยนักศึกษาที่ต้องรับมือข้อมูลเปลี่ยนเร็ว รู้ข้อมูลล่าสุดและเตรียมเข้าห้องสอบตามลำดับได้อย่างไร?','ระบุผู้ใช้ บริบทเร่งด่วน และผลลัพธ์ที่ต้องการ','เปิดทางให้หลายวิธีแก้โดยยังยึด need'],c:['เก็บพฤติกรรมผู้ใช้ → ระบุจุดสับสน → ตั้งโจทย์ → ทำต้นแบบข้อมูลรวม → ทดสอบในสถานการณ์จำลอง','ทดสอบสถานการณ์จริงที่มีแรงกดดันเรื่องเวลา','ทำให้เรียนรู้จากพฤติกรรมแทนการเดา'],d:['ทำหน้าสรุปเดียวที่เน้นข้อมูลล่าสุด ห้องสอบ เวลา และรายการเตรียมพร้อมตามลำดับ','ประกาศเก่ายังดูได้แต่ไม่แย่งความเด่น','ลดการค้นหาและความเสี่ยงใช้ข้อมูลผิด'],e:['ทำต้นแบบหน้าสรุปก่อนสอบ พร้อมประกาศที่อัปเดตตามสถานการณ์จำลอง','ให้ผู้ใช้หาเวลา ห้อง และลิงก์สอบในเวลาจำกัด','ทดสอบสิ่งที่เสี่ยงที่สุดของคดีนี้'],f:['ผู้ใช้ใหม่ 5 คนค้นหาข้อมูลถูกต้องและเข้าขั้นตอนสอบจำลองได้ภายในเวลาที่กำหนด','บันทึกจุดที่อ่านผิดและคำถามที่ยังค้าง','บอกได้ทั้งผลสำเร็จและสิ่งที่ต้องปรับ']})
    ];
    UXQMissionEngine.init({id:'b1',title:'บอสพายุความสับสน',subtitle:'B1 • ด่านบอส',intro:'รวมทักษะจาก W1–W3 เพื่อกู้ระบบที่ผู้ใช้สับสนและทำงานไม่สำเร็จ',bank:BOSSES,bossBank:BOSSES,caseCount:1,stages:['evidence','define','process','reduce','prototype','test'],threeStarAccuracy:84,threeStarVerified:75,recentLimit:4,requires:'w3',nextHref:'./w4-user-insight-lab.html',nextLabel:'ปลดล็อก W4'});
  })();
  </script>
