  <script>
  (() => {
    'use strict';

    function insightCase(data) {
      const listen = data.listen;
      const observation = data.observation;
      const insight = data.insight;
      const define = data.define;

      return {
        id: data.id,
        title: data.title,
        tag: data.tag,
        service: data.service,
        user: data.user,
        symptom: data.symptom,
        stages: {
          listen: {
            prompt: 'Signal Scan: ก่อนสรุปปัญหา ทีมควรเก็บสัญญาณใดเพิ่มเพื่อเข้าใจผู้ใช้จริง',
            hint: 'เลือกวิธีที่เห็นทั้งพฤติกรรม บริบท และคำอธิบายของผู้ใช้ในขณะทำงาน ไม่ใช่แค่ความเห็นรวม',
            options: [
              { label: listen.label, description: listen.description, correct: true, rationale: listen.rationale },
              { label: 'ส่งแบบสอบถามคะแนนความพึงพอใจเพียง 1–5', description: 'ดูว่าโดยรวมผู้ใช้ชอบระบบหรือไม่', rationale: 'คะแนนรวมบอกความรู้สึกกว้าง ๆ แต่ยังไม่เห็นจุดตัดสินใจ บริบท และสิ่งที่ผู้ใช้พยายามทำ' },
              { label: 'ให้ทีมโหวตว่าหน้าจอใดดูทันสมัยที่สุด', description: 'ใช้ความชอบของคนในทีมเป็นหลัก', rationale: 'ความเห็นของทีมไม่ใช่หลักฐานว่าผู้ใช้เป้าหมายติดขัดตรงไหนในงานจริง' },
              { label: 'เปรียบเทียบสีปุ่มหลายแบบก่อนคุยกับผู้ใช้', description: 'เริ่มจากการปรับ visual ให้เด่น', rationale: 'สีอาจช่วยการมองเห็น แต่ยังไม่มีหลักฐานว่าคือสาเหตุของพฤติกรรมในเคสนี้' }
            ]
          },
          separate: {
            prompt: 'Signal Filter: ข้อใดเป็น Observation ที่สังเกตได้ ไม่ใช่ Assumption หรือ Solution',
            hint: 'Observation อธิบายสิ่งที่เกิดขึ้นจริงได้โดยไม่ตัดสินว่าผู้ใช้เป็นคนแบบใด และยังไม่รีบเสนอวิธีแก้',
            options: [
              { label: observation.label, description: observation.description, correct: true, rationale: observation.rationale },
              { label: 'ผู้ใช้ไม่เก่งเทคโนโลยีจึงทำงานไม่สำเร็จ', description: 'ตีความคุณลักษณะของผู้ใช้โดยตรง', rationale: 'เป็นข้อสันนิษฐานเกี่ยวกับตัวผู้ใช้ ไม่ใช่พฤติกรรมที่เก็บได้จากสถานการณ์' },
              { label: 'ทีมควรเพิ่มปุ่มลัดและเปลี่ยนหน้าใหม่ทั้งหมด', description: 'กระโดดไปเสนอ solution', rationale: 'เป็นแนวทางแก้ แต่ยังไม่ได้แยกว่าพฤติกรรมหรือ pain point จริงคืออะไร' },
              { label: 'ทุกคนต้องการระบบที่เร็วและง่ายเหมือนกัน', description: 'สรุปกว้างเกินข้อมูล', rationale: 'เหมารวมผู้ใช้และไม่สะท้อนบริบทเฉพาะที่เห็นในเคส' }
            ]
          },
          insight: {
            prompt: 'Insight Lens: จากสัญญาณทั้งหมด ข้อใดคือความต้องการหรือแรงกังวลที่ซ่อนอยู่ของผู้ใช้',
            hint: 'Insight เชื่อมพฤติกรรมกับเหตุผลลึกกว่า “อยากได้ปุ่มเพิ่ม” และควรช่วยอธิบายว่าทำไมผู้ใช้จึงทำสิ่งนั้น',
            options: [
              { label: insight.label, description: insight.description, correct: true, rationale: insight.rationale },
              { label: 'ผู้ใช้ต้องการให้ระบบเพิ่มฟีเจอร์ให้มากที่สุด', description: 'ยิ่งมีเมนูมากยิ่งดี', rationale: 'จำนวนฟีเจอร์ไม่ได้อธิบายแรงกังวลหรือเป้าหมายที่ทำให้ผู้ใช้เกิดพฤติกรรมนี้' },
              { label: 'ผู้ใช้ต้องการหน้าจอที่สวยและมีเอฟเฟกต์มากขึ้น', description: 'แก้ด้วยความน่าสนใจของ visual', rationale: 'ความสวยอาจมีบทบาทรอง แต่ยังไม่ใช่ความต้องการที่สรุปจากหลักฐานในเคส' },
              { label: 'ผู้ใช้ควรอ่านคู่มือให้ละเอียดก่อนใช้งาน', description: 'ย้ายภาระกลับไปให้ผู้ใช้', rationale: 'Insight ที่ดีช่วยให้ทีมออกแบบจากข้อจำกัดของผู้ใช้ ไม่ใช่คาดหวังให้ผู้ใช้แก้ปัญหาด้วยตนเอง' }

            options: [
              { label: define.label, description: define.description, correct: true, rationale: define.rationale },
              { label: 'เราจะทำปุ่มให้สีสดกว่าเดิมได้อย่างไร?', description: 'เริ่มจากรูปลักษณ์ของ solution', rationale: 'ล็อกคำตอบไว้ที่ visual ก่อนรู้ว่ามันช่วยความต้องการหลักของผู้ใช้หรือไม่' },
              { label: 'เราจะใส่ทุกฟังก์ชันที่ผู้ใช้เคยขอได้อย่างไร?', description: 'เน้นความครบมากกว่าความสำคัญ', rationale: 'การใส่ทุกอย่างอาจเพิ่มภาระและยังไม่ชี้ว่า task สำคัญใดควรสำเร็จก่อน' },

            ]
          }
        }
      };

        id: 'scholarship-resume',
        title: 'ทุนไม่หลุดมือ',
        tag: 'CAMPUS SUPPORT',
        service: 'ระบบสมัครทุนการศึกษาออนไลน์',
        user: 'เมย์ทำงานพิเศษช่วงเย็น จึงกรอกใบสมัครบนมือถือทีละช่วงและมักหยุดกลางทาง',
        symptom: 'ผู้สมัครหลายคนกลับมาเริ่มจากหน้าแรก หรือติดต่อเจ้าหน้าที่เพราะไม่แน่ใจว่าเอกสารใดถูกบันทึกแล้ว',
        listen: { label: 'สังเกตผู้สมัคร 6 คนทำใบสมัครจริง และสัมภาษณ์สั้นทันทีเมื่อพวกเขาหยุดกรอก', description: '4 คนถ่ายภาพหน้าจอไว้เพราะกลัวข้อมูลหาย และ 5 คนไม่แน่ใจว่าไฟล์ใดอัปโหลดสำเร็จ', rationale: 'เห็นทั้งพฤติกรรมการหยุด-กลับมา ความกลัวข้อมูลหาย และคำศัพท์ที่ผู้ใช้ใช้เรียกปัญหา' },
        observation: { label: '4 จาก 6 คนถ่ายภาพหน้าจอ และเมื่อกลับมาเปิดใหม่ พวกเขาเริ่มตรวจจากหน้าแรก', description: 'ผู้ใช้ไม่ใช้สถานะเดิมเพื่อทำงานต่อ', rationale: 'เป็นพฤติกรรมที่เห็นและนับได้ โดยยังไม่สรุปล่วงหน้าว่าผู้ใช้เป็นคนแบบใด' },
        insight: { label: 'ผู้ใช้ต้องการความมั่นใจว่างานที่ค้างไว้ไม่สูญหาย และรู้ชัดว่าเอกสารใดต้องทำต่อ', description: 'การหยุดกรอกไม่ใช่ความล้มเหลว แต่เป็นบริบทจริงของผู้ใช้ที่มีเวลาจำกัด', rationale: 'เชื่อมการถ่ายภาพและการเริ่มใหม่กับความต้องการต่อเนื่องและความชัดเจนของสถานะเอกสาร' },
        define: { label: 'เราจะช่วยนักศึกษาที่กรอกใบสมัครเป็นช่วง ๆ เห็นความคืบหน้าและกลับมาทำต่อได้อย่างมั่นใจได้อย่างไร?', description: 'โฟกัสผู้ใช้ บริบท และความเสี่ยงของงานค้าง', rationale: 'เปิดให้ทีมออกแบบหลายทางเลือก โดยยังยึด need ที่สกัดจากพฤติกรรมจริง' }
      }),
      insightCase({
        id: 'shuttle-shadow',
        title: 'รถรับส่งในเงา',
        tag: 'CAMPUS TRANSIT',
        service: 'ระบบรถรับส่งระหว่างอาคาร',
        user: 'อาร์ตมีเวลาเพียง 12 นาทีระหว่างสองคาบ และต้องตัดสินใจว่าจะรอรถหรือเดิน',
        symptom: 'นักศึกษาเปิดตารางรถซ้ำ แต่ยังเดินไปถามเจ้าหน้าที่หรือพลาดรถคันที่ต้องการ',
        listen: { label: 'ติดตามนักศึกษา 8 คนในช่วงเปลี่ยนคาบ พร้อมถามว่าพวกเขาตัดสินใจจากข้อมูลใด', description: '5 คนรีเฟรชตารางเดิมหลายครั้ง ก่อนเดินไปถามว่ารถคันนี้ไปอาคารไหนและจะถึงเมื่อไร', rationale: 'ข้อมูลนี้แสดงทั้งจังหวะเร่งด่วน การใช้ข้อมูลเดิมซ้ำ และคำถามที่ยังไม่ได้รับคำตอบ' },
        observation: { label: '5 จาก 8 คนเปิดตารางเวลาเดิมซ้ำ แล้วถามเจ้าหน้าที่ว่า “คันนี้ไปคณะอะไร และจะถึงเมื่อไร”', description: 'ผู้ใช้ยังต้องหาคำยืนยันนอกระบบ', rationale: 'เป็นคำพูดและพฤติกรรมที่บันทึกได้ โดยไม่เหมารวมสาเหตุของผู้ใช้' },
        insight: { label: 'ผู้ใช้ต้องการความมั่นใจแบบทันเวลาเกี่ยวกับเส้นทางและเวลามาถึง ไม่ใช่เพียงตารางที่คาดการณ์ไว้', description: 'ในช่วงเร่งด่วน ผู้ใช้กำลังลดความเสี่ยงว่าจะไปเรียนสาย', rationale: 'อธิบายว่าทำไมตารางเดิมจึงไม่พอ และเชื่อมกับเป้าหมายการตัดสินใจในเวลาอันสั้น' },

      }),
      insightCase({
        id: 'library-seat',
        title: 'โต๊ะเงียบที่หาไม่เจอ',

        symptom: 'ผู้ใช้เปิดแผนผังที่นั่ง แต่ยังเดินสำรวจหลายชั้นและยกเลิกการจองในภายหลัง',
        listen: { label: 'ให้ผู้ใช้ 5 คนหาโต๊ะทำงานเงียบในเวลาจำกัด พร้อมบันทึกหน้าจอและถามเหตุผลทุกครั้งที่เปลี่ยนชั้น', description: 'หลายคนดูแผนผังแล้วเดินไปตรวจเอง เพราะไม่รู้ว่าโต๊ะนั้นยังว่างจริงหรือมีเสียงรบกวนเพียงใด', rationale: 'ได้ทั้งพฤติกรรมตรวจซ้ำและเงื่อนไขคุณภาพของพื้นที่ที่แผนผังเดิมไม่สื่อ' },
        observation: { label: 'ผู้ใช้เปิดหน้าจองโต๊ะแล้วเดินตรวจอย่างน้อย 2 ชั้นก่อนกดจอง', description: 'การตัดสินใจยังพึ่งการตรวจสถานที่จริง', rationale: 'เป็น observation ที่บอกขั้นตอนจริง โดยไม่รีบสรุปว่าแผนผังดีหรือไม่ดี' },
        insight: { label: 'ผู้ใช้ต้องการหลักฐานที่เชื่อถือได้ว่าโต๊ะยังว่างและเหมาะกับงานที่ต้องใช้สมาธิก่อนเสียเวลาเดินหา', description: '“ว่าง” อย่างเดียวไม่ตอบคุณภาพที่ผู้ใช้กำลังมองหา', rationale: 'เชื่อมการเดินตรวจซ้ำกับความต้องการลดความเสี่ยงของการเลือกพื้นที่ผิด' },
        define: { label: 'เราจะช่วยนักศึกษาที่มีเวลาจำกัด หาและจองพื้นที่เงียบที่ยังว่างจริงได้อย่างไร?', description: 'ยึดผู้ใช้ ข้อจำกัดเวลา และผลลัพธ์ที่ต้องการ', rationale: 'เปิดให้ทีมทดลองสถานะเรียลไทม์ ตัวบ่งชี้ความเงียบ หรือระบบยืนยัน โดยไม่ล็อก solution' }
      }),
      insightCase({
        id: 'clinic-confirm',
        title: 'คิวที่ยังไม่มั่นใจ',
        tag: 'HEALTH SERVICE',
        service: 'ระบบจองคิวคลินิกนักศึกษา',
        user: 'นัทจองคิวแพทย์ระหว่างพักคาบและต้องเดินทางไปอาคารที่ไม่คุ้นเคย',
        symptom: 'ผู้ใช้จองสำเร็จแล้ว แต่ยังจับภาพหน้าจอ โทรถาม หรือมาถึงผิดวันและเวลา',
