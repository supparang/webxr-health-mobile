<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#071124" />
  <title>UX Quest • W1 UX Detective Casefile</title>
</head>
<body>
  <main id="uxqApp" aria-live="polite"></main>

  <script src="./js/uxq-classroom-config-v2.js?v=20260701-classroom-v5-5"></script>
  <script src="./js/uxq-progress-v2.js?v=20260628-storage-safe1"></script>
  <script src="./js/uxq-identity-v1.js?v=20260628-classroom-v1"></script>
  <script src="./js/uxq-analytics-v2.js?v=20260628-classroom-receiver-v2"></script>
  <script src="./js/uxq-w1-casefile-boost-v3.js?v=20260701-w1-pressure-v3"></script>
  <script>
  (() => {
    'use strict';
    const game = window.UXQW1CasefileBoost;
    game.init({
      rootId: 'uxqApp',
      hubHref: './index.html',
      nextHref: './w2-design-thinking-sprint.html?v=act1-w1-cleared',
      nextLabel: 'ไป W2 Design Thinking Sprint',
      passAccuracy: 62,
      threeStarAccuracy: 82,
      threeStarHints: 2,
      verifyTarget: 70,
      caseCount: 2
    });

    function repairCaseBankCopy(){
      const count = Number(game.caseCount || 15);
      document.querySelectorAll('.uxq-brief').forEach((card) => {
        if (card.querySelector('b')?.textContent?.trim() === 'Case Bank') {
          const value = card.querySelector('span');
          if (value) value.textContent = `${count} dossiers • ${count * 4} decision cards`;
        }
      });
      const lede = document.querySelector('.uxq-lede');
      if (lede) lede.innerHTML = lede.innerHTML.replace(/2 จาก 12 Casefiles/g, `2 จาก ${count} Casefiles`);
      const best = document.querySelector('.uxq-mini-score');
      if (best) best.textContent = best.textContent.replace('12 dossiers', `${count} dossiers`);
    }

    repairCaseBankCopy();
    new MutationObserver(repairCaseBankCopy).observe(document.documentElement, { childList: true, subtree: true });
  })();
  </script>
</body>
</html>
