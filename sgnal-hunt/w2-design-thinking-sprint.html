<body>
  <main id="uxqApp" aria-live="polite"></main>
  <script src="./js/uxq-classroom-config-v2.js?v=20260702-w2-thai-v1"></script>

  <script>
  (() => {
    'use strict';
    const make = d => ({
      id:d.id,title:d.title,tag:'ภารกิจคิดเชิงออกแบบ',service:d.service,user:d.user,symptom:d.symptom,
      stages:{
        empathize:{prompt:'ก่อนคิดวิธีแก้ ทีมควรทำอะไรเพื่อเข้าใจผู้ใช้จริง',hint:'เริ่มจากพฤติกรรม บริบท และความต้องการของผู้ใช้ ไม่ใช่จากสิ่งที่ทีมอยากสร้าง',options:[
          {label:d.e[0],description:d.e[1],correct:true,rationale:d.e[2]},
          {label:'เลือกหน้าตาใหม่จากแอปยอดนิยม',description:'เริ่มวาดหน้าจอให้ดูทันสมัย',rationale:'ช่วยหาแรงบันดาลใจได้ แต่ยังไม่บอกว่าผู้ใช้ในคดีนี้ติดขัดตรงไหน'},
          {label:'ทำระบบให้ครบก่อน แล้วค่อยถามผู้ใช้',description:'ลงทุนพัฒนาก่อนเก็บหลักฐาน',rationale:'เสี่ยงสร้างสิ่งที่แก้ปัญหาผิดจุด'},
          {label:'ถามเพียงว่าผู้ใช้ชอบระบบหรือไม่',description:'ใช้ความพึงพอใจรวมเป็นคำตอบ',rationale:'ยังไม่เห็นพฤติกรรมและบริบทที่ใช้ตั้งโจทย์ได้'}]},
        define:{prompt:'ข้อใดเป็นโจทย์ออกแบบที่มีคุณภาพที่สุด',hint:'โจทย์ที่ดีระบุผู้ใช้ ความต้องการ และอุปสรรค โดยยังไม่ล็อกวิธีแก้',options:[
          {label:d.d[0],description:d.d[1],correct:true,rationale:d.d[2]},
          {label:'เราจะทำหน้าให้สวยและสีสันมากขึ้นได้อย่างไร?',description:'เริ่มจากสิ่งที่ทีมอยากทำ',rationale:'ล็อกไปที่รูปลักษณ์และไม่สะท้อนความต้องการผู้ใช้'},
          {label:'เราจะใส่ทุกความสามารถที่ผู้ใช้เคยขอได้อย่างไร?',description:'เน้นความครบของระบบ',rationale:'จำนวนความสามารถไม่ได้เท่ากับคุณค่าต่อผู้ใช้'},
          {label:'เราจะทำให้ผู้ใช้ใช้ระบบน้อยลงได้อย่างไร?',description:'ลดการใช้งานทุกแบบ',rationale:'ไม่เชื่อมกับเป้าหมายงานที่ผู้ใช้ต้องทำให้สำเร็จ'}]},
        ideate:{prompt:'แนวคิดใดตอบโจทย์ผู้ใช้โดยตรงและยังทดสอบได้',hint:'เลือกแนวคิดที่เชื่อมความต้องการกับวิธีช่วยผู้ใช้ ไม่ใช่เพิ่มลูกเล่น',options:[
          {label:d.i[0],description:d.i[1],correct:true,rationale:d.i[2]},
          {label:'ใส่ผู้ช่วยสนทนาเต็มหน้าจอตลอดเวลา',description:'ทำให้ระบบดูฉลาดขึ้นทันที',rationale:'อาจบังงานหลัก หากยังไม่รู้ว่าผู้ใช้ต้องการคุยแทนการทำงานจริง'},
          {label:'เพิ่มภาพเคลื่อนไหวทุกจุดที่แตะได้',description:'ทำให้หน้าจอดูมีชีวิตชีวา',rationale:'ภาพเคลื่อนไหวไม่ตอบโจทย์หากไม่ช่วยให้ผู้ใช้เข้าใจหรือทำงานสำเร็จ'},
          {label:'คัดลอกขั้นตอนจากระบบอื่นทั้งหมด',description:'เพราะระบบนั้นมีผู้ใช้มาก',rationale:'บริบทและข้อจำกัดของผู้ใช้อาจต่างกัน'}]},
        prototype:{prompt:'ต้นแบบแรกควรมีขอบเขตแบบใดจึงเรียนรู้ได้เร็ว',hint:'ต้นแบบมีไว้ตอบคำถามที่เสี่ยงที่สุด ไม่จำเป็นต้องทำครบทั้งระบบ',options:[
          {label:d.p[0],description:d.p[1],correct:true,rationale:d.p[2]},
          {label:'พัฒนาระบบจริงทุกหน้าพร้อมฐานข้อมูล',description:'ทำให้ใกล้ระบบจริงที่สุดตั้งแต่รอบแรก',rationale:'ลงทุนสูงก่อนรู้ว่าแนวคิดช่วยผู้ใช้ได้หรือไม่'},
          {label:'ทำเพียงชุดสีและโลโก้',description:'เลือกภาพลักษณ์ก่อน',rationale:'ยังไม่ทดสอบการทำงานหลักของผู้ใช้'},
          {label:'เขียนเอกสารรายละเอียดหลายสิบหน้า',description:'อธิบายทุกอย่างล่วงหน้า',rationale:'เอกสารไม่แทนการเห็นผู้ใช้ทำงานจริง'}]},
        test:{prompt:'แผนทดสอบใดให้ข้อมูลพอสำหรับปรับรอบต่อไป',hint:'ตั้งงานจริง ดูพฤติกรรม และถามเหตุผลหลังผู้ใช้ทำงาน',options:[
          {label:d.t[0],description:d.t[1],correct:true,rationale:d.t[2]},
          {label:'ส่งลิงก์ให้คนจำนวนมากเปิดดูโดยไม่มีงานให้ทำ',description:'นับยอดคลิกแล้วสรุปผล',rationale:'ยอดคลิกไม่มีบริบทว่าผู้ใช้กำลังพยายามทำอะไร'},
          {label:'ให้ทีมโหวตว่าแบบไหนสวยที่สุด',description:'ใช้ความเห็นภายในเป็นคำตัดสิน',rationale:'ทีมไม่ใช่ตัวแทนพฤติกรรมของผู้ใช้เป้าหมาย'},
          {label:'รอเปิดใช้จริงแล้วค่อยดูคำร้องเรียน',description:'เก็บปัญหาหลังเกิดผลกระทบ',rationale:'ช้าและเสี่ยงกว่าการทดสอบกับกลุ่มเล็กก่อน'}]}
      }
    });
    const CASES=[
      make({id:'clinic-sprint',title:'คดีจองคิวคลินิก',service:'ระบบจองคิวคลินิกนักศึกษา',user:'ฝนมีเวลาไม่มากระหว่างคาบและต้องจองคิวบนมือถือ',symptom:'ผู้ใช้ไม่แน่ใจว่าคิวใดว่างและมาผิดเวลานัด',e:['สังเกตนักศึกษาจองคิวบนมือถือ 5 คน พร้อมคุยสั้นหลังทำงาน','ดูการเลือกวัน เวลา และสิ่งที่ทำให้ลังเล','ได้ทั้งพฤติกรรมจริง ข้อจำกัดเวลา และภาษาที่ผู้ใช้ใช้เรียกปัญหา'],d:['เราจะช่วยนักศึกษาที่รีบจองคิวบนมือถือ เลือกเวลาและยืนยันวันนัดได้มั่นใจขึ้นอย่างไร?','ระบุผู้ใช้ บริบท และผลลัพธ์ที่ต้องการ','เปิดทางเลือกหลายแบบโดยยังยึดความต้องการผู้ใช้'],i:['แสดงคิวว่างใกล้สุดก่อน พร้อมสรุปวันและเวลาเต็มรูปแบบก่อนยืนยัน','ลดการอ่านปฏิทินที่รกและช่วยตรวจความเข้าใจ','ตอบทั้งการหาคิวว่างและการจำวันนัด'],p:['ทำหน้าจอจำลองเฉพาะการเลือกคิวและยืนยันนัด','ให้ผู้ใช้เดินงานสำคัญที่เสี่ยงที่สุด','เรียนรู้ได้เร็วโดยไม่ต้องสร้างทั้งระบบ'],t:['ให้ผู้ใช้ 5 คนจองคิวจำลอง แล้วบอกวัน เวลา และสิ่งที่ต้องทำต่อ','บันทึกเวลา ความผิดพลาด และเหตุผลที่ลังเล','ตรวจได้ทั้งความสำเร็จของงานและความเข้าใจนัดหมาย']}),
      make({id:'library-sprint',title:'คดีหาที่นั่งห้องสมุด',service:'ระบบจองที่นั่งห้องสมุด',user:'บาสต้องหาที่อ่านหนังสือเงียบก่อนสอบ แต่มีเวลาน้อย',symptom:'ผู้ใช้เลือกโซนได้ แต่ไปถึงแล้วที่นั่งเต็มหรือบรรยากาศไม่ตรงที่คาด',e:['ติดตามผู้ใช้ตั้งแต่ค้นหาโซนจนถึงไปถึงห้องสมุด','หลายคนดูเพียงชื่อโซนและภาพเก่า ก่อนโทรถามเพื่อนว่าจริง ๆ ยังว่างไหม','เห็นช่องว่างระหว่างข้อมูลที่มีและการตัดสินใจจริง'],d:['เราจะช่วยนักศึกษาที่ต้องการพื้นที่อ่านหนังสือเร่งด่วน เลือกที่นั่งที่ตรงความต้องการและพร้อมใช้จริงได้อย่างไร?','ระบุผู้ใช้ สถานการณ์ และผลลัพธ์','ไม่ล็อกว่าต้องแก้ด้วยแผนที่หรือปุ่มรูปแบบใด'],i:['แสดงจำนวนที่นั่งว่าง ระดับความเงียบ และเวลาเดินถึงโซนก่อนยืนยัน','ช่วยให้เปรียบเทียบตัวเลือกด้วยข้อมูลที่ใช้ตัดสินใจจริง','ตอบ need เรื่องความพร้อมใช้และความเหมาะสมของพื้นที่'],p:['ทำต้นแบบการเปรียบเทียบ 3 โซนพร้อมข้อมูลว่างและระดับเสียง','ทดสอบเฉพาะจังหวะเลือกโซน','ตอบคำถามเสี่ยงว่าข้อมูลใดช่วยให้เลือกได้'],t:['ให้ผู้ใช้เลือกที่นั่งตามภารกิจ 3 แบบ แล้วถามเหตุผลที่ตัดสินใจ','ดูความถูกต้อง เวลา และข้อมูลที่ผู้ใช้ยังหาไม่เจอ','ช่วยปรับข้อมูลก่อนทำระบบจองเต็มรูปแบบ']}),
      make({id:'internship-sprint',title:'คดีตามกำหนดฝึกงาน',service:'ระบบติดตามขั้นตอนฝึกงาน',user:'แก้มต้องส่งเอกสารหลายรายการให้ทันกำหนด แต่แต่ละเรื่องอยู่คนละหน้า',symptom:'ผู้ใช้พลาดกำหนดส่งหรือส่งเอกสารซ้ำเพราะไม่เห็นภาพรวม',e:['ให้ผู้ใช้เปิดขั้นตอนฝึกงานของตนและบอกว่าวันนี้ต้องทำอะไร','ผู้ใช้สลับหลายหน้าแล้วไม่แน่ใจว่าขั้นไหนเสร็จหรือยัง','เห็นปัญหาภาพรวมและลำดับงาน ไม่ใช่แค่ปัญหาหน้าใดหน้าหนึ่ง'],d:['เราจะช่วยนักศึกษาที่กำลังเตรียมฝึกงาน เห็นงานค้างและทำสิ่งสำคัญก่อนกำหนดได้อย่างไร?','ระบุผู้ใช้ เป้าหมาย และข้อจำกัดเวลา','เปิดทางให้หลายแนวคิดช่วยจัดลำดับงาน'],i:['ทำหน้าสรุปงานค้างตามกำหนด พร้อมบอกเจ้าของเรื่องและขั้นตอนต่อไป','ช่วยให้ผู้ใช้เห็นสิ่งสำคัญก่อนและไม่ต้องเดา','ตอบ need เรื่องภาพรวมและการลงมือทำ'],p:['ทำต้นแบบหน้าสรุปงานค้าง 1 หน้า พร้อมสถานะตัวอย่าง','ทดสอบว่าผู้ใช้จัดลำดับงานได้หรือไม่','เน้นตรวจสมมติฐานหลักก่อนพัฒนาระบบเต็ม'],t:['ให้ผู้ใช้ 5 คนดูข้อมูลตัวอย่างแล้วระบุ 3 งานที่ต้องทำก่อน','เก็บความถูกต้อง เวลา และสิ่งที่ตีความผิด','วัดได้ว่าหน้าสรุปช่วยให้ตัดสินใจได้จริง']})
    ];
    UXQMissionEngine.init({id:'w2',title:'ภารกิจคิดเชิงออกแบบ',subtitle:'W2 • คิดเชิงออกแบบ',intro:'เข้าใจผู้ใช้ ตั้งโจทย์ สร้างแนวคิด ทำต้นแบบ และทดสอบ',bank:CASES,caseCount:2,stages:['empathize','define','ideate','prototype','test'],threeStarAccuracy:84,threeStarVerified:75,recentLimit:6,requires:'w1',nextHref:'./w3-cognitive-load-escape.html',nextLabel:'ไปต่อ W3'});
  })();
  </script>
