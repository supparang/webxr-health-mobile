    UXQMissionEngine.init({id:'w2',title:'ภารกิจคิดเชิงออกแบบ',subtitle:'W2 • คิดเชิงออกแบบ',intro:'เข้าใจผู้ใช้ ตั้งโจทย์ สร้างแนวคิด ทำต้นแบบ และทดสอบ',bank:CASES,caseCount:2,stages:['empathize','define','ideate','prototype','test'],threeStarAccuracy:84,threeStarVerified:75,recentLimit:6,requires:'w1',nextHref:'./w3-cognitive-load-escape.html',nextLabel:'ไปต่อ W3',badge:'Design Process Navigator'});
