name: EAP 15 Production Gate
on:
  pull_request:
    branches: [main]
    paths:
      - 'eap-hero-save-society-v1/**'
      - '.github/workflows/eap15-release-gate.yml'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  browser-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --no-save playwright@1.52.0
      - run: npx playwright install --with-deps chromium
      - name: Start local player
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/eap-http.log 2>&1 &
          echo $! > /tmp/eap-http.pid
          sleep 2
      - name: Run browser release contract
        run: node eap-hero-save-society-v1/qa/eap-browser-release.mjs
  live-sheet-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EAP_ENDPOINT: https://script.google.com/macros/s/AKfycbwxHHHw6Pk4rMdDnTM_6jxcL2GYdABc0hHFOlc8r_NS4D-siLYv0P-OZg3cfINE9A8X5A/exec
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: 1. Probe deployed Apps Script version and new identity
        id: probe
        continue-on-error: true
        env:
          EAP_PHASE: probe
        run: node eap-hero-save-society-v1/qa/eap-live-sheet-contract.mjs > eap-apps-script-probe.log 2>&1
      - name: Preserve Apps Script probe
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eap-apps-script-probe
          path: eap-apps-script-probe.log
          retention-days: 14
      - name: Stop when deployed Apps Script is stale
        if: steps.probe.outcome != 'success'
        run: |
          cat eap-apps-script-probe.log
          exit 1
      - name: 2. Verify S1 write and player_resume round-trip
        env:
          EAP_PHASE: s1
        run: node eap-hero-save-society-v1/qa/eap-live-sheet-contract.mjs
      - name: 3. Verify Boss Speaking pending-review contract
        env:
          EAP_PHASE: boss
        run: node eap-hero-save-society-v1/qa/eap-live-sheet-contract.mjs
