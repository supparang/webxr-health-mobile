name: EAP 15 Production Gate
on:
  pull_request:
    branches: [main]
    paths:
      - 'eap-hero-save-society-v1/**'
      - '.github/workflows/eap15-release-gate.yml'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  browser-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --no-save playwright@1.52.0
      - run: npx playwright install --with-deps chromium
      - name: Start local player
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/eap-http.log 2>&1 &
          echo $! > /tmp/eap-http.pid
          sleep 2
      - name: Run browser release contract
        run: node eap-hero-save-society-v1/qa/eap-browser-release.mjs
  live-sheet-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      EAP_ENDPOINT: https://script.google.com/macros/s/AKfycbwxHHHw6Pk4rMdDnTM_6jxcL2GYdABc0hHFOlc8r_NS4D-siLYv0P-OZg3cfINE9A8X5A/exec
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: 1. Probe deployed Apps Script and new identity
        id: probe
        continue-on-error: true
        env:
          EAP_PHASE: probe
        run: node eap-hero-save-society-v1/qa/eap-live-sheet-contract.mjs > eap-apps-script-probe.log 2>&1
      - name: Preserve Apps Script probe
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eap-apps-script-probe
          path: eap-apps-script-probe.log
          retention-days: 14
      - name: 2. Verify S1 write and player_resume round-trip
        id: s1
        if: always()
        continue-on-error: true
        env:
          EAP_PHASE: s1
        run: node eap-hero-save-society-v1/qa/eap-live-sheet-contract.mjs > eap-s1-roundtrip-probe.log 2>&1
      - name: Preserve S1 round-trip probe
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eap-s1-roundtrip-probe
          path: eap-s1-roundtrip-probe.log
          retention-days: 14
      - name: 3. Verify canonical Boss Speaking pending-review block
        id: boss
        if: always()
        continue-on-error: true
        env:
          EAP_PHASE: boss
        run: node eap-hero-save-society-v1/qa/eap-live-sheet-contract.mjs > eap-boss-review-probe.log 2>&1
      - name: Preserve Boss review probe
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eap-boss-review-probe
          path: eap-boss-review-probe.log
          retention-days: 14
      - name: 4. Verify live Teacher Dashboard evidence
        id: dashboard
        if: always()
        continue-on-error: true
        env:
          EAP_PHASE: dashboard
        run: node eap-hero-save-society-v1/qa/eap-live-sheet-contract.mjs > eap-teacher-dashboard-probe.log 2>&1
      - name: Preserve Teacher Dashboard probe
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eap-teacher-dashboard-probe
          path: eap-teacher-dashboard-probe.log
          retention-days: 14
      - name: Enforce all live contracts
        if: always()
        run: |
          echo "probe=${{ steps.probe.outcome }} s1=${{ steps.s1.outcome }} boss=${{ steps.boss.outcome }} dashboard=${{ steps.dashboard.outcome }}"
          if [ "${{ steps.probe.outcome }}" != "success" ] || \
             [ "${{ steps.s1.outcome }}" != "success" ] || \
             [ "${{ steps.boss.outcome }}" != "success" ] || \
             [ "${{ steps.dashboard.outcome }}" != "success" ]; then
            echo "One or more EAP live contracts failed. Inspect the uploaded probe artifacts."
            exit 1
          fi
