<!doctype html>
<html lang="th">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root{--ink:#102033;--muted:#607085;--bg:#f4f7fb;--card:#fff;--line:#dbe4ee;--good:#087f5b;--warn:#c26a00;--bad:#b42318;--navy:#17375e}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.45 Arial,"Noto Sans Thai",sans-serif}.wrap{max-width:1280px;margin:auto;padding:22px}.hero{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;margin-bottom:18px}.hero h1{margin:0;font-size:26px}.hero p{margin:5px 0 0;color:var(--muted)}button,input,select{font:inherit}.btn{border:0;border-radius:10px;padding:10px 14px;font-weight:800;cursor:pointer;background:var(--navy);color:#fff}.btn.ghost{background:#e8eef6;color:var(--ink)}.toolbar{display:flex;flex-wrap:wrap;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:16px}.toolbar input,.toolbar select{border:1px solid var(--line);border-radius:9px;padding:9px 10px;min-width:150px}.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px}.label{color:var(--muted);font-weight:700;font-size:12px}.value{font-size:28px;font-weight:900;margin-top:4px}.tablebox{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:auto}table{border-collapse:collapse;width:100%;min-width:820px}th,td{padding:11px 12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:middle}th{background:#f8fafc;font-size:12px;color:#42566f;position:sticky;top:0}.pill{display:inline-block;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:800}.active{color:var(--good);background:#dff7ed}.review{color:var(--bad);background:#fde7e7}.legacy{color:var(--warn);background:#fff1d8}.empty{padding:40px;text-align:center;color:var(--muted)}.detail{margin-top:16px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}.detail h2{margin:0 0 10px;font-size:18px}.small{font-size:12px;color:var(--muted)}@media(max-width:760px){.wrap{padding:14px}.hero{display:block}.cards{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media print{.toolbar,.btn{display:none!important}.wrap{max-width:none;padding:0}.tablebox,.card,.detail{box-shadow:none;border-color:#ccc}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div><h1>EAP Hero • Teacher Dashboard</h1><p>Section 122 · คะแนนจริงแยกจาก legacy completion</p></div>
      <button class="btn ghost" onclick="window.print()">Print / Save PDF</button>
    </section>

    <section class="toolbar">
      <select id="section"><option value="122">Section 122</option></select>
      <input id="search" placeholder="ค้นหารหัสหรือชื่อผู้เรียน">
      <select id="status"><option value="">ทุกสถานะ</option><option value="active">Active</option><option value="review">Needs support</option><option value="legacy">Legacy only</option></select>
      <button class="btn" onclick="loadData()">Refresh data</button>
      <button class="btn ghost" onclick="downloadCsv()">Export CSV</button>
    </section>

    <section class="cards">
      <div class="card"><div class="label">ผู้เรียน</div><div class="value" id="students">—</div></div>
      <div class="card"><div class="label">Skill records</div><div class="value" id="records">—</div></div>
      <div class="card"><div class="label">คะแนนเฉลี่ยดีที่สุด</div><div class="value" id="average">—</div></div>
      <div class="card"><div class="label">ต้องช่วยทบทวน</div><div class="value" id="support">—</div></div>
    </section>

    <section class="tablebox">
      <table>
        <thead><tr><th>รหัส</th><th>ชื่อผู้เรียน</th><th>Section</th><th>Skills</th><th>Best avg.</th><th>Legacy</th><th>Review</th><th>Status</th><th></th></tr></thead>
        <tbody id="rows"><tr><td colspan="9" class="empty">กำลังโหลดข้อมูล…</td></tr></tbody>
      </table>
    </section>
    <section class="detail" id="detail" hidden></section>
  </main>

  <script>
    let state={summary:{},students:[]};
    const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
    function setText(id,v){document.getElementById(id).textContent=v}
    function badge(status){const label=status==='review'?'Needs support':status==='legacy'?'Legacy only':'Active';return `<span class="pill ${esc(status)}">${label}</span>`}
    function filters(){return {section:document.getElementById('section').value,query:document.getElementById('search').value.trim(),status:document.getElementById('status').value}}
    function loadData(){
      document.getElementById('rows').innerHTML='<tr><td colspan="9" class="empty">กำลังโหลดข้อมูล…</td></tr>';
      google.script.run.withSuccessHandler(render).withFailureHandler(showError).eapTeacherDashboardData(filters());
    }
    function render(data){
      state=data||{summary:{},students:[]};
      const s=state.summary||{};
      setText('students',s.students??0);setText('records',s.skillRecords??0);setText('average',s.avgBestScore??0);setText('support',s.needsSupport??0);
      const rows=(state.students||[]).map(x=>`<tr><td>${esc(x.studentId)}</td><td>${esc(x.studentName)}</td><td>${esc(x.section)}</td><td>${esc(x.skills)}</td><td>${esc(x.avgBestScore)}</td><td>${esc(x.legacyCompletion)}</td><td>${esc(x.reviewCount)}</td><td>${badge(x.status)}</td><td><button class="btn ghost" onclick="openStudent('${String(x.studentId).replace(/'/g,"\\'")}')">ดูรายคน</button></td></tr>`).join('');
      document.getElementById('rows').innerHTML=rows||'<tr><td colspan="9" class="empty">ยังไม่มีข้อมูลตามตัวกรองนี้</td></tr>';
    }
    function showError(err){document.getElementById('rows').innerHTML='<tr><td colspan="9" class="empty">โหลดข้อมูลไม่สำเร็จ: '+esc(err&&err.message||err)+'</td></tr>'}
    function openStudent(studentId){google.script.run.withSuccessHandler(d=>{
      const detail=document.getElementById('detail');detail.hidden=false;
      const rs=(d.records||[]).map(r=>`<tr><td>${esc(r.sessionId)}</td><td>${esc(r.sessionTitle)}</td><td>${esc(r.skill)}</td><td>${esc(r.bestScore)}</td><td>${esc(r.bestAccuracy)}</td><td>${esc(r.passed)}</td><td>${esc(r.attempts)}</td><td>${esc(r.reviewFlag)}</td></tr>`).join('');
      detail.innerHTML=`<h2>${esc(d.studentName||studentId)} <span class="small">${esc(studentId)}</span></h2><table><thead><tr><th>Session</th><th>Title</th><th>Skill</th><th>Best score</th><th>Accuracy</th><th>Passed</th><th>Attempts</th><th>Flag</th></tr></thead><tbody>${rs||'<tr><td colspan="8">ยังไม่มีข้อมูล</td></tr>'}</tbody></table>`;
      detail.scrollIntoView({behavior:'smooth',block:'start'});
    }).withFailureHandler(showError).eapTeacherStudentDetail(studentId)}
    function downloadCsv(){
      const head=['studentId','studentName','section','skills','avgBestScore','legacyCompletion','reviewCount','status'];
      const lines=[head,...state.students.map(x=>head.map(k=>x[k]))].map(r=>r.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',')).join('\n');
      const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([lines],{type:'text/csv;charset=utf-8'}));a.download='EAP-Hero-Section-122.csv';a.click();URL.revokeObjectURL(a.href);
    }
    ['search','status','section'].forEach(id=>document.getElementById(id).addEventListener(id==='search'?'input':'change',()=>setTimeout(loadData,150)));
    loadData();
  </script>
</body>
</html>
