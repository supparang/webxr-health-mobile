<!doctype html>
<html lang="th"><head><base target="_top"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root{--ink:#102033;--muted:#607085;--line:#dbe4ee;--bg:#f4f7fb;--card:#fff;--navy:#17375e;--good:#087f5b;--warn:#b45309;--bad:#b42318;--blue:#174ea6;--purple:#6d28d9}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.45 Arial,"Noto Sans Thai",system-ui,sans-serif}.wrap{max-width:1540px;margin:auto;padding:18px}.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:14px}h1{margin:0;font-size:clamp(25px,3vw,34px)}.subtitle,.small{color:var(--muted)}button,input,select{font:inherit}.btn{border:0;border-radius:11px;padding:10px 14px;font-weight:900;cursor:pointer;background:var(--navy);color:#fff}.btn.ghost{background:#e8eef6;color:var(--ink)}.toolbar,.tabs,.quality{display:flex;flex-wrap:wrap;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:15px;padding:13px;margin-bottom:14px}.toolbar label{display:grid;gap:4px;color:var(--muted);font-size:12px;font-weight:900}.toolbar input,.toolbar select{border:1px solid var(--line);border-radius:9px;padding:9px 10px;min-width:150px}.tab{border:0;border-radius:11px;padding:10px 14px;font-weight:900;cursor:pointer;background:#edf2f7}.tab.active{background:var(--navy);color:#fff}.cards{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:12px;margin-bottom:16px}.card{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:15px;min-height:104px}.label{color:var(--muted);font-weight:800;font-size:12px}.value{font-size:28px;font-weight:950;margin-top:5px}.section{background:var(--card);border:1px solid var(--line);border-radius:15px;overflow:auto;margin-bottom:16px}.section-title{padding:15px 16px 4px;font-size:19px;font-weight:950}.section-note{padding:0 16px 13px;color:var(--muted);font-size:12px}table{width:100%;border-collapse:collapse;min-width:1180px}th,td{padding:10px 11px;border-top:1px solid var(--line);text-align:left;vertical-align:top}th{background:#f8fafc;font-size:12px;color:#42566f}.pill{display:inline-block;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:900;white-space:nowrap}.pass{background:#dcfce7;color:#166534}.pending{background:#fef3c7;color:#92400e}.fail{background:#fee2e2;color:#991b1b}.info{background:#e8f0fe;color:#174ea6}.exposure{background:#ede9fe;color:#6d28d9}.empty{padding:38px;text-align:center;color:var(--muted)}@media(max-width:1200px){.cards{grid-template-columns:repeat(4,minmax(0,1fr))}}@media(max-width:760px){.wrap{padding:10px}.top{display:block}.cards{grid-template-columns:repeat(2,minmax(0,1fr))}.toolbar label{width:100%}.toolbar input,.toolbar select{width:100%}}@media print{.toolbar,.tabs,.btn,.quality{display:none!important}.wrap{max-width:none;padding:0}}
</style></head><body><main class="wrap">
<section class="top"><div><h1>EAP Learning Analytics Dashboard</h1><p class="subtitle">EAP Hero + EAP Word Quest · Section 122 · Canonical official-learner view v7</p></div><button class="btn ghost" onclick="window.print()">Print / Save PDF</button></section>
<section class="toolbar"><label>Section<select id="section"><option value="122">Section 122</option></select></label><label>ค้นหา<input id="search" placeholder="รหัส ชื่อ Route หรือ Skill"></label><label>สถานะ<select id="status"><option value="">ทุกสถานะ</option><option value="active">Active</option><option value="review">รอตรวจ / Needs support</option></select></label><label>การเข้าร่วม<select id="participation"><option value="">ทุกคน</option><option value="heroOnly">EAP Hero เท่านั้น</option><option value="wordOnly">Word Quest เท่านั้น</option><option value="both">เล่นทั้งสองเกม</option></select></label><button class="btn" onclick="loadData()">Refresh data</button><button class="btn ghost" onclick="downloadCsv()">Export CSV</button></section>
<section class="tabs"><button class="tab active" data-tab="overview">ภาพรวมผู้เรียน</button><button class="tab" data-tab="mastery">EAP Hero Mastery</button><button class="tab" data-tab="exposure">Four-Skill Exposure</button><button class="tab" data-tab="boss">Boss Speaking Review</button><button class="tab" data-tab="word">EAP Word Quest</button><button class="tab" data-tab="support">Needs Support</button></section>
<section class="cards" id="cards"></section><section class="quality" id="quality">กำลังตรวจข้อมูล…</section>
<section class="section"><div class="section-title" id="tableTitle">รายชื่อนักศึกษา</div><div class="section-note">Official learner only · Guest/QA อยู่ใน Data Quality · Mastery ใช้ Core + Support · Boss ใช้ latest Speaking evidence ต่อ B1–B5</div><table><thead id="head"></thead><tbody id="body"><tr><td class="empty">กำลังโหลดข้อมูล…</td></tr></tbody></table></section>
</main><script>
let app={overview:{},dataQuality:{},learners:[]},tab='overview';const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const show=(v,s='')=>v===null||v===undefined||v===''?'—':String(v)+s;const pill=(v,k)=>`<span class="pill ${k}">${esc(v)}</span>`;const filters=()=>({section:section.value,query:search.value.trim(),status:status.value,participation:participation.value});function loadData(){body.innerHTML='<tr><td class="empty">กำลังโหลดข้อมูล…</td></tr>';google.script.run.withSuccessHandler(render).withFailureHandler(error).eapTeacherDashboardDataCanonicalV7(filters())}function render(d){app=d||{overview:{},dataQuality:{},learners:[]};cards();quality();rows()}function cards(){const o=app.overview||{},a=[['ผู้เรียนทั้งหมด',o.learners??0],['EAP Hero เท่านั้น',o.heroOnly??0],['Word Quest เท่านั้น',o.wordQuestOnly??0],['เล่นทั้งสองเกม',o.both??0],['Mastery evidence',o.masteryRecords??0],['Exposure touchpoints',o.exposureTouchpoints??0],['Boss Speaking evidence',o.bossSpeakingEvidence??0],['Boss รอตรวจ',o.bossPending??0],['Boss ตรวจแล้ว',o.bossReviewed??0],['Hero Mastery average',show(o.heroAverage)],['Word Best Accuracy',o.wordQuestAccuracyAverage==null?'—':o.wordQuestAccuracyAverage+'%'],['ต้องช่วยทบทวน',o.needsSupport??0]];document.getElementById('cards').innerHTML=a.map(x=>`<div class="card"><div class="label">${esc(x[0])}</div><div class="value">${esc(x[1])}</div></div>`).join('')}function quality(){const q=app.dataQuality||{};document.getElementById('quality').innerHTML=`<strong>Data quality:</strong>&nbsp; Summary ${esc(q.rawSummaryCount??0)} → Canonical ${esc(q.canonicalHeroCount??0)} · Hero duplicates collapsed ${esc(q.heroDuplicatesCollapsed??0)} · Word attempts ${esc(q.rawWordAttemptCount??0)} → Sessions ${esc(q.canonicalWordSessionCount??0)} · Boss evidence ${esc(q.rawBossEvidenceCount??0)} → Canonical ${esc(q.canonicalBossEvidenceCount??0)} · Quarantined ${esc(q.quarantinedCount??0)}`}function bossBadge(b){if(!b||b.status==='none')return pill('ยังไม่มี','info');if(b.status==='resubmit')return pill('ให้ฝึกซ้ำ','fail');if(b.status==='pending')return pill('รอตรวจ','pending');return pill('ตรวจแล้ว','pass')}function statusBadge(s){return s.status==='review'?pill(s.statusLabel||'Needs support','pending'):pill('Active','pass')}function part(v){return v==='both'?'เล่นทั้งสองเกม':v==='wordOnly'?'Word Quest เท่านั้น':'EAP Hero เท่านั้น'}function rows(){const ls=app.learners||[];if(tab==='mastery')return mastery(ls);if(tab==='exposure')return exposure(ls);if(tab==='boss')return boss(ls);if(tab==='word')return word(ls);if(tab==='support')return support(ls);overview(ls)}function overview(ls){tableTitle.textContent='รายชื่อนักศึกษา';head.innerHTML='<tr><th>รหัส</th><th>ชื่อผู้เรียน</th><th>การเข้าร่วม</th><th>ด่านปัจจุบัน</th><th>Mastery</th><th>Exposure</th><th>Boss Speaking</th><th>Hero avg.</th><th>Word Best</th><th>Status</th></tr>';body.innerHTML=ls.map(s=>`<tr><td>${esc(s.studentId)}</td><td><strong>${esc(s.studentName)}</strong></td><td>${pill(part(s.participation),'info')}</td><td><strong>${esc(s.currentRoute)}</strong></td><td>${pill((s.hero.masteryRecords||[]).length,'info')}</td><td>${pill((s.hero.exposureRecords||[]).length,'exposure')}</td><td>${bossBadge(s.bossSpeaking)}</td><td>${pill(show(s.hero.avgScore),'pass')}</td><td>${s.wordQuest.avgAccuracy==null?'ยังไม่ได้เล่น':pill(s.wordQuest.avgAccuracy+'%','info')}</td><td>${statusBadge(s)}</td></tr>`).join('')||'<tr><td colspan="10" class="empty">ยังไม่มีผู้เรียนทางการตามตัวกรองนี้</td></tr>'}function mastery(ls){tableTitle.textContent='EAP Hero Mastery';head.innerHTML='<tr><th>ผู้เรียน</th><th>Session</th><th>Skill</th><th>Role</th><th>Best</th><th>Passed</th><th>Attempts</th></tr>';const r=[];ls.forEach(s=>(s.hero.masteryRecords||[]).forEach(x=>r.push(`<tr><td>${esc(s.studentId)} · ${esc(s.studentName)}</td><td>${esc(x.sessionId)}</td><td>${esc(x.skill)}</td><td>${esc(x.role)}</td><td>${esc(x.bestScore)}</td><td>${x.passed?pill('ผ่าน','pass'):pill('ยังไม่ผ่าน','fail')}</td><td>${esc(x.attempts)}</td></tr>`)));body.innerHTML=r.join('')||'<tr><td colspan="7" class="empty">ยังไม่มี Mastery evidence</td></tr>'}function exposure(ls){tableTitle.textContent='Four-Skill Exposure';head.innerHTML='<tr><th>ผู้เรียน</th><th>Session</th><th>Skill</th><th>Best</th><th>Latest update</th></tr>';const r=[];ls.forEach(s=>(s.hero.exposureRecords||[]).forEach(x=>r.push(`<tr><td>${esc(s.studentId)} · ${esc(s.studentName)}</td><td>${esc(x.sessionId)}</td><td>${esc(x.skill)}</td><td>${esc(x.bestScore)}</td><td>${esc(x.updatedAt||'—')}</td></tr>`)));body.innerHTML=r.join('')||'<tr><td colspan="5" class="empty">ยังไม่มี Exposure touchpoint</td></tr>'}function boss(ls){tableTitle.textContent='Boss Speaking Review';head.innerHTML='<tr><th>ผู้เรียน</th><th>Boss</th><th>Score</th><th>สถานะล่าสุด</th><th>Feedback</th><th>เวลา</th></tr>';const r=[];ls.forEach(s=>(s.bossSpeaking.records||[]).forEach(x=>r.push(`<tr><td>${esc(s.studentId)} · ${esc(s.studentName)}</td><td>${esc(x.sessionId)}</td><td>${esc(x.score??'—')}</td><td>${bossBadge({status:x.reviewState})}</td><td>${esc((x.feedbackCodes||[]).join(', ')||x.teacherComment||'—')}</td><td>${esc(x.eventAt||'—')}</td></tr>`)));body.innerHTML=r.join('')||'<tr><td colspan="6" class="empty">ยังไม่มี Boss Speaking evidence</td></tr>'}function word(ls){tableTitle.textContent='EAP Word Quest';head.innerHTML='<tr><th>ผู้เรียน</th><th>Session</th><th>Best Accuracy</th><th>Latest Accuracy</th><th>Attempts</th><th>Weak words ล่าสุด</th></tr>';const r=[];ls.forEach(s=>(s.wordQuest.bestRecords||[]).forEach(x=>{const l=(s.wordQuest.latestRecords||[]).find(y=>y.sessionId===x.sessionId);r.push(`<tr><td>${esc(s.studentId)} · ${esc(s.studentName)}</td><td>${esc(x.sessionId)}</td><td>${show(x.accuracy,'%')}</td><td>${l?show(l.accuracy,'%'):'—'}</td><td>${esc(x.sessionAttemptCount)}</td><td>${esc((s.wordQuest.weakWords||[]).join(', ')||'—')}</td></tr>`)}));body.innerHTML=r.join('')||'<tr><td colspan="6" class="empty">ยังไม่มี Word Quest evidence จากผู้เรียนทางการ</td></tr>'}function support(ls){tableTitle.textContent='Needs Support / Teacher Action';const r=ls.filter(s=>s.status==='review');head.innerHTML='<tr><th>รหัส</th><th>ผู้เรียน</th><th>ด่านปัจจุบัน</th><th>Boss</th><th>เหตุผล</th></tr>';body.innerHTML=r.map(s=>`<tr><td>${esc(s.studentId)}</td><td>${esc(s.studentName)}</td><td>${esc(s.currentRoute)}</td><td>${bossBadge(s.bossSpeaking)}</td><td>${esc(s.statusLabel)}</td></tr>`).join('')||'<tr><td colspan="5" class="empty">ไม่มีผู้เรียนที่ต้องดำเนินการในขณะนี้</td></tr>'}function error(e){body.innerHTML=`<tr><td class="empty">โหลดข้อมูลไม่สำเร็จ: ${esc(e&&e.message?e.message:e)}</td></tr>`}function downloadCsv(){const h=['studentId','studentName','participation','currentRoute','mastery','exposure','bossStatus','heroAverage','wordBest','status'];const r=(app.learners||[]).map(s=>[s.studentId,s.studentName,s.participation,s.currentRoute,s.hero.masteryRecords.length,s.hero.exposureRecords.length,s.bossSpeaking.status,s.hero.avgScore,s.wordQuest.avgAccuracy,s.status]);const csv=[h,...r].map(x=>x.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download='EAP-Analytics-Canonical-Section-122.csv';a.click();URL.revokeObjectURL(a.href)}document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{tab=b.dataset.tab;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===b));rows()}));['section','status','participation'].forEach(id=>document.getElementById(id).addEventListener('change',loadData));search.addEventListener('input',()=>setTimeout(loadData,180));loadData();
</script></body></html>
