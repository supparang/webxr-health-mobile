<script>
(()=>{'use strict';
const ENDPOINT='https://script.google.com/macros/s/AKfycbwxHHHw6Pk4rMdDnTM_6jxcL2GYdABc0hHFOlc8r_NS4D-siLYv0P-OZg3cfINE9A8X5A/exec';
const ORDER=['S1','S2','S3','B1','S4','S5','S6','B2','S7','S8','S9','B3','S10','S11','S12','B4','S13','S14','S15','B5'];
const QA=new URLSearchParams(location.search).get('eapDashboardQa')==='1';
const $=id=>document.getElementById(id),txt=v=>String(v??'').replace(/\s+/g,' ').trim(),esc=v=>txt(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const n=(v,d=0)=>{const x=Number(v);return Number.isFinite(x)?x:d},avg=a=>a.length?Math.round(a.reduce((s,x)=>s+x,0)/a.length*100)/100:null,timeMs=v=>{const x=new Date(v||'').getTime();return Number.isFinite(x)?x:0};
let state;let renderTimer=0;
function resetState(){const old=state||{};state={token:(old.token||0)+1,section:txt($('section').value)||'122',activeTab:old.activeTab||'overview',learners:new Map(),wordRows:[],wordSettled:false,wordError:'',rosterSettled:false,rosterError:'',queue:[],active:0,total:0,done:0,errors:new Set(),finished:false};return state.token}
function packRoute(id){const p=window.EAP_HERO_SESSION_CONTENT_PACK;return p&&Array.isArray(p.routes)?p.routes.find(r=>r.routeId===id)||null:null}
function jsonpOnce(action,params={},timeout=30000){return new Promise((resolve,reject)=>{const cb='eapDashCb_'+Date.now()+'_'+Math.random().toString(36).slice(2),s=document.createElement('script');let ended=false;const timer=setTimeout(()=>finish(new Error(action+' timeout after '+Math.round(timeout/1000)+'s')),timeout);function finish(err,data){if(ended)return;ended=true;clearTimeout(timer);try{delete window[cb]}catch(_){window[cb]=undefined}s.remove();err?reject(err):resolve(data)}window[cb]=data=>finish(null,data);const u=new URL(ENDPOINT);u.searchParams.set('action',action);u.searchParams.set('callback',cb);Object.entries(params).forEach(([k,v])=>u.searchParams.set(k,String(v??'')));u.searchParams.set('_',Date.now());s.onerror=()=>finish(new Error(action+' network error'));s.src=u;document.head.appendChild(s)})}
async function jsonp(action,params={},opts={}){const tries=opts.tries||1,timeout=opts.timeout||30000;let last;for(let i=0;i<tries;i++){try{return await jsonpOnce(action,params,timeout)}catch(e){last=e;if(i+1<tries)await new Promise(r=>setTimeout(r,800*(i+1)))}}throw last}
function learnerBase(x={}){return{studentId:txt(x.studentId),studentName:txt(x.studentName)||'Unknown',section:txt(x.section)||state.section,rosterStatus:txt(x.status)||'active',loading:true,resumeQueued:false,resumeLoaded:false,error:'',records:[],mastery:[],exposure:[],boss:[],heroAverage:null,currentRoute:'S1',word:[],wordBest:null,status:'loading'}}
function ensureLearner(x){const id=txt(x.studentId);if(!id)return null;let p=state.learners.get(id);if(!p){p=learnerBase(x);state.learners.set(id,p)}else{if(txt(x.studentName)&&p.studentName==='Unknown')p.studentName=txt(x.studentName);if(txt(x.section))p.section=txt(x.section);if(txt(x.status))p.rosterStatus=txt(x.status)}return p}
function canonicalRecord(raw){const routeId=txt(raw.routeId||raw.sessionId||raw.session).toUpperCase(),skill=txt(raw.skill).toLowerCase(),route=packRoute(routeId),role=txt(raw.skillRole||(route&&route.skillContract&&route.skillContract[skill])||(/^B[1-5]$/.test(routeId)?'Integrated':'')),review=txt(raw.teacherReviewStatus||raw.reviewFlag).toLowerCase(),score=n(raw.bestScore??raw.score,0),latest=n(raw.latestScore??raw.score??raw.bestScore,0),passed=raw.passed===true||String(raw.passed).toLowerCase()==='true'||score>=60;return{routeId,sessionTitle:txt(raw.sessionTitle||(route&&route.title)),skill,role,score,latest,accuracy:raw.bestAccuracy==null&&raw.accuracy==null?null:n(raw.bestAccuracy??raw.accuracy),passed,attempts:n(raw.attempts,1),review,reviewRequired:raw.teacherReviewRequired===true||String(raw.teacherReviewRequired).toLowerCase()==='true'||(/^B[1-5]$/.test(routeId)&&skill==='speaking'),updatedAt:txt(raw.latestAt||raw.updatedAt||raw.submittedAt),raw}}
function bossPass(r){if(!r.reviewRequired)return r.passed;return /reviewed|approved|accepted|passed|complete|completed/.test(r.review)&&!/pending|revise|revision|rework|needs[_ -]?work/.test(r.review)&&r.passed}
function bossState(r){if(/pending|revise|revision|rework|needs[_ -]?work/.test(r.review))return['pending','รอตรวจ/แก้ไข'];return bossPass(r)?['pass','ตรวจแล้ว']:['fail','ยังไม่ผ่าน']}
function dedupe(rows){const m=new Map();(rows||[]).map(canonicalRecord).filter(r=>r.routeId&&r.skill).forEach(r=>{const k=r.routeId+'|'+r.skill,o=m.get(k);if(!o){m.set(k,r);return}const newer=timeMs(r.updatedAt)>=timeMs(o.updatedAt),z=Object.assign({},newer?r:o);z.score=Math.max(o.score,r.score);z.latest=newer?r.latest:o.latest;z.passed=o.passed||r.passed;z.attempts=Math.max(o.attempts,r.attempts);if(!z.review)z.review=o.review||r.review;m.set(k,z)});return[...m.values()].sort((a,b)=>ORDER.indexOf(a.routeId)-ORDER.indexOf(b.routeId)||a.skill.localeCompare(b.skill))}
function nextRoute(records){for(const rid of ORDER){const route=packRoute(rid),required=route&&route.skillContract?Object.keys(route.skillContract).filter(k=>['Core','Support','Integrated'].includes(route.skillContract[k])):(/^B/.test(rid)?['reading','listening','writing','speaking']:[]);if(!required.length)continue;if(!required.every(skill=>{const r=records.find(x=>x.routeId===rid&&x.skill===skill);return r&&(rid[0]==='B'&&skill==='speaking'?bossPass(r):r.passed)}))return rid}return'COMPLETE'}
function derive(p,rows){p.records=dedupe(rows);p.mastery=p.records.filter(r=>['Core','Support','Integrated'].includes(r.role)||(/^B/.test(r.routeId)&&r.role!=='Exposure'));p.exposure=p.records.filter(r=>r.role==='Exposure');p.boss=p.records.filter(r=>/^B[1-5]$/.test(r.routeId)&&r.skill==='speaking');p.heroAverage=avg(p.mastery.filter(r=>r.score>0).map(r=>r.score));p.currentRoute=nextRoute(p.records);p.loading=false;p.resumeLoaded=true;const pending=p.boss.some(r=>bossState(r)[0]==='pending'),failed=p.mastery.some(r=>!r.passed);p.status=pending||failed||p.rosterStatus==='review'?'review':'active'}
function normalizeWord(r){let weak=r.weakWords;if(!Array.isArray(weak)){try{weak=JSON.parse(r.weakWordsJson||'[]')}catch(_){weak=[]}}return Object.assign({},r,{studentId:txt(r.studentId),studentName:txt(r.studentName)||'Unknown',weakWords:Array.isArray(weak)?weak:[]})}
function attachWord(rows){const groups=new Map();rows.forEach(r=>{if(!r.studentId)return;if(!groups.has(r.studentId))groups.set(r.studentId,[]);groups.get(r.studentId).push(r)});groups.forEach((rs,id)=>{const p=ensureLearner({studentId:id,studentName:rs[0].studentName,section:state.section});p.word=rs;const vals=rs.map(r=>n(r.bestAccuracy??r.accuracy,-1)).filter(x=>x>=0);p.wordBest=avg(vals);enqueueResume(p)})}
function enqueueResume(p){if(!p||p.resumeQueued||p.resumeLoaded)return;p.resumeQueued=true;state.queue.push(p);state.total++;pump()}
function pump(){while(state.active<3&&state.queue.length){const p=state.queue.shift(),token=state.token;state.active++;loadPerson(p,token).finally(()=>{if(token!==state.token)return;state.active--;state.done++;pump();checkFinished();scheduleRender()})}}
async function loadPerson(p,token){try{const d=await jsonp('player_resume',{studentId:p.studentId,studentName:p.studentName,section:state.section},{timeout:QA?2500:45000,tries:2});if(token!==state.token)return;if(!d||d.ok!==true)throw new Error(d&&d.error||'player_resume failed');derive(p,d.records||[]);p.error='';state.errors.delete(p.studentId)}catch(e){if(token!==state.token)return;p.loading=false;p.error=e.message;p.status='review';state.errors.add(p.studentId)}}
async function loadWord(token){try{const d=await jsonp('eap_word_summary',{section:state.section},{timeout:QA?1500:25000,tries:2});if(token!==state.token)return;if(!d||d.ok!==true)throw new Error(d&&d.error||'eap_word_summary failed');state.wordRows=Array.isArray(d.summaries)?d.summaries.map(normalizeWord):[];attachWord(state.wordRows)}catch(e){if(token===state.token)state.wordError=e.message}finally{if(token===state.token){state.wordSettled=true;checkFinished();scheduleRender()}}}
async function loadRoster(token){try{const d=await jsonp('teacher_students',{section:state.section,q:''},{timeout:QA?1800:25000,tries:1});if(token!==state.token)return;if(!d||d.ok!==true)throw new Error(d&&d.error||'teacher_students failed');(Array.isArray(d.students)?d.students:[]).forEach(x=>enqueueResume(ensureLearner(x)))}catch(e){if(token===state.token)state.rosterError=e.message}finally{if(token===state.token){state.rosterSettled=true;checkFinished();scheduleRender()}}}
function checkFinished(){if(state.wordSettled&&state.rosterSettled&&state.active===0&&!state.queue.length)state.finished=true}
function filtered(){const q=$('search').value.trim().toLowerCase(),st=$('status').value;return[...state.learners.values()].filter(p=>(!q||[p.studentId,p.studentName,p.section].join(' ').toLowerCase().includes(q))&&(!st||p.status===st)).sort((a,b)=>a.studentName.localeCompare(b.studentName)||a.studentId.localeCompare(b.studentId))}
function metrics(){const ls=[...state.learners.values()],hero=new Set(ls.filter(p=>p.records.length).map(p=>p.studentId)),word=new Set(ls.filter(p=>p.word.length).map(p=>p.studentId)),mastery=ls.flatMap(p=>p.mastery),exposure=ls.flatMap(p=>p.exposure),boss=ls.flatMap(p=>p.boss),heroScores=mastery.filter(r=>r.score>0).map(r=>r.score),wordScores=ls.map(p=>p.wordBest).filter(v=>v!=null);return{learners:ls.length,heroOnly:[...hero].filter(id=>!word.has(id)).length,wordOnly:[...word].filter(id=>!hero.has(id)).length,both:[...hero].filter(id=>word.has(id)).length,mastery:mastery.length,exposure:exposure.length,boss:boss.length,pending:boss.filter(r=>bossState(r)[0]==='pending').length,reviewed:boss.filter(r=>bossState(r)[0]==='pass').length,heroAvg:avg(heroScores),wordAvg:avg(wordScores),support:ls.filter(p=>p.status==='review').length}}
function renderCards(){const m=metrics(),cards=[['ผู้เรียนทั้งหมด',m.learners],['EAP Hero เท่านั้น',m.heroOnly],['Word Quest เท่านั้น',m.wordOnly],['เล่นทั้งสองเกม',m.both],['Mastery records',m.mastery],['Exposure touchpoints',m.exposure],['Boss Speaking evidence',m.boss],['Boss รอตรวจ',m.pending],['Boss ตรวจแล้ว',m.reviewed],['Hero Mastery average',m.heroAvg==null?'—':m.heroAvg],['Word Best Accuracy',m.wordAvg==null?'—':m.wordAvg+'%'],['ต้องช่วยทบทวน',m.support]];$('cards').innerHTML=cards.map(x=>`<div class="card"><div class="label">${esc(x[0])}</div><div class="value">${esc(x[1])}</div></div>`).join('')}
function empty(nc,msg='ยังไม่มีข้อมูลตามตัวกรองนี้'){return`<tr><td colspan="${nc}" class="empty">${esc(msg)}</td></tr>`}function badge(p){return p.loading?'<span class="pill info">กำลังตรวจ</span>':p.error?'<span class="pill fail">โหลด Hero ไม่สำเร็จ</span>':p.status==='review'?'<span class="pill pending">Needs support</span>':'<span class="pill pass">Active</span>'}
function renderOverview(ls){$('tableTitle').textContent='รายชื่อนักศึกษา';$('tableNote').textContent='Word Quest แสดงก่อนทันที; Hero เติมจาก player_resume ทีละคน แม้ teacher_students ช้า';$('head').innerHTML='<tr><th>รหัส</th><th>ชื่อผู้เรียน</th><th>ด่านปัจจุบัน</th><th>Mastery</th><th>Exposure</th><th>Boss Speaking</th><th>Hero avg.</th><th>Word Best</th><th>Status</th></tr>';$('body').innerHTML=ls.map(p=>`<tr class="row-click" data-id="${esc(p.studentId)}"><td><b>${esc(p.studentId)}</b></td><td>${esc(p.studentName)}</td><td>${esc(p.loading?'กำลังตรวจ…':p.currentRoute)}</td><td>${p.mastery.length}</td><td>${p.exposure.length}</td><td>${p.boss.length}</td><td>${p.heroAverage==null?'—':esc(p.heroAverage)}</td><td>${p.wordBest==null?'—':esc(p.wordBest)+'%'}</td><td>${badge(p)}${p.error?'<div class="small">'+esc(p.error)+'</div>':''}</td></tr>`).join('')||empty(9,state.finished?'ไม่พบผู้เรียน — ใช้ช่อง Student ID แล้วกด “โหลดรหัสนี้จาก Sheet”':'กำลังโหลด Word Quest / Hero roster…');bindRows()}
function renderMastery(ls){$('tableTitle').textContent='EAP Hero Mastery';$('tableNote').textContent='Core + Support และ Integrated เท่านั้น; Exposure ไม่ใช้ปลดล็อก';$('head').innerHTML='<tr><th>รหัส</th><th>ชื่อ</th><th>Route</th><th>Skill</th><th>Role</th><th>Best</th><th>Latest</th><th>Attempts</th><th>Passed</th><th>Updated</th></tr>';const rs=ls.flatMap(p=>p.mastery.map(r=>({p,r})));$('body').innerHTML=rs.map(({p,r})=>`<tr><td>${esc(p.studentId)}</td><td>${esc(p.studentName)}</td><td><b>${esc(r.routeId)}</b><div class="small">${esc(r.sessionTitle)}</div></td><td>${esc(r.skill)}</td><td><span class="pill info">${esc(r.role||'Mastery')}</span></td><td>${r.score}</td><td>${r.latest}</td><td>${r.attempts}</td><td>${r.passed?'<span class="pill pass">Passed</span>':'<span class="pill fail">Not yet</span>'}</td><td class="small">${esc(r.updatedAt||'—')}</td></tr>`).join('')||empty(10)}
function renderExposure(ls){$('tableTitle').textContent='Four-Skill Exposure';$('tableNote').textContent='บันทึกการสัมผัสทักษะเพิ่มเติม แต่ไม่ใช้ตัดสินการปลดล็อก';$('head').innerHTML='<tr><th>รหัส</th><th>ชื่อ</th><th>Route</th><th>Skill</th><th>Score</th><th>Attempts</th><th>Updated</th></tr>';const rs=ls.flatMap(p=>p.exposure.map(r=>({p,r})));$('body').innerHTML=rs.map(({p,r})=>`<tr><td>${esc(p.studentId)}</td><td>${esc(p.studentName)}</td><td><b>${esc(r.routeId)}</b></td><td>${esc(r.skill)}</td><td>${r.score}</td><td>${r.attempts}</td><td>${esc(r.updatedAt||'—')}</td></tr>`).join('')||empty(7)}
function renderBoss(ls){$('tableTitle').textContent='Boss Speaking Review';$('tableNote').textContent='คะแนนอัตโนมัติไม่ทำให้ Boss Speaking ผ่านแทนครู';$('head').innerHTML='<tr><th>รหัส</th><th>ชื่อ</th><th>Boss</th><th>Score</th><th>Review status</th><th>Canonical result</th><th>Attempts</th><th>Updated</th></tr>';const rs=ls.flatMap(p=>p.boss.map(r=>({p,r})));$('body').innerHTML=rs.map(({p,r})=>{const s=bossState(r);return`<tr><td>${esc(p.studentId)}</td><td>${esc(p.studentName)}</td><td><b>${esc(r.routeId)}</b></td><td>${r.score}</td><td>${esc(r.review||'—')}</td><td><span class="pill ${s[0]}">${esc(s[1])}</span></td><td>${r.attempts}</td><td>${esc(r.updatedAt||'—')}</td></tr>`}).join('')||empty(8)}
function renderWord(ls){$('tableTitle').textContent='EAP Word Quest';$('tableNote').textContent=state.wordSettled?(state.wordError?'Word Quest โหลดไม่สำเร็จ: '+state.wordError:'ใช้ summary ต่อผู้เรียน/Session จาก Sheet'):'กำลังโหลด Word Quest summary…';$('head').innerHTML='<tr><th>รหัส</th><th>ชื่อ</th><th>Session</th><th>Title</th><th>Best Accuracy</th><th>Best Score</th><th>Attempts</th><th>Last Played</th><th>Weak words</th></tr>';const rs=ls.flatMap(p=>p.word.map(r=>({p,r})));$('body').innerHTML=rs.map(({p,r})=>`<tr><td>${esc(p.studentId)}</td><td>${esc(p.studentName)}</td><td><b>${esc(r.sessionId)}</b></td><td>${esc(r.sessionTitle||'')}</td><td>${esc(r.bestAccuracy??'—')}%</td><td>${esc(r.bestScore??'—')}</td><td>${esc(r.attempts??'—')}</td><td>${esc(r.lastPlayed||r.updatedAt||'—')}</td><td>${esc((r.weakWords||[]).join(', ')||'—')}</td></tr>`).join('')||empty(9,state.wordSettled?'ยังไม่มีข้อมูล Word Quest':'กำลังโหลด Word Quest summary…')}
function renderSupport(ls){const rs=ls.filter(p=>p.status==='review'||p.error);$('tableTitle').textContent='Needs Support';$('tableNote').textContent='รวม Boss รอตรวจ, Mastery ที่ยังไม่ผ่าน และรายการโหลด Hero ไม่สำเร็จ';$('head').innerHTML='<tr><th>รหัส</th><th>ชื่อ</th><th>ด่านปัจจุบัน</th><th>Boss pending</th><th>Mastery not passed</th><th>Word Best</th><th>ปัญหา</th><th>Status</th></tr>';$('body').innerHTML=rs.map(p=>`<tr class="row-click" data-id="${esc(p.studentId)}"><td>${esc(p.studentId)}</td><td>${esc(p.studentName)}</td><td>${esc(p.currentRoute)}</td><td>${p.boss.filter(r=>bossState(r)[0]==='pending').length}</td><td>${p.mastery.filter(r=>!r.passed).length}</td><td>${p.wordBest==null?'—':p.wordBest+'%'}</td><td>${esc(p.error||'—')}</td><td>${badge(p)}</td></tr>`).join('')||empty(8);bindRows()}
function renderTable(){const ls=filtered();if(state.activeTab==='mastery')renderMastery(ls);else if(state.activeTab==='exposure')renderExposure(ls);else if(state.activeTab==='boss')renderBoss(ls);else if(state.activeTab==='word')renderWord(ls);else if(state.activeTab==='support')renderSupport(ls);else renderOverview(ls)}
function renderStatus(){const pct=state.total?Math.min(100,Math.round(state.done/state.total*100)):(state.finished?100:0),source=[];if(state.wordSettled)source.push(state.wordError?'Word error':'Word ready');if(state.rosterSettled)source.push(state.rosterError?'Hero roster timeout':'Hero roster ready');$('progressBar').style.width=pct+'%';let text;if(!state.wordSettled&&!state.rosterSettled)text='กำลังโหลด Word Quest และรายชื่อ Hero พร้อมกัน…';else if(!state.finished)text=`พบผู้เรียน ${state.learners.size} คน · ตรวจ Hero แล้ว ${state.done}/${state.total}`;else text=`แสดงผู้เรียน ${state.learners.size} คน · ตรวจ Hero ${state.done}/${state.total}${state.errors.size?' · ผิดพลาด '+state.errors.size+' คน':''}`;if(state.rosterError)text+=' · Hero roster ตอบช้า—ยังใช้ Word Quest/ค้นรหัสตรงได้';$('statusText').innerHTML=`<span class="live-dot ${state.finished?(state.learners.size?'ok':'bad'):''}"></span>${esc(text)}`;$('sourceInfo').textContent=source.join(' · ')||'Sheet/Cloud authority';$('retry').disabled=!state.errors.size}
function render(){renderCards();renderTable();renderStatus()}function scheduleRender(){clearTimeout(renderTimer);renderTimer=setTimeout(render,70)}function bindRows(){$('body').querySelectorAll('[data-id]').forEach(tr=>tr.onclick=()=>openDetail(tr.dataset.id))}
function openDetail(id){const p=state.learners.get(txt(id));if(!p)return;const d=$('detail');d.classList.remove('hidden');d.innerHTML=`<h2 style="margin:0">${esc(p.studentName)} <span class="small">${esc(p.studentId)} · Section ${esc(p.section)}</span></h2><div class="detail-grid"><div class="mini">ด่านปัจจุบัน<strong>${esc(p.currentRoute)}</strong></div><div class="mini">Mastery<strong>${p.mastery.length}</strong></div><div class="mini">Exposure<strong>${p.exposure.length}</strong></div><div class="mini">Word Quest<strong>${p.word.length}</strong></div></div>${p.error?'<div class="error">'+esc(p.error)+'</div>':''}`;d.scrollIntoView({behavior:'smooth',block:'start'})}
async function loadAll(){const token=resetState();$('load').disabled=true;$('detail').classList.add('hidden');render();loadWord(token);loadRoster(token);const watchdog=setTimeout(()=>{if(token!==state.token)return;if(!state.wordSettled){state.wordSettled=true;state.wordError='watchdog timeout'}if(!state.rosterSettled){state.rosterSettled=true;state.rosterError='watchdog timeout'}checkFinished();scheduleRender()},QA?3000:32000);const wait=setInterval(()=>{if(token!==state.token||state.finished){clearInterval(wait);clearTimeout(watchdog);if(token===state.token)$('load').disabled=false}},200)}
function manualLoad(){const raw=$('search').value.trim();if(!raw)return;const parts=raw.split(/\s+/),id=parts.shift(),name=parts.join(' ')||('Student '+id),p=ensureLearner({studentId:id,studentName:name,section:state.section});enqueueResume(p);state.finished=false;scheduleRender()}
async function retryErrors(){[...state.errors].forEach(id=>{const p=state.learners.get(id);if(p){p.error='';p.loading=true;p.resumeQueued=false;p.resumeLoaded=false;state.errors.delete(id);enqueueResume(p)}});state.finished=false;scheduleRender()}
function exportCsv(){const h=['studentId','studentName','section','currentRoute','mastery','exposure','bossSpeaking','bossPending','heroAverage','wordBest','status','error'],rs=[...state.learners.values()].map(p=>[p.studentId,p.studentName,p.section,p.currentRoute,p.mastery.length,p.exposure.length,p.boss.length,p.boss.filter(r=>bossState(r)[0]==='pending').length,p.heroAverage,p.wordBest,p.status,p.error]),csv=[h,...rs].map(r=>r.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',')).join('\n'),a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));a.download='EAP-Analytics-'+state.section+'.csv';a.click();URL.revokeObjectURL(a.href)}
$('load').onclick=loadAll;$('manual').onclick=manualLoad;$('retry').onclick=retryErrors;$('csv').onclick=exportCsv;$('search').addEventListener('input',scheduleRender);$('status').addEventListener('change',scheduleRender);document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{state.activeTab=b.dataset.tab;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===b));renderTable()});
window.EAPProgressiveDashboard={version:'v20260714-WORD-FIRST-ANALYTICS-V2',state:()=>state,load:loadAll,metrics,injectForTest(payload){resetState();state.section=payload.section||'122';(payload.roster||[]).forEach(x=>ensureLearner(x));state.wordRows=(payload.word||[]).map(normalizeWord);attachWord(state.wordRows);Object.entries(payload.records||{}).forEach(([id,rows])=>{const p=ensureLearner({studentId:id,studentName:id,section:state.section});derive(p,rows)});state.queue=[];state.active=0;state.wordSettled=true;state.rosterSettled=true;state.total=state.learners.size;state.done=state.total;state.finished=true;render();return metrics()}};
resetState();loadAll();
})();
