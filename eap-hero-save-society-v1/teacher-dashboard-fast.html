<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>เปิด EAP Learning Analytics</title>
  <meta name="robots" content="noindex">
  <style>
    :root{--ink:#102033;--muted:#607085;--line:#dbe4ee;--bg:#f4f7fb;--card:#fff;--navy:#17375e;--good:#087f5b}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--ink);font:16px/1.55 Arial,"Noto Sans Thai",system-ui,sans-serif;padding:20px}.card{width:min(680px,100%);background:var(--card);border:1px solid var(--line);border-radius:22px;padding:32px;box-shadow:0 18px 50px rgba(16,32,51,.10);text-align:center}.mark{width:62px;height:62px;margin:0 auto 15px;border-radius:18px;display:grid;place-items:center;background:#dff7ed;color:var(--good);font-size:30px}h1{margin:0;font-size:clamp(26px,5vw,38px)}p{color:var(--muted);margin:10px auto 22px;max-width:560px}.btn{display:inline-block;border-radius:13px;padding:13px 20px;background:var(--navy);color:#fff;text-decoration:none;font-weight:900}.small{font-size:13px;margin-top:18px}.dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:#f59e0b;margin-right:7px;animation:pulse 1s infinite alternate}@keyframes pulse{to{opacity:.35}}
  </style>
</head>
<body>
  <main class="card">
    <div class="mark">📊</div>
    <h1>EAP Learning Analytics</h1>
    <p><span class="dot"></span>กำลังเปิด Dashboard ตัวจริงจาก Google Apps Script ซึ่งเชื่อมกับ EAP Analytics และ Google Sheet โดยตรง</p>
    <a class="btn" id="openDashboard" href="https://script.google.com/macros/s/AKfycbwxHHHw6Pk4rMdDnTM_6jxcL2GYdABc0hHFOlc8r_NS4D-siLYv0P-OZg3cfINE9A8X5A/exec?action=eap_teacher_dashboard&section=122">เปิด EAP Analytics</a>
    <p class="small">หน้านี้เป็น Launcher เท่านั้น ไม่อ่านคะแนนหรือความคืบหน้าผ่าน localStorage และไม่เรียก teacher_students / eap_word_summary ข้ามโดเมน</p>
  </main>
  <script>
    (()=>{
      'use strict';
      const target=document.getElementById('openDashboard').href;
      window.EAP_ANALYTICS_LAUNCHER={version:'v20260714-SHEET-ANALYTICS-LAUNCHER-1',target};
      window.setTimeout(()=>window.location.replace(target),350);
    })();
  </script>
</body>
</html>
