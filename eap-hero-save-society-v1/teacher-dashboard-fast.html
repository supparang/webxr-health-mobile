<script>
(()=>{'use strict';
const ENDPOINT='https://script.google.com/macros/s/AKfycbwxHHHw6Pk4rMdDnTM_6jxcL2GYdABc0hHFOlc8r_NS4D-siLYv0P-OZg3cfINE9A8X5A/exec';
const ORDER=['S1','S2','S3','B1','S4','S5','S6','B2','S7','S8','S9','B3','S10','S11','S12','B4','S13','S14','S15','B5'];
const $=id=>document.getElementById(id);const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const n=(v,d=0)=>{const x=Number(v);return Number.isFinite(x)?x:d};const txt=v=>String(v??'').replace(/\s+/g,' ').trim();
const timeMs=v=>{const x=new Date(v||'').getTime();return Number.isFinite(x)?x:0};const avg=a=>a.length?Math.round(a.reduce((s,x)=>s+x,0)/a.length*100)/100:null;
let state={token:0,section:'122',activeTab:'overview',roster:[],learners:new Map(),word:[],wordLoaded:false,done:0,total:0,errors:new Set(),startedAt:0,finished:false};
let renderTimer=0;
function packRoute(routeId){const p=window.EAP_HERO_SESSION_CONTENT_PACK;return p&&Array.isArray(p.routes)?p.routes.find(r=>r.routeId===routeId)||null:null}
function jsonpOnce(action,params={},timeout=45000){return new Promise((resolve,reject)=>{const cb='eapDashCb_'+Date.now()+'_'+Math.random().toString(36).slice(2);const s=document.createElement('script');let ended=false;const timer=setTimeout(()=>finish(new Error(action+' timeout after '+Math.round(timeout/1000)+'s')),timeout);function finish(err,data){if(ended)return;ended=true;clearTimeout(timer);try{delete window[cb]}catch(_){window[cb]=undefined}s.remove();err?reject(err):resolve(data)}window[cb]=data=>finish(null,data);const u=new URL(ENDPOINT);u.searchParams.set('action',action);u.searchParams.set('callback',cb);Object.entries(params).forEach(([k,v])=>u.searchParams.set(k,String(v??'')));u.searchParams.set('_',Date.now());s.onerror=()=>finish(new Error(action+' network error'));s.src=u;document.head.appendChild(s)})}
async function jsonp(action,params={},opts={}){const tries=opts.tries||2,timeout=opts.timeout||45000;let last;for(let i=0;i<tries;i++){try{return await jsonpOnce(action,params,timeout)}catch(e){last=e;if(i+1<tries)await new Promise(r=>setTimeout(r,900*(i+1)))}}throw last}
function learnerBase(x){return {studentId:txt(x.studentId),studentName:txt(x.studentName)||'Unknown',section:txt(x.section)||state.section,rosterStatus:txt(x.status)||'active',rosterAverage:n(x.avgBestScore,0),loading:true,error:'',records:[],mastery:[],exposure:[],boss:[],heroAverage:null,currentRoute:'S1',word:[],wordBest:null,status:'loading'}}
function identityKey(id){return txt(id)}
function canonicalRecord(raw){const routeId=txt(raw.routeId||raw.sessionId||raw.session).toUpperCase();const skill=txt(raw.skill).toLowerCase();const route=packRoute(routeId);const role=txt(raw.skillRole||(route&&route.skillContract&&(route.skillContract[skill]||route.skillContract[skill.charAt(0).toUpperCase()+skill.slice(1)]))||(/^B[1-5]$/.test(routeId)?'Integrated':''));const review=txt(raw.teacherReviewStatus||raw.reviewFlag).toLowerCase();const score=n(raw.bestScore??raw.score,0);const latest=n(raw.latestScore??raw.score??raw.bestScore,0);const passed=raw.passed===true||String(raw.passed).toLowerCase()==='true'||score>=60;return {routeId,sessionTitle:txt(raw.sessionTitle||(route&&route.title)),skill,role,score,latest,accuracy:raw.bestAccuracy==null&&raw.accuracy==null?null:n(raw.bestAccuracy??raw.accuracy),passed,attempts:n(raw.attempts,1),review,reviewRequired:raw.teacherReviewRequired===true||String(raw.teacherReviewRequired).toLowerCase()==='true'||(/^B[1-5]$/.test(routeId)&&skill==='speaking'),updatedAt:txt(raw.latestAt||raw.updatedAt||raw.submittedAt),raw}}
function bossPass(r){if(!r.reviewRequired)return r.passed;return /reviewed|approved|accepted|passed|complete|completed/.test(r.review)&&!/pending|revise|revision|rework|needs[_ -]?work/.test(r.review)&&r.passed}
function statusOfBoss(r){if(/pending|revise|revision|rework|needs[_ -]?work/.test(r.review))return['pending','รอตรวจ/แก้ไข'];return bossPass(r)?['pass','ตรวจแล้ว']:['fail','ยังไม่ผ่าน']}
function dedupeRecords(rows){const map=new Map();(rows||[]).map(canonicalRecord).filter(r=>r.routeId&&r.skill).forEach(r=>{const k=r.routeId+'|'+r.skill;const old=map.get(k);if(!old){map.set(k,r);return}const newer=timeMs(r.updatedAt)>=timeMs(old.updatedAt);const merged=Object.assign({},newer?r:old);merged.score=Math.max(old.score,r.score);merged.latest=newer?r.latest:old.latest;merged.passed=old.passed||r.passed;merged.attempts=Math.max(old.attempts,r.attempts);if(!merged.review)merged.review=old.review||r.review;map.set(k,merged)});return [...map.values()].sort((a,b)=>ORDER.indexOf(a.routeId)-ORDER.indexOf(b.routeId)||a.skill.localeCompare(b.skill))}
function nextRoute(records){for(const rid of ORDER){const route=packRoute(rid);const required=route&&route.skillContract?Object.keys(route.skillContract).filter(k=>['Core','Support','Integrated'].includes(route.skillContract[k])):[];const req=required.length?required:(/^B/.test(rid)?['reading','listening','writing','speaking']:[]);if(!req.length)continue;const ok=req.every(skill=>{const r=records.find(x=>x.routeId===rid&&x.skill===skill);return r&&(rid[0]==='B'&&skill==='speaking'?bossPass(r):r.passed)});if(!ok)return rid}return'COMPLETE'}
function deriveLearner(person,records){person.records=dedupeRecords(records);person.mastery=person.records.filter(r=>['Core','Support','Integrated'].includes(r.role)||(/^B/.test(r.routeId)&&r.role!=='Exposure'));person.exposure=person.records.filter(r=>r.role==='Exposure');person.boss=person.records.filter(r=>/^B[1-5]$/.test(r.routeId)&&r.skill==='speaking');const scores=person.mastery.filter(r=>r.score>0).map(r=>r.score);person.heroAverage=avg(scores);person.currentRoute=nextRoute(person.records);person.loading=false;const pending=person.boss.some(r=>statusOfBoss(r)[0]==='pending');const failed=person.mastery.some(r=>!r.passed);person.status=pending||failed||person.rosterStatus==='review'?'review':'active';return person}
function attachWord(){const byId=new Map();state.word.forEach(r=>{const id=identityKey(r.studentId);if(!byId.has(id))byId.set(id,[]);byId.get(id).push(r)});byId.forEach((rows,id)=>{if(!state.learners.has(id))state.learners.set(id,learnerBase({studentId:id,studentName:rows[0].studentName,section:state.section,status:'active'}));const p=state.learners.get(id);p.word=rows;const vals=rows.map(r=>n(r.bestAccuracy??r.accuracy,-1)).filter(x=>x>=0);p.wordBest=avg(vals);if(!p.loading&&p.status!=='review'&&rows.some(r=>String(r.passed).toLowerCase()==='false'))p.status='review'})}
function filteredLearners(){const q=$('search').value.trim().toLowerCase(),st=$('status').value;return [...state.learners.values()].filter(p=>(!q||[p.studentId,p.studentName,p.section].join(' ').toLowerCase().includes(q))&&(!st||p.status===st)).sort((a,b)=>a.studentName.localeCompare(b.studentName)||a.studentId.localeCompare(b.studentId))}
function metrics(){const learners=[...state.learners.values()],heroIds=new Set(learners.filter(p=>p.records.length).map(p=>p.studentId)),wordIds=new Set(learners.filter(p=>p.word.length).map(p=>p.studentId)),mastery=learners.flatMap(p=>p.mastery),exposure=learners.flatMap(p=>p.exposure),boss=learners.flatMap(p=>p.boss),heroScores=mastery.filter(r=>r.score>0).map(r=>r.score),wordScores=learners.map(p=>p.wordBest).filter(v=>v!=null);return {learners:learners.length,heroOnly:[...heroIds].filter(id=>!wordIds.has(id)).length,wordOnly:[...wordIds].filter(id=>!heroIds.has(id)).length,both:[...heroIds].filter(id=>wordIds.has(id)).length,mastery:mastery.length,exposure:exposure.length,boss:boss.length,pending:boss.filter(r=>statusOfBoss(r)[0]==='pending').length,reviewed:boss.filter(r=>statusOfBoss(r)[0]==='pass').length,heroAvg:avg(heroScores),wordAvg:avg(wordScores),support:learners.filter(p=>p.status==='review').length}}
function renderCards(){const m=metrics();const cards=[['ผู้เรียนทั้งหมด',m.learners],['EAP Hero เท่านั้น',m.heroOnly],['Word Quest เท่านั้น',m.wordOnly],['เล่นทั้งสองเกม',m.both],['Mastery records',m.mastery],['Exposure touchpoints',m.exposure],['Boss Speaking evidence',m.boss],['Boss รอตรวจ',m.pending],['Boss ตรวจแล้ว',m.reviewed],['Hero Mastery average',m.heroAvg==null?'—':m.heroAvg],['Word Best Accuracy',m.wordAvg==null?'—':m.wordAvg+'%'],['ต้องช่วยทบทวน',m.support]];$('cards').innerHTML=cards.map(x=>`<div class="card"><div class="label">${esc(x[0])}</div><div class="value">${esc(x[1])}</div></div>`).join('')}
function tableEmpty(n,msg='ยังไม่มีข้อมูลตามตัวกรองนี้'){return `<tr><td colspan="${n}" class="empty">${esc(msg)}</td></tr>`}
function stateBadge(p){return p.loading?'<span class="pill info">กำลังตรวจ</span>':p.error?'<span class="pill fail">โหลดไม่สำเร็จ</span>':p.status==='review'?'<span class="pill pending">Needs support</span>':'<span class="pill pass">Active</span>'}
function renderOverview(list){$('tableTitle').textContent='รายชื่อนักศึกษา';$('tableNote').textContent='รายชื่อมาจาก teacher_students ก่อน แล้วเติม Mastery / Exposure / Boss จาก player_resume ทีละคน';$('head').innerHTML='<tr><th>รหัส</th><th>ชื่อผู้เรียน</th><th>ด่านปัจจุบัน</th><th>Mastery</th><th>Exposure</th><th>Boss Speaking</th><th>Hero avg.</th><th>Word Best</th><th>Status</th></tr>';$('body').innerHTML=list.map(p=>`<tr class="row-click" data-id="${esc(p.studentId)}"><td><b>${esc(p.studentId)}</b></td><td>${esc(p.studentName)}</td><td>${esc(p.loading?'กำลังตรวจ…':p.currentRoute)}</td><td>${p.mastery.length}</td><td>${p.exposure.length}</td><td>${p.boss.length}</td><td>${p.heroAverage==null?'—':esc(p.heroAverage)}</td><td>${p.wordBest==null?'—':esc(p.wordBest)+'%'}</td><td>${stateBadge(p)}${p.error?'<div class="small">'+esc(p.error)+'</div>':''}</td></tr>`).join('')||tableEmpty(9);bindRows()}
function renderMastery(list){$('tableTitle').textContent='EAP Hero Mastery';$('tableNote').textContent='Core + Support และ Integrated เท่านั้น; Exposure ไม่ใช้ปลดล็อก';$('head').innerHTML='<tr><th>รหัส</th><th>ชื่อ</th><th>Route</th><th>Skill</th><th>Role</th><th>Best</th><th>Latest</th><th>Attempts</th><th>Passed</th><th>Updated</th></tr>';const rows=list.flatMap(p=>p.mastery.map(r=>({p,r})));$('body').innerHTML=rows.map(({p,r})=>`<tr><td>${esc(p.studentId)}</td><td>${esc(p.studentName)}</td><td><b>${esc(r.routeId)}</b><div class="small">${esc(r.sessionTitle)}</div></td><td>${esc(r.skill)}</td><td><span class="pill info">${esc(r.role||'Mastery')}</span></td><td>${r.score}</td><td>${r.latest}</td><td>${r.attempts}</td><td>${r.passed?'<span class="pill pass">Passed</span>':'<span class="pill fail">Not yet</span>'}</td><td class="small">${esc(r.updatedAt||'—')}</td></tr>`).join('')||tableEmpty(10)}
function renderExposure(list){$('tableTitle').textContent='Four-Skill Exposure';$('tableNote').textContent='บันทึกการสัมผัสทักษะเพิ่มเติม แต่ไม่ใช้ตัดสินการปลดล็อก Session';$('head').innerHTML='<tr><th>รหัส</th><th>ชื่อ</th><th>Route</th><th>Skill</th><th>Role</th><th>Score</th><th>Attempts</th><th>Updated</th></tr>';const rows=list.flatMap(p=>p.exposure.map(r=>({p,r})));$('body').innerHTML=rows.map(({p,r})=>`<tr><td>${esc(p.studentId)}</td><td>${esc(p.studentName)}</td><td><b>${esc(r.routeId)}</b><div class="small">${esc(r.sessionTitle)}</div></td><td>${esc(r.skill)}</td><td><span class="pill exposure">Exposure</span></td><td>${r.score}</td><td>${r.attempts}</td><td class="small">${esc(r.updatedAt||'—')}</td></tr>`).join('')||tableEmpty(8)}
function renderBoss(list){$('tableTitle').textContent='Boss Speaking Review';$('tableNote').textContent='เฉพาะ Boss Speaking เท่านั้นที่ต้อง Teacher Review; คะแนนอัตโนมัติไม่ทำให้ผ่านแทนครู';$('head').innerHTML='<tr><th>รหัส</th><th>ชื่อ</th><th>Boss</th><th>Score</th><th>Review status</th><th>Canonical result</th><th>Attempts</th><th>Updated</th></tr>';const rows=list.flatMap(p=>p.boss.map(r=>({p,r})));$('body').innerHTML=rows.map(({p,r})=>{const st=statusOfBoss(r);return `<tr><td>${esc(p.studentId)}</td><td>${esc(p.studentName)}</td><td><b>${esc(r.routeId)}</b></td><td>${r.score}</td><td>${esc(r.review||'—')}</td><td><span class="pill ${st[0]}">${esc(st[1])}</span></td><td>${r.attempts}</td><td class="small">${esc(r.updatedAt||'—')}</td></tr>`}).join('')||tableEmpty(8)}
function renderWord(list){$('tableTitle').textContent='EAP Word Quest';$('tableNote').textContent=state.wordLoaded?'ใช้ summary ต่อผู้เรียน/Session จาก Sheet':'กำลังโหลด Word Quest summary…';$('head').innerHTML='<tr><th>รหัส</th><th>ชื่อ</th><th>Session</th><th>Title</th><th>Best Accuracy</th><th>Best Score</th><th>Attempts</th><th>Last Played</th><th>Weak words</th></tr>';const rows=list.flatMap(p=>(p.word||[]).map(r=>({p,r})));$('body').innerHTML=rows.map(({p,r})=>`<tr><td>${esc(p.studentId)}</td><td>${esc(p.studentName)}</td><td><b>${esc(r.sessionId)}</b></td><td>${esc(r.sessionTitle||'')}</td><td>${esc(r.bestAccuracy??'—')}%</td><td>${esc(r.bestScore??'—')}</td><td>${esc(r.attempts??'—')}</td><td class="small">${esc(r.lastPlayed||r.updatedAt||'—')}</td><td class="small">${esc(Array.isArray(r.weakWords)?r.weakWords.join(', '):r.weakWordsJson||'—')}</td></tr>`).join('')||tableEmpty(9,state.wordLoaded?'ยังไม่มีข้อมูล Word Quest':'กำลังโหลด Word Quest summary…')}
function renderSupport(list){const rows=list.filter(p=>p.status==='review'||p.error);$('tableTitle').textContent='Needs Support';$('tableNote').textContent='รวม Boss รอตรวจ, Mastery ที่ยังไม่ผ่าน, roster review และรายการที่โหลดหลักฐานไม่สำเร็จ';$('head').innerHTML='<tr><th>รหัส</th><th>ชื่อ</th><th>ด่านปัจจุบัน</th><th>Boss pending</th><th>Mastery not passed</th><th>Word Best</th><th>ปัญหาการโหลด</th><th>Status</th></tr>';$('body').innerHTML=rows.map(p=>`<tr class="row-click" data-id="${esc(p.studentId)}"><td>${esc(p.studentId)}</td><td>${esc(p.studentName)}</td><td>${esc(p.currentRoute)}</td><td>${p.boss.filter(r=>statusOfBoss(r)[0]==='pending').length}</td><td>${p.mastery.filter(r=>!r.passed).length}</td><td>${p.wordBest==null?'—':esc(p.wordBest)+'%'}</td><td class="small">${esc(p.error||'—')}</td><td>${stateBadge(p)}</td></tr>`).join('')||tableEmpty(8);bindRows()}
function renderTable(){const list=filteredLearners();if(state.activeTab==='mastery')renderMastery(list);else if(state.activeTab==='exposure')renderExposure(list);else if(state.activeTab==='boss')renderBoss(list);else if(state.activeTab==='word')renderWord(list);else if(state.activeTab==='support')renderSupport(list);else renderOverview(list)}
function render(){renderCards();renderTable();renderStatus()}
function scheduleRender(){clearTimeout(renderTimer);renderTimer=setTimeout(render,80)}
function renderStatus(){const pct=state.total?Math.round(state.done/state.total*100):(state.finished?100:0);$('progressBar').style.width=pct+'%';const errors=state.errors.size;let text;if(!state.roster.length&&!state.finished)text='กำลังโหลดรายชื่อผู้เรียนจาก Sheet…';else if(!state.finished)text=`ตรวจหลักฐานแล้ว ${state.done}/${state.total} คน${errors?' · ผิดพลาด '+errors+' คน':''}`;else text=`ตรวจเสร็จ ${state.done}/${state.total} คน${errors?' · มี '+errors+' คนที่ต้องลองใหม่':''}`;$('statusText').innerHTML=`<span class="live-dot ${state.finished?(errors?'bad':'ok'):''}"></span>${esc(text)}`;$('sourceInfo').textContent=`teacher_students + player_resume${state.wordLoaded?' + eap_word_summary':''}`;$('retry').disabled=!errors}
function bindRows(){$('body').querySelectorAll('[data-id]').forEach(tr=>tr.onclick=()=>openDetail(tr.dataset.id))}
function openDetail(id){const p=state.learners.get(identityKey(id));if(!p)return;const d=$('detail');d.classList.remove('hidden');const pending=p.boss.filter(r=>statusOfBoss(r)[0]==='pending').length;d.innerHTML=`<h2 style="margin:0">${esc(p.studentName)} <span class="small">${esc(p.studentId)} · Section ${esc(p.section)}</span></h2><div class="detail-grid"><div class="mini">ด่านปัจจุบัน<strong>${esc(p.currentRoute)}</strong></div><div class="mini">Mastery records<strong>${p.mastery.length}</strong></div><div class="mini">Exposure touchpoints<strong>${p.exposure.length}</strong></div><div class="mini">Boss pending<strong>${pending}</strong></div></div>${p.error?'<div class="error">'+esc(p.error)+'</div>':''}<div class="section"><table><thead><tr><th>Route</th><th>Skill</th><th>Role</th><th>Best / Latest</th><th>Attempts</th><th>Status</th><th>Updated</th></tr></thead><tbody>${p.records.map(r=>{const isBoss=/^B/.test(r.routeId)&&r.skill==='speaking',st=isBoss?statusOfBoss(r):[r.passed?'pass':'fail',r.passed?'ผ่าน':'ยังไม่ผ่าน'];return `<tr><td><b>${esc(r.routeId)}</b><div class="small">${esc(r.sessionTitle)}</div></td><td>${esc(r.skill)}</td><td>${esc(r.role||'—')}</td><td>${r.score} / ${r.latest}</td><td>${r.attempts}</td><td><span class="pill ${st[0]}">${esc(st[1])}</span>${r.review?'<div class="small">'+esc(r.review)+'</div>':''}</td><td class="small">${esc(r.updatedAt||'—')}</td></tr>`}).join('')||tableEmpty(7,'ยังไม่มีหลักฐานใน Sheet')}</tbody></table></div>`;d.scrollIntoView({behavior:'smooth',block:'start'})}
async function loadWord(token){try{const data=await jsonp('eap_word_summary',{section:state.section},{timeout:70000,tries:2});if(token!==state.token)return;if(!data||data.ok!==true)throw new Error(data&&data.error||'eap_word_summary failed');state.word=Array.isArray(data.summaries)?data.summaries.map(r=>Object.assign({},r,{studentId:txt(r.studentId),studentName:txt(r.studentName)})):[];state.wordLoaded=true;attachWord();scheduleRender()}catch(e){if(token===state.token){state.wordLoaded=false;$('sourceInfo').textContent='Word Quest โหลดไม่สำเร็จ: '+e.message;scheduleRender()}}}
async function loadPerson(person,token){try{const d=await jsonp('player_resume',{studentId:person.studentId,studentName:person.studentName,section:state.section},{timeout:70000,tries:2});if(token!==state.token)return;if(!d||d.ok!==true)throw new Error(d&&d.error||'player_resume failed');deriveLearner(person,d.records||[]);person.error='';state.errors.delete(person.studentId)}catch(e){if(token!==state.token)return;person.loading=false;person.error=e.message;person.status='review';state.errors.add(person.studentId)}finally{if(token===state.token){state.done++;scheduleRender()}}}
async function runWorkers(people,token,limit=4){let cursor=0;async function worker(){while(token===state.token){const i=cursor++;if(i>=people.length)return;await loadPerson(people[i],token)}}await Promise.all(Array.from({length:Math.min(limit,people.length||1)},worker))}
async function loadAll(){const token=++state.token;state={token,section:txt($('section').value)||'122',activeTab:state.activeTab,roster:[],learners:new Map(),word:[],wordLoaded:false,done:0,total:0,errors:new Set(),startedAt:Date.now(),finished:false};$('load').disabled=true;$('detail').classList.add('hidden');render();try{const data=await jsonp('teacher_students',{section:state.section,q:''},{timeout:70000,tries:2});if(token!==state.token)return;if(!data||data.ok!==true)throw new Error(data&&data.error||'teacher_students failed');state.roster=Array.isArray(data.students)?data.students:[];state.roster.forEach(x=>{const p=learnerBase(x);state.learners.set(identityKey(p.studentId),p)});state.total=state.roster.length;scheduleRender();const wordPromise=loadWord(token);await runWorkers([...state.learners.values()],token,4);await Promise.race([wordPromise,new Promise(r=>setTimeout(r,2500))]);if(token!==state.token)return;state.finished=true;scheduleRender()}catch(e){if(token!==state.token)return;state.finished=true;$('body').innerHTML=tableEmpty(1,'โหลดรายชื่อไม่สำเร็จ: '+e.message)}finally{if(token===state.token)$('load').disabled=false}}
async function retryErrors(){const token=state.token,people=[...state.errors].map(id=>state.learners.get(id)).filter(Boolean);people.forEach(p=>{p.loading=true;p.error='';state.errors.delete(p.studentId)});state.finished=false;state.done=Math.max(0,state.total-people.length);scheduleRender();await runWorkers(people,token,2);if(token===state.token){state.finished=true;scheduleRender()}}
function exportCsv(){const head=['studentId','studentName','section','currentRoute','heroMasteryRecords','exposureTouchpoints','bossSpeakingEvidence','bossPending','heroAverage','wordBestAccuracy','status','loadError'];const rows=[...state.learners.values()].map(p=>[p.studentId,p.studentName,p.section,p.currentRoute,p.mastery.length,p.exposure.length,p.boss.length,p.boss.filter(r=>statusOfBoss(r)[0]==='pending').length,p.heroAverage,p.wordBest,p.status,p.error]);const csv=[head,...rows].map(r=>r.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));a.download='EAP-Progressive-Analytics-'+state.section+'.csv';a.click();URL.revokeObjectURL(a.href)}
$('load').onclick=loadAll;$('retry').onclick=retryErrors;$('csv').onclick=exportCsv;$('search').addEventListener('input',scheduleRender);$('status').addEventListener('change',scheduleRender);document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{state.activeTab=b.dataset.tab;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===b));renderTable()});
window.EAPProgressiveDashboard={version:'v20260714-PROGRESSIVE-ANALYTICS-V1',state:()=>state,load:loadAll,metrics,injectForTest(payload){state.token++;state.section=payload.section||'122';state.roster=payload.roster||[];state.learners=new Map();state.roster.forEach(x=>{const p=learnerBase(x);deriveLearner(p,(payload.records&&payload.records[p.studentId])||[]);state.learners.set(p.studentId,p)});state.word=payload.word||[];state.wordLoaded=true;attachWord();state.total=state.roster.length;state.done=state.total;state.finished=true;render();return metrics()}};
loadAll();
})();
</script>
