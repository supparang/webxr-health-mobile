<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>EAP Hero Teaching Pack — 15 Sessions</title><style>body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;line-height:1.55;margin:0;background:#eef4f8;color:#132236}main{max-width:1120px;margin:auto;padding:28px}.card{background:#fff;border-radius:20px;padding:24px;margin:0 0 24px;box-shadow:0 8px 28px #18324a18}h1{font-size:2.2rem;margin:.2em 0}h2{margin:.25em 0}h3{color:#0d5b73}.badge{display:inline-block;background:#0d5b73;color:#fff;padding:5px 10px;border-radius:999px;font-weight:700}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}article,.worksheet{border:1px solid #cfdae2;border-radius:14px;padding:14px}table{width:100%;border-collapse:collapse;margin:12px 0}th,td{border:1px solid #c9d4dd;padding:9px;vertical-align:top}th{background:#e7f2f5}.note{background:#fff7d6;padding:10px;border-radius:10px}.teacher{background:#e8f7ee;padding:12px;border-left:5px solid #2f855a}ul,ol{padding-left:1.3rem}li{margin:.35rem 0}nav a{display:inline-block;margin:4px;padding:6px 9px;border-radius:8px;background:#e7f2f5;color:#0d5b73;text-decoration:none}@media(max-width:760px){.grid{grid-template-columns:1fr}main{padding:12px}.card{padding:17px}}</style></head><body><main id="root"><section class="card"><h1>กำลังโหลด Teaching Pack…</h1></section></main><script src="./eap-session-content-pack-v20260708.js?v=20260714-canonical-content-rc1"></script><script>
(()=>{'use strict';const p=window.EAP_HERO_SESSION_CONTENT_PACK,r=document.getElementById('root'),e=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));if(!p){r.innerHTML='<section class="card"><h1>โหลด Content Pack ไม่สำเร็จ</h1></section>';return}const normal=p.routes.filter(x=>x.routeType==='normal_session'),boss=p.routes.filter(x=>x.routeType==='boss_gate');const nav=normal.map((x,i)=>`<a href="#w${i+1}">W${i+1}</a>`).join('');const bossRows=boss.map(x=>`<tr><td>${e(x.routeId)}</td><td>${e(x.subtitle)}</td><td>${e(x.studentProduct)}</td><td>4 skills; Boss Speaking รอ Teacher Review</td></tr>`).join('');const weeks=normal.map((x,i)=>{const c=x.skillContract,core=Object.keys(c).filter(k=>c[k]==='Core').join(', '),support=Object.keys(c).filter(k=>c[k]==='Support').join(', '),exposure=Object.keys(c).filter(k=>c[k]==='Exposure').join(', '),v=x.microLesson.vocabulary.map(a=>`<li><b>${e(a.term)}</b> — ${e(a.meaningTH)}<br><small>${e(a.example)}</small></li>`).join(''),f=x.microLesson.usefulFrames.map(a=>`<li>${e(a)}</li>`).join('');return `<section class="card" id="w${i+1}"><span class="badge">Week ${i+1} · ${e(x.routeId)} · ${e(x.cefrBand)}</span><h2>${e(x.title)}</h2><p>${e(x.subtitle)}</p><div class="grid"><article><h3>ผลลัพธ์และชิ้นงาน</h3><p>${e(x.studentOutcome)}</p><p><b>ชิ้นงาน:</b> ${e(x.studentProduct)}</p><p><b>กลยุทธ์:</b> ${e(x.sessionStrategy)}</p></article><article><h3>Skill Contract</h3><p><b>Core:</b> ${e(core)}<br><b>Support:</b> ${e(support)}<br><b>Exposure:</b> ${e(exposure)}</p><p class="note">Core + Support ใช้ตัดสินการผ่าน ส่วน Exposure เก็บเป็นหลักฐานและไม่ล็อกด่าน</p></article></div><div class="grid"><article><h3>คำศัพท์เป้าหมาย</h3><ul>${v}</ul></article><article><h3>Useful Language</h3><ul>${f}</ul></article></div><h3>แผนสอน 150 นาที</h3><ol><li><b>Warm-up 10 นาที:</b> วิเคราะห์ตัวอย่างผิด–ถูกหนึ่งคู่</li><li><b>Mini lesson 25 นาที:</b> สาธิต “${e(x.sessionStrategy)}” แบบ think-aloud</li><li><b>Guided practice 25 นาที:</b> ทำตัวอย่างร่วมกันพร้อมอธิบายเหตุผล</li><li><b>Game mission 45 นาที:</b> ทำ Core และ Support; Exposure เป็นกิจกรรมเสริม</li><li><b>Peer evidence check 20 นาที:</b> ตรวจ source evidence และ limitation</li><li><b>Reflection 15 นาที:</b> สิ่งที่เรียนรู้ หลักฐานที่ช่วย และ next action</li><li><b>Exit ticket 10 นาที:</b> ส่งชิ้นงานสั้นและ self-rating A2–B1+</li></ol><h3>ใบงานนักศึกษา</h3><div class="worksheet"><p>1) Task purpose: ____________________</p><p>2) Source/scenario ID: ______________</p><p>3) Evidence used: ___________________</p><p>4) My response/product: ______________</p><p>5) Limitation/uncertainty: ___________</p><p>6) Reflection/next action: ___________</p></div><h3>Rubric 10 คะแนน</h3><table><tr><th>องค์ประกอบ</th><th>คะแนน</th><th>หลักฐาน</th></tr><tr><td>ตอบตรงวัตถุประสงค์</td><td>2</td><td>ชิ้นงานตรงโจทย์</td></tr><tr><td>ใช้หลักฐานจาก source</td><td>3</td><td>เฉพาะและไม่แต่งเพิ่ม</td></tr><tr><td>การจัดระบบภาษา</td><td>2</td><td>โครงสร้าง/คำเชื่อม</td></tr><tr><td>ข้อจำกัด</td><td>1</td><td>ไม่สรุปเกินข้อมูล</td></tr><tr><td>Reflection/next action</td><td>2</td><td>เฉพาะเจาะจงและทำได้จริง</td></tr></table><p class="teacher"><b>กิจกรรมอาจารย์ต่างชาติ:</b> แยกจากเกม ใช้ฝึกสนทนา/feedback 15–20 นาที ไม่เป็นเงื่อนไขปลดล็อกและไม่แทนหลักฐานในระบบ</p></section>`}).join('');r.innerHTML=`<section class="card"><span class="badge">Section 122 · CEFR A2–B1+ · RC1</span><h1>EAP Hero: Save the Society</h1><h2>Teaching Pack ครบ 15 Sessions</h2><p>ใช้คู่กับเกม S1–S15 และ B1–B5 โดย Google Sheet/Cloud เป็นแหล่งข้อมูลทางการด้าน progress, pass/fail, evidence และ unlock</p><nav>${nav}<a href="#boss">Boss Gates</a></nav></section><section class="card" id="boss"><h2>Boss Gate Plan</h2><table><tr><th>Gate</th><th>ครอบคลุม</th><th>ชิ้นงาน</th><th>นโยบาย</th></tr>${bossRows}</table><p class="note">Feedback codes: CL, PR, FL, ST, EV, QA. Transcript หรือ AI ไม่ตัดสิน pronunciation, grammar หรือ pass/fail อัตโนมัติ</p></section>${weeks}<section class="card"><h2>Release-use checklist</h2><ol><li>ทดสอบนักศึกษาใหม่และนักศึกษาที่มีข้อมูล Sheet</li><li>ตรวจลำดับ S1→B5 และ Exposure ไม่บล็อก</li><li>Replay อย่างน้อย 3 รอบต่อ Session</li><li>ตรวจ Best, Latest, attempt history และ Boss Speaking review</li><li>เปิดเกมด้วย <code>?eapqa=1</code> ก่อนสอน</li></ol></section>`})();
</script></body></html>
