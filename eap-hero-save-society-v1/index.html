<body>
  <div id="app" class="app">
    <noscript>เกมนี้ต้องเปิดใช้งาน JavaScript ก่อนค่ะ</noscript>
  </div>

  <script src="./eap-gold-item-bank.js?v=20260628-v1z82"></script>
  <script src="./eap-hero.js?v=20260628-v1z82"></script>

<script>
(function eapBootFallback(){
  function bootCheck(){
    var app = document.getElementById('app');
    if(!app) return;
    var blank = ((app.textContent||'').trim().length < 10 && (app.innerHTML||'').trim().length < 50);
    if(blank && window.EAPHero){
      if(typeof EAPHero.forceHome === 'function') EAPHero.forceHome();
      else if(typeof EAPHero.map === 'function') EAPHero.map();
    }
  }
  window.addEventListener('load', function(){
    setTimeout(bootCheck, 600);
    setTimeout(bootCheck, 1500);
  });
})();
</script>

</body>
</html>
