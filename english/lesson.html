<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>English Lesson A2</title>
  <meta name="theme-color" content="#0f172a" />

  <style>
    .screen { display: none; }
    .screen.active { display: block; }
  </style>

  <link rel="stylesheet" href="./css/lesson.css" />
</head>
<body>
  <div id="app" class="app">
    <header class="hud">
      <div class="hud-left">
        <div class="pill">Unit: <span id="hudUnit">A2 CS</span></div>
        <div class="pill">Diff: <span id="hudDiff">-</span></div>
      </div>

      <div class="hud-center">
        <div class="boss-wrap">
          <div class="boss-label">BOSS</div>
          <div class="boss-bar">
            <div id="bossBarFill" class="boss-bar-fill" style="width:100%"></div>
          </div>
          <div id="bossHpText" class="boss-hp-text">100 / 100</div>
        </div>
      </div>

      <div class="hud-right">
        <div class="pill">Score: <span id="hudScore">0</span></div>
        <div class="pill">Combo: <span id="hudCombo">0</span></div>
        <div class="pill">Lives: <span id="hudLives">3</span></div>
      </div>
    </header>

    <main class="stage">
      <section id="screenLoading" class="screen active">
        <div class="card">
          <h1>English Mission</h1>
          <p>Preparing your lesson...</p>
        </div>
      </section>

      <section id="screenQuestion" class="screen">
        <div class="card question-card">
          <div class="question-top">
            <div class="badge" id="questionTypeBadge">LISTENING</div>
            <div class="timer">Time: <span id="questionTimer">0</span>s</div>
          </div>

          <h2 id="promptText">Prompt will appear here</h2>
          <p id="questionText" class="question-text">Question text will appear here</p>

          <div class="actions-row">
            <button id="btnPlayAudio" class="btn secondary">Play Audio</button>
            <button id="btnSpeakNow" class="btn secondary">Speak Now</button>
          </div>

          <div id="choiceList" class="choice-list"></div>

          <div id="speechPanel" class="speech-panel">
            <div class="speech-title">Your Speech</div>
            <div id="speechStatus" class="speech-status">Mic idle</div>
            <div id="speechTranscript" class="speech-transcript">-</div>
          </div>

          <div class="actions-row">
            <button id="btnSubmit" class="btn primary">Submit</button>
            <button id="btnSkip" class="btn ghost">Skip</button>
          </div>
        </div>
      </section>

      <section id="screenFeedback" class="screen">
        <div class="card feedback-card">
          <h2 id="feedbackTitle">Great!</h2>
          <p id="feedbackText">Feedback message</p>
          <button id="btnContinue" class="btn primary">Continue</button>
        </div>
      </section>

      <section id="screenSummary" class="screen">
        <div class="card summary-card">
          <h1>Mission Summary</h1>
          <div class="summary-grid">
            <div class="summary-item">
              <div class="summary-label">Final Score</div>
              <div id="sumScore" class="summary-value">0</div>
            </div>
            <div class="summary-item">
              <div class="summary-label">Accuracy</div>
              <div id="sumAccuracy" class="summary-value">0%</div>
            </div>
            <div class="summary-item">
              <div class="summary-label">Best Combo</div>
              <div id="sumBestCombo" class="summary-value">0</div>
            </div>
            <div class="summary-item">
              <div class="summary-label">Boss</div>
              <div id="sumBoss" class="summary-value">-</div>
            </div>
          </div>

          <div class="actions-row">
            <button id="btnPlayAgain" class="btn primary">Play Again</button>
            <button id="btnBackMenu" class="btn secondary">Back to Menu</button>
          </div>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" aria-live="polite"></div>
  </div>

  <script type="module" src="./js/lesson-runtime.js"></script>
</body>
</html>
