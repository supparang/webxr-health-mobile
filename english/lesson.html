<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>TechPath VR • English Quest</title>

  <!-- Theme -->
  <meta name="theme-color" content="#0a1222" />

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- Styles -->
  <style>
    body {
      margin: 0;
      background: #07111f;
      color: #fff;
      font-family: system-ui, sans-serif;
      overflow: hidden;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #07111f;
      z-index: 9999;
    }

    /* Protected overlay */
    #source-shield {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.85);
      z-index: 99999;
    }

    body.devtools-guard #source-shield {
      display: flex;
    }
  </style>
</head>

<body>

<!-- Loading -->
<div id="loading">Loading TechPath...</div>

<!-- Guard overlay -->
<div id="source-shield" aria-hidden="true">
  <div style="text-align:center">
    <div style="font-weight:900;color:#7bedff;font-size:1.2rem">
      Protected Lesson Mode
    </div>
    <div style="margin-top:8px;color:#eaf6ff">
      กรุณาปิด Developer Tools
    </div>
  </div>
</div>

<!-- VR Scene -->
<a-scene id="scene" embedded>
  <a-entity id="hub-scene"></a-entity>
  <a-entity id="mission-wall"></a-entity>
</a-scene>

<!-- UI -->
<div id="ui-container"></div>

<!-- ========================= -->
<!-- ✅ BOOT SAFE LOADING -->
<!-- ========================= -->
<script>
(function () {
  'use strict';

  function $(id) {
    return document.getElementById(id);
  }

  let finished = false;
  let firstBootError = '';

  function releaseLoading(message = '', isError = false) {
    if (finished && !isError) return;
    finished = true;

    const loading = $('loading');
    if (!loading) return;

    if (message) {
      loading.innerHTML = `
        <div style="text-align:center">
          <div style="color:#7bedff;font-weight:900">TechPath VR</div>
          <div style="margin-top:8px">${message}</div>
        </div>
      `;
    }

    setTimeout(() => {
      loading.style.display = 'none';
    }, 300);
  }

  function showBootError(msg) {
    if (firstBootError) return;
    firstBootError = msg;
    console.error(msg);
    releaseLoading("❌ โหลดไม่สำเร็จ\n" + msg, true);
  }

  window.__TECHPATH_RELEASE_LOADING__ = () => releaseLoading();
  window.__TECHPATH_SHOW_BOOT_ERROR__ = showBootError;

  window.addEventListener('load', () => {
    setTimeout(() => {
      if (!firstBootError) releaseLoading();
    }, 300);
  });

})();
</script>

<!-- ========================= -->
<!-- 🚀 MAIN GAME -->
<!-- ========================= -->
<script type="module" src="./js/lesson-main.js"></script>

<!-- ========================= -->
<!-- ✅ PRODUCTION SAFE GUARD -->
<!-- ========================= -->
<script src="./js/techpath-guard.js"></script>

</body>
</html>
