<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#dff7ff">
  <title>Balance Hold • Opening Camera Pose Game</title>
  <script>
  (()=>{
    'use strict';
    const target=new URL('../fitness/balance-hold-ar2.html',location.href);
    const source=new URLSearchParams(location.search);
    source.forEach((value,key)=>target.searchParams.set(key,value));

    // Normalize legacy HeroHealth launch context for the canonical Twin Pose game.
    const pid=source.get('pid')||source.get('studentId')||source.get('playerId')||'';
    const name=source.get('name')||source.get('studentName')||source.get('player')||'Hero';
    const group=source.get('classId')||source.get('section')||source.get('group')||'';
    const hub=source.get('hub')||new URL('../fitness/hub.html',location.href).href;

    target.searchParams.set('source','herohealth-balance-hold-entry');
    target.searchParams.set('game','balance-hold');
    target.searchParams.set('gameId','balance-hold');
    target.searchParams.set('input','fullbody-pose');
    target.searchParams.set('entry',source.get('entry')||'solo');
    target.searchParams.set('hub',hub);
    target.searchParams.set('v','20260716-BALANCE-HOLD-TWIN-POSE-V13');

    if(pid){
      target.searchParams.set('pid',pid);
      target.searchParams.set('studentId',pid);
      target.searchParams.set('playerId',pid);
    }
    target.searchParams.set('name',name);
    target.searchParams.set('studentName',name);
    target.searchParams.set('player',name);
    if(group){
      target.searchParams.set('classId',group);
      target.searchParams.set('section',group);
      target.searchParams.set('group',group);
    }

    // Legacy run=play is not a camera permission flag; the canonical page starts at calibration.
    target.searchParams.delete('run');
    location.replace(target.href);
  })();
  </script>
  <style>
    body{font-family:system-ui,"Noto Sans Thai",sans-serif;display:grid;place-items:center;min-height:100vh;margin:0;padding:20px;text-align:center;color:#0f172a;background:linear-gradient(180deg,#dff7ff,#e0fdf4)}
    main{max-width:520px;padding:24px;border-radius:28px;background:rgba(255,255,255,.9);border:2px solid rgba(14,165,233,.25);box-shadow:0 18px 46px rgba(14,116,144,.15)}
    h1{margin:0 0 8px}p{margin:0 0 14px;line-height:1.5;color:#475569;font-weight:700}a{display:inline-block;padding:12px 16px;border-radius:999px;background:linear-gradient(135deg,#22d3ee,#34d399);color:#fff;text-decoration:none;font-weight:900}
  </style>
</head>
<body>
  <main>
    <h1>กำลังเปิด Balance Hold แบบกล้อง…</h1>
    <p>ระบบจะพาไปหน้า Full-body Twin Pose และขออนุญาตกล้องเมื่อกดเริ่ม Calibration</p>
    <a id="manualLink" href="../fitness/balance-hold-ar2.html">เปิดเกมรุ่นล่าสุด</a>
  </main>
  <script>
    try{
      const t=new URL('../fitness/balance-hold-ar2.html',location.href);
      t.search=location.search;
      document.getElementById('manualLink').href=t.href;
    }catch(_){}
  </script>
</body>
</html>
