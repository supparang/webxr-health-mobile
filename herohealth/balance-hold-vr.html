<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • Balance Hold Launcher</title>
  <meta name="theme-color" content="#bfe9ff" />
  <link rel="icon" href="./favicon.ico" />
  <link rel="stylesheet" href="./fitness-launcher-shared.css?v=20260406a-fitness-launcher-shared" />

  <style>
    .bh-stage{
      position:absolute;
      inset:0;
    }
    .bh-stage .mat{
      position:absolute;
      left:50%;
      top:57%;
      width:min(86%, 940px);
      height:min(70%, 540px);
      transform:translate(-50%,-50%);
      border-radius:36px;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.72), rgba(255,255,255,.18) 62%, rgba(255,255,255,0) 100%),
        linear-gradient(180deg, rgba(255,255,255,.58), rgba(255,255,255,.28));
      border:3px dashed rgba(121,191,235,.35);
      box-shadow:inset 0 0 0 16px rgba(255,255,255,.22);
      z-index:0;
    }
    .bh-stage .ring{
      position:absolute;
      left:50%;
      top:55%;
      transform:translate(-50%,-50%);
      border-radius:999px;
      animation:lanePulse 2.6s ease-in-out infinite;
    }
    .bh-stage .r1{ width:150px; height:150px; border:4px solid rgba(127,207,255,.22); }
    .bh-stage .r2{ width:280px; height:280px; border:4px dashed rgba(255,212,92,.24); animation-delay:.25s; }
    .bh-stage .r3{ width:420px; height:420px; border:4px dotted rgba(255,153,200,.18); animation-delay:.5s; }

    .bh-stage .post{
      position:absolute;
      width:60px; height:60px;
      border-radius:999px;
      display:grid; place-items:center;
      font-size:22px; font-weight:900;
      color:#4f7592;
      background:rgba(255,255,255,.74);
      box-shadow:0 8px 18px rgba(64,120,160,.12);
      border:2px solid rgba(127,207,255,.28);
      transform:translate(-50%,-50%);
    }
    .bh-stage .p1{ left:50%; top:55%; }
    .bh-stage .p2{ left:32%; top:56%; }
    .bh-stage .p3{ left:68%; top:56%; }
    .bh-stage .p4{ left:50%; top:38%; }
    .bh-stage .p5{ left:38%; top:60%; }
    .bh-stage .p6{ left:62%; top:44%; }

    .bh-stage .ghost{
      position:absolute;
      left:50%; top:54%;
      width:108px; height:170px;
      transform:translate(-50%,-50%);
      border-radius:26px;
      background:rgba(255,255,255,.32);
      border:3px dashed rgba(95,136,165,.24);
      z-index:1;
    }
    .bh-stage .ghost::before,
    .bh-stage .ghost::after{
      content:"";
      position:absolute;
      background:rgba(123,168,198,.18);
      border-radius:999px;
    }
    .bh-stage .ghost::before{
      width:34px; height:34px; left:50%; top:12px; transform:translateX(-50%);
    }
    .bh-stage .ghost::after{
      width:18px; height:92px; left:50%; top:48px; transform:translateX(-50%);
      box-shadow:-26px 78px 0 -3px rgba(123,168,198,.10), 22px 72px 0 -4px rgba(123,168,198,.14);
    }

    .bh-stage .target{
      position:absolute;
      left:50%; top:55%;
      width:124px; height:124px;
      margin-left:-62px; margin-top:-62px;
      border-radius:999px;
      border:5px solid #59bdf7;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.68), rgba(127,207,255,.16));
      box-shadow:
        0 0 0 10px rgba(127,207,255,.08),
        0 0 38px rgba(127,207,255,.20);
      z-index:2;
      animation:targetPulse 2.2s ease-in-out infinite;
    }

    .bh-stage .cursor{
      position:absolute;
      left:50%; top:55%;
      width:28px; height:28px;
      margin-left:-14px; margin-top:-14px;
      border-radius:999px;
      background:
        radial-gradient(circle at 32% 32%, #fff6d9, #ffb347);
      box-shadow:
        0 0 0 8px rgba(255,179,71,.20),
        0 0 18px rgba(255,179,71,.22);
      z-index:4;
      animation:cursorFloat 2.8s ease-in-out infinite;
    }

    .bh-stage .cue{
      position:absolute;
      z-index:6;
      top:18px;
      left:50%;
      transform:translateX(-50%);
      min-width:min(72vw, 320px);
      max-width:min(86vw, 520px);
      padding:10px 16px;
      text-align:center;
      border-radius:999px;
      background:rgba(255,255,255,.92);
      box-shadow:0 10px 24px rgba(55,100,140,.12);
      font-size:clamp(15px, 2.2vw, 20px);
      font-weight:900;
      color:#33526a;
    }

    .bh-stage .beat{
      position:absolute;
      z-index:6;
      right:18px;
      top:18px;
      width:28px; height:28px;
      border-radius:999px;
      background:radial-gradient(circle at 30% 30%, #f4ffd8, #7ed957);
      box-shadow:
        0 0 0 8px rgba(126,217,87,.12),
        0 0 22px rgba(126,217,87,.22);
      animation:beatPop .8s ease infinite;
    }

    .bh-stage .coach-mood{
      position:absolute;
      right:18px;
      bottom:92px;
      width:58px; height:58px;
      display:grid; place-items:center;
      border-radius:999px;
      background:linear-gradient(180deg, #fff4bf, #ffd45c);
      box-shadow:0 10px 24px rgba(55,100,140,.14);
      font-size:28px;
      z-index:7;
      animation:coachBounce 2s ease-in-out infinite;
    }

    .bh-stage .coach-bubble{
      position:absolute;
      right:16px;
      bottom:18px;
      max-width:260px;
      padding:12px 14px;
      border-radius:20px;
      background:rgba(255,255,255,.92);
      box-shadow:0 10px 24px rgba(55,100,140,.12);
      font-weight:800;
      color:#4e6a7e;
      z-index:7;
    }

    @keyframes lanePulse{
      0%,100%{ transform:translate(-50%,-50%) scale(1); opacity:.9; }
      50%{ transform:translate(-50%,-50%) scale(1.03); opacity:.65; }
    }
    @keyframes targetPulse{
      0%,100%{ transform:scale(1); }
      50%{ transform:scale(1.04); }
    }
    @keyframes cursorFloat{
      0%,100%{ transform:translate(0,0); }
      25%{ transform:translate(-48px,4px); }
      50%{ transform:translate(0,-58px); }
      75%{ transform:translate(54px,6px); }
    }
    @keyframes beatPop{
      0%,100%{ transform:scale(1); opacity:.36; }
      40%{ transform:scale(1.2); opacity:.92; }
    }
    @keyframes coachBounce{
      0%,100%{ transform:scale(1); }
      50%{ transform:scale(1.1); }
    }
  </style>
</head>
<body class="hh-fit-launcher">
  <div id="hhFitLauncherRoot"></div>

  <script src="./fitness-launcher-shared.js?v=20260406a-fitness-launcher-shared"></script>
  <script>
    setupFitnessLauncher({
      zoneLabel: 'Fitness Zone',
      title: 'Balance Hold',
      description: 'ฝึกการทรงตัวตามจังหวะผ่าน 6 ฐาน เด็กจะต้องพาจุดสมดุลให้อยู่ในเป้า ค้างให้ตรงจังหวะ และผ่าน routine ให้ครบทั้งชุด',
      badge: '6 POST<br/>CIRCUIT',
      game: 'balancehold',
      gameId: 'balancehold',
      mode: 'solo',
      run: 'play',
      defaultDiff: 'normal',
      defaultTime: '90',
      defaultView: 'mobile',
      hub: './hub-v2.html',
      runPage: '../fitness/balance-hold.html',
      warmupPage: './warmup-gate.html',
      stageHtml: `
        <div class="bh-stage">
          <div class="mat"></div>
          <div class="ring r1"></div>
          <div class="ring r2"></div>
          <div class="ring r3"></div>

          <div class="post p1">1</div>
          <div class="post p2">2</div>
          <div class="post p3">3</div>
          <div class="post p4">4</div>
          <div class="post p5">5</div>
          <div class="post p6">6</div>

          <div class="ghost"></div>
          <div class="target"></div>
          <div class="cursor"></div>

          <div class="cue">อยู่กลางและค้างไว้</div>
          <div class="beat"></div>
          <div class="coach-mood">🤩</div>
          <div class="coach-bubble">
            Coach Tip: ค่อย ๆ ลากนิ้ว อย่ากระชาก แล้วพาจุดสีส้มให้อยู่ในวงให้นิ่งที่สุด
          </div>
        </div>
      `
    });
  </script>
</body>
</html>
