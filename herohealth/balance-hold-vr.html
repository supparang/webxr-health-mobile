<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Balance Hold — Launcher</title>
  <meta name="color-scheme" content="dark light" />
  <style>
    :root{
      --bg:#020617;
      --panel: rgba(2,6,23,.72);
      --panel2: rgba(15,23,42,.55);
      --stroke: rgba(148,163,184,.18);
      --text:#e5e7eb;
      --muted:#94a3b8;
      --good:#22c55e;
      --cyan:#22d3ee;
      --sab: env(safe-area-inset-bottom, 0px);
      --sat: env(safe-area-inset-top, 0px);
      --sar: env(safe-area-inset-right, 0px);
      --sal: env(safe-area-inset-left, 0px);
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:var(--bg);color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans Thai",sans-serif}
    .wrap{min-height:100%;max-width:880px;margin:0 auto;
      padding:calc(16px + var(--sat)) calc(14px + var(--sar)) calc(18px + var(--sab)) calc(14px + var(--sal))}
    .card{border:1px solid var(--stroke);background:linear-gradient(180deg, rgba(2,6,23,.86), rgba(2,6,23,.55));
      border-radius:20px;padding:14px;box-shadow:0 14px 50px rgba(0,0,0,.35)}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
    h1{margin:0;font-size:16px;font-weight:1000}
    p{margin:8px 0 0;color:rgba(229,231,235,.78);font-weight:750;font-size:13px;line-height:1.35}
    .grid{margin-top:12px;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
    @media (max-width:720px){.grid{grid-template-columns:1fr}}
    label{display:block;font-size:12px;color:var(--muted);font-weight:900;margin-bottom:6px}
    select,input{
      width:100%;min-height:42px;border-radius:14px;border:1px solid var(--stroke);
      background:rgba(2,6,23,.35);color:var(--text);padding:9px 10px;font:inherit;font-weight:900
    }
    .btnrow{margin-top:12px;display:flex;gap:10px;flex-wrap:wrap}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      padding:10px 12px;border-radius:14px;border:1px solid var(--stroke);
      background:rgba(2,6,23,.35);font-weight:1000;font-size:13px;color:inherit;text-decoration:none;
      cursor:pointer
    }
    .btn.primary{border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.16)}
    .btn.cyan{border-color:rgba(34,211,238,.35);background:rgba(34,211,238,.14)}
    .chiprow{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
    .chip{border:1px solid var(--stroke);background:rgba(2,6,23,.35);border-radius:999px;padding:7px 10px;font-size:12px;font-weight:900;color:rgba(229,231,235,.92)}
    .chip b{color:#fff}
    .small{margin-top:10px;font-size:12px;color:var(--muted);font-weight:850}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="row">
        <div>
          <h1>⚖️ Balance Hold — Launcher</h1>
          <p>เลือกระดับ/เวลา/โหมดมุมมองก่อนเข้าเล่น แล้วค่อยเข้า flow: Warmup → Game → Result → Cooldown</p>
        </div>
        <a class="btn" id="backHub" href="./hub.html">🏠 Back HUB</a>
      </div>

      <div class="chiprow">
        <div class="chip">pid: <b id="cPid">anon</b></div>
        <div class="chip">seed: <b id="cSeed">-</b></div>
        <div class="chip">run: <b id="cRun">play</b></div>
      </div>

      <div class="grid">
        <div>
          <label for="diff">Difficulty</label>
          <select id="diff">
            <option value="easy">Easy</option>
            <option value="normal" selected>Normal</option>
            <option value="hard">Hard</option>
          </select>
        </div>
        <div>
          <label for="time">Duration (sec)</label>
          <select id="time">
            <option value="45">45</option>
            <option value="60">60</option>
            <option value="80" selected>80</option>
            <option value="90">90</option>
            <option value="120">120</option>
          </select>
        </div>
        <div>
          <label for="view">View</label>
          <select id="view">
            <option value="pc">PC</option>
            <option value="mobile">Mobile</option>
            <option value="cvr">Cardboard / cVR</option>
          </select>
        </div>
      </div>

      <div class="btnrow">
        <button class="btn primary" id="btnStart">▶ Start Flow</button>
        <a class="btn cyan" id="btnOpenRun" href="#">🧩 Open RUN (skip warmup)</a>
        <button class="btn" id="btnReseed">🎲 Reseed</button>
      </div>

      <div class="small">
        Flow ปกติจะเข้า <code>/herohealth/warmup-gate.html</code> ก่อน แล้วค่อยไป <code>/fitness/balance-hold.html</code>
      </div>
    </div>
  </div>

<script>
'use strict';

function qs(k, d=''){
  try{ return new URL(location.href).searchParams.get(k) ?? d; }catch(e){ return d; }
}
function clamp(v,a,b){ v=Number(v); if(!Number.isFinite(v)) v=a; return Math.max(a, Math.min(b, v)); }
function nowSeed(){ return String(Date.now()); }
function setParam(u, k, v){
  if (v === '' || v == null) u.searchParams.delete(k);
  else u.searchParams.set(k, String(v));
}
function normalizeMaybeEncodedUrl(v){
  v = String(v ?? '').trim();
  if(!v || v==='null' || v==='undefined') return '';
  if(/%3A|%2F|%3F|%26|%3D/i.test(v)){ try{ v = decodeURIComponent(v); }catch(e){} }
  return v.trim();
}

const P = {
  hub: normalizeMaybeEncodedUrl(qs('hub','')),
  run: String(qs('run','play')).toLowerCase() || 'play',
  diff: String(qs('diff','normal')).toLowerCase() || 'normal',
  time: clamp(qs('time','80'), 20, 300),
  seed: String(qs('seed','') || nowSeed()),
  pid: String(qs('pid','')).trim() || 'anon',
  view: String(qs('view','pc')).toLowerCase() || 'pc',

  log: String(qs('log','')),
  api: normalizeMaybeEncodedUrl(qs('api','')),
  ai: String(qs('ai','')),
  studyId: String(qs('studyId','')),
  phase: String(qs('phase','')),
  conditionGroup: String(qs('conditionGroup','')),
  grade: String(qs('grade','p5')).trim() || 'p5'
};

document.getElementById('cPid').textContent = P.pid;
document.getElementById('cSeed').textContent = String(P.seed).slice(0,10);
document.getElementById('cRun').textContent = P.run;

const elDiff = document.getElementById('diff');
const elTime = document.getElementById('time');
const elView = document.getElementById('view');

if (['easy','normal','hard'].includes(P.diff)) elDiff.value = P.diff;
if (P.time) elTime.value = String(P.time);
if (['pc','mobile','cvr'].includes(P.view)) elView.value = P.view;

const backHub = document.getElementById('backHub');
if (P.hub) backHub.href = P.hub;

function buildRunUrl(autostart){
  const u = new URL('../fitness/balance-hold.html', location.href);

  setParam(u, 'hub', P.hub || '');
  setParam(u, 'run', P.run);
  setParam(u, 'pid', P.pid);
  setParam(u, 'seed', P.seed);
  setParam(u, 'diff', elDiff.value);
  setParam(u, 'time', elTime.value);
  setParam(u, 'view', elView.value);

  setParam(u, 'log', P.log);
  setParam(u, 'api', P.api);
  setParam(u, 'ai', P.ai);

  setParam(u, 'studyId', P.studyId);
  setParam(u, 'phase', P.phase);
  setParam(u, 'conditionGroup', P.conditionGroup);
  setParam(u, 'grade', P.grade);

  setParam(u, 'autostart', autostart ? '1' : '');
  return u.toString();
}

function buildWarmupUrl(){
  const runUrl = buildRunUrl(true);
  const u = new URL('./warmup-gate.html', location.href);

  setParam(u, 'gatePhase', 'warmup');
  setParam(u, 'phase', 'warmup');
  setParam(u, 'cat', 'exercise');
  setParam(u, 'theme', 'balance');
  setParam(u, 'game', 'balance');

  setParam(u, 'hub', P.hub || './hub.html');
  setParam(u, 'next', runUrl);

  setParam(u, 'pid', P.pid);
  setParam(u, 'run', P.run);
  setParam(u, 'diff', elDiff.value);
  setParam(u, 'time', elTime.value);
  setParam(u, 'view', elView.value);
  setParam(u, 'seed', P.seed);

  setParam(u, 'log', P.log);
  setParam(u, 'api', P.api);
  setParam(u, 'ai', P.ai);

  setParam(u, 'studyId', P.studyId);
  setParam(u, 'conditionGroup', P.conditionGroup);
  setParam(u, 'researchPhase', P.phase);
  setParam(u, 'grade', P.grade);

  return u.toString();
}

document.getElementById('btnStart').addEventListener('click', ()=>{
  location.href = buildWarmupUrl();
});

document.getElementById('btnOpenRun').addEventListener('click', (e)=>{
  e.preventDefault();
  location.href = buildRunUrl(false);
});

document.getElementById('btnReseed').addEventListener('click', ()=>{
  P.seed = nowSeed();
  document.getElementById('cSeed').textContent = String(P.seed).slice(0,10);
  try{
    const u = new URL(location.href);
    u.searchParams.set('seed', P.seed);
    history.replaceState(null,'',u.toString());
  }catch(e){}
});
</script>
</body>
</html>
