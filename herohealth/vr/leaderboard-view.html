<!-- === /herohealth/vr/leaderboard-view.html ===
HeroHealth Leaderboard View — generic
Reads localStorage:
- HHA_LB:goodjunk (produced by GoodJunk run page)
Sort order: score → acc → miss → medianRT (lower better)
PATCH v20260301-LB-VIEW
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • Leaderboard</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="../favicon.ico" />
  <style>
    :root{
      --bg:#070b14; --card:#0b1220; --card2:#0e172b;
      --fg:#e8eefc; --mut:#9fb0d0; --bd:#1f2b46;
      --good:#22c55e; --warn:#f59e0b; --bad:#ef4444;
      --r:16px;
    }
    html,body{ height:100%; margin:0; background:var(--bg); color:var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; }
    .wrap{ max-width:1000px; margin:0 auto; padding:18px 14px 40px; }
    header{ display:flex; gap:12px; align-items:center; justify-content:space-between; flex-wrap:wrap; }
    .title{ font-weight:1000; font-size:18px; letter-spacing:.2px; }
    .sub{ color:var(--mut); font-weight:700; font-size:12px; }
    .bar{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-top:10px; }
    .pill{ border:1px solid rgba(148,163,184,.14); background:rgba(2,6,23,.55);
      padding:8px 10px; border-radius:999px; color:var(--fg); font-weight:900; font-size:12px; }
    .pill span{ color:var(--mut); font-weight:800; margin-right:6px; }
    .btn{ border:1px solid rgba(148,163,184,.18); background:rgba(15,23,42,.55);
      color:var(--fg); padding:10px 12px; border-radius:14px; font-weight:1000; cursor:pointer; }
    .btn.primary{ border-color: rgba(34,197,94,.28); background: rgba(34,197,94,.14); }
    .card{ margin-top:14px; border:1px solid rgba(148,163,184,.14); background:rgba(2,6,23,.55);
      border-radius: var(--r); overflow:hidden; }
    table{ width:100%; border-collapse:collapse; }
    th,td{ padding:10px 10px; border-bottom:1px solid rgba(148,163,184,.10); text-align:left; font-size:13px; }
    th{ color:var(--mut); font-weight:1000; background:rgba(15,23,42,.35); }
    .rank{ font-weight:1000; }
    .mut{ color:var(--mut); font-weight:800; }
    .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .empty{ padding:18px; color:var(--mut); font-weight:900; }
    .right{ text-align:right; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <div class="title">🏆 Leaderboard</div>
        <div class="sub" id="subLine">—</div>
      </div>
      <div class="bar">
        <button class="btn" id="btnBack">← กลับ</button>
        <button class="btn" id="btnClear">ล้างรายการ (เครื่องนี้)</button>
        <button class="btn primary" id="btnRefresh">รีเฟรช</button>
      </div>
    </header>

    <div class="bar">
      <div class="pill"><span>Order</span>score → acc → miss → medianRT</div>
      <div class="pill"><span>Game</span><b id="gamePill">—</b></div>
      <div class="pill"><span>Count</span><b id="countPill">0</b></div>
    </div>

    <div class="card" id="card">
      <div class="empty" id="empty">กำลังโหลด…</div>
      <table id="tbl" style="display:none">
        <thead>
          <tr>
            <th style="width:56px">#</th>
            <th>PID</th>
            <th>Diff</th>
            <th>View</th>
            <th class="right">Score</th>
            <th class="right">Acc%</th>
            <th class="right">Miss</th>
            <th class="right">MedRT</th>
            <th class="right">Time</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { compareScorePackets } from './score-compare.js';

    const qs = (k, d='')=>{ try{ return (new URL(location.href)).searchParams.get(k) ?? d; }catch(e){ return d; } };

    const game = String(qs('game','goodjunk')).toLowerCase();
    const hub = qs('hub','../hub.html');

    const KEY = `HHA_LB:${game}`;
    const $ = (id)=> document.getElementById(id);

    function safeJsonParse(s, dflt){ try{ return JSON.parse(s); }catch{ return dflt; } }
    function lsGet(k, dflt=null){ try{ const v=localStorage.getItem(k); return v==null?dflt:v; }catch{ return dflt; } }
    function lsSet(k, v){ try{ localStorage.setItem(k, v); }catch{} }
    function fmtTs(ts){
      try{
        const d = new Date(ts);
        const hh = String(d.getHours()).padStart(2,'0');
        const mm = String(d.getMinutes()).padStart(2,'0');
        const dd = String(d.getDate()).padStart(2,'0');
        const mo = String(d.getMonth()+1).padStart(2,'0');
        return `${dd}/${mo} ${hh}:${mm}`;
      }catch{ return '—'; }
    }

    function normRow(r){
      return {
        score: Number(r?.score ?? r?.scoreFinal ?? 0) || 0,
        accPct: Number(r?.accPct ?? 0) || 0,
        miss: Number(r?.miss ?? r?.missTotal ?? 0) || 0,
        medianRtGoodMs: Number(r?.medianRtGoodMs ?? 0) || 0,
        pid: String(r?.pid ?? 'anon'),
        diff: String(r?.diff ?? 'normal'),
        view: String(r?.view ?? r?.device ?? 'mobile'),
        ts: Number(r?.ts ?? Date.now()) || Date.now(),
        grade: String(r?.grade ?? ''),
      };
    }

    function render(){
      const raw = safeJsonParse(lsGet(KEY, '[]'), []);
      const rows = raw.map(normRow);

      rows.sort((a,b)=> compareScorePackets(a,b)); // best first

      $('gamePill').textContent = game;
      $('countPill').textContent = String(rows.length|0);

      const sub = `key=${KEY} • sort=score→acc→miss→medianRT • device-local`;
      $('subLine').textContent = sub;

      const empty = $('empty');
      const tbl = $('tbl');
      const tb = $('tbody');

      tb.innerHTML = '';
      if(!rows.length){
        empty.style.display = 'block';
        tbl.style.display = 'none';
        empty.textContent = 'ยังไม่มีข้อมูล — เล่นเกม 1 รอบ แล้วกลับมาดูใหม่ได้เลย';
        return;
      }
      empty.style.display = 'none';
      tbl.style.display = 'table';

      rows.slice(0, 50).forEach((r, i)=>{
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="rank">${i+1}</td>
          <td><span class="mono">${r.pid}</span> <span class="mut">${r.grade?('('+r.grade+')'):''}</span></td>
          <td class="mut">${r.diff}</td>
          <td class="mut">${r.view}</td>
          <td class="right"><b>${r.score|0}</b></td>
          <td class="right">${r.accPct|0}</td>
          <td class="right">${r.miss|0}</td>
          <td class="right">${r.medianRtGoodMs|0}</td>
          <td class="right mut">${fmtTs(r.ts)}</td>
        `;
        tb.appendChild(tr);
      });
    }

    $('btnBack').addEventListener('click', ()=>{
      location.href = hub || '../hub.html';
    });

    $('btnRefresh').addEventListener('click', render);

    $('btnClear').addEventListener('click', ()=>{
      lsSet(KEY, JSON.stringify([]));
      render();
    });

    render();
  </script>
</body>
</html>
