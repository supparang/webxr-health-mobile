<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth — HygieneVR</title>
  <meta name="color-scheme" content="light dark" />
  <link rel="icon" href="../favicon.ico" type="image/x-icon" />

  <script>
    // cache-bust param shared
    (function(){
      try{
        const u = new URL(location.href);
        if(!u.searchParams.get('v')) u.searchParams.set('v','20260221n');
        // do NOT redirect if already has v
        if(location.href !== u.toString() && !location.search.includes('v=')){
          location.replace(u.toString());
        }
        window.__HHA_V = u.searchParams.get('v') || '20260221n';
      }catch{}
    })();
  </script>

  <link rel="stylesheet" href="./hygiene-vr.css?v=20260221n" />

  <script src="../vr/vr-ui.js" defer></script>
  <script src="../vr/particles.js" defer></script>

  <script src="../vr/hha-ai-coach.js" defer></script>
  <script src="../vr/hha-difficulty-director.js" defer></script>
  <script src="../vr/hha-badges.js" defer></script>

  <script src="./hygiene-quiz-bank.js" defer></script>

  <script type="module" src="./hygiene-vr.boot.js?v=20260221n"></script>
</head>

<body class="view-pc">
  <div id="gameRoot" class="hw-root">
    <div class="hw-stage" id="stage" aria-label="HygieneVR stage"></div>

    <div class="hw-hud">
      <div class="hw-top" id="hudTop">
        <div class="hw-title">🧼 Handwash Survival</div>
        <div class="hw-sub" id="hudSub">ready…</div>

        <div class="hw-row">
          <div class="hw-pill" id="pillStep">STEP 1/7 👐 ฝ่ามือ</div>
          <div class="hw-pill" id="pillHits">HITS 0/6</div>
          <div class="hw-pill" id="pillCombo">COMBO 0</div>
          <div class="hw-pill bad" id="pillMiss">MISS 0 / 3</div>
        </div>

        <div class="hw-bars">
          <div class="hw-bar">
            <div class="hw-bar-lab">STEP</div>
            <div class="hw-bar-rail"><div class="hw-bar-fill" id="barStep"></div></div>
          </div>
          <div class="hw-bar">
            <div class="hw-bar-lab">LOOP/MISSION</div>
            <div class="hw-bar-rail"><div class="hw-bar-fill cyan" id="barLoop"></div></div>
          </div>
        </div>

        <div class="hw-row">
          <div class="hw-pill warn" id="pillRisk">RISK Incomplete 0% • Unsafe 0%</div>
          <div class="hw-pill" id="pillTime">TIME 80</div>
          <div class="hw-pill cyan" id="pillQuest">MISSION —</div>
          <div class="hw-pill power" id="pillPower">POWER —</div>

          <button class="hw-pill btn" id="btnPause" type="button">⏸ Pause</button>
          <button class="hw-pill btn" id="btnBack" type="button">↩ HUB</button>
        </div>

        <div class="hw-quiz" id="quizBox" style="display:none">
          <div class="hw-quiz-q" id="quizQ">QUIZ</div>
          <div class="hw-quiz-sub" id="quizSub">—</div>
        </div>
      </div>

      <div class="hw-banner" id="banner" aria-live="polite"></div>
    </div>

    <!-- ✅ ต้องโชว์เป็นค่าเริ่มต้น -->
    <div class="hw-overlay" id="startOverlay">
      <div class="hw-card">
        <div class="hw-card-title">เริ่มภารกิจล้างมือ 🧼</div>
        <div class="hw-card-sub">
          แตะ/ยิง “ไอคอนขั้นตอนที่ถูก” เท่านั้น • หลบ 🦠 • รักษาคอมโบ
        </div>
        <div class="hw-card-row">
          <button class="hw-cta" id="btnStart" type="button">▶ Start</button>
          <button class="hw-ghost" id="btnPractice" type="button">🧪 Practice 15s</button>
          <button class="hw-ghost" id="btnRestart" type="button">↻ Reset</button>
        </div>
        <div class="hw-card-sub" style="margin-top:10px">
          Mode: <span id="labMode">play</span> • Diff: <span id="labDiff">normal</span> • View: <span id="labView">pc</span>
        </div>
      </div>
    </div>

    <div class="hw-overlay" id="endOverlay" style="display:none">
      <div class="hw-card">
        <div class="hw-card-title" id="endTitle">จบเกม ✅</div>
        <div class="hw-card-sub" id="endSub">—</div>
        <pre class="hw-pre" id="endJson"></pre>
        <div class="hw-card-row">
          <button class="hw-cta" id="btnPlayAgain" type="button">▶ เล่นอีกครั้ง</button>
          <button class="hw-ghost" id="btnCopyJson" type="button">📋 Copy Summary</button>
          <button class="hw-ghost" id="btnBack2" type="button">↩ กลับ HUB</button>
        </div>
      </div>
    </div>
  </div>

<script>
(function(){
  'use strict';
  const qs = (k,d=null)=>{ try{return new URL(location.href).searchParams.get(k) ?? d;}catch{return d;} };
  function setViewClass(){
    const view = (qs('view','pc')||'pc').toLowerCase();
    document.body.classList.remove('view-pc','view-mobile','view-vr','view-cvr');
    document.body.classList.add(view==='mobile'?'view-mobile':(view==='vr'?'view-vr':(view==='cvr'?'view-cvr':'view-pc')));
    document.getElementById('labView').textContent = view;
  }
  setViewClass();
  document.getElementById('labMode').textContent = (qs('run','play')||'play');
  document.getElementById('labDiff').textContent = (qs('diff','normal')||'normal');
})();
</script>
</body>
</html>
