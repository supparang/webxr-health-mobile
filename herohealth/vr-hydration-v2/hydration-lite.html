<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • Hydration Lite</title>
  <meta name="theme-color" content="#8fe3ff" />
  <style>
    :root{
      --bg1:#edfaff;
      --bg2:#daf3ff;
      --card:#fffffff2;
      --line:#d4ebf7;
      --text:#204457;
      --muted:#68869b;
      --blue:#57c8ff;
      --blue2:#2ea8e8;
      --green:#7dd989;
      --orange:#ffcc6a;
      --shadow:0 18px 40px rgba(89,151,182,.18);
      --radius:24px;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      font-family:ui-rounded,"Noto Sans Thai",system-ui,-apple-system,sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
    }

    body{padding:18px}

    .wrap{
      max-width:920px;
      margin:0 auto;
      display:grid;
      gap:16px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .hero{padding:18px 20px}

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:36px;
      padding:8px 12px;
      border-radius:999px;
      background:#f1fbff;
      border:1px solid #cdebf8;
      color:#2680ad;
      font-weight:900;
    }

    h1{
      margin:10px 0 8px;
      font-size:30px;
    }

    p{
      margin:0;
      color:var(--muted);
      line-height:1.6;
    }

    .task{padding:18px}

    .task h2{
      margin:0 0 10px;
      font-size:24px;
    }

    .stem{
      padding:16px;
      border-radius:18px;
      background:#f8fdff;
      border:1px solid var(--line);
      font-size:18px;
      font-weight:900;
      line-height:1.5;
    }

    .options{
      display:grid;
      gap:10px;
      margin-top:14px;
    }

    .option{
      border:none;
      cursor:pointer;
      text-align:left;
      min-height:60px;
      padding:14px 16px;
      border-radius:18px;
      background:#fff;
      border:1px solid var(--line);
      font:900 16px/1.45 inherit;
      color:var(--text);
      transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
    }

    .option:hover{
      transform:translateY(-1px);
      box-shadow:0 8px 18px rgba(89,151,182,.12);
    }

    .option.correct{
      background:#f1fff4;
      border-color:#9fddae;
    }

    .option.wrong{
      background:#fff5f4;
      border-color:#f1b0a8;
    }

    .info{
      margin-top:14px;
      padding:14px 16px;
      border-radius:16px;
      background:#f7fdff;
      border:1px solid var(--line);
      line-height:1.6;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .btn{
      appearance:none;
      border:none;
      cursor:pointer;
      min-height:48px;
      padding:12px 16px;
      border-radius:16px;
      font-size:15px;
      font-weight:1000;
      transition:transform .12s ease, opacity .12s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
    }

    .btn.primary{
      background:linear-gradient(180deg,var(--blue),var(--blue2));
      color:#06273a;
    }

    .btn.good{
      background:linear-gradient(180deg,#92e79d,#63d473);
      color:#10361a;
    }

    .btn.ghost{
      background:#fff;
      border:1px solid var(--line);
      color:var(--text);
    }

    .hide{display:none!important}

    @media (max-width:760px){
      body{padding:14px}
      .stem{font-size:17px}
      .option{font-size:15px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card hero">
      <div class="eyebrow">💧 Hydration Lite • Mini Learning</div>
      <h1 id="heroTitle">Mini Learning</h1>
      <p id="heroLead">ตอบสั้น ๆ หลังเล่น main game เพื่อคิดต่อเรื่องการดื่มน้ำ</p>
    </section>

    <section class="card task">
      <h2 id="taskTitle">Scenario</h2>
      <div class="stem" id="taskStem">กำลังโหลด...</div>
      <div class="options" id="options"></div>
      <div class="info hide" id="feedbackBox"></div>

      <div class="actions">
        <button class="btn good hide" id="nextBtn" type="button">ไปต่อ</button>
        <button class="btn primary hide" id="submitCreateBtn" type="button">บันทึกคำตอบ</button>
      </div>
    </section>
  </div>

  <script type="module">
    import {
      getLiteScenarioItem,
      scoreLiteScenarioAnswer
    } from './js/hydration.scenarios.js';

    import {
      getLiteEvaluateItem,
      scoreLiteEvaluateAnswer
    } from './js/hydration.evaluate.js';

    import {
      getLiteCreateItem,
      scoreLiteCreateAnswers
    } from './js/hydration.create.js';

    const FIXED_HUB_URL = 'https://supparang.github.io/webxr-health-mobile/herohealth/hub.html';
    const qs = new URLSearchParams(location.search);

    const refs = {
      heroTitle: document.getElementById('heroTitle'),
      heroLead: document.getElementById('heroLead'),
      taskTitle: document.getElementById('taskTitle'),
      taskStem: document.getElementById('taskStem'),
      options: document.getElementById('options'),
      feedbackBox: document.getElementById('feedbackBox'),
      nextBtn: document.getElementById('nextBtn'),
      submitCreateBtn: document.getElementById('submitCreateBtn')
    };

    const ctx = {
      pid: qs.get('pid') || 'anon',
      studyId: qs.get('studyId') || 'nostudy',
      mode: qs.get('mode') || 'play',
      type: qs.get('type') || 'solo',
      diff: qs.get('diff') || 'normal',
      week: Number(qs.get('week') || 1),
      session: Number(qs.get('session') || 1),
      branch: qs.get('branch') || 'scenario-evaluate',
      runId: qs.get('runId') || `hyd-${Date.now()}`,
      hub: qs.get('hub') || FIXED_HUB_URL,
      hybridSummary: qs.get('hybridSummary') || new URL('../../hydration-hybrid-summary.html', location.href).toString()
    };

    const state = {
      phase: 'scenario',
      currentScenario: null,
      currentEvaluate: null,
      currentCreate: null,
      result: {
        runId: ctx.runId,
        pid: ctx.pid,
        studyId: ctx.studyId,
        mode: ctx.mode,
        type: ctx.type,
        weekNo: ctx.week,
        sessionNo: ctx.session,
        branch: ctx.branch,
        scenarioScore: 0,
        evaluateScore: 0,
        createScore: 0,
        scenarioFamily: '',
        evaluateFamily: '',
        createFamily: '',
        savedAt: ''
      }
    };

    function readMainResult() {
      try {
        return JSON.parse(localStorage.getItem(`HHA_HYDRATION_HYBRID_MAIN:${ctx.runId}`) || 'null');
      } catch (_) {
        return null;
      }
    }

    function saveLiteResult() {
      state.result.savedAt = new Date().toISOString();
      localStorage.setItem(
        `HHA_HYDRATION_HYBRID_LITE:${ctx.runId}`,
        JSON.stringify(state.result)
      );
      localStorage.setItem(
        'HHA_HYDRATION_HYBRID_LAST_LITE',
        JSON.stringify(state.result)
      );
    }

    function finishLite() {
      saveLiteResult();
      const u = new URL(ctx.hybridSummary, location.href);
      u.searchParams.set('runId', ctx.runId);
      u.searchParams.set('pid', ctx.pid);
      u.searchParams.set('studyId', ctx.studyId);
      u.searchParams.set('mode', ctx.mode);
      u.searchParams.set('type', ctx.type);
      u.searchParams.set('week', String(ctx.week));
      u.searchParams.set('session', String(ctx.session));
      u.searchParams.set('branch', ctx.branch);
      u.searchParams.set('hub', ctx.hub);
      location.href = u.toString();
    }

    function branchPreferredFamily() {
      const main = readMainResult();
      const teamContribution = Number(main?.teamContribution || 0);
      const badCatch = Number(main?.badCatch || 0);
      const missedGood = Number(main?.missedGood || 0);
      const bestCombo = Number(main?.bestCombo || 0);

      if (badCatch >= 3) return 'sweet_drink';
      if (missedGood >= 4) return 'school_routine';
      if (teamContribution > 0 && teamContribution < 60) return 'best_plan';
      if (bestCombo >= 6) return 'after_activity';

      return '';
    }

    function showFeedback(message) {
      refs.feedbackBox.textContent = message;
      refs.feedbackBox.classList.remove('hide');
    }

    function resetActionUI() {
      refs.options.innerHTML = '';
      refs.feedbackBox.classList.add('hide');
      refs.nextBtn.classList.add('hide');
      refs.submitCreateBtn.classList.add('hide');
      refs.nextBtn.textContent = 'ไปต่อ';
    }

    function escapeHtml(v) {
      return String(v ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function showScenario() {
      state.phase = 'scenario';
      resetActionUI();

      state.currentScenario = getLiteScenarioItem({
        run: ctx.mode,
        weekNo: ctx.week,
        sessionNo: ctx.session,
        pid: ctx.pid,
        studyId: ctx.studyId,
        preferredFamily: branchPreferredFamily()
      });

      const item = state.currentScenario;
      if (!item) {
        refs.taskTitle.textContent = 'Scenario';
        refs.taskStem.textContent = 'ไม่พบโจทย์ scenario';
        showFeedback('ไม่พบ item จาก scenario bank');
        return;
      }

      state.result.scenarioFamily = item.family || '';

      refs.heroTitle.textContent = 'Scenario';
      refs.heroLead.textContent = 'ตอบสถานการณ์สั้น ๆ หลังเล่น main game';
      refs.taskTitle.textContent = 'Scenario 1/2';
      refs.taskStem.textContent = item.stem || 'สถานการณ์';

      (item.options || []).forEach((text, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.type = 'button';
        btn.textContent = text;

        btn.addEventListener('click', () => {
          [...refs.options.children].forEach(el => el.disabled = true);

          const judged = scoreLiteScenarioAnswer(item, idx, {
            pid: ctx.pid,
            studyId: ctx.studyId
          });

          state.result.scenarioScore = Number(judged.score || 0);

          if (judged.correct) btn.classList.add('correct');
          else btn.classList.add('wrong');

          showFeedback(
            judged.correct
              ? `เยี่ยม! ${judged.feedback}`
              : `ยังไม่ใช่ที่สุดนะ ${judged.feedback}`
          );

          refs.nextBtn.classList.remove('hide');
        });

        refs.options.appendChild(btn);
      });

      refs.nextBtn.onclick = () => {
        if (ctx.branch === 'scenario-create') showCreate();
        else showEvaluate();
      };
    }

    function showEvaluate() {
      state.phase = 'evaluate';
      resetActionUI();

      state.currentEvaluate = getLiteEvaluateItem({
        run: ctx.mode,
        weekNo: ctx.week,
        sessionNo: ctx.session,
        pid: ctx.pid,
        studyId: ctx.studyId,
        preferredFamily: state.result.scenarioFamily || branchPreferredFamily()
      });

      const item = state.currentEvaluate;
      if (!item) {
        refs.taskTitle.textContent = 'Evaluate';
        refs.taskStem.textContent = 'ไม่พบโจทย์ evaluate';
        showFeedback('ไม่พบ item จาก evaluate bank');
        return;
      }

      state.result.evaluateFamily = item.family || '';

      refs.heroTitle.textContent = 'Evaluate';
      refs.heroLead.textContent = 'เลือกแผนที่เหมาะที่สุด';
      refs.taskTitle.textContent = 'Evaluate 2/2';
      refs.taskStem.textContent = item.title || 'Evaluate';

      (item.options || []).forEach((text, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.type = 'button';
        btn.textContent = text;

        btn.addEventListener('click', () => {
          [...refs.options.children].forEach(el => el.disabled = true);

          const judged = scoreLiteEvaluateAnswer(item, idx, {
            pid: ctx.pid,
            studyId: ctx.studyId
          });

          state.result.evaluateScore = Number(judged.score || 0);

          if (judged.correct) btn.classList.add('correct');
          else btn.classList.add('wrong');

          showFeedback(
            judged.correct
              ? `${judged.feedbackTitle} — ${judged.feedbackText}`
              : `${judged.feedbackTitle} — ${judged.feedbackText}`
          );

          refs.nextBtn.textContent = 'ไปสรุปรวม';
          refs.nextBtn.classList.remove('hide');
        });

        refs.options.appendChild(btn);
      });

      refs.nextBtn.onclick = finishLite;
    }

    function showCreate() {
      state.phase = 'create';
      resetActionUI();

      state.currentCreate = getLiteCreateItem({
        run: ctx.mode,
        weekNo: ctx.week,
        sessionNo: ctx.session,
        pid: ctx.pid,
        studyId: ctx.studyId,
        preferredFamily: state.result.scenarioFamily || branchPreferredFamily()
      });

      const item = state.currentCreate;
      if (!item) {
        refs.taskTitle.textContent = 'Create';
        refs.taskStem.textContent = 'ไม่พบโจทย์ create';
        showFeedback('ไม่พบ template จาก create bank');
        return;
      }

      state.result.createFamily = item.family || '';

      refs.heroTitle.textContent = 'Create';
      refs.heroLead.textContent = 'เขียนแผนสั้น ๆ ของตัวเอง';
      refs.taskTitle.textContent = 'Create 2/2';
      refs.taskStem.innerHTML = `<strong>${escapeHtml(item.title || 'สร้างแผนของตัวเอง')}</strong>`;

      const prompts = Array.isArray(item.prompts) ? item.prompts : [];
      refs.options.innerHTML = `
        ${prompts.map((prompt, idx) => `
          <div class="info">
            <div style="font-weight:900;margin-bottom:8px">${escapeHtml(prompt)}</div>
            <input id="createInput${idx}" type="text" style="width:100%;min-height:44px;padding:10px 12px;border-radius:12px;border:1px solid #d4ebf7" />
          </div>
        `).join('')}
      `;

      refs.submitCreateBtn.classList.remove('hide');
      refs.submitCreateBtn.onclick = () => {
        const values = prompts.map((_, idx) => document.getElementById(`createInput${idx}`)?.value || '');

        const judged = scoreLiteCreateAnswers(item, values, {
          pid: ctx.pid,
          studyId: ctx.studyId
        });

        state.result.createScore = Number(judged.score || 0);

        showFeedback(judged.feedback);

        refs.submitCreateBtn.classList.add('hide');
        refs.nextBtn.textContent = 'ไปสรุปรวม';
        refs.nextBtn.classList.remove('hide');
      };

      refs.nextBtn.onclick = finishLite;
    }

    if (!readMainResult()) {
      refs.taskTitle.textContent = 'ไม่พบ main result';
      refs.taskStem.textContent = 'รอบนี้ยังไม่มีข้อมูลจาก hydration-vr ให้กลับไปเริ่ม flow ใหม่';
      refs.options.innerHTML = '';
      showFeedback('ไม่พบ HHA_HYDRATION_HYBRID_MAIN ของ run นี้');
    } else {
      showScenario();
    }
  </script>
</body>
</html>
