<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk Coop</title>
  <meta name="color-scheme" content="light" />
  <link rel="icon" href="../favicon.ico" />
  <style>
    :root{
      --sky1:#dff4ff;
      --sky2:#bfe8ff;
      --sky3:#fff7d8;
      --card:#fffdf6;
      --card2:#f8fff3;
      --line:#bfe3f2;
      --text:#4d4a42;
      --muted:#7b7a72;
      --green:#7ed957;
      --green2:#58c33f;
      --blue:#7fcfff;
      --blue2:#58b7f5;
      --yellow:#ffd45c;
      --orange:#ffb547;
      --violet:#cdb9ff;
      --shadow:0 18px 40px rgba(86,155,194,.16);

      --sat:env(safe-area-inset-top,0px);
      --sar:env(safe-area-inset-right,0px);
      --sab:env(safe-area-inset-bottom,0px);
      --sal:env(safe-area-inset-left,0px);
    }

    *{ box-sizing:border-box; }
    html,body{
      margin:0;
      min-height:100%;
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 12% 10%, rgba(255,255,255,.92), transparent 18%),
        radial-gradient(circle at 86% 14%, rgba(255,255,255,.78), transparent 16%),
        linear-gradient(180deg,var(--sky1),var(--sky2) 54%, var(--sky3));
      overflow:hidden;
    }
    body{ min-height:100dvh; }

    #app{
      position:relative;
      width:100vw;
      height:100dvh;
      overflow:hidden;
      isolation:isolate;
    }

    #gameMount{
      position:absolute;
      inset:0;
      z-index:1;
      overflow:hidden;
    }

    .shell{
      position:absolute;
      inset:0;
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:12px;
      padding:
        calc(12px + var(--sat))
        calc(12px + var(--sar))
        calc(12px + var(--sab))
        calc(12px + var(--sal));
      pointer-events:none;
      z-index:0;
    }

    .top{
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      align-items:flex-start;
    }

    .hero-card{
      max-width:min(780px,100%);
      background:linear-gradient(180deg,#fffef9,#f7fff4);
      border:3px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:18px 16px;
      position:relative;
      overflow:hidden;
    }

    .hero-card::before{
      content:"";
      position:absolute;
      left:-36px; top:-36px;
      width:140px; height:140px;
      border-radius:999px;
      background:rgba(205,185,255,.20);
      filter:blur(8px);
    }

    .hero-card::after{
      content:"";
      position:absolute;
      right:-26px; bottom:-26px;
      width:120px; height:120px;
      border-radius:999px;
      background:rgba(127,207,255,.22);
      filter:blur(8px);
    }

    .kicker{
      position:relative;
      z-index:1;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 14px;
      border-radius:999px;
      background:#f2ecff;
      border:2px solid var(--line);
      color:#7a63c7;
      font-size:13px;
      font-weight:1000;
      margin-bottom:10px;
    }

    h1{
      position:relative;
      z-index:1;
      margin:0 0 6px;
      font-size:clamp(28px,5vw,42px);
      line-height:1.05;
      font-weight:1000;
      color:#7a63c7;
      text-shadow:0 2px 0 #fff;
    }

    .sub{
      position:relative;
      z-index:1;
      margin:0;
      color:var(--muted);
      line-height:1.7;
      font-size:14px;
      font-weight:900;
      max-width:720px;
    }

    .side{
      display:grid;
      gap:8px;
      align-content:start;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      border:2px solid var(--line);
      background:#fff;
      color:#6c6a61;
      font-size:12px;
      font-weight:1000;
      box-shadow:0 8px 18px rgba(86,155,194,.10);
      width:max-content;
      max-width:100%;
    }

    .status-card{
      align-self:end;
      background:linear-gradient(180deg,#fffef9,#f7fff4);
      border:3px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:12px 14px;
      color:var(--muted);
      font-size:13px;
      font-weight:900;
      line-height:1.6;
      pointer-events:auto;
      max-width:min(760px,100%);
    }

    .status-title{
      color:#7a63c7;
      font-size:14px;
      font-weight:1000;
      margin-bottom:4px;
    }

    .error{
      color:#b45309;
      white-space:pre-wrap;
      word-break:break-word;
    }

    @media (max-width:780px){
      .top{ align-items:stretch; }
      .side{ width:100%; }
      .pill{ width:100%; justify-content:center; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="gameMount"></div>

    <div class="shell">
      <div class="top">
        <div class="hero-card">
          <div class="kicker">🤝 GOODJUNK COOP</div>
          <h1>Coop Run</h1>
          <p class="sub">
            ช่วยกันเก็บอาหารดีในห้องเดียวกัน ใช้ room code เดียวกันเพื่อเริ่มทีมเดียวกัน
          </p>
        </div>

        <div class="side">
          <div class="pill" id="pillRoom">ROOM • -</div>
          <div class="pill" id="pillPlayer">PLAYER • -</div>
          <div class="pill" id="pillDiff">DIFF • normal</div>
          <div class="pill" id="pillTime">TIME • 180</div>
        </div>
      </div>

      <div></div>

      <div class="status-card" id="engineStatusCard">
        <div class="status-title" id="engineStatusTitle">กำลังเตรียมเกม…</div>
        <div id="engineStatusText">กำลังโหลด coop engine</div>
      </div>
    </div>
  </div>

  <script>
    (function(){
      const q = new URLSearchParams(location.search);

      const MODE = 'coop';
      const MODE_LABEL = 'Coop';
      const ENGINE_CANDIDATES = [
        './goodjunk-coop.safe.js',
        './goodjunk-coop.js',
        './js/goodjunk-coop.safe.js',
        './js/goodjunk-coop.js'
      ];

      window.HHA_CLOUD_ENDPOINT =
        String(
          q.get('api') ||
          window.HHA_CLOUD_ENDPOINT ||
          'https://script.google.com/macros/s/AKfycbwNOpsjFTV_nK0PzNV23KziF5hZxIMI50P8o_vZgwVg_T4anpXZOaKQUy_uf5PPg9kT6Q/exec'
        ).trim();

      const runCtx = {
        pid: q.get('pid') || 'anon',
        name: q.get('name') || '',
        studyId: q.get('studyId') || '',
        roomId: q.get('roomId') || q.get('room') || '',
        role: q.get('role') || 'player',
        mode: MODE,
        diff: q.get('diff') || 'normal',
        time: q.get('time') || '180',
        seed: q.get('seed') || String(Date.now()),
        startAt: 0,
        hub: q.get('hub') || new URL('../hub.html', location.href).toString(),
        view: q.get('view') || 'mobile',
        run: q.get('run') || 'play',
        gameId: q.get('gameId') || 'goodjunk'
      };

      window.__GJ_RUN_CTX__ = runCtx;
      window.__GJ_MULTI_RUN_CTX__ = runCtx;

      const $ = (id) => document.getElementById(id);
      $('pillRoom').textContent = `ROOM • ${runCtx.roomId || '-'}`;
      $('pillPlayer').textContent = `PLAYER • ${runCtx.name || runCtx.pid || '-'}`;
      $('pillDiff').textContent = `DIFF • ${runCtx.diff}`;
      $('pillTime').textContent = `TIME • ${runCtx.time}`;

      function setStatus(title, text, isError = false) {
        $('engineStatusTitle').textContent = title;
        $('engineStatusText').textContent = text;
        $('engineStatusText').className = isError ? 'error' : '';
      }

      async function fetchText(src) {
        const res = await fetch(src, { cache: 'no-store' });
        if (!res.ok) throw new Error(`${src} -> HTTP ${res.status}`);
        return await res.text();
      }

      async function loadEngine() {
        for (const src of ENGINE_CANDIDATES) {
          try {
            setStatus('กำลังโหลดเกม…', `ลองโหลด ${src}`);
            const code = await fetchText(src);
            const isModule = /^\s*(import|export)\s/m.test(code);
            const blob = new Blob([code], { type: 'text/javascript' });
            const blobUrl = URL.createObjectURL(blob);

            await new Promise((resolve, reject) => {
              const s = document.createElement('script');
              if (isModule) s.type = 'module';
              s.src = blobUrl;
              s.onload = () => resolve();
              s.onerror = () => reject(new Error(`โหลด script ไม่สำเร็จ: ${src}`));
              document.body.appendChild(s);
            });

            setStatus('เข้าเกมแล้ว', `${MODE_LABEL} engine loaded: ${src}`);
            setTimeout(() => {
              const card = $('engineStatusCard');
              if (card) card.style.display = 'none';
            }, 1200);
            console.log('[GJ-COOP-RUN] loaded engine', src, runCtx);
            return;
          } catch (err) {
            console.warn('[GJ-COOP-RUN] candidate failed', src, err);
          }
        }

        setStatus(
          'ไม่พบไฟล์ engine',
          `หา coop engine ไม่เจอ\nลองแก้ ENGINE_CANDIDATES ใน goodjunk-coop-run.html ให้ตรงกับไฟล์จริง\n\nCandidates:\n${ENGINE_CANDIDATES.join('\n')}`,
          true
        );
      }

      loadEngine();
    })();
  </script>
</body>
</html>
