<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk Coop Run</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="../favicon.ico" />
  <style>
    :root{
      --bg1:#020617; --bg2:#0b1226; --panel2:rgba(15,23,42,.94); --stroke:rgba(148,163,184,.18);
      --text:#e5e7eb; --muted:#94a3b8; --shadow:0 24px 64px rgba(0,0,0,.32);
      --sat: env(safe-area-inset-top, 0px); --sar: env(safe-area-inset-right, 0px);
      --sab: env(safe-area-inset-bottom, 0px); --sal: env(safe-area-inset-left, 0px);
    }
    *{box-sizing:border-box}
    html,body{
      margin:0; min-height:100%;
      background:radial-gradient(circle at top, #172554 0%, transparent 34%), linear-gradient(180deg,var(--bg2),var(--bg1));
      color:var(--text); font-family:system-ui,-apple-system,"Segoe UI",sans-serif; overflow:hidden
    }
    #app{position:relative;width:100vw;height:100vh;overflow:hidden}
    #gameMount{position:absolute;inset:0;z-index:1;overflow:hidden}
    #coopMeta{
      position:fixed;top:calc(10px + var(--sat));left:calc(10px + var(--sal));z-index:50;display:flex;gap:8px;flex-wrap:wrap;pointer-events:none
    }
    .meta-pill{
      display:inline-flex;align-items:center;gap:6px;padding:8px 10px;border-radius:999px;border:1px solid var(--stroke);
      background:rgba(2,6,23,.62);backdrop-filter:blur(8px);color:#cbd5e1;font-size:12px;font-weight:800;box-shadow:0 10px 24px rgba(0,0,0,.18)
    }
    .meta-pill strong{color:#e5e7eb;font-weight:900}
    .overlay{
      position:fixed;inset:0;z-index:9999;display:grid;place-items:center;
      padding:calc(16px + var(--sat)) calc(16px + var(--sar)) calc(16px + var(--sab)) calc(16px + var(--sal));
      background:rgba(2,6,23,.76);backdrop-filter:blur(8px)
    }
    .overlay[hidden]{display:none!important}
    .overlay-card{
      width:min(94vw,760px);max-height:88vh;overflow:auto;background:var(--panel2);border:1px solid var(--stroke);
      border-radius:22px;padding:20px 18px 18px;color:var(--text);box-shadow:var(--shadow)
    }
    .overlay-kicker{
      display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;background:rgba(167,139,250,.12);
      border:1px solid rgba(167,139,250,.25);color:#c4b5fd;font-weight:900;font-size:13px;margin-bottom:12px
    }
    .overlay-title{margin:0 0 8px;font-size:30px;line-height:1.1}
    .overlay-sub{margin:0;color:var(--muted);font-size:14px;line-height:1.6}
    .count-box{font-size:54px;line-height:1;font-weight:900;letter-spacing:.02em;min-height:56px;margin:12px 0 6px;text-align:center}
    .count-note{color:var(--muted);font-size:13px;text-align:center}
    .result-top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}
    .result-badge{
      min-width:110px;text-align:center;font-weight:900;font-size:18px;padding:12px 14px;border-radius:18px;
      background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25);color:#86efac
    }
    .result-table{margin-top:16px;border:1px solid var(--stroke);border-radius:18px;overflow:hidden;background:rgba(2,6,23,.45)}
    .result-head,.result-row{display:grid;grid-template-columns:1.4fr .8fr .8fr .8fr;gap:10px;padding:12px 14px;align-items:center}
    .result-head{font-weight:900;color:#cbd5e1;background:rgba(255,255,255,.04)}
    .result-row{border-top:1px solid rgba(148,163,184,.08)}
    .result-row.is-me{background:rgba(167,139,250,.10);border-top-color:rgba(167,139,250,.25)}
    .result-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
    .btn{appearance:none;border:0;cursor:pointer;border-radius:14px;padding:12px 16px;font-weight:900;font-size:14px;transition:.12s ease}
    .btn:hover{transform:translateY(-1px);filter:brightness(1.04)} .btn:active{transform:translateY(0)} .btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
    .btn-blue{background:#38bdf8;color:#082f49}.btn-good{background:#22c55e;color:#052e16}.btn-warn{background:#f59e0b;color:#3b1d00}
    .btn-ghost{background:rgba(255,255,255,.06);color:#e5e7eb;border:1px solid var(--stroke)}
    #coopRunMessage{
      position:fixed;right:calc(10px + var(--sar));bottom:calc(10px + var(--sab));z-index:60;min-width:220px;max-width:min(92vw,420px);
      padding:12px 14px;border-radius:16px;background:rgba(2,6,23,.78);border:1px solid var(--stroke);backdrop-filter:blur(8px);
      color:#cbd5e1;font-size:13px;line-height:1.55;box-shadow:0 10px 24px rgba(0,0,0,.18);display:none
    }
    #coopRunMessage.show{display:block}
    @media (max-width:640px){
      .overlay-card{width:min(96vw,760px);padding:18px 14px 16px;border-radius:18px}
      .overlay-title{font-size:26px}.count-box{font-size:46px}
      .result-head,.result-row{grid-template-columns:1.2fr .8fr .8fr .8fr;gap:8px;padding:10px 12px;font-size:13px}
      .result-actions .btn{flex:1 1 calc(50% - 10px)}
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="gameMount"></div>

    <div id="coopMeta" aria-hidden="true">
      <div class="meta-pill">MODE <strong id="metaMode">-</strong></div>
      <div class="meta-pill">ROOM <strong id="metaRoom">-</strong></div>
      <div class="meta-pill">GOAL <strong id="metaGoal">-</strong></div>
      <div class="meta-pill">TIME <strong id="metaTime">-</strong></div>
    </div>

    <div id="coopGate" class="overlay" hidden>
      <div class="overlay-card" style="width:min(92vw,460px);max-height:none;">
        <div class="overlay-kicker">COOP MODE</div>
        <h2 class="overlay-title">กำลังรอเริ่มเกมร่วมกัน</h2>
        <p id="coopGateText" class="overlay-sub">รอสัญญาณเริ่มจากห้อง...</p>
        <div id="coopGateCount" class="count-box">-</div>
        <div id="coopGateSub" class="count-note">ทีมจะเริ่มพร้อมกันเมื่อถึงเวลา startAt</div>
      </div>
    </div>

    <div id="coopSummary" class="overlay" hidden>
      <div class="overlay-card">
        <div class="result-top">
          <div>
            <div class="overlay-kicker">COOP SUMMARY</div>
            <h2 class="overlay-title">สรุปผลทีม</h2>
            <p id="coopSummarySub" class="overlay-sub">ดูคะแนนรวมทีมและผลงานของแต่ละคน</p>
          </div>
          <div id="coopSummaryBadge" class="result-badge">-</div>
        </div>

        <div class="result-table">
          <div class="result-head">
            <div>ผู้เล่น</div><div>คะแนน</div><div>Miss</div><div>Best Streak</div>
          </div>
          <div id="coopSummaryRows"></div>
        </div>

        <div id="coopSummaryHint" style="margin-top:12px;color:var(--muted);font-size:13px;">
          เป้าหมายของทีมคือต้องเก็บคะแนนรวมให้ถึง goal ก่อนหมดเวลา
        </div>

        <div class="result-actions">
          <button id="btnCoopRematch" class="btn btn-blue" type="button">เล่นใหม่</button>
          <button id="btnCoopBackLobby" class="btn btn-good" type="button">กลับ Lobby</button>
          <button id="btnCoopExport" class="btn btn-warn" type="button">Export JSON</button>
          <button id="btnCoopBackHub" class="btn btn-ghost" type="button">กลับ HUB</button>
        </div>
      </div>
    </div>

    <div id="coopRunMessage" role="status" aria-live="polite"></div>
  </div>

  <script>
    (function(){
      const q = new URLSearchParams(location.search);

      const runCtx = {
        pid: q.get('pid') || 'anon',
        name: q.get('name') || '',
        studyId: q.get('studyId') || '',
        roomId: q.get('roomId') || '',
        mode: 'coop',
        diff: q.get('diff') || 'normal',
        time: q.get('time') || '80',
        seed: q.get('seed') || '',
        startAt: Number(q.get('startAt') || 0) || 0,
        hub: q.get('hub') || '../hub.html',
        view: q.get('view') || 'mobile',
        run: q.get('run') || 'play',
        gameId: q.get('gameId') || 'goodjunk'
      };

      window.__GJ_COOP_CTX__ = runCtx;

      document.getElementById('metaMode').textContent = runCtx.mode || '-';
      document.getElementById('metaRoom').textContent = runCtx.roomId || '-';
      document.getElementById('metaTime').textContent = runCtx.time || '-';

      const msgEl = document.getElementById('coopRunMessage');

      window.__gjShowCoopRunMessage = function(message){
        if (!msgEl) return;
        msgEl.textContent = String(message || '');
        msgEl.classList.toggle('show', !!message);
      };

      window.__gjHideCoopRunMessage = function(){
        if (!msgEl) return;
        msgEl.textContent = '';
        msgEl.classList.remove('show');
      };

      window.__gjCoopUi = {
        setGoal(goal) {
          const el = document.getElementById('metaGoal');
          if (el) el.textContent = String(goal || '-');
        },
        showGate(msg = 'กำลังรอเริ่ม', count = '-', sub = '') {
          const wrap = document.getElementById('coopGate');
          const text = document.getElementById('coopGateText');
          const num  = document.getElementById('coopGateCount');
          const subEl = document.getElementById('coopGateSub');

          if (wrap) wrap.hidden = false;
          if (text) text.textContent = msg;
          if (num) num.textContent = count;
          if (subEl) subEl.textContent = sub || 'ทีมจะเริ่มพร้อมกันเมื่อถึงเวลา startAt';
        },
        hideGate() {
          const wrap = document.getElementById('coopGate');
          if (wrap) wrap.hidden = true;
        }
      };
    })();
  </script>

  <script src="../firebase-config.js"></script>
  <script type="module" src="./goodjunk.safe.coop.js?v=20260318-coop-v1"></script>
</body>
</html>
