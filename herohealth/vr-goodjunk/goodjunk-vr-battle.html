<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk VR Battle Wrapper</title>
  <meta name="color-scheme" content="dark light" />
  <style>
    :root{
      --bg1:#1f0a08;
      --bg2:#4a1710;
      --bg3:#7a2718;
      --panel:rgba(34,10,8,.78);
      --stroke:rgba(255,255,255,.14);
      --text:#fffaf8;
      --muted:#fde7df;
      --warn:#f59e0b;
      --info:#38bdf8;
      --pink:#f472b6;
      --shadow:0 24px 72px rgba(0,0,0,.34);

      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
      --sar: env(safe-area-inset-right, 0px);
    }

    *{ box-sizing:border-box; }
    html,body{
      margin:0;
      min-height:100%;
      font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI","Noto Sans Thai",sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 520px at 10% 10%, rgba(249,115,22,.20), transparent 60%),
        radial-gradient(900px 560px at 90% 0%, rgba(244,114,182,.14), transparent 60%),
        linear-gradient(180deg,var(--bg1),var(--bg2) 48%,var(--bg3));
    }

    body{ overflow:hidden; }
    button{ font:inherit; }

    .guard{
      position:fixed;
      inset:0;
      z-index:30;
      display:grid;
      place-items:center;
      padding:
        calc(16px + var(--sat))
        calc(16px + var(--sar))
        calc(16px + var(--sab))
        calc(16px + var(--sal));
      background:rgba(26,8,5,.84);
      backdrop-filter:blur(8px);
    }

    .card{
      width:min(92vw,760px);
      border-radius:28px;
      border:1px solid rgba(255,255,255,.14);
      background:var(--panel);
      box-shadow:var(--shadow);
      padding:18px;
      text-align:center;
    }

    .icon{
      width:96px;
      height:96px;
      margin:0 auto 12px;
      border-radius:28px;
      display:grid;
      place-items:center;
      font-size:46px;
      border:1px solid rgba(255,255,255,.14);
      background:linear-gradient(135deg, rgba(249,115,22,.22), rgba(245,158,11,.18));
    }

    .title{
      margin:0;
      font-size:30px;
      line-height:1.08;
      font-weight:1000;
    }

    .sub{
      margin-top:10px;
      color:var(--muted);
      font-size:15px;
      line-height:1.65;
      font-weight:900;
    }

    .chips{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .chip{
      min-height:36px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.08);
      color:#fff5ef;
      font-size:12px;
      font-weight:1000;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .players-box{
      margin-top:16px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.05);
      padding:12px;
      text-align:left;
    }

    .players-title{
      font-size:13px;
      color:var(--muted);
      font-weight:1000;
    }

    .players-list{
      margin-top:10px;
      display:grid;
      gap:10px;
    }

    .player-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:12px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.06);
    }

    .player-name{
      font-size:14px;
      font-weight:1000;
      color:#fff;
    }

    .player-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:30px;
      padding:7px 10px;
      border-radius:999px;
      font-size:11px;
      font-weight:1000;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.08);
      color:#fff;
    }

    .player-pill.host{
      border-color:rgba(245,158,11,.34);
      background:rgba(245,158,11,.16);
      color:#fff7db;
    }

    .player-pill.guest{
      border-color:rgba(249,115,22,.34);
      background:rgba(249,115,22,.16);
      color:#fff2ea;
    }

    .spinner{
      margin:16px auto 0;
      width:48px;
      height:48px;
      border-radius:999px;
      border:4px solid rgba(255,255,255,.18);
      border-top-color:#fb923c;
      animation:spin .9s linear infinite;
    }

    .actions{
      margin-top:16px;
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .btn{
      min-height:48px;
      padding:10px 14px;
      border-radius:16px;
      font-size:14px;
      font-weight:1000;
      cursor:pointer;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      color:#fff;
    }

    .btn.info{
      border-color:rgba(56,189,248,.34);
      background:linear-gradient(180deg, rgba(56,189,248,.24), rgba(56,189,248,.14));
      color:#eefbff;
    }

    .btn.warn{
      border-color:rgba(245,158,11,.34);
      background:linear-gradient(180deg, rgba(245,158,11,.24), rgba(245,158,11,.14));
      color:#fff7db;
    }

    .btn.pink{
      border-color:rgba(244,114,182,.34);
      background:linear-gradient(180deg, rgba(244,114,182,.24), rgba(244,114,182,.14));
      color:#fff1f7;
    }

    .debug{
      margin-top:16px;
      white-space:pre-wrap;
      word-break:break-word;
      overflow:auto;
      padding:12px 14px;
      border-radius:18px;
      background:rgba(24,8,3,.54);
      border:1px solid rgba(255,255,255,.12);
      color:#fde7df;
      font:900 12px/1.55 ui-monospace,monospace;
      text-align:left;
      min-height:72px;
    }

    .frame-wrap{
      position:fixed;
      inset:0;
      display:none;
      z-index:1;
      background:#000;
    }

    .frame-wrap.show{
      display:block;
    }

    iframe{
      width:100%;
      height:100%;
      border:0;
      display:block;
      background:#000;
    }

    @keyframes spin{
      to{ transform:rotate(360deg); }
    }

    @media (prefers-reduced-motion: reduce){
      *,
      *::before,
      *::after{
        animation:none !important;
        transition:none !important;
      }
    }
  </style>
</head>
<body>
  <div id="guard" class="guard">
    <div class="card">
      <div id="guardIcon" class="icon">⚔️</div>
      <h1 id="guardTitle" class="title">กำลังตรวจสอบห้อง Battle</h1>
      <div id="guardSub" class="sub">โปรดรอสักครู่ ระบบกำลังตรวจ room battle</div>

      <div class="chips">
        <div id="chipRoom" class="chip">Room: -</div>
        <div id="chipPlayers" class="chip">Players: -</div>
        <div id="chipLimit" class="chip">Limit: 2/2</div>
        <div id="chipStatus" class="chip">Status: checking</div>
      </div>

      <div id="spinner" class="spinner"></div>

      <div class="players-box">
        <div class="players-title">ผู้เล่นในห้อง</div>
        <div id="playersList" class="players-list"></div>
      </div>

      <div class="actions">
        <button id="btnRetry" class="btn warn" type="button">ลองใหม่</button>
        <button id="btnLobby" class="btn info" type="button">กลับ Lobby</button>
        <button id="btnLauncher" class="btn" type="button">กลับ Launcher</button>
        <button id="btnHub" class="btn pink" type="button">กลับ Hub</button>
      </div>

      <pre id="debugLog" class="debug">Battle wrapper ready…</pre>
    </div>
  </div>

  <div id="frameWrap" class="frame-wrap">
    <iframe id="engineFrame" title="GoodJunk Battle Engine"></iframe>
  </div>

  <script type="module">
    import {
      makeRoomAdapter,
      ensureBattleSession,
      watchBattleSession,
      getPlayers,
      getPlayerCount,
      getPlayerByPid,
      getBattleMaxPlayers
    } from './goodjunk-battle-room.js?v=20260410c-GJ-BATTLE-ROOM-GUARD-1V1-STABLE';

    const $ = (id) => document.getElementById(id);

    const qs = (k, d='') => {
      try { return new URL(location.href).searchParams.get(k) ?? d; }
      catch (_) { return d; }
    };

    let roomApi = null;
    let stopWatch = null;
    let started = false;
    let lastRoom = null;

    function clean(v, d=''){
      const s = String(v ?? '').trim();
      return s || d;
    }

    function log(msg){
      const el = $('debugLog');
      if (!el) return;
      const ts = new Date().toLocaleTimeString('th-TH', { hour12:false });
      el.textContent = `[${ts}] ${msg}`;
    }

    function buildUrl(path, extra = {}, base = location.href){
      const u = new URL(path, base);
      Object.entries(extra).forEach(([k, v]) => {
        if (v !== undefined && v !== null && v !== '') {
          u.searchParams.set(k, String(v));
        }
      });
      return u.toString();
    }

    function ctx(){
      return {
        mode: clean(qs('mode', 'battle'), 'battle'),
        room: clean(qs('room', ''), ''),
        pid: clean(qs('pid', 'anon'), 'anon'),
        name: clean(qs('name', qs('nick', 'Hero')), 'Hero'),
        nick: clean(qs('nick', qs('name', 'Hero')), 'Hero'),
        diff: clean(qs('diff', 'normal'), 'normal'),
        time: clean(qs('time', '90'), '90'),
        view: clean(qs('view', 'mobile'), 'mobile'),
        hub: clean(qs('hub', '../hub-v2.html'), '../hub-v2.html'),
        run: clean(qs('run', 'play'), 'play'),
        seed: clean(qs('seed', String(Date.now())), String(Date.now())),
        zone: clean(qs('zone', 'nutrition'), 'nutrition'),
        cat: clean(qs('cat', 'nutrition'), 'nutrition'),
        game: clean(qs('game', 'goodjunk'), 'goodjunk'),
        gameId: clean(qs('gameId', 'goodjunk'), 'goodjunk'),
        theme: clean(qs('theme', 'goodjunk'), 'goodjunk'),
        studyId: clean(qs('studyId', ''), ''),
        conditionGroup: clean(qs('conditionGroup', ''), '')
      };
    }

    function setGuardState(kind, title, sub, room = null){
      const iconMap = {
        checking: '🔍',
        waiting: '⏳',
        ready: '🎮',
        blocked: '🛑',
        error: '⚠️',
        launch: '🚀'
      };

      $('guardIcon').textContent = iconMap[kind] || '🔍';
      $('guardTitle').textContent = title || '';
      $('guardSub').textContent = sub || '';

      const c = ctx();
      $('chipRoom').textContent = `Room: ${c.room || '-'}`;
      $('chipPlayers').textContent = room ? `Players: ${getPlayerCount(room)}/${getBattleMaxPlayers()}` : 'Players: -';
      $('chipLimit').textContent = 'Limit: 2/2';
      $('chipStatus').textContent = `Status: ${room?.status || kind}`;

      $('spinner').style.display =
        kind === 'checking' || kind === 'waiting' || kind === 'launch'
          ? 'block'
          : 'none';
    }

    function renderPlayers(room){
      const wrap = $('playersList');
      if (!wrap) return;

      if (!room) {
        wrap.innerHTML = '<div class="player-row"><div class="player-name">ยังไม่พบข้อมูลห้อง</div><div class="player-pill">-</div></div>';
        return;
      }

      const players = getPlayers(room);
      if (!players.length) {
        wrap.innerHTML = '<div class="player-row"><div class="player-name">ยังไม่มีผู้เล่น</div><div class="player-pill">0</div></div>';
        return;
      }

      wrap.innerHTML = players.map((p, idx) => {
        const isHost = p.role === 'host';
        return `
          <div class="player-row">
            <div class="player-name">${idx + 1}. ${String(p.name || p.pid || 'Player')}</div>
            <div class="player-pill ${isHost ? 'host' : 'guest'}">${isHost ? '👑 Host' : '⚔️ Rival'}</div>
          </div>
        `;
      }).join('');
    }

    function buildLobbyUrl(){
      const c = ctx();
      return buildUrl('../goodjunk-battle-lobby.html', {
        mode: 'battle',
        room: c.room,
        pid: c.pid,
        name: c.name,
        nick: c.nick,
        diff: c.diff,
        time: c.time,
        view: c.view,
        hub: c.hub,
        run: c.run,
        seed: c.seed,
        zone: c.zone,
        cat: c.cat,
        game: c.game,
        gameId: c.gameId,
        theme: c.theme,
        studyId: c.studyId,
        conditionGroup: c.conditionGroup
      });
    }

    function buildLauncherUrl(){
      const c = ctx();
      return buildUrl('../goodjunk-launcher.html', {
        pid: c.pid,
        name: c.name,
        diff: c.diff,
        time: c.time,
        hub: c.hub,
        view: c.view,
        run: c.run,
        seed: c.seed,
        zone: c.zone,
        cat: c.cat,
        game: c.game,
        gameId: c.gameId,
        theme: c.theme,
        recommendedMode: 'battle'
      });
    }

    function buildEngineUrl(room){
      const c = ctx();
      const me = getPlayerByPid(room, c.pid);
      const role = me?.role === 'host' ? 'host' : 'player';

      return buildUrl('./goodjunk-vr.html', {
        mode: 'battle',
        entry: 'battle',
        recommendedMode: 'battle',
        room: c.room,
        pid: c.pid,
        name: c.name,
        nick: c.nick,
        diff: c.diff,
        time: c.time,
        view: c.view,
        hub: c.hub,
        run: c.run,
        seed: c.seed,
        zone: c.zone,
        cat: c.cat,
        game: c.game,
        gameId: c.gameId,
        theme: c.theme,
        studyId: c.studyId,
        conditionGroup: c.conditionGroup,
        role,
        maxPlayers: 2,
        fromLobby: '1',
        lobby: '1',
        multiplayer: '1',
        modeLocked: '1',
        battleGuardPassed: '1'
      });
    }

    function bootEngine(room){
      if (started) return;
      started = true;

      const href = buildEngineUrl(room);
      log(`launch engine -> ${href}`);

      setGuardState('launch', 'กำลังเข้าเกม Battle', 'ห้องพร้อมแล้ว ระบบกำลังเปิด engine', room);

      $('engineFrame').src = href;
      setTimeout(() => {
        $('guard').style.display = 'none';
        $('frameWrap').classList.add('show');
      }, 350);
    }

    async function evaluate(room){
      lastRoom = room || null;
      renderPlayers(room);

      const c = ctx();
      const me = room ? getPlayerByPid(room, c.pid) : null;
      const count = room ? getPlayerCount(room) : 0;

      if (c.mode !== 'battle') {
        setGuardState('blocked', 'โหมดไม่ถูกต้อง', 'wrapper นี้ใช้สำหรับ battle เท่านั้น', room);
        log('blocked: MODE_NOT_BATTLE');
        return;
      }

      if (!c.room) {
        setGuardState('error', 'ไม่พบ Room Code', 'ต้องมี room ก่อนเข้า battle', room);
        log('error: ROOM_MISSING');
        return;
      }

      if (!room) {
        setGuardState('checking', 'กำลังหาห้อง', 'ยังไม่พบข้อมูลห้องนี้ หรือ backend กำลังซิงก์ข้อมูล', null);
        log('checking: ROOM_NOT_FOUND');
        return;
      }

      if (room.mode !== 'battle') {
        setGuardState('blocked', 'ห้องนี้ไม่ใช่ Battle', 'พบ room แล้ว แต่ mode ของห้องไม่ใช่ battle', room);
        log('blocked: ROOM_MODE_MISMATCH');
        return;
      }

      if (!me) {
        setGuardState('blocked', 'ผู้เล่นนี้ไม่ได้อยู่ในห้อง', 'กรุณากลับไป lobby แล้วเข้าห้องด้วย PID เดิมก่อน', room);
        log('blocked: PLAYER_NOT_IN_ROOM');
        return;
      }

      if (count < 2) {
        setGuardState('waiting', 'รอผู้เล่นให้ครบ 2 คน', `ตอนนี้มี ${count}/2 คน ระบบจะยังไม่เปิดเกม`, room);
        log('waiting: WAITING_PLAYER');
        return;
      }

      if (count > 2) {
        setGuardState('blocked', 'จำนวนผู้เล่นเกิน', `ห้อง battle ต้องมีแค่ 2 คน แต่ตอนนี้มี ${count} คน`, room);
        log('blocked: ROOM_OVERFLOW');
        return;
      }

      if (room.status !== 'started') {
        setGuardState('waiting', 'รอ Host กดเริ่มเกม', 'ครบ 2/2 แล้ว แต่ห้องยังไม่ถูกสั่งเริ่ม', room);
        log('waiting: WAITING_START');
        return;
      }

      setGuardState('ready', 'ห้องพร้อมแล้ว', 'ตรวจสอบผ่านทั้งหมด กำลังเข้าเกม battle', room);
      log('ready: start engine');
      bootEngine(room);
    }

    async function retry(){
      started = false;
      $('guard').style.display = 'grid';
      $('frameWrap').classList.remove('show');
      $('engineFrame').src = 'about:blank';
      await watchRoom();
    }

    async function watchRoom(){
      const c = ctx();
      if (stopWatch && typeof stopWatch === 'function') {
        try { stopWatch(); } catch (_) {}
        stopWatch = null;
      }

      if (!c.room) {
        await evaluate(null);
        return;
      }

      stopWatch = roomApi.subscribeRoom(c.room, async (room) => {
        await evaluate(room);
      });
    }

    function bindActions(){
      $('btnRetry')?.addEventListener('click', retry);
      $('btnLobby')?.addEventListener('click', () => {
        location.href = buildLobbyUrl();
      });
      $('btnLauncher')?.addEventListener('click', () => {
        location.href = buildLauncherUrl();
      });
      $('btnHub')?.addEventListener('click', () => {
        location.href = ctx().hub;
      });
      window.addEventListener('beforeunload', () => {
        try { stopWatch?.(); } catch (_) {}
      });
    }

    async function init(){
      roomApi = makeRoomAdapter();
      bindActions();

      try {
        const session = await ensureBattleSession(ctx(), { adapter: roomApi });
        log(`initial pass -> ${session.code || 'READY'}`);
      } catch (err) {
        log(`initial check -> ${err?.code || err?.message || 'error'}`);
      }

      await watchRoom();
    }

    init();
  </script>
</body>
</html>
