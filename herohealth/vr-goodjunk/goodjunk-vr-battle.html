<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>GoodJunk Battle • 1v1 Attack</title>
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#ffb347" />
  <style>
    :root{
      --bg1:#fff7ed;
      --bg2:#fed7aa;
      --panel:#fffaf0;
      --line:#fdba74;
      --text:#3b2415;
      --muted:#7c4a22;
      --good:#22c55e;
      --bad:#ef4444;
      --gold:#facc15;
      --sky:#38bdf8;
      --orange:#f97316;
      --shadow:0 16px 36px rgba(154,75,20,.20);
      --sat:env(safe-area-inset-top,0px);
      --sar:env(safe-area-inset-right,0px);
      --sab:env(safe-area-inset-bottom,0px);
      --sal:env(safe-area-inset-left,0px);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      width:100%;
      min-height:100%;
      overflow:hidden;
      color:var(--text);
      background:
        radial-gradient(circle at 10% 0%,rgba(255,255,255,.92),transparent 22%),
        radial-gradient(circle at 90% 5%,rgba(255,236,179,.9),transparent 26%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      font-family:system-ui,-apple-system,"Segoe UI","Noto Sans Thai",sans-serif;
      touch-action:none;
      user-select:none;
    }

    button{font:inherit}

    #app{
      position:relative;
      width:100vw;
      height:100dvh;
      overflow:hidden;
      isolation:isolate;
      padding:
        calc(10px + var(--sat))
        calc(10px + var(--sar))
        calc(10px + var(--sab))
        calc(10px + var(--sal));
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:8px;
    }

    .topbar{
      z-index:5;
      border:3px solid var(--line);
      background:rgba(255,250,240,.92);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:10px;
      display:grid;
      gap:8px;
    }

    .title-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .brand-icon{
      width:54px;
      height:54px;
      border-radius:18px;
      display:grid;
      place-items:center;
      font-size:30px;
      border:3px solid #fdba74;
      background:linear-gradient(180deg,#ffedd5,#fed7aa);
      flex:0 0 auto;
    }

    .brand h1{
      margin:0;
      font-size:clamp(20px,5vw,30px);
      line-height:1.05;
      color:#7c2d12;
      font-weight:1000;
    }

    .brand p{
      margin:4px 0 0;
      color:var(--muted);
      font-size:12px;
      font-weight:900;
      line-height:1.35;
    }

    .top-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .btn{
      min-height:42px;
      border-radius:16px;
      border:3px solid #fdba74;
      background:#fff7ed;
      color:#7c2d12;
      font-weight:1000;
      padding:8px 12px;
      cursor:pointer;
      box-shadow:0 8px 16px rgba(154,75,20,.12);
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(6,minmax(0,1fr));
      gap:6px;
    }

    .pill{
      min-height:44px;
      border-radius:16px;
      border:2px solid #fed7aa;
      background:#fffaf0;
      padding:7px 8px;
      display:grid;
      align-content:center;
      gap:2px;
      text-align:center;
    }

    .pill-k{
      color:#9a4a0f;
      font-size:10px;
      font-weight:1000;
    }

    .pill-v{
      color:#3b2415;
      font-size:15px;
      font-weight:1000;
      line-height:1.1;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .arena{
      position:relative;
      z-index:1;
      min-height:0;
      border:3px solid #fdba74;
      border-radius:28px;
      background:
        radial-gradient(circle at 50% 30%,rgba(255,255,255,.65),transparent 26%),
        linear-gradient(180deg,#e0f2fe,#fef3c7);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .arena::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(90deg,rgba(255,255,255,.16) 1px,transparent 1px),
        linear-gradient(180deg,rgba(255,255,255,.16) 1px,transparent 1px);
      background-size:42px 42px;
      pointer-events:none;
      opacity:.45;
    }

    .arena.sugar-fog::after{
      content:"";
      position:absolute;
      inset:0;
      z-index:3;
      pointer-events:none;
      background:
        radial-gradient(circle at 20% 30%,rgba(255,182,193,.32),transparent 22%),
        radial-gradient(circle at 80% 40%,rgba(255,228,230,.36),transparent 24%),
        linear-gradient(180deg,rgba(255,192,203,.18),rgba(255,255,255,.08));
      backdrop-filter:blur(1.4px);
    }

    .target{
      position:absolute;
      width:76px;
      height:76px;
      border-radius:28px;
      display:grid;
      place-items:center;
      font-size:38px;
      border:4px solid white;
      box-shadow:0 12px 24px rgba(0,0,0,.18);
      cursor:pointer;
      transform:translate(-50%,-50%);
      animation:pop .15s ease both, bob 1.4s ease-in-out infinite;
      z-index:2;
      background:white;
      touch-action:none;
    }

    .target.good{
      background:linear-gradient(180deg,#dcfce7,#bbf7d0);
      border-color:#86efac;
    }

    .target.junk{
      background:linear-gradient(180deg,#fee2e2,#fecaca);
      border-color:#fca5a5;
    }

    .target.shield{
      background:linear-gradient(180deg,#dbeafe,#bfdbfe);
      border-color:#93c5fd;
    }

    .target.heart{
      background:linear-gradient(180deg,#ffe4e6,#fecdd3);
      border-color:#fb7185;
      box-shadow:0 12px 28px rgba(244,63,94,.24);
    }

    .target.confuse{
      filter:hue-rotate(120deg) saturate(1.4);
      animation:pop .15s ease both, wobble .55s ease-in-out infinite;
    }

    .target.hit{
      pointer-events:none;
      animation:hit .25s ease forwards;
    }

    @keyframes pop{
      from{transform:translate(-50%,-50%) scale(.45); opacity:0}
      to{transform:translate(-50%,-50%) scale(1); opacity:1}
    }

    @keyframes hit{
      to{transform:translate(-50%,-50%) scale(1.35); opacity:0}
    }

    @keyframes bob{
      0%,100%{margin-top:0}
      50%{margin-top:-8px}
    }

    @keyframes wobble{
      0%,100%{rotate:-8deg}
      50%{rotate:8deg}
    }

    .effect-banner{
      position:absolute;
      left:50%;
      top:12px;
      transform:translateX(-50%);
      z-index:4;
      min-height:42px;
      display:none;
      align-items:center;
      justify-content:center;
      padding:8px 14px;
      border-radius:999px;
      border:3px solid #fdba74;
      background:#fff7ed;
      color:#7c2d12;
      font-weight:1000;
      box-shadow:0 12px 24px rgba(154,75,20,.18);
      text-align:center;
    }

    .effect-banner.show{
      display:flex;
    }

    .bottom{
      z-index:5;
      border:3px solid var(--line);
      background:rgba(255,250,240,.92);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:10px;
      display:grid;
      grid-template-columns:1fr minmax(360px,520px);
      gap:10px;
      align-items:center;
    }

    .battle-note{
      color:#7c4a22;
      font-size:13px;
      font-weight:900;
      line-height:1.4;
    }

    .attack-deck{
      display:grid;
      grid-template-columns:repeat(7,minmax(42px,1fr));
      gap:6px;
      align-items:stretch;
    }

    .attack-card{
      min-height:58px;
      border-radius:16px;
      border:3px solid #fdba74;
      background:#fff7ed;
      color:#7c2d12;
      font-weight:1000;
      cursor:pointer;
      padding:5px 4px;
      display:grid;
      place-items:center;
      gap:2px;
      box-shadow:0 8px 16px rgba(154,75,20,.12);
    }

    .attack-card .atk-emoji{
      font-size:24px;
      line-height:1;
    }

    .attack-card .atk-name{
      font-size:9px;
      line-height:1.05;
    }

    .attack-card .atk-reason{
      font-size:8px;
      line-height:1.05;
      font-weight:1000;
      opacity:.92;
      max-width:100%;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .attack-card.locked{
      opacity:.46;
      filter:grayscale(.35);
      background:#fffaf0;
      color:#9a6a3a;
      box-shadow:none;
    }

    .attack-card.ready{
      opacity:1;
      color:white;
      background:linear-gradient(180deg,#fb923c,#ea580c);
      border-color:#fed7aa;
      animation:attackPulse .9s ease-in-out infinite;
    }

    .attack-card.ready .atk-reason{
      color:#fff7ed;
    }

    .attack-card.locked .atk-reason{
      color:#9a6a3a;
    }

    .attack-card:disabled{
      cursor:not-allowed;
    }

    @keyframes attackPulse{
      0%,100%{ transform:translateY(0) scale(1); }
      50%{ transform:translateY(-2px) scale(1.03); }
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:calc(88px + var(--sab));
      z-index:30;
      transform:translateX(-50%);
      max-width:min(92vw,560px);
      padding:12px 16px;
      border-radius:999px;
      border:3px solid #fdba74;
      background:#fff7ed;
      color:#7c2d12;
      font-weight:1000;
      box-shadow:0 14px 30px rgba(154,75,20,.22);
      opacity:0;
      pointer-events:none;
      transition:.15s ease;
      text-align:center;
    }

    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(-5px);
    }

    .overlay{
      position:fixed;
      inset:0;
      z-index:50;
      display:grid;
      place-items:center;
      padding:18px;
      background:rgba(124,45,18,.52);
      backdrop-filter:blur(8px);
    }

    .overlay.hidden{
      display:none;
    }

    .card{
      width:min(94vw,760px);
      border-radius:30px;
      border:3px solid #fdba74;
      background:#fffaf0;
      color:#3b2415;
      box-shadow:0 22px 54px rgba(0,0,0,.25);
      padding:18px;
      text-align:center;
    }

    .card-icon{
      width:92px;
      height:92px;
      margin:0 auto 12px;
      border-radius:30px;
      border:3px solid #fdba74;
      display:grid;
      place-items:center;
      font-size:46px;
      background:linear-gradient(180deg,#ffedd5,#fed7aa);
    }

    .card h2{
      margin:0;
      color:#7c2d12;
      font-size:clamp(26px,6vw,42px);
      line-height:1.05;
      font-weight:1000;
    }

    .card p{
      color:#7c4a22;
      font-weight:900;
      line-height:1.55;
    }

    .card-actions{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:14px;
    }

    @media (max-width:920px){
      .bottom{
        grid-template-columns:1fr;
      }

      .attack-deck{
        grid-template-columns:repeat(4,minmax(58px,1fr));
      }
    }

    @media (max-width:820px){
      .stats{
        grid-template-columns:repeat(3,minmax(0,1fr));
      }
    }

    @media (max-width:480px){
      .target{
        width:68px;
        height:68px;
        border-radius:24px;
        font-size:34px;
      }

      .stats{
        grid-template-columns:repeat(2,minmax(0,1fr));
      }

      .brand-icon{
        width:48px;
        height:48px;
        font-size:26px;
      }

      .attack-deck{
        grid-template-columns:repeat(4,minmax(54px,1fr));
      }

      .attack-card{
        min-height:54px;
      }

      .attack-card .atk-emoji{
        font-size:22px;
      }
    }

    @media (prefers-reduced-motion: reduce){
      *,*::before,*::after{
        animation:none !important;
        transition:none !important;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <section class="topbar">
      <div class="title-row">
        <div class="brand">
          <div class="brand-icon">⚔️</div>
          <div>
            <h1>GoodJunk Battle</h1>
            <p id="subText">1v1 Attack Mode • เก็บของดี สะสมพลัง แล้วเลือกโจมตีคู่แข่ง</p>
          </div>
        </div>

        <div class="top-actions">
          <button id="btnLobby" class="btn" type="button">Lobby</button>
          <button id="btnHub" class="btn" type="button">Hub</button>
        </div>
      </div>

      <div class="stats">
        <div class="pill"><div class="pill-k">PLAYER</div><div id="pName" class="pill-v">Hero</div></div>
        <div class="pill"><div class="pill-k">SCORE</div><div id="pScore" class="pill-v">0</div></div>
        <div class="pill"><div class="pill-k">COMBO</div><div id="pCombo" class="pill-v">0</div></div>
        <div class="pill"><div class="pill-k">HEART</div><div id="pHp" class="pill-v">❤️❤️❤️</div></div>
        <div class="pill"><div class="pill-k">ATTACK</div><div id="pMeter" class="pill-v">0/3</div></div>
        <div class="pill"><div class="pill-k">RIVAL</div><div id="rScore" class="pill-v">0</div></div>
      </div>
    </section>

    <main id="arena" class="arena">
      <div id="effectBanner" class="effect-banner">Battle Effect</div>
    </main>

    <section class="bottom">
      <div class="battle-note" id="battleNote">
        ✅ เก็บของดี +10 • ❌ แตะ Junk -1 หัวใจ • Combo 3 เติมพลังโจมตี 1 ช่อง
      </div>

      <div class="attack-deck" id="attackDeck" aria-label="Battle attack buttons"></div>
    </section>
  </div>

  <div id="toast" class="toast"></div>

  <div id="overlay" class="overlay">
    <div class="card">
      <div id="overlayIcon" class="card-icon">⏳</div>
      <h2 id="overlayTitle">กำลังเตรียม Battle</h2>
      <p id="overlayText">กำลังตรวจห้องและรอผู้เล่นให้ครบ 2 คน</p>
      <div class="card-actions">
        <button id="btnStartManual" class="btn" type="button">ลองเริ่มอีกครั้ง</button>
        <button id="btnBackLobby2" class="btn" type="button">กลับ Lobby</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script src="../firebase-config.js?v=20260430h-gj-battle"></script>
  <script src="./goodjunk-battle-room-bootstrap.js?v=20260430h-gj-battle"></script>

  <script type="module">
    import {
      makeRoomAdapter,
      ensureBattleSession,
      watchBattleSession,
      updateBattlePlayerStats,
      addBattleShield,
      sendBattleAttack,
      consumeBattleAttacksForPlayer,
      finishBattleMatch,
      getBattleMaxHp,
      getBattleMaxHeals,
      getBattleAttackTypes,
      canUseBattleAttack,
      getBattleOpponent,
      getPlayerByPid
    } from './goodjunk-battle-room.js?v=20260430h-GJ-BATTLE-ATTACK-BUTTONS';

    const $ = (id) => document.getElementById(id);

    const GOOD = ['🍎','🥦','🥕','🍌','🥛','🍚','🥚','🍊','🍇','🥬'];
    const JUNK = ['🍟','🍩','🧃','🍭','🍫','🍕','🥤','🍰'];
    const SHIELD = ['🛡️'];
    const HEART = ['💗','❤️‍🩹','🥗'];

    const ATTACK_ORDER = [
      'junkStorm',
      'slowTrap',
      'confuseSwap',
      'sugarFog',
      'junkMagnet',
      'comboFreeze',
      'meterLeak'
    ];

    const ATTACK_SHORT = {
      junkStorm: 'Storm',
      slowTrap: 'Slow',
      confuseSwap: 'Confuse',
      sugarFog: 'Fog',
      junkMagnet: 'Magnet',
      comboFreeze: 'Freeze',
      meterLeak: 'Leak'
    };

    const ATTACK_META = getBattleAttackTypes();

    const qs = (k, d = '') => {
      try { return new URL(location.href).searchParams.get(k) ?? d; }
      catch (_) { return d; }
    };

    const clean = (v, d = '') => {
      const s = String(v ?? '').trim();
      return s || d;
    };

    const clamp = (n, min, max) => {
      n = Number(n) || 0;
      return Math.max(min, Math.min(max, n));
    };

    function ctx(){
      return {
        mode: clean(qs('mode', 'battle'), 'battle'),
        room: clean(qs('room', qs('roomId', '')), ''),
        roomId: clean(qs('roomId', qs('room', '')), ''),
        pid: clean(qs('pid', 'anon'), 'anon'),
        name: clean(qs('name', qs('nick', 'Hero')), 'Hero'),
        nick: clean(qs('nick', qs('name', 'Hero')), 'Hero'),
        diff: clean(qs('diff', 'normal'), 'normal'),
        time: clean(qs('time', '150'), '150'),
        view: clean(qs('view', 'mobile'), 'mobile'),
        hub: clean(qs('hub', '../hub-v2.html'), '../hub-v2.html'),
        run: clean(qs('run', 'play'), 'play'),
        seed: clean(qs('seed', String(Date.now())), String(Date.now())),
        zone: clean(qs('zone', 'nutrition'), 'nutrition'),
        cat: clean(qs('cat', 'nutrition'), 'nutrition'),
        game: clean(qs('game', 'goodjunk'), 'goodjunk'),
        gameId: clean(qs('gameId', 'goodjunk'), 'goodjunk'),
        theme: clean(qs('theme', 'goodjunk'), 'goodjunk'),
        role: clean(qs('role', 'player'), 'player')
      };
    }

    const C = ctx();
    C.room = C.room || C.roomId;
    C.roomId = C.roomId || C.room;

    let adapter = null;
    let stopWatch = null;

    const state = {
      ready: false,
      started: false,
      ended: false,
      matchEndShown: false,

      duration: clamp(Number(C.time || 150), 30, 300),
      timeLeft: clamp(Number(C.time || 150), 30, 300),

      score: 0,
      combo: 0,

      maxHp: getBattleMaxHp(C.diff),
      hp: getBattleMaxHp(C.diff),

      heartsRecovered: 0,
      maxHeals: getBattleMaxHeals(C.diff),
      lastHealAt: 0,

      shield: 0,
      attackMeter: 0,

      goodHits: 0,
      junkHits: 0,
      attacksSent: 0,
      attacksBlocked: 0,
      attacksReceived: 0,

      activeFx: {},
      room: null,
      rival: null,
      timers: [],
      lastLocalSyncAt: 0
    };

    function buildUrl(path, params = {}, base = location.href){
      const u = new URL(path, base);
      Object.entries(params).forEach(([k,v]) => {
        if(v !== undefined && v !== null && v !== '') u.searchParams.set(k, String(v));
      });
      return u.toString();
    }

    function lobbyUrl(){
      return buildUrl('./goodjunk-battle-lobby.html', {
        ...C,
        mode:'battle',
        room:C.room,
        roomId:C.room,
        recommendedMode:'battle',
        entry:'battle',
        multiplayer:'1'
      });
    }

    function showToast(msg){
      const t = $('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => t.classList.remove('show'), 1300);
    }

    function setOverlay(show, icon, title, text){
      const o = $('overlay');
      if(show) o.classList.remove('hidden');
      else o.classList.add('hidden');

      $('overlayIcon').textContent = icon || '⏳';
      $('overlayTitle').textContent = title || '';
      $('overlayText').textContent = text || '';
    }

    function isFxActive(type){
      return Number(state.activeFx[type] || 0) > Date.now();
    }

    function updateFxBanner(){
      const arena = $('arena');
      if (arena) {
        arena.classList.toggle('sugar-fog', isFxActive('sugarFog'));
      }

      const el = $('effectBanner');
      const now = Date.now();
      const active = Object.entries(state.activeFx).filter(([,until]) => until > now);

      if(!active.length){
        el.classList.remove('show');
        el.textContent = '';
        return;
      }

      const labels = active.map(([type]) => {
        if(type === 'junkStorm') return '🌪️ Junk Storm!';
        if(type === 'slowTrap') return '🐌 Slow Trap!';
        if(type === 'confuseSwap') return '🌀 Confuse!';
        if(type === 'sugarFog') return '🍬 Sugar Fog!';
        if(type === 'junkMagnet') return '🧲 Junk Magnet!';
        if(type === 'comboFreeze') return '🧊 Combo Freeze!';
        return '⚔️ Battle Effect!';
      });

      el.textContent = labels.join('  ');
      el.classList.add('show');
    }

    function getRoomForAttackCheck(){
      const room = state.room && typeof state.room === 'object'
        ? JSON.parse(JSON.stringify(state.room))
        : null;

      if(!room) return null;

      room.players = room.players || {};

      room.players[C.pid] = {
        ...(room.players[C.pid] || {}),
        pid: C.pid,
        name: C.name,
        score: state.score,
        combo: state.combo,
        hp: state.hp,
        maxHp: state.maxHp,
        shield: state.shield,
        attackMeter: state.attackMeter,
        heartsRecovered: state.heartsRecovered,
        maxHeals: state.maxHeals,
        attacksSent: state.attacksSent,
        attacksBlocked: state.attacksBlocked,
        attacksReceived: state.attacksReceived,
        online: true,
        updatedAt: Date.now(),
        lastSeenAt: Date.now()
      };

      return room;
    }

    function shortAttackReason(type, reason){
      const r = String(reason || '');

      if(r.includes('พลัง')) return 'Meter';
      if(r.includes('Cooldown')) return r.replace('รอ ', '');
      if(r.includes('Combo 6')) return 'Combo 6';
      if(r.includes('Combo 9')) return 'Combo 9';
      if(r.includes('คะแนนตาม')) return 'ตาม 30';
      if(r.includes('HP เหลือ 1')) return 'HP คู่แข่ง 1';
      if(r.includes('Sugar Fog')) return 'ติด Fog';
      if(r.includes('Confuse')) return 'ติด Confuse';
      if(r.includes('ยังไม่พบคู่แข่ง')) return 'รอคู่แข่ง';
      if(r.includes('ยังไม่มีพลังให้ลด')) return 'ไม่มี Meter';

      return r || 'ยังใช้ไม่ได้';
    }

    function renderAttackDeck(){
      const deck = $('attackDeck');
      if(!deck) return;

      const room = getRoomForAttackCheck();

      const buttons = ATTACK_ORDER.map((type) => {
        const meta = ATTACK_META[type] || {};
        const check = room
          ? canUseBattleAttack(room, C.pid, type)
          : { ok:false, reason:'รอห้อง Battle' };

        const isReady = !!check.ok;
        const readyClass = isReady ? 'ready' : 'locked';
        const disabled = isReady ? '' : 'disabled';
        const reason = isReady ? 'พร้อมโจมตี' : shortAttackReason(type, check.reason);
        const title = isReady
          ? `${meta.labelTh || meta.label || type}: พร้อมใช้`
          : `${meta.labelTh || meta.label || type}: ${check.reason}`;

        return `
          <button
            class="attack-card ${readyClass}"
            type="button"
            data-attack="${type}"
            title="${title}"
            aria-label="${title}"
            ${disabled}
          >
            <span class="atk-emoji">${meta.emoji || '⚔️'}</span>
            <span class="atk-name">${ATTACK_SHORT[type] || type}</span>
            <span class="atk-reason">${reason}</span>
          </button>
        `;
      }).join('');

      deck.innerHTML = buttons;

      deck.querySelectorAll('.attack-card').forEach((btn) => {
        btn.addEventListener('click', () => {
          const type = btn.dataset.attack;

          if(!type || btn.disabled){
            showToast(btn.title || 'ยังใช้ไม่ได้');
            return;
          }

          attack(type);
        });
      });
    }

    function render(){
      $('pName').textContent = C.name || 'Hero';
      $('pScore').textContent = String(state.score);
      $('pCombo').textContent = String(state.combo);

      $('pHp').textContent =
        '❤️'.repeat(Math.max(0, state.hp)) +
        '♡'.repeat(Math.max(0, state.maxHp - state.hp));

      if (state.hp <= 0) {
        $('pHp').textContent = '💔';
      }

      $('pMeter').textContent = `${state.attackMeter}/3`;

      $('rScore').textContent = state.rival
        ? `${state.rival.name || 'Rival'}: ${Number(state.rival.score || 0)}`
        : 'รอคู่แข่ง';

      $('battleNote').textContent =
        `เวลา ${state.timeLeft}s • Shield ${state.shield ? '🛡️ พร้อมกันโจมตี' : 'ยังไม่มี'} • 💗 คืนหัวใจ ${state.heartsRecovered}/${state.maxHeals} • Combo 3 เติมพลังโจมตี`;

      renderAttackDeck();
    }

    async function syncStats(){
      if(!adapter || !C.room) return;

      await updateBattlePlayerStats(C, {
        diff: C.diff,
        score: state.score,
        combo: state.combo,
        hp: state.hp,
        maxHp: state.maxHp,
        shield: state.shield,
        attackMeter: state.attackMeter,
        heartsRecovered: state.heartsRecovered,
        maxHeals: state.maxHeals,
        lastHealAt: state.lastHealAt,
        goodHits: state.goodHits,
        junkHits: state.junkHits,
        attacksSent: state.attacksSent,
        attacksBlocked: state.attacksBlocked,
        attacksReceived: state.attacksReceived
      }, { adapter });

      state.lastLocalSyncAt = Date.now();
    }

    function pick(arr){
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function spawnTarget(){
      if(!state.started || state.ended) return;

      const arena = $('arena');
      const rect = arena.getBoundingClientRect();

      const junkStorm = isFxActive('junkStorm');
      const junkMagnet = isFxActive('junkMagnet');
      const confuse = isFxActive('confuseSwap');

      let type = 'good';
      const r = Math.random();

      const canHeal =
        state.hp > 0 &&
        state.hp < state.maxHp &&
        state.heartsRecovered < state.maxHeals;

      if(junkStorm || junkMagnet){
        if(canHeal && r > .95){
          type = 'heart';
        }else{
          type = r < .62 ? 'junk' : 'good';
        }
      }else{
        if(canHeal && r > .93){
          type = 'heart';
        }else if(r < .66){
          type = 'good';
        }else if(r < .88){
          type = 'junk';
        }else{
          type = 'shield';
        }
      }

      const el = document.createElement('button');
      el.type = 'button';
      el.className = `target ${type}`;
      if(confuse && Math.random() < .45) el.classList.add('confuse');

      const emoji =
        type === 'good' ? pick(GOOD) :
        type === 'junk' ? pick(JUNK) :
        type === 'heart' ? pick(HEART) :
        pick(SHIELD);

      el.textContent = emoji;
      el.dataset.type = type;

      const pad = 52;

      let x = pad + Math.random() * Math.max(1, rect.width - pad * 2);
      let y = pad + Math.random() * Math.max(1, rect.height - pad * 2);

      if(junkMagnet && type === 'junk'){
        x = rect.width * (0.35 + Math.random() * 0.30);
        y = rect.height * (0.35 + Math.random() * 0.30);
      }

      el.style.left = `${x}px`;
      el.style.top = `${y}px`;

      el.addEventListener('pointerdown', (ev) => {
        ev.preventDefault();
        hitTarget(el);
      }, { once:true });

      arena.appendChild(el);

      const life = isFxActive('slowTrap') ? 1150 : 1450;
      setTimeout(() => {
        if(el && el.parentNode) el.remove();
      }, life);
    }

    async function hitTarget(el){
      if(!el || state.ended) return;
      const type = el.dataset.type;

      el.classList.add('hit');
      setTimeout(() => el.remove(), 220);

      if(type === 'good'){
        state.score += 10;
        state.goodHits += 1;

        let comboAdvanced = false;

        if(!isFxActive('comboFreeze')){
          state.combo += 1;
          comboAdvanced = true;
        }else{
          showToast('🧊 Combo ถูก Freeze! ได้คะแนนแต่คอมโบไม่เพิ่ม');
        }

        if(comboAdvanced && state.combo > 0 && state.combo % 3 === 0){
          state.attackMeter = clamp(state.attackMeter + 1, 0, 3);
          showToast('⚔️ เติมพลังโจมตี +1');
        }else if(comboAdvanced){
          showToast('✅ ดีมาก +10');
        }
      }

      if(type === 'junk'){
        state.score = Math.max(0, state.score - 10);
        state.combo = 0;
        state.hp = clamp(state.hp - 1, 0, state.maxHp);
        state.junkHits += 1;
        showToast('❌ Junk! เสียคะแนนและเสียหัวใจ');
      }

      if(type === 'shield'){
        state.shield = 1;
        await addBattleShield(C, { adapter });
        showToast('🛡️ ได้ Shield กันโจมตี 1 ครั้ง');
      }

      if(type === 'heart'){
        if(state.hp < state.maxHp && state.heartsRecovered < state.maxHeals){
          state.hp = clamp(state.hp + 1, 0, state.maxHp);
          state.heartsRecovered += 1;
          state.score += 5;
          state.lastHealAt = Date.now();

          showToast(`💗 ได้หัวใจคืน +1 (${state.heartsRecovered}/${state.maxHeals})`);
        }else{
          state.score += 3;
          showToast('💗 หัวใจเต็มแล้ว +3 คะแนน');
        }
      }

      render();
      await syncStats();

      if(state.hp <= 0){
        endGame('hp_zero');
      }
    }

    async function attack(type = 'junkStorm'){
      if(state.ended || !state.started) return;

      const room = getRoomForAttackCheck();

      if(room){
        const check = canUseBattleAttack(room, C.pid, type);

        if(!check.ok){
          showToast(check.reason || 'ยังใช้ Attack นี้ไม่ได้');
          renderAttackDeck();
          return;
        }
      }

      const result = await sendBattleAttack(C, type, { adapter });

      if(result.ok){
        state.attackMeter = 0;
        state.attacksSent += 1;

        if(type === 'junkStorm') showToast('🌪️ ส่ง Junk Storm ไปแล้ว!');
        if(type === 'slowTrap') showToast('🐌 ส่ง Slow Trap ไปแล้ว!');
        if(type === 'confuseSwap') showToast('🌀 ส่ง Confuse ไปแล้ว!');
        if(type === 'sugarFog') showToast('🍬 ส่ง Sugar Fog ไปแล้ว!');
        if(type === 'junkMagnet') showToast('🧲 ส่ง Junk Magnet ไปแล้ว!');
        if(type === 'comboFreeze') showToast('🧊 ส่ง Combo Freeze ไปแล้ว!');
        if(type === 'meterLeak') showToast('💧 ส่ง Meter Leak ไปแล้ว!');

        await syncStats();
        render();
      }else{
        showToast(result.message || 'ยังโจมตีไม่ได้');
        renderAttackDeck();
      }
    }

    async function consumeIncoming(){
      if(!state.started || state.ended) return;

      const res = await consumeBattleAttacksForPlayer(C, { adapter });
      if(!res || !res.ok) return;

      if(res.blocked && res.blocked.length){
        state.shield = 0;
        state.attacksBlocked += res.blocked.length;
        showToast('🛡️ Shield บล็อกการโจมตี!');
      }

      if(res.attacks && res.attacks.length){
        res.attacks.forEach((atk) => {
          const until = Date.now() + Number(atk.durationMs || 4500);
          state.activeFx[atk.type] = until;
          state.attacksReceived += 1;

          if(atk.type === 'junkStorm') showToast('🌪️ โดน Junk Storm!');
          if(atk.type === 'slowTrap') showToast('🐌 โดน Slow Trap!');
          if(atk.type === 'confuseSwap') showToast('🌀 โดน Confuse!');
          if(atk.type === 'sugarFog') showToast('🍬 โดน Sugar Fog!');
          if(atk.type === 'junkMagnet') showToast('🧲 โดน Junk Magnet!');
          if(atk.type === 'comboFreeze') showToast('🧊 โดน Combo Freeze!');
        });
      }

      updateFxBanner();
      render();
      await syncStats();
    }

    function startLoops(){
      const spawnLoop = setInterval(() => {
        const count = isFxActive('junkStorm') ? 3 : 2;
        for(let i=0;i<count;i++){
          setTimeout(spawnTarget, i * 120);
        }
      }, 650);

      const clockLoop = setInterval(() => {
        if(!state.started || state.ended) return;

        state.timeLeft -= 1;
        if(state.timeLeft <= 0){
          state.timeLeft = 0;
          render();
          endGame('time_up');
          return;
        }

        updateFxBanner();
        render();
      }, 1000);

      const incomingLoop = setInterval(consumeIncoming, 700);
      const syncLoop = setInterval(syncStats, 1800);

      state.timers.push(spawnLoop, clockLoop, incomingLoop, syncLoop);
    }

    function stopAllLoops(){
      state.timers.forEach(t => clearInterval(t));
      state.timers = [];
    }

    function reasonLabel(reason){
      if(reason === 'hp_zero') return 'มีผู้เล่นหัวใจหมด';
      if(reason === 'time_up') return 'หมดเวลา';
      return 'จบ Battle';
    }

    function showFinalFromRoom(room){
      if(state.matchEndShown) return;

      state.matchEndShown = true;
      state.ended = true;
      stopAllLoops();

      const matchEnd = room && room.matchEnd ? room.matchEnd : {};
      const rows = Array.isArray(matchEnd.players) ? matchEnd.players : [];

      const me = rows.find(p => String(p.pid) === String(C.pid)) || getPlayerByPid(room, C.pid) || null;
      const rival =
        rows.find(p => String(p.pid) !== String(C.pid)) ||
        getBattleOpponent(room, C.pid) ||
        null;

      const myScore = Number(me?.score ?? state.score) || 0;
      const rivalScore = Number(rival?.score ?? 0) || 0;

      const winnerPid = String(matchEnd.winnerPid || '');
      const loserPid = String(matchEnd.loserPid || '');
      const reason = String(matchEnd.reason || 'ended');

      let icon = '🏁';
      let title = 'จบ Battle!';
      let text = '';

      if (!winnerPid && matchEnd.outcome === 'tie') {
        icon = '⚖️';
        title = 'เสมอกัน!';
        text = `${reasonLabel(reason)} • คะแนนคุณ ${myScore} / คู่แข่ง ${rivalScore}`;
      } else if (winnerPid === String(C.pid)) {
        icon = '🏆';
        title = reason === 'hp_zero' ? 'ชนะ KO!' : 'ชนะ Battle!';
        text =
          reason === 'hp_zero'
            ? `คู่แข่งหัวใจหมด • คะแนนคุณ ${myScore} / คู่แข่ง ${rivalScore}`
            : `${reasonLabel(reason)} • คะแนนคุณ ${myScore} / คู่แข่ง ${rivalScore}`;
      } else if (loserPid === String(C.pid)) {
        icon = '💪';
        title = reason === 'hp_zero' ? 'แพ้เพราะหัวใจหมด' : 'แพ้ Battle รอบนี้';
        text =
          reason === 'hp_zero'
            ? `หัวใจคุณหมดก่อน • คะแนนคุณ ${myScore} / คู่แข่ง ${rivalScore}`
            : `${reasonLabel(reason)} • คะแนนคุณ ${myScore} / คู่แข่ง ${rivalScore}`;
      } else {
        icon = '🏁';
        title = 'Battle จบแล้ว';
        text = `${reasonLabel(reason)} • คะแนนคุณ ${myScore} / คู่แข่ง ${rivalScore}`;
      }

      const myHp = Number(me?.hp ?? state.hp ?? 0);
      const rivalHp = Number(rival?.hp ?? 0);
      const myMaxHp = Number(me?.maxHp ?? state.maxHp);
      const rivalMaxHp = Number(rival?.maxHp ?? state.maxHp);

      text += ` • หัวใจคุณ ${myHp}/${myMaxHp}`;
      if (rival) text += ` • หัวใจคู่แข่ง ${rivalHp}/${rivalMaxHp}`;
      text += ` • ฟื้นหัวใจ ${state.heartsRecovered}/${state.maxHeals}`;
      text += ` • ส่งโจมตี ${state.attacksSent} ครั้ง`;
      text += ` • กันโจมตี ${state.attacksBlocked} ครั้ง`;

      setOverlay(true, icon, title, text);
      render();
    }

    async function endGame(reason){
      if(state.ended || state.matchEndShown) return;

      state.ended = true;
      stopAllLoops();

      await syncStats();

      let result = null;

      try{
        result = await finishBattleMatch(C, reason, {
          adapter,
          score: state.score,
          hp: state.hp
        });
      }catch(err){
        console.warn('[Battle] finishBattleMatch failed', err);
      }

      if(result && result.room){
        showFinalFromRoom(result.room);
        return;
      }

      let room = null;
      try{
        room = await adapter.loadRoom(C.room);
      }catch(_){}

      if(room && room.matchEnd){
        showFinalFromRoom(room);
        return;
      }

      const rival = room ? getBattleOpponent(room, C.pid) : null;
      const rivalScore = Number(rival?.score ?? 0) || 0;

      setOverlay(
        true,
        reason === 'hp_zero' ? '💔' : '🏁',
        reason === 'hp_zero' ? 'แพ้เพราะหัวใจหมด' : 'จบ Battle!',
        `${reasonLabel(reason)} • คะแนนคุณ ${state.score} / คู่แข่ง ${rival ? rivalScore : '-'}`
      );
    }

    async function handleRoomResult(result){
      if(result && (result.ended || result.code === 'ENDED' || result.room?.status === 'ended')){
        showFinalFromRoom(result.room);
        return;
      }

      if(!result.ok){
        state.ready = false;
        state.started = false;

        setOverlay(
          true,
          result.code === 'WAITING_PLAYER' ? '⏳' : '⚠️',
          result.title || 'ยังเริ่มไม่ได้',
          result.message || 'กำลังรอห้อง Battle'
        );

        return;
      }

      state.room = result.room;
      state.rival = getBattleOpponent(result.room, C.pid);

      const me = getPlayerByPid(result.room, C.pid);

      if (me && !state.started) {
        state.maxHp = Number(me.maxHp || state.maxHp || getBattleMaxHp(C.diff));
        state.hp = Number.isFinite(Number(me.hp)) ? Number(me.hp) : state.maxHp;
        state.attackMeter = Number(me.attackMeter || 0) || 0;
        state.shield = Number(me.shield || 0) || 0;
        state.heartsRecovered = Number(me.heartsRecovered || 0) || 0;
        state.maxHeals = Number(me.maxHeals || state.maxHeals || getBattleMaxHeals(C.diff));
      } else if (me && state.started) {
        const meUpdatedAt = Number(me.updatedAt || 0);
        const remoteMeter = Number(me.attackMeter ?? state.attackMeter);

        if (meUpdatedAt && meUpdatedAt > state.lastLocalSyncAt + 50) {
          if (remoteMeter < state.attackMeter) {
            state.attackMeter = remoteMeter;
            showToast('💧 โดน Meter Leak! พลังโจมตีลดลง');
          }

          if (Number(me.shield ?? state.shield) < state.shield) {
            state.shield = Number(me.shield ?? state.shield);
          }

          if (Number(me.hp ?? state.hp) < state.hp) {
            state.hp = Number(me.hp ?? state.hp);
          }
        }
      }

      if(!state.started){
        state.ready = true;
        state.started = true;
        setOverlay(false);
        showToast('⚔️ Battle เริ่มแล้ว!');
        startLoops();
        render();
        await syncStats();
      }else{
        state.rival = getBattleOpponent(result.room, C.pid);
        render();
      }
    }

    async function init(){
      $('btnLobby').addEventListener('click', () => location.href = lobbyUrl());
      $('btnHub').addEventListener('click', () => location.href = C.hub);
      $('btnBackLobby2').addEventListener('click', () => location.href = lobbyUrl());
      $('btnStartManual').addEventListener('click', async () => {
        try{
          const session = await ensureBattleSession(C, { adapter });
          await handleRoomResult(session);
        }catch(err){
          setOverlay(true, '⏳', err.title || 'ยังเริ่มไม่ได้', err.messageUser || err.message || 'รอผู้เล่นอีกคน');
        }
      });

      adapter = makeRoomAdapter();

      setOverlay(true, '⏳', 'กำลังตรวจ Battle', 'รอผู้เล่นให้ครบ 2 คนในห้องเดียวกัน');

      try{
        const session = await ensureBattleSession(C, { adapter });
        await handleRoomResult(session);
      }catch(err){
        setOverlay(true, '⏳', err.title || 'ยังเริ่มไม่ได้', err.messageUser || err.message || 'รอผู้เล่นอีกคน');
      }

      stopWatch = watchBattleSession(C, handleRoomResult, { adapter });

      window.addEventListener('beforeunload', () => {
        try{ stopWatch?.(); }catch(_){}
      });

      render();
    }

    init();
  </script>
</body>
</html>
