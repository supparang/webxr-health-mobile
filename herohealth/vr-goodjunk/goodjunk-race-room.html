<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>GoodJunk Race • Redirecting</title>
  <meta name="theme-color" content="#9fe3ff" />

  <style>
    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      min-height:100%;
      font-family:system-ui,-apple-system,"Segoe UI","Noto Sans Thai",sans-serif;
      color:#34515f;
      background:
        radial-gradient(circle at 18% 12%,rgba(255,255,255,.92),transparent 22%),
        radial-gradient(circle at 82% 8%,rgba(255,231,133,.38),transparent 24%),
        linear-gradient(180deg,#e9f8ff,#fff7d8);
    }

    body{
      display:grid;
      place-items:center;
      padding:18px;
    }

    .card{
      width:min(560px,100%);
      border:4px solid #bfe3f2;
      border-radius:30px;
      background:#fffef9;
      box-shadow:0 18px 42px rgba(86,155,194,.18);
      padding:24px;
      text-align:center;
    }

    .icon{
      width:82px;
      height:82px;
      border-radius:28px;
      margin:0 auto 14px;
      display:grid;
      place-items:center;
      font-size:42px;
      background:linear-gradient(180deg,#fff8dc,#ffe8a3);
      border:4px solid #d7edf7;
    }

    h1{
      margin:0 0 8px;
      font-size:clamp(26px,6vw,40px);
      color:#4197bd;
      line-height:1.1;
    }

    p{
      margin:0 auto 18px;
      max-width:440px;
      color:#6b8795;
      line-height:1.65;
      font-weight:800;
    }

    .btn{
      min-height:52px;
      border-radius:20px;
      border:3px solid #8bdcff;
      background:linear-gradient(180deg,#9fe3ff,#58b7f5);
      color:#08374d;
      font-weight:1000;
      padding:11px 16px;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 14px 30px rgba(86,155,194,.14);
    }

    .mini{
      margin-top:14px;
      font-size:12px;
      color:#8a867f;
      font-weight:800;
      word-break:break-all;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="icon">🏁</div>
    <h1>กำลังพาไปห้อง Race ใหม่</h1>
    <p>
      ระบบ Race ใช้ Lobby กลางที่เชื่อม Firebase แล้ว เพื่อให้ผู้เล่นคนละเครื่องเห็นห้องเดียวกัน
    </p>
    <a id="go" class="btn" href="./goodjunk-race-lobby.html">ไป GoodJunk Race Lobby</a>
    <div id="url" class="mini"></div>
  </main>

  <script>
    (() => {
      'use strict';

      const params = new URLSearchParams(location.search);
      const out = new URL('./goodjunk-race-lobby.html', location.href);

      const keep = [
        'pid','name','nick',
        'room','roomId',
        'diff','time','view',
        'hub','run','seed',
        'api','log','studyId','conditionGroup',
        'zone','cat','game','gameId','theme',
        'entry','recommendedMode',
        'cap','maxPlayers'
      ];

      keep.forEach(k => {
        const v = params.get(k);
        if (v !== null && v !== '') out.searchParams.set(k, v);
      });

      out.searchParams.set('mode', 'race');
      out.searchParams.set('entry', 'race');
      out.searchParams.set('recommendedMode', 'race');
      out.searchParams.set('multiplayer', '1');
      out.searchParams.set('phaseBoss', '0');
      out.searchParams.set('boss', '0');
      out.searchParams.set('soloBoss', '0');
      out.searchParams.set('bossMode', '0');

      const a = document.getElementById('go');
      const u = document.getElementById('url');

      a.href = out.toString();
      u.textContent = out.toString();

      setTimeout(() => {
        location.replace(out.toString());
      }, 650);
    })();
  </script>
</body>
</html>
