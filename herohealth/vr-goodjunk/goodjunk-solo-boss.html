<!doctype html>

  <style>
    :root{
      --bg:#020617;
      --panel:#0f172a;
      --line:rgba(148,163,184,.18);

      --muted:#cbd5e1;

      --shadow:0 22px 70px rgba(0,0,0,.38);

      --sat:env(safe-area-inset-top,0px);
      --sar:env(safe-area-inset-right,0px);
      --sab:env(safe-area-inset-bottom,0px);
      --sal:env(safe-area-inset-left,0px);
    }

    *{
      box-sizing:border-box;
    }

    html,
    body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:
        radial-gradient(circle at 15% 0%, rgba(34,197,94,.16), transparent 28%),
        radial-gradient(circle at 85% 0%, rgba(56,189,248,.14), transparent 30%),
        linear-gradient(180deg,#020617 0%,#0f172a 55%,#111827 100%);
      color:var(--text);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      -webkit-tap-highlight-color:transparent;
      touch-action:none;
      overscroll-behavior:none;
    }

    body{
      min-height:100dvh;
    }

    #gjSoloBossApp{
      width:100vw;
      height:100dvh;
      min-height:100dvh;
      overflow:hidden;
      position:relative;
      isolation:isolate;
    }

    .gjBoot{
      width:100vw;
      height:100dvh;
      display:grid;
      place-items:center;
      padding:
        calc(18px + var(--sat))
        calc(18px + var(--sar))
        calc(18px + var(--sab))
        calc(18px + var(--sal));
      text-align:center;
    }

    .gjBootCard{
      width:min(92vw,620px);
      border-radius:28px;
      border:1px solid var(--line);
      background:
        radial-gradient(circle at 50% -10%, rgba(34,197,94,.16), transparent 42%),
        linear-gradient(180deg,rgba(15,23,42,.92),rgba(2,6,23,.88));
      box-shadow:var(--shadow);
      padding:24px;
    }

    .gjBootIcon{
      width:86px;
      height:86px;
      margin:0 auto 14px;
      border-radius:28px;
      display:grid;
      place-items:center;
      font-size:46px;
      background:linear-gradient(180deg,#dcfce7,#86efac);
      box-shadow:0 18px 38px rgba(34,197,94,.25);
    }

    .gjBootTitle{
      margin:0;
      font-size:clamp(26px,5vw,42px);
      line-height:1.05;
      font-weight:1000;
      letter-spacing:-.03em;
    }

    .gjBootSub{
      margin:10px auto 0;
      max-width:480px;
      color:var(--muted);
      font-size:15px;
      line-height:1.6;
      font-weight:800;
    }

    .gjBootStatus{
      margin-top:16px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      min-height:42px;
      padding:9px 14px;
      border-radius:999px;
      background:rgba(15,23,42,.72);
      border:1px solid var(--line);
      color:#dbeafe;
      font-weight:1000;
      font-size:13px;
    }

    .gjSpin{
      width:18px;
      height:18px;
      border-radius:999px;
      border:3px solid rgba(255,255,255,.25);
      border-top-color:#86efac;
      animation:gjSpin .8s linear infinite;
    }

    @keyframes gjSpin{
      to{
        transform:rotate(360deg);
      }
    }

    .gjBootActions{
      margin-top:16px;
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .gjBootBtn{
      min-height:46px;
      padding:0 16px;
      border-radius:16px;
      border:1px solid var(--line);

      color:var(--text);
      font:inherit;
      font-weight:1000;
      cursor:pointer;
      touch-action:manipulation;
    }

    .gjBootBtn.primary{
      border:none;
      background:linear-gradient(180deg,#86efac,#22c55e);
      color:#052e16;
    }

    .gjBootError{
      margin-top:14px;
      padding:12px;
      border-radius:16px;
      border:1px solid rgba(239,68,68,.28);
      background:rgba(127,29,29,.22);
      color:#fecaca;
      font-size:13px;
      line-height:1.5;
      font-weight:800;
      display:none;
      text-align:left;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .gjBootMeta{
      margin-top:12px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .gjBootChip{
      min-height:32px;
      padding:7px 10px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:rgba(15,23,42,.72);
      border:1px solid rgba(148,163,184,.18);
      color:#e5e7eb;
      font-size:12px;
      font-weight:900;
    }
  </style>
</head>

<body>
  <main id="gjSoloBossApp" class="gj-solo-boss-app" data-game="goodjunk" data-mode="solo-boss">
    <section class="gjBoot" id="gjBoot">
      <div class="gjBootCard">
        <div class="gjBootIcon">👑</div>

        <h1 class="gjBootTitle">GoodJunk Solo Boss</h1>

        <p class="gjBootSub">
          กำลังโหลดหน้าเล่นเกมจริง ไม่ใช่หน้าเลือกโหมด
        </p>

        <div class="gjBootMeta">
          <span class="gjBootChip" id="gjBootMode">solo-boss</span>
          <span class="gjBootChip" id="gjBootDiff">normal</span>
          <span class="gjBootChip" id="gjBootView">mobile</span>
        </div>

        <div class="gjBootStatus">
          <span class="gjSpin" aria-hidden="true"></span>
          <span id="gjBootStatusText">Loading GoodJunk engine...</span>
        </div>

        <div class="gjBootActions">
          <button class="gjBootBtn primary" id="gjBootStartBtn" type="button">เริ่มเกม</button>
          <button class="gjBootBtn" id="gjBootBackBtn" type="button">ไป Cooldown / กลับ Nutrition</button>
        </div>

        <div class="gjBootError" id="gjBootError"></div>
      </div>
    </section>
  </main>

  <script>
    (function(){
      'use strict';

      const q = new URLSearchParams(location.search);

      const ROOT = 'https://supparang.github.io/webxr-health-mobile/herohealth/';
      const DEFAULT_HUB = ROOT + 'nutrition-zone.html';

      function clean(v, fallback){
        v = String(v ?? '').trim();
        return v || fallback;
      }

      function safeUrl(raw, fallback){
        try{
          if(!String(raw || '').trim()) return fallback;
          return new URL(String(raw), location.href).toString();
        }catch(_){
          return fallback;
        }
      }

      const CFG = {
        pid: clean(q.get('pid'), 'anon'),
        name: clean(q.get('name') || q.get('nick'), 'Hero'),
        nick: clean(q.get('nick') || q.get('name'), 'Hero'),

        diff: clean(q.get('diff'), 'normal'),
        time: clean(q.get('time'), '150'),
        seed: clean(q.get('seed'), String(Date.now())),
        view: clean(q.get('view'), 'mobile'),
        run: clean(q.get('run'), 'play'),

        zone: clean(q.get('zone'), 'nutrition'),
        cat: clean(q.get('cat'), 'nutrition'),
        game: 'goodjunk',
        gameId: 'goodjunk',
        mode: clean(q.get('mode'), 'solo-boss'),
        entry: clean(q.get('entry'), 'solo-boss'),
        phaseBoss: clean(q.get('phaseBoss'), '1'),
        multiplayer: clean(q.get('multiplayer'), '0'),

        hub: safeUrl(q.get('hub'), DEFAULT_HUB),
        hubRoot: safeUrl(q.get('hubRoot'), DEFAULT_HUB),

        api: clean(q.get('api'), ''),
        log: clean(q.get('log'), ''),
        studyId: clean(q.get('studyId'), ''),
        section: clean(q.get('section'), ''),
        session_code: clean(q.get('session_code'), '')
      };

      window.HHA_GOODJUNK_SOLO_BOSS_CONFIG = CFG;
      window.GJ_SOLO_BOSS_CONFIG = CFG;

      function setText(id, text){
        const el = document.getElementById(id);
        if(el) el.textContent = String(text);
      }

      setText('gjBootMode', CFG.mode);
      setText('gjBootDiff', CFG.diff);
      setText('gjBootView', CFG.view);

      function goHub(){
        location.href = CFG.hub || DEFAULT_HUB;
      }

      function showError(err){
        const box = document.getElementById('gjBootError');
        const status = document.getElementById('gjBootStatusText');

        if(status){
          status.textContent = 'โหลดเกมไม่สำเร็จ';
        }

        if(box){
          box.style.display = 'block';
          box.textContent = String(err && (err.stack || err.message) || err || 'Unknown error');
        }
      }

      document.getElementById('gjBootBackBtn')?.addEventListener('click', goHub);

      document.getElementById('gjBootStartBtn')?.addEventListener('click', function(){
        try{
          if(typeof window.startGoodJunkSoloBoss === 'function'){
            window.startGoodJunkSoloBoss(
              document.getElementById('gjSoloBossApp'),
              window.HHA_GOODJUNK_SOLO_BOSS_CONFIG
            );
            return;
          }

          window.dispatchEvent(new CustomEvent('hha:goodjunk:solo:start', { detail: CFG }));
          document.dispatchEvent(new CustomEvent('hha:goodjunk:solo:start', { detail: CFG }));
        }catch(err){
          showError(err);
        }
      });

      window.addEventListener('error', function(ev){
        showError(ev.error || ev.message);
      });

      window.addEventListener('unhandledrejection', function(ev){
        showError(ev.reason || 'Unhandled promise rejection');
      });

      window.GoodJunkSoloBossPage = {
        patch: 'v20260503u-GOODJUNK-SOLO-BOSS-HTML-RUN-ENTRY-V8-15',
        cfg: CFG,
        goHub,
        debug(){
          return {
            cfg: CFG,
            href: location.href,
            hub: CFG.hub,
            mode: CFG.mode,
            entry: CFG.entry
          };
        }
      };
    })();
  </script>

  <!-- Game engine: ต้องเป็นไฟล์เกมจริง ไม่ใช่ launcher -->
  <script src="./goodjunk-solo-boss.js?v=20260503t-v8-15-final-full-merge-lock" defer></script>
  <script src="./goodjunk-solo-boss-ultimate.js?v=20260504-v8401"></script>
  <script src="./goodjunk-solo-boss-drama.js?v=20260504-v8402"></script>

  <script>
    window.addEventListener('load', function(){
      const status = document.getElementById('gjBootStatusText');

      if(status){
        status.textContent = 'Game engine loaded';
      }

      setTimeout(function(){
        try{
          const root = document.getElementById('gjSoloBossApp');
          const cfg = window.HHA_GOODJUNK_SOLO_BOSS_CONFIG || {};

          if(typeof window.bootGoodJunkSoloBoss === 'function'){
            window.bootGoodJunkSoloBoss(root, cfg);
          }else if(window.GoodJunkSoloBoss && typeof window.GoodJunkSoloBoss.boot === 'function'){
            window.GoodJunkSoloBoss.boot(root, cfg);
          }else{
            window.dispatchEvent(new CustomEvent('hha:goodjunk:solo:start', { detail: cfg }));
            document.dispatchEvent(new CustomEvent('hha:goodjunk:solo:start', { detail: cfg }));
          }

          if(status){
            status.textContent = 'Ready';
          }
        }catch(err){
          const box = document.getElementById('gjBootError');
          if(box){
            box.style.display = 'block';
            box.textContent = String(err && (err.stack || err.message) || err);
          }
        }
      }, 100);
    });
  </script>
</body>
</html>
