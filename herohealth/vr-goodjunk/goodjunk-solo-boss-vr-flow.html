<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <title>HeroHealth • GoodJunk Solo Boss VR Flow</title>
  <meta name="theme-color" content="#dff6ef" />
  <meta name="color-scheme" content="light" />
  <link rel="icon" href="../favicon.ico" />

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <style>
    :root{
      --bg:#dff6ef;
      --card:#ffffffd9;
      --line:#ffffff;
      --ink:#0f172a;
      --muted:#475569;
      --good:#16a34a;
      --warn:#f59e0b;
      --bad:#ef4444;
      --blue:#2563eb;
      --shadow:0 16px 40px rgba(15,23,42,.16);

      --sat:env(safe-area-inset-top,0px);
      --sar:env(safe-area-inset-right,0px);
      --sab:env(safe-area-inset-bottom,0px);
      --sal:env(safe-area-inset-left,0px);
    }

    *{ box-sizing:border-box; }
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:var(--bg);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      color:var(--ink);
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
    }

    body{
      position:fixed;
      inset:0;
      overscroll-behavior:none;
    }

    #app{
      position:fixed;
      inset:0;
      overflow:hidden;
      background:
        radial-gradient(circle at 20% 0%, rgba(255,255,255,.65), transparent 28%),
        linear-gradient(180deg,#e8fbf5 0%,#dff6ef 100%);
    }

    a-scene{
      position:fixed !important;
      inset:0 !important;
      width:100% !important;
      height:100% !important;
    }

    .hud{
      position:fixed;
      top:calc(10px + var(--sat));
      left:calc(10px + var(--sal));
      right:calc(10px + var(--sar));
      z-index:30;
      display:grid;
      gap:8px;
      pointer-events:none;
    }

    .hudTop{
      display:grid;
      grid-template-columns:1fr 1fr 1fr 1fr 1fr;
      gap:8px;
    }

    .pill{
      min-height:54px;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      padding:0 16px;
      border-radius:18px;
      background:rgba(255,255,255,.82);
      border:2px solid rgba(255,255,255,.92);
      box-shadow:var(--shadow);
      font-weight:1000;
      font-size:18px;
      color:#111827;
      backdrop-filter:blur(8px);
    }

    .bossBar{
      height:18px;
      border-radius:999px;
      overflow:hidden;
      background:rgba(255,255,255,.80);
      border:2px solid rgba(255,255,255,.92);
      box-shadow:var(--shadow);
    }

    .bossBar i{
      display:block;
      height:100%;
      width:100%;
      background:linear-gradient(90deg,#22c55e,#facc15,#f97316,#ef4444);
      border-radius:999px;
      transition:width .22s ease;
    }

    .mission{
      min-height:48px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:8px 16px;
      border-radius:999px;
      background:#3e4a59;
      color:#fff;
      font-size:15px;
      font-weight:1000;
      letter-spacing:.01em;
      box-shadow:var(--shadow);
      pointer-events:none;
    }

    .versionStamp{
      position:fixed;
      top:calc(150px + var(--sat));
      right:calc(12px + var(--sar));
      z-index:31;
      min-height:48px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 18px;
      border-radius:999px;
      background:rgba(78,90,105,.88);
      color:#fff;
      font-size:14px;
      font-weight:1000;
      box-shadow:var(--shadow);
      pointer-events:none;
    }

    .crosshair{
      position:fixed;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:28px;
      height:28px;
      border-radius:999px;
      border:3px solid rgba(255,255,255,.92);
      box-shadow:
        0 0 0 2px rgba(15,23,42,.18),
        0 0 0 8px rgba(255,255,255,.08);
      z-index:29;
      pointer-events:none;
    }
    .crosshair:before,
    .crosshair:after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      background:rgba(15,23,42,.55);
      transform:translate(-50%,-50%);
    }
    .crosshair:before{ width:2px; height:34px; }
    .crosshair:after{ width:34px; height:2px; }

    .bottomBar{
      position:fixed;
      left:calc(18px + var(--sal));
      right:calc(18px + var(--sar));
      bottom:calc(18px + var(--sab));
      z-index:35;
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:14px;
    }

    .btn{
      min-height:60px;
      border:none;
      border-radius:999px;
      background:#374151;
      color:#fff;
      font:inherit;
      font-size:16px;
      font-weight:1000;
      box-shadow:var(--shadow);
      cursor:pointer;
    }

    .btn.primary{
      background:linear-gradient(180deg,#1f2937,#111827);
    }

    .btn.good{
      background:linear-gradient(180deg,#16a34a,#15803d);
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:calc(92px + var(--sab));
      transform:translateX(-50%) translateY(10px);
      z-index:60;
      min-height:46px;
      max-width:min(88vw,520px);
      padding:10px 18px;
      border-radius:16px;
      background:rgba(255,255,255,.96);
      color:#0f172a;
      font-size:14px;
      font-weight:1000;
      box-shadow:0 22px 42px rgba(15,23,42,.18);
      opacity:0;
      pointer-events:none;
      transition:.18s ease;
      text-align:center;
    }
    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    @media (max-width:720px){
      .hudTop{
        grid-template-columns:repeat(5,1fr);
      }
      .pill{
        min-height:46px;
        padding:0 12px;
        font-size:16px;
      }
      .mission{
        min-height:42px;
        font-size:13px;
      }
      .versionStamp{
        top:calc(140px + var(--sat));
        min-height:42px;
        font-size:12px;
      }
      .bottomBar{
        grid-template-columns:1fr 1fr 1fr;
        gap:10px;
      }
      .btn{
        min-height:54px;
        font-size:14px;
      }
    }

    body.summary-open .hud,
    body.summary-open .versionStamp,
    body.summary-open .crosshair,
    body.summary-open .bottomBar,
    body.summary-open .toast{
      display:none !important;
    }
  </style>
</head>
<body>
  <div id="app">
    <a-scene
      id="scene"
      embedded
      background="color:#dff6ef"
      renderer="antialias:true; colorManagement:true"
      vr-mode-ui="enabled:true"
      device-orientation-permission-ui="enabled:false">

      <a-assets>
        <img id="asset-broccoli" src="../assets/goodjunk/broccoli.png" crossorigin="anonymous">
        <img id="asset-apple" src="../assets/goodjunk/apple.png" crossorigin="anonymous">
        <img id="asset-shield" src="../assets/goodjunk/shield.png" crossorigin="anonymous">
        <img id="asset-donut" src="../assets/goodjunk/donut.png" crossorigin="anonymous">
        <img id="asset-fries" src="../assets/goodjunk/fries.png" crossorigin="anonymous">
        <img id="asset-water" src="../assets/goodjunk/water.png" crossorigin="anonymous">
      </a-assets>

      <a-entity id="cameraRig" position="0 1.6 0">
        <a-camera
          id="camera"
          wasd-controls-enabled="false"
          look-controls="touchEnabled:true; mouseEnabled:true"
          raycaster="objects: .clickable; far: 12; interval: 60"
          cursor="rayOrigin: mouse">
        </a-camera>
      </a-entity>

      <!-- Sky / Ground -->
      <a-sky color="#e5f7f0"></a-sky>
      <a-plane
        rotation="-90 0 0"
        width="40"
        height="40"
        color="#8bc29a"
        position="0 0 -6">
      </a-plane>

      <!-- Boss -->
      <a-entity id="bossRoot" position="0 2.2 -6.2">
        <a-sphere radius="0.82" color="#6b1f0f"></a-sphere>
        <a-cone radius-bottom="0.12" radius-top="0.02" height="0.36" color="#d33" position="-0.36 0.76 0.18" rotation="0 0 18"></a-cone>
        <a-cone radius-bottom="0.12" radius-top="0.02" height="0.36" color="#d33" position="0.36 0.76 0.18" rotation="0 0 -18"></a-cone>

        <a-sphere radius="0.12" color="#fff" position="-0.24 0.1 0.70"></a-sphere>
        <a-sphere radius="0.12" color="#fff" position="0.24 0.1 0.70"></a-sphere>
        <a-sphere radius="0.05" color="#111" position="-0.22 0.08 0.79"></a-sphere>
        <a-sphere radius="0.05" color="#111" position="0.22 0.08 0.79"></a-sphere>

        <a-box depth="0.03" height="0.04" width="0.28" color="#111827" position="-0.24 0.33 0.72" rotation="0 0 -18"></a-box>
        <a-box depth="0.03" height="0.04" width="0.28" color="#111827" position="0.24 0.33 0.72" rotation="0 0 18"></a-box>

        <a-plane width="0.44" height="0.18" color="#f7f0c6" position="-0.18 -0.28 0.73" rotation="0 0 22"></a-plane>
        <a-box depth="0.05" width="0.08" height="0.18" color="#fff" position="-0.06 -0.18 0.78"></a-box>
        <a-box depth="0.05" width="0.08" height="0.18" color="#fff" position="0.08 -0.26 0.78"></a-box>
      </a-entity>

      <!-- Boss label -->
      <a-entity position="0 3.25 -6.2">
        <a-text value="JUNK BOSS" align="center" color="#1f2937" width="4"></a-text>
      </a-entity>

      <!-- roots -->
      <a-entity id="targetRoot"></a-entity>
      <a-entity id="fxRoot"></a-entity>
    </a-scene>

    <!-- HUD -->
    <div class="hud">
      <div class="hudTop">
        <div class="pill" id="hudStage">Warmup</div>
        <div class="pill" id="hudScore">0</div>
        <div class="pill" id="hudTime">90</div>
        <div class="pill" id="hudLives">💚💚</div>
        <div class="pill" id="hudCombo">–</div>
      </div>

      <div class="bossBar"><i id="bossHpFill"></i></div>

      <div class="mission" id="missionText">Warmup: ยิง GOOD 2 ชิ้น แล้วค่อยยิง SHIELD</div>
    </div>

    <div class="versionStamp" id="versionStamp">8.44.8a TARGET</div>
    <div class="crosshair"></div>

    <div class="bottomBar">
      <button class="btn" id="btnBack">🎮 โหมดเกม</button>
      <button class="btn primary" id="btnEnterVr">🥽 ENTER VR</button>
      <button class="btn good" id="btnShoot">🎯 ยิง</button>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <script>
    (function(){
      'use strict';

      const PATCH = 'v8.44.8a-GOODJUNK-VR-WARMUP-TARGET-VISIBLE-HOTFIX';
      const ASSET_VERSION = 'v8448a';

      const q = new URLSearchParams(location.search || '');
      const ROUTES = {
        launcher: q.get('return') || q.get('back') || '../goodjunk-launcher.html',
        hub: q.get('hub') || '../hub-v2.html'
      };

      const GOOD = [
        { id:'broccoli', label:'BROCCOLI', asset:'asset-broccoli' },
        { id:'apple', label:'APPLE', asset:'asset-apple' }
      ];

      const POWER = [
        { id:'shield', label:'SHIELD', asset:'asset-shield' }
      ];

      const JUNK = [
        { id:'donut', label:'DONUT', asset:'asset-donut' },
        { id:'fries', label:'FRIES', asset:'asset-fries' }
      ];

      const DOC = document;
      const WIN = window;

      const el = {
        scene: DOC.getElementById('scene'),
        cameraRig: DOC.getElementById('cameraRig'),
        camera: DOC.getElementById('camera'),
        targetRoot: DOC.getElementById('targetRoot'),
        fxRoot: DOC.getElementById('fxRoot'),
        bossRoot: DOC.getElementById('bossRoot'),

        hudStage: DOC.getElementById('hudStage'),
        hudScore: DOC.getElementById('hudScore'),
        hudTime: DOC.getElementById('hudTime'),
        hudLives: DOC.getElementById('hudLives'),
        hudCombo: DOC.getElementById('hudCombo'),
        bossHpFill: DOC.getElementById('bossHpFill'),
        missionText: DOC.getElementById('missionText'),
        versionStamp: DOC.getElementById('versionStamp'),

        btnBack: DOC.getElementById('btnBack'),
        btnEnterVr: DOC.getElementById('btnEnterVr'),
        btnShoot: DOC.getElementById('btnShoot'),
        toast: DOC.getElementById('toast')
      };

      const state = {
        stage:'intro',
        score:0,
        timeLeft:Number(q.get('time') || 90),
        lives:2,
        combo:0,
        bossHp:100,
        warmGoodHits:0,
        warmShieldHit:false,
        warmStarted:false,
        startPanelBusy:false,
        targets:new Set(),
        clockTimer:0
      };

      function now(){ return Date.now(); }
      function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
      function saveLastError(where, err){
        try{
          console.error('[GoodJunk VR]', where, err);
          localStorage.setItem('GJ_VR_LAST_ERR', JSON.stringify({
            where,
            message:String(err && (err.stack || err.message) || err || ''),
            at:new Date().toISOString(),
            patch:PATCH
          }));
        }catch(_){}
      }

      function sceneReady(){
        return !!(el.scene && el.scene.hasLoaded);
      }

      function afterSceneReady(fn){
        if(sceneReady()){
          fn();
          return;
        }
        el.scene.addEventListener('loaded', fn, { once:true });
      }

      function safeSetAttr(node, name, value){
        try{
          if(!node) return;
          node.setAttribute(name, value);
        }catch(err){
          saveLastError('safeSetAttr:' + name, err);
        }
      }

      function safeRemoveEntity(node, delay){
        delay = Number(delay || 0);
        WIN.setTimeout(function(){
          try{
            if(node && node.parentNode){
              node.parentNode.removeChild(node);
            }
          }catch(err){
            saveLastError('safeRemoveEntity', err);
          }
        }, delay);
      }

      function showToast(text){
        if(!el.toast) return;
        el.toast.textContent = text || '';
        el.toast.classList.add('show');
        clearTimeout(showToast._t);
        showToast._t = setTimeout(function(){
          el.toast.classList.remove('show');
        }, 1450);
      }

      function setMission(text){
        if(el.missionText) el.missionText.textContent = text || '';
      }

      function updateHud(){
        if(el.hudStage){
          el.hudStage.textContent =
            state.stage === 'intro' ? 'Ready' :
            state.stage === 'warmup' ? 'Warmup' :
            state.stage === 'main' ? 'Main' :
            'Done';
        }
        if(el.hudScore) el.hudScore.textContent = String(state.score);
        if(el.hudTime) el.hudTime.textContent = String(state.timeLeft);
        if(el.hudLives) el.hudLives.textContent = '💚'.repeat(Math.max(0, state.lives)) || '–';
        if(el.hudCombo) el.hudCombo.textContent = state.combo > 0 ? 'x' + state.combo : '–';
        if(el.bossHpFill) el.bossHpFill.style.width = clamp(state.bossHp,0,100) + '%';
        if(el.versionStamp) el.versionStamp.textContent = '8.44.8a TARGET';
      }

      function clearTargets(){
        try{
          Array.from(state.targets).forEach(function(node){
            safeRemoveEntity(node, 0);
          });
          state.targets.clear();

          if(el.targetRoot){
            Array.from(el.targetRoot.children || []).forEach(function(child){
              safeRemoveEntity(child, 0);
            });
          }
        }catch(err){
          saveLastError('clearTargets', err);
        }
      }

      function hardClearStartPanels(){
        try{
          const selectors = [
            '#vrStartPanel',
            '[data-kind="vr-start"]',
            '.gj-start-panel',
            '.gj-vr-start-panel'
          ];

          selectors.forEach(function(sel){
            Array.from(document.querySelectorAll(sel)).forEach(function(node){
              try{
                state.targets.delete(node);
                safeRemoveEntity(node, 0);
              }catch(_){}
            });
          });

          if(el.targetRoot){
            Array.from(el.targetRoot.children || []).forEach(function(child){
              const kind = child.dataset && child.dataset.kind;
              const idv = child.id || '';
              if(kind === 'vr-start' || idv === 'vrStartPanel'){
                try{
                  state.targets.delete(child);
                  safeRemoveEntity(child, 0);
                }catch(_){}
              }
            });
          }
        }catch(err){
          saveLastError('hardClearStartPanels', err);
        }
      }

      function resetCameraForWarmup(){
        try{
          if(el.cameraRig){
            safeSetAttr(el.cameraRig, 'position', '0 1.6 0');
            safeSetAttr(el.cameraRig, 'rotation', '0 0 0');
          }
          if(el.camera){
            safeSetAttr(el.camera, 'position', '0 0 0');
            safeSetAttr(el.camera, 'rotation', '0 0 0');
          }
        }catch(err){
          saveLastError('resetCameraForWarmup', err);
        }
      }

      function spawnVrStartPanel(){
        hardClearStartPanels();

        const wrap = DOC.createElement('a-entity');
        wrap.id = 'vrStartPanel';
        wrap.dataset.kind = 'vr-start';
        wrap.classList.add('gj-vr-start-panel');

        safeSetAttr(wrap, 'position', '0 1.8 -3.1');

        const panel = DOC.createElement('a-plane');
        safeSetAttr(panel, 'width', '2.8');
        safeSetAttr(panel, 'height', '1.18');
        safeSetAttr(panel, 'color', '#ffffff');
        safeSetAttr(panel, 'opacity', '0.94');
        safeSetAttr(panel, 'material', 'transparent:true; opacity:0.94; side:double');
        wrap.appendChild(panel);

        const title = DOC.createElement('a-text');
        safeSetAttr(title, 'value', '🎯 START WARMUP');
        safeSetAttr(title, 'align', 'center');
        safeSetAttr(title, 'color', '#0f172a');
        safeSetAttr(title, 'width', '3.6');
        safeSetAttr(title, 'position', '0 0.18 0.03');
        wrap.appendChild(title);

        const sub = DOC.createElement('a-text');
        safeSetAttr(sub, 'value', 'แตะปุ่มล่าง หรือยิงป้ายนี้เพื่อเริ่ม');
        safeSetAttr(sub, 'align', 'center');
        safeSetAttr(sub, 'color', '#475569');
        safeSetAttr(sub, 'width', '3.0');
        safeSetAttr(sub, 'position', '0 -0.14 0.03');
        wrap.appendChild(sub);

        const hit = DOC.createElement('a-plane');
        safeSetAttr(hit, 'width', '2.8');
        safeSetAttr(hit, 'height', '1.18');
        safeSetAttr(hit, 'position', '0 0 0.06');
        safeSetAttr(hit, 'opacity', '0.001');
        safeSetAttr(hit, 'material', 'transparent:true; opacity:0.001; side:double');
        hit.classList.add('clickable');
        hit.addEventListener('click', startWarmupFromVr);
        wrap.appendChild(hit);

        el.targetRoot.appendChild(wrap);
        state.targets.add(wrap);
      }

      function createTarget(kind, data, opts){
        opts = opts || {};

        const wrap = DOC.createElement('a-entity');
        wrap.dataset.kind = kind;
        wrap.dataset.id = data.id;

        const x = Number(opts.x || 0);
        const y = Number(opts.y || 1.5);
        const z = Number(opts.z || -3);
        const scale = Number(opts.scale || 1);

        safeSetAttr(wrap, 'position', `${x} ${y} ${z}`);
        safeSetAttr(wrap, 'scale', `${scale} ${scale} ${scale}`);

        const plate = DOC.createElement('a-circle');
        safeSetAttr(plate, 'radius', '0.56');
        safeSetAttr(plate, 'color', '#ffffff');
        safeSetAttr(plate, 'position', '0 0 -0.03');
        safeSetAttr(plate, 'material', 'transparent:true; opacity:0.94; side:double');
        wrap.appendChild(plate);

        const ring = DOC.createElement('a-ring');
        safeSetAttr(ring, 'radius-inner', '0.51');
        safeSetAttr(ring, 'radius-outer', '0.60');
        safeSetAttr(ring, 'color',
          kind === 'warm-good' ? '#16a34a' :
          kind === 'warm-power' ? '#2563eb' :
          '#ef4444'
        );
        safeSetAttr(ring, 'position', '0 0 -0.01');
        wrap.appendChild(ring);

        const icon = DOC.createElement('a-plane');
        safeSetAttr(icon, 'width', '0.72');
        safeSetAttr(icon, 'height', '0.72');
        safeSetAttr(icon, 'position', '0 0 0.02');
        safeSetAttr(icon, 'material',
          `src:#${data.asset}; transparent:true; alphaTest:0.08; side:double; shader:flat`
        );
        icon.classList.add('clickable');
        icon.addEventListener('click', function(ev){
          ev.preventDefault();
          ev.stopPropagation();
          hitTarget(wrap);
        });
        wrap.appendChild(icon);

        const label = DOC.createElement('a-text');
        safeSetAttr(label, 'value', data.label);
        safeSetAttr(label, 'align', 'center');
        safeSetAttr(label, 'color', '#1f2937');
        safeSetAttr(label, 'width', '2.2');
        safeSetAttr(label, 'position', '0 0.86 0.03');
        wrap.appendChild(label);

        if(opts.static){
          safeSetAttr(wrap, 'rotation', '0 0 0');
        }

        el.targetRoot.appendChild(wrap);
        state.targets.add(wrap);
        return wrap;
      }

      function spawnWarmupSet(){
        clearTargets();
        hardClearStartPanels();
        resetCameraForWarmup();

        // GOOD 2 ชิ้น เห็นชัดหน้า camera
        createTarget('warm-good', GOOD[0], {
          x:-1.05,
          y:1.58,
          z:-2.85,
          static:true,
          scale:1.28
        });

        createTarget('warm-good', GOOD[1], {
          x:1.05,
          y:1.58,
          z:-2.85,
          static:true,
          scale:1.28
        });

        // JUNK ตัวอย่าง เพื่อให้เห็นว่าของไม่ดีคืออะไร
        createTarget('warm-junk', JUNK[0], {
          x:0,
          y:2.12,
          z:-3.12,
          static:true,
          scale:1.00
        });

        // SHIELD อยู่ใกล้ด้านล่าง
        createTarget('warm-power', POWER[0], {
          x:0,
          y:1.12,
          z:-2.55,
          static:true,
          scale:1.18
        });

        setMission('Warmup: ยิง GOOD 2 ชิ้น แล้วค่อยยิง SHIELD');
        showToast('เป้าโผล่แล้ว! ยิง GOOD 2 ชิ้นก่อน');

        // fallback: ถ้าเป้าไม่ขึ้น ให้ spawn ซ้ำ
        setTimeout(function(){
          if(state.stage !== 'warmup') return;

          const warmTargets = Array.from(state.targets).filter(function(t){
            const k = t && t.dataset && t.dataset.kind;
            return k === 'warm-good' || k === 'warm-junk' || k === 'warm-power';
          });

          if(warmTargets.length < 3){
            console.warn('[GoodJunk VR] warmup targets missing, respawn');
            clearTargets();

            createTarget('warm-good', GOOD[0], {
              x:-0.95, y:1.55, z:-2.60, static:true, scale:1.34
            });
            createTarget('warm-good', GOOD[1], {
              x:0.95, y:1.55, z:-2.60, static:true, scale:1.34
            });
            createTarget('warm-power', POWER[0], {
              x:0, y:1.12, z:-2.35, static:true, scale:1.24
            });

            setMission('Warmup: เห็นเป้าแล้ว ยิง GOOD 2 ชิ้น แล้วค่อยยิง SHIELD');
            showToast('respawn เป้าให้อัตโนมัติแล้ว');
          }
        }, 600);

        updateHud();
      }

      function hitTarget(wrap){
        if(!wrap || !wrap.dataset) return;
        const kind = wrap.dataset.kind || '';
        const id = wrap.dataset.id || '';

        if(state.stage === 'warmup'){
          if(kind === 'warm-good'){
            state.warmGoodHits += 1;
            state.score += 10;
            state.combo += 1;
            showToast('ดีมาก! นี่คือ GOOD');
            safeRemoveEntity(wrap, 0);
            state.targets.delete(wrap);

            if(state.warmGoodHits >= 2){
              setMission('ดีมาก! ตอนนี้ยิง SHIELD ได้เลย');
            }else{
              setMission('Warmup: ยิง GOOD อีก 1 ชิ้น แล้วค่อยยิง SHIELD');
            }
          }
          else if(kind === 'warm-power'){
            if(state.warmGoodHits < 2){
              showToast('ยังไม่ใช่! ยิง GOOD ให้ครบ 2 ชิ้นก่อน');
              setMission('Warmup: ยิง GOOD 2 ชิ้น แล้วค่อยยิง SHIELD');
              return;
            }

            state.warmShieldHit = true;
            state.score += 20;
            state.combo += 1;
            showToast('สุดยอด! ได้ SHIELD แล้ว');
            safeRemoveEntity(wrap, 0);
            state.targets.delete(wrap);

            setMission('Warmup ผ่านแล้ว! กำลังเข้า Main...');
            updateHud();

            setTimeout(function(){
              startMain();
            }, 800);
            return;
          }
          else if(kind === 'warm-junk'){
            showToast('DONUT คือ JUNK — อย่ายิงตอนนี้');
            setMission('Warmup: อย่ายิง JUNK ให้ยิง GOOD 2 ชิ้น แล้วค่อย SHIELD');
            return;
          }

          updateHud();
          return;
        }

        if(state.stage === 'main'){
          if(id === 'broccoli' || id === 'apple'){
            state.score += 20;
            state.combo += 1;
            state.bossHp = clamp(state.bossHp - 10, 0, 100);
            showToast('GOOD HIT! โจมตีบอส');
          }else if(id === 'shield'){
            state.score += 15;
            state.combo += 1;
            showToast('ได้ SHIELD!');
          }else{
            state.combo = 0;
            showToast('อันนี้ JUNK ระวัง!');
          }

          safeRemoveEntity(wrap, 0);
          state.targets.delete(wrap);
          updateHud();

          if(state.bossHp <= 0){
            state.stage = 'done';
            setMission('ชนะแล้ว! บอสแพ้แล้ว 🎉');
            showToast('JUNK BOSS DEFEATED!');
            clearInterval(state.clockTimer);
            clearTargets();
            updateHud();
            return;
          }

          if(state.targets.size < 3){
            spawnMainTargets();
          }
        }
      }

      function spawnMainTargets(){
        clearTargets();
        createTarget('main-good', GOOD[0], { x:-1.15, y:1.45, z:-2.95, scale:1.2 });
        createTarget('main-good', GOOD[1], { x:1.15, y:1.45, z:-2.95, scale:1.2 });
        createTarget('main-power', POWER[0], { x:0, y:1.05, z:-2.55, scale:1.12 });
        createTarget('main-junk', JUNK[1], { x:0, y:2.05, z:-3.15, scale:0.98 });

        setMission('Main: ยิง GOOD / เก็บ SHIELD / หลีกเลี่ยง JUNK');
      }

      function startMain(){
        state.stage = 'main';
        clearTargets();
        spawnMainTargets();
        updateHud();
      }

      function startWarmupFromVr(){
        if(!sceneReady()){
          afterSceneReady(startWarmupFromVr);
          return;
        }

        state.startPanelBusy = false;
        state.stage = 'warmup';
        state.warmStarted = true;
        state.warmGoodHits = 0;
        state.warmShieldHit = false;
        state.combo = 0;
        state.score = 0;
        state.bossHp = 100;
        state.lives = 2;

        hardClearStartPanels();
        resetCameraForWarmup();
        spawnWarmupSet();
        updateHud();
      }

      function shootCenter(){
        try{
          const camEl = el.camera;
          const camObj = camEl && camEl.getObject3D('camera');
          if(!camObj) return;

          const rc = new THREE.Raycaster();
          rc.setFromCamera(new THREE.Vector2(0, 0), camObj);

          const clickableMeshes = [];
          Array.from(document.querySelectorAll('.clickable')).forEach(function(node){
            if(node && node.object3D){
              node.object3D.traverse(function(obj){
                if(obj.isMesh) clickableMeshes.push(obj);
              });
            }
          });

          const hits = rc.intersectObjects(clickableMeshes, true);
          if(!hits.length) return;

          let obj = hits[0].object;
          while(obj && obj.el == null){
            obj = obj.parent;
          }

          if(obj && obj.el){
            obj.el.dispatchEvent(new MouseEvent('click', { bubbles:true }));
          }
        }catch(err){
          saveLastError('shootCenter', err);
        }
      }

      function goBack(){
        location.href = ROUTES.launcher;
      }

      function enterVr(){
        if(el.scene && el.scene.enterVR){
          el.scene.enterVR();
        }
      }

      function startClock(){
        clearInterval(state.clockTimer);
        state.clockTimer = setInterval(function(){
          if(state.stage !== 'warmup' && state.stage !== 'main') return;

          state.timeLeft = Math.max(0, state.timeLeft - 1);
          updateHud();

          if(state.timeLeft <= 0){
            clearInterval(state.clockTimer);
            state.stage = 'done';
            clearTargets();
            setMission('หมดเวลาแล้ว');
            showToast('หมดเวลา');
            updateHud();
          }
        }, 1000);
      }

      function boot(){
        updateHud();
        spawnVrStartPanel();
        startClock();

        el.btnBack.addEventListener('click', goBack);
        el.btnEnterVr.addEventListener('click', function(){
          enterVr();
          if(!state.warmStarted){
            startWarmupFromVr();
          }
        });
        el.btnShoot.addEventListener('click', function(){
          if(state.stage === 'intro'){
            startWarmupFromVr();
            return;
          }
          shootCenter();
        });

        // auto ready
        setMission('Warmup: ยิง GOOD 2 ชิ้น แล้วค่อยยิง SHIELD');

        try{
          localStorage.setItem('GJ_FULL_3D_VR_BOOT_LAST', JSON.stringify({
            patch:PATCH,
            assetVersion:ASSET_VERSION,
            href:location.href,
            savedAt:new Date().toISOString(),
            targetVisibleHotfix:true
          }));
        }catch(_){}
      }

      afterSceneReady(function(){
        try{
          boot();
        }catch(err){
          saveLastError('boot', err);
        }
      });

    })();
  </script>
</body>
</html>
