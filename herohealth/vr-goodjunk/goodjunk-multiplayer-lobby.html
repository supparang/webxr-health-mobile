<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk Multiplayer Lobby Bridge</title>
  <meta name="color-scheme" content="dark light" />
  <style>
    :root{
      --bg1:#020617;
      --bg2:#0b1226;
      --panel:rgba(2,6,23,.78);
      --stroke:rgba(148,163,184,.18);
      --text:#e5e7eb;
      --muted:#94a3b8;
      --shadow:0 24px 64px rgba(0,0,0,.28);
    }
    *{ box-sizing:border-box; }
    html,body{
      margin:0;
      min-height:100%;
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 0%, rgba(56,189,248,.12), transparent 20%),
        radial-gradient(circle at 80% 0%, rgba(167,139,250,.12), transparent 20%),
        linear-gradient(180deg,var(--bg2),var(--bg1));
    }
    .wrap{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
    }
    .card{
      width:min(92vw,680px);
      background:var(--panel);
      border:1px solid var(--stroke);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:22px 20px;
      text-align:center;
      backdrop-filter:blur(10px);
    }
    .kicker{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--stroke);
      color:#dbeafe;
      font-size:12px;
      font-weight:900;
      margin-bottom:12px;
    }
    h1{
      margin:0 0 8px;
      font-size:28px;
      line-height:1.12;
    }
    .muted{
      color:var(--muted);
      font-size:14px;
      line-height:1.65;
    }
    .box{
      margin-top:14px;
      padding:14px;
      border-radius:18px;
      border:1px solid var(--stroke);
      background:rgba(15,23,42,.45);
      text-align:left;
      font-size:13px;
      line-height:1.7;
      color:#dbe4f0;
      word-break:break-word;
    }
    .row{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:16px;
    }
    .btn{
      appearance:none;
      border:1px solid var(--stroke);
      border-radius:14px;
      min-height:46px;
      padding:11px 14px;
      background:rgba(255,255,255,.05);
      color:var(--text);
      font:inherit;
      font-weight:900;
      cursor:pointer;
      transition:.12s ease;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .btn:hover{ transform:translateY(-1px); }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <div class="kicker">GOODJUNK • LEGACY LOBBY</div>
      <h1>กำลังย้ายไป lobby ใหม่…</h1>
      <div class="muted">
        ไฟล์เก่านี้ถูกเก็บไว้เป็นสะพานเชื่อม เพื่อให้ลิงก์เก่าที่เคยแชร์ยังเข้าใช้งานต่อได้
      </div>

      <div class="box">
        <div><strong>mode:</strong> <span id="modeText">-</span></div>
        <div><strong>roomId:</strong> <span id="roomText">-</span></div>
        <div><strong>ปลายทาง:</strong> <span id="targetText">-</span></div>
      </div>

      <div class="row">
        <a id="goNow" class="btn" href="#">ไปต่อทันที</a>
        <a class="btn" href="./goodjunk-launcher.html">ไปหน้า Launcher</a>
      </div>
    </section>
  </div>

<script>
(function(){
  const q = new URLSearchParams(location.search);

  function normMode(v){
    const m = String(v || '').trim().toLowerCase();
    return ['solo','race','battle','coop'].includes(m) ? m : '';
  }

  function cleanRoom(v){
    return String(v || '').trim().toUpperCase().replace(/[^A-Z0-9-]/g,'').slice(0,16);
  }

  function firstNonEmpty(...vals){
    for(const v of vals){
      if(String(v || '').trim()) return String(v).trim();
    }
    return '';
  }

  const mode = normMode(q.get('mode'));
  const roomId = cleanRoom(firstNonEmpty(q.get('roomId'), q.get('room')));
  const name = firstNonEmpty(q.get('name'), q.get('nick'));

  const targetMap = {
    race: './goodjunk-race-room.html',
    battle: './goodjunk-battle-lobby.html',
    coop: './goodjunk-coop-lobby.html',
    solo: './goodjunk-vr.html'
  };

  const targetBase = targetMap[mode] || './goodjunk-launcher.html';
  const u = new URL(targetBase, location.href);

  q.forEach((value, key) => {
    if (!u.searchParams.has(key)) u.searchParams.set(key, value);
  });

  if (roomId) u.searchParams.set('roomId', roomId);
  u.searchParams.delete('room');

  if (name) u.searchParams.set('name', name);
  u.searchParams.delete('nick');

  if (mode) u.searchParams.set('mode', mode);

  const target = u.toString();

  document.getElementById('modeText').textContent = mode || '(ไม่มี mode)';
  document.getElementById('roomText').textContent = roomId || '(ไม่มี room)';
  document.getElementById('targetText').textContent = targetBase;
  document.getElementById('goNow').href = target;

  setTimeout(() => {
    location.replace(target);
  }, 350);
})();
</script>
</body>
</html>
