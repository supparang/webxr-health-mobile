<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Redirecting…</title>
  <script>
    (function () {
      try {
        var target = new URL('./goodjunk-duet-play.html', location.href);
        var src = new URL(location.href);

        src.searchParams.forEach(function (v, k) {
          target.searchParams.set(k, v);
        });

        location.replace(target.toString());
      } catch (e) {
        location.href = './goodjunk-duet-play.html' + location.search;
      }
    })();
  </script>
  <style>
    html,body{
      margin:0;
      min-height:100%;
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      display:grid;
      place-items:center;
      background:linear-gradient(180deg,#dff4ff,#fff7d8);
      color:#4d4a42;
    }
    .box{
      padding:20px 24px;
      border-radius:18px;
      border:2px solid #bfe3f2;
      background:#fffef8;
      font-weight:900;
      box-shadow:0 12px 30px rgba(86,155,194,.14);
      text-align:center;
    }
  </style>
</head>
<body>
  <div class="box">กำลังพาไปหน้าเล่นคู่เวอร์ชันใหม่…</div>
</body>
</html>
