<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk Duet Run</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="./favicon.ico" />

  <style>
    :root{
      --bg1:#020617;
      --bg2:#0b1226;
      --bg3:#111827;
      --panel:rgba(2,6,23,.76);
      --stroke:rgba(148,163,184,.18);
      --text:#e5e7eb;
      --muted:#94a3b8;
      --good:#22c55e;
      --bad:#ef4444;
      --blue:#38bdf8;
      --pink:#f472b6;
      --violet:#a78bfa;
      --shadow:0 24px 64px rgba(0,0,0,.28);

      --duet-panel: rgba(15,23,42,.78);
      --duet-stroke: rgba(148,163,184,.18);
      --duet-soft: rgba(2,6,23,.42);
      --duet-text: #f8fafc;
      --duet-muted: #94a3b8;
      --duet-pink: #f472b6;
      --duet-blue: #38bdf8;

      --sat: env(safe-area-inset-top, 0px);
      --sar: env(safe-area-inset-right, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      min-height:100%;
      color:var(--text);
      font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans Thai","Noto Sans",Arial,sans-serif;
      background:
        radial-gradient(circle at 20% 0%, rgba(244,114,182,.10), transparent 24%),
        radial-gradient(circle at 80% 0%, rgba(56,189,248,.10), transparent 24%),
        linear-gradient(180deg,var(--bg2),var(--bg1));
    }

    body{ overflow-x:hidden; }

    .page{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      gap:12px;
      padding:
        calc(12px + var(--sat))
        calc(12px + var(--sar))
        calc(16px + var(--sab))
        calc(12px + var(--sal));
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      position:relative;
      z-index:30;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-radius:18px;
      border:1px solid var(--stroke);
      background:rgba(2,6,23,.55);
      backdrop-filter:blur(10px);
    }

    .brand-title{
      font-size:16px;
      font-weight:1100;
      line-height:1.1;
    }

    .brand-sub{
      margin-top:2px;
      color:var(--muted);
      font-size:12px;
      font-weight:900;
    }

    .top-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .btn{
      appearance:none;
      border:1px solid rgba(148,163,184,.20);
      background:rgba(255,255,255,.04);
      color:var(--text);
      border-radius:14px;
      min-height:42px;
      padding:10px 12px;
      font:inherit;
      font-weight:1000;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }

    .btn.violet{
      border-color:rgba(167,139,250,.28);
      background:rgba(167,139,250,.14);
    }

    .btn.ghost{
      color:var(--muted);
    }

    .run-shell{
      display:grid;
      grid-template-columns:minmax(280px,360px) 1fr;
      gap:12px;
      min-height:calc(100vh - 100px);
      align-items:start;
    }

    @media (max-width:980px){
      .run-shell{ grid-template-columns:1fr; }
    }

    .duet-hud{
      position:relative;
      border-radius:24px;
      border:1px solid var(--duet-stroke);
      background:var(--duet-panel);
      backdrop-filter:blur(10px);
      box-shadow:var(--shadow);
      padding:14px;
      display:grid;
      gap:12px;
      z-index:20;
    }

    .duet-hud-toolbar{
      display:flex;
      justify-content:flex-end;
    }

    .duet-hud-toggle{
      min-width:40px;
      min-height:40px;
      border-radius:12px;
      border:1px solid var(--duet-stroke);
      background:rgba(255,255,255,.05);
      color:var(--duet-text);
      font-size:18px;
      font-weight:1000;
      cursor:pointer;
    }

    .duet-top{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .duet-pill{
      display:inline-flex;
      align-items:center;
      min-height:34px;
      padding:6px 12px;
      border-radius:999px;
      border:1px solid var(--duet-stroke);
      background:rgba(255,255,255,.04);
      color:#fff;
      font-size:12px;
      font-weight:1000;
    }

    .duet-score{
      border-radius:20px;
      border:1px solid var(--duet-stroke);
      background:rgba(255,255,255,.04);
      padding:14px;
      text-align:center;
    }

    .duet-score-label{
      font-size:12px;
      font-weight:1000;
      color:var(--duet-muted);
      letter-spacing:.08em;
    }

    .duet-score-value{
      margin-top:6px;
      font-size:40px;
      line-height:1;
      font-weight:1100;
      color:#fff;
    }

    .duet-stats{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:10px;
    }

    .duet-stat{
      border-radius:18px;
      border:1px solid var(--duet-stroke);
      background:rgba(255,255,255,.04);
      padding:12px;
      text-align:center;
    }

    .duet-stat-k{
      font-size:12px;
      font-weight:1000;
      color:var(--duet-muted);
    }

    .duet-stat-v{
      margin-top:6px;
      font-size:22px;
      line-height:1;
      font-weight:1100;
      color:#fff;
    }

    .duet-panel{
      border-radius:20px;
      border:1px solid var(--duet-stroke);
      background:rgba(255,255,255,.04);
      padding:12px;
      display:grid;
      gap:12px;
    }

    .duet-item{
      display:flex;
      gap:12px;
      align-items:center;
    }

    .duet-item-icon{
      width:64px;
      height:64px;
      border-radius:18px;
      border:1px solid var(--duet-stroke);
      background:rgba(255,255,255,.04);
      display:grid;
      place-items:center;
      overflow:hidden;
    }

    .emoji{
      font-size:34px;
      line-height:1;
    }

    .duet-item-title{
      font-size:16px;
      font-weight:1100;
      color:#fff;
    }

    .duet-item-sub{
      margin-top:4px;
      font-size:13px;
      line-height:1.6;
      color:var(--duet-muted);
      font-weight:900;
    }

    .duet-mini-stats{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:10px;
    }

    .duet-mini{
      border-radius:16px;
      border:1px solid var(--duet-stroke);
      background:rgba(255,255,255,.03);
      padding:10px;
      text-align:center;
    }

    .duet-mini-k{
      font-size:11px;
      color:var(--duet-muted);
      font-weight:1000;
    }

    .duet-mini-v{
      margin-top:4px;
      font-size:20px;
      line-height:1;
      font-weight:1100;
      color:#fff;
    }

    .duet-tip{
      border-radius:14px;
      border:1px dashed var(--duet-stroke);
      background:rgba(255,255,255,.03);
      padding:10px 12px;
      color:#e5e7eb;
      font-size:13px;
      line-height:1.6;
      font-weight:900;
    }

    .duet-goal{
      display:grid;
      gap:8px;
    }

    .duet-goal-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }

    .duet-goal-title{
      font-size:12px;
      font-weight:1100;
      color:var(--duet-muted);
      letter-spacing:.08em;
    }

    .duet-goal-value{
      font-size:18px;
      line-height:1;
      font-weight:1100;
      color:#fff;
    }

    .duet-bar,.duet-bar-sub{
      height:12px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      overflow:hidden;
    }

    .duet-bar-fill{
      height:100%;
      width:0%;
      border-radius:999px;
      background:linear-gradient(90deg,var(--duet-pink),#fbcfe8);
      transition:width .16s linear;
    }

    .duet-bar-sub-fill{
      height:100%;
      width:0%;
      border-radius:999px;
      background:linear-gradient(90deg,var(--duet-blue),#93c5fd);
      transition:width .16s linear;
    }

    .stage-wrap{
      min-width:0;
      border-radius:24px;
      border:1px solid var(--stroke);
      background:rgba(2,6,23,.45);
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      overflow:hidden;
      min-height:640px;
    }

    .stage-head{
      padding:14px 16px;
      border-bottom:1px solid var(--stroke);
      color:#f8fafc;
      font-size:14px;
      font-weight:1100;
      letter-spacing:.05em;
      background:rgba(15,23,42,.68);
    }

    .stage-inner{
      position:relative;
      flex:1 1 auto;
      min-height:580px;
      background:
        radial-gradient(circle at 30% 10%, rgba(244,114,182,.08), transparent 24%),
        radial-gradient(circle at 80% 10%, rgba(56,189,248,.08), transparent 24%),
        linear-gradient(180deg,#0f172a,#0b1220 60%,#111827);
    }

    #duetGameStage{
      position:relative;
      width:100%;
      height:100%;
      min-height:580px;
      overflow:hidden;
    }

    .duet-result-mount{
      position:fixed;
      inset:0;
      z-index:60;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      background:rgba(2,6,23,.74);
      backdrop-filter:blur(10px);
    }

    .duet-result-card{
      width:min(980px,100%);
      max-height:min(92vh,1020px);
      overflow:auto;
      border-radius:28px;
      border:1px solid rgba(148,163,184,.18);
      background:rgba(15,23,42,.94);
      box-shadow:0 28px 80px rgba(0,0,0,.42);
      padding:18px;
      display:grid;
      gap:14px;
    }

    .duet-result-title{
      font-size:28px;
      line-height:1.1;
      font-weight:1100;
      color:#fff;
    }

    .duet-result-sub{
      color:var(--muted);
      font-size:14px;
      line-height:1.6;
      font-weight:900;
    }

    .duet-result-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    @media (max-width:760px){
      .duet-result-mount{
        padding:10px;
        align-items:flex-end;
      }
      .duet-result-card{
        border-radius:22px;
        padding:12px;
      }
      .duet-result-title{
        font-size:20px;
      }
      .duet-result-sub{
        font-size:12px;
      }
      .duet-result-actions{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:10px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="brand">
        <div style="font-size:20px;">👯</div>
        <div>
          <div class="brand-title">GoodJunk • Duet Run</div>
          <div class="brand-sub">จับคู่เก็บของดี ช่วยกันทำคะแนน</div>
        </div>
      </div>

      <div class="top-actions">
        <a class="btn ghost" id="btnBackLauncher" href="./goodjunk-launcher.html">← Launcher</a>
        <a class="btn violet" id="btnGoHub" href="./hub.html">🏠 Hub</a>
      </div>
    </div>

    <div class="run-shell">
      <div id="duetHud" class="duet-hud">
        <div class="duet-hud-toolbar">
          <button id="duetHudToggle" class="duet-hud-toggle" type="button">⋯</button>
        </div>

        <div class="duet-top">
          <div class="duet-pill" id="duetModePill">DUET</div>
          <div class="duet-pill" id="duetRoomPill">ROOM -</div>
        </div>

        <div class="duet-score">
          <div class="duet-score-label">SCORE</div>
          <div class="duet-score-value" id="duetScoreValue">0</div>
        </div>

        <div class="duet-stats">
          <div class="duet-stat">
            <div class="duet-stat-k">เวลา</div>
            <div class="duet-stat-v" id="duetTimeValue">0:00</div>
          </div>
          <div class="duet-stat">
            <div class="duet-stat-k">Miss</div>
            <div class="duet-stat-v" id="duetMissValue">0</div>
          </div>
          <div class="duet-stat">
            <div class="duet-stat-k">Streak</div>
            <div class="duet-stat-v" id="duetStreakValue">0</div>
          </div>
        </div>

        <div class="duet-panel">
          <div class="duet-item">
            <div class="duet-item-icon" id="duetItemIcon">
              <div class="emoji" id="duetItemEmoji">🍉</div>
            </div>
            <div class="duet-item-meta">
              <div class="duet-item-title" id="duetItemTitle">GOOD</div>
              <div class="duet-item-sub" id="duetItemSub">เก็บของดีให้ได้มากที่สุด</div>
            </div>
          </div>

          <div class="duet-mini-stats">
            <div class="duet-mini">
              <div class="duet-mini-k">Good hit</div>
              <div class="duet-mini-v" id="duetGoodHitValue">0</div>
            </div>
            <div class="duet-mini">
              <div class="duet-mini-k">Junk hit</div>
              <div class="duet-mini-v" id="duetJunkHitValue">0</div>
            </div>
            <div class="duet-mini">
              <div class="duet-mini-k">Good missed</div>
              <div class="duet-mini-v" id="duetGoodMissValue">0</div>
            </div>
          </div>

          <div class="duet-tip" id="duetTipText">ช่วยกันเก็บของดีให้ได้มากที่สุด</div>

          <div class="duet-goal">
            <div class="duet-goal-head">
              <div class="duet-goal-title">PAIR GOAL</div>
              <div class="duet-goal-value" id="duetPairGoalValue">360</div>
            </div>

            <div class="duet-bar">
              <div class="duet-bar-fill" id="duetPairGoalFill"></div>
            </div>

            <div class="duet-bar-sub">
              <div class="duet-bar-sub-fill" id="duetPairGoalSubFill"></div>
            </div>
          </div>
        </div>
      </div>

      <section class="stage-wrap">
        <div class="stage-head">DUET GAME STAGE</div>
        <div class="stage-inner">
          <div id="duetGameStage"></div>
        </div>
      </section>
    </div>
  </div>

  <div id="duetResultMount" class="duet-result-mount" hidden></div>

  <script>
    (function duetRunShellBoot(){
      const qs = new URLSearchParams(location.search);
      const hub = qs.get('hub') || './hub.html';

      const btnGoHub = document.getElementById('btnGoHub');
      const btnBackLauncher = document.getElementById('btnBackLauncher');

      if (btnGoHub) btnGoHub.href = hub;
      if (btnBackLauncher) {
        const u = new URL('./goodjunk-launcher.html', location.href);
        ['pid','hub','run','diff','time','studyId','phase','conditionGroup','view','api','log','debug','ai']
          .forEach(k=>{
            const v = qs.get(k);
            if (v != null && v !== '') u.searchParams.set(k, v);
          });
        btnBackLauncher.href = u.toString();
      }
    })();
  </script>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="../firebase-config.js"></script>
  <script src="../common/hha-multiplayer.js"></script>
  <script src="./goodjunk.safe.duet.js?v=20260327-duet-hhamulti-v1"></script>
</body>
</html>
