<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>GoodJunk Battle Run Bridge</title>
</head>
<body>
<script>
(function () {
  'use strict';

  const q = new URLSearchParams(location.search);

  function firstNonEmpty() {
    for (let i = 0; i < arguments.length; i++) {
      const v = String(arguments[i] || '').trim();
      if (v) return v;
    }
    return '';
  }

  function cleanRoom(v) {
    return String(v || '')
      .trim()
      .toUpperCase()
      .replace(/[^A-Z0-9_-]/g, '')
      .slice(0, 24);
  }

  function cleanText(v, maxLen) {
    return String(v || '').trim().slice(0, maxLen || 64);
  }

  const roomRaw = firstNonEmpty(q.get('roomId'), q.get('room'));
  const roomId = cleanRoom(roomRaw);

  const nameRaw = firstNonEmpty(q.get('name'), q.get('nick'));
  const name = cleanText(nameRaw, 40);

  const target = new URL('./goodjunk-battle-run.html', location.href);

  q.forEach((value, key) => {
    if (!target.searchParams.has(key)) {
      target.searchParams.set(key, value);
    }
  });

  if (roomId) {
    target.searchParams.set('roomId', roomId);
    target.searchParams.set('room', roomId);
  }

  if (name) {
    target.searchParams.set('name', name);
    target.searchParams.set('nick', name);
  }

  target.searchParams.set('mode', 'battle');

  if (location.hash) {
    target.hash = location.hash;
  }

  location.replace(target.toString());
})();
</script>
</body>
</html>
