<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk Duet Play</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="./favicon.ico" />
  <style>
    :root{
      --bg1:#061327;
      --bg2:#0b2550;
      --bg3:#15417d;

      --panel:rgba(6,16,38,.74);
      --panel2:rgba(11,22,48,.82);
      --stroke:rgba(255,255,255,.14);

      --text:#f8fbff;
      --muted:#dbeafe;
      --info:#38bdf8;
      --good:#22c55e;
      --pink:#f472b6;
      --yellow:#facc15;
      --warn:#f59e0b;

      --shadow:0 18px 48px rgba(0,0,0,.28);
      --shadow-big:0 24px 72px rgba(0,0,0,.34);

      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
      --sar: env(safe-area-inset-right, 0px);
    }

    *{ box-sizing:border-box; }
    html,body{
      margin:0;
      min-height:100%;
      color:var(--text);
      font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI","Noto Sans Thai",sans-serif;
      background:
        radial-gradient(900px 520px at 10% 10%, rgba(56,189,248,.22), transparent 60%),
        radial-gradient(900px 560px at 90% 0%, rgba(244,114,182,.16), transparent 60%),
        radial-gradient(700px 420px at 50% 100%, rgba(250,204,21,.12), transparent 60%),
        linear-gradient(180deg,var(--bg1),var(--bg2) 48%,var(--bg3));
    }

    body{ overflow:hidden; }
    button{ font:inherit; }

    .app{
      min-height:100dvh;
      display:grid;
      grid-template-rows:auto 1fr;
      padding:
        calc(12px + var(--sat))
        calc(12px + var(--sar))
        calc(12px + var(--sab))
        calc(12px + var(--sal));
      gap:12px;
    }

    .topbar{
      border:1px solid var(--stroke);
      background:var(--panel);
      backdrop-filter:blur(12px);
      border-radius:24px;
      box-shadow:var(--shadow-big);
      padding:14px;
      display:grid;
      gap:12px;
    }

    .top-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .brand-badge{
      width:62px;
      height:62px;
      border-radius:22px;
      display:grid;
      place-items:center;
      font-size:32px;
      border:1px solid rgba(255,255,255,.14);
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.24), transparent 38%),
        linear-gradient(135deg, rgba(56,189,248,.22), rgba(244,114,182,.18));
      box-shadow:0 12px 24px rgba(0,0,0,.16);
      flex:0 0 auto;
    }

    .brand-title{
      font-size:24px;
      font-weight:1000;
      line-height:1.08;
      color:#fff;
    }

    .brand-sub{
      margin-top:5px;
      color:var(--muted);
      font-size:13px;
      line-height:1.55;
      font-weight:900;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:flex-end;
    }

    .btn{
      min-height:46px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.14);
      color:#fff;
      font-size:14px;
      font-weight:1000;
      cursor:pointer;
      padding:10px 14px;
      background:rgba(255,255,255,.06);
      box-shadow:0 10px 20px rgba(0,0,0,.16);
      transition:transform .12s ease, filter .12s ease, opacity .12s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      filter:brightness(1.05);
    }

    .btn:disabled{
      opacity:.58;
      cursor:not-allowed;
      transform:none !important;
      filter:none !important;
    }

    .btn.info{
      background:linear-gradient(180deg, rgba(56,189,248,.24), rgba(56,189,248,.14));
      border-color:rgba(56,189,248,.34);
      color:#eefbff;
    }

    .btn.good{
      background:linear-gradient(180deg, rgba(34,197,94,.24), rgba(34,197,94,.14));
      border-color:rgba(34,197,94,.34);
      color:#f0fff5;
    }

    .btn.warn{
      background:linear-gradient(180deg, rgba(250,204,21,.24), rgba(250,204,21,.14));
      border-color:rgba(250,204,21,.34);
      color:#fff9db;
    }

    .btn.pink{
      background:linear-gradient(180deg, rgba(244,114,182,.24), rgba(244,114,182,.14));
      border-color:rgba(244,114,182,.34);
      color:#fff1f7;
    }

    .info-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:10px;
    }

    .pill{
      border-radius:18px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
      padding:12px;
      min-height:72px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:6px;
      box-shadow:var(--shadow);
    }

    .pill-label{
      font-size:11px;
      color:var(--muted);
      font-weight:1000;
    }

    .pill-value{
      font-size:18px;
      line-height:1.15;
      font-weight:1000;
      color:#fff;
      word-break:break-word;
    }

    .stage{
      position:relative;
      min-height:0;
      border:1px solid var(--stroke);
      background:var(--panel2);
      backdrop-filter:blur(12px);
      border-radius:26px;
      box-shadow:var(--shadow-big);
      overflow:hidden;
    }

    .state-layer{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      padding:18px;
      z-index:5;
      background:
        radial-gradient(circle at 50% 10%, rgba(255,255,255,.06), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
    }

    .state-card{
      width:min(92vw,760px);
      border-radius:26px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.07);
      box-shadow:0 18px 40px rgba(0,0,0,.22);
      padding:18px;
      text-align:center;
    }

    .state-icon{
      width:92px;
      height:92px;
      margin:0 auto 12px;
      border-radius:28px;
      display:grid;
      place-items:center;
      font-size:44px;
      border:1px solid rgba(255,255,255,.14);
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.24), transparent 38%),
        linear-gradient(135deg, rgba(56,189,248,.22), rgba(244,114,182,.18));
      box-shadow:0 14px 28px rgba(0,0,0,.16);
    }

    .state-title{
      font-size:28px;
      line-height:1.08;
      font-weight:1000;
      color:#fff;
    }

    .state-sub{
      margin-top:10px;
      color:var(--muted);
      font-size:15px;
      line-height:1.65;
      font-weight:900;
    }

    .chips{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
      margin-top:14px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:36px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.08);
      color:#eef6ff;
      font-size:12px;
      font-weight:1000;
    }

    .spinner{
      margin:16px auto 0;
      width:48px;
      height:48px;
      border-radius:999px;
      border:4px solid rgba(255,255,255,.18);
      border-top-color:#7dd3fc;
      animation:spin .9s linear infinite;
    }

    .inline-actions{
      margin-top:16px;
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .players-box{
      margin-top:16px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.05);
      padding:12px;
      text-align:left;
    }

    .players-title{
      font-size:13px;
      color:var(--muted);
      font-weight:1000;
    }

    .players-list{
      margin-top:10px;
      display:grid;
      gap:10px;
    }

    .player-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:12px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.06);
    }

    .player-name{
      font-size:14px;
      font-weight:1000;
      color:#fff;
    }

    .player-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:30px;
      padding:7px 10px;
      border-radius:999px;
      font-size:11px;
      font-weight:1000;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.08);
      color:#fff;
    }

    .player-pill.host{
      border-color:rgba(250,204,21,.34);
      background:rgba(250,204,21,.16);
      color:#fff9db;
    }

    .player-pill.guest{
      border-color:rgba(56,189,248,.34);
      background:rgba(56,189,248,.16);
      color:#e0f2fe;
    }

    .engine-wrap{
      position:absolute;
      inset:0;
      z-index:1;
      display:none;
      background:#000;
    }

    .engine-wrap.show{
      display:block;
    }

    .engine-frame{
      width:100%;
      height:100%;
      border:0;
      display:block;
      background:#000;
    }

    .log-box{
      margin-top:14px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(1,8,26,.54);
      padding:12px 14px;
      color:#dbeafe;
      font-size:12px;
      line-height:1.55;
      font-weight:900;
      min-height:72px;
      white-space:pre-wrap;
      word-break:break-word;
    }

    @keyframes spin{
      to{ transform:rotate(360deg); }
    }

    @media (max-width:980px){
      .info-grid{ grid-template-columns:repeat(2,minmax(0,1fr)); }
    }

    @media (max-width:720px){
      .app{
        padding:
          calc(10px + var(--sat))
          calc(10px + var(--sar))
          calc(10px + var(--sab))
          calc(10px + var(--sal));
      }
      .info-grid{ grid-template-columns:1fr; }
      .top-row{ align-items:flex-start; }
      .actions{ justify-content:flex-start; }
      .brand-badge{
        width:56px;
        height:56px;
        font-size:28px;
        border-radius:20px;
      }
      .brand-title{ font-size:22px; }
      .state-title{ font-size:24px; }
    }

    @media (prefers-reduced-motion: reduce){
      *,
      *::before,
      *::after{
        animation:none !important;
        transition:none !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="topbar">
      <div class="top-row">
        <div class="brand">
          <div class="brand-badge">👫</div>
          <div>
            <div class="brand-title">GoodJunk Duet Play</div>
            <div class="brand-sub">wrapper สำหรับตรวจ room และล็อกโหมด duet ก่อนเข้า engine จริง</div>
          </div>
        </div>

        <div class="actions">
          <button id="btnBackLobby" class="btn info" type="button">กลับ Lobby</button>
          <button id="btnBackLauncher" class="btn" type="button">กลับ Launcher</button>
          <button id="btnBackHub" class="btn pink" type="button">กลับ Hub</button>
        </div>
      </div>

      <div class="info-grid">
        <div class="pill">
          <div class="pill-label">Room</div>
          <div id="infoRoom" class="pill-value">-</div>
        </div>
        <div class="pill">
          <div class="pill-label">Mode</div>
          <div id="infoMode" class="pill-value">duet</div>
        </div>
        <div class="pill">
          <div class="pill-label">Role</div>
          <div id="infoRole" class="pill-value">-</div>
        </div>
        <div class="pill">
          <div class="pill-label">Status</div>
          <div id="infoStatus" class="pill-value">กำลังตรวจสอบ...</div>
        </div>
      </div>
    </section>

    <section class="stage">
      <div id="stateLayer" class="state-layer">
        <div class="state-card">
          <div id="stateIcon" class="state-icon">🔍</div>
          <div id="stateTitle" class="state-title">กำลังตรวจสอบห้อง</div>
          <div id="stateSub" class="state-sub">โปรดรอสักครู่ ระบบกำลังตรวจสอบว่า room ถูกต้องและพร้อมเริ่มเกมหรือยัง</div>

          <div class="chips">
            <div id="chipRoom" class="chip">Room: -</div>
            <div id="chipPlayers" class="chip">Players: -</div>
            <div id="chipStarted" class="chip">Status: checking</div>
          </div>

          <div id="spinner" class="spinner"></div>

          <div class="players-box">
            <div class="players-title">ผู้เล่นในห้อง</div>
            <div id="playersList" class="players-list"></div>
          </div>

          <div class="inline-actions">
            <button id="btnRetry" class="btn warn" type="button">ลองใหม่</button>
            <button id="btnForceOpen" class="btn good" type="button" style="display:none">เข้าเกมตอนนี้</button>
          </div>

          <div id="debugLog" class="log-box">Duet play wrapper ready…</div>
        </div>
      </div>

      <div id="engineWrap" class="engine-wrap">
        <iframe id="engineFrame" class="engine-frame" title="GoodJunk Duet Engine"></iframe>
      </div>
    </section>
  </div>

  <script type="module">
    import {
      makeRoomAdapter,
      loadRecentRoom,
      getPlayers,
      getPlayerCount,
      getPlayerByPid
    } from './vr-goodjunk/goodjunk-duet-room.js?v=20260409d-GJ-DUET-ROOM-GUARD';

    const $ = (id) => document.getElementById(id);

    const qs = (k, d='') => {
      try { return new URL(location.href).searchParams.get(k) ?? d; }
      catch (_) { return d; }
    };

    const STORAGE = {
      lastModePrefix: 'GJ_LAST_MODE:',
      lastRunUrlPrefix: 'GJ_LAST_RUN_URL:'
    };

    let roomApi = null;
    let unsubscribeRoom = null;
    let bootedEngine = false;
    let lastRoomSnapshot = null;

    function clean(v, d=''){
      const s = String(v ?? '').trim();
      return s || d;
    }

    function log(msg){
      const el = $('debugLog');
      if (!el) return;
      const ts = new Date().toLocaleTimeString('th-TH', { hour12:false });
      el.textContent = `[${ts}] ${msg}`;
    }

    function buildUrl(path, extra = {}, base = location.href){
      const u = new URL(path, base);
      Object.entries(extra).forEach(([k, v]) => {
        if (v !== undefined && v !== null && v !== '') {
          u.searchParams.set(k, String(v));
        }
      });
      return u.toString();
    }

    function saveLastMode(pid, mode, href){
      if (!pid || !mode || !href) return;
      try{
        localStorage.setItem(`${STORAGE.lastModePrefix}${pid}`, mode);
        localStorage.setItem(`${STORAGE.lastRunUrlPrefix}${pid}`, href);
      }catch(_){}
    }

    function commonParams(){
      return {
        pid: clean(qs('pid', 'anon'), 'anon'),
        name: clean(qs('name', qs('nick', 'Hero')), 'Hero'),
        nick: clean(qs('nick', qs('name', 'Hero')), 'Hero'),
        room: clean(qs('room', loadRecentRoom('duet')), ''),
        diff: clean(qs('diff', 'normal'), 'normal'),
        time: clean(qs('time', '90'), '90'),
        view: clean(qs('view', 'mobile'), 'mobile'),
        hub: clean(qs('hub', './hub-v2.html'), './hub-v2.html'),
        run: clean(qs('run', 'play'), 'play'),
        seed: clean(qs('seed', String(Date.now())), String(Date.now())),
        zone: clean(qs('zone', 'nutrition'), 'nutrition'),
        cat: clean(qs('cat', 'nutrition'), 'nutrition'),
        game: clean(qs('game', 'goodjunk'), 'goodjunk'),
        gameId: clean(qs('gameId', 'goodjunk'), 'goodjunk'),
        theme: clean(qs('theme', 'goodjunk'), 'goodjunk'),
        studyId: clean(qs('studyId', ''), ''),
        conditionGroup: clean(qs('conditionGroup', ''), ''),
        mode: clean(qs('mode', 'duet'), 'duet'),
        role: clean(qs('role', 'player'), 'player')
      };
    }

    function renderPlayers(room){
      const wrap = $('playersList');
      if (!wrap) return;

      const players = getPlayers(room);
      if (!players.length) {
        wrap.innerHTML = '<div class="player-row"><div class="player-name">ยังไม่มีผู้เล่น</div><div class="player-pill">0</div></div>';
        return;
      }

      wrap.innerHTML = players.map((p, idx) => {
        const isHost = p.role === 'host';
        return `
          <div class="player-row">
            <div class="player-name">${idx + 1}. ${String(p.name || p.pid || 'Player')}</div>
            <div class="player-pill ${isHost ? 'host' : 'guest'}">${isHost ? '👑 Host' : '🙂 Player'}</div>
          </div>
        `;
      }).join('');
    }

    function setStateUi(kind, title, sub, extra = {}){
      const iconMap = {
        checking: '🔍',
        waiting: '⏳',
        ready: '🎮',
        error: '⚠️',
        blocked: '🛑',
        launch: '🚀'
      };

      $('stateIcon').textContent = iconMap[kind] || '🔍';
      $('stateTitle').textContent = title || '';
      $('stateSub').textContent = sub || '';

      $('spinner').style.display =
        kind === 'checking' || kind === 'launch' || kind === 'waiting'
          ? 'block'
          : 'none';

      $('btnForceOpen').style.display = extra.allowForce ? 'inline-flex' : 'none';
    }

    function updateTopInfo(room){
      const p = commonParams();
      $('infoRoom').textContent = p.room || '-';
      $('infoMode').textContent = p.mode || 'duet';
      $('infoRole').textContent = p.role || '-';

      if (!room) {
        $('infoStatus').textContent = 'กำลังตรวจสอบ...';
        $('chipRoom').textContent = `Room: ${p.room || '-'}`;
        $('chipPlayers').textContent = 'Players: -';
        $('chipStarted').textContent = 'Status: checking';
        return;
      }

      $('chipRoom').textContent = `Room: ${room.roomId || p.room || '-'}`;
      $('chipPlayers').textContent = `Players: ${getPlayerCount(room)}/2`;
      $('chipStarted').textContent = `Status: ${room.status || 'waiting'}`;
      $('infoStatus').textContent = room.status || 'waiting';
    }

    function buildLobbyUrl(){
      const p = commonParams();
      return buildUrl('./goodjunk-duet-lobby.html', {
        mode: 'duet',
        room: p.room,
        pid: p.pid,
        name: p.name,
        nick: p.nick,
        diff: p.diff,
        time: p.time,
        view: p.view,
        hub: p.hub,
        run: p.run,
        seed: p.seed,
        zone: p.zone,
        cat: p.cat,
        game: p.game,
        gameId: p.gameId,
        theme: p.theme,
        studyId: p.studyId,
        conditionGroup: p.conditionGroup
      });
    }

    function buildLauncherUrl(){
      const p = commonParams();
      return buildUrl('./goodjunk-launcher.html', {
        pid: p.pid,
        name: p.name,
        diff: p.diff,
        time: p.time,
        hub: p.hub,
        view: p.view,
        run: p.run,
        seed: p.seed,
        zone: p.zone,
        cat: p.cat,
        game: p.game,
        gameId: p.gameId,
        theme: p.theme,
        recommendedMode: 'duet'
      });
    }

    function buildEngineUrl(room){
      const p = commonParams();
      const me = getPlayerByPid(room, p.pid);
      const role = me?.role === 'host' ? 'host' : 'player';

      const href = buildUrl('./vr-goodjunk/goodjunk-vr.html', {
        mode: 'duet',
        entry: 'duet',
        recommendedMode: 'duet',
        room: p.room,
        pid: p.pid,
        name: p.name,
        nick: p.nick,
        diff: p.diff,
        time: p.time,
        view: p.view,
        hub: p.hub,
        run: p.run,
        seed: p.seed,
        zone: p.zone,
        cat: p.cat,
        game: p.game,
        gameId: p.gameId,
        theme: p.theme,
        studyId: p.studyId,
        conditionGroup: p.conditionGroup,
        role,
        fromLobby: '1',
        lobby: '1',
        multiplayer: '1',
        modeLocked: '1'
      });

      saveLastMode(p.pid, 'duet', href);
      return href;
    }

    function showLayer(){
      $('stateLayer').style.display = 'grid';
      $('engineWrap').classList.remove('show');
    }

    function hideLayer(){
      $('stateLayer').style.display = 'none';
      $('engineWrap').classList.add('show');
    }

    function classifyRoom(room){
      const p = commonParams();

      if (p.mode !== 'duet') {
        return {
          ok: false,
          kind: 'blocked',
          title: 'โหมดไม่ถูกต้อง',
          sub: 'หน้านี้ใช้สำหรับ duet เท่านั้น ระบบจะไม่ยอม fallback ไป solo'
        };
      }

      if (!p.room) {
        return {
          ok: false,
          kind: 'error',
          title: 'ไม่พบ Room Code',
          sub: 'หน้านี้ต้องมี room มาก่อน กรุณากลับไปหน้า lobby แล้วสร้างห้องหรือเข้าห้องใหม่'
        };
      }

      if (!room) {
        return {
          ok: false,
          kind: 'checking',
          title: 'กำลังหาห้อง',
          sub: 'ยังไม่พบข้อมูลห้องนี้ หรือ backend กำลังซิงก์ข้อมูล'
        };
      }

      if (room.mode !== 'duet') {
        return {
          ok: false,
          kind: 'blocked',
          title: 'ห้องนี้ไม่ใช่ Duet',
          sub: 'พบ room แล้ว แต่โหมดของห้องไม่ตรงกับ duet'
        };
      }

      const me = getPlayerByPid(room, p.pid);
      if (!me) {
        return {
          ok: false,
          kind: 'blocked',
          title: 'ผู้เล่นนี้ไม่ได้อยู่ในห้อง',
          sub: 'กรุณากลับไป lobby แล้วเข้าห้องนี้ด้วยชื่อ/PID เดิมก่อน'
        };
      }

      if (getPlayerCount(room) < 2) {
        return {
          ok: false,
          kind: 'waiting',
          title: 'รอผู้เล่นให้ครบ 2 คน',
          sub: 'ตอนนี้ยังมีผู้เล่นไม่ครบ ระบบจะยังไม่เปิดเกม'
        };
      }

      if (room.status !== 'started') {
        return {
          ok: false,
          kind: 'waiting',
          title: 'รอ Host กดเริ่มเกม',
          sub: 'ครบ 2 คนแล้ว แต่ห้องยังไม่ถูกสั่งเริ่มจากหน้า lobby'
        };
      }

      return {
        ok: true,
        kind: 'ready',
        title: 'ห้องพร้อมแล้ว',
        sub: 'ตรวจสอบผ่านทั้งหมด กำลังเข้า engine ของ duet'
      };
    }

    function bootEngine(room){
      if (bootedEngine) return;
      bootedEngine = true;

      const engineUrl = buildEngineUrl(room);
      log(`เปิด engine duet -> ${engineUrl}`);

      setStateUi(
        'launch',
        'กำลังเข้าเกม Duet',
        'ห้องพร้อมแล้ว ระบบกำลังเปิด engine ของโหมด duet'
      );

      const frame = $('engineFrame');
      frame.src = engineUrl;

      setTimeout(() => {
        hideLayer();
      }, 350);
    }

    async function evaluateRoom(room){
      lastRoomSnapshot = room || null;
      updateTopInfo(room);
      renderPlayers(room);

      const state = classifyRoom(room);
      setStateUi(state.kind, state.title, state.sub, { allowForce: state.ok });
      log(`${state.kind}: ${state.title}`);

      if (state.ok) {
        bootEngine(room);
      }
    }

    async function watchRoom(){
      const p = commonParams();

      if (!p.room) {
        await evaluateRoom(null);
        return;
      }

      if (unsubscribeRoom && typeof unsubscribeRoom === 'function') {
        try { unsubscribeRoom(); } catch (_) {}
        unsubscribeRoom = null;
      }

      unsubscribeRoom = roomApi.subscribeRoom(p.room, async (room) => {
        await evaluateRoom(room);
      });
    }

    function bindActions(){
      $('btnBackLobby')?.addEventListener('click', () => {
        location.href = buildLobbyUrl();
      });

      $('btnBackLauncher')?.addEventListener('click', () => {
        location.href = buildLauncherUrl();
      });

      $('btnBackHub')?.addEventListener('click', () => {
        location.href = commonParams().hub;
      });

      $('btnRetry')?.addEventListener('click', () => {
        showLayer();
        bootedEngine = false;
        $('engineFrame').src = 'about:blank';
        watchRoom();
      });

      $('btnForceOpen')?.addEventListener('click', () => {
        if (!lastRoomSnapshot) return;
        bootEngine(lastRoomSnapshot);
      });
    }

    function initTopInfo(){
      const p = commonParams();
      $('infoRoom').textContent = p.room || '-';
      $('infoMode').textContent = 'duet';
      $('infoRole').textContent = p.role || '-';
      $('infoStatus').textContent = 'checking';
      $('chipRoom').textContent = `Room: ${p.room || '-'}`;
      $('chipPlayers').textContent = 'Players: -';
      $('chipStarted').textContent = 'Status: checking';
    }

    async function init(){
      roomApi = makeRoomAdapter();
      initTopInfo();
      bindActions();
      await watchRoom();
    }

    init();
  </script>
</body>
</html>
