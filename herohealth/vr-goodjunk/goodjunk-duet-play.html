<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk Duet Play v2.1.3</title>
  <meta name="theme-color" content="#b79cff" />
  <link rel="icon" href="../favicon.ico" />

  <style>
    :root{
      --sky1:#dff4ff;
      --sky2:#bfe8ff;
      --sky3:#fff7d8;
      --line:#bfe3f2;
      --line2:#d7c7ff;
      --text:#4d4a42;
      --muted:#7b7a72;
      --green:#7ed957;
      --green2:#58c33f;
      --blue:#7fcfff;
      --blue2:#58b7f5;
      --orange:#ffd37a;
      --orange2:#ffb84d;
      --purple:#b79cff;
      --purple2:#8c52ff;
      --shadow:0 18px 40px rgba(86,155,194,.16);
      --sat:env(safe-area-inset-top,0px);
      --sar:env(safe-area-inset-right,0px);
      --sab:env(safe-area-inset-bottom,0px);
      --sal:env(safe-area-inset-left,0px);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      min-height:100%;
      font-family:system-ui,-apple-system,"Segoe UI","Noto Sans Thai",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 12% 8%, rgba(255,255,255,.84), transparent 18%),
        radial-gradient(circle at 86% 10%, rgba(255,255,255,.72), transparent 18%),
        radial-gradient(circle at 78% 86%, rgba(183,156,255,.22), transparent 24%),
        linear-gradient(180deg,var(--sky1),var(--sky2) 54%, var(--sky3));
    }

    body{
      min-height:100dvh;
      display:grid;
      place-items:center;
      padding:
        calc(18px + var(--sat))
        calc(18px + var(--sar))
        calc(18px + var(--sab))
        calc(18px + var(--sal));
    }

    .card{
      width:min(92vw,680px);
      border-radius:30px;
      border:4px solid var(--line2);
      background:linear-gradient(180deg,#fffef9,#fbf7ff);
      box-shadow:var(--shadow);
      padding:24px 20px;
      text-align:center;
      display:grid;
      gap:12px;
    }

    .icon{
      width:96px;
      height:96px;
      margin:0 auto 2px;
      border-radius:30px;
      display:grid;
      place-items:center;
      font-size:48px;
      background:linear-gradient(180deg,#fff,#e7ddff);
      border:4px solid var(--line2);
      box-shadow:0 12px 24px rgba(90,60,150,.10);
    }

    h1{
      margin:0;
      font-size:clamp(30px,7vw,46px);
      line-height:1.05;
      font-weight:1000;
      color:#4a2c79;
      letter-spacing:-.035em;
    }

    p{
      margin:0;
      font-size:14px;
      line-height:1.7;
      color:var(--muted);
      font-weight:900;
    }

    .chips{
      margin-top:2px;
      display:flex;
      gap:8px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .chip{
      min-height:34px;
      padding:8px 12px;
      border-radius:999px;
      border:2px solid var(--line2);
      background:rgba(255,255,255,.92);
      color:#6c6a61;
      font-size:12px;
      font-weight:1000;
      box-shadow:0 8px 18px rgba(86,155,194,.10);
    }

    .actions{
      margin-top:4px;
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
    }

    .btn{
      appearance:none;
      border:none;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:48px;
      padding:11px 16px;
      border-radius:17px;
      font-size:15px;
      font-weight:1000;
      box-shadow:var(--shadow);
      color:inherit;
      font-family:inherit;
      text-align:center;
    }

    .btn.primary{
      background:linear-gradient(180deg,var(--blue),var(--blue2));
      color:#08374d;
    }

    .btn.hub{
      background:linear-gradient(180deg,var(--green),var(--green2));
      color:#133b09;
    }

    .btn.retry{
      background:linear-gradient(180deg,var(--orange),var(--orange2));
      color:#5a3b11;
    }

    .btn.modes{
      background:linear-gradient(180deg,var(--purple),var(--purple2));
      color:#fff;
    }

    .note{
      border:3px dashed var(--line2);
      border-radius:22px;
      background:#fff;
      padding:11px 12px;
      color:#74648a;
      font-size:12px;
      line-height:1.55;
      font-weight:900;
    }

    @media(max-width:560px){
      .card{
        padding:20px 16px;
        border-radius:26px;
      }

      .actions{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="icon">🤝</div>

    <h1>กำลังเข้า GoodJunk Duet</h1>

    <p id="statusText">
      ระบบกำลังตรวจสอบห้อง บทบาท และพาไปหน้าเล่นคู่ที่ถูกต้อง
    </p>

    <div class="chips">
      <div class="chip" id="chipMode">MODE • duet</div>
      <div class="chip" id="chipRoom">ROOM • -</div>
      <div class="chip" id="chipRole">ROLE • player</div>
    </div>

    <div class="actions">
      <a id="btnLobby" class="btn primary" href="./goodjunk-duet-lobby.html">👥 ไป Lobby</a>
      <a id="btnModes" class="btn modes" href="../goodjunk-launcher.html">🎮 โหมดทั้งหมด</a>
      <a id="btnHub" class="btn hub" href="../nutrition-zone.html">🏠 Nutrition Zone</a>
      <button id="btnRetry" class="btn retry" type="button">🔄 ลองใหม่</button>
    </div>

    <div class="note">
      v2.1.3 แก้ URI Too Long แล้ว • ไม่ส่ง full URL ซ้อนใน runtime query
    </div>
  </div>

  <script>
    (function(){
      'use strict';

      window.HHA_GJ_DUET_PLAY = 'v20260517-duet-play-v213-uri-too-long-fix';

      var q = new URLSearchParams(location.search);

      var statusText = document.getElementById('statusText');
      var chipMode = document.getElementById('chipMode');
      var chipRoom = document.getElementById('chipRoom');
      var chipRole = document.getElementById('chipRole');
      var btnLobby = document.getElementById('btnLobby');
      var btnModes = document.getElementById('btnModes');
      var btnHub = document.getElementById('btnHub');
      var btnRetry = document.getElementById('btnRetry');

      var LOBBY_PATH = './goodjunk-duet-lobby.html';
      var RUNTIME_PATH = './goodjunk-duet-runtime.html';
      var LAUNCHER_PATH = '../goodjunk-launcher.html';
      var ZONE_PATH = '../nutrition-zone.html';

      function clean(v, fallback){
        var s = String(v == null ? '' : v).trim();
        return s || (fallback || '');
      }

      function first(){
        for (var i = 0; i < arguments.length; i++){
          var v = clean(arguments[i], '');
          if (v) return v;
        }
        return '';
      }

      function setText(text){
        if (statusText) statusText.textContent = text;
      }

      function detectDevice(){
        var ua = navigator.userAgent || '';
        return /Android|iPhone|iPad|iPod|Mobile/i.test(ua) ? 'mobile' : 'pc';
      }

      function normalizeRoom(v){
        var s = String(v || '').trim().toUpperCase();
        s = s.replace(/\s+/g,'').replace(/[^A-Z0-9-]/g,'');

        if (!s) return '';

        if (!s.startsWith('GJ-DT-')){
          s = 'GJ-DT-' + s
            .replace(/^GJ-DT/i,'')
            .replace(/^GJDT/i,'')
            .replace(/^DT/i,'')
            .replace(/^DU-/i,'')
            .replace(/^DU/i,'')
            .replace(/^-/, '');
        }

        return s.slice(0,20);
      }

      function normalizeRole(v){
        var s = String(v || '').toLowerCase().trim();

        if (s === 'collector' || s === 'host' || s === 'a' || s === 'p1') return 'collector';
        if (s === 'guardian' || s === 'guest' || s === 'b' || s === 'p2' || s === 'partner') return 'guardian';

        return 'guardian';
      }

      function compactHub(v){
        var fallback = new URL(ZONE_PATH, location.href).toString();
        var s = clean(v, '');

        if (!s) return fallback;
        if (s.length > 420) return fallback;
        if (/%252F|backModes=|launcherUrl=|backLobby=|nextAfterCooldown=|cdnext=/.test(s)) return fallback;

        try{
          return new URL(s, location.href).toString();
        }catch(_){
          return fallback;
        }
      }

      var deviceFallback = detectDevice();

      var ctx = {
        pid: clean(q.get('pid'),'anon'),
        name: clean(first(q.get('name'),q.get('nick')),'Hero'),
        nick: clean(first(q.get('nick'),q.get('name')),'Hero'),
        diff: clean(q.get('diff'),'normal'),
        time: clean(q.get('time'),'90'),
        view: clean(first(q.get('view'),q.get('device')),deviceFallback),
        device: clean(first(q.get('device'),q.get('view')),deviceFallback),
        room: normalizeRoom(first(q.get('roomId'),q.get('room'),q.get('roomCode'))),
        matchId: clean(q.get('matchId'),''),
        role: normalizeRole(first(q.get('role'),q.get('roleKey'))),
        seed: clean(q.get('seed'), String(Date.now())),
        studyId: clean(q.get('studyId'),''),
        hub: compactHub(q.get('hub'))
      };

      function setCommon(url){
        url.searchParams.set('pid', ctx.pid);
        url.searchParams.set('name', ctx.name);
        url.searchParams.set('nick', ctx.nick);
        url.searchParams.set('diff', ctx.diff);
        url.searchParams.set('time', ctx.time);
        url.searchParams.set('view', ctx.view);
        url.searchParams.set('device', ctx.device);

        url.searchParams.set('mode', 'duet');
        url.searchParams.set('entry', 'duet');
        url.searchParams.set('recommendedMode', 'duet');
        url.searchParams.set('game', 'goodjunk');
        url.searchParams.set('gameId', 'goodjunk');
        url.searchParams.set('theme', 'goodjunk');
        url.searchParams.set('zone', 'nutrition');
        url.searchParams.set('cat', 'nutrition');
        url.searchParams.set('multiplayer', '1');
        url.searchParams.set('capacity', '2');
        url.searchParams.set('maxPlayers', '2');
        url.searchParams.set('hub', ctx.hub);

        if (ctx.room){
          url.searchParams.set('roomId', ctx.room);
          url.searchParams.set('room', ctx.room);
          url.searchParams.set('roomCode', ctx.room);
        }

        if (ctx.matchId){
          url.searchParams.set('matchId', ctx.matchId);
        }

        url.searchParams.set('role', ctx.role);
        url.searchParams.set('roleKey', ctx.role);

        if (ctx.seed) url.searchParams.set('seed', ctx.seed);
        if (ctx.studyId) url.searchParams.set('studyId', ctx.studyId);

        return url;
      }

      function buildLauncherUrl(){
        var url = new URL(LAUNCHER_PATH, location.href);

        url.searchParams.set('pid', ctx.pid);
        url.searchParams.set('name', ctx.name);
        url.searchParams.set('nick', ctx.nick);
        url.searchParams.set('diff', ctx.diff);
        url.searchParams.set('time', ctx.time);
        url.searchParams.set('view', ctx.view);
        url.searchParams.set('device', ctx.device);

        url.searchParams.set('zone','nutrition');
        url.searchParams.set('cat','nutrition');
        url.searchParams.set('game','goodjunk');
        url.searchParams.set('gameId','goodjunk');
        url.searchParams.set('theme','goodjunk');

        url.searchParams.set('mode','menu');
        url.searchParams.set('entry','goodjunk-launcher');
        url.searchParams.set('run','menu');
        url.searchParams.set('hub', ctx.hub);

        url.searchParams.set('v','20260517-goodjunk-duet-play-v213-back-launcher');

        return url.toString();
      }

      function buildLobbyUrl(){
        var url = new URL(LOBBY_PATH, location.href);
        setCommon(url);
        url.searchParams.set('run','menu');
        url.searchParams.set('v','20260517-duet-play-v213-lobby');
        return url.toString();
      }

      function buildRuntimeUrl(){
        var url = new URL(RUNTIME_PATH, location.href);

        /*
          สำคัญ:
          ไม่ copy query เดิมทั้งก้อน
          เพราะอาจมี launcherUrl/backModes/backLobby ซ้อนมาแล้ว
        */
        setCommon(url);

        url.searchParams.set('run','play');
        url.searchParams.set('back','launcher');
        url.searchParams.set('returnTo','goodjunk-launcher');
        url.searchParams.set('v','20260517-duet-play-v213-runtime-compact');

        return url.toString();
      }

      var launcherUrl = buildLauncherUrl();
      var lobbyUrl = buildLobbyUrl();

      if (btnLobby) btnLobby.href = lobbyUrl;
      if (btnModes) btnModes.href = launcherUrl;
      if (btnHub) btnHub.href = ctx.hub;

      if (btnRetry){
        btnRetry.addEventListener('click', function(){
          location.reload();
        });
      }

      if (chipMode) chipMode.textContent = 'MODE • duet';
      if (chipRoom) chipRoom.textContent = 'ROOM • ' + (ctx.room || '-');
      if (chipRole) chipRole.textContent = 'ROLE • ' + ctx.role;

      window.__GJ_RUN_CTX__ = {
        pid:ctx.pid,
        name:ctx.name,
        nick:ctx.nick,
        studyId:ctx.studyId,
        roomId:ctx.room,
        room:ctx.room,
        roomCode:ctx.room,
        role:ctx.role,
        roleKey:ctx.role,
        mode:'duet',
        entry:'duet',
        recommendedMode:'duet',
        diff:ctx.diff,
        time:ctx.time,
        seed:ctx.seed,
        startAt:0,
        hub:ctx.hub,
        back:'launcher',
        returnTo:'goodjunk-launcher',
        view:ctx.view,
        device:ctx.device,
        run:'play',
        gameId:'goodjunk',
        game:'goodjunk',
        theme:'goodjunk',
        cat:'nutrition',
        zone:'nutrition',
        multiplayer:'1',
        capacity:'2',
        maxPlayers:'2'
      };

      if (!ctx.room){
        setText('ยังไม่พบ Room ของ Duet — จะพากลับไปหน้า Lobby เพื่อสร้างหรือเข้าห้อง');
        setTimeout(function(){
          location.replace(lobbyUrl);
        },180);
        return;
      }

      setText('ตรวจพบห้อง Duet แล้ว — กำลังพาไปหน้าเล่นคู่ด้วย URL แบบสั้น');

      setTimeout(function(){
        location.replace(buildRuntimeUrl());
      },120);
    })();
  </script>
</body>
</html>
