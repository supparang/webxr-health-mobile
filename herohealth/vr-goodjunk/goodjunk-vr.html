GoodJunkVR — RUN PAGE (PC/Mobile/cVR) — PRODUCTION
PATCH v20260304h-RUN-MODULEFIX-NOTBLACK
✅ FIX: load goodjunk.safe.js as ES module (no more black screen from "export")
✅ Includes required DOM ids: #gj-layer + HUD + overlays
✅ Debug overlay (?debug=1) shows runtime errors
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth — GoodJunkVR (Run)</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="../favicon.ico" />
  <style>
    :root{
      --bg:#050814; --panel:rgba(2,6,23,.72); --stroke:rgba(148,163,184,.18);
      --text:#e5e7eb; --muted:#94a3b8;
      --good:#22c55e; --warn:#f59e0b; --bad:#ef4444; --cyan:#22d3ee;
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
    }
    html,body{height:100%; margin:0; background: radial-gradient(1200px 700px at 18% 10%, rgba(34,197,94,.10), transparent 55%),
                                     radial-gradient(1000px 600px at 85% 15%, rgba(34,211,238,.10), transparent 55%),
                                     linear-gradient(180deg, #020617, #0b1226);
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans Thai", "Noto Sans", Arial;
      overflow:hidden;
    }
    #gj-layer{
      position:fixed; inset:0;
      touch-action: manipulation;
      user-select:none;
    }

    /* HUD */
    .hud{
      position:fixed;
      top: calc(10px + var(--sat));
      left:10px; right:10px;
      display:flex; gap:8px; flex-wrap:wrap;
      align-items:center; justify-content:space-between;
      pointer-events:none;
      z-index:200;
    }
    .pillrow{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
    .pill{
      pointer-events:none;
      border:1px solid var(--stroke);
      background: rgba(2,6,23,.55);
      backdrop-filter: blur(8px);
      border-radius:999px;
      padding:8px 10px;
      font-weight:900;
      font-size:12px;
      color:var(--text);
      box-shadow:0 12px 40px rgba(0,0,0,.25);
      white-space:nowrap;
    }
    .pill .muted{color:var(--muted); font-weight:900;}
    .pill b{font-weight:1000;}
    .pill.small{font-size:11px; padding:7px 9px;}

    .bar{
      height:10px; width: 220px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.35);
      border-radius:999px;
      overflow:hidden;
    }
    .bar > i{display:block; height:100%; width:0%; background: rgba(34,197,94,.82); transition: width .12s ease;}
    .bar.cyan > i{ background: rgba(34,211,238,.82); }
    .bar.warn > i{ background: rgba(245,158,11,.88); }

    /* Mission panel (กลางบน) */
    .mission{
      position:fixed;
      top: calc(60px + var(--sat));
      left:50%;
      transform:translateX(-50%);
      width:min(760px, calc(100vw - 20px));
      z-index:210;
      pointer-events:none;
      border:1px solid var(--stroke);
      background: rgba(2,6,23,.55);
      backdrop-filter: blur(10px);
      border-radius:18px;
      padding:10px 12px;
      box-shadow:0 18px 55px rgba(0,0,0,.40);
    }
    .mission .top{display:flex; justify-content:space-between; gap:10px; align-items:flex-start; flex-wrap:wrap;}
    .mission h3{margin:0; font-size:13px; letter-spacing:.2px;}
    .mission p{margin:4px 0 0 0; color:var(--muted); font-weight:900; font-size:12px; line-height:1.35;}
    .mission .bar{width: min(340px, 55vw);}

    /* Boss bar */
    .boss{
      position:fixed;
      bottom: calc(12px + var(--sab));
      left:50%;
      transform:translateX(-50%);
      width:min(760px, calc(100vw - 20px));
      z-index:205;
      pointer-events:none;
      opacity: .98;
      display:none; /* safe.js จะเปิดเองได้ */
    }
    .boss .box{
      border:1px solid rgba(239,68,68,.25);
      background: rgba(2,6,23,.55);
      backdrop-filter: blur(10px);
      border-radius:18px;
      padding:10px 12px;
      box-shadow:0 18px 55px rgba(0,0,0,.40);
    }
    .boss .bar > i{ background: rgba(239,68,68,.84); }

    /* End overlay */
    #endOverlay{
      position:fixed; inset:0;
      display:none;
      align-items:center; justify-content:center;
      background: rgba(0,0,0,.55);
      z-index:400;
      padding: 16px;
    }
    #endOverlay .panel{
      width:min(720px, 92vw);
      border:1px solid var(--stroke);
      background: rgba(2,6,23,.78);
      border-radius:22px;
      padding:14px 14px 12px;
      box-shadow:0 24px 90px rgba(0,0,0,.55);
    }
    #endOverlay h2{margin:0; font-size:18px;}
    #endOverlay .sub{margin:6px 0 10px 0; color:var(--muted); font-weight:900; font-size:13px; line-height:1.35;}
    #endOverlay .grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap:8px;
      margin-top:10px;
    }
    @media (max-width: 560px){ #endOverlay .grid{grid-template-columns:1fr;} }
    #endOverlay .card{
      border:1px solid rgba(148,163,184,.16);
      background: rgba(2,6,23,.35);
      border-radius:16px;
      padding:10px 10px;
      font-weight:1000;
    }
    #endOverlay .card .k{color:var(--muted); font-size:12px; font-weight:900;}
    #endOverlay .card .v{margin-top:4px; font-size:16px;}
    #endOverlay .actions{
      display:flex; gap:10px; flex-wrap:wrap; justify-content:center;
      margin-top:12px; padding-top:10px;
      border-top:1px solid rgba(148,163,184,.16);
    }
    #endOverlay button{
      border-radius:16px;
      border:1px solid rgba(148,163,184,.22);
      background: rgba(148,163,184,.08);
      color:var(--text);
      padding:12px 12px;
      font-weight:1000;
      cursor:pointer;
      min-height:44px;
    }
    #endOverlay button.primary{
      background: rgba(59,130,246,.16);
      border-color: rgba(59,130,246,.30);
    }

    /* Debug overlay */
    #dbg{
      position:fixed;
      left:10px; right:10px;
      bottom: calc(10px + var(--sab));
      z-index:9999;
      display:none;
      border:1px solid rgba(245,158,11,.28);
      background: rgba(2,6,23,.82);
      color: rgba(229,231,235,.96);
      border-radius:14px;
      padding:10px 10px;
      font: 900 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      white-space:pre-wrap;
    }
  </style>
</head>
<body>

  <div id="gj-layer" aria-label="GoodJunk layer"></div>

  <!-- HUD -->
  <div class="hud" aria-label="HUD">
    <div class="pillrow">
      <div class="pill"><span class="muted">Score</span> <b id="hud-score">0</b></div>
      <div class="pill"><span class="muted">Time</span> <b id="hud-time">0</b></div>
      <div class="pill"><span class="muted">Miss</span> <b id="hud-miss">0</b></div>
      <div class="pill"><span class="muted">Grade</span> <b id="hud-grade">—</b></div>
      <div class="pill small"><span class="muted">View</span> <b id="uiView">—</b></div>
      <div class="pill small"><span class="muted">Run</span> <b id="uiRun">—</b></div>
      <div class="pill small"><span class="muted">Diff</span> <b id="uiDiff">—</b></div>
    </div>

    <div class="pillrow">
      <div class="pill small"><span class="muted">Goal</span> <b id="hud-goal">—</b></div>
      <div class="pill small"><span class="muted">Cur</span> <b id="hud-goal-cur">0</b>/<b id="hud-goal-target">0</b></div>
      <div class="pill small"><span class="muted">Mini</span> <b id="hud-mini">—</b> <span class="muted" id="miniTimer">0</span></div>
      <div class="pill small"><span class="muted">AI</span> risk <b id="aiRisk">—</b> • <span id="aiHint">—</span></div>
    </div>
  </div>

  <!-- Mission panel -->
  <div class="mission" aria-label="Mission panel">
    <div class="top">
      <div>
        <h3 id="missionTitle">MISSION</h3>
        <p id="missionGoal">—</p>
        <p id="missionHint">—</p>
        <p id="goalDesc" style="margin-top:6px;">—</p>
      </div>
      <div>
        <div class="bar cyan"><i id="missionFill"></i></div>
      </div>
    </div>
  </div>

  <!-- Boss UI -->
  <div class="boss" id="bossBar" aria-label="Boss bar">
    <div class="box">
      <div style="display:flex; justify-content:space-between; gap:10px; align-items:center; flex-wrap:wrap;">
        <div style="font-weight:1000;">BOSS</div>
        <div id="bossHint" style="color:var(--muted); font-weight:900; font-size:12px;">—</div>
      </div>
      <div class="bar"><i id="bossFill"></i></div>
    </div>
  </div>

  <!-- End overlay -->
  <div id="endOverlay" aria-label="End overlay">
    <div class="panel">
      <h2 id="endTitle">จบเกม</h2>
      <div class="sub" id="endSub">—</div>

      <div class="grid">
        <div class="card"><div class="k">Grade</div><div class="v" id="endGrade">—</div></div>
        <div class="card"><div class="k">Score</div><div class="v" id="endScore">0</div></div>
        <div class="card"><div class="k">Miss</div><div class="v" id="endMiss">0</div></div>
      </div>

      <div class="grid" style="margin-top:8px;">
        <div class="card"><div class="k">Time</div><div class="v" id="endTime">0</div></div>
        <div class="card"><div class="k">Fever</div><div class="v" id="feverText">—</div></div>
        <div class="card"><div class="k">Shield</div><div class="v" id="shieldPills">—</div></div>
      </div>

      <div class="actions">
        <button class="primary" id="btnBackHub" type="button">↩ กลับ Hub</button>
        <button id="btnReplay" type="button">🔁 เล่นอีกครั้ง</button>
      </div>
    </div>
  </div>

  <div id="dbg"></div>

<script type="module">
  // --- query helpers ---
  const qs = (k,d='')=>{ try{ return (new URL(location.href)).searchParams.get(k) ?? d; }catch(e){ return d; } };
  const debug = (qs('debug','0') === '1');
  const dbgEl = document.getElementById('dbg');

  function showDbg(msg){
    if(!debug || !dbgEl) return;
    dbgEl.style.display = 'block';
    dbgEl.textContent = String(msg||'');
  }

  // capture runtime errors (help black-screen diagnosis)
  window.addEventListener('error', (e)=>{
    try{
      showDbg(`[error] ${e?.message||e}\n${e?.filename||''}:${e?.lineno||''}:${e?.colno||''}`);
    }catch(_){}
  });
  window.addEventListener('unhandledrejection', (e)=>{
    try{
      showDbg(`[promise] ${e?.reason?.message||e?.reason||e}`);
    }catch(_){}
  });

  // Buttons
  const hub = qs('hub','../hub.html');
  const btnBack = document.getElementById('btnBackHub');
  const btnReplay = document.getElementById('btnReplay');
  btnBack && (btnBack.onclick = ()=> location.href = hub);
  btnReplay && (btnReplay.onclick = ()=> location.href = location.href);

  // --- boot game module ---
  try{
    const mod = await import('./goodjunk.safe.js'); // ✅ module import
    if(!mod || typeof mod.boot !== 'function'){
      showDbg('goodjunk.safe.js loaded แต่ไม่พบ export boot(cfg)');
      throw new Error('Missing export boot(cfg)');
    }
    mod.boot({
      // allow overriding by cfg if needed later
    });
  }catch(err){
    showDbg(`BOOT FAIL:\n${err?.stack||err}`);
  }
</script>

</body>
</html>
