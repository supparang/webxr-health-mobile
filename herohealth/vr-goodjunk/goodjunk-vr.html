HeroHealth • GoodJunk VR — RUN (PC/Mobile/cVR)
PATCH v20260304-RUNPAGE-MODULE-FIX
✅ FIX: load goodjunk.safe.js via type="module" (avoid "Unexpected token export" / black screen)
✅ Has all required DOM ids used by goodjunk.safe.js
✅ Has panic error overlay (shows JS errors on mobile)
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk VR</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="../favicon.ico" />
  <style>
    :root{
      --bg:#050814;
      --panel: rgba(2,6,23,.68);
      --stroke: rgba(148,163,184,.18);
      --text: rgba(229,231,235,.96);
      --muted: rgba(148,163,184,.92);
      --good:#22c55e; --warn:#f59e0b; --bad:#ef4444; --cyan:#22d3ee;
      --sat: env(safe-area-inset-top,0px);
      --sab: env(safe-area-inset-bottom,0px);
      --sal: env(safe-area-inset-left,0px);
      --sar: env(safe-area-inset-right,0px);
    }
    html,body{height:100%; margin:0;}
    body{
      background:
        radial-gradient(900px 520px at 15% 15%, rgba(34,197,94,.16), transparent 55%),
        radial-gradient(900px 520px at 85% 20%, rgba(34,211,238,.12), transparent 55%),
        radial-gradient(900px 520px at 55% 90%, rgba(167,139,250,.12), transparent 55%),
        linear-gradient(180deg, #020617, var(--bg));
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans Thai", "Noto Sans", Arial;
      overflow:hidden;
    }

    /* main play layer */
    #gj-layer{
      position: fixed;
      inset: 0;
      overflow:hidden;
      touch-action: manipulation;
      user-select:none;
    }

    /* HUD */
    #hud{
      position: fixed;
      left: calc(10px + var(--sal));
      right: calc(10px + var(--sar));
      top: calc(10px + var(--sat));
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:flex-start;
      justify-content:space-between;
      z-index: 200;
      pointer-events:none;
    }
    .hudBox{
      pointer-events:none;
      border:1px solid var(--stroke);
      background: rgba(2,6,23,.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 10px 12px;
      box-shadow: 0 18px 55px rgba(0,0,0,.35);
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      max-width: 96vw;
    }
    .pill{
      font-size:12px;
      color:var(--muted);
      font-weight:900;
      white-space:nowrap;
    }
    .pill b{ color:var(--text); font-weight:1000; }

    .bar{
      width: 160px;
      height: 10px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.35);
      overflow:hidden;
    }
    .bar > i{
      display:block;
      height:100%;
      width:0%;
      background: rgba(34,197,94,.88);
      transition: width .12s ease;
    }

    /* Mission panel (optional ids used by safe.js) */
    #missionPanel{
      position: fixed;
      left: calc(10px + var(--sal));
      right: calc(10px + var(--sar));
      top: calc(66px + var(--sat));
      z-index: 190;
      pointer-events:none;
      display:flex;
      justify-content:center;
    }
    #missionPanel .inner{
      width: min(820px, 96vw);
      border:1px solid var(--stroke);
      background: rgba(2,6,23,.52);
      border-radius: 18px;
      padding: 10px 12px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 18px 55px rgba(0,0,0,.35);
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
    }
    .mtitle{font-weight:1000; letter-spacing:.2px;}
    .mhint{color:var(--muted); font-size:12px; font-weight:900;}
    .mfill{height:10px; border-radius:999px; overflow:hidden; border:1px solid rgba(255,255,255,.12); background:rgba(0,0,0,.35); width:180px;}
    .mfill > i{display:block; height:100%; width:0%; background: rgba(34,211,238,.88); transition: width .12s ease;}

    /* Boss UI */
    #bossBar{
      position: fixed;
      left: calc(10px + var(--sal));
      right: calc(10px + var(--sar));
      bottom: calc(88px + var(--sab));
      z-index: 180;
      pointer-events:none;
      display:none;
      justify-content:center;
    }
    #bossBar .inner{
      width:min(820px, 96vw);
      border:1px solid rgba(239,68,68,.28);
      background: rgba(2,6,23,.55);
      border-radius: 18px;
      padding: 10px 12px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 18px 55px rgba(0,0,0,.35);
      display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between;
    }
    #bossFill{display:block; height:10px; width:0%; background: rgba(239,68,68,.88); transition: width .12s ease;}
    .bossTrack{height:10px; width:220px; border-radius:999px; overflow:hidden; border:1px solid rgba(255,255,255,.12); background:rgba(0,0,0,.35);}
    #bossHint{color:var(--muted); font-size:12px; font-weight:900;}

    /* End overlay */
    #endOverlay{
      position: fixed;
      inset: 0;
      display:none;
      align-items:center;
      justify-content:center;
      z-index: 300;
      padding: calc(14px + var(--sat)) calc(14px + var(--sar)) calc(14px + var(--sab)) calc(14px + var(--sal));
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    #endOverlay .panel{
      width: min(820px, 96vw);
      border:1px solid var(--stroke);
      background: rgba(2,6,23,.78);
      border-radius: 22px;
      padding: 14px;
      box-shadow: 0 22px 90px rgba(0,0,0,.55);
      text-align:center;
    }
    #endTitle{font-size:20px; font-weight:1100; margin: 0 0 6px 0;}
    #endSub{color:var(--muted); font-weight:900; font-size:13px; margin:0 0 10px 0;}
    .endRow{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:10px;}
    .btn{
      pointer-events:auto;
      border-radius: 16px;
      border:1px solid rgba(148,163,184,.22);
      background: rgba(148,163,184,.10);
      color:var(--text);
      padding: 12px 14px;
      font-weight:1000;
      cursor:pointer;
      min-height: 44px;
    }
    .btn.primary{border-color: rgba(34,197,94,.30); background: rgba(34,197,94,.14);}

    /* Panic error overlay */
    #panic{
      position: fixed;
      inset: 0;
      display:none;
      z-index: 9999;
      padding: 14px;
      background: rgba(0,0,0,.82);
      color: #fff;
      overflow:auto;
      font: 14px/1.35 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <div id="gj-layer"></div>

  <div id="hud">
    <div class="hudBox">
      <span class="pill"><b>Score</b> <span id="hud-score">0</span></span>
      <span class="pill"><b>Time</b> <span id="hud-time">0</span></span>
      <span class="pill"><b>Miss</b> <span id="hud-miss">0</span></span>
      <span class="pill"><b>Grade</b> <span id="hud-grade">—</span></span>
      <span class="pill"><b>WIN</b> <span id="hud-goal-cur">0</span>/<span id="hud-goal-target">0</span></span>
      <span class="pill" id="hud-goal"><b>Goal</b> <span id="goalDesc">—</span></span>
      <span class="pill"><b>Mini</b> <span id="hud-mini">—</span> <span id="miniTimer">—</span></span>
      <span class="pill"><b>AI</b> <span id="aiRisk">—</span> <span id="aiHint">—</span></span>
      <span class="pill"><b>Fever</b> <span id="feverText">0%</span></span>
      <span class="pill"><b>Shield</b> <span id="shieldPills">—</span></span>
      <span class="pill"><b>view</b> <span id="uiView">—</span></span>
      <span class="pill"><b>run</b> <span id="uiRun">—</span></span>
      <span class="pill"><b>diff</b> <span id="uiDiff">—</span></span>
    </div>
  </div>

  <div id="missionPanel" aria-hidden="true">
    <div class="inner">
      <div>
        <div class="mtitle" id="missionTitle">—</div>
        <div class="mhint"><span id="missionGoal">—</span> • <span id="missionHint">—</span></div>
      </div>
      <div class="mfill"><i id="missionFill"></i></div>
    </div>
  </div>

  <div id="bossBar" aria-hidden="true">
    <div class="inner">
      <div style="font-weight:1100;">Boss</div>
      <div class="bossTrack"><i id="bossFill"></i></div>
      <div id="bossHint">—</div>
    </div>
  </div>

  <div id="endOverlay">
    <div class="panel">
      <h2 id="endTitle">Game Over</h2>
      <p id="endSub">—</p>
      <div class="endRow">
        <div class="pill"><b>Grade</b> <span id="endGrade">—</span></div>
        <div class="pill"><b>Score</b> <span id="endScore">0</span></div>
        <div class="pill"><b>Miss</b> <span id="endMiss">0</span></div>
        <div class="pill"><b>Time</b> <span id="endTime">0 s</span></div>
      </div>
      <div class="endRow" style="margin-top:12px;">
        <button class="btn primary" id="btnBackHub">กลับ HUB</button>
      </div>
    </div>
  </div>

  <div id="panic"></div>

  <script>
    (function(){
      const panic = document.getElementById('panic');
      function showPanic(tag, err){
        try{
          panic.style.display='block';
          panic.textContent =
            `[${tag}]\n` +
            String(err && (err.stack || err.message || err) || 'unknown') +
            `\n\nURL:\n${location.href}`;
        }catch(_){}
      }
      window.addEventListener('error', (e)=> showPanic('window.error', e.error || e.message || e));
      window.addEventListener('unhandledrejection', (e)=> showPanic('unhandledrejection', e.reason || e));
      window.__HHA_PANIC__ = showPanic;
    })();
  </script>

  <!-- ✅ IMPORTANT: module loader -->
  <script type="module">
    try{
      const qs = (k, d='')=>{ try{ return (new URL(location.href)).searchParams.get(k) ?? d; }catch(e){ return d; } };

      // Import SAFE core
      import { boot } from './goodjunk.safe.js';

      // Back hub button
      const btn = document.getElementById('btnBackHub');
      btn?.addEventListener('click', ()=>{
        const hub = qs('hub','../hub.html');
        location.href = hub;
      });

      // Boot game
      boot({
        // (optional) you can pass overrides here; by default goodjunk.safe.js reads from querystring
      });

    }catch(e){
      window.__HHA_PANIC__?.('module.boot', e);
    }
  </script>
</body>
</html>
