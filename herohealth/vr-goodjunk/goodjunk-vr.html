<!-- === /herohealth/vr-goodjunk/goodjunk-vr.html ===
GoodJunkVR RUN — PRODUCTION (ESM + vr-ui + spawn-safe + AI dynamic)
PATCH v20260303-RUN-LOADING-SPAWNSAFE-AI-PASS
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk VR</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="../favicon.ico" />

  <!-- ✅ CSS -->
  <link rel="stylesheet" href="./goodjunk-vr.css?v=20260303" />
</head>
<body>
  <div id="app">

    <!-- Loading overlay -->
    <div id="loading" class="loading" aria-hidden="false">
      <div class="loadingCard">
        <div class="loadingTitle">Loading GoodJunk…</div>
        <div class="loadingSub">กำลังเตรียมเกม / UI / AI</div>
        <div class="loadingPills">
          <span class="pill pill-soft">view=<b id="uiViewL">—</b></span>
          <span class="pill pill-soft">run=<b id="uiRunL">—</b></span>
          <span class="pill pill-soft">diff=<b id="uiDiffL">—</b></span>
          <span class="pill pill-soft">ai=<b id="uiAiL">—</b></span>
          <span class="pill pill-soft">battle=<b id="uiBattleL">—</b></span>
        </div>
        <div id="loadErr" class="loadErr" aria-hidden="true"></div>
      </div>
    </div>

    <!-- Debug pills (optional) -->
    <div id="debugPills" aria-hidden="true">
      <span class="pill">view=<b id="uiView">—</b></span>
      <span class="pill">run=<b id="uiRun">—</b></span>
      <span class="pill">diff=<b id="uiDiff">—</b></span>
    </div>

    <!-- Top HUD -->
    <header id="hud">
      <div class="hud-row">
        <div class="pill">SCORE <b id="hud-score">0</b></div>
        <div class="pill">TIME <b id="hud-time">0</b></div>
        <div class="pill">MISS <b id="hud-miss">0</b></div>
        <div class="pill">GRADE <b id="hud-grade">C</b></div>
      </div>

      <div class="hud-row">
        <div class="pill pill-soft">
          GOAL <b id="hud-goal">Daily</b>:
          <span><b id="hud-goal-cur">0</b>/<b id="hud-goal-target">20</b></span>
          <span id="goalDesc" class="mut">Hit GOOD 20</span>
        </div>
        <div class="pill pill-soft">
          MINI <b id="hud-mini">—</b>
          <span class="mut">⏱ <b id="miniTimer">—</b></span>
        </div>
      </div>

      <!-- AI HUD -->
      <div class="hud-row">
        <div class="pill pill-ai">
          AI Risk <b id="aiRisk">—</b>
          <span class="mut">next: <b id="aiHint">—</b></span>
        </div>
      </div>

      <!-- Fever + Shield + Boss -->
      <div class="hud-row hud-bars">
        <div class="barCard">
          <div class="barTop">
            <span class="mut">FEVER</span>
            <b id="feverText">0%</b>
          </div>
          <div class="bar">
            <div class="barFill" id="feverFill" style="width:0%"></div>
          </div>
        </div>

        <div class="barCard">
          <div class="barTop">
            <span class="mut">SHIELD</span>
            <b id="shieldPills">—</b>
          </div>
        </div>

        <div class="barCard boss" id="bossBar" aria-hidden="true">
          <div class="barTop">
            <span class="mut">BOSS</span>
            <b id="bossHint">—</b>
          </div>
          <div class="bar">
            <div class="barFill bossFill" id="bossFill" style="width:0%"></div>
          </div>
        </div>
      </div>

      <div class="gj-progress" aria-hidden="false">
        <div class="gj-progress-track">
          <div class="gj-progress-fill" id="gjProgressFill" style="width:0%"></div>
        </div>
      </div>
    </header>

    <!-- Playfield -->
    <main id="stage" aria-label="GoodJunk Stage">
      <div id="gj-layer" aria-label="targets"></div>
    </main>

    <!-- Low time overlay -->
    <div id="lowTimeOverlay" aria-hidden="true">
      <div class="lowTimeCard">
        <div class="mut">TIME</div>
        <div class="lowTimeNum" id="gj-lowtime-num">5</div>
      </div>
    </div>

    <!-- End overlay -->
    <div id="endOverlay" aria-hidden="true">
      <div class="panel">
        <div class="endTitle" id="endTitle">Game Over</div>
        <div class="endSub" id="endSub">—</div>

        <div class="endGrid">
          <div class="endStat"><span>GRADE</span><b id="endGrade">—</b></div>
          <div class="endStat"><span>SCORE</span><b id="endScore">0</b></div>
          <div class="endStat"><span>MISS</span><b id="endMiss">0</b></div>
          <div class="endStat"><span>TIME</span><b id="endTime">0</b></div>
        </div>

        <div class="endActions">
          <button class="btn" id="btnRetry" type="button">เล่นอีกครั้ง</button>
          <button class="btn primary" id="btnHub" type="button">กลับ HUB</button>
        </div>

        <!-- ✅ Cooldown button will be injected here by JS (goodjunk.safe.js) -->
      </div>
    </div>

  </div>

  <script type="module">
    const qs = (k, d='')=>{ try{ return (new URL(location.href)).searchParams.get(k) ?? d; }catch(e){ return d; } };

    const loading = document.getElementById('loading');
    const loadErr = document.getElementById('loadErr');

    const setLoadPill = (id, v)=>{ const el=document.getElementById(id); if(el) el.textContent = String(v ?? '—'); };
    const showErr = (e)=>{
      try{
        if(loadErr){
          loadErr.setAttribute('aria-hidden','false');
          loadErr.textContent = 'Load error: ' + (e?.message || String(e||'unknown'));
        }
      }catch(_){}
    };
    const hideLoading = ()=>{
      try{ loading?.setAttribute('aria-hidden','true'); }catch(_){}
    };

    // Pass-through
    const cfg = {
      view: qs('view','mobile'),
      run: qs('run','play'),
      diff: qs('diff','normal'),
      time: Number(qs('time','80')) || 80,
      seed: qs('seed', String(Date.now())),
      pid: qs('pid','anon'),
      hub: qs('hub','../hub.html'),
      ai: null
    };

    const aiOn = (qs('ai','0') === '1') && (String(cfg.run).toLowerCase() === 'play');
    const battleOn = (qs('battle','0') === '1');

    // loading pills
    setLoadPill('uiViewL', cfg.view);
    setLoadPill('uiRunL',  cfg.run);
    setLoadPill('uiDiffL', cfg.diff);
    setLoadPill('uiAiL',   aiOn ? '1' : '0');
    setLoadPill('uiBattleL', battleOn ? '1' : '0');

    // ✅ Universal VR UI (ENTER VR/EXIT/RECENTER + crosshair + hha:shoot)
    try{
      const vrui = await import('../vr/vr-ui.js');
      if(typeof vrui?.attachUniversalVrUi === 'function'){
        vrui.attachUniversalVrUi({
          view: cfg.view,
          // keep HUD visible; vr-ui stays on top
          zIndex: 240
        });
      }
    }catch(e){
      // ok to fail (PC-only)
      console.warn('[GoodJunk] vr-ui load failed (ok)', e);
    }

    // ✅ Spawn-safe region: compute once after layout paint
    function computeSpawnSafe(){
      const layer = document.getElementById('gj-layer');
      const hud = document.getElementById('hud');
      if(!layer) return;

      const r = layer.getBoundingClientRect();
      const hudR = hud ? hud.getBoundingClientRect() : null;

      // default safe = whole layer
      let xMin = r.left, xMax = r.right, yMin = r.top, yMax = r.bottom;

      // avoid HUD: push yMin down below hud
      if(hudR){
        yMin = Math.max(yMin, hudR.bottom + 10);
      }

      // avoid bottom VR UI area (approx)
      yMax = Math.min(yMax, window.innerHeight - 78);

      // clamp to layer
      xMin = Math.max(xMin, r.left);
      xMax = Math.min(xMax, r.right);
      yMin = Math.max(yMin, r.top);
      yMax = Math.min(yMax, r.bottom);

      // store in window so goodjunk.safe.js uses it
      window.__HHA_SPAWN_SAFE__ = { xMin, xMax, yMin, yMax };
    }

    // AI dynamic import (optional)
    if(aiOn){
      try{
        const mod = await import('../vr/ai-goodjunk.js');
        if(typeof mod?.createGoodJunkAI === 'function'){
          cfg.ai = mod.createGoodJunkAI({
            seed: cfg.seed,
            pid: cfg.pid,
            diff: cfg.diff,
            view: cfg.view
          });
        }
      }catch(e){
        console.warn('[GoodJunk] AI module load failed (ok)', e);
      }
    }

    // Buttons
    const btnRetry = document.getElementById('btnRetry');
    const btnHub = document.getElementById('btnHub');
    btnRetry?.addEventListener('click', ()=>{
      const u = new URL(location.href);
      u.searchParams.set('seed', String(Date.now()));
      location.href = u.toString();
    });
    btnHub?.addEventListener('click', ()=>{
      location.href = cfg.hub || '../hub.html';
    });

    // Boot game
    try{
      const game = await import('./goodjunk.safe.js');
      // let layout settle then compute safe
      requestAnimationFrame(()=>{ computeSpawnSafe(); });
      window.addEventListener('resize', ()=> computeSpawnSafe(), { passive:true });

      // show debug pills when ?debug=1
      const dbg = (qs('debug','0')==='1');
      const debugPills = document.getElementById('debugPills');
      if(debugPills) debugPills.setAttribute('aria-hidden', dbg ? 'false' : 'true');
      const setP = (id,v)=>{ const el=document.getElementById(id); if(el) el.textContent=String(v); };
      setP('uiView', cfg.view); setP('uiRun', cfg.run); setP('uiDiff', cfg.diff);

      game.boot(cfg);
      hideLoading();
    }catch(e){
      console.error(e);
      showErr(e);
    }
  </script>
</body>
</html>
