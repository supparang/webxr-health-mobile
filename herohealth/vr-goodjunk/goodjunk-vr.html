<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth — GoodJunk VR</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="../favicon.ico" />

  <style>
    :root{
      --bg1:#020617;
      --bg2:#0f172a;
      --stroke:rgba(148,163,184,.18);
      --text:#e5e7eb;
      --muted:#94a3b8;
      --shadow:0 18px 60px rgba(0,0,0,.35);
      --sat: env(safe-area-inset-top, 0px);
      --sar: env(safe-area-inset-right, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
    }

    *{ box-sizing:border-box; }
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:
        radial-gradient(1200px 800px at 50% -20%, rgba(34,211,238,.10), transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans Thai", sans-serif;
    }

    #app{
      position:fixed;
      inset:0;
      z-index:1;
    }

    /* สำคัญ: goodjunk.safe.js หาอันนี้ */
    #gj-layer{
      position:fixed;
      inset:0;
      z-index:2;
      pointer-events:auto;
    }

    .topbar{
      position:fixed;
      z-index:30;
      left:calc(14px + var(--sal));
      right:calc(14px + var(--sar));
      top:calc(14px + var(--sat));
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      pointer-events:none;
    }

    .brand,.mode-pill{
      pointer-events:auto;
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 14px;
      border-radius:999px;
      background:rgba(2,6,23,.72);
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .brand b{ font-size:14px; }
    .mode-pill{ font-size:12px; color:var(--muted); }

    .dot{
      width:10px; height:10px; border-radius:50%;
      background:#22c55e;
      flex:0 0 auto;
    }
    .dot.danger{ background:#ef4444; }

    .bottom-hint{
      position:fixed;
      z-index:30;
      left:50%;
      transform:translateX(-50%);
      bottom:calc(12px + var(--sab));
      max-width:min(94vw,760px);
      padding:10px 14px;
      border-radius:999px;
      background:rgba(2,6,23,.68);
      border:1px solid var(--stroke);
      color:var(--muted);
      font-size:12px;
      text-align:center;
      box-shadow:var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      pointer-events:none;
    }
  </style>

  <script src="../firebase-config.js"></script>
  <script src="../vr/vr-ui.js"></script>
</head>
<body>
  <div id="app"></div>
  <div id="gj-layer"></div>

  <div class="topbar">
    <div class="brand">
      <span style="font-size:18px">🥦</span>
      <b>HeroHealth • GoodJunk VR</b>
    </div>

    <div id="modePill" class="mode-pill">
      <span id="modeDot" class="dot danger"></span>
      <span id="modeText">Battle mode</span>
    </div>
  </div>

  <div class="bottom-hint">
    โหมด VR/Cardboard ใช้ปุ่ม ENTER VR / crosshair กลางจอ • Mobile/PC แตะหรือคลิกเพื่อเล่น
  </div>

  <script type="module">
    import { boot } from './goodjunk.safe.js';

    const qs = (k, d='') => {
      try { return new URL(location.href).searchParams.get(k) ?? d; }
      catch { return d; }
    };

    function safeHub(){
      const raw = qs('hub', '../hub.html');
      try{ return new URL(raw, location.href).href; }
      catch{ return '../hub.html'; }
    }

    function installVRUI(){
      try{
        if (window.HHAVRUI && typeof window.HHAVRUI.install === 'function'){
          window.HHAVRUI.install({
            recenter:true,
            exit:true,
            crosshair:true,
            tapToShoot:true
          });
        } else if (window.installVRUI && typeof window.installVRUI === 'function'){
          window.installVRUI({
            recenter:true,
            exit:true,
            crosshair:true,
            tapToShoot:true
          });
        }
      }catch(err){
        console.warn('[GoodJunkVR] VR UI install failed:', err);
      }
    }

    try{
      installVRUI();

      await boot({
        appId: 'goodjunk',
        title: 'GoodJunk VR',
        hub: safeHub(),
        diff: qs('diff', 'normal'),
        time: Number(qs('time', '60')) || 60,
        seed: qs('seed', ''),
        pid: qs('pid', 'anon'),
        nick: qs('nick', ''),
        studyId: qs('studyId', ''),
        phase: qs('phase', ''),
        conditionGroup: qs('conditionGroup', ''),
        battle: qs('battle', '0') === '1' || qs('mode','') === 'battle',
        room: qs('room', ''),
        spectator: qs('spectator', '0') === '1',
        pro: qs('pro', '0') === '1',
        run: qs('run', '1'),
        log: qs('log', ''),
        view: qs('view', 'mobile'),
        api: qs('api', ''),
        debug: qs('debug', '0') === '1'
      });
    }catch(err){
      console.error('[GoodJunkVR] boot error:', err);
      alert(err?.message || String(err));
    }
  </script>
</body>
</html>
