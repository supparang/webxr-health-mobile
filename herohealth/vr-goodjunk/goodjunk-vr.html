<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth — GoodJunkVR</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="../favicon.ico" />
  <style>
    :root{
      --bg:#050814;
      --stroke:rgba(148,163,184,.18);
      --text:rgba(229,231,235,.96);
      --muted:rgba(148,163,184,.92);
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
      --sar: env(safe-area-inset-right, 0px);
    }
    html,body{height:100%; margin:0; background:var(--bg); color:var(--text);}
    body{
      overflow:hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans Thai", "Noto Sans", Arial;
    }

    #gj-layer{
      position:fixed; inset:0; overflow:hidden;
      touch-action:manipulation; -webkit-tap-highlight-color:transparent; user-select:none;
    }

    .hud{
      position:fixed;
      top:calc(10px + var(--sat));
      left:calc(10px + var(--sal));
      right:calc(10px + var(--sar));
      z-index:200;
      display:flex; gap:10px; flex-wrap:wrap; align-items:center;
      pointer-events:none;
    }
    .pill{
      pointer-events:none;
      display:inline-flex; align-items:center; gap:8px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background:rgba(2,6,23,.55);
      backdrop-filter:blur(8px);
      color:var(--muted);
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
    }
    .pill b,.pill .v{color:var(--text)}

    .mini{
      position:fixed;
      top:calc(56px + var(--sat));
      left:calc(10px + var(--sal));
      z-index:200;
      max-width:84vw;
      pointer-events:none;
      display:flex; gap:8px; flex-wrap:wrap; align-items:center;
    }

    #bossBar{
      position:fixed; left:50%; top:calc(56px + var(--sat)); transform:translateX(-50%);
      z-index:205; width:min(520px,86vw); pointer-events:none; display:none; flex-direction:column; gap:6px; align-items:center;
    }
    #bossHint{font-weight:1000; font-size:12px; color:var(--muted); text-shadow:0 10px 30px rgba(0,0,0,.55);}
    #bossFill{
      height:10px; width:100%; border-radius:999px; border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.35); overflow:hidden; position:relative;
    }
    #bossFill::before{
      content:""; position:absolute; inset:0; width:var(--hp,0%);
      background:rgba(239,68,68,.85); transition:width .12s ease;
    }

    .mission{
      position:fixed; left:50%; top:calc(10px + var(--sat)); transform:translateX(-50%);
      z-index:210; pointer-events:none; width:min(560px,92vw);
      border-radius:18px; border:1px solid rgba(148,163,184,.16);
      background:rgba(2,6,23,.50); backdrop-filter:blur(10px);
      padding:10px 12px; display:flex; flex-direction:column; gap:8px;
      box-shadow:0 18px 55px rgba(0,0,0,.40);
    }
    .missionRow{display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap;}
    .missionTitle{font-weight:1000; letter-spacing:.2px;}
    .missionHint{font-size:12px; font-weight:900; color:var(--muted);}
    .missionGoal{font-size:12px; font-weight:1000;}
    #missionFill{
      height:10px; border-radius:999px; border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.35); overflow:hidden; position:relative;
    }
    #missionFill::before{
      content:""; position:absolute; inset:0; width:var(--p,0%);
      background:rgba(34,197,94,.85); transition:width .12s ease;
    }

    #endOverlay{
      position:fixed; inset:0; display:none; z-index:400;
      background:rgba(0,0,0,.55); backdrop-filter:blur(8px);
      align-items:center; justify-content:center;
      padding:calc(8px + var(--sat)) calc(8px + var(--sar)) calc(92px + var(--sab)) calc(8px + var(--sal));
      overflow:auto; -webkit-overflow-scrolling:touch;
    }
    #endOverlay .panel{
      width:min(620px,94vw);
      max-height:calc(100dvh - 104px - var(--sat) - var(--sab));
      overflow:auto; -webkit-overflow-scrolling:touch;
      border-radius:22px;
      border:1px solid rgba(148,163,184,.18);
      background:
        radial-gradient(520px 260px at 18% 0%, rgba(59,130,246,.18), transparent 58%),
        radial-gradient(520px 260px at 82% 0%, rgba(167,139,250,.14), transparent 56%),
        rgba(2,6,23,.78);
      box-shadow:0 22px 80px rgba(0,0,0,.55);
      padding:10px 10px 8px;
      text-align:center;
    }

    .heroSummary{
      border-radius:20px;
      border:1px solid rgba(148,163,184,.18);
      background:rgba(15,23,42,.42);
      padding:12px 10px;
      box-shadow:0 12px 40px rgba(0,0,0,.24);
    }
    .heroTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .heroBadge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,.16);
      background:rgba(2,6,23,.34);
      color:var(--muted);
      font-size:12px;
      font-weight:1000;
    }
    .heroBadge b{ color:var(--text); }

    #endTitle{
      font-size:18px;
      font-weight:1100;
      margin:8px 0 0 0;
      line-height:1.15;
    }
    #endSub{
      margin:5px 0 0 0;
      color:var(--muted);
      font-weight:900;
      line-height:1.28;
      font-size:11px;
    }

    .gradeHero{
      margin-top:10px;
      display:grid;
      place-items:center;
      gap:4px;
    }
    .gradeHero .label{
      font-size:11px;
      color:var(--muted);
      font-weight:1000;
      letter-spacing:.2px;
    }
    .gradeHero .gradeBig{
      font-size:52px;
      line-height:1;
      font-weight:1100;
      color:var(--text);
      text-shadow:0 10px 32px rgba(255,255,255,.10);
    }

    .endMiniLine{
      margin-top:8px;
      font-size:11px;
      font-weight:900;
      color:var(--muted);
      line-height:1.3;
    }
    .endMiniLine b{color:var(--text);}

    .endGrid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:8px;
      margin-top:10px;
    }
    .endPill{
      border-radius:16px;
      border:1px solid rgba(148,163,184,.16);
      background:rgba(2,6,23,.38);
      padding:9px 8px;
      font-weight:1000;
      min-height:62px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }
    .endPill .k{opacity:.78; font-size:10px; line-height:1.1;}
    .endPill .v{font-size:16px; margin-top:4px; line-height:1.1; color:var(--text);}

    .endActions{
      position:sticky; bottom:0;
      display:flex; gap:8px; justify-content:center; flex-wrap:wrap;
      margin-top:10px; padding-top:10px;
      padding-bottom:max(4px, env(safe-area-inset-bottom, 0px));
      background:linear-gradient(180deg, rgba(2,6,23,0), rgba(2,6,23,.92) 28%);
      backdrop-filter:blur(6px);
    }
    .btn{
      pointer-events:auto;
      cursor:pointer;
      border-radius:16px;
      border:1px solid rgba(148,163,184,.22);
      background:rgba(148,163,184,.10);
      color:var(--text);
      padding:10px 12px;
      font-weight:1100;
      min-height:44px;
      flex:1 1 140px;
      text-align:center;
    }
    .btn.primary{border-color:rgba(59,130,246,.30); background:rgba(59,130,246,.16);}
    .btn.ghost{background:transparent; color:var(--muted);}

    #dbg{
      position:fixed; left:10px; bottom:calc(10px + var(--sab));
      z-index:9999; max-width:92vw;
      border-radius:14px; border:1px solid rgba(148,163,184,.20);
      background:rgba(2,6,23,.60); backdrop-filter:blur(8px);
      padding:10px 10px;
      font:900 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      color:rgba(229,231,235,.96);
      display:none; white-space:pre-wrap;
    }

    @media (max-width: 640px){
      #endOverlay .panel{
        width:calc(100vw - 16px);
      }
      .endGrid{
        grid-template-columns:repeat(2, minmax(0,1fr));
      }
      .gradeHero .gradeBig{
        font-size:44px;
      }
    }

    @media (max-width: 420px){
      #endTitle{font-size:17px;}
      #endSub{font-size:10px;}
      .endPill{min-height:58px; padding:8px 7px;}
      .endPill .k{font-size:9px;}
      .endPill .v{font-size:15px;}
      .gradeHero .gradeBig{font-size:40px;}
    }

    @media (max-width: 380px){
      .endMiniLine{display:none;}
    }
  </style>
</head>
<body>

  <div id="gj-layer" aria-label="play layer"></div>

  <div class="hud" aria-label="hud">
    <span class="pill"><b>score</b>: <span class="v" id="hud-score">0</span></span>
    <span class="pill"><b>time</b>: <span class="v" id="hud-time">0</span></span>
    <span class="pill"><b>miss</b>: <span class="v" id="hud-miss">0</span></span>
    <span class="pill"><b>grade</b>: <span class="v" id="hud-grade">—</span></span>
    <span class="pill"><b>goal</b>: <span class="v" id="hud-goal">—</span></span>
  </div>

  <div class="mini" aria-label="goal/mini/ai">
    <span class="pill"><b>cur</b>: <span class="v" id="hud-goal-cur">0</span></span>
    <span class="pill"><b>target</b>: <span class="v" id="hud-goal-target">0</span></span>
    <span class="pill"><b>desc</b>: <span class="v" id="goalDesc">—</span></span>
    <span class="pill"><b>mini</b>: <span class="v" id="hud-mini">—</span></span>
    <span class="pill"><b>t</b>: <span class="v" id="miniTimer">0</span></span>
    <span class="pill"><b>AI risk</b>: <span class="v" id="aiRisk">—</span></span>
    <span class="pill"><b>AI hint</b>: <span class="v" id="aiHint">—</span></span>
  </div>

  <div class="mission" aria-label="mission">
    <div class="missionRow">
      <div class="missionTitle" id="missionTitle">WARM</div>
      <div class="missionGoal" id="missionGoal">—</div>
    </div>
    <div class="missionHint" id="missionHint">—</div>
    <div id="missionFill"></div>
  </div>

  <div id="bossBar" aria-label="bossbar">
    <div id="bossHint">—</div>
    <div id="bossFill" style="--hp:0%;"></div>
  </div>

  <div id="endOverlay" aria-label="end overlay">
    <div class="panel">
      <div class="heroSummary">
        <div class="heroTop">
          <span class="heroBadge"><b>Hero Result</b></span>
          <span class="heroBadge"><b>view</b>: <span id="uiView">—</span></span>
        </div>

        <h2 id="endTitle">จบเกม</h2>
        <p id="endSub">—</p>

        <div class="gradeHero">
          <div class="label">GRADE</div>
          <div class="gradeBig" id="endGrade">—</div>
        </div>

        <div class="endMiniLine">
          <b>run</b>: <span id="uiRun">—</span>
          &nbsp;•&nbsp;
          <b>diff</b>: <span id="uiDiff">—</span>
        </div>
      </div>

      <div class="endGrid">
        <div class="endPill"><div class="k">คะแนน</div><div class="v" id="endScore">0</div></div>
        <div class="endPill"><div class="k">Miss</div><div class="v" id="endMiss">0</div></div>
        <div class="endPill"><div class="k">เวลา</div><div class="v" id="endTime">0</div></div>
        <div class="endPill"><div class="k">สถานะ</div><div class="v">CLEAR</div></div>
      </div>

      <div class="endActions">
        <button class="btn primary" id="btnReplay" type="button">🔁 เล่นอีกครั้ง</button>
        <button class="btn ghost" id="btnBackHub" type="button">↩ กลับ Hub</button>
      </div>
    </div>
  </div>

  <div id="dbg"></div>

  <script src="../vr/vr-ui.js"></script>

  <script type="module">
    const qs = (k, d='')=>{ try{ return (new URL(location.href)).searchParams.get(k) ?? d; }catch(e){ return d; } };
    const dbg = document.getElementById('dbg');
    const debugOn = String(qs('debug','0')) === '1';

    function logDbg(msg){
      if(!dbg || !debugOn) return;
      dbg.style.display = 'block';
      dbg.textContent += (String(msg||'') + '\n');
    }

    window.addEventListener('error', (e)=>{ logDbg('ERROR: ' + (e?.message||e)); });
    window.addEventListener('unhandledrejection', (e)=>{ logDbg('REJECT: ' + (e?.reason?.message || e?.reason || e)); });

    const btnReplay = document.getElementById('btnReplay');
    const btnBackHub = document.getElementById('btnBackHub');

    btnReplay && (btnReplay.onclick = ()=>{
      const u = new URL(location.href);
      u.searchParams.set('seed', String(Date.now()));
      location.href = u.toString();
    });

    btnBackHub && (btnBackHub.onclick = ()=>{
      const hub = qs('hub','../hub.html');
      location.href = hub;
    });

    try{
      logDbg('Booting goodjunk...');
      const mod = await import('./goodjunk.safe.js');
      if(!mod || typeof mod.boot !== 'function'){
        throw new Error('goodjunk.safe.js missing export boot(cfg)');
      }
      await mod.boot({
        pid: qs('pid','anon'),
        nick: qs('nick','anon'),
        hub: qs('hub','../hub.html'),
        mode: qs('mode','solo'),
        run: qs('run','play'),
        diff: qs('diff','normal'),
        view: qs('view','mobile'),
        time: qs('time','80'),
        seed: qs('seed', String(Date.now())),
        ai: null
      });
      logDbg('✅ boot ok');
    }catch(err){
      logDbg('❌ boot failed: ' + (err?.message || err));
      console.error(err);
      alert('GoodJunk โหลดไม่สำเร็จ (ดู console/debug=1)');
    }
  </script>
</body>
</html>
