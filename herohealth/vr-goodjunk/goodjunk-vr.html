✅ Correct filename: goodjunk-vr.html
✅ CSS path: ./goodjunk-vr.css
✅ Computes window.__HHA_SPAWN_SAFE__ to prevent HUD blocking targets
✅ Supports view=mobile|pc|cvr (cVR strict shoot via hha:shoot)
✅ Optional AI: ?ai=1 (only when run=play)
✅ Optional Battle: ?battle=1&room=... (safe fallback if module/config missing)

<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk VR</title>
  <meta name="color-scheme" content="dark light" />

  <link rel="icon" href="../favicon.ico" />
  <link rel="stylesheet" href="./goodjunk-vr.css?v=20260304" />
</head>

<body>
  <div id="app">

    <!-- Debug pills (optional) -->
    <div id="debugPills" aria-hidden="true">
      <span class="pill">view=<b id="uiView">—</b></span>
      <span class="pill">run=<b id="uiRun">—</b></span>
      <span class="pill">diff=<b id="uiDiff">—</b></span>
    </div>

    <!-- Top HUD -->
    <header id="hud">
      <div class="hud-row">
        <div class="pill">SCORE <b id="hud-score">0</b></div>
        <div class="pill">TIME <b id="hud-time">0</b></div>
        <div class="pill">MISS <b id="hud-miss">0</b></div>
        <div class="pill">GRADE <b id="hud-grade">C</b></div>
      </div>

      <div class="hud-row">
        <div class="pill pill-soft">
          GOAL <b id="hud-goal">Daily</b>:
          <span><b id="hud-goal-cur">0</b>/<b id="hud-goal-target">20</b></span>
          <span id="goalDesc" class="mut">Hit GOOD 20</span>
        </div>
        <div class="pill pill-soft">
          MINI <b id="hud-mini">—</b>
          <span class="mut">⏱ <b id="miniTimer">—</b></span>
        </div>
      </div>

      <!-- AI HUD -->
      <div class="hud-row">
        <div class="pill pill-ai">
          AI Risk <b id="aiRisk">—</b>
          <span class="mut">next: <b id="aiHint">—</b></span>
        </div>
      </div>

      <!-- Fever + Shield + Boss -->
      <div class="hud-row hud-bars">
        <div class="barCard">
          <div class="barTop">
            <span class="mut">FEVER</span>
            <b id="feverText">0%</b>
          </div>
          <div class="bar">
            <div class="barFill" id="feverFill" style="width:0%"></div>
          </div>
        </div>

        <div class="barCard">
          <div class="barTop">
            <span class="mut">SHIELD</span>
            <b id="shieldPills">—</b>
          </div>
        </div>

        <div class="barCard boss" id="bossBar" aria-hidden="true">
          <div class="barTop">
            <span class="mut">BOSS</span>
            <b id="bossHint">—</b>
          </div>
          <div class="bar">
            <div class="barFill bossFill" id="bossFill" style="width:0%"></div>
          </div>
        </div>
      </div>

      <div class="gj-progress" aria-hidden="false">
        <div class="gj-progress-track">
          <div class="gj-progress-fill" id="gjProgressFill" style="width:0%"></div>
        </div>
      </div>
    </header>

    <!-- Playfield -->
    <main id="stage" aria-label="GoodJunk Stage">
      <div id="gj-layer" aria-label="targets"></div>
    </main>

    <!-- Low time overlay -->
    <div id="lowTimeOverlay" aria-hidden="true">
      <div class="lowTimeCard">
        <div class="mut">TIME</div>
        <div class="lowTimeNum" id="gj-lowtime-num">5</div>
      </div>
    </div>

    <!-- End overlay -->
    <div id="endOverlay" aria-hidden="true">
      <div class="panel">
        <div class="endTitle" id="endTitle">Game Over</div>
        <div class="endSub" id="endSub">—</div>

        <div class="endGrid">
          <div class="endStat"><span>GRADE</span><b id="endGrade">—</b></div>
          <div class="endStat"><span>SCORE</span><b id="endScore">0</b></div>
          <div class="endStat"><span>MISS</span><b id="endMiss">0</b></div>
          <div class="endStat"><span>TIME</span><b id="endTime">0</b></div>
        </div>

        <div class="endActions">
          <button class="btn" id="btnRetry" type="button">เล่นอีกครั้ง</button>
          <button class="btn primary" id="btnHub" type="button">กลับ HUB</button>
        </div>
        <!-- Cooldown button injected by goodjunk.safe.js -->
      </div>
    </div>

  </div>

  <script type="module">
    import { boot } from './goodjunk.safe.js';

    const qs = (k, d='')=>{ try{ return (new URL(location.href)).searchParams.get(k) ?? d; }catch(e){ return d; } };
    const clamp = (v,a,b)=>{ v=Number(v); if(!Number.isFinite(v)) v=a; return Math.max(a, Math.min(b,v)); };

    const cfg = {
      view: qs('view','mobile'),
      run: qs('run','play'),
      diff: qs('diff','normal'),
      time: Number(qs('time','80')) || 80,
      seed: qs('seed', String(Date.now())),
      pid: qs('pid','anon'),
      hub: qs('hub','../hub.html'),
      ai: null
    };

    // put view on body (CSS uses this for cVR strict pointer-events)
    document.body.dataset.view = String(cfg.view||'mobile').toLowerCase();

    // -------- Spawn Safe (กัน HUD บังเป้า) --------
    function computeSpawnSafe(){
      const stage = document.getElementById('stage');
      const hud   = document.getElementById('hud');
      const layer = document.getElementById('gj-layer');
      if(!stage || !layer) return;

      const sR = stage.getBoundingClientRect();
      const hR = hud ? hud.getBoundingClientRect() : { bottom: sR.top };
      const safeTop = Math.max(sR.top, hR.bottom + 10);

      // เว้นขอบล่างให้พ้น coach/toast/safe-area (เผื่อมือถือ)
      const safeBottom = Math.min(
        sR.bottom,
        (window.innerHeight - (Number(getComputedStyle(document.documentElement).getPropertyValue('--gj-safe-bottom')||0))) - 10
      );

      // กันขอบซ้าย/ขวาเล็กน้อย
      const xPad = 14;
      const yPad = 12;

      const xMin = sR.left + xPad;
      const xMax = sR.right - xPad;
      const yMin = safeTop + yPad;
      const yMax = safeBottom - yPad;

      // expose absolute coordinates (goodjunk.safe.js will convert to local)
      window.__HHA_SPAWN_SAFE__ = {
        xMin, xMax, yMin, yMax
      };
    }

    // recompute a few times (fonts/layout settle) + on resize
    function armSpawnSafe(){
      computeSpawnSafe();
      setTimeout(computeSpawnSafe, 120);
      setTimeout(computeSpawnSafe, 350);
      setTimeout(computeSpawnSafe, 900);
    }
    window.addEventListener('resize', armSpawnSafe);
    window.addEventListener('orientationchange', armSpawnSafe);
    armSpawnSafe();

    // -------- Optional AI --------
    const aiOn = (qs('ai','0') === '1') && (String(cfg.run).toLowerCase() === 'play');
    if(aiOn){
      try{
        const mod = await import('../vr/ai-goodjunk.js');
        if(typeof mod.createGoodJunkAI === 'function'){
          cfg.ai = mod.createGoodJunkAI({
            seed: cfg.seed,
            pid: cfg.pid,
            diff: cfg.diff,
            view: cfg.view
          });
        }
      }catch(e){
        console.warn('[GoodJunk] AI module load failed (ok)', e);
      }
    }

    // Buttons
    const btnRetry = document.getElementById('btnRetry');
    const btnHub = document.getElementById('btnHub');
    btnRetry?.addEventListener('click', ()=>{
      const u = new URL(location.href);
      u.searchParams.set('seed', String(Date.now()));
      location.href = u.toString();
    });
    btnHub?.addEventListener('click', ()=>{
      location.href = cfg.hub || '../hub.html';
    });

    // Boot
    boot(cfg);
  </script>
</body>
</html>
