<!-- === /herohealth/vr-goodjunk/goodjunk-vr.html ===
GoodJunkVR RUN (PC/Mobile/cVR) — PRODUCTION
FULL v20260304f-RUN-DIFF-AI-SPAWNSAFE-NODASH
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk VR</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="../favicon.ico" />
  <link rel="stylesheet" href="./goodjunk-vr.css?v=20260304f" />
</head>
<body>
  <div id="app">

    <!-- Loading (กันจอดำ/ค้าง) -->
    <div id="loading" aria-hidden="false">
      <div class="loadingCard">
        <div class="loadingTitle">Loading GoodJunk…</div>
        <div class="loadingSub">กำลังเตรียมเกม / UI / AI</div>
        <div class="loadingLine" id="loadingLine">view=? run=? diff=? ai=?</div>
      </div>
    </div>

    <!-- Debug pills -->
    <div id="debugPills" aria-hidden="true">
      <span class="pill">view=<b id="uiView">—</b></span>
      <span class="pill">run=<b id="uiRun">—</b></span>
      <span class="pill">diff=<b id="uiDiff">—</b></span>
      <span class="pill">ai=<b id="uiAi">—</b></span>
      <span class="pill">mode=<b id="uiMode">solo</b></span>
    </div>

    <!-- Difficulty switch (always visible) -->
    <div id="diffSwitch" class="diffSwitch" aria-label="difficulty">
      <button type="button" class="diffBtn" data-d="easy">ง่าย</button>
      <button type="button" class="diffBtn" data-d="normal">ปกติ</button>
      <button type="button" class="diffBtn" data-d="hard">ยาก</button>
    </div>

    <!-- Top HUD -->
    <header id="hud">
      <div class="hud-row">
        <div class="pill">SCORE <b id="hud-score">0</b></div>
        <div class="pill">TIME <b id="hud-time">0</b></div>
        <div class="pill">MISS <b id="hud-miss">0</b></div>
        <div class="pill">GRADE <b id="hud-grade">C</b></div>
      </div>

      <div class="hud-row">
        <div class="pill pill-soft">
          GOAL <b id="hud-goal">Daily</b>:
          <span><b id="hud-goal-cur">0</b>/<b id="hud-goal-target">20</b></span>
          <span id="goalDesc" class="mut">Hit GOOD 20</span>
        </div>
        <div class="pill pill-soft">
          MINI <b id="hud-mini">—</b>
          <span class="mut">⏱ <b id="miniTimer">—</b></span>
        </div>
      </div>

      <!-- AI HUD -->
      <div class="hud-row">
        <div class="pill pill-ai">
          AI Risk <b id="aiRisk">—</b>
          <span class="mut">next: <b id="aiHint">—</b></span>
        </div>
      </div>

      <!-- Fever + Shield + Boss -->
      <div class="hud-row hud-bars">
        <div class="barCard">
          <div class="barTop">
            <span class="mut">FEVER</span>
            <b id="feverText">0%</b>
          </div>
          <div class="bar">
            <div class="barFill" id="feverFill" style="width:0%"></div>
          </div>
        </div>

        <div class="barCard">
          <div class="barTop">
            <span class="mut">SHIELD</span>
            <b id="shieldPills">—</b>
          </div>
        </div>

        <div class="barCard boss" id="bossBar" aria-hidden="true">
          <div class="barTop">
            <span class="mut">BOSS</span>
            <b id="bossHint">—</b>
          </div>
          <div class="bar">
            <div class="barFill bossFill" id="bossFill" style="width:0%"></div>
          </div>
        </div>
      </div>

      <div class="gj-progress" aria-hidden="false">
        <div class="gj-progress-track">
          <div class="gj-progress-fill" id="gjProgressFill" style="width:0%"></div>
        </div>
      </div>
    </header>

    <!-- Playfield -->
    <main id="stage" aria-label="GoodJunk Stage">
      <div id="gj-layer" aria-label="targets"></div>
    </main>

    <!-- Low time overlay -->
    <div id="lowTimeOverlay" aria-hidden="true">
      <div class="lowTimeCard">
        <div class="mut">TIME</div>
        <div class="lowTimeNum" id="gj-lowtime-num">5</div>
      </div>
    </div>

    <!-- End overlay -->
    <div id="endOverlay" aria-hidden="true">
      <div class="panel">
        <div class="endTitle" id="endTitle">Game Over</div>
        <div class="endSub" id="endSub">—</div>

        <div class="endGrid">
          <div class="endStat"><span>GRADE</span><b id="endGrade">—</b></div>
          <div class="endStat"><span>SCORE</span><b id="endScore">0</b></div>
          <div class="endStat"><span>MISS</span><b id="endMiss">0</b></div>
          <div class="endStat"><span>TIME</span><b id="endTime">0</b></div>
        </div>

        <div class="endActions">
          <button class="btn" id="btnRetry" type="button">เล่นอีกครั้ง</button>
          <button class="btn primary" id="btnHub" type="button">กลับ HUB</button>
        </div>
        <!-- Cooldown button injected by safe.js -->
      </div>
    </div>

  </div>

  <script type="module">
    const qs = (k, d='')=>{ try{ return (new URL(location.href)).searchParams.get(k) ?? d; }catch(e){ return d; } };

    // ----- parse params -----
    const cfg = {
      view: qs('view','mobile'),          // mobile | pc | cvr | vr
      run:  qs('run','play'),             // play | research
      diff: qs('diff','normal'),          // easy | normal | hard
      time: Number(qs('time','80'))||80,
      seed: qs('seed', String(Date.now())),
      pid:  qs('pid','anon'),
      hub:  qs('hub','../hub.html'),
      ai:   null,
    };

    const mode = String(qs('mode','solo')).toLowerCase(); // solo | race | battle | coop (future)
    const aiOn = (qs('ai','0')==='1') && (String(cfg.run).toLowerCase()==='play');

    // ----- debug pills fill (NO MORE "—") -----
    const setText=(id,v)=>{ const el=document.getElementById(id); if(el) el.textContent=String(v??''); };
    setText('uiView', cfg.view);
    setText('uiRun',  cfg.run);
    setText('uiDiff', cfg.diff);
    setText('uiAi',   aiOn ? '1' : '0');
    setText('uiMode', mode);

    const loadingLine = document.getElementById('loadingLine');
    if(loadingLine){
      loadingLine.textContent = `view=${cfg.view} run=${cfg.run} diff=${cfg.diff} ai=${aiOn?1:0} mode=${mode}`;
    }

    // show debug pills when ?debug=1
    try{
      const dbg = (qs('debug','0')==='1');
      const pills = document.getElementById('debugPills');
      if(pills) pills.setAttribute('aria-hidden', dbg ? 'false' : 'true');
    }catch(e){}

    // ----- Difficulty UI -----
    function applyDiffActive(){
      document.querySelectorAll('.diffBtn').forEach(b=>{
        const d = b.getAttribute('data-d');
        b.classList.toggle('active', d===cfg.diff);
      });
    }
    applyDiffActive();
    document.querySelectorAll('.diffBtn').forEach(b=>{
      b.addEventListener('click', ()=>{
        const d = b.getAttribute('data-d') || 'normal';
        const u = new URL(location.href);
        u.searchParams.set('diff', d);
        // keep seed for fairness if you want; but for kids, reset seed feels better
        if(qs('keepSeed','0')!=='1') u.searchParams.set('seed', String(Date.now()));
        location.href = u.toString();
      });
    });

    // ----- Spawn-safe: compute safe rect excluding HUD + bottom safe area -----
    function computeSpawnSafe(){
      const hud = document.getElementById('hud');
      const layer = document.getElementById('gj-layer');
      if(!hud || !layer) return;

      const lr = layer.getBoundingClientRect();
      const hr = hud.getBoundingClientRect();

      // keep a bottom margin for mobile address bar / VR buttons
      const bottomPad = Math.max(110, 70 + (window.visualViewport?.offsetTop||0));

      // safe in viewport coords
      const xMin = lr.left + 18;
      const xMax = lr.right - 18;
      const yMin = Math.min(lr.bottom - 220, hr.bottom + 16);
      const yMax = lr.bottom - bottomPad;

      const safe = {
        xMin: Math.max(lr.left, xMin),
        xMax: Math.min(lr.right, xMax),
        yMin: Math.max(lr.top, yMin),
        yMax: Math.min(lr.bottom, yMax),
      };
      window.__HHA_SPAWN_SAFE__ = safe;
    }
    computeSpawnSafe();
    window.addEventListener('resize', computeSpawnSafe, { passive:true });
    window.visualViewport?.addEventListener?.('resize', computeSpawnSafe, { passive:true });
    window.visualViewport?.addEventListener?.('scroll', computeSpawnSafe, { passive:true });

    // ----- AI dynamic import (safe) -----
    if(aiOn){
      try{
        const mod = await import('../vr/ai-goodjunk.js');
        if(typeof mod.createGoodJunkAI === 'function'){
          cfg.ai = mod.createGoodJunkAI({
            seed: cfg.seed,
            pid: cfg.pid,
            diff: cfg.diff,
            view: cfg.view,
            mode
          });
        }
      }catch(e){
        console.warn('[GoodJunk] AI module load failed', e);
      }
    }

    // ----- Optional cVR UI (ENTER VR / RECENTER + hha:shoot) -----
    try{
      const v = String(cfg.view).toLowerCase();
      if(v==='cvr' || v==='vr'){
        await import('../vr/vr-ui.js'); // should dispatch hha:shoot
      }
    }catch(e){}

    // ----- Boot core game -----
    const core = await import('./goodjunk.safe.js');
    core.boot(cfg);

    // ----- Optional race controller -----
    if(mode==='race'){
      try{
        await import('./goodjunk-race.js'); // optional file (included below)
      }catch(e){
        console.warn('[GoodJunk] race controller missing (ok)', e);
      }
    }

    // Buttons
    const btnRetry = document.getElementById('btnRetry');
    const btnHub = document.getElementById('btnHub');
    btnRetry?.addEventListener('click', ()=>{
      const u = new URL(location.href);
      u.searchParams.set('seed', String(Date.now()));
      location.href = u.toString();
    });
    btnHub?.addEventListener('click', ()=>{
      location.href = cfg.hub || '../hub.html';
    });

    // Hide loading once booted
    const loading = document.getElementById('loading');
    if(loading) loading.setAttribute('aria-hidden','true');
  </script>
</body>
</html>
