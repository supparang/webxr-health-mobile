<!-- === /herohealth/vr-goodjunk/goodjunk-vr.html ===
GoodJunkVR RUN — PRODUCTION (works with goodjunk.safe.js ESM)
PATCH v20260303-RUN-AI-AUTO-SPAWNSAFE-VRUI
✅ Correct filename: goodjunk-vr.html
✅ Loads vr-ui.js (ENTER VR/EXIT/RECENTER + crosshair + hha:shoot)
✅ Spawn-safe computed from HUD + safe areas and pushed to window.__HHA_SPAWN_SAFE__
✅ AI auto-on in run=play (ai=0 to disable)
✅ Pass-through params preserved (hub/run/diff/time/seed/pid/log/studyId/phase/conditionGroup/view/battle/room...)
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk VR</title>
  <meta name="color-scheme" content="dark light" />

  <link rel="icon" href="../favicon.ico" />
  <link rel="stylesheet" href="./goodjunk-vr.css?v=20260303" />
</head>
<body>
  <div id="app">

    <!-- Debug pills (optional) -->
    <div id="debugPills" aria-hidden="true">
      <span class="pill">view=<b id="uiView">—</b></span>
      <span class="pill">run=<b id="uiRun">—</b></span>
      <span class="pill">diff=<b id="uiDiff">—</b></span>
      <span class="pill">ai=<b id="uiAI">—</b></span>
    </div>

    <!-- Top HUD -->
    <header id="hud">
      <div class="hud-row">
        <div class="pill">SCORE <b id="hud-score">0</b></div>
        <div class="pill">TIME <b id="hud-time">0</b></div>
        <div class="pill">MISS <b id="hud-miss">0</b></div>
        <div class="pill">GRADE <b id="hud-grade">C</b></div>
      </div>

      <div class="hud-row">
        <div class="pill pill-soft">
          GOAL <b id="hud-goal">Daily</b>:
          <span><b id="hud-goal-cur">0</b>/<b id="hud-goal-target">20</b></span>
          <span id="goalDesc" class="mut">Hit GOOD 20</span>
        </div>
        <div class="pill pill-soft">
          MINI <b id="hud-mini">—</b>
          <span class="mut">⏱ <b id="miniTimer">—</b></span>
        </div>
      </div>

      <!-- AI HUD -->
      <div class="hud-row">
        <div class="pill pill-ai">
          AI Risk <b id="aiRisk">—</b>
          <span class="mut">next: <b id="aiHint">—</b></span>
        </div>
      </div>

      <!-- Fever + Shield + Boss -->
      <div class="hud-row hud-bars">
        <div class="barCard">
          <div class="barTop">
            <span class="mut">FEVER</span>
            <b id="feverText">0%</b>
          </div>
          <div class="bar">
            <div class="barFill" id="feverFill" style="width:0%"></div>
          </div>
        </div>

        <div class="barCard">
          <div class="barTop">
            <span class="mut">SHIELD</span>
            <b id="shieldPills">—</b>
          </div>
        </div>

        <div class="barCard boss" id="bossBar" aria-hidden="true">
          <div class="barTop">
            <span class="mut">BOSS</span>
            <b id="bossHint">—</b>
          </div>
          <div class="bar">
            <div class="barFill bossFill" id="bossFill" style="width:0%"></div>
          </div>
        </div>
      </div>

      <div class="gj-progress" aria-hidden="false">
        <div class="gj-progress-track">
          <div class="gj-progress-fill" id="gjProgressFill" style="width:0%"></div>
        </div>
      </div>
    </header>

    <!-- Playfield -->
    <main id="stage" aria-label="GoodJunk Stage">
      <div id="gj-layer" aria-label="targets"></div>
    </main>

    <!-- Low time overlay -->
    <div id="lowTimeOverlay" aria-hidden="true">
      <div class="lowTimeCard">
        <div class="mut">TIME</div>
        <div class="lowTimeNum" id="gj-lowtime-num">5</div>
      </div>
    </div>

    <!-- End overlay -->
    <div id="endOverlay" aria-hidden="true">
      <div class="panel">
        <div class="endTitle" id="endTitle">Game Over</div>
        <div class="endSub" id="endSub">—</div>

        <div class="endGrid">
          <div class="endStat"><span>GRADE</span><b id="endGrade">—</b></div>
          <div class="endStat"><span>SCORE</span><b id="endScore">0</b></div>
          <div class="endStat"><span>MISS</span><b id="endMiss">0</b></div>
          <div class="endStat"><span>TIME</span><b id="endTime">0</b></div>
        </div>

        <div class="endActions">
          <button class="btn" id="btnRetry" type="button">เล่นอีกครั้ง</button>
          <button class="btn primary" id="btnHub" type="button">กลับ HUB</button>
        </div>
        <!-- Cooldown button injected by goodjunk.safe.js -->
      </div>
    </div>

  </div>

  <script type="module">
    import { boot } from './goodjunk.safe.js';
    import '../vr/vr-ui.js';

    const qs = (k, d='')=>{ try{ return (new URL(location.href)).searchParams.get(k) ?? d; }catch(e){ return d; } };
    const qsn = (k, d=0)=>{ const v = Number(qs(k,'')); return Number.isFinite(v)? v : d; };
    const qsl = (k, d='')=> String(qs(k,d)||d);

    // ---- passthrough base cfg ----
    const cfg = {
      view: qsl('view','mobile'),
      run:  qsl('run','play'),
      diff: qsl('diff','normal'),
      time: qsn('time', 80) || 80,
      seed: qsl('seed', String(Date.now())),
      pid:  qsl('pid','anon'),
      hub:  qsl('hub','../hub.html'),
      ai: null
    };

    // Debug pills
    const pill = (id, v)=>{ const el=document.getElementById(id); if(el) el.textContent=String(v); };
    pill('uiView', cfg.view);
    pill('uiRun',  cfg.run);
    pill('uiDiff', cfg.diff);

    // ---- Spawn-safe (prevents HUD blocking targets) ----
    function computeSpawnSafe(){
      const layer = document.getElementById('gj-layer');
      const hud   = document.getElementById('hud');
      if(!layer) return;

      const lr = layer.getBoundingClientRect();
      const hr = hud ? hud.getBoundingClientRect() : { bottom: 0 };

      const safeTop = Math.max(0, (hr.bottom - lr.top) + 10); // below HUD
      const pad = 18;

      // keep some bottom room for coach + safe area
      const safeAreaBottom = (window.visualViewport ? (window.innerHeight - window.visualViewport.height) : 0);
      const bottomReserve = 140 + Math.max(0, safeAreaBottom);

      const xMin = lr.left + pad;
      const xMax = lr.right - pad;
      const yMin = lr.top + Math.max(pad, safeTop);
      const yMax = lr.bottom - Math.max(pad, bottomReserve);

      // store ABSOLUTE coords (as expected by goodjunk.safe.js converter)
      window.__HHA_SPAWN_SAFE__ = {
        xMin: xMin,
        xMax: xMax,
        yMin: yMin,
        yMax: yMax
      };
    }

    // compute after layout settle
    requestAnimationFrame(()=>requestAnimationFrame(computeSpawnSafe));
    window.addEventListener('resize', ()=> requestAnimationFrame(computeSpawnSafe));
    if(window.visualViewport){
      window.visualViewport.addEventListener('resize', ()=> requestAnimationFrame(computeSpawnSafe));
      window.visualViewport.addEventListener('scroll', ()=> requestAnimationFrame(computeSpawnSafe));
    }

    // ---- AI auto-on in run=play ----
    // ai=0 => off, ai=1 => on
    // default: ON for play, OFF for research
    const runLower = String(cfg.run).toLowerCase();
    const aiParam  = qsl('ai', runLower === 'play' ? '1' : '0');
    const aiOn     = (aiParam === '1') && (runLower === 'play');

    pill('uiAI', aiOn ? '1' : '0');
    const debugPills = document.getElementById('debugPills');
    if(debugPills){
      const dbg = qsl('debug','0') === '1';
      debugPills.setAttribute('aria-hidden', dbg ? 'false' : 'true');
      if(dbg) debugPills.style.display = 'flex';
    }

    if(aiOn){
      try{
        const mod = await import('../vr/ai-goodjunk.js');
        if(typeof mod.createGoodJunkAI === 'function'){
          cfg.ai = mod.createGoodJunkAI({
            seed: cfg.seed,
            pid: cfg.pid,
            diff: cfg.diff,
            view: cfg.view,
            // ML/DL-ready: capture examples locally (no network)
            capture: (qsl('cap','0') === '1') // cap=1 to store feature/label rows
          });
        }
      }catch(e){
        console.warn('[GoodJunk] AI module load failed (ok)', e);
      }
    }

    // Buttons
    const btnRetry = document.getElementById('btnRetry');
    const btnHub = document.getElementById('btnHub');
    btnRetry?.addEventListener('click', ()=>{
      const u = new URL(location.href);
      u.searchParams.set('seed', String(Date.now()));
      location.href = u.toString();
    });
    btnHub?.addEventListener('click', ()=>{
      location.href = cfg.hub || '../hub.html';
    });

    // Boot
    boot(cfg);
  </script>
</body>
</html>
