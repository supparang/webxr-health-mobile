<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk</title>
  <meta name="color-scheme" content="light" />
  <link rel="icon" href="../favicon.ico" />

  <style>
    :root{
      --sky1:#dff4ff;
      --sky2:#bfe8ff;
      --sky3:#fff7d9;
      --cloud:#ffffffcc;
      --card:#fffdf6;
      --card-2:#f8fff4;
      --line:#bfe3f2;
      --text:#4d4a42;
      --muted:#7a7a73;

      --green:#7ed957;
      --green-2:#56c53e;
      --blue:#7fcfff;
      --blue-2:#58b7f5;
      --yellow:#ffd45c;
      --orange:#ffb547;
      --pink:#ff9dc4;
      --danger:#ff8f8f;

      --shadow:0 18px 40px rgba(86, 155, 194, .18);

      --sat: env(safe-area-inset-top, 0px);
      --sar: env(safe-area-inset-right, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      min-height:100%;
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 12% 10%, rgba(255,255,255,.92), transparent 18%),
        radial-gradient(circle at 84% 14%, rgba(255,255,255,.78), transparent 16%),
        linear-gradient(180deg,var(--sky1),var(--sky2) 54%, var(--sky3));
      overflow:hidden;
    }

    body{ min-height:100dvh; }

    #app{
      position:relative;
      width:100vw;
      height:100dvh;
      overflow:hidden;
      isolation:isolate;
    }

    #gameMount{
      position:absolute;
      inset:0;
      z-index:1;
      overflow:hidden;
    }

    .boot-shell{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      padding:
        calc(18px + var(--sat))
        calc(16px + var(--sar))
        calc(18px + var(--sab))
        calc(16px + var(--sal));
      z-index:0;
      pointer-events:none;
    }

    .boot-card{
      width:min(94vw,560px);
      background:linear-gradient(180deg,#fffef9,#f6fff7);
      border:3px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:22px 18px;
      text-align:center;
      position:relative;
      overflow:hidden;
    }

    .boot-card::before{
      content:"";
      position:absolute;
      inset:-20% auto auto -10%;
      width:180px;
      height:180px;
      border-radius:999px;
      background:rgba(127,207,255,.22);
      filter:blur(6px);
    }

    .boot-card::after{
      content:"";
      position:absolute;
      right:-20px;
      bottom:-28px;
      width:150px;
      height:150px;
      border-radius:999px;
      background:rgba(255,212,92,.24);
      filter:blur(6px);
    }

    .boot-kicker{
      position:relative;
      z-index:1;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 14px;
      border-radius:999px;
      background:#eaf8ff;
      border:2px solid var(--line);
      color:#4f9bc6;
      font-size:13px;
      font-weight:1000;
      margin-bottom:12px;
    }

    .boot-title{
      position:relative;
      z-index:1;
      margin:0 0 8px;
      font-size:clamp(28px, 5vw, 42px);
      line-height:1.06;
      font-weight:1000;
      color:#67a91c;
      text-shadow:0 2px 0 #fff;
    }

    .boot-sub{
      position:relative;
      z-index:1;
      margin:0;
      color:var(--muted);
      font-size:15px;
      line-height:1.65;
      font-weight:800;
    }

    .boot-meta{
      position:relative;
      z-index:1;
      display:flex;
      justify-content:center;
      gap:8px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .boot-pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:9px 12px;
      border-radius:999px;
      background:#fff;
      border:2px solid var(--line);
      color:#6d6a62;
      font-size:12px;
      font-weight:1000;
      box-shadow:0 8px 18px rgba(86,155,194,.12);
    }

    .boot-pill strong{
      color:#4d4a42;
      font-weight:1000;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="gameMount"></div>

    <div class="boot-shell" aria-hidden="true">
      <div class="boot-card">
        <div class="boot-kicker">🍎 GOODJUNK • HEROHEALTH</div>
        <h1 class="boot-title">Food Hero Mission</h1>
        <p class="boot-sub">
          เก็บอาหารดีให้มากที่สุด หลีกเลี่ยง junk food
          แล้วไปช่วยปราบ <strong>Junk King</strong> กันเลย
        </p>
        <div class="boot-meta">
          <div class="boot-pill">MODE <strong id="bootMode">solo</strong></div>
          <div class="boot-pill">DIFF <strong id="bootDiff">normal</strong></div>
          <div class="boot-pill">TIME <strong id="bootTime">150</strong></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function(){
      const q = new URLSearchParams(location.search);

      window.HHA_CLOUD_ENDPOINT =
        String(
          q.get('api') ||
          window.HHA_CLOUD_ENDPOINT ||
          'https://script.google.com/macros/s/AKfycbwNOpsjFTV_nK0PzNV23KziF5hZxIMI50P8o_vZgwVg_T4anpXZOaKQUy_uf5PPg9kT6Q/exec'
        ).trim();

      const runCtx = {
        pid: q.get('pid') || 'anon',
        name: q.get('name') || '',
        studyId: q.get('studyId') || '',
        roomId: '',
        mode: 'solo',
        diff: q.get('diff') || 'normal',
        time: q.get('time') || '150',
        seed: q.get('seed') || '',
        startAt: 0,
        hub: new URL('../hub.html', location.href).toString(),
        view: q.get('view') || 'mobile',
        run: q.get('run') || 'play',
        gameId: q.get('gameId') || 'goodjunk'
      };

      window.__GJ_RUN_CTX__ = runCtx;

      const modeEl = document.getElementById('bootMode');
      const diffEl = document.getElementById('bootDiff');
      const timeEl = document.getElementById('bootTime');

      if (modeEl) modeEl.textContent = runCtx.mode || 'solo';
      if (diffEl) diffEl.textContent = runCtx.diff || 'normal';
      if (timeEl) timeEl.textContent = runCtx.time || '150';

      console.log('[GJ-SOLO-ENTRY] goodjunk-vr.html loaded', runCtx);
      console.log('[GJ-SOLO-ENTRY] cloud endpoint =', window.HHA_CLOUD_ENDPOINT);
    })();
  </script>

  <script src="../js/hha-cloud-logger.js?v=20260326-client-v3"></script>
  <script type="module" src="./goodjunk.safe.phaseboss.js?v=20260326-goodjunk-solo-themepack-v4"></script>
</body>
</html>
