<!-- === /herohealth/vr-goodjunk/goodjunk-vr.html ===
GoodJunkVR RUN — PRODUCTION (ESM)
PATCH v20260304-RUN-SPAWNSAFE-AI-LOADSAFE
- ✅ Uses correct filename goodjunk-vr.html
- ✅ Computes spawn-safe area to avoid HUD/VR-UI blocking targets
- ✅ Dynamic import AI (../vr/ai-goodjunk.js) if ?ai=1 AND run=play
- ✅ Works even if AI module missing (no crash)
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk VR</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="../favicon.ico" />

  <!-- CSS -->
  <link rel="stylesheet" href="./goodjunk-vr.css?v=20260304" />
</head>
<body>
  <div id="app">
    <div id="bootSplash" aria-hidden="false">Loading GoodJunk...</div>

    <!-- Debug pills (optional) -->
    <div id="debugPills" aria-hidden="true">
      <span class="pill">view=<b id="uiView">—</b></span>
      <span class="pill">run=<b id="uiRun">—</b></span>
      <span class="pill">diff=<b id="uiDiff">—</b></span>
    </div>

    <!-- Top HUD -->
    <header id="hud">
      <div class="hud-row">
        <div class="pill">SCORE <b id="hud-score">0</b></div>
        <div class="pill">TIME <b id="hud-time">0</b></div>
        <div class="pill">MISS <b id="hud-miss">0</b></div>
        <div class="pill">GRADE <b id="hud-grade">C</b></div>
      </div>

      <div class="hud-row">
        <div class="pill pill-soft">
          GOAL <b id="hud-goal">Daily</b>:
          <span><b id="hud-goal-cur">0</b>/<b id="hud-goal-target">20</b></span>
          <span id="goalDesc" class="mut">Hit GOOD 20</span>
        </div>
        <div class="pill pill-soft">
          MINI <b id="hud-mini">—</b>
          <span class="mut">⏱ <b id="miniTimer">—</b></span>
        </div>
      </div>

      <!-- AI HUD -->
      <div class="hud-row">
        <div class="pill pill-ai">
          AI Risk <b id="aiRisk">—</b>
          <span class="mut">next: <b id="aiHint">—</b></span>
        </div>
      </div>

      <!-- Fever + Shield + Boss -->
      <div class="hud-row hud-bars">
        <div class="barCard">
          <div class="barTop">
            <span class="mut">FEVER</span>
            <b id="feverText">0%</b>
          </div>
          <div class="bar">
            <div class="barFill" id="feverFill" style="width:0%"></div>
          </div>
        </div>

        <div class="barCard">
          <div class="barTop">
            <span class="mut">SHIELD</span>
            <b id="shieldPills">—</b>
          </div>
        </div>

        <div class="barCard boss" id="bossBar" aria-hidden="true">
          <div class="barTop">
            <span class="mut">BOSS</span>
            <b id="bossHint">—</b>
          </div>
          <div class="bar">
            <div class="barFill bossFill" id="bossFill" style="width:0%"></div>
          </div>
        </div>
      </div>

      <div class="gj-progress" aria-hidden="false">
        <div class="gj-progress-track">
          <div class="gj-progress-fill" id="gjProgressFill" style="width:0%"></div>
        </div>
      </div>
    </header>

    <!-- Playfield -->
    <main id="stage" aria-label="GoodJunk Stage">
      <div id="gj-layer" aria-label="targets"></div>
    </main>

    <!-- Low time overlay -->
    <div id="lowTimeOverlay" aria-hidden="true">
      <div class="lowTimeCard">
        <div class="mut">TIME</div>
        <div class="lowTimeNum" id="gj-lowtime-num">5</div>
      </div>
    </div>

    <!-- End overlay -->
    <div id="endOverlay" aria-hidden="true">
      <div class="panel">
        <div class="endTitle" id="endTitle">Game Over</div>
        <div class="endSub" id="endSub">—</div>

        <div class="endGrid">
          <div class="endStat"><span>GRADE</span><b id="endGrade">—</b></div>
          <div class="endStat"><span>SCORE</span><b id="endScore">0</b></div>
          <div class="endStat"><span>MISS</span><b id="endMiss">0</b></div>
          <div class="endStat"><span>TIME</span><b id="endTime">0</b></div>
        </div>

        <div class="endActions">
          <button class="btn" id="btnRetry" type="button">เล่นอีกครั้ง</button>
          <button class="btn primary" id="btnHub" type="button">กลับ HUB</button>
        </div>
        <!-- Cooldown button will be injected here by JS -->
      </div>
    </div>

  </div>

  <script type="module">
    const qs = (k, d='')=>{ try{ return (new URL(location.href)).searchParams.get(k) ?? d; }catch(e){ return d; } };

    // ---- Spawn-safe computation (avoid HUD + bottom VR UI / coach)
    function setSpawnSafe(){
      const layer = document.getElementById('gj-layer');
      const hud = document.getElementById('hud');
      const stage = document.getElementById('stage');
      if(!layer || !stage) return;

      const lr = layer.getBoundingClientRect();
      const sr = stage.getBoundingClientRect();
      const hr = hud ? hud.getBoundingClientRect() : { bottom: sr.top };

      // Top reserved = HUD bottom + gap
      const top = Math.max(sr.top, hr.bottom) + 12;

      // Bottom reserved = safe-area + estimated VR UI bar + coach
      const safeBottom = (window.visualViewport ? (window.innerHeight - (visualViewport.height + visualViewport.offsetTop)) : 0) || 0;
      const bottomReserve = 110 + safeBottom; // VR buttons + coach space

      const left = sr.left + 12;
      const right = sr.right - 12;
      const bottom = sr.bottom - bottomReserve;

      // store in page coords (same as getBoundingClientRect space)
      window.__HHA_SPAWN_SAFE__ = {
        xMin: left,
        xMax: right,
        yMin: top,
        yMax: bottom
      };
    }

    // call on load + resize
    const ro = new ResizeObserver(()=> setSpawnSafe());
    ro.observe(document.body);
    window.addEventListener('resize', setSpawnSafe);
    window.addEventListener('orientationchange', ()=> setTimeout(setSpawnSafe, 250));
    if(window.visualViewport){
      visualViewport.addEventListener('resize', setSpawnSafe);
      visualViewport.addEventListener('scroll', setSpawnSafe);
    }

    // Buttons
    const btnRetry = document.getElementById('btnRetry');
    const btnHub = document.getElementById('btnHub');
    btnRetry?.addEventListener('click', ()=>{
      const u = new URL(location.href);
      u.searchParams.set('seed', String(Date.now()));
      location.href = u.toString();
    });

    // sanitize HUB: always prefer /herohealth/hub.html
    function sanitizeHub(h){
      try{
        const u = new URL(h, location.href);
        // if someone passes /vr-goodjunk/hub.html by mistake -> fix to /herohealth/hub.html
        if(u.pathname.includes('/vr-goodjunk/')) u.pathname = u.pathname.replace('/vr-goodjunk/','/herohealth/');
        if(!u.pathname.endsWith('/hub.html')) u.pathname = u.pathname.replace(/\/[^\/]*$/, '/hub.html');
        return u.toString();
      }catch(e){
        return '../hub.html';
      }
    }

    // Build cfg from URL params (pass-through)
    const cfg = {
      view: qs('view','mobile'),
      run: qs('run','play'),
      diff: qs('diff','normal'),
      time: Number(qs('time','80')) || 80,
      seed: qs('seed', String(Date.now())),
      pid: qs('pid','anon'),
      hub: sanitizeHub(qs('hub','../hub.html')),
      ai: null
    };

    btnHub?.addEventListener('click', ()=> location.href = (cfg.hub || '../hub.html'));

    // show debug pills if ?debug=1
    const debugOn = (qs('debug','0') === '1');
    document.getElementById('debugPills')?.setAttribute('aria-hidden', debugOn ? 'false' : 'true');

    // ✅ AI enabled only when ?ai=1 AND run=play
    const aiOn = (qs('ai','0') === '1') && (String(cfg.run).toLowerCase() === 'play');
    if(aiOn){
      try{
        // dynamic import: missing file won't crash
        const mod = await import('../vr/ai-goodjunk.js');
        const createGoodJunkAI = mod?.createGoodJunkAI;
        if(typeof createGoodJunkAI === 'function'){
          cfg.ai = createGoodJunkAI({
            seed: cfg.seed,
            pid: cfg.pid,
            diff: cfg.diff,
            view: cfg.view
          });
        }
      }catch(e){
        console.warn('[GoodJunk] AI module load failed (ok)', e);
      }
    }

    // Compute spawn-safe before boot
    setSpawnSafe();

    // Boot game
    const splash = document.getElementById('bootSplash');
    try{
      const { boot } = await import('./goodjunk.safe.js');
      splash?.setAttribute('aria-hidden','true');
      splash && (splash.style.display='none');
      boot(cfg);
    }catch(e){
      console.error('[GoodJunk] boot failed', e);
      if(splash) splash.textContent = 'Boot failed (check console)';
    }
  </script>
</body>
</html>
