<!-- === /herohealth/vr-goodjunk/goodjunk-vr.html ===
GoodJunkVR — RUN PAGE (Solo + Multiplayer Host Authority)
FULL v20260302-GJ-RUN-MULTI-PANEL
Requires:
- ./goodjunk.safe.js  (your existing game)
- ./multi-room.js     (this patch)
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth — GoodJunk VR (Run)</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="../favicon.ico" type="image/x-icon" />
  <style>
    :root{
      --sat: env(safe-area-inset-top, 0px);
      --sar: env(safe-area-inset-right, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
      --panel: rgba(2,6,23,.72);
      --panel2: rgba(15,23,42,.55);
      --stroke: rgba(148,163,184,.28);
      --text: #e8eefc;
      --mut: rgba(232,238,252,.76);
    }
    html,body{ height:100%; margin:0; background:#020617; color:var(--text); font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; }
    #app{ position:fixed; inset:0; overflow:hidden; }

    /* Multiplayer panel */
    #multiPanel{
      position:fixed;
      top: calc(10px + var(--sat));
      left: calc(10px + var(--sal));
      z-index: 9999;
      background: var(--panel);
      border:1px solid var(--stroke);
      border-radius: 14px;
      padding: 10px 10px;
      max-width: 340px;
      backdrop-filter: blur(8px);
    }
    #multiPanel .mut{ color:var(--mut); font-size:12px; }
    #multiPanel .title{ font-weight:900; font-size:13px; }
    #multiPanel .row{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top:6px; }
    #multiPanel button{
      border:1px solid var(--stroke);
      background: var(--panel2);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 12px;
      font-weight: 900;
      cursor:pointer;
    }
    #multiPanel .list{
      font-size:12px; line-height:1.35; max-height:120px; overflow:auto;
      padding:6px 8px; border:1px solid var(--stroke); border-radius: 12px;
      background: rgba(2,6,23,.45);
      margin-top:6px;
    }
    #multiPanel .top3{
      font-size:12px; line-height:1.35; max-height:78px; overflow:auto;
      padding:6px 8px; border:1px solid var(--stroke); border-radius: 12px;
      background: rgba(2,6,23,.45);
      margin-top:6px;
    }

    /* Minimal stage placeholder — your game will render itself as usual */
    #stage{
      position:absolute; inset:0;
      display:grid; place-items:center;
      color: rgba(232,238,252,.65);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="stage">Loading GoodJunk…</div>

    <div id="multiPanel" style="display:none">
      <div class="title">Room: <span id="mpRoom">-</span></div>
      <div class="mut">You: <span id="mpNick">-</span> • <span id="mpRole">guest</span></div>

      <div class="mut" style="margin-top:6px">Players (<span id="mpCount">0</span>)</div>
      <div id="mpList" class="list">-</div>

      <div class="mut" style="margin-top:6px">Top 3</div>
      <div id="mpTop3" class="top3">-</div>

      <div id="hostControls" class="row" style="display:none">
        <button id="btnStartRoom">START</button>
        <button id="btnEndRoom">END</button>
        <button id="btnFinalize">FINAL</button>
      </div>

      <div class="mut" style="margin-top:6px">Tip: Host จะ “กด START” แล้วทุกคนเริ่มพร้อมกัน</div>
    </div>
  </div>

<script type="module">
  import { boot } from './goodjunk.safe.js';
  import { createRoomBus } from './multi-room.js';

  const qs = (k,d='')=>{ try{ return (new URL(location.href)).searchParams.get(k) ?? d; }catch(e){ return d; } };
  const $  = (id)=>document.getElementById(id);
  const setText=(id,v)=>{ const el=$(id); if(el) el.textContent=String(v); };
  const setHtml=(id,v)=>{ const el=$(id); if(el) el.innerHTML=String(v); };

  const roomId = String(qs('room','')).trim();
  const nick = String(qs('nick','Player')).trim().slice(0,20) || 'Player';

  let bus = null;

  // scoreboard cache for UI/top3/final
  const scores = {}; // pid -> {score, misses, combo, good, junk}

  function renderTop3(){
    const st = bus?.state?.() || {};
    const players = st.players || {};
    const arr = Object.keys(players).map(pid => {
      const s = scores[pid] || {score:0, misses:0};
      return { pid, nick: players[pid]?.nick || pid, score:(s.score|0)||0, misses:(s.misses|0)||0 };
    });
    arr.sort((a,b)=> (b.score-a.score) || (a.misses-b.misses) || String(a.nick).localeCompare(String(b.nick)));
    const top = arr.slice(0,3).map((p,i)=> `${i+1}) ${p.nick} — ${p.score}`).join('<br/>');
    setHtml('mpTop3', top || '-');
  }

  function buildFinalBoard(){
    const st = bus?.state?.() || {};
    const players = st.players || {};
    const arr = Object.keys(players).map(pid => {
      const s = scores[pid] || {score:0, misses:0};
      return { playerId: pid, nick: players[pid]?.nick || pid, score:(s.score|0)||0, misses:(s.misses|0)||0 };
    });
    arr.sort((a,b)=> (b.score-a.score) || (a.misses-b.misses) || String(a.nick).localeCompare(String(b.nick)));
    return arr;
  }

  if(roomId){
    // show panel
    $('multiPanel').style.display = 'block';
    setText('mpRoom', roomId);
    setText('mpNick', nick);

    // Supabase config (either set in query or hardcode)
    const SB_URL  = qs('sbUrl','');   // REQUIRED
    const SB_ANON = qs('sbAnon','');  // REQUIRED

    if(!SB_URL || !SB_ANON){
      setText('stage', '❌ Missing sbUrl/sbAnon in URL. Go back to goodjunk-multi.html and add them.');
      throw new Error('Missing sbUrl/sbAnon');
    }

    bus = createRoomBus({
      roomId,
      nick,
      playerId: qs('pid',''),  // reuse HHA pid if present
      forceHost: qs('host','0') === '1',
      supabaseUrl: SB_URL,
      supabaseAnon: SB_ANON,
      maxPlayers: 10
    });

    bus.on('onPresence', (st)=>{
      const count = Object.keys(st.players||{}).length;
      setText('mpCount', count);
      setText('mpRole', st.isHost ? 'HOST' : 'guest');
      $('hostControls').style.display = st.isHost ? 'flex' : 'none';

      const rows = Object.values(st.players||{})
        .sort((a,b)=> String(a.playerId).localeCompare(String(b.playerId)))
        .map(p => `• ${p.nick}${p.playerId===st.hostId?' (host)':''}`)
        .join('<br/>');
      setHtml('mpList', rows || '-');

      renderTop3();
    });

    bus.on('onMsg', (m)=>{
      // update UI score cache
      if(m.t === 'score' && m.by){
        scores[m.by] = {
          score: (m.score|0)||0,
          combo: (m.combo|0)||0,
          misses:(m.misses|0)||0,
          good:  (m.good|0)||0,
          junk:  (m.junk|0)||0
        };
        renderTop3();
      }

      // forward ALL messages to the game
      window.dispatchEvent(new CustomEvent('gj:net', { detail: m }));
    });

    await bus.connect();

    // Host controls
    $('btnStartRoom').addEventListener('click', ()=>{
      const seed = String(Date.now());
      bus.hostStartRound({
        seed,
        diff: qs('diff','normal'),
        time: Number(qs('time','80'))||80,
        mode:'race',
        gameVersion:'v20260302'
      });
    });

    $('btnEndRoom').addEventListener('click', ()=>{
      bus.hostEndRound('host');
    });

    $('btnFinalize').addEventListener('click', ()=>{
      const board = buildFinalBoard();
      bus.hostFinalBoard(board);
    });

  }else{
    // solo
    $('multiPanel').style.display = 'none';
  }

  // Boot the existing game
  boot({
    multi: bus ? {
      enabled: true,
      roomId,
      bus,
      // optional hooks (you can ignore)
      onStart: ({seed}) => { /* game can start spawner after this */ },
      onConfirm: (x) => { /* observe confirm */ },
      onEnd: () => {}
    } : { enabled:false }
  });
</script>
</body>
</html>
