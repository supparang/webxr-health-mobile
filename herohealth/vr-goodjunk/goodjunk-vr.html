<!-- === /herohealth/vr-goodjunk/goodjunk-vr.html ===
GoodJunkVR — RUN PAGE (PC/Mobile/cVR) — PRODUCTION
PATCH v20260305a-RUN-LAYERFULL-SAFERECT-NOBLACK
Requires:
 - ./goodjunk.safe.js
Optional:
 - ../vr/vr-ui.js (if you want ENTER VR/RECENTER + hha:shoot)
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth — GoodJunkVR</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="../favicon.ico" />
  <style>
    :root{
      --bg1:#020617; --bg2:#0b1226;
      --panel:rgba(2,6,23,.72);
      --stroke:rgba(148,163,184,.18);
      --text:rgba(229,231,235,.96);
      --muted:rgba(148,163,184,.92);
      --good:#22c55e; --warn:#f59e0b; --bad:#ef4444; --cyan:#22d3ee;
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
      --sar: env(safe-area-inset-right, 0px);
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; }
    body{
      background:
        radial-gradient(1200px 700px at 20% 12%, rgba(34,197,94,.14), transparent 55%),
        radial-gradient(1000px 600px at 85% 18%, rgba(34,211,238,.12), transparent 55%),
        radial-gradient(900px 520px at 55% 88%, rgba(167,139,250,.12), transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans Thai", "Noto Sans", Arial;
      overflow:hidden;
      touch-action: manipulation;
    }

    /* ✅ FIX: layer must be full screen & stable rect */
    #gj-layer{
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 10;
    }

    /* targets */
    .tgt{
      position:absolute;
      display:grid;
      place-items:center;
      width:64px; height:64px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(2,6,23,.22);
      box-shadow: 0 18px 60px rgba(0,0,0,.40);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      user-select:none;
      cursor:pointer;
      transform: translate(-50%,-50%);
      will-change: transform, opacity;
    }
    .tgt:active{ transform: translate(-50%,-50%) scale(.98); }
    .tgt .emo{ font-size: 30px; line-height:1; filter: drop-shadow(0 10px 18px rgba(0,0,0,.35)); }
    .tgt .ring{
      position:absolute; inset:-8px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,.12);
      opacity:.55;
    }

    /* HUD */
    .hud{
      position: fixed;
      left: calc(10px + var(--sal));
      right: calc(10px + var(--sar));
      top: calc(10px + var(--sat));
      z-index: 200;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      pointer-events:none;
    }
    .pill{
      pointer-events:none;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background: rgba(2,6,23,.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      font-weight: 1000;
      font-size: 13px;
      box-shadow: 0 18px 55px rgba(0,0,0,.35);
      white-space:nowrap;
    }
    .pill small{ font-weight:900; color: var(--muted); }
    .pill b{ font-weight:1100; }

    /* Mission panel */
    .mission{
      position: fixed;
      left: calc(10px + var(--sal));
      right: calc(10px + var(--sar));
      top: calc(64px + var(--sat));
      z-index: 190;
      pointer-events:none;
      display:flex;
      justify-content:center;
    }
    .mission .box{
      max-width: 860px;
      width: 100%;
      border:1px solid rgba(148,163,184,.18);
      background: rgba(2,6,23,.62);
      border-radius: 18px;
      padding: 12px 12px;
      box-shadow: 0 22px 80px rgba(0,0,0,.45);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .mission h3{ margin:0 0 4px 0; font-size: 14px; letter-spacing:.2px; }
    .mission p{ margin:0; color: var(--muted); font-weight: 900; font-size: 12px; line-height:1.35; }
    .bar{
      height: 10px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.35);
      overflow:hidden;
      margin-top: 10px;
    }
    .bar > div{
      height:100%;
      width:0%;
      background: rgba(34,211,238,.85);
      transition: width .12s ease;
    }

    /* End overlay */
    #endOverlay{
      position: fixed;
      inset: 0;
      z-index: 500;
      display:none;
      align-items:center;
      justify-content:center;
      padding: 18px;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    #endOverlay.show{ display:flex; }
    #endOverlay .panel{
      width:min(760px, 96vw);
      border:1px solid rgba(148,163,184,.18);
      background: rgba(2,6,23,.82);
      border-radius: 22px;
      padding: 14px 14px;
      box-shadow: 0 24px 90px rgba(0,0,0,.55);
      text-align:center;
    }
    #endOverlay h2{ margin:0; font-size: 20px; letter-spacing:.2px; }
    #endOverlay .sub{ margin:8px 0 0 0; color: var(--muted); font-weight: 900; }
    #endOverlay .row{
      margin-top: 10px;
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      font-weight:1000;
    }
    #endOverlay .kv{
      border:1px solid rgba(148,163,184,.16);
      background: rgba(255,255,255,.06);
      border-radius: 14px;
      padding: 8px 10px;
      min-width: 140px;
    }
    #endOverlay .btnrow{
      margin-top: 12px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }
    .btn{
      pointer-events:auto;
      cursor:pointer;
      border-radius: 16px;
      border:1px solid rgba(148,163,184,.20);
      background: rgba(148,163,184,.08);
      color: var(--text);
      font-weight: 1100;
      padding: 12px 12px;
      min-height: 44px;
      min-width: 200px;
    }
    .btn.primary{
      border-color: rgba(34,197,94,.28);
      background: rgba(34,197,94,.14);
    }
    .btn.ghost{
      color: var(--muted);
      background: transparent;
    }
  </style>
</head>
<body>

  <div id="gj-layer" aria-label="GoodJunk layer"></div>

  <div class="hud" id="hud">
    <div class="pill">Score <b id="hud-score">0</b></div>
    <div class="pill">Time <b id="hud-time">0</b></div>
    <div class="pill">Miss <b id="hud-miss">0</b></div>
    <div class="pill">Grade <b id="hud-grade">C</b></div>
    <div class="pill"><small>Goal</small> <span id="hud-goal">—</span></div>
    <div class="pill"><small>Goal</small> <b id="hud-goal-cur">0</b>/<b id="hud-goal-target">0</b></div>
    <div class="pill"><small>Mini</small> <span id="hud-mini">—</span> <b id="miniTimer">0</b></div>
    <div class="pill"><small>AI</small> risk <b id="aiRisk">0.00</b> • <span id="aiHint">—</span></div>

    <div class="pill" style="margin-left:auto;">
      <small>view</small> <span id="uiView">—</span> •
      <small>run</small> <span id="uiRun">—</span> •
      <small>diff</small> <span id="uiDiff">—</span>
    </div>
  </div>

  <div class="mission" aria-label="mission panel">
    <div class="box">
      <h3 id="missionTitle">WARM-UP</h3>
      <p id="missionGoal">เก็บของดีให้ครบ</p>
      <p id="missionHint">โฟกัสของดี (+) คอมโบ</p>
      <p id="goalDesc">เป้าหมาย: score ≥ 520 และ good ≥ 32</p>
      <div class="bar"><div id="missionFill"></div></div>
    </div>
  </div>

  <div id="endOverlay">
    <div class="panel">
      <h2 id="endTitle">จบเกม</h2>
      <p class="sub" id="endSub">—</p>
      <div class="row">
        <div class="kv">Grade<br><b id="endGrade">—</b></div>
        <div class="kv">Score<br><b id="endScore">0</b></div>
        <div class="kv">Miss<br><b id="endMiss">0</b></div>
        <div class="kv">Time<br><b id="endTime">0</b></div>
      </div>
      <div class="btnrow">
        <button class="btn primary" id="btnRetry">🔁 เล่นอีกครั้ง</button>
        <button class="btn ghost" id="btnHub">↩ กลับ Hub</button>
      </div>
      <!-- cooldown button will be injected by core if needed -->
    </div>
  </div>

  <script type="module">
    import { boot } from './goodjunk.safe.js';

    // run the game
    boot({
      view: new URL(location.href).searchParams.get('view') || 'mobile',
      run:  new URL(location.href).searchParams.get('run')  || 'play',
      diff: new URL(location.href).searchParams.get('diff') || 'normal',
      time: new URL(location.href).searchParams.get('time') || '80',
      seed: new URL(location.href).searchParams.get('seed') || String(Date.now()),
      pid:  new URL(location.href).searchParams.get('pid')  || 'anon',
      hub:  new URL(location.href).searchParams.get('hub')  || '../hub.html',
    });

    // buttons
    const qs = (k,d='')=>{ try{ return new URL(location.href).searchParams.get(k) ?? d; }catch(e){ return d; } };
    const btnRetry = document.getElementById('btnRetry');
    const btnHub = document.getElementById('btnHub');
    btnRetry?.addEventListener('click', ()=>{
      const u = new URL(location.href);
      u.searchParams.set('seed', String(Date.now()));
      location.href = u.toString();
    });
    btnHub?.addEventListener('click', ()=>{
      const hub = qs('hub','../hub.html');
      location.href = hub;
    });

    // optional: if vr-ui exists, you can include it in your run page later
  </script>
</body>
</html>
