<!-- === /herohealth/vr-goodjunk/goodjunk-vr.html ===
GoodJunkVR RUN — PRODUCTION (works with goodjunk.safe.js ESM)
✅ FIX 404 CSS + cache bust
✅ VR UI: ../vr/vr-ui.js (ENTER VR/EXIT/RECENTER + crosshair + hha:shoot)
✅ Battle UI: ../vr/battle-ui.auto.js (optional, only when ?battle=1)
✅ AI dynamic import (optional, only when ?ai=1 AND run=play)
✅ End overlay: adds 🏆 Leaderboard button (pass-through params)
✅ Stores local leaderboard to localStorage (for offline + quick testing)
PATCH v20260301-RUN-NAMEFIX-VRUI-BATTLEUI-LB
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk VR</title>
  <meta name="color-scheme" content="dark light" />

  <link rel="icon" href="../favicon.ico" />
  <link rel="stylesheet" href="./goodjunk-vr.css?v=20260301" />
</head>
<body>
  <div id="app">

    <!-- Debug pills (optional) -->
    <div id="debugPills" aria-hidden="true">
      <span class="pill">view=<b id="uiView">—</b></span>
      <span class="pill">run=<b id="uiRun">—</b></span>
      <span class="pill">diff=<b id="uiDiff">—</b></span>
    </div>

    <!-- Top HUD -->
    <header id="hud">
      <div class="hud-row">
        <div class="pill">SCORE <b id="hud-score">0</b></div>
        <div class="pill">TIME <b id="hud-time">0</b></div>
        <div class="pill">MISS <b id="hud-miss">0</b></div>
        <div class="pill">GRADE <b id="hud-grade">C</b></div>
      </div>

      <div class="hud-row">
        <div class="pill pill-soft">
          GOAL <b id="hud-goal">Daily</b>:
          <span><b id="hud-goal-cur">0</b>/<b id="hud-goal-target">20</b></span>
          <span id="goalDesc" class="mut">Hit GOOD 20</span>
        </div>
        <div class="pill pill-soft">
          MINI <b id="hud-mini">—</b>
          <span class="mut">⏱ <b id="miniTimer">—</b></span>
        </div>
      </div>

      <!-- AI HUD -->
      <div class="hud-row">
        <div class="pill pill-ai">
          AI Risk <b id="aiRisk">—</b>
          <span class="mut">next: <b id="aiHint">—</b></span>
        </div>
      </div>

      <!-- Fever + Shield + Boss -->
      <div class="hud-row hud-bars">
        <div class="barCard">
          <div class="barTop">
            <span class="mut">FEVER</span>
            <b id="feverText">0%</b>
          </div>
          <div class="bar">
            <div class="barFill" id="feverFill" style="width:0%"></div>
          </div>
        </div>

        <div class="barCard">
          <div class="barTop">
            <span class="mut">SHIELD</span>
            <b id="shieldPills">—</b>
          </div>
        </div>

        <div class="barCard boss" id="bossBar" aria-hidden="true">
          <div class="barTop">
            <span class="mut">BOSS</span>
            <b id="bossHint">—</b>
          </div>
          <div class="bar">
            <div class="barFill bossFill" id="bossFill" style="width:0%"></div>
          </div>
        </div>
      </div>

      <div class="gj-progress" aria-hidden="false">
        <div class="gj-progress-track">
          <div class="gj-progress-fill" id="gjProgressFill" style="width:0%"></div>
        </div>
      </div>
    </header>

    <!-- Playfield -->
    <main id="stage" aria-label="GoodJunk Stage">
      <div id="gj-layer" aria-label="targets"></div>
    </main>

    <!-- Low time overlay -->
    <div id="lowTimeOverlay" aria-hidden="true">
      <div class="lowTimeCard">
        <div class="mut">TIME</div>
        <div class="lowTimeNum" id="gj-lowtime-num">5</div>
      </div>
    </div>

    <!-- End overlay -->
    <div id="endOverlay" aria-hidden="true">
      <div class="panel">
        <div class="endTitle" id="endTitle">Game Over</div>
        <div class="endSub" id="endSub">—</div>

        <div class="endGrid">
          <div class="endStat"><span>GRADE</span><b id="endGrade">—</b></div>
          <div class="endStat"><span>SCORE</span><b id="endScore">0</b></div>
          <div class="endStat"><span>MISS</span><b id="endMiss">0</b></div>
          <div class="endStat"><span>TIME</span><b id="endTime">0</b></div>
        </div>

        <div class="endActions">
          <button class="btn" id="btnRetry" type="button">เล่นอีกครั้ง</button>
          <button class="btn primary" id="btnHub" type="button">กลับ HUB</button>
          <button class="btn" id="btnLB" type="button">🏆 Leaderboard</button>
        </div>

        <!-- Cooldown button will be injected here by JS (in goodjunk.safe.js) -->
      </div>
    </div>

  </div>

  <!-- ✅ Universal VR UI (ENTER VR/EXIT/RECENTER + crosshair + tap-to-shoot => hha:shoot) -->
  <script type="module" src="../vr/vr-ui.js"></script>

  <!-- ✅ Battle UI auto (ONLY does anything when ?battle=1) -->
  <script type="module" src="../vr/battle-ui.auto.js"></script>

  <script type="module">
    import { boot } from './goodjunk.safe.js';

    const qs = (k, d='')=>{ try{ return (new URL(location.href)).searchParams.get(k) ?? d; }catch(e){ return d; } };

    // Build cfg from URL params (pass-through)
    const cfg = {
      view: qs('view','mobile'),
      run: qs('run','play'),
      diff: qs('diff','normal'),
      time: Number(qs('time','80')) || 80,
      seed: qs('seed', String(Date.now())),
      pid: qs('pid','anon'),
      hub: qs('hub','../hub.html'),
      ai: null
    };

    // Debug pills visibility (optional: ?debug=1)
    try{
      const dbgOn = (qs('debug','0') === '1');
      const dbg = document.getElementById('debugPills');
      if(dbg) dbg.setAttribute('aria-hidden', dbgOn ? 'false' : 'true');
    }catch(e){}

    // ✅ AI enabled only when ?ai=1 AND run=play
    const aiOn = (qs('ai','0') === '1') && (String(cfg.run).toLowerCase() === 'play');
    if(aiOn){
      try{
        const mod = await import('../vr/ai-goodjunk.js');
        const createGoodJunkAI = mod.createGoodJunkAI;
        if(typeof createGoodJunkAI === 'function'){
          cfg.ai = createGoodJunkAI({
            seed: cfg.seed,
            pid: cfg.pid,
            diff: cfg.diff,
            view: cfg.view
          });
        }
      }catch(e){
        console.warn('[GoodJunk] AI module load failed', e);
      }
    }

    // --- Local leaderboard store (offline-friendly) ---
    const LB_KEY = 'HHA_LB:goodjunk';
    const LB_MAX = 50;

    function safeJsonParse(s, dflt){
      try{ return JSON.parse(s); }catch(e){ return dflt; }
    }
    function lsGet(k, dflt=null){
      try{ const v = localStorage.getItem(k); return v==null?dflt:v; }catch(e){ return dflt; }
    }
    function lsSet(k, v){
      try{ localStorage.setItem(k, v); }catch(e){}
    }
    function pushLocalLB(summary){
      if(!summary) return;
      const row = {
        ts: Date.now(),
        game: 'goodjunk',
        pid: String(summary.pid || cfg.pid || 'anon'),
        diff: String(summary.diff || cfg.diff || 'normal'),
        run:  String(summary.runMode || cfg.run || 'play'),
        view: String(summary.device || cfg.view || 'mobile'),
        score: Number(summary.scoreFinal || 0) || 0,
        miss: Number(summary.missTotal || 0) || 0,
        accPct: Number(summary.accPct || 0) || 0,
        medianRtGoodMs: Number(summary.medianRtGoodMs || 0) || 0,
        seed: String(summary.seed || cfg.seed || ''),
        grade: String(summary.grade || ''),
      };
      const arr = safeJsonParse(lsGet(LB_KEY, '[]'), []);
      arr.unshift(row);
      while(arr.length > LB_MAX) arr.pop();
      lsSet(LB_KEY, JSON.stringify(arr));
    }

    // Listen end summary once
    window.addEventListener('hha:game-ended', (ev)=>{
      try{ pushLocalLB(ev.detail); }catch(e){}
    }, { passive:true });

    // Leaderboard URL builder
    function buildLeaderboardUrl(){
      try{
        const u = new URL('../vr/leaderboard-view.html', location.href);
        u.searchParams.set('game', 'goodjunk');
        u.searchParams.set('diff', cfg.diff || 'normal');
        u.searchParams.set('run',  cfg.run  || 'play');
        u.searchParams.set('hub', cfg.hub || '../hub.html');

        const sp = new URL(location.href).searchParams;
        [
          'pid','view','time','seed','studyId','phase','conditionGroup','log',
          'battle','room','autostart','forfeit'
        ].forEach(k=>{
          const v = sp.get(k);
          if(v!=null && v!=='') u.searchParams.set(k, v);
        });
        return u.toString();
      }catch(e){
        return '';
      }
    }

    // Buttons
    const btnRetry = document.getElementById('btnRetry');
    const btnHub = document.getElementById('btnHub');
    const btnLB = document.getElementById('btnLB');

    btnRetry?.addEventListener('click', ()=>{
      const u = new URL(location.href);
      u.searchParams.set('seed', String(Date.now()));
      location.href = u.toString();
    });

    btnHub?.addEventListener('click', ()=>{
      const hub = cfg.hub || '../hub.html';
      location.href = hub;
    });

    btnLB?.addEventListener('click', ()=>{
      const url = buildLeaderboardUrl();
      if(url) location.href = url;
      else console.warn('[GoodJunk] leaderboard url build failed');
    });

    // Boot
    boot(cfg);
  </script>
</body>
</html>
