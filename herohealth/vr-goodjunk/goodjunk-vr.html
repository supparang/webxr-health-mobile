<!-- === /herohealth/vr-goodjunk/goodjunk-vr.html ===
GoodJunkVR RUN — PRODUCTION (folder-run)
PATCH v20260304-RUN-PRO-3STAGE-AICOACH
✅ Difficulty switch: easy / normal / hard
✅ PRO switch: ?pro=1 (UI + URL param)
✅ Stage HUD: Warm → Trick → Boss + progress
✅ Spawn-safe compute -> window.__HHA_SPAWN_SAFE__
✅ AI dynamic import: ?ai=1 (run=play only)
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk VR</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="../favicon.ico" />
  <link rel="stylesheet" href="./goodjunk-vr.css?v=20260304" />
</head>

<body>
  <div id="app">

    <!-- Debug pills (optional) -->
    <div id="debugPills" aria-hidden="true">
      <span class="pill">view=<b id="uiView">—</b></span>
      <span class="pill">run=<b id="uiRun">—</b></span>
      <span class="pill">diff=<b id="uiDiff">—</b></span>
      <span class="pill">pro=<b id="uiPro">—</b></span>
    </div>

    <!-- Top HUD -->
    <header id="hud">
      <div class="hud-row hud-top">
        <div class="pill">SCORE <b id="hud-score">0</b></div>
        <div class="pill">TIME <b id="hud-time">0</b></div>
        <div class="pill">MISS <b id="hud-miss">0</b></div>
        <div class="pill">GRADE <b id="hud-grade">C</b></div>

        <div class="diffSwitch" role="group" aria-label="Difficulty">
          <button type="button" class="diffBtn" data-diff="easy">EASY</button>
          <button type="button" class="diffBtn" data-diff="normal">NORMAL</button>
          <button type="button" class="diffBtn" data-diff="hard">HARD</button>
        </div>

        <div class="proSwitch" role="group" aria-label="Pro Mode">
          <button type="button" class="proBtn" id="proBtn" aria-pressed="false">PRO</button>
        </div>
      </div>

      <div class="hud-row">
        <div class="pill pill-soft">
          GOAL <b id="hud-goal">Daily</b>:
          <span><b id="hud-goal-cur">0</b>/<b id="hud-goal-target">20</b></span>
          <span id="goalDesc" class="mut">Hit GOOD 20</span>
        </div>
        <div class="pill pill-soft">
          MINI <b id="hud-mini">—</b>
          <span class="mut">⏱ <b id="miniTimer">—</b></span>
        </div>
      </div>

      <!-- Stage row -->
      <div class="hud-row">
        <div class="pill pill-stage">
          STAGE <b id="hud-stage">WARM</b>
          <span class="mut" id="hud-stage-desc">เก็บของดีให้ติดคอมโบ</span>
        </div>
      </div>

      <!-- AI HUD -->
      <div class="hud-row">
        <div class="pill pill-ai">
          AI Risk <b id="aiRisk">—</b>
          <span class="mut">next: <b id="aiHint">—</b></span>
        </div>
      </div>

      <!-- Fever + Shield + Boss -->
      <div class="hud-row hud-bars">
        <div class="barCard">
          <div class="barTop">
            <span class="mut">FEVER</span>
            <b id="feverText">0%</b>
          </div>
          <div class="bar">
            <div class="barFill" id="feverFill" style="width:0%"></div>
          </div>
        </div>

        <div class="barCard">
          <div class="barTop">
            <span class="mut">SHIELD</span>
            <b id="shieldPills">—</b>
          </div>
        </div>

        <div class="barCard boss" id="bossBar" aria-hidden="true">
          <div class="barTop">
            <span class="mut">BOSS</span>
            <b id="bossHint">—</b>
          </div>
          <div class="bar">
            <div class="barFill bossFill" id="bossFill" style="width:0%"></div>
          </div>
        </div>
      </div>

      <div class="gj-progress" aria-hidden="false">
        <div class="gj-progress-track">
          <div class="gj-progress-fill" id="gjProgressFill" style="width:0%"></div>
        </div>
      </div>
    </header>

    <!-- Playfield -->
    <main id="stage" aria-label="GoodJunk Stage">
      <div id="gj-layer" aria-label="targets"></div>
    </main>

    <!-- Low time overlay -->
    <div id="lowTimeOverlay" aria-hidden="true">
      <div class="lowTimeCard">
        <div class="mut">TIME</div>
        <div class="lowTimeNum" id="gj-lowtime-num">5</div>
      </div>
    </div>

    <!-- End overlay -->
    <div id="endOverlay" aria-hidden="true">
      <div class="panel">
        <div class="endTitle" id="endTitle">Game Over</div>
        <div class="endSub" id="endSub">—</div>

        <div class="endGrid">
          <div class="endStat"><span>GRADE</span><b id="endGrade">—</b></div>
          <div class="endStat"><span>SCORE</span><b id="endScore">0</b></div>
          <div class="endStat"><span>MISS</span><b id="endMiss">0</b></div>
          <div class="endStat"><span>TIME</span><b id="endTime">0</b></div>
        </div>

        <div class="endActions">
          <button class="btn" id="btnRetry" type="button">เล่นอีกครั้ง</button>
          <button class="btn primary" id="btnHub" type="button">กลับ HUB</button>
        </div>
        <!-- Cooldown button will be injected here by JS -->
      </div>
    </div>

  </div>

  <script type="module">
    import { boot } from './goodjunk.safe.js';

    const qs = (k, d='')=>{ try{ return (new URL(location.href)).searchParams.get(k) ?? d; }catch(e){ return d; } };
    const clamp=(v,a,b)=>{ v=Number(v); if(!Number.isFinite(v)) v=a; return Math.max(a, Math.min(b,v)); };

    // ---- spawn-safe: กัน HUD บังเป้า ----
    function computeSpawnSafe(){
      const hud = document.getElementById('hud');
      const stage = document.getElementById('stage');
      if(!stage) return;

      const sr = stage.getBoundingClientRect();
      const hr = hud ? hud.getBoundingClientRect() : { left:sr.left, right:sr.right, bottom: sr.top };

      const pad = 14;
      const topBlock = Math.max(sr.top + pad, hr.bottom + 10);

      // กันพื้นที่ coach/footer
      const bottomBlock = sr.bottom - (pad + 86);

      const xMin = sr.left + pad;
      const xMax = sr.right - pad;
      const yMin = topBlock;
      const yMax = Math.max(yMin + 240, bottomBlock);

      window.__HHA_SPAWN_SAFE__ = { xMin, xMax, yMin, yMax };
    }
    window.addEventListener('resize', ()=>{ computeSpawnSafe(); });
    window.addEventListener('orientationchange', ()=>{ setTimeout(computeSpawnSafe, 60); });

    const cfg = {
      view: qs('view','mobile'),
      run: qs('run','play'),
      diff: qs('diff','normal'),
      pro: (qs('pro','0') === '1'),
      time: clamp(qs('time','80'), 20, 300),
      seed: qs('seed', String(Date.now())),
      pid: qs('pid','anon'),
      hub: qs('hub','../hub.html'),
      ai: null
    };

    // debug pill
    try{
      document.getElementById('uiView').textContent = cfg.view;
      document.getElementById('uiRun').textContent  = cfg.run;
      document.getElementById('uiDiff').textContent = cfg.diff;
      document.getElementById('uiPro').textContent  = cfg.pro ? '1' : '0';
    }catch(e){}

    // diff UI
    const diffBtns = Array.from(document.querySelectorAll('.diffBtn'));
    function setDiffUI(d){
      diffBtns.forEach(b=> b.classList.toggle('on', (b.dataset.diff === d)));
    }
    setDiffUI(String(cfg.diff).toLowerCase());
    diffBtns.forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const d = String(btn.dataset.diff || 'normal');
        const u = new URL(location.href);
        u.searchParams.set('diff', d);
        u.searchParams.set('seed', String(Date.now()));
        location.href = u.toString();
      });
    });

    // PRO toggle UI
    const proBtn = document.getElementById('proBtn');
    function setProUI(on){
      proBtn?.classList.toggle('on', !!on);
      proBtn?.setAttribute('aria-pressed', on ? 'true' : 'false');
    }
    setProUI(cfg.pro);
    proBtn?.addEventListener('click', ()=>{
      const u = new URL(location.href);
      const on = (u.searchParams.get('pro') === '1');
      u.searchParams.set('pro', on ? '0' : '1');
      u.searchParams.set('seed', String(Date.now()));
      location.href = u.toString();
    });

    // Buttons
    document.getElementById('btnRetry')?.addEventListener('click', ()=>{
      const u = new URL(location.href);
      u.searchParams.set('seed', String(Date.now()));
      location.href = u.toString();
    });
    document.getElementById('btnHub')?.addEventListener('click', ()=>{
      location.href = cfg.hub || '../hub.html';
    });

    // AI (optional): ?ai=1 และ run=play
    const aiOn = (qs('ai','0') === '1') && (String(cfg.run).toLowerCase() === 'play');
    if(aiOn){
      try{
        const mod = await import('../vr/ai-goodjunk.js');
        if(typeof mod.createGoodJunkAI === 'function'){
          cfg.ai = mod.createGoodJunkAI({
            seed: cfg.seed,
            pid: cfg.pid,
            diff: cfg.diff,
            view: cfg.view
          });
        }
      }catch(e){
        console.warn('[GoodJunk] AI module load failed (ok)', e);
      }
    }

    // compute safe before start
    computeSpawnSafe();

    // Boot
    boot(cfg);
  </script>
</body>
</html>
