<!-- === /herohealth/vr-goodjunk/goodjunk-vr.html ===
GoodJunkVR RUN (PC/Mobile/cVR) — PRODUCTION (safe.js + race controller)
FULL v20260304-RUN-RACE-WAIT-SAFE
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk VR</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="../favicon.ico" />
  <style>
    html,body{height:100%; margin:0; background:#020617; color:rgba(229,231,235,.96); font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;}
    *{box-sizing:border-box}
    #gj-layer{
      position:fixed; inset:0;
      touch-action: manipulation;
      overflow:hidden;
    }
    .gj-target{
      position:absolute;
      transform:translate(-50%,-50%);
      font-size:54px;
      user-select:none;
      -webkit-user-select:none;
      cursor:pointer;
      filter: drop-shadow(0 14px 24px rgba(0,0,0,.45));
    }
    /* minimal HUD (ใช้ของเดิมคุณได้—อันนี้เป็น fallback) */
    .hud{
      position:fixed; left:10px; right:10px; top:10px;
      display:flex; gap:10px; flex-wrap:wrap;
      z-index:200;
      pointer-events:none;
    }
    .pill{
      border:1px solid rgba(148,163,184,.18);
      background:rgba(2,6,23,.55);
      border-radius:999px;
      padding:8px 10px;
      font-weight:1000;
      pointer-events:none;
    }
    .panel{
      border:1px solid rgba(148,163,184,.18);
      background:rgba(2,6,23,.70);
      border-radius:18px;
      padding:14px 14px;
      box-shadow:0 18px 70px rgba(0,0,0,.40);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    #endOverlay{
      position:fixed; inset:0;
      display:flex; align-items:center; justify-content:center;
      z-index:280;
    }
    #endOverlay[aria-hidden="true"]{ display:none; }
    .btn{
      border-radius:16px;
      border:1px solid rgba(148,163,184,.22);
      background:rgba(148,163,184,.08);
      color:rgba(229,231,235,.96);
      padding:10px 12px;
      font-weight:1000;
      cursor:pointer;
      min-height:42px;
    }
  </style>
</head>
<body>
  <div id="gj-layer" aria-label="game layer"></div>

  <!-- HUD (ขั้นต่ำ) ถ้าคุณมี HUD เดิมอยู่แล้ว ปรับให้ id ตรงก็พอ -->
  <div class="hud">
    <div class="pill">Score <span id="hud-score">0</span></div>
    <div class="pill">Time <span id="hud-time">0</span></div>
    <div class="pill">Miss <span id="hud-miss">0</span></div>
    <div class="pill">Grade <span id="hud-grade">—</span></div>

    <div class="pill"><span id="hud-goal">WIN</span></div>
    <div class="pill"><span id="hud-goal-cur">0/0</span></div>
    <div class="pill"><span id="hud-goal-target">0/0</span></div>
    <div class="pill"><span id="goalDesc">—</span></div>

    <div class="pill">Mini <span id="hud-mini">—</span> <span id="miniTimer">—</span></div>

    <div class="pill">AI <span id="aiRisk">—</span> <span id="aiHint">—</span></div>

    <div class="pill">Fever <span id="feverText">0%</span></div>
    <div class="pill">Shield <span id="shieldPills">—</span></div>

    <div class="pill" style="opacity:.8">view <span id="uiView">—</span></div>
    <div class="pill" style="opacity:.8">run <span id="uiRun">—</span></div>
    <div class="pill" style="opacity:.8">diff <span id="uiDiff">—</span></div>
  </div>

  <!-- Boss bar (fallback) -->
  <div id="bossBar" aria-hidden="true" style="
    position:fixed; left:10px; right:10px; top:62px;
    z-index:205; pointer-events:none;
    border-radius:14px;
    border:1px solid rgba(148,163,184,.14);
    background:rgba(2,6,23,.40);
    padding:8px 10px;
  ">
    <div style="display:flex; justify-content:space-between; gap:10px; font-weight:1000; opacity:.9;">
      <div>Boss</div><div id="bossHint">—</div>
    </div>
    <div style="height:8px"></div>
    <div style="height:10px; border-radius:999px; background:rgba(148,163,184,.18); overflow:hidden;">
      <div id="bossFill" style="height:100%; width:0%; background:rgba(239,68,68,.35);"></div>
    </div>
  </div>

  <!-- end -->
  <div id="endOverlay" aria-hidden="true">
    <div class="panel" style="max-width:520px; width:calc(100vw - 24px); text-align:center;">
      <div style="font:1000 22px/1.2 system-ui; margin-bottom:6px;" id="endTitle">Game Over</div>
      <div style="opacity:.85; font-weight:900; margin-bottom:12px;" id="endSub">—</div>
      <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
        <div class="pill">Grade <span id="endGrade">—</span></div>
        <div class="pill">Score <span id="endScore">0</span></div>
        <div class="pill">Miss <span id="endMiss">0</span></div>
        <div class="pill">Time <span id="endTime">0</span>s</div>
      </div>
      <div style="height:12px"></div>
      <button class="btn" onclick="location.href = (new URL(location.href)).searchParams.get('hub') || '../hub.html'">กลับ HUB</button>
    </div>
  </div>

  <script type="module">
    const qs = (k, d='')=>{ try{ return (new URL(location.href)).searchParams.get(k) ?? d; }catch(e){ return d; } };

    // Ensure RACE uses wait=1
    const mode = String(qs('mode','solo')).toLowerCase();
    if(mode==='race'){
      const u = new URL(location.href);
      if(u.searchParams.get('wait')!=='1'){
        u.searchParams.set('wait','1');
        location.replace(u.toString());
      }
    }

    // Boot game core
    const mod = await import('./goodjunk.safe.js');
    mod.boot({});

    // Boot race controller if needed
    if(mode==='race'){
      await import('./goodjunk-race.js');
    }

    // Optional: cVR ui module (if exists in your repo)
    try{
      const view = String(qs('view','mobile')).toLowerCase();
      if(view==='cvr' || view==='vr'){
        await import('../vr/vr-ui.js');
      }
    }catch(e){}
  </script>
</body>
</html>
