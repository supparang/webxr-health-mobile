<!-- === /herohealth/vr-goodjunk/goodjunk-vr.html ===
GoodJunkVR RUN — PRODUCTION (ESM + safe inject + spawn-safe measure)
PATCH v20260303-RUN-ANCHOR-CD-SPLASH-SPAWNSAFE
✅ FIX: End overlay has #endActions anchor for JS inject (Cooldown button always visible)
✅ ADD: Boot splash "Loading GoodJunk..." (hide when booted)
✅ ADD: spawn-safe measurement on run page -> prevents HUD blocking targets/miss spikes
✅ Keep: AI dynamic import (optional), pass-through, retry/hub
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk VR</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="../favicon.ico" />
  <link rel="stylesheet" href="./goodjunk-vr.css?v=20260303" />
</head>
<body>
  <div id="app">

    <!-- Boot splash -->
    <div id="bootSplash" aria-hidden="false">
      <div class="bootCard">
        <div class="bootTitle">Loading GoodJunk...</div>
        <div class="bootSub">กำลังเตรียมฉาก/เลเยอร์</div>
      </div>
    </div>

    <!-- Debug pills (optional) -->
    <div id="debugPills" aria-hidden="true">
      <span class="pill">view=<b id="uiView">—</b></span>
      <span class="pill">run=<b id="uiRun">—</b></span>
      <span class="pill">diff=<b id="uiDiff">—</b></span>
    </div>

    <!-- Top HUD -->
    <header id="hud">
      <div class="hud-row">
        <div class="pill">SCORE <b id="hud-score">0</b></div>
        <div class="pill">TIME <b id="hud-time">0</b></div>
        <div class="pill">MISS <b id="hud-miss">0</b></div>
        <div class="pill">GRADE <b id="hud-grade">C</b></div>
      </div>

      <div class="hud-row">
        <div class="pill pill-soft">
          GOAL <b id="hud-goal">Daily</b>:
          <span><b id="hud-goal-cur">0</b>/<b id="hud-goal-target">20</b></span>
          <span id="goalDesc" class="mut">Hit GOOD 20</span>
        </div>
        <div class="pill pill-soft">
          MINI <b id="hud-mini">—</b>
          <span class="mut">⏱ <b id="miniTimer">—</b></span>
        </div>
      </div>

      <!-- AI HUD -->
      <div class="hud-row">
        <div class="pill pill-ai">
          AI Risk <b id="aiRisk">—</b>
          <span class="mut">next: <b id="aiHint">—</b></span>
        </div>
      </div>

      <!-- Fever + Shield + Boss -->
      <div class="hud-row hud-bars">
        <div class="barCard">
          <div class="barTop">
            <span class="mut">FEVER</span>
            <b id="feverText">0%</b>
          </div>
          <div class="bar">
            <div class="barFill" id="feverFill" style="width:0%"></div>
          </div>
        </div>

        <div class="barCard">
          <div class="barTop">
            <span class="mut">SHIELD</span>
            <b id="shieldPills">—</b>
          </div>
        </div>

        <div class="barCard boss" id="bossBar" aria-hidden="true">
          <div class="barTop">
            <span class="mut">BOSS</span>
            <b id="bossHint">—</b>
          </div>
          <div class="bar">
            <div class="barFill bossFill" id="bossFill" style="width:0%"></div>
          </div>
        </div>
      </div>

      <div class="gj-progress" aria-hidden="false">
        <div class="gj-progress-track">
          <div class="gj-progress-fill" id="gjProgressFill" style="width:0%"></div>
        </div>
      </div>
    </header>

    <!-- Playfield -->
    <main id="stage" aria-label="GoodJunk Stage">
      <div id="gj-layer" aria-label="targets"></div>
    </main>

    <!-- Low time overlay -->
    <div id="lowTimeOverlay" aria-hidden="true">
      <div class="lowTimeCard">
        <div class="mut">TIME</div>
        <div class="lowTimeNum" id="gj-lowtime-num">5</div>
      </div>
    </div>

    <!-- End overlay -->
    <div id="endOverlay" aria-hidden="true">
      <div class="panel">
        <div class="endTitle" id="endTitle">Game Over</div>
        <div class="endSub" id="endSub">—</div>

        <div class="endGrid">
          <div class="endStat"><span>GRADE</span><b id="endGrade">—</b></div>
          <div class="endStat"><span>SCORE</span><b id="endScore">0</b></div>
          <div class="endStat"><span>MISS</span><b id="endMiss">0</b></div>
          <div class="endStat"><span>TIME</span><b id="endTime">0</b></div>
        </div>

        <!-- ✅ ANCHOR: JS จะ inject ปุ่ม Cooldown “ในแถวนี้” เสมอ -->
        <div class="endActions" id="endActions">
          <button class="btn" id="btnRetry" type="button">เล่นอีกครั้ง</button>
          <button class="btn primary" id="btnHub" type="button">กลับ HUB</button>
        </div>

      </div>
    </div>

  </div>

  <script type="module">
    import { boot } from './goodjunk.safe.js';

    const qs = (k, d='')=>{ try{ return (new URL(location.href)).searchParams.get(k) ?? d; }catch(e){ return d; } };

    const cfg = {
      view: qs('view','mobile'),
      run: qs('run','play'),
      diff: qs('diff','normal'),
      time: Number(qs('time','80')) || 80,
      seed: qs('seed', String(Date.now())),
      pid: qs('pid','anon'),
      hub: qs('hub','../hub.html'),
      ai: null
    };

    // ✅ AI enabled only when ?ai=1 AND run=play
    const aiOn = (qs('ai','0') === '1') && (String(cfg.run).toLowerCase() === 'play');
    if(aiOn){
      try{
        const mod = await import('../vr/ai-goodjunk.js');
        const createGoodJunkAI = mod.createGoodJunkAI;
        if(typeof createGoodJunkAI === 'function'){
          cfg.ai = createGoodJunkAI({ seed: cfg.seed, pid: cfg.pid, diff: cfg.diff, view: cfg.view });
        }
      }catch(e){
        console.warn('[GoodJunk] AI module load failed', e);
      }
    }

    // Buttons
    const btnRetry = document.getElementById('btnRetry');
    const btnHub = document.getElementById('btnHub');
    btnRetry?.addEventListener('click', ()=>{
      const u = new URL(location.href);
      u.searchParams.set('seed', String(Date.now()));
      location.href = u.toString();
    });
    btnHub?.addEventListener('click', ()=>{
      const hub = cfg.hub || '../hub.html';
      location.href = hub;
    });

    // ✅ Spawn-safe measurement (exclude HUD + bottom safe area / VR buttons)
    function setSpawnSafe(){
      const layer = document.getElementById('gj-layer');
      const hud   = document.getElementById('hud');
      if(!layer) return;

      const lr = layer.getBoundingClientRect();
      const hr = hud ? hud.getBoundingClientRect() : { bottom: lr.top };

      // bottom UI (coach/toast + vr-ui bar) เผื่อไว้แบบอนุรักษ์นิยม
      const bottomPad = Math.max(120, 90 + (window.visualViewport?.offsetTop || 0));
      const pad = 16;

      const xMin = lr.left + pad;
      const xMax = lr.right - pad;

      // ✅ yMin เริ่ม “ใต้ HUD” ชัด ๆ
      const yMin = Math.min(lr.bottom - 200, Math.max(lr.top + pad, hr.bottom + 10));

      // ✅ yMax กันพื้นที่ปุ่มล่าง/ขอบจอ
      const yMax = Math.max(yMin + 180, lr.bottom - bottomPad);

      window.__HHA_SPAWN_SAFE__ = { xMin, xMax, yMin, yMax };
    }

    // call now + on resize/orientation
    setSpawnSafe();
    window.addEventListener('resize', ()=> setSpawnSafe(), { passive:true });
    window.addEventListener('orientationchange', ()=> setTimeout(setSpawnSafe, 250), { passive:true });

    // Boot + hide splash
    const splash = document.getElementById('bootSplash');
    try{ splash?.setAttribute('aria-hidden','false'); }catch(e){}
    boot(cfg);
    try{
      splash?.setAttribute('aria-hidden','true');
      splash?.classList.add('hide');
    }catch(e){}
  </script>
</body>
</html>
