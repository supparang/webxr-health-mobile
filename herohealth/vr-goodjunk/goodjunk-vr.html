<!-- === /herohealth/vr-goodjunk/goodjunk-vr.html ===
GoodJunkVR RUN (PC/Mobile/cVR) — PRODUCTION (safe.js + race)
FULL v20260304-RUN-MISSION3STAGE-PRO-COACHRT-FIXDASH
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk VR</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="../favicon.ico" />
  <link rel="stylesheet" href="./goodjunk-vr.css?v=20260304a" />
</head>
<body>
  <!-- game layer -->
  <div id="gj-layer" aria-label="game layer"></div>

  <!-- HUD -->
  <div class="hud">
    <div class="pill">Score <b id="hud-score">0</b></div>
    <div class="pill">Time <b id="hud-time">0</b></div>
    <div class="pill">Miss <b id="hud-miss">0</b></div>
    <div class="pill">Grade <b id="hud-grade">—</b></div>

    <div class="pill"><span id="hud-goal">WIN</span></div>
    <div class="pill"><span id="hud-goal-cur">0</span></div>
    <div class="pill"><span id="hud-goal-target">0</span></div>
    <div class="pill"><span id="goalDesc">—</span></div>

    <div class="pill">Mini <b id="hud-mini">—</b> <span id="miniTimer">—</span></div>

    <div class="pill">AI <b id="aiRisk">0.00</b> <span id="aiHint">—</span></div>

    <div class="pill">Fever <b id="feverText">0%</b></div>
    <div class="pill">
      <span class="feverBar"><i id="feverFill" style="width:0%"></i></span>
    </div>

    <div class="pill">Shield <b id="shieldPills">—</b></div>

    <div class="pill dim">view <b id="uiView">—</b></div>
    <div class="pill dim">run <b id="uiRun">—</b></div>
    <div class="pill dim">diff <b id="uiDiff">—</b></div>
    <div class="pill dim">mode <b id="uiMode">—</b></div>
    <div class="pill dim">pro <b id="uiPro">—</b></div>

    <!-- Mission 3-Stage UI -->
    <div class="gj-mission" id="gjMission" aria-label="mission 3 stages">
      <div class="gj-mission-top">
        <div class="gj-stageTitle">
          <span class="badge" id="stageBadge">WARM</span>
          <span class="hint" id="stageHint">—</span>
        </div>

        <div class="gj-stageStats">
          <span class="stat">StageScore <b id="stageScore">0</b></span>
          <span class="stat">Goal <b id="stageGoalCur">0</b>/<b id="stageGoalTarget">0</b></span>
          <span class="stat">Bonus <b id="stageBonus">0</b></span>
        </div>
      </div>

      <div class="gj-steps">
        <div class="step" id="stepWarm"><span>WARM</span><i></i></div>
        <div class="step" id="stepTrick"><span>TRICK</span><i></i></div>
        <div class="step" id="stepBoss"><span>BOSS</span><i></i></div>
      </div>

      <div class="gj-progress-track">
        <div class="gj-progress-fill" id="gjProgressFill" style="width:0%"></div>
      </div>

      <div class="gj-mission-sub">
        <span class="mut">Target:</span> <b id="stageObjective">—</b>
        <span class="sep">•</span>
        <span class="mut">Timer:</span> <b id="stageTimer">—</b>
      </div>
    </div>
  </div>

  <!-- Boss bar -->
  <div id="bossBar" aria-hidden="true" class="bossBar">
    <div class="bossTop">
      <div>Boss</div><div id="bossHint">—</div>
    </div>
    <div class="bossTrack"><div id="bossFill" class="bossFill" style="width:0%"></div></div>
  </div>

  <!-- Low time -->
  <div id="lowTimeOverlay" aria-hidden="true" class="lowTime">
    <div class="lowTimeCard">⏱️ <b id="gj-lowtime-num">5</b></div>
  </div>

  <!-- End overlay -->
  <div id="endOverlay" aria-hidden="true" class="endOverlay">
    <div class="panel endPanel">
      <div class="endTitle" id="endTitle">Game Over</div>
      <div class="endSub" id="endSub">—</div>

      <div class="endPills">
        <div class="pill">Grade <b id="endGrade">—</b></div>
        <div class="pill">Score <b id="endScore">0</b></div>
        <div class="pill">Miss <b id="endMiss">0</b></div>
        <div class="pill">Time <b id="endTime">0</b>s</div>
      </div>

      <div style="height:12px"></div>
      <button class="btn" id="btnBackHub">กลับ HUB</button>
      <!-- cooldown button injected here by safe.js -->
    </div>
  </div>

  <!-- Realtime Coach (Explainable) -->
  <div id="coachRealtime" class="gj-coach" aria-hidden="true">
    <div class="gj-coach-card">
      <b>🧑‍⚕️ AI Coach:</b>
      <span id="coachRealtimeText">—</span>
    </div>
  </div>

  <script type="module">
    const qs = (k, d='')=>{ try{ return (new URL(location.href)).searchParams.get(k) ?? d; }catch(e){ return d; } };

    // back hub
    const btn = document.getElementById('btnBackHub');
    btn?.addEventListener('click', ()=>{
      const hub = qs('hub','../hub.html');
      location.href = hub || '../hub.html';
    });

    // Ensure RACE uses wait=1
    const mode = String(qs('mode','solo')).toLowerCase();
    if(mode==='race'){
      const u = new URL(location.href);
      if(u.searchParams.get('wait')!=='1'){
        u.searchParams.set('wait','1');
        location.replace(u.toString());
      }
    }

    // Boot VR UI early so hha:shoot exists before game starts
    try{
      const view = String(qs('view','mobile')).toLowerCase();
      if(view==='cvr' || view==='vr'){
        await import('../vr/vr-ui.js');
      }
    }catch(e){}

    // Boot game core
    const mod = await import('./goodjunk.safe.js');
    mod.boot({});

    // Boot race controller if needed
    if(mode==='race'){
      await import('./goodjunk-race.js');
    }
  </script>
</body>
</html>
