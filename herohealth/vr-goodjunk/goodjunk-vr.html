GoodJunkVR — RUN PAGE (PC/Mobile/cVR) — PRODUCTION
PATCH v20260305m-RUN-REWARD-ABC-HEROXP
✅ HUD split + spawn-safe (from previous patch)
✅ End overlay shows Card + XP + Hero Level
✅ Expose UI bounds for SAFE spawn (window.HHA_UI_BOUNDS)
Requires:
- /herohealth/vr/vr-ui.js
- /herohealth/vr-goodjunk/goodjunk.safe.js (module)
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth — GoodJunkVR</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="../favicon.ico" />
  <style>
    :root{
      --bg:#050814;
      --panel:rgba(2,6,23,.70);
      --stroke:rgba(148,163,184,.18);
      --text:rgba(229,231,235,.96);
      --muted:rgba(148,163,184,.92);
      --good:#22c55e; --warn:#f59e0b; --bad:#ef4444; --blue:#3b82f6;
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
      --sar: env(safe-area-inset-right, 0px);
      --hudTop: calc(10px + var(--sat));
      --hudPadX: 10px;
    }
    html,body{height:100%; margin:0; background:var(--bg); color:var(--text);}
    body{
      overflow:hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans Thai", "Noto Sans", Arial;
    }

    #gj-layer{
      position: fixed;
      inset: 0;
      overflow:hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select:none;
    }

    .hudL, .hudR{
      position: fixed;
      top: var(--hudTop);
      z-index: 220;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      pointer-events:none;
      max-width: 48vw;
    }
    .hudL{ left: calc(var(--hudPadX) + var(--sal)); justify-content:flex-start; }
    .hudR{ right: calc(var(--hudPadX) + var(--sar)); justify-content:flex-end; }

    .pill{
      pointer-events:none;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 7px 9px;
      border-radius: 999px;
      border:1px solid var(--stroke);
      background: rgba(2,6,23,.55);
      backdrop-filter: blur(8px);
      color: var(--muted);
      font-size: 12px;
      font-weight: 950;
      white-space:nowrap;
    }
    .pill b{ color: var(--text); }
    .pill .v{ color: var(--text); font-weight: 1100; }

    .mini{
      position: fixed;
      top: calc(var(--hudTop) + 44px);
      left: calc(var(--hudPadX) + var(--sal));
      z-index: 220;
      max-width: 62vw;
      pointer-events:none;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .mission{
      position: fixed;
      left: 50%;
      top: var(--hudTop);
      transform: translateX(-50%);
      z-index: 230;
      pointer-events:none;
      width: min(520px, 62vw);
      border-radius: 16px;
      border:1px solid rgba(148,163,184,.14);
      background: rgba(2,6,23,.46);
      backdrop-filter: blur(10px);
      padding: 8px 10px;
      display:flex;
      flex-direction:column;
      gap:6px;
      box-shadow: 0 18px 55px rgba(0,0,0,.35);
    }
    .missionRow{display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap;}
    .missionTitle{font-weight:1100; letter-spacing:.2px; font-size:12px;}
    .missionHint{font-size:12px; font-weight:900; color:var(--muted);}
    .missionGoal{font-size:12px; font-weight:1100;}
    #missionFill{height:9px; border-radius:999px; border:1px solid rgba(255,255,255,.14); background: rgba(0,0,0,.35); overflow:hidden; position:relative;}
    #missionFill::before{content:""; position:absolute; inset:0; width: var(--p,0%); background: rgba(34,197,94,.85); transition: width .12s ease;}

    #bossBar{
      position: fixed;
      left: 50%;
      top: calc(var(--hudTop) + 52px);
      transform: translateX(-50%);
      z-index: 235;
      width: min(520px, 86vw);
      pointer-events:none;
      display:none;
      flex-direction:column;
      gap:6px;
      align-items:center;
    }
    #bossHint{font-weight:1100; font-size:12px; color: var(--muted); text-shadow: 0 10px 30px rgba(0,0,0,.55);}
    #bossFill{
      height: 10px; width: 100%;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.35);
      overflow:hidden;
      position:relative;
    }
    #bossFill::before{
      content:"";
      position:absolute; inset:0;
      width: var(--hp, 0%);
      background: rgba(239,68,68,.85);
      transition: width .12s ease;
    }

    #hudToggle{
      position: fixed;
      top: calc(var(--hudTop) + 2px);
      right: calc(10px + var(--sar));
      z-index: 260;
      pointer-events:auto;
      cursor:pointer;
      border-radius: 14px;
      border:1px solid rgba(148,163,184,.22);
      background: rgba(2,6,23,.55);
      color: var(--text);
      padding: 8px 10px;
      font-weight:1100;
      min-height: 40px;
      box-shadow: 0 12px 40px rgba(0,0,0,.35);
    }
    body.hudMin .hudL,
    body.hudMin .hudR,
    body.hudMin .mini,
    body.hudMin .mission,
    body.hudMin #bossBar{ display:none !important; }
    body.hudMin #hudToggle{ opacity:.95; }

    /* End overlay */
    #endOverlay{
      position: fixed; inset: 0;
      display:none;
      z-index: 400;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(8px);
      align-items:center;
      justify-content:center;
      padding: calc(16px + var(--sat)) calc(16px + var(--sar)) calc(16px + var(--sab)) calc(16px + var(--sal));
    }
    #endOverlay .panel{
      width: min(760px, 92vw);
      border-radius: 22px;
      border:1px solid rgba(148,163,184,.18);
      background: rgba(2,6,23,.72);
      box-shadow: 0 22px 80px rgba(0,0,0,.55);
      padding: 14px 14px;
      text-align:center;
    }
    #endTitle{font-size:22px; font-weight:1200; margin:0;}
    #endSub{margin:6px 0 0 0; color:var(--muted); font-weight:950;}

    .endGrid{display:grid; grid-template-columns:repeat(3, minmax(0,1fr)); gap:10px; margin-top:12px;}
    @media (max-width:720px){ .endGrid{grid-template-columns:1fr;} }

    .endPill{
      border-radius:18px;
      border:1px solid rgba(148,163,184,.16);
      background: rgba(2,6,23,.38);
      padding: 12px 10px;
      font-weight:1100;
    }
    .endPill .k{opacity:.78; font-size:12px;}
    .endPill .v{font-size:18px; margin-top:4px;}

    /* Reward card */
    .rewardWrap{
      margin-top: 10px;
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      align-items:stretch;
    }
    .card{
      width: min(240px, 44vw);
      border-radius: 18px;
      border:1px solid rgba(148,163,184,.18);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(2,6,23,.38));
      padding: 12px 12px;
      text-align:left;
      box-shadow: 0 18px 55px rgba(0,0,0,.35);
    }
    .cardTop{display:flex; justify-content:space-between; align-items:center; gap:10px;}
    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 7px 10px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      font-weight:1200;
      white-space:nowrap;
    }
    .gradeBig{
      font-size: 34px;
      font-weight: 1400;
      letter-spacing:.6px;
      text-shadow: 0 18px 60px rgba(0,0,0,.55);
    }
    .muted{ color: var(--muted); font-weight:950; font-size:12px; line-height:1.35; margin-top:6px; }
    .xpLine{ font-weight:1200; margin-top:8px; }

    .endActions{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:12px;}
    .btn{
      pointer-events:auto;
      cursor:pointer;
      border-radius: 16px;
      border:1px solid rgba(148,163,184,.22);
      background: rgba(148,163,184,.10);
      color: var(--text);
      padding: 10px 12px;
      font-weight:1200;
      min-height: 44px;
    }
    .btn.primary{border-color: rgba(59,130,246,.30); background: rgba(59,130,246,.16);}
    .btn.ghost{background: transparent; color: var(--muted);}

    #dbg{
      position: fixed;
      left: 10px;
      bottom: calc(10px + var(--sab));
      z-index: 9999;
      max-width: 92vw;
      border-radius: 14px;
      border:1px solid rgba(148,163,184,.20);
      background: rgba(2,6,23,.60);
      backdrop-filter: blur(8px);
      padding: 10px 10px;
      font: 900 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      color: rgba(229,231,235,.96);
      display:none;
      white-space:pre-wrap;
    }
  </style>
</head>
<body>

  <div id="gj-layer" aria-label="play layer"></div>

  <div class="hudL" aria-label="hud left">
    <span class="pill"><b>score</b>: <span class="v" id="hud-score">0</span></span>
    <span class="pill"><b>time</b>: <span class="v" id="hud-time">0</span></span>
    <span class="pill"><b>miss</b>: <span class="v" id="hud-miss">0</span></span>
  </div>

  <div class="hudR" aria-label="hud right">
    <span class="pill"><b>grade</b>: <span class="v" id="hud-grade">—</span></span>
    <span class="pill"><b>goal</b>: <span class="v" id="hud-goal">—</span></span>
    <span class="pill"><b>AI risk</b>: <span class="v" id="aiRisk">—</span></span>
  </div>

  <div class="mini" aria-label="goal/mini/ai">
    <span class="pill"><b>cur</b>: <span class="v" id="hud-goal-cur">0</span></span>
    <span class="pill"><b>target</b>: <span class="v" id="hud-goal-target">0</span></span>
    <span class="pill"><b>desc</b>: <span class="v" id="goalDesc">—</span></span>
    <span class="pill"><b>mini</b>: <span class="v" id="hud-mini">—</span></span>
    <span class="pill"><b>t</b>: <span class="v" id="miniTimer">0</span></span>
    <span class="pill"><b>AI hint</b>: <span class="v" id="aiHint">—</span></span>
  </div>

  <div class="mission" aria-label="mission">
    <div class="missionRow">
      <div class="missionTitle" id="missionTitle">WARM</div>
      <div class="missionGoal" id="missionGoal">—</div>
    </div>
    <div class="missionHint" id="missionHint">—</div>
    <div id="missionFill"></div>
  </div>

  <div id="bossBar" aria-label="bossbar">
    <div id="bossHint">—</div>
    <div id="bossFill" style="--hp:0%;"></div>
  </div>

  <button id="hudToggle" type="button" title="ย่อ/ขยาย HUD (กด H ได้)">👁️ HUD</button>

  <div id="endOverlay" aria-label="end overlay">
    <div class="panel">
      <h2 id="endTitle">จบเกม</h2>
      <p id="endSub">—</p>

      <div class="rewardWrap" aria-label="reward">
        <div class="card">
          <div class="cardTop">
            <span class="badge">🃏 Card</span>
            <span class="badge">🏅 Hero</span>
          </div>
          <div class="gradeBig" id="endCard">—</div>
          <div class="muted" id="endCardHint">ทำให้ได้ B ขึ้นไปเพื่อรับการ์ด</div>
        </div>

        <div class="card">
          <div class="cardTop">
            <span class="badge">✨ XP</span>
            <span class="badge">Lv <span id="endLevel">1</span></span>
          </div>
          <div class="gradeBig"><span id="endXpGain">+0</span></div>
          <div class="xpLine">รวมสะสม: <span id="endXpTotal">0</span> XP</div>
          <div class="muted" id="endXpHint">ยิงแม่น + คอมโบสูง = XP พุ่ง</div>
        </div>
      </div>

      <div class="endGrid" style="margin-top:12px;">
        <div class="endPill"><div class="k">เกรด</div><div class="v" id="endGrade">—</div></div>
        <div class="endPill"><div class="k">คะแนน</div><div class="v" id="endScore">0</div></div>
        <div class="endPill"><div class="k">Miss</div><div class="v" id="endMiss">0</div></div>
      </div>

      <div class="endGrid" style="margin-top:10px;">
        <div class="endPill"><div class="k">เวลา</div><div class="v" id="endTime">0</div></div>
        <div class="endPill"><div class="k">view</div><div class="v" id="uiView">—</div></div>
        <div class="endPill"><div class="k">run / diff</div><div class="v"><span id="uiRun">—</span> / <span id="uiDiff">—</span></div></div>
      </div>

      <div class="endActions">
        <button class="btn primary" id="btnReplay" type="button">🔁 เล่นอีกครั้ง</button>
        <button class="btn ghost" id="btnBackHub" type="button">↩ กลับ Hub</button>
      </div>
    </div>
  </div>

  <div id="dbg"></div>

  <script src="../vr/vr-ui.js"></script>

  <script type="module">
    const qs = (k, d='')=>{ try{ return (new URL(location.href)).searchParams.get(k) ?? d; }catch(e){ return d; } };
    const dbg = document.getElementById('dbg');
    const debugOn = String(qs('debug','0')) === '1';

    function logDbg(msg){
      if(!dbg || !debugOn) return;
      dbg.style.display = 'block';
      dbg.textContent += (String(msg||'') + '\n');
    }

    window.addEventListener('error', (e)=>{ logDbg('ERROR: ' + (e?.message||e)); });
    window.addEventListener('unhandledrejection', (e)=>{ logDbg('REJECT: ' + (e?.reason?.message || e?.reason || e)); });

    // HUD toggle + expose bounds for spawn-safe
    const btnHud = document.getElementById('hudToggle');
    function setHudMin(on){
      document.body.classList.toggle('hudMin', !!on);
      try{ localStorage.setItem('HHA_GJ_HUD_MIN', on?'1':'0'); }catch(_){}
      updateUiBounds();
    }
    function getHudMin(){
      try{ return localStorage.getItem('HHA_GJ_HUD_MIN') === '1'; }catch(_){ return false; }
    }
    btnHud && btnHud.addEventListener('click', ()=> setHudMin(!document.body.classList.contains('hudMin')), {passive:true});
    window.addEventListener('keydown', (e)=>{
      if((e?.key||'').toLowerCase()==='h') setHudMin(!document.body.classList.contains('hudMin'));
    });

    function rectOf(sel){
      const el = document.querySelector(sel);
      if(!el || getComputedStyle(el).display==='none') return null;
      const r = el.getBoundingClientRect();
      return { left:r.left, top:r.top, right:r.right, bottom:r.bottom, width:r.width, height:r.height };
    }
    function updateUiBounds(){
      const L = rectOf('.hudL');
      const R = rectOf('.hudR');
      const M = rectOf('.mission');
      const B = rectOf('#bossBar');
      window.HHA_UI_BOUNDS = { L, R, M, B, ts: Date.now() };
    }
    window.addEventListener('resize', updateUiBounds, {passive:true});
    setHudMin(getHudMin());
    updateUiBounds();

    // buttons
    const btnReplay = document.getElementById('btnReplay');
    const btnBackHub = document.getElementById('btnBackHub');
    btnReplay && (btnReplay.onclick = ()=> location.href = location.href);
    btnBackHub && (btnBackHub.onclick = ()=>{
      const hub = qs('hub','../hub.html');
      location.href = hub;
    });

    // reward UI hooks (engine will dispatch hha:reward)
    const endCard = document.getElementById('endCard');
    const endCardHint = document.getElementById('endCardHint');
    const endXpGain = document.getElementById('endXpGain');
    const endXpTotal = document.getElementById('endXpTotal');
    const endLevel = document.getElementById('endLevel');

    window.addEventListener('hha:reward', (ev)=>{
      const d = ev?.detail || {};
      if(endCard) endCard.textContent = d.card || '—';
      if(endCardHint) endCardHint.textContent = d.cardHint || '';
      if(endXpGain) endXpGain.textContent = '+' + String(d.xpGain|0);
      if(endXpTotal) endXpTotal.textContent = String(d.xpTotal|0);
      if(endLevel) endLevel.textContent = String(d.level|0 || 1);
    });

    try{
      logDbg('Booting goodjunk...');
      const mod = await import('./goodjunk.safe.js');
      if(!mod || typeof mod.boot !== 'function'){
        throw new Error('goodjunk.safe.js missing export boot(cfg)');
      }
      await mod.boot({
        pid: qs('pid','anon'),
        nick: qs('nick','anon'),
        hub: qs('hub','../hub.html'),
        mode: qs('mode','solo'),
        run: qs('run','play'),
        diff: qs('diff','normal'),
        view: qs('view','mobile'),
        time: qs('time','80'),
        seed: qs('seed', String(Date.now())),
        ai: null
      });
      logDbg('✅ boot ok');
    }catch(err){
      logDbg('❌ boot failed: ' + (err?.message || err));
      console.error(err);
      alert('GoodJunk โหลดไม่สำเร็จ (ดู console/debug=1)');
    }
  </script>
</body>
</html>
