<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth — GoodJunkVR</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="../favicon.ico" />
  <style>
    :root{
      --bg1:#020617; --bg2:#0b1226;
      --panel: rgba(2,6,23,.68);
      --stroke: rgba(148,163,184,.18);
      --text: rgba(229,231,235,.96);
      --muted: rgba(148,163,184,.92);
      --good:#22c55e; --warn:#f59e0b; --bad:#ef4444; --cyan:#22d3ee;
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
      --sar: env(safe-area-inset-right, 0px);
    }
    html,body{height:100%; margin:0; overflow:hidden; background:#000;}
    body{
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans Thai", "Noto Sans", Arial;
      background:
        radial-gradient(1000px 600px at 20% 10%, rgba(34,197,94,.14), transparent 60%),
        radial-gradient(900px 540px at 85% 20%, rgba(34,211,238,.12), transparent 60%),
        radial-gradient(900px 520px at 60% 95%, rgba(167,139,250,.10), transparent 60%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
    }

    /* Play layer */
    #gj-layer{
      position:fixed;
      inset: 0;
      overflow:hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    /* HUD */
    #hudTop{
      position:fixed;
      left: calc(10px + var(--sal));
      right: calc(10px + var(--sar));
      top: calc(10px + var(--sat));
      z-index: 200;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      pointer-events:none;
    }
    .pill{
      pointer-events:none;
      display:inline-flex;
      gap:8px;
      align-items:center;
      border:1px solid var(--stroke);
      background: rgba(2,6,23,.55);
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--muted);
      backdrop-filter: blur(8px);
      white-space:nowrap;
      font-weight:900;
    }
    .pill b{ color: var(--text); }
    .pill .v{ color: var(--text); font-weight:1000; }
    #hudMission{
      position:fixed;
      left: calc(10px + var(--sal));
      right: calc(10px + var(--sar));
      top: calc(60px + var(--sat));
      z-index: 200;
      pointer-events:none;
      display:flex;
      justify-content:center;
    }
    .missionBox{
      max-width: 760px;
      width: 100%;
      border:1px solid rgba(148,163,184,.16);
      background: rgba(2,6,23,.50);
      border-radius: 18px;
      padding: 10px 12px;
      box-shadow: 0 20px 70px rgba(0,0,0,.40);
      backdrop-filter: blur(10px);
    }
    .missionRow{ display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; }
    .missionTitle{ font-weight:1000; letter-spacing:.2px; }
    .missionHint{ color:var(--muted); font-weight:900; font-size:12px; margin-top:2px; }
    .bar{
      height: 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.35);
      overflow:hidden;
      margin-top:8px;
    }
    .fill{
      height:100%;
      width:0%;
      background: rgba(34,197,94,.86);
      transition: width .12s ease;
    }

    /* Targets */
    .tgt{
      position:absolute;
      transform: translate(-50%,-50%);
      font-size: 44px;
      filter: drop-shadow(0 16px 26px rgba(0,0,0,.45));
      user-select:none;
      will-change: transform, opacity, left, top;
      cursor:pointer;
    }
    .tgt.small{ font-size: 40px; }
    .tgt.big{ font-size: 54px; }
    .tgt.pop{ animation: pop .16s ease-out both; }
    @keyframes pop{
      from{ transform: translate(-50%,-50%) scale(.86); }
      to{ transform: translate(-50%,-50%) scale(1); }
    }

    /* End overlay */
    #endOverlay{
      position:fixed;
      inset:0;
      z-index: 500;
      display:none;
      align-items:center;
      justify-content:center;
      padding: calc(16px + var(--sat)) calc(16px + var(--sar)) calc(16px + var(--sab)) calc(16px + var(--sal));
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(8px);
    }
    #endOverlay.show{ display:flex; }
    #endOverlay .panel{
      max-width: 740px;
      width: 100%;
      border:1px solid rgba(148,163,184,.18);
      background: rgba(2,6,23,.72);
      border-radius: 22px;
      padding: 14px;
      box-shadow: 0 24px 90px rgba(0,0,0,.55);
    }
    .endTitle{ font-weight:1000; font-size: 18px; margin:0; }
    .endSub{ color: var(--muted); font-weight:900; font-size: 12px; margin-top:6px; line-height:1.4; }
    .endGrid{ display:grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap:10px; margin-top:10px; }
    @media (max-width:620px){ .endGrid{ grid-template-columns:1fr; } }
    .stat{
      border:1px solid rgba(148,163,184,.16);
      background: rgba(2,6,23,.35);
      border-radius: 16px;
      padding: 10px;
      font-weight:1000;
    }
    .stat small{ display:block; color:var(--muted); font-weight:900; margin-bottom:4px; }
    .endBtns{ display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; justify-content:center; }
    .btn{
      border-radius: 16px;
      border:1px solid rgba(148,163,184,.20);
      background: rgba(148,163,184,.08);
      color: var(--text);
      padding: 12px 12px;
      font-weight:1000;
      cursor:pointer;
      min-height:44px;
    }
    .btn.primary{ background: rgba(59,130,246,.16); border-color: rgba(59,130,246,.30); }
    .btn.ghost{ background: transparent; color: var(--muted); }

    /* Error overlay (no more silent black) */
    #errOverlay{
      position:fixed; inset:0;
      z-index: 999;
      display:none;
      align-items:center;
      justify-content:center;
      padding: 16px;
      background: rgba(0,0,0,.70);
      color: #fff;
    }
    #errOverlay.show{ display:flex; }
    #errOverlay .box{
      max-width: 860px; width:100%;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(2,6,23,.78);
      border-radius: 18px;
      padding: 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      white-space: pre-wrap;
      line-height:1.35;
    }
  </style>
</head>
<body>
  <div id="gj-layer" aria-label="GoodJunk layer"></div>

  <div id="hudTop" aria-label="HUD top">
    <div class="pill"><b>Score</b> <span class="v" id="hud-score">0</span></div>
    <div class="pill"><b>Time</b> <span class="v" id="hud-time">0</span></div>
    <div class="pill"><b>Miss</b> <span class="v" id="hud-miss">0</span></div>
    <div class="pill"><b>Grade</b> <span class="v" id="hud-grade">C</span></div>
    <div class="pill"><b>Goal</b> <span class="v" id="hud-goal">—</span></div>
    <div class="pill"><b>Goal</b> <span class="v"><span id="hud-goal-cur">0</span>/<span id="hud-goal-target">0</span></span></div>
    <div class="pill"><b>Mini</b> <span class="v" id="hud-mini">—</span> <span class="v" id="miniTimer">0</span></div>
    <div class="pill"><b>AI risk</b> <span class="v" id="aiRisk">0.00</span> • <span class="v" id="aiHint">—</span></div>
    <div class="pill"><b>view</b> <span class="v" id="uiView">—</span> • <b>run</b> <span class="v" id="uiRun">—</span> • <b>diff</b> <span class="v" id="uiDiff">—</span></div>
  </div>

  <div id="hudMission" aria-label="Mission">
    <div class="missionBox">
      <div class="missionRow">
        <div>
          <div class="missionTitle" id="missionTitle">WARM-UP</div>
          <div class="missionHint" id="missionHint">—</div>
        </div>
        <div style="text-align:right">
          <div class="missionTitle" id="missionGoal">—</div>
          <div class="missionHint" id="goalDesc">—</div>
        </div>
      </div>
      <div class="bar"><div class="fill" id="missionFill"></div></div>
    </div>
  </div>

  <div id="endOverlay" aria-label="End overlay">
    <div class="panel">
      <h2 class="endTitle" id="endTitle">จบเกม</h2>
      <div class="endSub" id="endSub">—</div>

      <div class="endGrid">
        <div class="stat"><small>Grade</small><div id="endGrade">—</div></div>
        <div class="stat"><small>Score</small><div id="endScore">0</div></div>
        <div class="stat"><small>Miss</small><div id="endMiss">0</div></div>
      </div>

      <div class="endGrid" style="margin-top:10px">
        <div class="stat"><small>Time</small><div id="endTime">0</div></div>
        <div class="stat"><small>Mode</small><div id="endMode">solo</div></div>
        <div class="stat"><small>Diff</small><div id="endDiff">normal</div></div>
      </div>

      <div class="endBtns">
        <button class="btn primary" id="btnAgain">เล่นอีกครั้ง</button>
        <button class="btn ghost" id="btnBackHub">↩ กลับ Hub</button>
      </div>
    </div>
  </div>

  <div id="errOverlay"><div class="box" id="errBox">ERROR</div></div>

  <!-- Optional: Universal VR UI (if you use cVR crosshair shoot) -->
  <script src="../vr/vr-ui.js" defer></script>

  <script type="module">
    const errOverlay = document.getElementById('errOverlay');
    const errBox = document.getElementById('errBox');
    function showErr(e){
      console.error(e);
      errBox.textContent =
`GoodJunkVR: Module error / import fail

${String(e && (e.stack || e.message) || e)}

FIX checklist:
1) /herohealth/vr-goodjunk/goodjunk.safe.js exists?
2) goodjunk-vr.html imports "./goodjunk.safe.js" (same folder)
3) No "Unexpected token export" from non-module script
`;
      errOverlay.classList.add('show');
    }

    try{
      const mod = await import('./goodjunk.safe.js');
      if(!mod || typeof mod.boot !== 'function') throw new Error('Missing export boot() from ./goodjunk.safe.js');
      mod.boot({});
    }catch(e){
      showErr(e);
    }
  </script>
</body>
</html>
