<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk Race Run</title>
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#9fe3ff" />
  <link rel="icon" href="../favicon.ico" />

  <style>
    :root{
      --sky1:#dff4ff;
      --sky2:#bfe8ff;
      --sky3:#fff7d8;
      --panel:#fffdf8ee;
      --panel-2:#ffffffd9;
      --stroke:#bfe3f2;
      --text:#4d4a42;
      --muted:#6b7280;

      --pink:#ff8fc7;
      --pink-2:#ffc5e3;
      --blue:#7fcfff;
      --blue-2:#58b7f5;
      --green:#7ed957;
      --green-2:#58c33f;
      --good:#22c55e;
      --bad:#ef4444;
      --gold:#f59e0b;
      --violet:#cdb9ff;

      --shadow:0 18px 40px rgba(0,0,0,.12);

      --sat: env(safe-area-inset-top, 0px);
      --sar: env(safe-area-inset-right, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
    }

    *{ box-sizing:border-box; }
    html,body{
      margin:0;
      min-height:100%;
      font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans Thai","Noto Sans",Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 10% 0%, rgba(127,207,255,.50), transparent 24%),
        radial-gradient(circle at 88% 0%, rgba(255,212,92,.28), transparent 26%),
        linear-gradient(180deg,var(--sky1),var(--sky2) 58%, var(--sky3));
    }

    body{ overflow:hidden; }

    .page{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      gap:12px;
      padding:
        calc(10px + var(--sat))
        calc(10px + var(--sar))
        calc(12px + var(--sab))
        calc(10px + var(--sal));
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      position:relative;
      z-index:40;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-radius:18px;
      border:1px solid var(--stroke);
      background:var(--panel-2);
      box-shadow:var(--shadow);
    }

    .brand-title{
      font-size:16px;
      font-weight:1100;
      line-height:1.1;
    }

    .brand-sub{
      margin-top:2px;
      color:var(--muted);
      font-size:12px;
      font-weight:900;
    }

    .top-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .btn{
      appearance:none;
      border:1px solid var(--stroke);
      background:#ffffffd8;
      color:var(--text);
      border-radius:14px;
      min-height:42px;
      padding:10px 12px;
      font:inherit;
      font-weight:1000;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      box-shadow:var(--shadow);
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
    }

    .btn.primary{
      background:linear-gradient(180deg,var(--pink),var(--pink-2));
      color:#6b214e;
    }

    .btn.good{
      background:linear-gradient(180deg,var(--green),#a7eb8f);
      color:#134e1f;
    }

    .btn.ghost{
      color:var(--muted);
      background:#ffffffcc;
    }

    .run-shell{
      display:grid;
      grid-template-columns:minmax(290px,380px) 1fr;
      gap:12px;
      min-height:calc(100vh - 96px);
      align-items:start;
    }

    @media (max-width:980px){
      .run-shell{ grid-template-columns:1fr; }
    }

    .race-hud{
      position:relative;
      border-radius:24px;
      border:1px solid var(--stroke);
      background:var(--panel);
      box-shadow:var(--shadow);
      padding:14px;
      display:grid;
      gap:12px;
      z-index:20;
      transition:max-height .18s ease;
    }

    .race-hud-toolbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
    }

    .race-hud-toggle{
      min-width:40px;
      min-height:40px;
      border-radius:12px;
      border:1px solid var(--stroke);
      background:#ffffffd8;
      color:var(--text);
      font-size:18px;
      font-weight:1000;
      cursor:pointer;
    }

    .coach-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:36px;
      padding:6px 12px;
      border-radius:999px;
      border:1px solid #ffe0a9;
      background:#fff8e7;
      color:#9a6500;
      font-size:12px;
      font-weight:1100;
    }

    .race-top{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .race-pill{
      display:inline-flex;
      align-items:center;
      min-height:34px;
      padding:6px 12px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background:#ffffffcf;
      color:var(--text);
      font-size:12px;
      font-weight:1000;
    }

    .race-score{
      border-radius:20px;
      border:1px solid var(--stroke);
      background:linear-gradient(180deg,#fffaf1,#fff);
      padding:14px;
      text-align:center;
    }

    .race-score-label{
      font-size:12px;
      font-weight:1000;
      color:var(--muted);
      letter-spacing:.08em;
    }

    .race-score-value{
      margin-top:6px;
      font-size:40px;
      line-height:1;
      font-weight:1100;
      color:#9a6500;
    }

    .race-stats{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:10px;
    }

    .race-stat,.race-mini{
      border-radius:18px;
      border:1px solid var(--stroke);
      background:#ffffffcc;
      padding:12px;
      text-align:center;
    }

    .race-stat-k,.race-mini-k{
      font-size:12px;
      font-weight:1000;
      color:var(--muted);
    }

    .race-stat-v{
      margin-top:6px;
      font-size:22px;
      line-height:1;
      font-weight:1100;
      color:#244f6d;
    }

    .race-panel{
      border-radius:20px;
      border:1px solid var(--stroke);
      background:#ffffffc9;
      padding:12px;
      display:grid;
      gap:12px;
    }

    .race-item{
      display:flex;
      gap:12px;
      align-items:center;
    }

    .race-item-icon{
      width:64px;
      height:64px;
      border-radius:18px;
      border:1px solid var(--stroke);
      background:#fff;
      display:grid;
      place-items:center;
      overflow:hidden;
    }

    .emoji{
      font-size:34px;
      line-height:1;
    }

    .race-item-title{
      font-size:16px;
      font-weight:1100;
      color:#9a6500;
    }

    .race-item-sub{
      margin-top:4px;
      font-size:13px;
      line-height:1.6;
      color:var(--muted);
      font-weight:900;
    }

    .race-mini-stats{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:10px;
    }

    .race-mini-v{
      margin-top:4px;
      font-size:20px;
      line-height:1;
      font-weight:1100;
      color:#1f5d73;
    }

    .race-tip{
      border-radius:16px;
      border:1px dashed var(--stroke);
      background:#fffaf1;
      padding:10px 12px;
      color:#9a6500;
      font-size:13px;
      line-height:1.6;
      font-weight:1000;
      min-height:46px;
    }

    .race-goal{
      display:grid;
      gap:8px;
    }

    .race-goal-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }

    .race-goal-title{
      font-size:12px;
      font-weight:1100;
      color:var(--muted);
      letter-spacing:.08em;
    }

    .race-goal-value{
      font-size:18px;
      line-height:1;
      font-weight:1100;
      color:#244f6d;
    }

    .race-bar,.race-bar-sub{
      height:12px;
      border-radius:999px;
      background:rgba(191,227,242,.5);
      overflow:hidden;
    }

    .race-bar-fill{
      height:100%;
      width:0%;
      border-radius:999px;
      background:linear-gradient(90deg,#ffd45c,#ffb547);
      transition:width .16s linear;
    }

    .race-bar-sub-fill{
      height:100%;
      width:0%;
      border-radius:999px;
      background:linear-gradient(90deg,var(--blue),#b9ecff);
      transition:width .16s linear;
    }

    .stage-wrap{
      min-width:0;
      border-radius:24px;
      border:1px solid var(--stroke);
      background:#ffffffba;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      overflow:hidden;
      min-height:640px;
      position:relative;
    }

    .stage-head{
      padding:14px 16px;
      border-bottom:1px solid var(--stroke);
      color:#9a6500;
      font-size:14px;
      font-weight:1100;
      letter-spacing:.05em;
      background:#fffaf1;
    }

    .stage-inner{
      position:relative;
      flex:1 1 auto;
      min-height:580px;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,.8), transparent 18%),
        radial-gradient(circle at 80% 8%, rgba(255,255,255,.72), transparent 18%),
        linear-gradient(180deg,#aee6ff 0%, #d9f5ff 54%, #fff5cf 100%);
    }

    #gameMount{
      position:relative;
      width:100%;
      height:100%;
      min-height:580px;
      overflow:hidden;
    }

    .stage-cloud{
      position:absolute;
      background:#fff;
      border-radius:999px;
      box-shadow:0 8px 18px rgba(0,0,0,.06);
      opacity:.8;
      pointer-events:none;
    }

    .stage-cloud.c1{ width:130px;height:42px;left:4%;top:8%; }
    .stage-cloud.c2{ width:95px;height:34px;left:72%;top:11%; }
    .stage-cloud.c3{ width:110px;height:36px;left:38%;top:18%; }

    .stage-ground{
      position:absolute;
      left:0; right:0; bottom:0;
      height:120px;
      background:
        radial-gradient(circle at 20% 40%, rgba(126,217,87,.34), transparent 18%),
        radial-gradient(circle at 72% 44%, rgba(126,217,87,.28), transparent 18%),
        linear-gradient(180deg,#b3f28f,#88d96b);
      border-top:1px solid rgba(88,195,63,.26);
      pointer-events:none;
    }

    .race-result-mount{
      position:fixed;
      inset:0;
      z-index:99999;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      background:rgba(245,252,255,.96);
      overflow:auto;
    }

    .race-result-card{
      width:min(1100px,100%);
      max-height:min(92vh,1020px);
      overflow:auto;
      border-radius:28px;
      border:1px solid var(--stroke);
      background:#fffdf8;
      box-shadow:0 28px 80px rgba(0,0,0,.22);
      padding:18px;
      display:grid;
      gap:14px;
      position:relative;
    }

    .race-summary-kicker{
      display:inline-flex;
      align-items:center;
      min-height:32px;
      padding:6px 12px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background:#f4fbff;
      color:#658cb1;
      font-size:12px;
      font-weight:1100;
    }

    .race-result-title{
      font-size:28px;
      line-height:1.15;
      font-weight:1100;
      color:#9a6500;
    }

    .race-result-sub{
      color:var(--muted);
      font-size:14px;
      line-height:1.6;
      font-weight:900;
    }

    .race-top-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:12px;
    }

    .race-top-card,
    .race-stat-card,
    .race-standings-card{
      border-radius:18px;
      border:2px solid #cde7f4;
      background:#fff;
      padding:14px;
    }

    .race-top-k{
      font-size:12px;
      color:#79aeca;
      font-weight:1000;
      text-align:center;
    }

    .race-top-name{
      margin-top:8px;
      font-size:14px;
      color:#6d6b63;
