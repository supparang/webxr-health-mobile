<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk Race</title>
  <meta name="color-scheme" content="light" />
  <link rel="icon" href="../favicon.ico" />
  <style>
    :root{
      --sky1:#dff4ff;
      --sky2:#bfe8ff;
      --sky3:#fff7d8;
      --card:#fffdf6;
      --card2:#f8fff3;
      --line:#bfe3f2;
      --text:#4d4a42;
      --muted:#7b7a72;
      --green:#7ed957;
      --green2:#58c33f;
      --blue:#7fcfff;
      --blue2:#58b7f5;
      --yellow:#ffd45c;
      --orange:#ffb547;
      --violet:#cdb9ff;
      --shadow:0 18px 40px rgba(86,155,194,.16);

      --sat:env(safe-area-inset-top,0px);
      --sar:env(safe-area-inset-right,0px);
      --sab:env(safe-area-inset-bottom,0px);
      --sal:env(safe-area-inset-left,0px);
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      min-height:100%;
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 12% 10%, rgba(255,255,255,.92), transparent 18%),
        radial-gradient(circle at 86% 14%, rgba(255,255,255,.78), transparent 16%),
        linear-gradient(180deg,var(--sky1),var(--sky2) 54%, var(--sky3));
      overflow:hidden;
    }

    body{ min-height:100dvh; }

    #app{
      position:relative;
      width:100vw;
      height:100dvh;
      overflow:hidden;
      isolation:isolate;
    }

    #gameMount{
      position:absolute;
      inset:0;
      z-index:1;
      overflow:hidden;
    }

    .shell{
      position:absolute;
      inset:0;
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:12px;
      padding:
        calc(12px + var(--sat))
        calc(12px + var(--sar))
        calc(12px + var(--sab))
        calc(12px + var(--sal));
      pointer-events:none;
      z-index:0;
    }

    .top{
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      align-items:flex-start;
    }

    .hero-card{
      max-width:min(780px,100%);
      background:linear-gradient(180deg,#fffef9,#f7fff4);
      border:3px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:18px 16px;
      position:relative;
      overflow:hidden;
    }

    .hero-card::before{
      content:"";
      position:absolute;
      left:-36px;
      top:-36px;
      width:140px;
      height:140px;
      border-radius:999px;
      background:rgba(127,207,255,.20);
      filter:blur(8px);
    }

    .hero-card::after{
      content:"";
      position:absolute;
      right:-26px;
      bottom:-26px;
      width:120px;
      height:120px;
      border-radius:999px;
      background:rgba(255,212,92,.22);
      filter:blur(8px);
    }

    .kicker{
      position:relative;
      z-index:1;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 14px;
      border-radius:999px;
      background:#eaf8ff;
      border:2px solid var(--line);
      color:#5ea8d0;
      font-size:13px;
      font-weight:1000;
      margin-bottom:10px;
    }

    h1{
      position:relative;
      z-index:1;
      margin:0 0 6px;
      font-size:clamp(28px,5vw,42px);
      line-height:1.05;
      font-weight:1000;
      color:#67a91c;
      text-shadow:0 2px 0 #fff;
    }

    .sub{
      position:relative;
      z-index:1;
      margin:0;
      color:var(--muted);
      line-height:1.7;
      font-size:14px;
      font-weight:900;
      max-width:720px;
    }

    .side{
      display:grid;
      gap:8px;
      align-content:start;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      border:2px solid var(--line);
      background:#fff;
      color:#6c6a61;
      font-size:12px;
      font-weight:1000;
      box-shadow:0 8px 18px rgba(86,155,194,.10);
      width:max-content;
      max-width:100%;
    }

    .status-card{
      align-self:end;
      background:linear-gradient(180deg,#fffef9,#f7fff4);
      border:3px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:12px 14px;
      color:var(--muted);
      font-size:13px;
      font-weight:900;
      line-height:1.6;
      pointer-events:auto;
      max-width:min(880px,100%);
    }

    .status-title{
      color:#67a91c;
      font-size:14px;
      font-weight:1000;
      margin-bottom:4px;
    }

    .status-sub{
      margin-top:6px;
      color:#8b887f;
      font-size:12px;
      line-height:1.55;
      font-weight:900;
    }

    .debug{
      margin-top:8px;
      padding-top:8px;
      border-top:1px dashed rgba(191,227,242,.95);
      white-space:pre-wrap;
      word-break:break-word;
      font-size:11px;
      color:#8a8a82;
      max-height:140px;
      overflow:auto;
    }

    .error{
      color:#b45309;
      white-space:pre-wrap;
      word-break:break-word;
    }

    @media (max-width:780px){
      .top{ align-items:stretch; }
      .side{ width:100%; }
      .pill{ width:100%; justify-content:center; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="gameMount"></div>

    <div class="shell">
      <div class="top">
        <div class="hero-card">
          <div class="kicker">🏁 GOODJUNK RACE</div>
          <h1>Race Run</h1>
          <p class="sub">
            แข่งกันเก็บอาหารดีให้ได้คะแนนมากที่สุด ใช้ room code เดียวกันข้ามเครื่องได้
          </p>
        </div>

        <div class="side">
          <div class="pill" id="pillRoom">ROOM • -</div>
          <div class="pill" id="pillPlayer">PLAYER • -</div>
          <div class="pill" id="pillRole">ROLE • player</div>
          <div class="pill" id="pillDiff">DIFF • normal</div>
          <div class="pill" id="pillTime">TIME • 120</div>
        </div>
      </div>

      <div></div>

      <div class="status-card" id="engineStatusCard">
        <div class="status-title" id="engineStatusTitle">กำลังเตรียมเกม…</div>
        <div id="engineStatusText">กำลังโหลด race engine</div>
        <div class="status-sub" id="engineStatusSub">รองรับทั้ง classic / module และ override path ผ่าน query</div>
        <div class="debug" id="engineDebugInfo"></div>
      </div>
    </div>
  </div>

  <script>
    (function(){
      const q = new URLSearchParams(location.search);

      const MODE = 'race';
      const MODE_LABEL = 'Race';

      const DEFAULT_ENGINE_CANDIDATES = [
        './goodjunk-race.safe.js',
        './goodjunk-race.js',
        './goodjunk-race-run.safe.js',
        './goodjunk-race-run.js',
        './race.safe.js',
        './race.js',
        './js/goodjunk-race.safe.js',
        './js/goodjunk-race.js',
        './js/goodjunk-race-run.safe.js',
        './js/goodjunk-race-run.js',
        './js/race.safe.js',
        './js/race.js'
      ];

      function qs(key, fb=''){
        return q.get(key) ?? fb;
      }

      function clean(v){
        return String(v || '').trim();
      }

      function dedupe(arr){
        const out = [];
        const seen = new Set();
        for (const item of arr || []) {
          const s = clean(item);
          if (!s || seen.has(s)) continue;
          seen.add(s);
          out.push(s);
        }
        return out;
      }

      function parseList(text){
        return String(text || '')
          .split(',')
          .map(s => clean(s))
          .filter(Boolean);
      }

      function resolveHub(){
        try{
          return qs('hub') || new URL('../hub.html', location.href).toString();
        }catch{
          return '../hub.html';
        }
      }

      window.HHA_CLOUD_ENDPOINT =
        clean(
          qs('api') ||
          window.HHA_CLOUD_ENDPOINT ||
          'https://script.google.com/macros/s/AKfycbwNOpsjFTV_nK0PzNV23KziF5hZxIMI50P8o_vZgwVg_T4anpXZOaKQUy_uf5PPg9kT6Q/exec'
        );

      const runCtx = {
        pid: qs('pid', 'anon'),
        name: qs('name', ''),
        studyId: qs('studyId', ''),
        roomId: qs('roomId') || qs('room') || '',
        role: qs('role', 'player'),
        mode: MODE,
        diff: qs('diff', 'normal'),
        time: qs('time', '120'),
        seed: qs('seed', String(Date.now())),
        startAt: 0,
        hub: resolveHub(),
        view: qs('view', 'mobile'),
        run: qs('run', 'play'),
        gameId: qs('gameId', 'goodjunk')
      };

      window.__GJ_RUN_CTX__ = runCtx;
      window.__GJ_MULTI_RUN_CTX__ = runCtx;

      const ENGINE_CANDIDATES = dedupe([
        clean(qs('engine')),
        ...parseList(qs('engineCandidates')),
        ...DEFAULT_ENGINE_CANDIDATES
      ]);

      const $ = (id) => document.getElementById(id);

      $('pillRoom').textContent = `ROOM • ${runCtx.roomId || '-'}`;
      $('pillPlayer').textContent = `PLAYER • ${runCtx.name || runCtx.pid || '-'}`;
      $('pillRole').textContent = `ROLE • ${runCtx.role || 'player'}`;
      $('pillDiff').textContent = `DIFF • ${runCtx.diff}`;
      $('pillTime').textContent = `TIME • ${runCtx.time}`;

      $('engineDebugInfo').textContent =
        '[MODE] ' + MODE + '\n' +
        '[PID] ' + (runCtx.pid || '-') + '\n' +
        '[ROOM] ' + (runCtx.roomId || '-') + '\n' +
        '[API] ' + (window.HHA_CLOUD_ENDPOINT || '-') + '\n\n' +
        '[CANDIDATES]\n' + ENGINE_CANDIDATES.join('\n');

      function setStatus(title, text, isError = false) {
        $('engineStatusTitle').textContent = title;
        $('engineStatusText').textContent = text;
        $('engineStatusText').className = isError ? 'error' : '';
      }

      function setDebug(text) {
        $('engineDebugInfo').textContent = text;
      }

      function hideStatusCardSoon() {
        const card = $('engineStatusCard');
        if (!card) return;
        setTimeout(() => {
          card.style.display = 'none';
        }, 1200);
      }

      function loadScriptWithType(src, type) {
        return new Promise((resolve, reject) => {
          const s = document.createElement('script');
          if (type === 'module') s.type = 'module';
          s.src = new URL(src, location.href).toString();
          s.async = true;
          s.onload = () => resolve({ src, type });
          s.onerror = () => reject(new Error(`โหลด script ไม่สำเร็จ: ${src} [${type}]`));
          document.body.appendChild(s);
        });
      }

      async function tryLoad(src) {
        try {
          setStatus('กำลังโหลดเกม…', `ลองโหลด ${src} (classic)`);
          return await loadScriptWithType(src, 'classic');
        } catch (e1) {
          try {
            setStatus('กำลังโหลดเกม…', `ลองโหลด ${src} (module)`);
            return await loadScriptWithType(src, 'module');
          } catch (e2) {
            throw new Error(
              `${src}\n- classic: ${String(e1 && e1.message ? e1.message : e1)}\n- module: ${String(e2 && e2.message ? e2.message : e2)}`
            );
          }
        }
      }

      async function loadEngine() {
        if (!ENGINE_CANDIDATES.length) {
          setStatus('ไม่พบ candidate', 'ไม่มี candidate engine ให้ลองโหลด', true);
          return;
        }

        const errors = [];

        for (const src of ENGINE_CANDIDATES) {
          try {
            const result = await tryLoad(src);

            window.__GJ_MULTI_ENGINE_INFO__ = {
              mode: MODE,
              label: MODE_LABEL,
              src: result.src,
              type: result.type,
              loadedAt: Date.now()
            };

            setStatus('เข้าเกมแล้ว', `${MODE_LABEL} engine loaded: ${result.src} (${result.type})`);
            setDebug(
              '[SUCCESS]\n' +
              'src: ' + result.src + '\n' +
              'type: ' + result.type + '\n' +
              'room: ' + (runCtx.roomId || '-') + '\n' +
              'player: ' + (runCtx.name || runCtx.pid || '-') + '\n' +
              'role: ' + (runCtx.role || 'player')
            );

            console.log('[GJ-RACE-RUN] loaded engine', result.src, runCtx);
            hideStatusCardSoon();
            return;
          } catch (err) {
            const msg = String(err && err.message ? err.message : err);
            errors.push(msg);
            console.warn('[GJ-RACE-RUN] candidate failed', src, err);
          }
        }

        setStatus(
          'ไม่พบไฟล์ engine',
          `หา race engine ไม่เจอ\nลองแก้ ?engine=... หรือ ?engineCandidates=... ให้ตรงกับไฟล์จริง`,
          true
        );

        setDebug(
          '[FAILED CANDIDATES]\n' +
          ENGINE_CANDIDATES.join('\n') +
          '\n\n[ERRORS]\n' +
          errors.join('\n\n')
        );
      }

      loadEngine();
    })();
  </script>
</body>
</html>
