<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk Solo Boss</title>
  <meta name="theme-color" content="#9fe3ff" />
  <link rel="icon" href="../favicon.ico" />
  <style>
    html,body{
      margin:0;
      width:100%;
      min-height:100%;
      background:#071225;
    }
    body{
      min-height:100dvh;
    }
    #gameMount{
      min-height:100dvh;
    }
    .boot-fallback{
      position:fixed;
      inset:0;
      display:grid;
      place-items:center;
      background:linear-gradient(180deg,#dff4ff,#bfe8ff 54%,#fff7d8);
      color:#4d4a42;
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      z-index:1;
    }
    .boot-card{
      width:min(92vw,560px);
      padding:24px 20px;
      border-radius:28px;
      background:rgba(255,255,255,.88);
      border:3px solid #bfe3f2;
      box-shadow:0 18px 40px rgba(86,155,194,.16);
      text-align:center;
    }
    .boot-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:34px;
      padding:6px 12px;
      border-radius:999px;
      background:#eaf8ff;
      border:2px solid #bfe3f2;
      color:#5ea8d0;
      font-size:12px;
      font-weight:1000;
    }
    .boot-emoji{
      margin:14px auto 8px;
      width:94px;
      height:94px;
      border-radius:24px;
      display:grid;
      place-items:center;
      font-size:46px;
      background:linear-gradient(180deg,#fff3de,#ffe0b8);
      border:3px solid #ffd89b;
    }
    .boot-title{
      margin:0;
      font-size:30px;
      line-height:1.06;
      font-weight:1000;
      color:#67a91c;
    }
    .boot-sub{
      margin:10px 0 0;
      font-size:14px;
      line-height:1.65;
      color:#7b7a72;
      font-weight:900;
    }
  </style>
</head>
<body>
  <div id="gameMount"></div>

  <div class="boot-fallback" id="bootFallback">
    <div class="boot-card">
      <div class="boot-badge">GOODJUNK SOLO BOSS • HNZS</div>
      <div class="boot-emoji">🍎</div>
      <h1 class="boot-title">กำลังเตรียมลุยกับ Junk King!</h1>
      <p class="boot-sub">
        หน้าใหม่นี้จะเรียก GoodJunk Solo Boss ผ่าน HNZS shell และ adapter
      </p>
    </div>
  </div>

  <script type="module">
    import { bootNutritionShell } from '../shared/nutrition/nutrition-shell.js';
    import { createGoodJunkModeAdapter } from './goodjunk.adapter.js';

    const q = new URLSearchParams(location.search);

    function cleanPid(v){
      return String(v || 'anon').trim().replace(/[^\w-]/g,'').slice(0,40) || 'anon';
    }

    function cleanName(v){
      return String(v || '').trim().replace(/[<>]/g,'').slice(0,40);
    }

    function cleanEnum(v, allow, fallback){
      v = String(v || '').trim().toLowerCase();
      return allow.includes(v) ? v : fallback;
    }

    function numIn(v, fallback, min, max){
      v = Number(v);
      if (!Number.isFinite(v)) return fallback;
      return Math.max(min, Math.min(max, v));
    }

    const ctxPatch = {
      pid: cleanPid(q.get('pid') || 'anon'),
      name: cleanName(q.get('name') || q.get('nickName') || 'Hero'),
      studyId: String(q.get('studyId') || ''),
      diff: cleanEnum(q.get('diff') || 'normal', ['easy','normal','hard'], 'normal'),
      time: numIn(q.get('time') || 150, 150, 90, 300),
      seed: String(q.get('seed') || Date.now()),
      view: cleanEnum(q.get('view') || 'mobile', ['mobile','pc','cvr','vr'], 'mobile'),
      run: cleanEnum(q.get('run') || 'play', ['play','research','demo'], 'play'),
      zone: 'nutrition',
      cat: 'nutrition',
      game: 'goodjunk',
      gameId: 'goodjunk',
      mode: 'solo'
    };

    const fallback = document.getElementById('bootFallback');

    try {
      await bootNutritionShell({
        gameId: 'goodjunk',
        gameTitle: 'GoodJunk Solo Boss',
        mode: 'solo',
        mountSelector: '#gameMount',
        adapterFactory: async (baseCtx, shell) => {
          const mergedCtx = { ...baseCtx, ...ctxPatch, mode: 'solo' };
          return createGoodJunkModeAdapter(mergedCtx, shell);
        },
        onAfterMount() {
          if (fallback) fallback.style.display = 'none';
        }
      });

      window.__GJ_ENGINE_MOUNTED__ = true;
    } catch (err) {
      console.error(err);
      if (fallback) {
        fallback.innerHTML = `
          <div class="boot-card">
            <div class="boot-badge">LOAD ERROR</div>
            <div class="boot-emoji">⚠️</div>
            <h1 class="boot-title">โหลด GoodJunk Solo Boss ไม่สำเร็จ</h1>
            <p class="boot-sub">${String(err && err.message ? err.message : err)}</p>
          </div>
        `;
      }
    }
  </script>
</body>
</html>
