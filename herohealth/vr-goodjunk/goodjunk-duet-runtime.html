<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk Duet Runtime</title>
  <meta name="theme-color" content="#9fe3ff" />
  <link rel="icon" href="../favicon.ico" />
  <style>
    :root{
      --sky1:#dff4ff;
      --sky2:#bfe8ff;
      --sky3:#fff7d8;

      --card:#fffef9;
      --card2:#f7fff4;
      --line:#bfe3f2;
      --text:#4d4a42;
      --muted:#7b7a72;

      --green:#7ed957;
      --green2:#58c33f;
      --blue:#7fcfff;
      --blue2:#58b7f5;
      --yellow:#ffd45c;
      --yellow2:#ffb84d;
      --red:#ffb5b5;
      --red2:#ff8e8e;

      --shadow:0 18px 40px rgba(86,155,194,.16);

      --sat:env(safe-area-inset-top,0px);
      --sar:env(safe-area-inset-right,0px);
      --sab:env(safe-area-inset-bottom,0px);
      --sal:env(safe-area-inset-left,0px);
    }

    *{ box-sizing:border-box; }
    html,body{
      margin:0;
      min-height:100%;
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 12% 8%, rgba(255,255,255,.84), transparent 18%),
        radial-gradient(circle at 86% 10%, rgba(255,255,255,.72), transparent 18%),
        linear-gradient(180deg,var(--sky1),var(--sky2) 54%, var(--sky3));
      overflow:hidden;
    }

    body{ min-height:100dvh; }

    #app{
      position:relative;
      width:100vw;
      height:100dvh;
      overflow:hidden;
      isolation:isolate;
      user-select:none;
      -webkit-user-select:none;
      touch-action:manipulation;
    }

    .bg-clouds{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:0;
      overflow:hidden;
    }

    .cloud{
      position:absolute;
      border-radius:999px;
      background:rgba(255,255,255,.70);
      filter:blur(1px);
      box-shadow:
        50px 8px 0 8px rgba(255,255,255,.65),
        100px 0 0 0 rgba(255,255,255,.72),
        70px -10px 0 4px rgba(255,255,255,.65);
      animation:floatCloud linear infinite;
    }

    .cloud.c1{ width:110px; height:34px; left:6%; top:9%; animation-duration:26s; }
    .cloud.c2{ width:150px; height:40px; left:66%; top:12%; animation-duration:34s; }
    .cloud.c3{ width:100px; height:30px; left:28%; top:22%; animation-duration:30s; }

    @keyframes floatCloud{
      from{ transform:translateX(-5vw); }
      to{ transform:translateX(12vw); }
    }

    .ground{
      position:absolute;
      left:0; right:0; bottom:0;
      height:18%;
      background:linear-gradient(180deg,#94e361,#67c94c);
      box-shadow:inset 0 4px 0 rgba(255,255,255,.24);
      z-index:1;
      pointer-events:none;
    }

    #stage{
      position:absolute;
      inset:0;
      z-index:2;
      overflow:hidden;
    }

    .hud{
      position:absolute;
      left:10px;
      right:10px;
      top:calc(8px + var(--sat));
      z-index:10;
      display:grid;
      gap:8px;
      pointer-events:none;
    }

    .hud-grid{
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:8px;
    }

    .pill{
      min-height:40px;
      border-radius:999px;
      border:3px solid var(--line);
      background:rgba(255,255,255,.92);
      box-shadow:0 8px 18px rgba(86,155,194,.10);
      color:#5d5a52;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:8px 10px;
      font-size:14px;
      font-weight:1000;
      line-height:1.15;
    }

    .banner{
      justify-self:center;
      min-height:42px;
      max-width:min(90vw,420px);
      border-radius:999px;
      border:3px solid var(--line);
      background:#fff;
      box-shadow:0 8px 18px rgba(86,155,194,.10);
      color:#6b675f;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:10px 16px;
      font-size:14px;
      font-weight:1000;
      opacity:0;
      transform:translateY(-4px);
      transition:.18s ease;
    }

    .banner.show{
      opacity:1;
      transform:translateY(0);
    }

    .progress{
      height:10px;
      border-radius:999px;
      border:3px solid var(--line);
      background:rgba(255,255,255,.88);
      overflow:hidden;
      box-shadow:0 8px 18px rgba(86,155,194,.08);
    }

    .progress > div{
      height:100%;
      width:100%;
      transform-origin:left center;
      background:linear-gradient(90deg,var(--blue),var(--green));
    }

    .bottom-actions{
      position:absolute;
      right:14px;
      bottom:calc(12px + var(--sab));
      z-index:12;
      display:flex;
      gap:10px;
    }

    .btn{
      appearance:none;
      border:none;
      cursor:pointer;
      min-height:50px;
      min-width:140px;
      border-radius:18px;
      padding:12px 16px;
      font-size:15px;
      font-weight:1000;
      box-shadow:var(--shadow);
    }

    .btn.pause{
      background:linear-gradient(180deg,var(--blue),var(--blue2));
      color:#08374d;
    }

    .btn.finish{
      background:linear-gradient(180deg,var(--green),var(--green2));
      color:#14370b;
    }

    .item{
      position:absolute;
      width:84px;
      height:100px;
      border:none;
      cursor:pointer;
      border-radius:22px;
      background:rgba(255,255,255,.92);
      box-shadow:0 12px 26px rgba(86,155,194,.18);
      border:3px solid rgba(191,227,242,.95);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      color:#333;
      will-change:transform, top, left;
      z-index:3;
    }

    .item.good{
      background:linear-gradient(180deg,#f7fff1,#ffffff);
    }

    .item.junk{
      background:linear-gradient(180deg,#fff3f3,#ffffff);
      border-color:#ffd3d3;
    }

    .item .emoji{
      font-size:42px;
      line-height:1;
      pointer-events:none;
    }

    .item .label{
      font-size:11px;
      font-weight:1000;
      line-height:1;
      color:#5b574f;
      pointer-events:none;
    }

    .fx{
      position:absolute;
      transform:translate(-50%,-50%);
      z-index:14;
      font-size:18px;
      font-weight:1000;
      pointer-events:none;
      text-shadow:0 8px 18px rgba(0,0,0,.12);
      animation:fxFloat .8s ease forwards;
    }

    @keyframes fxFloat{
      from{ opacity:1; transform:translate(-50%,-10%); }
      to{ opacity:0; transform:translate(-50%,-150%); }
    }

    .pause-overlay,
    .gjduet-summary{
      position:fixed;
      inset:0;
      z-index:99999;
      display:none;
      place-items:center;
      padding:16px;
      background:rgba(255,255,255,.24);
      backdrop-filter:blur(6px);
    }

    .pause-overlay.show,
    .gjduet-summary.show{
      display:grid;
    }

    .pause-card,
    .gjduet-card{
      width:min(94vw,700px);
      max-height:88vh;
      overflow:auto;
      border-radius:28px;
      border:4px solid #bfe3f2;
      background:linear-gradient(180deg,#fffef8,#f8fff3);
      box-shadow:0 24px 52px rgba(86,155,194,.22);
      padding:18px;
      color:#55514a;
    }

    .pause-title{
      margin:0;
      text-align:center;
      font-size:34px;
      line-height:1.05;
      color:#67a91c;
      font-weight:1000;
    }

    .pause-sub{
      margin-top:8px;
      text-align:center;
      font-size:15px;
      color:#7b7a72;
      font-weight:1000;
      line-height:1.55;
    }

    .pause-actions{
      display:grid;
      gap:10px;
      margin-top:14px;
    }

    .pause-actions .btn{
      width:100%;
    }

    .gjduet-head{
      text-align:center;
      margin-bottom:14px;
    }

    .gjduet-medal{
      width:96px;
      height:96px;
      margin:0 auto 10px;
      border-radius:28px;
      display:grid;
      place-items:center;
      font-size:44px;
      background:linear-gradient(180deg,#fff8d8,#fffef6);
      border:3px solid #ffe08a;
      box-shadow:0 12px 24px rgba(86,155,194,.14);
    }

    .gjduet-grade{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:110px;
      min-height:44px;
      padding:8px 16px;
      border-radius:999px;
      background:#fff;
      border:3px solid #d7edf7;
      font-size:24px;
      font-weight:1000;
    }

    .gjduet-title{
      margin:10px 0 6px;
      font-size:34px;
      line-height:1.05;
      color:#67a91c;
      font-weight:1000;
    }

    .gjduet-sub{
      font-size:15px;
      color:#7b7a72;
      font-weight:1000;
    }

    .gjduet-stars{
      margin-top:10px;
      font-size:28px;
      line-height:1;
    }

    .gjduet-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
      margin-top:14px;
    }

    .gjduet-stat{
      border-radius:18px;
      background:#fff;
      border:3px solid #d7edf7;
      padding:12px;
    }

    .gjduet-stat .k{
      font-size:12px;
      color:#7b7a72;
      font-weight:1000;
    }

    .gjduet-stat .v{
      margin-top:6px;
      font-size:28px;
      font-weight:1000;
      line-height:1.2;
    }

    .gjduet-note{
      margin-top:12px;
      border-radius:18px;
      border:3px solid #d7edf7;
      background:#fff;
      padding:12px 14px;
      font-size:14px;
      line-height:1.55;
      font-weight:1000;
      color:#6b675f;
    }

    .gjduet-actions{
      display:grid;
      gap:10px;
      margin-top:14px;
    }

    .gjduet-btn{
      appearance:none;
      border:none;
      cursor:pointer;
      min-height:50px;
      border-radius:18px;
      font-size:16px;
      font-weight:1000;
      box-shadow:0 10px 18px rgba(86,155,194,.10);
    }

    .gjduet-btn.replay{
      background:linear-gradient(180deg,#7ed957,#58c33f);
      color:#173b0b;
    }

    .gjduet-btn.hub{
      background:#fff;
      border:3px solid #d7edf7;
      color:#6c6a61;
    }

    @media (max-width:820px){
      .hud-grid{
        grid-template-columns:repeat(2,minmax(0,1fr));
      }
      .item{
        width:74px;
        height:92px;
      }
      .item .emoji{
        font-size:38px;
      }
    }

    @media (max-width:640px){
      .hud-grid{
        grid-template-columns:repeat(2,minmax(0,1fr));
        gap:7px;
      }
      .pill{
        min-height:38px;
        font-size:13px;
        padding:8px;
      }
      .bottom-actions{
        right:12px;
        left:auto;
        bottom:calc(10px + var(--sab));
      }
      .btn{
        min-width:136px;
        min-height:48px;
      }
      .gjduet-grid{
        grid-template-columns:1fr;
      }
      .gjduet-title,
      .pause-title{
        font-size:28px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="bg-clouds" aria-hidden="true">
      <div class="cloud c1"></div>
      <div class="cloud c2"></div>
      <div class="cloud c3"></div>
    </div>

    <div class="ground"></div>
    <div id="stage"></div>

    <div class="hud">
      <div class="hud-grid">
        <div class="pill" id="hudMode">🤝 DUET</div>
        <div class="pill" id="hudScore">Score • 0</div>
        <div class="pill" id="hudTime">Time • 0:00</div>
        <div class="pill" id="hudMiss">Miss • 0</div>
        <div class="pill" id="hudStreak">Streak • 0</div>
      </div>

      <div class="banner" id="hudBanner">เก็บ good ต่อไป!</div>

      <div class="progress">
        <div id="hudProgressFill"></div>
      </div>
    </div>

    <div class="bottom-actions">
      <button id="btnPause" class="btn pause" type="button">⏸ Pause</button>
      <button id="btnFinish" class="btn finish" type="button">✅ จบเกม</button>
    </div>
  </div>

  <div id="pauseOverlay" class="pause-overlay" aria-hidden="true">
    <div class="pause-card">
      <h2 class="pause-title">พักก่อนนะ</h2>
      <div class="pause-sub" id="pauseSub">เกมถูกหยุดไว้ชั่วคราว กดเล่นต่อได้เมื่อพร้อม</div>
      <div class="pause-actions">
        <button id="btnResume" class="btn finish" type="button">▶️ เล่นต่อ</button>
        <button id="btnBackHubFromPause" class="btn pause" type="button">🏠 กลับ Hub</button>
      </div>
    </div>
  </div>

  <div id="gjduetSummary" class="gjduet-summary" aria-hidden="true">
    <div class="gjduet-card">
      <div class="gjduet-head">
        <div id="gjduetMedal" class="gjduet-medal">🥈</div>
        <div id="gjduetGrade" class="gjduet-grade">B</div>
        <div id="gjduetTitle" class="gjduet-title">Great Job!</div>
        <div id="gjduetSub" class="gjduet-sub">จบเกมแล้ว มาดูผลงานรอบนี้กัน</div>
        <div id="gjduetStars" class="gjduet-stars">⭐⭐</div>
      </div>

      <div id="gjduetGrid" class="gjduet-grid"></div>

      <div id="gjduetNote" class="gjduet-note">
        บันทึกผลเกมเรียบร้อยแล้ว
      </div>

      <div class="gjduet-actions">
        <button id="gjduetReplay" class="gjduet-btn replay" type="button">🔁 เล่นอีกครั้ง</button>
        <button id="gjduetHub" class="gjduet-btn hub" type="button">🏠 กลับ Hub</button>
      </div>
    </div>
  </div>

  <script>
    (function(){
      'use strict';

      const q = new URLSearchParams(location.search);
      const $ = (id) => document.getElementById(id);

      const GOOD = ['🍎','🍌','🍉','🥕','🥦','🐟','🥛','🍓','🥗','🍊'];
      const JUNK = ['🍔','🍟','🍩','🍫','🧁','🍕','🥤','🍭'];

      const DIFF = {
        easy:   { spawnEvery: 980, speedMin: 90,  speedMax: 145, goodRatio: 0.74, goodScore: 12, junkPenalty: 6 },
        normal: { spawnEvery: 820, speedMin: 110, speedMax: 175, goodRatio: 0.68, goodScore: 10, junkPenalty: 8 },
        hard:   { spawnEvery: 700, speedMin: 130, speedMax: 210, goodRatio: 0.62, goodScore: 9,  junkPenalty: 10 }
      };

      const diffKey = DIFF[q.get('diff')] ? q.get('diff') : 'normal';
      const cfg = DIFF[diffKey];

      const state = {
        pid: q.get('pid') || 'anon',
        name: q.get('name') || q.get('nick') || q.get('nickName') || 'Hero',
        roomId: q.get('roomId') || q.get('room') || '',
        role: q.get('role') || 'player',
        diff: diffKey,
        run: q.get('run') || 'play',
        view: q.get('view') || 'mobile',
        hub: q.get('hub') || 'https://supparang.github.io/webxr-health-mobile/herohealth/hub.html',
        gameId: q.get('gameId') || 'goodjunk',
        mode: 'duet',

        running: false,
        paused: false,
        inputLocked: false,
        spawnEnabled: true,

        timeTotal: Math.max(30, Number(q.get('time') || 90)) * 1000,
        timeLeft: Math.max(30, Number(q.get('time') || 90)) * 1000,

        score: 0,
        miss: 0,
        streak: 0,
        bestStreak: 0,
        goodHits: 0,
        junkHits: 0,

        raf: 0,
        lastTs: 0,
        spawnAcc: 0,
        seq: 0,

        items: new Map(),
        _timers: []
      };

      window.state = state;

      const DUET_END = {
        ending: false,
        ended: false,
        summaryShown: false,
        reason: '',
        finalSummary: null
      };

      const ui = {
        app: $('app'),
        stage: $('stage'),
        hudMode: $('hudMode'),
        hudScore: $('hudScore'),
        hudTime: $('hudTime'),
        hudMiss: $('hudMiss'),
        hudStreak: $('hudStreak'),
        hudBanner: $('hudBanner'),
        hudProgressFill: $('hudProgressFill'),

        btnPause: $('btnPause'),
        btnFinish: $('btnFinish'),

        pauseOverlay: $('pauseOverlay'),
        pauseSub: $('pauseSub'),
        btnResume: $('btnResume'),
        btnBackHubFromPause: $('btnBackHubFromPause'),

        sumRoot: $('gjduetSummary'),
        sumMedal: $('gjduetMedal'),
        sumGrade: $('gjduetGrade'),
        sumTitle: $('gjduetTitle'),
        sumSub: $('gjduetSub'),
        sumStars: $('gjduetStars'),
        sumGrid: $('gjduetGrid'),
        sumNote: $('gjduetNote'),
        btnReplay: $('gjduetReplay'),
        btnHub: $('gjduetHub')
      };

      function safeNum(v, d = 0){
        const n = Number(v);
        return Number.isFinite(n) ? n : d;
      }

      function fmtTime(ms){
        const total = Math.max(0, Math.ceil(ms / 1000));
        const m = Math.floor(total / 60);
        const s = total % 60;
        return m + ':' + String(s).padStart(2, '0');
      }

      function stageRect(){
        return ui.stage.getBoundingClientRect();
      }

      function rand(min, max){
        return min + Math.random() * (max - min);
      }

      function pick(arr){
        return arr[Math.floor(Math.random() * arr.length)];
      }

      function safeTimeout(fn, ms){
        const id = setTimeout(() => {
          try { fn(); } catch (_) {}
          const idx = state._timers.indexOf(id);
          if (idx >= 0) state._timers.splice(idx, 1);
        }, ms);
        state._timers.push(id);
        return id;
      }

      function clearSafeTimer(id){
        try { clearTimeout(id); } catch(_) {}
        try { clearInterval(id); } catch(_) {}
      }

      function clearRuntimeTimers(){
        state._timers.forEach(clearSafeTimer);
        state._timers.length = 0;
      }

      function showBanner(text, ms = 900){
        ui.hudBanner.textContent = text;
        ui.hudBanner.classList.add('show');

        if (showBanner._t) clearSafeTimer(showBanner._t);
        showBanner._t = safeTimeout(() => {
          ui.hudBanner.classList.remove('show');
        }, ms);
      }

      function renderHud(){
        ui.hudMode.textContent = '🤝 DUET';
        ui.hudScore.textContent = `Score • ${state.score}`;
        ui.hudTime.textContent = `Time • ${fmtTime(state.timeLeft)}`;
        ui.hudMiss.textContent = `Miss • ${state.miss}`;
        ui.hudStreak.textContent = `Streak • ${state.streak}`;
        ui.hudProgressFill.style.transform = `scaleX(${Math.max(0, Math.min(1, state.timeLeft / state.timeTotal))})`;
      }

      function fx(x, y, text, color){
        const el = document.createElement('div');
        el.className = 'fx';
        el.textContent = text;
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        el.style.color = color || '#333';
        ui.stage.appendChild(el);
        safeTimeout(() => {
          try { el.remove(); } catch (_) {}
        }, 820);
      }

      function createItem(kind){
        const r = stageRect();
        const id = 'it-' + (++state.seq);
        const emoji = kind === 'good' ? pick(GOOD) : pick(JUNK);
        const width = r.width < 700 ? 74 : 84;
        const height = r.width < 700 ? 92 : 100;

        const left = rand(8, Math.max(9, r.width - width - 8));
        const top = -height - rand(0, 80);
        const speed = rand(cfg.speedMin, cfg.speedMax);

        const el = document.createElement('button');
        el.type = 'button';
        el.className = `item ${kind}`;
        el.dataset.itemKind = kind;
        el.style.left = left + 'px';
        el.style.top = top + 'px';
        el.style.width = width + 'px';
        el.style.height = height + 'px';
        el.innerHTML = `
          <div class="emoji">${emoji}</div>
          <div class="label">${kind}</div>
        `;

        const item = {
          id,
          kind,
          emoji,
          x: left,
          y: top,
          w: width,
          h: height,
          vy: speed,
          el,
          dead: false
        };

        el.addEventListener('pointerdown', function(ev){
          ev.preventDefault();
          onHit(item);
        }, { passive:false });

        state.items.set(id, item);
        ui.stage.appendChild(el);
        return item;
      }

      function drawItem(item){
        item.el.style.left = item.x + 'px';
        item.el.style.top = item.y + 'px';
      }

      function removeItem(item){
        if (!item || item.dead) return;
        item.dead = true;
        state.items.delete(item.id);
        try { item.el.remove(); } catch (_) {}
      }

      function clearAllPlayItems(){
        state.items.forEach((item) => removeItem(item));
        state.items.clear();

        document.querySelectorAll('.item').forEach((el) => {
          try { el.remove(); } catch (_) {}
        });
      }

      function onHit(item){
        if (!state.running || state.paused || DUET_END.ending || DUET_END.ended) return;
        if (!item || item.dead) return;

        const cx = item.x + item.w / 2;
        const cy = item.y + item.h / 2;

        if (item.kind === 'good') {
          state.goodHits += 1;
          state.streak += 1;
          state.bestStreak = Math.max(state.bestStreak, state.streak);

          const comboBonus = Math.min(10, Math.floor(state.streak / 3) * 2);
          const gain = cfg.goodScore + comboBonus;
          state.score += gain;

          fx(cx, cy, '+' + gain, '#2f8f2f');

          if (state.streak === 3 || state.streak === 5 || state.streak === 8) {
            showBanner('เก็บ good ต่อเนื่อง!', 760);
          }
        } else {
          state.junkHits += 1;
          state.miss += 1;
          state.streak = 0;
          state.score = Math.max(0, state.score - cfg.junkPenalty);
          fx(cx, cy, 'MISS', '#d16b27');
          showBanner('ระวัง junk!', 720);
        }

        removeItem(item);
        renderHud();
      }

      function updateItems(dt){
        const r = stageRect();

        state.items.forEach((item) => {
          if (item.dead) return;

          item.y += item.vy * dt / 1000;
          drawItem(item);

          if (item.y > r.height + item.h * 0.6) {
            if (item.kind === 'good') {
              state.miss += 1;
              state.streak = 0;
            }
            removeItem(item);
          }
        });
      }

      function spawnTick(dt){
        if (!state.spawnEnabled) return;
        state.spawnAcc += dt;

        while (state.spawnAcc >= cfg.spawnEvery) {
          state.spawnAcc -= cfg.spawnEvery;
          const kind = Math.random() < cfg.goodRatio ? 'good' : 'junk';
          createItem(kind);
        }
      }

      function pauseGame(reason = 'manual'){
        if (DUET_END.ending || DUET_END.ended) return;
        if (state.paused) return;

        state.paused = true;
        ui.pauseSub.textContent =
          reason === 'hidden'
            ? 'เกมหยุดอัตโนมัติเมื่อหน้าจอถูกสลับออก เพื่อไม่ให้พลาดระหว่างเล่น'
            : 'เกมถูกหยุดไว้ชั่วคราว กดเล่นต่อได้เมื่อพร้อม';

        ui.pauseOverlay.classList.add('show');
        ui.pauseOverlay.setAttribute('aria-hidden', 'false');
      }

      function resumeGame(){
        if (DUET_END.ending || DUET_END.ended) return;
        if (!state.paused) return;

        state.paused = false;
        ui.pauseOverlay.classList.remove('show');
        ui.pauseOverlay.setAttribute('aria-hidden', 'true');
        state.lastTs = performance.now();
      }

      function stopAllGameplayLoops(){
        try {
          if (state.raf) {
            cancelAnimationFrame(state.raf);
            state.raf = 0;
          }
        } catch(_) {}

        clearRuntimeTimers();
        state.running = false;
        state.paused = true;
        state.spawnEnabled = false;
        state.inputLocked = true;
        state.timeLeft = 0;
      }

      function buildDuetLocalSummary(){
        const score = safeNum(state.score, 0);
        const miss = safeNum(state.miss, 0);
        const good = safeNum(state.goodHits, 0);
        const junk = safeNum(state.junkHits, 0);
        const bestStreak = safeNum(state.bestStreak, 0);
        const durationSec = Math.max(1, Math.round(safeNum(state.timeTotal, 90000) / 1000));

        let grade = 'C';
        if (score >= 600 && miss <= 8) grade = 'S';
        else if (score >= 450 && miss <= 15) grade = 'A';
        else if (score >= 300 && miss <= 24) grade = 'B';

        const stars =
          grade === 'S' ? 3 :
          grade === 'A' ? 2 : 1;

        return {
          source: 'goodjunk-duet-runtime',
          mode: 'duet',
          score,
          miss,
          good,
          junk,
          bestStreak,
          durationSec,
          grade,
          stars,
          endedAt: Date.now(),
          roomId: String(state.roomId || ''),
          role: String(state.role || ''),
          playerName: String(state.name || 'Hero'),
          diff: state.diff,
          run: state.run,
          view: state.view,
          gameId: state.gameId
        };
      }

      function medalForGrade(grade){
        if (grade === 'S') return '🏆';
        if (grade === 'A') return '🥇';
        if (grade === 'B') return '🥈';
        return '🥉';
      }

      function titleForGrade(grade){
        if (grade === 'S') return 'ยอดเยี่ยมมาก!';
        if (grade === 'A') return 'เก่งมาก!';
        if (grade === 'B') return 'ดีมาก!';
        return 'สู้ต่อได้อีก!';
      }

      function saveDuetSummaryLocal(summary){
        try {
          localStorage.setItem('HHA_LAST_SUMMARY', JSON.stringify({
            ts: Date.now(),
            ...summary
          }));
        } catch(_) {}

        try {
          localStorage.setItem('HHA_DUET_LAST_SUMMARY', JSON.stringify(summary));
        } catch(_) {}
      }

      async function submitDuetResultNonBlocking(summary){
        try {
          if (typeof window.submitDuetResult === 'function') {
            await window.submitDuetResult(summary);
            return true;
          }
          if (typeof window.finishDuetMatch === 'function') {
            await window.finishDuetMatch(summary);
            return true;
          }
          if (typeof window.submitScore === 'function') {
            await window.submitScore(summary);
            return true;
          }
          return false;
        } catch (err) {
          console.warn('[DUET] submit result failed', err);
          return false;
        }
      }

      function renderDuetSummary(summary, opts = {}){
        ui.sumMedal.textContent = medalForGrade(summary.grade);
        ui.sumGrade.textContent = summary.grade;
        ui.sumTitle.textContent = titleForGrade(summary.grade);
        ui.sumSub.textContent = 'จบเกมแล้ว มาดูผลงานรอบนี้กัน';
        ui.sumStars.textContent = '⭐'.repeat(Math.max(1, safeNum(summary.stars, 1)));

        ui.sumGrid.innerHTML = `
          <div class="gjduet-stat">
            <div class="k">คะแนน</div>
            <div class="v">${summary.score}</div>
          </div>
          <div class="gjduet-stat">
            <div class="k">เกรด</div>
            <div class="v">${summary.grade}</div>
          </div>
          <div class="gjduet-stat">
            <div class="k">เก็บ good</div>
            <div class="v">${summary.good}</div>
          </div>
          <div class="gjduet-stat">
            <div class="k">โดน junk / miss</div>
            <div class="v">${summary.miss}</div>
          </div>
          <div class="gjduet-stat">
            <div class="k">คอมโบสูงสุด</div>
            <div class="v">${summary.bestStreak}</div>
          </div>
          <div class="gjduet-stat">
            <div class="k">โหมด</div>
            <div class="v">DUET</div>
          </div>
        `;

        ui.sumNote.textContent = opts.waitingPeer
          ? 'สรุปของเราออกแล้ว • ระบบกำลังบันทึกผลและซิงก์ห้องเบื้องหลัง'
          : 'บันทึกผลเกมเรียบร้อยแล้ว';

        ui.sumRoot.classList.add('show');
        ui.sumRoot.setAttribute('aria-hidden', 'false');
        DUET_END.summaryShown = true;
      }

      async function endDuetGameNow(reason = 'timeup'){
        if (DUET_END.ending || DUET_END.ended) return;

        DUET_END.ending = true;
        DUET_END.reason = reason;

        stopAllGameplayLoops();
        clearAllPlayItems();

        const summary = buildDuetLocalSummary();
        DUET_END.finalSummary = summary;

        saveDuetSummaryLocal(summary);
        renderDuetSummary(summary, {
          waitingPeer: !!summary.roomId
        });

        try {
          await Promise.race([
            submitDuetResultNonBlocking(summary),
            new Promise((resolve) => setTimeout(resolve, 1200))
          ]);
        } catch (_) {}

        DUET_END.ended = true;
        DUET_END.ending = false;
      }

      window.__GJ_DUET_FORCE_END__ = endDuetGameNow;

      function update(dt){
        if (DUET_END.ending || DUET_END.ended) return;
        if (!state.running) return;
        if (state.paused) {
          renderHud();
          return;
        }

        state.timeLeft -= dt;

        if (state.timeLeft <= 0) {
          state.timeLeft = 0;
          renderHud();
          endDuetGameNow('timeup');
          return;
        }

        spawnTick(dt);
        updateItems(dt);
        renderHud();
      }

      function loop(ts){
        if (DUET_END.ending || DUET_END.ended) return;
        if (!state.running) return;

        const dt = Math.min(40, (ts - state.lastTs) || 16);
        state.lastTs = ts;

        try {
          update(dt);
        } catch (err) {
          console.error('[DUET LOOP ERROR]', err);
          endDuetGameNow('runtime-error');
          return;
        }

        if (!DUET_END.ending && !DUET_END.ended) {
          state.raf = requestAnimationFrame(loop);
        }
      }

      function bindUi(){
        ui.btnPause.addEventListener('click', function(){
          if (DUET_END.ending || DUET_END.ended) return;
          if (state.paused) resumeGame();
          else pauseGame('manual');
        });

        ui.btnFinish.addEventListener('click', function(ev){
          ev.preventDefault();
          endDuetGameNow('manual-finish');
        });

        ui.btnResume.addEventListener('click', function(){
          resumeGame();
        });

        ui.btnBackHubFromPause.addEventListener('click', function(){
          location.href = state.hub;
        });

        ui.btnReplay.addEventListener('click', function(){
          const u = new URL(location.href);
          u.searchParams.set('seed', String(Date.now()));
          location.href = u.toString();
        });

        ui.btnHub.addEventListener('click', function(){
          location.href = state.hub;
        });

        document.addEventListener('visibilitychange', function(){
          if (document.hidden && !DUET_END.ending && !DUET_END.ended) {
            pauseGame('hidden');
          }
        });

        window.addEventListener('blur', function(){
          if (!DUET_END.ending && !DUET_END.ended) {
            pauseGame('hidden');
          }
        });

        window.addEventListener('keydown', function(ev){
          if (DUET_END.ending || DUET_END.ended) return;

          if (ev.key === 'p' || ev.key === 'P') {
            ev.preventDefault();
            if (state.paused) resumeGame();
            else pauseGame('manual');
          }

          if (ev.key === 'Escape') {
            ev.preventDefault();
            if (state.paused) resumeGame();
            else pauseGame('manual');
          }
        });

        window.addEventListener('beforeunload', function(){
          stopAllGameplayLoops();
        });
      }

      function start(){
        bindUi();
        renderHud();
        showBanner('เก็บ good ต่อไป!', 1200);

        state.running = true;
        state.paused = false;
        state.spawnEnabled = true;
        state.inputLocked = false;
        state.lastTs = performance.now();

        state.raf = requestAnimationFrame(loop);
      }

      start();
    })();
  </script>
</body>
</html>
