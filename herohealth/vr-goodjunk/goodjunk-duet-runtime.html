<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk Duet Runtime</title>
  <meta name="theme-color" content="#9fe3ff" />
  <link rel="icon" href="./favicon.ico" />
  <style>
    :root{
      --sky1:#dff4ff;
      --sky2:#bfe8ff;
      --sky3:#fff7d8;
      --line:#bfe3f2;
      --text:#4d4a42;
      --muted:#7b7a72;
      --green:#7ed957;
      --green2:#58c33f;
      --blue:#7fcfff;
      --blue2:#58b7f5;
      --yellow:#ffd75a;
      --yellow2:#ffbf3f;
      --card:#fffef9;
      --shadow:0 18px 40px rgba(86,155,194,.16);

      --sat:env(safe-area-inset-top,0px);
      --sar:env(safe-area-inset-right,0px);
      --sab:env(safe-area-inset-bottom,0px);
      --sal:env(safe-area-inset-left,0px);
    }

    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html,body{
      margin:0;
      min-height:100%;
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 12% 10%, rgba(255,255,255,.90), transparent 18%),
        radial-gradient(circle at 86% 14%, rgba(255,255,255,.76), transparent 16%),
        linear-gradient(180deg,var(--sky1),var(--sky2) 54%, var(--sky3));
      overflow:hidden;
    }

    body{ min-height:100dvh; }

    #app{
      position:relative;
      width:100vw;
      height:100dvh;
      overflow:hidden;
      isolation:isolate;
      background:
        radial-gradient(circle at 15% 12%, rgba(255,255,255,.72), transparent 16%),
        radial-gradient(circle at 82% 15%, rgba(255,255,255,.52), transparent 14%),
        linear-gradient(180deg,#95dafd 0%, #bde9ff 52%, #eef9ff 86%, #c9f2ad 100%);
    }

    .cloud{
      position:absolute;
      border-radius:999px;
      background:rgba(255,255,255,.45);
      filter:blur(1px);
      box-shadow:
        42px 0 0 2px rgba(255,255,255,.44),
        84px 6px 0 0 rgba(255,255,255,.36);
      pointer-events:none;
      animation:floatCloud linear infinite;
    }

    .cloud.c1{ width:120px; height:34px; left:6%; top:11%; animation-duration:28s; }
    .cloud.c2{ width:145px; height:38px; left:62%; top:16%; animation-duration:32s; }
    .cloud.c3{ width:108px; height:30px; left:28%; top:24%; animation-duration:24s; }

    @keyframes floatCloud{
      from{ transform:translateX(-3vw); }
      to{ transform:translateX(10vw); }
    }

    #hud{
      position:absolute;
      left:0; right:0; top:0;
      z-index:30;
      padding:
        calc(10px + var(--sat))
        calc(12px + var(--sar))
        8px
        calc(12px + var(--sal));
      display:grid;
      gap:8px;
      pointer-events:none;
    }

    .hud-row{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:8px;
      align-items:center;
    }

    .pill{
      min-height:40px;
      border-radius:999px;
      border:2px solid rgba(191,227,242,.96);
      background:rgba(255,255,255,.92);
      box-shadow:0 8px 18px rgba(86,155,194,.10);
      color:#5d5952;
      font-size:12px;
      font-weight:1000;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:8px 10px;
      pointer-events:auto;
    }

    .banner{
      justify-self:center;
      max-width:min(92vw,460px);
      min-height:38px;
      padding:8px 14px;
      border-radius:999px;
      border:2px solid rgba(191,227,242,.96);
      background:rgba(255,255,255,.94);
      box-shadow:0 8px 18px rgba(86,155,194,.10);
      color:#6b665e;
      font-size:12px;
      font-weight:1000;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      opacity:0;
      transform:translateY(-4px);
      transition:.18s ease;
      pointer-events:none;
    }

    .banner.show{
      opacity:1;
      transform:translateY(0);
    }

    #arena{
      position:absolute;
      inset:0;
      overflow:hidden;
      z-index:5;
    }

    #ground{
      position:absolute;
      left:0; right:0; bottom:0;
      height:16%;
      background:
        linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,0) 22%),
        linear-gradient(180deg,#94e462,#67c94c);
      box-shadow:inset 0 4px 0 rgba(255,255,255,.24);
    }

    .item{
      position:absolute;
      width:84px;
      height:84px;
      border-radius:26px;
      border:3px solid #d7edf7;
      background:rgba(255,255,255,.92);
      box-shadow:0 12px 24px rgba(86,155,194,.16);
      display:grid;
      place-items:center;
      user-select:none;
      -webkit-user-select:none;
      cursor:pointer;
      touch-action:manipulation;
    }

    .item.good{
      background:linear-gradient(180deg,#f7fff1,#ffffff);
      border-color:#d9efcf;
    }

    .item.junk{
      background:linear-gradient(180deg,#fff2f2,#ffffff);
      border-color:#ffd4d4;
    }

    .item .emoji{
      font-size:38px;
      line-height:1;
      pointer-events:none;
    }

    .item .label{
      position:absolute;
      left:0; right:0; bottom:6px;
      text-align:center;
      font-size:10px;
      font-weight:1000;
      color:#615d56;
      pointer-events:none;
    }

    .fx{
      position:absolute;
      transform:translate(-50%,-50%);
      z-index:26;
      font-size:18px;
      font-weight:1000;
      text-shadow:0 8px 18px rgba(0,0,0,.10);
      pointer-events:none;
      animation:fxUp .72s ease forwards;
    }

    @keyframes fxUp{
      from{ opacity:1; transform:translate(-50%,-10%); }
      to{ opacity:0; transform:translate(-50%,-150%); }
    }

    #controls{
      position:absolute;
      left:0; right:0; bottom:0;
      z-index:32;
      padding:
        10px
        calc(12px + var(--sar))
        calc(12px + var(--sab))
        calc(12px + var(--sal));
      display:flex;
      justify-content:flex-end;
      gap:10px;
      pointer-events:none;
    }

    .ctl{
      pointer-events:auto;
      min-width:116px;
      min-height:46px;
      border:none;
      border-radius:18px;
      font-size:15px;
      font-weight:1000;
      box-shadow:var(--shadow);
      cursor:pointer;
    }

    .ctl.pause{
      background:linear-gradient(180deg,var(--blue),var(--blue2));
      color:#08374d;
    }

    .ctl.end{
      background:linear-gradient(180deg,#a8e66d,#67ca4c);
      color:#163c0b;
    }

    #pauseOverlay,
    #summaryOverlay{
      position:absolute;
      inset:0;
      z-index:80;
      display:none;
      place-items:center;
      padding:16px;
      background:rgba(255,255,255,.28);
      backdrop-filter:blur(6px);
    }

    #pauseOverlay.show,
    #summaryOverlay.show{
      display:grid;
    }

    .dialog{
      width:min(92vw,760px);
      max-height:88vh;
      overflow:auto;
      border-radius:30px;
      border:5px solid var(--line);
      background:linear-gradient(180deg,#fffef9,#f8fff3);
      box-shadow:0 24px 52px rgba(86,155,194,.22);
      color:#5c5850;
    }

    .pause-card{
      width:min(88vw,420px);
      padding:20px 18px;
      text-align:center;
    }

    .pause-title{
      font-size:28px;
      line-height:1.06;
      font-weight:1000;
      color:#67a91c;
    }

    .pause-sub{
      margin-top:8px;
      font-size:14px;
      line-height:1.6;
      color:#7b7a72;
      font-weight:900;
    }

    .pause-actions{
      margin-top:16px;
      display:grid;
      gap:10px;
    }

    .pause-btn{
      min-height:46px;
      border:none;
      border-radius:18px;
      font-size:15px;
      font-weight:1000;
      cursor:pointer;
    }

    .pause-btn.resume{
      background:linear-gradient(180deg,#7ed957,#58c33f);
      color:#173b0b;
    }

    .pause-btn.hub{
      background:#fff;
      border:3px solid #d7edf7;
      color:#6b665e;
    }

    .summary-card{
      padding:18px 18px 20px;
    }

    .summary-head{
      text-align:center;
    }

    .summary-medal{
      width:138px;
      height:138px;
      margin:0 auto;
      border-radius:36px;
      border:5px solid #d7edf7;
      background:linear-gradient(180deg,#fff7d9,#fffef7);
      display:grid;
      place-items:center;
      font-size:66px;
      box-shadow:0 14px 26px rgba(86,155,194,.12);
    }

    .summary-grade{
      margin:16px auto 0;
      width:min(210px,72vw);
      min-height:74px;
      border-radius:999px;
      border:4px solid #d7edf7;
      background:#fff;
      display:grid;
      place-items:center;
      font-size:56px;
      font-weight:1000;
      color:#5e7386;
    }

    .summary-grade.grade-s{ color:#a76400; border-color:#ffe08a; background:#fff8d9; }
    .summary-grade.grade-a{ color:#4c8c30; border-color:#cfe9b8; background:#f7fff0; }
    .summary-grade.grade-b{ color:#5c7084; border-color:#cdeeff; background:#f5fbff; }
    .summary-grade.grade-c{ color:#8b6a53; border-color:#ead7c6; background:#fff8f2; }

    .summary-title{
      margin:18px 0 0;
      font-size:34px;
      line-height:1.04;
      font-weight:1000;
      color:#67a91c;
    }

    .summary-sub{
      margin:10px auto 0;
      max-width:520px;
      font-size:15px;
      line-height:1.6;
      font-weight:900;
      color:#7b7a72;
    }

    .summary-star{
      margin:14px auto 0;
      font-size:62px;
      line-height:1;
      color:#ffd73c;
      text-shadow:0 8px 18px rgba(255,195,51,.20);
    }

    .summary-grid{
      margin-top:20px;
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
    }

    .sum-card{
      border-radius:24px;
      border:4px solid #d7edf7;
      background:#fff;
      padding:16px 18px;
      min-height:140px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .sum-k{
      font-size:18px;
      font-weight:1000;
      color:#7b7a72;
    }

    .sum-v{
      margin-top:10px;
      font-size:72px;
      line-height:1;
      font-weight:1000;
      color:#5b564f;
      word-break:break-word;
    }

    .sum-v.small{
      font-size:44px;
    }

    .summary-note{
      margin-top:16px;
      border-radius:22px;
      border:4px solid #d7edf7;
      background:#fff;
      padding:14px 16px;
      font-size:16px;
      line-height:1.6;
      font-weight:1000;
      color:#6d685f;
      text-align:center;
    }

    .summary-actions{
      margin-top:16px;
      display:grid;
      gap:12px;
    }

    .summary-btn{
      min-height:54px;
      border:none;
      border-radius:20px;
      font-size:18px;
      font-weight:1000;
      cursor:pointer;
      box-shadow:var(--shadow);
    }

    .summary-btn.replay{
      background:linear-gradient(180deg,#7ed957,#58c33f);
      color:#173b0b;
    }

    .summary-btn.hub{
      background:#fff;
      border:4px solid #d7edf7;
      color:#645f57;
    }

    .hidden{
      display:none !important;
    }

    @media (max-width:760px){
      .hud-row{
        grid-template-columns:repeat(3,minmax(0,1fr));
      }

      .pill{
        min-height:36px;
        font-size:11px;
        padding:6px 8px;
      }

      #controls{
        justify-content:flex-end;
      }

      .ctl{
        min-width:100px;
        min-height:44px;
        font-size:14px;
      }

      .summary-grid{
        grid-template-columns:1fr;
      }

      .summary-medal{
        width:120px;
        height:120px;
        font-size:58px;
      }

      .summary-grade{
        min-height:66px;
        font-size:52px;
      }

      .summary-title{
        font-size:30px;
      }

      .sum-card{
        min-height:126px;
      }

      .sum-v{
        font-size:62px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>

    <div id="hud">
      <div class="hud-row">
        <div class="pill" id="pillMode">🤝 DUET</div>
        <div class="pill" id="pillScore">Score • 0</div>
        <div class="pill" id="pillTime">Time • 1:30</div>
        <div class="pill" id="pillMiss">Miss • 0</div>
      </div>
      <div class="banner" id="banner">เก็บ good ต่อไป!</div>
    </div>

    <div id="arena" aria-label="game area"></div>
    <div id="ground"></div>

    <div id="controls">
      <button class="ctl pause" id="btnPause" type="button">⏸ Pause</button>
      <button class="ctl end" id="btnEnd" type="button">✅ จบเกม</button>
    </div>

    <div id="pauseOverlay">
      <div class="dialog pause-card">
        <div class="pause-title">พักก่อนนะ</div>
        <div class="pause-sub">เกมหยุดไว้ชั่วคราว กดเล่นต่อได้เลยเมื่อพร้อม</div>
        <div class="pause-actions">
          <button class="pause-btn resume" id="btnResume" type="button">▶️ เล่นต่อ</button>
          <button class="pause-btn hub" id="btnPauseHub" type="button">🏠 กลับ Hub</button>
        </div>
      </div>
    </div>

    <div id="summaryOverlay">
      <div class="dialog summary-card">
        <div class="summary-head">
          <div class="summary-medal" id="sumMedal">🥈</div>
          <div class="summary-grade grade-b" id="sumGrade">B</div>
          <div class="summary-title" id="sumTitle">ดีมาก!</div>
          <div class="summary-sub" id="sumSub">จบเกมแล้ว มาดูผลงานรอบนี้กัน</div>
          <div class="summary-star">⭐</div>
        </div>

        <div class="summary-grid">
          <div class="sum-card">
            <div class="sum-k">คะแนน</div>
            <div class="sum-v" id="sumScore">0</div>
          </div>
          <div class="sum-card">
            <div class="sum-k">เกรด</div>
            <div class="sum-v" id="sumGradeText">B</div>
          </div>
          <div class="sum-card">
            <div class="sum-k">เก็บ good</div>
            <div class="sum-v" id="sumGood">0</div>
          </div>
          <div class="sum-card">
            <div class="sum-k">โดน junk / miss</div>
            <div class="sum-v" id="sumMiss">0</div>
          </div>
          <div class="sum-card">
            <div class="sum-k">คอมโบสูงสุด</div>
            <div class="sum-v small" id="sumBest">0</div>
          </div>
          <div class="sum-card">
            <div class="sum-k">โหมด</div>
            <div class="sum-v small" id="sumMode">DUET</div>
          </div>
        </div>

        <div class="summary-note" id="sumNote">สู้ต่อได้อีก! รอบหน้าลองพลาดให้น้อยลง</div>

        <div class="summary-actions">
          <button class="summary-btn replay" id="btnReplay" type="button">🔁 เล่นอีกครั้ง</button>
          <button class="summary-btn hub" id="btnHub" type="button">🏠 กลับ Hub</button>
        </div>
      </div>
    </div>
  </div>

  <script src="./goodjunk-duet-room-bootstrap.js"></script>
  <script>
    (function () {
      'use strict';

      const qs = new URLSearchParams(location.search);
      const DEBUG = qs.get('debug') === '1';
      const roomBoot = window.HHA_DUET_ROOM_BOOT || null;

      const ctx = {
        pid: String(qs.get('pid') || 'anon').trim(),
        name: String(qs.get('name') || qs.get('nick') || 'Hero').trim(),
        roomId: String(qs.get('roomId') || qs.get('room') || '').trim(),
        role: String(qs.get('role') || '').trim().toLowerCase(),
        mode: 'DUET',
        diff: String(qs.get('diff') || 'normal').trim().toLowerCase(),
        timeSec: Math.max(30, Number(qs.get('time') || 90)),
        hub: String(qs.get('hub') || '../hub-v2.html').trim(),
        runtimePath: './goodjunk-duet-runtime.html',
        lobbyPath: './goodjunk-duet-lobby.html'
      };

      const GOOD = ['🍎','🍌','🍉','🥕','🥦','🍇','🍍','🐟','🥛'];
      const JUNK = ['🍔','🍟','🍩','🍭','🥤','🍕','🧁','🍫'];

      const DIFF = {
        easy:   { spawnMs: 980, speedMin: 72,  speedMax: 118, goodChance: 0.78 },
        normal: { spawnMs: 780, speedMin: 94,  speedMax: 148, goodChance: 0.70 },
        hard:   { spawnMs: 620, speedMin: 118, speedMax: 180, goodChance: 0.62 }
      };

      const cfg = DIFF[ctx.diff] || DIFF.normal;

      const ui = {
        arena: document.getElementById('arena'),
        pillMode: document.getElementById('pillMode'),
        pillScore: document.getElementById('pillScore'),
        pillTime: document.getElementById('pillTime'),
        pillMiss: document.getElementById('pillMiss'),
        banner: document.getElementById('banner'),

        btnPause: document.getElementById('btnPause'),
        btnEnd: document.getElementById('btnEnd'),
        btnResume: document.getElementById('btnResume'),
        btnPauseHub: document.getElementById('btnPauseHub'),

        pauseOverlay: document.getElementById('pauseOverlay'),

        summaryOverlay: document.getElementById('summaryOverlay'),
        sumMedal: document.getElementById('sumMedal'),
        sumGrade: document.getElementById('sumGrade'),
        sumTitle: document.getElementById('sumTitle'),
        sumSub: document.getElementById('sumSub'),
        sumScore: document.getElementById('sumScore'),
        sumGradeText: document.getElementById('sumGradeText'),
        sumGood: document.getElementById('sumGood'),
        sumMiss: document.getElementById('sumMiss'),
        sumBest: document.getElementById('sumBest'),
        sumMode: document.getElementById('sumMode'),
        sumNote: document.getElementById('sumNote'),
        btnReplay: document.getElementById('btnReplay'),
        btnHub: document.getElementById('btnHub')
      };

      const state = {
        matchId: String(qs.get('matchId') || '').trim(),
        running: false,
        paused: false,
        ended: false,
        summaryShown: false,
        finishBusy: false,
        roomSummaryUnsub: function(){},
        lastTs: 0,
        spawnAcc: 0,
        timeLeftMs: ctx.timeSec * 1000,
        raf: 0,
        seq: 0,
        items: new Map(),
        score: 0,
        miss: 0,
        good: 0,
        junk: 0,
        streak: 0,
        bestStreak: 0
      };

      function dlog() {
        if (!DEBUG) return;
        try { console.log('[GJ-DUET-RUNTIME]', ...arguments); } catch (_) {}
      }

      function clamp(v, a, b) {
        return Math.max(a, Math.min(b, v));
      }

      function fmtTime(ms) {
        const s = Math.max(0, Math.ceil(ms / 1000));
        const m = Math.floor(s / 60);
        const r = s % 60;
        return m + ':' + String(r).padStart(2, '0');
      }

      function safeTimeout(fn, ms) {
        return setTimeout(function () {
          try { fn(); } catch (err) { console.error(err); }
        }, ms);
      }

      function setBanner(text, ms) {
        if (!ui.banner) return;
        ui.banner.textContent = text;
        ui.banner.classList.add('show');

        if (setBanner._timer) clearTimeout(setBanner._timer);
        setBanner._timer = safeTimeout(function () {
          ui.banner.classList.remove('show');
        }, ms || 900);
      }

      function fx(x, y, text, color) {
        const el = document.createElement('div');
        el.className = 'fx';
        el.textContent = text;
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        el.style.color = color || '#333';
        ui.arena.appendChild(el);
        safeTimeout(function () {
          try { el.remove(); } catch (_) {}
        }, 740);
      }

      function arenaRect() {
        return ui.arena.getBoundingClientRect();
      }

      function buildLobbyUrl() {
        const url = new URL(ctx.lobbyPath, location.href);
        const passthrough = [
          'pid','name','nick','studyId','hub','zone','cat','game','gameId',
          'theme','run','view','diff','time','seed','api','log','debug'
        ];

        passthrough.forEach(function (k) {
          const v = qs.get(k);
          if (v != null && v !== '') url.searchParams.set(k, v);
        });

        if (ctx.roomId) {
          url.searchParams.set('roomId', ctx.roomId);
          url.searchParams.set('room', ctx.roomId);
        }
        url.searchParams.set('mode', 'duet');
        url.searchParams.set('entry', 'duet');

        if (ctx.role) url.searchParams.set('role', ctx.role);
        if (qs.get('host')) url.searchParams.set('host', qs.get('host'));

        return url.toString();
      }

      function go(url) {
        location.href = url;
      }

      function clearItems() {
        state.items.forEach(function (item) {
          try { item.el.remove(); } catch (_) {}
        });
        state.items.clear();
      }

      function renderHud() {
        ui.pillMode.textContent = '🤝 DUET';
        ui.pillScore.textContent = 'Score • ' + state.score;
        ui.pillTime.textContent = 'Time • ' + fmtTime(state.timeLeftMs);
        ui.pillMiss.textContent = 'Miss • ' + state.miss;
      }

      function spawnItem() {
        if (state.ended) return;

        const r = arenaRect();
        const size = Math.round(clamp(70 + Math.random() * 18, 70, 88));
        const good = Math.random() < cfg.goodChance;
        const emoji = good
          ? GOOD[Math.floor(Math.random() * GOOD.length)]
          : JUNK[Math.floor(Math.random() * JUNK.length)];

        const x = clamp(Math.random() * (r.width - size - 24) + 12, 12, r.width - size - 12);
        const y = -size - Math.random() * 20;

        const el = document.createElement('button');
        el.type = 'button';
        el.className = 'item ' + (good ? 'good' : 'junk');
        el.innerHTML =
          '<div class="emoji">' + emoji + '</div>' +
          '<div class="label">' + (good ? 'good' : 'junk') + '</div>';

        ui.arena.appendChild(el);

        const item = {
          id: 'it-' + (++state.seq),
          good: good,
          x: x,
          y: y,
          size: size,
          vx: (Math.random() * 40 - 20),
          vy: cfg.speedMin + Math.random() * (cfg.speedMax - cfg.speedMin),
          el: el,
          dead: false
        };

        el.style.width = size + 'px';
        el.style.height = size + 'px';
        el.style.left = x + 'px';
        el.style.top = y + 'px';

        el.addEventListener('pointerdown', function (ev) {
          ev.preventDefault();
          if (state.ended || state.paused || item.dead) return;

          const cx = item.x + item.size / 2;
          const cy = item.y + item.size / 2;

          if (item.good) {
            state.good += 1;
            state.streak += 1;
            state.bestStreak = Math.max(state.bestStreak, state.streak);

            const bonus = Math.min(12, Math.floor(state.streak / 4) * 2);
            const gain = 10 + bonus;
            state.score += gain;

            fx(cx, cy, '+' + gain, '#2f8f2f');

            if (state.streak === 3 || state.streak === 6 || state.streak === 10) {
              setBanner('เก็บ good ต่อไป!', 700);
            }
          } else {
            state.junk += 1;
            state.miss += 1;
            state.streak = 0;
            state.score = Math.max(0, state.score - 8);
            fx(cx, cy, 'MISS', '#d16b27');
            setBanner('ระวัง junk!', 700);
          }

          item.dead = true;
          try { item.el.remove(); } catch (_) {}
          state.items.delete(item.id);
          renderHud();
        }, { passive:false });

        state.items.set(item.id, item);
      }

      function updateItems(dt) {
        const r = arenaRect();

        state.items.forEach(function (item) {
          if (item.dead) return;

          item.x += item.vx * dt / 1000;
          item.y += item.vy * dt / 1000;

          if (item.x <= 8) {
            item.x = 8;
            item.vx = Math.abs(item.vx);
          }
          if (item.x + item.size >= r.width - 8) {
            item.x = r.width - item.size - 8;
            item.vx = -Math.abs(item.vx);
          }

          item.el.style.left = item.x + 'px';
          item.el.style.top = item.y + 'px';

          if (item.y > r.height - 92) {
            if (item.good) {
              state.miss += 1;
              state.streak = 0;
            }
            item.dead = true;
            try { item.el.remove(); } catch (_) {}
            state.items.delete(item.id);
          }
        });
      }

      function calcGrade(summary) {
        const score = Number(summary.score || 0);
        const miss = Number(summary.miss || 0);
        const good = Number(summary.good || 0);
        const eff = good - miss;

        if (score >= 980 && eff >= 45 && miss <= 10) return 'S';
        if (score >= 900 && eff >= 40 && miss <= 16) return 'A';
        if (score >= 650 && eff >= 22) return 'B';
        return 'C';
      }

      function medalForGrade(grade) {
        if (grade === 'S') return '🏆';
        if (grade === 'A') return '🥇';
        if (grade === 'B') return '🥈';
        return '🥉';
      }

      function titleForGrade(grade) {
        if (grade === 'S') return 'ยอดเยี่ยม!';
        if (grade === 'A') return 'เก่งมาก!';
        if (grade === 'B') return 'ดีมาก!';
        return 'สู้ต่อได้!';
      }

      function noteForGrade(grade) {
        if (grade === 'S') return 'สุดยอดเลย! เก็บ good ได้แม่นมากและพลาดน้อยมาก';
        if (grade === 'A') return 'เยี่ยมเลย! อีกนิดเดียวก็ถึงระดับสูงสุดแล้ว';
        if (grade === 'B') return 'ทำได้ดีมาก รอบหน้าลองหลบ junk ให้มากขึ้น';
        return 'ไม่เป็นไร รอบหน้าลองแตะ good ให้ต่อเนื่องขึ้น';
      }

      function buildLocalSummary(reason) {
        const payload = {
          final: true,
          mode: 'DUET',
          roomId: ctx.roomId,
          matchId: state.matchId,
          pid: ctx.pid,
          name: ctx.name,
          score: state.score,
          miss: state.miss,
          good: state.good,
          junk: state.junk,
          streak: state.bestStreak,
          grade: 'C',
          reason: String(reason || 'timeup'),
          hub: ctx.hub,
          ts: Date.now(),
          by: {
            pid: ctx.pid,
            name: ctx.name
          }
        };
        payload.grade = calcGrade(payload);
        return payload;
      }

      function applySummary(summary) {
        const grade = String(summary.grade || calcGrade(summary)).toUpperCase();

        ui.sumMedal.textContent = medalForGrade(grade);
        ui.sumGrade.textContent = grade;
        ui.sumGrade.className = 'summary-grade grade-' + grade.toLowerCase();
        ui.sumTitle.textContent = titleForGrade(grade);
        ui.sumSub.textContent = 'จบเกมแล้ว มาดูผลงานรอบนี้กัน';

        ui.sumScore.textContent = Math.max(0, Number(summary.score || 0));
        ui.sumGradeText.textContent = grade;
        ui.sumGood.textContent = Math.max(0, Number(summary.good || 0));
        ui.sumMiss.textContent = Math.max(0, Number(summary.miss || 0));
        ui.sumBest.textContent = Math.max(0, Number(summary.streak || 0));
        ui.sumMode.textContent = 'DUET';
        ui.sumNote.textContent = noteForGrade(grade);

        ui.summaryOverlay.classList.add('show');
        state.summaryShown = true;
      }

      function showSummaryIfNeeded(summary) {
        if (state.summaryShown) {
          applySummary(summary);
          return;
        }
        applySummary(summary);
      }

      function withTimeout(promise, ms) {
        return Promise.race([
          promise,
          new Promise(function (resolve) {
            safeTimeout(function () { resolve(null); }, ms);
          })
        ]);
      }

      async function finishGame(reason) {
        if (state.finishBusy || state.ended) return;

        state.finishBusy = true;
        state.ended = true;
        state.running = false;
        state.paused = false;

        try { cancelAnimationFrame(state.raf); } catch (_) {}
        clearItems();
        ui.pauseOverlay.classList.remove('show');

        const localSummary = buildLocalSummary(reason);

        let publishPromise = Promise.resolve(localSummary);
        if (roomBoot && state.matchId) {
          publishPromise = roomBoot.publishFinalSummary(state.matchId, localSummary)
            .then(function (remote) { return remote || localSummary; })
            .catch(function () { return localSummary; });
        }

        const quick = await withTimeout(publishPromise, 450);
        showSummaryIfNeeded(quick || localSummary);

        publishPromise.then(function (remote) {
          if (remote) showSummaryIfNeeded(remote);
        }).catch(function () {});

        try {
          localStorage.setItem('HHA_LAST_SUMMARY', JSON.stringify({
            source: 'goodjunk-duet-runtime',
            ts: Date.now(),
            roomId: ctx.roomId,
            matchId: state.matchId,
            pid: ctx.pid,
            name: ctx.name,
            score: localSummary.score,
            miss: localSummary.miss,
            good: localSummary.good,
            junk: localSummary.junk,
            streak: localSummary.streak,
            grade: localSummary.grade,
            mode: 'DUET',
            hub: ctx.hub
          }));
        } catch (_) {}
      }

      function loop(ts) {
        if (!state.running || state.ended) return;

        if (!state.lastTs) state.lastTs = ts;
        const dt = Math.min(40, ts - state.lastTs || 16);
        state.lastTs = ts;

        if (!state.paused) {
          state.timeLeftMs -= dt;
          if (state.timeLeftMs <= 0) {
            state.timeLeftMs = 0;
            renderHud();
            finishGame('timeup');
            return;
          }

          state.spawnAcc += dt;
          while (state.spawnAcc >= cfg.spawnMs) {
            state.spawnAcc -= cfg.spawnMs;
            spawnItem();
          }

          updateItems(dt);
          renderHud();
        }

        state.raf = requestAnimationFrame(loop);
      }

      function pauseGame() {
        if (state.ended) return;
        state.paused = true;
        ui.pauseOverlay.classList.add('show');
      }

      function resumeGame() {
        if (state.ended) return;
        state.paused = false;
        state.lastTs = performance.now();
        ui.pauseOverlay.classList.remove('show');
      }

      function bindEvents() {
        ui.btnPause.addEventListener('click', function () {
          if (state.paused) resumeGame();
          else pauseGame();
        });

        ui.btnResume.addEventListener('click', function () {
          resumeGame();
        });

        ui.btnEnd.addEventListener('click', function () {
          finishGame('manual_end');
        });

        ui.btnPauseHub.addEventListener('click', function () {
          go(ctx.hub);
        });

        ui.btnReplay.addEventListener('click', function () {
          go(buildLobbyUrl());
        });

        ui.btnHub.addEventListener('click', function () {
          go(ctx.hub);
        });

        document.addEventListener('visibilitychange', function () {
          if (document.hidden && !state.ended) pauseGame();
        });

        window.addEventListener('blur', function () {
          if (!state.ended) pauseGame();
        });

        window.addEventListener('keydown', function (ev) {
          if (ev.key === 'p' || ev.key === 'P') {
            ev.preventDefault();
            if (state.paused) resumeGame();
            else pauseGame();
          }
        });
      }

      async function initMatch() {
        if (!roomBoot) {
          state.matchId = state.matchId || ('LOCAL-' + Date.now());
          return;
        }

        state.matchId =
          state.matchId ||
          await roomBoot.ensureMatchId(false);

        dlog('match ready', state.matchId);

        try {
          const existing = await roomBoot.readFinalSummary(state.matchId);
          if (existing && existing.final) {
            state.ended = true;
            state.running = false;
            showSummaryIfNeeded(existing);
            return;
          }
        } catch (_) {}

        try {
          state.roomSummaryUnsub = roomBoot.subscribeFinalSummary(state.matchId, function (summary) {
            if (!summary || !summary.final) return;
            showSummaryIfNeeded(summary);
          });
        } catch (_) {}
      }

      async function start() {
        bindEvents();
        renderHud();

        await initMatch();
        if (state.summaryShown) return;

        state.running = true;
        state.lastTs = performance.now();
        setBanner('เก็บ good ต่อไป!', 1200);
        state.raf = requestAnimationFrame(loop);
      }

      start().catch(function (err) {
        console.error('[GJ-DUET-RUNTIME start failed]', err);
        finishGame('boot_error');
      });
    })();
  </script>
</body>
