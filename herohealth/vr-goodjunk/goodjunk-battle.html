<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>GoodJunk Battle • Redirect</title>
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#ffb347" />

  <style>
    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      min-height:100%;
      font-family:system-ui,-apple-system,"Segoe UI","Noto Sans Thai",sans-serif;
      color:#4d4034;
      background:
        radial-gradient(circle at 12% 8%,rgba(255,255,255,.88),transparent 22%),
        radial-gradient(circle at 88% 10%,rgba(255,141,141,.22),transparent 26%),
        linear-gradient(180deg,#fff7d8,#e9f8ff);
    }

    body{
      display:grid;
      place-items:center;
      padding:18px;
    }

    .card{
      width:min(560px,100%);
      border:4px solid #ffd98a;
      border-radius:30px;
      background:#fffef9;
      box-shadow:0 18px 44px rgba(160,112,35,.16);
      padding:24px;
      text-align:center;
    }

    .icon{
      width:86px;
      height:86px;
      margin:0 auto 14px;
      border-radius:30px;
      display:grid;
      place-items:center;
      font-size:44px;
      background:linear-gradient(180deg,#fff8dc,#ffd75a);
      border:4px solid #ffe6ad;
    }

    h1{
      margin:0 0 8px;
      font-size:clamp(28px,6vw,42px);
      color:#b66a00;
      line-height:1.1;
    }

    p{
      margin:0 auto 18px;
      max-width:440px;
      color:#7a6b5d;
      line-height:1.65;
      font-weight:900;
    }

    a{
      min-height:54px;
      border-radius:20px;
      border:3px solid #ffe08a;
      background:linear-gradient(180deg,#ffe785,#ffd75a);
      color:#553900;
      font-weight:1000;
      padding:12px 18px;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 14px 30px rgba(160,112,35,.14);
    }

    .mini{
      margin-top:14px;
      color:#8a7b70;
      font-size:12px;
      line-height:1.5;
      font-weight:800;
      word-break:break-all;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="icon">⚔️</div>
    <h1>GoodJunk Battle</h1>
    <p>
      กำลังพาไปหน้า Battle Lobby ตัวหลัก สำหรับสร้างห้อง เข้าห้อง และเริ่ม Battle Multiplayer
    </p>
    <a id="go" href="./goodjunk-battle-lobby.html">ไป Battle Lobby</a>
    <div id="url" class="mini"></div>
  </main>

  <script>
    (() => {
      'use strict';

      const params = new URLSearchParams(location.search);
      const out = new URL('./goodjunk-battle-lobby.html', location.href);

      [
        'pid','name','nick',
        'room','roomId',
        'diff','time','view',
        'hub','run','seed',
        'api','log','studyId','conditionGroup',
        'zone','cat','game','gameId','theme',
        'entry','recommendedMode',
        'cap','maxPlayers'
      ].forEach(k => {
        const v = params.get(k);
        if (v !== null && v !== '') out.searchParams.set(k, v);
      });

      out.searchParams.set('mode','battle');
      out.searchParams.set('entry','battle');
      out.searchParams.set('recommendedMode','battle');
      out.searchParams.set('multiplayer','1');

      out.searchParams.set('phaseBoss','0');
      out.searchParams.set('boss','0');
      out.searchParams.set('soloBoss','0');
      out.searchParams.set('bossMode','0');

      out.searchParams.set('zone', out.searchParams.get('zone') || 'nutrition');
      out.searchParams.set('cat', out.searchParams.get('cat') || 'nutrition');
      out.searchParams.set('game', out.searchParams.get('game') || 'goodjunk');
      out.searchParams.set('gameId', out.searchParams.get('gameId') || 'goodjunk');
      out.searchParams.set('theme', out.searchParams.get('theme') || 'goodjunk');

      const go = document.getElementById('go');
      const url = document.getElementById('url');

      go.href = out.toString();
      url.textContent = out.toString();

      setTimeout(() => {
        location.replace(out.toString());
      }, 650);
    })();
  </script>
</body>
</html>
