<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#fff3d7" />
  <meta name="color-scheme" content="light" />

  <title>GoodJunk Battle v2.5 • Mobile</title>

  <style>
    :root{
      --bg1:#fff8e8;
      --bg2:#eaf8ff;
      --card:#fffef8;
      --line:#ffc77d;
      --line2:#ffdca8;
      --text:#753119;
      --muted:#9a6a42;
      --green:#55d978;
      --red:#ff7b69;
      --blue:#71ccff;
      --yellow:#ffe17a;
      --shadow:0 14px 34px rgba(112,60,20,.14);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,
    body{
      width:100%;
      min-height:100%;
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 12% 8%, rgba(255,225,122,.52), transparent 28%),
        radial-gradient(circle at 88% 7%, rgba(113,204,255,.38), transparent 32%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      overflow:hidden;
    }

    body{
      min-height:100dvh;
      overscroll-behavior:none;
    }

    button,
    input,
    select,
    a{
      font-family:inherit;
    }

    button,
    a{
      touch-action:manipulation;
    }

    button:disabled{
      opacity:.48;
      cursor:not-allowed;
      filter:grayscale(.25);
    }

    .game{
      width:100%;
      height:100dvh;
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:7px;
      padding:8px;
      padding-top:calc(8px + env(safe-area-inset-top));
      padding-bottom:calc(8px + env(safe-area-inset-bottom));
      overflow:hidden;
    }

    .topbar{
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
      gap:6px;
      min-height:70px;
      padding:7px;
      border-radius:22px;
      border:3px solid rgba(255,199,125,.90);
      background:rgba(255,254,248,.94);
      box-shadow:var(--shadow);
    }

    .player-panel{
      display:grid;
      grid-template-columns:auto minmax(0,1fr);
      align-items:center;
      gap:6px;
      min-width:0;
      padding:6px 7px;
      border-radius:18px;
      border:2px solid rgba(255,220,168,.92);
      background:rgba(255,253,245,.82);
    }

    .avatar{
      width:38px;
      height:38px;
      display:grid;
      place-items:center;
      border-radius:14px;
      border:2px solid rgba(255,199,125,.78);
      background:linear-gradient(180deg,#fff8d7,#ffe18a);
      font-size:23px;
      flex:0 0 auto;
    }

    .name{
      min-width:0;
      font-size:13px;
      font-weight:1000;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .sub{
      margin-top:1px;
      color:var(--muted);
      font-size:10px;
      font-weight:850;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .center-score{
      display:grid;
      grid-template-columns:auto;
      gap:4px;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .timer{
      min-width:62px;
      height:54px;
      display:grid;
      place-items:center;
      border-radius:19px;
      border:3px solid rgba(113,204,255,.82);
      background:linear-gradient(180deg,#eef9ff,#c8edff);
      color:#1e688d;
      font-size:30px;
      line-height:1;
      font-weight:1000;
      box-shadow:0 8px 18px rgba(60,120,160,.12);
    }

    .mini-score{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:4px;
      color:#8a5a42;
      font-size:10px;
      font-weight:950;
      white-space:nowrap;
    }

    .mini-score b{
      color:#713018;
      font-size:13px;
    }

    .arena-wrap{
      min-height:0;
      position:relative;
      border-radius:26px;
      border:4px solid rgba(255,199,125,.90);
      background:
        radial-gradient(circle at 12% 14%, rgba(255,225,122,.30), transparent 22%),
        radial-gradient(circle at 88% 10%, rgba(113,204,255,.22), transparent 26%),
        linear-gradient(180deg,rgba(255,254,248,.74),rgba(255,249,230,.72));
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .arena{
      position:absolute;
      inset:0;
      overflow:hidden;
      touch-action:none;
      user-select:none;
      -webkit-user-select:none;
    }

    .arena-bg{
      position:absolute;
      inset:0;
      pointer-events:none;
      background-image:
        linear-gradient(rgba(255,199,125,.10) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,199,125,.10) 1px, transparent 1px);
      background-size:34px 34px;
      opacity:.72;
    }

    .mission-card{
      position:absolute;
      left:10px;
      top:10px;
      z-index:20;
      max-width:calc(100% - 20px);
      padding:7px 9px;
      border-radius:18px;
      border:2px solid rgba(255,220,168,.95);
      background:rgba(255,254,248,.88);
      box-shadow:0 8px 18px rgba(112,60,20,.09);
      font-weight:950;
      line-height:1.25;
      pointer-events:none;
    }

    .mission-card b{
      display:block;
      font-size:13px;
      margin-bottom:1px;
    }

    .mission-card span{
      color:var(--muted);
      font-size:10.5px;
    }

    .room-strip{
      position:absolute;
      right:9px;
      bottom:52px;
      z-index:22;
      display:flex;
      flex-wrap:wrap;
      justify-content:flex-end;
      gap:5px;
      max-width:calc(100% - 18px);
      pointer-events:none;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:28px;
      padding:5px 8px;
      border-radius:999px;
      border:2px solid rgba(255,199,125,.72);
      background:rgba(255,254,248,.86);
      color:#753119;
      font-size:10px;
      font-weight:1000;
      box-shadow:0 7px 14px rgba(112,60,20,.07);
      max-width:140px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .nav-float{
      position:absolute;
      left:8px;
      bottom:8px;
      z-index:26;
      display:flex;
      flex-wrap:wrap;
      gap:5px;
      max-width:calc(100% - 16px);
    }

    .nav-btn{
      min-height:34px;
      padding:6px 8px;
      border-radius:999px;
      border:2px solid rgba(255,199,125,.75);
      background:rgba(255,254,248,.88);
      color:#753119;
      font-size:10.5px;
      font-weight:1000;
      cursor:pointer;
      box-shadow:0 7px 14px rgba(112,60,20,.08);
    }

    .nav-btn.blue{
      border-color:rgba(113,204,255,.82);
      background:rgba(238,249,255,.9);
      color:#1e688d;
    }

    .nav-btn.green{
      border-color:rgba(85,217,120,.82);
      background:rgba(238,255,235,.9);
      color:#2d723b;
    }

    .bottom{
      display:grid;
      grid-template-columns:1fr;
      gap:6px;
      min-height:118px;
    }

    .statbar{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:5px;
      align-items:center;
      min-width:0;
      padding:7px;
      border-radius:22px;
      border:3px solid rgba(255,199,125,.88);
      background:rgba(255,254,248,.94);
      box-shadow:var(--shadow);
    }

    .stat{
      min-height:30px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:5px 8px;
      border-radius:999px;
      border:2px solid rgba(255,220,168,.95);
      background:rgba(255,248,225,.84);
      font-size:11px;
      font-weight:1000;
      color:#75401d;
    }

    .heart{
      color:#d7392c;
      letter-spacing:1px;
      font-size:15px;
    }

    .power-row{
      display:grid;
      grid-template-columns:1fr auto;
      gap:6px;
      align-items:center;
    }

    .power-card{
      min-width:0;
      padding:8px;
      border-radius:20px;
      border:3px solid rgba(255,199,125,.88);
      background:rgba(255,254,248,.94);
      box-shadow:var(--shadow);
      text-align:center;
      font-weight:1000;
    }

    .power-label{
      font-size:11px;
      color:var(--muted);
      margin-bottom:5px;
    }

    .power-track{
      height:12px;
      border-radius:999px;
      border:2px solid rgba(255,220,168,.95);
      background:rgba(255,248,225,.8);
      overflow:hidden;
    }

    .power-fill{
      height:100%;
      width:0%;
      border-radius:999px;
      background:linear-gradient(90deg,#ffe17a,#55d978);
      transition:width .15s ease;
    }

    .skillbar{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:5px;
      min-width:0;
    }

    .skill{
      min-height:44px;
      padding:6px 4px;
      border-radius:16px;
      border:2px solid rgba(255,199,125,.88);
      background:linear-gradient(180deg,#fff8da,#ffe17a);
      color:#753119;
      font-size:11px;
      font-weight:1000;
      cursor:pointer;
      box-shadow:0 6px 0 rgba(180,105,25,.12);
    }

    .skill.is-ready{
      border-color:rgba(85,217,120,.88);
      background:linear-gradient(180deg,#efffec,#b9f3c6);
      color:#266c35;
    }

    .loading{
      position:fixed;
      inset:0;
      z-index:9000;
      display:grid;
      place-items:center;
      background:rgba(255,248,232,.72);
      backdrop-filter:blur(8px);
      pointer-events:none;
      opacity:1;
      transition:opacity .25s ease;
    }

    .loading.hide{
      opacity:0;
    }

    .loading-card{
      width:min(92vw,420px);
      padding:20px;
      border-radius:30px;
      border:4px solid rgba(255,199,125,.92);
      background:rgba(255,254,248,.96);
      color:#753119;
      text-align:center;
      box-shadow:var(--shadow);
      font-weight:1000;
    }

    .loading-card .icon{
      font-size:50px;
      margin-bottom:8px;
    }

    @media(max-height:700px){
      .game{
        gap:5px;
        padding:6px;
      }

      .topbar{
        min-height:62px;
        padding:5px;
      }

      .avatar{
        width:34px;
        height:34px;
        font-size:20px;
      }

      .timer{
        height:48px;
        font-size:27px;
      }

      .bottom{
        min-height:104px;
        gap:5px;
      }

      .skill{
        min-height:39px;
        font-size:10px;
      }

      .mission-card{
        padding:6px 8px;
      }

      .room-strip{
        display:none;
      }
    }
  </style>
</head>

<body>
  <main id="gameRoot" class="game">
    <header class="topbar">
      <section class="player-panel">
        <div class="avatar">🦸</div>
        <div>
          <div id="myName" class="name">Hero</div>
          <div class="sub">คะแนน: <b id="score" data-score>0</b></div>
        </div>
      </section>

      <section class="center-score">
        <div id="timer" class="timer" data-time>60</div>
        <div class="mini-score">
          Good <b id="goodCount" data-good>0</b> • คู่แข่ง <b id="opponentScore" data-opponent-score>0</b>
        </div>
      </section>

      <section class="player-panel">
        <div class="avatar">⚔️</div>
        <div>
          <div id="opponentName" class="name" data-opponent-name>คู่แข่ง</div>
          <div class="sub">สถานะ: <b id="opponentStatus" data-opponent-status>Waiting</b></div>
        </div>
      </section>
    </header>

    <section class="arena-wrap">
      <div id="arena" class="arena">
        <div class="arena-bg"></div>

        <div class="mission-card">
          <b>🎯 Battle Mobile</b>
          <span>แตะอาหารดี • ระวัง junk • ใช้สกิลเมื่อพลังพร้อม</span>
        </div>

        <div class="room-strip">
          <span id="roomBadge" class="badge" data-room-badge>Room -</span>
          <span id="matchBadge" class="badge" data-match-badge>Match -</span>
          <span class="badge">Mobile Tap</span>
        </div>

        <div class="nav-float">
          <button id="btnLobby" class="nav-btn blue" data-action="lobby" type="button">Lobby</button>
          <button id="btnModes" class="nav-btn" data-action="modes" type="button">โหมด</button>
          <button id="btnZone" class="nav-btn green" data-action="zone" type="button">Zone</button>
          <button id="btnHub" class="nav-btn" data-action="hub" type="button">Hub</button>
        </div>
      </div>
    </section>

    <footer class="bottom">
      <section class="statbar">
        <span id="hearts" class="stat heart" data-hearts>❤❤❤</span>
        <span id="junkCount" class="stat" data-junk>Junk 0</span>
        <span id="missCount" class="stat" data-miss>Miss 0</span>
      </section>

      <section class="power-row">
        <div class="power-card">
          <div id="battlePower" class="power-label" data-power>Power 0/5</div>
          <div class="power-track">
            <div id="powerFill" class="power-fill" data-power-fill></div>
          </div>
        </div>

        <div class="skillbar">
          <button id="btnSkillStorm" class="skill" data-skill="storm" type="button">⚡</button>
          <button id="btnSkillShield" class="skill" data-skill="shield" type="button">🛡️</button>
          <button id="btnSkillFreeze" class="skill" data-skill="freeze" type="button">❄️</button>
          <button id="btnSkillHeal" class="skill" data-skill="heal" type="button">💚</button>
        </div>
      </section>
    </footer>
  </main>

  <div id="loading" class="loading">
    <div class="loading-card">
      <div class="icon">⚔️</div>
      <div>กำลังโหลด GoodJunk Battle Mobile...</div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script>
    (function GoodJunkBattleV250MobileShell(){
      'use strict';

      const SHELL_VERSION = 'v2.5.0-run-mobile-shell';

      const params = new URL(location.href).searchParams;

      function $(sel, root){
        return (root || document).querySelector(sel);
      }

      function safeText(v, fallback){
        v = String(v || '').trim();
        return v || fallback || '';
      }

      function normalizeRoomCode(raw){
        const out = String(raw || '')
          .trim()
          .toUpperCase()
          .replace(/\s+/g, '')
          .replace(/[^A-Z0-9_-]/g, '')
          .slice(0, 32);

        if (!out || /^-+$/.test(out) || /^_+$/.test(out)){
          return '';
        }

        return out;
      }

      function validateEntry(){
        const room =
          normalizeRoomCode(params.get('room')) ||
          normalizeRoomCode(params.get('roomCode')) ||
          normalizeRoomCode(params.get('code'));

        const matchId =
          params.get('matchId') ||
          params.get('roundId') ||
          params.get('runId');

        if (!room || !matchId){
          return {
            ok:false,
            room,
            matchId,
            message:'ยังไม่มี Room/Match สำหรับ Battle กรุณากลับ Lobby แล้วเริ่มใหม่'
          };
        }

        return {
          ok:true,
          room,
          matchId
        };
      }

      function buildLobbyUrl(){
        const out = new URL('./goodjunk-battle-v2-lobby.html', location.href);

        [
          'pid','name','diff','time','view','device','hub',
          'studyId','conditionGroup','api','log'
        ].forEach(function(k){
          const v = params.get(k);
          if (v !== null && v !== ''){
            out.searchParams.set(k, v);
          }
        });

        const room =
          normalizeRoomCode(params.get('room')) ||
          normalizeRoomCode(params.get('roomCode'));

        if (room){
          out.searchParams.set('room', room);
          out.searchParams.set('roomCode', room);
        }

        out.searchParams.set('zone', 'nutrition');
        out.searchParams.set('game', 'goodjunk');
        out.searchParams.set('gameId', 'goodjunk');
        out.searchParams.set('from', 'run-mobile-shell');

        return out.toString();
      }

      function showEntryError(message){
        const loading = $('#loading');
        const card = loading && loading.querySelector('.loading-card');

        if (loading){
          loading.classList.remove('hide');
          loading.style.pointerEvents = 'auto';
        }

        if (card){
          card.innerHTML = `
            <div class="icon">⚠️</div>
            <div style="font-weight:1000;margin-bottom:10px;">เข้า Battle ไม่ได้</div>
            <div style="font-weight:850;color:#9a6a42;line-height:1.4;margin-bottom:14px;">
              ${message}
            </div>
            <button id="btnBackToLobbyFromError" style="
              min-height:48px;
              padding:10px 14px;
              border-radius:18px;
              border:3px solid rgba(255,199,125,.9);
              background:linear-gradient(180deg,#fff8da,#ffe17a);
              color:#753119;
              font:1000 15px system-ui,sans-serif;
              cursor:pointer;
            ">กลับ Battle Lobby</button>
          `;

          const btn = $('#btnBackToLobbyFromError', card);
          if (btn){
            btn.addEventListener('click', function(){
              location.href = buildLobbyUrl();
            });
          }
        }
      }

      function hideLoadingWhenRuntimeReady(){
        const loading = $('#loading');

        window.addEventListener('gj:battle-runtime-ready', function(){
          setTimeout(function(){
            if (loading){
              loading.classList.add('hide');
              setTimeout(function(){
                loading.remove();
              }, 280);
            }
          }, 420);
        });

        setTimeout(function(){
          if (
            window.GJ_BATTLE_V25_RUNTIME &&
            window.GJ_BATTLE_V25_RUNTIME.state &&
            window.GJ_BATTLE_V25_RUNTIME.state.started
          ){
            if (loading){
              loading.classList.add('hide');
              setTimeout(function(){
                loading.remove();
              }, 280);
            }
          }
        }, 1600);
      }

      function lockMobileViewport(){
        document.documentElement.style.overscrollBehavior = 'none';
        document.body.style.overscrollBehavior = 'none';

        document.addEventListener('touchmove', function(ev){
          const target = ev.target;

          if (
            target &&
            target.closest &&
            target.closest('.gj-battle-summary-card')
          ){
            return;
          }

          ev.preventDefault();
        }, {
          passive:false
        });
      }

      function boot(){
        const verdict = validateEntry();

        if (!verdict.ok){
          showEntryError(verdict.message);
          window.GJ_BATTLE_V25_DISABLE_AUTOBOOT = true;
          return;
        }

        document.documentElement.dataset.gjBattleShell = SHELL_VERSION;
        document.documentElement.dataset.gjBattleView = 'mobile';

        $('#myName').textContent = safeText(params.get('name'), 'Hero');
        $('#timer').textContent = String(params.get('time') || '90');
        $('#roomBadge').textContent = 'Room ' + verdict.room;
        $('#matchBadge').textContent = 'Match ' + verdict.matchId;

        hideLoadingWhenRuntimeReady();
        lockMobileViewport();

        window.GJ_BATTLE_V25_CONFIG = Object.assign({}, window.GJ_BATTLE_V25_CONFIG || {}, {
          view:'mobile',
          shellVersion:SHELL_VERSION
        });

        console.info('[GoodJunk Battle Mobile Shell]', SHELL_VERSION, 'ready', verdict);
      }

      if (document.readyState === 'loading'){
        document.addEventListener('DOMContentLoaded', boot, { once:true });
      }else{
        boot();
      }
    })();
  </script>

  <script src="./goodjunk-battle-v2-firebase-bridge.js?v=2500"></script>
  <script src="./goodjunk-battle-v2-core.js?v=2500"></script>
  <script src="./goodjunk-global-nav-final-patch.js?v=1000"></script>
</body>
</html>
