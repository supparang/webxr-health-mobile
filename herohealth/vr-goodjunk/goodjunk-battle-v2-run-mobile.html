<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#fff3d7" />
  <meta name="color-scheme" content="light" />

  <title>GoodJunk Battle v2 • Mobile</title>

  <style>
    :root{
      --bg1:#fff8e8;
      --bg2:#eaf8ff;
      --card:#fffef8;
      --card2:#fff9e8;
      --line:#ffc77d;
      --line2:#ffdca8;
      --text:#753119;
      --muted:#9a6a42;
      --good:#55d978;
      --bad:#ff7b69;
      --blue:#71ccff;
      --yellow:#ffe17a;
      --shadow:0 14px 32px rgba(112,60,20,.14);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,
    body{
      width:100%;
      min-height:100%;
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(255,225,122,.50), transparent 28%),
        radial-gradient(circle at 90% 8%, rgba(113,204,255,.36), transparent 32%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      overflow-x:hidden;
    }

    body{
      min-height:100dvh;
      padding:6px 6px calc(136px + env(safe-area-inset-bottom));
    }

    button,
    a{
      font-family:inherit;
    }

    button{
      cursor:pointer;
      touch-action:manipulation;
    }

    .app{
      width:100%;
      max-width:760px;
      margin:0 auto;
    }

    .topbar{
      display:grid;
      grid-template-columns:auto minmax(0,1fr) auto;
      align-items:center;
      gap:8px;

      padding:8px;
      border-radius:22px;
      border:3px solid rgba(255,199,125,.9);
      background:rgba(255,254,248,.94);
      box-shadow:var(--shadow);
    }

    .game-icon{
      width:52px;
      height:52px;
      display:grid;
      place-items:center;
      border-radius:18px;
      background:linear-gradient(180deg,#fff8d7,#ffe18a);
      border:2px solid rgba(255,199,125,.84);
      font-size:30px;
      flex:0 0 auto;
    }

    .title-wrap{
      min-width:0;
    }

    .title{
      margin:0;
      font-size:clamp(22px,6vw,30px);
      line-height:1.05;
      font-weight:1000;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .subtitle{
      margin-top:3px;
      font-size:12px;
      font-weight:900;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .top-actions{
      display:flex;
      gap:5px;
      align-items:center;
    }

    .top-btn{
      min-height:38px;
      padding:6px 9px;
      border-radius:14px;
      border:2px solid rgba(255,199,125,.9);
      background:#fffef8;
      color:var(--text);
      font-size:13px;
      font-weight:1000;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .top-btn.icon-only{
      width:38px;
      padding:6px;
      font-size:18px;
    }

    .hud-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:6px;
      margin:7px 0;
    }

    .hud-card{
      min-width:0;
      min-height:58px;
      padding:6px 4px;
      border-radius:16px;
      border:3px solid rgba(255,220,168,.95);
      background:rgba(255,254,248,.92);
      text-align:center;
      box-shadow:0 7px 18px rgba(112,60,20,.10);
    }

    .hud-card .label{
      display:block;
      font-size:10px;
      line-height:1;
      font-weight:1000;
      color:#8c6a28;
      text-transform:uppercase;
    }

    .hud-card .value{
      display:block;
      margin-top:5px;
      font-size:clamp(18px,5vw,24px);
      line-height:1.05;
      font-weight:1000;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .opponent-row{
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      align-items:center;
      gap:8px;

      min-height:50px;
      padding:8px 12px;
      margin:7px 0;
      border-radius:18px;
      border:3px solid rgba(255,199,125,.9);
      background:rgba(255,254,248,.92);
      box-shadow:0 8px 20px rgba(112,60,20,.10);
    }

    .opponent-name{
      min-width:0;
      font-size:18px;
      font-weight:1000;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .opponent-status{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:64px;
      min-height:34px;
      padding:6px 10px;
      border-radius:999px;
      border:3px solid rgba(130,220,130,.62);
      background:#efffeb;
      color:#4f9b39;
      font-size:13px;
      font-weight:1000;
    }

    .arena{
      position:relative;
      width:100%;
      height:clamp(300px,48dvh,430px);
      min-height:300px;
      max-height:48dvh;
      margin:6px 0;
      border-radius:24px;
      border:4px solid rgba(255,199,125,.9);
      overflow:hidden;
      box-shadow:var(--shadow);

      background:
        linear-gradient(90deg, rgba(255,255,255,.18) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255,255,255,.18) 1px, transparent 1px),
        linear-gradient(180deg,#e9fbff 0%,#fff9cf 100%);
      background-size:72px 72px,72px 72px,100% 100%;
    }

    .arena::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 60%, rgba(255,225,122,.30), transparent 30%),
        radial-gradient(circle at 25% 80%, rgba(85,217,120,.14), transparent 26%),
        radial-gradient(circle at 80% 35%, rgba(113,204,255,.14), transparent 30%);
    }

    .target{
      position:absolute;
      display:grid;
      place-items:center;
      width:58px;
      height:58px;
      border-radius:18px;
      border:6px solid var(--good);
      background:rgba(255,255,255,.94);
      box-shadow:0 10px 20px rgba(80,50,10,.14);
      font-size:30px;
      font-weight:1000;
      user-select:none;
      touch-action:manipulation;
      transform:translate(-50%,-50%);
      transition:transform .12s ease, opacity .12s ease;
      z-index:5;
    }

    .target.bad,
    .target.junk{
      border-color:#ff7990;
    }

    .target:active{
      transform:translate(-50%,-50%) scale(.92);
    }

    .target.hit{
      opacity:0;
      transform:translate(-50%,-50%) scale(1.25);
    }

    .mini-stats{
      position:absolute;
      left:8px;
      right:8px;
      bottom:8px;
      z-index:12;
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:5px;
      pointer-events:none;
    }

    .mini-pill{
      padding:5px 8px;
      border-radius:999px;
      border:2px solid rgba(255,210,156,.95);
      background:rgba(255,253,245,.86);
      color:var(--text);
      font-size:11px;
      font-weight:1000;
      box-shadow:0 5px 14px rgba(100,55,12,.10);
    }

    .battle-actions{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:8px;
      margin:8px 0 10px;
      padding:8px;
      border-radius:22px;
      border:3px solid rgba(255,190,105,.75);
      background:rgba(255,252,238,.96);
      box-shadow:var(--shadow);
    }

    .skill-btn{
      min-height:58px;
      padding:8px 6px;
      border-radius:18px;
      border:3px solid rgba(255,203,122,.92);
      background:linear-gradient(180deg,#fff8d9,#ffe27a);
      color:#87331f;
      font-size:clamp(14px,4vw,17px);
      font-weight:1000;
      line-height:1.1;
      box-shadow:0 7px 0 rgba(194,125,38,.22);
    }

    .skill-btn:active{
      transform:translateY(2px);
      box-shadow:0 4px 0 rgba(194,125,38,.18);
    }

    .skill-btn[disabled]{
      opacity:.5;
      filter:grayscale(.25);
      box-shadow:none;
    }

    .safe-bottom{
      height:max(10px, env(safe-area-inset-bottom));
    }

    .result-overlay{
      position:fixed;
      inset:0;
      z-index:90000;
      display:none;
      align-items:center;
      justify-content:center;
      padding:14px;
      background:rgba(40,28,18,.36);
      backdrop-filter:blur(9px);
    }

    .result-overlay.show{
      display:flex;
    }

    .result-card{
      width:min(94vw,560px);
      max-height:calc(100dvh - 18px);
      overflow:auto;
      padding:22px 16px 18px;
      border-radius:30px;
      border:5px solid rgba(255,187,105,.96);
      background:rgba(255,254,248,.97);
      box-shadow:0 22px 50px rgba(70,34,10,.24);
      text-align:center;
    }

    .result-icon{
      width:80px;
      height:80px;
      display:grid;
      place-items:center;
      margin:0 auto 10px;
      border-radius:25px;
      background:linear-gradient(180deg,#fff8d7,#ffe18a);
      border:3px solid rgba(255,199,125,.84);
      font-size:42px;
    }

    .result-title{
      margin:0;
      font-size:clamp(34px,11vw,56px);
      line-height:1.05;
      font-weight:1000;
      color:var(--text);
    }

    .result-note{
      width:fit-content;
      max-width:100%;
      margin:12px auto;
      padding:8px 13px;
      border-radius:999px;
      border:3px dashed rgba(255,208,140,.92);
      background:rgba(255,248,225,.88);
      font-size:18px;
      font-weight:1000;
      color:#8a5a20;
    }

    .result-score-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin:14px 0;
    }

    .score-box{
      min-width:0;
      padding:13px 10px;
      border-radius:22px;
      border:3px solid rgba(255,220,168,.95);
      background:rgba(255,253,245,.92);
      text-align:left;
    }

    .score-box .who{
      font-size:14px;
      font-weight:1000;
    }

    .score-box .big{
      margin-top:3px;
      font-size:44px;
      line-height:1;
      font-weight:1000;
      color:var(--text);
    }

    .score-box .small{
      margin-top:6px;
      font-size:13px;
      font-weight:900;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .rematch-status{
      margin:10px 0;
      padding:9px 10px;
      border-radius:18px;
      border:3px dashed rgba(255,208,140,.92);
      background:rgba(255,248,225,.7);
      font-size:16px;
      font-weight:1000;
      color:#86601d;
    }

    .result-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:12px;
    }

    .result-actions button,
    .result-actions a{
      min-height:52px;
      padding:10px 12px;
      border-radius:18px;
      border:3px solid rgba(255,199,125,.9);
      background:#fffef8;
      color:var(--text);
      font-size:16px;
      font-weight:1000;
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .result-actions .primary{
      background:linear-gradient(180deg,#fff8da,#ffe17a);
    }

    .result-actions .blue{
      background:linear-gradient(180deg,#eef9ff,#bfe8ff);
      border-color:rgba(110,203,255,.9);
    }

    @media (max-width:390px){
      .topbar{
        grid-template-columns:auto minmax(0,1fr);
      }

      .top-actions{
        grid-column:1 / -1;
        justify-content:space-between;
      }

      .top-btn{
        flex:1;
      }

      .hud-grid{
        grid-template-columns:repeat(2,minmax(0,1fr));
      }

      .arena{
        height:clamp(280px,44dvh,380px);
        min-height:280px;
        max-height:44dvh;
      }

      .result-actions{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>
  <div class="app" id="app">
    <header class="topbar">
      <div class="game-icon">⚔️</div>

      <div class="title-wrap">
        <h1 class="title">GoodJunk Battle v2.4.20</h1>
        <div class="subtitle" id="roomLine">Battle • Mobile</div>
      </div>

      <nav class="top-actions" aria-label="navigation">
        <button class="top-btn icon-only" id="btnFullscreen" type="button" aria-label="Fullscreen">⛶</button>
        <button class="top-btn" id="btnBackLobby" type="button" data-back-lobby>Lobby</button>
        <button class="top-btn" id="btnHub" type="button" data-back-hub>Hub</button>
      </nav>
    </header>

    <section class="hud-grid" aria-label="battle status">
      <div class="hud-card">
        <span class="label">PLAYER</span>
        <span class="value" id="playerName">Hero</span>
      </div>

      <div class="hud-card">
        <span class="label">SCORE</span>
        <span class="value" id="score" data-score>0</span>
      </div>

      <div class="hud-card">
        <span class="label">HEART</span>
        <span class="value" id="hearts" data-hearts>❤❤❤</span>
      </div>

      <div class="hud-card">
        <span class="label">TIME</span>
        <span class="value" id="timer" data-time>60</span>
      </div>
    </section>

    <section class="opponent-row">
      <div class="opponent-name" id="opponentName">คู่แข่ง: รอคู่แข่ง...</div>
      <div class="opponent-status" id="opponentStatus">PLAY</div>
    </section>

    <main class="arena" id="arena" aria-label="GoodJunk Battle arena">
      <div class="mini-stats">
        <span class="mini-pill" id="goodCount">Good0</span>
        <span class="mini-pill" id="junkCount">Junk0</span>
        <span class="mini-pill" id="missCount">Miss0</span>
        <span class="mini-pill" id="attackCount">Attack0/5</span>
        <span class="mini-pill" id="shieldCount">Shield0</span>
      </div>
    </main>

    <div id="battlePower" data-battle-power>พลัง 0/5</div>

    <section id="battleActions" class="battle-actions action-bar" aria-label="Battle skills">
      <button id="btnJunkStorm" class="skill-btn" type="button" data-skill="junk-storm" data-action="junk-storm">
        ⚡ Junk Storm
      </button>

      <button id="btnShield" class="skill-btn" type="button" data-skill="shield" data-action="shield">
        🛡️ Shield
      </button>

      <button id="btnFreeze" class="skill-btn" type="button" data-skill="freeze" data-action="freeze">
        ❄️ Freeze
      </button>

      <button id="btnHeal" class="skill-btn" type="button" data-skill="heal" data-action="heal">
        💚 Heal
      </button>
    </section>

    <div class="safe-bottom"></div>
  </div>

  <section id="resultOverlay" class="result-overlay" aria-live="polite">
    <div class="result-card battle-result">
      <div class="result-icon" id="resultIcon">💪</div>
      <h2 class="result-title" id="resultTitle" data-result-title>Battle!</h2>
      <div class="result-note" id="resultReason">เหตุผล: -</div>

      <div class="result-score-grid">
        <div class="score-box">
          <div class="who" id="resultMeName">คุณ: Hero</div>
          <div class="big" id="resultMyScore">0</div>
          <div class="small" id="resultMyMeta">Good: 0 • Junk: 0 • Miss: 0</div>
        </div>

        <div class="score-box">
          <div class="who" id="resultOpName">คู่แข่ง: -</div>
          <div class="big" id="resultOpScore">0</div>
          <div class="small" id="resultOpMeta">Good: 0 • Junk: 0 • Miss: 0</div>
        </div>
      </div>

      <div class="rematch-status" id="rematchStatus" data-rematch-status>
        กด Battle อีกครั้ง เมื่อต้องการเล่นต่อ
      </div>

      <div class="result-actions">
        <button id="btnRematch" class="primary btn-rematch" type="button" data-rematch-btn>
          🔁 Battle อีกครั้ง
        </button>

        <button id="btnResultLobby" type="button" data-back-lobby>
          ⚔️ กลับ Lobby
        </button>

        <button id="btnAllModes" class="blue" type="button" data-all-modes>
          🎮 โหมดทั้งหมด
        </button>

        <button id="btnResultHub" type="button" data-back-hub>
          🏠 Hub
        </button>
      </div>
    </div>
  </section>

  <script>
    (function GoodJunkBattleMobileRuntime(){
      'use strict';

      const RUNTIME_VERSION = 'v2.4.20-mobile-runtime';

      const url = new URL(location.href);
      const params = url.searchParams;

      const PLAYER_ID = params.get('pid') || 'anon';
      const PLAYER_NAME = params.get('name') || 'Hero';
      const ROOM_CODE =
        params.get('room') ||
        params.get('roomCode') ||
        params.get('code') ||
        params.get('lastRoom') ||
        '';

      const TIME_LIMIT = Math.max(30, Number(params.get('time') || 60));
      const DIFF = params.get('diff') || 'normal';

      const arena = document.getElementById('arena');
      const timerEl = document.getElementById('timer');
      const scoreEl = document.getElementById('score');
      const heartsEl = document.getElementById('hearts');
      const playerNameEl = document.getElementById('playerName');
      const roomLine = document.getElementById('roomLine');
      const opponentNameEl = document.getElementById('opponentName');
      const opponentStatusEl = document.getElementById('opponentStatus');

      const goodCountEl = document.getElementById('goodCount');
      const junkCountEl = document.getElementById('junkCount');
      const missCountEl = document.getElementById('missCount');
      const attackCountEl = document.getElementById('attackCount');
      const shieldCountEl = document.getElementById('shieldCount');

      const resultOverlay = document.getElementById('resultOverlay');

      const foodGood = ['🍎','🥦','🥚','🍚','🐟','🥕','🍌','🥛'];
      const foodJunk = ['🍩','🍟','🍔','🥤','🍰','🍭','🍬','🧁'];

      const state = {
        running: true,
        ended: false,
        score: 0,
        good: 0,
        junk: 0,
        miss: 0,
        hearts: 3,
        timeLeft: TIME_LIMIT,
        spawnEvery: DIFF === 'hard' ? 720 : DIFF === 'easy' ? 1100 : 900,
        targetLife: DIFF === 'hard' ? 2100 : DIFF === 'easy' ? 3300 : 2700,
        spawnTimer: null,
        clockTimer: null,
        playerId: PLAYER_ID,
        roomCode: ROOM_CODE
      };

      window.GJ_PLAYER_ID = PLAYER_ID;
      window.MY_PLAYER_ID = PLAYER_ID;
      window.GJ_PLAYER_NAME = PLAYER_NAME;
      window.MY_PLAYER_NAME = PLAYER_NAME;
      window.GJ_ROOM_CODE = ROOM_CODE;
      window.ROOM_CODE = ROOM_CODE;
      window.GJ_BATTLE_PHASE = 'play';

      function emit(name, detail){
        window.dispatchEvent(new CustomEvent(name, { detail: detail || {} }));
      }

      function rand(min, max){
        return Math.random() * (max - min) + min;
      }

      function pick(arr){
        return arr[Math.floor(Math.random() * arr.length)];
      }

      function syncBasicUI(){
        playerNameEl.textContent = PLAYER_NAME;
        scoreEl.textContent = String(state.score);
        heartsEl.textContent = '❤'.repeat(state.hearts) + '♡'.repeat(Math.max(0, 3 - state.hearts));
        timerEl.textContent = String(Math.max(0, state.timeLeft));

        goodCountEl.textContent = 'Good' + state.good;
        junkCountEl.textContent = 'Junk' + state.junk;
        missCountEl.textContent = 'Miss' + state.miss;

        const battleState = window.GJ_BATTLE_STATE || {};
        const power = Number(battleState.power ?? battleState.attackPower ?? 0);
        const maxPower = Number(battleState.maxPower ?? 5);
        const shield = battleState.shieldActive ? 1 : 0;

        attackCountEl.textContent = 'Attack' + power + '/' + maxPower;
        shieldCountEl.textContent = 'Shield' + shield;

        roomLine.textContent = [
          PLAYER_NAME,
          ROOM_CODE ? ('room ' + ROOM_CODE) : 'guest',
          'mobile'
        ].join(' • ');

        window.GJ_BATTLE_STATE = Object.assign({}, window.GJ_BATTLE_STATE || {}, {
          score: state.score,
          myScore: state.score,
          good: state.good,
          junk: state.junk,
          miss: state.miss,
          hearts: state.hearts,
          hp: state.hearts,
          maxHearts: 3,
          timeLeft: state.timeLeft,
          remaining: state.timeLeft
        });

        emit('gj:battle-state-updated', window.GJ_BATTLE_STATE);
      }

      function spawnTarget(forcedKind){
        if (!state.running || state.ended) return;

        const kind = forcedKind || (Math.random() < 0.66 ? 'good' : 'junk');
        const item = document.createElement('button');

        item.type = 'button';
        item.className = 'target ' + (kind === 'junk' ? 'bad junk' : 'good');
        item.dataset.kind = kind;
        item.dataset.type = kind;
        item.textContent = kind === 'good' ? pick(foodGood) : pick(foodJunk);

        item.style.left = rand(12, 88) + '%';
        item.style.top = rand(18, 74) + '%';

        item.addEventListener('click', function(ev){
          ev.preventDefault();
          ev.stopPropagation();

          if (state.ended) return;

          item.classList.add('hit');

          if (kind === 'good'){
            state.good += 1;
            state.score += 10;

            emit('gj:good-collected', {
              score: 10,
              power: 1,
              kind: 'good'
            });

            emit('hha:score', {
              type: 'good',
              score: 10,
              points: 10
            });
          }else{
            state.junk += 1;
            state.miss += 1;
            state.hearts = Math.max(0, state.hearts - 1);

            emit('gj:junk-hit', {
              damage: 1,
              kind: 'junk'
            });

            emit('hha:miss', {
              type: 'junk',
              damage: 1
            });

            if (state.hearts <= 0){
              setTimeout(function(){
                endGame('lose', 'heart-zero');
              }, 120);
            }
          }

          syncBasicUI();

          setTimeout(function(){
            item.remove();
          }, 120);
        });

        arena.appendChild(item);

        setTimeout(function(){
          if (!item.parentNode || state.ended) return;

          const k = item.dataset.kind;

          if (k === 'good'){
            state.miss += 1;
            emit('hha:miss', {
              type: 'miss-good',
              damage: 0
            });
          }

          item.remove();
          syncBasicUI();
        }, state.targetLife);
      }

      function startGame(){
        syncBasicUI();

        state.spawnTimer = setInterval(function(){
          spawnTarget();
        }, state.spawnEvery);

        state.clockTimer = setInterval(function(){
          if (!state.running || state.ended) return;

          state.timeLeft -= 1;

          if (state.timeLeft <= 0){
            state.timeLeft = 0;
            endGame('timeup', 'time-up');
          }

          syncBasicUI();
        }, 1000);

        for (let i = 0; i < 4; i++){
          setTimeout(function(){
            spawnTarget();
          }, i * 420);
        }
      }

      function getOpponentSnapshot(){
        const room = window.GJ_CURRENT_ROOM || {};
        const players = room.players || {};
        const entries = Object.entries(players);
        const op = entries.find(function(pair){
          return String(pair[0]) !== String(PLAYER_ID);
        });

        if (!op){
          return {
            name: 'Hero',
            score: 0,
            good: 0,
            junk: 0,
            miss: 0
          };
        }

        const data = op[1] || {};

        return {
          name: data.name || data.playerName || data.displayName || 'Hero',
          score: Number(data.score || 0),
          good: Number(data.good || 0),
          junk: Number(data.junk || 0),
          miss: Number(data.miss || 0),
          status: data.status || ''
        };
      }

      function updateOpponentUI(){
        const op = getOpponentSnapshot();

        opponentNameEl.textContent = 'คู่แข่ง: ' + (op.name || 'Hero');

        if (op.status === 'left' || op.status === 'offline'){
          opponentStatusEl.textContent = 'LEFT';
        }else{
          opponentStatusEl.textContent = 'PLAY';
        }
      }

      function endGame(result, reason){
        if (state.ended) return;

        state.ended = true;
        state.running = false;
        window.GJ_BATTLE_PHASE = 'summary';

        clearInterval(state.spawnTimer);
        clearInterval(state.clockTimer);

        const op = getOpponentSnapshot();

        const myScore = state.score;
        const opScore = op.score || 0;

        let title = 'จบ Battle!';
        let icon = '💪';

        if (result === 'lose' || myScore < opScore){
          title = 'แพ้ Battle!';
          icon = '💪';
        }else if (myScore > opScore){
          title = 'ชนะ Battle!';
          icon = '🏆';
        }else{
          title = 'เสมอ Battle!';
          icon = '🤝';
        }

        document.getElementById('resultIcon').textContent = icon;
        document.getElementById('resultTitle').textContent = title;
        document.getElementById('resultReason').textContent = 'เหตุผล: ' + reason;

        document.getElementById('resultMeName').textContent = 'คุณ: ' + PLAYER_NAME;
        document.getElementById('resultMyScore').textContent = String(myScore);
        document.getElementById('resultMyMeta').textContent =
          'Good: ' + state.good + ' • Junk: ' + state.junk + ' • Miss: ' + state.miss;

        document.getElementById('resultOpName').textContent = 'คู่แข่ง: ' + (op.name || 'Hero');
        document.getElementById('resultOpScore').textContent = String(opScore);
        document.getElementById('resultOpMeta').textContent =
          'Good: ' + op.good + ' • Junk: ' + op.junk + ' • Miss: ' + op.miss;

        resultOverlay.classList.add('show');

        if (window.GJ_BATTLE_CORE && typeof window.GJ_BATTLE_CORE.updateMyPlayer === 'function'){
          window.GJ_BATTLE_CORE.updateMyPlayer({
            score: state.score,
            good: state.good,
            junk: state.junk,
            miss: state.miss,
            hearts: state.hearts,
            hp: state.hearts,
            result: title,
            finished: true,
            done: true,
            status: 'finished'
          });
        }

        if (window.GJ_BATTLE_CORE && typeof window.GJ_BATTLE_CORE.updateRoom === 'function'){
          window.GJ_BATTLE_CORE.updateRoom({
            phase: 'summary',
            status: 'summary',
            endedAt: Date.now(),
            reason: reason
          });
        }

        emit('gj:battle-ended', {
          result,
          reason,
          score: state.score
        });
      }

      window.spawnJunkStorm = function(count){
        count = Number(count || 5);
        for (let i = 0; i < count; i++){
          setTimeout(function(){
            spawnTarget('junk');
          }, i * 260);
        }
      };

      window.spawnBadItems = window.spawnJunkStorm;
      window.spawnJunkWave = window.spawnJunkStorm;

      window.GJ_BATTLE_RUNTIME = {
        version: RUNTIME_VERSION,
        state,
        spawnTarget,
        endGame,
        syncBasicUI,
        updateOpponentUI
      };

      document.getElementById('btnFullscreen').addEventListener('click', async function(){
        try{
          if (!document.fullscreenElement){
            await document.documentElement.requestFullscreen();
          }else{
            await document.exitFullscreen();
          }
        }catch(e){}
      });

      window.addEventListener('gj:battle-state-updated', syncBasicUI);
      window.addEventListener('gj:battle-rematch-start', function(){
        location.reload();
      });
      window.addEventListener('gj:battle-opponent-left', updateOpponentUI);

      setInterval(updateOpponentUI, 1000);

      if (document.readyState === 'loading'){
        document.addEventListener('DOMContentLoaded', startGame, { once:true });
      }else{
        startGame();
      }

      console.info('[GoodJunk Battle Mobile Runtime]', RUNTIME_VERSION, 'loaded');
    })();
  </script>
