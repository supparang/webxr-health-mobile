<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk Battle Mobile v2.2.7</title>
  <meta name="theme-color" content="#ffd75a" />
  <link rel="icon" href="./favicon.ico" />

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script src="../firebase-config.js?v=20260515-gj-battle-mobile-v227-cap2"></script>

  <style>
    :root{
      --bg1:#fff7d8;
      --bg2:#eaf8ff;
      --panel:#fffef9;
      --line:#ffbd78;
      --line2:#ffdca8;
      --text:#8b2f1d;
      --muted:#755f48;
      --good:#69e782;
      --bad:#ff8494;
      --power:#b79cff;
      --shield:#7ab7ff;
      --shadow:0 18px 42px rgba(130,80,20,.14);
      --sat:env(safe-area-inset-top,0px);
      --sar:env(safe-area-inset-right,0px);
      --sab:env(safe-area-inset-bottom,0px);
      --sal:env(safe-area-inset-left,0px);
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

    html,body{
      margin:0;
      width:100%;
      min-height:100%;
      font-family:system-ui,-apple-system,"Segoe UI","Noto Sans Thai",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 12% 8%,rgba(255,255,255,.88),transparent 22%),
        radial-gradient(circle at 88% 4%,rgba(255,141,141,.20),transparent 24%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
    }

    body{overflow-x:hidden;}

    .app{
      min-height:100dvh;
      padding:
        calc(10px + var(--sat))
        calc(10px + var(--sar))
        calc(12px + var(--sab))
        calc(10px + var(--sal));
      display:grid;
      grid-template-rows:auto auto minmax(460px,1fr) auto;
      gap:10px;
    }

    .box{
      border:4px solid var(--line);
      background:linear-gradient(180deg,#fffef9,#fff8e8);
      border-radius:26px;
      box-shadow:var(--shadow);
    }

    .top{
      padding:12px;
      display:grid;
      gap:10px;
    }

    .brand{
      display:grid;
      grid-template-columns:auto 1fr;
      gap:10px;
      align-items:center;
    }

    .brandIcon{
      width:64px;
      height:64px;
      border-radius:22px;
      display:grid;
      place-items:center;
      font-size:34px;
      border:4px solid var(--line2);
      background:linear-gradient(180deg,#fff8dc,#ffd75a);
    }

    h1{
      margin:0;
      font-size:clamp(30px,8vw,44px);
      line-height:1;
      font-weight:1000;
      color:var(--text);
    }

    .meta{
      margin-top:4px;
      color:var(--muted);
      font-size:13px;
      font-weight:900;
      line-height:1.35;
    }

    .topActions{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
    }

    .btn{
      min-height:46px;
      border:3px solid var(--line2);
      border-radius:18px;
      background:#fffef9;
      color:var(--text);
      padding:8px 10px;
      font-weight:1000;
      font-size:14px;
      cursor:pointer;
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      user-select:none;
    }

    .btn:disabled{opacity:.45;cursor:not-allowed;filter:grayscale(.25);}
    .btn.good{background:linear-gradient(180deg,#a6f071,#7ed957);border-color:#b8f29a;color:#173b0b;}
    .btn.warn{background:linear-gradient(180deg,#ffe785,#ffd75a);border-color:#ffe08a;color:#553900;}
    .btn.info{background:linear-gradient(180deg,#9fe3ff,#58b7f5);border-color:#9fe3ff;color:#08374d;}
    .btn.danger{background:linear-gradient(180deg,#ffd1d1,#ff8d8d);border-color:#ffc7c7;color:#6d1e1e;}

    .hud{
      padding:8px;
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:7px;
    }

    .stat{
      min-height:64px;
      border:3px solid var(--line2);
      background:#fffef9;
      border-radius:18px;
      padding:7px 6px;
      display:grid;
      place-items:center;
      text-align:center;
      font-weight:1000;
    }

    .stat small{
      color:#7c610e;
      font-size:10px;
      line-height:1;
      text-transform:uppercase;
      font-weight:1000;
    }

    .stat b{
      display:block;
      margin-top:4px;
      color:var(--text);
      font-size:20px;
      line-height:1;
      max-width:100%;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .rival{
      padding:10px;
      display:grid;
      gap:8px;
    }

    .rivalTitle{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      font-weight:1000;
      font-size:20px;
      text-align:left;
    }

    .badge{
      border:3px solid #c9f5cf;
      background:#f4fff5;
      color:#387b28;
      border-radius:999px;
      padding:6px 12px;
      font-size:12px;
      font-weight:1000;
    }

    .rivalStats{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:7px;
    }

    .arena{
      position:relative;
      overflow:hidden;
      border:4px solid var(--line);
      border-radius:28px;
      min-height:460px;
      background:
        linear-gradient(rgba(255,255,255,.20) 1px, transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.20) 1px, transparent 1px),
        linear-gradient(180deg,#eaf8ff,#fff8c8);
      background-size:44px 44px,44px 44px,auto;
      touch-action:manipulation;
      box-shadow:var(--shadow);
    }

    .arena.storm{
      animation:stormPulse .45s ease infinite alternate;
    }

    @keyframes stormPulse{
      from{filter:saturate(1) brightness(1);}
      to{filter:saturate(1.18) brightness(.94);}
    }

    .target{
      position:absolute;
      width:92px;
      height:92px;
      border-radius:32px;
      display:grid;
      place-items:center;
      border:7px solid var(--good);
      background:linear-gradient(180deg,#ffffff,#fffdf4);
      box-shadow:0 14px 30px rgba(80,120,70,.24);
      font-size:50px;
      cursor:pointer;
      user-select:none;
      touch-action:manipulation;
      z-index:3;
    }

    .target.bad{border-color:var(--bad);}
    .target.power{border-color:var(--power);}
    .target.shield{border-color:var(--shield);}

    .target:active{transform:scale(.9);filter:brightness(1.05);}

    .dock{
      padding:10px;
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:8px;
    }

    .dock .btn{
      min-height:54px;
      font-size:13px;
      line-height:1.2;
    }

    .pop{
      position:absolute;
      z-index:7;
      transform:translate(-50%,-50%);
      color:var(--text);
      font-weight:1000;
      font-size:28px;
      pointer-events:none;
      animation:pop .65s ease forwards;
      text-shadow:0 2px 0 #fff;
    }

    @keyframes pop{
      from{opacity:1;transform:translate(-50%,-50%) scale(.9);}
      to{opacity:0;transform:translate(-50%,-100%) scale(1.18);}
    }

    .toast{
      position:fixed;
      left:50%;
      top:calc(14px + var(--sat));
      transform:translateX(-50%);
      z-index:90;
      max-width:min(92vw,720px);
      border:4px solid var(--line);
      background:#fffef9;
      color:var(--text);
      border-radius:22px;
      padding:12px 16px;
      font-weight:1000;
      font-size:14px;
      text-align:center;
      box-shadow:0 16px 36px rgba(60,35,15,.24);
      display:none;
    }

    .toast.show{display:block;}

    .overlay{
      position:fixed;
      inset:0;
      z-index:60;
      display:none;
      align-items:center;
      justify-content:center;
      padding:calc(18px + var(--sat)) 18px calc(18px + var(--sab));
      background:rgba(98,55,30,.42);
      backdrop-filter:blur(6px);
      overflow:auto;
    }

    .overlay.show{display:flex;}

    .modal{
      width:min(94vw,760px);
      max-height:calc(100dvh - 36px - var(--sat) - var(--sab));
      overflow:auto;
      border:4px solid var(--line);
      background:#fffef9;
      border-radius:32px;
      box-shadow:0 20px 52px rgba(80,45,15,.24);
      padding:22px;
      text-align:center;
    }

    .modalIcon{
      width:82px;
      height:82px;
      margin:0 auto 12px;
      border:4px solid var(--line2);
      border-radius:28px;
      display:grid;
      place-items:center;
      font-size:42px;
      background:linear-gradient(180deg,#fff8dc,#ffdca8);
    }

    .modal h2{
      margin:0 0 10px;
      font-size:clamp(42px,10vw,64px);
      color:var(--text);
      line-height:1.05;
    }

    .reason{
      display:inline-block;
      border:3px dashed var(--line2);
      border-radius:18px;
      padding:9px 14px;
      color:#7c610e;
      font-weight:1000;
      margin-bottom:12px;
    }

    .resultGrid{
      display:grid;
      gap:12px;
      text-align:left;
      margin:12px 0;
    }

    .resultCard{
      border:3px solid var(--line2);
      border-radius:22px;
      padding:14px;
      background:#fffaf0;
      font-weight:1000;
      color:var(--text);
    }

    .resultCard b{
      display:block;
      font-size:42px;
      line-height:1.05;
      margin:4px 0;
    }

    .resultActions{
      display:grid;
      gap:10px;
      margin-top:12px;
    }

    .rematchBox{
      display:none;
      border:3px dashed var(--line2);
      border-radius:22px;
      padding:14px;
      margin:12px 0;
      background:#fff8db;
      color:#7c4d00;
      font-weight:1000;
    }

    .rematchBox.show{display:block;}

    .rematchActions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-top:10px;
    }
  </style>
</head>

<body>
  <div id="toast" class="toast"></div>

  <main class="app">
    <section class="box top">
      <div class="brand">
        <div class="brandIcon">⚔️</div>
        <div>
          <h1>GoodJunk Battle</h1>
          <div id="meta" class="meta">Battle 1v1 • loading…</div>
        </div>
      </div>

      <div class="topActions">
        <a id="btnLobby" class="btn" href="./goodjunk-battle-v2-lobby.html">Lobby</a>
        <a id="btnHub" class="btn" href="../nutrition-zone.html">Hub</a>
        <button id="btnSfx" class="btn" type="button">🔊 SFX</button>
      </div>
    </section>

    <section class="box hud">
      <div class="stat"><small>Player</small><b id="playerName">-</b></div>
      <div class="stat"><small>Score</small><b id="score">0</b></div>
      <div class="stat"><small>Heart</small><b id="heart">❤️❤️❤️</b></div>
      <div class="stat"><small>Time</small><b id="timeLeft">90</b></div>
      <div class="stat"><small>Combo</small><b id="comboCount">0</b></div>
      <div class="stat"><small>Attack</small><b id="attackCount">0/3</b></div>
    </section>

    <section id="arena" class="arena" aria-label="GoodJunk Battle Mobile Arena"></section>

    <section class="box rival">
      <div class="rivalTitle">
        <span>คู่แข่ง: <span id="rivalName">รอคู่แข่ง</span></span>
        <span class="badge">1v1</span>
      </div>
      <div class="rivalStats">
        <div class="stat"><small>Rival Score</small><b id="rivalScore">0</b></div>
        <div class="stat"><small>Rival Heart</small><b id="rivalHeart">-</b></div>
        <div class="stat"><small>Room</small><b id="roomText">-</b></div>
      </div>
    </section>

    <section class="box dock">
      <button id="btnStorm" class="btn warn" type="button" disabled>⚡ Junk Storm<br>Attack 3/3</button>
      <button id="btnShield" class="btn info" type="button" disabled>🛡 Shield<br>กันโจมตี</button>
      <button id="btnFreeze" class="btn info" type="button" disabled>🧊 Freeze<br>Attack 2/3</button>
      <button id="btnComboBreak" class="btn danger" type="button" disabled>💥 Combo Break<br>Combo 8+</button>
    </section>
  </main>

  <div id="overlay" class="overlay">
    <div class="modal">
      <div id="modalIcon" class="modalIcon">🏁</div>
      <h2 id="modalTitle">จบ Battle!</h2>
      <div id="modalReason" class="reason">time-up</div>

      <div class="resultGrid">
        <div class="resultCard">
          <div>คุณ: <span id="resultMeName">-</span></div>
          <b id="resultMeScore">0</b>
          <div id="resultMeMeta">Good: 0 • Junk: 0 • Miss: 0</div>
        </div>
        <div class="resultCard">
          <div>คู่แข่ง: <span id="resultRivalName">-</span></div>
          <b id="resultRivalScore">0</b>
          <div id="resultRivalMeta">Good: 0 • Junk: 0 • Miss: 0</div>
        </div>
      </div>

      <div id="rematchBox" class="rematchBox">
        <div id="rematchText">รออีกฝ่าย...</div>
        <div class="rematchActions">
          <button id="btnAcceptRematch" class="btn good" type="button">✅ ยอมรับ</button>
          <button id="btnDeclineRematch" class="btn danger" type="button">❌ ปฏิเสธ</button>
        </div>
      </div>

      <div class="resultActions">
        <button id="btnAgain" class="btn warn" type="button">🔁 Battle อีกครั้ง</button>
        <a id="btnLobbyEnd" class="btn" href="./goodjunk-battle-v2-lobby.html">⚔️ กลับ Lobby</a>
        <a id="btnHubEnd" class="btn" href="../nutrition-zone.html">🏠 Hub</a>
      </div>
    </div>
  </div>

  <script>
  (() => {
    'use strict';

    window.HHA_GJ_BATTLE_MOBILE = 'v20260515-battle-run-mobile-v227-capacity-2';

    const ROOM_ROOT = 'hha-battle/goodjunk/battleRooms';
    const CAPACITY = 2;

    const GOOD = ['🍎','🍌','🥦','🥬','🥕','🍊','🍇','🐟','🥚','🍚'];
    const BAD = ['🍟','🍔','🧁','🥤','🍭'];
    const POWER = ['⚡','💎'];
    const ITEMS = ['🛡️'];

    const $ = id => document.getElementById(id);
    const params = new URLSearchParams(location.search);

    let db = null;
    let unsub = null;
    let tickTimer = null;
    let spawnTimer = null;
    let syncTimer = null;
    let toastTimer = null;
    let stormTimer = null;
    let ended = false;
    let finishing = false;
    let rematchStarting = false;
    let appliedAttackIds = new Set();

    const state = {
      room: normalizeRoom(qs('room', qs('roomId',''))),
      matchId: qs('matchId',''),
      pid: qs('pid','anon'),
      name: qs('name', qs('nick','Hero')),
      role: qs('role', qs('host','') === '1' ? 'host' : 'guest'),
      view:'mobile',
      timeTotal: Number(qs('time','90')) || 90,
      timeLeft: Number(qs('time','90')) || 90,
      diff: qs('diff','normal'),
      hub: qs('hub','../nutrition-zone.html'),
      score:0,
      good:0,
      junk:0,
      miss:0,
      heart:3,
      combo:0,
      attack:0,
      shield:0,
      roomData:null,
      rival:null,
      startedAt:0,
      stormUntil:0
    };

    function qs(k,d=''){ return params.get(k) ?? d; }
    function now(){ return Date.now(); }
    function safeKey(v){ return String(v || '').trim().replace(/[.#$/\[\]]/g,'_').slice(0,96) || 'room'; }

    function normalizeRoom(v){
      let s = String(v || '').trim().toUpperCase();
      s = s.replace(/\s+/g,'').replace(/[^A-Z0-9-]/g,'');
      if (!s) return '';
      if (!s.startsWith('GJ-BT-')){
        s = 'GJ-BT-' + s.replace(/^GJ-BT/i,'').replace(/^GJBT/i,'').replace(/^BT/i,'').replace(/^-/, '');
      }
      return s.slice(0,15);
    }

    function roomPath(){ return `${ROOM_ROOT}/${safeKey(state.room)}`; }
    function playerPath(pid=state.pid){ return `${roomPath()}/players/${safeKey(pid)}`; }
    function attacksPath(){ return `${roomPath()}/attacks`; }
    function rematchPath(){ return `${roomPath()}/rematch`; }

    async function firebaseReady(){
      if (!window.HHA_FIREBASE_READY) throw new Error('HHA_FIREBASE_READY not found');
      const fb = await window.HHA_FIREBASE_READY;
      if (!fb || !fb.db) throw new Error('Firebase DB not ready');
      db = fb.db;
      return fb;
    }

    async function dbGet(path){
      const snap = await db.ref(path).get();
      return snap && snap.val ? snap.val() : null;
    }

    async function dbUpdate(path,val){
      await db.ref(path).update(val);
      return val;
    }

    function dbOn(path,cb){
      const ref = db.ref(path);
      const fn = snap => cb(snap && snap.val ? snap.val() : null);
      ref.on('value',fn);
      return () => { try{ ref.off('value',fn); }catch(_){} };
    }

    function playersArray(room){
      return Object.values(room?.players || {}).filter(Boolean).sort((a,b) => Number(a.joinedAt || 0) - Number(b.joinedAt || 0));
    }

    function getMe(room){ return room?.players?.[safeKey(state.pid)] || null; }
    function getRival(room){ return playersArray(room).find(p => p.pid !== state.pid) || null; }

    function isHostForRoom(room){
      const me = getMe(room);
      return !!room && !!me && (room.hostPid === state.pid || me.role === 'host' || state.role === 'host');
    }

    function buildLobbyUrl(){
      const u = new URL('./goodjunk-battle-v2-lobby.html', location.href);
      passParams(u,{run:'menu'});
      return u.toString();
    }

    function buildRunUrl(matchId){
      const u = new URL('./goodjunk-battle-v2-run-mobile.html', location.href);
      passParams(u,{matchId:matchId || state.matchId, run:'play'});
      return u.toString();
    }

    function passParams(u,extra={}){
      const obj = {
        room:state.room,
        roomId:state.room,
        matchId:state.matchId || '',
        pid:state.pid,
        name:state.name,
        role:state.role,
        host:state.role === 'host' ? '1' : '0',
        diff:state.diff,
        time:String(state.timeTotal),
        view:'mobile',
        device:'mobile',
        hub:state.hub,
        zone:'nutrition',
        cat:'nutrition',
        game:'goodjunk',
        gameId:'goodjunk',
        mode:'battle-v2',
        entry:'battle-v2',
        capacity:String(CAPACITY),
        ...extra
      };
      Object.entries(obj).forEach(([k,v]) => {
        if (v !== undefined && v !== null && String(v) !== '') u.searchParams.set(k,String(v));
      });
    }

    function hydrateLinks(){
      const lobby = buildLobbyUrl();
      $('btnLobby').href = lobby;
      $('btnLobbyEnd').href = lobby;
      $('btnHub').href = state.hub;
      $('btnHubEnd').href = state.hub;
    }

    function hearts(n){
      const x = Math.max(0,Math.min(5,Number(n || 0)));
      return x > 0 ? '❤️'.repeat(x) : '💔';
    }

    function showToast(text,ms=1800){
      const el = $('toast');
      el.textContent = text;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), ms);
    }

    function updateHud(){
      $('meta').textContent = `${state.name} • ${state.role} • ${state.room} • Battle 1v1`;
      $('playerName').textContent = state.name;
      $('score').textContent = String(Number(state.score || 0));
      $('heart').textContent = hearts(state.heart);
      $('timeLeft').textContent = String(Math.max(0,Number(state.timeLeft || 0)));
      $('comboCount').textContent = String(Number(state.combo || 0));
      $('attackCount').textContent = `${Math.min(3,Number(state.attack || 0))}/3`;
      $('roomText').textContent = state.room || '-';

      if (state.rival){
        $('rivalName').textContent = state.rival.name || 'คู่แข่ง';
        $('rivalScore').textContent = String(Number(state.rival.score || 0));
        $('rivalHeart').textContent = hearts(state.rival.heart ?? 3);
      }else{
        $('rivalName').textContent = 'รอคู่แข่ง';
        $('rivalScore').textContent = '0';
        $('rivalHeart').textContent = '-';
      }

      const ready = !ended && !!state.rival;
      $('btnStorm').disabled = !(ready && Number(state.attack || 0) >= 3);
      $('btnFreeze').disabled = !(ready && Number(state.attack || 0) >= 2);
      $('btnComboBreak').disabled = !(ready && Number(state.combo || 0) >= 8);
      $('btnShield').disabled = !(Number(state.shield || 0) > 0);
    }

    async function writeSelf(extra={}, force=false){
      if (!db) return;
      if (ended && !force) return;

      const payload = {
        pid:state.pid,
        name:state.name,
        role:state.role,
        view:'mobile',
        score:Number(state.score || 0),
        good:Number(state.good || 0),
        junk:Number(state.junk || 0),
        miss:Number(state.miss || 0),
        heart:Number(state.heart || 0),
        combo:Number(state.combo || 0),
        attack:Number(state.attack || 0),
        shield:Number(state.shield || 0),
        updatedAt:now(),
        ...extra
      };

      try{ await dbUpdate(playerPath(), payload); }
      catch(err){ console.warn('[GJ Battle Mobile] writeSelf failed', err); }
    }

    function syncRoom(room){
      state.roomData = room || null;
      if (!room) return;

      if (Number(room.capacity || CAPACITY) !== CAPACITY){
        dbUpdate(roomPath(),{capacity:CAPACITY,updatedAt:now()}).catch(()=>{});
      }

      const roomMatch = room.matchId || room.activeMatchId || '';
      if (room.status === 'started' && roomMatch && state.matchId && roomMatch !== state.matchId && ended){
        location.href = buildRunUrl(roomMatch);
        return;
      }

      const finalSummary = room.finalSummary || null;
      if (finalSummary && room.status === 'ended'){
        renderFinalSummary(finalSummary);
        return;
      }

      const me = getMe(room);
      const rival = getRival(room);
      state.rival = rival || null;

      if (me && !finishing && !ended){
        state.score = Number(me.score ?? state.score ?? 0);
        state.good = Number(me.good ?? state.good ?? 0);
        state.junk = Number(me.junk ?? state.junk ?? 0);
        state.miss = Number(me.miss ?? state.miss ?? 0);
        state.heart = Number(me.heart ?? state.heart ?? 3);
        state.combo = Number(me.combo ?? state.combo ?? 0);
        state.attack = Number(me.attack ?? state.attack ?? 0);
        state.shield = Number(me.shield ?? state.shield ?? 0);
      }

      handleIncomingAttacks(room);
      handleRematch(room);
      updateHud();
    }

    function rand(min,max){ return min + Math.random() * (max - min); }
    function isStormActive(){ return now() < Number(state.stormUntil || 0); }

    function pickType(){
      if (isStormActive()){
        const r = Math.random();
        if (r < .65) return 'bad';
        if (r < .88) return 'good';
        return 'power';
      }
      const r = Math.random();
      if (r < .68) return 'good';
      if (r < .84) return 'bad';
      if (r < .94) return 'power';
      return 'item';
    }

    function pickIcon(type){
      if (type === 'good') return GOOD[Math.floor(Math.random()*GOOD.length)];
      if (type === 'bad') return BAD[Math.floor(Math.random()*BAD.length)];
      if (type === 'power') return POWER[Math.floor(Math.random()*POWER.length)];
      return ITEMS[Math.floor(Math.random()*ITEMS.length)];
    }

    function spawnTarget(forceType='', forcedIcon=''){
      if (ended || finishing) return;

      const arena = $('arena');
      const rect = arena.getBoundingClientRect();
      if (rect.width < 80 || rect.height < 120) return;

      const type = forceType || pickType();
      const icon = forcedIcon || pickIcon(type);

      const el = document.createElement('button');
      el.type = 'button';
      el.className = 'target';
      if (type === 'bad') el.classList.add('bad');
      if (type === 'power') el.classList.add('power');
      if (type === 'item') el.classList.add('shield');
      el.textContent = icon;
      el.dataset.type = type;
      el.dataset.icon = icon;

      const size = Math.min(110, Math.max(82, rect.width * .17));
      const x = rand(8,Math.max(8,rect.width - size - 8));
      const y = rand(8,Math.max(8,rect.height - size - 8));

      el.style.width = `${size}px`;
      el.style.height = `${size}px`;
      el.style.left = `${x}px`;
      el.style.top = `${y}px`;
      el.style.fontSize = `${Math.round(size * .54)}px`;
      el.style.borderRadius = `${Math.round(size * .34)}px`;

      let alive = true;
      const ttl = type === 'bad' ? 1500 : type === 'power' ? 1300 : 1700;

      const timer = setTimeout(() => {
        if (!alive || ended || finishing) return;
        alive = false;
        if (el.parentNode) el.remove();

        if (type === 'good'){
          state.miss++;
          state.combo = 0;
          writeSelf();
          updateHud();
        }
      }, ttl);

      function hit(ev){
        ev.preventDefault();
        ev.stopPropagation();
        if (!alive || ended || finishing) return;

        alive = false;
        clearTimeout(timer);
        el.remove();
        handleHit(type, icon, x + size/2, y + size/2);
      }

      el.addEventListener('pointerdown', hit, {passive:false});
      arena.appendChild(el);
    }

    function handleHit(type, icon, x, y){
      if (type === 'good'){
        const plus = 10 + Math.min(12,state.combo + 1);
        state.good++;
        state.combo++;
        state.score += plus;

        if (state.combo % 5 === 0){
          state.attack = Math.min(3,state.attack + 1);
          state.score += 15;
          showToast('⚡ Combo 5! Attack +1');
        }

        pop(x,y,'+' + plus);
      }else if (type === 'bad'){
        if (state.shield > 0 && isStormActive()){
          state.shield = Math.max(0,state.shield - 1);
          state.combo = 0;
          pop(x,y,'🛡️');
          showToast('🛡 Shield กัน Junk แล้ว!');
        }else{
          state.junk++;
          state.combo = 0;
          state.heart = Math.max(0,state.heart - 1);
          state.score = Math.max(0,state.score - 15);
          pop(x,y,'-15');
        }
      }else if (type === 'power'){
        state.attack = Math.min(3,state.attack + 1);
        state.score += 5;
        pop(x,y,'+⚡');
      }else if (type === 'item'){
        state.shield = Math.min(2,state.shield + 1);
        state.score += 5;
        pop(x,y,'+🛡');
      }

      writeSelf();
      updateHud();

      if (state.heart <= 0){
        globalEnd('heart-zero', state.pid).catch(err => console.warn(err));
      }
    }

    function pop(x,y,text){
      const arena = $('arena');
      const el = document.createElement('div');
      el.className = 'pop';
      el.textContent = text;
      el.style.left = `${x}px`;
      el.style.top = `${y}px`;
      arena.appendChild(el);
      setTimeout(() => { try{ el.remove(); }catch(_){} },700);
    }

    function clearTargets(){
      document.querySelectorAll('.target,.pop').forEach(el => { try{ el.remove(); }catch(_){} });
    }

    async function sendAttack(type){
      if (ended || finishing) return;
      if (!state.rival) return showToast('ยังไม่มีคู่แข่ง');

      if (type === 'junkStorm'){
        if (state.attack < 3) return showToast('⚡ ต้องมี Attack 3/3');
        state.attack = 0;
      }

      if (type === 'freeze'){
        if (state.attack < 2) return showToast('🧊 ต้องมี Attack 2/3');
        state.attack -= 2;
      }

      if (type === 'comboBreak'){
        if (state.combo < 8) return showToast('💥 ต้องมี Combo 8+');
        state.combo = 0;
      }

      await writeSelf();

      const attackId = 'ATK-' + state.pid + '-' + Date.now().toString(36).toUpperCase();

      await dbUpdate(`${attacksPath()}/${safeKey(attackId)}`,{
        id:attackId,
        type,
        fromPid:state.pid,
        fromName:state.name,
        toPid:state.rival.pid,
        toName:state.rival.name || 'คู่แข่ง',
        matchId:state.matchId || '',
        createdAt:now(),
        durationMs:type === 'junkStorm' ? 5200 : 3600,
        active:true
      });

      showToast(type === 'junkStorm' ? '⚡ ส่ง Junk Storm!' : type === 'freeze' ? '🧊 ส่ง Freeze!' : '💥 ตัด Combo คู่แข่ง!');
      updateHud();
    }

    function handleIncomingAttacks(room){
      const attacks = room?.attacks || {};

      Object.values(attacks).forEach(atk => {
        if (!atk || !atk.id) return;
        if (atk.toPid !== state.pid) return;
        if (appliedAttackIds.has(atk.id)) return;
        if (atk.matchId && state.matchId && atk.matchId !== state.matchId) return;

        appliedAttackIds.add(atk.id);

        if (state.shield > 0){
          state.shield = Math.max(0,state.shield - 1);
          writeSelf();
          showToast('🛡 Shield กันการโจมตีแล้ว!');
          return;
        }

        if (atk.type === 'junkStorm'){
          const duration = Number(atk.durationMs || 5200);
          state.stormUntil = Math.max(state.stormUntil || 0, now() + duration);
          $('arena').classList.add('storm');
          showToast(`⚠️ ${atk.fromName || 'คู่แข่ง'} ใช้ Junk Storm!`);

          clearTimeout(stormTimer);
          stormTimer = setTimeout(() => {
            $('arena').classList.remove('storm');
            showToast('✅ Junk Storm จบแล้ว');
          },duration);

          for(let i=0;i<8;i++){
            setTimeout(() => spawnTarget('bad'), i * 280);
          }
        }

        if (atk.type === 'freeze'){
          showToast(`🧊 ${atk.fromName || 'คู่แข่ง'} ใช้ Freeze! เป้าจะมาช้าลง`);
        }

        if (atk.type === 'comboBreak'){
          state.combo = 0;
          writeSelf();
          showToast(`💥 ${atk.fromName || 'คู่แข่ง'} ตัด Combo!`);
        }
      });
    }

    async function globalEnd(reason='time-up', loserPid=''){
      if (ended || finishing) return;

      finishing = true;

      clearInterval(tickTimer);
      clearInterval(spawnTimer);
      clearInterval(syncTimer);
      clearTargets();
      $('arena').classList.remove('storm');

      await writeSelf({
        finished:true,
        finishReason:reason,
        finishedAt:now()
      }, true).catch(() => {});

      let room = await dbGet(roomPath()).catch(() => state.roomData);
      if (!room) room = state.roomData;

      const playerMap = {};
      playersArray(room).forEach(p => { playerMap[safeKey(p.pid)] = {...p}; });
      playerMap[safeKey(state.pid)] = {
        ...(playerMap[safeKey(state.pid)] || {}),
        pid:state.pid,
        name:state.name,
        role:state.role,
        score:state.score,
        good:state.good,
        junk:state.junk,
        miss:state.miss,
        heart:state.heart,
        combo:state.combo,
        finished:true,
        finishReason:reason,
        finishedAt:now()
      };

      const arr = Object.values(playerMap).filter(Boolean);
      const sorted = [...arr].sort((a,b) => {
        if (Number(b.score || 0) !== Number(a.score || 0)) return Number(b.score || 0) - Number(a.score || 0);
        return Number(b.good || 0) - Number(a.good || 0);
      });

      let winnerPid = sorted[0]?.pid || state.pid;

      if (reason === 'heart-zero' && loserPid){
        const other = arr.find(p => p.pid !== loserPid);
        if (other) winnerPid = other.pid;
      }

      const summary = {
        matchId:state.matchId || room?.matchId || room?.activeMatchId || '',
        roomId:state.room,
        mode:'battle-v2',
        capacity:CAPACITY,
        reason,
        winnerPid,
        loserPid:loserPid || '',
        endedAt:now(),
        players:playerMap
      };

      try{
        const latest = await dbGet(roomPath()).catch(() => null);
        if (!latest?.finalSummary){
          await dbUpdate(roomPath(),{
            status:'ended',
            endedAt:now(),
            endReason:reason,
            finalSummary:summary,
            updatedAt:now()
          });
        }
      }catch(err){
        console.warn('[GJ Battle Mobile] globalEnd write failed', err);
      }

      finishing = false;
      renderFinalSummary(summary);
    }

    function renderFinalSummary(summary){
      if (!summary) return;
      if (ended && $('overlay').classList.contains('show')) return;

      ended = true;
      finishing = false;

      clearInterval(tickTimer);
      clearInterval(spawnTimer);
      clearInterval(syncTimer);
      clearTargets();
      $('arena').classList.remove('storm');

      const players = summary.players || {};
      const me = players[safeKey(state.pid)] || Object.values(players).find(p => p.pid === state.pid) || {};
      const rival = Object.values(players).find(p => p.pid !== state.pid) || {};

      const winnerIsMe = summary.winnerPid === state.pid;

      $('modalIcon').textContent = winnerIsMe ? '🏆' : '💪';
      $('modalTitle').textContent = winnerIsMe ? 'ชนะ Battle!' : 'แพ้ Battle';
      $('modalReason').textContent = 'เหตุผล: ' + (summary.reason || 'ended');

      $('resultMeName').textContent = me.name || state.name;
      $('resultMeScore').textContent = String(Number(me.score || 0));
      $('resultMeMeta').textContent = `Good: ${me.good || 0} • Junk: ${me.junk || 0} • Miss: ${me.miss || 0}`;

      $('resultRivalName').textContent = rival.name || 'คู่แข่ง';
      $('resultRivalScore').textContent = String(Number(rival.score || 0));
      $('resultRivalMeta').textContent = `Good: ${rival.good || 0} • Junk: ${rival.junk || 0} • Miss: ${rival.miss || 0}`;

      $('overlay').classList.add('show');
      showRematchReady();
      updateHud();
    }

    function rematchVotesComplete(room){
      const players = playersArray(room);
      const votes = room?.rematch?.votes || {};
      return players.length === CAPACITY && players.every(p => votes[safeKey(p.pid)] === true);
    }

    async function requestRematch(){
      if (!db) return;

      const room = await dbGet(roomPath()).catch(() => null);
      if (!room?.finalSummary) return showToast('⏳ รอผลสรุปกลางก่อน');

      await dbUpdate(rematchPath(),{
        requestedBy:state.pid,
        requestedByName:state.name,
        requestedAt:now(),
        status:'pending',
        matchId:room.matchId || room.activeMatchId || state.matchId || '',
        updatedAt:now()
      });

      await dbUpdate(`${rematchPath()}/votes`,{ [safeKey(state.pid)]:true });
      await dbUpdate(roomPath(),{ status:'rematch', updatedAt:now() });

      $('rematchBox').classList.add('show');
      $('rematchText').textContent = 'คุณขอ Battle อีกครั้งแล้ว รออีกฝ่าย...';
      $('btnAgain').disabled = true;
      $('btnAcceptRematch').disabled = true;
      $('btnDeclineRematch').disabled = false;

      showToast('🔁 ส่งคำขอ Battle อีกครั้งแล้ว');
    }

    async function acceptRematch(){
      const room = await dbGet(roomPath()).catch(() => null);
      if (!room?.rematch || room.rematch.status !== 'pending') return showToast('ยังไม่มีคำขอ Battle อีกครั้ง');

      await dbUpdate(`${rematchPath()}/votes`,{ [safeKey(state.pid)]:true });

      $('btnAcceptRematch').disabled = true;
      $('btnDeclineRematch').disabled = false;
      $('rematchText').textContent = 'คุณยอมรับแล้ว รอเริ่มรอบใหม่...';

      const fresh = await dbGet(roomPath()).catch(() => null);
      if (fresh && rematchVotesComplete(fresh) && isHostForRoom(fresh)){
        await startRematchIfHost(fresh);
      }
    }

    async function declineRematch(){
      await dbUpdate(rematchPath(),{
        status:'declined',
        declinedBy:state.pid,
        declinedByName:state.name,
        declinedAt:now(),
        updatedAt:now()
      });

      $('btnAcceptRematch').disabled = true;
      $('btnDeclineRematch').disabled = true;
      $('btnAgain').disabled = false;
      $('btnAgain').textContent = '🔁 Battle อีกครั้ง';
      $('rematchText').textContent = 'มีผู้เล่นปฏิเสธ Battle อีกครั้ง';
    }

    async function startRematchIfHost(room){
      if (rematchStarting) return;
      if (!room || !isHostForRoom(room) || !rematchVotesComplete(room)) return;

      rematchStarting = true;

      try{
        const players = playersArray(room);
        if (players.length !== CAPACITY){
          showToast('Rematch ต้องมีผู้เล่น 2 คนพอดี');
          return;
        }

        const newMatchId = 'BT2-' + safeKey(state.room) + '-' + Date.now().toString(36).toUpperCase();

        const resetPlayers = {};
        players.forEach(pl => {
          resetPlayers[safeKey(pl.pid)] = {
            ...pl,
            score:0, good:0, junk:0, miss:0, heart:3, combo:0, attack:0, shield:0,
            finished:false, finishReason:'', finishedAt:null, updatedAt:now()
          };
        });

        await dbUpdate(roomPath(),{
          status:'started',
          capacity:CAPACITY,
          matchId:newMatchId,
          activeMatchId:newMatchId,
          startedAt:now(),
          endedAt:null,
          endReason:null,
          finalSummary:null,
          rematch:null,
          attacks:null,
          players:resetPlayers,
          updatedAt:now()
        });

        location.href = buildRunUrl(newMatchId);
      }finally{
        rematchStarting = false;
      }
    }

    function handleRematch(room){
      if (!ended) return;

      const rm = room?.rematch;
      if (!rm){
        $('rematchBox').classList.remove('show');
        $('btnAcceptRematch').disabled = true;
        $('btnDeclineRematch').disabled = true;
        return;
      }

      const votes = rm.votes || {};
      const myVote = votes[safeKey(state.pid)] === true;
      const requester = rm.requestedByName || 'คู่แข่ง';
      const requesterIsMe = rm.requestedBy === state.pid;

      $('rematchBox').classList.add('show');

      if (rm.status === 'declined'){
        $('rematchText').textContent = 'มีผู้เล่นปฏิเสธ Battle อีกครั้ง';
        $('btnAcceptRematch').disabled = true;
        $('btnDeclineRematch').disabled = true;
        $('btnAgain').disabled = false;
        return;
      }

      if (myVote){
        $('rematchText').textContent = requesterIsMe
          ? 'คุณขอ Battle อีกครั้งแล้ว รออีกฝ่ายกดยอมรับ...'
          : 'คุณยอมรับแล้ว รอเริ่มรอบใหม่...';

        $('btnAcceptRematch').disabled = true;
        $('btnDeclineRematch').disabled = false;
        $('btnAgain').disabled = true;
      }else{
        $('rematchText').textContent = `${requester} ขอ Battle อีกครั้ง`;
        $('btnAcceptRematch').disabled = false;
        $('btnDeclineRematch').disabled = false;
        $('btnAgain').disabled = false;
      }

      if (rematchVotesComplete(room) && isHostForRoom(room)){
        startRematchIfHost(room).catch(() => {});
      }
    }

    function showRematchReady(){
      $('btnAgain').disabled = false;
      $('btnAgain').textContent = '🔁 Battle อีกครั้ง';
      $('btnAcceptRematch').disabled = true;
      $('btnDeclineRematch').disabled = true;
    }

    function startGameLoop(){
      if (ended || finishing) return;

      const startedAt = state.roomData?.startedAt || now();
      state.startedAt = Number(startedAt);

      tickTimer = setInterval(() => {
        if (ended || finishing) return;

        const elapsed = Math.floor((now() - state.startedAt) / 1000);
        state.timeLeft = Math.max(0,state.timeTotal - elapsed);

        updateHud();

        if (state.timeLeft <= 0){
          globalEnd('time-up','').catch(err => console.warn(err));
        }
      },250);

      spawnTimer = setInterval(() => {
        if (ended || finishing) return;
        const existing = document.querySelectorAll('.target').length;
        if (existing < 7){
          spawnTarget();
          if (Math.random() < .45) spawnTarget();
        }
      },520);

      syncTimer = setInterval(() => {
        if (!ended && !finishing) writeSelf();
      },1100);

      for(let i=0;i<5;i++) setTimeout(spawnTarget, i * 150);
    }

    async function ensureJoined(){
      const room = await dbGet(roomPath()).catch(() => null);
      if (!room) throw new Error('Room not found');

      state.roomData = room;
      state.matchId = state.matchId || room.matchId || room.activeMatchId || '';

      if (Number(room.capacity || CAPACITY) !== CAPACITY){
        await dbUpdate(roomPath(),{capacity:CAPACITY,updatedAt:now()}).catch(()=>{});
      }

      const players = playersArray(room);
      if (players.length > CAPACITY && !getMe(room)){
        throw new Error('Battle room is full');
      }

      if (room.finalSummary){
        renderFinalSummary(room.finalSummary);
        return;
      }

      const me = getMe(room);

      if (!me){
        await dbUpdate(playerPath(),{
          pid:state.pid, name:state.name, role:state.role,
          view:'mobile', score:0, good:0, junk:0, miss:0, heart:3, combo:0, attack:0, shield:0,
          ready:true, finished:false, joinedAt:now(), updatedAt:now()
        });
      }else{
        await dbUpdate(playerPath(),{ view:'mobile', updatedAt:now() }).catch(() => {});
      }

      const fresh = await dbGet(roomPath()).catch(() => room);
      syncRoom(fresh);
    }

    function initButtons(){
      $('btnStorm').addEventListener('click', () => sendAttack('junkStorm'));
      $('btnFreeze').addEventListener('click', () => sendAttack('freeze'));
      $('btnComboBreak').addEventListener('click', () => sendAttack('comboBreak'));
      $('btnShield').addEventListener('click', () => showToast('🛡 Shield พร้อมกันการโจมตีครั้งถัดไป'));
      $('btnAgain').addEventListener('click', requestRematch);
      $('btnAcceptRematch').addEventListener('click', acceptRematch);
      $('btnDeclineRematch').addEventListener('click', declineRematch);
      $('btnSfx').addEventListener('click', () => showToast('🔊 SFX พร้อมใช้'));

      $('btnAcceptRematch').disabled = true;
      $('btnDeclineRematch').disabled = true;
    }

    async function boot(){
      hydrateLinks();
      initButtons();
      updateHud();

      try{
        await firebaseReady();
        await ensureJoined();
        unsub = dbOn(roomPath(), syncRoom);

        if (!ended) startGameLoop();
      }catch(err){
        console.error('[GJ Battle Mobile] boot failed', err);
        showToast('โหลด Battle ไม่สำเร็จ: ' + (err?.message || err),3600);
      }
    }

    window.addEventListener('beforeunload', () => {
      try{ writeSelf({lastSeenAt:now()}, true); }catch(_){}
    });

    boot();
  })();
  </script>
