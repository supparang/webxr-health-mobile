<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#fff3d7" />
  <title>GoodJunk Battle v2 • Router</title>

  <style>
    html,body{
      margin:0;
      width:100%;
      min-height:100%;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:linear-gradient(180deg,#fff8e8,#eaf8ff);
      color:#753119;
      display:grid;
      place-items:center;
    }

    .card{
      width:min(92vw,460px);
      padding:22px;
      border-radius:28px;
      border:4px solid rgba(255,199,125,.92);
      background:rgba(255,254,248,.96);
      box-shadow:0 18px 42px rgba(112,60,20,.15);
      text-align:center;
    }

    .icon{
      width:76px;
      height:76px;
      margin:0 auto 12px;
      display:grid;
      place-items:center;
      border-radius:24px;
      background:linear-gradient(180deg,#fff8d7,#ffe18a);
      border:3px solid rgba(255,199,125,.86);
      font-size:42px;
    }

    h1{
      margin:0;
      font-size:30px;
      font-weight:1000;
      line-height:1.1;
    }

    p{
      margin:10px 0 0;
      color:#9a6a42;
      font-weight:900;
      line-height:1.45;
    }

    .btn{
      margin-top:16px;
      min-height:48px;
      padding:10px 14px;
      border-radius:18px;
      border:3px solid rgba(255,199,125,.92);
      background:linear-gradient(180deg,#fff8da,#ffe17a);
      color:#753119;
      font-size:16px;
      font-weight:1000;
      cursor:pointer;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="icon">⚔️</div>
    <h1>กำลังเข้า Battle...</h1>
    <p id="msg">กำลังเลือกหน้าที่เหมาะกับอุปกรณ์</p>
    <button id="btnGo" class="btn" type="button">เข้าเกมอีกครั้ง</button>
  </main>

  <script>
    (function GoodJunkBattleRunRouter(){
      'use strict';

      const ROUTER_VERSION = 'v2.4.34-run-router';

      const url = new URL(location.href);
      const params = url.searchParams;

      function normalizeView(v){
        v = String(v || '').toLowerCase().trim();

        if (v === 'cvr' || v === 'vr' || v === 'cardboard-vr'){
          return 'cardboard';
        }

        if (v === 'cardboard') return 'cardboard';
        if (v === 'mobile' || v === 'phone' || v === 'touch') return 'mobile';
        if (v === 'pc' || v === 'desktop') return 'pc';

        const mobile =
          (window.matchMedia && window.matchMedia('(max-width:760px)').matches) ||
          /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || '');

        return mobile ? 'mobile' : 'pc';
      }

      function targetFile(view){
        if (view === 'mobile'){
          return './goodjunk-battle-v2-run-mobile.html';
        }

        if (view === 'cardboard'){
          return './goodjunk-battle-v2-run-cardboard.html';
        }

        return './goodjunk-battle-v2-run-pc.html';
      }

      function buildTarget(){
        const view = normalizeView(params.get('view') || params.get('device') || '');
        const target = new URL(targetFile(view), location.href);

        params.forEach(function(v, k){
          if (v !== null && v !== ''){
            target.searchParams.set(k, v);
          }
        });

        target.searchParams.set('view', view);
        target.searchParams.set('device', view);
        target.searchParams.set('run', 'play');
        target.searchParams.set('phase', 'play');

        if (!target.searchParams.get('mode')){
          target.searchParams.set('mode', 'battle');
        }

        if (!target.searchParams.get('game')){
          target.searchParams.set('game', 'goodjunk');
        }

        if (!target.searchParams.get('gameId')){
          target.searchParams.set('gameId', 'goodjunk');
        }

        if (!target.searchParams.get('zone')){
          target.searchParams.set('zone', 'nutrition');
        }

        if (!target.searchParams.get('cat')){
          target.searchParams.set('cat', 'nutrition');
        }

        if (!target.searchParams.get('variant')){
          target.searchParams.set('variant', 'battle-v2');
        }

        target.searchParams.set('routerVersion', ROUTER_VERSION);

        return target.toString();
      }

      const target = buildTarget();

      document.getElementById('msg').textContent = 'กำลังไปที่ ' + target.split('/').pop().split('?')[0];

      document.getElementById('btnGo').addEventListener('click', function(){
        location.replace(target);
      });

      setTimeout(function(){
        location.replace(target);
      }, 180);

      window.GJ_BATTLE_RUN_ROUTER = {
        version: ROUTER_VERSION,
        target
      };

      console.info('[GoodJunk Battle Run Router]', ROUTER_VERSION, target);
    })();
  </script>
</body>
</html>
