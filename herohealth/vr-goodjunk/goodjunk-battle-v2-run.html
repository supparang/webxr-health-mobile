<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#fff3d7" />
  <meta name="color-scheme" content="light" />

  <title>GoodJunk Battle v2 • Runtime Router</title>

  <style>
    :root{
      --bg1:#fff8e8;
      --bg2:#eaf8ff;
      --card:#fffef8;
      --line:#ffc77d;
      --text:#753119;
      --muted:#9a6a42;
      --blue:#71ccff;
      --yellow:#ffe17a;
      --shadow:0 18px 42px rgba(112,60,20,.15);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,
    body{
      width:100%;
      min-height:100%;
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(255,225,122,.55), transparent 28%),
        radial-gradient(circle at 90% 8%, rgba(113,204,255,.38), transparent 32%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      overflow:hidden;
    }

    body{
      min-height:100dvh;
      display:grid;
      place-items:center;
      padding:18px;
    }

    .card{
      width:min(92vw,560px);
      padding:24px 20px;
      border-radius:34px;
      border:5px solid rgba(255,199,125,.92);
      background:rgba(255,254,248,.96);
      box-shadow:var(--shadow);
      text-align:center;
    }

    .icon{
      width:92px;
      height:92px;
      margin:0 auto 14px;
      display:grid;
      place-items:center;
      border-radius:30px;
      background:linear-gradient(180deg,#fff8d7,#ffe18a);
      border:4px solid rgba(255,199,125,.86);
      font-size:52px;
      box-shadow:0 10px 22px rgba(112,60,20,.12);
    }

    h1{
      margin:0;
      font-size:clamp(30px,8vw,54px);
      line-height:1.05;
      font-weight:1000;
      color:var(--text);
      letter-spacing:-.8px;
    }

    .msg{
      margin:12px auto 0;
      color:var(--muted);
      font-size:clamp(15px,4vw,18px);
      font-weight:900;
      line-height:1.45;
    }

    .route{
      margin:16px auto 0;
      padding:12px 14px;
      border-radius:20px;
      border:3px dashed rgba(255,199,125,.92);
      background:rgba(255,248,225,.78);
      color:#8a5a20;
      font-size:15px;
      font-weight:1000;
      word-break:break-word;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:18px;
    }

    button,
    a{
      min-height:52px;
      border-radius:18px;
      border:3px solid rgba(255,199,125,.92);
      background:linear-gradient(180deg,#fff8da,#ffe17a);
      color:var(--text);
      font-size:16px;
      font-weight:1000;
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      font-family:inherit;
    }

    a.blue,
    button.blue{
      background:linear-gradient(180deg,#eef9ff,#bfe8ff);
      border-color:rgba(110,203,255,.9);
    }

    @media(max-width:520px){
      .actions{
        grid-template-columns:1fr;
      }

      .card{
        padding:22px 16px;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="icon">⚔️</div>
    <h1>GoodJunk Battle</h1>
    <div class="msg" id="message">
      กำลังเลือกหน้าจอเล่นให้เหมาะกับอุปกรณ์...
    </div>
    <div class="route" id="routeText">
      preparing route...
    </div>

    <div class="actions">
      <button id="btnGoNow" type="button">เข้าเกมทันที</button>
      <a id="btnLobby" class="blue" href="./goodjunk-battle-v2-lobby.html">กลับ Lobby</a>
    </div>
  </main>

  <script>
    (function GoodJunkBattleRuntimeRouter(){
      'use strict';

      const ROUTER_VERSION = 'v2.4.31-runtime-router-opponent-score-identity-fix';

      const url = new URL(location.href);
      const params = url.searchParams;

      const messageEl = document.getElementById('message');
      const routeTextEl = document.getElementById('routeText');
      const btnGoNow = document.getElementById('btnGoNow');
      const btnLobby = document.getElementById('btnLobby');

      function safeText(v, fallback){
        v = String(v || '').trim();
        return v || fallback || '';
      }

      function detectView(){
        const qv = String(params.get('view') || params.get('device') || '').toLowerCase();

        if (qv === 'mobile') return 'mobile';
        if (qv === 'pc' || qv === 'desktop') return 'pc';
        if (qv === 'cardboard' || qv === 'cvr' || qv === 'vr') return 'cardboard';

        const ua = navigator.userAgent || '';
        const isMobile =
          /Android|iPhone|iPad|iPod|Mobile/i.test(ua) ||
          (window.matchMedia && window.matchMedia('(max-width:760px)').matches);

        return isMobile ? 'mobile' : 'pc';
      }

      function normalizeView(v){
        v = String(v || '').toLowerCase();

        if (v === 'mobile') return 'mobile';
        if (v === 'cardboard' || v === 'cvr' || v === 'vr') return 'cardboard';
        if (v === 'pc' || v === 'desktop') return 'pc';

        return detectView();
      }

      function getRunFileByView(view){
        const v = normalizeView(view);

        if (v === 'mobile'){
          return './goodjunk-battle-v2-run-mobile.html';
        }

        if (v === 'cardboard'){
          return './goodjunk-battle-v2-run-cardboard.html';
        }

        return './goodjunk-battle-v2-run-pc.html';
      }

      function normalizeRoomCode(raw){
        return String(raw || '')
          .trim()
          .toUpperCase()
          .replace(/\s+/g, '')
          .replace(/[^A-Z0-9_-]/g, '')
          .slice(0, 32);
      }

      function buildTargetUrl(){
        const view = normalizeView(params.get('view') || params.get('device') || detectView());
        const run = new URL(getRunFileByView(view), location.href);

        params.forEach(function(value, key){
          if (value !== null && value !== ''){
            run.searchParams.set(key, value);
          }
        });

        const pid = safeText(params.get('pid'), 'anon');
        const name = safeText(params.get('name') || params.get('nick'), 'Hero');
        const diff = safeText(params.get('diff'), 'normal');
        const time = safeText(params.get('time'), '60');

        const room =
          normalizeRoomCode(params.get('room')) ||
          normalizeRoomCode(params.get('roomCode')) ||
          normalizeRoomCode(params.get('code')) ||
          normalizeRoomCode(params.get('lastRoom')) ||
          normalizeRoomCode(localStorage.getItem('GJ_BATTLE_LAST_ROOM'));

        const matchId =
          safeText(params.get('matchId'), '') ||
          safeText(params.get('roundId'), '') ||
          safeText(params.get('runId'), '');

        run.searchParams.set('pid', pid);
        run.searchParams.set('name', name);
        run.searchParams.set('nick', name);
        run.searchParams.set('diff', diff);
        run.searchParams.set('time', time);
        run.searchParams.set('view', view);
        run.searchParams.set('device', view);

        run.searchParams.set('mode', 'battle');
        run.searchParams.set('game', 'goodjunk');
        run.searchParams.set('gameId', 'goodjunk');
        run.searchParams.set('entry', 'battle');
        run.searchParams.set('variant', 'battle-v2');
        run.searchParams.set('zone', params.get('zone') || 'nutrition');
        run.searchParams.set('cat', params.get('cat') || 'nutrition');
        run.searchParams.set('theme', params.get('theme') || 'goodjunk');
        run.searchParams.set('run', 'play');
        run.searchParams.set('phase', 'play');

        if (!run.searchParams.get('seed')){
          run.searchParams.set('seed', String(Date.now()));
        }

        if (room){
          run.searchParams.set('room', room);
          run.searchParams.set('roomCode', room);
          run.searchParams.set('code', room);
          localStorage.setItem('GJ_BATTLE_LAST_ROOM', room);
        }

        if (matchId){
          run.searchParams.set('matchId', matchId);
          run.searchParams.set('roundId', matchId);
        }

        if (!run.searchParams.get('hub')){
          run.searchParams.set(
            'hub',
            new URL('../nutrition-zone.html', location.href).toString()
          );
        }

        return {
          view,
          href: run.toString(),
          file: getRunFileByView(view),
          room
        };
      }

      function buildLobbyUrl(){
        const lobby = new URL('./goodjunk-battle-v2-lobby.html', location.href);

        [
          'pid',
          'name',
          'nick',
          'diff',
          'time',
          'view',
          'device',
          'room',
          'roomCode',
          'code',
          'hub',
          'zone',
          'cat',
          'studyId',
          'conditionGroup',
          'api',
          'log'
        ].forEach(function(key){
          const value = params.get(key);

          if (value !== null && value !== ''){
            lobby.searchParams.set(key, value);
          }
        });

        if (!lobby.searchParams.get('zone')){
          lobby.searchParams.set('zone', 'nutrition');
        }

        if (!lobby.searchParams.get('cat')){
          lobby.searchParams.set('cat', 'nutrition');
        }

        return lobby.toString();
      }

      const target = buildTargetUrl();

      messageEl.textContent =
        target.view === 'mobile'
          ? 'เลือกโหมด Mobile แล้ว กำลังเข้าเกม...'
          : target.view === 'cardboard'
            ? 'เลือกโหมด Cardboard / cVR แล้ว กำลังเข้าเกม...'
            : 'เลือกโหมด PC แล้ว กำลังเข้าเกม...';

      routeTextEl.textContent =
        'route: ' + target.file.replace('./', '') +
        (target.room ? ' • room ' + target.room : '');

      btnGoNow.addEventListener('click', function(){
        location.replace(target.href);
      });

      btnLobby.href = buildLobbyUrl();

      window.GJ_BATTLE_RUNTIME_ROUTER = {
        version: ROUTER_VERSION,
        target,
        buildTargetUrl,
        buildLobbyUrl,
        getRunFileByView,
        normalizeView,
        detectView
      };

      console.info('[GoodJunk Battle Runtime Router]', ROUTER_VERSION, target);

      setTimeout(function(){
        location.replace(target.href);
      }, 520);
    })();
  </script>
</body>
</html>
