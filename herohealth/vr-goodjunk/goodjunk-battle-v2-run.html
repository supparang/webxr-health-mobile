<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#fff3d7" />
  <meta name="color-scheme" content="light" />

  <title>GoodJunk Battle v2 • Router</title>

  <style>
    :root{
      --bg1:#fff8e8;
      --bg2:#eaf8ff;
      --text:#753119;
      --muted:#9a6a42;
      --line:#ffc77d;
      --shadow:0 18px 42px rgba(112,60,20,.15);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,
    body{
      width:100%;
      min-height:100%;
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans Thai",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(255,225,122,.55), transparent 28%),
        radial-gradient(circle at 90% 8%, rgba(113,204,255,.38), transparent 32%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
    }

    body{
      min-height:100dvh;
      display:grid;
      place-items:center;
      padding:16px;
    }

    .card{
      width:min(94vw,560px);
      padding:24px;
      border-radius:34px;
      border:5px solid rgba(255,199,125,.92);
      background:rgba(255,254,248,.95);
      box-shadow:var(--shadow);
      text-align:center;
    }

    .icon{
      width:92px;
      height:92px;
      display:grid;
      place-items:center;
      margin:0 auto 14px;
      border-radius:30px;
      border:4px solid rgba(255,199,125,.86);
      background:linear-gradient(180deg,#fff8d7,#ffe18a);
      font-size:52px;
    }

    h1{
      margin:0;
      font-size:clamp(34px,8vw,58px);
      line-height:1;
      font-weight:1000;
      letter-spacing:-.04em;
    }

    p{
      margin:12px 0 0;
      color:var(--muted);
      font-size:16px;
      font-weight:900;
      line-height:1.55;
    }

    .loader{
      width:100%;
      height:16px;
      margin:18px 0 4px;
      border-radius:999px;
      border:3px solid rgba(255,199,125,.86);
      background:rgba(255,248,225,.82);
      overflow:hidden;
    }

    .bar{
      height:100%;
      width:42%;
      border-radius:999px;
      background:linear-gradient(90deg,#55d978,#71ccff,#ffe17a);
      animation:move 1.1s ease-in-out infinite alternate;
    }

    @keyframes move{
      from{transform:translateX(-12%);}
      to{transform:translateX(150%);}
    }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:18px;
    }

    .btn{
      min-height:52px;
      padding:10px 12px;
      border-radius:18px;
      border:3px solid rgba(255,199,125,.9);
      background:#fffef8;
      color:var(--text);
      font-size:16px;
      font-weight:1000;
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }

    .btn.primary{
      background:linear-gradient(180deg,#fff8da,#ffe17a);
    }

    @media(max-width:420px){
      .actions{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="icon">⚔️</div>
    <h1>GoodJunk Battle</h1>
    <p id="message">กำลังเลือกหน้าเล่นให้เหมาะกับอุปกรณ์...</p>

    <div class="loader" aria-label="loading">
      <div class="bar"></div>
    </div>

    <div class="actions">
      <button id="btnGoNow" class="btn primary" type="button">เข้าเกมทันที</button>
      <button id="btnLobby" class="btn" type="button">กลับ Lobby</button>
    </div>
  </main>

  <script>
    (function GoodJunkBattleRunRouter(){
      'use strict';

      const ROUTER_VERSION = 'v2.4.31-clean-final-run-router';

      const url = new URL(location.href);
      const params = url.searchParams;

      window.GJ_BATTLE_RUN_ROUTER_VERSION = ROUTER_VERSION;

      function detectView(){
        const isMobile =
          (window.matchMedia && window.matchMedia('(max-width:760px)').matches) ||
          /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || '');

        return isMobile ? 'mobile' : 'pc';
      }

      function normalizeView(v){
        const s = String(v || '').trim().toLowerCase();

        if (s === 'pc' || s === 'desktop' || s === 'computer') return 'pc';
        if (s === 'mobile' || s === 'phone' || s === 'touch') return 'mobile';
        if (s === 'cardboard' || s === 'cvr' || s === 'vr') return 'cardboard';

        return detectView();
      }

      function normalizeRoomCode(raw){
        return String(raw || '')
          .trim()
          .toUpperCase()
          .replace(/\s+/g, '')
          .replace(/[^A-Z0-9_-]/g, '')
          .slice(0, 32);
      }

      function getView(){
        return normalizeView(
          params.get('view') ||
          params.get('device') ||
          params.get('targetView') ||
          ''
        );
      }

      function getRunFileByView(view){
        if (view === 'mobile'){
          return './goodjunk-battle-v2-run-mobile.html';
        }

        if (view === 'cardboard'){
          return './goodjunk-battle-v2-run-cardboard.html';
        }

        return './goodjunk-battle-v2-run-pc.html';
      }

      function buildTargetUrl(){
        const view = getView();
        const file = getRunFileByView(view);
        const target = new URL(file, location.href);

        params.forEach(function(v, k){
          if (v !== null && v !== ''){
            target.searchParams.set(k, v);
          }
        });

        const room =
          normalizeRoomCode(
            params.get('room') ||
            params.get('roomCode') ||
            params.get('code') ||
            params.get('lastRoom') ||
            ''
          );

        if (room){
          target.searchParams.set('room', room);
          target.searchParams.set('roomCode', room);
          target.searchParams.set('code', room);
        }

        target.searchParams.set('view', view);
        target.searchParams.set('device', view);
        target.searchParams.set('mode', 'battle');
        target.searchParams.set('game', 'goodjunk');
        target.searchParams.set('gameId', 'goodjunk');
        target.searchParams.set('entry', 'battle');
        target.searchParams.set('variant', 'battle-v2');
        target.searchParams.set('zone', params.get('zone') || 'nutrition');
        target.searchParams.set('cat', params.get('cat') || 'nutrition');
        target.searchParams.set('theme', params.get('theme') || 'goodjunk');
        target.searchParams.set('run', 'play');
        target.searchParams.set('phase', 'play');
        target.searchParams.set('router', ROUTER_VERSION);

        if (!target.searchParams.get('seed')){
          target.searchParams.set('seed', String(Date.now()));
        }

        if (!target.searchParams.get('hub')){
          target.searchParams.set(
            'hub',
            new URL('../nutrition-zone.html', location.href).toString()
          );
        }

        return target.toString();
      }

      function buildLobbyUrl(){
        const out = new URL('./goodjunk-battle-v2-lobby.html', location.href);

        [
          'pid',
          'name',
          'nick',
          'diff',
          'time',
          'view',
          'device',
          'hub',
          'zone',
          'cat',
          'studyId',
          'conditionGroup',
          'api',
          'log'
        ].forEach(function(k){
          const v = params.get(k);
          if (v !== null && v !== ''){
            out.searchParams.set(k, v);
          }
        });

        const room =
          normalizeRoomCode(
            params.get('room') ||
            params.get('roomCode') ||
            params.get('code') ||
            params.get('lastRoom') ||
            ''
          );

        if (room){
          out.searchParams.set('room', room);
          out.searchParams.set('roomCode', room);
          out.searchParams.set('lastRoom', room);
        }

        return out.toString();
      }

      const targetUrl = buildTargetUrl();

      function go(){
        location.replace(targetUrl);
      }

      function init(){
        const view = getView();
        const msg = document.getElementById('message');

        msg.textContent =
          view === 'mobile'
            ? 'กำลังเข้า Battle Mobile...'
            : view === 'cardboard'
              ? 'กำลังเข้า Battle Cardboard/cVR...'
              : 'กำลังเข้า Battle PC...';

        document.getElementById('btnGoNow').addEventListener('click', go);

        document.getElementById('btnLobby').addEventListener('click', function(){
          location.href = buildLobbyUrl();
        });

        window.GJ_BATTLE_RUN_ROUTER = {
          version: ROUTER_VERSION,
          view,
          targetUrl,
          go,
          buildTargetUrl,
          buildLobbyUrl,
          normalizeView,
          normalizeRoomCode
        };

        setTimeout(go, 450);

        console.info('[GoodJunk Battle Run Router]', ROUTER_VERSION, {
          view,
          targetUrl
        });
      }

      init();
    })();
  </script>
</body>
</html>
