<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#fff3d7" />
  <title>GoodJunk Battle v2 • Router</title>

  <style>
    :root{
      --bg1:#fff9e9;
      --bg2:#e9f8ff;
      --card:#fffef8;
      --line:#ffc77d;
      --text:#713018;
      --muted:#9a6a42;
      --blue:#6ecbff;
      --yellow:#ffe17a;
    }

    *{
      box-sizing:border-box;
    }

    html,
    body{
      width:100%;
      min-height:100%;
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 15% 15%, rgba(255,225,122,.55), transparent 26%),
        radial-gradient(circle at 85% 10%, rgba(110,203,255,.35), transparent 30%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
    }

    body{
      min-height:100dvh;
      display:grid;
      place-items:center;
      padding:20px;
    }

    .card{
      width:min(92vw,520px);
      padding:24px 20px;
      border-radius:28px;
      border:4px solid rgba(255,199,125,.9);
      background:rgba(255,254,248,.94);
      box-shadow:0 18px 42px rgba(116,62,18,.16);
      text-align:center;
    }

    .icon{
      width:76px;
      height:76px;
      display:grid;
      place-items:center;
      margin:0 auto 10px;
      border-radius:24px;
      background:linear-gradient(180deg,#fff8d7,#ffe18a);
      border:3px solid rgba(255,199,125,.82);
      font-size:42px;
    }

    h1{
      margin:8px 0 6px;
      font-size:clamp(26px,7vw,40px);
      line-height:1.05;
    }

    p{
      margin:8px auto;
      color:var(--muted);
      font-weight:800;
      line-height:1.45;
    }

    .pill{
      width:fit-content;
      max-width:100%;
      margin:14px auto 0;
      padding:8px 12px;
      border-radius:999px;
      border:2px dashed rgba(255,187,105,.9);
      background:rgba(255,248,225,.82);
      font-size:13px;
      font-weight:900;
      word-break:break-all;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      margin-top:18px;
    }

    button,
    a{
      appearance:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:48px;
      padding:10px 14px;
      border-radius:18px;
      border:3px solid rgba(255,199,125,.9);
      background:linear-gradient(180deg,#fff8da,#ffe17a);
      color:var(--text);
      font-size:16px;
      font-weight:1000;
      text-decoration:none;
      cursor:pointer;
      box-shadow:0 7px 0 rgba(180,105,25,.16);
    }

    button:active,
    a:active{
      transform:translateY(2px);
      box-shadow:0 4px 0 rgba(180,105,25,.12);
    }

    .secondary{
      background:linear-gradient(180deg,#eef9ff,#bfe8ff);
      border-color:rgba(110,203,255,.9);
    }

    .small{
      font-size:12px;
      opacity:.78;
      margin-top:12px;
    }
  </style>
</head>

<body>
  <main class="card" aria-live="polite">
    <div class="icon">⚔️</div>
    <h1>GoodJunk Battle</h1>
    <p>กำลังพาไปหน้าเล่นที่เหมาะกับอุปกรณ์ของคุณ...</p>
    <div id="routeInfo" class="pill">กำลังตรวจสอบ view...</div>

    <div class="actions">
      <button id="btnContinue" type="button">ไปต่อทันที</button>
      <a id="btnLobby" class="secondary" href="./goodjunk-battle-v2-lobby.html">กลับ Lobby</a>
    </div>

    <div class="small">
      Router: mobile / pc / cardboard
    </div>
  </main>

  <script>
    (function GoodJunkBattleV2Router(){
      'use strict';

      const ROUTER_VERSION = 'v2.4.20-router';

      const url = new URL(location.href);
      const params = url.searchParams;

      function getView(){
        const raw = String(params.get('view') || '').trim().toLowerCase();

        if (raw === 'mobile') return 'mobile';
        if (raw === 'cardboard' || raw === 'cvr' || raw === 'vr') return 'cardboard';
        if (raw === 'pc' || raw === 'desktop') return 'pc';

        const isMobile =
          (window.matchMedia && window.matchMedia('(max-width: 760px)').matches) ||
          Math.min(window.innerWidth || 9999, window.innerHeight || 9999) <= 760 ||
          /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || '');

        return isMobile ? 'mobile' : 'pc';
      }

      function targetByView(view){
        if (view === 'mobile') return './goodjunk-battle-v2-run-mobile.html';
        if (view === 'cardboard') return './goodjunk-battle-v2-run-cardboard.html';
        return './goodjunk-battle-v2-run-pc.html';
      }

      function buildTargetUrl(){
        const view = getView();
        const target = new URL(targetByView(view), location.href);

        params.forEach((v, k) => {
          if (v !== null && v !== '') target.searchParams.set(k, v);
        });

        target.searchParams.set('view', view === 'cardboard' ? 'cardboard' : view);
        target.searchParams.set('mode', params.get('mode') || 'battle');
        target.searchParams.set('game', params.get('game') || 'goodjunk');
        target.searchParams.set('gameId', params.get('gameId') || 'goodjunk');
        target.searchParams.set('entry', params.get('entry') || 'battle');
        target.searchParams.set('router', ROUTER_VERSION);

        return target;
      }

      function buildLobbyUrl(){
        const lobby = new URL('./goodjunk-battle-v2-lobby.html', location.href);

        params.forEach((v, k) => {
          if (v !== null && v !== '') lobby.searchParams.set(k, v);
        });

        lobby.searchParams.set('mode', params.get('mode') || 'battle');
        lobby.searchParams.set('game', params.get('game') || 'goodjunk');
        lobby.searchParams.set('gameId', params.get('gameId') || 'goodjunk');
        lobby.searchParams.set('entry', params.get('entry') || 'battle');

        return lobby;
      }

      const targetUrl = buildTargetUrl();
      const lobbyUrl = buildLobbyUrl();

      const routeInfo = document.getElementById('routeInfo');
      const btnContinue = document.getElementById('btnContinue');
      const btnLobby = document.getElementById('btnLobby');

      if (routeInfo){
        routeInfo.textContent =
          'view=' + (targetUrl.searchParams.get('view') || '-') +
          ' → ' +
          targetUrl.pathname.split('/').pop();
      }

      if (btnContinue){
        btnContinue.addEventListener('click', function(){
          location.replace(targetUrl.toString());
        });
      }

      if (btnLobby){
        btnLobby.href = lobbyUrl.toString();
      }

      window.GJ_BATTLE_ROUTER = {
        version: ROUTER_VERSION,
        targetUrl: targetUrl.toString(),
        lobbyUrl: lobbyUrl.toString(),
        go: function(){
          location.replace(targetUrl.toString());
        }
      };

      setTimeout(function(){
        location.replace(targetUrl.toString());
      }, 450);
    })();
  </script>
</body>
</html>
