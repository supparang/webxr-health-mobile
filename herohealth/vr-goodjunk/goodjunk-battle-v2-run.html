<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#fff3d7" />
  <meta name="color-scheme" content="light" />

  <title>GoodJunk Battle v2 • Router</title>

  <style>
    :root{
      --bg1:#fff8e8;
      --bg2:#eaf8ff;
      --card:#fffef8;
      --line:#ffc77d;
      --text:#753119;
      --muted:#9a6a42;
      --blue:#71ccff;
      --yellow:#ffe17a;
      --shadow:0 18px 42px rgba(112,60,20,.15);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,
    body{
      width:100%;
      min-height:100%;
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(255,225,122,.55), transparent 28%),
        radial-gradient(circle at 90% 8%, rgba(113,204,255,.38), transparent 32%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      overflow:hidden;
    }

    body{
      min-height:100dvh;
      display:grid;
      place-items:center;
      padding:18px;
    }

    .card{
      width:min(94vw,560px);
      padding:24px 20px;
      border-radius:34px;
      border:5px solid rgba(255,199,125,.92);
      background:rgba(255,254,248,.95);
      box-shadow:var(--shadow);
      text-align:center;
    }

    .icon{
      width:88px;
      height:88px;
      display:grid;
      place-items:center;
      margin:0 auto 14px;
      border-radius:28px;
      border:4px solid rgba(255,199,125,.86);
      background:linear-gradient(180deg,#fff8d7,#ffe18a);
      font-size:50px;
      box-shadow:0 10px 22px rgba(112,60,20,.12);
    }

    h1{
      margin:0;
      font-size:clamp(28px,7vw,46px);
      line-height:1.05;
      font-weight:1000;
      letter-spacing:-.6px;
    }

    .msg{
      margin-top:10px;
      color:var(--muted);
      font-size:16px;
      line-height:1.5;
      font-weight:900;
    }

    .route{
      margin-top:14px;
      padding:12px 14px;
      border-radius:22px;
      border:3px dashed rgba(255,199,125,.85);
      background:rgba(255,248,225,.76);
      font-size:14px;
      font-weight:950;
      word-break:break-word;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:16px;
    }

    .btn{
      min-height:52px;
      padding:10px 12px;
      border-radius:18px;
      border:3px solid rgba(255,199,125,.9);
      background:linear-gradient(180deg,#fff8da,#ffe17a);
      color:var(--text);
      font-size:16px;
      font-weight:1000;
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }

    .btn.blue{
      background:linear-gradient(180deg,#eef9ff,#bfe8ff);
      border-color:rgba(110,203,255,.9);
    }

    @media(max-width:520px){
      .actions{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="icon">⚔️</div>
    <h1>กำลังเข้า GoodJunk Battle</h1>
    <div class="msg" id="msg">
      กำลังเลือกไฟล์เกมให้เหมาะกับอุปกรณ์...
    </div>
    <div class="route" id="routeLine">
      preparing route...
    </div>
    <div class="actions">
      <button class="btn blue" id="btnGoNow" type="button">เข้าเกมทันที</button>
      <button class="btn" id="btnBackLobby" type="button">กลับ Lobby</button>
    </div>
  </main>

  <script>
    (function GoodJunkBattleV2RunRouter(){
      'use strict';

      const ROUTER_VERSION = 'v2.4.35-run-router-final';
      const url = new URL(location.href);
      const params = url.searchParams;

      const msg = document.getElementById('msg');
      const routeLine = document.getElementById('routeLine');
      const btnGoNow = document.getElementById('btnGoNow');
      const btnBackLobby = document.getElementById('btnBackLobby');

      function safeText(v, fallback){
        v = String(v || '').trim();
        return v || fallback || '';
      }

      function normalizeView(v){
        v = String(v || '').trim().toLowerCase();

        if (v === 'cvr' || v === 'vr'){
          return 'cardboard';
        }

        if (v === 'cardboard'){
          return 'cardboard';
        }

        if (v === 'mobile'){
          return 'mobile';
        }

        if (v === 'pc' || v === 'desktop'){
          return 'pc';
        }

        return '';
      }

      function detectView(){
        const fromParam = normalizeView(
          params.get('view') ||
          params.get('device') ||
          params.get('platform') ||
          ''
        );

        if (fromParam){
          return fromParam;
        }

        const ua = navigator.userAgent || '';

        const isMobile =
          /Android|iPhone|iPad|iPod|Mobile/i.test(ua) ||
          (
            window.matchMedia &&
            window.matchMedia('(max-width:760px)').matches
          );

        return isMobile ? 'mobile' : 'pc';
      }

      function getRunFileByView(view){
        const v = normalizeView(view) || detectView();

        if (v === 'mobile'){
          return './goodjunk-battle-v2-run-mobile.html';
        }

        if (v === 'cardboard'){
          return './goodjunk-battle-v2-run-cardboard.html';
        }

        return './goodjunk-battle-v2-run-pc.html';
      }

      function normalizeRoomCode(raw){
        return String(raw || '')
          .trim()
          .toUpperCase()
          .replace(/\s+/g, '')
          .replace(/[^A-Z0-9_-]/g, '')
          .slice(0, 32);
      }

      function ensureParams(target, view){
        const out = new URL(target, location.href);

        params.forEach(function(v, k){
          if (v !== null && v !== ''){
            out.searchParams.set(k, v);
          }
        });

        const pid = safeText(
          params.get('pid') ||
          localStorage.getItem('GJ_BATTLE_PID') ||
          localStorage.getItem('HHA_GJ_PID'),
          'anon'
        );

        const name = safeText(
          params.get('name') ||
          localStorage.getItem('GJ_BATTLE_NAME') ||
          localStorage.getItem('HHA_GJ_NAME'),
          'Hero'
        );

        const room = normalizeRoomCode(
          params.get('room') ||
          params.get('roomCode') ||
          params.get('code') ||
          params.get('lastRoom') ||
          localStorage.getItem('GJ_BATTLE_LAST_ROOM') ||
          ''
        );

        const matchId = safeText(
          params.get('matchId') ||
          params.get('roundId') ||
          params.get('runId') ||
          '',
          ''
        );

        out.searchParams.set('pid', pid);
        out.searchParams.set('name', name);
        out.searchParams.set('view', view);
        out.searchParams.set('device', view);

        out.searchParams.set('diff', params.get('diff') || 'normal');
        out.searchParams.set('time', params.get('time') || '90');

        out.searchParams.set('mode', 'battle');
        out.searchParams.set('game', 'goodjunk');
        out.searchParams.set('gameId', 'goodjunk');
        out.searchParams.set('entry', 'battle');
        out.searchParams.set('variant', 'battle-v2');

        out.searchParams.set('zone', params.get('zone') || 'nutrition');
        out.searchParams.set('cat', params.get('cat') || 'nutrition');
        out.searchParams.set('theme', params.get('theme') || 'goodjunk');

        out.searchParams.set('run', 'play');
        out.searchParams.set('phase', 'play');

        if (!out.searchParams.get('seed')){
          out.searchParams.set('seed', String(Date.now()));
        }

        if (room){
          out.searchParams.set('room', room);
          out.searchParams.set('roomCode', room);
          localStorage.setItem('GJ_BATTLE_LAST_ROOM', room);
        }

        if (matchId){
          out.searchParams.set('matchId', matchId);
          out.searchParams.set('roundId', matchId);
        }

        if (!out.searchParams.get('hub')){
          out.searchParams.set(
            'hub',
            new URL('../nutrition-zone.html', location.href).toString()
          );
        }

        return out;
      }

      function buildTargetUrl(){
        const view = detectView();
        const file = getRunFileByView(view);
        const target = ensureParams(file, view);

        target.searchParams.set('router', ROUTER_VERSION);

        return {
          view,
          file,
          url:target
        };
      }

      const target = buildTargetUrl();

      routeLine.textContent =
        'view=' + target.view + ' → ' + target.file;

      msg.textContent =
        target.view === 'cardboard'
          ? 'ตรวจพบโหมด Cardboard/cVR กำลังเข้าไฟล์ VR...'
          : target.view === 'mobile'
            ? 'ตรวจพบ Mobile กำลังเข้าไฟล์มือถือ...'
            : 'ตรวจพบ PC/Desktop กำลังเข้าไฟล์จอใหญ่...';

      function go(){
        location.replace(target.url.toString());
      }

      btnGoNow.addEventListener('click', go);

      btnBackLobby.addEventListener('click', function(){
        const lobby = new URL('./goodjunk-battle-v2-lobby.html', location.href);

        [
          'pid',
          'name',
          'view',
          'device',
          'diff',
          'time',
          'room',
          'roomCode',
          'code',
          'lastRoom',
          'hub',
          'zone',
          'cat',
          'studyId',
          'conditionGroup',
          'api',
          'log'
        ].forEach(function(k){
          const v = params.get(k);
          if (v !== null && v !== ''){
            lobby.searchParams.set(k, v);
          }
        });

        location.href = lobby.toString();
      });

      setTimeout(go, 520);

      window.GJ_BATTLE_RUN_ROUTER = {
        version:ROUTER_VERSION,
        target:target.url.toString(),
        view:target.view,
        file:target.file,
        getRunFileByView,
        detectView
      };

      console.info('[GoodJunk Battle Run Router]', ROUTER_VERSION, target);
    })();
  </script>
</body>
</html>
