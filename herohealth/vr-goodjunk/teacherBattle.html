<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>HeroHealth Teacher Dashboard</title>

  <style>
    :root{
      --bg:#fff7ed;
      --panel:#ffffff;
      --line:#fed7aa;
      --text:#3b2415;
      --muted:#7c4a22;
      --accent:#f97316;
      --good:#16a34a;
      --bad:#dc2626;
      --warn:#ca8a04;
      --shadow:0 14px 32px rgba(154,75,20,.14);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at 8% 0%,rgba(255,255,255,.95),transparent 26%),
        linear-gradient(180deg,#fff7ed,#fed7aa);
      color:var(--text);
      font-family:system-ui,-apple-system,"Segoe UI","Noto Sans Thai",sans-serif;
    }

    .wrap{
      width:min(1180px,100%);
      margin:0 auto;
      padding:18px;
      display:grid;
      gap:14px;
    }

    .hero,.card{
      border:3px solid var(--line);
      background:rgba(255,255,255,.9);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:16px;
    }

    .hero{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      gap:12px;
      align-items:center;
    }

    .icon{
      width:62px;
      height:62px;
      border-radius:22px;
      display:grid;
      place-items:center;
      font-size:34px;
      border:3px solid #fdba74;
      background:linear-gradient(180deg,#ffedd5,#fed7aa);
    }

    h1{
      margin:0;
      color:#7c2d12;
      font-size:clamp(26px,5vw,42px);
      line-height:1;
      font-weight:1000;
    }

    .sub{
      margin-top:6px;
      color:var(--muted);
      font-weight:900;
      line-height:1.45;
    }

    .filters{
      display:grid;
      grid-template-columns:1fr 1fr 1fr auto;
      gap:10px;
      align-items:end;
    }

    label{
      display:grid;
      gap:6px;
      color:#8a4d18;
      font-size:13px;
      font-weight:1000;
    }

    input,select,button{
      font:inherit;
    }

    input,select{
      min-height:46px;
      border:2px solid var(--line);
      border-radius:16px;
      padding:9px 12px;
      outline:none;
      background:#fffaf0;
      color:var(--text);
      font-weight:900;
    }

    button{
      min-height:46px;
      border:3px solid #fdba74;
      border-radius:16px;
      padding:9px 14px;
      background:linear-gradient(180deg,#fb923c,#ea580c);
      color:white;
      font-weight:1000;
      cursor:pointer;
      box-shadow:0 8px 18px rgba(234,88,12,.18);
    }

    button.secondary{
      background:#fff7ed;
      color:#7c2d12;
    }

    .grid4{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
    }

    .kpi{
      border:2px solid var(--line);
      border-radius:22px;
      background:#fffaf0;
      padding:14px;
      display:grid;
      gap:6px;
      min-height:104px;
    }

    .kpi b{
      font-size:34px;
      color:#7c2d12;
      line-height:1;
    }

    .kpi span{
      color:var(--muted);
      font-size:13px;
      font-weight:1000;
    }

    .two{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .section-title{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
    }

    .section-title h2{
      margin:0;
      color:#7c2d12;
      font-size:22px;
      font-weight:1000;
    }

    .small{
      color:var(--muted);
      font-size:12px;
      font-weight:900;
    }

    table{
      width:100%;
      border-collapse:separate;
      border-spacing:0 8px;
      font-size:13px;
    }

    th{
      text-align:left;
      color:#9a4a0f;
      font-size:11px;
      padding:0 8px;
      font-weight:1000;
      white-space:nowrap;
    }

    td{
      background:#fffaf0;
      border-top:2px solid var(--line);
      border-bottom:2px solid var(--line);
      padding:9px 8px;
      font-weight:850;
      vertical-align:middle;
    }

    td:first-child{
      border-left:2px solid var(--line);
      border-radius:14px 0 0 14px;
    }

    td:last-child{
      border-right:2px solid var(--line);
      border-radius:0 14px 14px 0;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:26px;
      padding:4px 8px;
      border-radius:999px;
      border:2px solid var(--line);
      background:white;
      font-size:12px;
      font-weight:1000;
      white-space:nowrap;
    }

    .win{color:#166534;background:#dcfce7;border-color:#86efac}
    .lose{color:#991b1b;background:#fee2e2;border-color:#fca5a5}
    .tie{color:#854d0e;background:#fef3c7;border-color:#fde68a}

    .status{
      min-height:24px;
      color:var(--muted);
      font-weight:900;
    }

    .empty{
      padding:20px;
      text-align:center;
      color:var(--muted);
      font-weight:900;
    }

    .bar-row{
      display:grid;
      gap:8px;
    }

    .bar-item{
      display:grid;
      grid-template-columns:110px 1fr 42px;
      gap:8px;
      align-items:center;
      font-size:13px;
      font-weight:900;
      color:var(--text);
    }

    .bar{
      height:14px;
      border-radius:999px;
      background:#ffedd5;
      overflow:hidden;
      border:1px solid #fed7aa;
    }

    .bar i{
      display:block;
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#fb923c,#ea580c);
      border-radius:999px;
    }

    @media(max-width:900px){
      .filters,.grid4,.two{
        grid-template-columns:1fr;
      }

      .hero{
        align-items:flex-start;
      }

      table{
        font-size:12px;
      }

      .card{
        overflow:auto;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <section class="hero">
      <div class="brand">
        <div class="icon">⚔️</div>
        <div>
          <h1>Teacher Dashboard</h1>
          <div class="sub">HeroHealth • GoodJunk Battle Logs</div>
        </div>
      </div>

      <button class="secondary" onclick="loadData()">🔄 Refresh</button>
    </section>

    <section class="card">
      <div class="filters">
        <label>
          Teacher PIN
          <input id="pin" type="password" placeholder="ใส่ PIN ครู">
        </label>

        <label>
          Room
          <select id="roomId">
            <option value="">ทุกห้อง</option>
          </select>
        </label>

        <label>
          Date
          <input id="date" type="date">
        </label>

        <button onclick="loadData()">ดู Dashboard</button>
      </div>

      <div id="status" class="status"></div>
    </section>

    <section class="grid4">
      <div class="kpi"><span>Battle rounds</span><b id="kRounds">0</b></div>
      <div class="kpi"><span>Wins</span><b id="kWins">0</b></div>
      <div class="kpi"><span>Avg score</span><b id="kAvg">0</b></div>
      <div class="kpi"><span>Avg duration</span><b id="kDur">0s</b></div>
    </section>

    <section class="two">
      <div class="card">
        <div class="section-title">
          <h2>🏆 Leaderboard</h2>
          <div class="small">เรียงจากชนะมากสุด</div>
        </div>

        <div id="leaderboard"></div>
      </div>

      <div class="card">
        <div class="section-title">
          <h2>⚔️ Attack Usage</h2>
          <div class="small">รวมจาก log</div>
        </div>

        <div id="attackStats"></div>
      </div>
    </section>

    <section class="card">
      <div class="section-title">
        <h2>📋 Recent Battle Rounds</h2>
        <div class="small" id="generatedAt">—</div>
      </div>

      <div id="recentRounds"></div>
    </section>
  </div>

  <script>
    const $ = id => document.getElementById(id);

    function esc(s){
      return String(s ?? '')
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#39;");
    }

    function outcomePill(v){
      const s = String(v || '').toLowerCase();

      if(s === 'win') return '<span class="pill win">ชนะ</span>';
      if(s === 'lose') return '<span class="pill lose">แพ้</span>';
      if(s === 'tie') return '<span class="pill tie">เสมอ</span>';

      return '<span class="pill">—</span>';
    }

    function loadData(){
      $('status').textContent = 'กำลังโหลดข้อมูล...';

      const pin = $('pin').value.trim();

      const filters = {
        roomId: $('roomId').value,
        date: $('date').value,
        limit: 2000
      };

      if (
        window.google &&
        google.script &&
        google.script.run
      ) {
        google.script.run
          .withSuccessHandler(render)
          .withFailureHandler(err => {
            $('status').textContent = 'โหลดไม่สำเร็จ: ' + (err && err.message ? err.message : err);
          })
          .getBattleTeacherData(pin, filters);

        return;
      }

      $('status').innerHTML =
        'ไม่พบ <b>google.script.run</b> — กรุณาเปิด Dashboard ผ่านลิงก์ Web App แบบ ' +
        '<b>?page=teacher_battle</b> และต้อง Deploy เป็น Web App ก่อน';
    }

    function render(data){
      if(!data || !data.ok){
        $('status').textContent = data && data.message ? data.message : 'ไม่สามารถโหลดข้อมูลได้';
        return;
      }

      $('status').textContent =
        `โหลดแล้ว • logs ${data.kpi.totalLogs} รายการ • timezone ${data.timezone}`;

      $('generatedAt').textContent = data.generatedAt || '—';

      $('kRounds').textContent = data.kpi.totalRounds || 0;
      $('kWins').textContent = data.kpi.wins || 0;
      $('kAvg').textContent = data.kpi.avgScore || 0;
      $('kDur').textContent = `${data.kpi.avgDurationSec || 0}s`;

      syncRooms(data.rooms || []);
      renderLeaderboard(data.leaderboard || []);
      renderAttackStats(data.attackStats || []);
      renderRecent(data.recentRounds || []);
    }

    function syncRooms(rooms){
      const select = $('roomId');
      const current = select.value;

      const opts = ['<option value="">ทุกห้อง</option>']
        .concat(rooms.map(r => `<option value="${esc(r)}">${esc(r)}</option>`));

      select.innerHTML = opts.join('');

      if(rooms.includes(current)){
        select.value = current;
      }
    }

    function renderLeaderboard(rows){
      if(!rows.length){
        $('leaderboard').innerHTML = '<div class="empty">ยังไม่มี battle_end logs</div>';
        return;
      }

      $('leaderboard').innerHTML = `
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>ชื่อ</th>
              <th>รอบ</th>
              <th>ชนะ</th>
              <th>Win%</th>
              <th>Avg</th>
              <th>Best</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((r,i) => `
              <tr>
                <td>${i+1}</td>
                <td>${esc(r.name)}</td>
                <td>${r.rounds}</td>
                <td>${r.wins}</td>
                <td>${r.winRate}%</td>
                <td>${r.avgScore}</td>
                <td>${r.bestScore}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function renderAttackStats(rows){
      if(!rows.length){
        $('attackStats').innerHTML = '<div class="empty">ยังไม่มี attack logs</div>';
        return;
      }

      const max = Math.max(...rows.map(r => Number(r.count || 0)), 1);

      $('attackStats').innerHTML = `
        <div class="bar-row">
          ${rows.map(r => {
            const pct = Math.round((Number(r.count || 0) / max) * 100);

            return `
              <div class="bar-item">
                <div>${esc(r.attackType)}</div>
                <div class="bar"><i style="width:${pct}%"></i></div>
                <div>${r.count}</div>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    function renderRecent(rows){
      if(!rows.length){
        $('recentRounds').innerHTML = '<div class="empty">ยังไม่มีรอบ Battle ที่จบแล้ว</div>';
        return;
      }

      $('recentRounds').innerHTML = `
        <table>
          <thead>
            <tr>
              <th>เวลา</th>
              <th>Room</th>
              <th>Round</th>
              <th>ผู้เล่น</th>
              <th>คู่แข่ง</th>
              <th>ผล</th>
              <th>Score</th>
              <th>HP</th>
              <th>Good</th>
              <th>Junk</th>
              <th>Atk</th>
              <th>เหตุผล</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td>${esc(r.date)} ${esc(r.time)}</td>
                <td>${esc(r.roomId)}</td>
                <td>${esc(r.roundSeq)}</td>
                <td>${esc(r.name)}</td>
                <td>${esc(r.rivalName)}</td>
                <td>${outcomePill(r.outcome)}</td>
                <td>${r.score}</td>
                <td>${r.hp}/${r.maxHp}</td>
                <td>${r.goodHits}</td>
                <td>${r.junkHits}</td>
                <td>${r.attacksSent}</td>
                <td>${esc(r.endReason || r.winType || '')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    window.addEventListener('load', loadData);
  </script>
</body>
</html>
