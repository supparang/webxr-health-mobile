<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกม AR อาหารแสนสนุก (Good Food vs Junk Food)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@400;700&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f0fdf4;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ffedd5 0%, #ccfbf1 100%);
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            color: #1e3a8a;
            margin-bottom: 20px;
            text-shadow: 2px 2px #fff;
        }

        p {
            font-size: 1.5rem;
            color: #4b5563;
            margin-bottom: 30px;
        }

        .btn {
            font-size: 1.8rem;
            font-weight: bold;
            padding: 15px 40px;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.1);
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: none;
            background-color: #000;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            display: none; /* ซ่อนวิดีโอดิบ ใช้การวาดลง Canvas แทน */
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .ui-box {
            position: absolute;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #1f2937;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 5;
        }

        #score-board { top: 20px; left: 20px; border-left: 8px solid #10b981; }
        #timer-board { top: 20px; right: 20px; border-right: 8px solid #ef4444; }
        
        #mission-board {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 0, 0.95);
            font-size: 2.2rem;
            color: #d97706;
            border: 4px dashed #d97706;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { transform: translateX(-50%) scale(1); }
            to { transform: translateX(-50%) scale(1.05); }
        }

        #loading {
            font-size: 1.5rem;
            color: #1e3a8a;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="start-screen" class="screen">
        <h1>🍎 เกม AR อาหารแสนสนุก 🍔</h1>
        <p>กติกา: ใช้มือของคุณปัดเลือกเฉพาะ <b>Good Food</b> และห้ามจับ <b>Junk Food</b> ตามคำสั่ง!</p>
        <button class="btn" id="start-btn" onclick="initGame()">เริ่มเกม</button>
        <div id="loading">กำลังเตรียมระบบ AI กรุณารอสักครู่... ⏳</div>
    </div>

    <div id="game-over-screen" class="screen" style="display: none;">
        <h1>🎉 จบเกมแล้ว! 🎉</h1>
        <p id="final-score" style="font-size: 2rem; font-weight: bold; color: #10b981;"></p>
        <p id="avg-time" style="font-size: 1.5rem; color: #3b82f6;"></p>
        <button class="btn" onclick="location.reload()">เล่นอีกครั้ง 🔄</button>
    </div>

    <div id="game-container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        
        <div id="score-board" class="ui-box">⭐ คะแนน: <span id="score">0</span></div>
        <div id="mission-board" class="ui-box">เป้าหมาย: <span id="target-word">...</span></div>
        <div id="timer-board" class="ui-box">⏱️ เวลา: <span id="timer">60</span> วินาที</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let hands = null;
        let camera = null;
        let score = 0;
        let timeLeft = 60;
        let gameTimer;
        let isPlaying = false;
        
        const foodItems = [
            { name: 'Apple 🍎', type: 'good', thai: 'แอปเปิ้ล' },
            { name: 'Banana 🍌', type: 'good', thai: 'กล้วย' },
            { name: 'Broccoli 🥦', type: 'good', thai: 'บล็อคโคลี่' },
            { name: 'Carrot 🥕', type: 'good', thai: 'แครอท' },
            { name: 'Burger 🍔', type: 'junk', thai: 'เบอร์เกอร์' },
            { name: 'French Fries 🍟', type: 'junk', thai: 'เฟรนช์ฟรายส์' },
            { name: 'Donut 🍩', type: 'junk', thai: 'โดนัท' },
            { name: 'Pizza 🍕', type: 'junk', thai: 'พิซซ่า' }
        ];

        let currentTarget = {};
        let activeObjects = [];
        let totalHits = 0;
        let totalHitTime = 0;
        let lastSpawnTime = 0;

        // ฟังก์ชันเริ่มโหลด AI และสตรีมกล้อง
        function initGame() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            // ตั้งค่ากำหนดโมเดล MediaPipe Hands
            hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 2,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            // ผูกฟังก์ชันผลลัพธ์การตรวจจับ
            hands.onResults(onHandResults);

            // เริ่มต้นกล้อง Web Camera
            camera = new Camera(video, {
                onFrame: async () => {
                    if (isPlaying) {
                        await hands.send({image: video});
                    }
                },
                width: 640,
                height: 480
            });

            camera.start()
                .then(() => {
                    // ปรับขนาดแคนวาสให้เต็มหน้าจอ
                    resizeCanvas();
                    window.addEventListener('resize', resizeCanvas);
                    startGame();
                })
                .catch(err => {
                    alert("ไม่สามารถเข้าถึงกล้องได้: " + err.message);
                    location.reload();
                });
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            isPlaying = true;
            score = 0;
            timeLeft = 60;
            
            nextMission();
            spawnObjects();

            gameTimer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function nextMission() {
            currentTarget = foodItems[Math.floor(Math.random() * foodItems.length)];
            document.getElementById('target-word').innerText = `${currentTarget.thai} = ${currentTarget.name.split(' ')[0]}`;
            lastSpawnTime = Date.now();
        }

        function spawnObjects() {
            activeObjects = [];
            foodItems.forEach((item) => {
                activeObjects.push({
                    ...item,
                    x: Math.random() * (canvas.width - 200) + 100,
                    y: Math.random() * (canvas.height - 250) + 150,
                    radius: 55,
                    color: item.type === 'good' ? '#10b981' : '#ef4444'
                });
            });
        }

        // ประมวลผลเมื่อ AI ส่งผลตำแหน่งมือกลับมา
        function onHandResults(results) {
            if (!isPlaying) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // วาดภาพจากกล้องแบบ Mirror (กลับซ้ายขวาเพื่อให้เล่นง่าย)
            ctx.save();
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
            ctx.restore();

            // วาดอาหารบนหน้าจอ
            drawObjects();

            // ตรวจจับการชนเมื่อพบพิกัดมือ
            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    // ดึงพิกัดปลายนิ้วชี้ (Index Finger Tip - จุดที่ 8)
                    // MediaPipe ให้ค่าพิกัดเป็น 0 ถึง 1 จึงต้องคูณด้วยขนาดกว้างยาวของหน้าจอ
                    // เนื่องจากกลับด้านภาพกล้อง ค่า X บนจอจึงตรงข้ามกับภาพดิบ
                    const hX = (1 - landmarks[8].x) * canvas.width;
                    const hY = landmarks[8].y * canvas.height;

                    // วาดจุดเอฟเฟกต์นำทางที่ปลายนิ้ว
                    ctx.beginPath();
                    ctx.arc(hX, hY, 20, 0, 2 * Math.PI);
                    ctx.fillStyle = '#2563eb';
                    ctx.lineWidth = 3;
                    ctx.strokeStyle = '#ffffff';
                    ctx.fill();
                    ctx.stroke();

                    checkCollision(hX, hY);
                }
            }
        }

        function drawObjects() {
            activeObjects.forEach(obj => {
                ctx.save();
                ctx.beginPath();
                ctx.arc(obj.x, obj.y, obj.radius, 0, 2 * Math.PI);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
                ctx.strokeStyle = obj.color;
                ctx.lineWidth = 5;
                ctx.fill();
                ctx.stroke();

                ctx.fillStyle = '#111827';
                ctx.font = 'bold 24px Prompt';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(obj.name, obj.x, obj.y);
                ctx.restore();
            });
        }

        function checkCollision(hx, hy) {
            for (let i = activeObjects.length - 1; i >= 0; i--) {
                let obj = activeObjects[i];
                let dist = Math.hypot(obj.x - hx, obj.y - hy);

                if (dist < obj.radius + 20) {
                    if (obj.name === currentTarget.name) {
                        if (obj.type === 'good') {
                            score += 1;
                        } else {
                            score = Math.max(0, score - 1); 
                        }
                        
                        totalHits++;
                        totalHitTime += (Date.now() - lastSpawnTime) / 1000;
                        document.getElementById('score').innerText = score;
                        
                        nextMission();
                        spawnObjects();
                    } else {
                        activeObjects.splice(i, 1);
                    }
                    break;
                }
            }
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameTimer);
            if(camera) { camera.stop(); }
            
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('game-over-screen').style.display = 'flex';

            let avgTime = totalHits > 0 ? (totalHitTime / totalHits).toFixed(2) : 0;
            document.getElementById('final-score').innerText = `🏆 คะแนนรวมของคุณคือ: ${score} คะแนน`;
            document.getElementById('avg-time').innerText = `⚡ เวลาเฉลี่ยในการตอบถูก: ${avgTime} วินาที/ครั้ง`;
        }
    </script>
</body>
</html>
