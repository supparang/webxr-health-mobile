<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกม AR อาหารแสนสนุก (Good Food vs Junk Food)</title>
    
    <!-- นำเข้า MediaPipe Hands และ Camera Utils เวอร์ชันเสถียร -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@400;700;900&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f0fdf4;
        }

        /* ตกแต่งหน้าแรกและหน้าสรุปผลให้มีความสดใส น่ารัก เหมาะกับเด็ก */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fef08a 0%, #bbf7d0 100%);
            z-index: 10;
            text-align: center;
            padding: 24px;
        }

        .screen-card {
            background: rgba(255, 255, 255, 0.9);
            border: 8px solid #4ade80;
            border-radius: 32px;
            padding: 40px;
            max-width: 600px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            color: #15803d;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0px #ffffff;
            line-height: 1.2;
        }

        p {
            font-size: 1.5rem;
            color: #1e3a8a;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .highlight {
            color: #b91c1c;
            font-weight: 700;
        }

        .good-highlight {
            color: #15803d;
            font-weight: 700;
        }

        .btn {
            font-size: 2rem;
            font-weight: 900;
            padding: 15px 50px;
            background: linear-gradient(185deg, #ff4757, #ff6b81);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 0px #b33939, 0 12px 20px rgba(0,0,0,0.15);
            transition: all 0.1s ease;
            outline: none;
        }

        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0px #b33939, 0 6px 10px rgba(0,0,0,0.15);
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: none;
            background-color: #000;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            display: none; /* วาดลงแคนวาสแทนเพื่อประสิทธิภาพและสเกลเอฟเฟกต์ */
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ตกแต่งส่วนติดต่อผู้ใช้ (UI Overlay) ในขณะเล่นเกม */
        .ui-box {
            position: absolute;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            font-size: 1.8rem;
            font-weight: 900;
            color: #1e293b;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            z-index: 5;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #score-board { 
            top: 20px; 
            left: 20px; 
            border: 4px solid #10b981; 
        }

        #timer-board { 
            top: 20px; 
            right: 20px; 
            border: 4px solid #ef4444; 
        }
        
        #mission-board {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #fef08a;
            font-size: 2.2rem;
            color: #854d0e;
            border: 5px solid #ca8a04;
            animation: pulse 0.8s infinite alternate;
        }

        @keyframes pulse {
            from { transform: translateX(-50%) scale(1); }
            to { transform: translateX(-50%) scale(1.04); }
        }

        #loading {
            font-size: 1.6rem;
            color: #15803d;
            margin-top: 20px;
            font-weight: bold;
        }

        .score-val {
            color: #10b981;
            font-size: 2.2rem;
        }

        .timer-val {
            color: #ef4444;
            font-size: 2.2rem;
        }
    </style>
</head>
<body>

    <!-- หน้าเริ่มต้นเกม (Start Screen) -->
    <div id="start-screen" class="screen">
        <div class="screen-card">
            <h1>🍎 เกม AR จับอาหารดีมีประโยชน์ 🥦</h1>
            <p>กติกาแสนสนุก: เอามือขยับไปเก็บเฉพาะ <span class="good-highlight">อาหารดีมีประโยชน์ (Good Food)</span><br>
            ส่วน <span class="highlight">อาหารขยะ (Junk Food)</span> ไม่ต้องจับ มันจะสลายตัวหายไปเอง!</p>
            <button class="btn" id="start-btn" onclick="initGame()">เริ่มเล่นเกม 🎮</button>
            <div id="loading" style="display: none;">กำลังเชื่อมต่อกล้องและเปิดระบบตรวจจับมือ... ⏳</div>
        </div>
    </div>

    <!-- หน้าผลลัพธ์ท้ายเกม (Game Over Screen) -->
    <div id="game-over-screen" class="screen" style="display: none;">
        <div class="screen-card">
            <h1 style="color: #ea580c;">🎉 เก่งมากเลยหนูๆ จบเกมแล้ว! 🎉</h1>
            <p id="final-score" style="font-size: 2.5rem; font-weight: bold; color: #10b981; margin-bottom: 10px;"></p>
            <p id="avg-time" style="font-size: 1.8rem; color: #2563eb; margin-bottom: 30px;"></p>
            <button class="btn" onclick="location.reload()">เล่นอีกครั้ง 🔄</button>
        </div>
    </div>

    <!-- สนามจำลองของเกม -->
    <div id="game-container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        
        <div id="score-board" class="ui-box">⭐ คะแนน: <span id="score" class="score-val">0</span></div>
        <div id="mission-board" class="ui-box">หาคำแปลชิ้นนี้เลย: <span id="target-word">...</span></div>
        <div id="timer-board" class="ui-box">⏱️ เวลา: <span id="timer" class="timer-val">60</span> วิ</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let hands = null;
        let camera = null;
        let score = 0;
        let timeLeft = 60;
        let gameTimer;
        let isPlaying = false;
        
        // รายการคำศัพท์สำหรับการจำลอง
        const foodItems = [
            // อาหารดีมีประโยชน์ (Good Food)
            { name: 'Apple 🍎', type: 'good', thai: 'แอปเปิ้ล' },
            { name: 'Banana 🍌', type: 'good', thai: 'กล้วย' },
            { name: 'Broccoli 🥦', type: 'good', thai: 'บล็อคโคลี่' },
            { name: 'Carrot 🥕', type: 'good', thai: 'แครอท' },
            { name: 'Milk 🥛', type: 'good', thai: 'นมสด' },
            { name: 'Orange 🍊', type: 'good', thai: 'ส้ม' },
            
            // อาหารที่ไม่ดีต่อสุขภาพ (Junk Food) - จะสลายจางลงและหายไปเอง
            { name: 'Burger 🍔', type: 'junk', thai: 'เบอร์เกอร์' },
            { name: 'French Fries 🍟', type: 'junk', thai: 'เฟรนช์ฟรายส์' },
            { name: 'Donut 🍩', type: 'junk', thai: 'โดนัท' },
            { name: 'Pizza 🍕', type: 'junk', thai: 'พิซซ่า' }
        ];

        let currentTarget = {};
        let activeObjects = [];
        let totalHits = 0;
        let totalHitTime = 0;
        let lastSpawnTime = 0;

        // เริ่มโหลดโมเดลและจับคู่กับกล้อง
        function initGame() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 2,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            hands.onResults(onHandResults);

            camera = new Camera(video, {
                onFrame: async () => {
                    if (isPlaying) {
                        await hands.send({image: video});
                    }
                },
                width: 640,
                height: 480
            });

            camera.start()
                .then(() => {
                    resizeCanvas();
                    window.addEventListener('resize', resizeCanvas);
                    startGame();
                })
                .catch(err => {
                    alert("ไม่สามารถเปิดกล้องได้ กรุณาอนุญาตให้ใช้งานสิทธิ์กล้อง: " + err.message);
                    location.reload();
                });
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            isPlaying = true;
            score = 0;
            timeLeft = 60;
            
            nextMission();
            spawnObjects();

            // ตัวนับเวลาถอยหลัง 60 วินาที
            gameTimer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        // เมื่อต้องการสุ่มคำศัพท์เป้าหมายถัดไป (จะบังคับให้ตอบเฉพาะชิ้นที่เป็น Good Food เท่านั้น!)
        function nextMission() {
            // คัดกรองเอาเฉพาะอาหารดีเพื่อใช้เป็นคีย์คำสั่งหยิบให้ได้แต้ม
            const goodFoodsOnly = foodItems.filter(item => item.type === 'good');
            currentTarget = goodFoodsOnly[Math.floor(Math.random() * goodFoodsOnly.length)];
            
            document.getElementById('target-word').innerText = `${currentTarget.thai} (${currentTarget.name.split(' ')[0]})`;
            lastSpawnTime = Date.now();
        }

        // เกิดวัตถุอาหารขึ้นมาใหม่
        function spawnObjects() {
            activeObjects = [];
            
            // วาดอาหารดีขึ้นมา (จะลอยอยู่เรื่อยๆ ไม่สลายตัวจนกว่าเวลาจะหมดหรือทำคะแนนสำเร็จ)
            const goodFoodsOnly = foodItems.filter(item => item.type === 'good');
            goodFoodsOnly.forEach((item) => {
                activeObjects.push({
                    ...item,
                    x: Math.random() * (canvas.width - 250) + 125,
                    y: Math.random() * (canvas.height - 250) + 125,
                    radius: 55,
                    color: '#10b981',
                    opacity: 1.0,          // คงที่ตลอดเวลา
                    lifeTime: 99999        // ไม่จางหายไปเอง
                });
            });

            // วาดอาหารขยะ (Junk Food) แทรกขึ้นมาเพื่อรบกวนและทดสอบความเข้าใจของนักเรียน
            // แต่ละตัวจะมีเวลาชีวิตจำกัด และค่อยๆ สลายตัวหายไปเองเมื่อไม่มีการสัมผัส
            const junkFoodsOnly = foodItems.filter(item => item.type === 'junk');
            junkFoodsOnly.forEach((item) => {
                activeObjects.push({
                    ...item,
                    x: Math.random() * (canvas.width - 250) + 125,
                    y: Math.random() * (canvas.height - 250) + 125,
                    radius: 55,
                    color: '#ef4444',
                    opacity: 1.0,          // เริ่มที่ความโปร่งแสงสูงสุด
                    lifeTime: 4000,        // ระยะเวลาที่จะแสดงอยู่บนหน้าจอ (4 วินาที)
                    spawnTime: Date.now()  // เวลาที่กำเนิด
                });
            });
        }

        // คอยประมวลผลตำแหน่งมือและอัปเดตแอนิเมชันวัตถุ
        function onHandResults(results) {
            if (!isPlaying) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // วาดภาพวิดีโอจากกล้องแบบสมจริงและกระจกเงา (Mirror Mirror)
            ctx.save();
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
            ctx.restore();

            // จัดการความทึบแสงและวาดรูปอาหารลงบนหน้าจอ
            updateAndDrawObjects();

            // ค้นหาตำแหน่งและพิกัดมือของนักเรียน (รองรับแบบ 2 มือพร้อมกัน)
            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    // ดึงพิกัดที่ระบุปลายนิ้วชี้ (Index Finger Tip)
                    const hX = (1 - landmarks[8].x) * canvas.width;
                    const hY = landmarks[8].y * canvas.height;

                    // แสดงวงกลมสีนำสายตาที่ปลายนิ้วของเด็กๆ เพื่อช่วยในการเอื้อมสัมผัส
                    ctx.beginPath();
                    ctx.arc(hX, hY, 20, 0, 2 * Math.PI);
                    ctx.fillStyle = '#ff4757';
                    ctx.lineWidth = 4;
                    ctx.strokeStyle = '#ffffff';
                    ctx.fill();
                    ctx.stroke();

                    // ตรวจการสัมผัสกับอาหาร
                    checkCollision(hX, hY);
                }
            }
        }

        // ฟังก์ชันวาดวัตถุและประมวลผลการจางหายของ Junk Food
        function updateAndDrawObjects() {
            const now = Date.now();
            
            for (let i = activeObjects.length - 1; i >= 0; i--) {
                let obj = activeObjects[i];

                // ถ้าเป็นอาหารขยะ (Junk Food)
                if (obj.type === 'junk') {
                    let elapsed = now - obj.spawnTime;
                    
                    if (elapsed >= obj.lifeTime) {
                        // เมื่อหมดเวลาชีวิตของ Junk Food ชิ้นนี้ จะลบมันทิ้งออกจากหน้าจอเองอัตโนมัติ
                        activeObjects.splice(i, 1);
                        continue;
                    } else if (elapsed > obj.lifeTime - 1000) {
                        // ช่วง 1 วินาทีสุดท้ายก่อนจะหายไป ให้ค่อยๆ จางออกทีละน้อย (Fade Out Effect)
                        obj.opacity = (obj.lifeTime - elapsed) / 1000;
                    }
                }

                // เริ่มวาดวัตถุชิ้นนั้นๆ ลงบอร์ด
                ctx.save();
                ctx.globalAlpha = obj.opacity; // ควบคุมความสลัวของการจางตัว
                
                ctx.beginPath();
                ctx.arc(obj.x, obj.y, obj.radius, 0, 2 * Math.PI);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
                ctx.strokeStyle = obj.color;
                ctx.lineWidth = 5;
                ctx.fill();
                ctx.stroke();

                ctx.fillStyle = '#111827';
                ctx.font = 'bold 24px Prompt';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(obj.name, obj.x, obj.y);
                ctx.restore();
            }
        }

        // ตรวจว่านิ้วผู้เล่นพุ่งเข้าชน/สัมผัสโดนตัวเลือกหรือไม่
        function checkCollision(hx, hy) {
            for (let i = activeObjects.length - 1; i >= 0; i--) {
                let obj = activeObjects[i];
                let dist = Math.hypot(obj.x - hx, obj.y - hy);

                if (dist < obj.radius + 20) {
                    // หากผู้เล่นสัมผัสโดน "เป้าหมายที่ถูกสุ่มขึ้นมา" (ซึ่งจะเป็นของมีประโยชน์เท่านั้น)
                    if (obj.name === currentTarget.name && obj.type === 'good') {
                        score += 1;
                        totalHits++;
                        totalHitTime += (Date.now() - lastSpawnTime) / 1000;
                        document.getElementById('score').innerText = score;
                        
                        // เริ่มด่านใหม่ทันที
                        nextMission();
                        spawnObjects();
                    } else {
                        // หากเผลอไปสัมผัสโดน Junk Food หรืออาหารผิดประเภท จะสลัดชิ้นนั้นออกจากจอทันที
                        activeObjects.splice(i, 1);
                    }
                    break;
                }
            }
        }

        // จบเวลาการเล่นเกมทั้งหมด 60 วินาที
        function endGame() {
            isPlaying = false;
            clearInterval(gameTimer);
            if(camera) { camera.stop(); }
            
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('game-over-screen').style.display = 'flex';

            // คำนวณความเร็วเฉลี่ยในการตอบถูกของเด็กๆ
            let avgTime = totalHits > 0 ? (totalHitTime / totalHits).toFixed(2) : 0;
            document.getElementById('final-score').innerText = `🏆 คะแนนรวมของนักเรียน: ${score} คะแนน`;
            document.getElementById('avg-time').innerText = `⚡ ความเร็วเฉลี่ยในการตอบถูก: ${avgTime} วินาทีต่อครั้ง`;
        }
    </script>
</body>
</html>
