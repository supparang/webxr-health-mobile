<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="color-scheme" content="dark light" />
  <meta name="google" content="notranslate" />
  <title>HeroHealth • Clean Objects Kids</title>
  <link rel="icon" href="../favicon.ico" />
  <style>
    :root{
      --bg:#020617;
      --fg:#e5e7eb;
      --mut:#94a3b8;
      --stroke: rgba(148,163,184,.18);
      --panel: rgba(2,6,23,.72);
      --sat: env(safe-area-inset-top, 0px);
      --sar: env(safe-area-inset-right, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
    }
    html,body{
      height:100%;
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans Thai",sans-serif;
    }
    #app{
      min-height:100%;
      padding:
        calc(10px + var(--sat))
        calc(10px + var(--sar))
        calc(10px + var(--sab))
        calc(10px + var(--sal));
    }
    .topbar{
      position:sticky;
      top:0;
      z-index:40;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      border:1px solid var(--stroke);
      background:rgba(2,6,23,.62);
      border-radius:18px;
      padding:10px 10px;
      backdrop-filter: blur(8px);
    }
    .brand{
      display:flex;
      gap:10px;
      align-items:center;
    }
    .logo{
      width:40px;
      height:40px;
      border-radius:14px;
      border:1px solid var(--stroke);
      background:linear-gradient(135deg, rgba(34,197,94,.18), rgba(34,211,238,.14));
      display:grid;
      place-items:center;
      font-weight:1000;
    }
    .title{
      font-weight:1000;
      font-size:15px;
    }
    .sub{
      font-weight:800;
      color:var(--mut);
      font-size:12px;
      margin-top:2px;
    }

    .pillrow{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }
    .pill{
      border:1px solid var(--stroke);
      background:rgba(2,6,23,.35);
      border-radius:999px;
      padding:7px 10px;
      font-size:12px;
      font-weight:950;
      color:rgba(229,231,235,.92);
    }
    .pill b{ color:#fff; }

    .btn{
      border:1px solid var(--stroke);
      background:rgba(2,6,23,.35);
      color:rgba(229,231,235,.94);
      padding:9px 10px;
      border-radius:14px;
      font-weight:1000;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }
    .btn.warn{
      border-color:rgba(245,158,11,.35);
      background:rgba(245,158,11,.12);
    }
    .btn.bad{
      border-color:rgba(239,68,68,.35);
      background:rgba(239,68,68,.10);
    }
    .btn:active{
      transform:translateY(1px);
    }

    .heroHint{
      margin-top:10px;
      border:1px solid rgba(34,197,94,.24);
      background:rgba(34,197,94,.10);
      border-radius:16px;
      padding:10px 12px;
      font-size:13px;
      font-weight:900;
      line-height:1.45;
    }

    .stage{
      margin-top:10px;
      border:1px solid var(--stroke);
      background:linear-gradient(180deg, rgba(2,6,23,.80), rgba(2,6,23,.55));
      border-radius:22px;
      padding:10px;
      box-shadow:0 20px 70px rgba(0,0,0,.35);
      overflow:hidden;
    }

    #root{
      position:relative;
      min-height: calc(100vh - 180px);
    }

    .toast{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:calc(14px + var(--sab));
      z-index:9999;
      padding:10px 12px;
      border:1px solid var(--stroke);
      border-radius:14px;
      background:rgba(2,6,23,.78);
      color:#e5e7eb;
      font-weight:950;
      font-size:13px;
      box-shadow:0 14px 44px rgba(0,0,0,.35);
      opacity:0;
      transition:opacity .18s ease;
      pointer-events:none;
      max-width:92vw;
    }
    .toast.show{
      opacity:1;
    }

    @media (max-width:700px){
      .topbar{ align-items:flex-start; }
      .pillrow{ width:100%; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="topbar">
      <div class="brand">
        <div class="logo">🧽</div>
        <div>
          <div class="title">Clean Objects — Kids Mode</div>
          <div class="sub">3 ด่าน • เหมาะสำหรับ ป.5 • อ่านง่าย • child-friendly</div>
        </div>
      </div>

      <div class="pillrow">
        <div class="pill">pid: <b id="pPid">—</b></div>
        <div class="pill">time: <b id="pTime">—</b>s</div>
        <div class="pill">mode: <b>kids</b></div>
        <div class="pill">track: <b>cleanobjects-kids</b></div>
      </div>

      <div class="pillrow">
        <button class="btn warn" id="btnCooldown" type="button">Go Cooldown</button>
        <button class="btn" id="btnBackHub" type="button">Back HUB</button>
        <button class="btn bad" id="btnReset" type="button">Reset</button>
      </div>
    </div>

    <div class="heroHint">
      เล่นให้ครบ 3 ด่านในเกมเดียว • ด่านหลังจะยากขึ้นนิดหน่อย • ด่านสุดท้ายมีภารกิจพิเศษ
    </div>

    <div class="stage">
      <div id="root"></div>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <script type="module">
    import { createCleanKidsCore } from './clean.kids.core.js';
    import { mountCleanKidsUI } from './clean.kids.ui.js';

    const $ = (id)=>document.getElementById(id);

    function qs(k, d=''){
      try{ return (new URL(location.href)).searchParams.get(k) ?? d; }
      catch(e){ return d; }
    }
    function clamp(v,a,b){
      v = Number(v);
      if(!Number.isFinite(v)) v = a;
      return Math.max(a, Math.min(b, v));
    }
    function normalizeMaybeEncodedUrl(v){
      v = String(v ?? '').trim();
      if(!v) return '';
      if(/%3A|%2F|%3F|%26|%3D/i.test(v)){
        try{ v = decodeURIComponent(v); }catch(e){}
      }
      return v.trim();
    }

    let toastT = 0;
    function toast(msg){
      const el = $('toast');
      if(!el) return;
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastT);
      toastT = setTimeout(()=>el.classList.remove('show'), 1200);
    }

    const P = {
      run: String(qs('run','play')).toLowerCase() || 'play',
      diff: 'kids',
      time: clamp(qs('time','30'), 20, 60),
      seed: String(qs('seed','') || String(Date.now())),
      pid: String(qs('pid','anon')).trim() || 'anon',
      hub: normalizeMaybeEncodedUrl(qs('hub','')),
      log: String(qs('log','')),
      api: normalizeMaybeEncodedUrl(qs('api','')),
      studyId: String(qs('studyId','')),
      phase: String(qs('phase','')),
      conditionGroup: String(qs('conditionGroup','')),
      view: String(qs('view','mobile') || 'mobile')
    };

    if ($('pPid')) $('pPid').textContent = P.pid;
    if ($('pTime')) $('pTime').textContent = String(P.time);

    function hubFallback(){
      if(P.hub) return P.hub;
      return new URL('../hub.html', location.href).toString();
    }

    function buildCooldownUrl(extra = {}){
      const hub = hubFallback();
      const g = new URL('../warmup-gate.html', location.href);

      g.searchParams.set('gatePhase','cooldown');
      g.searchParams.set('phase','cooldown');
      g.searchParams.set('cat','hygiene');
      g.searchParams.set('theme','cleanobjects-kids');
      g.searchParams.set('game','cleanobjects-kids');
      g.searchParams.set('cd','1');
      g.searchParams.set('next', hub);
      g.searchParams.set('hub', hub);

      ['run','seed','pid','view','api','log','studyId','conditionGroup']
        .forEach(k=>{
          const v = String(qs(k,'') || '');
          if(v) g.searchParams.set(k, v);
        });

      g.searchParams.set('diff', 'kids');
      g.searchParams.set('kids', '1');
      g.searchParams.set('time', String(P.time));

      Object.keys(extra || {}).forEach(k=>{
        const v = extra[k];
        if(v !== undefined && v !== null && v !== ''){
          g.searchParams.set(k, String(v));
        }
      });

      return g.toString();
    }

    function goHub(){
      location.href = hubFallback();
    }

    function goCooldown(){
      location.href = buildCooldownUrl();
    }

    if ($('btnBackHub')) $('btnBackHub').addEventListener('click', goHub);
    if ($('btnCooldown')) $('btnCooldown').addEventListener('click', goCooldown);
    if ($('btnReset')) $('btnReset').addEventListener('click', ()=>location.reload());

    async function postToApi(payload){
      const logOn = (String(P.log||'') === '1' || String(P.log||'').toLowerCase() === 'true');
      if(!logOn || !P.api) return { ok:false, skipped:true };

      try{
        const res = await fetch(P.api, {
          method:'POST',
          mode:'cors',
          headers:{ 'content-type':'application/json' },
          body: JSON.stringify(payload)
        });
        return { ok: res.ok, status: res.status };
      }catch(e){
        return { ok:false, err:String(e&&e.message||e) };
      }
    }

    function saveSummary(summary){
      try{
        localStorage.setItem('HHA_LAST_SUMMARY', JSON.stringify(summary));
        localStorage.setItem(`HHA_LAST_SUMMARY:cleanobjects:kids:${P.pid}`, JSON.stringify(summary));

        const key = 'HHA_SUMMARY_HISTORY';
        const arr = JSON.parse(localStorage.getItem(key) || '[]');
        arr.unshift(summary);
        while(arr.length > 30) arr.pop();
        localStorage.setItem(key, JSON.stringify(arr));
      }catch(e){}
    }

    let core = null;
    let cooldownQueued = false;

    const ui = mountCleanKidsUI(document.getElementById('root'), {
      selectCard: (id)=> core && core.selectCard(id)
    });

    core = createCleanKidsCore({
      run: P.run,
      seed: P.seed,
      hub: hubFallback(),
      time: P.time,
      view: P.view
    }, {
      onState: ui.onState,
      onTick: ui.onTick,
      onCoach: ui.onCoach,
      onSummary: async (summary)=>{
        const apiSummary = Object.assign({}, summary, {
          projectTag: 'HeroHealth',
          game: 'cleanobjects',
          zone: 'hygiene',
          runMode: P.run,
          studyId: P.studyId || '',
          phase: P.phase || '',
          conditionGroup: P.conditionGroup || '',
          hub: P.hub || '',
          mode: 'kids',
          __extraJson: JSON.stringify({
            url: location.href,
            track: 'kids',
            game: 'cleanobjects',
            mode: 'kids'
          })
        });

        saveSummary(apiSummary);

        const r = await postToApi({ type:'summary', data: apiSummary });
        if(r && !r.skipped && !r.ok){
          console.warn('[clean-kids] summary log failed', r);
        }

        ui.onSummary(apiSummary);

        if(!cooldownQueued){
          cooldownQueued = true;
          setTimeout(()=>{
            location.href = buildCooldownUrl({
              finalScore: apiSummary?.score ?? '',
              finalMode: 'kids',
              kids: '1'
            });
          }, 1800);
        }
      }
    });

    core.start();

    let raf = 0;
    function loop(){
      if(core) core.tick();
      raf = requestAnimationFrame(loop);
    }
    raf = requestAnimationFrame(loop);

    toast('เริ่มด่าน 1 ได้เลย ✅');
  </script>
</body>
</html>
