<!-- === /herohealth/vr-clean/home-clean.html ===
Clean Objects — RUN (PC/Mobile/cVR) — PRODUCTION
FULL v20260301-RUN-HHA-STANDARD-CLEAN

Requires (same folder):
- ./clean.data.js
- ./clean.core.js
- ./clean.ui.js

Shared (optional):
- ../vr/vr-ui.js   (for Cardboard/cVR: ENTER VR/RECENTER + crosshair -> emits hha:shoot)
- api/log params: log=1 & api=<AppsScript /exec> (safe forward)

✅ Detect mode: view=cvr => Mode B (Create), else Mode A (Evaluate)
✅ Pass-through hub/run/diff/time/seed/pid/view/log/api/studyId/phase/conditionGroup
✅ HHA summary saved: localStorage.HHA_LAST_SUMMARY + HHA_SUMMARY_HISTORY
✅ Back HUB + Go Cooldown (via warmup-gate)
✅ Safe logger forward (won't break UI if 403/offline)
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="color-scheme" content="dark light" />
  <meta name="google" content="notranslate" />
  <title>HeroHealth • Clean Objects</title>
  <link rel="icon" href="../favicon.ico" />
  <style>
    :root{
      --bg:#020617;
      --fg:#e5e7eb;
      --mut:#94a3b8;
      --stroke: rgba(148,163,184,.18);
      --panel: rgba(2,6,23,.72);
      --sat: env(safe-area-inset-top, 0px);
      --sar: env(safe-area-inset-right, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
    }
    html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans Thai",sans-serif}
    #app{min-height:100%;padding:calc(10px + var(--sat)) calc(10px + var(--sar)) calc(10px + var(--sab)) calc(10px + var(--sal));}
    .topbar{
      position:sticky; top:0; z-index:50;
      display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between;
      border:1px solid var(--stroke); background:rgba(2,6,23,.62);
      border-radius:18px; padding:10px 10px; backdrop-filter: blur(8px);
    }
    .brand{display:flex;gap:10px;align-items:center}
    .logo{width:38px;height:38px;border-radius:14px;border:1px solid var(--stroke);
      background:linear-gradient(135deg, rgba(34,211,238,.18), rgba(167,139,250,.14));
      display:grid;place-items:center;font-weight:1000}
    .title{font-weight:1000;font-size:14px}
    .sub{font-weight:800;color:var(--mut);font-size:12px;margin-top:2px}
    .pillrow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .pill{border:1px solid var(--stroke);background:rgba(2,6,23,.35);border-radius:999px;padding:7px 10px;
      font-size:12px;font-weight:950;color:rgba(229,231,235,.92)}
    .pill b{color:#fff}
    .btn{
      border:1px solid var(--stroke); background:rgba(2,6,23,.35); color:rgba(229,231,235,.94);
      padding:9px 10px; border-radius:14px; font-weight:1000; cursor:pointer;
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
    }
    .btn:active{transform:translateY(1px)}
    .btn.primary{border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.14)}
    .btn.warn{border-color:rgba(245,158,11,.35);background:rgba(245,158,11,.12)}
    .btn.bad{border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.10)}
    .stage{
      margin-top:10px;
      border:1px solid var(--stroke);
      background:linear-gradient(180deg, rgba(2,6,23,.80), rgba(2,6,23,.55));
      border-radius:22px;
      padding:10px;
      box-shadow:0 20px 70px rgba(0,0,0,.35);
      overflow:hidden;
    }
    /* ui.js will fill inside #root */
    #root{ position:relative; min-height: calc(100vh - 120px); }
    /* small toast */
    .toast{
      position:fixed; left:50%; transform:translateX(-50%);
      bottom:calc(14px + var(--sab)); z-index:9999;
      padding:10px 12px; border:1px solid var(--stroke);
      border-radius:14px; background:rgba(2,6,23,.78);
      color:#e5e7eb; font-weight:950; font-size:13px;
      box-shadow:0 14px 44px rgba(0,0,0,.35);
      opacity:0; transition:opacity .18s ease; pointer-events:none; max-width:92vw;
    }
    .toast.show{ opacity:1; }
  </style>
</head>

<body>
  <div id="app">
    <div class="topbar">
      <div class="brand">
        <div class="logo">🧽</div>
        <div>
          <div class="title">Clean Objects (Evaluate → Create)</div>
          <div class="sub">Home map • Boss + Contamination + Danger pulse</div>
        </div>
      </div>

      <div class="pillrow" id="pillRow">
        <div class="pill">run: <b id="pRun">—</b></div>
        <div class="pill">diff: <b id="pDiff">—</b></div>
        <div class="pill">time: <b id="pTime">—</b>s</div>
        <div class="pill">pid: <b id="pPid">—</b></div>
        <div class="pill">view: <b id="pView">—</b></div>
      </div>

      <div class="pillrow">
        <button class="btn warn" id="btnCooldown" type="button">Go Cooldown</button>
        <button class="btn" id="btnBackHub" type="button">Back HUB</button>
        <button class="btn bad" id="btnReset" type="button">Reset</button>
      </div>
    </div>

    <div class="stage">
      <div id="root"></div>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <!-- Optional: VR UI (Cardboard/cVR) -->
  <script type="module">
    import '../vr/vr-ui.js';
    // vr-ui.js will add ENTER VR/RECENTER + crosshair and emit hha:shoot.
    // If file doesn't exist yet, this will 404 in console but the game still works for PC/Mobile.
  </script>

  <script type="module">
    import { createCleanCore } from './clean.core.js';
    import { mountCleanUI } from './clean.ui.js';

    // ===== helpers =====
    const $ = (id)=>document.getElementById(id);
    function qs(k, d=''){
      try{ return (new URL(location.href)).searchParams.get(k) ?? d; }
      catch(e){ return d; }
    }
    function clamp(v,a,b){ v=Number(v); if(!Number.isFinite(v)) v=a; return Math.max(a, Math.min(b, v)); }
    function normView(v){
      v = String(v||'').toLowerCase();
      if(v==='cvr' || v==='cardboard' || v==='vr') return 'cvr';
      if(v==='mobile' || v==='m') return 'mobile';
      if(v==='pc' || v==='desktop') return 'pc';
      return v || '';
    }
    function nowSeed(){ return String(Date.now()); }
    function normalizeMaybeEncodedUrl(v){
      v = String(v ?? '').trim();
      if(!v) return '';
      if(/%3A|%2F|%3F|%26|%3D/i.test(v)){
        try{ v = decodeURIComponent(v); }catch(e){}
      }
      return v.trim();
    }
    let toastT=0;
    function toast(msg){
      const el = $('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastT);
      toastT = setTimeout(()=>el.classList.remove('show'), 1100);
    }

    // ===== params (aligned with hub) =====
    const P = {
      run: String(qs('run','play')).toLowerCase() || 'play',
      diff: String(qs('diff','normal')).toLowerCase() || 'normal',
      time: clamp(qs('time','80'), 20, 300),
      seed: String(qs('seed','') || nowSeed()),
      pid: (String(qs('pid','')).trim() || 'anon'),
      view: normView(qs('view','')),

      hub: normalizeMaybeEncodedUrl(qs('hub','')),
      log: String(qs('log','')),
      api: normalizeMaybeEncodedUrl(qs('api','')),

      studyId: String(qs('studyId','')),
      phase: String(qs('phase','')),
      conditionGroup: String(qs('conditionGroup','')),

      debug: String(qs('debug','')),
      ai: String(qs('ai','')),

      // clean extras
      boss: String(qs('boss','toilet_flush') || 'toilet_flush')
    };

    // show pills
    $('pRun').textContent = P.run;
    $('pDiff').textContent = P.diff;
    $('pTime').textContent = String(P.time);
    $('pPid').textContent = P.pid;
    $('pView').textContent = P.view || '(auto)';

    // build HUB url fallback
    function hubFallback(){
      // prefer explicit hub param
      if(P.hub) return P.hub;
      // fallback to /herohealth/hub.html same folder up
      return new URL('../hub.html', location.href).toString();
    }

    function goHub(){
      location.href = hubFallback();
    }

    function goCooldown(){
      const hub = hubFallback();
      const base = new URL(location.href);
      const g = new URL('../warmup-gate.html', base);

      g.searchParams.set('cat','hygiene');
      g.searchParams.set('theme','cleanobjects');
      g.searchParams.set('cd','1');
      g.searchParams.set('next', hub);
      g.searchParams.set('hub', hub);

      // pass-through
      const keep = ['run','diff','time','seed','pid','view','ai','debug','api','log','studyId','phase','conditionGroup','boss'];
      keep.forEach(k=>{
        const v = base.searchParams.get(k);
        if(v !== null && v !== '') g.searchParams.set(k, v);
      });

      location.href = g.toString();
    }

    $('btnBackHub').addEventListener('click', goHub);
    $('btnCooldown').addEventListener('click', goCooldown);
    $('btnReset').addEventListener('click', ()=>{
      try{
        // safe reset only for this game local caches
        localStorage.removeItem('HHA_LAST_SUMMARY');
      }catch(e){}
      location.reload();
    });

    // ===== logger forward (safe, optional) =====
    async function postToApi(payload){
      // Only if log enabled and api provided
      const logOn = (String(P.log||'') === '1' || String(P.log||'').toLowerCase() === 'true');
      if(!logOn || !P.api) return { ok:false, skipped:true };

      // Many Apps Script endpoints are GET/POST; here we do POST JSON best-effort.
      try{
        const res = await fetch(P.api, {
          method: 'POST',
          mode: 'cors',
          headers: { 'content-type':'application/json' },
          body: JSON.stringify(payload)
        });
        return { ok: res.ok, status: res.status };
      }catch(e){
        return { ok:false, err: String(e&&e.message||e) };
      }
    }

    // Forward any hha:event (session_start/select/contamination/session_end)
    window.addEventListener('hha:event', async (ev)=>{
      const d = ev && ev.detail ? ev.detail : null;
      if(!d) return;
      // attach minimal context
      const payload = Object.assign({}, d, {
        projectTag: 'HeroHealth',
        game: 'cleanobjects',
        zone: 'hygiene',
        runMode: P.run,
        studyId: P.studyId || '',
        phase: P.phase || '',
        conditionGroup: P.conditionGroup || '',
        hub: P.hub || ''
      });
      const r = await postToApi({ type:'event', data: payload });
      if(P.debug==='1' && r && !r.skipped && !r.ok) console.warn('[clean] api log failed', r);
    });

    // ===== HHA summary storage =====
    function saveSummary(summary){
      try{
        localStorage.setItem('HHA_LAST_SUMMARY', JSON.stringify(summary));
        // append small history
        const key = 'HHA_SUMMARY_HISTORY';
        const arr = JSON.parse(localStorage.getItem(key) || '[]');
        arr.unshift(summary);
        while(arr.length > 30) arr.pop();
        localStorage.setItem(key, JSON.stringify(arr));
      }catch(e){}
    }

    // ===== mount UI + core =====
    const ui = mountCleanUI(document.getElementById('root'), {
      selectA: (id, reasonTag)=> core.selectA(id, reasonTag),
      toggleRouteB: (id)=> core.toggleRouteB(id),
      undoB: ()=> core.undoB(),
      clearB: ()=> core.clearB(),
      submitB: ()=> core.submitB()
    });

    const core = createCleanCore({
      run: P.run,
      seed: P.seed,
      view: P.view,
      hub: hubFallback(),
      bossId: P.boss,
      // time policy: align with hub time; core will fallback A=45,B=60 if timeA/timeB absent
      // You can override via params: timeA, timeB, sprays, maxPoints, danger, contamAt, contamBoost
    }, {
      onState: ui.onState,
      onTick: ui.onTick,
      onCoach: (m)=> ui.onCoach(m),
      onSummary: async (summary)=>{
        // store
        saveSummary(summary);
        // log summary (optional)
        const r = await postToApi({ type:'summary', data: summary });
        if(P.debug==='1' && r && !r.skipped && !r.ok) console.warn('[clean] summary log failed', r);

        // show
        ui.onSummary(summary);
      }
    });

    // Start + loop
    core.start();

    let raf = 0;
    function loop(){
      core.tick();
      raf = requestAnimationFrame(loop);
    }
    raf = requestAnimationFrame(loop);

    // small hint toast
    if(P.view === 'cvr'){
      toast('Cardboard: ใช้ crosshair ยิงเลือกจุดได้ ✅');
    }else{
      toast('แตะจุดบนแผนที่เพื่อเล่น ✅');
    }
  </script>
</body>
</html>
