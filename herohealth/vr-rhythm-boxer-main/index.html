<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth — Rhythm Boxer Main</title>
  <meta name="theme-color" content="#9fe3ff" />
  <link rel="icon" href="../favicon.ico" />
  <style>
    :root{
      --sky1:#dff4ff; --sky2:#bfe8ff; --sky3:#fff7d8;
      --card:#fffdf6; --line:#bfe3f2; --text:#4d4a42; --muted:#7b7a72;
      --blue:#7fcfff; --orange:#ffb454; --green:#7ed957; --purple:#caa4ff; --yellow:#ffe66f;
      --shadow:0 18px 40px rgba(73,119,152,.18);
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100svh; font-family:ui-rounded,system-ui,sans-serif; color:var(--text);
      background:
        radial-gradient(circle at 15% 18%, rgba(255,255,255,.92) 0 10%, transparent 11%),
        radial-gradient(circle at 84% 16%, rgba(255,255,255,.74) 0 8%, transparent 9%),
        linear-gradient(180deg,var(--sky1),var(--sky2) 52%,var(--sky3));
    }
    .shell{max-width:1080px;margin:0 auto;padding:22px 16px 32px}
    .hero{
      display:grid;grid-template-columns:1.05fr .95fr;gap:16px
    }
    .panel{
      background:linear-gradient(180deg,rgba(255,255,255,.94),rgba(255,252,244,.98));
      border:2px solid rgba(191,227,242,.95);border-radius:28px;padding:18px;box-shadow:var(--shadow)
    }
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:12px}
    .badge{
      width:60px;height:60px;border-radius:18px;display:grid;place-items:center;font-size:28px;
      background:linear-gradient(180deg,#fffdf8,#e8fff6);border:2px solid rgba(127,207,255,.7)
    }
    h1{margin:0;font-size:clamp(28px,4vw,40px);line-height:1}
    .sub{margin:6px 0 0;color:var(--muted);font-weight:800}
    .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-top:12px}
    .mode{
      border:2px solid rgba(191,227,242,.95);border-radius:22px;padding:14px;background:#fff;cursor:pointer
    }
    .mode input{display:none}
    .mode strong{display:block;font-size:18px}
    .mode small{display:block;color:var(--muted);margin-top:6px;line-height:1.35}
    .mode.active{
      border-color:rgba(255,207,69,.6);
      background:linear-gradient(180deg,#fffdf2,#fff2bd);
    }
    .form{display:grid;gap:12px}
    .row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    label{display:grid;gap:6px;font-weight:900;font-size:13px;color:#566670}
    input,select{
      width:100%;padding:14px;border-radius:16px;border:2px solid rgba(191,227,242,.95);
      background:#fffdf8;font:inherit;font-weight:800;color:var(--text)
    }
    .actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
    .btn{
      appearance:none;border:0;border-radius:18px;padding:14px 18px;font:inherit;font-weight:900;cursor:pointer;
      box-shadow:var(--shadow)
    }
    .btn-main{background:linear-gradient(180deg,#ffe66f,#ffcf45);color:#174059}
    .btn-soft{background:linear-gradient(180deg,#cffff0,#b1f0d1);color:#1d5a44}
    @media (max-width:900px){
      .hero{grid-template-columns:1fr}
      .grid{grid-template-columns:1fr}
    }
    @media (max-width:560px){
      .row{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="panel">
        <div class="brand">
          <div class="badge">🥊</div>
          <div>
            <h1>Rhythm Boxer Main</h1>
            <p class="sub">Main game base • PC / Mobile / cVR</p>
          </div>
        </div>

        <p><strong>แกนหลัก:</strong> เกมเดียว 3 โหมด ใช้ schedule / scoring / missions / summary / logger ร่วมกัน</p>

        <div class="grid" id="viewModes">
          <label class="mode active" data-view="pc">
            <input type="radio" name="viewMode" value="pc" checked />
            <strong>PC</strong>
            <small>Keyboard-focused</small>
          </label>

          <label class="mode" data-view="mobile">
            <input type="radio" name="viewMode" value="mobile" />
            <strong>Mobile</strong>
            <small>Tap lane near hit-line</small>
          </label>

          <label class="mode" data-view="cvr">
            <input type="radio" name="viewMode" value="cvr" />
            <strong>Cardboard / cVR</strong>
            <small>Crosshair + lane focus + tap/trigger</small>
          </label>
        </div>
      </div>

      <div class="panel">
        <form id="launchForm" class="form">
          <div class="row">
            <label>PID
              <input id="pid" value="anon" />
            </label>
            <label>Nick
              <input id="nick" placeholder="Hero" />
            </label>
          </div>

          <div class="row">
            <label>Mode
              <select id="mode">
                <option value="learn">Learn</option>
                <option value="active" selected>Active</option>
                <option value="cardio">Cardio</option>
              </select>
            </label>
            <label>Difficulty
              <select id="diff">
                <option value="easy">Easy</option>
                <option value="normal" selected>Normal</option>
                <option value="challenge">Challenge</option>
              </select>
            </label>
          </div>

          <div class="row">
            <label>Duration
              <select id="dur">
                <option value="90">90 sec</option>
                <option value="120" selected>120 sec</option>
                <option value="180">180 sec</option>
              </select>
            </label>
            <label>BPM
              <select id="bpm">
                <option value="96">96</option>
                <option value="104">104</option>
                <option value="112" selected>112</option>
                <option value="120">120</option>
                <option value="128">128</option>
              </select>
            </label>
          </div>

          <div class="actions">
            <button class="btn btn-main" type="submit">🚀 เข้าเล่น</button>
            <button class="btn btn-soft" type="button" id="seedBtn">🎲 สุ่ม Seed</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const qs = new URLSearchParams(location.search);
      const modes = [...document.querySelectorAll('.mode')];
      const form = document.getElementById('launchForm');
      let seed = String(Date.now());

      function currentView(){
        const checked = document.querySelector('input[name="viewMode"]:checked');
        return checked ? checked.value : 'pc';
      }

      modes.forEach(el => {
        el.addEventListener('click', () => {
          modes.forEach(m => m.classList.remove('active'));
          el.classList.add('active');
          const input = el.querySelector('input');
          if(input) input.checked = true;
        });
      });

      document.getElementById('seedBtn').addEventListener('click', () => {
        seed = String(Date.now() + Math.floor(Math.random() * 9999));
      });

      form.addEventListener('submit', (ev) => {
        ev.preventDefault();
        const url = new URL('./boxer.html', location.href);
        url.searchParams.set('pid', document.getElementById('pid').value.trim() || 'anon');
        url.searchParams.set('nick', document.getElementById('nick').value.trim());
        url.searchParams.set('mode', document.getElementById('mode').value);
        url.searchParams.set('diff', document.getElementById('diff').value);
        url.searchParams.set('dur', document.getElementById('dur').value);
        url.searchParams.set('bpm', document.getElementById('bpm').value);
        url.searchParams.set('view', currentView());
        url.searchParams.set('seed', seed);
        url.searchParams.set('hub', qs.get('hub') || '../hub.html');
        location.href = url.toString();
      });
    })();
  </script>
</body>
</html>
