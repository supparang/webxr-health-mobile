<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>GoodJunk • Mobile Hand AR v10</title>
  <style>
    html,body{margin:0;width:100%;height:100%;display:grid;place-items:center;background:#ecfdf5;font-family:system-ui,sans-serif;color:#166534}
    .loading{padding:24px;text-align:center;font-size:clamp(18px,4vw,28px);font-weight:900}
  </style>
</head>
<body>
  <div class="loading">🖐️ กำลังเปิด Mobile Hand AR v10…</div>
  <script>
    (async () => {
      const RELEASE = '20260722-MOBILE-MAINTHREAD-V10';
      try {
        const response = await fetch('./goodjunk-ar-production-final.html?release=' + RELEASE + '&t=' + Date.now(), { cache: 'no-store' });
        if (!response.ok) throw new Error('HTTP ' + response.status);
        let html = await response.text();
        html = html.replace(/<script[^>]+@mediapipe\/camera_utils\/[^>]*><\/script>/gi, '');
        html = html.replace(/<script[^>]+@mediapipe\/hands\/[^>]*><\/script>/gi, '');

        const oldBoot = `window.boot=async m=>{mode=m;canvas=$('canvas');video=$('video');ctx=canvas.getContext('2d');resize();addEventListener('resize',resize);canvas.addEventListener('pointerdown',e=>{if(mode==='touch'&&state.playing)hit(e.clientX,e.clientY)});$('loadMsg').textContent=m==='camera'?'กำลังเปิดกล้อง…':'กำลังเปิด Touch Mode…';if(m==='camera'){try{hands=new Hands({locateFile:f=>\`https://cdn.jsdelivr.net/npm/@mediapipe/hands/\${f}\`});hands.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:.55,minTrackingConfidence:.55});hands.onResults(onHands);camera=new Camera(video,{onFrame:async()=>{if(state.playing)await hands.send({image:video})},width:640,height:480});await camera.start()}catch(e){mode='touch';$('loadMsg').textContent='กล้องไม่พร้อม จึงสลับเป็น Touch Mode'}}$('start').classList.add('hidden');$('game').classList.remove('hidden');startFullGame()};`;
        const newBoot = `window.boot=async m=>{mode=m;canvas=$('canvas');video=$('video');ctx=canvas.getContext('2d');resize();addEventListener('resize',resize);window.__GJ_SELECT_AT__=(x,y,source='unknown')=>{if(!state.playing)return false;let target=null,best=Infinity;for(const o of state.objects){const d=Math.hypot(o.x-x,o.y-y),limit=o.r+90;if(d<=limit&&d<best){target=o;best=d}}if(!target)return false;hit(target.x,target.y);return true};window.__GJ_SHOW__=t=>show(t);canvas.addEventListener('pointerdown',e=>{if(state.playing)window.__GJ_SELECT_AT__(e.clientX,e.clientY,'touch')});$('loadMsg').textContent=m==='camera'?'กำลังเตรียม Mobile Hand AR v10…':'กำลังเปิด Touch Mode…';if(m==='camera'){try{const started=performance.now();while(!window.GJMobileHandV7&&performance.now()-started<15000){await new Promise(r=>setTimeout(r,100))}if(!window.GJMobileHandV7)throw new Error('Mobile Hand runtime v10 load timeout');$('loadMsg').textContent='กำลังโหลดโมเดลตรวจมือ…';await window.GJMobileHandV7.start(video);if(!window.GJMobileHandV7.state?.workerReady)throw new Error('Hand model not ready');mode='camera'}catch(e){$('loadMsg').textContent='Hand AR Error: '+String(e?.message||e);alert('Mobile Hand AR เปิดไม่สำเร็จ: '+String(e?.message||e));return}}$('start').classList.add('hidden');$('game').classList.remove('hidden');startFullGame()};`;
        const oldLoop = `function loop(){if(!state.playing)return;if(mode==='touch'){drawBg();update();draw()}raf=requestAnimationFrame(loop)}`;
        const newLoop = `function loop(ts=0){if(!state.playing)return;raf=requestAnimationFrame(loop);if(ts-(window.__GJ_LAST_RENDER_AT__||0)<50)return;window.__GJ_LAST_RENDER_AT__=ts;ctx.clearRect(0,0,innerWidth,innerHeight);if(mode==='camera'&&video&&video.readyState>=2){ctx.save();ctx.translate(innerWidth,0);ctx.scale(-1,1);ctx.drawImage(video,0,0,innerWidth,innerHeight);ctx.restore()}else{drawBg()}update();draw();(window.__GJ_HAND_POINTS__||[]).forEach(p=>pointer(p.x,p.y))}`;
        if(!html.includes(oldBoot)||!html.includes(oldLoop))throw new Error('Mobile v10 patch signature mismatch');
        html=html.replace(oldBoot,newBoot).replace(oldLoop,newLoop);
        const css='<link rel="stylesheet" href="./patches/goodjunk/goodjunk-mobile-battle-compact-v1.css?v=20260722-100"><link rel="stylesheet" href="./patches/goodjunk/goodjunk-worker-v83-status.css?v=20260722-100">';
        const runtime='<scr'+'ipt type="module" src="./patches/goodjunk/goodjunk-mobile-hand-runtime-v10.js?v=20260722-100"></scr'+'ipt>';
        const ui='<scr'+'ipt src="./patches/goodjunk/goodjunk-mobile-battle-compact-v1.js?v=20260722-100"></scr'+'ipt>';
        html=html.replace('</head>',css+'</head>').replace('</body>',runtime+ui+'</body>');
        document.open();document.write(html);document.close();
      } catch (error) {
        document.body.innerHTML='<div class="loading">⚠️ Mobile Hand AR v10 เปิดไม่สำเร็จ<br><small>'+String(error.message||error)+'</small></div>';
      }
    })();
  </script>
</body>
</html>
