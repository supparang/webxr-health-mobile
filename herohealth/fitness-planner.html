<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth — Fitness Planner</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="./favicon.ico" />
  <style>
    body{margin:0;height:100vh;display:grid;place-items:center;background:#050814;color:#e5e7eb;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans Thai",sans-serif}
    .card{width:min(720px,92vw);padding:16px;border-radius:16px;
      background:rgba(15,23,42,.75);border:1px solid rgba(255,255,255,.12)}
    .mut{color:rgba(148,163,184,.92);font-size:.92rem;line-height:1.4;margin-top:6px}
    .btn{margin-top:12px;padding:10px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.08);color:#fff;cursor:pointer;font-weight:800}
  </style>
</head>
<body>
  <div class="card">
    <div style="font-weight:1000;font-size:1.05rem;">🏃 Fitness Planner</div>
    <div class="mut">กำลังเปิด Planner… ถ้าไม่ไปอัตโนมัติให้กดปุ่มด้านล่าง</div>
    <button class="btn" id="go">Open Planner</button>
    <div class="mut" id="dbg" style="opacity:.85;margin-top:10px"></div>
  </div>

  <script>
    (function(){
      'use strict';
      function safeURL(href){ try{ return new URL(href, location.href); }catch(_){ return null; } }

      // ✅ real run page
      const target = safeURL('./fitness-planner/planner.html');
      if(!target) return;

      // ✅ pass-through ALL query params from hub -> planner
      try{
        const src = new URL(location.href);
        src.searchParams.forEach((v,k)=> target.searchParams.set(k, v));
      }catch(_){}

      // ✅ mark launcher root (useful for debugging)
      try{ target.searchParams.set('root','launcher'); }catch(_){}

      // show debug
      const dbg = document.getElementById('dbg');
      if(dbg) dbg.textContent = '→ ' + target.pathname + target.search;

      const go = ()=> location.replace(target.toString());
      document.getElementById('go')?.addEventListener('click', go);

      setTimeout(go, 60);
    })();
  </script>
</body>
</html>
