<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • Fitness Planner Launcher</title>
  <meta name="theme-color" content="#bfe9ff" />
  <link rel="icon" href="./favicon.ico" />
  <link rel="stylesheet" href="./fitness-launcher-shared.css?v=20260406a-fitness-launcher-shared" />

  <style>
    .fp-stage{
      position:absolute; inset:0;
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,.16), rgba(255,255,255,0) 34%),
        linear-gradient(180deg, #f3fbff 0%, #dff3ff 48%, #ccefff 100%);
    }
    .fp-board{
      position:absolute; left:8%; right:8%; top:14%; bottom:12%;
      border-radius:26px;
      background:rgba(255,255,255,.72);
      box-shadow:
        0 14px 30px rgba(37,85,120,.10),
        inset 0 0 0 2px rgba(122,188,225,.18);
      overflow:hidden;
    }
    .fp-grid{
      position:absolute; inset:16px;
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      grid-auto-rows:1fr;
      gap:12px;
    }
    .fp-card{
      border-radius:18px;
      background:#fff;
      box-shadow:0 8px 18px rgba(37,85,120,.08);
      padding:12px;
      position:relative;
    }
    .fp-card .dot{
      width:14px; height:14px; border-radius:999px;
      position:absolute; right:12px; top:12px;
    }
    .fp-card.c1 .dot{ background:#7ed957; }
    .fp-card.c2 .dot{ background:#59bdf7; }
    .fp-card.c3 .dot{ background:#ff99c8; }
    .fp-card.c4 .dot{ background:#ffd45c; }
    .fp-card .t{
      font-size:12px; color:#6f8190; font-weight:800; margin-bottom:8px;
    }
    .fp-card .v{
      font-size:15px; color:#35566e; font-weight:900; line-height:1.35;
    }
    .fp-chip{
      position:absolute; top:16px; left:16px;
      padding:10px 14px; border-radius:999px;
      background:linear-gradient(180deg, #fff2b8, #ffd45c);
      color:#6b5200; font-weight:1000;
      box-shadow:0 10px 22px rgba(255,212,92,.18);
      z-index:2;
    }
    .fp-coach{
      position:absolute; right:16px; bottom:16px;
      max-width:250px;
      padding:12px 14px; border-radius:18px;
      background:rgba(255,255,255,.88);
      color:#4e6a7e; font-weight:800;
      box-shadow:0 10px 24px rgba(55,100,140,.10);
      z-index:2;
    }
    .fp-sticker{
      position:absolute; left:18px; bottom:18px;
      width:64px; height:64px; border-radius:20px;
      display:grid; place-items:center;
      background:linear-gradient(180deg, #ffe7f2, #ffbfd9);
      font-size:30px;
      box-shadow:0 10px 24px rgba(255,153,200,.18);
      z-index:2;
      animation:fpBounce 1.8s ease-in-out infinite;
    }
    @keyframes fpBounce{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-6px); }
    }
  </style>
</head>
<body class="hh-fit-launcher">
  <div id="hhFitLauncherRoot"></div>

  <script src="./fitness-launcher-shared.js?v=20260406a-fitness-launcher-shared"></script>
  <script>
    setupFitnessLauncher({
      zoneLabel: 'Fitness Zone',
      title: 'Fitness Planner',
      description: 'วางแผนกิจกรรมการออกกำลังกายให้เหมาะกับเป้าหมายของเด็ก เลือกกิจกรรม เวลา และลำดับให้สมดุล',
      badge: 'FITNESS<br>PLANNER',
      game: 'fitnessplanner',
      gameId: 'fitnessplanner',
      mode: 'solo',
      run: 'play',
      defaultDiff: 'normal',
      defaultTime: '90',
      defaultView: 'mobile',
      defaultGate: false,
      defaultCooldown: false,
      hub: './hub-v2.html',
      runPage: './fitness-planner.html',
      warmupPage: './warmup-gate.html',
      stageHtml: `
        <div class="fp-stage">
          <div class="fp-chip">Plan Your Day</div>
          <div class="fp-board">
            <div class="fp-grid">
              <div class="fp-card c1"><div class="dot"></div><div class="t">Morning</div><div class="v">Stretch 10 min</div></div>
              <div class="fp-card c2"><div class="dot"></div><div class="t">Afternoon</div><div class="v">Jump 15 min</div></div>
              <div class="fp-card c3"><div class="dot"></div><div class="t">Evening</div><div class="v">Walk + Cooldown</div></div>
              <div class="fp-card c4"><div class="dot"></div><div class="t">Goal</div><div class="v">Balanced Activity</div></div>
              <div class="fp-card c1"><div class="dot"></div><div class="t">Energy</div><div class="v">Easy → Active → Calm</div></div>
              <div class="fp-card c2"><div class="dot"></div><div class="t">Reward</div><div class="v">Healthy Star Plan</div></div>
            </div>
          </div>
          <div class="fp-sticker">🗓️</div>
          <div class="fp-coach">จัดลำดับกิจกรรมให้พอดี สนุก และเหมาะกับเด็กในแต่ละช่วงเวลา</div>
        </div>
      `
    });
  </script>
</body>
</html>
