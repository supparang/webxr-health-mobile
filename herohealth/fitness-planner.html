<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth — Fitness Planner (Launcher)</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="./favicon.ico" />
  <style>
    body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans Thai",sans-serif;
      background:#050814; color:rgba(248,250,252,.95); display:grid; place-items:center; height:100vh; }
    .card{ width:min(720px,92vw); padding:16px; border-radius:16px;
      background:rgba(15,23,42,.75); border:1px solid rgba(255,255,255,.12); }
    .mut{ color:rgba(148,163,184,.92); font-size:.92rem; line-height:1.4; }
    .btn{ margin-top:12px; padding:10px 14px; border-radius:12px; border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.08); color:#fff; cursor:pointer; font-weight:700; }
  </style>
</head>
<body>
  <div class="card">
    <div style="font-weight:900; font-size:1.1rem;">🏃 Fitness Planner</div>
    <div class="mut" style="margin-top:6px;">
      กำลังเปิด Planner… ถ้าไม่ไปอัตโนมัติให้กดปุ่มด้านล่าง
    </div>
    <button class="btn" id="go">Open Planner</button>
    <div class="mut" style="margin-top:10px; opacity:.85" id="dbg"></div>
  </div>

  <script>
    (function(){
      'use strict';
      function safeURL(u){
        try{ return new URL(u, location.href); }catch(_){ return null; }
      }

      // target actual planner page in folder
      const target = safeURL('./fitness-planner/planner.html');
      if(!target) return;

      // pass-through ALL query params (hub/run/diff/time/seed/pid/studyId/... etc.)
      try{
        const src = new URL(location.href);
        src.searchParams.forEach((v,k)=> target.searchParams.set(k, v));
      }catch(_){}

      // optional: mark root=launcher for debugging/analytics
      try{ target.searchParams.set('root','launcher'); }catch(_){}

      // show debug
      const dbg = document.getElementById('dbg');
      if (dbg) dbg.textContent = '→ ' + target.pathname + target.search;

      const go = ()=>{ location.replace(target.toString()); };
      document.getElementById('go')?.addEventListener('click', go);

      // auto redirect fast
      setTimeout(go, 60);
    })();
  </script>
</body>
</html>
