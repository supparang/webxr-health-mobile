<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • Fitness Planner</title>
  <meta name="theme-color" content="#8bd3ff" />
  <meta http-equiv="refresh" content="0; url=./fitness-planner/launcher.html" />
  <style>
    :root{
      --bg1:#dff7ff;
      --bg2:#fff8df;
      --bg3:#f4fff1;
      --card:#fffdf8;
      --line:#cae9f3;
      --text:#31404a;
      --muted:#67818e;
      --blue:#7fcfff;
      --green:#7ed957;
      --yellow:#ffd45c;
      --shadow:0 14px 36px rgba(86,135,160,.14);
      --radius:26px;
    }
    *{ box-sizing:border-box; }
    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left,#fffef8 0%,transparent 26%),
        linear-gradient(180deg,var(--bg1),var(--bg2) 52%,var(--bg3));
    }
    body{
      display:grid;
      place-items:center;
      padding:16px;
    }
    .card{
      width:min(680px,100%);
      background:linear-gradient(180deg,#fffefb,#fffdfa);
      border:2px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:24px;
      text-align:center;
    }
    .logo{
      width:84px;
      height:84px;
      margin:0 auto 14px;
      border-radius:24px;
      display:grid;
      place-items:center;
      font-size:42px;
      background:linear-gradient(135deg,var(--blue),var(--yellow));
      box-shadow:inset 0 2px 0 rgba(255,255,255,.75);
    }
    h1{
      margin:0 0 8px;
      font-size:clamp(28px,4vw,42px);
      line-height:1.05;
    }
    p{
      margin:0;
      color:var(--muted);
      line-height:1.6;
      font-weight:700;
    }
    .link{
      display:inline-block;
      margin-top:16px;
      padding:12px 16px;
      border-radius:18px;
      background:linear-gradient(135deg,var(--green),var(--yellow));
      color:#2d4035;
      text-decoration:none;
      font-weight:1000;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🗓️</div>
    <h1>Fitness Planner</h1>
    <p>กำลังพาไปหน้า Launcher ของเกม…</p>
    <a class="link" id="fallbackLink" href="./fitness-planner/launcher.html">เข้าเกมตอนนี้</a>
  </div>

  <script>
    (() => {
      'use strict';
      const target = new URL('./fitness-planner/launcher.html', location.href);
      target.search = location.search || '';
      document.getElementById('fallbackLink').href = target.toString();
      location.replace(target.toString());
    })();
  </script>
</body>
</html>
