<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no" />
  <meta name="theme-color" content="#e8fbff" />
  <meta name="color-scheme" content="light" />
  <title>HeroHealth • Hygiene Zone</title>
  <style>
    :root{--ink:#12314a;--muted:#667f91;--teal:#0f8f86;--line:#bff3ff;--shadow:0 14px 36px rgba(15,80,120,.12);--sat:env(safe-area-inset-top,0px);--sar:env(safe-area-inset-right,0px);--sab:env(safe-area-inset-bottom,0px);--sal:env(safe-area-inset-left,0px)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;font-family:ui-rounded,"Noto Sans Thai","Segoe UI",system-ui,sans-serif;color:var(--ink);background:radial-gradient(circle at 16% 8%,rgba(255,255,255,.96),transparent 28%),radial-gradient(circle at 88% 22%,rgba(210,247,255,.95),transparent 28%),linear-gradient(160deg,#f7fdff,#f9ffff 46%,#fff9db)}body{overflow-x:hidden}button{font:inherit}
    .app{width:100%;min-height:100dvh;padding:calc(18px + var(--sat)) calc(16px + var(--sar)) calc(24px + var(--sab)) calc(16px + var(--sal))}.shell{width:min(1220px,100%);margin:0 auto}.top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:16px}.title h1{margin:0;font-size:clamp(28px,4vw,43px);line-height:1.08;font-weight:1000;letter-spacing:-.04em}.title p{margin:5px 0 0;color:#60798d;font-size:clamp(14px,2vw,18px);line-height:1.35;font-weight:850}.top-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.small-btn{min-height:40px;padding:0 14px;border:2px solid var(--line);border-radius:999px;color:#0f766e;background:rgba(255,255,255,.76);font-weight:1000;cursor:pointer;box-shadow:0 8px 20px rgba(15,80,120,.08)}.small-btn.danger{color:#9f1239;border-color:#fecdd3;background:#fff1f2}
    .zone-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.summary-card{padding:14px;border:3px solid #d1f6ff;border-radius:22px;background:rgba(255,255,255,.82);box-shadow:var(--shadow)}.summary-card span{display:block;color:var(--muted);font-size:12px;font-weight:900}.summary-card strong{display:block;margin-top:3px;font-size:clamp(18px,3vw,28px);font-weight:1000;line-height:1.05}
    .release-note{margin-bottom:16px;padding:12px 15px;border:2px solid #8ceaff;border-radius:20px;background:linear-gradient(135deg,rgba(224,250,255,.96),rgba(255,248,209,.94));box-shadow:var(--shadow);font-weight:900;line-height:1.4}.release-note b{color:#087f79}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.game-card{position:relative;min-height:320px;display:flex;flex-direction:column;overflow:hidden;padding:23px;border:4px solid #d2f4ff;border-radius:34px;background:radial-gradient(circle at 88% 14%,rgba(202,246,255,.72),transparent 34%),radial-gradient(circle at 88% 70%,rgba(228,252,255,.46),transparent 36%),rgba(255,255,255,.9);box-shadow:var(--shadow)}.game-card.featured{border-color:#68def7;background:radial-gradient(circle at 86% 14%,rgba(255,249,215,.88),transparent 36%),radial-gradient(circle at 80% 72%,rgba(255,236,120,.38),transparent 38%),rgba(255,255,255,.94)}.version{position:absolute;top:16px;right:16px;padding:5px 9px;border-radius:999px;background:#e7fbff;color:#087f79;font-size:11px;font-weight:1000}.featured .version{background:#fff3a8;color:#715300}.icon{width:70px;height:70px;display:grid;place-items:center;border:2px dashed #b2e9f4;border-radius:24px;background:#dff9ff;font-size:38px;box-shadow:inset 0 -10px 18px rgba(14,165,233,.08);margin-bottom:16px}.game-card h2{margin:0;font-size:clamp(27px,3vw,36px);line-height:1.05;font-weight:1000;letter-spacing:-.04em}.game-card p{margin:11px 0 13px;color:#637b8f;font-size:clamp(14px,1.5vw,17px);font-weight:850;line-height:1.45}.tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}.tag{display:inline-flex;align-items:center;min-height:31px;padding:0 11px;border:2px solid #ffe083;border-radius:999px;color:#805a00;background:#fff9dc;font-size:12px;font-weight:1000}.result{display:none;margin:0 0 13px;padding:11px 13px;border:2px solid rgba(34,197,94,.28);border-radius:17px;color:#166534;background:rgba(220,252,231,.8);font-weight:950;line-height:1.35;font-size:13px}.result.show{display:block}.spacer{flex:1}.play-btn{width:100%;min-height:58px;border:3px solid #b6f5ff;border-radius:21px;color:#0f7e76;background:rgba(255,255,255,.78);font-size:clamp(16px,1.8vw,20px);font-weight:1000;cursor:pointer;transition:.12s}.play-btn:active{transform:scale(.98)}.featured .play-btn{border-color:#ffe675;color:#5d4500;background:linear-gradient(180deg,#fff08a,#ffe16b)}.toast{position:fixed;z-index:50;left:50%;bottom:calc(20px + var(--sab));width:min(92vw,520px);padding:13px 16px;border-radius:18px;color:#fff;background:rgba(18,49,74,.94);box-shadow:0 16px 34px rgba(18,49,74,.22);text-align:center;font-weight:950;opacity:0;pointer-events:none;transform:translate(-50%,18px);transition:.18s}.toast.show{opacity:1;transform:translate(-50%,0)}
    @media(max-width:980px){.grid{grid-template-columns:repeat(2,1fr)}.zone-summary{grid-template-columns:repeat(2,1fr)}}@media(max-width:640px){.app{padding-left:calc(10px + var(--sal));padding-right:calc(10px + var(--sar))}.top{flex-direction:column}.top-actions{justify-content:flex-start}.grid{grid-template-columns:1fr;gap:14px}.zone-summary{grid-template-columns:1fr 1fr;gap:9px}.game-card{min-height:auto;padding:20px;border-radius:28px}.icon{width:64px;height:64px;font-size:34px;margin-bottom:14px}.play-btn{min-height:56px}}
  </style>
</head>
<body>
  <main class="app"><div class="shell"><header class="top"><div class="title"><h1>เกมใน Hygiene Zone</h1><p>เลือกภารกิจสุขอนามัย ระบบจะส่งตัวตนและค่าความยากไปยังเกมโดยอัตโนมัติ</p></div><div class="top-actions"><button id="btnHub" class="small-btn" type="button">← กลับ Hub</button><button id="btnExport" class="small-btn" type="button">Export ผล</button><button id="btnReset" class="small-btn danger" type="button">Reset</button></div></header>
    <section class="zone-summary"><div class="summary-card"><span>เกมทั้งหมด</span><strong>6</strong></div><div class="summary-card"><span>เล่นแล้ว</span><strong id="sumPlayed">0/6</strong></div><div class="summary-card"><span>ดาวรวม</span><strong id="sumStars">0</strong></div><div class="summary-card"><span>Best Handwash</span><strong id="sumBest">0</strong></div></section>
    <section class="release-note">✨ <b>Handwash Reality Lab V3</b> พร้อมแล้ว: ตรวจมือสองข้าง ทิศฝ่ามือ การสัมผัส การหมุน การสลับมือ ฟอง คราบเชื้อจำลอง และคะแนนประหยัดน้ำ</section>
    <section id="gameGrid" class="grid"></section></div><div id="toast" class="toast" role="status" aria-live="polite"></div></main>
  <script>
  (()=>{'use strict';
    const VERSION='20260716-HYGIENE-ZONE-CANONICAL-ROUTES-V3';
    const qs=new URLSearchParams(location.search);
    const ROUTES={hub:qs.get('hub')||'./hub.html',handwash:'./hygiene-zone/handwash-realistic-v3.html',brush:'./vr-brush-kids/brush.html',bath:'./hygiene-zone/bath-ar-v5.html',germ:'./hygiene-zone/germ-detective-ar.html',clean:'./clean-objects-v3/clean-objects-v2.html',mask:'./mask-cough-v3/mask-cough.html'};
    const STORAGE={profile:'herohealth:hygiene:profile',progress:'herohealth:hygiene:progress',handwashBest:'herohealth:hygiene:handwash:best',handwashAttempts:'herohealth:hygiene:handwash:attempts'};
    const GAMES=[
      {id:'handwash',icon:'🧼',title:'Handwash Reality Lab',version:'V3 REALITY',desc:'ฝึกล้างมือแบบเสมือนจริง ตรวจท่ามือ 7 ขั้น ฟอง คราบเชื้อ และการประหยัดน้ำ',tags:['2-Hand AR','Gesture Classification','Teacher Evidence'],cta:'▶ เริ่ม Handwash V3',featured:true},
      {id:'bath',icon:'🛁',title:'Bath AR',version:'V5.5',desc:'ฝึกลำดับ Wet, Soap, Scrub, Rinse และ Dry ด้วย Pose + Hand Detection',tags:['Pose AR','Hand AR'],cta:'▶ เริ่ม Bath'},
      {id:'brush',icon:'🪥',title:'Brush Hero',version:'V5',desc:'ช่วยกำจัดคราบในช่องปาก 6 โซน พร้อม Scan, Fever และ Boss',tags:['6 Tooth Zones','Boss'],cta:'▶ เริ่ม Brush'},
      {id:'germ',icon:'🦠',title:'Germ Detective',version:'PHASE 1',desc:'สแกนและหยุดเส้นทางการแพร่เชื้อ ด้วย Scanner, Wipe, Clean และ Shield',tags:['Hand Tracking','Decision Burst'],cta:'▶ เริ่ม Germ Detective'},
      {id:'clean',icon:'🧽',title:'Clean Objects',version:'V3 SLICE',desc:'แตะหรือลากทำความสะอาดวัตถุ เก็บ Combo, Fever และจัดการ Boss Object',tags:['Three.js','High-touch Objects'],cta:'▶ เริ่ม Clean Objects'},
      {id:'mask',icon:'😷',title:'Mask & Cough',version:'V3 SLICE',desc:'เตรียมอุปกรณ์ ใส่หน้ากาก ปิดปากเวลาไอ และทิ้งทิชชูให้ถูกต้อง',tags:['5 Phases','Adaptive Coach'],cta:'▶ เริ่ม Mask & Cough'}
    ];
    const grid=document.getElementById('gameGrid'),toast=document.getElementById('toast');let toastTimer;
    document.getElementById('btnHub').onclick=()=>location.href=ROUTES.hub;
    document.getElementById('btnReset').onclick=()=>{if(!confirm('ล้างผล Hygiene Zone ในเครื่องนี้หรือไม่?'))return;localStorage.removeItem(STORAGE.progress);localStorage.removeItem(STORAGE.handwashBest);localStorage.removeItem(STORAGE.handwashAttempts);showToast('Reset ผล Hygiene Zone แล้ว');render()};
    document.getElementById('btnExport').onclick=exportResults;
    render();
    function render(){const progress=syncKnownResults();grid.innerHTML='';GAMES.forEach(game=>{const p=progress[game.id]||{},stars=Number(p.stars||0),score=Number(p.bestScore||0),acc=Number(p.accuracy||0);const card=document.createElement('article');card.className='game-card'+(game.featured?' featured':'');card.innerHTML=`<span class="version">${esc(game.version)}</span><div class="icon">${game.icon}</div><h2>${esc(game.title)}</h2><p>${esc(game.desc)}</p><div class="tags">${game.tags.map(x=>`<span class="tag">${esc(x)}</span>`).join('')}</div><div class="result ${stars||score?'show':''}">${stars?'เล่นแล้ว: '+ '⭐'.repeat(stars)+'<br>':''}${score?'Best Score: '+score.toLocaleString()+(acc?' • Accuracy: '+acc+'%':''):''}</div><div class="spacer"></div><button class="play-btn" type="button">${esc(game.cta)}</button>`;card.querySelector('button').onclick=()=>launch(game.id);grid.appendChild(card)});renderSummary(progress)}
    function launch(id){const profile=read(STORAGE.profile,{}),diff=qs.get('diff')||profile.difficulty||'normal',pid=qs.get('pid')||profile.participantId||'anon',name=qs.get('name')||profile.name||'Hero',classLevel=qs.get('classLevel')||profile.classLevel||'P5';const p=new URLSearchParams({zone:'../hygiene-zone-v2.html',zoneReturn:'../hygiene-zone-v2.html',hub:'../hub.html',hubRoot:'../hub.html',game:id,mode:'ar',diff,pid,name,classLevel,studyId:'HYGIENE-P5-2026',v:VERSION});location.href=ROUTES[id]+'?'+p.toString()}
    function syncKnownResults(){const progress=read(STORAGE.progress,{}),best=read(STORAGE.handwashBest,null);if(best){const old=progress.handwash||{};progress.handwash={status:best.passed?'completed':'attempted',stars:Math.max(Number(old.stars||0),Number(best.stars||0)),bestScore:Math.max(Number(old.bestScore||0),Number(best.score||0)),accuracy:Math.max(Number(old.accuracy||0),Number(best.accuracy||0)),grade:best.passed?'Reality Lab Passed':'Practice',lastPlayedAt:best.timestamp||best.endedAt||'',source:best.gameId||'handwash'};localStorage.setItem(STORAGE.progress,JSON.stringify(progress))}const global=read('HHA_LAST_SUMMARY_GLOBAL',null);if(global&&global.game){const key=String(global.game).toLowerCase().includes('clean')?'clean':String(global.game).toLowerCase();if(GAMES.some(x=>x.id===key)){const old=progress[key]||{};progress[key]={...old,status:'attempted',bestScore:Math.max(Number(old.bestScore||0),Number(global.score||0)),lastPlayedAt:global.updatedAt||Date.now()}}}return progress}
    function renderSummary(progress){let played=0,stars=0;GAMES.forEach(g=>{const p=progress[g.id]||{};if(Number(p.stars||0)>0||p.status==='completed'||p.status==='attempted')played++;stars+=Number(p.stars||0)});document.getElementById('sumPlayed').textContent=played+'/6';document.getElementById('sumStars').textContent=stars;document.getElementById('sumBest').textContent=Number(progress.handwash?.bestScore||0).toLocaleString()}
    function exportResults(){const bundle={exportedAt:new Date().toISOString(),version:VERSION,progress:read(STORAGE.progress,{}),handwashBest:read(STORAGE.handwashBest,null),handwashAttempts:read(STORAGE.handwashAttempts,[])};const url=URL.createObjectURL(new Blob([JSON.stringify(bundle,null,2)],{type:'application/json;charset=utf-8'})),a=document.createElement('a');a.href=url;a.download='hygiene-zone-results.json';a.click();URL.revokeObjectURL(url);showToast('Export ผลแล้ว')}
    function read(k,f){try{const r=localStorage.getItem(k);return r?JSON.parse(r):f}catch(_){return f}}function esc(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}function showToast(m){clearTimeout(toastTimer);toast.textContent=m;toast.classList.add('show');toastTimer=setTimeout(()=>toast.classList.remove('show'),1700)}
  })();
  </script>
</body>
</html>
