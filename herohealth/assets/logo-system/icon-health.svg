
:root{
  --hh-blue:#3BAEF5;
  --hh-green:#7EC94F;
  --hh-orange:#FFA62B;
  --hh-navy:#132D57;
  --hh-panel:#ffffffd9;
  --hh-text:#20304f;
  --hh-shadow:0 16px 40px rgba(19,45,87,.18);
  --hh-radius:28px;
}
.hh-brandbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  padding:16px 20px;
  background:var(--hh-panel);
  border:1px solid rgba(19,45,87,.08);
  border-radius:var(--hh-radius);
  box-shadow:var(--hh-shadow);
}
.hh-brandbar__logo{
  height:72px;
  width:auto;
  display:block;
}
.hh-zones{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.hh-chip{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:10px 14px;
  border-radius:999px;
  font:700 14px/1 "Nunito","Arial Rounded MT Bold",Arial,sans-serif;
  color:#fff;
}
.hh-chip--hygiene{background:var(--hh-blue);}
.hh-chip--nutrition{background:var(--hh-green);}
.hh-chip--exercise{background:var(--hh-orange);}

.hh-gamecard{
  display:flex;
  align-items:center;
  gap:16px;
  padding:18px;
  background:#fff;
  border-radius:24px;
  border:1px solid rgba(19,45,87,.08);
  box-shadow:var(--hh-shadow);
}
.hh-gamecard__logo{
  width:180px;
  max-width:38%;
  height:auto;
}
.hh-hud{
  display:flex;
  gap:10px;
  align-items:center;
}
.hh-hud__pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 12px;
  background:#ffffffd9;
  border-radius:999px;
  box-shadow:0 8px 22px rgba(19,45,87,.14);
  font:800 14px/1 "Nunito","Arial Rounded MT Bold",Arial,sans-serif;
  color:var(--hh-text);
}
.hh-hud__pill img{
  width:24px;height:24px;display:block;
}
.hh-badges{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}
.hh-badges img{
  width:80px;height:80px;
}
