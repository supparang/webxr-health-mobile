<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HeroHealth Logo System Demo</title>
  <link rel="stylesheet" href="./herohealth-logo-system.css" />
  <style>
    body{margin:0;padding:24px;background:#eef6ff;font-family:Nunito,Arial,sans-serif}
    main{max-width:1200px;margin:0 auto;display:grid;gap:20px}
  </style>
</head>
<body>
<main>
  <section class="hh-brandbar">
    <img class="hh-brandbar__logo" src="../logos/hub-logo.svg" alt="HeroHealth Hub logo">
    <div class="hh-zones">
      <span class="hh-chip hh-chip--hygiene">🪥 Hygiene</span>
      <span class="hh-chip hh-chip--nutrition">🍎 Nutrition</span>
      <span class="hh-chip hh-chip--exercise">🏃 Exercise</span>
    </div>
  </section>

  <section class="hh-gamecard">
    <img class="hh-gamecard__logo" src="../logos/goodjunk-logo.svg" alt="GoodJunk logo">
    <div>
      <h2 style="margin:0 0 6px;color:#132D57">GoodJunk</h2>
      <p style="margin:0;color:#4f6288">ตัวอย่างการใช้ game logo บน launcher / card / summary</p>
    </div>
  </section>

  <section class="hh-hud">
    <span class="hh-hud__pill"><img src="../hud/icon-health.svg" alt=""> 3</span>
    <span class="hh-hud__pill"><img src="../hud/icon-energy.svg" alt=""> 82%</span>
    <span class="hh-hud__pill"><img src="../hud/icon-time.svg" alt=""> 01:27</span>
    <span class="hh-hud__pill"><img src="../hud/icon-score.svg" alt=""> 1250</span>
    <span class="hh-hud__pill"><img src="../hud/icon-combo.svg" alt=""> x6</span>
  </section>

  <section class="hh-badges">
    <img src="../badges/badge-bronze.svg" alt="Bronze badge">
    <img src="../badges/badge-silver.svg" alt="Silver badge">
    <img src="../badges/badge-gold.svg" alt="Gold badge">
    <img src="../badges/badge-master-hero.svg" alt="Master Hero badge">
    <img src="../badges/badge-daily-streak.svg" alt="Daily Streak badge">
  </section>
</main>
</body>
</html>
