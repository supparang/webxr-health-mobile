<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • Shadow Breaker Launcher</title>
  <meta name="theme-color" content="#bfe9ff" />
  <link rel="icon" href="./favicon.ico" />
  <link rel="stylesheet" href="./fitness-launcher-shared.css?v=20260406a-fitness-launcher-shared" />

  <style>
    .sb-stage{
      position:absolute; inset:0;
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,.12), rgba(255,255,255,0) 34%),
        linear-gradient(180deg, #11253f 0%, #17385a 46%, #234d72 100%);
    }
    .sb-floor{
      position:absolute; left:6%; right:6%; bottom:7%;
      height:28%;
      border-radius:28px;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      border:2px solid rgba(160,215,255,.18);
      box-shadow:inset 0 0 0 10px rgba(255,255,255,.03);
    }
    .sb-grid{
      position:absolute; inset:0;
      background:
        linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size:32px 32px;
      opacity:.22;
    }
    .sb-core{
      position:absolute; left:50%; top:38%;
      width:110px; height:110px; margin-left:-55px; margin-top:-55px;
      border-radius:999px;
      background:radial-gradient(circle at 35% 35%, #fff6c7, #ffb347 48%, #ff6d5a 78%);
      box-shadow:
        0 0 0 14px rgba(255,179,71,.10),
        0 0 44px rgba(255,126,84,.34);
      animation:sbPulse 1.8s ease-in-out infinite;
    }
    .sb-orb{
      position:absolute; width:28px; height:28px; border-radius:999px;
      background:radial-gradient(circle at 30% 30%, #fff, #9fddff);
      box-shadow:0 0 0 8px rgba(159,221,255,.12), 0 0 18px rgba(159,221,255,.26);
      animation:sbFloat 2.8s ease-in-out infinite;
    }
    .sb-o1{ left:26%; top:40%; animation-delay:0s; }
    .sb-o2{ left:70%; top:26%; animation-delay:.25s; }
    .sb-o3{ left:62%; top:58%; animation-delay:.5s; }
    .sb-o4{ left:36%; top:63%; animation-delay:.75s; }
    .sb-avatar{
      position:absolute; left:50%; bottom:16%;
      width:88px; height:128px; transform:translateX(-50%);
      border-radius:24px;
      background:rgba(255,255,255,.12);
      border:3px dashed rgba(214,239,255,.22);
    }
    .sb-avatar::before{
      content:"";
      position:absolute; left:50%; top:10px; transform:translateX(-50%);
      width:30px; height:30px; border-radius:999px;
      background:rgba(255,255,255,.18);
    }
    .sb-avatar::after{
      content:"";
      position:absolute; left:50%; top:44px; transform:translateX(-50%);
      width:16px; height:60px; border-radius:999px;
      background:rgba(255,255,255,.18);
      box-shadow:-26px 10px 0 0 rgba(255,255,255,.12), 26px 10px 0 0 rgba(255,255,255,.12);
    }
    .sb-chip{
      position:absolute; top:16px; left:16px;
      padding:10px 14px; border-radius:999px;
      background:rgba(255,255,255,.12);
      color:#eef8ff; font-weight:900;
      box-shadow:0 8px 18px rgba(0,0,0,.12);
      backdrop-filter:blur(4px);
    }
    .sb-fever{
      position:absolute; right:16px; top:16px;
      padding:10px 14px; border-radius:999px;
      background:linear-gradient(180deg, #fff2b8, #ffd45c);
      color:#6b5200; font-weight:1000;
      box-shadow:0 10px 22px rgba(255,212,92,.22);
      animation:sbPulseSmall 1.1s ease-in-out infinite;
    }
    .sb-tip{
      position:absolute; right:16px; bottom:16px;
      max-width:250px;
      padding:12px 14px; border-radius:18px;
      background:rgba(255,255,255,.12);
      color:#eef8ff; font-weight:800;
      box-shadow:0 10px 24px rgba(0,0,0,.12);
      backdrop-filter:blur(4px);
    }
    @keyframes sbPulse{
      0%,100%{ transform:scale(1); }
      50%{ transform:scale(1.06); }
    }
    @keyframes sbPulseSmall{
      0%,100%{ transform:scale(1); }
      50%{ transform:scale(1.08); }
    }
    @keyframes sbFloat{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-14px); }
    }
  </style>
</head>
<body class="hh-fit-launcher">
  <div id="hhFitLauncherRoot"></div>

  <script src="./fitness-launcher-shared.js?v=20260406a-fitness-launcher-shared"></script>
  <script>
    setupFitnessLauncher({
      zoneLabel: 'Fitness Zone',
      title: 'Shadow Breaker',
      description: 'ตีเป้า หลบแรงกดดัน และผ่าน wave การออกกำลังกายให้ครบ พร้อมบอสช่วงท้าย',
      badge: 'SHADOW<br>BREAKER',
      game: 'shadowbreaker',
      gameId: 'shadowbreaker',
      mode: 'solo',
      run: 'play',
      defaultDiff: 'normal',
      defaultTime: '90',
      defaultView: 'mobile',
      defaultGate: true,
      defaultCooldown: true,
      hub: './hub-v2.html',
      runPage: '../fitness/shadow-breaker.html',
      warmupPage: './warmup-gate.html',
      stageHtml: `
        <div class="sb-stage">
          <div class="sb-grid"></div>
          <div class="sb-floor"></div>
          <div class="sb-chip">Boss Practice Arena</div>
          <div class="sb-fever">FEVER</div>
          <div class="sb-core"></div>
          <div class="sb-orb sb-o1"></div>
          <div class="sb-orb sb-o2"></div>
          <div class="sb-orb sb-o3"></div>
          <div class="sb-orb sb-o4"></div>
          <div class="sb-avatar"></div>
          <div class="sb-tip">ตีเป้าให้แม่น รักษาจังหวะ แล้วอย่าปล่อยให้บอสกดดันจนพลาด</div>
        </div>
      `
    });
  </script>
</body>
</html>
