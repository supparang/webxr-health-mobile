<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Redirecting… Shadow Breaker</title>
  <meta name="color-scheme" content="dark light" />
  <meta http-equiv="refresh" content="0; url=/webxr-health-mobile/fitness/shadow-breaker.html" />
  <script>
    (function(){
      'use strict';
      const RUN_PATH = '/webxr-health-mobile/fitness/shadow-breaker.html';
      const q = location.search || '';
      const h = location.hash || '';
      const target = location.origin + RUN_PATH + q + h;
      const current = location.origin + location.pathname + q + h;

      if (current === target) {
        document.addEventListener('DOMContentLoaded', function(){
          document.body.innerHTML =
            '<main style="font-family:system-ui;padding:24px;line-height:1.5">' +
            '<h1>Shadow Breaker</h1>' +
            '<p>Launcher path ชี้มาที่ run page เดิมตัวเอง ทำให้ redirect วน</p>' +
            '<p>กรุณาตรวจสอบ RUN_PATH ใน <code>/herohealth/shadow-breaker-vr.html</code></p>' +
            '</main>';
        });
        return;
      }

      try {
        location.replace(target);
      } catch(e) {
        location.href = target;
      }
    })();
  </script>
</head>
<body></body>
</html>
