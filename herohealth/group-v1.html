<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#dff5ff" />
  <meta name="color-scheme" content="light" />

  <title>HeroHealth • Groups Launcher Redirect</title>

  <style>
    :root{
      --bg1:#dff5ff;
      --bg2:#fff7df;
      --card:#ffffff;
      --line:#d6edf7;
      --text:#214f64;
      --muted:#6f8fa1;
      --blue:#55b8ff;
      --blue2:#2f95ff;
      --green:#7ed957;
      --yellow:#ffd966;
      --shadow:0 22px 70px rgba(37,89,121,.18);
      --safeTop:env(safe-area-inset-top,0px);
      --safeBottom:env(safe-area-inset-bottom,0px);
    }

    *{
      box-sizing:border-box;
    }

    html,
    body{
      margin:0;
      min-height:100%;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 16% 10%, rgba(126,217,87,.24), transparent 30%),
        radial-gradient(circle at 88% 12%, rgba(85,184,255,.26), transparent 32%),
        radial-gradient(circle at 58% 92%, rgba(255,217,102,.22), transparent 35%),
        linear-gradient(135deg,var(--bg1),var(--bg2));
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:
        calc(22px + var(--safeTop))
        18px
        calc(28px + var(--safeBottom));
    }

    .card{
      width:min(94vw,760px);
      border-radius:36px;
      background:rgba(255,255,255,.92);
      border:2px solid rgba(255,255,255,.92);
      box-shadow:var(--shadow);
      padding:clamp(22px,4vw,34px);
      text-align:center;
      backdrop-filter:blur(14px);
    }

    .icon{
      width:94px;
      height:94px;
      margin:0 auto 16px;
      border-radius:28px;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg,#fff5a8,#ffd966);
      font-size:52px;
      box-shadow:0 14px 34px rgba(255,190,60,.22);
    }

    h1{
      margin:0;
      font-size:clamp(30px,5vw,48px);
      line-height:1.08;
      letter-spacing:-.8px;
    }

    p{
      margin:10px auto 0;
      max-width:580px;
      color:var(--muted);
      font-weight:850;
      font-size:clamp(15px,2.4vw,18px);
      line-height:1.45;
    }

    .target{
      margin:18px auto 0;
      padding:12px 14px;
      border-radius:20px;
      background:#f5fbff;
      border:1px solid var(--line);
      color:#486b80;
      font-weight:900;
      font-size:13px;
      word-break:break-all;
      text-align:left;
    }

    .actions{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:12px;
      margin-top:24px;
    }

    a,
    button{
      border:0;
      border-radius:999px;
      min-height:52px;
      padding:12px 20px;
      font-weight:950;
      font-size:clamp(15px,2vw,18px);
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      box-shadow:0 12px 26px rgba(0,0,0,.10);
      font-family:inherit;
    }

    .primary{
      color:white;
      background:linear-gradient(135deg,var(--blue),var(--blue2));
    }

    .soft{
      color:var(--text);
      background:#eef8ff;
      border:1px solid var(--line);
    }

    .green{
      color:#2f7a31;
      background:#efffea;
      border:1px solid rgba(126,217,87,.65);
    }

    .note{
      margin-top:18px;
      color:#8aa4b2;
      font-size:12px;
      font-weight:850;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="icon">🥦</div>

    <h1>กำลังเปิดหน้าโหมด Groups</h1>

    <p>
      หน้านี้เป็นหน้าเก่า/ทางผ่านของ Food Groups ระบบจะพาไปหน้า Launcher หลักตัวใหม่โดยอัตโนมัติ
    </p>

    <p>
      หน้า Launcher ที่ถูกต้อง:
      <strong>/herohealth/groups-vr.html</strong>
    </p>

    <div class="target" id="targetUrl">
      Preparing target...
    </div>

    <div class="actions">
      <a class="primary" id="goNow" href="#">ไปหน้า Groups Launcher</a>
      <a class="soft" id="goZone" href="#">กลับ Nutrition Zone</a>
      <button class="green" id="copyBtn" type="button">คัดลอกลิงก์ใหม่</button>
    </div>

    <div class="note">
      Redirect patch: v20260522-group-v1-to-groups-vr-redirect-01
    </div>
  </main>

  <script>
  /* =========================================================
     HeroHealth Groups Old Portal Redirect
     PATCH: v20260522-group-v1-to-groups-vr-redirect-01
     File: /herohealth/group-v1.html

     Purpose:
     - group-v1.html is old / backup / prototype
     - Canonical Groups launcher is /herohealth/groups-vr.html
     - Preserve key query params
     - Prevent old links from sending users to the wrong Groups mode page
  ========================================================= */
  (function(){
    'use strict';

    const PATCH_ID = 'v20260522-group-v1-to-groups-vr-redirect-01';
    const qs = new URLSearchParams(location.search);

    window.__HHA_GROUP_V1_REDIRECT__ = {
      patch: PATCH_ID,
      from: location.href,
      startedAt: new Date().toISOString()
    };

    function repoBase(){
      const path = location.pathname;
      const marker = '/herohealth/';
      const idx = path.indexOf(marker);

      if (idx >= 0) {
        return location.origin + path.slice(0, idx);
      }

      return location.origin + '/webxr-health-mobile';
    }

    const BASE = repoBase();
    const HERO = BASE + '/herohealth';

    const GROUPS_LAUNCHER = HERO + '/groups-vr.html';
    const NUTRITION_ZONE = HERO + '/nutrition-zone.html';

    function getParam(name, fallback){
      const v = qs.get(name);
      return v === null || v === '' ? fallback : v;
    }

    function normalizeView(v){
      const raw = String(v || '').toLowerCase();

      if (['pc','desktop','notebook','laptop'].includes(raw)) return 'pc';
      if (['mobile','phone','touch','tablet'].includes(raw)) return 'mobile';
      if (['cvr','cardboard','cardboard-vr','vr','webxr'].includes(raw)) return 'cvr';

      if (/Android|iPhone|iPad|iPod|Mobile|Windows Phone/i.test(navigator.userAgent || '')) {
        return 'mobile';
      }

      return 'pc';
    }

    function buildZoneUrl(){
      const out = new URL(NUTRITION_ZONE);

      [
        'pid',
        'name',
        'studentId',
        'studentName',
        'classSection',
        'diff',
        'time',
        'view',
        'studyId',
        'conditionGroup',
        'api',
        'log'
      ].forEach(function(k){
        const v = qs.get(k);
        if (v !== null && v !== '') out.searchParams.set(k, v);
      });

      out.searchParams.set('pid', getParam('pid', 'anon'));
      out.searchParams.set('name', getParam('name', 'Hero'));
      out.searchParams.set('diff', getParam('diff', 'normal'));
      out.searchParams.set('time', getParam('time', '90'));
      out.searchParams.set('view', normalizeView(getParam('view', 'pc')));
      out.searchParams.set('zone', 'nutrition');
      out.searchParams.set('cat', 'nutrition');
      out.searchParams.set('game', 'groups');

      return out.toString();
    }

    function buildLauncherUrl(extra){
      const out = new URL(GROUPS_LAUNCHER);

      [
        'pid',
        'name',
        'studentId',
        'studentName',
        'classSection',
        'diff',
        'time',
        'view',
        'studyId',
        'conditionGroup',
        'api',
        'log',
        'qa',
        'debug',
        'teacher',
        'mpcvr',
        'room',
        'roomId'
      ].forEach(function(k){
        const v = qs.get(k);
        if (v !== null && v !== '') out.searchParams.set(k, v);
      });

      const zoneUrl = buildZoneUrl();

      out.searchParams.set('pid', getParam('pid', 'anon'));
      out.searchParams.set('name', getParam('name', 'Hero'));
      out.searchParams.set('diff', getParam('diff', 'normal'));
      out.searchParams.set('time', getParam('time', '90'));
      out.searchParams.set('view', normalizeView(getParam('view', 'pc')));

      out.searchParams.set('zone', 'nutrition');
      out.searchParams.set('cat', 'nutrition');
      out.searchParams.set('game', 'groups');
      out.searchParams.set('gameId', 'groups');

      out.searchParams.set('from', 'group-v1-redirect');

      if (qs.get('mode')) {
        out.searchParams.set('mode', qs.get('mode'));
      } else {
        out.searchParams.set('mode', 'solo');
      }

      if (qs.get('variant')) {
        out.searchParams.set('variant', qs.get('variant'));
      } else {
        out.searchParams.set('variant', 'arena');
      }

      out.searchParams.set('hub', getParam('hub', zoneUrl));
      out.searchParams.set('back', getParam('back', zoneUrl));
      out.searchParams.set('return', getParam('return', zoneUrl));
      out.searchParams.set('returnTo', getParam('returnTo', zoneUrl));

      Object.entries(extra || {}).forEach(function(pair){
        const k = pair[0];
        const v = pair[1];

        if (v === null || v === undefined) out.searchParams.delete(k);
        else out.searchParams.set(k, String(v));
      });

      return out.toString();
    }

    function setUi(target){
      const targetEl = document.getElementById('targetUrl');
      const goNow = document.getElementById('goNow');
      const goZone = document.getElementById('goZone');
      const copyBtn = document.getElementById('copyBtn');

      if (targetEl) targetEl.textContent = target;
      if (goNow) goNow.href = target;
      if (goZone) goZone.href = buildZoneUrl();

      if (copyBtn && !copyBtn.__bound) {
        copyBtn.__bound = true;
        copyBtn.addEventListener('click', function(){
          try {
            navigator.clipboard.writeText(target);
            copyBtn.textContent = 'คัดลอกแล้ว';
          } catch(e) {
            copyBtn.textContent = 'คัดลอกไม่ได้';
          }

          setTimeout(function(){
            copyBtn.textContent = 'คัดลอกลิงก์ใหม่';
          }, 1600);
        });
      }
    }

    function rememberRedirect(target){
      try {
        sessionStorage.setItem('HHA_GROUP_V1_REDIRECT_TARGET', target);
      } catch(e) {}

      try {
        localStorage.setItem('HHA_GROUP_V1_REDIRECT_TARGET', target);
      } catch(e) {}
    }

    function redirect(target){
      const noRedirect =
        qs.get('noredirect') === '1' ||
        qs.get('hold') === '1';

      if (noRedirect) {
        console.info('[Group v1 Redirect]', PATCH_ID, 'paused', {
          target: target
        });
        return;
      }

      setTimeout(function(){
        try {
          location.replace(target);
        } catch(e) {
          location.href = target;
        }
      }, 350);
    }

    function boot(){
      const target = buildLauncherUrl({
        t: Date.now()
      });

      window.__HHA_GROUP_V1_REDIRECT__.target = target;
      window.__HHA_GROUP_V1_REDIRECT__.zone = buildZoneUrl();

      setUi(target);
      rememberRedirect(target);

      console.info('[Group v1 Redirect]', PATCH_ID, {
        from: location.href,
        target: target,
        base: BASE
      });

      redirect(target);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', boot, { once:true });
    } else {
      boot();
    }

  })();
  </script>
</body>
</html>
