<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Redirecting to Groups VR…</title>
  <meta name="robots" content="noindex,nofollow" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#9fe3ff" />
  <link rel="icon" href="./favicon.ico" />
  <style>
    :root{
      --sky1:#ecf9ff;
      --sky2:#d8f2ff;
      --sky3:#bfe8ff;
      --card:#ffffffee;
      --line:#d6edf7;
      --text:#29485f;
      --muted:#6d8ea3;
      --blue:#61bbff;
      --blue2:#2f95ff;
      --shadow:0 18px 40px rgba(85,145,176,.18);
    }

    *{ box-sizing:border-box; }
    html,body{ min-height:100%; }

    body{
      margin:0;
      font-family:ui-rounded,"Nunito","Noto Sans Thai",system-ui,sans-serif;
      color:var(--text);
      background:
        radial-gradient(1100px 620px at 50% -10%, rgba(255,255,255,.92), transparent 58%),
        radial-gradient(680px 420px at 12% 8%, rgba(255,255,255,.48), transparent 62%),
        linear-gradient(180deg,var(--sky1),var(--sky2) 56%,var(--sky3));
      display:grid;
      place-items:center;
      padding:18px;
    }

    .card{
      width:min(620px,100%);
      border-radius:28px;
      padding:22px 18px;
      background:var(--card);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      text-align:center;
    }

    .badge{
      width:76px;
      height:76px;
      margin:0 auto 12px;
      border-radius:24px;
      display:grid;
      place-items:center;
      font-size:40px;
      background:linear-gradient(180deg,#fff3b7,#ffd76f);
      border:1px solid #ffe39a;
      box-shadow:0 10px 22px rgba(255,214,111,.20);
    }

    h1{
      margin:0;
      font-size:clamp(1.35rem,3vw,2rem);
      line-height:1.08;
      font-weight:1000;
    }

    p{
      margin:10px auto 0;
      max-width:46ch;
      color:var(--muted);
      line-height:1.65;
      font-weight:800;
    }

    .row{
      margin-top:16px;
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      min-height:46px;
      border:none;
      border-radius:18px;
      padding:0 16px;
      font:inherit;
      font-weight:1000;
      cursor:pointer;
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
      box-shadow:0 10px 22px rgba(102,160,188,.12);
    }

    .btn.primary{
      color:#fff;
      border:none;
      background:linear-gradient(180deg,var(--blue),var(--blue2));
    }

    .hint{
      margin-top:12px;
      font-size:.9rem;
      color:var(--muted);
      font-weight:800;
    }

    .mono{
      margin-top:10px;
      padding:10px 12px;
      border-radius:16px;
      background:#f7fcff;
      border:1px solid #d8edf7;
      color:#56788f;
      font:600 12px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;
      word-break:break-all;
      text-align:left;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">🥦</div>
    <h1>กำลังพาไปหน้า Groups VR</h1>
    <p>
      หน้านี้เป็นไฟล์เก่าแล้ว ระบบจะพาไปหน้าเข้าเกมหลักอัตโนมัติ
      พร้อมส่งพารามิเตอร์เดิมติดไปให้ครบ
    </p>

    <div class="row">
      <button class="btn primary" id="btnGoNow" type="button">ไปตอนนี้</button>
      <button class="btn" id="btnBackHub" type="button">กลับ HUB</button>
    </div>

    <div class="hint">ถ้าไม่เด้งอัตโนมัติ ให้กด “ไปตอนนี้”</div>
    <div class="mono" id="targetUrl">Preparing…</div>
  </main>

  <script>
    (() => {
      'use strict';

      const q = new URLSearchParams(location.search);
      const target = new URL('./groups-vr.html', location.href);
      const hub = q.get('hub') || './hub.html';

      for (const [k, v] of q.entries()) {
        target.searchParams.set(k, v);
      }

      target.searchParams.set('from', 'groups-v1');
      if (!target.searchParams.get('hub')) {
        target.searchParams.set('hub', hub);
      }

      const targetUrl = target.toString();
      const targetBox = document.getElementById('targetUrl');
      const btnGoNow = document.getElementById('btnGoNow');
      const btnBackHub = document.getElementById('btnBackHub');

      if (targetBox) targetBox.textContent = targetUrl;

      if (btnGoNow) {
        btnGoNow.addEventListener('click', () => {
          location.replace(targetUrl);
        });
      }

      if (btnBackHub) {
        btnBackHub.addEventListener('click', () => {
          location.href = hub;
        });
      }

      // redirect อัตโนมัติ
      setTimeout(() => {
        location.replace(targetUrl);
      }, 450);
    })();
  </script>
</body>
</html>
