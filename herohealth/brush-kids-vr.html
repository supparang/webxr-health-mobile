<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • Brush Kids</title>
  <meta name="theme-color" content="#dffaff" />
  <style>
    html,body{
      margin:0;
      min-height:100%;
      display:grid;
      place-items:center;
      font-family:system-ui,"Noto Sans Thai",sans-serif;
      background:linear-gradient(180deg,#f8feff,#e8fbff);
      color:#17384f;
    }
    .card{
      width:min(92vw,480px);
      padding:24px;
      border-radius:28px;
      background:#fff;
      border:3px solid #cdeffc;
      box-shadow:0 18px 42px rgba(23,56,79,.12);
      text-align:center;
    }
    .emoji{font-size:56px}
    h1{margin:8px 0;font-size:28px}
    p{margin:0 0 18px;color:#5f7f92;font-weight:800;line-height:1.55}
    button{
      border:0;
      border-radius:999px;
      padding:14px 22px;
      font-weight:1000;
      font-size:17px;
      background:linear-gradient(180deg,#fff2a8,#ffd84d);
      color:#503c00;
      cursor:pointer;
      box-shadow:0 10px 24px rgba(23,56,79,.12);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="emoji">🪥</div>
    <h1>Brush Kids</h1>
    <p>กำลังพาไปหน้าเลือกโหมดแปรงฟัน...</p>
    <button id="goBtn" type="button">เข้า Brush Kids</button>
  </main>

  <script>
    (function(){
      'use strict';

      function herohealthBaseUrl(){
        try{
          const path = location.pathname || '';
          const marker = '/herohealth/';
          const idx = path.indexOf(marker);
          if(idx >= 0){
            return location.origin + path.slice(0, idx + marker.length);
          }
        }catch(_){}
        return location.origin + '/herohealth/';
      }

      const qs = new URLSearchParams(location.search || '');

      function setDefault(k, v){
        if(!qs.has(k) || qs.get(k) === ''){
          qs.set(k, v);
        }
      }

      setDefault('pid', 'anon');
      setDefault('name', 'Hero');
      setDefault('diff', 'normal');
      setDefault('time', '120');
      setDefault('view', 'mobile');
      setDefault('zone', 'hygiene');
      setDefault('game', 'brush');
      setDefault('mode', 'learn');
      setDefault('variant', 'kids-vr');

      const target = herohealthBaseUrl() + 'brush-vr-kids.html?' + qs.toString();

      function go(){
        location.replace(target);
      }

      document.getElementById('goBtn').addEventListener('click', go);
      setTimeout(go, 450);
    })();
  </script>
</body>
</html>
