<!-- === /herohealth/nutrition-plate/plate-launcher.html === -->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • Nutrition Plate Launcher</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="../favicon.ico" />
  <link rel="stylesheet" href="./css/plate.css" />
</head>
<body class="plate-page launcher-page">
  <main class="launcher-shell">
    <section class="launcher-card">
      <div class="hero-pill">🍽️ Nutrition Plate</div>

      <h1 class="launcher-title">จัดจานให้สมดุล</h1>

      <p class="launcher-sub">
        เกมนี้ให้หนู
        <strong>เลือกอาหารมาจัดเป็น 1 มื้อ</strong>,
        <strong>ดูว่าจานขาดอะไร</strong>
        และ <strong>สลับให้ดีขึ้น</strong>
      </p>

      <div class="launcher-grid">
        <label class="field">
          <span>ระดับเกม</span>
          <select id="diffSelect" aria-label="เลือกระดับเกม">
            <option value="easy">ง่าย</option>
            <option value="normal" selected>ปกติ</option>
            <option value="hard">ยาก</option>
          </select>
        </label>

        <label class="field">
          <span>เวลาเล่น</span>
          <select id="timeSelect" aria-label="เลือกเวลาเล่น">
            <option value="60">60 วินาที</option>
            <option value="90" selected>90 วินาที</option>
            <option value="120">120 วินาที</option>
          </select>
        </label>
      </div>

      <div class="launcher-note">
        สิ่งที่จะได้ทำในเกมนี้:
        <br />
        • จัดจานอาหาร 1 มื้อ
        <br />
        • ดูว่าจานยังขาดอะไร
        <br />
        • เปลี่ยนของเดิมให้ดีขึ้น
      </div>

      <div class="launcher-actions">
        <button class="btn btn-start" id="startBtn" type="button">เริ่มเกม Plate</button>
        <button class="btn btn-ghost" id="backBtn" type="button">กลับ HUB</button>
      </div>

      <div class="launcher-note">
        Flow: Launcher → Warmup → Plate → Summary → Cooldown → HUB
      </div>
    </section>
  </main>

  <script type="module">
    import { createCtx } from '../shared/nutrition-common.js';
    import { goExit } from '../shared/nutrition-integration.js';
    import { goWarmupGate } from '../shared/nutrition-gate.js';

    const ctx = createCtx('nutrition-plate');

    const diffSelect = document.getElementById('diffSelect');
    const timeSelect = document.getElementById('timeSelect');
    const startBtn = document.getElementById('startBtn');
    const backBtn = document.getElementById('backBtn');

    diffSelect.value = ctx.diff || 'normal';
    timeSelect.value = String(ctx.time || 90);

    startBtn.addEventListener('click', () => {
      goWarmupGate(
        {
          ...ctx,
          launcher: './plate-launcher.html'
        },
        './plate-run.html',
        {
          cat: 'nutrition',
          theme: 'plate',
          game: 'plate',
          diff: diffSelect.value,
          time: Number(timeSelect.value),
          engine: 'v2',
          launcher: './plate-launcher.html',
          seed: Date.now()
        }
      );
    });

    backBtn.addEventListener('click', () => {
      goExit(ctx, '../hub.html');
    });
  </script>
</body>
</html>
