<!-- === /herohealth/nutrition-plate/plate-run.html === -->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • Nutrition Plate Run</title>
  <link rel="icon" href="../favicon.ico" />
  <link rel="stylesheet" href="./css/plate.css" />
</head>
<body class="plate-page run-page">
  <main class="run-shell" id="appRoot">
    <header class="hud">
      <div class="hud-left">
        <div class="hud-chip phase-chip" id="hudPhase">Phase: Pre Quiz</div>
        <div class="hud-chip progress-chip" id="hudProgress">0 / 0</div>
      </div>
      <div class="hud-right">
        <div class="hud-chip score-chip">คะแนน <strong id="hudScore">0</strong></div>
        <div class="hud-chip streak-chip">ต่อเนื่อง <strong id="hudStreak">0</strong></div>
      </div>
    </header>

    <section class="play-card">
      <div class="mini-tip" id="miniTip">กำลังโหลด…</div>
      <div class="coach-box" id="coachBox" aria-live="polite"></div>

      <div class="phase-banner" id="phaseBanner">
        <div class="phase-banner-icon" id="phaseBannerIcon">🍽️</div>
        <div class="phase-banner-text">
          <div class="phase-banner-title" id="phaseBannerTitle">เริ่มเล่น</div>
          <div class="phase-banner-sub" id="phaseBannerSub">จัดมื้ออาหารให้เหมาะสม</div>
        </div>
      </div>

      <h1 class="question-title" id="questionPrompt">กำลังโหลด...</h1>

      <div class="plate-board" id="plateBoard"></div>
      <div class="scenario-box" id="scenarioBox"></div>

      <div class="answer-grid" id="answerGrid"></div>

      <div class="feedback-box" id="feedbackBox" aria-live="polite"></div>
    </section>

    <footer class="run-footer">
      <button class="btn btn-ghost" id="backBtn">กลับ HUB</button>
    </footer>
  </main>

  <script type="module" src="./js/plate.boot.js"></script>
</body>
</html>
