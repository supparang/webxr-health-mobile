<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>HeroHealth — JumpDuck Launcher</title>
</head>
<body>
<script>
  const sp = new URL(location.href).searchParams;
  const target = new URL('../fitness/jump-duck.html', location.href);

  [
    'run','diff','time','seed','studyId','phase','conditionGroup','log','view','pid','api','ai','debug',
    'planSeq','planDay','planSlot','planMode','planSlots','planIndex','autoNext',
    'plannedGame','finalGame','zone','cdnext','grade','hub'
  ].forEach(k=>{
    const v = sp.get(k);
    if(v!=null && v!=='') target.searchParams.set(k, v);
  });

  // map hub time -> duration for JumpDuck if duration absent
  if(!target.searchParams.get('duration')){
    const t = sp.get('time') || '60';
    target.searchParams.set('duration', t);
  }

  if(!target.searchParams.get('mode')){
    target.searchParams.set('mode', 'training');
  }

  location.replace(target.toString());
</script>
</body>
</html>
