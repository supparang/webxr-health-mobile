<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>HeroHealth — JumpDuck Launcher</title>
</head>
<body>
<script>
  (function () {
    'use strict';

    const ROOT = 'https://supparang.github.io/webxr-health-mobile/herohealth/';
    const HUB_URL = ROOT + 'hub.html';

    const sp = new URL(location.href).searchParams;

    // run game จริง
    const runUrl = new URL('../fitness/jump-duck.html', location.href);

    [
      'run','diff','time','seed','studyId','phase','conditionGroup','log','view','pid','api','ai','debug',
      'planSeq','planDay','planSlot','planMode','planSlots','planIndex','autoNext',
      'plannedGame','finalGame','zone','cdnext','grade','hub'
    ].forEach(k => {
      const v = sp.get(k);
      if (v != null && v !== '') runUrl.searchParams.set(k, v);
    });

    // duration ให้ run page
    if (!runUrl.searchParams.get('duration')) {
      const t = sp.get('time') || '60';
      runUrl.searchParams.set('duration', t);
    }

    // mode มาตรฐาน
    if (!runUrl.searchParams.get('mode')) {
      runUrl.searchParams.set('mode', 'training');
    }

    // hub path
    runUrl.searchParams.set('hub', sp.get('hub') || HUB_URL);

    // ส่งเข้า warmup gate ก่อน
    const gateUrl = new URL(ROOT + 'warmup-gate.html');
    gateUrl.searchParams.set('zone', 'exercise');
    gateUrl.searchParams.set('game', 'jumpduck');
    gateUrl.searchParams.set('phase', 'warmup');
    gateUrl.searchParams.set('next', runUrl.toString());
    gateUrl.searchParams.set('hub', sp.get('hub') || HUB_URL);

    [
      'run','diff','time','seed','studyId','conditionGroup','log','view','pid','api','ai','debug',
      'planSeq','planDay','planSlot','planMode','planSlots','planIndex','autoNext',
      'plannedGame','finalGame','grade'
    ].forEach(k => {
      const v = sp.get(k);
      if (v != null && v !== '') gateUrl.searchParams.set(k, v);
    });

    location.replace(gateUrl.toString());
  })();
</script>
</body>
</html>
