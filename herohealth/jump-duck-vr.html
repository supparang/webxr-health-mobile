<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • Jump Duck Redirect</title>
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#8bdcff" />
  <style>
    :root{
      --bg1:#eaf8ff;
      --bg2:#fff8ec;
      --card:#ffffff;
      --line:#d7edf7;
      --text:#23435a;
      --muted:#6b7f8f;
      --shadow:0 18px 40px rgba(63,122,156,.14);
    }
    *{ box-sizing:border-box; }
    html,body{
      margin:0;
      min-height:100%;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at top, rgba(127,207,255,.24), transparent 34%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--text);
    }
    body{
      display:grid;
      place-items:center;
      padding:18px;
    }
    .card{
      width:min(760px,100%);
      border-radius:28px;
      background:var(--card);
      border:2px solid var(--line);
      box-shadow:var(--shadow);
      padding:22px;
      text-align:center;
    }
    .icon{
      width:88px;
      height:88px;
      margin:0 auto 14px;
      border-radius:24px;
      display:grid;
      place-items:center;
      font-size:42px;
      background:linear-gradient(180deg,#fff7d8,#ffe9a8);
      border:2px solid #ffe08a;
    }
    h1{
      margin:0 0 8px;
      font-size:clamp(28px,5vw,42px);
      line-height:1.06;
      color:#1f5678;
    }
    p{
      margin:0;
      color:var(--muted);
      line-height:1.75;
      font-weight:900;
    }
    .note{
      margin-top:14px;
      padding:12px 14px;
      border-radius:18px;
      background:#fffef7;
      border:2px dashed #eadb9e;
      color:#6d6340;
      font-size:14px;
      font-weight:1000;
      line-height:1.7;
    }
    .actions{
      margin-top:16px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
    }
    a,button{
      appearance:none;
      border:0;
      cursor:pointer;
      min-height:44px;
      padding:11px 15px;
      border-radius:16px;
      font:inherit;
      font-weight:1000;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }
    .primary{
      background:linear-gradient(180deg,#7ed957,#58c33f);
      color:#173b0b;
    }
    .secondary{
      background:#fff;
      color:var(--text);
      border:2px solid var(--line);
    }
    code{
      font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
      font-size:.95em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🐶</div>
    <h1>กำลังพาไป JumpDuck หน้าใหม่</h1>
    <p>
      path นี้เป็นทางเข้าแบบเก่า<br>
      ระบบจะพาไปหน้าเล่นล่าสุดที่ผูกกับ <b>Fitness Zone</b> ให้อัตโนมัติ
    </p>

    <div class="note">
      ปลายทางใหม่: <code>/fitness/jumpduck.html</code>
    </div>

    <div class="actions">
      <a id="goNow" class="primary" href="../fitness/jumpduck.html">▶️ ไปทันที</a>
      <a id="goZone" class="secondary" href="./fitness-zone.html">🏃 ไป Fitness Zone</a>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      function abs(raw, fallback){
        try{
          return new URL(raw, location.href).href;
        }catch(_){
          try{ return new URL(fallback, location.href).href; }catch(__){}
        }
        return fallback || '';
      }

      const FITNESS_ZONE = abs('./fitness-zone.html', 'https://supparang.github.io/webxr-health-mobile/herohealth/fitness-zone.html');
      const TARGET = abs('../fitness/jumpduck.html', 'https://supparang.github.io/webxr-health-mobile/fitness/jumpduck.html');

      const q = new URLSearchParams(location.search);

      const out = new URL(TARGET);

      // preserve almost everything useful
      q.forEach((value, key) => {
        out.searchParams.set(key, value);
      });

      // force canonical JumpDuck identity
      out.searchParams.set('game', 'jump-duck');
      out.searchParams.set('gameId', 'jump-duck');
      out.searchParams.set('theme', 'jump-duck');
      out.searchParams.set('zone', 'fitness');
      out.searchParams.set('cat', 'fitness');

      // canonical navigation targets
      out.searchParams.set('hub', FITNESS_ZONE);
      out.searchParams.set('hubRoot', FITNESS_ZONE);
      out.searchParams.set('launcher', TARGET);

      // wrapper should land on main game, not gate
      out.searchParams.delete('phase');
      out.searchParams.delete('gatePhase');
      out.searchParams.delete('next');
      out.searchParams.delete('nextKey');
      out.searchParams.delete('cdnext');
      out.searchParams.delete('forcegate');
      out.searchParams.delete('resetGate');

      // sensible defaults
      if (!out.searchParams.get('pid')) out.searchParams.set('pid', 'anon');
      if (!out.searchParams.get('name')) out.searchParams.set('name', 'Hero');
      if (!out.searchParams.get('run')) out.searchParams.set('run', 'play');
      if (!out.searchParams.get('mode')) out.searchParams.set('mode', 'training');
      if (!out.searchParams.get('diff')) out.searchParams.set('diff', 'normal');
      if (!out.searchParams.get('time')) out.searchParams.set('time', '60');
      if (!out.searchParams.get('view')) out.searchParams.set('view', 'mobile');
      if (!out.searchParams.get('seed')) out.searchParams.set('seed', String(Date.now()));

      const goNow = document.getElementById('goNow');
      const goZone = document.getElementById('goZone');

      if (goNow) goNow.href = out.href;
      if (goZone) goZone.href = FITNESS_ZONE;

      // auto redirect
      setTimeout(() => {
        location.replace(out.href);
      }, 180);
    })();
  </script>
</body>
</html>
