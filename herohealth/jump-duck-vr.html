<!-- === /herohealth/jump-duck-vr.html ===
Jump Duck ROOT Launcher — PRODUCTION
✅ Redirect to /fitness/jump-duck.html
✅ Pass-through params from Hub
✅ time -> duration fallback
✅ mode=training default
✅ auto detect view if missing
✅ safe hub fallback
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>HeroHealth — JumpDuck Launcher</title>
  <meta name="color-scheme" content="dark light"/>
  <link rel="icon" href="./favicon.ico"/>
  <style>
    :root{ --bg:#020617; --fg:#e5e7eb; --mut:#94a3b8; --bd:rgba(148,163,184,.18); }
    html,body{
      height:100%;margin:0;
      font-family:system-ui,-apple-system,"Noto Sans Thai",Segoe UI,Roboto,sans-serif;
      background:radial-gradient(900px 600px at 20% 20%, rgba(34,211,238,.10), transparent 60%),linear-gradient(180deg,#020617,#0b1226);
      color:var(--fg);
    }
    .wrap{height:100%;display:grid;place-items:center;padding:16px;}
    .card{
      width:min(560px,92vw);
      border:1px solid var(--bd);
      border-radius:22px;
      background:rgba(2,6,23,.72);
      backdrop-filter:blur(10px);
      box-shadow:0 18px 60px rgba(0,0,0,.45);
      padding:16px;
    }
    .t{font-weight:950;font-size:18px;margin:0;}
    .s{margin:8px 0 0;color:var(--mut);line-height:1.45;font-size:13px;}
    .pill{
      display:inline-flex;gap:8px;align-items:center;margin-top:12px;
      padding:8px 10px;border-radius:999px;border:1px solid var(--bd);
      background:rgba(255,255,255,.06);font-size:12px;color:var(--mut);
    }
    .spin{
      display:inline-block;width:12px;height:12px;border-radius:999px;
      border:2px solid rgba(229,231,235,.35);
      border-top-color:rgba(34,211,238,.9);
      animation:sp 1s linear infinite;
    }
    @keyframes sp{to{transform:rotate(360deg)}}
    .btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
    .btn{
      appearance:none;border:1px solid var(--bd);border-radius:14px;
      background:rgba(255,255,255,.06);color:var(--fg);
      padding:10px 12px;font-weight:950;cursor:pointer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <p class="t">⬆️⬇️ JumpDuck — กำลังเข้าเกม…</p>
      <p class="s">Launcher จะส่งต่อพารามิเตอร์จาก Hub ไปยังหน้า Run อัตโนมัติ</p>
      <div class="pill"><span class="spin"></span> Redirecting…</div>
      <div class="btnrow">
        <button class="btn" id="btnGo">ไปต่อทันที</button>
        <button class="btn" id="btnBack">กลับ Hub</button>
      </div>
    </div>
  </div>

<script>
(function(){
  'use strict';

  const RUN_PATH = '../fitness/jump-duck.html';

  function pageUrl(){ return location.href.split('#')[0]; }
  function curQS(){ try{ return new URL(pageUrl()).searchParams; }catch(_){ return new URLSearchParams(); } }

  function detectView(qs){
    const v = (qs.get('view') || '').toLowerCase();
    if(v) return v;
    const ua = navigator.userAgent || '';
    const isMobile = /Android|iPhone|iPad|iPod/i.test(ua) || (window.matchMedia && window.matchMedia('(pointer:coarse)').matches);
    return isMobile ? 'mobile' : 'pc';
  }

  function buildTarget(){
    const sp = curQS();
    const target = new URL(RUN_PATH, location.href);

    [
      'run','diff','time','seed','studyId','phase','conditionGroup','log','view','pid','api','ai','debug',
      'planSeq','planDay','planSlot','planMode','planSlots','planIndex','autoNext',
      'plannedGame','finalGame','zone','cdnext','grade','hub'
    ].forEach(k=>{
      const v = sp.get(k);
      if(v != null && v !== '') target.searchParams.set(k, v);
    });

    if(!target.searchParams.get('view')){
      target.searchParams.set('view', detectView(sp));
    }

    if(!target.searchParams.get('hub')){
      target.searchParams.set('hub', pageUrl());
    }

    if(!target.searchParams.get('duration')){
      const t = sp.get('time') || '60';
      target.searchParams.set('duration', t);
    }

    if(!target.searchParams.get('mode')){
      target.searchParams.set('mode', 'training');
    }

    return target.toString();
  }

  function go(){ location.replace(buildTarget()); }

  document.getElementById('btnGo')?.addEventListener('click', (e)=>{
    e.preventDefault();
    go();
  }, {passive:false});

  document.getElementById('btnBack')?.addEventListener('click', (e)=>{
    e.preventDefault();
    const sp = curQS();
    location.href = sp.get('hub') || './hub.html';
  }, {passive:false});

  setTimeout(go, 120);
})();
</script>
</body>
</html>
