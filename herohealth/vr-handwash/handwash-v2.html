<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • Handwash Full Flow</title>
  <meta name="theme-color" content="#8be8ff" />
  <meta name="color-scheme" content="light" />
  <link rel="icon" href="../favicon.ico" />

  <style>
    :root{
      --bg1:#e9fbff;
      --bg2:#f8feff;
      --ink:#17384f;
      --muted:#5f7f92;
      --line:#cdeffc;
      --card:#ffffff;
      --sky:#8be8ff;
      --blue:#45c9f5;
      --green:#80df96;
      --green2:#48c96a;
      --yellow:#ffd95d;
      --orange:#ffb45f;
      --pink:#ffc8de;
      --red:#ff8f8f;
      --shadow:0 16px 36px rgba(23,56,79,.12);
      --shadow-soft:0 8px 20px rgba(23,56,79,.08);
      --sat:env(safe-area-inset-top,0px);
      --sar:env(safe-area-inset-right,0px);
      --sab:env(safe-area-inset-bottom,0px);
      --sal:env(safe-area-inset-left,0px);
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      min-height:100%;
      overflow-x:hidden;
      -webkit-text-size-adjust:100%;
      -webkit-tap-highlight-color:transparent;
    }

    body{
      color:var(--ink);
      font-family:ui-rounded,"SF Pro Rounded","Noto Sans Thai","Segoe UI",system-ui,sans-serif;
      background:
        radial-gradient(circle at 15% 8%, rgba(255,255,255,.92), transparent 22%),
        radial-gradient(circle at 86% 10%, rgba(139,232,255,.34), transparent 24%),
        linear-gradient(180deg,var(--bg2),var(--bg1));
    }

    button,a{
      font:inherit;
      color:inherit;
    }

    .page{
      min-height:100dvh;
      width:min(1120px,100%);
      margin:0 auto;
      padding:
        calc(12px + var(--sat))
        calc(10px + var(--sar))
        calc(18px + var(--sab))
        calc(10px + var(--sal));
      display:grid;
      gap:12px;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:20;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:4px 0 8px;
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
      padding:9px 12px;
      border-radius:999px;
      border:2px solid var(--line);
      background:rgba(255,255,255,.88);
      box-shadow:var(--shadow-soft);
    }

    .brandIcon{
      width:42px;
      height:42px;
      border-radius:16px;
      display:grid;
      place-items:center;
      background:linear-gradient(180deg,#8be8ff,#22d3ee);
      font-size:24px;
      box-shadow:inset 0 0 0 4px rgba(255,255,255,.42);
      flex:0 0 auto;
    }

    .brand strong{
      display:block;
      font-size:17px;
      font-weight:1000;
      line-height:1.05;
    }

    .brand small{
      display:block;
      margin-top:2px;
      color:var(--muted);
      font-size:12px;
      font-weight:850;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .topActions{
      display:flex;
      gap:8px;
      align-items:center;
    }

    .iconBtn{
      min-width:44px;
      min-height:44px;
      border:0;
      border-radius:16px;
      background:#fff;
      box-shadow:var(--shadow-soft);
      cursor:pointer;
      font-weight:1000;
      display:grid;
      place-items:center;
    }

    .heroCard,
    .panel{
      border-radius:30px;
      border:2px solid var(--line);
      background:rgba(255,255,255,.92);
      box-shadow:var(--shadow);
      overflow:hidden;
      position:relative;
    }

    .heroCard{
      padding:18px;
      display:grid;
      gap:14px;
      background:
        radial-gradient(circle at 90% 8%, rgba(255,217,93,.28), transparent 24%),
        linear-gradient(180deg,#ffffff,#f5fdff);
    }

    .stageHead{
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      gap:14px;
      align-items:center;
    }

    .badge{
      width:max-content;
      max-width:100%;
      min-height:34px;
      padding:7px 12px;
      border-radius:999px;
      background:#ecfeff;
      border:2px solid #bdf4ff;
      color:#0f766e;
      font-size:13px;
      font-weight:1000;
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin-bottom:8px;
    }

    h1{
      margin:0;
      font-size:clamp(30px,5vw,48px);
      line-height:1.02;
      letter-spacing:-.035em;
      font-weight:1000;
      color:#12324b;
    }

    .lead{
      margin:8px 0 0;
      color:var(--muted);
      font-size:16px;
      line-height:1.6;
      font-weight:850;
      max-width:760px;
    }

    .mascot{
      width:148px;
      height:148px;
      border-radius:32px;
      border:2px dashed rgba(23,56,79,.14);
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,.95), transparent 24%),
        linear-gradient(180deg,#dffaff,#bdf4ff);
      display:grid;
      place-items:center;
      font-size:74px;
      box-shadow:inset 0 0 0 8px rgba(255,255,255,.42);
    }

    .flowLine{
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:8px;
      padding:10px;
      border-radius:24px;
      background:#f7fdff;
      border:2px solid #d7f0fb;
    }

    .flowStep{
      min-height:52px;
      border-radius:16px;
      background:#fff;
      border:1px solid #d7f0fb;
      display:grid;
      place-items:center;
      text-align:center;
      padding:8px 6px;
      color:#37566e;
      font-size:12px;
      font-weight:1000;
      line-height:1.25;
      opacity:.72;
    }

    .flowStep.active{
      opacity:1;
      outline:3px solid #22d3ee;
      background:linear-gradient(180deg,#ecfeff,#ffffff);
      transform:translateY(-1px);
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:10px;
    }

    .stat{
      border-radius:20px;
      padding:12px;
      background:#fff;
      border:2px solid #d7f0fb;
      box-shadow:var(--shadow-soft);
    }

    .stat .k{
      display:block;
      color:var(--muted);
      font-size:12px;
      font-weight:1000;
    }

    .stat .v{
      display:block;
      margin-top:4px;
      color:#12324b;
      font-size:22px;
      line-height:1;
      font-weight:1000;
    }

    .panel{
      padding:16px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }

    .card{
      border-radius:24px;
      border:2px solid var(--line);
      background:#fff;
      box-shadow:var(--shadow-soft);
      padding:14px;
      display:grid;
      gap:8px;
    }

    .cardIcon{
      width:58px;
      height:58px;
      border-radius:20px;
      display:grid;
      place-items:center;
      font-size:30px;
      background:linear-gradient(180deg,#dffaff,#bdf4ff);
      box-shadow:inset 0 0 0 4px rgba(255,255,255,.5);
    }

    .card h2,
    .card h3{
      margin:0;
      font-size:20px;
      line-height:1.15;
      font-weight:1000;
    }

    .card p{
      margin:0;
      color:var(--muted);
      line-height:1.55;
      font-size:14px;
      font-weight:760;
    }

    .zoneGrid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:10px;
    }

    .zoneBtn,
    .stepBtn,
    .mainBtn,
    .orderBtn,
    .primaryBtn,
    .secondaryBtn,
    .dangerBtn{
      min-height:54px;
      border:0;
      border-radius:18px;
      padding:12px 14px;
      cursor:pointer;
      font-weight:1000;
      box-shadow:var(--shadow-soft);
      transition:transform .12s ease, filter .12s ease, outline-color .12s ease;
      outline:3px solid transparent;
    }

    .zoneBtn:active,
    .stepBtn:active,
    .mainBtn:active,
    .orderBtn:active,
    .primaryBtn:active,
    .secondaryBtn:active,
    .dangerBtn:active{
      transform:scale(.985);
    }

    .zoneBtn{
      background:linear-gradient(180deg,#ffffff,#eefaff);
      border:2px solid #d7f0fb;
      color:#17384f;
      display:grid;
      gap:4px;
      place-items:center;
      text-align:center;
    }

    .zoneBtn .emoji{
      font-size:28px;
      line-height:1;
    }

    .zoneBtn .label{
      font-size:14px;
      line-height:1.25;
    }

    .zoneBtn.done{
      background:linear-gradient(180deg,#dcfff2,#baf4cf);
      border-color:#98e3aa;
    }

    .zoneBtn.target{
      outline-color:#22d3ee;
      background:linear-gradient(180deg,#fff8dc,#fff0b8);
      border-color:#ffd95d;
    }

    .feedback{
      min-height:52px;
      border-radius:20px;
      border:2px solid #d7f0fb;
      background:#fff;
      padding:12px 14px;
      color:#37566e;
      font-weight:1000;
      line-height:1.35;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .feedback.good{
      background:#effcf3;
      border-color:#b8eec6;
      color:#166534;
    }

    .feedback.bad{
      background:#fff3f3;
      border-color:#ffc8c8;
      color:#8a1f1f;
    }

    .progressWrap{
      height:18px;
      border-radius:999px;
      background:#e9f7fd;
      border:2px solid #d7f0fb;
      overflow:hidden;
    }

    .progressBar{
      height:100%;
      width:0%;
      border-radius:999px;
      background:linear-gradient(90deg,#22c55e,#8be8ff);
      transition:width .2s ease;
    }

    .actions{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
      margin-top:12px;
    }

    .primaryBtn{
      background:linear-gradient(180deg,#fff2a8,#ffd84d);
      color:#503c00;
      font-size:18px;
    }

    .secondaryBtn{
      background:linear-gradient(180deg,#dcfff2,#baf4cf);
      color:#143a22;
      font-size:18px;
    }

    .dangerBtn{
      background:linear-gradient(180deg,#ffe3ef,#ffc9de);
      color:#5b263b;
      font-size:18px;
    }

    .orderList{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:10px;
    }

    .orderBtn{
      background:#fff;
      border:2px solid #d7f0fb;
      color:#17384f;
      display:grid;
      gap:4px;
      text-align:center;
    }

    .orderBtn.done{
      background:#effcf3;
      border-color:#b8eec6;
      color:#166534;
    }

    .summaryBox{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .bigScore{
      border-radius:28px;
      background:linear-gradient(180deg,#fff8dc,#fff0b8);
      border:2px solid #ffd95d;
      padding:18px;
      display:grid;
      place-items:center;
      text-align:center;
      box-shadow:var(--shadow-soft);
    }

    .bigScore .score{
      font-size:54px;
      line-height:1;
      font-weight:1000;
      color:#503c00;
    }

    .bigScore .stars{
      margin-top:8px;
      font-size:32px;
    }

    .tips{
      border-radius:28px;
      background:#fff;
      border:2px solid #d7f0fb;
      padding:18px;
      display:grid;
      gap:10px;
      box-shadow:var(--shadow-soft);
    }

    .tips h2{
      margin:0;
      font-size:22px;
      font-weight:1000;
    }

    .tips p{
      margin:0;
      color:var(--muted);
      font-weight:800;
      line-height:1.55;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%) translateY(20px);
      z-index:40;
      width:min(420px,90vw);
      padding:12px 16px;
      border-radius:999px;
      background:rgba(23,56,79,.92);
      color:#fff;
      text-align:center;
      font-weight:1000;
      box-shadow:0 18px 32px rgba(0,0,0,.20);
      opacity:0;
      pointer-events:none;
      transition:opacity .18s ease, transform .18s ease;
    }

    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    @media (max-width:900px){
      .stageHead{
        grid-template-columns:1fr;
      }

      .mascot{
        display:none;
      }

      .grid,
      .summaryBox{
        grid-template-columns:1fr;
      }

      .zoneGrid,
      .orderList{
        grid-template-columns:repeat(2,minmax(0,1fr));
      }
    }

    @media (max-width:640px){
      .page{
        padding:
          calc(8px + var(--sat))
          calc(8px + var(--sar))
          calc(14px + var(--sab))
          calc(8px + var(--sal));
      }

      .heroCard,
      .panel{
        border-radius:24px;
        padding:14px;
      }

      .flowLine,
      .stats,
      .zoneGrid,
      .orderList,
      .actions{
        grid-template-columns:1fr;
      }

      h1{
        font-size:36px;
      }

      .lead{
        font-size:15px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="topbar">
      <div class="brand" aria-label="HeroHealth Handwash">
        <div class="brandIcon" aria-hidden="true">🧼</div>
        <div>
          <strong>Handwash Trainer</strong>
          <small id="topSub">Full Flow</small>
        </div>
      </div>

      <div class="topActions">
        <button class="iconBtn" id="btnRestart" type="button" aria-label="เริ่มใหม่">↻</button>
        <button class="iconBtn" id="btnBack" type="button" aria-label="กลับโซน">🏠</button>
      </div>
    </header>

    <section class="heroCard">
      <div class="stageHead">
        <div>
          <div class="badge" id="stageBadge">🫧 Handwash</div>
          <h1 id="stageTitle">ล้างมือให้สะอาด!</h1>
          <p class="lead" id="stageLead">เริ่มจากวิธีเล่นสั้น ๆ แล้วค่อยฝึกจริง</p>
        </div>

        <div class="mascot" aria-hidden="true" id="stageMascot">🧼</div>
      </div>

      <div class="flowLine" aria-label="ลำดับการเล่น">
        <div class="flowStep" data-flow-step="howto">1<br>วิธีเล่น</div>
        <div class="flowStep" data-flow-step="practice">2<br>ฝึกก่อน</div>
        <div class="flowStep" data-flow-step="main">3<br>เล่นจริง</div>
        <div class="flowStep" data-flow-step="order">4<br>เรียงลำดับ</div>
        <div class="flowStep" data-flow-step="summary">5<br>สรุปผล</div>
      </div>

      <div class="stats">
        <div class="stat"><span class="k">Score</span><span class="v" id="statScore">0</span></div>
        <div class="stat"><span class="k">ถูก</span><span class="v" id="statCorrect">0</span></div>
        <div class="stat"><span class="k">พลาด</span><span class="v" id="statMistake">0</span></div>
        <div class="stat"><span class="k">เวลา</span><span class="v" id="statTime">90</span></div>
      </div>
    </section>

    <section class="panel" id="gameRoot"></section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    (function(){
      'use strict';

      const qs = new URLSearchParams(location.search);

      const STAGES = ['howto', 'practice', 'main', 'order', 'summary'];

      const ZONES = [
        { id:'palm',    emoji:'🤲', label:'ฝ่ามือ' },
        { id:'back',    emoji:'✋', label:'หลังมือ' },
        { id:'fingers', emoji:'🖐️', label:'ซอกนิ้ว' },
        { id:'thumb',   emoji:'👍', label:'นิ้วโป้ง' },
        { id:'tips',    emoji:'☝️', label:'ปลายนิ้ว' },
        { id:'wrist',   emoji:'💪', label:'ข้อมือ' }
      ];

      const ORDER_STEPS = [
        { id:'wet',     emoji:'💧', label:'เปียกมือ' },
        { id:'soap',    emoji:'🫧', label:'ใส่สบู่' },
        { id:'palm',    emoji:'🤲', label:'ถูฝ่ามือ' },
        { id:'back',    emoji:'✋', label:'ถูหลังมือ' },
        { id:'fingers', emoji:'🖐️', label:'ถูซอกนิ้ว' },
        { id:'thumb',   emoji:'👍', label:'ถูนิ้วโป้ง' },
        { id:'tips',    emoji:'☝️', label:'ถูปลายนิ้ว' },
        { id:'rinse',   emoji:'🚿', label:'ล้างน้ำ' },
        { id:'dry',     emoji:'🧻', label:'เช็ดมือ' }
      ];

      const root = document.getElementById('gameRoot');
      const toastEl = document.getElementById('toast');

      const els = {
        topSub: document.getElementById('topSub'),
        stageBadge: document.getElementById('stageBadge'),
        stageTitle: document.getElementById('stageTitle'),
        stageLead: document.getElementById('stageLead'),
        stageMascot: document.getElementById('stageMascot'),
        statScore: document.getElementById('statScore'),
        statCorrect: document.getElementById('statCorrect'),
        statMistake: document.getElementById('statMistake'),
        statTime: document.getElementById('statTime')
      };

      const state = {
        stage: normalizeStage(qs.get('stage') || 'howto'),
        score: 0,
        correct: 0,
        mistake: 0,
        practiced: new Set(),
        practiceIndex: 0,
        mainIndex: 0,
        mainTarget: null,
        mainTotal: getMainTotal(),
        timeLeft: Number(qs.get('time') || 90) || 90,
        orderIndex: 0,
        orderDone: new Set(),
        timer: null,
        startedAt: Date.now(),
        endedAt: null
      };

      function first(){
        for(let i = 0; i < arguments.length; i++){
          const v = arguments[i];
          if(String(v || '').trim()) return String(v).trim();
        }
        return '';
      }

      function normalizeStage(stage){
        stage = String(stage || '').toLowerCase();
        if(stage === 'mainGame'.toLowerCase()) return 'main';
        if(stage === 'miniorder') return 'order';
        if(stage === 'mini-order') return 'order';
        if(STAGES.includes(stage)) return stage;
        return 'howto';
      }

      function getMainTotal(){
        const diff = String(qs.get('diff') || 'normal').toLowerCase();
        if(diff === 'easy') return 8;
        if(diff === 'hard') return 16;
        return 12;
      }

      function cleanReturnUrl(raw){
        const fallback = new URL('../hygiene-zone.html', location.href).toString();

        try{
          if(!String(raw || '').trim()) return fallback;

          const u = new URL(String(raw), location.href);

          if(u.pathname.includes('/hygiene-zone.html')){
            return new URL('../hygiene-zone.html', location.href).toString();
          }

          if(u.pathname.includes('/hub.html') || u.pathname.includes('/hub-v2.html')){
            return fallback;
          }

          return u.toString();
        }catch(_){
          return fallback;
        }
      }

      function goBack(){
        location.href = cleanReturnUrl(qs.get('hub'));
      }

      function restart(){
        clearTimer();
        const url = new URL(location.href);
        url.searchParams.set('flow', 'full');
        url.searchParams.set('stage', 'howto');
        location.href = url.toString();
      }

      function showToast(text){
        toastEl.textContent = text;
        toastEl.classList.add('show');
        clearTimeout(toastEl.__t);
        toastEl.__t = setTimeout(() => toastEl.classList.remove('show'), 1400);
      }

      function setStage(stage){
        state.stage = normalizeStage(stage);

        if(state.stage !== 'main'){
          clearTimer();
        }

        if(state.stage === 'main' && !state.mainTarget){
          state.mainTarget = ZONES[0].id;
          ensureTimer();
        }

        render();
      }

      function clearTimer(){
        if(state.timer){
          clearInterval(state.timer);
          state.timer = null;
        }
      }

      function ensureTimer(){
        if(state.timer) return;

        state.timer = setInterval(() => {
          state.timeLeft -= 1;
          if(state.timeLeft < 0) state.timeLeft = 0;
          updateStats();

          if(state.timeLeft <= 0){
            clearTimer();
            showToast('หมดเวลา ไปทบทวนลำดับกันต่อ!');
            setStage('order');
          }
        }, 1000);
      }

      function updateStats(){
        els.statScore.textContent = String(state.score);
        els.statCorrect.textContent = String(state.correct);
        els.statMistake.textContent = String(state.mistake);
        els.statTime.textContent = String(state.timeLeft);
      }

      function updateHeader(){
        const map = {
          howto: {
            badge:'🫧 วิธีเล่น',
            title:'มาดูวิธีล้างมือกัน!',
            lead:'ดูขั้นตอนสั้น ๆ ก่อน แล้วค่อยไปฝึกถูมือ',
            mascot:'🧼'
          },
          practice: {
            badge:'🤲 ฝึกก่อน',
            title:'ฝึกถูให้ครบจุด',
            lead:'กดจุดที่ตรงกับเป้าหมาย ฝึกครบทุกจุดก่อนเล่นจริง',
            mascot:'🤲'
          },
          main: {
            badge:'🎮 เล่นจริง',
            title:'ถูให้ถูกจุด!',
            lead:'ดูเป้าหมาย แล้วกดจุดถูมือให้ถูกต้องก่อนหมดเวลา',
            mascot:'⏱️'
          },
          order: {
            badge:'🧠 ทบทวนลำดับ',
            title:'เรียงขั้นตอนล้างมือ',
            lead:'กดขั้นตอนตามลำดับที่ถูกต้อง เพื่อจำวิธีล้างมือให้แม่น',
            mascot:'🧠'
          },
          summary: {
            badge:'⭐ สรุปผล',
            title:'เก่งมาก ฮีโร่สุขอนามัย!',
            lead:'ดูคะแนน ดาว และคำแนะนำสั้น ๆ แล้วกลับไปเลือกเกมต่อได้',
            mascot:'🏆'
          }
        };

        const h = map[state.stage] || map.howto;
        els.stageBadge.textContent = h.badge;
        els.stageTitle.textContent = h.title;
        els.stageLead.textContent = h.lead;
        els.stageMascot.textContent = h.mascot;
        els.topSub.textContent = h.title;

        document.querySelectorAll('[data-flow-step]').forEach(el => {
          el.classList.toggle('active', el.dataset.flowStep === state.stage);
        });
      }

      function zoneButtons(targetId, doneSetName){
        const done = doneSetName ? state[doneSetName] : new Set();

        return ZONES.map(z => `
          <button
            class="zoneBtn ${z.id === targetId ? 'target' : ''} ${done.has(z.id) ? 'done' : ''}"
            type="button"
            data-action="zone"
            data-zone="${z.id}"
          >
            <span class="emoji">${z.emoji}</span>
            <span class="label">${z.label}</span>
          </button>
        `).join('');
      }

      function renderHowto(){
        root.innerHTML = `
          <div class="grid">
            <article class="card">
              <div class="cardIcon">👀</div>
              <h2>ดูเป้าหมาย</h2>
              <p>เกมจะบอกว่าต้องถูส่วนไหนของมือ เช่น ฝ่ามือ หลังมือ หรือซอกนิ้ว</p>
            </article>

            <article class="card">
              <div class="cardIcon">👆</div>
              <h2>กดให้ถูกจุด</h2>
              <p>กดปุ่มจุดที่ถูกต้อง ถ้าตอบถูกจะได้คะแนนและเสียงตอบรับ</p>
            </article>

            <article class="card">
              <div class="cardIcon">🧠</div>
              <h2>จำลำดับ</h2>
              <p>หลังเล่นจริง จะมีมินิเกมเรียงขั้นตอนล้างมือเพื่อทบทวนความจำ</p>
            </article>

            <article class="card">
              <div class="cardIcon">⭐</div>
              <h2>ดูสรุปผล</h2>
              <p>ตอนจบจะมีคะแนน ดาว และคำแนะนำสั้น ๆ ให้ฝึกต่อ</p>
            </article>
          </div>

          <div class="actions">
            <button class="primaryBtn" type="button" data-action="go-practice">▶ เริ่มฝึกก่อน</button>
            <button class="secondaryBtn" type="button" data-action="go-main">ข้ามไปเล่นจริง</button>
          </div>
        `;
      }

      function renderPractice(){
        const target = ZONES[state.practiceIndex] || ZONES[0];
        const pct = Math.round((state.practiced.size / ZONES.length) * 100);

        root.innerHTML = `
          <div class="feedback good">
            <span>🎯</span>
            <span>เป้าหมายตอนนี้: <strong>${target.emoji} ${target.label}</strong></span>
          </div>

          <div class="progressWrap" aria-label="ความคืบหน้าการฝึก">
            <div class="progressBar" style="width:${pct}%"></div>
          </div>

          <div class="zoneGrid">
            ${zoneButtons(target.id, 'practiced')}
          </div>

          <div class="actions">
            <button class="secondaryBtn" type="button" data-action="go-howto">กลับวิธีเล่น</button>
            <button class="primaryBtn" type="button" data-action="go-main">ไปเล่นจริง</button>
          </div>
        `;
      }

      function renderMain(){
        ensureTimer();

        const target = ZONES.find(z => z.id === state.mainTarget) || ZONES[0];
        const pct = Math.round((state.mainIndex / state.mainTotal) * 100);

        root.innerHTML = `
          <div class="feedback good">
            <span>🎮</span>
            <span>กดให้ถูก: <strong>${target.emoji} ${target.label}</strong></span>
          </div>

          <div class="progressWrap" aria-label="ความคืบหน้าเกมหลัก">
            <div class="progressBar" style="width:${pct}%"></div>
          </div>

          <div class="zoneGrid">
            ${ZONES.map(z => `
              <button
                class="zoneBtn ${z.id === target.id ? 'target' : ''}"
                type="button"
                data-action="main-zone"
                data-zone="${z.id}"
              >
                <span class="emoji">${z.emoji}</span>
                <span class="label">${z.label}</span>
              </button>
            `).join('')}
          </div>

          <div class="actions">
            <button class="secondaryBtn" type="button" data-action="go-practice">กลับไปฝึก</button>
            <button class="primaryBtn" type="button" data-action="finish-main">ไปทบทวนลำดับ</button>
          </div>
        `;
      }

      function renderOrder(){
        const next = ORDER_STEPS[state.orderIndex];

        root.innerHTML = `
          <div class="feedback ${next ? 'good' : 'good'}">
            <span>🧠</span>
            <span>${next ? `ขั้นตอนต่อไปคืออะไร? <strong>${state.orderIndex + 1}/${ORDER_STEPS.length}</strong>` : 'เรียงครบแล้ว ไปดูสรุปได้เลย!'}</span>
          </div>

          <div class="progressWrap" aria-label="ความคืบหน้าการเรียงลำดับ">
            <div class="progressBar" style="width:${Math.round((state.orderIndex / ORDER_STEPS.length) * 100)}%"></div>
          </div>

          <div class="orderList">
            ${ORDER_STEPS.map(step => `
              <button
                class="orderBtn ${state.orderDone.has(step.id) ? 'done' : ''}"
                type="button"
                data-action="order-step"
                data-step="${step.id}"
                ${state.orderDone.has(step.id) ? 'disabled' : ''}
              >
                <span>${step.emoji}</span>
                <strong>${step.label}</strong>
              </button>
            `).join('')}
          </div>

          <div class="actions">
            <button class="secondaryBtn" type="button" data-action="go-main">กลับเล่นจริง</button>
            <button class="primaryBtn" type="button" data-action="go-summary">ดูสรุปผล</button>
          </div>
        `;
      }

      function calcStars(){
        const accBase = state.correct + state.mistake;
        const accuracy = accBase ? Math.round((state.correct / accBase) * 100) : 0;

        let stars = 1;
        if(state.score >= 80 && accuracy >= 75 && state.orderIndex >= 6) stars = 2;
        if(state.score >= 120 && accuracy >= 85 && state.orderIndex >= ORDER_STEPS.length) stars = 3;
        return stars;
      }

      function saveSummary(stars){
        const accBase = state.correct + state.mistake;
        const accuracy = accBase ? Math.round((state.correct / accBase) * 100) : 0;
        const summary = {
          game:'handwash',
          zone:'hygiene',
          score:state.score,
          stars,
          correct:state.correct,
          mistakes:state.mistake,
          accuracy,
          orderSteps:state.orderIndex,
          orderTotal:ORDER_STEPS.length,
          durationSec:Math.max(1, Math.round((Date.now() - state.startedAt) / 1000)),
          finishedAt:new Date().toISOString()
        };

        try{
          localStorage.setItem('HHA_LAST_SUMMARY', JSON.stringify(summary));
          localStorage.setItem('HHA_LAST_SUMMARY_HANDWASH', JSON.stringify(summary));
          localStorage.setItem('HHA_LAST_SUMMARY_GLOBAL', JSON.stringify(summary));
        }catch(_){}

        return summary;
      }

      function renderSummary(){
        clearTimer();

        if(!state.endedAt) state.endedAt = Date.now();

        const stars = calcStars();
        const summary = saveSummary(stars);
        const starText = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);

        let tip = 'ฝึกต่ออีกนิด จะจำขั้นตอนได้แม่นขึ้น!';
        if(stars >= 3) tip = 'เยี่ยมมาก! ล้างมือได้ครบและจำลำดับได้ดี';
        else if(state.mistake <= 2) tip = 'ทำได้ดีมาก เหลือฝึกเรียงลำดับให้คล่องขึ้น';

        root.innerHTML = `
          <div class="summaryBox">
            <div class="bigScore">
              <div>
                <div class="score">${summary.score}</div>
                <div class="stars">${starText}</div>
                <div style="margin-top:8px;font-weight:1000;color:#8d6118;">คะแนนของฉัน</div>
              </div>
            </div>

            <div class="tips">
              <h2>สรุปสั้น ๆ</h2>
              <p>ตอบถูก: <strong>${summary.correct}</strong> ครั้ง</p>
              <p>พลาด: <strong>${summary.mistakes}</strong> ครั้ง</p>
              <p>ความแม่นยำ: <strong>${summary.accuracy}%</strong></p>
              <p>จำลำดับได้: <strong>${summary.orderSteps}/${summary.orderTotal}</strong></p>
              <p>${tip}</p>
            </div>
          </div>

          <div class="actions">
            <button class="primaryBtn" type="button" data-action="restart">เล่นอีกครั้ง</button>
            <button class="secondaryBtn" type="button" data-action="back-zone">กลับ Hygiene Zone</button>
          </div>
        `;
      }

      function render(){
        updateHeader();
        updateStats();

        if(state.stage === 'howto') renderHowto();
        else if(state.stage === 'practice') renderPractice();
        else if(state.stage === 'main') renderMain();
        else if(state.stage === 'order') renderOrder();
        else if(state.stage === 'summary') renderSummary();
      }

      function handlePracticeZone(zoneId){
        const target = ZONES[state.practiceIndex] || ZONES[0];

        if(zoneId === target.id){
          state.practiced.add(zoneId);
          state.score += 5;
          state.correct += 1;
          showToast('ถูกต้อง! เก่งมาก');

          if(state.practiceIndex < ZONES.length - 1){
            state.practiceIndex += 1;
            render();
          }else{
            showToast('ฝึกครบแล้ว ไปเล่นจริงกัน!');
            setTimeout(() => setStage('main'), 550);
          }
        }else{
          state.mistake += 1;
          showToast('ลองดูเป้าหมายอีกครั้งนะ');
          updateStats();
        }
      }

      function nextMainTarget(){
        state.mainIndex += 1;

        if(state.mainIndex >= state.mainTotal){
          clearTimer();
          showToast('จบเกมหลักแล้ว ไปเรียงลำดับกัน!');
          setTimeout(() => setStage('order'), 500);
          return;
        }

        const idx = state.mainIndex % ZONES.length;
        state.mainTarget = ZONES[idx].id;
        render();
      }

      function handleMainZone(zoneId){
        if(zoneId === state.mainTarget){
          state.score += 10;
          state.correct += 1;
          showToast('ถูกต้อง +10');
          nextMainTarget();
        }else{
          state.score = Math.max(0, state.score - 2);
          state.mistake += 1;
          showToast('ยังไม่ใช่จุดนี้ ลองใหม่');
          updateStats();
        }
      }

      function handleOrderStep(stepId){
        const target = ORDER_STEPS[state.orderIndex];

        if(!target) {
          setStage('summary');
          return;
        }

        if(stepId === target.id){
          state.orderDone.add(stepId);
          state.orderIndex += 1;
          state.score += 6;
          state.correct += 1;
          showToast('ลำดับถูกต้อง!');

          if(state.orderIndex >= ORDER_STEPS.length){
            showToast('เรียงครบแล้ว!');
            setTimeout(() => setStage('summary'), 500);
          }else{
            render();
          }
        }else{
          state.score = Math.max(0, state.score - 2);
          state.mistake += 1;
          showToast('ลำดับยังไม่ถูก ลองคิดอีกที');
          updateStats();
        }
      }

      document.addEventListener('click', (e) => {
        const el = e.target.closest('[data-action]');
        if(!el) return;

        const action = el.dataset.action;

        if(action === 'go-howto') setStage('howto');
        else if(action === 'go-practice') setStage('practice');
        else if(action === 'go-main') setStage('main');
        else if(action === 'finish-main') setStage('order');
        else if(action === 'go-summary') setStage('summary');
        else if(action === 'restart') restart();
        else if(action === 'back-zone') goBack();
        else if(action === 'zone') handlePracticeZone(el.dataset.zone);
        else if(action === 'main-zone') handleMainZone(el.dataset.zone);
        else if(action === 'order-step') handleOrderStep(el.dataset.step);
      });

      document.getElementById('btnBack')?.addEventListener('click', goBack);
      document.getElementById('btnRestart')?.addEventListener('click', restart);

      window.addEventListener('beforeunload', () => clearTimer());

      render();
    })();
  </script>
</body>
</html>
