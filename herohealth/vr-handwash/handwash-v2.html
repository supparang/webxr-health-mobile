<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Handwash Hero • Main Game</title>

  <style>
    :root{
      --bg1:#e9fbff;
      --bg2:#dff4ff;
      --ink:#163046;
      --muted:#5d778c;
      --card:#ffffffee;
      --line:#d7ecf8;
      --blue:#22d3ee;
      --pink:#f472b6;
      --yellow:#fde047;
      --green:#86efac;
      --good:#22c55e;
      --bad:#fb7185;
      --shadow:0 18px 48px rgba(15,50,70,.14);
      --r-xl:28px;
      --maxw:920px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      width:100%;
      min-height:100%;
      font-family:"Segoe UI",system-ui,sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at top right, rgba(255,255,255,.92) 0%, rgba(255,255,255,.45) 28%, transparent 52%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
    }

    body{
      min-height:100dvh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px;
      overflow:hidden;
    }

    .app{
      width:min(100%,var(--maxw));
      height:calc(100dvh - 28px);
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:12px;
    }

    .top{
      background:rgba(7,18,34,.92);
      color:#eefcff;
      border:2px solid rgba(99,230,255,.28);
      border-radius:24px;
      padding:12px 14px;
      box-shadow:0 14px 36px rgba(7,18,34,.18);
    }

    .top-row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .kicker{
      font-size:.94rem;
      color:#80e8ff;
      font-weight:1000;
    }

    .title{
      margin-top:4px;
      font-size:1.25rem;
      line-height:1.15;
      font-weight:1000;
      color:#fff;
    }

    .chips{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .chip{
      padding:8px 11px;
      border-radius:999px;
      background:rgba(103,232,249,.14);
      border:1px solid rgba(103,232,249,.18);
      color:#e6fbff;
      font-weight:900;
      font-size:.88rem;
      white-space:nowrap;
    }

    .progress-wrap{
      margin-top:10px;
    }

    .progress-meta{
      display:flex;
      justify-content:space-between;
      font-size:.86rem;
      color:#dff8ff;
      font-weight:900;
      margin-bottom:5px;
    }

    .progress{
      height:14px;
      background:#08131f;
      border-radius:999px;
      border:2px solid #63e6ff;
      overflow:hidden;
    }

    .fill{
      width:0%;
      height:100%;
      background:linear-gradient(90deg,#60ff9d 0%,#00e5ff 100%);
      transition:width .18s ease;
    }

    .panel{
      overflow:auto;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--r-xl);
      box-shadow:var(--shadow);
      padding:18px;
      min-height:0;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:#dcfff2;
      color:#047857;
      font-weight:1000;
      margin-bottom:12px;
    }

    .panel h1{
      margin:0;
      font-size:1.65rem;
      line-height:1.12;
      color:#0f172a;
      font-weight:1000;
    }

    .desc{
      margin:10px 0 0;
      color:#475569;
      font-weight:800;
      line-height:1.5;
      font-size:1rem;
    }

    .task-card{
      margin-top:16px;
      background:#f8fcff;
      border:1px solid #d9ecf8;
      border-radius:24px;
      padding:14px;
    }

    .big-action{
      appearance:none;
      width:100%;
      border:none;
      margin-top:12px;
      border-radius:26px;
      min-height:168px;
      padding:18px;
      background:linear-gradient(180deg,#ffffff,#f2fbff);
      border:3px solid #8defff;
      box-shadow:0 12px 28px rgba(34,211,238,.16);
      color:#0f172a;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
      cursor:pointer;
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
    }

    .big-action:active{
      transform:translateY(1px) scale(.995);
    }

    .big-icon{
      width:90px;
      height:90px;
      border-radius:30px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:3rem;
      background:#e9fbff;
      box-shadow:inset 0 0 0 4px rgba(255,255,255,.5);
    }

    .big-action strong{
      display:block;
      font-size:1.35rem;
      font-weight:1000;
    }

    .big-action span{
      display:block;
      color:#5b7083;
      font-size:.98rem;
      font-weight:900;
      line-height:1.4;
      text-align:center;
    }

    .hold-area{
      margin-top:12px;
      border-radius:26px;
      background:linear-gradient(180deg,#e0fbff,#bdf5ff);
      border:3px solid #8defff;
      min-height:180px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap:12px;
      padding:18px;
      user-select:none;
      touch-action:none;
      -webkit-tap-highlight-color:transparent;
      box-shadow:inset 0 0 0 4px rgba(255,255,255,.35);
    }

    .hold-icon{
      width:90px;
      height:90px;
      border-radius:30px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:3rem;
      background:#ffffffaa;
      box-shadow:0 10px 24px rgba(0,0,0,.08);
    }

    .hold-text{
      font-size:1.2rem;
      font-weight:1000;
      color:#0f4c5c;
      text-align:center;
    }

    .hold-progress{
      width:100%;
      height:20px;
      background:#e0f2fe;
      border-radius:999px;
      overflow:hidden;
      border:2px solid #67e8f9;
    }

    .hold-fill{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#60ff9d,#00e5ff);
      transition:width .06s linear;
    }

    .hint{
      margin-top:12px;
      padding:10px 12px;
      border-radius:18px;
      background:#fff8d7;
      color:#713f12;
      font-weight:900;
      line-height:1.45;
    }

    .hint.success{
      background:#dcfff2;
      color:#047857;
    }

    .coach{
      margin-top:12px;
      display:grid;
      grid-template-columns:54px 1fr;
      gap:10px;
      align-items:center;
    }

    .coach-face{
      width:54px;
      height:54px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.45rem;
      background:linear-gradient(180deg,#8be8ff 0%, #22d3ee 100%);
      box-shadow:0 8px 18px rgba(0,0,0,.10), inset 0 0 0 4px rgba(255,255,255,.30);
    }

    .coach-text{
      background:#fff;
      border:1px solid #d9ecf8;
      border-radius:16px;
      padding:10px 12px;
      color:#0f172a;
      font-weight:900;
      line-height:1.4;
      box-shadow:0 8px 18px rgba(0,0,0,.06);
    }

    .flow-list{
      margin-top:14px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
      gap:8px;
    }

    .flow-step{
      padding:9px 10px;
      border-radius:16px;
      background:#f5fbff;
      border:1px solid #d9ecf8;
      color:#5b7083;
      font-weight:900;
      font-size:.86rem;
      display:flex;
      align-items:center;
      gap:6px;
    }

    .flow-step.done{
      background:#dcfff2;
      color:#047857;
      border-color:#86efac;
    }

    .flow-step.active{
      background:#ecfeff;
      color:#0f4c5c;
      border-color:#22d3ee;
      box-shadow:0 8px 18px rgba(34,211,238,.14);
    }

    .summary-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:10px;
      margin-top:16px;
    }

    .summary-box{
      background:#f8fcff;
      border:1px solid #d9ecf8;
      border-radius:20px;
      padding:14px;
      font-weight:1000;
      color:#0f172a;
    }

    .summary-box small{
      display:block;
      color:#64748b;
      font-weight:900;
      margin-bottom:5px;
    }

    .footer{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      padding-bottom:2px;
    }

    .btn{
      appearance:none;
      border:none;
      border-radius:999px;
      padding:12px 18px;
      min-width:132px;
      font-weight:1000;
      font-size:1rem;
      cursor:pointer;
      color:#0f172a;
      border:2px solid rgba(255,255,255,.95);
      box-shadow:0 10px 24px rgba(0,0,0,.12);
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
    }

    .btn.primary{ background:linear-gradient(180deg,#fff2a8 0%,#ffd84d 100%); }
    .btn.green{ background:linear-gradient(180deg,#dcfff2 0%,#86efac 100%); }
    .btn.pink{ background:linear-gradient(180deg,#ffe0ef 0%,#ffc2dd 100%); }
    .btn.blue{ background:linear-gradient(180deg,#dcf8ff 0%,#b7efff 100%); }

    .btn:active{
      transform:translateY(1px);
    }

    .btn[disabled]{
      opacity:.5;
      cursor:not-allowed;
    }

    .hidden{
      display:none !important;
    }

    @media (max-width:680px){
      body{
        align-items:stretch;
        padding:10px;
      }

      .app{
        height:calc(100dvh - 20px);
        gap:10px;
      }

      .top{
        border-radius:20px;
        padding:10px 12px;
      }

      .title{
        font-size:1.05rem;
      }

      .chip{
        font-size:.82rem;
        padding:7px 10px;
      }

      .panel{
        padding:14px;
        border-radius:24px;
      }

      .panel h1{
        font-size:1.28rem;
      }

      .desc{
        font-size:.92rem;
      }

      .big-action{
        min-height:144px;
        border-radius:24px;
      }

      .big-icon{
        width:76px;
        height:76px;
        border-radius:24px;
        font-size:2.45rem;
      }

      .big-action strong{
        font-size:1.15rem;
      }

      .big-action span{
        font-size:.9rem;
      }

      .hold-area{
        min-height:150px;
      }

      .hold-icon{
        width:76px;
        height:76px;
        border-radius:24px;
        font-size:2.4rem;
      }

      .coach{
        grid-template-columns:48px 1fr;
      }

      .coach-face{
        width:48px;
        height:48px;
        border-radius:16px;
        font-size:1.3rem;
      }

      .coach-text{
        font-size:.86rem;
      }

      .footer{
        gap:8px;
      }

      .btn{
        min-width:118px;
        padding:11px 14px;
        font-size:.9rem;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="top">
      <div class="top-row">
        <div>
          <div class="kicker" id="stepLabel">Handwash Main Game • 1/12</div>
          <div class="title" id="stepTitle">เปิดน้ำ</div>
        </div>

        <div class="chips">
          <div class="chip" id="phaseChip">Phase 1</div>
          <div class="chip" id="whoChip">WHO 0/7</div>
          <div class="chip" id="comboChip">Combo 0</div>
          <div class="chip" id="scoreChip">Score 0</div>
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress-meta">
          <span>ความคืบหน้า</span>
          <span id="pctText">0%</span>
        </div>
        <div class="progress">
          <div class="fill" id="fill"></div>
        </div>
      </div>
    </header>

    <section class="panel" id="panel"></section>

    <footer>
      <div class="footer">
        <button class="btn pink" id="launcherBtn" type="button">กลับ Launcher</button>
        <button class="btn blue" id="zoneBtn" type="button">กลับ Zone</button>
        <button class="btn primary hidden" id="nextBtn" type="button">ไป Mini Game</button>
      </div>
    </footer>
  </main>

  <script src="./vr-handwash/handwash-shared.js"></script>
  <script>
    function getParam(key, fallback = ''){
      try{
        return new URL(location.href).searchParams.get(key) || fallback;
      }catch(e){
        return fallback;
      }
    }

    function withCarryParams(url, overrides = {}){
      const keep = ['pid','name','diff','view','run','zone','cat','game','gameId','theme','hub','hubRoot','zoneReturn'];
      const out = new URL(url, location.href);
      const now = new URLSearchParams(location.search);

      keep.forEach(k => {
        const v = now.get(k);
        if (v && !out.searchParams.has(k)) out.searchParams.set(k, v);
      });

      Object.entries(overrides).forEach(([k,v]) => {
        if (v !== undefined && v !== null && String(v).trim() !== ''){
          out.searchParams.set(k, String(v));
        }
      });

      return out.toString();
    }

    function fallbackMiniUrl(){
      const inVrFolder = location.pathname.includes('/vr-handwash/');
      const base = inVrFolder ? './handwash-mini-order.html' : './vr-handwash/handwash-mini-order.html';
      const hub = getParam('hub', '');
      return withCarryParams(base, {
        time: getParam('miniTime', '60'),
        next: hub || fallbackHubUrl()
      });
    }

    function fallbackHubUrl(){
      const inVrFolder = location.pathname.includes('/vr-handwash/');
      return new URL(inVrFolder ? '../hygiene-zone.html' : './hygiene-zone.html', location.href).toString();
    }

    function fallbackLauncherUrl(){
      const inVrFolder = location.pathname.includes('/vr-handwash/');
      return new URL(inVrFolder ? './handwash-launcher.html' : './vr-handwash/handwash-launcher.html', location.href).toString();
    }

    const NEXT_URL = getParam('next', '') || fallbackMiniUrl();
    const HUB_URL = getParam('hub', '') || fallbackHubUrl();
    const LAUNCHER_URL = getParam('launcher', '') || fallbackLauncherUrl();

    const STEPS = [
      { type:'tap', phase:'Phase 1', title:'เปิดน้ำ', icon:'🚰', action:'แตะก๊อกน้ำ', desc:'เห็นก๊อกน้ำ ให้แตะก๊อกน้ำ', points:20, who:false },
      { type:'hold', phase:'Phase 1', title:'เปียกมือ', icon:'💧', action:'กดค้างที่โซนน้ำ', desc:'ค้างไว้จนมือเปียก', need:900, points:24, who:false },
      { type:'tap', phase:'Phase 1', title:'ปิดน้ำ', icon:'🚰', action:'แตะก๊อกน้ำ', desc:'แตะก๊อกน้ำอีกครั้งเพื่อปิดน้ำ', points:20, who:false },
      { type:'tap', phase:'Phase 1', title:'กดสบู่', icon:'🧼', action:'แตะสบู่', desc:'แตะสบู่ให้พร้อมล้างมือ', points:22, who:false },

      { type:'tap', phase:'Phase 2', title:'ถูฝ่ามือ', icon:'👐', action:'แตะฝ่ามือ', desc:'ถูฝ่ามือให้ทั่ว', points:26, who:true },
      { type:'tap', phase:'Phase 2', title:'ถูหลังมือ', icon:'✋', action:'แตะหลังมือ', desc:'ถูหลังมือทั้งสองข้าง', points:26, who:true },
      { type:'tap', phase:'Phase 2', title:'ถูซอกนิ้ว', icon:'🤝', action:'แตะซอกนิ้ว', desc:'ถูซอกนิ้วให้สะอาด', points:26, who:true },
      { type:'tap', phase:'Phase 2', title:'ถูหัวแม่มือ', icon:'👍', action:'แตะหัวแม่มือ', desc:'ถูหัวแม่มือทั้งสองข้าง', points:26, who:true },
      { type:'tap', phase:'Phase 2', title:'ถูปลายนิ้ว', icon:'🖐️', action:'แตะปลายนิ้ว', desc:'ถูปลายนิ้วกับฝ่ามือ', points:26, who:true },

      { type:'tap', phase:'Phase 3', title:'เปิดน้ำ', icon:'🚰', action:'แตะก๊อกน้ำ', desc:'เปิดน้ำเพื่อล้างฟอง', points:20, who:true },
      { type:'hold', phase:'Phase 3', title:'ล้างฟอง', icon:'💧', action:'กดค้างที่โซนน้ำ', desc:'ค้างไว้จนฟองหมด', need:1100, points:30, who:true },
      { type:'tap', phase:'Phase 3', title:'เช็ดมือ', icon:'🟨', action:'แตะผ้าเช็ดมือ', desc:'เช็ดมือให้แห้ง', points:22, who:false }
    ];

    const els = {
      panel: document.getElementById('panel'),
      stepLabel: document.getElementById('stepLabel'),
      stepTitle: document.getElementById('stepTitle'),
      phaseChip: document.getElementById('phaseChip'),
      whoChip: document.getElementById('whoChip'),
      comboChip: document.getElementById('comboChip'),
      scoreChip: document.getElementById('scoreChip'),
      pctText: document.getElementById('pctText'),
      fill: document.getElementById('fill'),
      nextBtn: document.getElementById('nextBtn'),
      launcherBtn: document.getElementById('launcherBtn'),
      zoneBtn: document.getElementById('zoneBtn')
    };

    const state = {
      index:0,
      score:0,
      combo:0,
      bestCombo:0,
      miss:0,
      whoDone:0,
      holdValue:0,
      holding:false,
      holdDone:false,
      lastTs:0,
      ended:false
    };

    let raf = 0;
    let autoTimer = null;

    function bindPress(el, fn){
      if (!el) return;
      let locked = false;

      function run(e){
        if (locked) return;
        locked = true;

        try{
          e.preventDefault();
          e.stopPropagation();
        }catch(err){}

        fn(e);

        setTimeout(() => {
          locked = false;
        }, 180);
      }

      el.addEventListener('pointerup', run, { passive:false });
      el.addEventListener('touchend', run, { passive:false });
      el.addEventListener('click', run, { passive:false });
    }

    function clearAuto(){
      if (autoTimer){
        clearTimeout(autoTimer);
        autoTimer = null;
      }
    }

    function step(){
      return STEPS[state.index];
    }

    function pct(){
      if (state.ended) return 100;
      return Math.round((state.index / STEPS.length) * 100);
    }

    function updateTop(){
      const s = step();

      els.stepLabel.textContent = state.ended
        ? 'Handwash Main Game • Summary'
        : `Handwash Main Game • ${state.index + 1}/${STEPS.length}`;

      els.stepTitle.textContent = state.ended ? 'ทำครบแล้ว' : s.title;
      els.phaseChip.textContent = state.ended ? 'Done' : s.phase;
      els.whoChip.textContent = `WHO ${state.whoDone}/7`;
      els.comboChip.textContent = `Combo ${state.combo}`;
      els.scoreChip.textContent = `Score ${state.score}`;

      const p = pct();
      els.pctText.textContent = `${p}%`;
      els.fill.style.width = `${p}%`;
    }

    function coach(text, mood='normal'){
      const face = mood === 'good' ? '😄' : mood === 'warn' ? '😮' : '🙂';
      return `
        <div class="coach">
          <div class="coach-face">${face}</div>
          <div class="coach-text">${text}</div>
        </div>
      `;
    }

    function renderFlowList(){
      return `
        <div class="flow-list">
          ${STEPS.map((s,i) => `
            <div class="flow-step ${i < state.index ? 'done' : i === state.index ? 'active' : ''}">
              <span>${i < state.index ? '✅' : s.icon}</span>
              <span>${i + 1}. ${s.title}</span>
            </div>
          `).join('')}
        </div>
      `;
    }

    function reward(points){
      state.score += points;
      state.combo += 1;
      state.bestCombo = Math.max(state.bestCombo, state.combo);
    }

    function goNextStep(){
      const s = step();

      if (s && s.who) state.whoDone = Math.min(7, state.whoDone + 1);

      state.index += 1;
      state.holdValue = 0;
      state.holding = false;
      state.holdDone = false;
      state.lastTs = 0;

      if (state.index >= STEPS.length){
        finishGame();
        return;
      }

      render();
    }

    function renderTap(){
      const s = step();

      els.panel.innerHTML = `
        <div class="badge">${s.icon} ขั้นที่ ${state.index + 1} • ${s.title}</div>
        <h1>${s.action}</h1>
        <p class="desc">${s.desc}</p>

        <div class="task-card">
          <button class="big-action" id="actionBtn" type="button">
            <div class="big-icon">${s.icon}</div>
            <strong>${s.action}</strong>
            <span>${s.desc}</span>
          </button>

          <div class="hint" id="hint">
            แตะปุ่มใหญ่ตรงนี้เพื่อผ่านขั้นนี้
          </div>
        </div>

        ${coach('ทำตามปุ่มใหญ่ได้เลย ไม่ต้องเล็ง ไม่ต้องเดา')}
        ${renderFlowList()}
      `;

      const actionBtn = document.getElementById('actionBtn');

      bindPress(actionBtn, () => {
        reward(s.points || 20);

        const hint = document.getElementById('hint');
        if (hint){
          hint.textContent = 'ดีมาก ผ่านแล้ว!';
          hint.classList.add('success');
        }

        try{
          if (navigator.vibrate) navigator.vibrate(25);
        }catch(e){}

        updateTop();

        clearAuto();
        autoTimer = setTimeout(goNextStep, 450);
      });
    }

    function renderHold(){
      const s = step();

      state.holdValue = 0;
      state.holding = false;
      state.holdDone = false;
      state.lastTs = 0;

      els.panel.innerHTML = `
        <div class="badge">${s.icon} ขั้นที่ ${state.index + 1} • ${s.title}</div>
        <h1>${s.action}</h1>
        <p class="desc">${s.desc}</p>

        <div class="task-card">
          <div class="hold-area" id="holdArea">
            <div class="hold-icon">💧</div>
            <div class="hold-text" id="holdText">กดค้างตรงนี้</div>
            <div class="hold-progress">
              <div class="hold-fill" id="holdFill"></div>
            </div>
          </div>

          <div class="hint" id="hint">
            กดค้างจนแถบเต็ม 100%
          </div>
        </div>

        ${coach('ค้างไว้จนเต็ม พอเต็มแล้วเกมจะไปต่อเอง')}
        ${renderFlowList()}
      `;

      const holdArea = document.getElementById('holdArea');

      function startHold(e){
        e.preventDefault();
        if (state.holdDone) return;
        state.holding = true;
      }

      function endHold(e){
        if (e) e.preventDefault();
        if (state.holdDone) return;
        state.holding = false;
      }

      holdArea.addEventListener('pointerdown', startHold, { passive:false });
      holdArea.addEventListener('pointerup', endHold, { passive:false });
      holdArea.addEventListener('pointercancel', endHold, { passive:false });
      holdArea.addEventListener('pointerleave', endHold, { passive:false });

      holdArea.addEventListener('touchstart', startHold, { passive:false });
      holdArea.addEventListener('touchend', endHold, { passive:false });
      holdArea.addEventListener('touchcancel', endHold, { passive:false });

      window.addEventListener('pointerup', endHold, { passive:false });
      window.addEventListener('pointercancel', endHold, { passive:false });
      window.addEventListener('touchend', endHold, { passive:false });
      window.addEventListener('touchcancel', endHold, { passive:false });
    }

    function render(){
      cancelAnimationFrame(raf);
      clearAuto();

      if (state.ended){
        renderSummary();
        updateTop();
        return;
      }

      updateTop();

      const s = step();
      if (s.type === 'tap') renderTap();
      if (s.type === 'hold') renderHold();

      raf = requestAnimationFrame(loop);
    }

    function loop(ts){
      raf = requestAnimationFrame(loop);

      if (state.ended) return;

      const s = step();
      if (!s || s.type !== 'hold') return;

      if (!state.lastTs) state.lastTs = ts;
      const dt = Math.min(50, ts - state.lastTs);
      state.lastTs = ts;

      const need = s.need || 1000;

      const fill = document.getElementById('holdFill');
      const text = document.getElementById('holdText');
      const hint = document.getElementById('hint');

      if (state.holdDone){
        state.holdValue = need;
        state.holding = false;

        if (fill) fill.style.width = '100%';
        if (text) text.textContent = 'เต็มแล้ว ผ่าน!';
        if (hint){
          hint.textContent = 'ดีมาก กำลังไปขั้นถัดไป';
          hint.classList.add('success');
        }

        return;
      }

      if (state.holding){
        state.holdValue = Math.min(need, state.holdValue + dt);
      } else {
        state.holdValue = Math.max(0, state.holdValue - dt * 0.16);
      }

      const hp = Math.round((state.holdValue / need) * 100);

      if (fill) fill.style.width = hp + '%';

      if (hp >= 100){
        state.holdDone = true;
        state.holding = false;
        state.holdValue = need;

        reward(s.points || 24);

        if (fill) fill.style.width = '100%';
        if (text) text.textContent = 'เต็มแล้ว ผ่าน!';
        if (hint){
          hint.textContent = 'ดีมาก เต็มแล้ว!';
          hint.classList.add('success');
        }

        updateTop();

        clearAuto();
        autoTimer = setTimeout(goNextStep, 600);
        return;
      }

      if (text){
        text.textContent = state.holding
          ? `กดค้างต่อ • ${hp}%`
          : `กดค้างตรงนี้ • ${hp}%`;
      }

      if (hint){
        hint.textContent = 'กดค้างให้ครบ 100% ก่อน';
        hint.classList.remove('success');
      }
    }

    function calcStars(){
      if (state.bestCombo >= 10 && state.whoDone >= 7) return 3;
      if (state.bestCombo >= 7) return 2;
      return 1;
    }

    function saveSummary(stars){
      try{
        if (!window.HandwashShared || typeof HandwashShared.saveSummary !== 'function') return;

        HandwashShared.saveSummary({
          stage:'main',
          success:true,
          score:state.score,
          stars,
          miss:state.miss,
          timeLeft:0,
          accuracy:100,
          progress:100,
          bestStreak:state.bestCombo,
          whoDone:state.whoDone,
          badges:stars >= 3 ? ['WHO 7 Ready', 'Clean Hands Hero'] : ['Clean Hands Ready'],
          rank:stars >= 3 ? 'Handwash Hero' : 'Handwash Clear',
          notes:'2D-first Handwash Main completed'
        });
      }catch(e){
        console.warn(e);
      }
    }

    function finishGame(){
      state.ended = true;
      state.combo = 0;

      const stars = calcStars();
      saveSummary(stars);

      renderSummary(stars);
      updateTop();
    }

    function renderSummary(stars = calcStars()){
      els.nextBtn.classList.remove('hidden');

      els.panel.innerHTML = `
        <div class="badge">✨ Main Game ผ่านแล้ว</div>
        <h1>ล้างมือครบ 12 ขั้นแล้ว</h1>
        <p class="desc">
          เยี่ยมมาก ต่อไปไป Mini Game เพื่อทบทวนลำดับ WHO 7 ขั้น
        </p>

        <div class="summary-grid">
          <div class="summary-box">
            <small>คะแนน</small>
            <span>${state.score}</span>
          </div>
          <div class="summary-box">
            <small>WHO Steps</small>
            <span>${state.whoDone}/7</span>
          </div>
          <div class="summary-box">
            <small>Best Combo</small>
            <span>${state.bestCombo}</span>
          </div>
          <div class="summary-box">
            <small>ดาว</small>
            <span>${'⭐'.repeat(stars)}</span>
          </div>
        </div>

        ${coach('เก่งมาก ไปทบทวนลำดับขั้นต่อได้เลย', 'good')}
        ${renderFlowList()}
      `;
    }

    bindPress(els.nextBtn, () => {
      location.href = NEXT_URL;
    });

    bindPress(els.launcherBtn, () => {
      location.href = LAUNCHER_URL;
    });

    bindPress(els.zoneBtn, () => {
      location.href = HUB_URL;
    });

    render();
  </script>
</body>
</html>
