<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Handwash Hero • How to Play</title>

  <style>
    :root{
      --bg1:#e9fbff;
      --bg2:#dff4ff;
      --ink:#163046;
      --muted:#5d778c;
      --card:#ffffffee;
      --line:#d7ecf8;
      --blue:#22d3ee;
      --pink:#f472b6;
      --yellow:#fde047;
      --green:#86efac;
      --shadow:0 18px 48px rgba(15,50,70,.14);
      --r-xl:28px;
      --r-lg:22px;
      --maxw:860px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      width:100%;
      min-height:100%;
      font-family:"Segoe UI",system-ui,sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at top right, rgba(255,255,255,.92) 0%, rgba(255,255,255,.45) 28%, transparent 52%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
    }

    body{
      min-height:100dvh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px;
      overflow:hidden;
    }

    .app{
      width:min(100%,var(--maxw));
      height:calc(100dvh - 28px);
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:12px;
    }

    .top{
      background:rgba(7,18,34,.92);
      color:#eefcff;
      border:2px solid rgba(99,230,255,.28);
      border-radius:24px;
      padding:12px 14px;
      box-shadow:0 14px 36px rgba(7,18,34,.18);
    }

    .top-row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .kicker{
      font-size:.94rem;
      color:#80e8ff;
      font-weight:1000;
    }

    .title{
      margin-top:4px;
      font-size:1.25rem;
      line-height:1.15;
      font-weight:1000;
      color:#fff;
    }

    .chips{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .chip{
      padding:8px 11px;
      border-radius:999px;
      background:rgba(103,232,249,.14);
      border:1px solid rgba(103,232,249,.18);
      color:#e6fbff;
      font-weight:900;
      font-size:.88rem;
      white-space:nowrap;
    }

    .progress-wrap{
      margin-top:10px;
    }

    .progress-meta{
      display:flex;
      justify-content:space-between;
      font-size:.86rem;
      color:#dff8ff;
      font-weight:900;
      margin-bottom:5px;
    }

    .progress{
      height:14px;
      background:#08131f;
      border-radius:999px;
      border:2px solid #63e6ff;
      overflow:hidden;
    }

    .fill{
      width:25%;
      height:100%;
      background:linear-gradient(90deg,#60ff9d 0%,#00e5ff 100%);
      transition:width .2s ease;
    }

    .panel{
      overflow:auto;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--r-xl);
      box-shadow:var(--shadow);
      padding:18px;
      min-height:0;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:#dcfff2;
      color:#047857;
      font-weight:1000;
      margin-bottom:12px;
    }

    .panel h1{
      margin:0;
      font-size:1.65rem;
      line-height:1.12;
      color:#0f172a;
      font-weight:1000;
    }

    .desc{
      margin:10px 0 0;
      color:#475569;
      font-weight:800;
      line-height:1.5;
      font-size:1rem;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
      margin-top:16px;
    }

    .item{
      background:#f7fcff;
      border:1px solid #d9ecf8;
      border-radius:22px;
      padding:14px;
      display:grid;
      grid-template-columns:58px 1fr;
      gap:12px;
      align-items:center;
      min-height:96px;
    }

    .icon{
      width:58px;
      height:58px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.75rem;
      font-weight:1000;
      color:#0f172a;
      box-shadow:inset 0 0 0 3px rgba(255,255,255,.32);
    }

    .icon.faucet{ background:linear-gradient(180deg,#9ae7ff 0%,#38bdf8 100%); }
    .icon.soap{ background:linear-gradient(180deg,#ffc7e3 0%,#f472b6 100%); }
    .icon.water{ background:linear-gradient(180deg,#bbf7ff 0%,#22d3ee 100%); }
    .icon.hand{ background:linear-gradient(180deg,#ffe8b6 0%,#facc15 100%); }
    .icon.good{ background:linear-gradient(180deg,#dcfff2 0%,#86efac 100%); }

    .copy strong{
      display:block;
      font-size:1.08rem;
      line-height:1.25;
      color:#0f172a;
      font-weight:1000;
    }

    .copy span{
      display:block;
      margin-top:5px;
      color:#5b7083;
      font-weight:800;
      line-height:1.4;
      font-size:.94rem;
    }

    .footer{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      padding-bottom:2px;
    }

    .btn{
      appearance:none;
      border:none;
      border-radius:999px;
      padding:12px 18px;
      min-width:140px;
      font-weight:1000;
      font-size:1rem;
      cursor:pointer;
      color:#0f172a;
      border:2px solid rgba(255,255,255,.95);
      box-shadow:0 10px 24px rgba(0,0,0,.12);
    }

    .btn.primary{
      background:linear-gradient(180deg,#fff2a8 0%,#ffd84d 100%);
    }

    .btn.green{
      background:linear-gradient(180deg,#dcfff2 0%,#86efac 100%);
    }

    .btn:active{
      transform:translateY(1px);
    }

    .tiny-actions{
      display:flex;
      justify-content:center;
      gap:10px;
      margin-top:8px;
    }

    .tiny{
      appearance:none;
      border:none;
      background:transparent;
      color:#24536b;
      font-weight:900;
      text-decoration:underline;
      cursor:pointer;
      padding:4px 6px;
    }

    @media (max-width:680px){
      body{
        align-items:stretch;
        padding:10px;
      }

      .app{
        height:calc(100dvh - 20px);
        gap:10px;
      }

      .top{
        border-radius:20px;
        padding:10px 12px;
      }

      .title{
        font-size:1.05rem;
      }

      .chip{
        font-size:.82rem;
        padding:7px 10px;
      }

      .panel{
        padding:14px;
        border-radius:24px;
      }

      .panel h1{
        font-size:1.28rem;
      }

      .desc{
        font-size:.92rem;
      }

      .grid{
        grid-template-columns:1fr;
        gap:10px;
        margin-top:12px;
      }

      .item{
        grid-template-columns:50px 1fr;
        min-height:82px;
        padding:12px;
        border-radius:18px;
      }

      .icon{
        width:50px;
        height:50px;
        border-radius:16px;
        font-size:1.45rem;
      }

      .copy strong{
        font-size:.98rem;
      }

      .copy span{
        font-size:.86rem;
      }

      .footer{
        gap:8px;
      }

      .btn{
        min-width:130px;
        padding:11px 14px;
        font-size:.92rem;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="top">
      <div class="top-row">
        <div>
          <div class="kicker" id="stepLabel">Howto • ขั้นที่ 1/4</div>
          <div class="title" id="sceneTitle">ในเกมนี้มี 4 อย่าง</div>
        </div>

        <div class="chips">
          <div class="chip">สอนก่อนเล่น</div>
          <div class="chip" id="sceneChip">Scene 1</div>
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress-meta">
          <span>ความคืบหน้า</span>
          <span id="pctText">25%</span>
        </div>
        <div class="progress">
          <div class="fill" id="fill"></div>
        </div>
      </div>
    </header>

    <section class="panel" id="panel"></section>

    <footer>
      <div class="footer">
        <button class="btn green" id="skipBtn" type="button">ข้ามไปฝึก</button>
        <button class="btn primary" id="nextBtn" type="button">ถัดไป</button>
      </div>

      <div class="tiny-actions">
        <button class="tiny" id="launcherBtn" type="button">กลับ Launcher</button>
        <button class="tiny" id="zoneBtn" type="button">กลับ Zone</button>
      </div>
    </footer>
  </main>

  <script src="./handwash-shared.js"></script>
  <script>
    function safePracticeUrl(){
      const raw = window.HandwashShared?.getParam?.('next', '') || '';
      if (raw && raw.trim()) return raw.trim();

      if (window.HandwashShared?.buildPracticeUrl){
        return HandwashShared.buildPracticeUrl({
          entry: window.HandwashShared?.getEntry?.() || 'full',
          stage: 'practice'
        });
      }

      return new URL('./handwash-vr.html', location.href).toString();
    }

    function safeHubUrl(){
      const raw = window.HandwashShared?.getParam?.('hub', '') || '';
      if (raw && raw.trim()) return raw.trim();

      if (window.HandwashShared?.buildZoneUrl){
        return HandwashShared.buildZoneUrl();
      }

      return new URL('../hygiene-zone.html', location.href).toString();
    }

    function safeLauncherUrl(){
      const raw = window.HandwashShared?.getParam?.('launcher', '') || '';
      if (raw && raw.trim()) return raw.trim();

      if (window.HandwashShared?.buildLauncherUrl){
        return HandwashShared.buildLauncherUrl();
      }

      return new URL('./handwash-launcher.html', location.href).toString();
    }

    const PRACTICE_URL = safePracticeUrl();
    const HUB_URL = safeHubUrl();
    const LAUNCHER_URL = safeLauncherUrl();

    const SCENES = [
      {
        title:'ในเกมนี้มี 4 อย่าง',
        badge:'📘 Scene 1 • จำ 4 อย่างนี้ก่อน',
        h1:'ในเกมนี้มี 4 อย่างที่ต้องรู้',
        desc:'ดูให้รู้ก่อนว่าเห็นอะไรแล้วต้องทำอะไร',
        items:[
          { icon:'🚰', cls:'faucet', title:'ก๊อกน้ำ', desc:'เห็นก๊อกน้ำ = แตะก๊อกน้ำ' },
          { icon:'🧼', cls:'soap', title:'สบู่', desc:'เห็นสบู่ = แตะสบู่' },
          { icon:'💧', cls:'water', title:'โซนน้ำ', desc:'เห็นน้ำ = ค้างไว้จนเต็ม' },
          { icon:'🖐️', cls:'hand', title:'มือ', desc:'เห็นมือ = แตะจุดที่เรืองแสง' }
        ]
      },
      {
        title:'เห็นของแล้วแตะ',
        badge:'🎯 Scene 2 • เห็นของแล้วแตะ',
        h1:'ถ้าเห็นของพวกนี้ ให้แตะตรงของนั้น',
        desc:'ยังไม่ต้องเล็งในหน้านี้ แค่จำก่อนว่าอะไรต้องแตะ',
        items:[
          { icon:'🚰', cls:'faucet', title:'ก๊อกน้ำ', desc:'แตะก๊อกน้ำเมื่อเห็นป้ายก๊อกน้ำ' },
          { icon:'🧼', cls:'soap', title:'สบู่', desc:'แตะสบู่เมื่อเห็นป้ายสบู่' },
          { icon:'🟨', cls:'hand', title:'ผ้าเช็ดมือ', desc:'แตะผ้าเมื่อถึงขั้นเช็ดมือ' }
        ]
      },
      {
        title:'เห็นน้ำแล้วค้างไว้',
        badge:'💧 Scene 3 • ค้างที่โซนน้ำ',
        h1:'ถ้าเห็นโซนน้ำ ให้ค้างไว้จนเต็ม',
        desc:'ตอนฝึกจริง ให้เอาเป้ากลางจออยู่ในโซนน้ำ แล้วค้างไว้',
        items:[
          { icon:'💧', cls:'water', title:'โซนน้ำ', desc:'ค้างไว้จนแถบเต็ม' },
          { icon:'⏳', cls:'faucet', title:'อย่าปล่อยเร็ว', desc:'ถ้าปล่อยเร็ว แถบจะยังไม่เต็ม' },
          { icon:'✅', cls:'good', title:'เต็มแล้วผ่าน', desc:'แถบเต็มแล้วค่อยไปขั้นต่อไป' }
        ]
      },
      {
        title:'เห็นมือแล้วแตะจุดเรืองแสง',
        badge:'🖐️ Scene 4 • แตะจุดบนมือ',
        h1:'ถ้าเห็นมือ ให้แตะจุดที่เรืองแสง',
        desc:'ตอนฝึกจริง เกมจะชี้ทีละจุด ไม่ต้องเดาซ้ายขวาเอง',
        items:[
          { icon:'👐', cls:'faucet', title:'ฝ่ามือ', desc:'แตะจุดที่เรืองแสงบนฝ่ามือ' },
          { icon:'🤝', cls:'water', title:'ซอกนิ้ว', desc:'แตะจุดที่เรืองแสงบริเวณซอกนิ้ว' },
          { icon:'👍', cls:'soap', title:'หัวแม่มือ', desc:'แตะจุดที่เรืองแสงบริเวณหัวแม่มือ' },
          { icon:'✅', cls:'good', title:'จำง่าย ๆ', desc:'เรืองตรงไหน แตะตรงนั้น' }
        ]
      }
    ];

    const els = {
      panel: document.getElementById('panel'),
      stepLabel: document.getElementById('stepLabel'),
      sceneTitle: document.getElementById('sceneTitle'),
      sceneChip: document.getElementById('sceneChip'),
      pctText: document.getElementById('pctText'),
      fill: document.getElementById('fill'),
      nextBtn: document.getElementById('nextBtn'),
      skipBtn: document.getElementById('skipBtn'),
      launcherBtn: document.getElementById('launcherBtn'),
      zoneBtn: document.getElementById('zoneBtn')
    };

    let index = 0;

    function render(){
      const scene = SCENES[index];
      const pct = Math.round(((index + 1) / SCENES.length) * 100);

      els.stepLabel.textContent = `Howto • ขั้นที่ ${index + 1}/${SCENES.length}`;
      els.sceneTitle.textContent = scene.title;
      els.sceneChip.textContent = `Scene ${index + 1}`;
      els.pctText.textContent = `${pct}%`;
      els.fill.style.width = `${pct}%`;

      els.nextBtn.textContent = index >= SCENES.length - 1 ? 'ไปฝึกจริง' : 'ถัดไป';

      const itemsHtml = scene.items.map(item => `
        <div class="item">
          <div class="icon ${item.cls || ''}">${item.icon}</div>
          <div class="copy">
            <strong>${item.title}</strong>
            <span>${item.desc}</span>
          </div>
        </div>
      `).join('');

      els.panel.innerHTML = `
        <div class="badge">${scene.badge}</div>
        <h1>${scene.h1}</h1>
        <p class="desc">${scene.desc}</p>
        <div class="grid">${itemsHtml}</div>
      `;
    }

    function goNext(){
      if (index < SCENES.length - 1){
        index += 1;
        render();
        return;
      }

      location.href = PRACTICE_URL;
    }

    els.nextBtn.addEventListener('click', goNext);
    els.skipBtn.addEventListener('click', () => {
      location.href = PRACTICE_URL;
    });

    els.launcherBtn.addEventListener('click', () => {
      location.href = LAUNCHER_URL;
    });

    els.zoneBtn.addEventListener('click', () => {
      location.href = HUB_URL;
    });

    render();
  </script>
</body>
</html>
