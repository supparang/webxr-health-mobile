<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Handwash Hero • How to Play</title>

  <style>
    :root{
      --bg1:#e9fbff;
      --bg2:#dff4ff;
      --ink:#163046;
      --muted:#5d778c;
      --card:#ffffffee;
      --line:#d7ecf8;
      --blue:#22d3ee;
      --pink:#f472b6;
      --yellow:#fde047;
      --green:#86efac;
      --good:#22c55e;
      --shadow:0 18px 48px rgba(15,50,70,.14);
      --r-xl:28px;
      --r-lg:22px;
      --maxw:880px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      width:100%;
      min-height:100%;
      font-family:"Segoe UI",system-ui,sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at top right, rgba(255,255,255,.92) 0%, rgba(255,255,255,.45) 28%, transparent 52%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
    }

    body{
      min-height:100dvh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px;
      overflow:hidden;
    }

    .app{
      width:min(100%,var(--maxw));
      height:calc(100dvh - 28px);
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:12px;
    }

    .top{
      background:rgba(7,18,34,.92);
      color:#eefcff;
      border:2px solid rgba(99,230,255,.28);
      border-radius:24px;
      padding:12px 14px;
      box-shadow:0 14px 36px rgba(7,18,34,.18);
    }

    .top-row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .kicker{
      font-size:.94rem;
      color:#80e8ff;
      font-weight:1000;
    }

    .title{
      margin-top:4px;
      font-size:1.25rem;
      line-height:1.15;
      font-weight:1000;
      color:#fff;
    }

    .chips{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .chip{
      padding:8px 11px;
      border-radius:999px;
      background:rgba(103,232,249,.14);
      border:1px solid rgba(103,232,249,.18);
      color:#e6fbff;
      font-weight:900;
      font-size:.88rem;
      white-space:nowrap;
    }

    .progress-wrap{
      margin-top:10px;
    }

    .progress-meta{
      display:flex;
      justify-content:space-between;
      font-size:.86rem;
      color:#dff8ff;
      font-weight:900;
      margin-bottom:5px;
    }

    .progress{
      height:14px;
      background:#08131f;
      border-radius:999px;
      border:2px solid #63e6ff;
      overflow:hidden;
    }

    .fill{
      width:25%;
      height:100%;
      background:linear-gradient(90deg,#60ff9d 0%,#00e5ff 100%);
      transition:width .2s ease;
    }

    .panel{
      overflow:auto;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--r-xl);
      box-shadow:var(--shadow);
      padding:18px;
      min-height:0;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:#dcfff2;
      color:#047857;
      font-weight:1000;
      margin-bottom:12px;
    }

    .panel h1{
      margin:0;
      font-size:1.65rem;
      line-height:1.12;
      color:#0f172a;
      font-weight:1000;
    }

    .desc{
      margin:10px 0 0;
      color:#475569;
      font-weight:800;
      line-height:1.5;
      font-size:1rem;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
      margin-top:16px;
    }

    .item{
      background:#f7fcff;
      border:1px solid #d9ecf8;
      border-radius:22px;
      padding:14px;
      display:grid;
      grid-template-columns:58px 1fr;
      gap:12px;
      align-items:center;
      min-height:96px;
    }

    .icon{
      width:58px;
      height:58px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.75rem;
      font-weight:1000;
      color:#0f172a;
      box-shadow:inset 0 0 0 3px rgba(255,255,255,.32);
    }

    .icon.faucet{ background:linear-gradient(180deg,#9ae7ff 0%,#38bdf8 100%); }
    .icon.soap{ background:linear-gradient(180deg,#ffc7e3 0%,#f472b6 100%); }
    .icon.water{ background:linear-gradient(180deg,#bbf7ff 0%,#22d3ee 100%); }
    .icon.hand{ background:linear-gradient(180deg,#ffe8b6 0%,#facc15 100%); }
    .icon.good{ background:linear-gradient(180deg,#dcfff2 0%,#86efac 100%); }

    .copy strong{
      display:block;
      font-size:1.08rem;
      line-height:1.25;
      color:#0f172a;
      font-weight:1000;
    }

    .copy span{
      display:block;
      margin-top:5px;
      color:#5b7083;
      font-weight:800;
      line-height:1.4;
      font-size:.94rem;
    }

    .try-box{
      margin-top:16px;
      background:#f8fcff;
      border:1px solid #d9ecf8;
      border-radius:24px;
      padding:14px;
    }

    .try-title{
      margin:0 0 10px;
      font-weight:1000;
      color:#0f172a;
      font-size:1.05rem;
    }

    .try-row{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
      gap:10px;
    }

    .try-btn{
      appearance:none;
      width:100%;
      border-radius:20px;
      padding:14px;
      min-height:74px;
      background:#fff;
      border:2px solid #d9ecf8;
      color:#0f172a;
      font-weight:1000;
      font-size:1rem;
      box-shadow:0 8px 18px rgba(0,0,0,.06);
      cursor:pointer;
      text-align:left;
      display:flex;
      align-items:center;
      gap:12px;
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
    }

    .try-btn[disabled]{
      opacity:.48;
      cursor:not-allowed;
      box-shadow:none;
      pointer-events:none;
    }

    .try-btn.active{
      border-color:#22d3ee;
      background:#ecfeff;
      transform:translateY(-1px);
      pointer-events:auto;
    }

    .try-btn.done{
      border-color:#86efac;
      background:#dcfff2;
    }

    .try-emoji{
      width:48px;
      height:48px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#e9fbff;
      font-size:1.5rem;
      flex:0 0 auto;
    }

    .feedback{
      margin-top:12px;
      padding:10px 12px;
      border-radius:18px;
      background:#fff8d7;
      color:#713f12;
      font-weight:900;
      line-height:1.45;
    }

    .hold-area{
      margin-top:16px;
      border-radius:26px;
      background:linear-gradient(180deg,#e0fbff,#bdf5ff);
      border:2px solid #8defff;
      min-height:150px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap:12px;
      padding:18px;
      user-select:none;
      touch-action:none;
      -webkit-tap-highlight-color:transparent;
      box-shadow:inset 0 0 0 4px rgba(255,255,255,.35);
    }

    .hold-icon{
      width:78px;
      height:78px;
      border-radius:24px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:2.35rem;
      background:#ffffffaa;
      box-shadow:0 10px 24px rgba(0,0,0,.08);
    }

    .hold-text{
      font-size:1.1rem;
      font-weight:1000;
      color:#0f4c5c;
      text-align:center;
    }

    .hold-progress{
      width:100%;
      height:18px;
      background:#e0f2fe;
      border-radius:999px;
      overflow:hidden;
      border:2px solid #67e8f9;
    }

    .hold-fill{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#60ff9d,#00e5ff);
      transition:width .08s linear;
    }

    .footer{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      padding-bottom:2px;
    }

    .btn{
      appearance:none;
      border:none;
      border-radius:999px;
      padding:12px 18px;
      min-width:140px;
      font-weight:1000;
      font-size:1rem;
      cursor:pointer;
      color:#0f172a;
      border:2px solid rgba(255,255,255,.95);
      box-shadow:0 10px 24px rgba(0,0,0,.12);
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
    }

    .btn.primary{
      background:linear-gradient(180deg,#fff2a8 0%,#ffd84d 100%);
    }

    .btn.green{
      background:linear-gradient(180deg,#dcfff2 0%,#86efac 100%);
    }

    .btn:active{
      transform:translateY(1px);
    }

    .btn[disabled]{
      opacity:.5;
      cursor:not-allowed;
    }

    .tiny-actions{
      display:flex;
      justify-content:center;
      gap:10px;
      margin-top:8px;
    }

    .tiny{
      appearance:none;
      border:none;
      background:transparent;
      color:#24536b;
      font-weight:900;
      text-decoration:underline;
      cursor:pointer;
      padding:4px 6px;
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
    }

    @media (max-width:680px){
      body{
        align-items:stretch;
        padding:10px;
      }

      .app{
        height:calc(100dvh - 20px);
        gap:10px;
      }

      .top{
        border-radius:20px;
        padding:10px 12px;
      }

      .title{
        font-size:1.05rem;
      }

      .chip{
        font-size:.82rem;
        padding:7px 10px;
      }

      .panel{
        padding:14px;
        border-radius:24px;
      }

      .panel h1{
        font-size:1.28rem;
      }

      .desc{
        font-size:.92rem;
      }

      .grid{
        grid-template-columns:1fr;
        gap:10px;
        margin-top:12px;
      }

      .item{
        grid-template-columns:50px 1fr;
        min-height:82px;
        padding:12px;
        border-radius:18px;
      }

      .icon{
        width:50px;
        height:50px;
        border-radius:16px;
        font-size:1.45rem;
      }

      .copy strong{
        font-size:.98rem;
      }

      .copy span{
        font-size:.86rem;
      }

      .try-row{
        grid-template-columns:1fr;
      }

      .try-btn{
        min-height:66px;
        padding:12px;
        border-radius:18px;
        font-size:.94rem;
      }

      .try-emoji{
        width:44px;
        height:44px;
        border-radius:14px;
        font-size:1.35rem;
      }

      .hold-area{
        min-height:140px;
      }

      .footer{
        gap:8px;
      }

      .btn{
        min-width:130px;
        padding:11px 14px;
        font-size:.92rem;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="top">
      <div class="top-row">
        <div>
          <div class="kicker" id="stepLabel">Howto • ขั้นที่ 1/4</div>
          <div class="title" id="sceneTitle">ในเกมนี้มี 4 อย่าง</div>
        </div>

        <div class="chips">
          <div class="chip">สอนก่อนเล่น</div>
          <div class="chip" id="sceneChip">Scene 1</div>
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress-meta">
          <span>ความคืบหน้า</span>
          <span id="pctText">25%</span>
        </div>
        <div class="progress">
          <div class="fill" id="fill"></div>
        </div>
      </div>
    </header>

    <section class="panel" id="panel"></section>

    <footer>
      <div class="footer">
        <button class="btn green" id="skipBtn" type="button">ข้ามไปฝึก</button>
        <button class="btn primary" id="nextBtn" type="button">ถัดไป</button>
      </div>

      <div class="tiny-actions">
        <button class="tiny" id="launcherBtn" type="button">กลับ Launcher</button>
        <button class="tiny" id="zoneBtn" type="button">กลับ Zone</button>
      </div>
    </footer>
  </main>

  <script src="./handwash-shared.js"></script>
  <script>
    function safePracticeUrl(){
      const raw = window.HandwashShared?.getParam?.('next', '') || '';
      if (raw && raw.trim()) return raw.trim();

      if (window.HandwashShared?.buildPracticeUrl){
        return HandwashShared.buildPracticeUrl({
          entry: window.HandwashShared?.getEntry?.() || 'full',
          stage: 'practice'
        });
      }

      return new URL('./handwash-vr.html', location.href).toString();
    }

    function safeHubUrl(){
      const raw = window.HandwashShared?.getParam?.('hub', '') || '';
      if (raw && raw.trim()) return raw.trim();

      if (window.HandwashShared?.buildZoneUrl){
        return HandwashShared.buildZoneUrl();
      }

      return new URL('../hygiene-zone.html', location.href).toString();
    }

    function safeLauncherUrl(){
      const raw = window.HandwashShared?.getParam?.('launcher', '') || '';
      if (raw && raw.trim()) return raw.trim();

      if (window.HandwashShared?.buildLauncherUrl){
        return HandwashShared.buildLauncherUrl();
      }

      return new URL('./handwash-launcher.html', location.href).toString();
    }

    const PRACTICE_URL = safePracticeUrl();
    const HUB_URL = safeHubUrl();
    const LAUNCHER_URL = safeLauncherUrl();

    const SCENES = [
      {
        type:'read',
        title:'ในเกมนี้มี 4 อย่าง',
        badge:'📘 Scene 1 • จำ 4 อย่างนี้ก่อน',
        h1:'ในเกมนี้มี 4 อย่างที่ต้องรู้',
        desc:'ดูให้รู้ก่อนว่าเห็นอะไรแล้วต้องทำอะไร',
        items:[
          { icon:'🚰', cls:'faucet', title:'ก๊อกน้ำ', desc:'เห็นก๊อกน้ำ = แตะก๊อกน้ำ' },
          { icon:'🧼', cls:'soap', title:'สบู่', desc:'เห็นสบู่ = แตะสบู่' },
          { icon:'💧', cls:'water', title:'โซนน้ำ', desc:'เห็นน้ำ = ค้างไว้จนเต็ม' },
          { icon:'🖐️', cls:'hand', title:'มือ', desc:'เห็นมือ = แตะจุดที่เรืองแสง' }
        ]
      },
      {
        type:'tap',
        title:'ลองแตะของ',
        badge:'🎯 Scene 2 • ลองแตะทีละอย่าง',
        h1:'ลองแตะของให้ครบ 3 อย่าง',
        desc:'แตะปุ่มใหญ่ทีละอัน ไม่ต้องเล็ง ไม่ต้องกลัวผิด',
        order:[
          { id:'faucet', icon:'🚰', title:'แตะก๊อกน้ำ', desc:'เห็นก๊อกน้ำ ให้แตะก๊อกน้ำ' },
          { id:'soap', icon:'🧼', title:'แตะสบู่', desc:'เห็นสบู่ ให้แตะสบู่' },
          { id:'towel', icon:'🟨', title:'แตะผ้าเช็ดมือ', desc:'เห็นผ้า ให้แตะผ้าเช็ดมือ' }
        ]
      },
      {
        type:'hold',
        title:'ลองค้างน้ำ',
        badge:'💧 Scene 3 • ลองค้างที่โซนน้ำ',
        h1:'กดค้างที่โซนน้ำให้เต็ม',
        desc:'แตะค้างตรงกล่องน้ำจนแถบเต็ม แล้วเกมจะพาไปขั้นถัดไปเอง',
        holdNeed:1000,
        autoNext:true
      },
      {
        type:'tap',
        title:'ลองแตะจุดบนมือ',
        badge:'🖐️ Scene 4 • ลองแตะจุดบนมือ',
        h1:'ลองแตะจุดบนมือทีละอย่าง',
        desc:'ไม่ต้องเดาซ้ายขวา แค่แตะปุ่มใหญ่ที่เกมบอก',
        order:[
          { id:'palms', icon:'👐', title:'แตะฝ่ามือ', desc:'เห็นฝ่ามือ ให้แตะฝ่ามือ' },
          { id:'between', icon:'🤝', title:'แตะซอกนิ้ว', desc:'เห็นซอกนิ้ว ให้แตะซอกนิ้ว' },
          { id:'thumbs', icon:'👍', title:'แตะหัวแม่มือ', desc:'เห็นหัวแม่มือ ให้แตะหัวแม่มือ' }
        ]
      }
    ];

    const els = {
      panel: document.getElementById('panel'),
      stepLabel: document.getElementById('stepLabel'),
      sceneTitle: document.getElementById('sceneTitle'),
      sceneChip: document.getElementById('sceneChip'),
      pctText: document.getElementById('pctText'),
      fill: document.getElementById('fill'),
      nextBtn: document.getElementById('nextBtn'),
      skipBtn: document.getElementById('skipBtn'),
      launcherBtn: document.getElementById('launcherBtn'),
      zoneBtn: document.getElementById('zoneBtn')
    };

    let index = 0;
    let step = 0;

    let holdValue = 0;
    let holding = false;
    let holdDone = false;
    let holdAutoNextTimer = null;
    let lastTs = 0;
    let raf = 0;

    function bindPress(el, fn){
      if (!el) return;

      let locked = false;

      function run(e){
        if (locked) return;
        locked = true;

        try{
          e.preventDefault();
          e.stopPropagation();
        }catch(err){}

        fn(e);

        setTimeout(() => {
          locked = false;
        }, 180);
      }

      el.addEventListener('pointerup', run, { passive:false });
      el.addEventListener('touchend', run, { passive:false });
      el.addEventListener('click', run, { passive:false });
    }

    function progressPct(){
      return Math.round(((index + 1) / SCENES.length) * 100);
    }

    function updateTop(){
      const scene = SCENES[index];
      const pct = progressPct();

      els.stepLabel.textContent = `Howto • ขั้นที่ ${index + 1}/${SCENES.length}`;
      els.sceneTitle.textContent = scene.title;
      els.sceneChip.textContent = `Scene ${index + 1}`;
      els.pctText.textContent = `${pct}%`;
      els.fill.style.width = `${pct}%`;

      els.nextBtn.textContent = index >= SCENES.length - 1 ? 'ไปฝึกจริง' : 'ถัดไป';
    }

    function setNextEnabled(on){
      els.nextBtn.disabled = !on;
    }

    function clearHoldTimer(){
      if (holdAutoNextTimer){
        clearTimeout(holdAutoNextTimer);
        holdAutoNextTimer = null;
      }
    }

    function renderRead(scene){
      const itemsHtml = scene.items.map(item => `
        <div class="item">
          <div class="icon ${item.cls || ''}">${item.icon}</div>
          <div class="copy">
            <strong>${item.title}</strong>
            <span>${item.desc}</span>
          </div>
        </div>
      `).join('');

      els.panel.innerHTML = `
        <div class="badge">${scene.badge}</div>
        <h1>${scene.h1}</h1>
        <p class="desc">${scene.desc}</p>
        <div class="grid">${itemsHtml}</div>
      `;

      setNextEnabled(true);
    }

    function renderTap(scene){
      const buttonsHtml = scene.order.map((item, i) => {
        const done = i < step;
        const active = i === step;
        const disabled = i !== step;

        return `
          <button class="try-btn ${done ? 'done' : ''} ${active ? 'active' : ''}"
                  type="button"
                  data-tap-index="${i}"
                  ${disabled ? 'disabled' : ''}>
            <span class="try-emoji">${done ? '✅' : item.icon}</span>
            <span>
              <strong>${item.title}</strong><br>
              <small>${done ? 'ผ่านแล้ว' : item.desc}</small>
            </span>
          </button>
        `;
      }).join('');

      const current = scene.order[step];

      els.panel.innerHTML = `
        <div class="badge">${scene.badge}</div>
        <h1>${scene.h1}</h1>
        <p class="desc">${scene.desc}</p>

        <div class="try-box">
          <p class="try-title">${current ? 'ลองทำ: ' + current.title : 'ครบแล้ว กดถัดไป'}</p>
          <div class="try-row" id="tapRow">${buttonsHtml}</div>
          <div class="feedback" id="feedback">
            ${current ? 'แตะปุ่มที่สว่างอยู่ตอนนี้' : 'เก่งมาก ผ่านแล้ว กด “ถัดไป” ได้เลย'}
          </div>
        </div>
      `;

      setNextEnabled(step >= scene.order.length);

      const tapRow = document.getElementById('tapRow');

      bindPress(tapRow, (e) => {
        const btn = e.target.closest('[data-tap-index]');
        if (!btn) return;
        if (btn.disabled) return;

        const i = Number(btn.dataset.tapIndex);
        if (i !== step) return;

        step += 1;

        try{
          if (navigator.vibrate) navigator.vibrate(24);
        }catch(err){}

        renderTap(scene);
      });
    }

    function renderHold(scene){
      holdValue = 0;
      holding = false;
      holdDone = false;
      lastTs = 0;
      clearHoldTimer();

      els.panel.innerHTML = `
        <div class="badge">${scene.badge}</div>
        <h1>${scene.h1}</h1>
        <p class="desc">${scene.desc}</p>

        <div class="hold-area" id="holdArea">
          <div class="hold-icon">💧</div>
          <div class="hold-text" id="holdText">กดค้างตรงนี้</div>
          <div class="hold-progress">
            <div class="hold-fill" id="holdFill"></div>
          </div>
        </div>

        <div class="feedback" id="feedback">
          กดค้างที่กล่องน้ำจนแถบเต็ม 100%
        </div>
      `;

      setNextEnabled(false);

      const holdArea = document.getElementById('holdArea');

      function startHold(e){
        e.preventDefault();
        if (holdDone) return;
        holding = true;
      }

      function endHold(e){
        if (e) e.preventDefault();
        if (holdDone) return;
        holding = false;
      }

      holdArea.addEventListener('pointerdown', startHold, { passive:false });
      holdArea.addEventListener('pointerup', endHold, { passive:false });
      holdArea.addEventListener('pointercancel', endHold, { passive:false });
      holdArea.addEventListener('pointerleave', endHold, { passive:false });

      holdArea.addEventListener('touchstart', startHold, { passive:false });
      holdArea.addEventListener('touchend', endHold, { passive:false });
      holdArea.addEventListener('touchcancel', endHold, { passive:false });

      window.addEventListener('pointerup', endHold, { passive:false });
      window.addEventListener('pointercancel', endHold, { passive:false });
      window.addEventListener('touchend', endHold, { passive:false });
      window.addEventListener('touchcancel', endHold, { passive:false });
    }

    function render(){
      cancelAnimationFrame(raf);
      clearHoldTimer();

      step = 0;
      holdValue = 0;
      holding = false;
      holdDone = false;
      lastTs = 0;

      const scene = SCENES[index];
      updateTop();

      if (scene.type === 'read') renderRead(scene);
      if (scene.type === 'tap') renderTap(scene);
      if (scene.type === 'hold') renderHold(scene);

      raf = requestAnimationFrame(loop);
    }

    function goNext(){
      if (els.nextBtn.disabled) return;

      clearHoldTimer();

      if (index < SCENES.length - 1){
        index += 1;
        render();
        return;
      }

      location.href = PRACTICE_URL;
    }

    function loop(ts){
      raf = requestAnimationFrame(loop);

      const scene = SCENES[index];
      if (!scene || scene.type !== 'hold') return;

      if (!lastTs) lastTs = ts;
      const dt = Math.min(50, ts - lastTs);
      lastTs = ts;

      const need = scene.holdNeed || 1000;

      const fill = document.getElementById('holdFill');
      const text = document.getElementById('holdText');
      const feedback = document.getElementById('feedback');

      if (holdDone){
        holdValue = need;
        holding = false;

        if (fill) fill.style.width = '100%';
        if (text) text.textContent = 'เต็มแล้ว ผ่าน!';
        if (feedback) feedback.textContent = 'ดีมาก กำลังไปขั้นถัดไป';

        setNextEnabled(true);
        return;
      }

      if (holding){
        holdValue = Math.min(need, holdValue + dt);
      } else {
        holdValue = Math.max(0, holdValue - dt * 0.25);
      }

      const pct = Math.round((holdValue / need) * 100);

      if (fill) fill.style.width = pct + '%';

      if (pct >= 100){
        holdDone = true;
        holding = false;
        holdValue = need;

        if (fill) fill.style.width = '100%';
        if (text) text.textContent = 'เต็มแล้ว ผ่าน!';
        if (feedback) feedback.textContent = 'ดีมาก กำลังไป Scene 4';

        setNextEnabled(true);

        if (!holdAutoNextTimer){
          holdAutoNextTimer = setTimeout(() => {
            if (index < SCENES.length - 1){
              index += 1;
              render();
            }
          }, 700);
        }

        return;
      }

      setNextEnabled(false);

      if (text){
        text.textContent = holding
          ? `กดค้างต่อ • ${pct}%`
          : `กดค้างตรงนี้ • ${pct}%`;
      }

      if (feedback){
        feedback.textContent = 'กดค้างให้ครบ 100% ก่อน';
      }
    }

    bindPress(els.nextBtn, goNext);

    bindPress(els.skipBtn, () => {
      clearHoldTimer();
      location.href = PRACTICE_URL;
    });

    bindPress(els.launcherBtn, () => {
      clearHoldTimer();
      location.href = LAUNCHER_URL;
    });

    bindPress(els.zoneBtn, () => {
      clearHoldTimer();
      location.href = HUB_URL;
    });

    render();
  </script>
</body>
</html>
