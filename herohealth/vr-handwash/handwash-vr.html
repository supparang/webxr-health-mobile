<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Handwash Hero • Practice Lab</title>

  <style>
    :root{
      --bg1:#e9fbff;
      --bg2:#dff4ff;
      --ink:#163046;
      --muted:#5d778c;
      --card:#ffffffee;
      --line:#d7ecf8;
      --blue:#22d3ee;
      --pink:#f472b6;
      --yellow:#fde047;
      --green:#86efac;
      --good:#22c55e;
      --bad:#fb7185;
      --shadow:0 18px 48px rgba(15,50,70,.14);
      --r-xl:28px;
      --r-lg:22px;
      --maxw:900px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      width:100%;
      min-height:100%;
      font-family:"Segoe UI",system-ui,sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at top right, rgba(255,255,255,.92) 0%, rgba(255,255,255,.45) 28%, transparent 52%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
    }

    body{
      min-height:100dvh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px;
      overflow:hidden;
    }

    .app{
      width:min(100%,var(--maxw));
      height:calc(100dvh - 28px);
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:12px;
    }

    .top{
      background:rgba(7,18,34,.92);
      color:#eefcff;
      border:2px solid rgba(99,230,255,.28);
      border-radius:24px;
      padding:12px 14px;
      box-shadow:0 14px 36px rgba(7,18,34,.18);
    }

    .top-row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .kicker{
      font-size:.94rem;
      color:#80e8ff;
      font-weight:1000;
    }

    .title{
      margin-top:4px;
      font-size:1.25rem;
      line-height:1.15;
      font-weight:1000;
      color:#fff;
    }

    .chips{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .chip{
      padding:8px 11px;
      border-radius:999px;
      background:rgba(103,232,249,.14);
      border:1px solid rgba(103,232,249,.18);
      color:#e6fbff;
      font-weight:900;
      font-size:.88rem;
      white-space:nowrap;
    }

    .progress-wrap{
      margin-top:10px;
    }

    .progress-meta{
      display:flex;
      justify-content:space-between;
      font-size:.86rem;
      color:#dff8ff;
      font-weight:900;
      margin-bottom:5px;
    }

    .progress{
      height:14px;
      background:#08131f;
      border-radius:999px;
      border:2px solid #63e6ff;
      overflow:hidden;
    }

    .fill{
      width:0%;
      height:100%;
      background:linear-gradient(90deg,#60ff9d 0%,#00e5ff 100%);
      transition:width .2s ease;
    }

    .panel{
      overflow:auto;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--r-xl);
      box-shadow:var(--shadow);
      padding:18px;
      min-height:0;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:#dcfff2;
      color:#047857;
      font-weight:1000;
      margin-bottom:12px;
    }

    .panel h1{
      margin:0;
      font-size:1.65rem;
      line-height:1.12;
      color:#0f172a;
      font-weight:1000;
    }

    .desc{
      margin:10px 0 0;
      color:#475569;
      font-weight:800;
      line-height:1.5;
      font-size:1rem;
    }

    .big-card{
      margin-top:16px;
      background:#f8fcff;
      border:1px solid #d9ecf8;
      border-radius:24px;
      padding:14px;
    }

    .mission-title{
      margin:0 0 10px;
      font-weight:1000;
      color:#0f172a;
      font-size:1.05rem;
    }

    .try-row{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:10px;
    }

    .try-btn{
      appearance:none;
      border:none;
      width:100%;
      border-radius:20px;
      padding:14px;
      min-height:78px;
      background:#fff;
      border:2px solid #d9ecf8;
      color:#0f172a;
      font-weight:1000;
      font-size:1rem;
      box-shadow:0 8px 18px rgba(0,0,0,.06);
      cursor:pointer;
      text-align:left;
      display:flex;
      align-items:center;
      gap:12px;
    }

    .try-btn.active{
      border-color:#22d3ee;
      background:#ecfeff;
      transform:translateY(-1px);
    }

    .try-btn.done{
      border-color:#86efac;
      background:#dcfff2;
    }

    .try-btn[disabled]{
      opacity:.46;
      cursor:not-allowed;
      box-shadow:none;
    }

    .try-emoji{
      width:50px;
      height:50px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#e9fbff;
      font-size:1.55rem;
      flex:0 0 auto;
    }

    .hint{
      margin-top:12px;
      padding:10px 12px;
      border-radius:18px;
      background:#fff8d7;
      color:#713f12;
      font-weight:900;
      line-height:1.45;
    }

    .success{
      background:#dcfff2;
      color:#047857;
    }

    .hold-area{
      margin-top:16px;
      border-radius:26px;
      background:linear-gradient(180deg,#e0fbff,#bdf5ff);
      border:2px solid #8defff;
      min-height:160px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap:12px;
      padding:18px;
      user-select:none;
      touch-action:none;
      box-shadow:inset 0 0 0 4px rgba(255,255,255,.35);
    }

    .hold-icon{
      width:82px;
      height:82px;
      border-radius:26px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:2.45rem;
      background:#ffffffaa;
      box-shadow:0 10px 24px rgba(0,0,0,.08);
    }

    .hold-text{
      font-size:1.1rem;
      font-weight:1000;
      color:#0f4c5c;
      text-align:center;
    }

    .hold-progress{
      width:100%;
      height:18px;
      background:#e0f2fe;
      border-radius:999px;
      overflow:hidden;
      border:2px solid #67e8f9;
    }

    .hold-fill{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#60ff9d,#00e5ff);
      transition:width .08s linear;
    }

    .coach{
      margin-top:12px;
      display:grid;
      grid-template-columns:54px 1fr;
      gap:10px;
      align-items:center;
    }

    .coach-face{
      width:54px;
      height:54px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.45rem;
      background:linear-gradient(180deg,#8be8ff 0%, #22d3ee 100%);
      box-shadow:0 8px 18px rgba(0,0,0,.10), inset 0 0 0 4px rgba(255,255,255,.30);
    }

    .coach-text{
      background:#fff;
      border:1px solid #d9ecf8;
      border-radius:16px;
      padding:10px 12px;
      color:#0f172a;
      font-weight:900;
      line-height:1.4;
      box-shadow:0 8px 18px rgba(0,0,0,.06);
    }

    .summary-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:10px;
      margin-top:16px;
    }

    .summary-box{
      background:#f8fcff;
      border:1px solid #d9ecf8;
      border-radius:20px;
      padding:14px;
      font-weight:1000;
      color:#0f172a;
    }

    .summary-box small{
      display:block;
      color:#64748b;
      font-weight:900;
      margin-bottom:5px;
    }

    .footer{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      padding-bottom:2px;
    }

    .btn{
      appearance:none;
      border:none;
      border-radius:999px;
      padding:12px 18px;
      min-width:140px;
      font-weight:1000;
      font-size:1rem;
      cursor:pointer;
      color:#0f172a;
      border:2px solid rgba(255,255,255,.95);
      box-shadow:0 10px 24px rgba(0,0,0,.12);
    }

    .btn.primary{
      background:linear-gradient(180deg,#fff2a8 0%,#ffd84d 100%);
    }

    .btn.green{
      background:linear-gradient(180deg,#dcfff2 0%,#86efac 100%);
    }

    .btn.pink{
      background:linear-gradient(180deg,#ffe0ef 0%,#ffc2dd 100%);
    }

    .btn.blue{
      background:linear-gradient(180deg,#dcf8ff 0%,#b7efff 100%);
    }

    .btn:active{
      transform:translateY(1px);
    }

    .btn[disabled]{
      opacity:.5;
      cursor:not-allowed;
    }

    .tiny-actions{
      display:flex;
      justify-content:center;
      gap:10px;
      margin-top:8px;
    }

    .tiny{
      appearance:none;
      border:none;
      background:transparent;
      color:#24536b;
      font-weight:900;
      text-decoration:underline;
      cursor:pointer;
      padding:4px 6px;
    }

    .hidden{
      display:none !important;
    }

    @media (max-width:680px){
      body{
        align-items:stretch;
        padding:10px;
      }

      .app{
        height:calc(100dvh - 20px);
        gap:10px;
      }

      .top{
        border-radius:20px;
        padding:10px 12px;
      }

      .title{
        font-size:1.05rem;
      }

      .chip{
        font-size:.82rem;
        padding:7px 10px;
      }

      .panel{
        padding:14px;
        border-radius:24px;
      }

      .panel h1{
        font-size:1.28rem;
      }

      .desc{
        font-size:.92rem;
      }

      .try-row{
        grid-template-columns:1fr;
      }

      .try-btn{
        min-height:66px;
        padding:12px;
        border-radius:18px;
        font-size:.94rem;
      }

      .try-emoji{
        width:44px;
        height:44px;
        border-radius:14px;
        font-size:1.35rem;
      }

      .hold-area{
        min-height:142px;
      }

      .coach{
        grid-template-columns:48px 1fr;
      }

      .coach-face{
        width:48px;
        height:48px;
        border-radius:16px;
        font-size:1.3rem;
      }

      .coach-text{
        font-size:.86rem;
      }

      .footer{
        gap:8px;
      }

      .btn{
        min-width:130px;
        padding:11px 14px;
        font-size:.92rem;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="top">
      <div class="top-row">
        <div>
          <div class="kicker" id="stepLabel">Practice Lab • 1/3</div>
          <div class="title" id="missionTitle">Mission A • แตะของให้ถูก</div>
        </div>

        <div class="chips">
          <div class="chip" id="phaseChip">Tap</div>
          <div class="chip" id="comboChip">Combo 0</div>
          <div class="chip" id="scoreChip">Score 0</div>
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress-meta">
          <span>ความคืบหน้า</span>
          <span id="pctText">0%</span>
        </div>
        <div class="progress">
          <div class="fill" id="fill"></div>
        </div>
      </div>
    </header>

    <section class="panel" id="panel"></section>

    <footer>
      <div class="footer">
        <button class="btn pink" id="launcherBtn" type="button">กลับ Launcher</button>
        <button class="btn blue" id="zoneBtn" type="button">กลับ Zone</button>
        <button class="btn primary hidden" id="nextBtn" type="button">ไป Main Game</button>
      </div>
    </footer>
  </main>

  <script src="./handwash-shared.js"></script>
  <script>
    function safeMainUrl(){
      const raw = window.HandwashShared?.getParam?.('next', '') || '';
      if (raw && raw.trim()) return raw.trim();

      if (window.HandwashShared?.buildMainUrl){
        return HandwashShared.buildMainUrl({
          entry: window.HandwashShared?.getEntry?.() || 'practice',
          stage: 'main'
        });
      }

      return new URL('../handwash-v2.html', location.href).toString();
    }

    function safeHubUrl(){
      const raw = window.HandwashShared?.getParam?.('hub', '') || '';
      if (raw && raw.trim()) return raw.trim();

      if (window.HandwashShared?.buildZoneUrl){
        return HandwashShared.buildZoneUrl();
      }

      return new URL('../hygiene-zone.html', location.href).toString();
    }

    function safeLauncherUrl(){
      const raw = window.HandwashShared?.getParam?.('launcher', '') || '';
      if (raw && raw.trim()) return raw.trim();

      if (window.HandwashShared?.buildLauncherUrl){
        return HandwashShared.buildLauncherUrl();
      }

      return new URL('./handwash-launcher.html', location.href).toString();
    }

    const MAIN_URL = safeMainUrl();
    const HUB_URL = safeHubUrl();
    const LAUNCHER_URL = safeLauncherUrl();

    const MISSIONS = [
      {
        type:'tap',
        phase:'Tap',
        title:'Mission A • แตะของให้ถูก',
        badge:'🎯 Mission A • แตะของให้ถูก',
        h1:'แตะของที่เกมบอกทีละอย่าง',
        desc:'ไม่ต้องเล็ง ไม่ต้องเดา แตะปุ่มใหญ่ที่สว่างอยู่',
        order:[
          { id:'faucet', icon:'🚰', title:'แตะก๊อกน้ำ', desc:'เห็นก๊อกน้ำ ให้แตะก๊อกน้ำ', points:20 },
          { id:'soap', icon:'🧼', title:'แตะสบู่', desc:'เห็นสบู่ ให้แตะสบู่', points:20 },
          { id:'towel', icon:'🟨', title:'แตะผ้าเช็ดมือ', desc:'เห็นผ้า ให้แตะผ้าเช็ดมือ', points:20 }
        ]
      },
      {
        type:'hold',
        phase:'Hold',
        title:'Mission B • ค้างน้ำให้เต็ม',
        badge:'💧 Mission B • ค้างที่โซนน้ำ',
        h1:'ค้างน้ำ 2 รอบ',
        desc:'กดค้างที่กล่องน้ำจนเต็ม พอเต็มแล้วปล่อยมือได้',
        rounds:[
          { label:'เปียกมือ', need:900, points:24 },
          { label:'ล้างฟอง', need:1100, points:28 }
        ]
      },
      {
        type:'tap',
        phase:'Hand Zones',
        title:'Mission C • แตะจุดบนมือ',
        badge:'🖐️ Mission C • แตะจุดบนมือ',
        h1:'แตะจุดบนมือทีละอย่าง',
        desc:'ไม่ต้องเดาซ้ายขวา แตะปุ่มใหญ่ที่เกมบอก',
        order:[
          { id:'palms', icon:'👐', title:'แตะฝ่ามือ', desc:'เห็นฝ่ามือ ให้แตะฝ่ามือ', points:22 },
          { id:'between', icon:'🤝', title:'แตะซอกนิ้ว', desc:'เห็นซอกนิ้ว ให้แตะซอกนิ้ว', points:22 },
          { id:'thumbs', icon:'👍', title:'แตะหัวแม่มือ', desc:'เห็นหัวแม่มือ ให้แตะหัวแม่มือ', points:22 }
        ]
      }
    ];

    const els = {
      panel: document.getElementById('panel'),
      stepLabel: document.getElementById('stepLabel'),
      missionTitle: document.getElementById('missionTitle'),
      phaseChip: document.getElementById('phaseChip'),
      comboChip: document.getElementById('comboChip'),
      scoreChip: document.getElementById('scoreChip'),
      pctText: document.getElementById('pctText'),
      fill: document.getElementById('fill'),
      nextBtn: document.getElementById('nextBtn'),
      launcherBtn: document.getElementById('launcherBtn'),
      zoneBtn: document.getElementById('zoneBtn')
    };

    const state = {
      missionIndex:0,
      step:0,
      score:0,
      combo:0,
      bestCombo:0,
      miss:0,

      holdRound:0,
      holdValue:0,
      holding:false,
      holdDone:false,
      lastTs:0,
      ended:false
    };

    let raf = 0;

    function mission(){
      return MISSIONS[state.missionIndex];
    }

    function totalUnits(){
      return MISSIONS.reduce((sum, m) => {
        if (m.type === 'tap') return sum + m.order.length;
        if (m.type === 'hold') return sum + m.rounds.length;
        return sum + 1;
      }, 0);
    }

    function completedUnits(){
      let done = 0;

      for (let i = 0; i < state.missionIndex; i++){
        const m = MISSIONS[i];
        if (m.type === 'tap') done += m.order.length;
        if (m.type === 'hold') done += m.rounds.length;
      }

      const m = mission();
      if (!m) return totalUnits();

      if (m.type === 'tap') done += state.step;
      if (m.type === 'hold') done += state.holdRound;

      return done;
    }

    function progressPct(){
      return Math.round((completedUnits() / totalUnits()) * 100);
    }

    function updateTop(){
      const m = mission();
      const pct = state.ended ? 100 : progressPct();

      els.stepLabel.textContent = state.ended
        ? 'Practice Lab • Summary'
        : `Practice Lab • ${state.missionIndex + 1}/${MISSIONS.length}`;

      els.missionTitle.textContent = state.ended
        ? 'ฝึกครบแล้ว'
        : m.title;

      els.phaseChip.textContent = state.ended ? 'Done' : m.phase;
      els.comboChip.textContent = `Combo ${state.combo}`;
      els.scoreChip.textContent = `Score ${state.score}`;

      els.pctText.textContent = `${pct}%`;
      els.fill.style.width = `${pct}%`;
    }

    function reward(points){
      state.score += points;
      state.combo += 1;
      state.bestCombo = Math.max(state.bestCombo, state.combo);
      updateTop();
    }

    function renderCoach(text, mood='normal'){
      const face = mood === 'good' ? '😄' : mood === 'warn' ? '😮' : '🙂';
      return `
        <div class="coach">
          <div class="coach-face">${face}</div>
          <div class="coach-text">${text}</div>
        </div>
      `;
    }

    function nextMission(){
      state.missionIndex += 1;
      state.step = 0;
      state.holdRound = 0;
      state.holdValue = 0;
      state.holding = false;
      state.holdDone = false;
      state.lastTs = 0;

      if (state.missionIndex >= MISSIONS.length){
        finishPractice();
        return;
      }

      render();
    }

    function renderTap(){
      const m = mission();
      const current = m.order[state.step];

      const buttonsHtml = m.order.map((item, i) => {
        const done = i < state.step;
        const active = i === state.step;
        const disabled = i !== state.step;

        return `
          <button class="try-btn ${done ? 'done' : ''} ${active ? 'active' : ''}"
                  type="button"
                  data-tap-index="${i}"
                  ${disabled ? 'disabled' : ''}>
            <span class="try-emoji">${done ? '✅' : item.icon}</span>
            <span>
              <strong>${item.title}</strong><br>
              <small>${done ? 'ผ่านแล้ว' : item.desc}</small>
            </span>
          </button>
        `;
      }).join('');

      els.panel.innerHTML = `
        <div class="badge">${m.badge}</div>
        <h1>${m.h1}</h1>
        <p class="desc">${m.desc}</p>

        <div class="big-card">
          <p class="mission-title">
            ${current ? 'ลองทำ: ' + current.title : 'ผ่าน Mission นี้แล้ว'}
          </p>

          <div class="try-row">${buttonsHtml}</div>

          <div class="hint ${current ? '' : 'success'}" id="hint">
            ${current ? 'แตะปุ่มที่สว่างอยู่ตอนนี้' : 'เก่งมาก กำลังไปด่านถัดไป'}
          </div>
        </div>

        ${renderCoach(current ? 'ทำทีละอย่าง ไม่ต้องรีบ' : 'ผ่านแล้ว ไปต่อเลย', current ? 'normal' : 'good')}
      `;

      document.querySelectorAll('[data-tap-index]').forEach(btn => {
        btn.addEventListener('click', () => {
          const i = Number(btn.dataset.tapIndex);
          if (i !== state.step) return;

          const item = m.order[state.step];
          reward(item.points || 20);
          state.step += 1;

          if (state.step >= m.order.length){
            renderTap();
            setTimeout(nextMission, 520);
            return;
          }

          renderTap();
          updateTop();
        });
      });
    }

    function renderHold(){
      const m = mission();
      const round = m.rounds[state.holdRound];

      state.holdValue = 0;
      state.holding = false;
      state.holdDone = false;
      state.lastTs = 0;

      els.panel.innerHTML = `
        <div class="badge">${m.badge}</div>
        <h1>${m.h1}</h1>
        <p class="desc">${m.desc}</p>

        <div class="big-card">
          <p class="mission-title">
            รอบที่ ${state.holdRound + 1}/${m.rounds.length}: ${round.label}
          </p>

          <div class="hold-area" id="holdArea">
            <div class="hold-icon">💧</div>
            <div class="hold-text" id="holdText">กดค้างตรงนี้</div>
            <div class="hold-progress">
              <div class="hold-fill" id="holdFill"></div>
            </div>
          </div>

          <div class="hint" id="hint">
            กดค้างจนแถบเต็ม 100%
          </div>
        </div>

        ${renderCoach('ค้างไว้จนเต็ม พอเต็มแล้วปล่อยมือได้', 'normal')}
      `;

      const holdArea = document.getElementById('holdArea');

      function startHold(e){
        e.preventDefault();
        if (state.holdDone) return;
        state.holding = true;
      }

      function endHold(e){
        if (e) e.preventDefault();
        state.holding = false;
      }

      holdArea.addEventListener('pointerdown', startHold, { passive:false });
      holdArea.addEventListener('pointerup', endHold, { passive:false });
      holdArea.addEventListener('pointercancel', endHold, { passive:false });
      holdArea.addEventListener('pointerleave', endHold, { passive:false });

      holdArea.addEventListener('touchstart', startHold, { passive:false });
      holdArea.addEventListener('touchend', endHold, { passive:false });
      holdArea.addEventListener('touchcancel', endHold, { passive:false });
    }

    function render(){
      cancelAnimationFrame(raf);

      if (state.ended){
        renderSummary();
        updateTop();
        return;
      }

      updateTop();

      const m = mission();
      if (m.type === 'tap') renderTap();
      if (m.type === 'hold') renderHold();

      raf = requestAnimationFrame(loop);
    }

    function loop(ts){
      raf = requestAnimationFrame(loop);

      if (state.ended) return;

      const m = mission();
      if (!m || m.type !== 'hold') return;

      if (!state.lastTs) state.lastTs = ts;
      const dt = Math.min(50, ts - state.lastTs);
      state.lastTs = ts;

      const round = m.rounds[state.holdRound];
      const need = round.need || 1000;

      const fill = document.getElementById('holdFill');
      const text = document.getElementById('holdText');
      const hint = document.getElementById('hint');

      if (state.holdDone){
        state.holdValue = need;

        if (fill) fill.style.width = '100%';
        if (text) text.textContent = 'เต็มแล้ว ผ่าน!';
        if (hint){
          hint.textContent = 'ดีมาก กำลังไปต่อ';
          hint.classList.add('success');
        }

        return;
      }

      if (state.holding){
        state.holdValue = Math.min(need, state.holdValue + dt);
      } else {
        state.holdValue = Math.max(0, state.holdValue - dt * 0.18);
      }

      const pct = Math.round((state.holdValue / need) * 100);

      if (fill) fill.style.width = pct + '%';

      if (pct >= 100){
        state.holdDone = true;
        state.holding = false;
        state.holdValue = need;

        if (fill) fill.style.width = '100%';
        if (text) text.textContent = 'เต็มแล้ว ผ่าน!';
        if (hint){
          hint.textContent = 'ดีมาก เต็มแล้ว!';
          hint.classList.add('success');
        }

        reward(round.points || 24);
        state.holdRound += 1;

        if (state.holdRound >= m.rounds.length){
          setTimeout(nextMission, 620);
        } else {
          setTimeout(renderHold, 620);
        }

        return;
      }

      if (text){
        text.textContent = state.holding
          ? `กดค้างต่อ • ${pct}%`
          : `กดค้างตรงนี้ • ${pct}%`;
      }

      if (hint){
        hint.textContent = 'กดค้างให้ครบ 100% ก่อน';
        hint.classList.remove('success');
      }
    }

    function calcStars(){
      if (state.bestCombo >= 8 && state.miss === 0) return 3;
      if (state.bestCombo >= 5) return 2;
      return 1;
    }

    function saveSummary(stars){
      if (!window.HandwashShared?.saveSummary) return;

      HandwashShared.saveSummary({
        stage:'practice',
        success:true,
        score:state.score,
        stars,
        miss:state.miss,
        timeLeft:0,
        accuracy:100,
        progress:100,
        bestStreak:state.bestCombo,
        whoDone:0,
        badges:stars >= 3 ? ['Practice Ready', 'No Stress Practice'] : ['Practice Ready'],
        rank:stars >= 3 ? 'Practice Pro' : 'Practice Clear',
        notes:'2D-first Handwash Practice completed'
      });
    }

    function finishPractice(){
      state.ended = true;
      state.combo = 0;

      const stars = calcStars();
      saveSummary(stars);

      renderSummary(stars);
      updateTop();
    }

    function renderSummary(stars = calcStars()){
      els.nextBtn.classList.remove('hidden');

      els.panel.innerHTML = `
        <div class="badge">✨ Practice ผ่านแล้ว</div>
        <h1>พร้อมไป Main Game แล้ว</h1>
        <p class="desc">
          ฝึกครบแล้ว: แตะของ • ค้างน้ำ • แตะจุดบนมือ
        </p>

        <div class="summary-grid">
          <div class="summary-box">
            <small>คะแนน</small>
            <span>${state.score}</span>
          </div>
          <div class="summary-box">
            <small>ดาว</small>
            <span>${'⭐'.repeat(stars)}</span>
          </div>
          <div class="summary-box">
            <small>Best Combo</small>
            <span>${state.bestCombo}</span>
          </div>
          <div class="summary-box">
            <small>สถานะ</small>
            <span>พร้อมเล่นจริง</span>
          </div>
        </div>

        ${renderCoach('เก่งมาก ไป Main Game ต่อได้เลย', 'good')}
      `;
    }

    els.nextBtn.addEventListener('click', () => {
      location.href = MAIN_URL;
    });

    els.launcherBtn.addEventListener('click', () => {
      location.href = LAUNCHER_URL;
    });

    els.zoneBtn.addEventListener('click', () => {
      location.href = HUB_URL;
    });

    render();
  </script>
</body>
</html>
