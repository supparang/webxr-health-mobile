<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Handwash Hero • Simulate Learning VR</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>
    :root{
      --dark:#071827;
      --cyan:#64f3ff;
      --yellow:#ffe66d;
      --pink:#ff8ed1;
      --green:#86efac;
      --white:#ffffff;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
      font-family:"Segoe UI",system-ui,sans-serif;
      touch-action:none;
    }

    canvas{
      display:block;
      width:100%;
      height:100%;
    }

    #ui-overlay{
      position:absolute;
      inset:0;
      z-index:10;
      pointer-events:none;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      padding:14px;
    }

    .top-hud{
      width:min(94vw,760px);
      margin:0 auto;
      background:rgba(7,24,39,.86);
      border:2px solid rgba(100,243,255,.42);
      border-radius:22px;
      padding:12px;
      color:#eefcff;
      box-shadow:0 12px 32px rgba(0,0,0,.25);
      backdrop-filter:blur(8px);
    }

    .hud-row{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
      flex-wrap:wrap;
    }

    .title{
      font-weight:1000;
      color:#86f7ff;
      font-size:1rem;
    }

    .mission{
      margin-top:4px;
      color:#fff;
      font-size:1.18rem;
      line-height:1.16;
      font-weight:1000;
    }

    .chips{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .chip{
      padding:8px 11px;
      border-radius:999px;
      background:rgba(100,243,255,.14);
      border:1px solid rgba(100,243,255,.22);
      color:#e8fdff;
      font-weight:900;
      font-size:.88rem;
      white-space:nowrap;
    }

    .msg{
      margin-top:10px;
      background:rgba(255,255,255,.12);
      border-radius:16px;
      padding:10px 12px;
      display:flex;
      align-items:center;
      gap:10px;
      color:#fff;
      font-weight:900;
      line-height:1.35;
    }

    .msg-icon{
      width:42px;
      height:42px;
      border-radius:14px;
      background:#e9fbff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.55rem;
      flex:0 0 auto;
    }

    .progress-wrap{
      margin-top:10px;
      display:grid;
      gap:4px;
    }

    .progress-meta{
      display:flex;
      justify-content:space-between;
      color:#dff8ff;
      font-weight:900;
      font-size:.86rem;
    }

    .progress{
      width:100%;
      height:14px;
      background:#08131f;
      border-radius:999px;
      border:2px solid var(--cyan);
      overflow:hidden;
    }

    #fill{
      width:0%;
      height:100%;
      background:linear-gradient(90deg,#60ff9d,#00e5ff);
      transition:width .18s ease;
    }

    #reticle{
      position:absolute;
      top:50%;
      left:50%;
      width:48px;
      height:48px;
      transform:translate(-50%,-50%);
      z-index:20;
      border-radius:50%;
      border:3px solid rgba(255,255,255,.94);
      box-shadow:0 0 16px rgba(100,243,255,.8);
      pointer-events:none;
    }

    #reticle::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      width:7px;
      height:7px;
      transform:translate(-50%,-50%);
      border-radius:50%;
      background:#00f2ff;
      box-shadow:0 0 12px #00f2ff;
    }

    #progress-ring{
      position:absolute;
      inset:-7px;
      border-radius:50%;
      background:conic-gradient(#22c55e 0deg, transparent 0deg);
      mask:radial-gradient(circle, transparent 55%, #000 57%);
      -webkit-mask:radial-gradient(circle, transparent 55%, #000 57%);
      display:none;
    }

    #nav-arrow{
      position:absolute;
      top:64%;
      left:50%;
      width:0;
      height:0;
      z-index:30;
      pointer-events:none;
      border-left:18px solid transparent;
      border-right:18px solid transparent;
      border-bottom:36px solid #ffe66d;
      transform:translate(-50%,-50%);
      filter:drop-shadow(0 0 10px #ffe66d);
      display:none;
    }

    .bottom-hud{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      pointer-events:auto;
      padding-bottom:2px;
    }

    .btn{
      appearance:none;
      border:none;
      border-radius:999px;
      padding:11px 14px;
      min-width:130px;
      font-weight:1000;
      font-size:.92rem;
      color:#0f172a;
      cursor:pointer;
      border:2px solid rgba(255,255,255,.95);
      box-shadow:0 10px 24px rgba(0,0,0,.20);
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
    }

    .btn.primary{
      background:linear-gradient(180deg,#fff2a8,#ffd84d);
    }

    .btn.blue{
      background:linear-gradient(180deg,#dcf8ff,#b7efff);
    }

    .btn.green{
      background:linear-gradient(180deg,#dcfff2,#86efac);
    }

    .toast{
      position:absolute;
      left:50%;
      bottom:92px;
      z-index:40;
      transform:translateX(-50%) translateY(12px);
      max-width:90vw;
      background:#fff8d7;
      color:#713f12;
      border-radius:18px;
      padding:10px 14px;
      font-weight:1000;
      box-shadow:0 12px 28px rgba(0,0,0,.22);
      opacity:0;
      transition:opacity .2s ease, transform .2s ease;
      text-align:center;
      pointer-events:none;
    }

    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    @media (max-width:680px){
      #ui-overlay{ padding:10px; }

      .top-hud{
        width:100%;
        border-radius:20px;
        padding:10px;
      }

      .mission{ font-size:1.02rem; }

      .chip{
        font-size:.8rem;
        padding:7px 9px;
      }

      .msg{
        font-size:.88rem;
        padding:8px 10px;
      }

      .msg-icon{
        width:38px;
        height:38px;
        font-size:1.35rem;
      }

      .btn{
        min-width:116px;
        padding:10px 12px;
        font-size:.86rem;
      }
    }
  </style>
</head>

<body>
  <div id="ui-overlay">
    <div class="top-hud">
      <div class="hud-row">
        <div>
          <div class="title" id="titleText">Simulate Learning • 1/6</div>
          <div class="mission" id="missionText">มองหา “ก๊อกน้ำ”</div>
        </div>

        <div class="chips">
          <div class="chip" id="scoreText">Score 0</div>
          <div class="chip" id="timeText">เวลา 45 วิ</div>
        </div>
      </div>

      <div class="msg">
        <div class="msg-icon" id="msgIcon">🚰</div>
        <div id="msgText">มองเป้ากลางจอไปที่ ก๊อกน้ำ หรือแตะก๊อกน้ำได้เลย</div>
      </div>

      <div class="progress-wrap">
        <div class="progress-meta">
          <span>ความคืบหน้า</span>
          <span id="pctText">0%</span>
        </div>
        <div class="progress">
          <div id="fill"></div>
        </div>
      </div>
    </div>

    <div></div>

    <div class="bottom-hud">
      <button class="btn blue" id="recenterBtn" type="button">RECENTER</button>
      <button class="btn primary" id="vrBtn" type="button">โหมด VR</button>
      <button class="btn green" id="nextBtn" type="button">ไป Main Game</button>
    </div>
  </div>

  <div id="nav-arrow"></div>
  <div id="reticle"><div id="progress-ring"></div></div>
  <div class="toast" id="toast">ดีมาก!</div>

  <script>
    let scene, camera, renderer, raycaster;

    let score = 0;
    let timeLeft = 45;
    let currentStep = 0;
    let isVR = false;

    let lon = 180;
    let lat = 0;
    let isTouching = false;
    let movedTouch = false;
    let px = 0;
    let py = 0;

    let gazeTime = 0;
    let completed = false;
    let lastDirectHitAt = 0;

    const targets = [];
    const germs = [];
    const germByHand = {
      "มือซ้าย": [],
      "มือขวา": []
    };

    const targetRefs = {};
    const clock = new THREE.Clock();
    const pointerNDC = new THREE.Vector2();

    const quest = [
      {
        id:"ก๊อก",
        label:"ก๊อกน้ำ",
        emoji:"🚰",
        msg:"มอง/แตะ ก๊อกน้ำ",
        hint:"เปิดน้ำก่อนล้างมือ",
        pos:[-0.62,1.24,-0.85],
        bg:"#dff8ff"
      },
      {
        id:"สบู่",
        label:"สบู่",
        emoji:"🧼",
        msg:"มอง/แตะ สบู่",
        hint:"กดสบู่เพื่อฆ่าเชื้อ",
        pos:[-0.20,1.10,-0.85],
        bg:"#ffe3f2"
      },
      {
        id:"น้ำ",
        label:"โซนน้ำ",
        emoji:"💧",
        msg:"มอง/แตะ โซนน้ำ",
        hint:"ล้างมือด้วยน้ำให้ทั่ว",
        pos:[-0.62,0.80,-0.85],
        bg:"#dff7ff"
      },
      {
        id:"มือซ้าย",
        label:"มือซ้าย",
        emoji:"🖐️",
        msg:"มอง/แตะ มือซ้าย",
        hint:"ถูมือซ้ายให้สะอาด",
        pos:[0.16,1.02,-0.60],
        bg:"#fff1cc"
      },
      {
        id:"มือขวา",
        label:"มือขวา",
        emoji:"🤚",
        msg:"มอง/แตะ มือขวา",
        hint:"ถูมือขวาให้สะอาด",
        pos:[0.48,1.02,-0.60],
        bg:"#fff1cc"
      },
      {
        id:"ผ้า",
        label:"ผ้าเช็ดมือ",
        emoji:"🧻",
        msg:"มอง/แตะ ผ้าเช็ดมือ",
        hint:"เช็ดมือให้แห้ง",
        pos:[0.82,1.20,-0.85],
        bg:"#fff7cc"
      }
    ];

    const ui = {
      titleText: document.getElementById('titleText'),
      missionText: document.getElementById('missionText'),
      msgText: document.getElementById('msgText'),
      msgIcon: document.getElementById('msgIcon'),
      scoreText: document.getElementById('scoreText'),
      timeText: document.getElementById('timeText'),
      pctText: document.getElementById('pctText'),
      fill: document.getElementById('fill'),
      progressRing: document.getElementById('progress-ring'),
      navArrow: document.getElementById('nav-arrow'),
      toast: document.getElementById('toast'),
      vrBtn: document.getElementById('vrBtn'),
      recenterBtn: document.getElementById('recenterBtn'),
      nextBtn: document.getElementById('nextBtn')
    };

    function showToast(text){
      ui.toast.textContent = text;
      ui.toast.classList.add('show');

      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => {
        ui.toast.classList.remove('show');
      }, 900);
    }

    function roundRect(ctx, x, y, w, h, r){
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function makeEmojiCardTexture(emoji, label, bg = "#ffffff", size = 512){
      const c = document.createElement("canvas");
      c.width = size;
      c.height = size;

      const ctx = c.getContext("2d");
      ctx.clearRect(0, 0, size, size);

      ctx.fillStyle = bg;
      roundRect(ctx, 24, 24, size - 48, size - 48, 56);
      ctx.fill();

      ctx.lineWidth = 10;
      ctx.strokeStyle = "#7fe7ff";
      ctx.stroke();

      ctx.fillStyle = "rgba(255,255,255,.58)";
      roundRect(ctx, 52, 52, size - 104, size - 160, 44);
      ctx.fill();

      ctx.font = `190px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(emoji, size / 2, 205);

      ctx.fillStyle = "#14324a";
      ctx.font = `bold 56px "Segoe UI", sans-serif`;
      ctx.fillText(label, size / 2, 390);

      const tex = new THREE.CanvasTexture(c);
      tex.needsUpdate = true;
      return tex;
    }

    function makeSmallEmojiTexture(emoji, bg = "#ffffff", size = 256){
      const c = document.createElement("canvas");
      c.width = size;
      c.height = size;

      const ctx = c.getContext("2d");
      ctx.clearRect(0, 0, size, size);

      ctx.fillStyle = bg;
      roundRect(ctx, 18, 18, size - 36, size - 36, 42);
      ctx.fill();

      ctx.font = `150px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(emoji, size / 2, size / 2 + 8);

      const tex = new THREE.CanvasTexture(c);
      tex.needsUpdate = true;
      return tex;
    }

    function makeEmojiTarget(item){
      const group = new THREE.Group();
      group.position.set(...item.pos);
      group.name = item.id;

      const cardMat = new THREE.SpriteMaterial({
        map: makeEmojiCardTexture(item.emoji, item.label, item.bg),
        transparent:true
      });

      const card = new THREE.Sprite(cardMat);
      card.scale.set(0.55, 0.55, 1);
      card.userData.kind = "visual";
      group.add(card);

      const haloGeo = new THREE.RingGeometry(0.34, 0.39, 40);
      const haloMat = new THREE.MeshBasicMaterial({
        color:0xffffff,
        transparent:true,
        opacity:0.62,
        side:THREE.DoubleSide
      });

      const halo = new THREE.Mesh(haloGeo, haloMat);
      halo.position.set(0, 0, -0.02);
      halo.userData.kind = "halo";
      group.add(halo);

      const hit = new THREE.Mesh(
        new THREE.PlaneGeometry(1.10, 1.10),
        new THREE.MeshBasicMaterial({
          transparent:true,
          opacity:0,
          depthWrite:false,
          side:THREE.DoubleSide
        })
      );

      hit.userData.targetId = item.id;
      hit.userData.parentGroup = group;
      group.add(hit);

      scene.add(group);
      targets.push(hit);

      targetRefs[item.id] = {
        group,
        card,
        halo,
        hit,
        item
      };

      return group;
    }

    function createGameWorld(){
      scene.background = new THREE.Color(0xdff6ff);

      const ambient = new THREE.AmbientLight(0xffffff, 1.8);
      scene.add(ambient);

      const sun = new THREE.PointLight(0xffffff, 1.25);
      sun.position.set(0, 3, 1.2);
      scene.add(sun);

      const floorGeo = new THREE.PlaneGeometry(8, 8);
      const floorMat = new THREE.MeshBasicMaterial({
        color:0xbfeeff,
        transparent:true,
        opacity:0.82,
        side:THREE.DoubleSide
      });

      const floor = new THREE.Mesh(floorGeo, floorMat);
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = 0;
      scene.add(floor);

      const wallGeo = new THREE.PlaneGeometry(6, 3.2);
      const wallMat = new THREE.MeshBasicMaterial({
        color:0xffffff,
        transparent:true,
        opacity:0.70,
        side:THREE.DoubleSide
      });

      const wall = new THREE.Mesh(wallGeo, wallMat);
      wall.position.set(0, 1.55, -1.22);
      scene.add(wall);

      quest.forEach(item => makeEmojiTarget(item));

      targetRefs["น้ำ"].group.visible = false;

      createGermsForHand("มือซ้าย");
      createGermsForHand("มือขวา");

      updateActiveTarget();
    }

    function createGermsForHand(handId){
      const ref = targetRefs[handId];
      if (!ref) return;

      for (let i = 0; i < 6; i++){
        const germ = new THREE.Sprite(
          new THREE.SpriteMaterial({
            map: makeSmallEmojiTexture("🦠", "#e8fff0"),
            transparent:true
          })
        );

        germ.position.set(
          (Math.random() - 0.5) * 0.34,
          (Math.random() - 0.5) * 0.34,
          0.08
        );

        germ.scale.set(0.105, 0.105, 1);

        ref.group.add(germ);
        germs.push(germ);
        germByHand[handId].push(germ);
      }
    }

    function clearGerms(handId){
      const ref = targetRefs[handId];
      if (!ref) return;

      germByHand[handId].forEach(g => {
        if (g.parent) g.parent.remove(g);
      });

      germByHand[handId] = [];
    }

    function init(){
      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(
        72,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );

      camera.position.set(0, 1.25, 1.05);

      renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      raycaster = new THREE.Raycaster();

      createGameWorld();
      updateHUD();

      document.addEventListener('touchstart', (e) => {
        isTouching = true;
        movedTouch = false;
        px = e.touches[0].pageX;
        py = e.touches[0].pageY;
      }, { passive:true });

      document.addEventListener('touchmove', (e) => {
        if (!isTouching || isVR) return;

        const dx = e.touches[0].pageX - px;
        const dy = e.touches[0].pageY - py;

        if (Math.abs(dx) + Math.abs(dy) > 8) movedTouch = true;

        lon -= dx * 0.25;
        lat += dy * 0.25;

        px = e.touches[0].pageX;
        py = e.touches[0].pageY;
      }, { passive:true });

      document.addEventListener('touchend', () => {
        isTouching = false;
      }, { passive:true });

      renderer.domElement.addEventListener('pointerup', (e) => {
        if (movedTouch) return;
        tryHitNow(e);
      }, { passive:false });

      renderer.domElement.addEventListener('click', (e) => {
        if (movedTouch) return;
        tryHitNow(e);
      }, { passive:false });

      renderer.domElement.addEventListener('touchend', (e) => {
        if (movedTouch) return;

        const t = e.changedTouches && e.changedTouches[0];
        if (!t) return;

        tryHitNow({
          clientX:t.clientX,
          clientY:t.clientY,
          preventDefault:() => {},
          stopPropagation:() => {}
        });
      }, { passive:false });

      ui.vrBtn.addEventListener('click', async () => {
        isVR = !isVR;
        ui.vrBtn.textContent = isVR ? "ออก VR" : "โหมด VR";

        try{
          if (
            isVR &&
            typeof DeviceOrientationEvent !== "undefined" &&
            typeof DeviceOrientationEvent.requestPermission === "function"
          ){
            await DeviceOrientationEvent.requestPermission();
          }
        }catch(e){}
      });

      ui.recenterBtn.addEventListener('click', () => {
        lon = 180;
        lat = 0;
        showToast("จัดมุมมองใหม่แล้ว");
      });

      ui.nextBtn.addEventListener('click', () => {
        goNext();
      });

      window.addEventListener('resize', onResize);

      window.addEventListener('deviceorientation', (e) => {
        if (!isVR) return;

        const alpha = THREE.MathUtils.degToRad(e.alpha || 0);
        const beta = THREE.MathUtils.degToRad(e.beta || 0);
        const gamma = THREE.MathUtils.degToRad(e.gamma || 0);

        camera.rotation.set(beta, alpha, -gamma, 'YXZ');
      });

      setInterval(() => {
        if (completed) return;

        if (timeLeft > 0){
          timeLeft -= 1;
          updateHUD();
        }
      }, 1000);

      animate();
    }

    function onResize(){
      renderer.setSize(window.innerWidth, window.innerHeight);

      if (!isVR){
        camera.aspect = window.innerWidth / window.innerHeight;
      } else {
        camera.aspect = (window.innerWidth / 2) / window.innerHeight;
      }

      camera.updateProjectionMatrix();
    }

    function updateActiveTarget(){
      quest.forEach((item, i) => {
        const ref = targetRefs[item.id];
        if (!ref) return;

        const active = i === currentStep;
        const done = i < currentStep;

        if (ref.card.material){
          ref.card.material.opacity = active ? 1 : done ? 0.45 : 0.72;
        }

        if (ref.halo.material){
          ref.halo.material.opacity = active ? 0.95 : 0.20;
          ref.halo.material.color.set(active ? 0xffff66 : 0xffffff);
        }

        ref.group.scale.setScalar(active ? 1.08 : 0.92);
      });
    }

    function updateNavigationArrow(){
      if (completed || currentStep >= quest.length){
        ui.navArrow.style.display = 'none';
        return;
      }

      const ref = targetRefs[quest[currentStep].id];

      if (!ref || !ref.group.visible){
        ui.navArrow.style.display = 'none';
        return;
      }

      const targetPos = ref.group.position.clone();
      const projected = targetPos.clone().project(camera);

      const isVisible =
        projected.z < 1 &&
        projected.x >= -0.78 &&
        projected.x <= 0.78 &&
        projected.y >= -0.78 &&
        projected.y <= 0.78;

      if (isVisible){
        ui.navArrow.style.display = 'none';
      } else {
        ui.navArrow.style.display = 'block';

        const angle = Math.atan2(projected.y, projected.x);
        ui.navArrow.style.transform =
          `translate(-50%,-50%) rotate(${angle + Math.PI / 2}rad)`;
      }
    }

    function lookCameraByTouch(){
      lat = Math.max(-70, Math.min(70, lat));

      const phi = THREE.MathUtils.degToRad(90 - lat);
      const theta = THREE.MathUtils.degToRad(lon);

      const target = new THREE.Vector3()
        .setFromSphericalCoords(1, phi, theta)
        .add(camera.position);

      camera.lookAt(target);
    }

    function findCurrentHitFromRay(){
      const hits = raycaster.intersectObjects(targets, true);

      if (!hits.length) return null;

      const expectedId = quest[currentStep]?.id;

      const matched = hits.find(h => {
        return h.object &&
          h.object.userData &&
          h.object.userData.targetId === expectedId;
      });

      return matched ? matched.object : null;
    }

    function getCurrentHit(){
      if (completed || currentStep >= quest.length) return null;

      raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
      return findCurrentHitFromRay();
    }

    function tryHitNow(e){
      if (completed || currentStep >= quest.length) return;

      const now = performance.now();
      if (now - lastDirectHitAt < 220) return;
      lastDirectHitAt = now;

      let hit = null;

      if (e && typeof e.clientX === 'number' && typeof e.clientY === 'number'){
        try{
          e.preventDefault();
          e.stopPropagation();
        }catch(err){}

        const rect = renderer.domElement.getBoundingClientRect();

        pointerNDC.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        pointerNDC.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

        raycaster.setFromCamera(pointerNDC, camera);
        hit = findCurrentHitFromRay();
      }

      if (!hit){
        hit = getCurrentHit();
      }

      if (!hit){
        const item = quest[currentStep];
        showToast(`แตะที่ ${item.label}`);
        return;
      }

      gazeTime = 0;
      ui.progressRing.style.display = 'none';
      stepUp();
    }

    function animate(){
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.05);

      if (!isVR){
        lookCameraByTouch();
      }

      updateNavigationArrow();

      const hit = getCurrentHit();

      if (hit){
        gazeTime += dt;

        const gp = Math.min(1, gazeTime / 1.0);
        ui.progressRing.style.display = 'block';
        ui.progressRing.style.background =
          `conic-gradient(#22c55e ${gp * 360}deg, transparent 0deg)`;

        if (gazeTime >= 1){
          gazeTime = 0;
          stepUp();
        }
      } else {
        gazeTime = 0;
        ui.progressRing.style.display = 'none';
      }

      germs.forEach(g => {
        g.rotation.z += 0.02;
      });

      quest.forEach((item, i) => {
        const ref = targetRefs[item.id];
        if (!ref) return;

        if (i === currentStep && ref.halo){
          ref.halo.rotation.z += 0.03;

          const s = 1.08 + Math.sin(performance.now() * 0.006) * 0.035;
          ref.group.scale.setScalar(s);
        }
      });

      render();
    }

    function stepUp(){
      if (completed || currentStep >= quest.length) return;

      const item = quest[currentStep];

      score += 1000;

      if (item.id === "ก๊อก"){
        targetRefs["น้ำ"].group.visible = true;
      }

      if (item.id === "มือซ้าย"){
        clearGerms("มือซ้าย");
      }

      if (item.id === "มือขวา"){
        clearGerms("มือขวา");
      }

      showToast(`ดีมาก! ผ่าน ${item.label}`);

      try{
        if (navigator.vibrate) navigator.vibrate(35);
      }catch(e){}

      currentStep += 1;

      if (currentStep >= quest.length){
        completed = true;
        ui.missionText.textContent = "ภารกิจสำเร็จ!";
        ui.msgIcon.textContent = "✨";
        ui.msgText.textContent = "มือสะอาดแล้ว เก่งมาก!";
        ui.progressRing.style.display = 'none';
      } else {
        updateActiveTarget();
      }

      updateHUD();
    }

    function updateHUD(){
      const total = quest.length;
      const shownStep = Math.min(currentStep + 1, total);
      const pct = completed ? 100 : Math.round((currentStep / total) * 100);
      const item = completed ? null : quest[currentStep];

      ui.titleText.textContent = completed
        ? "Simulate Learning • สำเร็จ"
        : `Simulate Learning • ${shownStep}/${total}`;

      ui.missionText.textContent = completed
        ? "มือสะอาดแล้ว ✨"
        : item.msg;

      ui.msgIcon.textContent = completed ? "✨" : item.emoji;

      ui.msgText.textContent = completed
        ? "กดปุ่มไป Main Game ได้เลย"
        : `${item.hint} • มองเป้ากลางจอ หรือแตะที่ ${item.label}`;

      ui.scoreText.textContent = `Score ${score}`;
      ui.timeText.textContent = `เวลา ${timeLeft} วิ`;
      ui.pctText.textContent = `${pct}%`;
      ui.fill.style.width = `${pct}%`;
    }

    function getParam(key, fallback = ''){
      try{
        return new URL(location.href).searchParams.get(key) || fallback;
      }catch(e){
        return fallback;
      }
    }

    function goNext(){
      const rawNext = getParam('next', '');

      if (rawNext){
        location.href = rawNext;
        return;
      }

      const inVrFolder = location.pathname.includes('/vr-handwash/');
      const fallback = inVrFolder ? '../handwash-v2.html' : './handwash-v2.html';

      const url = new URL(fallback, location.href);
      const params = new URLSearchParams(location.search);

      [
        'pid',
        'name',
        'diff',
        'time',
        'view',
        'run',
        'zone',
        'cat',
        'game',
        'gameId',
        'theme',
        'hub',
        'hubRoot',
        'zoneReturn'
      ].forEach(k => {
        const v = params.get(k);
        if (v) url.searchParams.set(k, v);
      });

      location.href = url.toString();
    }

    function render(){
      if (isVR){
        const w = window.innerWidth / 2;
        const h = window.innerHeight;

        renderer.setScissorTest(true);

        renderer.setScissor(0, 0, w, h);
        renderer.setViewport(0, 0, w, h);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.render(scene, camera);

        renderer.setScissor(w, 0, w, h);
        renderer.setViewport(w, 0, w, h);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.render(scene, camera);

        renderer.setScissorTest(false);
      } else {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.render(scene, camera);
      }
    }

    init();
  </script>
</body>
</html>
