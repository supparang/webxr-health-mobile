<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • Plate Launcher</title>
  <meta name="color-scheme" content="light dark" />
  <style>
    :root{
      --bg1:#fff9e9;
      --bg2:#eef8ff;
      --card:#ffffff;
      --line:#d9eaf6;
      --text:#4d4a42;
      --muted:#6d685f;
      --green:#7ed957;
      --green2:#58c33f;
      --blue:#7fcfff;
      --blue2:#50b4f2;
      --orange:#ffbf66;
      --orange2:#ff9d32;
      --purple:#b495ff;
      --purple2:#8d6df2;
      --shadow:0 16px 30px rgba(86,155,194,.14);
    }
    *{ box-sizing:border-box; }
    html,body{
      margin:0;
      min-height:100%;
      font-family:ui-rounded,"Noto Sans Thai",system-ui,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(255,212,92,.22), transparent 28%),
        radial-gradient(circle at top left, rgba(127,207,255,.20), transparent 24%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
    }
    .shell{
      width:min(1180px, calc(100% - 20px));
      margin:0 auto;
      padding:16px 0 28px;
    }
    .card{
      background:linear-gradient(180deg,#fffef8,#ffffff);
      border:3px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
    }
    .hero{
      padding:20px;
      text-align:center;
      margin-bottom:16px;
    }
    .badge{
      display:inline-flex;
      min-height:34px;
      align-items:center;
      justify-content:center;
      padding:8px 14px;
      border-radius:999px;
      border:2px solid var(--line);
      background:#fff;
      color:#6d8ea5;
      font-size:12px;
      font-weight:1000;
    }
    h1{
      margin:10px 0 8px;
      font-size:clamp(32px,5vw,46px);
      line-height:1.04;
    }
    .sub{
      margin:0;
      color:var(--muted);
      font-size:15px;
      line-height:1.6;
      font-weight:900;
    }
    .top-actions{
      margin-top:14px;
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .btn{
      min-height:46px;
      padding:10px 16px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:16px;
      border:2px solid var(--line);
      background:#fff;
      color:#5d6f7a;
      text-decoration:none;
      font-weight:1000;
      cursor:pointer;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:14px;
    }
    .mode-card{
      padding:16px;
      display:grid;
      gap:12px;
      border-radius:24px;
      border:3px solid var(--line);
      background:linear-gradient(180deg,#fffef8,#ffffff);
      box-shadow:var(--shadow);
    }
    .icon{
      width:72px;
      height:72px;
      border-radius:22px;
      display:grid;
      place-items:center;
      font-size:34px;
      border:2px solid var(--line);
      background:#fff;
    }
    .title{
      font-size:24px;
      font-weight:1000;
      line-height:1.08;
    }
    .desc{
      font-size:14px;
      line-height:1.55;
      color:#5f5b54;
      font-weight:900;
    }
    .play{
      min-height:46px;
      border:none;
      border-radius:16px;
      color:#fff;
      font-size:16px;
      font-weight:1000;
      cursor:pointer;
    }
    .solo{ background:linear-gradient(180deg,var(--green),var(--green2)); color:#173b0b; }
    .duet{ background:linear-gradient(180deg,var(--blue),var(--blue2)); color:#0f4c61; }
    .race{ background:linear-gradient(180deg,var(--orange),var(--orange2)); color:#6a3c00; }
    .battle{ background:linear-gradient(180deg,#ffcf7d,#f6a623); color:#6a3c00; }
    .coop{ background:linear-gradient(180deg,var(--purple),var(--purple2)); color:#fff; }

    @media (max-width:1000px){
      .grid{ grid-template-columns:repeat(2,minmax(0,1fr)); }
    }
    @media (max-width:640px){
      .grid{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="card hero">
      <div class="badge">HeroHealth • Plate Adventure</div>
      <h1>Plate Launcher</h1>
      <p class="sub">เลือกโหมดที่อยากเล่นก่อน แล้วค่อยเข้าเกม Plate</p>

      <div class="top-actions">
        <a id="btnBackZone" class="btn" href="./nutrition-zone.html">กลับ Nutrition Zone</a>
        <a id="btnBackHub" class="btn" href="./hub-v2.html">กลับ HUB</a>
      </div>
    </section>

    <section class="grid">
      <article class="mode-card">
        <div class="icon">🍽️</div>
        <div class="title">Solo</div>
        <div class="desc">เล่นคนเดียว เหมาะสำหรับเริ่มต้น</div>
        <button class="play solo" data-mode="solo">เล่น Solo</button>
      </article>

      <article class="mode-card">
        <div class="icon">🧑‍🤝‍🧑</div>
        <div class="title">Duet</div>
        <div class="desc">เล่นสองคนในโหมดคู่</div>
        <button class="play duet" data-mode="duet">เล่น Duet</button>
      </article>

      <article class="mode-card">
        <div class="icon">🏁</div>
        <div class="title">Race</div>
        <div class="desc">แข่งกันว่าใครทำได้เร็วกว่า</div>
        <button class="play race" data-mode="race">เล่น Race</button>
      </article>

      <article class="mode-card">
        <div class="icon">⚔️</div>
        <div class="title">Battle</div>
        <div class="desc">ดวลกันในรอบแข่งขัน</div>
        <button class="play battle" data-mode="battle">เล่น Battle</button>
      </article>

      <article class="mode-card">
        <div class="icon">🤝</div>
        <div class="title">Co-op</div>
        <div class="desc">ช่วยกันเล่นเป็นทีม</div>
        <button class="play coop" data-mode="coop">เล่น Co-op</button>
      </article>
    </section>
  </div>

  <script>
    (() => {
      'use strict';

      const qs = new URLSearchParams(location.search);

      function first(...vals){
        for (const v of vals){
          if (String(v || '').trim()) return String(v).trim();
        }
        return '';
      }

      const ctx = {
        pid: first(qs.get('pid'), 'anon'),
        name: first(qs.get('name'), qs.get('nickName'), 'Hero'),
        run: first(qs.get('run'), 'play'),
        diff: first(qs.get('diff'), 'normal'),
        time: first(qs.get('time'), '90'),
        view: first(qs.get('view'), 'mobile'),
        hub: first(qs.get('hub'), './hub-v2.html'),
        studyId: first(qs.get('studyId'), ''),
        seed: first(qs.get('seed'), String(Date.now()))
      };

      function buildUrl(path, extra = {}){
        const u = new URL(path, location.href);
        Object.entries(extra).forEach(([k, v]) => {
          if (v != null && v !== '') u.searchParams.set(k, String(v));
        });
        return u.toString();
      }

      function buildPlateRunUrl(mode){
        return buildUrl('./plate-vr.html', {
          pid: ctx.pid,
          name: ctx.name,
          run: ctx.run,
          diff: ctx.diff,
          time: ctx.time,
          view: ctx.view,
          hub: ctx.hub,
          studyId: ctx.studyId,
          seed: ctx.seed,
          zone: 'nutrition',
          cat: 'nutrition',
          game: 'plate',
          gameId: 'plate',
          theme: 'plate',
          mode
        });
      }

      document.getElementById('btnBackHub').href = ctx.hub;
      document.getElementById('btnBackZone').href = buildUrl('./nutrition-zone.html', {
        pid: ctx.pid,
        name: ctx.name,
        run: ctx.run,
        diff: ctx.diff,
        time: ctx.time,
        view: ctx.view,
        hub: ctx.hub,
        studyId: ctx.studyId,
        seed: ctx.seed,
        zone: 'nutrition'
      });

      document.querySelectorAll('[data-mode]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const mode = btn.getAttribute('data-mode') || 'solo';
          location.href = buildPlateRunUrl(mode);
        });
      });
    })();
  </script>
</body>
</html>
