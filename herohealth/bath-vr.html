<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth — Bath VR</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="./favicon.ico" />
  <style>
    :root{
      --bg1:#020617; --bg2:#0b1226;
      --panel:rgba(2,6,23,.72);
      --stroke:rgba(148,163,184,.18);
      --text:#e5e7eb;
      --muted:#94a3b8;
      --blue:#3b82f6;
      --good:#22c55e;
      --violet:#a78bfa;
    }
    *{ box-sizing:border-box; }
    html,body{
      margin:0; min-height:100%;
      background:
        radial-gradient(1000px 700px at 50% -10%, rgba(59,130,246,.18), transparent 60%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans Thai", Arial, sans-serif;
    }
    .wrap{
      max-width:880px;
      margin:0 auto;
      padding:18px;
    }
    .card{
      border-radius:22px;
      border:1px solid var(--stroke);
      background:var(--panel);
      box-shadow:0 18px 55px rgba(0,0,0,.28);
      padding:16px;
    }
    .title{
      font-size:28px;
      font-weight:1000;
      margin:0 0 6px 0;
    }
    .muted{
      color:var(--muted);
      font-size:13px;
      font-weight:900;
    }
    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .btn{
      appearance:none;
      border:1px solid rgba(148,163,184,.22);
      border-radius:14px;
      padding:12px 14px;
      min-height:46px;
      cursor:pointer;
      color:var(--text);
      background:rgba(148,163,184,.10);
      font-weight:1000;
    }
    .btn.primary{
      background:rgba(59,130,246,.16);
      border-color:rgba(59,130,246,.34);
    }
    .btn.good{
      background:rgba(34,197,94,.14);
      border-color:rgba(34,197,94,.32);
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background:rgba(2,6,23,.42);
      color:var(--muted);
      font-size:12px;
      font-weight:1000;
      margin:4px 6px 0 0;
    }
    .pill b{ color:var(--text); }
    .debug{
      margin-top:14px;
      padding:12px;
      border-radius:16px;
      border:1px solid var(--stroke);
      background:rgba(2,6,23,.35);
      font:12px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space:pre-wrap;
      word-break:break-word;
      color:#cbd5e1;
    }
    .list{
      margin-top:12px;
      padding-left:18px;
      color:#cbd5e1;
      font-size:13px;
      line-height:1.55;
      font-weight:700;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">🛁 Bath VR</div>
      <div class="muted">Launcher สำหรับเข้าเกม Bath แบบไม่วนลูป</div>

      <div style="margin-top:10px;">
        <span class="pill"><b>PID</b>: <span id="uiPid">anon</span></span>
        <span class="pill"><b>view</b>: <span id="uiView">mobile</span></span>
        <span class="pill"><b>run</b>: <span id="uiRun">play</span></span>
        <span class="pill"><b>diff</b>: <span id="uiDiff">normal</span></span>
        <span class="pill"><b>time</b>: <span id="uiTime">80</span></span>
      </div>

      <ul class="list">
        <li>ปุ่ม <b>เริ่มเกม</b> → ไป Warmup ก่อน</li>
        <li>Warmup เสร็จ → เข้า <b>/herohealth/vr-bath/bath.html</b></li>
        <li>ปุ่ม <b>เปิด run ตรง</b> → ใช้ทดสอบข้าม Warmup</li>
      </ul>

      <div class="row">
        <button class="btn primary" id="btnStart" type="button">เริ่มเกม</button>
        <button class="btn good" id="btnOpenRun" type="button">เปิด run ตรง</button>
        <button class="btn" id="btnHub" type="button">กลับ Hub</button>
      </div>

      <div class="debug" id="debugBox">loading...</div>
    </div>
  </div>

  <script>
    function qs(k, d=''){
      try{ return (new URL(location.href)).searchParams.get(k) ?? d; }
      catch(_){ return d; }
    }

    function safeNum(v, d){
      v = Number(v);
      return Number.isFinite(v) ? v : d;
    }

    function normalizeHub(){
      let raw = String(qs('hub','')).trim();
      raw = raw.replace(/[.]+$/, '');
      if(raw) return raw;
      try{ return new URL('./hub.html', location.href).toString(); }
      catch(_){ return './hub.html'; }
    }

    const ctx = {
      pid:  String(qs('pid','anon')).trim() || 'anon',
      view: String(qs('view','mobile')).trim() || 'mobile',
      run:  String(qs('run','play')).trim() || 'play',
      diff: String(qs('diff','normal')).trim() || 'normal',
      time: String(safeNum(qs('time','80'), 80)),
      seed: String(qs('seed', String(Date.now()))),
      zone: String(qs('zone','hygiene')).trim() || 'hygiene',
      hub:  normalizeHub()
    };

    document.getElementById('uiPid').textContent  = ctx.pid;
    document.getElementById('uiView').textContent = ctx.view;
    document.getElementById('uiRun').textContent  = ctx.run;
    document.getElementById('uiDiff').textContent = ctx.diff;
    document.getElementById('uiTime').textContent = ctx.time;

    function buildRunUrl(extra){
      const u = new URL('./vr-bath/bath.html', location.href);
      u.searchParams.set('zone', ctx.zone);
      u.searchParams.set('pid', ctx.pid);
      u.searchParams.set('view', ctx.view);
      u.searchParams.set('run', ctx.run);
      u.searchParams.set('diff', ctx.diff);
      u.searchParams.set('time', ctx.time);
      u.searchParams.set('seed', ctx.seed);
      u.searchParams.set('hub', ctx.hub);

      const sp = new URL(location.href).searchParams;
      [
        'studyId','phase','conditionGroup','log','api','ai','debug',
        'planSeq','planDay','planSlot','planMode','planSlots','planIndex','autoNext',
        'plannedGame','finalGame','cdnext','grade','pro'
      ].forEach(k=>{
        const v = sp.get(k);
        if(v != null && v !== '' && !u.searchParams.has(k)){
          u.searchParams.set(k, v);
        }
      });

      if(extra && typeof extra === 'object'){
        Object.keys(extra).forEach(k=>{
          const v = extra[k];
          if(v === null || v === undefined || v === '') u.searchParams.delete(k);
          else u.searchParams.set(k, String(v));
        });
      }

      return u.toString();
    }

    function buildWarmupUrl(){
      const u = new URL('./warmup-gate.html', location.href);
      u.searchParams.set('gatePhase', 'warmup');
      u.searchParams.set('phase', 'warmup');
      u.searchParams.set('cat', 'hygiene');
      u.searchParams.set('theme', 'bath');
      u.searchParams.set('game', 'bath');
      u.searchParams.set('pid', ctx.pid);
      u.searchParams.set('run', ctx.run);
      u.searchParams.set('diff', ctx.diff);
      u.searchParams.set('time', ctx.time);
      u.searchParams.set('view', ctx.view);
      u.searchParams.set('seed', ctx.seed);
      u.searchParams.set('hub', ctx.hub);
      u.searchParams.set('next', buildRunUrl());
      return u.toString();
    }

    const debugBox = document.getElementById('debugBox');
    debugBox.textContent =
      '[Bath VR Launcher]\n' +
      'launcher:   ' + location.href + '\n' +
      'hub:        ' + ctx.hub + '\n' +
      'warmupPath: ' + buildWarmupUrl() + '\n' +
      'runPath:    ' + buildRunUrl() + '\n';

    document.getElementById('btnStart').onclick = ()=>{
      location.href = buildWarmupUrl();
    };

    document.getElementById('btnOpenRun').onclick = ()=>{
      location.href = buildRunUrl();
    };

    document.getElementById('btnHub').onclick = ()=>{
      location.href = ctx.hub;
    };
  </script>
</body>
</html>
