BathVR — ROOT Launcher (redirect to folder launcher)
FULL v20260305-BATH-ROOT-REDIRECT
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth — BathVR Launcher</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="./favicon.ico" />
  <style>
    html,body{height:100%;margin:0;background:#050814;color:#e5e7eb;
      font-family:system-ui,-apple-system,"Noto Sans Thai",Segoe UI,Roboto,sans-serif;}
    .wrap{min-height:100%;display:grid;place-items:center;padding:24px}
    .card{width:min(760px,100%);border:1px solid rgba(148,163,184,.18);
      background:rgba(2,6,23,.72);border-radius:18px;padding:16px}
    .t{font-weight:1000;margin:0 0 8px 0}
    .m{color:rgba(148,163,184,.95);margin:0;font-size:13px;line-height:1.45}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    a.btn{display:inline-block;border-radius:14px;padding:10px 12px;
      border:1px solid rgba(148,163,184,.18);background:rgba(15,23,42,.72);
      color:#e5e7eb;text-decoration:none;font-weight:1000}
    a.btn.primary{background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.28)}
    code{color:rgba(34,197,94,.95)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 class="t">🚿 BathVR — Launcher</h1>
      <p class="m">กำลังพาไปตัว Launcher ในโฟลเดอร์ <code>/herohealth/vr-bath/bath-vr.html</code>…</p>
      <div class="row">
        <a class="btn primary" id="go" href="./vr-bath/bath-vr.html">ไป Launcher</a>
        <a class="btn" id="hub" href="./hub.html">กลับ HUB</a>
      </div>
      <p class="m" id="dbg" style="margin-top:10px;word-break:break-all"></p>
    </div>
  </div>

<script>
(function(){
  'use strict';
  const cur = new URL(location.href);
  const to  = new URL('./vr-bath/bath-vr.html', location.href);

  // passthrough ทุก query เดิม
  cur.searchParams.forEach((v,k)=> to.searchParams.set(k,v));

  // ensure hub default
  if(!to.searchParams.get('hub')) to.searchParams.set('hub', new URL('./hub.html', location.href).toString());

  document.getElementById('go').href = to.toString();
  document.getElementById('dbg').textContent = 'Redirect → ' + to.toString();

  // auto redirect (แก้ปัญหาเข้ามาที่ root แล้ว 404)
  setTimeout(()=>{ try{ location.replace(to.toString()); }catch(_){ location.href = to.toString(); } }, 120);
})();
</script>
</body>
</html>
