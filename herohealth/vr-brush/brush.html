<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="color-scheme" content="dark light"/>
  <meta name="google" content="notranslate"/>
  <title>HeroHealth • Brush</title>

  <link rel="icon" href="../favicon.ico"/>
  <link rel="stylesheet" href="./brush.css?v=20260303e"/>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>

<body data-view="pc">
  <div id="br-wrap" data-state="menu">
    <div id="app">

      <header id="hud">
        <div class="hud-row">
          <div class="pill" id="phasePill">PHASE: —</div>
          <div class="pill" id="timePill">TIME: 0</div>
          <div class="pill" id="scorePill">SCORE: 0</div>
          <div class="pill" id="comboPill">COMBO: 0</div>
          <div class="pill" id="missionPill">MISSION: —</div>
        </div>
        <div class="hud-row">
          <div class="pill" id="missPill">MISS: 0</div>
          <div class="pill" id="accPill">ACC: 0%</div>
          <div class="pill" id="toolPill">TOOL: BRUSH</div>
          <div class="pill" id="viewPill">VIEW: —</div>
        </div>
      </header>

      <main id="playfield" aria-label="Brush">
        <a-scene id="scene"
          background="color: #050914"
          renderer="antialias: true; colorManagement: true"
          vr-mode-ui="enabled: false"
          embedded>
          <a-entity id="rig" position="0 0 0">
            <a-entity id="cam" camera look-controls position="0 1.6 0"></a-entity>
          </a-entity>

          <a-entity light="type: ambient; intensity: 1.0"></a-entity>
          <a-entity light="type: directional; intensity: 1.0" position="1 3 2"></a-entity>

          <a-sky color="#070b1b"></a-sky>

          <a-entity id="tooth"
            geometry="primitive: box; width: 1.3; height: 1.0; depth: 0.7"
            material="color: #e5e7eb; roughness: 0.9; metalness: 0"
            position="0 1.45 -3.0"></a-entity>

          <a-entity id="spawnRoot"></a-entity>
        </a-scene>

        <div id="domTargets" aria-hidden="true"></div>
        <div id="crosshair"></div>

        <div id="panelHelp" class="panel hidden">
          <div class="panel-card">
            <h2>วิธีเล่น Brush</h2>
            <ol>
              <li>แตะ “คราบ” สีเขียว</li>
              <li>หลบ “เชื้อ” สีแดง</li>
            </ol>
            <div class="row">
              <button id="btnCloseHelp" class="btn primary">เข้าใจแล้ว</button>
            </div>
          </div>
        </div>

        <div id="panelEnd" class="panel hidden">
          <div class="panel-card">
            <h2>สรุปผล</h2>
            <p id="endSummary" class="summary"></p>
            <div class="row">
              <button id="btnReplay" class="btn primary">เล่นอีกครั้ง</button>
              <button id="btnBack" class="btn">กลับ HUB</button>
            </div>
          </div>
        </div>

        <div id="controlsBar">
          <button id="btnStart" class="btn primary">เริ่มเล่น</button>
          <button id="btnHelp" class="btn">วิธีเล่น</button>
        </div>
      </main>

      <footer id="footer">
        <span class="muted">HeroHealth • Brush • SAFE</span>
      </footer>

    </div>

    <div id="tapStart" class="tapStart">
      <div class="tapCard">
        <div class="tapTitle">แตะเพื่อปลดล็อก</div>
        <div class="tapSub">Mobile/VR บางเครื่องต้อง tap ก่อนเพื่อให้อินพุต/เสียงทำงาน</div>
        <div class="tapRow">
          <button id="tapBtn" class="btn primary">เริ่ม</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    try{
      const m = await import('./brush.safe.js?v=20260303e');
      if (m && typeof m.bootGame === 'function') window.__BRUSH_BOOTGAME__ = m.bootGame;
    }catch(e){ console.warn('[Brush] preload safe failed', e); }
  </script>

  <script src="./brush.boot.js?v=20260303e"></script>
</body>
</html>
