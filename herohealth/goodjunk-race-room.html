<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>GoodJunk Race Room</title>
  <meta name="color-scheme" content="dark light" />
  <meta http-equiv="refresh" content="0; url=./goodjunk-race-lobby.html" />
  <style>
    :root{
      --bg1:#020617;
      --bg2:#0b1226;
      --panel:rgba(2,6,23,.82);
      --stroke:rgba(148,163,184,.18);
      --text:#e5e7eb;
      --muted:#94a3b8;
      --blue:#38bdf8;
    }
    *{ box-sizing:border-box; }
    html,body{
      margin:0;
      min-height:100%;
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, #172554 0%, transparent 34%),
        linear-gradient(180deg,var(--bg2),var(--bg1));
    }
    .wrap{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
    }
    .card{
      width:min(92vw,560px);
      background:var(--panel);
      border:1px solid var(--stroke);
      border-radius:24px;
      padding:22px 20px;
      backdrop-filter:blur(10px);
      box-shadow:0 24px 64px rgba(0,0,0,.28);
    }
    .kicker{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 12px;
      border-radius:999px;
      border:1px solid rgba(56,189,248,.25);
      background:rgba(56,189,248,.12);
      color:#7dd3fc;
      font-weight:900;
      font-size:13px;
      margin-bottom:12px;
    }
    h1{
      margin:0 0 8px;
      font-size:28px;
      line-height:1.1;
    }
    p{
      margin:0;
      color:var(--muted);
      line-height:1.7;
      font-size:14px;
    }
    .mono{
      margin-top:14px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--stroke);
      background:rgba(15,23,42,.45);
      font:700 13px/1.6 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
      word-break:break-all;
    }
    .btn{
      display:inline-flex;
      margin-top:16px;
      padding:12px 16px;
      border-radius:14px;
      border:0;
      background:var(--blue);
      color:#06203a;
      font-weight:900;
      text-decoration:none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="kicker">RACE ROOM REDIRECT</div>
      <h1>กำลังเข้าห้องแข่ง</h1>
      <p>ลิงก์เชิญจะพาไปที่หน้า lobby เดียวกันทุกเครื่อง เพื่อให้ flow ของ race ใช้ชุดเดียวกัน</p>
      <div class="mono" id="nextUrl">preparing…</div>
      <a class="btn" id="goNow" href="./goodjunk-race-lobby.html">ไปทันที</a>
    </div>
  </div>

  <script>
    (function () {
      const oldQ = new URLSearchParams(location.search);

      function get(name, fallback = '') {
        const v = oldQ.get(name);
        return v == null ? fallback : v;
      }

      function makeSeed() {
        return String(Date.now());
      }

      function makeDevicePid() {
        try {
          const KEY = 'GJ_DEVICE_PID';
          let pid = localStorage.getItem(KEY);
          if (!pid) {
            pid = `p-${Math.random().toString(36).slice(2, 10)}`;
            localStorage.setItem(KEY, pid);
          }
          return pid;
        } catch {
          return `p-${Math.random().toString(36).slice(2, 10)}`;
        }
      }

      function normalizePid(rawPid) {
        const v = String(rawPid || '')
          .trim()
          .replace(/[.#$[\]/]/g, '-');
        if (!v) return makeDevicePid();
        if (v.toLowerCase() === 'anon') return makeDevicePid();
        return v;
      }

      function normalizeRoomId(rawRoomId) {
        return String(rawRoomId || '')
          .toUpperCase()
          .replace(/[^A-Z0-9-]/g, '')
          .slice(0, 16);
      }

      const nextQ = new URLSearchParams();

      const roomId = normalizeRoomId(get('roomId', get('room', '')));
      const pid = normalizePid(get('pid', ''));
      const name = get('name', get('nick', ''));
      const studyId = get('studyId', '');
      const diff = get('diff', 'normal');
      const time = get('time', '120');
      const seed = get('seed', makeSeed());
      const hub = get('hub', './hub.html');
      const view = get('view', 'mobile');
      const run = get('run', 'play');
      const gameId = get('gameId', 'goodjunk');
      const mode = get('mode', 'race');

      nextQ.set('pid', pid);
      if (name) nextQ.set('name', name);
      if (studyId) nextQ.set('studyId', studyId);
      if (roomId) nextQ.set('roomId', roomId);

      nextQ.set('diff', diff);
      nextQ.set('time', time);
      nextQ.set('seed', seed);
      nextQ.set('hub', hub);
      nextQ.set('view', view);
      nextQ.set('run', run);
      nextQ.set('gameId', gameId);
      nextQ.set('mode', mode || 'race');

      [
        'log','api','phase','conditionGroup','debug',
        'battle','autostart','forfeit','host','startAt'
      ].forEach((k) => {
        const v = get(k, '');
        if (v) nextQ.set(k, v);
      });

      const nextUrl = `./goodjunk-race-lobby.html?v=20260318c-race-run-shim-safe&${nextQ.toString()}`;

      const urlBox = document.getElementById('nextUrl');
      const goNow = document.getElementById('goNow');
      if (urlBox) urlBox.textContent = nextUrl;
      if (goNow) goNow.href = nextUrl;

      location.replace(nextUrl);
    })();
  </script>
</body>
</html>
