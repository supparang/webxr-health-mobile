<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no"><meta name="theme-color" content="#0ea5e9"><title>HeroHealth • Toothbrush Mission</title><style>:root{font-family:system-ui,-apple-system,"Noto Sans Thai",sans-serif;color:#123;background:#eaf9ff}*{box-sizing:border-box}html,body{margin:0;min-height:100%;overscroll-behavior:none}body{min-height:100dvh;background:linear-gradient(180deg,#dff7ff,#f7fdff);padding:calc(10px + env(safe-area-inset-top)) 10px calc(12px + env(safe-area-inset-bottom))}.app{width:min(520px,100%);margin:auto;display:grid;gap:10px}.card{background:#fff;border:2px solid #cceffc;border-radius:22px;box-shadow:0 10px 28px #0c4a6e18;padding:14px}.top{display:flex;align-items:center;gap:10px}.icon{font-size:38px}.top h1{font-size:22px;margin:0}.muted{color:#557080;font-size:13px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{text-align:center;background:#effaff;border-radius:14px;padding:8px}.stat b{display:block;font-size:20px}.mouth{position:relative;height:min(54vh,430px);min-height:330px;border-radius:28px;background:radial-gradient(ellipse at center,#8e2747 0 25%,#ef7fa0 26% 67%,#9b294e 68%);overflow:hidden;touch-action:none;user-select:none}.arch{position:absolute;left:8%;right:8%;display:grid;grid-template-columns:repeat(6,1fr);gap:5px}.arch.top{top:18%}.arch.bottom{bottom:18%}.tooth{height:70px;border-radius:14px 14px 22px 22px;background:linear-gradient(#fff,#e7f7ff);border:3px solid #d5edf6;box-shadow:inset 0 -8px 0 #d8edf5;position:relative}.arch.bottom .tooth{transform:rotate(180deg)}.zone{position:absolute;width:31%;height:35%;border:3px dashed #fff8;border-radius:24px;display:grid;place-items:center;color:white;font-weight:900;text-shadow:0 2px 4px #0008;touch-action:none}.zone.active{border-color:#ffe45e;background:#ffffff22}.zone.done{border-style:solid;border-color:#65e6a8;background:#0ca86266}.z1{left:1%;top:4%}.z2{left:34.5%;top:4%}.z3{right:1%;top:4%}.z4{left:1%;bottom:4%}.z5{left:34.5%;bottom:4%}.z6{right:1%;bottom:4%}.brush{position:absolute;width:72px;height:24px;border-radius:12px;background:#39bdf8;box-shadow:0 3px 0 #0879b5;pointer-events:none;display:none;z-index:10}.brush:after{content:"";position:absolute;right:-17px;top:2px;width:22px;height:20px;border-radius:4px;background:repeating-linear-gradient(90deg,#fff 0 3px,#bdefff 3px 5px)}.coach{font-weight:800;text-align:center;min-height:44px;display:grid;place-items:center}.btn{width:100%;min-height:52px;border:0;border-radius:16px;background:#0787c8;color:#fff;font:inherit;font-size:17px;font-weight:900}.btn:disabled{opacity:.45}.overlay{position:fixed;inset:0;background:#06283ccc;display:none;place-items:center;padding:18px;z-index:30}.overlay.show{display:grid}.result{width:min(430px,100%);background:white;border-radius:26px;padding:24px;text-align:center}.result h2{font-size:30px;margin:8px}.score{font-size:46px;font-weight:1000;color:#0787c8}.progress{height:10px;border-radius:99px;background:#d8edf5;overflow:hidden}.progress i{display:block;height:100%;width:0;background:#19b96b;transition:width .2s}</style></head><body><main class="app"><section class="card top"><div class="icon">🪥</div><div><h1>ภารกิจแปรงฟัน</h1><div class="muted">แตะค้างแล้วถูไป–มาในโซนที่เรืองแสง</div></div></section><section class="card stats"><div class="stat"><span class="muted">เวลา</span><b id="time">90</b></div><div class="stat"><span class="muted">โซน</span><b id="zones">0/6</b></div><div class="stat"><span class="muted">คะแนน</span><b id="score">0</b></div></section><section class="mouth" id="mouth"><div class="arch top">${'<div class="tooth"></div>'.repeat(6)}</div><div class="arch bottom">${'<div class="tooth"></div>'.repeat(6)}</div><div class="zone z1" data-zone="0">บนซ้าย</div><div class="zone z2" data-zone="1">บนหน้า</div><div class="zone z3" data-zone="2">บนขวา</div><div class="zone z4" data-zone="3">ล่างซ้าย</div><div class="zone z5" data-zone="4">ล่างหน้า</div><div class="zone z6" data-zone="5">ล่างขวา</div><div class="brush" id="brush"></div></section><section class="card"><div class="coach" id="coach">กด “เริ่มภารกิจ” แล้วแปรงตามโซนทีละส่วน</div><div class="progress"><i id="bar"></i></div></section><button class="btn" id="start">เริ่มภารกิจ</button></main><section class="overlay" id="overlay"><div class="result"><div style="font-size:58px">🦷✨</div><h2>จบรอบแปรงฟัน</h2><div class="score" id="finalScore">0</div><p id="summary">ทำกิจกรรมครบแล้ว</p><button class="btn" id="done">บันทึกผลและกลับ HeroHealth</button></div></section><script>(()=>{'use strict';const q=new URLSearchParams(location.search),sid=q.get('studentId')||q.get('pid')||'',zones=[...document.querySelectorAll('.zone')],mouth=document.getElementById('mouth'),brush=document.getElementById('brush');let running=false,seconds=90,current=0,hits=Array(6).fill(0),last=null,timer=null,score=0,finished=false;const need=16;function update(){document.getElementById('time').textContent=seconds;document.getElementById('zones').textContent=`${hits.filter(x=>x>=need).length}/6`;document.getElementById('score').textContent=score;document.getElementById('bar').style.width=`${hits.filter(x=>x>=need).length/6*100}%`;zones.forEach((z,i)=>{z.classList.toggle('active',running&&i===current);z.classList.toggle('done',hits[i]>=need)});if(running)document.getElementById('coach').textContent=hits[current]>=need?'เยี่ยม! ไปโซนถัดไป':`แปรง ${zones[current].textContent} ไป–มา`;}function point(e){const r=mouth.getBoundingClientRect(),p=e.touches?.[0]||e;return{x:p.clientX-r.left,y:p.clientY-r.top}}function move(e){if(!running)return;e.preventDefault();const p=point(e);brush.style.display='block';brush.style.left=`${p.x-36}px`;brush.style.top=`${p.y-12}px`;const el=document.elementFromPoint((e.touches?.[0]||e).clientX,(e.touches?.[0]||e).clientY);const z=el?.closest?.('.zone');if(!z||Number(z.dataset.zone)!==current){last=p;return}if(last&&Math.hypot(p.x-last.x,p.y-last.y)>8){hits[current]++;score+=5;if(hits[current]>=need){score+=100;current++;last=null;if(current>=6){finish();return}}update()}last=p}function end(){last=null;brush.style.display='none'}function start(){if(running)return;running=true;seconds=90;document.getElementById('start').disabled=true;timer=setInterval(()=>{seconds--;update();if(seconds<=0)finish()},1000);update()}function payload(){return{type:'HEROHEALTH_GAME_COMPLETE',payload:{studentId:sid,zone:'hygiene',gameId:'toothbrush',completed:true,passed:true,score,accuracy:Math.round(hits.reduce((a,b)=>a+Math.min(b,need),0)/(need*6)*100),eventId:`toothbrush-${Date.now()}-${Math.random().toString(36).slice(2,7)}`}}}function finish(){if(finished)return;finished=true;running=false;clearInterval(timer);end();const p=payload();document.getElementById('finalScore').textContent=`${score} คะแนน`;document.getElementById('summary').textContent=`ทำได้ ${hits.filter(x=>x>=need).length} จาก 6 โซน • จบรอบแล้วไปภารกิจถัดไปได้`;document.getElementById('overlay').classList.add('show');try{parent.postMessage(p,location.origin)}catch(_){}}function back(){const p=payload().payload;const ret=q.get('return');if(ret){const u=new URL(ret,location.href);u.searchParams.set('hhReturn','game');u.searchParams.set('studentId',sid);u.searchParams.set('zone','hygiene');u.searchParams.set('gameId','toothbrush');u.searchParams.set('passed','true');u.searchParams.set('score',String(score));u.searchParams.set('accuracy',String(p.accuracy));u.searchParams.set('eventId',p.eventId);location.href=u.href}else history.back()}document.getElementById('start').onclick=start;document.getElementById('done').onclick=back;mouth.addEventListener('pointerdown',e=>{mouth.setPointerCapture?.(e.pointerId);move(e)});mouth.addEventListener('pointermove',move);mouth.addEventListener('pointerup',end);mouth.addEventListener('pointercancel',end);mouth.addEventListener('touchmove',move,{passive:false});update()})();</script></body></html>
