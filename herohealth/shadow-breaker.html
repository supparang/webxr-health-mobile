<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Redirecting… Shadow Breaker</title>
  <meta http-equiv="refresh" content="0; url=./shadow-breaker-vr.html" />
  <script>
    (function(){
      'use strict';
      const q = location.search || '';
      const h = location.hash || '';
      const target = './shadow-breaker-vr.html' + q + h;
      try{
        location.replace(target);
      }catch(e){
        location.href = target;
      }
    })();
  </script>
</head>
<body></body>
</html>
