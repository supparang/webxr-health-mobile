<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • Plate Solo</title>
  <meta name="theme-color" content="#ffdd75" />
  <meta name="color-scheme" content="light" />

  <link rel="stylesheet" href="./plate-solo.css?v=20260512-plate-css-rc1">
  <script src="./plate-solo.js?v=20260512-plate-main"></script>
<!-- เอาออกก่อนทั้งหมด -->
<!--
<script src="./plate-solo-final-flow-patch.js?v=20260512-plate-final-flow-rc1"></script>
<script src="./plate-solo-summary-actions-patch.js?v=20260512-plate-summary-actions-rc1"></script>
<script src="./plate-solo-end-freeze-patch.js?v=20260512-plate-end-freeze-rc1"></script>
<script src="./plate-solo-unblur-overlay-patch.js?v=20260512-plate-unblur-overlay-rc1"></script>
<script src="./plate-solo-kill-blur-hard-patch.js?v=20260512-plate-kill-blur-hard-rc2"></script>
<script src="./plate-solo-start-balance-patch.js?v=20260512-plate-start-balance-rc1"></script>
-->
</head>

<body>
  <div id="plateApp" class="plate-app">
    <header class="plate-topbar">
      <div class="plate-brand">
        <div class="plate-logo">🥗</div>
        <div class="plate-title-block">
          <h1 class="plate-title">Plate Solo</h1>
          <div class="plate-subtitle">จัดจานอาหารให้สมดุลครบ 5 หมู่</div>
        </div>
      </div>

      <div class="plate-top-actions">
        <button id="btnBack" class="btn">← กลับ Nutrition Zone</button>
      </div>
    </header>

    <main class="plate-main">
      <aside class="plate-side">
        <section class="goal-panel">
          <h2 class="goal-title">ภารกิจอาหาร 5 หมู่</h2>
          <div id="missions" class="goal-list"></div>
        </section>

        <section id="hintBox" class="cooldown-box">
          <div class="cooldown-title">คำใบ้</div>
          <div class="cooldown-text">เลือกอาหารให้ครบหมู่ โปรตีน ข้าว/แป้ง ผัก ผลไม้ และไขมัน</div>
        </section>

        <section class="progress-wrap" style="margin-top:12px;">
          <div class="progress-label-row">
            <span>ความสมดุล</span>
            <span id="balance">0%</span>
          </div>
          <div class="progress-track">
            <div id="balanceFill" class="progress-fill"></div>
          </div>
        </section>

        <section id="log" class="panel-note" style="margin-top:12px;"></section>
      </aside>

      <section class="plate-play">
        <div class="plate-hud">
          <div class="plate-stat score-card">
            <div class="stat-label">คะแนน</div>
            <div id="scoreText" class="stat-value">0</div>
          </div>

          <div class="plate-stat timer-card">
            <div class="stat-label">เวลา</div>
            <div id="timeText" class="stat-value">90</div>
          </div>

          <div class="plate-stat combo-card">
            <div class="stat-label">ช่วงเกม</div>
            <div id="phaseText" class="stat-value">Ready</div>
          </div>

          <div class="plate-stat balance-card">
            <div class="stat-label">สมดุล</div>
            <div id="phaseBanner" class="stat-value">0%</div>
          </div>
        </div>

        <div id="arena" class="plate-stage">
          <div id="spawnLayer" class="play-field"></div>
          <div id="plate" class="center-plate"></div>
          <div id="plateFoods"></div>
        </div>

        <div class="plate-controls">
          <div class="controls-left">
            <span class="status-pill">Plate Solo</span>
          </div>

          <div class="controls-right">
            <button id="btnStart" class="btn primary">เริ่มเล่น</button>
            <button id="btnPause" class="btn">พัก</button>
            <button id="btnHint" class="btn blue">คำใบ้</button>
            <button id="btnSkill" class="btn warn">สกิลช่วย</button>
          </div>
        </div>
      </section>
    </main>

    <div id="summaryOverlay" class="summary-modal hidden" aria-hidden="true">
      <div class="summary-card">
        <div class="summary-kicker">Plate Solo</div>
        <h2 class="summary-title">สรุปผล</h2>
        <p id="summaryText" class="summary-subtitle">จัดจานอาหารได้ดีมาก!</p>

        <div class="summary-stats">
          <div class="summary-stat">
            <span id="sumScore" class="num">0</span>
            <span class="label">คะแนน</span>
          </div>
          <div class="summary-stat">
            <span id="sumBalance" class="num">0%</span>
            <span class="label">สมดุล</span>
          </div>
          <div class="summary-stat">
            <span id="sumTime" class="num">0</span>
            <span class="label">เวลา</span>
          </div>
          <div class="summary-stat">
            <span id="sumMission" class="num">0/5</span>
            <span class="label">ภารกิจ</span>
          </div>
        </div>

        <div class="summary-actions">
          <button id="btnReplay" class="btn primary">เล่นอีกครั้ง</button>
          <button id="btnCooldown" class="btn blue">ทำ Cooldown</button>
          <button id="btnZone" class="btn">กลับ Nutrition Zone</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast"></div>
  </div>

  <script src="./plate-solo.js?v=20260513-domfix2"></script>
</body>
</html>
