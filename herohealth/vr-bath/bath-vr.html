<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>HeroHealth • Bath VR</title>
  <meta name="color-scheme" content="dark light"/>
  <meta name="google" content="notranslate"/>
  <link rel="icon" href="../favicon.ico"/>

  <style>
    :root{
      --bg:#050814;
      --panel: rgba(2,6,23,.72);
      --stroke: rgba(148,163,184,.18);
      --text:#e5e7eb;
      --mut:#94a3b8;
      --good:#22c55e;
      --warn:#f59e0b;
      --bad:#ef4444;
      --cyan:#22d3ee;

      --sat: env(safe-area-inset-top, 0px);
      --sar: env(safe-area-inset-right, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:
      radial-gradient(1200px 700px at 15% 15%, rgba(34,197,94,.10), transparent 55%),
      radial-gradient(1000px 600px at 85% 20%, rgba(34,211,238,.10), transparent 55%),
      var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,"Noto Sans Thai",Segoe UI,Roboto,sans-serif;
    }
    #wrap{
      min-height:100dvh;
      display:grid;
      grid-template-rows: minmax(280px, 1fr) auto;
      gap:10px;
      padding:
        calc(12px + var(--sat))
        calc(12px + var(--sar))
        calc(14px + var(--sab))
        calc(12px + var(--sal));
    }

    /* stage */
    .stage{
      position:relative;
      border:1px solid var(--stroke);
      border-radius:18px;
      background: rgba(2,6,23,.65);
      overflow:hidden;
      min-height: 44dvh;
      box-shadow: 0 18px 60px rgba(0,0,0,.35);
    }
    .layer{
      position:absolute;
      inset:0;
      overflow:hidden;
      touch-action: manipulation;
    }

    /* targets */
    .dirt{
      position:absolute;
      transform: translate(-50%, -50%);
      width: 54px;
      height: 54px;
      border-radius: 999px;
      display:grid;
      place-items:center;
      font-size: 26px;
      cursor:pointer;
      user-select:none;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      box-shadow: 0 14px 36px rgba(0,0,0,.28);
      transition: transform .12s ease, opacity .12s ease;
    }
    .dirt.good{ box-shadow: 0 0 0 1px rgba(34,197,94,.15), 0 14px 36px rgba(0,0,0,.28); }
    .dirt.bad{  box-shadow: 0 0 0 1px rgba(239,68,68,.16), 0 14px 36px rgba(0,0,0,.28); }
    .dirt.pop{ transform: translate(-50%,-50%) scale(1.12); opacity:.0; }
    .dirt.small{ width: 44px; height:44px; font-size:22px; }
    .dirt.big{ width: 64px; height:64px; font-size:30px; }

    /* HUD */
    .hud{
      border:1px solid var(--stroke);
      border-radius:18px;
      background: var(--panel);
      padding: 10px;
      backdrop-filter: blur(8px);
    }
    .row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      margin-bottom:8px;
    }
    .pill{
      display:inline-flex; align-items:center; gap:6px;
      padding:7px 10px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,.18);
      background: rgba(2,6,23,.35);
      font-size:12px;
      font-weight:900;
      color: rgba(229,231,235,.92);
      white-space:nowrap;
    }
    .pill b{color:#fff;font-weight:1000}
    .barWrap{
      display:grid;
      gap:8px;
      margin-bottom:10px;
    }
    .barLabel{
      display:flex;justify-content:space-between;gap:10px;
      font-size:12px;color:rgba(229,231,235,.82);font-weight:850;
      margin-bottom:4px;
    }
    .barTrack{
      height:10px;border-radius:999px;overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.30);
    }
    .barFill{
      height:100%; width:0%;
      background: linear-gradient(90deg, rgba(34,197,94,.88), rgba(34,211,238,.85));
      transition: width .12s linear;
    }
    .barFill.bad{
      background: linear-gradient(90deg, rgba(251,191,36,.9), rgba(239,68,68,.85));
    }

    .controls{display:flex;flex-wrap:wrap;gap:8px}
    .btn{
      border:1px solid rgba(148,163,184,.18);
      background: rgba(2,6,23,.40);
      color: var(--text);
      border-radius: 14px;
      padding: 10px 12px;
      font-weight: 1000;
      font-size: 13px;
      cursor:pointer;
      user-select:none;
    }
    .btn.primary{ border-color: rgba(34,197,94,.30); background: rgba(34,197,94,.14); }
    .btn.cyan{ border-color: rgba(34,211,238,.30); background: rgba(34,211,238,.12); }
    .btn.ghost{ color: var(--mut); }

    /* end overlay */
    #end[hidden]{ display:none !important; }
    #end{
      position:fixed; inset:0;
      z-index: 90;
      background: rgba(2,6,23,.70);
      backdrop-filter: blur(6px);
      padding:
        calc(12px + var(--sat))
        12px
        calc(96px + var(--sab))
        12px;
      overflow:auto;
    }
    .endCard{
      width:min(920px,100%);
      margin: 0 auto;
      border:1px solid rgba(148,163,184,.20);
      border-radius:18px;
      background: rgba(2,6,23,.92);
      box-shadow: 0 16px 54px rgba(0,0,0,.38);
      padding: 12px;
    }
    .endHead{display:flex;flex-wrap:wrap;gap:10px;justify-content:space-between;align-items:center;margin-bottom:10px}
    .endTitle{font-weight:1000;font-size:18px}
    .grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap:10px;
    }
    @media (max-width:760px){ .grid{ grid-template-columns: repeat(2,minmax(0,1fr)); } }
    @media (max-width:460px){ .grid{ grid-template-columns: 1fr; } }
    .item{
      border:1px solid rgba(148,163,184,.16);
      background: rgba(15,23,42,.45);
      border-radius: 12px;
      padding: 10px;
    }
    .k{color:rgba(148,163,184,.9);font-size:12px;font-weight:900}
    .v{color:#fff;font-size:18px;font-weight:1000;margin-top:2px}
    .note{
      margin-top:10px;
      border:1px solid rgba(148,163,184,.14);
      background: rgba(15,23,42,.35);
      border-radius: 12px;
      padding: 10px;
      color: rgba(229,231,235,.82);
      font-size: 12px;
      font-weight: 850;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .endActions{ margin-top:12px; display:flex; flex-wrap:wrap; gap:8px; }

    /* toast */
    #toast{
      position: fixed; left: 50%;
      bottom: calc(14px + var(--sab));
      transform: translateX(-50%);
      z-index: 99;
      padding: 10px 12px;
      border-radius: 14px;
      border:1px solid rgba(148,163,184,.18);
      background: rgba(2,6,23,.84);
      box-shadow: 0 14px 44px rgba(0,0,0,.35);
      opacity:0;
      transition: opacity .15s ease;
      pointer-events:none;
      max-width: 92vw;
      font-weight: 950;
      font-size: 13px;
    }
    #toast.show{ opacity:1; }

    /* mobile */
    @media (max-width:480px){
      .dirt{ width:50px;height:50px;font-size:24px; }
      .stage{ min-height: 40dvh; }
    }
  </style>
</head>
<body>
  <div id="wrap" data-view="pc" data-run="play">
    <main class="stage" role="application" aria-label="Bath game">
      <div id="layer" class="layer"></div>
    </main>

    <section class="hud" aria-label="HUD">
      <div class="row">
        <span class="pill">Score <b id="tScore">0</b></span>
        <span class="pill">Clean <b id="tClean">0</b></span>
        <span class="pill">Mistake <b id="tMistake">0</b></span>
        <span class="pill">Combo <b id="tCombo">0</b></span>
        <span class="pill">Time <b id="tTime">0</b>s</span>
      </div>

      <div class="barWrap">
        <div>
          <div class="barLabel"><span>Clean Meter</span><b id="tMeter">0%</b></div>
          <div class="barTrack"><div class="barFill" id="bMeter" style="width:0%"></div></div>
        </div>
        <div>
          <div class="barLabel"><span>Germ Risk</span><b id="tRisk">0%</b></div>
          <div class="barTrack"><div class="barFill bad" id="bRisk" style="width:0%"></div></div>
        </div>
      </div>

      <div class="controls">
        <button class="btn primary" id="btnStart" type="button">▶ เริ่มเกม</button>
        <button class="btn cyan" id="btnRetry" type="button">↻ เล่นใหม่</button>
        <button class="btn" id="btnPause" type="button">⏸ Pause/Resume</button>
        <button class="btn ghost" id="btnBack" type="button">🏰 กลับ HUB</button>
      </div>
    </section>
  </div>

  <!-- End overlay -->
  <section id="end" hidden>
    <div class="endCard">
      <div class="endHead">
        <div class="endTitle">สรุปผล — BathVR</div>
        <span class="pill">Reason <b id="tReason">time</b></span>
      </div>

      <div class="grid">
        <div class="item"><div class="k">Score</div><div class="v" id="sScore">0</div></div>
        <div class="item"><div class="k">Cleaned</div><div class="v" id="sClean">0</div></div>
        <div class="item"><div class="k">Mistakes</div><div class="v" id="sMistake">0</div></div>

        <div class="item"><div class="k">Max Combo</div><div class="v" id="sMaxCombo">0</div></div>
        <div class="item"><div class="k">Accuracy</div><div class="v" id="sAcc">0%</div></div>
        <div class="item"><div class="k">Risk Avg</div><div class="v" id="sRiskAvg">0%</div></div>
      </div>

      <div class="note" id="endNote"></div>

      <div class="endActions">
        <button class="btn cyan" id="btnEndRetry" type="button">↻ เล่นอีกครั้ง</button>
        <a class="btn primary" id="btnEndBack" href="../hub.html">🏰 กลับ HUB</a>
      </div>
    </div>
  </section>

  <div id="toast"></div>

  <script src="./bath.safe.js?v=20260301" defer></script>
</body>
</html>
