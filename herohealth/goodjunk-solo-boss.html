<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk Solo Boss</title>
  <meta name="color-scheme" content="dark light" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="icon" href="./favicon.ico" />
  <style>
    :root{
      --bg1:#071120;
      --bg2:#0f172a;
      --bg3:#13315c;
      --text:#eef6ff;
      --muted:#bfd7ef;
      --panel:rgba(2,6,23,.72);
      --stroke:rgba(255,255,255,.14);
      --good:#7ed957;
      --blue:#7fcfff;
      --warn:#ffd45c;
      --danger:#ff8b7d;
      --shadow:0 24px 72px rgba(0,0,0,.34);
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
      --sar: env(safe-area-inset-right, 0px);
    }

    *{ box-sizing:border-box; }
    html,body{
      margin:0;
      min-height:100%;
      background:
        radial-gradient(900px 520px at 15% 10%, rgba(127,207,255,.18), transparent 58%),
        radial-gradient(800px 520px at 90% 0%, rgba(255,212,92,.14), transparent 58%),
        linear-gradient(180deg,var(--bg1),var(--bg2) 54%,var(--bg3));
      color:var(--text);
      font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans Thai",sans-serif;
    }

    body{
      overflow:hidden;
    }

    #gameMount{
      position:fixed;
      inset:0;
      overflow:hidden;
    }

    .boot-overlay{
      position:fixed;
      inset:0;
      z-index:999;
      display:grid;
      place-items:center;
      padding:
        calc(16px + var(--sat))
        calc(16px + var(--sar))
        calc(16px + var(--sab))
        calc(16px + var(--sal));
      background:
        radial-gradient(680px 360px at 18% 12%, rgba(56,189,248,.14), transparent 58%),
        radial-gradient(640px 360px at 82% 8%, rgba(250,204,21,.12), transparent 58%),
        linear-gradient(180deg,#071120,#0f172a 58%,#13315c);
    }

    .boot-card{
      width:min(92vw,760px);
      border-radius:30px;
      border:1px solid var(--stroke);
      background:var(--panel);
      backdrop-filter:blur(12px);
      box-shadow:var(--shadow);
      padding:24px 20px;
      text-align:center;
      position:relative;
      overflow:hidden;
    }

    .boot-card::before{
      content:"";
      position:absolute;
      width:180px;
      height:180px;
      left:-44px;
      top:-44px;
      border-radius:999px;
      background:rgba(127,207,255,.16);
      filter:blur(12px);
      pointer-events:none;
    }

    .boot-card::after{
      content:"";
      position:absolute;
      width:180px;
      height:180px;
      right:-44px;
      bottom:-44px;
      border-radius:999px;
      background:rgba(255,212,92,.14);
      filter:blur(12px);
      pointer-events:none;
    }

    .boot-inner{
      position:relative;
      z-index:1;
    }

    .boot-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:38px;
      padding:8px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.06);
      color:#e0f2fe;
      font-size:12px;
      font-weight:1000;
    }

    .boot-hero{
      margin:16px auto 0;
      width:108px;
      height:108px;
      border-radius:30px;
      display:grid;
      place-items:center;
      font-size:54px;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.22), transparent 40%),
        linear-gradient(135deg, rgba(34,197,94,.22), rgba(56,189,248,.20));
      border:1px solid rgba(255,255,255,.16);
      box-shadow:0 16px 34px rgba(0,0,0,.20);
      animation: floaty 3.2s ease-in-out infinite;
    }

    .boot-title{
      margin:16px 0 0;
      font-size:clamp(32px,4.8vw,54px);
      line-height:1.02;
      font-weight:1000;
      letter-spacing:-.02em;
    }

    .boot-sub{
      margin-top:10px;
      color:var(--muted);
      font-size:16px;
      line-height:1.65;
      font-weight:900;
    }

    .boot-status{
      margin-top:16px;
      display:grid;
      gap:10px;
    }

    .boot-pill{
      min-height:46px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      color:#eef6ff;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:10px 12px;
      font-size:14px;
      line-height:1.55;
      font-weight:1000;
    }

    .boot-spinner{
      margin:14px auto 0;
      width:52px;
      height:52px;
      border-radius:999px;
      border:4px solid rgba(255,255,255,.16);
      border-top-color:#7fcfff;
      animation: spin 1s linear infinite;
    }

    .boot-actions{
      margin-top:16px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .boot-btn{
      min-height:50px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.06);
      color:#fff;
      font-size:15px;
      font-weight:1000;
      cursor:pointer;
      padding:12px 16px;
      box-shadow:0 10px 24px rgba(0,0,0,.16);
    }

    .boot-btn.primary{
      background:linear-gradient(180deg, rgba(34,197,94,.24), rgba(34,197,94,.14));
      border-color:rgba(34,197,94,.34);
    }

    .boot-btn.info{
      background:linear-gradient(180deg, rgba(56,189,248,.24), rgba(56,189,248,.14));
      border-color:rgba(56,189,248,.34);
    }

    .boot-debug{
      margin-top:16px;
      text-align:left;
      white-space:pre-wrap;
      word-break:break-word;
      overflow:auto;
      max-height:240px;
      padding:14px;
      border-radius:18px;
      background:rgba(127,29,29,.28);
      border:1px solid rgba(239,68,68,.22);
      color:#fecaca;
      font:600 12px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace;
      display:none;
    }

    .boot-debug.show{
      display:block;
    }

    @keyframes spin{
      to{ transform:rotate(360deg); }
    }

    @keyframes floaty{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-6px); }
    }

    @media (max-width:640px){
      .boot-card{ border-radius:24px; padding:20px 16px; }
      .boot-hero{ width:92px; height:92px; font-size:46px; }
      .boot-title{ font-size:34px; }
    }

    @media (prefers-reduced-motion: reduce){
      *,
      *::before,
      *::after{
        animation:none !important;
        transition:none !important;
      }
    }
  </style>
</head>
<body>
  <div id="gameMount"></div>

  <div id="bootOverlay" class="boot-overlay">
    <div class="boot-card">
      <div class="boot-inner">
        <div class="boot-badge">HeroHealth • GoodJunk Solo Boss</div>
        <div class="boot-hero">🍔⚔️</div>
        <h1 class="boot-title">กำลังเตรียมด่านบอส</h1>
        <div class="boot-sub" id="bootSub">
          ระบบกำลังตรวจ warmup ของวันนี้ และเตรียมเข้าสู่ด่านบอสให้พร้อม
        </div>

        <div class="boot-status">
          <div class="boot-pill" id="bootStatusLine">กำลังโหลด…</div>
        </div>

        <div class="boot-spinner" id="bootSpinner"></div>

        <div class="boot-actions" id="bootActions" style="display:none">
          <button class="boot-btn primary" id="btnRetry" type="button">ลองใหม่</button>
          <button class="boot-btn info" id="btnLauncher" type="button">กลับ Launcher</button>
          <button class="boot-btn" id="btnHub" type="button">กลับ HUB</button>
        </div>

        <pre id="bootDebug" class="boot-debug"></pre>
      </div>
    </div>
  </div>

  <script>
    (() => {
      'use strict';

      const q = new URLSearchParams(location.search);
      const DEBUG = q.get('debug') === '1';

      const $ = (id) => document.getElementById(id);

      function clean(v, d=''){
        const s = String(v ?? '').trim();
        return s || d;
      }

      function bangkokDateKey(){
        try{
          const parts = new Intl.DateTimeFormat('en-CA', {
            timeZone:'Asia/Bangkok',
            year:'numeric',
            month:'2-digit',
            day:'2-digit'
          }).formatToParts(new Date());
          const m = {};
          parts.forEach(p => { if (p.type !== 'literal') m[p.type] = p.value; });
          return `${m.year}-${m.month}-${m.day}`;
        }catch(_){
          const d = new Date();
          return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }
      }

      function buildUrl(path, extra = {}){
        const u = new URL(path, location.href);
        Object.entries(extra).forEach(([k, v]) => {
          if (v !== undefined && v !== null && v !== '') {
            u.searchParams.set(k, String(v));
          }
        });
        return u.toString();
      }

      function readGateDone(pid){
        try{
          const day = bangkokDateKey();
          const key = `HHA_GATE_DONE_V1:${pid}:nutrition:goodjunk:warmup:${day}`;
          return localStorage.getItem(key) === '1';
        }catch(_){
          return false;
        }
      }

      function buildHubRootUrl(){
        return clean(
          q.get('hubRoot'),
          q.get('hub'),
          new URL('./hub.html', location.href).toString()
        );
      }

      function buildLauncherUrl(hubRoot){
        if (q.get('launcher')) {
          try { return new URL(q.get('launcher'), location.href).toString(); }
          catch(_) {}
        }

        return buildUrl('./goodjunk-launcher.html', {
          pid: clean(q.get('pid'), 'anon'),
          nick: clean(q.get('name'), q.get('nick'), 'Hero'),
          diff: clean(q.get('diff'), 'normal'),
          time: clean(q.get('time'), '80'),
          view: clean(q.get('view'), 'mobile'),
          run: clean(q.get('run'), 'play'),
          hub: hubRoot,
          studyId: clean(q.get('studyId'), ''),
          conditionGroup: clean(q.get('conditionGroup'), ''),
          sbUrl: clean(q.get('sbUrl'), ''),
          sbAnon: clean(q.get('sbAnon'), ''),
          debug: DEBUG ? '1' : ''
        });
      }

      const hubRoot = buildHubRootUrl();
      const launcherUrl = buildLauncherUrl(hubRoot);

      const ctx = {
        pid: clean(q.get('pid'), 'anon'),
        name: clean(q.get('name'), q.get('nick'), q.get('nickName'), 'Hero'),
        studyId: clean(q.get('studyId'), ''),
        diff: clean(q.get('diff'), 'normal'),
        time: clean(q.get('time'), '80'),
        seed: clean(q.get('seed'), String(Date.now())),
        view: clean(q.get('view'), 'mobile'),
        run: clean(q.get('run'), 'play'),
        gameId: clean(q.get('gameId'), 'goodjunk'),
        zone: clean(q.get('zone'), 'nutrition'),
        mode: 'solo',
        entry: 'solo-boss',
        phaseBoss: '1',
        boss: '1',
        theme: 'phaseboss',
        hubRoot,
        launcher: launcherUrl,
        hub: launcherUrl
      };

      function setStatus(text){
        const el = $('bootStatusLine');
        if (el) el.textContent = text;
      }

      function showError(err){
        const spinner = $('bootSpinner');
        const actions = $('bootActions');
        const debug = $('bootDebug');
        const sub = $('bootSub');

        if (spinner) spinner.style.display = 'none';
        if (actions) actions.style.display = 'flex';
        if (sub) sub.textContent = 'โหลดด่านบอสไม่สำเร็จ ลองใหม่หรือกลับไปหน้า launcher ได้เลย';

        setStatus('โหลดไม่สำเร็จ');

        if (debug) {
          debug.textContent = String(err?.stack || err || 'Unknown error');
          debug.classList.add('show');
        }
      }

      function hideBoot(){
        const overlay = $('bootOverlay');
        if (overlay) overlay.style.display = 'none';
      }

      function buildSelfRunUrlWithWgskip(){
        return buildUrl('./goodjunk-solo-boss.html', {
          pid: ctx.pid,
          name: ctx.name,
          studyId: ctx.studyId,
          diff: ctx.diff,
          time: ctx.time,
          seed: ctx.seed,
          view: ctx.view,
          run: ctx.run,
          gameId: ctx.gameId,
          zone: ctx.zone,
          hubRoot: ctx.hubRoot,
          launcher: ctx.launcher,
          hub: ctx.hubRoot,
          wgskip: '1',
          entry: ctx.entry,
          phaseBoss: ctx.phaseBoss,
          boss: ctx.boss,
          theme: ctx.theme,
          debug: DEBUG ? '1' : ''
        });
      }

      function buildWarmupUrl(nextUrl){
        return buildUrl('./warmup-gate.html', {
          phase: 'warmup',
          gatePhase: 'warmup',
          mode: 'solo',
          cat: 'nutrition',
          zone: 'nutrition',
          game: 'goodjunk',
          gameId: 'goodjunk',
          theme: 'goodjunk',
          pid: ctx.pid,
          name: ctx.name,
          studyId: ctx.studyId,
          diff: ctx.diff,
          time: ctx.time,
          view: ctx.view,
          run: ctx.run,
          seed: ctx.seed,
          hub: ctx.launcher,
          hubRoot: ctx.hubRoot,
          launcher: ctx.launcher,
          next: nextUrl,
          entry: ctx.entry,
          phaseBoss: ctx.phaseBoss,
          boss: ctx.boss,
          debug: DEBUG ? '1' : ''
        });
      }

      function markLastMode(){
        try{
          localStorage.setItem(`GJ_LAST_MODE:${ctx.pid}`, 'solo');
          localStorage.setItem(`GJ_LAST_RUN_URL:${ctx.pid}`, buildSelfRunUrlWithWgskip());
        }catch(_){}
      }

      window.__GJ_RUN_CTX__ = ctx;
      window.__GJ_HIDE_LOADING__ = hideBoot;
      window.__GJ_SHOW_BOOT_ERROR__ = showError;

      $('btnRetry')?.addEventListener('click', () => location.reload());
      $('btnLauncher')?.addEventListener('click', () => { location.href = ctx.launcher; });
      $('btnHub')?.addEventListener('click', () => { location.href = ctx.hubRoot; });

      try{
        if (!clean(q.get('wgskip'))) {
          setStatus('กำลังตรวจ warmup ของวันนี้…');

          if (!readGateDone(ctx.pid)) {
            setStatus('ยังไม่ได้ warmup วันนี้ กำลังพาไป warmup…');
            location.replace(buildWarmupUrl(buildSelfRunUrlWithWgskip()));
            return;
          }
        }

        markLastMode();
        setStatus('warmup พร้อมแล้ว กำลังโหลดด่านบอส…');

        const script = document.createElement('script');
        script.src = './goodjunk-solo-phaseboss-v2.js?v=20260407-goodjunk-boss-flow';
        script.defer = true;
        script.onerror = () => showError('โหลดไฟล์ goodjunk-solo-phaseboss-v2.js ไม่สำเร็จ');
        document.body.appendChild(script);
      }catch(err){
        showError(err);
      }
    })();
  </script>
</body>
</html>
