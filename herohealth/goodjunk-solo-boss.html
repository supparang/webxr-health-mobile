<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk Solo Boss</title>
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#9fe3ff" />
  <link rel="icon" href="./favicon.ico" />
  <style>
    :root{
      --bg1:#dff6ff;
      --bg2:#bfe8ff;
      --bg3:#fff7d4;
      --ink:#4f4a43;
      --muted:#7a766f;
      --line:#cae6ef;
      --blue:#76cfff;
      --blue2:#58b7f5;
      --green:#7ed957;
      --green2:#58c33f;
      --yellow:#ffd861;
      --card:#fffdf7;
      --shadow:0 14px 34px rgba(59,120,170,.16);
      --radius:24px;
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
      --sar: env(safe-area-inset-right, 0px);
    }

    *{ box-sizing:border-box; }
    html,body{
      margin:0;
      min-height:100%;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.95), rgba(255,255,255,0) 38%),
        linear-gradient(180deg,var(--bg1),var(--bg2) 48%,var(--bg3));
      color:var(--ink);
      font-family:ui-rounded,"SF Pro Rounded","Nunito","Prompt","Kanit",system-ui,-apple-system,sans-serif;
    }

    body{
      overflow:hidden;
      touch-action:manipulation;
    }

    #gameMount{
      position:fixed;
      inset:0;
      overflow:hidden;
    }

    .boot-layer{
      position:fixed;
      inset:0;
      z-index:200;
      display:grid;
      place-items:center;
      padding:
        calc(16px + var(--sat))
        calc(16px + var(--sar))
        calc(16px + var(--sab))
        calc(16px + var(--sal));
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.95), rgba(255,255,255,0) 38%),
        linear-gradient(180deg,var(--bg1),var(--bg2) 48%,var(--bg3));
    }

    .boot-card{
      width:min(92vw,720px);
      border-radius:30px;
      background:linear-gradient(180deg,#fff,#f8fdff);
      border:1px solid #d7edf7;
      box-shadow:var(--shadow);
      padding:22px 18px;
      text-align:center;
      color:var(--ink);
    }

    .boot-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:36px;
      padding:8px 14px;
      border-radius:999px;
      background:#eefbff;
      border:1px solid #d7edf7;
      color:#5e7b9a;
      font-size:12px;
      font-weight:1000;
    }

    .boot-icon{
      width:96px;
      height:96px;
      margin:14px auto 0;
      border-radius:28px;
      display:grid;
      place-items:center;
      font-size:48px;
      background:linear-gradient(180deg,#fff8d6,#fff);
      box-shadow:inset 0 0 0 1px #ffecc0, 0 10px 24px rgba(255,185,70,.18);
    }

    .boot-title{
      margin:14px 0 0;
      font-size:clamp(26px,4vw,38px);
      line-height:1.05;
      font-weight:1000;
      color:#67a91c;
    }

    .boot-sub{
      margin:10px auto 0;
      max-width:620px;
      color:var(--muted);
      font-size:15px;
      line-height:1.6;
      font-weight:900;
    }

    .boot-route{
      margin-top:14px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .boot-chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:34px;
      padding:7px 12px;
      border-radius:999px;
      background:#f7fcff;
      border:1px solid #e2f1fb;
      color:#5f7094;
      font-size:12px;
      font-weight:1000;
    }

    .boot-actions{
      margin-top:16px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .boot-btn{
      appearance:none;
      border:0;
      border-radius:18px;
      min-height:50px;
      padding:12px 18px;
      font-size:15px;
      font-weight:1000;
      cursor:pointer;
      box-shadow:0 10px 20px rgba(86,155,194,.12);
    }

    .boot-btn.primary{
      background:linear-gradient(180deg,var(--green),var(--green2));
      color:#173b0b;
    }

    .boot-btn.secondary{
      background:linear-gradient(180deg,var(--blue),var(--blue2));
      color:#08374d;
    }

    .boot-btn.ghost{
      background:#fff;
      color:#6c6a61;
      border:2px solid #d7edf7;
    }

    .boot-error{
      margin-top:14px;
      text-align:left;
      white-space:pre-wrap;
      word-break:break-word;
      overflow:auto;
      max-height:34vh;
      border-radius:18px;
      background:#fff7f7;
      border:1px solid #ffd2d2;
      color:#b3472d;
      padding:12px 14px;
      font:700 12px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace;
      display:none;
    }

    .boot-error.show{
      display:block;
    }

    @media (max-width:640px){
      .boot-card{
        border-radius:24px;
        padding:18px 14px;
      }
      .boot-icon{
        width:82px;
        height:82px;
        font-size:40px;
      }
      .boot-actions{
        flex-direction:column;
      }
      .boot-btn{
        width:100%;
      }
    }
  </style>
</head>
<body>
  <div id="gameMount"></div>

  <div id="bootLayer" class="boot-layer">
    <div class="boot-card">
      <div class="boot-badge">HeroHealth • GoodJunk Solo Boss</div>
      <div class="boot-icon">👑</div>
      <h1 class="boot-title">กำลังเข้า Boss</h1>
      <div class="boot-sub" id="bootSub">
        ระบบกำลังเตรียม flow แบบเต็ม<br>
        warmup → boss → cooldown → launcher
      </div>

      <div class="boot-route">
        <div class="boot-chip" id="chipDiff">diff: normal</div>
        <div class="boot-chip" id="chipTime">time: 80s</div>
        <div class="boot-chip" id="chipView">view: mobile</div>
      </div>

      <div class="boot-actions">
        <button id="bootReloadBtn" class="boot-btn secondary" type="button">ลองใหม่</button>
        <button id="bootLauncherBtn" class="boot-btn primary" type="button">กลับ Launcher</button>
        <button id="bootHubBtn" class="boot-btn ghost" type="button">กลับหน้าหลัก</button>
      </div>

      <pre id="bootErrorBox" class="boot-error"></pre>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      const q = new URLSearchParams(location.search);

      function qs(name, fallback=''){
        try { return q.get(name) ?? fallback; }
        catch (_) { return fallback; }
      }

      function clean(v, fallback=''){
        const s = String(v ?? '').trim();
        return s || fallback;
      }

      function buildUrl(path, extra = {}){
        const u = new URL(path, location.href);
        Object.entries(extra).forEach(([k, v]) => {
          if (v !== undefined && v !== null && v !== '') {
            u.searchParams.set(k, String(v));
          }
        });
        return u.toString();
      }

      function safeAbsUrl(raw, fallback=''){
        const value = String(raw || '').trim();
        try{
          if (value) return new URL(value, location.href).toString();
        }catch(_){}
        return String(fallback || '');
      }

      function buildHubRootUrl(){
        return safeAbsUrl(
          qs('hubRoot', qs('hub', '')),
          new URL('./hub.html', location.href).toString()
        );
      }

      function buildLauncherFallbackUrl(){
        return buildUrl('./goodjunk-launcher.html', {
          pid: clean(qs('pid','anon'), 'anon'),
          nick: clean(qs('nick', qs('name','Hero')), 'Hero'),
          diff: clean(qs('diff','normal'), 'normal'),
          time: clean(qs('time','80'), '80'),
          view: clean(qs('view','mobile'), 'mobile'),
          hub: buildHubRootUrl(),
          studyId: clean(qs('studyId','')),
          conditionGroup: clean(qs('conditionGroup','')),
          log: clean(qs('log','')),
          ai: clean(qs('ai','')),
          pro: clean(qs('pro','')),
          research: clean(qs('research','')),
          seed: clean(qs('seed','')),
          run: clean(qs('run','play')),
          debug: qs('debug','') === '1' ? '1' : ''
        });
      }

      const HUB_ROOT_URL = buildHubRootUrl();
      const LAUNCHER_URL = safeAbsUrl(
        qs('launcher',''),
        buildLauncherFallbackUrl()
      );

      const ctx = {
        pid: clean(qs('pid','anon'), 'anon'),
        name: clean(qs('name', qs('nick','Hero')), 'Hero'),
        nick: clean(qs('nick', qs('name','Hero')), 'Hero'),
        studyId: clean(qs('studyId','')),
        diff: clean(qs('diff','normal'), 'normal'),
        time: clean(qs('time','150'), '150'),
        seed: clean(qs('seed', String(Date.now())), String(Date.now())),
        hub: clean(qs('hub', LAUNCHER_URL), LAUNCHER_URL),
        hubRoot: HUB_ROOT_URL,
        launcher: LAUNCHER_URL,
        cdnext: clean(qs('cdnext', LAUNCHER_URL), LAUNCHER_URL),
        view: clean(qs('view','mobile'), 'mobile'),
        run: clean(qs('run','play'), 'play'),
        gameId: clean(qs('gameId','goodjunk'), 'goodjunk'),
        zone: clean(qs('zone','nutrition'), 'nutrition'),
        roomId: clean(qs('roomId','')),
        conditionGroup: clean(qs('conditionGroup','')),
        log: clean(qs('log','')),
        ai: clean(qs('ai','')),
        pro: clean(qs('pro','')),
        research: clean(qs('research','')),
        debug: qs('debug','') === '1'
      };

      window.__GJ_RUN_CTX__ = ctx;

      const bootLayer = document.getElementById('bootLayer');
      const bootSub = document.getElementById('bootSub');
      const chipDiff = document.getElementById('chipDiff');
      const chipTime = document.getElementById('chipTime');
      const chipView = document.getElementById('chipView');
      const bootErrorBox = document.getElementById('bootErrorBox');

      chipDiff.textContent = `diff: ${ctx.diff}`;
      chipTime.textContent = `time: ${ctx.time}s`;
      chipView.textContent = `view: ${ctx.view}`;

      document.getElementById('bootReloadBtn')?.addEventListener('click', () => {
        location.reload();
      });

      document.getElementById('bootLauncherBtn')?.addEventListener('click', () => {
        location.href = LAUNCHER_URL;
      });

      document.getElementById('bootHubBtn')?.addEventListener('click', () => {
        location.href = HUB_ROOT_URL;
      });

      window.__GJ_HIDE_LOADING__ = function () {
        if (bootLayer) bootLayer.style.display = 'none';
      };

      window.__GJ_SHOW_BOOT_ERROR__ = function (err) {
        if (bootLayer) bootLayer.style.display = 'grid';
        if (bootSub) {
          bootSub.innerHTML =
            'เกิดปัญหาระหว่างโหลดหน้า Boss<br>' +
            'แต่ยังกลับ Launcher หรือหน้าหลักได้';
        }
        if (bootErrorBox) {
          bootErrorBox.textContent = String(err || 'Unknown boot error');
          bootErrorBox.classList.add('show');
        }
      };

      window.addEventListener('error', function (ev) {
        const msg = ev?.error?.stack || ev?.message || 'Unknown runtime error';
        window.__GJ_SHOW_BOOT_ERROR__(msg);
      });

      window.addEventListener('unhandledrejection', function (ev) {
        const reason = ev?.reason?.stack || ev?.reason || 'Unhandled promise rejection';
        window.__GJ_SHOW_BOOT_ERROR__(reason);
      });

      if (ctx.debug) {
        console.log('[GJ SOLO BOSS SHELL]', {
          hub: ctx.hub,
          hubRoot: ctx.hubRoot,
          launcher: ctx.launcher,
          cdnext: ctx.cdnext,
          seed: ctx.seed,
          diff: ctx.diff,
          time: ctx.time,
          view: ctx.view
        });
      }
    })();
  </script>

  <script src="./goodjunk-solo-phaseboss-v2.js?v=20260408a-GJSB-FLOW-HUBROOT-LAUNCHER-FINAL"></script>
</body>
</html>
