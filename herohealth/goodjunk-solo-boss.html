<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk Solo Boss</title>
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#9fe3ff" />
  <link rel="icon" href="./favicon.ico" />

  <style>
    :root{
      --sky1:#dff4ff;
      --sky2:#bfe8ff;
      --sky3:#fff7d8;
      --line:#bfe3f2;
      --text:#4d4a42;
      --muted:#7b7a72;
      --card:#fffdf6;
      --panel:#ffffffee;
      --green:#7ed957;
      --green2:#58c33f;
      --blue:#7fcfff;
      --blue2:#58b7f5;
      --yellow:#ffd45c;
      --orange:#ffb547;
      --shadow:0 16px 40px rgba(59,120,170,.16);
      --radius:24px;
    }

    *{ box-sizing:border-box; }
    html,body{
      margin:0;
      min-height:100%;
    }

    body{
      font-family:ui-rounded,"SF Pro Rounded","Nunito","Prompt","Kanit",system-ui,-apple-system,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.95), rgba(255,255,255,0) 38%),
        linear-gradient(180deg,var(--sky1),var(--sky2) 48%,var(--sky3));
      overflow:hidden;
    }

    #gameMount{
      position:fixed;
      inset:0;
      overflow:hidden;
    }

    .boot-layer{
      position:fixed;
      inset:0;
      z-index:999;
      display:grid;
      place-items:center;
      padding:18px;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.95), rgba(255,255,255,0) 38%),
        linear-gradient(180deg,var(--sky1),var(--sky2) 48%,var(--sky3));
    }

    .boot-card{
      width:min(92vw,760px);
      border-radius:32px;
      border:1px solid rgba(255,255,255,.92);
      background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(255,255,255,.90));
      box-shadow:var(--shadow);
      padding:22px 20px;
      text-align:center;
    }

    .boot-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:36px;
      padding:8px 14px;
      border-radius:999px;
      background:#ffffffd9;
      color:#5b6f93;
      font-size:12px;
      font-weight:1000;
      border:1px solid #e3f0fb;
      box-shadow:0 8px 20px rgba(76,133,180,.10);
    }

    .boot-emoji{
      margin:16px auto 8px;
      width:108px;
      height:108px;
      border-radius:30px;
      display:grid;
      place-items:center;
      font-size:52px;
      background:linear-gradient(180deg,#fff,#f7fcff);
      border:1px solid rgba(255,255,255,.9);
      box-shadow:var(--shadow);
      animation: floaty 2.8s ease-in-out infinite;
    }

    .boot-title{
      margin:6px 0 0;
      font-size:clamp(28px,5vw,46px);
      line-height:1.02;
      font-weight:1000;
    }

    .boot-sub{
      margin:10px auto 0;
      max-width:640px;
      color:var(--muted);
      font-size:15px;
      line-height:1.65;
      font-weight:900;
    }

    .boot-progress{
      margin:18px auto 0;
      width:min(92%,520px);
      height:14px;
      border-radius:999px;
      background:#eef8ff;
      border:1px solid #d8edf9;
      overflow:hidden;
      box-shadow:inset 0 2px 8px rgba(76,133,180,.08);
    }

    .boot-progress > div{
      width:48%;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg,var(--green),var(--blue));
      animation: loadingBar 1.3s ease-in-out infinite alternate;
    }

    .boot-note{
      margin-top:12px;
      color:#6b7a99;
      font-size:13px;
      font-weight:900;
    }

    .boot-actions{
      margin-top:18px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .boot-btn{
      appearance:none;
      border:0;
      border-radius:18px;
      min-height:48px;
      padding:12px 16px;
      font-size:15px;
      font-weight:1000;
      cursor:pointer;
      box-shadow:var(--shadow);
    }

    .boot-btn.primary{
      background:linear-gradient(180deg,var(--blue),var(--blue2));
      color:#fff;
    }

    .boot-btn.secondary{
      background:#fff;
      color:var(--text);
      border:1px solid #d8edf9;
    }

    .boot-error{
      margin-top:16px;
      text-align:left;
      padding:14px;
      border-radius:20px;
      background:#fff5f5;
      border:1px solid #ffd6d6;
      color:#8b3a3a;
      font:600 12px/1.6 ui-monospace,SFMono-Regular,Menlo,monospace;
      white-space:pre-wrap;
      word-break:break-word;
      overflow:auto;
      max-height:34vh;
    }

    @keyframes floaty{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-6px); }
    }

    @keyframes loadingBar{
      from{ width:36%; }
      to{ width:82%; }
    }

    @media (max-width:640px){
      .boot-card{
        border-radius:24px;
        padding:18px 16px;
      }
      .boot-emoji{
        width:92px;
        height:92px;
        font-size:44px;
        border-radius:26px;
      }
      .boot-actions{
        flex-direction:column;
      }
      .boot-btn{
        width:100%;
      }
    }
  </style>
</head>
<body>
  <div id="gameMount"></div>

  <div class="boot-layer" id="bootLayer">
    <div class="boot-card">
      <div class="boot-badge">HeroHealth • GoodJunk • Solo Boss</div>
      <div class="boot-emoji">🍔🥦</div>
      <h1 class="boot-title">กำลังเตรียมด่านบอส</h1>
      <div class="boot-sub">
        เตรียมสนาม เป้าหมาย และพลังของฮีโร่ให้อยู่ในโหมดพร้อมเล่น
      </div>

      <div class="boot-progress"><div></div></div>
      <div class="boot-note" id="bootNote">กำลังโหลด phase boss engine...</div>

      <div class="boot-actions">
        <button class="boot-btn secondary" id="btnBootHub" type="button">กลับ HUB</button>
        <button class="boot-btn primary" id="btnBootRetry" type="button" style="display:none;">ลองใหม่</button>
      </div>

      <div class="boot-error" id="bootError" hidden></div>
    </div>
  </div>

  <script>
    (function(){
      'use strict';

      const bootLayer = document.getElementById('bootLayer');
      const bootNote  = document.getElementById('bootNote');
      const bootError = document.getElementById('bootError');
      const btnHub    = document.getElementById('btnBootHub');
      const btnRetry  = document.getElementById('btnBootRetry');

      function qs(name, fallback=''){
        try{ return new URL(location.href).searchParams.get(name) ?? fallback; }
        catch(_){ return fallback; }
      }

      function safeHub(){
        const raw = String(qs('hub','')).trim();
        try{
          if(raw){
            const href = new URL(raw, location.href).href;
            if(
              href.includes('/herohealth/hub.html') ||
              href.includes('/herohealth/hub-v2.html')
            ){
              return href;
            }
          }
        }catch(_){}
        return new URL('./hub-v2.html', location.href).href;
      }

      function esc(s=''){
        return String(s)
          .replaceAll('&','&amp;')
          .replaceAll('<','&lt;')
          .replaceAll('>','&gt;')
          .replaceAll('"','&quot;');
      }

      window.__GJ_HIDE_LOADING__ = function(){
        if(bootLayer) bootLayer.style.display = 'none';
      };

      window.__GJ_SHOW_BOOT_ERROR__ = function(err){
        if(bootNote) bootNote.textContent = 'โหลดเกมไม่สำเร็จ';
        if(bootError){
          bootError.hidden = false;
          bootError.innerHTML = esc(err || 'Unknown error');
        }
        if(btnRetry) btnRetry.style.display = '';
      };

      window.__GJ_RUN_CTX__ = {
        pid: qs('pid','anon'),
        name: qs('name', qs('nick', qs('nickName','Hero'))),
        studyId: qs('studyId',''),
        roomId: qs('room',''),
        conditionGroup: qs('conditionGroup',''),

        diff: qs('diff','normal'),
        time: qs('time','150'),
        seed: qs('seed', String(Date.now())),
        hub: qs('hub', safeHub()),
        view: qs('view','mobile'),
        run: qs('run','play'),

        game: qs('game','goodjunk'),
        gameId: qs('gameId','goodjunk'),
        theme: qs('theme','goodjunk'),
        zone: qs('zone','nutrition'),
        cat: qs('cat','nutrition'),

        mode: qs('mode','solo'),
        entry: qs('entry','solo-boss'),
        phaseBoss: qs('phaseBoss','1'),
        boss: qs('boss','1'),

        sbUrl: qs('sbUrl',''),
        sbAnon: qs('sbAnon',''),

        log: qs('log',''),
        ai: qs('ai',''),
        pro: qs('pro',''),
        research: qs('research',''),

        planSeq: qs('planSeq',''),
        planDay: qs('planDay',''),
        planSlot: qs('planSlot',''),
        planMode: qs('planMode',''),
        planSlots: qs('planSlots',''),
        planIndex: qs('planIndex',''),

        cdnext: qs('cdnext','')
      };

      btnHub?.addEventListener('click', () => {
        location.href = safeHub();
      });

      btnRetry?.addEventListener('click', () => {
        location.reload();
      });
    })();
  </script>

  <script defer src="./goodjunk-solo-phaseboss-v2.js?v=20260407-phaseboss-flow-fix"></script>
</body>
</html>
