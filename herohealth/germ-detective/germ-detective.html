Germ Detective — RUN (PC/Mobile/cVR) — PRODUCTION
PATCH v20260304-GD-RUN-FOLDER-A
✅ Loads: /herohealth/vr/vr-ui.js (ENTER VR + crosshair + hha:shoot)
✅ Loads: ./plate.safe.js + ./plate-logger-bridge.js (if present)
✅ Boots: ./germ-detective.boot.js (imports ./germ-detective.js core)
✅ No Apps Script required
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth — Germ Detective (Run)</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="../favicon.ico" />
  <style>
    :root{
      --bg:#020617;
      --stroke:rgba(148,163,184,.18);
      --text:#e5e7eb;
      --muted:#94a3b8;
      --sab: env(safe-area-inset-bottom, 0px);
      --sat: env(safe-area-inset-top, 0px);
      --sal: env(safe-area-inset-left, 0px);
      --sar: env(safe-area-inset-right, 0px);
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:var(--bg);color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans Thai",sans-serif}
    #app{
      position:relative;
      min-height:100%;
      padding: calc(10px + var(--sat)) calc(10px + var(--sar)) calc(12px + var(--sab)) calc(10px + var(--sal));
    }
    /* optional: help tiny debug line */
    #gdPathBar{
      position:fixed; left:12px; bottom:calc(12px + var(--sab));
      z-index:9995;
      border:1px solid var(--stroke);
      background:rgba(2,6,23,.55);
      padding:6px 10px;
      border-radius:999px;
      color:rgba(229,231,235,.88);
      font-weight:900;
      font-size:12px;
      display:none;
      pointer-events:none;
      backdrop-filter: blur(10px);
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <div id="gdPathBar"></div>

  <!-- ✅ Universal VR UI (must be BEFORE the game core listens hha:shoot) -->
  <script src="../vr/vr-ui.js"></script>

  <!-- Optional: your existing logger scaffold (no Apps Script needed) -->
  <script src="./plate.safe.js"></script>
  <script src="./plate-logger-bridge.js"></script>

  <!-- Boot (ESM) -->
  <script type="module" src="./germ-detective.boot.js"></script>

  <script>
    // show tiny path bar if ?debug=1
    (function(){
      'use strict';
      function qs(k,d=''){ try{ return new URL(location.href).searchParams.get(k) ?? d; }catch{ return d; } }
      if(String(qs('debug','')) !== '1') return;
      const el = document.getElementById('gdPathBar');
      if(!el) return;
      el.style.display = 'inline-flex';
      el.textContent = location.pathname;
    })();
  </script>
</body>
</html>
