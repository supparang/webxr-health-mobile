<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Redirecting… Germ Detective Run</title>
  <script>
    (function(){
      'use strict';

      const RUN_PATH = '/webxr-health-mobile/herohealth/germ-detective/germ-detective.html';
      const q = location.search || '';
      const h = location.hash || '';
      const target = location.origin + RUN_PATH + q + h;

      try{
        location.replace(target);
      }catch(e){
        location.href = target;
      }
    })();
  </script>
</head>
<body></body>
</html>
