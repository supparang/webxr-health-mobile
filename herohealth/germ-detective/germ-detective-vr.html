<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Redirecting… Germ Detective Run</title>
  <script>
    (function(){
      'use strict';

      // ✅ target must be the REAL run page, not this wrapper itself
      const RUN_PATH = '/webxr-health-mobile/herohealth/germ-detective/germ-detective.html';
      const q = location.search || '';
      const h = location.hash || '';
      const target = location.origin + RUN_PATH + q + h;

      // กัน redirect วน ถ้าเผลอชี้ path เดิมอีก
      const current = location.origin + location.pathname + q + h;
      if (current === target) {
        document.addEventListener('DOMContentLoaded', function(){
          document.body.innerHTML =
            '<div style="font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;padding:24px;color:#e5e7eb;background:#020617;min-height:100vh">' +
            '<h2 style="margin:0 0 12px">Redirect loop blocked</h2>' +
            '<div>ไฟล์ wrapper กำลังชี้กลับมาหาตัวเอง</div>' +
            '<div style="margin-top:8px;word-break:break-word">current: ' + current + '</div>' +
            '<div style="margin-top:8px;word-break:break-word">target: ' + target + '</div>' +
            '</div>';
        });
        return;
      }

      try{
        location.replace(target);
      }catch(e){
        location.href = target;
      }
    })();
  </script>
</head>
<body></body>
</html>
