<!doctype html>
<html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><title>HeroHealth • Groups AR Device Check</title><meta name="theme-color" content="#123c3b"><style>:root{--ink:#173b3d;--muted:#647d7e;--good:#37c978;--warn:#ffd75e;--bad:#ff6b6b;--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px)}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:#102f34;color:#fff}button{font:inherit}video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);background:radial-gradient(circle at 50% 20%,#2f6d70,#102f34 72%)}.shade{position:fixed;inset:0;background:linear-gradient(180deg,rgba(2,20,22,.52),rgba(2,20,22,.08) 35%,rgba(2,20,22,.72));pointer-events:none}.app{position:fixed;inset:0;display:grid;grid-template-rows:auto minmax(0,1fr) auto;gap:7px;padding:calc(7px + var(--sat)) 7px calc(7px + var(--sab))}.card,.stat,.bin,.btn,.panel{background:rgba(255,255,255,.88);color:var(--ink);border:1px solid rgba(255,255,255,.55);box-shadow:0 14px 38px rgba(0,0,0,.2);backdrop-filter:blur(13px)}header{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:7px}.card{border-radius:21px;padding:9px 11px}.card h1{margin:0;font-size:clamp(1.08rem,4vw,1.6rem)}.card p{margin:3px 0 0;color:var(--muted);font-weight:800;font-size:.68rem}.stats{display:flex;gap:4px}.stat{min-width:60px;border-radius:17px;padding:6px;text-align:center}.stat small{display:block;color:var(--muted);font-size:.53rem;font-weight:900}.stat b{display:block;font-size:.86rem}.stage{position:relative;min-height:0;border-radius:26px;overflow:hidden;border:1px solid rgba(255,255,255,.28)}.panel{position:absolute;left:8px;right:8px;top:8px;z-index:5;border-radius:18px;padding:8px 10px}.panel b{display:block}.panel small{display:block;margin-top:2px;color:var(--muted);font-weight:800}.cursor{position:absolute;width:58px;height:58px;margin:-29px 0 0 -29px;border-radius:50%;border:4px solid #fff;background:rgba(101,201,255,.3);box-shadow:0 0 0 9px rgba(101,201,255,.14);opacity:0;pointer-events:none;z-index:8}.cursor.show{opacity:1}.cursor.pinch{background:rgba(55,201,120,.5);transform:scale(.78)}.cursor:after{content:"✋";position:absolute;inset:0;display:grid;place-items:center;font-size:25px}.target{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);width:128px;height:128px;border-radius:50%;display:grid;place-items:center;text-align:center;border:4px dashed rgba(255,255,255,.8);background:rgba(7,31,34,.42);font-weight:1000}.bottom{display:grid;gap:6px}.bins{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}.bin{min-height:63px;border-radius:15px;padding:5px 2px;text-align:center;font-weight:1000}.bin.done{outline:4px solid var(--good);transform:translateY(-4px)}.bin span{display:block;font-size:1rem}.bin small{font-size:.52rem}.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}.btn{min-height:43px;border:0;border-radius:15px;padding:6px;font-weight:1000}.btn.primary{background:linear-gradient(180deg,#8cebad,#45ce79)}.btn.warn{background:linear-gradient(180deg,#fff1a9,#ffd75e)}.overlay{position:fixed;inset:0;z-index:30;display:grid;place-items:center;padding:16px;background:rgba(3,22,24,.72);backdrop-filter:blur(10px)}.overlay.hidden{display:none}.sheet{width:min(650px,100%);max-height:93dvh;overflow:auto;border-radius:26px;padding:18px;text-align:center;background:#fff;color:var(--ink)}.sheet h2{margin:0;font-size:1.7rem}.sheet p{color:var(--muted);font-weight:800;line-height:1.45}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin:11px 0}.result{border-radius:15px;padding:9px;background:#f3faf9}.result small{display:block;color:var(--muted);font-weight:800}.result b{display:block;margin-top:3px}.sheetActions{display:flex;justify-content:center;flex-wrap:wrap;gap:7px}.big{min-height:46px;border:0;border-radius:15px;padding:9px 14px;background:linear-gradient(180deg,#8cebad,#45ce79);font-weight:1000}.big.alt{background:#eef7f6;color:var(--ink)}.delivery{margin:9px 0;border-radius:15px;padding:8px;background:#fff8df;color:#725b12;font-weight:850}@media(max-width:720px){header{grid-template-columns:1fr}.stats{justify-content:space-between}.stat{min-width:0;flex:1}.actions{grid-template-columns:repeat(2,1fr)}.target{width:106px;height:106px}.bin{min-height:57px}}</style></head><body>
<video id="camera" autoplay muted playsinline></video><div class="shade"></div><div class="app"><header><section class="card"><h1>🥦 Groups AR Device Check</h1><p>ตรวจกล้อง • มือ • Pinch • FPS • ประตูอาหารทั้ง 5</p></section><section class="stats"><div class="stat"><small>FPS</small><b id="fps">0</b></div><div class="stat"><small>เห็นมือ</small><b id="handRate">0%</b></div><div class="stat"><small>Pinch</small><b id="pinches">0/3</b></div><div class="stat"><small>ประตู</small><b id="drops">0/5</b></div></section></header><main class="stage" id="stage"><section class="panel"><b id="title">เริ่ม Device Check</b><small id="sub">กดเปิดกล้อง ทำท่าหนีบ 3 ครั้ง แล้วปล่อยมือในพื้นที่ประตู 1–5</small></section><div class="target">🤏<br>หนีบในวงนี้</div><div class="cursor" id="cursor"></div></main><footer class="bottom"><section class="bins"><button class="bin" data-g="1"><span>1</span><small>โปรตีน</small></button><button class="bin" data-g="2"><span>2</span><small>ข้าว/แป้ง</small></button><button class="bin" data-g="3"><span>3</span><small>ผัก</small></button><button class="bin" data-g="4"><span>4</span><small>ผลไม้</small></button><button class="bin" data-g="5"><span>5</span><small>ไขมัน</small></button></section><section class="actions"><button class="btn primary" id="start">📷 เปิดกล้อง + มือ</button><button class="btn" id="touch">👆 Touch Check</button><button class="btn warn" id="finish">✅ สรุปผล</button><button class="btn" id="zone">🥗 Zone</button></section></footer></div><div class="overlay hidden" id="summary"><section class="sheet"><h2 id="sumTitle">สรุป Device Check</h2><p id="sumText"></p><div class="grid" id="grid"></div><div class="delivery" id="delivery">ผลจะบันทึกในอุปกรณ์นี้</div><div class="sheetActions"><button class="big" id="play">เริ่ม Groups AR</button><button class="big alt" id="copy">คัดลอก JSON</button><button class="big alt" id="again">ตรวจใหม่</button></div></section></div>
<script type="module">const $=id=>document.getElementById(id),q=new URLSearchParams(location.search),bins=[...document.querySelectorAll('.bin')],VERSION='groups-ar-device-check-v2.0.0';const state={mode:'hand',stream:null,tracker:null,ready:false,frames:0,handFrames:0,pinch:false,pinches:0,drops:new Set(),dists:[],fps:0,lastVideo:-1,lastDetect:0,lastFpsAt:performance.now(),fpsFrames:0,error:'',startedAt:''};const cfg={hub:q.get('hub')||'../nutrition-zone.html',api:q.get('api')||'',log:q.get('log')==='1'},id={studentId:q.get('studentId')||q.get('pid')||'anon',studentName:q.get('studentName')||q.get('name')||'Hero',section:q.get('section')||q.get('classSection')||''};const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),setText=(t,s)=>{$('title').textContent=t;$('sub').textContent=s};function update(){const rate=state.frames?Math.round(state.handFrames/state.frames*100):0;$('fps').textContent=state.fps;$('handRate').textContent=rate+'%';$('pinches').textContent=Math.min(3,state.pinches)+'/3';$('drops').textContent=state.drops.size+'/5';bins.forEach(b=>b.classList.toggle('done',state.drops.has(Number(b.dataset.g))))}function hit(x,y){const r=$('stage').getBoundingClientRect();if(y<r.height*.70)return 0;return clamp(Math.floor(x/Math.max(1,r.width)*5)+1,1,5)}function mark(g){if(!g)return;state.drops.add(g);update();if(state.drops.size===5)setText('ประตูครบทั้ง 5 แล้ว','กดสรุปผลเพื่อสร้างโปรไฟล์สำหรับเครื่องนี้')}async function camera(){state.startedAt=new Date().toISOString();state.mode='hand';try{state.stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}},audio:false});$('camera').srcObject=state.stream;await $('camera').play();setText('กล้องพร้อม','กำลังโหลด Hand Tracking...');await hand()}catch(e){state.error=String(e?.message||e);state.mode='touch';setText('เปิดกล้องไม่ได้','ใช้ Touch Check แทนได้โดยแตะประตู 1–5')}}async function hand(){try{const vision=await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs');const files=await vision.FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm');state.tracker=await vision.HandLandmarker.createFromOptions(files,{baseOptions:{modelAssetPath:'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',delegate:'GPU'},runningMode:'VIDEO',numHands:1,minHandDetectionConfidence:.5,minHandPresenceConfidence:.5,minTrackingConfidence:.45});state.ready=true;setText('Hand Tracking พร้อม','ทำ Pinch 3 ครั้ง และเอื้อมปล่อยในประตู 1–5');requestAnimationFrame(loop)}catch(e){state.error=String(e?.message||e);state.mode='touch';setText('Hand Tracking โหลดไม่ได้','กล้องยังเปิดได้ แต่ให้ใช้ Touch Check แทน')}}function loop(ts){if(!state.ready)return;state.fpsFrames++;if(ts-state.lastFpsAt>=1000){state.fps=Math.round(state.fpsFrames*1000/(ts-state.lastFpsAt));state.fpsFrames=0;state.lastFpsAt=ts;update()}if($('camera').readyState>=2&&$('camera').currentTime!==state.lastVideo&&ts-state.lastDetect>32){state.lastVideo=$('camera').currentTime;state.lastDetect=ts;state.frames++;try{process(state.tracker.detectForVideo($('camera'),performance.now()))}catch(e){state.error=String(e?.message||e)}}requestAnimationFrame(loop)}function process(res){const lm=res?.landmarks?.[0];if(!lm){$('cursor').classList.remove('show','pinch');update();return}state.handFrames++;const i=lm[8],t=lm[4],r=$('stage').getBoundingClientRect(),x=(1-i.x)*r.width,y=i.y*r.height,d=Math.hypot(i.x-t.x,i.y-t.y);state.dists.push(d);if(state.dists.length>300)state.dists.shift();const now=state.pinch?d<.09:d<.057;$('cursor').style.left=x+'px';$('cursor').style.top=y+'px';$('cursor').classList.add('show');$('cursor').classList.toggle('pinch',now);if(now&&!state.pinch)state.pinches++;if(!now&&state.pinch)mark(hit(x,y));state.pinch=now;update()}bins.forEach(b=>b.onclick=()=>{state.mode='touch';mark(Number(b.dataset.g))});$('start').onclick=camera;$('touch').onclick=()=>{state.mode='touch';setText('Touch Check','แตะประตู 1–5 ให้ครบ')};$('zone').onclick=()=>location.assign(cfg.hub);$('finish').onclick=summary;$('again').onclick=()=>location.reload();function percentile(a,p){if(!a.length)return 0;const s=[...a].sort((x,y)=>x-y);return s[Math.min(s.length-1,Math.floor((s.length-1)*p))]}function build(){const low=percentile(state.dists,.12)||.045,high=percentile(state.dists,.72)||.10,close=Number(clamp(low+(high-low)*.28,.04,.072).toFixed(3)),open=Number(clamp(low+(high-low)*.62,close+.016,.12).toFixed(3)),handRate=state.frames?Math.round(state.handFrames/state.frames*100):0,detectEveryMs=state.fps>=24?32:state.fps>=16?42:55,maxFoods=state.fps>=24&&handRate>=65?2:1,passed=state.mode==='touch'?state.drops.size===5:state.ready&&state.pinches>=3&&state.drops.size===5&&handRate>=45;return{type:'groups_ar_device_qa',version:VERSION,studentId:id.studentId,studentName:id.studentName,section:id.section,passed,mode:state.mode,cameraReady:!!state.stream,handReady:state.ready,fps:state.fps,handSeenRate:handRate,pinchCount:state.pinches,dropZones:[...state.drops].sort(),pinchClose:close,pinchOpen:open,detectEveryMs,maxFoods,error:state.error,startedAt:state.startedAt,endedAt:new Date().toISOString(),clientTs:new Date().toISOString(),userAgent:navigator.userAgent,screen:{width:innerWidth,height:innerHeight,dpr:devicePixelRatio||1}}}async function deliver(x){try{localStorage.setItem('HHA_GROUPS_AR_QA_PROFILE',JSON.stringify(x))}catch(_){}if(!cfg.api||!cfg.log){$('delivery').textContent='บันทึก QA profile ในเครื่องแล้ว';return}const body=JSON.stringify(x);let sent=false;try{if(navigator.sendBeacon)sent=navigator.sendBeacon(cfg.api,new Blob([body],{type:'application/json'}))}catch(_){}if(!sent){try{await fetch(cfg.api,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body});sent=true}catch(_){}}$('delivery').textContent=sent?'บันทึก Device QA ไปยัง Receiver แล้ว':'บันทึกในเครื่องแล้ว แต่ส่ง Receiver ไม่สำเร็จ'}function summary(){const x=build();$('sumTitle').textContent=x.passed?'✅ อุปกรณ์พร้อมทดสอบเกม':'⚠️ ใช้ได้ แต่ควรใช้ Touch/ปรับเพิ่ม';$('sumText').textContent=x.passed?'ผ่านกล้อง มือ Pinch และพื้นที่ประตูครบ':'ระบบยังเปิด Touch Fallback ให้เรียนต่อได้';$('grid').innerHTML=[['โหมด',x.mode],['FPS',x.fps],['เห็นมือ',x.handSeenRate+'%'],['Pinch',x.pinchCount],['ประตู',x.dropZones.length+'/5'],['Close / Open',x.pinchClose+' / '+x.pinchOpen],['Detect',x.detectEveryMs+' ms'],['Max Foods',x.maxFoods]].map(v=>`<div class="result"><small>${v[0]}</small><b>${v[1]}</b></div>`).join('');$('summary').classList.remove('hidden');deliver(x);$('play').onclick=()=>play(x);$('copy').onclick=async()=>{try{await navigator.clipboard.writeText(JSON.stringify(x,null,2));$('copy').textContent='คัดลอกแล้ว'}catch(_){}}}function play(x){const u=new URL('./groups-ar-v3.html',location.href);q.forEach((v,k)=>u.searchParams.set(k,v));u.searchParams.set('qa','1');u.searchParams.set('input',x.mode);u.searchParams.set('pinchClose',x.pinchClose);u.searchParams.set('pinchOpen',x.pinchOpen);u.searchParams.set('detectEveryMs',x.detectEveryMs);u.searchParams.set('maxFoods',x.maxFoods);location.assign(u)}window.addEventListener('beforeunload',()=>{try{state.stream?.getTracks().forEach(t=>t.stop())}catch(_){}});update();</script></body></html>
