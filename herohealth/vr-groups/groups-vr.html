<!-- === /herohealth/vr-groups/groups-vr.html ===
GroupsVR — RUN (Classroom Pack)
✅ Practice 15s (via ../vr/practice-gate.js) with ?practice=1 or run=practice
✅ HUD auto-minimize + toggle
✅ Uses existing Groups SAFE: ./groups.safe.js
✅ vr-ui.js should already be included by you in this file (if not, add below)
FULL v20260302-GROUPS-RUN-CLASSROOM-PACK
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>HeroHealth — GroupsVR</title>
  <meta name="color-scheme" content="dark light"/>
  <link rel="icon" href="../favicon.ico"/>

  <!-- ✅ Shared VR UI -->
  <script type="module" src="../vr/vr-ui.js?v=20260302"></script>

  <!-- keep your existing CSS/markup here (ของเดิมได้ทั้งหมด) -->
  <style>
    /* Minimal additions only (ไม่ทับของเดิมหนัก) */
    #topTools{
      position:fixed;
      top: calc(env(safe-area-inset-top,0px) + 8px);
      right: calc(env(safe-area-inset-right,0px) + 10px);
      z-index: 9998;
      display:flex;
      gap:8px;
      pointer-events:auto;
    }
    .toolBtn{
      appearance:none;
      border-radius:999px;
      border:1px solid rgba(148,163,184,.22);
      background: rgba(2,6,23,.78);
      color: rgba(229,231,235,.96);
      padding:6px 10px;
      min-height:34px;
      font-weight:950;
      font-size:13px;
      cursor:pointer;
    }
    body.hud-min #hudTop,
    body.hud-min .hudTop,
    body.hud-min [data-hud="top"]{
      opacity:.18 !important;
      transform: scale(.985);
      pointer-events:none !important;
    }
  </style>
</head>
<body>
  <!-- ปุ่ม toggle HUD (เพิ่มแบบไม่ชนของเดิม) -->
  <div id="topTools">
    <button id="btnHud" class="toolBtn" type="button">🧩 HUD</button>
  </div>

  <!-- ✅ ของเดิมคุณ: container/scene/hud ต่าง ๆ คงไว้ -->
  <!-- IMPORTANT: ต้องมีจุด mount ตามที่ groups.safe.js ใช้ (ของเดิมคุณน่าจะมีอยู่แล้ว) -->

  <script type="module">
    const U = new URL(location.href);
    const runMode = String(U.searchParams.get('run') || 'play').toLowerCase();

    // 1) Practice Gate
    const { attachPracticeGate } = await import('../vr/practice-gate.js');

    // expose generic pause hook (ถ้า groups.safe.js มี global setter จะจับเอง)
    window.__HHA_SET_PAUSED__ = (on)=>{
      // กลุ่ม games ของคุณส่วนใหญ่รับ event pause/resume อยู่แล้ว
      try{ window.dispatchEvent(new CustomEvent(on ? 'hha:pause' : 'hha:resume')); }catch(e){}
      // ถ้า groups.safe.js เคย expose setter ตัวใดไว้ก็สามารถเติมได้ภายหลัง
      // e.g. window.__GROUPS_SET_PAUSED__?.(on)
    };

    attachPracticeGate({ seconds: 15, enabled: true });

    // 2) HUD toggle + auto-min
    const btnHud = document.getElementById('btnHud');
    btnHud?.addEventListener('click', ()=> document.body.classList.toggle('hud-min'));
    if(matchMedia('(max-width: 780px)').matches){
      setTimeout(()=> document.body.classList.add('hud-min'), 1200);
    }

    // 3) Boot groups (ใช้ไฟล์เดิมของคุณ)
    // NOTE: ถ้า groups.safe.js export boot(cfg) -> import แล้วเรียก boot ได้เลย
    try{
      const m = await import('./groups.safe.js');
      // เรียก boot แบบ “ปลอดภัย” (ถ้าคุณใช้ชื่ออื่น ให้แก้บรรทัดนี้)
      if(typeof m.boot === 'function'){
        const cfg = {
          view: String(U.searchParams.get('view') || 'mobile').toLowerCase(),
          run: runMode,
          diff: String(U.searchParams.get('diff') || 'normal').toLowerCase(),
          time: Number(U.searchParams.get('time') || 80),
          seed: String(U.searchParams.get('seed') || Date.now()),
          pid: String(U.searchParams.get('pid') || 'anon'),
          hub: String(U.searchParams.get('hub') || '../hub.html'),
          mode: String(U.searchParams.get('mode') || 'classroom')
        };
        m.boot(cfg);
      }
    }catch(e){
      console.error('[GroupsVR] boot failed', e);
    }
  </script>
</body>
</html>
