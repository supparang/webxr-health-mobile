<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth — Groups Race Lobby</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="../favicon.ico" />
  <style>
    :root{
      --bg1:#020617; --bg2:#0b1226;
      --panel:rgba(2,6,23,.72);
      --stroke:rgba(148,163,184,.18);
      --text:#e5e7eb; --muted:#94a3b8;
      --blue:#3b82f6; --cyan:#22d3ee; --violet:#a78bfa;
      --good:#22c55e; --warn:#f59e0b; --bad:#ef4444;
      --radius:22px;
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sar: env(safe-area-inset-right, 0px);
      --sal: env(safe-area-inset-left, 0px);
    }
    *{ box-sizing:border-box; }
    html,body{
      margin:0; min-height:100%;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans Thai",sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 780px at 20% 10%, rgba(34,211,238,.14) 0%, transparent 55%),
        radial-gradient(1000px 700px at 80% 20%, rgba(167,139,250,.14) 0%, transparent 55%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
    }
    .page{
      min-height:100vh;
      padding:calc(14px + var(--sat)) calc(14px + var(--sar)) calc(20px + var(--sab)) calc(14px + var(--sal));
      display:grid;
      place-items:center;
    }
    .card{
      width:min(920px, 100%);
      border-radius:var(--radius);
      border:1px solid var(--stroke);
      background:linear-gradient(180deg, rgba(2,6,23,.82), rgba(2,6,23,.64));
      box-shadow:0 28px 100px rgba(0,0,0,.35);
      overflow:hidden;
    }
    .head{
      padding:18px 18px 10px;
      border-bottom:1px solid rgba(148,163,184,.12);
    }
    .head h1{
      margin:0 0 6px;
      font-size:24px;
      line-height:1.2;
    }
    .sub{
      color:var(--muted);
      font-size:14px;
    }
    .body{
      padding:16px 18px 18px;
      display:grid;
      gap:14px;
    }
    .grid{
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:14px;
    }
    @media (max-width:820px){
      .grid{ grid-template-columns:1fr; }
    }
    .panel{
      border-radius:20px;
      border:1px solid rgba(148,163,184,.14);
      background:rgba(15,23,42,.42);
      padding:14px;
      display:grid;
      gap:12px;
    }
    .title2{
      font-size:16px;
      font-weight:1000;
    }
    .muted{
      color:var(--muted);
      font-size:13px;
      line-height:1.45;
    }
    .field{
      display:grid;
      gap:6px;
    }
    .label{
      font-size:13px;
      color:var(--muted);
      font-weight:800;
    }
    input,select{
      width:100%;
      border-radius:16px;
      border:1px solid rgba(148,163,184,.16);
      background:rgba(15,23,42,.72);
      color:var(--text);
      padding:12px 14px;
      font:inherit;
      outline:none;
    }
    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    button{
      appearance:none;
      border:0;
      cursor:pointer;
      border-radius:16px;
      padding:12px 16px;
      font:inherit;
      font-weight:900;
      color:white;
      background:linear-gradient(135deg, var(--blue), var(--violet));
      box-shadow:0 12px 28px rgba(59,130,246,.22);
    }
    button.secondary{
      background:rgba(148,163,184,.12);
      color:var(--text);
      box-shadow:none;
      border:1px solid rgba(148,163,184,.16);
    }
    button.good{
      background:linear-gradient(135deg, #16a34a, #22c55e);
      box-shadow:0 12px 28px rgba(34,197,94,.22);
    }
    button.warn{
      background:linear-gradient(135deg, #d97706, #f59e0b);
      box-shadow:0 12px 28px rgba(245,158,11,.22);
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:34px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,.16);
      background:rgba(2,6,23,.42);
      color:var(--muted);
      font-size:12px;
      font-weight:800;
    }
    .dot{
      width:8px; height:8px; border-radius:999px;
      background:var(--cyan);
      box-shadow:0 0 14px rgba(34,211,238,.55);
    }
    .dot.good{ background:var(--good); box-shadow:0 0 14px rgba(34,197,94,.55); }
    .dot.warn{ background:var(--warn); box-shadow:0 0 14px rgba(245,158,11,.55); }
    .dot.bad{ background:var(--bad); box-shadow:0 0 14px rgba(239,68,68,.55); }

    .players{
      display:grid;
      gap:10px;
    }
    .playerCard{
      border-radius:16px;
      border:1px solid rgba(148,163,184,.14);
      background:rgba(2,6,23,.36);
      padding:12px;
      display:grid;
      gap:8px;
    }
    .playerHead{
      display:flex; justify-content:space-between; gap:8px; align-items:center; flex-wrap:wrap;
    }
    .playerName{
      font-size:15px; font-weight:1000;
    }
    .kvs{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:8px;
    }
    .kv{
      border-radius:12px;
      border:1px solid rgba(148,163,184,.12);
      background:rgba(2,6,23,.28);
      padding:8px 10px;
    }
    .kv .k{
      color:var(--muted);
      font-size:11px;
      font-weight:800;
    }
    .kv .v{
      margin-top:3px;
      font-size:13px;
      font-weight:1000;
    }
    .roomCode{
      font-size:28px;
      font-weight:1000;
      letter-spacing:1px;
    }
    .statusBox{
      border-radius:16px;
      border:1px dashed rgba(34,211,238,.24);
      background:rgba(34,211,238,.06);
      padding:12px;
      display:grid;
      gap:8px;
    }
  </style>
</head>
<body>
<div class="page">
  <div class="card">
    <div class="head">
      <h1>🏁 Groups Race Lobby</h1>
      <div class="sub">พร้อมแล้วค่อยกด READY และให้ Host เริ่มการแข่งขัน</div>
    </div>

    <div class="body">
      <div class="grid">
        <div class="panel">
          <div class="title2">ข้อมูลห้อง</div>

          <div class="statusBox">
            <div class="label">ROOM CODE</div>
            <div class="roomCode" id="roomText">—</div>
            <div class="row">
              <div class="pill"><span class="dot" id="statusDot"></span> <span id="statusText">CONNECTING</span></div>
              <div class="pill"><span class="dot warn"></span> ROLE: <b id="roleText">—</b></div>
              <div class="pill"><span class="dot good"></span> SERIES: <b id="seriesText">BO3 · R1</b></div>
            </div>
          </div>

          <div class="field">
            <label class="label" for="joinName">ชื่อ</label>
            <input id="joinName" type="text" />
          </div>

          <div class="field">
            <label class="label" for="joinPid">PID</label>
            <input id="joinPid" type="text" />
          </div>

          <div class="field">
            <label class="label">โหมด / ค่าที่ใช้แข่ง</label>
            <div class="row">
              <div class="pill"><span class="dot"></span> DIFF: <b id="diffText">—</b></div>
              <div class="pill"><span class="dot"></span> TIME: <b id="timeText">—</b></div>
              <div class="pill"><span class="dot"></span> VIEW: <b id="viewText">—</b></div>
            </div>
          </div>

          <div class="row">
            <button class="good" id="btnReady">READY</button>
            <button class="warn" id="btnUnready">UNREADY</button>
            <button id="btnStart">START</button>
            <button class="secondary" id="btnCopyInvite">คัดลอกลิงก์เชิญ</button>
            <button class="secondary" id="btnHub">กลับ HUB</button>
          </div>

          <div class="muted" id="hintText">
            Host: รอผู้เล่นอีกคน READY แล้วค่อยกด START<br>
            Guest: กด READY แล้วรอ Host เริ่ม
          </div>
        </div>

        <div class="panel">
          <div class="title2">ผู้เล่นในห้อง</div>
          <div class="players" id="playersBox"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="./groups-race-rtdb.js"></script>
<script>
(() => {
  'use strict';

  const qs = new URL(location.href).searchParams;
  const room = (qs.get('room') || '').trim();
  const role = (qs.get('role') || 'guest').trim().toLowerCase();
  const name = (qs.get('name') || (role === 'host' ? 'Host' : 'Guest')).trim();
  const pid = (qs.get('pid') || (role === 'host' ? 'H001' : 'G001')).trim();
  const diff = (qs.get('diff') || 'normal').trim().toLowerCase();
  const time = (qs.get('time') || '80').trim();
  const view = (qs.get('view') || 'mobile').trim().toLowerCase();
  const seed = (qs.get('seed') || String(Date.now())).trim();
  const playerKey = (qs.get('playerKey') || ('p' + Math.random().toString(36).slice(2,8).toUpperCase())).trim();
  const hub = qs.get('hub') || '../hub.html';

  const $ = (id)=>document.getElementById(id);

  $('roomText').textContent = room || '—';
  $('roleText').textContent = role;
  $('diffText').textContent = diff;
  $('timeText').textContent = time + 's';
  $('viewText').textContent = view;
  $('joinName').value = name;
  $('joinPid').value = pid;

  let race = null;

  function escapeHtml(s){
    return String(s || '')
      .replaceAll('&','&amp;')
      .replaceAll('<','&lt;')
      .replaceAll('>','&gt;')
      .replaceAll('"','&quot;');
  }

  function renderPlayers(roomState, me, op, players){
    const box = $('playersBox');
    const arr = Object.values(players || {});
    if(!arr.length){
      box.innerHTML = '<div class="muted">ยังไม่มีผู้เล่น</div>';
      return;
    }

    box.innerHTML = arr.map(p=>{
      const isMe = String(p.playerKey || '') === String(playerKey);
      return `
        <div class="playerCard">
          <div class="playerHead">
            <div class="playerName">${isMe ? 'คุณ' : escapeHtml(p.name || p.playerKey || 'Player')}</div>
            <div class="pill">
              <span class="dot ${p.connected === false ? 'bad' : (p.ready ? 'good' : 'warn')}"></span>
              ${p.connected === false ? 'offline' : (p.ready ? 'ready' : 'not ready')}
            </div>
          </div>
          <div class="kvs">
            <div class="kv"><div class="k">ROLE</div><div class="v">${escapeHtml(p.role || '-')}</div></div>
            <div class="kv"><div class="k">PID</div><div class="v">${escapeHtml(p.pid || '-')}</div></div>
            <div class="kv"><div class="k">VIEW</div><div class="v">${escapeHtml(p.view || '-')}</div></div>
          </div>
        </div>
      `;
    }).join('');
  }

  function updateStatus(roomState, me, op){
    const st = String(roomState?.status || 'connecting');
    const statusDot = $('statusDot');
    const statusText = $('statusText');

    statusDot.className = 'dot';
    if(st === 'lobby') statusDot.classList.add('warn');
    if(st === 'countdown' || st === 'playing') statusDot.classList.add('good');
    if(st === 'ended') statusDot.classList.add('bad');

    statusText.textContent = st.toUpperCase();

    const roundNo = Number(roomState?.roundNo || 1);
    const hostWins = Number(roomState?.hostWins || 0);
    const guestWins = Number(roomState?.guestWins || 0);
    $('seriesText').textContent = `BO3 · R${roundNo} · ${hostWins}-${guestWins}`;

    const canStart = (
      role === 'host' &&
      st === 'lobby' &&
      !!me?.ready &&
      !!op?.ready
    );
    $('btnStart').disabled = !canStart;
  }

  function goRunPage(){
    const u = new URL('./groups-race-run.html', location.href);
    u.searchParams.set('room', room);
    u.searchParams.set('role', role);
    u.searchParams.set('name', $('joinName').value.trim() || name);
    u.searchParams.set('pid', $('joinPid').value.trim() || pid);
    u.searchParams.set('diff', diff);
    u.searchParams.set('time', time);
    u.searchParams.set('view', view);
    u.searchParams.set('seed', seed);
    u.searchParams.set('playerKey', playerKey);
    u.searchParams.set('hub', hub);
    location.href = u.toString();
  }

  async function boot(){
    if(!room){
      $('statusText').textContent = 'MISSING ROOM';
      return;
    }

    try{
      race = new window.GroupsRaceRTDB({
        roomId: room,
        playerKey,
        role,
        pid,
        name,
        diff,
        timeSec: Number(time),
        seed,
        view
      });
      await race.subscribe();
    }catch(err){
      console.error(err);
      $('statusText').textContent = 'ERROR';
      return;
    }

    window.addEventListener('groups:race_room', (ev)=>{
      const roomState = ev.detail?.room || {};
      const st = String(roomState.status || 'lobby');
      const state = race.getState();
      updateStatus(roomState, state.me, state.opponent);

      if(st === 'playing'){
        goRunPage();
      }
    });

    window.addEventListener('groups:race_players', ()=>{
      const state = race.getState();
      renderPlayers(state.room, state.me, state.opponent, state.players || {});
      updateStatus(state.room || {}, state.me, state.opponent);
    });

    $('btnReady').addEventListener('click', async ()=>{
      try{
        await race.setReady(true);
      }catch(err){ console.error(err); }
    });

    $('btnUnready').addEventListener('click', async ()=>{
      try{
        await race.setReady(false);
      }catch(err){ console.error(err); }
    });

    $('btnStart').addEventListener('click', async ()=>{
      try{
        await race.maybeStartCountdown(3000);
      }catch(err){ console.error(err); }
    });

    $('btnCopyInvite').addEventListener('click', async ()=>{
      try{
        const u = new URL('./groups-race.html', location.href);
        u.searchParams.set('room', room);
        u.searchParams.set('role', 'guest');
        u.searchParams.set('diff', diff);
        u.searchParams.set('time', time);
        u.searchParams.set('view', view);
        u.searchParams.set('seed', seed);
        u.searchParams.set('hub', hub);
        await navigator.clipboard.writeText(u.toString());
        $('btnCopyInvite').textContent = 'คัดลอกแล้ว';
        setTimeout(()=> $('btnCopyInvite').textContent = 'คัดลอกลิงก์เชิญ', 1200);
      }catch(_){}
    });

    $('btnHub').addEventListener('click', ()=> location.href = hub);
  }

  boot();
})();
</script>
</body>
</html>
