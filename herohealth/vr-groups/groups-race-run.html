<!-- Inline Force ต้องอยู่หลัง external scripts ทั้งหมด -->
<script>
/* inline-force-07-clean */
(function(){
  'use strict';

  const PATCH_ID = 'v20260527-race-run-inline-force-07-clean';
  if (window.__HHA_RACE_RUN_INLINE_FORCE_07__) return;
  window.__HHA_RACE_RUN_INLINE_FORCE_07__ = true;

  const qs = new URLSearchParams(location.search);

  function $(id){ return document.getElementById(id); }

  function esc(s){
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
      '&':'&amp;',
      '<':'&lt;',
      '>':'&gt;',
      '"':'&quot;',
      "'":'&#39;'
    }[c]));
  }

  function room(){
    return String(
      qs.get('roomId') ||
      qs.get('room') ||
      qs.get('code') ||
      sessionStorage.getItem('HHA_GROUPS_RACE_ROOM') ||
      ''
    ).trim().toUpperCase();
  }

  function name(){
    return String(
      qs.get('name') ||
      qs.get('playerName') ||
      sessionStorage.getItem('HHA_GROUPS_RACE_NAME') ||
      'Hero'
    ).trim() || 'Hero';
  }

  function setText(id, value){
    const el = $(id);
    if (!el) return;
    el.textContent = String(value);
    el.style.outline = '2px solid rgba(99,217,155,.32)';
  }

  function force(){
    const r = room();
    const n = name();

    try {
      if (r) sessionStorage.setItem('HHA_GROUPS_RACE_ROOM', r);
      if (n) sessionStorage.setItem('HHA_GROUPS_RACE_NAME', n);
    } catch(e) {}

    setText('metaRoom', r || '-');
    setText('metaName', n || 'Hero');

    const status = $('statusMsg');
    if (status) {
      status.className = 'status-text warn';
      status.textContent = r
        ? 'เข้าห้องแล้ว: ' + r + ' • ผู้เล่น: ' + n + ' • รอเพื่อนเข้าห้องเดียวกัน'
        : 'ไม่พบ Room Code ใน URL';
    }

    const state = $('roomState');
    if (state) {
      state.textContent = r
        ? 'ห้อง ' + r + ' พร้อมแล้ว • Race Standard ต้องมี 2–4 คนก่อนเริ่ม'
        : 'ยังไม่มี Room Code';
    }

    const count = $('countdown');
    if (count && (count.textContent === '...' || count.textContent.indexOf('Firebase') >= 0)) {
      count.className = 'count wait';
      count.textContent = 'รอ';
    }

    const list = $('playersList');
    if (list) {
      const t = (list.textContent || '').trim();

      if (
        !t ||
        t.indexOf('กำลังโหลดข้อมูลผู้เล่น') >= 0 ||
        t.indexOf('รอข้อมูลจาก Firebase') >= 0 ||
        t.indexOf(n) < 0
      ) {
        list.innerHTML =
          '<div class="player" data-inline-force="1">' +
            '<div class="left">' +
              '<div class="avatar">🏁</div>' +
              '<div>' +
                '<div class="name">' + esc(n) + '</div>' +
                '<div class="tag">Host / waiting • room ' + esc(r || '-') + '</div>' +
              '</div>' +
            '</div>' +
            '<div class="right wait">รอเพื่อน</div>' +
          '</div>';
      }
    }

    console.info('[Groups Race Inline Force]', PATCH_ID, {
      room: r,
      name: n,
      metaRoom: !!$('metaRoom'),
      metaName: !!$('metaName'),
      playersList: !!$('playersList')
    });
  }

  force();
  setTimeout(force, 80);
  setTimeout(force, 200);
  setTimeout(force, 500);
  setTimeout(force, 1000);
  setInterval(force, 700);
})();
</script>
