<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#eaf8ff" />
  <meta name="color-scheme" content="light" />

  <title>HeroHealth • Groups Solo PC Direct</title>

  <style>
    :root{
      --bg1:#eaf8ff;
      --bg2:#fff8e8;
      --card:#ffffff;
      --line:#d6edf7;
      --text:#214f64;
      --muted:#6f8fa1;
      --blue:#61bbff;
      --green:#7ed957;
      --yellow:#ffd966;
      --shadow:0 22px 70px rgba(37,89,121,.18);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 18% 8%,rgba(126,217,87,.24),transparent 28%),
        radial-gradient(circle at 86% 12%,rgba(97,187,255,.26),transparent 30%),
        linear-gradient(135deg,var(--bg1),var(--bg2));
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .card{
      width:min(94vw,720px);
      border-radius:34px;
      background:rgba(255,255,255,.92);
      border:2px solid rgba(214,237,247,.95);
      box-shadow:var(--shadow);
      padding:28px;
      text-align:center;
    }

    .icon{
      width:92px;
      height:92px;
      margin:0 auto 14px;
      border-radius:26px;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg,#fff7b5,#ffd966);
      font-size:48px;
      box-shadow:0 14px 34px rgba(255,190,60,.20);
    }

    h1{
      margin:0 0 10px;
      font-size:clamp(28px,5vw,44px);
      line-height:1.08;
      letter-spacing:-.6px;
    }

    p{
      margin:8px auto;
      max-width:560px;
      color:var(--muted);
      font-weight:800;
      font-size:clamp(15px,2.6vw,18px);
      line-height:1.45;
    }

    .target{
      margin:16px auto 0;
      padding:12px 14px;
      border-radius:20px;
      background:#f5fbff;
      border:1px solid var(--line);
      color:#486b80;
      font-weight:900;
      font-size:13px;
      word-break:break-all;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:12px;
      margin-top:22px;
    }

    a,button{
      border:0;
      border-radius:999px;
      min-height:50px;
      padding:12px 18px;
      font-weight:950;
      font-size:16px;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 12px 26px rgba(0,0,0,.10);
      font-family:inherit;
    }

    .primary{
      color:white;
      background:linear-gradient(135deg,#61bbff,#2f95ff);
    }

    .soft{
      color:var(--text);
      background:#eef8ff;
      border:1px solid var(--line);
    }

    .note{
      margin-top:18px;
      font-size:12px;
      color:#8aa4b2;
      font-weight:800;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="icon">🥦</div>

    <h1>กำลังเปิด Groups Solo PC</h1>

    <p>
      หน้านี้เป็นทางผ่านสำหรับ PC และจะพาเข้าเกมทันที โดยไม่แสดงหน้าเริ่มซ้ำ
    </p>

    <p>
      ตัวเล่นจริง:
      <strong>/herohealth/vr-groups/groups.html</strong>
    </p>

    <div class="target" id="targetUrl">Preparing target...</div>

    <div class="actions">
      <a class="primary" id="goNow" href="#">เข้าเกม PC ทันที</a>
      <a class="soft" id="goZone" href="#">กลับ Nutrition Zone</a>
      <button class="soft" id="copyBtn" type="button">คัดลอกลิงก์</button>
    </div>

    <div class="note">
      Redirect patch: v20260522-groups-pc-direct-start-03
    </div>
  </main>

  <script>
  (function(){
    'use strict';

    var PATCH_ID = 'v20260522-groups-pc-direct-start-03';
    var qs = new URLSearchParams(location.search);

    window.__HHA_GROUPS_PC_BRIDGE__ = {
      patch: PATCH_ID,
      from: location.href,
      startedAt: new Date().toISOString()
    };

    function repoBase(){
      var path = location.pathname;
      var marker = '/herohealth/';
      var idx = path.indexOf(marker);
      if (idx >= 0) return location.origin + path.slice(0, idx);
      return location.origin + '/webxr-health-mobile';
    }

    var BASE = repoBase();
    var HERO = BASE + '/herohealth';

    var CANONICAL = HERO + '/vr-groups/groups.html';
    var ZONE = HERO + '/nutrition-zone.html';

    function getParam(name, fallback){
      var v = qs.get(name);
      return v === null || v === '' ? fallback : v;
    }

    function buildZoneUrl(){
      var out = new URL(ZONE);

      [
        'pid','name','studentId','studentName','classSection',
        'studyId','conditionGroup','api','log','qa','debug','teacher'
      ].forEach(function(k){
        var v = qs.get(k);
        if (v !== null && v !== '') out.searchParams.set(k, v);
      });

      out.searchParams.set('pid', getParam('pid', 'anon'));
      out.searchParams.set('name', getParam('name', 'Hero'));
      out.searchParams.set('diff', getParam('diff', 'normal'));
      out.searchParams.set('time', getParam('time', '90'));
      out.searchParams.set('view', 'pc');
      out.searchParams.set('zone', 'nutrition');
      out.searchParams.set('cat', 'nutrition');
      out.searchParams.set('game', 'groups');
      out.searchParams.set('gameId', 'groups');

      return out.toString();
    }

    function buildCanonicalUrl(extra){
      var out = new URL(CANONICAL);
      var zoneUrl = buildZoneUrl();

      [
        'pid','name','studentId','studentName','classSection',
        'studyId','conditionGroup','api','log',
        'hub','back','return','returnTo',
        'qa','debug','teacher'
      ].forEach(function(k){
        var v = qs.get(k);
        if (v !== null && v !== '') out.searchParams.set(k, v);
      });

      var variant = String(getParam('variant', 'arena')).toLowerCase();

      out.searchParams.set('pid', getParam('pid', 'anon'));
      out.searchParams.set('name', getParam('name', 'Hero'));

      out.searchParams.set('view', 'pc');
      out.searchParams.set('run', 'play');
      out.searchParams.set('mode', 'solo');
      out.searchParams.set('variant', variant);

      out.searchParams.set('zone', 'nutrition');
      out.searchParams.set('cat', 'nutrition');
      out.searchParams.set('game', 'groups');
      out.searchParams.set('gameId', 'groups');

      out.searchParams.set('entry', 'groups-pc-direct-start');
      out.searchParams.set('from', 'groups-pc');
      out.searchParams.set('theme', 'food-groups');

      /* สำคัญ: บังคับข้าม intro ซ้ำ */
      out.searchParams.set('skipIntro', '1');
      out.searchParams.set('nointro', '1');
      out.searchParams.set('autostart', '1');
      out.searchParams.set('direct', '1');
      out.searchParams.set('intro', '0');
      out.searchParams.set('startFix', '1');

      if (variant === 'practice') {
        out.searchParams.set('diff', 'easy');
        out.searchParams.set('time', getParam('time', '120'));
        out.searchParams.set('assist', '1');
        out.searchParams.set('practice', '1');
      } else {
        out.searchParams.set('diff', getParam('diff', 'normal'));
        out.searchParams.set('time', getParam('time', '90'));
      }

      out.searchParams.set('hub', getParam('hub', zoneUrl));
      out.searchParams.set('back', getParam('back', zoneUrl));
      out.searchParams.set('return', getParam('return', zoneUrl));
      out.searchParams.set('returnTo', getParam('returnTo', zoneUrl));

      out.searchParams.set('seed', getParam('seed', String(Date.now())));
      out.searchParams.set('t', String(Date.now()));

      Object.entries(extra || {}).forEach(function(pair){
        var k = pair[0];
        var v = pair[1];
        if (v === null || v === undefined) out.searchParams.delete(k);
        else out.searchParams.set(k, String(v));
      });

      return out.toString();
    }

    function setUi(target){
      var targetEl = document.getElementById('targetUrl');
      var goNow = document.getElementById('goNow');
      var goZone = document.getElementById('goZone');
      var copyBtn = document.getElementById('copyBtn');

      if (targetEl) targetEl.textContent = target;
      if (goNow) goNow.href = target;
      if (goZone) goZone.href = buildZoneUrl();

      if (copyBtn && !copyBtn.__bound) {
        copyBtn.__bound = true;
        copyBtn.addEventListener('click', function(){
          try {
            navigator.clipboard.writeText(target);
            copyBtn.textContent = 'คัดลอกแล้ว';
          } catch(e) {
            copyBtn.textContent = 'คัดลอกไม่ได้';
          }
          setTimeout(function(){ copyBtn.textContent = 'คัดลอกลิงก์'; }, 1400);
        });
      }
    }

    function redirect(target){
      var noRedirect =
        qs.get('noredirect') === '1' ||
        qs.get('hold') === '1';

      if (noRedirect) {
        console.info('[Groups PC Direct]', PATCH_ID, 'paused', { target: target });
        return;
      }

      setTimeout(function(){
        try { location.replace(target); }
        catch(e) { location.href = target; }
      }, 250);
    }

    function boot(){
      var target = buildCanonicalUrl();

      window.__HHA_GROUPS_PC_BRIDGE__.target = target;
      window.__HHA_GROUPS_PC_BRIDGE__.zone = buildZoneUrl();

      setUi(target);

      try {
        sessionStorage.setItem('HHA_GROUPS_PC_DIRECT_TARGET', target);
      } catch(e) {}

      console.info('[Groups PC Direct]', PATCH_ID, {
        from: location.href,
        target: target,
        base: BASE
      });

      redirect(target);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', boot, { once:true });
    } else {
      boot();
    }
  })();
  </script>
</body>
</html>
