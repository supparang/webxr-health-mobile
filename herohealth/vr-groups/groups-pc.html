<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#eaf8ff" />
  <meta name="color-scheme" content="light" />

  <title>HeroHealth • Groups Solo PC Redirect</title>

  <style>
    :root{
      --bg1:#eaf8ff;
      --bg2:#fff8e8;
      --card:#ffffff;
      --line:#d6edf7;
      --text:#214f64;
      --muted:#6f8fa1;
      --blue:#61bbff;
      --green:#7ed957;
      --yellow:#ffd966;
      --shadow:0 22px 70px rgba(37,89,121,.18);
    }

    *{
      box-sizing:border-box;
    }

    html,
    body{
      margin:0;
      min-height:100%;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 18% 8%, rgba(126,217,87,.24), transparent 28%),
        radial-gradient(circle at 86% 12%, rgba(97,187,255,.26), transparent 30%),
        linear-gradient(135deg,var(--bg1),var(--bg2));
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .card{
      width:min(94vw,720px);
      border-radius:34px;
      background:rgba(255,255,255,.92);
      border:2px solid rgba(214,237,247,.95);
      box-shadow:var(--shadow);
      padding:28px;
      text-align:center;
    }

    .icon{
      width:92px;
      height:92px;
      margin:0 auto 14px;
      border-radius:26px;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg,#fff7b5,#ffd966);
      font-size:48px;
      box-shadow:0 14px 34px rgba(255,190,60,.20);
    }

    h1{
      margin:0 0 10px;
      font-size:clamp(28px,5vw,44px);
      line-height:1.08;
      letter-spacing:-.6px;
    }

    p{
      margin:8px auto;
      max-width:560px;
      color:var(--muted);
      font-weight:800;
      font-size:clamp(15px,2.6vw,18px);
      line-height:1.45;
    }

    .target{
      margin:16px auto 0;
      padding:12px 14px;
      border-radius:20px;
      background:#f5fbff;
      border:1px solid var(--line);
      color:#486b80;
      font-weight:900;
      font-size:13px;
      word-break:break-all;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:12px;
      margin-top:22px;
    }

    a,
    button{
      border:0;
      border-radius:999px;
      min-height:50px;
      padding:12px 18px;
      font-weight:950;
      font-size:16px;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 12px 26px rgba(0,0,0,.10);
    }

    .primary{
      color:white;
      background:linear-gradient(135deg,#61bbff,#2f95ff);
    }

    .soft{
      color:var(--text);
      background:#eef8ff;
      border:1px solid var(--line);
    }

    .note{
      margin-top:18px;
      font-size:12px;
      color:#8aa4b2;
      font-weight:800;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="icon">🥦</div>

    <h1>กำลังเปิด Groups Solo</h1>

    <p>
      หน้านี้เป็นทางผ่านสำหรับ PC เดิม ระบบจะพาไปไฟล์ตัวจริงของ Groups Solo อัตโนมัติ
    </p>

    <p>
      ไฟล์ตัวจริง:
      <strong>/herohealth/vr-groups/groups.html</strong>
    </p>

    <div class="target" id="targetUrl">
      Preparing target...
    </div>

    <div class="actions">
      <a class="primary" id="goNow" href="#">เปิด Groups Solo</a>
      <a class="soft" id="goZone" href="#">กลับ Nutrition Zone</a>
    </div>

    <div class="note">
      Redirect patch: v20260521-groups-pc-to-canonical-redirect-02
    </div>
  </main>

  <script>
  /* =========================================================
     HeroHealth Groups PC Bridge
     PATCH: v20260521-groups-pc-to-canonical-redirect-02
     File: /herohealth/vr-groups/groups-pc.html

     Purpose:
     - Stop using old/broken groups-pc.html as gameplay file
     - Redirect safely to canonical Groups Solo:
       /herohealth/vr-groups/groups.html
     - Preserve params and force view=pc, mode=solo, game=groups
     - Keep qa=1 working by passing it to canonical groups.html
  ========================================================= */
  (function(){
    'use strict';

    const PATCH_ID = 'v20260521-groups-pc-to-canonical-redirect-02';
    const qs = new URLSearchParams(location.search);

    window.__HHA_GROUPS_PC_BRIDGE__ = {
      patch: PATCH_ID,
      from: location.href,
      startedAt: new Date().toISOString()
    };

    function repoBase(){
      const path = location.pathname;
      const marker = '/herohealth/';
      const idx = path.indexOf(marker);

      if (idx >= 0) {
        return location.origin + path.slice(0, idx);
      }

      return location.origin + '/webxr-health-mobile';
    }

    const BASE = repoBase();
    const HERO = BASE + '/herohealth';

    const CANONICAL = HERO + '/vr-groups/groups.html';
    const ZONE = HERO + '/nutrition-zone.html';

    function getParam(name, fallback){
      const v = qs.get(name);
      return v === null || v === '' ? fallback : v;
    }

    function buildZoneUrl(){
      const out = new URL(ZONE);

      [
        'pid',
        'name',
        'studentId',
        'studentName',
        'classSection',
        'diff',
        'time',
        'view',
        'studyId',
        'conditionGroup',
        'api',
        'log'
      ].forEach(function(k){
        const v = qs.get(k);
        if (v !== null && v !== '') out.searchParams.set(k, v);
      });

      out.searchParams.set('pid', getParam('pid', 'anon'));
      out.searchParams.set('name', getParam('name', 'Hero'));
      out.searchParams.set('diff', getParam('diff', 'normal'));
      out.searchParams.set('time', getParam('time', '90'));
      out.searchParams.set('view', 'pc');
      out.searchParams.set('zone', 'nutrition');
      out.searchParams.set('cat', 'nutrition');
      out.searchParams.set('game', 'groups');

      return out.toString();
    }

    function buildCanonicalUrl(){
      const out = new URL(CANONICAL);

      [
        'pid',
        'name',
        'studentId',
        'studentName',
        'classSection',
        'diff',
        'time',
        'seed',
        'studyId',
        'conditionGroup',
        'api',
        'log',
        'hub',
        'back',
        'return',
        'returnTo',
        'qa',
        'debug',
        'teacher'
      ].forEach(function(k){
        const v = qs.get(k);
        if (v !== null && v !== '') out.searchParams.set(k, v);
      });

      out.searchParams.set('pid', getParam('pid', 'anon'));
      out.searchParams.set('name', getParam('name', 'Hero'));
      out.searchParams.set('diff', getParam('diff', 'normal'));
      out.searchParams.set('time', getParam('time', '90'));

      out.searchParams.set('view', 'pc');
      out.searchParams.set('run', getParam('run', 'play'));
      out.searchParams.set('zone', 'nutrition');
      out.searchParams.set('cat', 'nutrition');
      out.searchParams.set('game', 'groups');
      out.searchParams.set('gameId', 'groups');
      out.searchParams.set('mode', 'solo');
      out.searchParams.set('entry', 'groups-pc-redirect');
      out.searchParams.set('theme', 'food-groups');

      if (!out.searchParams.get('seed')) {
        out.searchParams.set('seed', String(Date.now()));
      }

      const zoneUrl = buildZoneUrl();

      if (!out.searchParams.get('hub')) {
        out.searchParams.set('hub', zoneUrl);
      }

      if (!out.searchParams.get('back')) {
        out.searchParams.set('back', zoneUrl);
      }

      if (!out.searchParams.get('return')) {
        out.searchParams.set('return', zoneUrl);
      }

      if (!out.searchParams.get('returnTo')) {
        out.searchParams.set('returnTo', zoneUrl);
      }

      return out.toString();
    }

    function setUi(target){
      const targetEl = document.getElementById('targetUrl');
      const goNow = document.getElementById('goNow');
      const goZone = document.getElementById('goZone');

      if (targetEl) targetEl.textContent = target;
      if (goNow) goNow.href = target;
      if (goZone) goZone.href = buildZoneUrl();
    }

    function redirect(target){
      const noRedirect =
        qs.get('noredirect') === '1' ||
        qs.get('hold') === '1';

      if (noRedirect) {
        console.info('[Groups PC Bridge]', PATCH_ID, 'redirect paused by query', {
          target: target
        });
        return;
      }

      setTimeout(function(){
        try {
          location.replace(target);
        } catch(e) {
          location.href = target;
        }
      }, 350);
    }

    function boot(){
      const target = buildCanonicalUrl();

      window.__HHA_GROUPS_PC_BRIDGE__.target = target;
      window.__HHA_GROUPS_PC_BRIDGE__.zone = buildZoneUrl();

      setUi(target);

      console.info('[Groups PC Bridge]', PATCH_ID, {
        from: location.href,
        target: target,
        base: BASE
      });

      redirect(target);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', boot, { once:true });
    } else {
      boot();
    }

  })();
  </script>
</body>
</html>
