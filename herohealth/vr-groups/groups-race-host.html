<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth — Groups Race Host</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="../favicon.ico" />
  <style>
    :root{
      --bg1:#020617; --bg2:#0b1226;
      --panel:rgba(2,6,23,.72);
      --stroke:rgba(148,163,184,.18);
      --text:#e5e7eb; --muted:#94a3b8;
      --blue:#3b82f6; --cyan:#22d3ee; --violet:#a78bfa;
      --good:#22c55e; --warn:#f59e0b; --bad:#ef4444;
      --radius:22px;
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sar: env(safe-area-inset-right, 0px);
      --sal: env(safe-area-inset-left, 0px);
    }
    *{ box-sizing:border-box; }
    html,body{
      margin:0; min-height:100%;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans Thai",sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 780px at 20% 10%, rgba(34,211,238,.14) 0%, transparent 55%),
        radial-gradient(1000px 700px at 80% 20%, rgba(167,139,250,.14) 0%, transparent 55%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
    }
    .page{
      min-height:100vh;
      padding:calc(14px + var(--sat)) calc(14px + var(--sar)) calc(20px + var(--sab)) calc(14px + var(--sal));
      display:grid;
      place-items:center;
    }
    .card{
      width:min(760px, 100%);
      border-radius:var(--radius);
      border:1px solid var(--stroke);
      background:linear-gradient(180deg, rgba(2,6,23,.82), rgba(2,6,23,.64));
      box-shadow:0 28px 100px rgba(0,0,0,.35);
      overflow:hidden;
    }
    .head{
      padding:18px 18px 10px;
      border-bottom:1px solid rgba(148,163,184,.12);
    }
    .head h1{
      margin:0 0 6px;
      font-size:24px;
      line-height:1.2;
    }
    .sub{
      color:var(--muted);
      font-size:14px;
    }
    .body{
      padding:16px 18px 18px;
      display:grid;
      gap:14px;
    }
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    @media (max-width:700px){
      .grid{ grid-template-columns:1fr; }
    }
    .field{
      display:grid;
      gap:6px;
    }
    .label{
      font-size:13px;
      color:var(--muted);
      font-weight:800;
    }
    input,select{
      width:100%;
      border-radius:16px;
      border:1px solid rgba(148,163,184,.16);
      background:rgba(15,23,42,.72);
      color:var(--text);
      padding:12px 14px;
      font:inherit;
      outline:none;
    }
    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    button{
      appearance:none;
      border:0;
      cursor:pointer;
      border-radius:16px;
      padding:12px 16px;
      font:inherit;
      font-weight:900;
      color:white;
      background:linear-gradient(135deg, var(--blue), var(--violet));
      box-shadow:0 12px 28px rgba(59,130,246,.22);
    }
    button.secondary{
      background:rgba(148,163,184,.12);
      color:var(--text);
      box-shadow:none;
      border:1px solid rgba(148,163,184,.16);
    }
    .roomBox{
      border-radius:18px;
      border:1px dashed rgba(34,211,238,.28);
      background:rgba(34,211,238,.06);
      padding:14px;
      display:grid;
      gap:8px;
    }
    .roomCode{
      font-size:28px;
      font-weight:1000;
      letter-spacing:1px;
    }
    .hint{
      color:var(--muted);
      font-size:13px;
      line-height:1.45;
    }
  </style>
</head>
<body>
<div class="page">
  <div class="card">
    <div class="head">
      <h1>🏁 Groups Race — Host</h1>
      <div class="sub">สร้างห้องแข่งแบบเร็ว แล้วส่งรหัสให้ผู้เล่นอีกคนเข้า</div>
    </div>

    <div class="body">
      <div class="grid">
        <div class="field">
          <label class="label" for="name">ชื่อผู้สร้างห้อง</label>
          <input id="name" type="text" placeholder="เช่น ครูเอ / Host 1" />
        </div>

        <div class="field">
          <label class="label" for="pid">PID</label>
          <input id="pid" type="text" placeholder="เช่น H001" />
        </div>

        <div class="field">
          <label class="label" for="diff">ระดับความยาก</label>
          <select id="diff">
            <option value="easy">easy</option>
            <option value="normal" selected>normal</option>
            <option value="hard">hard</option>
          </select>
        </div>

        <div class="field">
          <label class="label" for="time">เวลาแข่งขัน (วินาที)</label>
          <select id="time">
            <option value="60">60</option>
            <option value="80" selected>80</option>
            <option value="90">90</option>
            <option value="120">120</option>
          </select>
        </div>

        <div class="field">
          <label class="label" for="view">view</label>
          <select id="view">
            <option value="mobile" selected>mobile</option>
            <option value="pc">pc</option>
            <option value="cvr">cvr</option>
          </select>
        </div>

        <div class="field">
          <label class="label" for="seed">seed</label>
          <input id="seed" type="text" placeholder="ปล่อยว่าง = สุ่มใหม่" />
        </div>
      </div>

      <div class="row">
        <button id="btnCreate">สร้างห้อง</button>
        <button class="secondary" id="btnBack">กลับ HUB</button>
      </div>

      <div class="roomBox" id="roomBox" hidden>
        <div class="label">ROOM CODE</div>
        <div class="roomCode" id="roomCode">—</div>
        <div class="row">
          <button id="btnCopy">คัดลอกรหัส</button>
          <button class="secondary" id="btnGoLobby">เข้า Lobby</button>
        </div>
        <div class="hint">
          ส่งรหัสนี้ให้ผู้เล่นอีกคนเข้าในหน้า Join หรือหน้า Lobby ของ Groups Race
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  'use strict';

  const qs = new URL(location.href).searchParams;
  const hub = qs.get('hub') || '../hub.html';

  const $ = (id)=>document.getElementById(id);

  function randCode(){
    return 'GR' + Math.random().toString(36).slice(2, 8).toUpperCase();
  }
  function nowSeed(){
    return String(Date.now());
  }
  function nowPlayerKey(){
    return 'p' + Math.random().toString(36).slice(2, 8).toUpperCase();
  }

  $('btnBack').addEventListener('click', ()=> location.href = hub);

  $('btnCreate').addEventListener('click', ()=>{
    const room = randCode();
    const name = ($('name').value || 'Host').trim();
    const pid  = ($('pid').value || 'H001').trim();
    const diff = $('diff').value;
    const time = $('time').value;
    const view = $('view').value;
    const seed = ($('seed').value || nowSeed()).trim();
    const playerKey = nowPlayerKey();

    $('roomBox').hidden = false;
    $('roomCode').textContent = room;

    $('btnCopy').onclick = async ()=>{
      try{
        await navigator.clipboard.writeText(room);
        $('btnCopy').textContent = 'คัดลอกแล้ว';
        setTimeout(()=> $('btnCopy').textContent = 'คัดลอกรหัส', 1200);
      }catch(_){}
    };

    $('btnGoLobby').onclick = ()=>{
      const u = new URL('./groups-race.html', location.href);
      u.searchParams.set('room', room);
      u.searchParams.set('role', 'host');
      u.searchParams.set('name', name);
      u.searchParams.set('pid', pid);
      u.searchParams.set('diff', diff);
      u.searchParams.set('time', time);
      u.searchParams.set('view', view);
      u.searchParams.set('seed', seed);
      u.searchParams.set('playerKey', playerKey);
      u.searchParams.set('hub', hub);
      location.href = u.toString();
    };
  });
})();
</script>
</body>
</html>
