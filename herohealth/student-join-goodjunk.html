<!-- === /herohealth/student-join-goodjunk.html ===
HeroHealth • Student Join GoodJunk
PATCH v20260307-STUDENT-JOIN-GOODJUNK-FULL
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Student Join • GoodJunk</title>
  <link rel="icon" href="./favicon.ico" />
  <meta name="color-scheme" content="dark light" />
  <script src="./firebase-config.js"></script>
  <style>
    :root{
      --bg1:#020617; --bg2:#0b1226; --stroke:rgba(148,163,184,.18);
      --text:#e5e7eb; --muted:#94a3b8; --shadow:0 18px 60px rgba(0,0,0,.35);
    }
    *{ box-sizing:border-box; }
    html,body{
      margin:0; min-height:100%;
      background:
        radial-gradient(1200px 800px at 50% -20%, rgba(34,211,238,.10), transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans Thai", sans-serif;
    }
    .wrap{ width:min(760px, calc(100vw - 24px)); margin:0 auto; padding:22px 12px; }
    .card{
      background:linear-gradient(180deg, rgba(15,23,42,.82), rgba(2,6,23,.76));
      border:1px solid var(--stroke); border-radius:24px; box-shadow:var(--shadow); padding:18px;
    }
    .eyebrow{
      display:inline-block; padding:8px 12px; border-radius:999px;
      background:rgba(34,211,238,.10); color:#a5f3fc; font-size:12px; font-weight:800;
      border:1px solid rgba(34,211,238,.18);
    }
    h1{ margin:12px 0 6px; font-size:34px; }
    .sub{ color:var(--muted); margin-bottom:14px; }
    .grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .full{ grid-column:1/-1; }
    label{ display:block; font-size:12px; color:var(--muted); margin-bottom:6px; }
    input,select,button{
      width:100%; min-height:46px; border-radius:14px; border:1px solid var(--stroke);
      background:rgba(2,6,23,.80); color:var(--text); padding:10px 12px; font:inherit;
    }
    button{
      cursor:pointer; border:0; font-weight:900; color:white;
      background:linear-gradient(135deg,#2563eb,#06b6d4);
      box-shadow:0 10px 26px rgba(37,99,235,.28);
    }
    .note{
      margin-top:12px; font-size:12px; color:var(--muted);
      border-radius:14px; padding:10px 12px; background:rgba(2,6,23,.50); border:1px solid var(--stroke);
    }
    @media (max-width:700px){ .grid{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <div class="eyebrow">🎮 Student Join</div>
      <h1>เข้าเล่น GoodJunk Battle</h1>
      <div class="sub">กรอกข้อมูลก่อนเข้าเล่นเพื่อให้ครูดูผลได้ง่ายขึ้น</div>

      <div class="grid">
        <div class="full">
          <label for="rosterPick">เลือกจากรายชื่อ (ถ้ามี)</label>
          <select id="rosterPick">
            <option value="">-- เลือกชื่อจาก roster --</option>
          </select>
        </div>

        <div>
          <label for="nick">ชื่อเล่น</label>
          <input id="nick" placeholder="เช่น Mint" />
        </div>

        <div>
          <label for="pid">PID / รหัส</label>
          <input id="pid" placeholder="เช่น S01" />
        </div>

        <div>
          <label for="room">Room</label>
          <input id="room" value="P5A" />
        </div>

        <div>
          <label for="view">View</label>
          <select id="view">
            <option value="mobile">mobile</option>
            <option value="pc">pc</option>
            <option value="cvr">cvr</option>
          </select>
        </div>

        <div>
          <label for="diff">Difficulty</label>
          <select id="diff">
            <option value="easy" selected>easy</option>
            <option value="normal">normal</option>
            <option value="hard">hard</option>
          </select>
        </div>

        <div>
          <label for="time">Time</label>
          <select id="time">
            <option value="60">60</option>
            <option value="80" selected>80</option>
            <option value="100">100</option>
          </select>
        </div>

        <div class="full">
          <label for="hub">Hub URL</label>
          <input id="hub" />
        </div>

        <div class="full">
          <button id="btnJoin">เข้าเล่น Battle</button>
        </div>
      </div>

      <div id="joinNote" class="note">
        ถ้าเข้าผ่าน QR ของครู ระบบจะใส่ room ให้ได้อัตโนมัติ และบางค่าจะถูกล็อกไว้
      </div>

      <div id="dupWarn" class="note" style="display:none; border-color:rgba(245,158,11,.35); color:#fde68a;">
        ตรวจพบ PID ซ้ำในห้อง
      </div>

      <div id="lockWarn" class="note" style="display:none; border-color:rgba(239,68,68,.35); color:#fecaca;">
        ห้องนี้ถูกล็อก
      </div>

      <div id="spectatorBox" class="note" style="display:none; border-color:rgba(34,211,238,.28); color:#a5f3fc;">
        <div style="font-weight:900;margin-bottom:8px;">ดูแบบ Spectator</div>
        <div id="spectatorText" style="margin-bottom:10px;">ห้องนี้เปิดให้เข้าชมแทน</div>
        <button id="btnOpenSpectator" type="button" style="
          appearance:none;border:0;cursor:pointer;border-radius:12px;padding:10px 14px;font-weight:900;
          color:white;background:linear-gradient(135deg,#2563eb,#06b6d4);">เปิด Spectator / Board</button>
      </div>
    </section>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    const qs = (k,d='')=>{ try{ return new URL(location.href).searchParams.get(k) ?? d; }catch(_){ return d; } };

    const ROSTER_KEY = 'HH_GJ_CLASS_ROSTER';
    let rosterRows = [];
    let currentSpectatorUrl = '';

    function applyLockedField(id, qKey){
      const v = qs(qKey, '');
      if(!v) return false;
      const el = $(id);
      if(!el) return false;
      el.value = v;
      if(qs(`lock_${qKey}`, '0') === '1'){
        el.disabled = true;
        el.style.opacity = '.78';
      }
      return true;
    }

    function loadRoster(){
      try{
        const raw = localStorage.getItem(ROSTER_KEY);
        rosterRows = raw ? JSON.parse(raw) : [];
      }catch(_){
        rosterRows = [];
      }
      renderRosterPick();
    }

    function renderRosterPick(){
      const el = $('rosterPick');
      if(!el) return;

      const room = ($('room').value || '').trim().toUpperCase();
      const rows = (rosterRows || []).filter(r => {
        const rr = String(r?.room || '').trim().toUpperCase();
        return !room || !rr || rr === room;
      });

      el.innerHTML = `<option value="">-- เลือกชื่อจาก roster --</option>` +
        rows.map((r, i)=>`
          <option value="${i}">
            ${(r?.nick || '-')} • ${(r?.pid || '-')}
          </option>
        `).join('');
    }

    function applyRosterSelection(idx){
      idx = Number(idx);
      if(!Number.isFinite(idx) || idx < 0) return;
      const room = ($('room').value || '').trim().toUpperCase();
      const rows = (rosterRows || []).filter(r => {
        const rr = String(r?.room || '').trim().toUpperCase();
        return !room || !rr || rr === room;
      });

      const row = rows[idx];
      if(!row) return;

      if(!$('nick').disabled) $('nick').value = row?.nick || '';
      if(!$('pid').disabled) $('pid').value = row?.pid || '';
    }

    async function writeCentralAttendance(row){
      const cfg = window.HHA_FIREBASE_CONFIG || window.__HHA_FIREBASE_CONFIG__ || window.firebaseConfig || null;
      if(!cfg) return { ok:false, reason:'missing_firebase_config' };

      try{
        const v = '9.22.2';
        const appMod = await import(`https://www.gstatic.com/firebasejs/${v}/firebase-app.js`);
        const dbMod  = await import(`https://www.gstatic.com/firebasejs/${v}/firebase-database.js`);

        const { initializeApp, getApps, getApp } = appMod;
        const { getDatabase, ref, push, set, serverTimestamp } = dbMod;

        const app = getApps().length ? getApp() : initializeApp(cfg);
        const db = getDatabase(app);

        const room = String(row?.room || 'ROOM').trim().toUpperCase();
        const base = `hha-battle/goodjunk/rooms/${room}/attendance`;
        const rowRef = push(ref(db, base));

        await set(rowRef, {
          nick: String(row?.nick || ''),
          pid: String(row?.pid || ''),
          room,
          source: String(row?.source || 'student-join'),
          createdAt: serverTimestamp(),
          createdAtMs: Date.now()
        });

        return { ok:true };
      }catch(err){
        console.warn('[StudentJoin] central attendance failed', err);
        return { ok:false, reason:String(err?.message || err) };
      }
    }

    async function checkDuplicatePidInRoom(room, pid){
      room = String(room || '').trim().toUpperCase();
      pid = String(pid || '').trim();
      if(!room || !pid) return { duplicate:false, matches:[] };

      const cfg = window.HHA_FIREBASE_CONFIG || window.__HHA_FIREBASE_CONFIG__ || window.firebaseConfig || null;
      if(!cfg) return { duplicate:false, matches:[], reason:'missing_firebase_config' };

      try{
        const v = '9.22.2';
        const appMod = await import(`https://www.gstatic.com/firebasejs/${v}/firebase-app.js`);
        const dbMod  = await import(`https://www.gstatic.com/firebasejs/${v}/firebase-database.js`);

        const { initializeApp, getApps, getApp } = appMod;
        const { getDatabase, ref, get } = dbMod;

        const app = getApps().length ? getApp() : initializeApp(cfg);
        const db = getDatabase(app);

        const snap = await get(ref(db, `hha-battle/goodjunk/rooms/${room}/players`)).catch(()=>null);
        const raw = snap?.val() || {};

        const matches = Object.entries(raw)
          .map(([key, v])=>({
            key,
            pid: String(v?.pid || ''),
            nick: String(v?.nick || ''),
            connected: v?.connected !== false
          }))
          .filter(r => String(r.pid || '').trim() === pid);

        return { duplicate: matches.length > 0, matches };
      }catch(err){
        console.warn('[StudentJoin] duplicate pid check failed', err);
        return { duplicate:false, matches:[], reason:String(err?.message || err) };
      }
    }

    async function getRoomPolicy(room){
      room = String(room || '').trim().toUpperCase();
      if(!room) return {};

      const cfg = window.HHA_FIREBASE_CONFIG || window.__HHA_FIREBASE_CONFIG__ || window.firebaseConfig || null;
      if(!cfg) return {};

      try{
        const v = '9.22.2';
        const appMod = await import(`https://www.gstatic.com/firebasejs/${v}/firebase-app.js`);
        const dbMod  = await import(`https://www.gstatic.com/firebasejs/${v}/firebase-database.js`);

        const { initializeApp, getApps, getApp } = appMod;
        const { getDatabase, ref, get } = dbMod;

        const app = getApps().length ? getApp() : initializeApp(cfg);
        const db = getDatabase(app);

        const snap = await get(ref(db, `hha-battle/goodjunk/rooms/${room}/policy`)).catch(()=>null);
        return snap?.val() || {};
      }catch(err){
        console.warn('[StudentJoin] getRoomPolicy failed', err);
        return {};
      }
    }

    function showDupWarn(msg){
      const el = $('dupWarn');
      if(!el) return;
      el.style.display = 'block';
      el.textContent = msg || 'ตรวจพบ PID ซ้ำ';
    }

    function hideDupWarn(){
      const el = $('dupWarn');
      if(!el) return;
      el.style.display = 'none';
      el.textContent = 'ตรวจพบ PID ซ้ำในห้อง';
    }

    function showLockWarn(msg){
      const el = $('lockWarn');
      if(!el) return;
      el.style.display = 'block';
      el.textContent = msg || 'ห้องนี้ถูกล็อก';
    }

    function hideLockWarn(){
      const el = $('lockWarn');
      if(!el) return;
      el.style.display = 'none';
      el.textContent = 'ห้องนี้ถูกล็อก';
    }

    function showSpectatorBox(url, msg){
      currentSpectatorUrl = String(url || '').trim();
      $('spectatorBox').style.display = currentSpectatorUrl ? 'block' : 'none';
      $('spectatorText').textContent = msg || 'ห้องนี้เปิดให้เข้าชมแทน';
    }

    function hideSpectatorBox(){
      currentSpectatorUrl = '';
      $('spectatorBox').style.display = 'none';
      $('spectatorText').textContent = 'ห้องนี้เปิดให้เข้าชมแทน';
    }

    $('room').value = qs('room', 'P5A');
    $('view').value = qs('view', 'mobile');
    $('diff').value = qs('diff', 'easy');
    $('time').value = qs('time', '80');
    $('hub').value = qs('hub', new URL('./hub.html', location.href).toString());
    $('nick').value = qs('nick', '');
    $('pid').value = qs('pid', '');

    applyLockedField('room', 'room');
    applyLockedField('view', 'view');
    applyLockedField('diff', 'diff');
    applyLockedField('time', 'time');
    applyLockedField('hub', 'hub');

    (function renderJoinNote(){
      const parts = [];
      const room = $('room').value || 'P5A';
      const diff = $('diff').value || 'easy';
      const time = $('time').value || '80';
      const view = $('view').value || 'mobile';
      parts.push(`Room ${room}`);
      parts.push(`diff ${diff}`);
      parts.push(`time ${time}s`);
      parts.push(`view ${view}`);
      $('joinNote').textContent = `ค่าที่ตั้งจากครู: ${parts.join(' • ')}`;
    })();

    $('rosterPick').addEventListener('change', (ev)=>{
      applyRosterSelection(ev.target.value);
    });

    $('room').addEventListener('change', ()=>{
      renderRosterPick();
    });

    $('room').addEventListener('blur', async ()=>{
      const room = ($('room').value || 'P5A').trim().toUpperCase();
      hideLockWarn();
      hideSpectatorBox();

      try{
        const policy = await getRoomPolicy(room);
        if(policy?.roomLocked){
          showLockWarn(policy?.message || `ห้อง ${room} ถูกล็อกอยู่`);
          if(policy?.allowSpectatorOnly && policy?.spectatorUrl){
            showSpectatorBox(policy.spectatorUrl, policy?.message || `ห้อง ${room} เปิดให้เข้าชมแทน`);
          }
        }
      }catch(_){}
    });

    $('pid').addEventListener('blur', async ()=>{
      const pid = ($('pid').value || '').trim();
      const room = ($('room').value || 'P5A').trim().toUpperCase();
      hideDupWarn();
      if(!pid) return;

      try{
        const dup = await checkDuplicatePidInRoom(room, pid);
        if(dup?.duplicate){
          const names = dup.matches.map(m => `${m.nick || '-'}${m.connected ? ' (connected)' : ''}`).join(', ');
          showDupWarn(`PID นี้มีอยู่แล้วในห้อง ${room}: ${names}`);
        }
      }catch(_){}
    });

    $('btnOpenSpectator').addEventListener('click', ()=>{
      if(!currentSpectatorUrl) return;
      location.href = currentSpectatorUrl;
    });

    $('btnJoin').onclick = async ()=>{
      const nick = ($('nick').value || '').trim();
      const pid = ($('pid').value || '').trim() || nick || 'anon';
      const room = ($('room').value || 'P5A').trim().toUpperCase();

      hideDupWarn();
      hideLockWarn();
      hideSpectatorBox();

      try{
        const policy = await getRoomPolicy(room);
        if(policy?.roomLocked){
          showLockWarn(policy?.message || `ห้อง ${room} ถูกล็อกอยู่`);
          if(policy?.allowSpectatorOnly && policy?.spectatorUrl){
            showSpectatorBox(policy.spectatorUrl, policy?.message || `ห้อง ${room} เปิดให้เข้าชมแทน`);
          }
          return;
        }
      }catch(_){}

      try{
        const dup = await checkDuplicatePidInRoom(room, pid);
        if(dup?.duplicate){
          const names = dup.matches.map(m => `${m.nick || '-'}${m.connected ? ' (connected)' : ''}`).join(', ');
          showDupWarn(`ตรวจพบ PID ซ้ำในห้อง ${room}: ${pid} • ${names}`);

          const ok = confirm(`พบ PID ซ้ำในห้อง ${room}\nPID: ${pid}\nรายการ: ${names}\n\nต้องการเข้าเล่นต่อหรือไม่?`);
          if(!ok) return;
        }
      }catch(_){}

      const u = new URL('./vr-goodjunk/goodjunk-vr.html', location.href);
      u.searchParams.set('mode', qs('mode', 'battle') || 'battle');
      u.searchParams.set('source', 'student-join');
      u.searchParams.set('room', room);
      u.searchParams.set('nick', nick || pid);
      u.searchParams.set('pid', pid);
      u.searchParams.set('view', $('view').value);
      u.searchParams.set('diff', $('diff').value);
      u.searchParams.set('time', $('time').value);
      u.searchParams.set('hub', $('hub').value || new URL('./hub.html', location.href).toString());
      u.searchParams.set('seed', String(Date.now()));

      try{
        localStorage.setItem('HH_STUDENT_NICK', nick || '');
        localStorage.setItem('HH_STUDENT_PID', pid || '');
        localStorage.setItem('HH_STUDENT_ROOM', room || '');
      }catch(_){}

      try{
        const attKey = 'HH_GJ_ATTENDANCE';
        const raw = localStorage.getItem(attKey);
        const rows = raw ? JSON.parse(raw) : [];
        rows.push({
          ts: new Date().toISOString(),
          room,
          nick: nick || pid,
          pid: pid || '',
          source: 'student-join'
        });
        localStorage.setItem(attKey, JSON.stringify(rows));
      }catch(_){}

      try{
        await writeCentralAttendance({
          room,
          nick: nick || pid,
          pid: pid || '',
          source: 'student-join'
        });
      }catch(_){}

      location.href = u.toString();
    };

    try{
      if(!$('nick').value) $('nick').value = localStorage.getItem('HH_STUDENT_NICK') || '';
      if(!$('pid').value) $('pid').value = localStorage.getItem('HH_STUDENT_PID') || '';
      if(!$('room').value) $('room').value = localStorage.getItem('HH_STUDENT_ROOM') || 'P5A';
    }catch(_){}

    hideSpectatorBox();
    loadRoster();
  </script>
</body>
</html>
