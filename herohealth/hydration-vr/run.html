  />

  <title>HeroHealth • Hydration Run</title>

  <link rel="icon" href="../favicon.ico" />

  <!--
    HeroHealth Hydration Run
    File: /herohealth/hydration-vr/run.html
    Version: v20260523-pack36-run-inline-core-loader-final

    Purpose:
      Shared run engine for Hydration

    Supports:
      mode = solo / duet / race / battle / coop
      view = pc / mobile / cvr

    Pack36:
      - Inline core loader อยู่ใน script block แรก
      - ไม่พึ่ง script block ถัดไป
      - โหลด hydration-vr.js เป็น core ก่อน patch ทุกตัว
      - patch ทุกตัวเป็น optional
      - คง Pack31 inline start bridge
      - Solo route ไม่เข้า lobby
      - Multiplayer ต้องมี mpReady=1 ก่อนเข้า run
  -->
</head>

<body class="hha-hydration-page hha-hydration-arena">
  <main id="hha-hydration-app" class="hha-hydration-app" aria-label="HeroHealth Hydration Game">
    <section id="hha-hydration-stage" class="hha-hydration-stage" aria-label="Aqua Rush Play Stage">
      <div id="hha-hydration-bg" class="hha-hydration-bg" aria-hidden="true">
        <div class="hha-bg-bubble hha-bg-bubble-1"></div>
        <div class="hha-bg-bubble hha-bg-bubble-2"></div>
        <div class="hha-bg-bubble hha-bg-bubble-3"></div>
        <div class="hha-bg-bubble hha-bg-bubble-4"></div>
        <div class="hha-bg-wave hha-bg-wave-1"></div>
        <div class="hha-bg-wave hha-bg-wave-2"></div>
      </div>

      <div
        id="hha-hydration-playfield"
        class="hha-hydration-playfield"
        aria-label="พื้นที่เล่นเกม"
      ></div>

      <div
        id="hha-hydration-live-region"
        class="hha-sr-only"
        aria-live="polite"
        aria-atomic="true"
      ></div>
    </section>

    <noscript>
      <div class="hha-noscript">
        <div class="hha-noscript-card">
          <h1>ต้องเปิด JavaScript ก่อนเล่นเกม</h1>
          <p>เกม HeroHealth Hydration ต้องใช้ JavaScript เพื่อแสดงเป้า ภารกิจ คะแนน และสรุปผล</p>
        </div>
      </div>
    </noscript>
  </main>

  <script>
    window.HHA = window.HHA || {};
    window.HHA.HYDRATION_RUN_VERSION = 'v20260523-pack36-run-inline-core-loader-final';
    window.HHA_HYDRATION_ENTRY_PATH = '/herohealth/hydration-vr/run.html';

    (function(){
      'use strict';

      var VERSION = 'v20260523-pack36-run-inline-core-loader-final';

      var ALLOWED_VIEWS = ['pc','mobile','cvr'];
      var ALLOWED_MODES = ['solo','duet','race','battle','coop'];

      var u = new URL(location.href);

      function heroBase(){
        try{
          var marker = '/herohealth/';
          var idx = location.pathname.indexOf(marker);

          if(idx >= 0){
            return location.origin + location.pathname.slice(0, idx + marker.length);
          }

          return new URL('../', location.href).toString();
        }catch(e){
          return 'https://supparang.github.io/webxr-health-mobile/herohealth/';
        }
      }

      function safeDecode(v){
        try{
          return decodeURIComponent(String(v || ''));
        }catch(e){
          return String(v || '');
        }
      }

      function nutritionZoneUrl(){
        var base = heroBase();
        var zone = new URL('nutrition-zone.html', base);

        [
          'pid',
          'name',
          'nick',
          'diff',
          'time',
          'view',
          'log',
          'api',
          'studyId',
          'conditionGroup'
        ].forEach(function(k){
          var v = u.searchParams.get(k);
          if(v !== null && v !== ''){
            zone.searchParams.set(k, v);
          }
        });

        zone.searchParams.set('hub', new URL('hub.html', base).toString());

        return zone.toString();
      }

      function isBadHub(raw){
        var h = safeDecode(raw || '').toLowerCase();

        if(!h) return true;

        return (
          h.indexOf('warmup-gate.html') !== -1 ||
          h.indexOf('phase=cooldown') !== -1 ||
          h.indexOf('gatephase=cooldown') !== -1 ||
          h.indexOf('studyphase=cooldown') !== -1 ||
          h.indexOf('hydration-vr/run.html') !== -1 ||
          h.indexOf('hydration-vr/lobby.html') !== -1 ||
          h.indexOf('lobby.html') !== -1
        );
      }

      function sanitizeHub(){
        var hub = u.searchParams.get('hub') || '';

        if(isBadHub(hub)){
          u.searchParams.set('hub', nutritionZoneUrl());
        }
      }

      function normalizeMode(v){
        v = String(v || '').toLowerCase();

        if(ALLOWED_MODES.includes(v)){
          return v;
        }

        /*
          กันลิงก์เก่า:
          mode=pc/mobile/cvr คือ view ไม่ใช่ mode
        */
        if(ALLOWED_VIEWS.includes(v)){
          return 'solo';
        }

        return 'solo';
      }

      function normalizeView(v){
        v = String(v || '').toLowerCase();

        if(ALLOWED_VIEWS.includes(v)){
          return v;
        }

        /*
          กันลิงก์เก่าที่ส่ง view=solo/duet/...
        */
        if(ALLOWED_MODES.includes(v)){
          return 'mobile';
        }

        return 'mobile';
      }

      function isMultiplayerMode(mode){
        return ['duet','race','battle','coop'].includes(normalizeMode(mode));
      }

      var rawMode = u.searchParams.get('mode') || 'solo';
      var rawView = u.searchParams.get('view') || 'mobile';

      /*
        ถ้า URL เก่าส่ง mode=pc/mobile/cvr
        ให้ย้ายไปเป็น view และบังคับ mode=solo
      */
      if(ALLOWED_VIEWS.includes(String(rawMode).toLowerCase())){
        rawView = rawMode;
        rawMode = 'solo';
      }

      var mode = normalizeMode(rawMode);
      var view = normalizeView(rawView);

      u.searchParams.set('mode', mode);
      u.searchParams.set('view', view);
      u.searchParams.set('zone', 'nutrition');
      u.searchParams.set('game', 'hydration');
      u.searchParams.set('run', u.searchParams.get('run') || 'play');

      sanitizeHub();

      /*
        Multiplayer safety gate:
        ถ้า mode ไม่ใช่ solo แต่ยังไม่มี mpReady=1
        ห้ามเข้า run ตรง ให้ย้อนกลับไป lobby.html
      */
      if(isMultiplayerMode(mode) && u.searchParams.get('mpReady') !== '1'){
        var lobby = new URL('./lobby.html', location.href);

        u.searchParams.forEach(function(value, key){
          lobby.searchParams.set(key, value);
        });

        lobby.searchParams.set('mode', mode);
        lobby.searchParams.set('view', view);
        lobby.searchParams.set('zone', 'nutrition');
        lobby.searchParams.set('game', 'hydration');

        if(!lobby.searchParams.get('room') && u.searchParams.get('roomId')){
          lobby.searchParams.set('room', u.searchParams.get('roomId'));
        }

        location.replace(lobby.toString());
        return;
      }

      /*
        Solo ห้ามมีค่า multiplayer ค้าง
      */
      if(mode === 'solo'){
        u.searchParams.delete('mp');
        u.searchParams.delete('mpReady');
        u.searchParams.delete('room');
        u.searchParams.delete('roomId');
        u.searchParams.delete('capacity');
        u.searchParams.delete('players');
        u.searchParams.delete('matchId');
      }

      /*
        URL ที่ส่งมาจาก cooldown บางรอบยาวและ hub ผิด
        replace ให้สะอาด แต่ไม่ reload
      */
      try{
        if(location.href !== u.toString()){
          history.replaceState(null, '', u.toString());
        }
      }catch(e){}

      document.body.dataset.view = view;
      document.body.dataset.mode = mode;
      document.body.dataset.hhaView = view;

      document.body.classList.add('hha-view-' + view);
      document.body.classList.add('hha-mode-' + mode);

      if(isMultiplayerMode(mode)){
        document.body.classList.add('hha-multiplayer');
      }

      if(view === 'cvr'){
        document.body.classList.add('hha-cardboard-ready');
      }

      window.HHA_HYDRATION_RUN_CONTEXT = {
        version: VERSION,
        mode: mode,
        view: view,
        zone: 'nutrition',
        game: 'hydration',
        room: u.searchParams.get('room') || u.searchParams.get('roomId') || '',
        roomId: u.searchParams.get('roomId') || u.searchParams.get('room') || '',
        matchId: u.searchParams.get('matchId') || '',
        mpReady: u.searchParams.get('mpReady') || '',
        capacity: u.searchParams.get('capacity') || u.searchParams.get('players') || '',
        pid: u.searchParams.get('pid') || 'anon',
        name: u.searchParams.get('name') || u.searchParams.get('nick') || 'Hero',
        diff: u.searchParams.get('diff') || 'normal',
        time: u.searchParams.get('time') || '90',
        seed: u.searchParams.get('seed') || String(Date.now()),
        hub: u.searchParams.get('hub') || nutritionZoneUrl(),
        nutritionZone: nutritionZoneUrl()
      };

      window.HHA_LOAD_SCRIPT = function(src){
        return new Promise(function(resolve, reject){
          var s = document.createElement('script');
          s.src = src;
          s.async = true;

          s.onload = function(){
            resolve(src);
          };

          s.onerror = function(){
            reject(new Error('โหลดไฟล์ไม่สำเร็จ: ' + src));
          };

          document.body.appendChild(s);
        });
      };

      window.HHA_HYDRATION_SHOW_BOOT_ERROR = function(msg){
        var old = document.getElementById('hha-hydration-boot-error');
        if(old){
          try{ old.remove(); }catch(e){}
        }

        var box = document.createElement('div');
        box.id = 'hha-hydration-boot-error';
        box.style.cssText = [
          'position:fixed',
          'inset:18px',
          'z-index:999999',
          'display:grid',
          'place-items:center',
          'pointer-events:auto'
        ].join(';');

        box.innerHTML = [
          '<div style="',
            'max-width:480px;',
            'width:94vw;',
            'border-radius:28px;',
            'padding:22px;',
            'background:#fff;',
            'color:#24445c;',
            'box-shadow:0 24px 70px rgba(20,54,88,.28);',
            'text-align:center;',
            'font-family:system-ui,-apple-system,Segoe UI,sans-serif;',
          '">',
            '<div style="font-size:48px">⚠️</div>',

            '<h1 style="',
              'margin:6px 0 8px;',
              'font-size:24px;',
              'line-height:1.15;',
            '">',
              'Hydration ยังไม่เริ่มทำงาน',
            '</h1>',

            '<p style="',
              'margin:0 0 12px;',
              'font-weight:850;',
              'color:#66879c;',
              'line-height:1.35;',
            '">',
              String(msg || 'ตรวจสอบ hydration-vr.js / hydration-vr.css / patch / vr-ui.js'),
            '</p>',

            '<div style="',
              'padding:10px 12px;',
              'border-radius:16px;',
              'background:#f1fbff;',
              'font-size:12px;',
              'font-weight:800;',
              'text-align:left;',
              'color:#42677d;',
              'word-break:break-all;',
            '">',
              'Critical file:<br>',
              '/herohealth/hydration-vr/hydration-vr.js<br><br>',
              'Optional patch files:<br>',
              '/herohealth/hydration-vr/hydration-vr.mode-patch.js<br>',
              '/herohealth/hydration-vr/hydration-start-hard-safe.patch.js<br>',
              '/herohealth/hydration-vr/hydration-cooldown-return.patch.js<br>',
              '/herohealth/hydration-vr/hydration-modes.js<br>',
              '/herohealth/vr/vr-ui.js เฉพาะ view=cvr',
            '</div>',

            '<button onclick="location.reload()" style="',
              'margin-top:14px;',
              'width:100%;',
              'border:0;',
              'border-radius:18px;',
              'padding:13px 16px;',
              'color:white;',
              'background:linear-gradient(180deg,#43c7ff,#2388ff);',
              'font-size:17px;',
              'font-weight:1000;',
              'cursor:pointer;',
            '">',
              'โหลดใหม่',
            '</button>',
          '</div>'
        ].join('');

        document.body.appendChild(box);
      };

      window.HHA_HYDRATION_BUILD_LOBBY_URL = function(){
        var lobby = new URL('./lobby.html', location.href);

        u.searchParams.forEach(function(value, key){
          lobby.searchParams.set(key, value);
        });

        lobby.searchParams.set('mode', mode);
        lobby.searchParams.set('view', view);
        lobby.searchParams.set('zone', 'nutrition');
        lobby.searchParams.set('game', 'hydration');

        if(window.HHA_HYDRATION_RUN_CONTEXT.room){
          lobby.searchParams.set('room', window.HHA_HYDRATION_RUN_CONTEXT.room);
        }

        return lobby.toString();
      };

      window.HHA_HYDRATION_BUILD_MODE_HUB_URL = function(){
        var hub = new URL('../hydration-vr.html', location.href);

        [
          'pid',
          'name',
          'nick',
          'diff',
          'time',
          'view',
          'log',
          'api',
          'studyId',
          'conditionGroup'
        ].forEach(function(k){
          var v = u.searchParams.get(k);
          if(v !== null && v !== ''){
            hub.searchParams.set(k, v);
          }
        });

        hub.searchParams.set('mode', mode);
        hub.searchParams.set('view', view);
        hub.searchParams.set('launcher','1');
        hub.searchParams.set('hub', nutritionZoneUrl());

        return hub.toString();
      };

      window.HHA_HYDRATION_BUILD_NUTRITION_ZONE_URL = nutritionZoneUrl;

      /* =========================================================
         PATCH v20260519-pack31-HYDRATION-START-BRIDGE
         Final emergency bridge for Start button
         - อยู่ใน run.html โดยตรง
         - ไม่พึ่ง external patch
         - ถ้า Start card แสดงอยู่ แล้วกดปุ่ม จะเรียก engine start ทันที
         ========================================================= */

      (function(){
        'use strict';

        var PATCH = 'v20260519-pack31-start-bridge-inline';
        var lastAt = 0;

        if(window.HHA_HYDRATION_START_BRIDGE_PACK31){
          return;
        }

        window.HHA_HYDRATION_START_BRIDGE_PACK31 = true;

        function q(sel, root){
          try{
            return (root || document).querySelector(sel);
          }catch(e){
            return null;
          }
        }

        function qa(sel, root){
          try{
            return Array.from((root || document).querySelectorAll(sel));
          }catch(e){
            return [];
          }
        }

        function safeStop(ev){
          if(!ev) return;

          try{ ev.preventDefault(); }catch(e){}
          try{ ev.stopPropagation(); }catch(e){}

          try{
            if(ev.stopImmediatePropagation){
              ev.stopImmediatePropagation();
            }
          }catch(e){}
        }

        function isStartOpen(){
          return !!(
            q('.hha-hydration-start') ||
            q('.hha-start-btn') ||
            q('[data-hha-hydration-start-btn]')
          );
        }

        function isStartTrigger(target){
          if(!target || !target.closest) return false;

          var btn = target.closest(
            '[data-hha-hydration-start-btn], .hha-start-btn, button'
          );

          if(!btn) return false;

          var text = String(btn.textContent || '').toLowerCase();

          return (
            btn.matches('[data-hha-hydration-start-btn], .hha-start-btn') ||
            text.indexOf('เริ่มภารกิจ') !== -1 ||
            text.indexOf('start') !== -1
          );
        }

        function unlockStartUi(){
          try{
            document.body.classList.remove('hha-hydration-summary-open');
            document.documentElement.classList.remove('hha-hydration-summary-open-html');

            document.body.style.pointerEvents = '';
            document.body.style.overflow = '';
            document.body.style.touchAction = '';

            var overlay = q('.hha-hydration-start');
            if(overlay){
              overlay.style.pointerEvents = 'auto';
              overlay.style.zIndex = '999990';
            }

            var card = q('.hha-hydration-start .hha-start-card');
            if(card){
              card.style.pointerEvents = 'auto';
              card.style.zIndex = '999991';
              card.style.position = card.style.position || 'relative';
            }

            qa('[data-hha-hydration-start-btn], .hha-start-btn').forEach(function(btn){
              btn.style.pointerEvents = 'auto';
              btn.style.zIndex = '999992';
              btn.style.position = btn.style.position || 'relative';
              btn.style.touchAction = 'manipulation';
              btn.dataset.hhaStartBridgePack31 = PATCH;
            });
          }catch(e){}
        }

        function startNow(reason){
          if(!isStartOpen()) return false;

          unlockStartUi();

          /*
            รีเซ็ต state เฉพาะตอน Start card ยังอยู่
            กัน started=true ค้างจากรอบก่อน
          */
          try{
            if(window.HHA && window.HHA.Hydration){
              window.HHA.Hydration.started = false;
              window.HHA.Hydration.destroyed = false;
            }
          }catch(e){}

          try{
            if(typeof window.HHA_HYDRATION_FORCE_START === 'function'){
              console.info('[Hydration Pack31] force start via HHA_HYDRATION_FORCE_START:', reason || '');
              return !!window.HHA_HYDRATION_FORCE_START();
            }
          }catch(err0){
            console.error('[Hydration Pack31] HHA_HYDRATION_FORCE_START failed:', err0);
          }

          try{
            if(typeof window.beginHydrationFromOverlay === 'function'){
              console.info('[Hydration Pack31] force start via beginHydrationFromOverlay:', reason || '');
              window.beginHydrationFromOverlay();
              return true;
            }
          }catch(err1){
            console.error('[Hydration Pack31] beginHydrationFromOverlay failed:', err1);
          }

          return false;
        }

        function bindButton(btn){
          if(!btn || btn.dataset.hhaStartBridgePack31Bound === PATCH) return;

          btn.dataset.hhaStartBridgePack31Bound = PATCH;

          btn.onclick = function(ev){
            var ok = startNow('onclick');

            if(ok){
              safeStop(ev);
              return false;
            }

            return true;
          };

          ['click','pointerup','mouseup','touchend'].forEach(function(type){
            btn.addEventListener(type, function(ev){
              var t = Date.now();

              if(t - lastAt < 320){
                safeStop(ev);
                return false;
              }

              var ok = startNow(type);

              if(ok){
                lastAt = t;
                safeStop(ev);
                return false;
              }

              return true;
            }, { capture:true, passive:false });
          });

          btn.addEventListener('pointerdown', unlockStartUi, true);
          btn.addEventListener('touchstart', unlockStartUi, { capture:true, passive:true });
        }

        function bindAll(){
          unlockStartUi();

          qa('[data-hha-hydration-start-btn], .hha-start-btn').forEach(bindButton);
        }

        function globalHandler(ev){
          if(!isStartTrigger(ev.target)) return;

          var t = Date.now();

          if(t - lastAt < 320){
            safeStop(ev);
            return false;
          }

          var ok = startNow('global-' + ev.type);

          if(ok){
            lastAt = t;
            safeStop(ev);
            return false;
          }

          return true;
        }

        ['click','pointerup','mouseup','touchend'].forEach(function(type){
          window.addEventListener(type, globalHandler, { capture:true, passive:false });
          document.addEventListener(type, globalHandler, { capture:true, passive:false });
        });

        var mo = new MutationObserver(bindAll);

        if(document.body){
          mo.observe(document.body, {
            childList:true,
            subtree:true,
            attributes:true,
            attributeFilter:['class','style']
          });
        }

        setInterval(bindAll, 450);

        window.HHA_HYDRATION_START_BRIDGE_START = startNow;

        console.info('[Hydration Pack31] inline start bridge loaded');
      })();

      function bootCheck(){
        var hyd = window.HHA && window.HHA.Hydration;

        var hasStart =
          document.querySelector('.hha-hydration-start') ||
          document.querySelector('.hha-start') ||
          document.querySelector('[data-hha-hydration-start]') ||
          document.querySelector('.hha-start-btn');

        var hasHud =
          document.querySelector('.hha-hydration-hud') ||
          document.querySelector('.hha-timebar');

        var hasSummary =
          document.querySelector('.hha-hydration-summary') ||
          document.querySelector('#hha-hydration-summary') ||
          document.querySelector('.hha-summary-card') ||
          document.querySelector('[data-hha-summary]');

        var hasTarget =
          document.querySelector('.hha-hydration-target');

        if(!hasStart && !hasHud && !hasSummary && !hasTarget && !(hyd && hyd.booted)){
          window.HHA_HYDRATION_SHOW_BOOT_ERROR('โหลดหน้าได้ แต่ Hydration engine ไม่ boot');
        }
      }

      window.HHA_HYDRATION_BOOT_CHECK = bootCheck;

      console.info('[Hydration Pack36] run context ready; inline core loader starts now');

      /* =========================================================
         Pack36 Inline Core Loader
         - อยู่ใน script block แรกเลย
         - ไม่รอ script block ถัดไป
         - ถ้า core ไม่โหลด ต้องเห็น error ชัด
      ========================================================= */

      (function(){
        console.info('[Hydration Pack36] inline core loader start');

        function loadScript(src, label, timeoutMs){
          timeoutMs = timeoutMs || 7000;

          return new Promise(function(resolve, reject){
            var done = false;
            var s = document.createElement('script');

            function finish(ok, value){
              if(done) return;
              done = true;
              clearTimeout(timer);

              if(ok) resolve(value || src);
              else reject(value || new Error(label + ' load failed: ' + src));
            }

            var timer = setTimeout(function(){
              finish(false, new Error(label + ' timeout: ' + src));
            }, timeoutMs);

            s.src = src;
            s.async = true;

            s.onload = function(){
              console.info('[Hydration Pack36] loaded:', label);
              finish(true, src);
            };

            s.onerror = function(){
              finish(false, new Error(label + ' error: ' + src));
            };

            document.body.appendChild(s);
          });
        }

        function showError(msg){
          if(typeof window.HHA_HYDRATION_SHOW_BOOT_ERROR === 'function'){
            window.HHA_HYDRATION_SHOW_BOOT_ERROR(msg);
            return;
          }

          document.body.innerHTML =
            '<pre style="padding:24px;font:16px monospace;color:#b00020;background:#fff">' +
            String(msg || 'Hydration boot failed') +
            '</pre>';
        }

        loadScript('./hydration-vr.js?v=20260523-pack36-core-inline', 'hydration core', 9000)
          .then(function(){
            console.info(
              '[Hydration Pack36] core checkpoint:',
              'HHA=', !!window.HHA,
              'Hydration=', !!(window.HHA && window.HHA.Hydration),
              'start=', typeof window.beginHydrationFromOverlay,
              'force=', typeof window.HHA_HYDRATION_FORCE_START
            );

            return loadScript('./hydration-vr.mode-patch.js?v=20260518-pack30', 'mode patch', 4000)
              .catch(function(err){
                console.warn('[Hydration Pack36] mode patch optional failed:', err);
              });
          })
          .then(function(){
            return loadScript('./hydration-start-hard-safe.patch.js?v=20260518-pack30', 'start patch', 4000)
              .catch(function(err){
                console.warn('[Hydration Pack36] start patch optional failed:', err);
              });
          })
          .then(function(){
            return loadScript('./hydration-cooldown-return.patch.js?v=20260518-pack30', 'cooldown patch', 4000)
              .catch(function(err){
                console.warn('[Hydration Pack36] cooldown patch optional failed:', err);
              });
          })
          .then(function(){
            return loadScript('./hydration-modes.js?v=20260517-pack22', 'modes patch', 3000)
              .catch(function(err){
                console.warn('[Hydration Pack36] modes optional failed:', err);
              });
          })
          .then(function(){
            var ctx = window.HHA_HYDRATION_RUN_CONTEXT || {};
            var cvrView = String(ctx.view || document.body.dataset.view || '').toLowerCase();

            if(cvrView === 'cvr'){
              return loadScript('../vr/vr-ui.js?v=20260517-pack22', 'vr-ui', 4000)
                .catch(function(err){
                  console.warn('[Hydration Pack36] vr-ui optional failed:', err);
                });
            }
          })
          .then(function(){
            console.info('[Hydration Pack36] loader finished');

            setTimeout(function(){
              if(typeof window.HHA_HYDRATION_BOOT_CHECK === 'function'){
                window.HHA_HYDRATION_BOOT_CHECK();
              }
            }, 1200);
          })
          .catch(function(err){
            console.error('[Hydration Pack36] critical core failed:', err);
            showError((err && err.message) || 'โหลด hydration-vr.js ไม่สำเร็จ');
          });
      })();

    })();
  </script>
</body>
