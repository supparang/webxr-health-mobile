<!-- === /herohealth/plate/plate-vr.html ===
PlateVR — RUN (PC/Mobile/cVR) — PRODUCTION (Classroom Compact HUD)
✅ Uses: ./plate.safe.js (ESM)
✅ Uses: ../vr/vr-ui.js (ENTER VR/EXIT/RECENTER + hha:shoot)
✅ Uses: ../vr/ai-hooks.js (optional, safe import)
✅ Mobile HUD compact + auto-minimize + toggle
FULL v20260302-PLATE-RUN-CLASSROOM-COMPACT
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth — Plate VR (Run)</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="../favicon.ico" type="image/x-icon" />

  <!-- ✅ Shared VR UI (ENTER VR / EXIT / RECENTER / crosshair shoot -> hha:shoot) -->
  <script type="module" src="../vr/vr-ui.js?v=20260302"></script>

  <style>
    :root{
      --sat: env(safe-area-inset-top, 0px);
      --sar: env(safe-area-inset-right, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);

      --hud-top: calc(var(--sat) + 8px);
      --hud-bottom: calc(var(--sab) + 10px);

      --panel: rgba(2,6,23,.78);
      --line: rgba(148,163,184,.18);
      --txt: rgba(229,231,235,.96);
      --mut: rgba(148,163,184,.92);
      --good: rgba(16,185,129,.95);
      --warn: rgba(251,191,36,.95);
      --bad: rgba(239,68,68,.95);
      --accent: rgba(99,102,241,.95);

      --radius: 16px;

      /* compact knobs */
      --pillH: 38px;
      --pillFs: 13px;
      --pillV: 15px;
      --cardPad: 10px 12px;
    }

    *{ box-sizing:border-box; }
    html,body{
      margin:0; height:100%; overflow:hidden;
      background:#020617; color:var(--txt);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    }
    body{
      background:
        radial-gradient(1200px 700px at 20% 0%, rgba(14,165,233,.18), transparent 60%),
        radial-gradient(900px 700px at 95% 20%, rgba(99,102,241,.12), transparent 60%),
        linear-gradient(180deg, #020617, #020b1b);
    }
    #app{ position:fixed; inset:0; overflow:hidden; }
    #world{ position:absolute; inset:0; z-index:0; pointer-events:none; }

    /* ===== spawn mount ===== */
    #plate-layer{
      position:absolute; inset:0;
      z-index:30;
      pointer-events:none;
      overflow:hidden;
      transform: translateZ(0);
      will-change: contents;
      min-width: 1px;
      min-height: 1px;
    }

    .plateTarget{
      position:absolute;
      display:grid;
      place-items:center;
      width:54px; height:54px;
      border-radius:999px;
      background:rgba(15,23,42,.82);
      border:1px solid rgba(255,255,255,.14);
      box-shadow: 0 8px 20px rgba(2,6,23,.35);
      font-size: 28px;
      line-height:1;
      user-select:none;
      pointer-events:auto;
      touch-action:manipulation;
      transition: transform .08s ease, opacity .14s ease;
      transform: translate(-50%,-50%);
    }
    .plateTarget[data-kind="wrong"]{
      background:rgba(127,29,29,.55);
      border-color: rgba(248,113,113,.25);
      box-shadow: 0 8px 20px rgba(127,29,29,.18);
    }
    .plateTarget.hit{ transform: translate(-50%,-50%) scale(.88); opacity:.25; }
    .plateTarget.expire{ transform: translate(-50%,-50%) scale(.78); opacity:0; }

    /* ===== HUD layout ===== */
    .hud{
      position:absolute;
      left:max(10px, calc(var(--sal) + 10px));
      right:max(10px, calc(var(--sar) + 10px));
      z-index:80;
      display:grid;
      gap:8px;
      pointer-events:none;
    }
    #hudTop{ top:var(--hud-top); }
    #hudBottom{
      bottom:var(--hud-bottom);
      grid-template-columns: 1fr;
      gap:10px;
    }

    .row{ display:grid; gap:8px; }
    .row.cols-3{ grid-template-columns: 1.05fr 1.05fr 0.9fr; }
    @media (max-width: 780px){
      .row.cols-3{ grid-template-columns: 1fr; }
    }

    .card{
      background: linear-gradient(180deg, rgba(2,6,23,.84), rgba(2,6,23,.70));
      border:1px solid var(--line);
      border-radius: 18px;
      padding: var(--cardPad);
      box-shadow: 0 8px 24px rgba(2,6,23,.22);
      pointer-events:none;
    }
    .card h4{
      margin:0 0 6px 0;
      font-size:12px;
      color:var(--mut);
      font-weight:800;
      letter-spacing:.2px;
    }

    .stats{
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap:8px;
    }
    .stats.two{ grid-template-columns: repeat(2, minmax(0,1fr)); }

    .pill{
      background: rgba(15,23,42,.7);
      border:1px solid rgba(148,163,184,.16);
      border-radius: 999px;
      min-height: var(--pillH);
      display:flex; align-items:center; justify-content:center;
      gap:8px; padding: 8px 10px;
      font-weight:800;
      font-size: var(--pillFs);
    }
    .pill .v{ font-size: var(--pillV); font-weight:950; }

    .bar{
      height: 9px;
      border-radius: 999px;
      background: rgba(148,163,184,.18);
      border:1px solid rgba(148,163,184,.14);
      overflow:hidden;
    }
    .bar > i{
      display:block; height:100%; width:0%;
      background: linear-gradient(90deg, rgba(16,185,129,.9), rgba(99,102,241,.9));
      transition: width .18s ease;
    }

    /* ===== controls ===== */
    #controls{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      pointer-events:auto;
      align-items:center;
      justify-content:flex-start;
    }
    .btn{
      appearance:none;
      border:1px solid rgba(148,163,184,.22);
      background: rgba(2,6,23,.78);
      color:var(--txt);
      border-radius: 999px;
      padding:10px 14px;
      min-height:44px;
      font-weight:900;
      font-size:14px;
      cursor:pointer;
      box-shadow: 0 6px 18px rgba(2,6,23,.22);
    }
    .btn.primary{
      border-color: rgba(59,130,246,.35);
      background: linear-gradient(180deg, rgba(30,64,175,.92), rgba(30,58,138,.92));
    }
    .btn.warn{
      border-color: rgba(245,158,11,.25);
      background: linear-gradient(180deg, rgba(120,53,15,.8), rgba(92,45,14,.8));
    }

    /* ===== topbar tools (minimize) ===== */
    #topTools{
      position:absolute;
      top: calc(var(--hud-top) - 2px);
      right: max(10px, calc(var(--sar) + 10px));
      z-index: 92;
      display:flex;
      gap:8px;
      pointer-events:auto;
    }
    .toolBtn{
      min-height: 34px;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 950;
    }

    /* ===== compact/minimized HUD ===== */
    body.hud-min #hudTop{
      opacity: .18;
      transform: scale(.985);
      pointer-events:none;
    }
    body.hud-min #hudTop .card{
      filter: blur(.2px);
    }

    @media (max-width: 480px){
      :root{ --pillH: 36px; --pillFs: 12px; --pillV: 14px; --cardPad: 9px 10px; }
      .plateTarget{ width:50px; height:50px; font-size:26px; }
      #controls .btn{ flex:1 1 auto; min-width: 46%; }
    }

    /* ===== End summary overlay ===== */
    #endOverlay{
      position:absolute; inset:0;
      z-index:120;
      display:flex; align-items:center; justify-content:center;
      padding:16px;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    #endOverlay[aria-hidden="true"]{ display:none; }

    .endCard{
      width:min(640px, 94vw);
      border-radius: 18px;
      border:1px solid rgba(148,163,184,.18);
      background: rgba(2,6,23,.82);
      color: rgba(229,231,235,.95);
      box-shadow: 0 18px 60px rgba(0,0,0,.45);
      padding: 14px;
    }
    .endGrid{
      margin-top:10px;
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap:10px;
    }
    .endItem{
      border:1px solid rgba(148,163,184,.14);
      background: rgba(2,6,23,.55);
      border-radius: 14px;
      padding: 10px 12px;
      font-weight:950;
    }
    .endItem .k{ font-size:12px; opacity:.82; font-weight:800; }
    .endItem .v{ margin-top:4px; font-size:18px; font-variant-numeric: tabular-nums; }
    .endActions{
      margin-top: 12px;
      display:flex;
      gap: 10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .is-hidden{ display:none !important; }
  </style>
</head>

<body>
  <div id="app">
    <div id="world" aria-hidden="true"></div>

    <!-- Spawn mount -->
    <div id="plate-layer" aria-label="plate targets layer"></div>

    <!-- tools -->
    <div id="topTools" aria-label="tools">
      <button id="btnHud" class="btn toolBtn" type="button">🧩 HUD</button>
    </div>

    <!-- TOP HUD -->
    <div id="hudTop" class="hud">
      <div class="row cols-3">
        <div class="card">
          <h4>คะแนน / คอมโบ / พลาด</h4>
          <div class="stats">
            <div class="pill">🏆 <span id="uiScore" class="v">0</span></div>
            <div class="pill">🔥 <span id="uiCombo" class="v">0</span> <span style="opacity:.8">(max <span id="uiComboMax">0</span>)</span></div>
            <div class="pill">💥 <span id="uiMiss" class="v">0</span></div>
          </div>
        </div>

        <div class="card">
          <h4>จาน / ความแม่นยำ / เกรด</h4>
          <div class="stats">
            <div class="pill">🍽️ <span id="uiPlateHave" class="v">0</span>/5</div>
            <div class="pill">🎯 <span id="uiAcc" class="v">0%</span></div>
            <div class="pill">🏅 <span id="uiGrade" class="v">D</span></div>
          </div>
          <div style="height:6px"></div>
          <div class="stats two">
            <div class="pill" style="justify-content:flex-start;padding-inline:12px;">
              <span id="uiGoalTitle">เติมจาน</span>
            </div>
            <div class="pill" style="justify-content:center;">
              <span id="uiGoalCount">0/5</span>
            </div>
          </div>
          <div style="height:6px"></div>
          <div class="bar"><i id="uiGoalFill"></i></div>
        </div>

        <div class="card">
          <h4>เวลา / Fever / Shield</h4>
          <div class="stats">
            <div class="pill">⏱️ <span id="uiTime" class="v">0</span>s</div>
            <div class="pill">🛡️ <span id="uiShield" class="v">0</span></div>
            <div class="pill">⚡ <span id="uiFever" class="v">0%</span></div>
          </div>
          <div style="height:6px"></div>
          <div style="font-weight:900; margin-bottom:6px; font-size:12px; color:var(--mut);">FEVER</div>
          <div class="bar"><i id="uiFeverFill"></i></div>
        </div>
      </div>

      <div class="row">
        <div class="card">
          <h4>ภารกิจตอนนี้</h4>
          <div class="pill" style="justify-content:flex-start;padding-inline:12px;">
            🎯 <span id="uiTargetText">—</span>
          </div>
        </div>
      </div>
    </div>

    <!-- BOTTOM HUD -->
    <div id="hudBottom" class="hud">
      <div class="card">
        <div style="font-weight:950">🧑‍🏫 Coach</div>
        <div id="coachMsg" style="margin-top:6px;font-weight:900">พร้อมลุย! เติมจานให้ครบ 5 หมู่ 💪</div>
        <div style="font-size:12px;opacity:.85;margin-top:4px;">
          แตะ = โดนเป้า • cVR/VR = ยิงจาก crosshair (vr-ui.js)
        </div>
      </div>

      <div id="controls">
        <button id="btnPause" class="btn warn" type="button">⏸️ PAUSE</button>
        <button id="btnRestart" class="btn" type="button">🔄 RESTART</button>
        <button id="btnBackHub" class="btn" type="button">↩ กลับ HUB</button>
      </div>
    </div>

    <!-- END SUMMARY -->
    <div id="endOverlay" aria-hidden="true">
      <div class="endCard">
        <div style="font-weight:1000;font-size:18px" id="endTitle">จบเกม</div>
        <div style="margin-top:6px;font-size:12px;opacity:.9;word-break:break-all" id="endSub">—</div>

        <div class="endGrid">
          <div class="endItem"><div class="k">GRADE</div><div class="v" id="endGrade">—</div></div>
          <div class="endItem"><div class="k">SCORE</div><div class="v" id="endScore">0</div></div>
          <div class="endItem"><div class="k">OK</div><div class="v" id="endOk">0</div></div>
          <div class="endItem"><div class="k">WRONG</div><div class="v" id="endWrong">0</div></div>
        </div>

        <div class="endActions">
          <button class="btn" id="btnCopy">Copy Summary</button>
          <button class="btn" id="btnReplay">Replay</button>
          <button class="btn primary is-hidden" id="btnNextCooldown">ถัดไป: Cooldown</button>
          <button class="btn primary" id="btnBackHub2">Back HUB</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ✅ BOOT -->
  <script type="module">
    // (Optional) Shield if installed globally
    try{
      window.HHA_Shield?.install?.({
        watchDOM:true,
        lockScroll:true,
        quietApollo403:true,
        quietNetworkNoise:true,
        showBanner:true
      });
    }catch(e){}

    const U = new URL(location.href);
    const runMode = String(U.searchParams.get('run') || 'play').toLowerCase();
    const diff = String(U.searchParams.get('diff') || 'normal').toLowerCase();
    const view = String(U.searchParams.get('view') || 'mobile').toLowerCase();
    const seed = U.searchParams.get('seed') ?? String((Date.now() ^ (Math.random()*1e9))|0);
    const time = Number(U.searchParams.get('time') || 90);
    const pid  = String(U.searchParams.get('pid') || 'anon');
    const hub  = String(U.searchParams.get('hub') || '../hub.html');
    const cooldown = (U.searchParams.get('cooldown')==='1' || U.searchParams.get('cd')==='1');
    const mode = String(U.searchParams.get('mode') || 'classroom');

    // Optional AI hooks (safe import)
    let ai = null;
    try{
      const m = await import('../vr/ai-hooks.js');
      ai = m?.createAIHooks?.({ seed:String(seed), runMode, game:'plate', diff, device:view }) || null;
      window.HHA_AI = ai;
    }catch(e){
      ai = null;
    }

    const { boot: bootPlate } = await import('./plate.safe.js');

    bootPlate({
      mount: document.getElementById('plate-layer'),
      view, run: runMode, diff,
      time, seed, pid, hub,
      cooldown,
      mode,
      ai
    });

    // UI buttons
    const btnPause   = document.getElementById('btnPause');
    const btnRestart = document.getElementById('btnRestart');
    const btnBackHub = document.getElementById('btnBackHub');
    const btnBackHub2= document.getElementById('btnBackHub2');

    let paused = false;
    function setPauseBtn(){ if(btnPause) btnPause.textContent = paused ? '▶️ RESUME' : '⏸️ PAUSE'; }
    setPauseBtn();

    btnPause?.addEventListener('click', ()=>{
      paused = !paused;
      setPauseBtn();
      window.dispatchEvent(new CustomEvent(paused ? 'hha:pause' : 'hha:resume'));
      try{ window.__PLATE_SET_PAUSED__?.(paused); }catch(e){}
      // minimize HUD when playing
      if(!paused) document.body.classList.add('hud-min');
    });

    btnRestart?.addEventListener('click', ()=>{
      try{
        const u = new URL(location.href);
        if(runMode!=='research') u.searchParams.set('seed', String((Date.now() ^ (Math.random()*1e9))|0));
        location.href = u.toString();
      }catch(e){ location.reload(); }
    });

    function goHub(){ location.href = hub; }
    btnBackHub?.addEventListener('click', goHub);
    btnBackHub2?.addEventListener('click', goHub);

    // HUD minimize toggle
    const btnHud = document.getElementById('btnHud');
    function setHudBtn(){
      const on = !document.body.classList.contains('hud-min');
      btnHud.textContent = on ? '🧩 HUD' : '🧩 HUD';
    }
    btnHud?.addEventListener('click', ()=>{
      document.body.classList.toggle('hud-min');
      setHudBtn();
    });
    setHudBtn();

    // auto minimize after 1.2s on mobile
    const isSmall = matchMedia('(max-width: 780px)').matches;
    if(isSmall){
      setTimeout(()=> document.body.classList.add('hud-min'), 1200);
    }
  </script>
</body>
</html>
