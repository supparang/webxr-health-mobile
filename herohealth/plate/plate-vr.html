<!-- === /herohealth/plate/plate-vr.html === -->
<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>HeroHealth — Plate VR</title>
<link rel="stylesheet" href="../vr/ui-common.css"/>

<style>
html,body{margin:0;height:100%;background:#0b1220;color:#fff;font-family:system-ui}
#plate-layer{position:absolute;inset:0;overflow:hidden}

/* target */
.plateTarget{
  position:absolute;
  font-size:42px;
  transform:translate(-50%,-50%);
  cursor:pointer;
  user-select:none;
  transition:transform .12s ease, opacity .12s ease;
}
.plateTarget.hit{transform:translate(-50%,-50%) scale(.85);opacity:.4}
.plateTarget.expire{opacity:.2}

/* HUD */
.hudTop{
  position:absolute;top:0;left:0;right:0;
  padding:10px 14px;
  background:linear-gradient(180deg,rgba(0,0,0,.75),rgba(0,0,0,.2));
  z-index:10;
}
.hudRow{display:flex;gap:12px;flex-wrap:wrap;font-weight:700;font-size:14px}

.hudBottom{
  position:absolute;bottom:0;left:0;right:0;
  padding:10px 14px;
  background:linear-gradient(0deg,rgba(0,0,0,.8),rgba(0,0,0,.3));
  z-index:10;
}

/* End Overlay */
#endOverlay{
  position:absolute;inset:0;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  z-index:50;
}
#endCard{
  background:#111a2c;
  padding:20px;
  border-radius:16px;
  width:min(520px,92vw);
  text-align:center;
}
#endCard h2{margin:0 0 6px 0}
#endCard button{
  margin:6px;
  padding:8px 14px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-weight:700;
}
.btnPrimary{background:#2563eb;color:#fff}
.btnGhost{background:#1f2937;color:#fff}
</style>
</head>

<body>

<div id="plate-layer"></div>

<!-- HUD -->
<div class="hudTop">
  <div class="hudRow">
    <div>⏱ <span id="uiTime">0</span></div>
    <div>⭐ Score: <span id="uiScore">0</span></div>
    <div>🔥 Combo: <span id="uiCombo">0</span></div>
    <div>🎯 Acc: <span id="uiAcc">0%</span></div>
    <div>❌ Miss: <span id="uiMiss">0</span></div>
    <div>🏆 Grade: <span id="uiGrade">-</span></div>
  </div>
  <div class="hudRow">
    <div id="uiTargetText">เป้าหมาย: -</div>
  </div>
</div>

<div class="hudBottom">
  <div class="hudRow">
    <div>🍽 ครบหมู่: <span id="uiPlateHave">0</span>/5</div>
    <div>⚡ Fever: <span id="uiFever">0%</span></div>
  </div>
</div>

<!-- END OVERLAY -->
<div id="endOverlay" hidden>
  <div id="endCard">
    <h2 id="endTitle">RESULT</h2>
    <div id="endSub"></div>
    <h3>Grade: <span id="endGrade">-</span></h3>
    <div>Score: <span id="endScore">0</span></div>
    <div>Hit: <span id="endOk">0</span> | Wrong: <span id="endWrong">0</span></div>

    <div style="margin-top:10px">
      <button id="btnReplay" class="btnPrimary">Replay</button>
      <button id="btnBackHub2" class="btnGhost">Back HUB</button>
    </div>
  </div>
</div>

<script type="module">
import { boot } from './plate.safe.js';

const U = new URL(location.href);
const view = U.searchParams.get('view') || 'mobile';
const run = U.searchParams.get('run') || 'play';
const diff = U.searchParams.get('diff') || 'normal';
const time = Number(U.searchParams.get('time') || 90);
const seed = U.searchParams.get('seed') || Date.now();
const mode = U.searchParams.get('mode') || 'classroom';
const practice = U.searchParams.get('practice') ?? '1';
const miniBoss = U.searchParams.get('miniBoss') ?? '1';

const hub = U.searchParams.get('hub') || '../hub.html';
const pid = U.searchParams.get('pid') || 'anon';

const layer = document.getElementById('plate-layer');

boot({
  mount: layer,
  view,
  run,
  diff,
  time,
  seed,
  mode,
  practice,
  miniBoss,
  pid,
  hub
});

/* --------------------------
   LISTEN EVENTS FROM ENGINE
-------------------------- */

window.addEventListener('hha:time', e=>{
  const left = e.detail?.left ?? 0;
  document.getElementById('uiTime').textContent = left;
});

window.addEventListener('hha:score', e=>{
  const d = e.detail || {};
  document.getElementById('uiScore').textContent = d.score ?? 0;
  document.getElementById('uiCombo').textContent = d.combo ?? 0;
  document.getElementById('uiMiss').textContent = d.miss ?? d.misses ?? 0;
  document.getElementById('uiAcc').textContent = (d.accPct ?? 0) + '%';
  document.getElementById('uiFever').textContent = (d.feverPct ?? 0) + '%';
});

window.addEventListener('hha:rank', e=>{
  document.getElementById('uiGrade').textContent = e.detail?.grade ?? '-';
});

window.addEventListener('quest:update', e=>{
  const g = e.detail?.groupName || '';
  if(g){
    document.getElementById('uiTargetText').textContent = 'เป้าหมาย: ' + g;
  }
});

window.addEventListener('hha:end', e=>{
  const s = e.detail || {};
  const overlay = document.getElementById('endOverlay');
  overlay.hidden = false;

  document.getElementById('endTitle').textContent = 'RESULT';
  document.getElementById('endSub').textContent =
    `Accuracy ${s.accuracyPct ?? 0}% · Miss ${s.miss ?? 0}`;
  document.getElementById('endGrade').textContent = s.grade ?? '-';
  document.getElementById('endScore').textContent = s.scoreFinal ?? 0;
  document.getElementById('endOk').textContent = s.hits ?? 0;
  document.getElementById('endWrong').textContent = s.wrong ?? 0;

  // save last summary
  try{
    localStorage.setItem('HHA_LAST_SUMMARY', JSON.stringify(s));
  }catch(_){}
});

/* Buttons */
document.getElementById('btnReplay').onclick = ()=>{
  location.reload();
};
document.getElementById('btnBackHub2').onclick = ()=>{
  location.href = hub;
};
</script>

</body>
</html>
