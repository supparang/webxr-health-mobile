    #fxStorm,#fxBoss{
      position:absolute; inset:0; z-index:18;
      pointer-events:none;
      opacity:0; transition: opacity .18s ease;
    }
    #fxStorm.on{
      opacity:.16;

    /* spawn mount */
    #plate-layer{
      position:absolute; inset:0;
      z-index:30;
      pointer-events:none;
      overflow:hidden;
      transform: translateZ(0);
      min-width: 1px; min-height: 1px;
    }
    .plateTarget{
      position:absolute;
      display:grid; place-items:center;
      width:60px; height:60px;
      border-radius:999px;
      background:rgba(15,23,42,.84);
      border:1px solid rgba(255,255,255,.14);
      box-shadow: 0 10px 26px rgba(2,6,23,.35);
      font-size: 30px;
      line-height:1;
      user-select:none;
      pointer-events:auto;
      touch-action:manipulation;
      transition: transform .08s ease, opacity .14s ease, filter .14s ease;
      transform: translate(-50%,-50%);
      filter: saturate(1.05);
      will-change: transform, opacity;
    }
    .plateTarget[data-kind="wrong"]{
      background:rgba(127,29,29,.55);
      border-color: rgba(248,113,113,.25);
      box-shadow: 0 10px 26px rgba(127,29,29,.18);
    }
    .plateTarget[data-kind="shield"]{
      background:rgba(30,58,138,.55);
      border-color: rgba(147,197,253,.30);
      box-shadow: 0 10px 26px rgba(30,64,175,.18);
    }
    .plateTarget[data-kind="fever"]{
      background:rgba(88,28,135,.46);
      border-color: rgba(216,180,254,.22);
    }
    .plateTarget.hit{ transform: translate(-50%,-50%) scale(.88); opacity:.25; }
    .plateTarget.expire{ transform: translate(-50%,-50%) scale(.78); opacity:0; }
