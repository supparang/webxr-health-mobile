<!-- === /herohealth/plate/plate-vr.html ===
PlateVR — RUN PAGE (Mobile/PC/cVR) — PRODUCTION
PATCH v20260303-PLATE-LAYOUT-SPAWNSAFE-SUMMARYKID
✅ HUD slimmer + 2-row
✅ Spawn-safe exposed (window.__HHA_SPAWN_SAFE__)
✅ End summary kid-friendly (stars + short stats)
Requires:
- /herohealth/vr/vr-ui.js
- /herohealth/vr/ai-hooks.js (optional)
- /herohealth/plate/plate.safe.js
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth — Plate VR</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="../favicon.ico" />

  <!-- Universal VR UI -->
  <script type="module" src="../vr/vr-ui.js?v=20260303a"></script>

  <style>
    :root{
      --sat: env(safe-area-inset-top, 0px);
      --sar: env(safe-area-inset-right, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);

      --txt: rgba(229,231,235,.96);
      --mut: rgba(148,163,184,.92);
      --line: rgba(148,163,184,.18);
      --panel: rgba(2,6,23,.76);

      --r: 18px;
      --pad: 10px;

      /* ✅ spawn-safe pads (dynamic in JS too) */
      --safe-top: calc(var(--sat) + 108px);
      --safe-bot: calc(var(--sab) + 140px);
    }
    *{ box-sizing:border-box; }
    html,body{ margin:0; height:100%; overflow:hidden; background:#020617; color:var(--txt);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans Thai",sans-serif;
    }
    body{
      background:
        radial-gradient(1200px 700px at 20% 0%, rgba(14,165,233,.16), transparent 60%),
        radial-gradient(900px 700px at 95% 20%, rgba(99,102,241,.12), transparent 60%),
        linear-gradient(180deg, #020617, #020b1b);
    }
    #app{ position:fixed; inset:0; overflow:hidden; }

    /* ===== Play Layer ===== */
    #plate-layer{
      position:absolute; inset:0;
      z-index:20;
      pointer-events:none;
      overflow:hidden;
      transform: translateZ(0);
      min-width: 1px; min-height: 1px;
    }
    .plateTarget{
      position:absolute;
      width:64px; height:64px;
      border-radius:999px;
      display:grid; place-items:center;
      background: rgba(15,23,42,.80);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 10px 26px rgba(2,6,23,.35);
      font-size: 30px;
      user-select:none;
      pointer-events:auto;
      touch-action:manipulation;
      transform: translate(-50%,-50%);
      transition: transform .08s ease, opacity .14s ease;
    }
    .plateTarget[data-kind="wrong"]{
      background: rgba(127,29,29,.55);
      border-color: rgba(248,113,113,.25);
      box-shadow: 0 10px 26px rgba(127,29,29,.18);
    }
    .plateTarget.hit{ transform: translate(-50%,-50%) scale(.90); opacity:.25; }
    .plateTarget.expire{ transform: translate(-50%,-50%) scale(.78); opacity:0; }

    /* ===== HUD ===== */
    .hud{
      position:absolute;
      left: max(var(--pad), calc(var(--sal) + var(--pad)));
      right:max(var(--pad), calc(var(--sar) + var(--pad)));
      z-index:60;
      pointer-events:none;
      display:grid;
      gap:8px;
    }
    #hudTop{ top: calc(var(--sat) + 8px); }
    #hudBottom{ bottom: calc(var(--sab) + 10px); gap:10px; }

    .card{
      background: linear-gradient(180deg, rgba(2,6,23,.82), rgba(2,6,23,.68));
      border:1px solid var(--line);
      border-radius: var(--r);
      padding:10px 12px;
      box-shadow: 0 10px 30px rgba(2,6,23,.22);
    }
    .row{ display:grid; gap:8px; }
    .row.cols-4{ grid-template-columns: repeat(4, minmax(0,1fr)); }
    .row.cols-3{ grid-template-columns: repeat(3, minmax(0,1fr)); }
    @media (max-width: 820px){
      .row.cols-4{ grid-template-columns: repeat(2, minmax(0,1fr)); }
    }
    .pill{
      border:1px solid rgba(148,163,184,.16);
      background: rgba(15,23,42,.60);
      border-radius:999px;
      min-height:40px;
      padding:8px 10px;
      display:flex; align-items:center; justify-content:center;
      gap:8px;
      font-weight:900;
      font-size:13px;
      font-variant-numeric: tabular-nums;
    }
    .pill b{ font-size:15px; }
    .bar{
      height:10px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,.14);
      background: rgba(148,163,184,.16);
      overflow:hidden;
    }
    .bar > i{
      display:block; height:100%; width:0%;
      background: linear-gradient(90deg, rgba(34,197,94,.92), rgba(99,102,241,.92));
      transition: width .15s ease;
    }

    /* bottom */
    #controls{ display:flex; gap:8px; flex-wrap:wrap; pointer-events:auto; }
    .btn{
      appearance:none;
      border:1px solid rgba(148,163,184,.22);
      background: rgba(2,6,23,.78);
      color:var(--txt);
      border-radius: 999px;
      padding:10px 14px;
      min-height:44px;
      font-weight:1000;
      cursor:pointer;
    }
    .btn.primary{ border-color: rgba(59,130,246,.35); background: rgba(30,64,175,.92); }
    .btn.warn{ border-color: rgba(245,158,11,.25); background: rgba(120,53,15,.86); }

    /* coach */
    #coachMsg{ font-weight:900; }
    .hint{ font-size:12px; color:var(--mut); font-weight:900; margin-top:4px; }

    /* ===== End Overlay ===== */
    #endOverlay{
      position:absolute; inset:0;
      z-index:200;
      display:none;
      align-items:center; justify-content:center;
      padding:16px;
      background: rgba(0,0,0,.60);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    #endCard{
      width:min(720px, 94vw);
      border-radius: var(--r);
      border:1px solid rgba(148,163,184,.18);
      background: rgba(2,6,23,.86);
      box-shadow: 0 22px 80px rgba(0,0,0,.55);
      padding:14px;
    }
    .stars{ font-size:28px; letter-spacing:3px; }
    .endGrid{ margin-top:10px; display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:10px; }
    @media (max-width: 620px){ .endGrid{ grid-template-columns: 1fr; } }
    .endItem{
      border:1px solid rgba(148,163,184,.14);
      background: rgba(2,6,23,.55);
      border-radius: 14px;
      padding: 10px 12px;
      font-weight:1000;
    }
    .endItem .k{ font-size:12px; opacity:.85; }
    .endItem .v{ margin-top:4px; font-size:18px; font-variant-numeric: tabular-nums; }
    .endActions{ margin-top:12px; display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
    .mono{ font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; color:rgba(203,213,225,.95); white-space:pre-wrap; word-break:break-word; }
    .is-hidden{ display:none !important; }

    /* view tweaks */
    body[data-view="cvr"]{ --safe-bot: calc(var(--sab) + 170px); }
  </style>
</head>

<body>
  <div id="app">
    <div id="plate-layer" aria-label="plate targets layer"></div>

    <!-- TOP HUD -->
    <div id="hudTop" class="hud">
      <div class="row cols-4">
        <div class="card">
          <div class="row cols-3">
            <div class="pill">🏆 <b id="uiScore">0</b></div>
            <div class="pill">🔥 <b id="uiCombo">0</b> <span style="opacity:.8">(max <span id="uiComboMax">0</span>)</span></div>
            <div class="pill">💥 <b id="uiMiss">0</b></div>
          </div>
        </div>

        <div class="card">
          <div class="row cols-3">
            <div class="pill">🍽️ <b id="uiPlateHave">0</b>/5</div>
            <div class="pill">🎯 <b id="uiAcc">0%</b></div>
            <div class="pill">⭐ <b id="uiStars">0</b></div>
          </div>
        </div>

        <div class="card">
          <div class="row cols-3">
            <div class="pill">⏱️ <b id="uiTime">0</b>s</div>
            <div class="pill">🛡️ <b id="uiShield">0</b></div>
            <div class="pill">⚡ <b id="uiFever">0%</b></div>
          </div>
        </div>

        <div class="card">
          <div style="font-weight:1000; color:var(--mut); font-size:12px;">ภารกิจตอนนี้</div>
          <div class="pill" style="justify-content:flex-start;">
            🎯 <b id="uiTargetText">—</b>
          </div>
          <div class="bar" style="margin-top:8px;"><i id="uiGoalFill"></i></div>
          <div class="hint"><span id="uiGoalCount">0/5</span></div>
        </div>
      </div>
    </div>

    <!-- BOTTOM HUD -->
    <div id="hudBottom" class="hud">
      <div class="card">
        <div style="font-weight:1000">🧑‍🏫 Coach</div>
        <div id="coachMsg" style="margin-top:6px;">พร้อมลุย! เลือกให้ “ตรงหมู่” นะ 💪</div>
        <div class="hint">แตะ/ยิง = เก็บเป้า • cVR = ยิงจาก crosshair</div>
      </div>

      <div id="controls">
        <button id="btnPause" class="btn warn" type="button">⏸️ PAUSE</button>
        <button id="btnRestart" class="btn" type="button">🔄 RESTART</button>
        <button id="btnBackHub" class="btn" type="button">↩ กลับ HUB</button>
      </div>
    </div>

    <!-- END -->
    <div id="endOverlay">
      <div id="endCard">
        <div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center;">
          <div style="font-weight:1100;font-size:18px" id="endTitle">จบเกม!</div>
          <div class="stars" id="endStars">☆☆☆☆☆</div>
        </div>
        <div class="hint" id="endSub">—</div>

        <div class="endGrid">
          <div class="endItem"><div class="k">คะแนน</div><div class="v" id="endScore">0</div></div>
          <div class="endItem"><div class="k">แม่นยำ</div><div class="v" id="endAcc">0%</div></div>
          <div class="endItem"><div class="k">ถูก</div><div class="v" id="endOk">0</div></div>
          <div class="endItem"><div class="k">พลาด</div><div class="v" id="endMiss">0</div></div>
        </div>

        <div style="margin-top:10px;">
          <div class="hint">สรุป (สำหรับครู/งานวิจัย)</div>
          <div class="mono" id="endJSON"></div>
        </div>

        <div class="endActions">
          <button class="btn" id="btnCopy">Copy</button>
          <button class="btn" id="btnReplay">Replay</button>
          <button class="btn primary" id="btnBackHub2">Back HUB</button>
        </div>
      </div>
    </div>

  </div>

  <!-- ✅ BOOT -->
  <script type="module">
    import { createAIHooks } from '../vr/ai-hooks.js';
    import { boot as bootPlate } from './plate.safe.js';

    const U = new URL(location.href);
    const runMode = String(U.searchParams.get('run') || 'play').toLowerCase();
    const diff    = String(U.searchParams.get('diff') || 'normal').toLowerCase();
    const view    = String(U.searchParams.get('view') || 'mobile').toLowerCase();
    const time    = Number(U.searchParams.get('time') || 90);
    const seed    = String(U.searchParams.get('seed') ?? String((Date.now() ^ (Math.random()*1e9))|0));
    const pid     = String(U.searchParams.get('pid') || 'anon');
    const hub     = String(U.searchParams.get('hub') || '../hub.html');

    document.body.setAttribute('data-view', view);

    // ✅ AI hooks (prediction only)
    const ai = createAIHooks({ seed, runMode, game:'plate', diff, device:view });
    window.HHA_AI = ai;

    // ✅ SPAWN SAFE (HUD-safe) in viewport coords
    function rectOf(el){
      try{
        if(!el) return null;
        const r = el.getBoundingClientRect();
        if(!r || r.width < 10 || r.height < 10) return null;
        return r;
      }catch(_){ return null; }
    }
    function computeSpawnSafe(){
      const layer = document.getElementById('plate-layer');
      const rLayer = rectOf(layer);
      const rTop = rectOf(document.getElementById('hudTop'));
      const rBot = rectOf(document.getElementById('hudBottom'));
      if(!rLayer) return null;

      const PAD = 14;
      let xMin = rLayer.left + PAD;
      let xMax = rLayer.right - PAD;
      let yMin = rLayer.top + PAD;
      let yMax = rLayer.bottom - PAD;

      if(rTop) yMin = Math.max(yMin, rTop.bottom + 10);
      if(rBot) yMax = Math.min(yMax, rBot.top - 14);

      if((xMax-xMin) < 220){ xMin = rLayer.left + PAD; xMax = rLayer.right - PAD; }
      if((yMax-yMin) < 260){ yMax = rLayer.bottom - PAD; yMin = Math.min(yMin, rLayer.top + 110); }

      window.__HHA_SPAWN_SAFE__ = { xMin, xMax, yMin, yMax };
      return window.__HHA_SPAWN_SAFE__;
    }
    const safeLoop = ()=>{ computeSpawnSafe(); requestAnimationFrame(safeLoop); };
    safeLoop();

    // boot
    bootPlate({
      mount: document.getElementById('plate-layer'),
      view, run: runMode, diff, time, seed, pid, hub,
      mode: String(U.searchParams.get('mode') || 'classroom'),
      ai
    });

    // UI buttons
    const btnPause = document.getElementById('btnPause');
    const btnRestart = document.getElementById('btnRestart');
    const btnBackHub = document.getElementById('btnBackHub');

    let paused = false;
    const setPauseBtn = ()=> btnPause.textContent = paused ? '▶️ RESUME' : '⏸️ PAUSE';
    setPauseBtn();

    btnPause?.addEventListener('click', ()=>{
      paused = !paused;
      setPauseBtn();
      window.dispatchEvent(new CustomEvent(paused ? 'hha:pause' : 'hha:resume'));
      try{ window.__PLATE_SET_PAUSED__?.(paused); }catch(e){}
    });

    btnRestart?.addEventListener('click', ()=>{
      try{
        const u = new URL(location.href);
        if(runMode !== 'research') u.searchParams.set('seed', String((Date.now() ^ (Math.random()*1e9))|0));
        location.href = u.toString();
      }catch(e){ location.reload(); }
    });

    btnBackHub?.addEventListener('click', ()=> location.href = hub);

    // end overlay open (from engine)
    window.addEventListener('hha:game-ended', (e)=>{
      const s = e.detail || {};
      const end = document.getElementById('endOverlay');
      if(!end) return;
      end.style.display = 'flex';

      const stars = Number(s.stars || 0);
      const starStr = '★'.repeat(stars) + '☆'.repeat(Math.max(0, 5-stars));

      (document.getElementById('endTitle')||{}).textContent = 'จบเกม!';
      (document.getElementById('endStars')||{}).textContent = starStr;
      (document.getElementById('endSub')||{}).textContent = `โหมด=${s.runMode||'-'} · diff=${s.diff||'-'} · seed=${String(s.seed||'').slice(0,12)}`;

      (document.getElementById('endScore')||{}).textContent = String(s.scoreFinal|0);
      (document.getElementById('endAcc')||{}).textContent = String(s.accPct ?? '0%');
      (document.getElementById('endOk')||{}).textContent = String(s.ok|0);
      (document.getElementById('endMiss')||{}).textContent = String(s.missTotal|0);
      (document.getElementById('endJSON')||{}).textContent = JSON.stringify(s, null, 2);

      const btnCopy = document.getElementById('btnCopy');
      const btnReplay = document.getElementById('btnReplay');
      const btnBackHub2 = document.getElementById('btnBackHub2');

      btnBackHub2.onclick = ()=> location.href = hub;
      btnReplay.onclick = ()=> btnRestart.click();
      btnCopy.onclick = async ()=>{
        try{ await navigator.clipboard.writeText(JSON.stringify(s,null,2)); }
        catch{ try{ prompt('Copy JSON:', JSON.stringify(s,null,2)); }catch(_){} }
      };
    }, { passive:true });
  </script>
</body>
</html>
