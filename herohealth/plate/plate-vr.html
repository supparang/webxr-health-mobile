<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth — Plate VR (Run)</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="../favicon.ico" type="image/x-icon" />

  <!-- ✅ vr-ui: hha:shoot / ENTER VR / RECENTER -->
  <script type="module" src="../vr/vr-ui.js?v=20260228"></script>

  <style>
    :root{
      --sat: env(safe-area-inset-top, 0px);
      --sar: env(safe-area-inset-right, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);

      --hud-top: calc(var(--sat) + 10px);
      --hud-bottom: calc(var(--sab) + 12px);

      --line: rgba(148,163,184,.18);
      --txt: rgba(229,231,235,.96);
      --mut: rgba(148,163,184,.95);
    }

    *{ box-sizing:border-box; }
    html,body{
      margin:0; height:100%; overflow:hidden;
      background:#020617; color:var(--txt);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    }
    body{
      background:
        radial-gradient(1200px 700px at 20% 0%, rgba(14,165,233,.18), transparent 60%),
        radial-gradient(900px 700px at 95% 20%, rgba(99,102,241,.12), transparent 60%),
        linear-gradient(180deg, #020617, #020b1b);
    }
    #app{ position:fixed; inset:0; overflow:hidden; }
    #world{ position:absolute; inset:0; z-index:0; pointer-events:none; }

    /* spawn mount */
    #plate-layer{
      position:absolute; inset:0;
      z-index:30;
      pointer-events:none;
      overflow:hidden;
      transform: translateZ(0);
      will-change: contents;
      min-width: 1px;
      min-height: 1px;

      /* ✅ กันเป้าถูก HUD บัง */
      padding-top: calc(var(--hud-top) + 56px);
      padding-bottom: calc(var(--hud-bottom) + 148px);
    }

    #plate-layer .plateTarget{
      position:absolute;
      display:grid;
      place-items:center;
      width:56px; height:56px;
      border-radius:999px;
      background:rgba(15,23,42,.82);
      border:1px solid rgba(255,255,255,.14);
      box-shadow: 0 8px 20px rgba(2,6,23,.35);
      font-size: 28px;
      line-height:1;
      user-select:none;
      pointer-events:auto;
      touch-action:manipulation;
      transition: transform .08s ease, opacity .14s ease;
      transform: translate(-50%,-50%);
    }
    #plate-layer .plateTarget[data-kind="wrong"]{
      background:rgba(127,29,29,.55);
      border-color: rgba(248,113,113,.25);
      box-shadow: 0 8px 20px rgba(127,29,29,.18);
    }
    #plate-layer .plateTarget.hit{ transform: translate(-50%,-50%) scale(.88); opacity:.25; }
    #plate-layer .plateTarget.expire{ transform: translate(-50%,-50%) scale(.78); opacity:0; }

    /* HUD base */
    .hud{
      position:absolute;
      left:max(10px, calc(var(--sal) + 10px));
      right:max(10px, calc(var(--sar) + 10px));
      z-index:80;
      display:grid;
      gap:8px;
      pointer-events:none;
    }
    #hudTop{ top:var(--hud-top); }
    #hudBottom{
      bottom:var(--hud-bottom);
      grid-template-columns: 1fr;
      gap:8px;
    }

    /* ===== Compact Topbar ===== */
    .hh-topbar{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      pointer-events:auto;
    }
    .hh-pill{
      min-height: 36px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(2,6,23,.64);
      border:1px solid rgba(148,163,184,.16);
      display:flex; align-items:center; gap:8px;
      font-weight:900;
      font-size:13px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 10px 30px rgba(0,0,0,.18);
    }
    .hh-pill .v{ font-weight:1000; font-variant-numeric: tabular-nums; }
    .hh-pill.wide{ flex: 1; min-width: 180px; justify-content:flex-start; }
    .hh-miniBar{
      width: 92px;
      height: 8px;
      border-radius: 999px;
      background: rgba(148,163,184,.18);
      border:1px solid rgba(148,163,184,.14);
      overflow:hidden;
    }
    .hh-miniBar > i{
      display:block; height:100%; width:0%;
      background: linear-gradient(90deg, rgba(16,185,129,.9), rgba(99,102,241,.9));
      transition: width .18s ease;
    }

    /* ===== Bottom Coach + Controls ===== */
    .card{
      background: linear-gradient(180deg, rgba(2,6,23,.84), rgba(2,6,23,.72));
      border:1px solid rgba(148,163,184,.16);
      border-radius: 16px;
      padding:10px 12px;
      box-shadow: 0 10px 28px rgba(0,0,0,.20);
      pointer-events:none;
    }

    #coachMsg{ margin-top:6px; font-weight:900; font-size:13px; line-height:1.2; }
    #coachHint{ font-size:12px; opacity:.85; margin-top:4px; }

    #controls{
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap:8px;
      pointer-events:auto;
    }

    .btn{
      appearance:none;
      border:1px solid rgba(148,163,184,.22);
      background: rgba(2,6,23,.78);
      color:var(--txt);
      border-radius: 999px;
      padding:10px 10px;
      min-height:42px;
      font-weight:1000;
      font-size:13px;
      cursor:pointer;
      box-shadow: 0 6px 18px rgba(2,6,23,.22);
    }
    .btn.primary{
      border-color: rgba(59,130,246,.35);
      background: linear-gradient(180deg, rgba(30,64,175,.92), rgba(30,58,138,.92));
    }
    .btn.warn{
      border-color: rgba(245,158,11,.25);
      background: linear-gradient(180deg, rgba(120,53,15,.8), rgba(92,45,14,.8));
    }

    /* ===== Drawer details ===== */
    .hh-drawer{
      pointer-events:auto;
      background: rgba(2,6,23,.64);
      border:1px solid rgba(148,163,184,.16);
      border-radius: 16px;
      overflow:hidden;
    }
    .hh-drawer summary{
      list-style:none;
      cursor:pointer;
      user-select:none;
      padding:10px 12px;
      display:flex; align-items:center; justify-content:space-between;
      font-weight:1000;
    }
    .hh-drawer summary::-webkit-details-marker{ display:none; }
    .hh-drawer .inner{
      padding: 0 12px 12px 12px;
      display:grid;
      gap:10px;
    }
    .pillRow{
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap:8px;
    }
    .pill{
      background: rgba(15,23,42,.7);
      border:1px solid rgba(148,163,184,.16);
      border-radius: 999px;
      min-height: 40px;
      display:flex; align-items:center; justify-content:center;
      gap:8px; padding: 8px 10px;
      font-weight:900;
      font-size: 13px;
    }
    .bar{
      height: 10px;
      border-radius: 999px;
      background: rgba(148,163,184,.18);
      border:1px solid rgba(148,163,184,.14);
      overflow:hidden;
    }
    .bar > i{
      display:block; height:100%; width:0%;
      background: linear-gradient(90deg, rgba(16,185,129,.9), rgba(99,102,241,.9));
      transition: width .18s ease;
    }

    /* End overlay */
    #endOverlay{
      position:absolute; inset:0;
      z-index:120;
      display:flex; align-items:center; justify-content:center;
      padding:16px;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    #endOverlay[aria-hidden="true"]{ display:none; }
    .endCard{
      width:min(640px, 94vw);
      border-radius: 18px;
      border:1px solid rgba(148,163,184,.18);
      background: rgba(2,6,23,.82);
      color: rgba(229,231,235,.95);
      box-shadow: 0 18px 60px rgba(0,0,0,.45);
      padding: 14px;
    }
    .endGrid{
      margin-top:10px;
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap:10px;
    }
    .endItem{
      border:1px solid rgba(148,163,184,.14);
      background: rgba(2,6,23,.55);
      border-radius: 14px;
      padding: 10px 12px;
      font-weight:1000;
    }
    .endItem .k{ font-size:12px; opacity:.82; font-weight:900; }
    .endItem .v{ margin-top:4px; font-size:18px; font-variant-numeric: tabular-nums; }
    .endActions{
      margin-top: 12px;
      display:flex;
      gap: 10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .is-hidden{ display:none !important; }

    @media (min-width: 900px){
      #controls{ grid-template-columns: 180px 180px 180px; justify-content:end; }
      .hh-miniBar{ width: 140px; }
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="world" aria-hidden="true"></div>
    <div id="plate-layer" aria-label="plate targets layer"></div>

    <!-- ✅ TOP HUD: pills -->
    <div id="hudTop" class="hud">
      <div class="hh-topbar">
        <div class="hh-pill">🏆 <span id="uiScore" class="v">0</span></div>
        <div class="hh-pill">💥 <span id="uiMiss" class="v">0</span></div>
        <div class="hh-pill">⏱️ <span id="uiTime" class="v">0</span>s</div>

        <div class="hh-pill">🎯 <span id="uiAcc" class="v">0%</span></div>
        <div class="hh-pill">🏅 <span id="uiGrade" class="v">D</span></div>
        <div class="hh-pill">🍽️ <span id="uiPlateHave" class="v">0</span>/5</div>

        <div class="hh-pill" style="gap:10px;">
          <span id="uiGoalTitle">เติมจาน</span>
          <span class="v" id="uiGoalCount">0/5</span>
          <span class="hh-miniBar"><i id="uiGoalFill"></i></span>
        </div>

        <div class="hh-pill wide">
          🎯 <span id="uiTargetText">—</span>
        </div>
      </div>
    </div>

    <!-- ✅ BOTTOM HUD -->
    <div id="hudBottom" class="hud">
      <div class="card">
        <div style="font-weight:1000">🧑‍🏫 Coach</div>
        <div id="coachMsg">พร้อมลุย! เติมจานให้ครบ 5 หมู่ 💪</div>
        <div id="coachHint">ยิง/แตะ = โดนเป้า • cVR/VR = ยิงจาก crosshair (vr-ui.js)</div>
      </div>

      <!-- Drawer (พับได้) -->
      <details class="hh-drawer">
        <summary>
          รายละเอียด (Fever/Shield/Combo)
          <span style="opacity:.85">แตะเพื่อพับ/ขยาย</span>
        </summary>
        <div class="inner">
          <div class="pillRow">
            <div class="pill">🛡️ <span id="uiShield" class="v">0</span></div>
            <div class="pill">⚡ <span id="uiFever" class="v">0%</span></div>
            <div class="pill">🔥 <span id="uiCombo" class="v">0</span> (max <span id="uiComboMax">0</span>)</div>
          </div>
          <div class="bar"><i id="uiFeverFill"></i></div>
        </div>
      </details>

      <div id="controls">
        <button id="btnPause" class="btn warn" type="button">⏸️ PAUSE</button>
        <button id="btnRestart" class="btn" type="button">🔄 RESTART</button>
        <button id="btnBackHub" class="btn" type="button">↩ กลับ HUB</button>
      </div>
    </div>

    <!-- End summary -->
    <div id="endOverlay" aria-hidden="true">
      <div class="endCard">
        <div style="font-weight:1000;font-size:18px" id="endTitle">จบเกม</div>
        <div style="margin-top:6px;font-size:12px;opacity:.9;word-break:break-all" id="endSub">—</div>

        <div class="endGrid">
          <div class="endItem"><div class="k">GRADE</div><div class="v" id="endGrade">—</div></div>
          <div class="endItem"><div class="k">SCORE</div><div class="v" id="endScore">0</div></div>
          <div class="endItem"><div class="k">OK</div><div class="v" id="endOk">0</div></div>
          <div class="endItem"><div class="k">WRONG</div><div class="v" id="endWrong">0</div></div>
        </div>

        <div class="endActions">
          <button class="btn" id="btnCopy">Copy Summary</button>
          <button class="btn" id="btnReplay">Replay</button>
          <button class="btn primary is-hidden" id="btnNextCooldown">ถัดไป: Cooldown</button>
          <button class="btn primary" id="btnBackHub2" type="button">Back HUB</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ✅ BOOT -->
  <script type="module">
    // Shield install (ถ้ามีไฟล์ shield จริง)
    try{
      window.HHA_Shield?.install?.({
        watchDOM:true,
        lockScroll:true,
        quietApollo403:true,
        quietNetworkNoise:true,
        showBanner:true
      });
    }catch(e){}

    import { createAIHooks } from '../vr/ai-hooks.js';
    import { boot as bootPlate } from './plate.safe.js';

    const U = new URL(location.href);
    const runMode = String(U.searchParams.get('run') || 'play').toLowerCase();
    const diff = String(U.searchParams.get('diff') || 'normal').toLowerCase();
    const view = String(U.searchParams.get('view') || 'mobile').toLowerCase();
    const seed = U.searchParams.get('seed') ?? String((Date.now() ^ (Math.random()*1e9))|0);

    const ai = createAIHooks({
      seed: String(seed),
      runMode,
      game: 'plate',
      diff,
      device: view
    });
    window.HHA_AI = ai;

    bootPlate({
      mount: document.getElementById('plate-layer'),
      view, run: runMode, diff,
      time: Number(U.searchParams.get('time') || 90),
      seed,
      pid: String(U.searchParams.get('pid') || 'anon'),
      hub: String(U.searchParams.get('hub') || '../hub.html'),
      cooldown: (U.searchParams.get('cooldown')==='1' || U.searchParams.get('cd')==='1'),
      mode: String(U.searchParams.get('mode') || 'classroom'),
      ai
    });

    // UI Buttons
    const btnPause = document.getElementById('btnPause');
    const btnRestart = document.getElementById('btnRestart');
    const btnBackHub = document.getElementById('btnBackHub');
    const btnBackHub2= document.getElementById('btnBackHub2');

    const hub = String(U.searchParams.get('hub') || '../hub.html');

    let paused = false;
    function setPauseBtn(){ if(btnPause) btnPause.textContent = paused ? '▶️ RESUME' : '⏸️ PAUSE'; }
    setPauseBtn();

    btnPause?.addEventListener('click', ()=>{
      paused = !paused;
      setPauseBtn();
      window.dispatchEvent(new CustomEvent(paused ? 'hha:pause' : 'hha:resume'));
      try{ window.__PLATE_SET_PAUSED__?.(paused); }catch(e){}
    });

    btnRestart?.addEventListener('click', ()=>{
      try{
        const u = new URL(location.href);
        if(runMode!=='research') u.searchParams.set('seed', String((Date.now() ^ (Math.random()*1e9))|0));
        location.href = u.toString();
      }catch(e){ location.reload(); }
    });

    btnBackHub?.addEventListener('click', ()=> location.href = hub);
    btnBackHub2?.addEventListener('click', ()=> location.href = hub);
  </script>
</body>
</html>
