<!-- === /herohealth/plate-vr.html === -->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • Plate Redirect</title>
  <meta http-equiv="refresh" content="0; url=./nutrition-plate/plate-launcher.html" />
  <style>
    html,body{
      margin:0; min-height:100%;
      display:grid; place-items:center;
      background:#020617; color:#e5e7eb;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    .card{
      width:min(560px, calc(100% - 24px));
      padding:20px;
      border-radius:20px;
      background:rgba(15,23,42,.9);
      border:1px solid rgba(148,163,184,.16);
      text-align:center;
    }
    a{ color:#38bdf8; }
  </style>
</head>
<body>
  <div class="card">
    <h1>กำลังเปิดเกม Plate เวอร์ชันใหม่…</h1>
    <p>ถ้าไม่ไปอัตโนมัติ ให้กดลิงก์ด้านล่าง</p>
    <p><a id="goLink" href="./nutrition-plate/plate-launcher.html">เปิด Plate Launcher</a></p>
  </div>

  <script>
    const target = new URL('./nutrition-plate/plate-launcher.html', window.location.href);
    const current = new URL(window.location.href);
    current.searchParams.forEach((value, key) => target.searchParams.set(key, value));
    document.getElementById('goLink').href = target.toString();
    window.location.replace(target.toString());
  </script>
</body>
</html>
