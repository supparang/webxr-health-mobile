<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • Plate Solo Launcher</title>
  <meta name="theme-color" content="#9fe3ff" />
  <style>
    body{
      margin:0; font-family:system-ui,sans-serif;
      background:linear-gradient(180deg,#eaf8ff,#fffdf2);
      color:#2f3a45;
    }
    .wrap{
      max-width:720px; margin:0 auto; padding:24px 16px 40px;
    }
    .card{
      background:#fff; border:1px solid #dbeaf4; border-radius:24px;
      padding:18px; box-shadow:0 10px 24px rgba(0,0,0,.06);
      margin-bottom:16px;
    }
    h1{ margin:0 0 8px; font-size:28px; }
    p{ margin:0 0 10px; line-height:1.45; }
    .row{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    label{ display:block; font-weight:700; margin-bottom:6px; }
    select,button{
      width:100%; min-height:48px; border-radius:14px; border:1px solid #cfe3ef;
      font-size:16px; padding:0 12px;
    }
    button{
      font-weight:800; cursor:pointer; background:#7fcfff; color:#13324a;
    }
    .ghost{ background:#fff; }
    .tips li{ margin:6px 0; }
    .actions{ display:grid; grid-template-columns:1fr; gap:12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Balanced Plate</h1>
      <p>จัดอาหารลงจานให้สมดุล เลือกหมู่ให้ถูก และทำคะแนนให้ดีที่สุด</p>
    </div>

    <div class="card">
      <div class="row">
        <div>
          <label for="selDiff">ระดับความยาก</label>
          <select id="selDiff">
            <option value="easy">Easy</option>
            <option value="normal" selected>Normal</option>
            <option value="hard">Hard</option>
          </select>
        </div>
        <div>
          <label for="selTime">เวลา</label>
          <select id="selTime">
            <option value="60">60 วินาที</option>
            <option value="90" selected>90 วินาที</option>
            <option value="120">120 วินาที</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <ul class="tips">
        <li>เลือกอาหารให้ตรงหมู่</li>
        <li>วางให้ถูกส่วนของจาน</li>
        <li>ทำคอมโบต่อเนื่องเพื่อรับโบนัส</li>
      </ul>
    </div>

    <div class="actions">
      <button id="btnStart">เริ่มเล่น</button>
      <button id="btnBackHub" class="ghost">กลับ HUB</button>
    </div>
  </div>

  <script>
  (function(){
    'use strict';

    function qs(name, fallback=''){
      try{ return new URL(location.href).searchParams.get(name) ?? fallback; }
      catch(_){ return fallback; }
    }
    function num(v, d=0){
      v = Number(v);
      return Number.isFinite(v) ? v : d;
    }
    function clean(v, d=''){
      v = String(v ?? '').trim();
      return v || d;
    }
    function bangkokYmd(){
      try{
        const parts = new Intl.DateTimeFormat('en-CA',{
          timeZone:'Asia/Bangkok', year:'numeric', month:'2-digit', day:'2-digit'
        }).formatToParts(new Date());
        const m = {};
        for(const p of parts) if(p.type !== 'literal') m[p.type] = p.value;
        return `${m.year}${m.month}${m.day}`;
      }catch(_){
        const d = new Date();
        return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
      }
    }
    function getCtx(){
      return {
        pid: clean(qs('pid'),'anon'),
        name: clean(qs('name'),''),
        studyId: clean(qs('studyId'),''),
        diff: clean(qs('diff'),'normal'),
        time: num(qs('time'),90),
        seed: clean(qs('seed'), String(Date.now())),
        hub: clean(qs('hub'), '/webxr-health-mobile/herohealth/hub.html'),
        view: clean(qs('view'),'mobile'),
        run: clean(qs('run'),'play'),
        zone: clean(qs('zone'),'nutrition'),
        game: 'plate',
        mode: 'solo'
      };
    }
    function gateKey(phase, ctx){
      return `HHA_GATE_${phase.toUpperCase()}_${ctx.pid}_${ctx.game}_${ctx.mode}_${bangkokYmd()}`;
    }
    function isGateDone(phase, ctx){
      try{ return localStorage.getItem(gateKey(phase, ctx)) === '1'; }
      catch(_){ return false; }
    }
    function withPassthrough(path, ctx, extra={}){
      const u = new URL(path, location.origin);
      const payload = {
        pid: ctx.pid,
        name: ctx.name,
        studyId: ctx.studyId,
        diff: ctx.diff,
        time: String(ctx.time),
        seed: ctx.seed,
        hub: ctx.hub,
        view: ctx.view,
        run: ctx.run,
        zone: ctx.zone,
        game: ctx.game,
        mode: ctx.mode,
        ...extra
      };
      for(const [k,v] of Object.entries(payload)){
        if(v !== '' && v != null) u.searchParams.set(k, String(v));
      }
      return u.toString();
    }

    const ctx = getCtx();
    const $diff = document.getElementById('selDiff');
    const $time = document.getElementById('selTime');
    const $start = document.getElementById('btnStart');
    const $hub = document.getElementById('btnBackHub');

    $diff.value = ctx.diff;
    $time.value = String(ctx.time);

    function buildCtxFromUi(){
      return {
        ...ctx,
        diff: clean($diff.value, 'normal'),
        time: num($time.value, 90),
        seed: String(Date.now())
      };
    }

    function goStart(){
      const nextCtx = buildCtxFromUi();
      const warmupDone = isGateDone('warmup', nextCtx);

      if(!warmupDone){
        location.href = withPassthrough(
          '/webxr-health-mobile/herohealth/warmup-gate.html',
          nextCtx,
          {
            phase: 'warmup',
            next: '/webxr-health-mobile/herohealth/plate/plate-vr.html'
          }
        );
        return;
      }

      location.href = withPassthrough('/webxr-health-mobile/herohealth/plate/plate-vr.html', nextCtx);
    }

    function goHub(){
      location.href = ctx.hub || '/webxr-health-mobile/herohealth/hub.html';
    }

    $start?.addEventListener('click', goStart);
    $hub?.addEventListener('click', goHub);
  })();
  </script>
</body>
</html>
