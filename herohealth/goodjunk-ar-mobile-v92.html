<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>GoodJunk • Samsung Hand AR v9.2</title>
  <style>
    html,body{margin:0;width:100%;height:100%;display:grid;place-items:center;background:#ecfdf5;font-family:system-ui,sans-serif;color:#166534}
    .loading{padding:24px;text-align:center;font-size:clamp(18px,4vw,28px);font-weight:900}
  </style>
</head>
<body>
  <div class="loading">🖐️ กำลังเปิด Samsung Hand AR Direct v9.2…</div>
  <script>
    (async () => {
      const RELEASE = '20260722-SAMSUNG-DIRECT-V92';
      try {
        const response = await fetch('./goodjunk-ar-production-final.html?release=' + RELEASE + '&t=' + Date.now(), { cache: 'no-store' });
        if (!response.ok) throw new Error('HTTP ' + response.status);
        let html = await response.text();

        html = html.replace(/<script[^>]+@mediapipe\/camera_utils\/[^>]*><\/script>/gi, '');
        html = html.replace(/<script[^>]+@mediapipe\/hands\/[^>]*><\/script>/gi, '');

        const oldSafe = `function safe(r){const cx=innerWidth/2,cy=innerHeight*.52;for(let n=0;n<100;n++){const p={x:r+20+Math.random()*(innerWidth-r*2-40),y:130+r+Math.random()*Math.max(1,innerHeight-240-r*2)};if(Math.hypot(p.x-cx,p.y-cy)<Math.min(innerWidth*.22,210))continue;if(state.objects.every(o=>Math.hypot(o.x-p.x,o.y-p.y)>o.r+r+14))return p}return{x:r+20,y:innerHeight/2}}`;
        const newSafe = `function safe(r){const mobile=innerWidth<=760,boss=state.phase==='boss',gap=mobile?10:14,rawTop=mobile?(boss?220:140):(boss?165:120),top=Math.min(rawTop,innerHeight*.42),bottom=Math.max(top+r*2+gap,innerHeight-(mobile?95:85)),left=r+12,right=Math.max(left+1,innerWidth-r-12),usableW=Math.max(1,right-left),usableH=Math.max(1,bottom-top),cols=Math.max(2,Math.floor(usableW/(r*2+gap))+1),rows=Math.max(2,Math.floor(usableH/(r*2+gap))+1),slots=[];for(let row=0;row<rows;row++){for(let col=0;col<cols;col++){const x=left+usableW*(cols===1?.5:col/(cols-1)),y=top+usableH*(rows===1?.5:row/(rows-1));slots.push({x,y})}}const mixed=shuffle(slots);let best=mixed[0]||{x:innerWidth/2,y:innerHeight/2},bestClear=-Infinity;for(const p of mixed){const clear=state.objects.length?Math.min(...state.objects.map(o=>Math.hypot(o.x-p.x,o.y-p.y)-o.r-r)):999;if(clear>bestClear){best=p;bestClear=clear}if(clear>=gap)return p}return best}`;

        const oldUpdate = `function update(){state.objects.forEach(o=>{o.w+=.03;let sx=o.vx,sy=o.vy;if(o.move==='zigzag')sx+=Math.sin(o.w)*.55;if(o.move==='bounce')sy+=Math.sin(o.w)*.35;if(o.move==='escape')sx+=Math.sign(o.x-innerWidth/2)*.12;o.x+=sx;o.y+=sy;if(o.x<o.r||o.x>innerWidth-o.r)o.vx*=-1;if(o.y<120+o.r||o.y>innerHeight-85-o.r)o.vy*=-1})}`;
        const newUpdate = `function update(){const mobile=innerWidth<=760,boss=state.phase==='boss',rawTop=mobile?(boss?220:140):(boss?165:120),top=Math.min(rawTop,innerHeight*.42),bottom=innerHeight-(mobile?95:85),gap=mobile?8:12;state.objects.forEach(o=>{o.w+=.03;let sx=o.vx,sy=o.vy;if(o.move==='zigzag')sx+=Math.sin(o.w)*.55;if(o.move==='bounce')sy+=Math.sin(o.w)*.35;if(o.move==='escape')sx+=Math.sign(o.x-innerWidth/2)*.12;o.x+=sx;o.y+=sy;if(o.x<o.r){o.x=o.r;o.vx=Math.abs(o.vx)}else if(o.x>innerWidth-o.r){o.x=innerWidth-o.r;o.vx=-Math.abs(o.vx)}if(o.y<top){o.y=top;o.vy=Math.abs(o.vy)}else if(o.y>bottom){o.y=bottom;o.vy=-Math.abs(o.vy)}});for(let i=0;i<state.objects.length;i++){for(let j=i+1;j<state.objects.length;j++){const a=state.objects[i],b=state.objects[j],dx=b.x-a.x,dy=b.y-a.y,dist=Math.hypot(dx,dy)||.001,min=a.r+b.r+gap;if(dist<min){const push=(min-dist)/2,nx=dx/dist,ny=dy/dist;a.x-=nx*push;a.y-=ny*push;b.x+=nx*push;b.y+=ny*push;a.x=Math.max(a.r,Math.min(innerWidth-a.r,a.x));b.x=Math.max(b.r,Math.min(innerWidth-b.r,b.x));a.y=Math.max(top,Math.min(bottom,a.y));b.y=Math.max(top,Math.min(bottom,b.y))}}}}`;

        const oldBoot = `window.boot=async m=>{mode=m;canvas=$('canvas');video=$('video');ctx=canvas.getContext('2d');resize();addEventListener('resize',resize);canvas.addEventListener('pointerdown',e=>{if(mode==='touch'&&state.playing)hit(e.clientX,e.clientY)});$('loadMsg').textContent=m==='camera'?'กำลังเปิดกล้อง…':'กำลังเปิด Touch Mode…';if(m==='camera'){try{hands=new Hands({locateFile:f=>\`https://cdn.jsdelivr.net/npm/@mediapipe/hands/\${f}\`});hands.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:.55,minTrackingConfidence:.55});hands.onResults(onHands);camera=new Camera(video,{onFrame:async()=>{if(state.playing)await hands.send({image:video})},width:640,height:480});await camera.start()}catch(e){mode='touch';$('loadMsg').textContent='กล้องไม่พร้อม จึงสลับเป็น Touch Mode'}}$('start').classList.add('hidden');$('game').classList.remove('hidden');startFullGame()};`;
        const newBoot = `window.boot=async m=>{mode=m;canvas=$('canvas');video=$('video');ctx=canvas.getContext('2d');resize();addEventListener('resize',resize);window.__GJ_SELECT_AT__=(x,y,source='unknown')=>{if(!state.playing)return false;let target=null,best=Infinity;for(const o of state.objects){const d=Math.hypot(o.x-x,o.y-y),limit=o.r+90;if(d<=limit&&d<best){target=o;best=d}}if(!target)return false;hit(target.x,target.y);try{ev('hand_select_attempt',{source,food:target.name,distancePx:Math.round(best)})}catch(_){}return true};window.__GJ_IS_PLAYING__=()=>!!state.playing;window.__GJ_SHOW__=t=>show(t);canvas.addEventListener('pointerdown',e=>{if(state.playing)window.__GJ_SELECT_AT__(e.clientX,e.clientY,'touch')});$('loadMsg').textContent=m==='camera'?'กำลังเปิด Samsung Hand AR…':'กำลังเปิด Touch Mode…';if(m==='camera'){try{if(!window.GJMobileHandV7)throw new Error('Samsung Hand runtime v9.2 not loaded');await window.GJMobileHandV7.start(video);mode='camera';$('loadMsg').textContent='Samsung Hand AR v9.2 พร้อม'}catch(e){console.warn('Samsung Hand AR fallback',e);mode=video?.srcObject?'camera':'touch';$('loadMsg').textContent='Samsung Hand AR สะดุด • แตะอาหารได้'}}$('start').classList.add('hidden');$('game').classList.remove('hidden');startFullGame()};`;

        const oldLoop = `function loop(){if(!state.playing)return;if(mode==='touch'){drawBg();update();draw()}raf=requestAnimationFrame(loop)}`;
        const newLoop = `function loop(ts=0){if(!state.playing)return;raf=requestAnimationFrame(loop);if(ts-(window.__GJ_LAST_RENDER_AT__||0)<50)return;window.__GJ_LAST_RENDER_AT__=ts;ctx.clearRect(0,0,innerWidth,innerHeight);if(mode==='camera'&&video&&video.readyState>=2){ctx.save();ctx.translate(innerWidth,0);ctx.scale(-1,1);ctx.drawImage(video,0,0,innerWidth,innerHeight);ctx.restore();ctx.fillStyle='#02061718';ctx.fillRect(0,0,innerWidth,innerHeight)}else{drawBg()}update();draw();(window.__GJ_HAND_POINTS__||[]).forEach(p=>pointer(p.x,p.y))}`;

        const oldOnHands = `function onHands(res){if(!state.playing)return;ctx.clearRect(0,0,innerWidth,innerHeight);ctx.save();ctx.translate(innerWidth,0);ctx.scale(-1,1);ctx.drawImage(res.image,0,0,innerWidth,innerHeight);ctx.restore();ctx.fillStyle='#02061718';ctx.fillRect(0,0,innerWidth,innerHeight);update();draw();(res.multiHandLandmarks||[]).forEach(l=>{const x=(1-l[8].x)*innerWidth,y=l[8].y*innerHeight;pointer(x,y);hit(x,y)})}`;
        const newOnHands = `function onHands(){}`;

        const replacements = [
          ['safe', oldSafe, newSafe],
          ['update', oldUpdate, newUpdate],
          ['boot', oldBoot, newBoot],
          ['loop', oldLoop, newLoop],
          ['onHands', oldOnHands, newOnHands]
        ];
        const status = {};
        for (const [name, oldCode, newCode] of replacements) {
          status[name] = html.includes(oldCode);
          if (status[name]) html = html.replace(oldCode, newCode);
        }
        if (!status.boot || !status.loop) throw new Error('Samsung direct patch signature mismatch');

        html = html.replace("ev('correct',{food:o.name,topic:state.mission.topic,reaction});", "ev('correct',{food:o.name,topic:state.mission.topic,reactionSec:state.reactionN?Number((state.reactionSum/state.reactionN).toFixed(3)):0});");

        const css = '<link rel="stylesheet" href="./patches/goodjunk/goodjunk-mobile-battle-compact-v1.css?v=20260722-92"><link rel="stylesheet" href="./patches/goodjunk/goodjunk-worker-v83-status.css?v=20260722-92">';
        const runtime = '<scr' + 'ipt type="module" src="./patches/goodjunk/goodjunk-mobile-hand-runtime-v9.js?v=20260722-92"></scr' + 'ipt>';
        const proof = '<scr' + 'ipt src="./patches/goodjunk/goodjunk-samsung-loader-proof-v92.js?v=20260722-92"></scr' + 'ipt>';
        const ui = '<scr' + 'ipt src="./patches/goodjunk/goodjunk-mobile-battle-compact-v1.js?v=20260722-92"></scr' + 'ipt>';
        html = html.replace('</head>', css + '</head>');
        html = html.replace('</body>', runtime + proof + ui + '</body>');
        html = html.replace('<title>HeroHealth • GoodJunk AR Production Final</title>', '<title>HeroHealth • GoodJunk Samsung Direct v9.2</title>');

        console.info('[GoodJunk Samsung Direct Loader]', { release: RELEASE, status });
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.body.innerHTML = '<div class="loading">⚠️ Samsung Hand AR v9.2 เปิดไม่สำเร็จ<br><small>' + String(error.message || error) + '</small><br><button onclick="location.reload()" style="margin-top:14px;min-height:46px;padding:9px 15px;border:0;border-radius:14px;font:inherit;font-weight:900">ลองใหม่</button></div>';
      }
    })();
  </script>
</body>
</html>
