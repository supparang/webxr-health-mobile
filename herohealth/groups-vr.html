<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • Groups VR Mini</title>
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#9fe3ff" />
  <link rel="icon" href="./favicon.ico" />

  <style>
    :root{
      --sky1:#ecf9ff;
      --sky2:#d8f2ff;
      --sky3:#bfe8ff;
      --card:#ffffffee;
      --line:#d6edf7;
      --text:#29485f;
      --muted:#6d8ea3;
      --blue:#61bbff;
      --blue2:#2f95ff;
      --shadow:0 18px 40px rgba(85,145,176,.18);
    }

    *{ box-sizing:border-box; }
    html,body{ min-height:100%; }

    body{
      margin:0;
      font-family:ui-rounded,"Nunito","Noto Sans Thai",system-ui,sans-serif;
      color:var(--text);
      background:
        radial-gradient(1100px 620px at 50% -10%, rgba(255,255,255,.92), transparent 58%),
        radial-gradient(680px 420px at 12% 8%, rgba(255,255,255,.48), transparent 62%),
        linear-gradient(180deg,var(--sky1),var(--sky2) 56%,var(--sky3));
      display:grid;
      place-items:center;
      padding:18px;
    }

    .card{
      width:min(760px,100%);
      border-radius:30px;
      padding:22px 18px;
      background:var(--card);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      text-align:center;
    }

    .badge{
      width:84px;
      height:84px;
      margin:0 auto 12px;
      border-radius:24px;
      display:grid;
      place-items:center;
      font-size:44px;
      background:linear-gradient(180deg,#fff3b7,#ffd76f);
      border:1px solid #ffe39a;
      box-shadow:0 10px 22px rgba(255,214,111,.20);
    }

    h1{
      margin:0;
      font-size:clamp(1.35rem,3vw,2rem);
      line-height:1.08;
      font-weight:1000;
    }

    p{
      margin:10px auto 0;
      max-width:54ch;
      color:var(--muted);
      line-height:1.65;
      font-weight:800;
    }

    .grid{
      margin-top:18px;
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }

    .miniCard{
      border-radius:22px;
      padding:16px;
      background:#f8fdff;
      border:1px solid var(--line);
      text-align:left;
    }

    .miniCard h2{
      margin:0 0 6px;
      font-size:1.12rem;
      font-weight:1000;
    }

    .miniCard p{
      margin:0;
      max-width:none;
      font-size:.94rem;
    }

    .row{
      margin-top:18px;
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      min-height:46px;
      border:none;
      border-radius:18px;
      padding:0 16px;
      font:inherit;
      font-weight:1000;
      cursor:pointer;
      color:var(--text);
      background:#fff;
      border:1px solid var(--line);
      box-shadow:0 10px 22px rgba(102,160,188,.12);
    }

    .btn.primary{
      color:#fff;
      border:none;
      background:linear-gradient(180deg,var(--blue),var(--blue2));
    }

    @media (max-width: 720px){
      .grid{ grid-template-columns:1fr; }
      .row{ flex-direction:column; }
      .btn{ width:100%; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">✨</div>
    <h1>Groups VR Mini</h1>
    <p>
      หน้านี้เป็นหน้ารองของเกม Groups ใช้เป็นทางเข้าย่อยหรือ quick access
      ส่วนตัวหลักของเกมคือ <b>groups-v1.html</b>
    </p>

    <section class="grid">
      <article class="miniCard">
        <h2>Quick Solo</h2>
        <p>เข้าเล่น Solo ได้เร็วทันที โดยไม่ต้องผ่านหน้า main game หลัก</p>
      </article>

      <article class="miniCard">
        <h2>Quick Race</h2>
        <p>เข้า Race Lobby ตรงสำหรับกรณีที่ต้องการเข้าแข่งหลายเครื่องแบบรวดเร็ว</p>
      </article>
    </section>

    <div class="row">
      <button class="btn primary" id="btnSolo" type="button">เล่น Solo ทันที</button>
      <button class="btn" id="btnRace" type="button">เข้า Race Lobby</button>
      <button class="btn" id="btnMain" type="button">กลับหน้า Main Game</button>
    </div>
  </main>

  <script>
    (() => {
      'use strict';

      const q = new URLSearchParams(location.search);
      const hub = q.get('hub') || './hub.html';

      function buildBase() {
        const p = new URLSearchParams();
        for (const [k, v] of q.entries()) p.set(k, v);
        if (!p.get('pid')) p.set('pid', 'anon');
        if (!p.get('name')) p.set('name', 'Player');
        if (!p.get('diff')) p.set('diff', 'normal');
        if (!p.get('time')) p.set('time', '60');
        if (!p.get('view')) p.set('view', 'mobile');
        if (!p.get('run')) p.set('run', 'play');
        if (!p.get('hub')) p.set('hub', hub);
        p.set('game', 'groups');
        p.set('gameId', 'groups');
        p.set('zone', 'nutrition');
        p.set('cat', 'nutrition');
        p.set('theme', 'groups');
        return p;
      }

      document.getElementById('btnSolo').addEventListener('click', () => {
        const p = buildBase();
        p.set('mode', 'solo');
        p.set('seed', String(Date.now()));
        location.href = `./vr-groups/groups.html?${p.toString()}`;
      });

      document.getElementById('btnRace').addEventListener('click', () => {
        const p = buildBase();
        p.set('mode', 'race');
        p.set('race', '1');
        p.set('seed', String(Date.now()));
        location.href = `./vr-groups/groups-race-lobby.html?${p.toString()}`;
      });

      document.getElementById('btnMain').addEventListener('click', () => {
        const url = new URL('./groups-v1.html', location.href);
        for (const [k, v] of q.entries()) url.searchParams.set(k, v);
        if (!url.searchParams.get('hub')) url.searchParams.set('hub', hub);
        location.href = url.toString();
      });
    })();
  </script>
</body>
</html>
