<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>GoodJunk Teacher Dashboard</title>
  <style>
    :root{
      --bg1:#020617; --bg2:#0b1226; --panel:rgba(2,6,23,.74);
      --stroke:rgba(148,163,184,.18); --text:#e5e7eb; --muted:#94a3b8;
      --ok:#22c55e; --warn:#f59e0b; --bad:#ef4444;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;min-height:100%;
      background:
        radial-gradient(1200px 800px at 50% -10%, rgba(59,130,246,.16), transparent 60%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--text);
      font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans Thai",sans-serif;
    }
    .wrap{max-width:1280px;margin:0 auto;padding:18px}
    .hero,.card{
      border:1px solid var(--stroke);background:var(--panel);border-radius:24px;
      box-shadow:0 18px 60px rgba(0,0,0,.30);
    }
    .hero{padding:18px;margin-bottom:14px}
    h1{margin:0;font-size:clamp(28px,4vw,42px)}
    .sub{margin-top:8px;color:var(--muted);font-size:14px;font-weight:900}
    .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
    .card{padding:16px}
    .roomTitle{font-size:20px;font-weight:1000}
    .pillRow{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .pill{
      display:inline-flex;align-items:center;justify-content:center;
      min-height:38px;padding:8px 12px;border-radius:999px;
      border:1px solid var(--stroke);background:rgba(15,23,42,.62);
      font-size:12px;font-weight:1000;
    }
    .list{margin-top:12px;display:grid;gap:8px}
    .row{
      border:1px solid var(--stroke);border-radius:16px;background:rgba(15,23,42,.46);
      padding:10px 12px;
    }
    .name{font-size:16px;font-weight:1000}
    .meta{margin-top:4px;color:var(--muted);font-size:12px;font-weight:900}
    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:12px;
    }
    .btn{
      min-height:44px;
      border-radius:14px;
      border:1px solid var(--stroke);
      background:rgba(15,23,42,.80);
      color:var(--text);
      font:inherit;
      font-weight:1000;
      cursor:pointer;
      padding:10px 12px;
    }
    .btn.ok{ border-color:rgba(34,197,94,.28); background:rgba(34,197,94,.14); }
    .btn.warn{ border-color:rgba(245,158,11,.28); background:rgba(245,158,11,.14); }
    .btn.bad{ border-color:rgba(239,68,68,.28); background:rgba(239,68,68,.14); }
    .hint{margin-top:10px;color:var(--muted);font-size:12px;font-weight:900}
    @media (max-width:1000px){ .grid{grid-template-columns:1fr 1fr;} }
    @media (max-width:700px){ .grid{grid-template-columns:1fr;} .actions{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>GoodJunk Teacher Dashboard</h1>
      <div class="sub">ดูสถานะห้อง Race และรีสตาร์ตรอบได้</div>
    </section>

    <div class="grid" id="roomGrid"></div>
  </div>

  <script src="./firebase-config.js"></script>
  <script>
    const $=(id)=>document.getElementById(id);
    const grid = $('roomGrid');

    function compareRows(a,b){
      const as = Number(a.score || 0), bs = Number(b.score || 0);
      if(as !== bs) return bs - as;
      const aa = Number(a.accPct || 0), ba = Number(b.accPct || 0);
      if(aa !== ba) return ba - aa;
      const am = Number(a.missTotal || 9999), bm = Number(b.missTotal || 9999);
      if(am !== bm) return am - bm;
      return Number(a.finishMs || 999999999) - Number(b.finishMs || 999999999);
    }

    function makeStartAt(leadSec = 8){
      return Date.now() + Math.max(3, Number(leadSec || 8)) * 1000;
    }

    function resetRoom(db, room){
      const root = `herohealth/goodjunk/race/${room}`;
      db.ref(`${root}/results`).remove();
      db.ref(`${root}/presence`).remove();
      db.ref(`${root}/control`).update({
        startAt: 0,
        resetAt: Date.now(),
        status: 'reset'
      });
    }

    function restartRound(db, room, leadSec = 8){
      const root = `herohealth/goodjunk/race/${room}`;
      db.ref(`${root}/results`).remove();
      db.ref(`${root}/control`).update({
        startAt: makeStartAt(leadSec),
        restartAt: Date.now(),
        status: 'restart'
      });
    }

    function openBoard(room){
      const u = new URL('./goodjunk-board.html', location.href);
      u.searchParams.set('room', room);
      u.searchParams.set('mode', 'race');
      location.href = u.toString();
    }

    function renderRooms(db, data){
      grid.innerHTML = '';

      const rooms = Object.entries(data || {});
      if(!rooms.length){
        grid.innerHTML = `<section class="card"><div class="roomTitle">ยังไม่มีห้อง Race</div><div class="sub" style="margin-top:8px;">เมื่อมีผู้เล่นเข้า room ห้องจะขึ้นที่นี่</div></section>`;
        return;
      }

      rooms.forEach(([room, value])=>{
        const presence = Object.values(value?.presence || {}).filter(Boolean);
        const results = Object.values(value?.results || {}).filter(Boolean).sort(compareRows);
        const control = value?.control || {};

        const card = document.createElement('section');
        card.className = 'card';

        card.innerHTML = `
          <div class="roomTitle">ROOM ${room}</div>
          <div class="pillRow">
            <span class="pill">PLAYERS ${presence.length}</span>
            <span class="pill">START ${control.startAt ? 'SET' : 'WAIT'}</span>
            <span class="pill">FINISHED ${results.length}</span>
          </div>

          <div class="list">
            ${presence.map(p=>`
              <div class="row">
                <div class="name">${p.nick || p.pid}</div>
                <div class="meta">state ${p.state || 'waiting'}</div>
              </div>
            `).join('')}
          </div>

          <div class="list" style="margin-top:12px;">
            ${results.slice(0,3).map((r,i)=>`
              <div class="row">
                <div class="name">#${i+1} ${r.nick || r.pid}</div>
                <div class="meta">score ${r.score ?? 0} • acc ${r.accPct ?? 0}% • miss ${r.missTotal ?? 0}</div>
              </div>
            `).join('')}
          </div>

          <div class="actions">
            <button class="btn ok" data-room="${room}" data-act="restart">เริ่มรอบใหม่</button>
            <button class="btn warn" data-room="${room}" data-act="board">เปิด Board</button>
            <button class="btn bad" data-room="${room}" data-act="reset">ล้างห้อง</button>
          </div>

          <div class="hint">
            restart = ล้างผลและสร้าง startAt ใหม่ • reset = ล้างผล + ล้างผู้เล่น + ปิด startAt
          </div>
        `;

        card.querySelector('[data-act="restart"]').onclick = ()=> restartRound(db, room, 8);
        card.querySelector('[data-act="board"]').onclick = ()=> openBoard(room);
        card.querySelector('[data-act="reset"]').onclick = ()=> resetRoom(db, room);

        grid.appendChild(card);
      });
    }

    function boot(){
      const db = window.HHA_FIREBASE_DB;
      if(!db) return setTimeout(boot, 300);

      db.ref('herohealth/goodjunk/race').on('value', (snap)=>{
        renderRooms(db, snap.val() || {});
      });
    }

    boot();
  </script>
</body>
</html>
