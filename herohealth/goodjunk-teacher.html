<!-- === /herohealth/goodjunk-teacher.html ===
HeroHealth • GoodJunk Teacher Dashboard
PATCH v20260306-GJ-TEACHER-BATTLE-V6
✅ Reads hha-battle/goodjunk/rooms/{room}
✅ Shows players, phase, scores, acc, miss, medianRT, ready, connected
✅ Opens board
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>GoodJunk Teacher Dashboard</title>
  <link rel="icon" href="./favicon.ico" />
  <meta name="color-scheme" content="dark light" />
  <style>
    :root{
      --bg1:#020617; --bg2:#0b1226; --panel:rgba(2,6,23,.74);
      --stroke:rgba(148,163,184,.18); --text:#e5e7eb; --muted:#94a3b8;
      --shadow:0 18px 60px rgba(0,0,0,.35);
    }
    *{ box-sizing:border-box; }
    html,body{
      margin:0; min-height:100%;
      background:
        radial-gradient(1200px 800px at 50% -20%, rgba(34,211,238,.10), transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans Thai", sans-serif;
    }
    .wrap{ width:min(1200px, calc(100vw - 24px)); margin:0 auto; padding:18px 12px; }
    .hero,.card{
      background:linear-gradient(180deg, rgba(15,23,42,.82), rgba(2,6,23,.76));
      border:1px solid var(--stroke); border-radius:24px; box-shadow:var(--shadow);
    }
    .hero{ padding:18px; margin-bottom:14px; }
    .toolbar{
      display:grid; grid-template-columns:1.2fr .8fr auto auto; gap:10px; margin-top:12px;
    }
    input,select,button{
      min-height:44px; border-radius:14px; border:1px solid var(--stroke);
      background:rgba(2,6,23,.80); color:var(--text); padding:10px 12px; font:inherit;
    }
    button{ cursor:pointer; border:0; font-weight:900; color:white; background:linear-gradient(135deg,#2563eb,#06b6d4); }
    button.secondary{ background:rgba(15,23,42,.90); border:1px solid var(--stroke); color:var(--text); }
    .stats{ display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; margin-bottom:14px; }
    .card{ padding:16px; }
    .k{ color:var(--muted); font-size:12px; margin-bottom:6px; }
    .v{ font-size:28px; font-weight:900; }
    table{ width:100%; border-collapse:collapse; }
    th,td{ padding:12px 10px; border-bottom:1px solid rgba(148,163,184,.12); text-align:left; font-size:13px; }
    th{ color:#cbd5e1; }
    .muted{ color:var(--muted); }
    @media (max-width:900px){
      .toolbar,.stats{ grid-template-columns:1fr; }
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script src="./firebase-config.js"></script>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div style="font-size:12px;color:#a5f3fc;font-weight:800;">👩‍🏫 Teacher Dashboard</div>
      <h1 style="margin:8px 0 0;font-size:34px;">GoodJunk Battle Monitor</h1>
      <div class="toolbar">
        <input id="room" placeholder="Room" value="P5A" />
        <select id="mode">
          <option value="battle">battle</option>
        </select>
        <button id="btnConnect">เชื่อมต่อ</button>
        <button id="btnBoard" class="secondary">เปิด Board</button>
      </div>
    </section>

    <section class="stats">
      <div class="card"><div class="k">Phase</div><div id="stPhase" class="v">—</div></div>
      <div class="card"><div class="k">Round</div><div id="stRound" class="v">—</div></div>
      <div class="card"><div class="k">Players</div><div id="stPlayers" class="v">0</div></div>
      <div class="card"><div class="k">Winner</div><div id="stWinner" class="v">—</div></div>
    </section>

    <section class="card">
      <div style="font-size:18px;font-weight:900;margin-bottom:10px;">Players</div>
      <div style="overflow:auto">
        <table>
          <thead>
            <tr>
              <th>Nick</th>
              <th>PID</th>
              <th>Ready</th>
              <th>Connected</th>
              <th>Score</th>
              <th>Acc</th>
              <th>Miss</th>
              <th>MedianRT</th>
              <th>FinishMs</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="9" class="muted">ยังไม่มีข้อมูล</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <script type="module">
    const $ = (id)=>document.getElementById(id);
    const qs = (k,d='')=>{ try{ return new URL(location.href).searchParams.get(k) ?? d; }catch(_){ return d; } };

    $('room').value = qs('room','P5A');

    let offFns = [];

    function getDbCompat(){
      if(window.firebase?.database) return window.firebase.database();
      return null;
    }

    function renderState(st){
      $('stPhase').textContent = st?.phase || '—';
      $('stRound').textContent = st?.roundId || '—';
      $('stWinner').textContent = st?.winner || '—';
    }

    function renderPlayers(raw){
      const rows = Object.entries(raw || {})
        .map(([k,v])=>({ key:k, ...(v||{}) }))
        .sort((a,b)=>(a.joinedAtMs||0)-(b.joinedAtMs||0));

      $('stPlayers').textContent = String(rows.length);

      if(!rows.length){
        $('tbody').innerHTML = `<tr><td colspan="9" class="muted">ยังไม่มีผู้เล่น</td></tr>`;
        return;
      }

      $('tbody').innerHTML = rows.map(p=>`
        <tr>
          <td>${p.nick || '-'}</td>
          <td>${p.pid || '-'}</td>
          <td>${p.ready ? 'yes' : 'no'}</td>
          <td>${p.connected !== false ? 'yes' : 'no'}</td>
          <td>${Number(p.score || 0)}</td>
          <td>${Number(p.acc || 0)}%</td>
          <td>${Number(p.miss || 0)}</td>
          <td>${Number(p.medianRT || 0)}</td>
          <td>${Number(p.finishMs || 0)}</td>
        </tr>
      `).join('');
    }

    function connect(){
      offFns.forEach(fn=>{ try{ fn(); }catch(_){} });
      offFns = [];

      const room = ($('room').value || 'P5A').trim().toUpperCase();
      const db = getDbCompat();
      if(!db){
        alert('Firebase compat ยังไม่พร้อมใน firebase-config.js');
        return;
      }

      const base = `hha-battle/goodjunk/rooms/${room}`;
      const stateRef = db.ref(`${base}/state`);
      const playersRef = db.ref(`${base}/players`);

      const stateCb = snap => renderState(snap.val() || {});
      const playersCb = snap => renderPlayers(snap.val() || {});

      stateRef.on('value', stateCb);
      playersRef.on('value', playersCb);

      offFns.push(()=>stateRef.off('value', stateCb));
      offFns.push(()=>playersRef.off('value', playersCb));
    }

    $('btnConnect').onclick = connect;
    $('btnBoard').onclick = ()=>{
      const u = new URL('./goodjunk-board.html', location.href);
      u.searchParams.set('room', ($('room').value || 'P5A').trim().toUpperCase());
      window.open(u.toString(), '_blank', 'noopener');
    };

    connect();
  </script>
</body>
</html>
