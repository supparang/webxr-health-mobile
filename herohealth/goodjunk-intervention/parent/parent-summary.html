<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>GoodJunk Intervention • Parent Summary</title>
  <link rel="stylesheet" href="../assessments/assessment.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="badge">ผู้ปกครอง • Parent Summary</div>
      <h1>สรุปผลสำหรับผู้ปกครอง</h1>
      <p class="sub">สรุปจากผลเกมและแบบสอบถามผู้ปกครอง</p>
      <div class="ctx" id="ctxBox">กำลังโหลด...</div>

      <section class="block">
        <h2>ข้อมูลภาพรวม</h2>
        <p id="summaryIntro">กำลังโหลดข้อมูล...</p>
      </section>

      <section class="block">
        <h2>สรุปผลจากเกม</h2>
        <div class="choice-grid">
          <div class="choice">คะแนนรวม: <b id="gameScore" style="margin-left:8px;">-</b></div>
          <div class="choice">เลือกของดี: <b id="gameGood" style="margin-left:8px;">-</b></div>
          <div class="choice">แตะ junk: <b id="gameJunk" style="margin-left:8px;">-</b></div>
          <div class="choice">พลาด: <b id="gameMiss" style="margin-left:8px;">-</b></div>
          <div class="choice">เกรดการเล่น: <b id="gameGrade" style="margin-left:8px;">-</b></div>
        </div>
      </section>

      <section class="block">
        <h2>สรุปคำตอบผู้ปกครอง</h2>
        <div id="parentSummaryBody" class="note">กำลังโหลดคำตอบ...</div>
      </section>

      <section class="block">
        <h2>ข้อเสนอแนะการต่อยอดที่บ้าน</h2>
        <ul id="homeTips" class="note" style="margin:0; padding-left:18px;"></ul>
      </section>

      <div class="footer">
        <button class="btn btn-primary" id="backTeacherBtn" type="button">กลับ Teacher Panel</button>
        <button class="btn btn-ghost" id="backLauncherBtn" type="button">กลับ Student Launcher</button>
        <button class="btn btn-ghost" id="gotoParentFormBtn" type="button">แก้แบบสอบถามผู้ปกครอง</button>
      </div>
    </section>
  </main>

  <script type="module">
    import { buildUrl, pickCtxFromQuery, withDefaultCtx } from '../research/config.js';
    import { KEYS, loadCtx, loadJSON, mergeCtx, saveCtx } from '../research/localstore.js';

    function $(id){ return document.getElementById(id); }

    function textOf(value, map = {}) {
      return map[value] || value || '—';
    }

    function buildParentBullets(parent) {
      const answers = parent?.answers || parent || {};
      const bullets = [];

      const talkMap = {
        yes: 'เด็กสนใจคุยเรื่องของว่างสุขภาพมากขึ้น',
        maybe: 'เด็กเริ่มคุยเรื่องของว่างสุขภาพบ้าง',
        notMuch: 'ยังเห็นการพูดคุยเรื่องของว่างสุขภาพไม่มาก',
        no: 'ยังไม่เห็นการเปลี่ยนแปลงด้านการพูดคุย'
      };

      const healthyMap = {
        yes: 'ผู้ปกครองสังเกตว่าเด็กอยากเลือกของว่างสุขภาพมากขึ้น',
        maybe: 'ผู้ปกครองสังเกตว่ามีแนวโน้มดีขึ้นเล็กน้อย',
        notMuch: 'การเปลี่ยนแปลงยังไม่ชัดเจนมาก',
        no: 'ยังไม่เห็นการเปลี่ยนแปลงด้านการเลือกของว่าง'
      };

      const junkMap = {
        yes: 'เด็กมีแนวโน้มลดการขอขนมหรือเครื่องดื่มหวาน',
        maybe: 'เด็กเริ่มลดลงบ้าง',
        notMuch: 'ยังไม่ชัดเจนว่าลดลง',
        no: 'ยังไม่เห็นว่าลดลง'
      };

      bullets.push(talkMap[answers.p1_talkNutrition] || 'ยังไม่มีข้อมูลเรื่องการพูดคุย');
      bullets.push(healthyMap[answers.p2_moreHealthyChoice] || 'ยังไม่มีข้อมูลเรื่องการเลือกของว่างสุขภาพ');
      bullets.push(junkMap[answers.p3_reduceJunk] || 'ยังไม่มีข้อมูลเรื่องการลด junk');

      if (answers.p4_explainReason === 'yes') {
        bullets.push('เด็กสามารถอธิบายเหตุผลเรื่องการเลือกอาหารที่ดีกว่าได้');
      } else if (answers.p4_explainReason === 'somewhat') {
        bullets.push('เด็กอธิบายเหตุผลได้บางส่วน');
      }

      if (answers.p7_supportPlan) {
        bullets.push(`แผนสนับสนุนจากผู้ปกครอง: ${answers.p7_supportPlan}`);
      }

      if (answers.p8_comment) {
        bullets.push(`ข้อเสนอแนะเพิ่มเติม: ${answers.p8_comment}`);
      }

      return bullets;
    }

    function buildHomeTips(game, parent) {
      const tips = [];
      const answers = parent?.answers || parent || {};

      tips.push('ชวนเด็กเลือกผลไม้เป็นของว่างอย่างน้อย 1 ครั้งในแต่ละวัน');
      tips.push('เตรียมน้ำเปล่าหรือนมจืดไว้เป็นตัวเลือกที่หยิบง่าย');
      tips.push('คุยกับเด็กสั้น ๆ ว่าวันนี้เลือกของว่างอะไร และเพราะอะไร');

      if ((game?.junkHit || 0) >= (game?.goodHit || 0)) {
        tips.push('ช่วยเด็กสังเกตความต่างระหว่างของว่างสุขภาพกับ junk ก่อนซื้อจริง');
      }

      if (answers.p3_reduceJunk === 'notMuch' || answers.p3_reduceJunk === 'no') {
        tips.push('ลองเริ่มจากลดความถี่ของขนมหรือเครื่องดื่มหวานทีละน้อย');
      }

      if (answers.p2_moreHealthyChoice === 'yes' || answers.p2_moreHealthyChoice === 'maybe') {
        tips.push('ใช้โอกาสนี้เสริมแรงเชิงบวกเมื่อเด็กเลือกของว่างที่ดีต่อสุขภาพ');
      }

      return tips;
    }

    mergeCtx(pickCtxFromQuery());
    const ctx = withDefaultCtx(loadCtx());
    saveCtx(ctx);

    const game = loadJSON(KEYS.GAME_SUMMARY, {}) || {};
    const parent = loadJSON(KEYS.PARENT_RESPONSE, {}) || {};

    $('ctxBox').textContent = [
      `PID: ${ctx.pid || '-'}`,
      `Study: ${ctx.studyId || '-'}`,
      `Session: ${ctx.session || '-'}`,
      `Condition: ${ctx.condition || '-'}`
    ].join(' • ');

    $('summaryIntro').textContent =
      `${ctx.nickName || ctx.pid || 'ผู้เรียน'} ได้เข้าร่วมกิจกรรม GoodJunk Intervention แล้ว ระบบสรุปทั้งผลเกมและมุมมองของผู้ปกครองไว้ด้านล่าง`;

    $('gameScore').textContent = String(game.score ?? '-');
    $('gameGood').textContent = String(game.goodHit ?? '-');
    $('gameJunk').textContent = String(game.junkHit ?? '-');
    $('gameMiss').textContent = String(game.miss ?? '-');
    $('gameGrade').textContent = String(game.grade ?? '-');

    const parentBullets = buildParentBullets(parent);
    $('parentSummaryBody').innerHTML = parentBullets.length
      ? `<ul style="margin:0; padding-left:18px;">${parentBullets.map(v => `<li>${v}</li>`).join('')}</ul>`
      : 'ยังไม่มีข้อมูลแบบสอบถามผู้ปกครอง';

    const tips = buildHomeTips(game, parent);
    $('homeTips').innerHTML = tips.map(v => `<li>${v}</li>`).join('');

    $('backTeacherBtn').addEventListener('click', () => {
      location.href = buildUrl('../launcher/teacher-panel.html', ctx, false);
    });

    $('backLauncherBtn').addEventListener('click', () => {
      location.href = buildUrl('STUDENT_LAUNCHER', ctx, false);
    });

    $('gotoParentFormBtn').addEventListener('click', () => {
      location.href = buildUrl('PARENT_FORM', ctx, false);
    });
  </script>
</body>
</html>
