<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>GoodJunk Intervention</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="../../favicon.ico" />
  <style>
    :root{
      --bg1:#07111f;
      --bg2:#0f1d36;
      --panel:rgba(10,18,34,.84);
      --card:rgba(15,23,42,.90);
      --stroke:rgba(148,163,184,.18);
      --text:#f8fafc;
      --muted:#cbd5e1;
      --green:#22c55e;
      --blue:#38bdf8;
      --violet:#a78bfa;
      --pink:#f472b6;
      --warn:#f59e0b;
      --bad:#ef4444;
      --shadow:0 18px 50px rgba(0,0,0,.32);
      --safe-top:env(safe-area-inset-top, 0px);
      --safe-right:env(safe-area-inset-right, 0px);
      --safe-bottom:env(safe-area-inset-bottom, 0px);
      --safe-left:env(safe-area-inset-left, 0px);
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      min-height:100%;
      background:
        radial-gradient(circle at top left, rgba(34,197,94,.12), transparent 24%),
        radial-gradient(circle at top right, rgba(56,189,248,.12), transparent 28%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      color:var(--text);
      font-family:system-ui,-apple-system,"Noto Sans Thai","Segoe UI",Roboto,Arial,sans-serif;
      overflow:hidden;
    }

    body{
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
    }

    #page{
      position:fixed;
      inset:0;
      overflow:hidden;
      isolation:isolate;
    }

    #gameMount{
      position:absolute;
      inset:0;
      overflow:hidden;
    }

    .btn{
      appearance:none;
      border:none;
      cursor:pointer;
      min-height:46px;
      border-radius:14px;
      padding:0 16px;
      font:900 14px/1 system-ui,-apple-system,"Noto Sans Thai","Segoe UI",Roboto,Arial,sans-serif;
      color:#fff;
      box-shadow:var(--shadow);
      transition:transform .08s ease, opacity .18s ease;
    }

    .btn:active{
      transform:translateY(1px) scale(.995);
    }

    .btn-blue{
      background:linear-gradient(135deg,#2563eb,#38bdf8);
    }

    .btn-green{
      background:linear-gradient(135deg,#16a34a,#22c55e);
    }

    .btn-violet{
      background:linear-gradient(135deg,#7c3aed,#a78bfa);
    }

    .btn-pink{
      background:linear-gradient(135deg,#db2777,#f472b6);
    }

    .btn-warn{
      background:linear-gradient(135deg,#d97706,#f59e0b);
    }

    .btn-ghost{
      background:rgba(148,163,184,.12);
      border:1px solid var(--stroke);
      color:var(--text);
    }

    .overlay{
      position:fixed;
      inset:0;
      z-index:10020;
      display:grid;
      place-items:center;
      padding:
        calc(16px + var(--safe-top))
        calc(16px + var(--safe-right))
        calc(16px + var(--safe-bottom))
        calc(16px + var(--safe-left));
      background:rgba(2,6,23,.78);
      backdrop-filter:blur(10px);
    }

    .overlay[hidden]{
      display:none !important;
    }

    .race-card{
      width:min(94vw, 720px);
      max-height:88vh;
      overflow:auto;
      border-radius:24px;
      border:1px solid var(--stroke);
      background:var(--card);
      box-shadow:0 28px 64px rgba(0,0,0,.35);
      padding:18px;
    }

    .race-kicker{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:34px;
      padding:6px 12px;
      border-radius:999px;
      border:1px solid rgba(56,189,248,.22);
      background:rgba(56,189,248,.10);
      color:#dbeafe;
      font-size:12px;
      font-weight:1000;
      letter-spacing:.3px;
      margin-bottom:10px;
    }

    .race-title{
      margin:0;
      font-size:clamp(28px, 5vw, 44px);
      line-height:1.05;
      text-align:center;
    }

    .race-sub{
      margin:10px 0 0;
      color:var(--muted);
      font-size:14px;
      line-height:1.65;
      text-align:center;
    }

    .race-count{
      margin:12px auto 0;
      width:min(180px, 60vw);
      min-height:76px;
      display:grid;
      place-items:center;
      border-radius:20px;
      border:1px solid rgba(34,197,94,.24);
      background:rgba(34,197,94,.10);
      color:#dcfce7;
      font-size:42px;
      font-weight:1000;
      box-shadow:var(--shadow);
    }

    .result-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:34px;
      padding:6px 12px;
      border-radius:999px;
      border:1px solid rgba(56,189,248,.22);
      background:rgba(56,189,248,.10);
      color:#dbeafe;
      font-size:12px;
      font-weight:1000;
      letter-spacing:.3px;
      margin-bottom:10px;
    }

    .result-head{
      display:grid;
      gap:8px;
      margin-bottom:12px;
    }

    .result-title{
      margin:0;
      font-size:clamp(26px, 5vw, 38px);
      line-height:1.08;
    }

    .result-sub{
      color:var(--muted);
      font-size:14px;
      line-height:1.65;
    }

    .result-grid{
      display:grid;
      gap:10px;
      margin-top:12px;
    }

    .result-row{
      display:grid;
      grid-template-columns:58px 1fr 80px 80px 96px;
      gap:10px;
      align-items:center;
      padding:12px;
      border-radius:16px;
      border:1px solid rgba(148,163,184,.14);
      background:rgba(2,6,23,.48);
      color:#e5e7eb;
      font-size:14px;
    }

    .result-row.is-me{
      border-color:rgba(56,189,248,.32);
      background:rgba(30,41,59,.78);
      box-shadow:0 0 0 1px rgba(56,189,248,.14) inset;
    }

    .result-headline{
      display:grid;
      grid-template-columns:58px 1fr 80px 80px 96px;
      gap:10px;
      align-items:center;
      padding:0 12px 6px;
      color:#94a3b8;
      font-size:12px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    .race-actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:16px;
    }

    .small-note{
      margin-top:12px;
      color:var(--muted);
      font-size:12px;
      line-height:1.6;
    }

    @media (max-width:760px){
      .result-headline{
        display:none;
      }

      .result-row{
        grid-template-columns:48px 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="page">
    <div id="gameMount" aria-label="GoodJunk Intervention Game"></div>

    <div class="overlay" id="raceGate" hidden>
      <div class="race-card">
        <div class="race-kicker">🏁 Race Gate</div>
        <h1 class="race-title" id="raceGateText">กำลังรอสัญญาณเริ่ม</h1>
        <div class="race-count" id="raceGateCount">-</div>
        <p class="race-sub" id="raceGateSub">เกมจะเริ่มพร้อมกันเมื่อถึงเวลา startAt</p>
      </div>
    </div>

    <div class="overlay" id="raceResult" hidden>
      <div class="race-card">
        <div class="result-badge" id="raceResultBadge">RESULT</div>

        <div class="result-head">
          <h2 class="result-title">สรุปผลการแข่งขัน</h2>
          <div class="result-sub" id="raceResultSub">กำลังสรุปผล...</div>
        </div>

        <div class="result-headline">
          <div>Rank</div>
          <div>Player</div>
          <div>Score</div>
          <div>Miss</div>
          <div>Streak</div>
        </div>

        <div class="result-grid" id="raceResultRows"></div>

        <div class="small-note" id="raceResultHint">
          ระบบกำลังตรวจสอบผลการแข่งขัน
        </div>

        <div class="race-actions">
          <button class="btn btn-blue" id="btnRaceRematch" type="button">Rematch</button>
          <button class="btn btn-violet" id="btnRaceBackLobby" type="button">กลับ Lobby</button>
          <button class="btn btn-warn" id="btnRaceExport" type="button">Export JSON</button>
          <button class="btn btn-ghost" id="btnRaceBackHub" type="button">กลับ HUB</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../../vr/vr-ui.js?v=20260316q-fix1"></script>
  <script type="module" src="./goodjunk.safe.js?v=20260319a-mobile-safe"></script>
</body>
</html>
