<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>GoodJunk Battle Board</title>
  <meta name="color-scheme" content="dark light" />
  <style>
    :root{
      --bg1:#020617; --bg2:#0b1226;
      --panel:rgba(2,6,23,.74);
      --stroke:rgba(148,163,184,.18);
      --text:#e5e7eb; --muted:#94a3b8;
      --blue:#3b82f6; --cyan:#22d3ee; --good:#22c55e; --warn:#f59e0b;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0; min-height:100%;
      background:
        radial-gradient(1200px 800px at 50% -10%, rgba(59,130,246,.16), transparent 60%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--text);
      font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans Thai",sans-serif;
    }
    .wrap{max-width:1200px;margin:0 auto;padding:18px}
    .hero,.panel{
      border:1px solid var(--stroke);
      background:var(--panel);
      border-radius:24px;
      box-shadow:0 18px 60px rgba(0,0,0,.30);
    }
    .hero{padding:18px;margin-bottom:14px;text-align:center}
    .kicker{
      display:inline-flex;align-items:center;justify-content:center;
      min-height:34px;padding:8px 14px;border-radius:999px;
      border:1px solid rgba(34,211,238,.20);background:rgba(34,211,238,.10);
      color:#a5f3fc;font-size:12px;font-weight:1000;
    }
    h1{margin:10px 0 0;font-size:clamp(30px,4vw,48px);line-height:1.05}
    .sub{margin-top:8px;color:var(--muted);font-size:14px;font-weight:900}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .panel{padding:16px}
    .roomline{
      display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
      margin-bottom:10px;
    }
    .pill{
      display:inline-flex;align-items:center;justify-content:center;
      min-height:40px;padding:8px 12px;border-radius:999px;
      border:1px solid var(--stroke);background:rgba(15,23,42,.62);
      font-size:13px;font-weight:1000;color:var(--text);
    }
    .bigstate{
      text-align:center;
      font-size:40px;font-weight:1000;line-height:1.05;
      margin:10px 0 4px;
    }
    .players{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
    .player{
      border:1px solid var(--stroke);border-radius:20px;background:rgba(15,23,42,.50);
      padding:16px;
    }
    .player .name{font-size:24px;font-weight:1000}
    .statgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:12px}
    .stat{
      border:1px solid var(--stroke);border-radius:16px;background:rgba(2,6,23,.40);
      padding:12px;text-align:center;
    }
    .stat .k{font-size:12px;color:var(--muted);font-weight:1000}
    .stat .v{margin-top:6px;font-size:28px;font-weight:1000}
    .series{
      margin-top:14px;border:1px solid var(--stroke);border-radius:18px;background:rgba(2,6,23,.40);
      padding:14px;text-align:center;
    }
    .series-title{font-size:15px;font-weight:1000}
    .series-score{margin-top:8px;font-size:34px;font-weight:1000}
    .footer-note{margin-top:14px;text-align:center;color:var(--muted);font-size:12px;font-weight:900}
    @media (max-width:900px){
      .grid,.players{grid-template-columns:1fr}
      .bigstate{font-size:30px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="kicker">⚔ GoodJunk Battle Board</div>
      <h1 id="boardTitle">ROOM: -</h1>
      <div class="sub" id="boardSub">กำลังรอสถานะห้อง...</div>
    </section>

    <div class="grid">
      <section class="panel">
        <div class="roomline">
          <span class="pill" id="roomPill">ROOM -</span>
          <span class="pill" id="statePill">STATE waiting</span>
          <span class="pill" id="joinedPill">PLAYERS 0/2</span>
        </div>

        <div class="bigstate" id="bigState">WAITING</div>
        <div class="sub" style="text-align:center" id="bigStateSub">รอผู้เล่นให้ครบก่อนเริ่ม</div>

        <div class="series">
          <div class="series-title">Series</div>
          <div class="series-score" id="seriesScore">0 - 0</div>
          <div class="sub" id="seriesSub">bestOf 3 • winsToChampion 2</div>
        </div>
      </section>

      <section class="panel">
        <div class="players">
          <div class="player">
            <div class="name" id="p1Name">PLAYER 1</div>
            <div class="statgrid">
              <div class="stat"><div class="k">Score</div><div class="v" id="p1Score">0</div></div>
              <div class="stat"><div class="k">Acc</div><div class="v" id="p1Acc">0%</div></div>
              <div class="stat"><div class="k">Miss</div><div class="v" id="p1Miss">0</div></div>
              <div class="stat"><div class="k">Time</div><div class="v" id="p1Time">0</div></div>
            </div>
          </div>

          <div class="player">
            <div class="name" id="p2Name">PLAYER 2</div>
            <div class="statgrid">
              <div class="stat"><div class="k">Score</div><div class="v" id="p2Score">0</div></div>
              <div class="stat"><div class="k">Acc</div><div class="v" id="p2Acc">0%</div></div>
              <div class="stat"><div class="k">Miss</div><div class="v" id="p2Miss">0</div></div>
              <div class="stat"><div class="k">Time</div><div class="v" id="p2Time">0</div></div>
            </div>
          </div>
        </div>

        <div class="footer-note" id="championLine">ยังไม่มีแชมป์</div>
      </section>
    </div>
  </div>

  <script>
    const qs=(k,d='')=>{ try{return new URL(location.href).searchParams.get(k)??d;}catch(_){return d;} };
    const room = String(qs('room','')).trim();
    const key = `HHA_GJ_BATTLE_BOARD:${room || 'NO_ROOM'}`;
    const $ = (id)=>document.getElementById(id);

    function readBoardRows(){
      try{
        const raw = localStorage.getItem(key) || '[]';
        const arr = JSON.parse(raw);
        return Array.isArray(arr) ? arr : [];
      }catch(_){ return []; }
    }

    function latestRows(){
      const now = Date.now();
      return readBoardRows()
        .filter(x => x && x.pid && (now - Number(x.at || 0) <= 5000))
        .sort((a,b)=> String(a.nick||a.pid).localeCompare(String(b.nick||b.pid)));
    }

    function render(){
      const rows = latestRows();
      const p1 = rows[0] || null;
      const p2 = rows[1] || null;
      const top = p1 || p2 || {};
      const series = top.series || null;

      $('boardTitle').textContent = `ROOM: ${room || '-'}`;
      $('boardSub').textContent = rows.length ? 'แสดงสถานะสดของห้องนี้' : 'ยังไม่มีผู้เล่นในห้อง';
      $('roomPill').textContent = `ROOM ${room || '-'}`;
      $('statePill').textContent = `STATE ${String(top.state || 'waiting').toUpperCase()}`;
      $('joinedPill').textContent = `PLAYERS ${rows.length}/2`;

      const stateText =
        top.state === 'countdown' ? 'COUNTDOWN' :
        top.state === 'playing' ? 'PLAYING' :
        top.state === 'result' ? 'RESULT' :
        'WAITING';

      $('bigState').textContent = stateText;
      $('bigStateSub').textContent =
        top.state === 'countdown' ? 'ผู้เล่นครบแล้ว กำลังจะเริ่ม' :
        top.state === 'playing' ? 'กำลังแข่งอยู่' :
        top.state === 'result' ? 'จบรอบนี้แล้ว' :
        'รอผู้เล่นให้ครบก่อนเริ่ม';

      $('p1Name').textContent = p1 ? (p1.nick || p1.pid) : 'PLAYER 1';
      $('p2Name').textContent = p2 ? (p2.nick || p2.pid) : 'PLAYER 2';

      $('p1Score').textContent = p1 ? (p1.score ?? 0) : 0;
      $('p1Acc').textContent = p1 ? `${p1.accPct ?? 0}%` : '0%';
      $('p1Miss').textContent = p1 ? (p1.missTotal ?? 0) : 0;
      $('p1Time').textContent = p1 ? (p1.tLeft ?? 0) : 0;

      $('p2Score').textContent = p2 ? (p2.score ?? 0) : 0;
      $('p2Acc').textContent = p2 ? `${p2.accPct ?? 0}%` : '0%';
      $('p2Miss').textContent = p2 ? (p2.missTotal ?? 0) : 0;
      $('p2Time').textContent = p2 ? (p2.tLeft ?? 0) : 0;

      $('seriesScore').textContent = series ? `${series.youWins ?? 0} - ${series.oppWins ?? 0}` : '0 - 0';
      $('seriesSub').textContent = series
        ? `bestOf ${series.bestOf ?? 3} • winsToChampion ${series.winsToChampion ?? 2}`
        : 'bestOf 3 • winsToChampion 2';

      $('championLine').textContent = series?.finished
        ? `Champion: ${series.championNick || series.championPid || '-'} 👑`
        : 'ยังไม่มีแชมป์';
    }

    render();
    setInterval(render, 700);
    window.addEventListener('storage', (ev)=>{
      if(ev.key === key) render();
    });
  </script>
</body>
</html>
