<!-- === /herohealth/goodjunk-board.html ===
HeroHealth • GoodJunk Live Board
PATCH v20260307-GJ-BOARD-PROJECTOR-FULLSCREEN-AUDIO
✅ Reads hha-battle/goodjunk/rooms/{room}
✅ Shows phase + top 2 realtime
✅ Control summary
✅ Phase banner / winner banner
✅ Fullscreen button
✅ Countdown / Start / Winner sounds
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>GoodJunk Live Board</title>
  <link rel="icon" href="./favicon.ico" />
  <meta name="color-scheme" content="dark light" />
  <style>
    :root{
      --bg1:#020617; --bg2:#0b1226; --panel:rgba(2,6,23,.74);
      --stroke:rgba(148,163,184,.18); --text:#e5e7eb; --muted:#94a3b8;
      --shadow:0 18px 60px rgba(0,0,0,.35);
    }
    *{ box-sizing:border-box; }
    html,body{
      margin:0; min-height:100%;
      background:
        radial-gradient(1200px 800px at 50% -20%, rgba(34,211,238,.10), transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans Thai", sans-serif;
    }
    .wrap{ width:min(1400px, calc(100vw - 24px)); margin:0 auto; padding:18px 12px; }
    .top,.pod,.table{
      background:linear-gradient(180deg, rgba(15,23,42,.82), rgba(2,6,23,.76));
      border:1px solid var(--stroke); border-radius:24px; box-shadow:var(--shadow);
    }
    .top{ padding:20px; margin-bottom:16px; }
    .bar{ display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; }
    .pill{
      padding:10px 14px; border-radius:999px;
      background:rgba(2,6,23,.66); border:1px solid var(--stroke); font-weight:800;
    }
    .podium{
      display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:16px;
    }
    .pod{ padding:18px; text-align:center; }
    .medal{ font-size:40px; }
    .name{ font-size:26px; font-weight:1000; margin-top:8px; }
    .score{ font-size:48px; font-weight:1000; margin-top:6px; }
    .sub{ color:var(--muted); font-size:14px; margin-top:8px; }
    .table{ padding:16px; }
    table{ width:100%; border-collapse:collapse; }
    th,td{ padding:14px 10px; border-bottom:1px solid rgba(148,163,184,.12); text-align:left; }
    th{ color:#cbd5e1; }
    .toolbar{ display:flex; gap:10px; margin-bottom:12px; flex-wrap:wrap; }
    input,button{
      min-height:44px; border-radius:14px; border:1px solid var(--stroke);
      background:rgba(2,6,23,.80); color:var(--text); padding:10px 12px; font:inherit;
    }
    button{
      cursor:pointer; border:0; font-weight:900; color:white;
      background:linear-gradient(135deg,#2563eb,#06b6d4);
    }
    #phaseBanner{
      display:none;
      text-align:center;
    }
    #phaseBannerTitle{
      font-size:40px;
      font-weight:1000;
      line-height:1.05;
    }
    #phaseBannerSub{
      margin-top:8px;
      color:#cbd5e1;
      font-size:18px;
    }
    @media (max-width:800px){ .podium{ grid-template-columns:1fr; } }
  </style>
  <script src="./firebase-config.js"></script>
</head>
<body>
  <div class="wrap">
    <section class="top">
      <div style="font-size:12px;color:#a5f3fc;font-weight:800;">🏆 Live Board</div>
      <h1 style="margin:8px 0 0;font-size:38px;">GoodJunk Battle Scoreboard</h1>
      <div class="toolbar">
        <input id="room" value="P5A" />
        <button id="btnConnect">เชื่อมต่อ</button>
        <button id="btnFullscreen">Fullscreen</button>
      </div>
      <div class="bar">
        <div class="pill">Room: <span id="roomTxt">P5A</span></div>
        <div class="pill">Phase: <span id="phaseTxt">—</span></div>
        <div class="pill">Round: <span id="roundTxt">—</span></div>
        <div class="pill">Winner: <span id="winnerTxt">—</span></div>
        <div class="pill">Rematch: <span id="rematchTxt">—</span></div>
      </div>

      <div class="bar" style="margin-top:10px;">
        <div class="pill">Connected: <span id="connectedTxt">0</span></div>
        <div class="pill">Ready: <span id="readyTxt">0</span></div>
        <div class="pill">Accepted: <span id="acceptedTxt">0</span></div>
        <div class="pill">Declined: <span id="declinedTxt">0</span></div>
        <div class="pill">Hint: <span id="controlHintTxt">—</span></div>
      </div>
    </section>

    <section id="phaseBanner" class="top" style="padding:16px; margin-top:0; margin-bottom:16px;">
      <div id="phaseBannerTitle">READY</div>
      <div id="phaseBannerSub">รอเริ่มเกม</div>
    </section>

    <section class="podium">
      <div class="pod">
        <div class="medal">🥇</div>
        <div id="p1Name" class="name">—</div>
        <div id="p1Score" class="score">0</div>
        <div id="p1Sub" class="sub">acc 0% • miss 0</div>
      </div>
      <div class="pod">
        <div class="medal">🥈</div>
        <div id="p2Name" class="name">—</div>
        <div id="p2Score" class="score">0</div>
        <div id="p2Sub" class="sub">acc 0% • miss 0</div>
      </div>
    </section>

    <section class="table">
      <table>
        <thead>
          <tr>
            <th>Nick</th>
            <th>Score</th>
            <th>Acc</th>
            <th>Miss</th>
            <th>MedianRT</th>
            <th>FinishMs</th>
            <th>Ready</th>
            <th>Connected</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="8">ยังไม่มีข้อมูล</td></tr>
        </tbody>
      </table>
    </section>
  </div>

  <script type="module">
    const $ = id => document.getElementById(id);
    const qs = (k,d='')=>{ try{ return new URL(location.href).searchParams.get(k) ?? d; }catch(_){ return d; } };
    $('room').value = qs('room','P5A');

    let offFns = [];
    let boardCountdownTimer = 0;
    let boardPlayersRaw = {};
    let boardRematchRaw = {};
    let boardRematchVotesRaw = {};
    let lastPhase = '';
    let lastCountdownSec = null;
    let lastWinner = '';

    function getDbCompat(){
      if(window.firebase?.database) return window.firebase.database();
      return null;
    }

    let audioCtx = null;
    function ensureAudio(){
      try{
        if(!audioCtx){
          const Ctx = window.AudioContext || window.webkitAudioContext;
          if(Ctx) audioCtx = new Ctx();
        }
        if(audioCtx && audioCtx.state === 'suspended'){
          audioCtx.resume().catch(()=>{});
        }
      }catch(_){}
    }

    function beep(freq=880, ms=120, type='sine', gainValue=0.03){
      try{
        ensureAudio();
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.value = gainValue;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        setTimeout(()=>{
          try{ osc.stop(); }catch(_){}
        }, ms);
      }catch(_){}
    }

    function playCountdownBeep(sec){
      if(sec <= 3 && sec >= 1) beep(700 + (3-sec)*120, 90, 'square', 0.028);
    }

    function playStartSound(){
      beep(880, 120, 'square', 0.03);
      setTimeout(()=>beep(1040, 140, 'square', 0.03), 120);
    }

    function playWinnerSound(){
      beep(880, 120, 'sine', 0.03);
      setTimeout(()=>beep(1040, 140, 'sine', 0.03), 140);
      setTimeout(()=>beep(1320, 180, 'sine', 0.03), 300);
    }

    function clearBoardCountdown(){
      if(boardCountdownTimer){
        clearInterval(boardCountdownTimer);
        boardCountdownTimer = 0;
      }
    }

    function showPhaseBanner(title, sub){
      const box = $('phaseBanner');
      const t = $('phaseBannerTitle');
      const s = $('phaseBannerSub');
      if(!box || !t || !s) return;
      box.style.display = 'block';
      t.textContent = title || '—';
      s.textContent = sub || '';
    }

    function renderPhaseBanner(st){
      clearBoardCountdown();

      const phase = String(st?.phase || '').toLowerCase();
      const startAtMs = Number(st?.startAtMs || 0) || 0;
      const winner = String(st?.winner || '');

      if(phase !== lastPhase){
        if(phase === 'running') playStartSound();
        lastPhase = phase;
      }

      if(phase === 'lobby'){
        showPhaseBanner('LOBBY', 'รอผู้เล่นพร้อม');
        lastCountdownSec = null;
        return;
      }

      if(phase === 'countdown' && startAtMs){
        function tick(){
          const leftMs = Math.max(0, startAtMs - Date.now());
          const sec = Math.max(0, Math.ceil(leftMs / 1000));
          showPhaseBanner(`START IN ${sec}`, 'เตรียมพร้อม');

          if(sec !== lastCountdownSec){
            lastCountdownSec = sec;
            playCountdownBeep(sec);
          }

          if(leftMs <= 0){
            clearBoardCountdown();
            lastCountdownSec = null;
          }
        }
        tick();
        boardCountdownTimer = setInterval(tick, 200);
        return;
      }

      if(phase === 'running'){
        showPhaseBanner('BATTLE RUNNING', 'กำลังแข่งขัน');
        lastCountdownSec = null;
        return;
      }

      if(phase === 'ended'){
        showPhaseBanner(winner ? 'WINNER DECIDED' : 'ROUND ENDED', winner ? `winner: ${winner}` : 'จบรอบ');
        if(winner && winner !== lastWinner){
          lastWinner = winner;
          playWinnerSound();
        }
        return;
      }

      showPhaseBanner('GOODJUNK BATTLE', 'พร้อมใช้งาน');
      lastCountdownSec = null;
    }

    function renderState(st){
      $('roomTxt').textContent = $('room').value.trim().toUpperCase();
      $('phaseTxt').textContent = st?.phase || '—';
      $('roundTxt').textContent = st?.roundId || '—';
      $('winnerTxt').textContent = st?.winner || '—';
      renderPhaseBanner(st || {});
    }

    function renderPlayers(raw){
      const rows = Object.entries(raw || {})
        .map(([k,v])=>({ key:k, ...(v||{}) }))
        .sort((a,b)=>
          (Number(b.score||0)-Number(a.score||0)) ||
          (Number(b.acc||0)-Number(a.acc||0)) ||
          (Number(a.miss||0)-Number(b.miss||0)) ||
          (Number(a.medianRT||0)-Number(b.medianRT||0))
        );

      const p1 = rows[0] || null;
      const p2 = rows[1] || null;

      $('p1Name').textContent = p1?.nick || '—';
      $('p1Score').textContent = String(Number(p1?.score || 0));
      $('p1Sub').textContent = `acc ${Number(p1?.acc || 0)}% • miss ${Number(p1?.miss || 0)}`;

      $('p2Name').textContent = p2?.nick || '—';
      $('p2Score').textContent = String(Number(p2?.score || 0));
      $('p2Sub').textContent = `acc ${Number(p2?.acc || 0)}% • miss ${Number(p2?.miss || 0)}`;

      if(!rows.length){
        $('tbody').innerHTML = `<tr><td colspan="8">ยังไม่มีผู้เล่น</td></tr>`;
        return;
      }

      $('tbody').innerHTML = rows.map(p=>`
        <tr>
          <td>${p.nick || '-'}</td>
          <td>${Number(p.score || 0)}</td>
          <td>${Number(p.acc || 0)}%</td>
          <td>${Number(p.miss || 0)}</td>
          <td>${Number(p.medianRT || 0)}</td>
          <td>${Number(p.finishMs || 0)}</td>
          <td>${p.ready ? 'yes' : 'no'}</td>
          <td>${p.connected !== false ? 'yes' : 'no'}</td>
        </tr>
      `).join('');
    }

    function renderRematch(rematch, votes){
      const requestedBy = String(rematch?.requestedBy || '');
      const committed = !!rematch?.committed;
      const acceptedCount = Object.values(votes || {}).filter(v => v?.accepted).length;
      const declinedCount = Object.values(votes || {}).filter(v => v?.declined).length;

      $('rematchTxt').textContent = requestedBy
        ? `${committed ? 'committed' : 'requested'} • A:${acceptedCount} D:${declinedCount}`
        : '—';
    }

    function renderControlSummary(playersRaw, rematch, votes){
      const players = Object.entries(playersRaw || {}).map(([k,v])=>({ key:k, ...(v||{}) }));
      const connected = players.filter(p => p.connected !== false).length;
      const ready = players.filter(p => !!p.ready).length;

      const voteRows = Object.values(votes || {});
      const accepted = voteRows.filter(v => v?.accepted).length;
      const declined = voteRows.filter(v => v?.declined).length;

      $('connectedTxt').textContent = String(connected);
      $('readyTxt').textContent = String(ready);
      $('acceptedTxt').textContent = String(accepted);
      $('declinedTxt').textContent = String(declined);

      const phase = String((document.getElementById('phaseTxt')?.textContent || '')).toLowerCase();
      let hint = '—';

      if(phase === 'lobby'){
        hint = ready >= 2 ? 'พร้อมเริ่ม' : 'รอผู้เล่น ready';
      }else if(phase === 'countdown'){
        hint = 'กำลังนับถอยหลัง';
      }else if(phase === 'running'){
        hint = 'แข่งขันอยู่';
      }else if(phase === 'ended'){
        if(rematch?.requestedBy){
          hint = 'รอการตอบรับ rematch';
        }else{
          hint = 'รอครูสั่งรอบใหม่';
        }
      }

      $('controlHintTxt').textContent = hint;
    }

    function connect(){
      offFns.forEach(fn=>{ try{ fn(); }catch(_){} });
      offFns = [];

      const room = ($('room').value || 'P5A').trim().toUpperCase();
      const db = getDbCompat();
      if(!db){
        alert('Firebase compat ยังไม่พร้อมใน firebase-config.js');
        return;
      }

      const base = `hha-battle/goodjunk/rooms/${room}`;
      const stateRef = db.ref(`${base}/state`);
      const playersRef = db.ref(`${base}/players`);
      const rematchRef = db.ref(`${base}/rematch`);
      const rematchVotesRef = db.ref(`${base}/rematchVotes`);

      const stateCb = snap => {
        const st = snap.val() || {};
        renderState(st);
        renderControlSummary(boardPlayersRaw, boardRematchRaw, boardRematchVotesRaw);
      };
      const playersCb = snap => {
        boardPlayersRaw = snap.val() || {};
        renderPlayers(boardPlayersRaw);
        renderControlSummary(boardPlayersRaw, boardRematchRaw, boardRematchVotesRaw);
      };
      const rematchCb = snap => {
        boardRematchRaw = snap.val() || {};
        renderRematch(boardRematchRaw, boardRematchVotesRaw);
        renderControlSummary(boardPlayersRaw, boardRematchRaw, boardRematchVotesRaw);
      };
      const rematchVotesCb = snap => {
        boardRematchVotesRaw = snap.val() || {};
        renderRematch(boardRematchRaw, boardRematchVotesRaw);
        renderControlSummary(boardPlayersRaw, boardRematchRaw, boardRematchVotesRaw);
      };

      stateRef.on('value', stateCb);
      playersRef.on('value', playersCb);
      rematchRef.on('value', rematchCb);
      rematchVotesRef.on('value', rematchVotesCb);

      offFns.push(()=>stateRef.off('value', stateCb));
      offFns.push(()=>playersRef.off('value', playersCb));
      offFns.push(()=>rematchRef.off('value', rematchCb));
      offFns.push(()=>rematchVotesRef.off('value', rematchVotesCb));
    }

    $('btnConnect').onclick = connect;

    $('btnFullscreen').onclick = async ()=>{
      try{
        ensureAudio();
        const root = document.documentElement;
        if(!document.fullscreenElement){
          await root.requestFullscreen?.();
        }else{
          await document.exitFullscreen?.();
        }
      }catch(err){
        console.warn('[Board] fullscreen failed', err);
      }
    };

    document.addEventListener('click', ensureAudio, { passive:true });
    document.addEventListener('touchstart', ensureAudio, { passive:true });

    connect();
  </script>
</body>
</html>
