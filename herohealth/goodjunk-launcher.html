<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk Launcher</title>
  <meta name="theme-color" content="#9fe3ff" />
  <link rel="icon" href="./favicon.ico" />
  <link rel="stylesheet" href="./goodjunk-page-base.css" />

  <style>
    .gj-launcher-wrap{
      min-height:100dvh;
      padding:
        calc(14px + var(--sat))
        calc(14px + var(--sar))
        calc(14px + var(--sab))
        calc(14px + var(--sal));
      display:grid;
      place-items:center;
    }

    .gj-launcher-shell{
      width:min(96vw,1080px);
      display:grid;
      gap:14px;
    }

    .gj-hero{
      border-radius:28px;
      border:3px solid var(--line);
      background:linear-gradient(180deg,#fffef9,#f7fff4);
      box-shadow:var(--shadow);
      padding:18px;
      position:relative;
      overflow:hidden;
    }

    .gj-hero::before{
      content:"";
      position:absolute;
      left:-24px;
      top:-24px;
      width:110px;
      height:110px;
      border-radius:999px;
      background:rgba(127,207,255,.16);
      filter:blur(8px);
    }

    .gj-hero::after{
      content:"";
      position:absolute;
      right:-28px;
      bottom:-28px;
      width:120px;
      height:120px;
      border-radius:999px;
      background:rgba(255,212,92,.18);
      filter:blur(8px);
    }

    .gj-hero-row{
      position:relative;
      z-index:1;
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:10px;
    }

    .gj-kicker{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:38px;
      padding:8px 14px;
      border-radius:999px;
      background:#eaf8ff;
      border:2px solid var(--line);
      color:#5ea8d0;
      font-size:13px;
      font-weight:1000;
      white-space:nowrap;
    }

    .gj-hero-title{
      margin:0;
      font-size:clamp(26px,4vw,38px);
      line-height:1.04;
      color:#67a91c;
      font-weight:1000;
    }

    .gj-hero-sub{
      position:relative;
      z-index:1;
      margin:8px 0 0;
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
      font-weight:900;
    }

    .gj-config{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:12px;
    }

    .gj-config-card{
      border-radius:22px;
      border:3px solid var(--line);
      background:linear-gradient(180deg,#fffef9,#ffffff);
      box-shadow:var(--shadow-soft);
      padding:14px;
    }

    .gj-field{
      display:grid;
      gap:8px;
    }

    .gj-label{
      font-size:13px;
      color:#6f6b63;
      font-weight:1000;
    }

    .gj-input,
    .gj-select{
      width:100%;
      min-height:46px;
      padding:10px 12px;
      border-radius:16px;
      border:3px solid var(--line);
      background:#fff;
      color:#4d4a42;
      font-size:15px;
      font-weight:1000;
      outline:none;
    }

    .gj-input:focus,
    .gj-select:focus{
      border-color:#8dd5ff;
      box-shadow:0 0 0 4px rgba(127,207,255,.18);
    }

    .gj-mode-grid{
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:12px;
    }

    .gj-mode-card{
      border:none;
      cursor:pointer;
      text-align:left;
      border-radius:24px;
      border:3px solid var(--line);
      background:linear-gradient(180deg,#fffef9,#ffffff);
      box-shadow:var(--shadow-soft);
      padding:16px 14px;
      transition:transform .14s ease, box-shadow .14s ease, border-color .14s ease;
    }

    .gj-mode-card:hover{
      transform:translateY(-2px);
      box-shadow:var(--shadow);
      border-color:#9ddcff;
    }

    .gj-mode-card:active{
      transform:translateY(0);
    }

    .gj-mode-icon{
      width:64px;
      height:64px;
      border-radius:20px;
      display:grid;
      place-items:center;
      font-size:32px;
      margin-bottom:10px;
      border:3px solid transparent;
      background:#fff;
    }

    .gj-mode-card.solo .gj-mode-icon{
      background:linear-gradient(180deg,#fff8dc,#fff0b8);
      border-color:#ffe08a;
    }

    .gj-mode-card.duet .gj-mode-icon{
      background:linear-gradient(180deg,#eefbff,#dff6ff);
      border-color:#bfe8ff;
    }

    .gj-mode-card.race .gj-mode-icon{
      background:linear-gradient(180deg,#f4fff1,#e5ffd9);
      border-color:#c6efb8;
    }

    .gj-mode-card.battle .gj-mode-icon{
      background:linear-gradient(180deg,#fff3f3,#ffe0e0);
      border-color:#ffd0d0;
    }

    .gj-mode-card.coop .gj-mode-icon{
      background:linear-gradient(180deg,#f8f2ff,#eee3ff);
      border-color:#d8c4ff;
    }

    .gj-mode-title{
      font-size:20px;
      line-height:1.08;
      color:#4d4a42;
      font-weight:1000;
    }

    .gj-mode-desc{
      margin-top:6px;
      font-size:13px;
      line-height:1.6;
      color:#75706b;
      font-weight:900;
      min-height:62px;
    }

    .gj-mode-tag{
      margin-top:10px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:34px;
      padding:8px 12px;
      border-radius:999px;
      background:#fff;
      border:2px solid var(--line);
      color:#6b675f;
      font-size:12px;
      font-weight:1000;
    }

    .gj-panel{
      border-radius:24px;
      border:3px solid var(--line);
      background:linear-gradient(180deg,#fffef9,#ffffff);
      box-shadow:var(--shadow-soft);
      padding:16px;
    }

    .gj-panel-title{
      margin:0 0 8px;
      font-size:20px;
      line-height:1.1;
      color:#67a91c;
      font-weight:1000;
    }

    .gj-panel-sub{
      margin:0;
      font-size:14px;
      line-height:1.7;
      color:var(--muted);
      font-weight:900;
    }

    .gj-launcher-actions{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:10px;
    }

    @media (max-width:980px){
      .gj-config{
        grid-template-columns:repeat(2,minmax(0,1fr));
      }

      .gj-mode-grid{
        grid-template-columns:repeat(2,minmax(0,1fr));
      }

      .gj-launcher-actions{
        grid-template-columns:1fr;
      }
    }

    @media (max-width:640px){
      .gj-launcher-shell{
        width:min(96vw,1080px);
      }

      .gj-config{
        grid-template-columns:1fr;
      }

      .gj-mode-grid{
        grid-template-columns:1fr;
      }

      .gj-mode-desc{
        min-height:auto;
      }
    }
  </style>
</head>

<body>
  <div class="gj-launcher-wrap">
    <div class="gj-launcher-shell">

      <section class="gj-hero">
        <div class="gj-hero-row">
          <div class="gj-kicker">🍎 GOODJUNK</div>
          <h1 class="gj-hero-title">เลือกโหมดที่อยากเล่น</h1>
        </div>
        <p class="gj-hero-sub">
          เลือกชื่อ ระดับ เวลา และมุมมอง แล้วกดโหมดที่ต้องการเล่น
          โหมดหลายคนจะเน้นเก็บ <b>good / junk</b> ส่วน <b>phase boss</b> ใช้เฉพาะ Solo Boss
        </p>
      </section>

      <section class="gj-config" aria-label="ตั้งค่าการเล่น">
        <div class="gj-config-card">
          <label class="gj-field">
            <span class="gj-label">ชื่อผู้เล่น</span>
            <input id="fieldName" class="gj-input" type="text" maxlength="40" placeholder="Hero" />
          </label>
        </div>

        <div class="gj-config-card">
          <label class="gj-field">
            <span class="gj-label">ระดับ</span>
            <select id="fieldDiff" class="gj-select">
              <option value="easy">easy</option>
              <option value="normal">normal</option>
              <option value="hard">hard</option>
            </select>
          </label>
        </div>

        <div class="gj-config-card">
          <label class="gj-field">
            <span class="gj-label">เวลาเล่น</span>
            <select id="fieldTime" class="gj-select">
              <option value="60">60 วินาที</option>
              <option value="90">90 วินาที</option>
              <option value="120">120 วินาที</option>
              <option value="150">150 วินาที</option>
            </select>
          </label>
        </div>

        <div class="gj-config-card">
          <label class="gj-field">
            <span class="gj-label">มุมมอง</span>
            <select id="fieldView" class="gj-select">
              <option value="mobile">mobile</option>
              <option value="pc">pc</option>
              <option value="cvr">cardboard</option>
            </select>
          </label>
        </div>
      </section>

      <section class="gj-panel">
        <h2 class="gj-panel-title">โหมดการเล่น</h2>
        <p class="gj-panel-sub">
          กดการ์ดเพื่อเริ่มเล่น ระบบจะส่งเฉพาะข้อมูลที่จำเป็นไปหน้าเกม
        </p>

        <div class="gj-mode-grid" style="margin-top:12px;">
          <button class="gj-mode-card solo" type="button" data-mode="solo-boss">
            <div class="gj-mode-icon">👑</div>
            <div class="gj-mode-title">Solo Boss</div>
            <div class="gj-mode-desc">เล่นเดี่ยว ผ่าน phase แล้วสู้ Junk King</div>
            <div class="gj-mode-tag">boss mode</div>
          </button>

          <button class="gj-mode-card duet" type="button" data-mode="duet">
            <div class="gj-mode-icon">🤝</div>
            <div class="gj-mode-title">Duet</div>
            <div class="gj-mode-desc">เล่นเป็นคู่ เน้นเก็บ good และหลบ junk</div>
            <div class="gj-mode-tag">2 players</div>
          </button>

          <button class="gj-mode-card race" type="button" data-mode="race">
            <div class="gj-mode-icon">🏁</div>
            <div class="gj-mode-title">Race</div>
            <div class="gj-mode-desc">แข่งกันเก็บของดีให้ได้มากกว่า</div>
            <div class="gj-mode-tag">race</div>
          </button>

          <button class="gj-mode-card battle" type="button" data-mode="battle">
            <div class="gj-mode-icon">⚔️</div>
            <div class="gj-mode-title">Battle</div>
            <div class="gj-mode-desc">แข่งคะแนน good / junk แบบตรง ๆ</div>
            <div class="gj-mode-tag">battle</div>
          </button>

          <button class="gj-mode-card coop" type="button" data-mode="coop">
            <div class="gj-mode-icon">🫶</div>
            <div class="gj-mode-title">Co-op</div>
            <div class="gj-mode-desc">ช่วยกันเก็บของดี ลดการพลาดของทีม</div>
            <div class="gj-mode-tag">team play</div>
          </button>
        </div>
      </section>

      <section class="gj-launcher-actions">
        <a id="btnBackHub" class="gj-btn gj-btn-success" href="./nutrition-zone.html">🥗 กลับ Nutrition</a>
        <button id="btnSoloQuick" class="gj-btn gj-btn-primary" type="button">👑 เข้า Solo Boss</button>
        <button id="btnReload" class="gj-btn gj-btn-warn" type="button">🔄 โหลดค่าใหม่</button>
      </section>

    </div>
  </div>

  <script>
    (function(){
      'use strict';

      const q = new URLSearchParams(location.search);
      const STORAGE_KEY = 'HHA_GJ_LAUNCHER_PREFS';

      const fieldName = document.getElementById('fieldName');
      const fieldDiff = document.getElementById('fieldDiff');
      const fieldTime = document.getElementById('fieldTime');
      const fieldView = document.getElementById('fieldView');

      const btnBackHub = document.getElementById('btnBackHub');
      const btnSoloQuick = document.getElementById('btnSoloQuick');
      const btnReload = document.getElementById('btnReload');
      const modeCards = Array.from(document.querySelectorAll('.gj-mode-card'));

      function first(){
        for (let i = 0; i < arguments.length; i++) {
          const v = arguments[i];
          if (String(v || '').trim()) return String(v).trim();
        }
        return '';
      }

      function lower(v){
        return String(v || '').trim().toLowerCase();
      }

      function safeJsonParse(text, fallback){
        try { return JSON.parse(text); } catch (_) { return fallback; }
      }

      function storageGet(key, fallback){
        try {
          const raw = localStorage.getItem(key);
          return raw == null ? fallback : raw;
        } catch (_) {
          return fallback;
        }
      }

      function storageSet(key, value){
        try { localStorage.setItem(key, value); } catch (_) {}
      }

      function cleanReturnUrl(raw){
        const fallback = new URL('./nutrition-zone.html', location.href).toString();

        try{
          if(!String(raw || '').trim()) return fallback;

          const u = new URL(String(raw), location.href);

          if(u.pathname.includes('/nutrition-zone.html')){
            return new URL('./nutrition-zone.html', location.href).toString();
          }

          if(u.pathname.includes('/hub.html') || u.pathname.includes('/hub-v2.html')){
            return fallback;
          }

          return u.toString();
        }catch(_){
          return fallback;
        }
      }

      function getHubHref(){
        return cleanReturnUrl(q.get('hub'));
      }

      function getPid(){
        return first(q.get('pid'), 'anon');
      }

      function getSavedPrefs(){
        const raw = storageGet(STORAGE_KEY, '');
        const data = safeJsonParse(raw, null);
        return data && typeof data === 'object' ? data : {};
      }

      function setSelectValue(select, value, fallback){
        const wanted = first(value, fallback);
        const ok = Array.from(select.options).some(opt => opt.value === wanted);
        select.value = ok ? wanted : fallback;
      }

      function savePrefs(){
        storageSet(STORAGE_KEY, JSON.stringify({
          name: fieldName.value.trim() || 'Hero',
          diff: fieldDiff.value || 'normal',
          time: fieldTime.value || '150',
          view: fieldView.value || 'mobile'
        }));
      }

      function loadPrefs(){
        const saved = getSavedPrefs();

        fieldName.value = first(q.get('name'), saved.name, 'Hero');
        setSelectValue(fieldDiff, first(q.get('diff'), saved.diff), 'normal');
        setSelectValue(fieldTime, first(q.get('time'), saved.time), '150');
        setSelectValue(fieldView, first(q.get('view'), saved.view), 'mobile');
      }

      function buildBaseUrl(){
        const url = new URL('./goodjunk-vr.html', location.href);

        url.searchParams.set('pid', getPid());
        url.searchParams.set('name', fieldName.value.trim() || 'Hero');
        url.searchParams.set('diff', fieldDiff.value || 'normal');
        url.searchParams.set('time', fieldTime.value || '150');
        url.searchParams.set('view', fieldView.value || 'mobile');
        url.searchParams.set('run', first(q.get('run'), 'play'));
        url.searchParams.set('zone', 'nutrition');
        url.searchParams.set('game', 'goodjunk');
        url.searchParams.set('hub', getHubHref());

        return url;
      }

      function buildModeHref(mode){
        const url = buildBaseUrl();

        if(mode === 'solo-boss'){
          url.searchParams.set('mode', 'solo');
          url.searchParams.set('entry', 'solo-boss');
          url.searchParams.set('phaseBoss', '1');
          return url.toString();
        }

        url.searchParams.set('mode', mode);
        return url.toString();
      }

      function goMode(mode){
        savePrefs();
        location.href = buildModeHref(mode);
      }

      loadPrefs();
      btnBackHub.href = getHubHref();

      [fieldName, fieldDiff, fieldTime, fieldView].forEach((el) => {
        el.addEventListener('input', savePrefs);
        el.addEventListener('change', savePrefs);
      });

      modeCards.forEach((card) => {
        card.addEventListener('click', function(){
          const mode = lower(card.dataset.mode);
          goMode(mode);
        });
      });

      btnSoloQuick.addEventListener('click', function(){
        goMode('solo-boss');
      });

      btnReload.addEventListener('click', function(){
        location.reload();
      });
    })();
  </script>
</body>
</html>
