<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Redirecting — Germ Detective</title>
  <meta name="robots" content="noindex" />
  <script>
    (function(){
      'use strict';
      try{
        const here = new URL(location.href);
        const target = new URL('./germ-detective/germ-detective.html', here);

        // copy all existing query params through
        here.searchParams.forEach((value, key)=>{
          target.searchParams.set(key, value);
        });

        // preserve hash if any
        target.hash = here.hash || '';

        location.replace(target.toString());
      }catch(err){
        document.documentElement.innerHTML =
          '<body style="font-family:system-ui;padding:16px;background:#020617;color:#e5e7eb">' +
          '<h1 style="font-size:18px;margin:0 0 8px">เปิด Germ Detective ไม่สำเร็จ</h1>' +
          '<p style="margin:0;color:#94a3b8">redirect ไปยังโฟลเดอร์เกมไม่สำเร็จ</p>' +
          '</body>';
      }
    })();
  </script>
</head>
<body></body>
</html>
