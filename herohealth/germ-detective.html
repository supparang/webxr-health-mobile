<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth — Germ Detective Launcher</title>
  <meta name="robots" content="noindex" />
  <style>
    html,body{
      margin:0;
      min-height:100%;
      background:#020617;
      color:#e5e7eb;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans Thai",sans-serif;
      display:grid;
      place-items:center;
    }
    .card{
      width:min(92vw,560px);
      border:1px solid rgba(148,163,184,.18);
      background:rgba(2,6,23,.78);
      border-radius:20px;
      padding:18px;
      box-shadow:0 20px 60px rgba(0,0,0,.35);
    }
    .muted{ color:#94a3b8; font-size:13px; }
  </style>
</head>
<body>
  <div class="card">
    <div style="font-weight:1000;font-size:18px;margin-bottom:8px;">กำลังเปิด Germ Detective…</div>
    <div class="muted" id="msg">กำลังตรวจสอบ warmup / game flow</div>
  </div>

  <script>
    (function(){
      'use strict';

      function qs(k, d=''){
        try{ return new URL(location.href).searchParams.get(k) ?? d; }
        catch{ return d; }
      }

      function normalizeMaybeEncodedUrl(v){
        v = String(v ?? '').trim();
        if(!v || v === 'null' || v === 'undefined') return '';
        if(/%3A|%2F|%3F|%26|%3D/i.test(v)){
          try{ v = decodeURIComponent(v); }catch(e){}
        }
        return v.trim();
      }

      function cleanUrl(raw, fallback){
        try{
          const u = new URL(raw || fallback, location.href);
          [
            'gatePhase','phase','gateResult','gateMode',
            'wType','wPct','wSteps','wTimeBonus','wScoreBonus','wRank',
            'next','cd','wskip'
          ].forEach(k=>u.searchParams.delete(k));
          return u.toString();
        }catch(_){
          return fallback;
        }
      }

      function setMsg(t){
        const el = document.getElementById('msg');
        if(el) el.textContent = t;
      }

      const ORIGIN = location.origin;
      const HUB_URL  = ORIGIN + '/webxr-health-mobile/herohealth/hub.html';
      const GATE_URL = ORIGIN + '/webxr-health-mobile/herohealth/warmup-gate.html?v=20260310z';
      const RUN_URL  = ORIGIN + '/webxr-health-mobile/herohealth/germ-detective/germ-detective.html';

      const pid   = String(qs('pid','anon')).trim() || 'anon';
      const run   = String(qs('run','play')).toLowerCase() || 'play';
      const diff  = String(qs('diff','normal')).toLowerCase() || 'normal';
      const time  = String(qs('time','80'));
      const seed  = String(qs('seed', String(Date.now())));
      const view  = String(qs('view','mobile')).toLowerCase() || 'mobile';
      const scene = String(qs('scene','classroom')).toLowerCase() || 'classroom';

      const studyId = String(qs('studyId',''));
      const phase = String(qs('phase',''));
      const safePhase = (phase && phase !== 'warmup' && phase !== 'cooldown') ? phase : '';
      const conditionGroup = String(qs('conditionGroup',''));

      const hub = cleanUrl(normalizeMaybeEncodedUrl(qs('hub','')) || HUB_URL, HUB_URL);

      const gateResult = String(qs('gateResult',''));
      const gateMode = String(qs('gateMode',''));

      const gameUrl = new URL(RUN_URL);
      gameUrl.searchParams.set('run', run);
      gameUrl.searchParams.set('diff', diff);
      gameUrl.searchParams.set('time', time);
      gameUrl.searchParams.set('seed', seed);
      gameUrl.searchParams.set('view', view);
      gameUrl.searchParams.set('pid', pid);
      gameUrl.searchParams.set('scene', scene);
      gameUrl.searchParams.set('zone', 'hygiene');
      gameUrl.searchParams.set('hub', hub);

      if(studyId) gameUrl.searchParams.set('studyId', studyId);
      if(safePhase) gameUrl.searchParams.set('phase', safePhase);
      if(conditionGroup) gameUrl.searchParams.set('conditionGroup', conditionGroup);

      const alreadyWarm = (gateResult === '1' && gateMode === 'warmup');
      const currentlyInsideGate = /warmup-gate\.html$/i.test(location.pathname);

      console.log('[germ-launcher] pathname =', location.pathname);
      console.log('[germ-launcher] RUN_URL =', gameUrl.toString());

      if(alreadyWarm){
        setMsg('ผ่าน warmup แล้ว กำลังเข้าเกม…');
        location.replace(gameUrl.toString());
        return;
      }

      if(currentlyInsideGate){
        setMsg('อยู่ใน warmup gate แล้ว กำลังเข้าเกม…');
        location.replace(gameUrl.toString());
        return;
      }

      const warmupUrl = new URL(GATE_URL);
      warmupUrl.searchParams.set('gatePhase', 'warmup');
      warmupUrl.searchParams.set('phase', 'warmup');
      warmupUrl.searchParams.set('cat', 'hygiene');
      warmupUrl.searchParams.set('theme', 'germdetective');
      warmupUrl.searchParams.set('game', 'germdetective');
      warmupUrl.searchParams.set('pid', pid);
      warmupUrl.searchParams.set('hub', hub);
      warmupUrl.searchParams.set('next', gameUrl.toString());
      warmupUrl.searchParams.set('run', run);
      warmupUrl.searchParams.set('diff', diff);
      warmupUrl.searchParams.set('time', time);
      warmupUrl.searchParams.set('view', view);
      warmupUrl.searchParams.set('seed', seed);

      if(studyId) warmupUrl.searchParams.set('studyId', studyId);
      if(conditionGroup) warmupUrl.searchParams.set('conditionGroup', conditionGroup);

      console.log('[germ-launcher] WARMUP_URL =', warmupUrl.toString());

      setMsg('กำลังเข้า warmup ก่อนเริ่มเกม…');
      location.replace(warmupUrl.toString());
    })();
  </script>
</body>
</html>
