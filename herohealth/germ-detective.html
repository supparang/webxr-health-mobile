<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth — Germ Detective Launcher</title>
  <meta name="color-scheme" content="dark" />
  <link rel="icon" href="./favicon.ico" />
  <style>
    :root{
      --bg:#020617; --panel:rgba(2,6,23,.78); --stroke:rgba(148,163,184,.18);
      --text:#e5e7eb; --muted:#94a3b8; --good:#22c55e; --cyan:#22d3ee; --warn:#f59e0b;
      --sat: env(safe-area-inset-top, 0px); --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px); --sar: env(safe-area-inset-right, 0px);
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;height:100%;
      background:
        radial-gradient(1200px 800px at 20% 0%, rgba(34,211,238,.16), transparent 55%),
        radial-gradient(900px 700px at 90% 20%, rgba(167,139,250,.14), transparent 55%),
        var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,"Noto Sans Thai",Segoe UI,Roboto,sans-serif;
    }
    .wrap{
      min-height:100%;
      display:grid;
      place-items:center;
      padding:calc(18px + var(--sat)) calc(16px + var(--sar)) calc(18px + var(--sab)) calc(16px + var(--sal));
    }
    .card{
      width:min(920px,100%);
      border:1px solid var(--stroke);
      border-radius:24px;
      background:var(--panel);
      backdrop-filter:blur(14px);
      box-shadow:0 24px 90px rgba(0,0,0,.45);
      padding:16px;
    }
    .title{font-size:20px;font-weight:1000}
    .sub{margin-top:6px;color:rgba(229,231,235,.76);font-weight:800;font-size:13px;line-height:1.45}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
    @media (max-width:760px){ .grid{grid-template-columns:1fr } }
    .box{
      border:1px solid var(--stroke);
      background:rgba(15,23,42,.52);
      border-radius:18px;
      padding:12px;
    }
    .box h3{margin:0;font-size:13px;font-weight:1000}
    .row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
    .chip{
      border-radius:999px;
      border:1px solid rgba(148,163,184,.18);
      background:rgba(2,6,23,.55);
      color:rgba(229,231,235,.95);
      padding:8px 10px;
      font-weight:1000;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }
    .chip.on{border-color:rgba(34,211,238,.26);background:rgba(34,211,238,.12)}
    .chip.good.on{border-color:rgba(34,197,94,.28);background:rgba(34,197,94,.14)}
    .chip.warn.on{border-color:rgba(245,158,11,.28);background:rgba(245,158,11,.14)}
    .field{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:10px}
    label{font-size:12px;color:rgba(148,163,184,.95);font-weight:900}
    input,select{
      width:170px;max-width:100%;
      background:rgba(2,6,23,.55);
      border:1px solid rgba(148,163,184,.18);
      color:rgba(229,231,235,.95);
      border-radius:14px;
      padding:10px 12px;
      font-weight:900;
    }
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .btn{
      border-radius:16px;
      border:1px solid rgba(148,163,184,.18);
      background:rgba(15,23,42,.72);
      color:rgba(229,231,235,.95);
      padding:10px 12px;
      font-weight:1000;
      cursor:pointer;
      text-decoration:none;
    }
    .btn.primary{background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.28)}
    .btn.cyan{background:rgba(34,211,238,.14);border-color:rgba(34,211,238,.24)}
    .hint{margin-top:10px;font-size:12px;color:rgba(148,163,184,.95);line-height:1.4}
    .preview{margin-top:10px;font-size:12px;color:rgba(148,163,184,.95);word-break:break-all}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="title">🦠 Germ Detective — Launcher</div>
    <div class="sub">เข้า warmup ก่อน แล้วค่อยเข้าเกมจริง</div>

    <div class="grid">
      <div class="box">
        <h3>VIEW</h3>
        <div class="row" id="viewRow"></div>
        <div class="hint">mobile = แตะจุด, cvr = ยิง crosshair, pc = เมาส์/คลิก</div>
      </div>

      <div class="box">
        <h3>DIFFICULTY</h3>
        <div class="row" id="diffRow"></div>
        <div class="hint">เริ่มที่ normal ได้เลย</div>
      </div>

      <div class="box">
        <h3>TIME / SEED</h3>
        <div class="field">
          <label for="timeInp">TIME</label>
          <input id="timeInp" type="number" min="40" max="180" step="1" />
          <label for="seedInp">SEED</label>
          <input id="seedInp" type="number" step="1" />
          <button class="btn" id="btnRandSeed" type="button">สุ่ม seed</button>
        </div>
        <div class="hint">แนะนำ 70–80 วินาที</div>
      </div>

      <div class="box">
        <h3>SCENE</h3>
        <div class="field">
          <label for="sceneSel">SCENE</label>
          <select id="sceneSel">
            <option value="classroom">classroom</option>
            <option value="home">home</option>
            <option value="canteen">canteen</option>
          </select>
        </div>
        <div class="hint">ค่าเริ่มต้นใช้ classroom</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn primary" id="btnGo" type="button">▶ เข้าเกม Germ Detective</button>
      <a class="btn cyan" id="btnHub" href="./hub.html">🏠 กลับ HUB</a>
    </div>

    <div class="preview" id="preview">Preview: ...</div>
  </div>
</div>

<script>
(function(){
  'use strict';

  const LS_KEY = 'HHA_LAUNCH_GERM_DETECTIVE';
  const ORIGIN = location.origin;
  const GAME_PATH = ORIGIN + '/webxr-health-mobile/herohealth/germ-detective/germ-detective.html';
  const GATE_PATH = ORIGIN + '/webxr-health-mobile/herohealth/warmup-gate.html';

  const qs = (k, d=null)=>{ try{ return new URL(location.href).searchParams.get(k) ?? d; }catch(_){ return d; } };
  const pass = new URL(location.href);

  function detectView(){
    const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints|0) > 0;
    const w = Math.max(1, innerWidth||1);
    const h = Math.max(1, innerHeight||1);
    const landscape = w >= h;
    if(isTouch){
      if(landscape && w >= 740) return 'cvr';
      return 'mobile';
    }
    return 'pc';
  }

  function loadState(){
    try{
      const s = localStorage.getItem(LS_KEY);
      if(!s) return null;
      const o = JSON.parse(s);
      return o && typeof o==='object' ? o : null;
    }catch(_){ return null; }
  }

  function saveState(o){
    try{ localStorage.setItem(LS_KEY, JSON.stringify(o)); }catch(_){}
  }

  function normalizeMaybeEncodedUrl(v){
    v = String(v ?? '').trim();
    if(!v || v === 'null' || v === 'undefined') return '';
    if(/%3A|%2F|%3F|%26|%3D/i.test(v)){
      try{ v = decodeURIComponent(v); }catch(e){}
    }
    return v.trim();
  }

  function cleanHubUrl(raw){
    const fallback = ORIGIN + '/webxr-health-mobile/herohealth/hub.html';
    raw = normalizeMaybeEncodedUrl(raw || fallback);
    try{
      const u = new URL(raw, location.href);
      [
        'gatePhase','phase','gateResult','gateMode',
        'wType','wPct','wSteps','wTimeBonus','wScoreBonus','wRank',
        'cd','next'
      ].forEach(k=>u.searchParams.delete(k));
      return u.toString();
    }catch(_){
      return fallback;
    }
  }

  const state = Object.assign({
    view: detectView(),
    diff: 'normal',
    time: 80,
    seed: Date.now(),
    scene: 'classroom'
  }, loadState() || {});

  const VIEWS = [
    {k:'pc',t:'🖥️ pc'},
    {k:'mobile',t:'📱 mobile'},
    {k:'cvr',t:'📦 cvr'}
  ];
  const DIFFS = [
    {k:'easy',t:'🙂 easy',cls:'good'},
    {k:'normal',t:'😎 normal'},
    {k:'hard',t:'🔥 hard',cls:'warn'}
  ];

  const viewRow = document.getElementById('viewRow');
  const diffRow = document.getElementById('diffRow');
  const timeInp = document.getElementById('timeInp');
  const seedInp = document.getElementById('seedInp');
  const sceneSel = document.getElementById('sceneSel');
  const preview = document.getElementById('preview');

  function mkChip(item, key){
    const b = document.createElement('button');
    b.type='button';
    b.className='chip ' + (item.cls || '');
    b.textContent=item.t;
    b.addEventListener('click', ()=>{
      state[key] = item.k;
      render(); persist();
    });
    return b;
  }

  function persist(){
    saveState({
      view:state.view,
      diff:state.diff,
      time:state.time,
      seed:state.seed,
      scene:state.scene
    });
  }

  function buildGameUrl(){
    const u = new URL(GAME_PATH);

    pass.searchParams.forEach((v,k)=> u.searchParams.set(k,v));

    [
      'gatePhase','phase','gateResult','gateMode',
      'wType','wPct','wSteps','wTimeBonus','wScoreBonus','wRank',
      'cd','next'
    ].forEach(k=>u.searchParams.delete(k));

    u.searchParams.set('run', qs('run','play') || 'play');
    u.searchParams.set('view', state.view);
    u.searchParams.set('diff', state.diff);
    u.searchParams.set('time', String(Math.max(40, Number(state.time)||80)));
    u.searchParams.set('seed', String(Number(state.seed)||Date.now()));
    u.searchParams.set('pid', qs('pid','anon') || 'anon');
    u.searchParams.set('scene', state.scene || 'classroom');
    u.searchParams.set('zone', 'hygiene');
    u.searchParams.set('hub', cleanHubUrl(qs('hub','./hub.html')));

    [
      'studyId','conditionGroup','sessionOrder','blockLabel',
      'siteCode','schoolYear','semester'
    ].forEach(k=>{
      const v = qs(k,'');
      if(v !== '' && v != null) u.searchParams.set(k, v);
    });

    return u.toString();
  }

  function buildGateUrl(){
    const u = new URL(GATE_PATH);
    const next = buildGameUrl();

    u.searchParams.set('gatePhase', 'warmup');
    u.searchParams.set('phase', 'warmup');
    u.searchParams.set('cat', 'hygiene');
    u.searchParams.set('theme', 'germdetective');
    u.searchParams.set('game', 'germdetective');
    u.searchParams.set('pid', qs('pid','anon') || 'anon');
    u.searchParams.set('hub', cleanHubUrl(qs('hub','./hub.html')));
    u.searchParams.set('next', next);
    u.searchParams.set('run', qs('run','play') || 'play');
    u.searchParams.set('diff', state.diff);
    u.searchParams.set('time', String(Math.max(40, Number(state.time)||80)));
    u.searchParams.set('view', state.view);
    u.searchParams.set('seed', String(Number(state.seed)||Date.now()));

    [
      'studyId','conditionGroup','sessionOrder','blockLabel',
      'siteCode','schoolYear','semester'
    ].forEach(k=>{
      const v = qs(k,'');
      if(v !== '' && v != null) u.searchParams.set(k, v);
    });

    return u.toString();
  }

  function render(){
    viewRow.innerHTML = '';
    diffRow.innerHTML = '';

    VIEWS.forEach(it=>{
      const c = mkChip(it,'view');
      if(state.view===it.k) c.classList.add('on');
      viewRow.appendChild(c);
    });

    DIFFS.forEach(it=>{
      const c = mkChip(it,'diff');
      if(state.diff===it.k) c.classList.add('on');
      diffRow.appendChild(c);
    });

    timeInp.value = String(state.time);
    seedInp.value = String(state.seed);
    sceneSel.value = state.scene || 'classroom';
    preview.textContent = 'Preview: ' + buildGateUrl();
  }

  timeInp.addEventListener('change', ()=>{
    state.time = Math.max(40, Number(timeInp.value)||80);
    render(); persist();
  });

  seedInp.addEventListener('change', ()=>{
    state.seed = Number(seedInp.value)||Date.now();
    render(); persist();
  });

  sceneSel.addEventListener('change', ()=>{
    state.scene = sceneSel.value || 'classroom';
    render(); persist();
  });

  document.getElementById('btnRandSeed')?.addEventListener('click', ()=>{
    state.seed = Date.now();
    render(); persist();
  });

  document.getElementById('btnGo')?.addEventListener('click', ()=>{
    persist();
    location.href = buildGateUrl();
  });

  render();
})();
</script>
</body>
</html>
