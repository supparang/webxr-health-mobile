BrushVR ROOT LAUNCHER — redirects to /herohealth/vr-brush/brush.html
PATCH v20260303-BRUSH-ROOT-LAUNCHER
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>HeroHealth — BrushVR Launcher</title>
  <meta name="color-scheme" content="dark light"/>
  <link rel="icon" href="./favicon.ico"/>
  <style>
    html,body{height:100%;margin:0;background:#020617;color:#e5e7eb;font-family:system-ui,-apple-system,"Noto Sans Thai",Segoe UI,Roboto,sans-serif}
    .c{min-height:100%;display:grid;place-items:center;padding:18px}
    .card{width:min(680px,92vw);border:1px solid rgba(148,163,184,.18);border-radius:22px;background:rgba(2,6,23,.75);
      padding:14px;box-shadow:0 22px 90px rgba(0,0,0,.45)}
    .t{font-weight:1000;font-size:18px}
    .s{margin-top:8px;color:rgba(148,163,184,.95);font-weight:900;line-height:1.5;font-size:13px}
    .pill{display:inline-flex;gap:8px;align-items:center;margin-top:10px;padding:6px 10px;border-radius:999px;
      border:1px solid rgba(148,163,184,.18);background:rgba(15,23,42,.35);color:rgba(229,231,235,.92);font-weight:900;font-size:12px}
  </style>
</head>
<body>
  <div class="c">
    <div class="card">
      <div class="t">🪥 BrushVR — Launcher</div>
      <div class="s">กำลังพาไปหน้าเล่นเกม…</div>
      <div class="pill" id="p">redirecting</div>
    </div>
  </div>

<script>
(function(){
  'use strict';

  function qs(){ try{ return new URL(location.href).searchParams; }catch{ return new URLSearchParams(); } }
  function detectView(){
    const sp = qs();
    const v = (sp.get('view')||'').toLowerCase();
    if(v) return v;
    const ua = navigator.userAgent || '';
    const isMobile = /Android|iPhone|iPad|iPod/i.test(ua) || (window.matchMedia && window.matchMedia('(pointer:coarse)').matches);
    return isMobile ? 'mobile' : 'pc';
  }

  const sp = qs();
  const target = new URL('./vr-brush/brush.html', location.href);

  for (const [k,v] of sp.entries()) target.searchParams.set(k, v);

  if(!target.searchParams.get('view')) target.searchParams.set('view', detectView());

  if(!target.searchParams.get('hub')){
    const hub = new URL('./hub.html', location.href);
    for (const k of ['run','diff','time','seed','pid','studyId','phase','conditionGroup','log','api','view','ai','debug']){
      const v = target.searchParams.get(k);
      if(v!=null && String(v).trim()!=='') hub.searchParams.set(k, v);
    }
    target.searchParams.set('hub', hub.toString());
  }

  document.getElementById('p').textContent = target.pathname + target.search;
  location.replace(target.toString());
})();
</script>
</body>
</html>
