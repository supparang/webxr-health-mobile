<!-- === /herohealth/brush-vr.html ===
BrushVR — ROOT LAUNCHER — PRODUCTION
PATCH v20260304-BRUSH-LAUNCHER-ROOT
✅ Always routes to /herohealth/vr-brush/brush.html
✅ Pass-through: hub/run/diff/time/seed/pid/studyId/phase/conditionGroup/log/view/api/ai/debug
✅ Auto view detect (if missing): mobile | pc  (cvr only when explicitly ?view=cvr)
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>HeroHealth — BrushVR (Launcher)</title>
  <meta name="color-scheme" content="dark light"/>
  <link rel="icon" href="./favicon.ico"/>
  <style>
    :root{
      --bg1:#020617; --bg2:#0b1226;
      --panel:rgba(2,6,23,.74);
      --stroke:rgba(148,163,184,.18);
      --text:#e5e7eb; --muted:#94a3b8;
      --radius:22px;
    }
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans Thai",Arial;
      color:var(--text);
      background:
        radial-gradient(1200px 700px at 15% 15%, rgba(34,211,238,.10), transparent 55%),
        radial-gradient(900px 520px at 85% 25%, rgba(167,139,250,.10), transparent 55%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      display:grid;
      place-items:center;
      padding:16px;
    }
    .card{
      width:min(720px, 92vw);
      border:1px solid var(--stroke);
      border-radius:var(--radius);
      background:var(--panel);
      padding:16px;
      box-shadow:0 18px 60px rgba(0,0,0,.45);
      backdrop-filter: blur(10px);
    }
    .title{margin:0;font-weight:950;font-size:20px;letter-spacing:.2px}
    .sub{margin:8px 0 0;color:var(--muted);font-weight:800;line-height:1.45}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;align-items:center}
    .pill{padding:8px 10px;border-radius:999px;border:1px solid var(--stroke);background:rgba(2,6,23,.45);color:var(--muted);font-weight:900;font-size:12px}
    .btn{
      margin-top:14px;
      display:inline-flex;align-items:center;justify-content:center;
      padding:12px 14px;border-radius:16px;
      border:1px solid rgba(34,197,94,.30);
      background:rgba(34,197,94,.14);
      color:var(--text);
      font-weight:950;
      cursor:pointer;
      user-select:none;
      text-decoration:none;
    }
    .btn:active{transform:translateY(1px)}
    .mini{margin-top:10px;color:var(--muted);font-size:12px;font-weight:800}
    code{color:var(--text)}
  </style>
</head>
<body>
  <div class="card">
    <h1 class="title">🪥 BrushVR — Launcher</h1>
    <p class="sub">กำลังพาเข้าเกม… (ถ้าไม่เข้าอัตโนมัติ กดปุ่มด้านล่าง)</p>
    <div class="row" id="pills"></div>
    <a class="btn" id="go" href="#">▶ เข้า BrushVR</a>
    <div class="mini">RUN path: <code>/herohealth/vr-brush/brush.html</code></div>
  </div>

<script>
(function(){
  'use strict';

  function pageUrl(){ return location.href.split('#')[0]; }
  function qs(){ try{ return new URL(pageUrl()).searchParams; }catch{ return new URLSearchParams(); } }

  function detectViewIfMissing(sp){
    if(sp.has('view') && String(sp.get('view')||'').trim()!=='') return String(sp.get('view')).trim();
    const ua = navigator.userAgent||'';
    const isMobile = /Android|iPhone|iPad|iPod/i.test(ua) || (window.matchMedia && window.matchMedia('(pointer:coarse)').matches);
    return isMobile ? 'mobile' : 'pc';
  }

  const PASS_KEYS = ['hub','run','diff','time','seed','pid','studyId','phase','conditionGroup','log','api','ai','debug','view'];

  const sp = qs();
  const runUrl = new URL('./vr-brush/brush.html', location.href);

  // pass-through
  PASS_KEYS.forEach(k=>{
    if(k==='view'){
      const v = detectViewIfMissing(sp);
      runUrl.searchParams.set('view', v);
      return;
    }
    if(sp.has(k) && String(sp.get(k)||'').trim()!==''){
      runUrl.searchParams.set(k, sp.get(k));
    }
  });

  // always set hub if missing
  if(!runUrl.searchParams.has('hub') || String(runUrl.searchParams.get('hub')||'').trim()===''){
    // default hub = /herohealth/hub.html
    runUrl.searchParams.set('hub', new URL('./hub.html', location.href).toString());
  }

  // show pills
  const pills = document.getElementById('pills');
  const list = [];
  PASS_KEYS.forEach(k=>{
    const v = runUrl.searchParams.get(k);
    if(v && String(v).trim()!=='') list.push([k,v]);
  });
  pills.innerHTML = list.slice(0,10).map(([k,v])=>`<span class="pill"><b>${k}</b>: ${String(v).replace(/</g,'&lt;')}</span>`).join('');

  // go
  const go = document.getElementById('go');
  go.href = runUrl.toString();

  // auto redirect (fast)
  location.replace(runUrl.toString());
})();
</script>
</body>
</html>
