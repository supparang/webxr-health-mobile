<!-- === /herohealth/brush-vr.html ===
BrushVR ROOT LAUNCHER — PRODUCTION
PATCH v20260304-BRUSH-ROOT-LAUNCHER
✅ Redirect to /herohealth/vr-brush/brush.html
✅ Pass-through all params + always set hub to current hub (if missing)
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>HeroHealth — BrushVR (Launcher)</title>
  <meta name="color-scheme" content="dark light"/>
  <link rel="icon" href="./favicon.ico"/>
  <style>
    :root{ --bg:#020617; --txt:#e5e7eb; --mut:#94a3b8; --stroke:rgba(148,163,184,.18); }
    html,body{height:100%;margin:0;background:linear-gradient(180deg,#020617,#0b1226);color:var(--txt);font-family:system-ui,-apple-system,"Noto Sans Thai",Segoe UI,Roboto,sans-serif}
    .wrap{min-height:100%;display:grid;place-items:center;padding:18px}
    .card{width:min(560px,92vw);border:1px solid var(--stroke);border-radius:22px;background:rgba(2,6,23,.72);backdrop-filter:blur(10px);padding:16px;box-shadow:0 18px 60px rgba(0,0,0,.45)}
    .t{font-weight:950;font-size:18px}
    .s{color:var(--mut);margin-top:6px;line-height:1.45;font-size:13px}
    .pill{display:inline-flex;gap:8px;align-items:center;margin-top:10px;padding:8px 10px;border-radius:999px;border:1px solid var(--stroke);background:rgba(255,255,255,.06);color:var(--mut);font-weight:900;font-size:12px;word-break:break-all}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="t">🪥 BrushVR — Launcher</div>
      <div class="s">กำลังพาไปหน้าเล่นเกม…</div>
      <div class="pill" id="to">target: /herohealth/vr-brush/brush.html</div>
    </div>
  </div>

<script>
(function(){
  'use strict';
  function pageUrl(){ return location.href.split('#')[0]; }
  function qs(){ try{ return new URL(pageUrl()).searchParams; }catch{ return new URLSearchParams(); } }
  const Q = qs();

  // target run page
  const target = new URL('./vr-brush/brush.html', location.href);

  // pass-through all current params
  for(const [k,v] of Q.entries()){
    if(k==='hub') continue;
    target.searchParams.set(k,v);
  }

  // ensure hub param exists (return back)
  const hub = Q.get('hub');
  if(hub && String(hub).trim()){
    target.searchParams.set('hub', hub);
  }else{
    target.searchParams.set('hub', new URL('./hub.html', location.href).toString());
  }

  // view auto: if user passes view=mobile, we keep it. run page auto maps to cvr if needed.
  document.getElementById('to').textContent = 'target: ' + target.toString();

  // go
  location.replace(target.toString());
})();
</script>
</body>
</html>
