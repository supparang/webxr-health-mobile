BrushVR — ROOT LAUNCHER (canonical)
PATCH v20260303-brush-root-launcher
✅ Hub uses this file
✅ Redirect to /herohealth/vr-brush/brush.html
✅ Pass-through all params + always set hub=
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>HeroHealth — BrushVR (Launcher)</title>
  <meta name="color-scheme" content="dark light"/>
  <link rel="icon" href="./favicon.ico"/>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;
      font-family:system-ui,-apple-system,"Noto Sans Thai",Segoe UI,Roboto,sans-serif;
      background:#020617;color:#e5e7eb}
    .card{width:min(560px,92vw);border:1px solid rgba(148,163,184,.18);border-radius:18px;
      background:rgba(2,6,23,.72);padding:14px}
    .mut{color:rgba(148,163,184,.9);font-size:13px;line-height:1.5}
    a{color:#e5e7eb}
  </style>
</head>
<body>
  <div class="card">
    <div style="font-weight:1000;font-size:18px;">🪥 BrushVR — Launcher</div>
    <div class="mut" style="margin-top:6px">กำลังพาไปหน้าเกม…</div>
    <div class="mut" style="margin-top:8px"><a id="go" href="./vr-brush/brush.html">Go</a></div>
  </div>

<script>
(function(){
  'use strict';

  function stripHash(u){ return String(u||'').split('#')[0]; }

  function ensureHubParam(u){
    const url = new URL(u, location.href);
    const q = url.searchParams;

    // pass-through current params (do not overwrite)
    const cur = new URL(stripHash(location.href), location.href).searchParams;
    for(const [k,v] of cur.entries()){
      if(!q.has(k) || String(q.get(k)||'').trim()==='') q.set(k, v);
    }

    // always set hub=
    if(!q.has('hub') || String(q.get('hub')||'').trim()===''){
      q.set('hub', new URL('./hub.html', location.href).toString());
    }
    return url.toString();
  }

  const runUrl = new URL('./vr-brush/brush.html', location.href).toString();
  const finalUrl = ensureHubParam(runUrl);

  document.getElementById('go').href = finalUrl;
  location.replace(finalUrl);
})();
</script>
</body>
</html>
