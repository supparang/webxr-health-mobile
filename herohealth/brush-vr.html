<!-- === /herohealth/brush-vr.html ===
BrushVR — ROOT LAUNCHER (points to /vr-brush/brush.html)
PATCH v20260303d-BRUSH-ROOT-LAUNCHER
✅ Fix 404 by using root launcher
✅ Pass-through: pid/run/diff/time/seed/studyId/phase/conditionGroup/log/view/api/ai/debug
✅ Always sets hub=... if missing
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>HeroHealth — BrushVR Launcher</title>
  <meta name="color-scheme" content="dark light"/>
  <link rel="icon" href="./favicon.ico"/>
  <meta http-equiv="refresh" content="0;url=./vr-brush/brush.html">
</head>
<body>
<script>
(function(){
  'use strict';
  function pageUrl(){ return location.href.split('#')[0]; }
  function qs(){ try{ return new URL(pageUrl()).searchParams; }catch{ return new URLSearchParams(); } }
  const Q = qs();

  const PASS = ['pid','run','diff','time','seed','studyId','phase','conditionGroup','log','view','api','ai','debug'];
  const to = new URL('./vr-brush/brush.html', location.href);

  // passthrough
  PASS.forEach(k=>{
    const v = Q.get(k);
    if(v!=null && String(v).trim()!=='') to.searchParams.set(k, v);
  });

  // ensure hub back
  if(!to.searchParams.get('hub')){
    to.searchParams.set('hub', new URL('./hub.html', location.href).toString());
  }else{
    to.searchParams.set('hub', Q.get('hub'));
  }

  // normalize view: view=mobile -> keep mobile (touch mode), view=cvr -> cVR
  // (เกมจะรับ hha:shoot เฉพาะ cvr/vr อยู่แล้ว)
  location.replace(to.toString());
})();
</script>
</body>
</html>
