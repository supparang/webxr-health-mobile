<!-- === /herohealth/brush-vr.html ===
BrushVR — ROOT LAUNCHER -> /vr-brush/brush.html
PATCH v20260303e-BRUSH-ROOT-LAUNCHER-HUBSAFE
✅ Fix 404 via root launcher
✅ Pass-through pid/run/diff/time/seed/studyId/phase/conditionGroup/log/view/api/ai/debug
✅ hub sanitize fallback -> /herohealth/hub.html
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>HeroHealth — BrushVR Launcher</title>
  <meta name="color-scheme" content="dark light"/>
  <link rel="icon" href="./favicon.ico"/>
</head>
<body>
<script>
(function(){
  'use strict';
  function pageUrl(){ return location.href.split('#')[0]; }
  function qs(){ try{ return new URL(pageUrl()).searchParams; }catch{ return new URLSearchParams(); } }
  const Q = qs();

  const PASS = ['pid','run','diff','time','seed','studyId','phase','conditionGroup','log','view','api','ai','debug'];
  const to = new URL('./vr-brush/brush.html', location.href);

  PASS.forEach(k=>{
    const v = Q.get(k);
    if(v!=null && String(v).trim()!=='') to.searchParams.set(k, v);
  });

  // ✅ hub sanitize: only allow same-origin hub.html under /herohealth/
  function safeHub(raw){
    try{
      const u = new URL(raw, location.href);
      // enforce same origin
      if(u.origin !== location.origin) return new URL('./hub.html', location.href).toString();
      // enforce /herohealth/hub.html
      if(!u.pathname.endsWith('/herohealth/hub.html')) return new URL('./hub.html', location.href).toString();
      return u.toString();
    }catch(_){
      return new URL('./hub.html', location.href).toString();
    }
  }
  const hub = Q.get('hub');
  to.searchParams.set('hub', safeHub(hub || './hub.html'));

  location.replace(to.toString());
})();
</script>
</body>
</html>
