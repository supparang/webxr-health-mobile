<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • Rhythm Boxer Launcher</title>
  <meta name="theme-color" content="#bfe9ff" />
  <link rel="icon" href="./favicon.ico" />
  <link rel="stylesheet" href="./fitness-launcher-shared.css?v=20260406a-fitness-launcher-shared" />

  <style>
    .rb-stage{
      position:absolute; inset:0;
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,.16), rgba(255,255,255,0) 36%),
        linear-gradient(180deg, #2a2152 0%, #2f3a7c 48%, #364f98 100%);
    }
    .rb-lane{
      position:absolute; left:12%; right:12%;
      height:72px; border-radius:999px;
      background:rgba(255,255,255,.10);
      border:2px solid rgba(255,255,255,.14);
      box-shadow:inset 0 0 0 8px rgba(255,255,255,.04);
    }
    .rb-l1{ top:24%; }
    .rb-l2{ top:42%; }
    .rb-l3{ top:60%; }
    .rb-note{
      position:absolute; width:42px; height:42px;
      border-radius:999px;
      background:radial-gradient(circle at 30% 30%, #fff, #ff99c8);
      box-shadow:0 0 0 10px rgba(255,153,200,.12), 0 0 22px rgba(255,153,200,.22);
      animation:rbMove 2.4s linear infinite;
    }
    .rb-n1{ top:27%; left:18%; animation-delay:0s; }
    .rb-n2{ top:45%; left:30%; animation-delay:.35s; background:radial-gradient(circle at 30% 30%, #fff, #7fcfff); }
    .rb-n3{ top:63%; left:42%; animation-delay:.7s; background:radial-gradient(circle at 30% 30%, #fff, #ffd45c); }
    .rb-n4{ top:27%; left:60%; animation-delay:1.05s; }
    .rb-boxer{
      position:absolute; left:50%; bottom:10%;
      width:108px; height:138px; transform:translateX(-50%);
      border-radius:24px;
      background:rgba(255,255,255,.12);
      border:3px dashed rgba(214,239,255,.24);
    }
    .rb-boxer::before{
      content:"";
      position:absolute; left:50%; top:10px; transform:translateX(-50%);
      width:32px; height:32px; border-radius:999px;
      background:rgba(255,255,255,.20);
    }
    .rb-boxer::after{
      content:"";
      position:absolute; left:50%; top:48px; transform:translateX(-50%);
      width:18px; height:58px; border-radius:999px;
      background:rgba(255,255,255,.18);
      box-shadow:-30px 2px 0 0 rgba(255,153,200,.18), 30px 2px 0 0 rgba(127,207,255,.18);
    }
    .rb-chip{
      position:absolute; top:16px; left:16px;
      padding:10px 14px; border-radius:999px;
      background:rgba(255,255,255,.14);
      color:#f5f7ff; font-weight:900;
      backdrop-filter:blur(4px);
    }
    .rb-combo{
      position:absolute; right:16px; top:16px;
      padding:10px 14px; border-radius:999px;
      background:linear-gradient(180deg, #fff2b8, #ffd45c);
      color:#6b5200; font-weight:1000;
      box-shadow:0 10px 22px rgba(255,212,92,.22);
      animation:rbCombo 1.1s ease-in-out infinite;
    }
    .rb-tip{
      position:absolute; right:16px; bottom:16px;
      max-width:260px;
      padding:12px 14px; border-radius:18px;
      background:rgba(255,255,255,.14);
      color:#f5f7ff; font-weight:800;
      backdrop-filter:blur(4px);
    }
    @keyframes rbMove{
      0%{ transform:translateX(0) scale(.9); opacity:.65; }
      50%{ transform:translateX(90px) scale(1.06); opacity:1; }
      100%{ transform:translateX(180px) scale(.9); opacity:.65; }
    }
    @keyframes rbCombo{
      0%,100%{ transform:scale(1); }
      50%{ transform:scale(1.08); }
    }
  </style>
</head>
<body class="hh-fit-launcher">
  <div id="hhFitLauncherRoot"></div>

  <script src="./fitness-launcher-shared.js?v=20260406a-fitness-launcher-shared"></script>
  <script>
    setupFitnessLauncher({
      zoneLabel: 'Fitness Zone',
      title: 'Rhythm Boxer',
      description: 'ชกตามจังหวะ เก็บ combo ให้ต่อเนื่อง และผ่าน sequence ของเพลงให้แม่นที่สุด',
      badge: 'RHYTHM<br>BOXER',
      game: 'rhythmboxer',
      gameId: 'rhythmboxer',
      mode: 'solo',
      run: 'play',
      defaultDiff: 'normal',
      defaultTime: '90',
      defaultView: 'mobile',
      defaultGate: true,
      defaultCooldown: true,
      hub: './hub-v2.html',
      runPage: '../fitness/rhythm-boxer.html',
      warmupPage: './warmup-gate.html',
      stageHtml: `
        <div class="rb-stage">
          <div class="rb-chip">Beat Training</div>
          <div class="rb-combo">COMBO x12</div>
          <div class="rb-lane rb-l1"></div>
          <div class="rb-lane rb-l2"></div>
          <div class="rb-lane rb-l3"></div>
          <div class="rb-note rb-n1"></div>
          <div class="rb-note rb-n2"></div>
          <div class="rb-note rb-n3"></div>
          <div class="rb-note rb-n4"></div>
          <div class="rb-boxer"></div>
          <div class="rb-tip">ฟังจังหวะให้ชัด ตีให้ตรง lane และรักษา combo ให้ยาวที่สุด</div>
        </div>
      `
    });
  </script>
</body>
</html>
