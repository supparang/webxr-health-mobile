<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk Solo Boss v2</title>
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#9fe3ff" />
  <link rel="icon" href="./favicon.ico" />
  <style>
    :root{
      --sky1:#dff4ff;
      --sky2:#bfe8ff;
      --sky3:#fff7d8;

      --line:#bfe3f2;
      --text:#4d4a42;
      --muted:#7b7a72;

      --green:#7ed957;
      --blue:#7fcfff;
      --shadow:0 18px 40px rgba(86,155,194,.16);

      --sat:env(safe-area-inset-top,0px);
      --sar:env(safe-area-inset-right,0px);
      --sab:env(safe-area-inset-bottom,0px);
      --sal:env(safe-area-inset-left,0px);

      --gj-top-offset:128px;
      --gj-bottom-offset:12px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      min-height:100%;
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 12% 10%, rgba(255,255,255,.92), transparent 18%),
        radial-gradient(circle at 86% 14%, rgba(255,255,255,.78), transparent 16%),
        linear-gradient(180deg,var(--sky1),var(--sky2) 54%, var(--sky3));
      overflow:hidden;
    }

    body{ min-height:100dvh; }

    #app{
      position:relative;
      width:100vw;
      height:100dvh;
      overflow:hidden;
      isolation:isolate;
    }

    .bg-clouds{
      position:absolute;
      inset:0;
      overflow:hidden;
      pointer-events:none;
      z-index:0;
    }

    .cloud{
      position:absolute;
      border-radius:999px;
      background:rgba(255,255,255,.7);
      filter:blur(1px);
      box-shadow:
        50px 8px 0 8px rgba(255,255,255,.65),
        100px 0 0 0 rgba(255,255,255,.75),
        70px -10px 0 4px rgba(255,255,255,.72);
      animation:floatCloud linear infinite;
    }

    .cloud.c1{ width:110px; height:34px; left:6%; top:10%; animation-duration:28s; }
    .cloud.c2{ width:140px; height:40px; left:62%; top:14%; animation-duration:36s; }
    .cloud.c3{ width:100px; height:30px; left:30%; top:22%; animation-duration:32s; }

    @keyframes floatCloud{
      from{ transform:translateX(-5vw); }
      to{ transform:translateX(12vw); }
    }

    #gameMount{
      position:absolute;
      left:8px;
      right:8px;
      top:calc(var(--gj-top-offset) + var(--sat));
      bottom:calc(var(--gj-bottom-offset) + var(--sab));
      z-index:1;
      overflow:hidden;
      border-radius:28px;
      box-shadow:0 16px 32px rgba(86,155,194,.12);
      background:rgba(255,255,255,.14);
    }

    .shell{
      position:absolute;
      inset:0;
      z-index:4;
      pointer-events:none;
      padding:
        calc(8px + var(--sat))
        calc(8px + var(--sar))
        calc(8px + var(--sab))
        calc(8px + var(--sal));
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:8px;
    }

    .topbar{
      display:grid;
      gap:8px;
      align-content:start;
      pointer-events:none;
    }

    .hero-strip{
      background:linear-gradient(180deg,#fffef9,#f7fff4);
      border:3px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:10px 12px;
      position:relative;
      overflow:hidden;
      pointer-events:auto;
    }

    .hero-strip::before{
      content:"";
      position:absolute;
      left:-24px;
      top:-24px;
      width:90px;
      height:90px;
      border-radius:999px;
      background:rgba(127,207,255,.16);
      filter:blur(8px);
    }

    .hero-strip::after{
      content:"";
      position:absolute;
      right:-20px;
      bottom:-20px;
      width:82px;
      height:82px;
      border-radius:999px;
      background:rgba(255,212,92,.16);
      filter:blur(8px);
    }

    .title-row{
      position:relative;
      z-index:1;
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:4px;
    }

    .kicker{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:999px;
      background:#eaf8ff;
      border:2px solid var(--line);
      color:#5ea8d0;
      font-size:12px;
      font-weight:1000;
      white-space:nowrap;
    }

    h1{
      margin:0;
      font-size:clamp(22px,5vw,32px);
      line-height:1.02;
      font-weight:1000;
      color:#67a91c;
      text-shadow:0 2px 0 #fff;
    }

    .sub{
      position:relative;
      z-index:1;
      margin:0;
      color:var(--muted);
      line-height:1.35;
      font-size:12px;
      font-weight:900;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .chipbar{
      display:flex;
      gap:6px;
      flex-wrap:nowrap;
      overflow-x:auto;
      overflow-y:hidden;
      padding:0 2px 2px;
      scrollbar-width:none;
      -ms-overflow-style:none;
      pointer-events:auto;
    }

    .chipbar::-webkit-scrollbar{ display:none; }

    .pill{
      flex:0 0 auto;
      min-width:108px;
      min-height:36px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:8px 10px;
      border-radius:999px;
      border:2px solid var(--line);
      background:rgba(255,255,255,.94);
      color:#6c6a61;
      font-size:12px;
      font-weight:1000;
      box-shadow:0 8px 18px rgba(86,155,194,.10);
      white-space:nowrap;
    }

    .bottomDock{
      display:flex;
      justify-content:flex-start;
      align-items:end;
      pointer-events:none;
    }

    .status-card{
      width:min(88vw,320px);
      background:linear-gradient(180deg,#fffef9,#f7fff4);
      border:3px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:10px 12px;
      color:var(--muted);
      font-size:12px;
      font-weight:900;
      line-height:1.45;
      pointer-events:auto;
      transition:opacity .24s ease, transform .24s ease;
    }

    .status-card.hide{
      opacity:0;
      transform:translateY(8px);
      pointer-events:none;
    }

    .status-title{
      color:#67a91c;
      font-size:13px;
      font-weight:1000;
      margin-bottom:3px;
    }

    .error{
      color:#b45309;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .mini-note{
      font-size:11px;
      color:#7b7a72;
      margin-top:4px;
    }

    @media (max-width:720px){
      .shell{
        padding:
          calc(6px + var(--sat))
          calc(6px + var(--sar))
          calc(6px + var(--sab))
          calc(6px + var(--sal));
      }

      .hero-strip{
        padding:9px 10px;
        border-radius:20px;
      }

      .title-row{
        gap:6px;
      }

      .kicker{
        font-size:11px;
        padding:5px 9px;
      }

      h1{
        font-size:18px;
      }

      .sub{
        font-size:11px;
        -webkit-line-clamp:2;
      }

      .pill{
        min-width:92px;
        min-height:34px;
        padding:7px 9px;
        font-size:11px;
      }

      #gameMount{
        left:6px;
        right:6px;
        bottom:calc(6px + var(--sab));
      }
    }

    @media (min-width:721px){
      .topbar{
        grid-template-columns:minmax(0,1fr) auto;
        align-items:start;
      }

      .hero-strip{
        min-height:86px;
      }

      .chipbar{
        max-width:min(48vw,560px);
        align-self:start;
      }
    }

    @media (min-width:1080px){
      .hero-strip{
        min-height:76px;
      }
      .sub{
        -webkit-line-clamp:1;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="bg-clouds" aria-hidden="true">
      <div class="cloud c1"></div>
      <div class="cloud c2"></div>
      <div class="cloud c3"></div>
    </div>

    <div id="gameMount"></div>

    <div class="shell">
      <div class="topbar" id="topbar">
        <div class="hero-strip">
          <div class="title-row">
            <div class="kicker">👑 GOODJUNK SOLO BOSS v2</div>
            <h1>Boss Adventure</h1>
          </div>
          <p class="sub">
            เก็บอาหารดี หลบ junk แล้วผ่าน 2 phase เพื่อเข้าสู้กับ Junk King แบบสนุกและอ่านจังหวะได้ชัดเจน
          </p>
        </div>

        <div class="chipbar" id="chipbar">
          <div class="pill" id="pillPlayer">PLAYER • -</div>
          <div class="pill" id="pillDiff">LEVEL • normal</div>
          <div class="pill" id="pillTime">TIME • 150</div>
          <div class="pill" id="pillMode">MODE • solo boss</div>
        </div>
      </div>

      <div></div>

      <div class="bottomDock">
        <div class="status-card" id="engineStatusCard">
          <div class="status-title" id="engineStatusTitle">กำลังเตรียมเกม…</div>
          <div id="engineStatusText">เริ่มต้นตัวโหลด engine...</div>
          <div class="mini-note" id="engineStatusMini">ถ้าไฟล์ JS อยู่ path อื่น ให้แก้ ENGINE_CANDIDATES ด้านล่าง</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const q = new URLSearchParams(location.search);
      const $ = (id) => document.getElementById(id);
      const root = document.documentElement;

      const runCtx = {
        pid: q.get('pid') || 'anon',
        name: q.get('name') || '',
        studyId: q.get('studyId') || '',
        roomId: '',
        role: 'player',
        mode: 'solo',
        diff: q.get('diff') || 'normal',
        time: q.get('time') || '150',
        seed: q.get('seed') || String(Date.now()),
        startAt: 0,
        hub: q.get('hub') || new URL('./hub.html', location.href).toString(),
        nextAfterCooldown: q.get('nextAfterCooldown') || '',
        cdnext: q.get('cdnext') || '',
        view: q.get('view') || 'mobile',
        run: q.get('run') || 'play',
        gameId: q.get('gameId') || 'goodjunk'
      };

      window.__GJ_RUN_CTX__ = runCtx;
      window.HHA_CLOUD_ENDPOINT = String(q.get('api') || window.HHA_CLOUD_ENDPOINT || '').trim();

      const ENGINE_CANDIDATES = [
        '/webxr-health-mobile/herohealth/goodjunk-solo-phaseboss-v2.js',
        './goodjunk-solo-phaseboss-v2.js',
        './js/goodjunk-solo-phaseboss-v2.js'
      ];

      function isSmall() {
        return window.innerWidth < 520;
      }

      function updatePills() {
        const short = isSmall();

        const player = runCtx.name || runCtx.pid || '-';
        const diff = runCtx.diff || 'normal';
        const time = runCtx.time || '150';

        if ($('pillPlayer')) $('pillPlayer').textContent = short ? `P • ${player}` : `PLAYER • ${player}`;
        if ($('pillDiff')) $('pillDiff').textContent = short ? `LV • ${diff}` : `LEVEL • ${diff}`;
        if ($('pillTime')) $('pillTime').textContent = short ? `T • ${time}` : `TIME • ${time}`;
        if ($('pillMode')) $('pillMode').textContent = short ? 'M • solo' : 'MODE • solo boss';
      }

      function syncTopOffset() {
        const topbar = $('topbar');
        if (!topbar) return;

        const rect = topbar.getBoundingClientRect();
        const offset = Math.ceil(rect.height) + 12;
        root.style.setProperty('--gj-top-offset', offset + 'px');
      }

      function scheduleLayoutSync() {
        requestAnimationFrame(() => {
          updatePills();
          syncTopOffset();
        });
      }

      function setStatus(title, text, isError) {
        const titleEl = $('engineStatusTitle');
        const textEl = $('engineStatusText');

        if (titleEl) titleEl.textContent = title;

        if (textEl) {
          textEl.textContent = text;
          textEl.className = isError ? 'error' : '';
        }

        scheduleLayoutSync();
      }

      async function fetchText(src) {
        const res = await fetch(src, { cache: 'no-store' });
        if (!res.ok) throw new Error(src + ' -> HTTP ' + res.status);
        return await res.text();
      }

      async function injectClassicScriptFromCode(code, srcLabel) {
        return await new Promise((resolve, reject) => {
          try {
            const blob = new Blob([code], { type: 'text/javascript' });
            const blobUrl = URL.createObjectURL(blob);
            const s = document.createElement('script');
            s.src = blobUrl;

            s.onload = () => {
              try { URL.revokeObjectURL(blobUrl); } catch (_) {}
              resolve(true);
            };

            s.onerror = () => {
              try { URL.revokeObjectURL(blobUrl); } catch (_) {}
              reject(new Error('โหลด script ไม่สำเร็จ: ' + srcLabel));
            };

            document.body.appendChild(s);
          } catch (err) {
            reject(err);
          }
        });
      }

      function verifyEngineStarted() {
        const mount = $('gameMount');
        return !!(mount && mount.children.length > 0);
      }

      function hideStatusCardSoon() {
        const card = $('engineStatusCard');
        if (!card) return;
        setTimeout(() => {
          card.classList.add('hide');
        }, 480);
      }

      async function loadEngine() {
        updatePills();
        scheduleLayoutSync();

        let lastErr = null;

        for (const src of ENGINE_CANDIDATES) {
          try {
            setStatus('กำลังโหลดเกม…', 'ลองโหลด ' + src, false);

            const code = await fetchText(src);
            if (!code || !code.trim()) {
              throw new Error('ไฟล์ว่าง: ' + src);
            }

            await injectClassicScriptFromCode(code, src);

            setTimeout(() => {
              const ok = verifyEngineStarted();
              if (!ok) {
                setStatus(
                  'โหลดไฟล์ได้ แต่เกมยังไม่เริ่ม',
                  'โหลด ' + src + ' ได้แล้ว แต่ engine ยังไม่ mount ลง #gameMount\nให้ตรวจ goodjunk-solo-phaseboss-v2.js ว่ามี error syntax หรือ runtime ตอนเริ่มต้น',
                  true
                );
                return;
              }

              setStatus('เข้าเกมแล้ว', 'solo boss engine loaded: ' + src, false);
              hideStatusCardSoon();
            }, 120);

            return;
          } catch (err) {
            lastErr = err;
            console.warn('[GJ-SOLO-BOSS] candidate failed', src, err);
          }
        }

        setStatus(
          'ไม่พบไฟล์ engine',
          'โหลด engine ไม่สำเร็จ\n' +
          (lastErr ? String(lastErr.message || lastErr) : '') +
          '\n\nCandidates:\n' + ENGINE_CANDIDATES.join('\n'),
          true
        );
      }

      function bindLayoutObservers() {
        window.addEventListener('resize', scheduleLayoutSync, { passive: true });
        window.addEventListener('orientationchange', scheduleLayoutSync, { passive: true });

        if (window.ResizeObserver) {
          const ro = new ResizeObserver(() => scheduleLayoutSync());
          const topbar = $('topbar');
          const chipbar = $('chipbar');
          const status = $('engineStatusCard');
          if (topbar) ro.observe(topbar);
          if (chipbar) ro.observe(chipbar);
          if (status) ro.observe(status);
        }

        setTimeout(scheduleLayoutSync, 50);
        setTimeout(scheduleLayoutSync, 250);
        setTimeout(scheduleLayoutSync, 700);
      }

      try {
        updatePills();
        scheduleLayoutSync();
        bindLayoutObservers();
        setStatus('กำลังเตรียมเกม…', 'เริ่มต้นตัวโหลด engine...', false);
        loadEngine();
      } catch (err) {
        setStatus(
          'เกิดปัญหาใน run page',
          String((err && (err.stack || err.message || err)) || 'Unknown error'),
          true
        );
      }
    })();
  </script>
</body>
</html>
