<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk Route Guard</title>
  <meta name="theme-color" content="#9fe3ff" />
  <link rel="icon" href="./favicon.ico" />
  <style>
    :root{
      --sky1:#dff4ff;
      --sky2:#bfe8ff;
      --sky3:#fff7d8;
      --line:#bfe3f2;
      --text:#4d4a42;
      --muted:#7b7a72;
      --green:#7ed957;
      --green2:#58c33f;
      --blue:#7fcfff;
      --blue2:#58b7f5;
      --orange:#ffd37a;
      --orange2:#ffb84d;
      --shadow:0 18px 40px rgba(86,155,194,.16);
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      min-height:100%;
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 12% 8%, rgba(255,255,255,.84), transparent 18%),
        radial-gradient(circle at 86% 10%, rgba(255,255,255,.72), transparent 18%),
        linear-gradient(180deg,var(--sky1),var(--sky2) 54%, var(--sky3));
    }

    body{
      min-height:100dvh;
      display:grid;
      place-items:center;
      padding:18px;
    }

    .card{
      width:min(92vw,560px);
      border-radius:28px;
      border:3px solid var(--line);
      background:linear-gradient(180deg,#fffef9,#f7fff4);
      box-shadow:var(--shadow);
      padding:22px 20px;
      text-align:center;
    }

    .icon{
      width:96px;
      height:96px;
      margin:0 auto 10px;
      border-radius:28px;
      display:grid;
      place-items:center;
      font-size:46px;
      background:linear-gradient(180deg,#fff3de,#ffe0b8);
      border:3px solid #ffd89b;
    }

    h1{
      margin:0;
      font-size:30px;
      line-height:1.06;
      font-weight:1000;
      color:#67a91c;
    }

    p{
      margin:10px 0 0;
      font-size:14px;
      line-height:1.7;
      color:var(--muted);
      font-weight:900;
    }

    .actions{
      margin-top:16px;
      display:grid;
      gap:10px;
    }

    .btn{
      appearance:none;
      border:none;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:46px;
      padding:11px 16px;
      border-radius:16px;
      font-size:15px;
      font-weight:1000;
      box-shadow:var(--shadow);
      color:inherit;
    }

    .btn.primary{
      background:linear-gradient(180deg,var(--blue),var(--blue2));
      color:#08374d;
    }

    .btn.hub{
      background:linear-gradient(180deg,var(--green),var(--green2));
      color:#133b09;
    }

    .btn.retry{
      background:linear-gradient(180deg,var(--orange),var(--orange2));
      color:#5a3b11;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🍔</div>
    <h1>กำลังจัดเส้นทาง GoodJunk</h1>
    <p id="statusText">
      กรุณารอสักครู่ ระบบกำลังพาไปหน้าที่ถูกต้อง
    </p>

    <div class="actions">
      <a id="btnLauncher" class="btn primary" href="./goodjunk-launcher.html">🎮 ไป Launcher</a>
      <a id="btnHub" class="btn hub" href="./hub-v2.html">🏠 กลับ Hub</a>
      <button id="btnRetry" class="btn retry" type="button">🔄 ลองใหม่</button>
    </div>
  </div>

  <script>
    (function(){
      'use strict';

      const q = new URLSearchParams(location.search);
      const statusText = document.getElementById('statusText');
      const btnLauncher = document.getElementById('btnLauncher');
      const btnHub = document.getElementById('btnHub');
      const btnRetry = document.getElementById('btnRetry');

      const MULTI_MODES = ['duet', 'race', 'battle', 'coop'];
      const MULTI_TO_LOBBY = {
        duet: './goodjunk-duet-lobby.html',
        race: './goodjunk-race-lobby.html',
        battle: './goodjunk-battle-lobby.html',
        coop: './goodjunk-coop-lobby.html'
      };
      const MAX_PLAYERS_BY_MODE = {
        duet: '2',
        battle: '2',
        race: '10',
        coop: '10'
      };

      function first(){
        for (let i = 0; i < arguments.length; i++) {
          const v = arguments[i];
          if (String(v || '').trim()) return String(v).trim();
        }
        return '';
      }

      function lower(v){
        return String(v || '').trim().toLowerCase();
      }

      function passTo(url){
        q.forEach((v, k) => {
          if (v != null && v !== '') url.searchParams.set(k, v);
        });
        return url;
      }

      function removeParams(url, names){
        names.forEach((name) => {
          try { url.searchParams.delete(name); } catch (_) {}
        });
        return url;
      }

      function setText(text){
        if (statusText) statusText.textContent = text;
      }

      function buildLauncherUrl() {
        const url = passTo(new URL('./goodjunk-launcher.html', location.href));
        if (!url.searchParams.get('game')) url.searchParams.set('game', 'goodjunk');
        if (!url.searchParams.get('gameId')) url.searchParams.set('gameId', 'goodjunk');
        if (!url.searchParams.get('zone')) url.searchParams.set('zone', 'nutrition');
        if (!url.searchParams.get('cat')) url.searchParams.set('cat', 'nutrition');
        return url.toString();
      }

      function buildHubUrl() {
        return first(
          q.get('hub'),
          new URL('./hub-v2.html', location.href).toString()
        );
      }

      function findRequestedMultiMode() {
        const candidates = [
          lower(q.get('mode')),
          lower(q.get('entry')),
          lower(q.get('recommendedMode'))
        ];

        for (const c of candidates) {
          if (MULTI_MODES.includes(c)) return c;
        }
        return '';
      }

      function isSoloBossRequested() {
        const entry = lower(first(q.get('entry'), ''));
        const mode = lower(first(q.get('mode'), ''));
        const recommendedMode = lower(first(q.get('recommendedMode'), ''));
        const phaseBoss = lower(first(q.get('phaseBoss'), ''));
        const boss = lower(first(q.get('boss'), ''));
        const theme = lower(first(q.get('theme'), ''));

        return (
          entry === 'solo-boss' ||
          recommendedMode === 'solo-boss' ||
          phaseBoss === '1' ||
          boss === '1' ||
          theme === 'phaseboss' ||
          (mode === 'solo' && (phaseBoss === '1' || boss === '1'))
        );
      }

      function buildMultiLobbyUrl(mode) {
        const path = MULTI_TO_LOBBY[mode] || './goodjunk-launcher.html';
        const url = passTo(new URL(path, location.href));

        removeParams(url, ['phaseBoss', 'boss']);
        url.searchParams.set('mode', mode);
        url.searchParams.set('entry', mode);
        url.searchParams.set('recommendedMode', mode);
        url.searchParams.set('maxPlayers', MAX_PLAYERS_BY_MODE[mode] || '2');
        url.searchParams.set('theme', 'goodjunk');

        if (!url.searchParams.get('game')) url.searchParams.set('game', 'goodjunk');
        if (!url.searchParams.get('gameId')) url.searchParams.set('gameId', 'goodjunk');
        if (!url.searchParams.get('zone')) url.searchParams.set('zone', 'nutrition');
        if (!url.searchParams.get('cat')) url.searchParams.set('cat', 'nutrition');
        if (!url.searchParams.get('view')) url.searchParams.set('view', 'mobile');
        if (!url.searchParams.get('run')) url.searchParams.set('run', 'play');

        return url.toString();
      }

      function buildSoloBossUrl() {
        const url = passTo(new URL('./goodjunk-solo-boss.html', location.href));

        removeParams(url, [
          'room',
          'roomId',
          'role',
          'host',
          'wait',
          'autostart',
          'modeLocked',
          'roomReady',
          'maxPlayers'
        ]);

        url.searchParams.set('mode', 'solo');
        url.searchParams.set('entry', 'solo-boss');
        url.searchParams.set('recommendedMode', 'solo-boss');
        url.searchParams.set('phaseBoss', '1');
        url.searchParams.set('boss', '1');
        url.searchParams.set('theme', 'phaseboss');

        if (!url.searchParams.get('game')) url.searchParams.set('game', 'goodjunk');
        if (!url.searchParams.get('gameId')) url.searchParams.set('gameId', 'goodjunk');
        if (!url.searchParams.get('zone')) url.searchParams.set('zone', 'nutrition');
        if (!url.searchParams.get('cat')) url.searchParams.set('cat', 'nutrition');
        if (!url.searchParams.get('view')) url.searchParams.set('view', 'mobile');
        if (!url.searchParams.get('run')) url.searchParams.set('run', 'play');

        return url.toString();
      }

      function go(url, delayMs){
        setTimeout(function(){
          location.replace(url);
        }, delayMs);
      }

      const hubUrl = buildHubUrl();
      const launcherUrl = buildLauncherUrl();
      const multiMode = findRequestedMultiMode();
      const soloBoss = isSoloBossRequested();

      if (btnHub) btnHub.href = hubUrl;
      if (btnLauncher) btnLauncher.href = launcherUrl;
      if (btnRetry) {
        btnRetry.addEventListener('click', function () {
          location.reload();
        });
      }

      if (multiMode) {
        const target = buildMultiLobbyUrl(multiMode);

        setText(
          multiMode === 'duet'
            ? 'ตรวจพบโหมด Duet — กำลังพาไปหน้า lobby ของ duet'
            : multiMode === 'race'
              ? 'ตรวจพบโหมด Race — กำลังพาไปหน้า lobby ของ race'
              : multiMode === 'battle'
                ? 'ตรวจพบโหมด Battle — กำลังพาไปหน้า lobby ของ battle'
                : 'ตรวจพบโหมด Co-op — กำลังพาไปหน้า lobby ของ co-op'
        );

        if (btnLauncher) btnLauncher.href = target;
        go(target, 80);
        return;
      }

      if (soloBoss) {
        const target = buildSoloBossUrl();

        setText('ตรวจพบเส้นทาง Solo Boss — กำลังย้ายไป gameplay core ใหม่');
        if (btnLauncher) btnLauncher.href = target;
        go(target, 80);
        return;
      }

      setText('ไม่พบโหมดที่ล็อกไว้ — จะกลับไปหน้า Launcher ให้เลือกโหมด');
      go(launcherUrl, 180);
    })();
  </script>
</body>
</html>
