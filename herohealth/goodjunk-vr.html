<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk Solo Boss v2</title>
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#9fe3ff" />
  <link rel="icon" href="./favicon.ico" />
  <style>
    :root{
      --sky1:#dff4ff;
      --sky2:#bfe8ff;
      --sky3:#fff7d8;

      --card:#fffdf6;
      --card2:#f8fff3;
      --line:#bfe3f2;
      --text:#4d4a42;
      --muted:#7b7a72;

      --green:#7ed957;
      --green2:#58c33f;
      --blue:#7fcfff;
      --blue2:#58b7f5;
      --yellow:#ffd45c;
      --orange:#ffb547;

      --shadow:0 18px 40px rgba(86,155,194,.16);

      --sat:env(safe-area-inset-top,0px);
      --sar:env(safe-area-inset-right,0px);
      --sab:env(safe-area-inset-bottom,0px);
      --sal:env(safe-area-inset-left,0px);
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      min-height:100%;
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 12% 10%, rgba(255,255,255,.92), transparent 18%),
        radial-gradient(circle at 86% 14%, rgba(255,255,255,.78), transparent 16%),
        linear-gradient(180deg,var(--sky1),var(--sky2) 54%, var(--sky3));
      overflow:hidden;
    }
    body{ min-height:100dvh; }

    #app{
      position:relative;
      width:100vw;
      height:100dvh;
      overflow:hidden;
      isolation:isolate;
    }

    .bg-clouds{
      position:absolute;
      inset:0;
      overflow:hidden;
      pointer-events:none;
      z-index:0;
    }
    .cloud{
      position:absolute;
      border-radius:999px;
      background:rgba(255,255,255,.7);
      filter:blur(1px);
      box-shadow:
        50px 8px 0 8px rgba(255,255,255,.65),
        100px 0 0 0 rgba(255,255,255,.75),
        70px -10px 0 4px rgba(255,255,255,.72);
      animation:floatCloud linear infinite;
    }
    .cloud.c1{ width:110px; height:34px; left:6%; top:10%; animation-duration:28s; }
    .cloud.c2{ width:140px; height:40px; left:62%; top:14%; animation-duration:36s; }
    .cloud.c3{ width:100px; height:30px; left:30%; top:22%; animation-duration:32s; }
    @keyframes floatCloud{
      from{ transform:translateX(-5vw); }
      to{ transform:translateX(12vw); }
    }

    /* ปรับให้ game area เริ่มใต้ top HUD เลย */
    #gameMount{
      position:absolute;
      left:8px;
      right:8px;
      top:calc(164px + var(--sat));
      bottom:calc(8px + var(--sab));
      z-index:1;
      overflow:hidden;
      border-radius:30px;
      box-shadow:0 16px 32px rgba(86,155,194,.12);
      background:rgba(255,255,255,.16);
    }

    .shell{
      position:absolute;
      inset:0;
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:10px;
      padding:
        calc(8px + var(--sat))
        calc(8px + var(--sar))
        calc(8px + var(--sab))
        calc(8px + var(--sal));
      pointer-events:none;
      z-index:3;
    }

    .topbar{
      display:grid;
      gap:8px;
      align-content:start;
    }

    .hero-card{
      background:linear-gradient(180deg,#fffef9,#f7fff4);
      border:3px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:12px 14px;
      position:relative;
      overflow:hidden;
      pointer-events:auto;
    }

    .hero-card::before{
      content:"";
      position:absolute;
      left:-30px; top:-30px;
      width:110px; height:110px;
      border-radius:999px;
      background:rgba(127,207,255,.18);
      filter:blur(8px);
    }

    .hero-card::after{
      content:"";
      position:absolute;
      right:-24px; bottom:-24px;
      width:96px; height:96px;
      border-radius:999px;
      background:rgba(255,212,92,.18);
      filter:blur(8px);
    }

    .kicker{
      position:relative;
      z-index:1;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:7px 12px;
      border-radius:999px;
      background:#eaf8ff;
      border:2px solid var(--line);
      color:#5ea8d0;
      font-size:12px;
      font-weight:1000;
      margin-bottom:8px;
    }

    h1{
      position:relative;
      z-index:1;
      margin:0 0 4px;
      font-size:clamp(24px,5.4vw,36px);
      line-height:1.02;
      font-weight:1000;
      color:#67a91c;
      text-shadow:0 2px 0 #fff;
    }

    .sub{
      position:relative;
      z-index:1;
      margin:0;
      color:var(--muted);
      line-height:1.5;
      font-size:13px;
      font-weight:900;
      max-width:900px;
    }

    .chipbar{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:8px;
      pointer-events:none;
    }

    .pill{
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      min-height:42px;
      padding:10px 12px;
      border-radius:999px;
      border:2px solid var(--line);
      background:rgba(255,255,255,.92);
      color:#6c6a61;
      font-size:12px;
      font-weight:1000;
      box-shadow:0 8px 18px rgba(86,155,194,.10);
      pointer-events:auto;
      backdrop-filter:blur(6px);
    }

    .bottomDock{
      display:flex;
      justify-content:flex-start;
      align-items:end;
      pointer-events:none;
    }

    .status-card{
      width:min(92vw,420px);
      background:linear-gradient(180deg,#fffef9,#f7fff4);
      border:3px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:10px 12px;
      color:var(--muted);
      font-size:12px;
      font-weight:900;
      line-height:1.55;
      pointer-events:auto;
    }

    .status-title{
      color:#67a91c;
      font-size:13px;
      font-weight:1000;
      margin-bottom:3px;
    }

    .error{
      color:#b45309;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .mini-note{
      font-size:11px;
      color:#7b7a72;
      margin-top:4px;
    }

    @media (min-width: 760px){
      #gameMount{
        left:14px;
        right:14px;
        top:calc(132px + var(--sat));
        bottom:calc(14px + var(--sab));
      }

      .topbar{
        grid-template-columns:minmax(0,1fr) auto;
        align-items:start;
      }

      .chipbar{
        width:min(420px,42vw);
        grid-template-columns:repeat(2,minmax(0,1fr));
      }

      .hero-card{
        min-height:92px;
        padding:14px 16px;
      }

      h1{
        font-size:clamp(26px,3.3vw,40px);
      }

      .sub{
        font-size:13px;
        line-height:1.45;
      }
    }

    @media (min-width: 1080px){
      .chipbar{
        width:auto;
        grid-template-columns:repeat(4,minmax(130px,1fr));
      }

      #gameMount{
        top:calc(118px + var(--sat));
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="bg-clouds" aria-hidden="true">
      <div class="cloud c1"></div>
      <div class="cloud c2"></div>
      <div class="cloud c3"></div>
    </div>

    <div id="gameMount"></div>

    <div class="shell">
      <div class="topbar">
        <div class="hero-card">
          <div class="kicker">👑 GOODJUNK SOLO BOSS v2</div>
          <h1>Boss Adventure</h1>
          <p class="sub">
            เก็บอาหารดี หลบ junk แล้วผ่าน 2 phase เพื่อเข้าสู้กับ Junk King แบบสนุกและอ่านจังหวะได้ชัดเจน
          </p>
        </div>

        <div class="chipbar">
          <div class="pill" id="pillPlayer">PLAYER • -</div>
          <div class="pill" id="pillDiff">LEVEL • normal</div>
          <div class="pill" id="pillTime">TIME • 150</div>
          <div class="pill" id="pillMode">MODE • solo boss</div>
        </div>
      </div>

      <div></div>

      <div class="bottomDock">
        <div class="status-card" id="engineStatusCard">
          <div class="status-title" id="engineStatusTitle">กำลังเตรียมเกม…</div>
          <div id="engineStatusText">เริ่มต้นตัวโหลด engine...</div>
          <div class="mini-note" id="engineStatusMini">ถ้าไฟล์ JS อยู่ path อื่น ให้แก้ ENGINE_CANDIDATES ด้านล่าง</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const q = new URLSearchParams(location.search);
      const $ = (id) => document.getElementById(id);

      const runCtx = {
        pid: q.get('pid') || 'anon',
        name: q.get('name') || '',
        studyId: q.get('studyId') || '',
        roomId: '',
        role: 'player',
        mode: 'solo',
        diff: q.get('diff') || 'normal',
        time: q.get('time') || '150',
        seed: q.get('seed') || String(Date.now()),
        startAt: 0,
        hub: q.get('hub') || new URL('./hub.html', location.href).toString(),
        nextAfterCooldown: q.get('nextAfterCooldown') || '',
        cdnext: q.get('cdnext') || '',
        view: q.get('view') || 'mobile',
        run: q.get('run') || 'play',
        gameId: q.get('gameId') || 'goodjunk'
      };

      window.__GJ_RUN_CTX__ = runCtx;
      window.HHA_CLOUD_ENDPOINT = String(q.get('api') || window.HHA_CLOUD_ENDPOINT || '').trim();

      const ENGINE_CANDIDATES = [
        '/webxr-health-mobile/herohealth/goodjunk-solo-phaseboss-v2.js',
        './goodjunk-solo-phaseboss-v2.js',
        './js/goodjunk-solo-phaseboss-v2.js'
      ];

      function setStatus(title, text, isError = false) {
        const t1 = $('engineStatusTitle');
        const t2 = $('engineStatusText');
        if (t1) t1.textContent = title;
        if (t2) {
          t2.textContent = text;
          t2.className = isError ? 'error' : '';
        }
      }

      function updatePills() {
        const pillPlayer = $('pillPlayer');
        const pillDiff = $('pillDiff');
        const pillTime = $('pillTime');
        const pillMode = $('pillMode');

        if (pillPlayer) pillPlayer.textContent = `PLAYER • ${runCtx.name || runCtx.pid || '-'}`;
        if (pillDiff) pillDiff.textContent = `LEVEL • ${runCtx.diff}`;
        if (pillTime) pillTime.textContent = `TIME • ${runCtx.time}`;
        if (pillMode) pillMode.textContent = 'MODE • solo boss';
      }

      async function fetchText(src) {
        const res = await fetch(src, { cache: 'no-store' });
        if (!res.ok) throw new Error(`${src} -> HTTP ${res.status}`);
        return await res.text();
      }

      async function injectClassicScriptFromCode(code, srcLabel) {
        return await new Promise((resolve, reject) => {
          try {
            const blob = new Blob([code], { type: 'text/javascript' });
            const blobUrl = URL.createObjectURL(blob);

            const s = document.createElement('script');
            s.src = blobUrl;

            s.onload = () => {
              try { URL.revokeObjectURL(blobUrl); } catch {}
              resolve(true);
            };

            s.onerror = () => {
              try { URL.revokeObjectURL(blobUrl); } catch {}
              reject(new Error(`โหลด script ไม่สำเร็จ: ${srcLabel}`));
            };

            document.body.appendChild(s);
          } catch (err) {
            reject(err);
          }
        });
      }

      function verifyEngineStarted() {
        const mount = document.getElementById('gameMount');
        if (!mount) return false;
        return mount.children.length > 0;
      }

      async function loadEngine() {
        updatePills();

        let lastErr = null;

        for (const src of ENGINE_CANDIDATES) {
          try {
            setStatus('กำลังโหลดเกม…', `ลองโหลด ${src}`);
            const code = await fetchText(src);

            if (!code || !code.trim()) {
              throw new Error(`ไฟล์ว่าง: ${src}`);
            }

            await injectClassicScriptFromCode(code, src);

            setTimeout(() => {
              const ok = verifyEngineStarted();
              if (!ok) {
                setStatus(
                  'โหลดไฟล์ได้ แต่เกมยังไม่เริ่ม',
                  `โหลด ${src} ได้แล้ว แต่ engine ยังไม่ mount ลง #gameMount\nให้ตรวจ goodjunk-solo-phaseboss-v2.js ว่ามี error syntax หรือ runtime ตอนเริ่มต้น`,
                  true
                );
                return;
              }

              setStatus('เข้าเกมแล้ว', `solo boss engine loaded: ${src}`);
              const card = $('engineStatusCard');
              if (card) {
                setTimeout(() => { card.style.display = 'none'; }, 450);
              }
            }, 120);

            return;
          } catch (err) {
            lastErr = err;
            console.warn('[GJ-SOLO-BOSS] candidate failed', src, err);
          }
        }

        setStatus(
          'ไม่พบไฟล์ engine',
          `โหลด engine ไม่สำเร็จ\n${lastErr ? String(lastErr.message || lastErr) : ''}\n\nCandidates:\n${ENGINE_CANDIDATES.join('\n')}`,
          true
        );
      }

      try {
        updatePills();
        setStatus('กำลังเตรียมเกม…', 'เริ่มต้นตัวโหลด engine...');
        loadEngine();
      } catch (err) {
        setStatus(
          'เกิดปัญหาใน run page',
          String(err && (err.stack || err.message || err) || 'Unknown error'),
          true
        );
      }
    })();
  </script>
</body>
</html>
