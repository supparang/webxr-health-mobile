<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk Router</title>
  <meta name="theme-color" content="#9fe3ff" />
  <link rel="icon" href="./favicon.ico" />
  <style>
    :root{
      --sky1:#dff4ff;
      --sky2:#bfe8ff;
      --sky3:#fff7d8;
      --line:#bfe3f2;
      --text:#4d4a42;
      --muted:#7b7a72;
      --green:#7ed957;
      --green2:#58c33f;
      --blue:#7fcfff;
      --blue2:#58b7f5;
      --orange:#ffd37a;
      --orange2:#ffb84d;
      --shadow:0 18px 40px rgba(86,155,194,.16);
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      min-height:100%;
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 12% 8%, rgba(255,255,255,.84), transparent 18%),
        radial-gradient(circle at 86% 10%, rgba(255,255,255,.72), transparent 18%),
        linear-gradient(180deg,var(--sky1),var(--sky2) 54%, var(--sky3));
    }

    body{
      min-height:100dvh;
      display:grid;
      place-items:center;
      padding:18px;
    }

    .card{
      width:min(92vw,620px);
      border-radius:28px;
      border:3px solid var(--line);
      background:linear-gradient(180deg,#fffef9,#f7fff4);
      box-shadow:var(--shadow);
      padding:22px 20px;
      text-align:center;
    }

    .icon{
      width:100px;
      height:100px;
      margin:0 auto 12px;
      border-radius:30px;
      display:grid;
      place-items:center;
      font-size:48px;
      background:linear-gradient(180deg,#fff3de,#ffe0b8);
      border:3px solid #ffd89b;
    }

    h1{
      margin:0;
      font-size:30px;
      line-height:1.06;
      font-weight:1000;
      color:#67a91c;
    }

    .sub{
      margin:10px 0 0;
      font-size:14px;
      line-height:1.7;
      color:var(--muted);
      font-weight:900;
    }

    .status{
      margin-top:14px;
      border-radius:18px;
      background:#fff;
      border:3px solid var(--line);
      padding:12px 14px;
      font-size:14px;
      line-height:1.65;
      color:#666055;
      font-weight:1000;
      white-space:pre-wrap;
      word-break:break-word;
      text-align:left;
    }

    .chips{
      margin-top:12px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .chip{
      min-height:34px;
      padding:8px 12px;
      border-radius:999px;
      border:2px solid var(--line);
      background:rgba(255,255,255,.92);
      color:#6b675f;
      font-size:12px;
      font-weight:1000;
      box-shadow:0 8px 18px rgba(86,155,194,.10);
    }

    .actions{
      margin-top:16px;
      display:grid;
      gap:10px;
    }

    .btn{
      appearance:none;
      border:none;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:48px;
      padding:12px 16px;
      border-radius:16px;
      font-size:15px;
      font-weight:1000;
      box-shadow:var(--shadow);
      color:inherit;
    }

    .btn.primary{
      background:linear-gradient(180deg,var(--blue),var(--blue2));
      color:#08374d;
    }

    .btn.hub{
      background:linear-gradient(180deg,var(--green),var(--green2));
      color:#133b09;
    }

    .btn.retry{
      background:linear-gradient(180deg,var(--orange),var(--orange2));
      color:#5a3b11;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🍔</div>
    <h1>กำลังจัดเส้นทาง GoodJunk</h1>
    <p class="sub">
      หน้านี้จะพาไปหน้าเล่นที่ถูกต้องตามโหมดที่เลือก
    </p>

    <div class="chips">
      <div class="chip" id="chipMode">mode: -</div>
      <div class="chip" id="chipEntry">entry: -</div>
      <div class="chip" id="chipView">view: -</div>
    </div>

    <div class="status" id="statusBox">กำลังตรวจสอบเส้นทาง…</div>

    <div class="actions">
      <a id="btnGoPrimary" class="btn primary" href="./goodjunk-launcher.html">🎮 ไปหน้าที่ระบบเลือก</a>
      <a id="btnLauncher" class="btn primary" href="./goodjunk-launcher.html">🧭 ไป Launcher</a>
      <a id="btnHub" class="btn hub" href="./hub.html">🏠 กลับ Hub</a>
      <button id="btnRetry" class="btn retry" type="button">🔄 ลองใหม่</button>
    </div>
  </div>

  <script>
    (function(){
      'use strict';

      const q = new URLSearchParams(location.search);

      const statusBox = document.getElementById('statusBox');
      const chipMode = document.getElementById('chipMode');
      const chipEntry = document.getElementById('chipEntry');
      const chipView = document.getElementById('chipView');

      const btnGoPrimary = document.getElementById('btnGoPrimary');
      const btnLauncher = document.getElementById('btnLauncher');
      const btnHub = document.getElementById('btnHub');
      const btnRetry = document.getElementById('btnRetry');

      const PATHS = {
        launcher: './goodjunk-launcher.html',
        routeGuard: './goodjunk-route-guard.html',
        soloBoss: './goodjunk-solo-boss.html',
        duetRuntime: './vr-goodjunk/goodjunk-duet-runtime.html',
        hub: './hub.html'
      };

      const MULTI_MODES = ['duet', 'race', 'battle', 'coop'];

      function first(){
        for (let i = 0; i < arguments.length; i++) {
          const v = arguments[i];
          if (String(v || '').trim()) return String(v).trim();
        }
        return '';
      }

      function lower(v){
        return String(v || '').trim().toLowerCase();
      }

      function setStatus(text){
        if (statusBox) statusBox.textContent = text;
      }

      function passTo(url){
        q.forEach((v, k) => {
          if (v != null && v !== '') {
            url.searchParams.set(k, v);
          }
        });
        return url;
      }

      function removeParams(url, names){
        names.forEach((name) => {
          try { url.searchParams.delete(name); } catch (_) {}
        });
        return url;
      }

      function safeHref(path){
        return new URL(path, location.href).toString();
      }

      function getHubHref(){
        return first(q.get('hub'), safeHref(PATHS.hub));
      }

      function getLauncherHref(){
        const url = passTo(new URL(PATHS.launcher, location.href));

        if (!url.searchParams.get('pid')) url.searchParams.set('pid', 'anon');
        if (!url.searchParams.get('name')) url.searchParams.set('name', 'Hero');
        if (!url.searchParams.get('diff')) url.searchParams.set('diff', 'normal');
        if (!url.searchParams.get('time')) url.searchParams.set('time', '90');
        if (!url.searchParams.get('view')) url.searchParams.set('view', 'mobile');
        if (!url.searchParams.get('run')) url.searchParams.set('run', 'play');
        if (!url.searchParams.get('zone')) url.searchParams.set('zone', 'nutrition');
        if (!url.searchParams.get('cat')) url.searchParams.set('cat', 'nutrition');
        if (!url.searchParams.get('game')) url.searchParams.set('game', 'goodjunk');
        if (!url.searchParams.get('gameId')) url.searchParams.set('gameId', 'goodjunk');
        if (!url.searchParams.get('theme')) url.searchParams.set('theme', 'goodjunk');
        if (!url.searchParams.get('hub')) url.searchParams.set('hub', getHubHref());

        return url.toString();
      }

      function isSoloBossRequested() {
        const entry = lower(first(q.get('entry'), ''));
        const mode = lower(first(q.get('mode'), ''));
        const recommendedMode = lower(first(q.get('recommendedMode'), ''));
        const phaseBoss = lower(first(q.get('phaseBoss'), ''));
        const boss = lower(first(q.get('boss'), ''));
        const theme = lower(first(q.get('theme'), ''));

        return (
          entry === 'solo-boss' ||
          recommendedMode === 'solo-boss' ||
          phaseBoss === '1' ||
          boss === '1' ||
          theme === 'phaseboss' ||
          (mode === 'solo' && (phaseBoss === '1' || boss === '1'))
        );
      }

      function findRequestedMultiMode() {
        const candidates = [
          lower(q.get('mode')),
          lower(q.get('entry')),
          lower(q.get('recommendedMode'))
        ];

        for (const c of candidates) {
          if (MULTI_MODES.includes(c)) return c;
        }
        return '';
      }

      function isDuetRuntimeReady() {
        const mode = lower(q.get('mode'));
        const entry = lower(q.get('entry'));
        const roomId = first(q.get('roomId'), q.get('room'), '');
        const multiplayer = lower(q.get('multiplayer'));
        const fromLobby = lower(q.get('fromLobby'));
        const autostart = lower(q.get('autostart'));
        const startAt = first(q.get('startAt'), '');

        const duetRequested = mode === 'duet' || entry === 'duet';

        return !!(
          duetRequested &&
          roomId &&
          (
            multiplayer === '1' ||
            fromLobby === '1' ||
            autostart === '1' ||
            startAt
          )
        );
      }

      function buildSoloBossHref() {
        const url = passTo(new URL(PATHS.soloBoss, location.href));

        removeParams(url, [
          'room',
          'roomId',
          'role',
          'host',
          'wait',
          'autostart',
          'modeLocked',
          'roomReady',
          'maxPlayers',
          'multiplayer',
          'fromLobby',
          'matchId'
        ]);

        url.searchParams.set('mode', 'solo');
        url.searchParams.set('entry', 'solo-boss');
        url.searchParams.set('recommendedMode', 'solo-boss');
        url.searchParams.set('phaseBoss', '1');
        url.searchParams.set('boss', '1');
        url.searchParams.set('theme', 'goodjunk');

        if (!url.searchParams.get('pid')) url.searchParams.set('pid', 'anon');
        if (!url.searchParams.get('name')) url.searchParams.set('name', 'Hero');
        if (!url.searchParams.get('diff')) url.searchParams.set('diff', 'normal');
        if (!url.searchParams.get('time')) url.searchParams.set('time', '90');
        if (!url.searchParams.get('view')) url.searchParams.set('view', 'mobile');
        if (!url.searchParams.get('run')) url.searchParams.set('run', 'play');
        if (!url.searchParams.get('zone')) url.searchParams.set('zone', 'nutrition');
        if (!url.searchParams.get('cat')) url.searchParams.set('cat', 'nutrition');
        if (!url.searchParams.get('game')) url.searchParams.set('game', 'goodjunk');
        if (!url.searchParams.get('gameId')) url.searchParams.set('gameId', 'goodjunk');
        if (!url.searchParams.get('hub')) url.searchParams.set('hub', getHubHref());

        return url.toString();
      }

      function buildDuetRuntimeHref() {
        const url = passTo(new URL(PATHS.duetRuntime, location.href));

        removeParams(url, ['phaseBoss', 'boss']);

        url.searchParams.set('mode', 'duet');
        url.searchParams.set('entry', 'duet');
        url.searchParams.set('multiplayer', '1');
        url.searchParams.set('theme', 'goodjunk');

        if (!url.searchParams.get('pid')) url.searchParams.set('pid', 'anon');
        if (!url.searchParams.get('name')) url.searchParams.set('name', 'Hero');
        if (!url.searchParams.get('nick')) url.searchParams.set('nick', url.searchParams.get('name') || 'Hero');
        if (!url.searchParams.get('diff')) url.searchParams.set('diff', 'normal');
        if (!url.searchParams.get('time')) url.searchParams.set('time', '90');
        if (!url.searchParams.get('view')) url.searchParams.set('view', 'mobile');
        if (!url.searchParams.get('run')) url.searchParams.set('run', 'play');
        if (!url.searchParams.get('zone')) url.searchParams.set('zone', 'nutrition');
        if (!url.searchParams.get('cat')) url.searchParams.set('cat', 'nutrition');
        if (!url.searchParams.get('game')) url.searchParams.set('game', 'goodjunk');
        if (!url.searchParams.get('gameId')) url.searchParams.set('gameId', 'goodjunk');
        if (!url.searchParams.get('hub')) url.searchParams.set('hub', getHubHref());

        return url.toString();
      }

      function buildRouteGuardHref() {
        const url = passTo(new URL(PATHS.routeGuard, location.href));

        if (!url.searchParams.get('pid')) url.searchParams.set('pid', 'anon');
        if (!url.searchParams.get('name')) url.searchParams.set('name', 'Hero');
        if (!url.searchParams.get('diff')) url.searchParams.set('diff', 'normal');
        if (!url.searchParams.get('time')) url.searchParams.set('time', '90');
        if (!url.searchParams.get('view')) url.searchParams.set('view', 'mobile');
        if (!url.searchParams.get('run')) url.searchParams.set('run', 'play');
        if (!url.searchParams.get('zone')) url.searchParams.set('zone', 'nutrition');
        if (!url.searchParams.get('cat')) url.searchParams.set('cat', 'nutrition');
        if (!url.searchParams.get('game')) url.searchParams.set('game', 'goodjunk');
        if (!url.searchParams.get('gameId')) url.searchParams.set('gameId', 'goodjunk');
        if (!url.searchParams.get('hub')) url.searchParams.set('hub', getHubHref());

        return url.toString();
      }

      function go(url, delayMs) {
        setTimeout(function(){
          location.replace(url);
        }, delayMs);
      }

      const mode = lower(first(q.get('mode'), ''));
      const entry = lower(first(q.get('entry'), ''));
      const view = lower(first(q.get('view'), 'mobile'));

      if (chipMode) chipMode.textContent = `mode: ${mode || '-'}`;
      if (chipEntry) chipEntry.textContent = `entry: ${entry || '-'}`;
      if (chipView) chipView.textContent = `view: ${view || '-'}`;

      const hubHref = getHubHref();
      const launcherHref = getLauncherHref();

      if (btnHub) btnHub.href = hubHref;
      if (btnLauncher) btnLauncher.href = launcherHref;
      if (btnRetry) {
        btnRetry.addEventListener('click', function(){
          location.reload();
        });
      }

      if (isDuetRuntimeReady()) {
        const target = buildDuetRuntimeHref();

        setStatus(
          'ตรวจพบเส้นทาง DUET runtime พร้อมเล่นแล้ว\n' +
          'จะพาเข้า goodjunk-duet-runtime.html ทันที'
        );

        if (btnGoPrimary) {
          btnGoPrimary.href = target;
          btnGoPrimary.textContent = '🤝 เข้า DUET Runtime';
        }

        go(target, 80);
        return;
      }

      if (isSoloBossRequested()) {
        const target = buildSoloBossHref();

        setStatus(
          'ตรวจพบเส้นทาง SOLO PHASE BOSS\n' +
          'จะพาเข้า goodjunk-solo-boss.html'
        );

        if (btnGoPrimary) {
          btnGoPrimary.href = target;
          btnGoPrimary.textContent = '👑 เข้า Solo Boss';
        }

        go(target, 80);
        return;
      }

      if (findRequestedMultiMode()) {
        const target = buildRouteGuardHref();

        setStatus(
          'ตรวจพบโหมด MULTI\n' +
          'จะพาไป goodjunk-route-guard.html เพื่อเลือก lobby/runtime ที่ถูกต้อง'
        );

        if (btnGoPrimary) {
          btnGoPrimary.href = target;
          btnGoPrimary.textContent = '🎮 ไป Multi Route Guard';
        }

        go(target, 80);
        return;
      }

      setStatus(
        'ไม่พบเงื่อนไขที่ชี้เข้า solo boss หรือ multiplayer โดยตรง\n' +
        'จะกลับไปหน้า goodjunk-launcher.html ให้เลือกโหมด'
      );

      if (btnGoPrimary) {
        btnGoPrimary.href = launcherHref;
        btnGoPrimary.textContent = '🧭 ไป Launcher';
      }

      go(launcherHref, 180);
    })();
  </script>
</body>
</html>
