<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • Bath v3 Run</title>
  <meta name="color-scheme" content="light" />
  <link rel="stylesheet" href="./bath.css" />
</head>
<body>
  <div id="bathApp" class="bath-shell">
    <header class="bath-topbar">
      <div class="top-left">
        <div id="phaseBadge" class="phase-badge">Bath v3</div>
        <div id="taskText" class="task-text">เตรียมพร้อม</div>
      </div>

      <div class="top-right">
        <div class="score-pill">⭐ <span id="scoreValue">0</span></div>
        <div class="score-pill streak">🔥 <span id="comboValue">1</span></div>
        <div class="score-pill heart">❤️ <span id="livesValue">8</span></div>
        <button id="helpBtn" class="icon-btn" type="button" title="วิธีเล่น">🔊</button>
        <button id="homeBtn" class="icon-btn" type="button" title="กลับ HUB">🏠</button>
      </div>
    </header>

    <main class="bath-main">
      <section id="briefCard" class="brief-card"></section>

      <section id="scene" class="scene hidden">
        <section class="mission-card">
          <div class="mission-head">
            <div class="mission-kicker">ภารกิจตอนนี้</div>
            <div id="phaseChip" class="phase-chip">Phase 1</div>
          </div>

          <h2 id="missionTitle" class="mission-title">เริ่มภารกิจ</h2>

          <div class="progress-track">
            <div id="progressFill" class="progress-fill"></div>
          </div>

          <div class="progress-foot">
            <div id="phaseProgressText" class="progress-label">0 / 0</div>
            <div class="streak-track">
              <div id="streakFill" class="streak-fill"></div>
            </div>
          </div>
        </section>

        <section id="stageCard" class="stage-card">
          <div id="feedbackPop" class="feedback-pop">เยี่ยม!</div>

          <div id="speechBubble" class="speech-bubble">เริ่มเลย! เลือกอุปกรณ์ก่อนนะ</div>
          <div class="coach-bot">🤖</div>

          <div class="tool-rail">
            <button id="toolSoap" class="tool-fab" type="button" aria-label="สบู่">🧼</button>
            <button id="toolWater" class="tool-fab" type="button" aria-label="ฝักบัว">🚿</button>
            <button id="toolTowel" class="tool-fab" type="button" aria-label="ผ้าเช็ดตัว">🧴</button>
          </div>

          <div class="window"></div>

          <div id="avatarWrap" class="avatar-wrap">
            <div class="avatar-head"></div>
            <div class="avatar-hair"></div>
            <div class="avatar-body"></div>
            <div class="avatar-arm left"></div>
            <div class="avatar-arm right"></div>
            <div class="avatar-leg left"></div>
            <div class="avatar-leg right"></div>

            <div id="hotspotsLayer" class="hotspots-layer"></div>
            <div id="effectsLayer" class="effects-layer"></div>
          </div>

          <div class="sink"></div>
          <div class="soap-bottle"></div>

          <div class="sparkle sp1">✨</div>
          <div class="sparkle sp2">⭐</div>
          <div class="sparkle sp3">💧</div>
        </section>

        <section class="action-row-mini">
          <button id="retryBtn" class="mini-btn" type="button">เริ่มรอบใหม่</button>
          <button id="mistakeBtn" class="mini-btn warn" type="button">พลาดนิดหน่อย</button>
        </section>

        <section class="stats-grid">
          <article class="stat-card">
            <div class="stat-label">ความคืบหน้า</div>
            <div id="cleanText" class="stat-value">0 / 0</div>
            <div id="hintText" class="stat-sub">เริ่มเก็บคะแนนกันเลย</div>
            <div id="comboPill" class="combo-pill">✨ เริ่มต้นได้ดี</div>
          </article>

          <article class="stat-card">
            <div class="stat-label">เป้าหมายรอบนี้</div>
            <div id="goalText" class="stat-value">ผ่าน 5 ขั้นให้ครบ</div>
            <div id="subGoalText" class="stat-sub">ทำต่อเนื่องจะได้คะแนนเพิ่ม</div>
          </article>

          <article class="stat-card">
            <div class="stat-label">ตัวชี้วัด</div>
            <div class="metric-line">Best combo <strong id="bestComboValue">1</strong></div>
            <div class="metric-line">Perfect <strong id="perfectValue">0</strong></div>
            <div class="metric-line">Mode <strong id="modeValue">play</strong></div>
            <div class="metric-line">Target <strong id="focusValue">-</strong></div>
          </article>
        </section>
      </section>

      <section id="summaryRoot"></section>
      <section id="quizRoot"></section>
    </main>
  </div>

  <script type="module" src="./bath.js"></script>
</body>
</html>
