<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk Route Guard</title>
  <meta name="theme-color" content="#9fe3ff" />
  <link rel="icon" href="./favicon.ico" />
  <link rel="stylesheet" href="./goodjunk-page-base.css" />
</head>
<body>
  <div class="gj-page">
    <div class="gj-card">
      <div class="gj-icon">🍔</div>
      <h1 class="gj-title">กำลังจัดเส้นทาง GoodJunk</h1>
      <p id="statusText" class="gj-subtitle">
        กรุณารอสักครู่ ระบบกำลังพาไปหน้าที่ถูกต้อง
      </p>

      <div class="gj-chipbar">
        <div class="gj-chip" id="chipMode">mode: -</div>
        <div class="gj-chip" id="chipEntry">entry: -</div>
        <div class="gj-chip" id="chipRoom">room: -</div>
        <div class="gj-chip" id="chipView">view: -</div>
      </div>

      <div class="gj-status-box" id="statusBox">กำลังตรวจสอบ query…</div>

      <div class="gj-actions">
        <a id="btnPrimary" class="gj-btn gj-btn-primary" href="./goodjunk-launcher.html">🎮 ไปหน้าที่ระบบเลือก</a>
        <a id="btnLauncher" class="gj-btn gj-btn-primary" href="./goodjunk-launcher.html">🧭 ไป Launcher</a>
        <a id="btnHub" class="gj-btn gj-btn-success" href="./hub.html">🏠 กลับ Hub</a>
        <button id="btnRetry" class="gj-btn gj-btn-warn" type="button">🔄 ลองใหม่</button>
      </div>
    </div>
  </div>

  <script>
    (function(){
      'use strict';

      const q = new URLSearchParams(location.search);

      const statusText = document.getElementById('statusText');
      const statusBox  = document.getElementById('statusBox');

      const chipMode = document.getElementById('chipMode');
      const chipEntry = document.getElementById('chipEntry');
      const chipRoom = document.getElementById('chipRoom');
      const chipView = document.getElementById('chipView');

      const btnPrimary  = document.getElementById('btnPrimary');
      const btnLauncher = document.getElementById('btnLauncher');
      const btnHub      = document.getElementById('btnHub');
      const btnRetry    = document.getElementById('btnRetry');

      const PATHS = {
        launcher: './goodjunk-launcher.html',
        hub: './hub.html',
        soloBoss: './goodjunk-solo-boss.html',
        duetRuntime: './vr-goodjunk/goodjunk-duet-runtime.html',

        duetLobby: './vr-goodjunk/goodjunk-duet-lobby.html',
        raceLobby: './vr-goodjunk/goodjunk-race-lobby.html',
        battleLobby: './vr-goodjunk/goodjunk-battle-lobby.html',
        coopLobby: './vr-goodjunk/goodjunk-coop-lobby.html'
      };

      const MULTI_MODES = ['duet', 'race', 'battle', 'coop'];

      function first(){
        for (let i = 0; i < arguments.length; i++) {
          const v = arguments[i];
          if (String(v || '').trim()) return String(v).trim();
        }
        return '';
      }

      function lower(v){
        return String(v || '').trim().toLowerCase();
      }

      function safeHref(path){
        return new URL(path, location.href).toString();
      }

      function passTo(url){
        q.forEach((v, k) => {
          if (v != null && v !== '') {
            url.searchParams.set(k, v);
          }
        });
        return url;
      }

      function removeParams(url, names){
        names.forEach((name) => {
          try { url.searchParams.delete(name); } catch (_) {}
        });
        return url;
      }

      function setStatus(text){
        if (statusBox) statusBox.textContent = text;
      }

      function setLead(text){
        if (statusText) statusText.textContent = text;
      }

      function getHubHref(){
        return first(q.get('hub'), safeHref(PATHS.hub));
      }

      function getLauncherHref(){
        const url = passTo(new URL(PATHS.launcher, location.href));

        if (!url.searchParams.get('pid')) url.searchParams.set('pid', 'anon');
        if (!url.searchParams.get('name')) url.searchParams.set('name', 'Hero');
        if (!url.searchParams.get('diff')) url.searchParams.set('diff', 'normal');
        if (!url.searchParams.get('time')) url.searchParams.set('time', '90');
        if (!url.searchParams.get('view')) url.searchParams.set('view', 'mobile');
        if (!url.searchParams.get('run')) url.searchParams.set('run', 'play');
        if (!url.searchParams.get('zone')) url.searchParams.set('zone', 'nutrition');
        if (!url.searchParams.get('cat')) url.searchParams.set('cat', 'nutrition');
        if (!url.searchParams.get('game')) url.searchParams.set('game', 'goodjunk');
        if (!url.searchParams.get('gameId')) url.searchParams.set('gameId', 'goodjunk');
        if (!url.searchParams.get('theme')) url.searchParams.set('theme', 'goodjunk');
        if (!url.searchParams.get('hub')) url.searchParams.set('hub', getHubHref());

        return url.toString();
      }

      function isSoloBossRequested(){
        const entry = lower(first(q.get('entry'), ''));
        const mode = lower(first(q.get('mode'), ''));
        const recommendedMode = lower(first(q.get('recommendedMode'), ''));
        const phaseBoss = lower(first(q.get('phaseBoss'), ''));
        const boss = lower(first(q.get('boss'), ''));
        const theme = lower(first(q.get('theme'), ''));

        return (
          entry === 'solo-boss' ||
          recommendedMode === 'solo-boss' ||
          phaseBoss === '1' ||
          boss === '1' ||
          theme === 'phaseboss' ||
          (mode === 'solo' && (phaseBoss === '1' || boss === '1'))
        );
      }

      function findRequestedMultiMode(){
        const candidates = [
          lower(q.get('mode')),
          lower(q.get('entry')),
          lower(q.get('recommendedMode'))
        ];

        for (const c of candidates) {
          if (MULTI_MODES.includes(c)) return c;
        }
        return '';
      }

      function isDuetRuntimeReady(){
        const mode = lower(q.get('mode'));
        const entry = lower(q.get('entry'));
        const roomId = first(q.get('roomId'), q.get('room'), '');
        const multiplayer = lower(q.get('multiplayer'));
        const fromLobby = lower(q.get('fromLobby'));
        const autostart = lower(q.get('autostart'));
        const startAt = first(q.get('startAt'), '');

        const duetRequested = mode === 'duet' || entry === 'duet';

        return !!(
          duetRequested &&
          roomId &&
          (
            multiplayer === '1' ||
            fromLobby === '1' ||
            autostart === '1' ||
            startAt
          )
        );
      }

      function buildSoloBossHref(){
        const url = passTo(new URL(PATHS.soloBoss, location.href));

        removeParams(url, [
          'room',
          'roomId',
          'role',
          'host',
          'wait',
          'autostart',
          'modeLocked',
          'roomReady',
          'maxPlayers',
          'multiplayer',
          'fromLobby',
          'matchId',
          'lobby'
        ]);

        url.searchParams.set('mode', 'solo');
        url.searchParams.set('entry', 'solo-boss');
        url.searchParams.set('recommendedMode', 'solo-boss');
        url.searchParams.set('phaseBoss', '1');
        url.searchParams.set('boss', '1');
        url.searchParams.set('theme', 'goodjunk');

        if (!url.searchParams.get('pid')) url.searchParams.set('pid', 'anon');
        if (!url.searchParams.get('name')) url.searchParams.set('name', 'Hero');
        if (!url.searchParams.get('diff')) url.searchParams.set('diff', 'normal');
        if (!url.searchParams.get('time')) url.searchParams.set('time', '90');
        if (!url.searchParams.get('view')) url.searchParams.set('view', 'mobile');
        if (!url.searchParams.get('run')) url.searchParams.set('run', 'play');
        if (!url.searchParams.get('zone')) url.searchParams.set('zone', 'nutrition');
        if (!url.searchParams.get('cat')) url.searchParams.set('cat', 'nutrition');
        if (!url.searchParams.get('game')) url.searchParams.set('game', 'goodjunk');
        if (!url.searchParams.get('gameId')) url.searchParams.set('gameId', 'goodjunk');
        if (!url.searchParams.get('hub')) url.searchParams.set('hub', getHubHref());

        return url.toString();
      }

      function buildDuetRuntimeHref(){
        const url = passTo(new URL(PATHS.duetRuntime, location.href));

        removeParams(url, ['phaseBoss', 'boss']);

        url.searchParams.set('mode', 'duet');
        url.searchParams.set('entry', 'duet');
        url.searchParams.set('multiplayer', '1');
        url.searchParams.set('theme', 'goodjunk');

        if (!url.searchParams.get('pid')) url.searchParams.set('pid', 'anon');
        if (!url.searchParams.get('name')) url.searchParams.set('name', 'Hero');
        if (!url.searchParams.get('nick')) url.searchParams.set('nick', url.searchParams.get('name') || 'Hero');
        if (!url.searchParams.get('diff')) url.searchParams.set('diff', 'normal');
        if (!url.searchParams.get('time')) url.searchParams.set('time', '90');
        if (!url.searchParams.get('view')) url.searchParams.set('view', 'mobile');
        if (!url.searchParams.get('run')) url.searchParams.set('run', 'play');
        if (!url.searchParams.get('zone')) url.searchParams.set('zone', 'nutrition');
        if (!url.searchParams.get('cat')) url.searchParams.set('cat', 'nutrition');
        if (!url.searchParams.get('game')) url.searchParams.set('game', 'goodjunk');
        if (!url.searchParams.get('gameId')) url.searchParams.set('gameId', 'goodjunk');
        if (!url.searchParams.get('hub')) url.searchParams.set('hub', getHubHref());

        return url.toString();
      }

      function buildLobbyHref(mode){
        const path =
          mode === 'duet' ? PATHS.duetLobby :
          mode === 'race' ? PATHS.raceLobby :
          mode === 'battle' ? PATHS.battleLobby :
          PATHS.coopLobby;

        const url = passTo(new URL(path, location.href));

        removeParams(url, ['phaseBoss', 'boss']);

        url.searchParams.set('mode', mode);
        url.searchParams.set('entry', mode);
        url.searchParams.set('recommendedMode', mode);
        url.searchParams.set('theme', 'goodjunk');
        url.searchParams.set('multiplayer', '1');

        if (!url.searchParams.get('pid')) url.searchParams.set('pid', 'anon');
        if (!url.searchParams.get('name')) url.searchParams.set('name', 'Hero');
        if (!url.searchParams.get('nick')) url.searchParams.set('nick', url.searchParams.get('name') || 'Hero');
        if (!url.searchParams.get('diff')) url.searchParams.set('diff', 'normal');
        if (!url.searchParams.get('time')) url.searchParams.set('time', '90');
        if (!url.searchParams.get('view')) url.searchParams.set('view', 'mobile');
        if (!url.searchParams.get('run')) url.searchParams.set('run', 'play');
        if (!url.searchParams.get('zone')) url.searchParams.set('zone', 'nutrition');
        if (!url.searchParams.get('cat')) url.searchParams.set('cat', 'nutrition');
        if (!url.searchParams.get('game')) url.searchParams.set('game', 'goodjunk');
        if (!url.searchParams.get('gameId')) url.searchParams.set('gameId', 'goodjunk');
        if (!url.searchParams.get('hub')) url.searchParams.set('hub', getHubHref());

        return url.toString();
      }

      function go(url, delayMs){
        setTimeout(function(){
          location.replace(url);
        }, delayMs);
      }

      const mode = lower(first(q.get('mode'), ''));
      const entry = lower(first(q.get('entry'), ''));
      const room = first(q.get('roomId'), q.get('room'), '-');
      const view = lower(first(q.get('view'), 'mobile'));

      if (chipMode) chipMode.textContent = `mode: ${mode || '-'}`;
      if (chipEntry) chipEntry.textContent = `entry: ${entry || '-'}`;
      if (chipRoom) chipRoom.textContent = `room: ${room || '-'}`;
      if (chipView) chipView.textContent = `view: ${view || '-'}`;

      const hubHref = getHubHref();
      const launcherHref = getLauncherHref();

      if (btnHub) btnHub.href = hubHref;
      if (btnLauncher) btnLauncher.href = launcherHref;
      if (btnRetry) {
        btnRetry.addEventListener('click', function(){
          location.reload();
        });
      }

      if (isDuetRuntimeReady()) {
        const target = buildDuetRuntimeHref();

        setLead('ตรวจพบโหมด Duet ที่พร้อมเล่นแล้ว');
        setStatus(
          'ตรวจพบ room + สัญญาณเริ่มเกมครบแล้ว\n' +
          'ระบบจะพาเข้า vr-goodjunk/goodjunk-duet-runtime.html ทันที'
        );

        if (btnPrimary) {
          btnPrimary.href = target;
          btnPrimary.textContent = '🤝 เข้า Duet Runtime';
        }

        go(target, 80);
        return;
      }

      if (isSoloBossRequested()) {
        const target = buildSoloBossHref();

        setLead('ตรวจพบเส้นทาง Solo Boss');
        setStatus(
          'พบ query ของ solo phase boss\n' +
          'ระบบจะพาเข้า goodjunk-solo-boss.html'
        );

        if (btnPrimary) {
          btnPrimary.href = target;
          btnPrimary.textContent = '👑 เข้า Solo Boss';
        }

        go(target, 80);
        return;
      }

      const multiMode = findRequestedMultiMode();
      if (multiMode) {
        const target = buildLobbyHref(multiMode);

        setLead(
          multiMode === 'duet' ? 'ตรวจพบโหมด Duet' :
          multiMode === 'race' ? 'ตรวจพบโหมด Race' :
          multiMode === 'battle' ? 'ตรวจพบโหมด Battle' :
          'ตรวจพบโหมด Co-op'
        );

        setStatus(
          'ตรวจพบโหมด multiplayer\n' +
          'ระบบจะพาไป lobby ของโหมดที่เลือกก่อน\n' +
          `target mode = ${multiMode}`
        );

        if (btnPrimary) {
          btnPrimary.href = target;
          btnPrimary.textContent =
            multiMode === 'duet' ? '🤝 ไป Duet Lobby' :
            multiMode === 'race' ? '🏁 ไป Race Lobby' :
            multiMode === 'battle' ? '⚔️ ไป Battle Lobby' :
            '🫶 ไป Co-op Lobby';
        }

        go(target, 80);
        return;
      }

      setLead('ไม่พบโหมดที่ล็อกไว้');
      setStatus(
        'query ยังไม่พอสำหรับชี้เข้า solo boss หรือ multiplayer\n' +
        'ระบบจะพากลับ goodjunk-launcher.html เพื่อให้เลือกโหมดใหม่'
      );

      if (btnPrimary) {
        btnPrimary.href = launcherHref;
        btnPrimary.textContent = '🧭 ไป Launcher';
      }

      go(launcherHref, 180);
    })();
  </script>
</body>
</html>
