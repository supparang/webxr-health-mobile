<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • GoodJunk Route Guard</title>
  <meta name="theme-color" content="#9fe3ff" />
  <link rel="icon" href="./favicon.ico" />
  <style>
    :root{
      --sky1:#dff4ff;
      --sky2:#bfe8ff;
      --sky3:#fff7d8;
      --line:#bfe3f2;
      --text:#4d4a42;
      --muted:#7b7a72;
      --green:#7ed957;
      --green2:#58c33f;
      --blue:#7fcfff;
      --blue2:#58b7f5;
      --pink:#ec4899;
      --pink2:#db2777;
      --orange:#f59e0b;
      --orange2:#ea580c;
      --purple:#a78bfa;
      --purple2:#7c3aed;
      --shadow:0 18px 40px rgba(86,155,194,.16);
    }

    *{ box-sizing:border-box; }
    html,body{
      margin:0;
      min-height:100%;
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 12% 8%, rgba(255,255,255,.84), transparent 18%),
        radial-gradient(circle at 86% 10%, rgba(255,255,255,.72), transparent 18%),
        linear-gradient(180deg,var(--sky1),var(--sky2) 54%, var(--sky3));
    }

    body{
      min-height:100dvh;
      display:grid;
      place-items:center;
      padding:18px;
    }

    .card{
      width:min(92vw,560px);
      border-radius:28px;
      border:3px solid var(--line);
      background:linear-gradient(180deg,#fffef9,#f7fff4);
      box-shadow:var(--shadow);
      padding:22px 20px;
      text-align:center;
    }

    .icon{
      width:96px;
      height:96px;
      margin:0 auto 10px;
      border-radius:28px;
      display:grid;
      place-items:center;
      font-size:46px;
      background:linear-gradient(180deg,#fff3de,#ffe0b8);
      border:3px solid #ffd89b;
    }

    h1{
      margin:0;
      font-size:30px;
      line-height:1.06;
      font-weight:1000;
      color:#67a91c;
    }

    p{
      margin:10px 0 0;
      font-size:14px;
      line-height:1.7;
      color:var(--muted);
      font-weight:900;
    }

    .actions{
      margin-top:16px;
      display:grid;
      gap:10px;
    }

    .btn{
      appearance:none;
      border:none;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:46px;
      padding:11px 16px;
      border-radius:16px;
      font-size:15px;
      font-weight:1000;
      box-shadow:var(--shadow);
      color:inherit;
    }

    .btn.primary{
      background:linear-gradient(180deg,var(--blue),var(--blue2));
      color:#08374d;
    }

    .btn.hub{
      background:linear-gradient(180deg,var(--green),var(--green2));
      color:#133b09;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" id="routeIcon">🍔</div>
    <h1>กำลังจัดเส้นทาง GoodJunk</h1>
    <p id="statusText">
      กรุณารอสักครู่ ระบบกำลังพาไปหน้าที่ถูกต้อง
    </p>

    <div class="actions">
      <a id="btnLauncher" class="btn primary" href="./goodjunk-launcher.html">🎮 ไป Launcher</a>
      <a id="btnHub" class="btn hub" href="./hub-v2.html">🏠 กลับ Hub</a>
    </div>
  </div>

  <script>
    (function(){
      'use strict';

      const q = new URLSearchParams(location.search);
      const statusText = document.getElementById('statusText');
      const btnLauncher = document.getElementById('btnLauncher');
      const btnHub = document.getElementById('btnHub');
      const routeIcon = document.getElementById('routeIcon');

      function first(){
        for (let i = 0; i < arguments.length; i++) {
          const v = arguments[i];
          if (String(v || '').trim()) return String(v).trim();
        }
        return '';
      }

      function clean(v, fallback=''){
        const s = String(v || '').trim();
        return s || fallback;
      }

      function lower(v, fallback=''){
        return clean(v, fallback).toLowerCase();
      }

      function passTo(url){
        q.forEach((v, k) => {
          if (v != null && v !== '') url.searchParams.set(k, v);
        });
        return url;
      }

      function setStatus(text, icon){
        if (statusText) statusText.textContent = text;
        if (routeIcon && icon) routeIcon.textContent = icon;
      }

      function go(path, delayMs){
        const target = passTo(new URL(path, location.href));
        setTimeout(function(){
          location.replace(target.toString());
        }, delayMs);
      }

      const hub = first(q.get('hub'), new URL('./hub-v2.html', location.href).toString());
      if (btnHub) btnHub.href = hub;

      const launcherUrl = passTo(new URL('./goodjunk-launcher.html', location.href)).toString();
      if (btnLauncher) btnLauncher.href = launcherUrl;

      const entry = lower(q.get('entry'));
      const mode = lower(q.get('mode'));
      const recommendedMode = lower(q.get('recommendedMode'));
      const phaseBoss = lower(q.get('phaseBoss'));
      const boss = lower(q.get('boss'));
      const theme = lower(q.get('theme'));
      const game = lower(q.get('game'), 'goodjunk');
      const gameId = lower(q.get('gameId'), game);

      const gameLooksGoodJunk =
        game === 'goodjunk' ||
        gameId === 'goodjunk' ||
        theme === 'goodjunk' ||
        theme === 'phaseboss';

      const resolvedMode = first(
        mode,
        recommendedMode,
        entry === 'solo-boss' ? 'solo' : '',
        ''
      ).toLowerCase();

      const isSoloBoss =
        resolvedMode === 'solo' ||
        entry === 'solo' ||
        entry === 'solo-boss' ||
        recommendedMode === 'solo' ||
        recommendedMode === 'solo-boss' ||
        phaseBoss === '1' ||
        boss === '1' ||
        theme === 'phaseboss';

      const isDuet = resolvedMode === 'duet' || entry === 'duet';
      const isRace = resolvedMode === 'race' || entry === 'race';
      const isBattle = resolvedMode === 'battle' || entry === 'battle';
      const isCoop = resolvedMode === 'coop' || entry === 'coop';

      if (!gameLooksGoodJunk) {
        setStatus('ไม่พบเส้นทาง GoodJunk ที่ถูกต้อง — จะกลับไปหน้า Launcher', '🧭');
        go('./goodjunk-launcher.html', 180);
        return;
      }

      // LOCKED RULE:
      // Solo = Phase Boss only
      // Multiplayer = Good/Junk only, via each mode lobby
      if (isSoloBoss) {
        q.set('mode', 'solo');
        q.set('entry', 'solo-boss');
        q.set('recommendedMode', 'solo-boss');
        setStatus('ตรวจพบเส้นทาง Solo Phase Boss — กำลังพาไปหน้า Solo Boss', '👑');
        go('./goodjunk-solo-boss.html', 80);
        return;
      }

      if (isDuet) {
        q.set('mode', 'duet');
        q.set('entry', 'duet');
        q.set('recommendedMode', 'duet');
        setStatus('ตรวจพบโหมด Duet — กำลังพาไปหน้า Lobby ของ Duet', '🤝');
        go('./goodjunk-duet-lobby.html', 80);
        return;
      }

      if (isRace) {
        q.set('mode', 'race');
        q.set('entry', 'race');
        q.set('recommendedMode', 'race');
        setStatus('ตรวจพบโหมด Race — กำลังพาไปหน้า Lobby ของ Race', '🏁');
        go('./goodjunk-race-lobby.html', 80);
        return;
      }

      if (isBattle) {
        q.set('mode', 'battle');
        q.set('entry', 'battle');
        q.set('recommendedMode', 'battle');
        setStatus('ตรวจพบโหมด Battle — กำลังพาไปหน้า Lobby ของ Battle', '⚔️');
        go('./goodjunk-battle-lobby.html', 80);
        return;
      }

      if (isCoop) {
        q.set('mode', 'coop');
        q.set('entry', 'coop');
        q.set('recommendedMode', 'coop');
        setStatus('ตรวจพบโหมด Co-op — กำลังพาไปหน้า Lobby ของ Co-op', '🫶');
        go('./goodjunk-coop-lobby.html', 80);
        return;
      }

      setStatus('ยังไม่ระบุโหมดชัดเจน — จะกลับไปหน้า Launcher ให้เลือกโหมด', '🎮');
      go('./goodjunk-launcher.html', 180);
    })();
  </script>
</body>
</html>
