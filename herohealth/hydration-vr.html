<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • Hydration Arena</title>
  <meta name="theme-color" content="#7dd3fc" />
  <meta name="color-scheme" content="light dark" />

  <style>
    :root{
      --bg1:#e0f7ff;
      --bg2:#effcff;
      --bg3:#ffffff;
      --card:rgba(255,255,255,.86);
      --line:rgba(37,99,235,.16);
      --text:#14324a;
      --muted:#527089;
      --blue:#2563eb;
      --cyan:#06b6d4;
      --good:#10b981;
      --warn:#f59e0b;
      --danger:#f43f5e;
      --shadow:0 18px 44px rgba(37,99,235,.14);
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      min-height:100%;
    }

    body{
      font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans Thai",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 16% 12%,rgba(125,211,252,.55),transparent 26%),
        radial-gradient(circle at 86% 18%,rgba(34,211,238,.38),transparent 24%),
        linear-gradient(180deg,var(--bg1),var(--bg2) 42%,var(--bg3));
      overflow-x:hidden;
    }

    button,select,input{
      font:inherit;
    }

    .page{
      width:min(1120px,100%);
      margin:0 auto;
      padding:18px;
      min-height:100dvh;
      display:grid;
      gap:16px;
      align-content:start;
    }

    .hero{
      padding:18px;
      border-radius:32px;
      border:1px solid var(--line);
      background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(255,255,255,.72));
      box-shadow:var(--shadow);
      display:grid;
      gap:14px;
    }

    .hero-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      gap:12px;
      align-items:center;
      min-width:0;
    }

    .badge{
      width:58px;
      height:58px;
      border-radius:22px;
      display:grid;
      place-items:center;
      font-size:32px;
      background:linear-gradient(180deg,#67e8f9,#2563eb);
      box-shadow:0 14px 28px rgba(37,99,235,.22);
      color:white;
    }

    .title{ min-width:0; }

    .title .k{
      font-size:13px;
      font-weight:1000;
      color:#2563eb;
      letter-spacing:.04em;
    }

    .title .v{
      font-size:clamp(26px,4vw,46px);
      line-height:1.02;
      font-weight:1100;
      letter-spacing:-.04em;
    }

    .title .s{
      margin-top:6px;
      color:var(--muted);
      font-size:15px;
      line-height:1.45;
    }

    .chips{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .chip{
      padding:8px 11px;
      border-radius:999px;
      background:rgba(37,99,235,.08);
      border:1px solid rgba(37,99,235,.12);
      color:#1d4ed8;
      font-size:12px;
      font-weight:1000;
      white-space:nowrap;
    }

    .controls{
      display:grid;
      grid-template-columns:1fr 1fr 1fr 1fr;
      gap:10px;
    }

    .field{
      display:grid;
      gap:6px;
    }

    .field label{
      font-size:12px;
      color:var(--muted);
      font-weight:1000;
    }

    .field input,
    .field select{
      width:100%;
      min-height:44px;
      border-radius:16px;
      border:1px solid rgba(37,99,235,.16);
      background:rgba(255,255,255,.78);
      padding:10px 12px;
      color:var(--text);
      outline:none;
      font-weight:900;
    }

    .room-box{
      display:grid;
      gap:12px;
      padding:14px;
      border-radius:24px;
      background:rgba(37,99,235,.07);
      border:1px solid rgba(37,99,235,.14);
    }

    .room-box[hidden]{
      display:none !important;
    }

    .room-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .room-title{
      font-size:18px;
      font-weight:1100;
    }

    .room-sub,
    .room-hint{
      color:var(--muted);
      font-size:13px;
      line-height:1.4;
      font-weight:800;
    }

    .room-mode-switch{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .room-tab{
      min-height:40px;
      padding:10px 14px;
      border-radius:14px;
      border:1px solid rgba(37,99,235,.14);
      background:rgba(255,255,255,.72);
      color:var(--text);
      font-weight:1000;
      cursor:pointer;
    }

    .room-tab.active{
      color:#fff;
      background:linear-gradient(180deg,#22d3ee,#2563eb);
      box-shadow:0 12px 24px rgba(37,99,235,.18);
      border-color:transparent;
    }

    .room-grid{
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      gap:10px;
      align-items:end;
    }

    .room-code-preview{
      min-height:44px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:10px 14px;
      border-radius:16px;
      background:rgba(6,182,212,.11);
      border:1px solid rgba(6,182,212,.18);
      color:#0e7490;
      font-size:18px;
      font-weight:1100;
      letter-spacing:.05em;
      white-space:nowrap;
    }

    .room-actions-inline{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .room-btn{
      min-height:42px;
      padding:10px 14px;
      border-radius:15px;
      border:0;
      cursor:pointer;
      color:#fff;
      font-weight:1100;
      background:linear-gradient(180deg,#22d3ee,#2563eb);
      box-shadow:0 12px 24px rgba(37,99,235,.18);
    }

    .room-btn.secondary{
      color:#1d4ed8;
      background:rgba(37,99,235,.08);
      border:1px solid rgba(37,99,235,.12);
      box-shadow:none;
    }

    .room-btn:disabled{
      opacity:.55;
      cursor:not-allowed;
      filter:grayscale(.25);
    }

    .mode-grid{
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:12px;
    }

    .mode-card{
      position:relative;
      min-height:250px;
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:12px;
      padding:14px;
      border-radius:28px;
      background:var(--card);
      border:2px solid rgba(37,99,235,.12);
      box-shadow:var(--shadow);
      cursor:pointer;
      text-align:left;
      color:var(--text);
      overflow:hidden;
      transition:transform .14s ease,border-color .14s ease,box-shadow .14s ease;
    }

    .mode-card::before{
      content:"";
      position:absolute;
      inset:-40% -40% auto auto;
      width:170px;
      height:170px;
      border-radius:50%;
      background:rgba(37,99,235,.08);
      pointer-events:none;
    }

    .mode-card:hover{
      transform:translateY(-3px);
      border-color:rgba(37,99,235,.30);
      box-shadow:0 22px 52px rgba(37,99,235,.18);
    }

    .mode-card.active{
      border-color:#2563eb;
      box-shadow:0 22px 52px rgba(37,99,235,.24),0 0 0 4px rgba(37,99,235,.10);
    }

    .mode-icon{
      position:relative;
      width:54px;
      height:54px;
      border-radius:22px;
      display:grid;
      place-items:center;
      font-size:30px;
      background:linear-gradient(180deg,#e0f2fe,#ffffff);
      border:1px solid rgba(37,99,235,.14);
      box-shadow:0 12px 24px rgba(37,99,235,.10);
    }

    .mode-name{
      position:relative;
      font-size:20px;
      font-weight:1100;
      line-height:1.05;
    }

    .mode-sub{
      position:relative;
      margin-top:6px;
      color:var(--muted);
      font-size:13px;
      line-height:1.35;
    }

    .mode-tags{
      position:relative;
      display:flex;
      flex-wrap:wrap;
      gap:6px;
    }

    .tag{
      padding:6px 8px;
      border-radius:999px;
      background:rgba(6,182,212,.09);
      border:1px solid rgba(6,182,212,.14);
      font-size:11px;
      font-weight:1000;
      color:#0e7490;
    }

    .start-panel{
      position:sticky;
      bottom:12px;
      z-index:10;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      padding:14px;
      border-radius:26px;
      background:rgba(255,255,255,.88);
      border:1px solid rgba(37,99,235,.14);
      box-shadow:0 18px 44px rgba(37,99,235,.18);
      backdrop-filter:blur(14px);
    }

    .selected{
      display:grid;
      gap:2px;
    }

    .selected .k{
      font-size:12px;
      color:var(--muted);
      font-weight:1000;
    }

    .selected .v{
      font-size:18px;
      font-weight:1100;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      min-height:48px;
      padding:12px 18px;
      border-radius:18px;
      border:0;
      cursor:pointer;
      font-weight:1100;
      color:white;
      background:linear-gradient(180deg,#22d3ee,#2563eb);
      box-shadow:0 14px 28px rgba(37,99,235,.24);
    }

    .btn.secondary{
      color:#1d4ed8;
      background:rgba(37,99,235,.08);
      border:1px solid rgba(37,99,235,.12);
      box-shadow:none;
    }

    @media (max-width: 980px){
      .mode-grid{ grid-template-columns:repeat(2,minmax(0,1fr)); }
      .controls{ grid-template-columns:repeat(2,minmax(0,1fr)); }
    }

    @media (max-width: 620px){
      .page{ padding:12px; }
      .mode-grid,.controls,.room-grid{ grid-template-columns:1fr; }
      .mode-card{ min-height:210px; }
      .start-panel{ align-items:stretch; }
      .actions,.btn,.room-btn{ width:100%; }
      .room-head{ align-items:stretch; }
      .room-actions-inline{ width:100%; }
      .room-code-preview{ justify-content:flex-start; }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="hero">
      <div class="hero-top">
        <div class="brand">
          <div class="badge">💧</div>
          <div class="title">
            <div class="k">HEROHEALTH</div>
            <div class="v">Hydration Arena</div>
            <div class="s">เลือกโหมดเล่นน้ำดี: เดี่ยว คู่ แข่ง ต่อสู้ หรือช่วยทีมกู้ถังน้ำ</div>
          </div>
        </div>

        <div class="chips">
          <div class="chip">Solo</div>
          <div class="chip">Duet</div>
          <div class="chip">Race 2–10</div>
          <div class="chip">Battle 2</div>
          <div class="chip">Coop 2–10</div>
          <div class="chip">Room Code</div>
        </div>
      </div>

      <div class="controls">
        <div class="field">
          <label for="playerName">ชื่อผู้เล่น</label>
          <input id="playerName" value="Hero" autocomplete="name" />
        </div>

        <div class="field">
          <label for="diff">ระดับ</label>
          <select id="diff">
            <option value="easy">Easy</option>
            <option value="normal" selected>Normal</option>
            <option value="hard">Hard</option>
            <option value="challenge">Challenge</option>
          </select>
        </div>

        <div class="field">
          <label for="time">เวลา</label>
          <select id="time">
            <option value="60">60 วินาที</option>
            <option value="80" selected>80 วินาที</option>
            <option value="120">120 วินาที</option>
            <option value="150">150 วินาที</option>
          </select>
        </div>

        <div class="field">
          <label for="view">อุปกรณ์</label>
          <select id="view">
            <option value="pc">PC</option>
            <option value="mobile" selected>Mobile</option>
            <option value="cvr">Cardboard VR</option>
          </select>
        </div>
      </div>

      <div class="room-box" id="roomBox" hidden>
        <div class="room-head">
          <div>
            <div class="room-title">👥 Multiplayer Room</div>
            <div class="room-sub">สร้างห้องใหม่ หรือเข้าห้องด้วย Room Code</div>
          </div>
        </div>

        <div class="room-mode-switch">
          <button class="room-tab active" id="roomTabCreate" type="button">สร้างห้อง</button>
          <button class="room-tab" id="roomTabJoin" type="button">เข้าห้อง</button>
        </div>

        <div class="room-grid">
          <div class="field">
            <label for="roomCode">Room Code</label>
            <input id="roomCode" placeholder="เช่น HYD-7P3A" autocomplete="off" />
          </div>

          <div class="room-code-preview" id="roomCodePreview">HYD-0000</div>
        </div>

        <div class="room-actions-inline">
          <button class="room-btn" id="btnNewRoom" type="button">สร้างรหัสใหม่</button>
          <button class="room-btn secondary" id="btnPasteRoom" type="button">Paste</button>
          <button class="room-btn secondary" id="btnCopyRoom" type="button">Copy</button>
        </div>

        <div class="room-hint" id="roomHint">
          Duet / Battle ต้องมี 2 คน • Race / Coop รองรับ 2–10 คน
        </div>
      </div>
    </section>

    <section class="mode-grid" id="modeGrid"></section>

    <section class="start-panel">
      <div class="selected">
        <div class="k">โหมดที่เลือก</div>
        <div class="v" id="selectedText">💧 Solo Survival</div>
      </div>

      <div class="actions">
        <button class="btn secondary" id="btnBackHub" type="button">กลับโซน</button>
        <button class="btn" id="btnStart" type="button">เริ่มเล่น</button>
      </div>
    </section>
  </main>

  <script>
    const MODES = [
      {
        id:'solo',
        icon:'💧',
        name:'Solo Survival',
        sub:'เอาตัวรอดคนเดียว เก็บน้ำดี เก็บโล่ และรักษาระดับน้ำให้รอดจนจบ',
        tags:['1 Player','Survival','Water']
      },
      {
        id:'duet',
        icon:'🤝',
        name:'Duet Buddy',
        sub:'เล่นคู่ 2 คน ระบบแจกหน้าที่ Collector / Guardian อัตโนมัติ ต้องรอเพื่อนก่อนเริ่ม',
        tags:['2 Players','Auto Role','Team Sync']
      },
      {
        id:'race',
        icon:'🏁',
        name:'Water Race',
        sub:'แข่งเติม Water ให้ถึงเป้าก่อน รองรับ 2–10 คน พร้อมอันดับสด',
        tags:['2–10 Players','Live Rank','Boost']
      },
      {
        id:'battle',
        icon:'🌩️',
        name:'Storm Battle',
        sub:'เล่น 2 คน ทำภารกิจเพื่อปลดล็อกสกิลพายุ แล้วส่งไปท้าทายคู่แข่ง',
        tags:['2 Players','Mission Unlock','Attack']
      },
      {
        id:'coop',
        icon:'🚰',
        name:'Coop Rescue',
        sub:'ทีม 2–10 คนช่วยกันรักษาถังน้ำรวม ผ่าน Crisis และทำภารกิจตาม Role',
        tags:['2–10 Players','Team Tank','Crisis']
      }
    ];

    const $ = (s, r = document) => r.querySelector(s);
    const params = new URL(location.href).searchParams;

    let selectedMode = normalizeMode(params.get('mode') || params.get('recommendedMode') || 'solo');
    let roomAction = (params.get('join') === '1' || params.get('roomAction') === 'join') ? 'join' : 'create';

    function esc(s){
      return String(s ?? '').replace(/[&<>"']/g, m => ({
        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;',
        '"':'&quot;',
        "'":'&#39;'
      }[m]));
    }

    function normalizeMode(v){
      v = String(v || 'solo').toLowerCase();
      return ['solo','duet','race','battle','coop'].includes(v) ? v : 'solo';
    }

    function makeRoomCode(){
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let out = 'HYD-';
      for(let i = 0; i < 4; i++){
        out += chars[Math.floor(Math.random() * chars.length)];
      }
      return out;
    }

    function normalizeRoomCode(v){
      v = String(v || '').trim().toUpperCase();
      v = v.replace(/^HYDR-/, 'HYD-');

      if(v.startsWith('HYD-')){
        const tail = v.slice(4).replace(/[^A-Z0-9]/g, '').slice(0, 4);
        return tail ? `HYD-${tail}` : '';
      }

      if(v.startsWith('HYD')){
        const tail = v.slice(3).replace(/[^A-Z0-9]/g, '').slice(0, 4);
        return tail ? `HYD-${tail}` : '';
      }

      const raw = v.replace(/[^A-Z0-9]/g, '').slice(0, 4);
      return raw ? `HYD-${raw}` : '';
    }

    function updateRoomPreview(){
      const input = $('#roomCode');
      const preview = $('#roomCodePreview');
      if(!input || !preview) return;

      const normalized = normalizeRoomCode(input.value);
      preview.textContent = normalized || 'HYD-0000';
    }

    function setRoomAction(next){
      roomAction = (next === 'join') ? 'join' : 'create';

      $('#roomTabCreate')?.classList.toggle('active', roomAction === 'create');
      $('#roomTabJoin')?.classList.toggle('active', roomAction === 'join');

      const input = $('#roomCode');
      const btnNew = $('#btnNewRoom');
      const hint = $('#roomHint');

      if(!input) return;

      if(roomAction === 'create'){
        if(!normalizeRoomCode(input.value)){
          input.value = makeRoomCode();
        }
        input.readOnly = true;
        if(btnNew) btnNew.disabled = false;
        if(hint) hint.textContent = 'คุณจะเป็นเจ้าของห้อง แชร์ Room Code นี้ให้เพื่อนเข้าห้องเดียวกัน';
      }else{
        input.readOnly = false;
        input.value = normalizeRoomCode(input.value);
        if(btnNew) btnNew.disabled = true;
        if(hint) hint.textContent = 'ใส่ Room Code ของเพื่อนให้ตรงกัน แล้วกดเริ่มเล่น';
      }

      updateRoomPreview();
    }

    function syncRoomBox(){
      const box = $('#roomBox');
      const input = $('#roomCode');
      if(!box || !input) return;

      const isMulti = selectedMode !== 'solo';
      box.hidden = !isMulti;

      if(!isMulti) return;

      const incomingRoom = params.get('roomCode') || params.get('room') || '';
      if(incomingRoom && !input.value.trim()){
        input.value = normalizeRoomCode(incomingRoom);
      }

      if(!input.value.trim()){
        input.value = makeRoomCode();
      }

      setRoomAction(roomAction);
      updateRoomPreview();
    }

    function renderModes(){
      const grid = $('#modeGrid');
      grid.innerHTML = MODES.map(m => `
        <button class="mode-card ${m.id === selectedMode ? 'active' : ''}" type="button" data-mode="${esc(m.id)}">
          <div class="mode-icon">${esc(m.icon)}</div>
          <div>
            <div class="mode-name">${esc(m.name)}</div>
            <div class="mode-sub">${esc(m.sub)}</div>
          </div>
          <div class="mode-tags">
            ${m.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}
          </div>
        </button>
      `).join('');

      updateSelectedText();
      syncRoomBox();
    }

    function updateSelectedText(){
      const m = MODES.find(x => x.id === selectedMode) || MODES[0];
      $('#selectedText').textContent = `${m.icon} ${m.name}`;
    }

    function buildRunUrl(){
      const name = $('#playerName').value.trim() || 'Hero';
      const diff = $('#diff').value || 'normal';
      const time = $('#time').value || '80';
      const view = $('#view').value || 'mobile';

      const hub = params.get('hub') || './nutrition-zone.html';
      const api = params.get('api') || '';
      const pid = params.get('pid') || 'anon';
      const studyId = params.get('studyId') || '';
      const seed = params.get('seed') || Date.now();

      const url = new URL('./hydration-vr/hydration-vr.html', location.href);

      url.searchParams.set('pid', pid);
      url.searchParams.set('name', name);
      url.searchParams.set('diff', diff);
      url.searchParams.set('time', time);
      url.searchParams.set('view', view);
      url.searchParams.set('run', 'play');
      url.searchParams.set('mode', selectedMode);
      url.searchParams.set('entry', selectedMode);
      url.searchParams.set('recommendedMode', selectedMode);
      url.searchParams.set('zone', 'nutrition');
      url.searchParams.set('cat', 'nutrition');
      url.searchParams.set('game', 'hydration');
      url.searchParams.set('gameId', 'hydration');
      url.searchParams.set('theme', 'hydration');
      url.searchParams.set('seed', seed);
      url.searchParams.set('hub', hub);

      if(api) url.searchParams.set('api', api);
      if(studyId) url.searchParams.set('studyId', studyId);

      if(selectedMode !== 'solo'){
        const input = $('#roomCode');
        const roomCode = normalizeRoomCode(input?.value || '');

        if(roomAction === 'join' && !roomCode){
          alert('กรุณาใส่ Room Code ก่อนเข้าห้อง');
          throw new Error('missing room code');
        }

        const finalRoom = roomCode || makeRoomCode();

        url.searchParams.set('multiplayer', '1');
        url.searchParams.set('room', finalRoom);
        url.searchParams.set('roomCode', finalRoom);
        url.searchParams.set('roomAction', roomAction);
        url.searchParams.set('join', roomAction === 'join' ? '1' : '0');
      }

      return url.toString();
    }

    document.addEventListener('click', (ev) => {
      const card = ev.target.closest('[data-mode]');
      if(card){
        selectedMode = normalizeMode(card.dataset.mode || 'solo');
        renderModes();
      }
    });

    $('#roomTabCreate')?.addEventListener('click', () => {
      setRoomAction('create');
    });

    $('#roomTabJoin')?.addEventListener('click', () => {
      setRoomAction('join');
    });

    $('#roomCode')?.addEventListener('input', () => {
      const input = $('#roomCode');
      if(!input) return;

      if(roomAction === 'join'){
        input.value = input.value.toUpperCase().replace(/[^A-Z0-9-]/g, '');
      }

      updateRoomPreview();
    });

    $('#roomCode')?.addEventListener('blur', () => {
      const input = $('#roomCode');
      if(!input) return;

      if(roomAction === 'create'){
        input.value = normalizeRoomCode(input.value) || makeRoomCode();
      }else{
        input.value = normalizeRoomCode(input.value);
      }

      updateRoomPreview();
    });

    $('#btnNewRoom')?.addEventListener('click', () => {
      if(roomAction !== 'create') return;
      $('#roomCode').value = makeRoomCode();
      updateRoomPreview();
    });

    $('#btnPasteRoom')?.addEventListener('click', async () => {
      try{
        const text = await navigator.clipboard.readText();
        const code = normalizeRoomCode(text);
        if(code){
          $('#roomCode').value = code;
          setRoomAction('join');
          updateRoomPreview();
        }
      }catch(e){}
    });

    $('#btnCopyRoom')?.addEventListener('click', async () => {
      const code = normalizeRoomCode($('#roomCode')?.value || '');
      if(!code) return;

      try{
        await navigator.clipboard.writeText(code);
        $('#btnCopyRoom').textContent = 'Copied!';
        setTimeout(() => $('#btnCopyRoom').textContent = 'Copy', 1200);
      }catch(e){}
    });

    $('#btnStart').addEventListener('click', () => {
      try{
        location.href = buildRunUrl();
      }catch(err){}
    });

    $('#btnBackHub').addEventListener('click', () => {
      const hub = params.get('hub') || './nutrition-zone.html';
      location.href = hub;
    });

    renderModes();
  </script>
</body>
</html>
