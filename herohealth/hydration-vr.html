<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no" />
  <meta name="theme-color" content="#dff8ff" />
  <meta name="color-scheme" content="light" />

  <title>HeroHealth • Hydration VR</title>

  <link rel="icon" href="./favicon.ico" />
  <link rel="stylesheet" href="./hydration-vr/hydration-vr.css?v=20260506-v9-9-0" />

  <!--
    HeroHealth Hydration VR
    File: /herohealth/hydration-vr.html
    Version: v9.9.0-shell
    Flow:
      launcher / hub / zone
      -> hydration-vr.html
      -> hydration-vr.css
      -> hydration-vr.js

    Supported URL params:
      pid, name, nick, diff, time, seed, view, run, hub, zone, game, mode,
      log, api, studyId, phase, conditionGroup

    view:
      pc | mobile | cvr

    Example:
      /herohealth/hydration-vr.html?pid=anon&name=Hero&diff=normal&time=150&view=mobile&run=play&zone=fitness&game=hydration&hub=...
  -->
</head>

<body class="hha-hydration-page hha-hydration-arena">
  <main id="hha-hydration-app" class="hha-hydration-app" aria-label="HeroHealth Hydration Game">
    <section id="hha-hydration-stage" class="hha-hydration-stage" aria-label="Aqua Rush Play Stage">
      <div id="hha-hydration-bg" class="hha-hydration-bg" aria-hidden="true">
        <div class="hha-bg-bubble hha-bg-bubble-1"></div>
        <div class="hha-bg-bubble hha-bg-bubble-2"></div>
        <div class="hha-bg-bubble hha-bg-bubble-3"></div>
        <div class="hha-bg-bubble hha-bg-bubble-4"></div>
        <div class="hha-bg-wave hha-bg-wave-1"></div>
        <div class="hha-bg-wave hha-bg-wave-2"></div>
      </div>

      <div id="hha-hydration-playfield" class="hha-hydration-playfield" aria-label="พื้นที่เล่นเกม"></div>

      <div id="hha-hydration-live-region" class="hha-sr-only" aria-live="polite" aria-atomic="true"></div>
    </section>

    <noscript>
      <div class="hha-noscript">
        <div class="hha-noscript-card">
          <h1>ต้องเปิด JavaScript ก่อนเล่นเกม</h1>
          <p>เกม HeroHealth Hydration ต้องใช้ JavaScript เพื่อแสดงเป้า ภารกิจ คะแนน และสรุปผล</p>
        </div>
      </div>
    </noscript>
  </main>

  <script>
    window.HHA = window.HHA || {};
    window.HHA.HYDRATION_HTML_VERSION = 'v9.9.0-shell';
    window.HHA_HYDRATION_ENTRY_PATH = '/herohealth/hydration-vr.html';
  </script>

  <!-- Optional shared HeroHealth logger. If missing, the game still works safely. -->
  <script src="./herohealth-logger.js?v=20260506-v9-9-0" defer></script>

  <!-- Optional Universal VR UI for Cardboard/cVR crosshair and hha:shoot event. -->
  <script src="./vr/vr-ui.js?v=20260506-v9-9-0" defer></script>

  <!-- Main Hydration game engine. -->
  <script src="./hydration-vr/hydration-vr.js?v=20260506-v9-9-0" defer></script>
</body>
</html>
