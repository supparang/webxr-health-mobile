<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • Hydration Arena</title>
  <meta name="theme-color" content="#7dd3fc" />
  <meta name="color-scheme" content="light dark" />

  <style>
    :root{
      --bg1:#e0f7ff;
      --bg2:#effcff;
      --bg3:#ffffff;
      --card:rgba(255,255,255,.86);
      --line:rgba(37,99,235,.16);
      --text:#14324a;
      --muted:#527089;
      --blue:#2563eb;
      --cyan:#06b6d4;
      --good:#10b981;
      --warn:#f59e0b;
      --danger:#f43f5e;
      --shadow:0 18px 44px rgba(37,99,235,.14);
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      min-height:100%;
    }

    body{
      font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans Thai",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 16% 12%,rgba(125,211,252,.55),transparent 26%),
        radial-gradient(circle at 86% 18%,rgba(34,211,238,.38),transparent 24%),
        linear-gradient(180deg,var(--bg1),var(--bg2) 42%,var(--bg3));
      overflow-x:hidden;
    }

    button,select,input{
      font:inherit;
    }

    .page{
      width:min(1120px,100%);
      margin:0 auto;
      padding:18px;
      min-height:100dvh;
      display:grid;
      gap:16px;
      align-content:start;
    }

    .hero{
      padding:18px;
      border-radius:32px;
      border:1px solid var(--line);
      background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(255,255,255,.72));
      box-shadow:var(--shadow);
      display:grid;
      gap:14px;
    }

    .hero-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      gap:12px;
      align-items:center;
      min-width:0;
    }

    .badge{
      width:58px;
      height:58px;
      border-radius:22px;
      display:grid;
      place-items:center;
      font-size:32px;
      background:linear-gradient(180deg,#67e8f9,#2563eb);
      box-shadow:0 14px 28px rgba(37,99,235,.22);
      color:white;
    }

    .title{
      min-width:0;
    }

    .title .k{
      font-size:13px;
      font-weight:1000;
      color:#2563eb;
      letter-spacing:.04em;
    }

    .title .v{
      font-size:clamp(26px,4vw,46px);
      line-height:1.02;
      font-weight:1100;
      letter-spacing:-.04em;
    }

    .title .s{
      margin-top:6px;
      color:var(--muted);
      font-size:15px;
      line-height:1.45;
    }

    .chips{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .chip{
      padding:8px 11px;
      border-radius:999px;
      background:rgba(37,99,235,.08);
      border:1px solid rgba(37,99,235,.12);
      color:#1d4ed8;
      font-size:12px;
      font-weight:1000;
      white-space:nowrap;
    }

    .controls{
      display:grid;
      grid-template-columns:1fr 1fr 1fr 1fr;
      gap:10px;
    }

    .field{
      display:grid;
      gap:6px;
    }

    .field label{
      font-size:12px;
      color:var(--muted);
      font-weight:1000;
    }

    .field input,
    .field select{
      width:100%;
      min-height:44px;
      border-radius:16px;
      border:1px solid rgba(37,99,235,.16);
      background:rgba(255,255,255,.78);
      padding:10px 12px;
      color:var(--text);
      outline:none;
      font-weight:900;
    }

    .mode-grid{
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:12px;
    }

    .mode-card{
      position:relative;
      min-height:250px;
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:12px;
      padding:14px;
      border-radius:28px;
      background:var(--card);
      border:2px solid rgba(37,99,235,.12);
      box-shadow:var(--shadow);
      cursor:pointer;
      text-align:left;
      color:var(--text);
      overflow:hidden;
      transition:transform .14s ease,border-color .14s ease,box-shadow .14s ease;
    }

    .mode-card::before{
      content:"";
      position:absolute;
      inset:-40% -40% auto auto;
      width:170px;
      height:170px;
      border-radius:50%;
      background:rgba(37,99,235,.08);
      pointer-events:none;
    }

    .mode-card:hover{
      transform:translateY(-3px);
      border-color:rgba(37,99,235,.30);
      box-shadow:0 22px 52px rgba(37,99,235,.18);
    }

    .mode-card.active{
      border-color:#2563eb;
      box-shadow:0 22px 52px rgba(37,99,235,.24),0 0 0 4px rgba(37,99,235,.10);
    }

    .mode-icon{
      position:relative;
      width:54px;
      height:54px;
      border-radius:22px;
      display:grid;
      place-items:center;
      font-size:30px;
      background:linear-gradient(180deg,#e0f2fe,#ffffff);
      border:1px solid rgba(37,99,235,.14);
      box-shadow:0 12px 24px rgba(37,99,235,.10);
    }

    .mode-name{
      position:relative;
      font-size:20px;
      font-weight:1100;
      line-height:1.05;
    }

    .mode-sub{
      position:relative;
      margin-top:6px;
      color:var(--muted);
      font-size:13px;
      line-height:1.35;
    }

    .mode-tags{
      position:relative;
      display:flex;
      flex-wrap:wrap;
      gap:6px;
    }

    .tag{
      padding:6px 8px;
      border-radius:999px;
      background:rgba(6,182,212,.09);
      border:1px solid rgba(6,182,212,.14);
      font-size:11px;
      font-weight:1000;
      color:#0e7490;
    }

    .start-panel{
      position:sticky;
      bottom:12px;
      z-index:10;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      padding:14px;
      border-radius:26px;
      background:rgba(255,255,255,.88);
      border:1px solid rgba(37,99,235,.14);
      box-shadow:0 18px 44px rgba(37,99,235,.18);
      backdrop-filter:blur(14px);
    }

    .selected{
      display:grid;
      gap:2px;
    }

    .selected .k{
      font-size:12px;
      color:var(--muted);
      font-weight:1000;
    }

    .selected .v{
      font-size:18px;
      font-weight:1100;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      min-height:48px;
      padding:12px 18px;
      border-radius:18px;
      border:0;
      cursor:pointer;
      font-weight:1100;
      color:white;
      background:linear-gradient(180deg,#22d3ee,#2563eb);
      box-shadow:0 14px 28px rgba(37,99,235,.24);
    }

    .btn.secondary{
      color:#1d4ed8;
      background:rgba(37,99,235,.08);
      border:1px solid rgba(37,99,235,.12);
      box-shadow:none;
    }

    @media (max-width: 980px){
      .mode-grid{
        grid-template-columns:repeat(2,minmax(0,1fr));
      }

      .controls{
        grid-template-columns:repeat(2,minmax(0,1fr));
      }
    }

    @media (max-width: 620px){
      .page{
        padding:12px;
      }

      .mode-grid,
      .controls{
        grid-template-columns:1fr;
      }

      .mode-card{
        min-height:210px;
      }

      .start-panel{
        align-items:stretch;
      }

      .actions,
      .btn{
        width:100%;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="hero">
      <div class="hero-top">
        <div class="brand">
          <div class="badge">💧</div>
          <div class="title">
            <div class="k">HEROHEALTH</div>
            <div class="v">Hydration Arena</div>
            <div class="s">เลือกโหมดเล่นน้ำดี: เดี่ยว คู่ แข่ง ต่อสู้ หรือช่วยทีมกู้ถังน้ำ</div>
          </div>
        </div>

        <div class="chips">
          <div class="chip">PC</div>
          <div class="chip">Mobile</div>
          <div class="chip">Cardboard VR</div>
          <div class="chip">Auto Role</div>
        </div>
      </div>

      <div class="controls">
        <div class="field">
          <label for="playerName">ชื่อผู้เล่น</label>
          <input id="playerName" value="Hero" autocomplete="name" />
        </div>

        <div class="field">
          <label for="diff">ระดับ</label>
          <select id="diff">
            <option value="easy">Easy</option>
            <option value="normal" selected>Normal</option>
            <option value="hard">Hard</option>
            <option value="challenge">Challenge</option>
          </select>
        </div>

        <div class="field">
          <label for="time">เวลา</label>
          <select id="time">
            <option value="60">60 วินาที</option>
            <option value="80" selected>80 วินาที</option>
            <option value="120">120 วินาที</option>
            <option value="150">150 วินาที</option>
          </select>
        </div>

        <div class="field">
          <label for="view">อุปกรณ์</label>
          <select id="view">
            <option value="pc">PC</option>
            <option value="mobile" selected>Mobile</option>
            <option value="cvr">Cardboard VR</option>
          </select>
        </div>
      </div>
    </section>

    <section class="mode-grid" id="modeGrid"></section>

    <section class="start-panel">
      <div class="selected">
        <div class="k">โหมดที่เลือก</div>
        <div class="v" id="selectedText">💧 Solo Survival</div>
      </div>

      <div class="actions">
        <button class="btn secondary" id="btnBackHub" type="button">กลับโซน</button>
        <button class="btn" id="btnStart" type="button">เริ่มเล่น</button>
      </div>
    </section>
  </main>

  <script>
    const MODES = [
      {
        id: 'solo',
        icon: '💧',
        name: 'Solo Survival',
        sub: 'เอาตัวรอดคนเดียว เก็บน้ำดี เก็บโล่ และรักษาระดับน้ำให้รอดจนจบ',
        tags: ['Survival', 'Water', 'Shield']
      },
      {
        id: 'duet',
        icon: '🤝',
        name: 'Duet Buddy',
        sub: 'เล่นคู่ ระบบแจกหน้าที่ Collector / Guardian อัตโนมัติ ช่วยกันทำคะแนนทีม',
        tags: ['2 Players', 'Auto Role', 'Team Sync']
      },
      {
        id: 'race',
        icon: '🏁',
        name: 'Water Race',
        sub: 'แข่งเติม Water ให้ถึงเป้าก่อน เก็บบูสต์ให้ไว และลด Miss ให้มากที่สุด',
        tags: ['Fast', 'Boost', 'Rank']
      },
      {
        id: 'battle',
        icon: '🌩️',
        name: 'Storm Battle',
        sub: 'ทำภารกิจเพื่อปลดล็อกสกิลพายุ แล้วส่งไปท้าทายคู่แข่ง',
        tags: ['Mission Unlock', 'Attack', 'Shield Counter']
      },
      {
        id: 'coop',
        icon: '🚰',
        name: 'Coop Rescue',
        sub: 'ทุกคนช่วยกันรักษาถังน้ำรวม ผ่าน Crisis และทำภารกิจตามบทบาท',
        tags: ['Team Tank', 'Crisis', 'Rescue']
      }
    ];

    const $ = (s, r = document) => r.querySelector(s);
    const qs = new URL(location.href).searchParams;

    let selectedMode = qs.get('mode') || qs.get('recommendedMode') || 'solo';

    function esc(s){
      return String(s ?? '').replace(/[&<>"']/g, m => ({
        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;',
        '"':'&quot;',
        "'":'&#39;'
      }[m]));
    }

    function renderModes(){
      const grid = $('#modeGrid');
      grid.innerHTML = MODES.map(m => `
        <button class="mode-card ${m.id === selectedMode ? 'active' : ''}" type="button" data-mode="${esc(m.id)}">
          <div class="mode-icon">${esc(m.icon)}</div>
          <div>
            <div class="mode-name">${esc(m.name)}</div>
            <div class="mode-sub">${esc(m.sub)}</div>
          </div>
          <div class="mode-tags">
            ${m.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}
          </div>
        </button>
      `).join('');

      updateSelectedText();
    }

    function updateSelectedText(){
      const m = MODES.find(x => x.id === selectedMode) || MODES[0];
      $('#selectedText').textContent = `${m.icon} ${m.name}`;
    }

    function buildRunUrl(){
      const name = $('#playerName').value.trim() || 'Hero';
      const diff = $('#diff').value || 'normal';
      const time = $('#time').value || '80';
      const view = $('#view').value || 'mobile';

      const hub =
        qs.get('hub') ||
        '../nutrition-zone.html';

      const api = qs.get('api') || '';
      const pid = qs.get('pid') || 'anon';
      const studyId = qs.get('studyId') || '';
      const seed = qs.get('seed') || Date.now();

      const url = new URL('./hydration-vr/hydration-vr.html', location.href);

      url.searchParams.set('pid', pid);
      url.searchParams.set('name', name);
      url.searchParams.set('diff', diff);
      url.searchParams.set('time', time);
      url.searchParams.set('view', view);
      url.searchParams.set('run', 'play');
      url.searchParams.set('mode', selectedMode);
      url.searchParams.set('entry', selectedMode);
      url.searchParams.set('recommendedMode', selectedMode);
      url.searchParams.set('zone', 'nutrition');
      url.searchParams.set('cat', 'nutrition');
      url.searchParams.set('game', 'hydration');
      url.searchParams.set('gameId', 'hydration');
      url.searchParams.set('theme', 'hydration');
      url.searchParams.set('seed', seed);
      url.searchParams.set('hub', hub);

      if(api) url.searchParams.set('api', api);
      if(studyId) url.searchParams.set('studyId', studyId);

      if(selectedMode !== 'solo'){
        url.searchParams.set('multiplayer', '1');
        url.searchParams.set('room', qs.get('room') || `hydr-${selectedMode}-${String(seed).slice(-6)}`);
      }

      return url.toString();
    }

    document.addEventListener('click', (ev) => {
      const card = ev.target.closest('[data-mode]');
      if(card){
        selectedMode = card.dataset.mode || 'solo';
        renderModes();
      }
    });

    $('#btnStart').addEventListener('click', () => {
      location.href = buildRunUrl();
    });

    $('#btnBackHub').addEventListener('click', () => {
      const hub = qs.get('hub') || '../nutrition-zone.html';
      location.href = hub;
    });

    renderModes();
  </script>
</body>
</html>
