<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no" />
  <meta name="theme-color" content="#dff8ff" />
  <meta name="color-scheme" content="light" />

  <title>HeroHealth • Hydration VR</title>

  <link rel="icon" href="./favicon.ico" />
  <!-- Link to the hydration VR stylesheet -->
  <link rel="stylesheet" href="./hydration-vr/hydration-vr.css?v=20260513-pack5" />

</head>

<body class="hha-hydration-page hha-hydration-arena">
  <main id="hha-hydration-app" class="hha-hydration-app" aria-label="HeroHealth Hydration Game">
    <section id="hha-hydration-stage" class="hha-hydration-stage" aria-label="Aqua Rush Play Stage">
      <div id="hha-hydration-bg" class="hha-hydration-bg" aria-hidden="true">
        <div class="hha-bg-bubble hha-bg-bubble-1"></div>
        <div class="hha-bg-bubble hha-bg-bubble-2"></div>
        <div class="hha-bg-bubble hha-bg-bubble-3"></div>
        <div class="hha-bg-bubble hha-bg-bubble-4"></div>
        <div class="hha-bg-wave hha-bg-wave-1"></div>
        <div class="hha-bg-wave hha-bg-wave-2"></div>
      </div>

      <!-- Playfield for hydration game -->
      <div id="hha-hydration-playfield" class="hha-hydration-playfield" aria-label="พื้นที่เล่นเกม"></div>

      <!-- Live region for screen reader announcements -->
      <div id="hha-hydration-live-region" class="hha-sr-only" aria-live="polite" aria-atomic="true"></div>
    </section>

    <!-- Fallback for users with JavaScript disabled -->
    <noscript>
      <div class="hha-noscript">
        <div class="hha-noscript-card">
          <h1>ต้องเปิด JavaScript ก่อนเล่นเกม</h1>
          <p>เกม HeroHealth Hydration ต้องใช้ JavaScript เพื่อแสดงเป้า ภารกิจ คะแนน และสรุปผล</p>
        </div>
      </div>
    </noscript>
  </main>

  <!-- Hydration VR game script -->
  <script src="./hydration-vr/hydration-vr.js?v=20260513-pack5"></script>
</body>
</html>
