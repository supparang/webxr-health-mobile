<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth — Clean Objects</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="./favicon.ico" />
  <style>
    :root{
      --bg1:#020617;
      --bg2:#0b1226;
      --panel:rgba(2,6,23,.72);
      --stroke:rgba(148,163,184,.18);
      --text:#e5e7eb;
      --muted:#94a3b8;
      --blue:#3b82f6;
      --good:#22c55e;
      --warn:#f59e0b;
      --bad:#ef4444;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      min-height:100%;
      background:
        radial-gradient(1000px 700px at 50% -10%, rgba(59,130,246,.18), transparent 60%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--text);
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans Thai",Arial,sans-serif;
    }
    .wrap{
      max-width:880px;
      margin:0 auto;
      padding:18px;
    }
    .card{
      border-radius:22px;
      border:1px solid var(--stroke);
      background:var(--panel);
      box-shadow:0 18px 55px rgba(0,0,0,.28);
      padding:16px;
    }
    .title{
      font-size:28px;
      font-weight:1000;
      margin:0 0 6px;
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .muted{
      color:var(--muted);
      font-size:13px;
      font-weight:900;
    }
    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .btn{
      appearance:none;
      border:1px solid rgba(148,163,184,.22);
      border-radius:14px;
      padding:12px 14px;
      min-height:46px;
      cursor:pointer;
      color:var(--text);
      background:rgba(148,163,184,.10);
      font-weight:1000;
    }
    .btn.primary{
      background:rgba(59,130,246,.16);
      border-color:rgba(59,130,246,.34);
    }
    .btn.good{
      background:rgba(34,197,94,.14);
      border-color:rgba(34,197,94,.32);
    }
    .btn.warn{
      background:rgba(245,158,11,.14);
      border-color:rgba(245,158,11,.32);
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background:rgba(2,6,23,.42);
      color:var(--muted);
      font-size:12px;
      font-weight:1000;
      margin:4px 6px 0 0;
    }
    .pill b{ color:var(--text); }

    .section{
      margin-top:14px;
      padding:12px;
      border-radius:16px;
      border:1px solid var(--stroke);
      background:rgba(2,6,23,.35);
    }

    .debug{
      margin-top:14px;
      padding:12px;
      border-radius:16px;
      border:1px solid var(--stroke);
      background:rgba(2,6,23,.35);
      font:12px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      white-space:pre-wrap;
      word-break:break-word;
      color:#cbd5e1;
    }

    .list{
      margin:0;
      padding-left:18px;
      color:var(--muted);
      font-size:13px;
      font-weight:900;
      line-height:1.6;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">🧴 Clean Objects</div>
      <div class="muted">Launcher สำหรับเข้าเกมผ่าน Warmup Gate แบบ canonical flow</div>

      <div style="margin-top:10px;">
        <span class="pill"><b>PID</b>: <span id="uiPid">anon</span></span>
        <span class="pill"><b>view</b>: <span id="uiView">mobile</span></span>
        <span class="pill"><b>run</b>: <span id="uiRun">play</span></span>
        <span class="pill"><b>diff</b>: <span id="uiDiff">normal</span></span>
        <span class="pill"><b>time</b>: <span id="uiTime">80</span></span>
        <span class="pill"><b>bossType</b>: <span id="uiBossType">auto</span></span>
      </div>

      <div class="section">
        <div style="font-weight:1000;margin-bottom:8px;">Flow</div>
        <ul class="list">
          <li>Launcher → Warmup Gate</li>
          <li>Warmup → Run Game</li>
          <li>Run Game → Cooldown Gate</li>
          <li>Cooldown → Hub</li>
        </ul>
      </div>

      <div class="row">
        <button class="btn primary" id="btnStart">เริ่มเกม</button>
        <button class="btn good" id="btnOpenRun">เปิด run ตรง</button>
        <button class="btn warn" id="btnOpenCooldown">เปิด cooldown ตรง</button>
        <button class="btn" id="btnHub">กลับ Hub</button>
      </div>

      <div class="debug" id="debugBox">loading...</div>
    </div>
  </div>

  <script>
    function qs(k,d=''){
      try{return (new URL(location.href)).searchParams.get(k) ?? d;}
      catch(_){return d;}
    }

    function safeNum(v,d){
      v = Number(v);
      return Number.isFinite(v) ? v : d;
    }

    function normView(v){
      v = String(v||'').trim().toLowerCase();
      if(v==='vr' || v==='cvr' || v==='cardboard') return 'cvr';
      if(v==='desktop') return 'pc';
      if(v==='m') return 'mobile';
      return v || 'mobile';
    }

    function normalizeHub(){
      const raw = String(qs('hub','')).trim();
      if(raw) return raw;
      try{
        return new URL('./hub.html', location.href).toString();
      }catch(_){
        return './hub.html';
      }
    }

    const GAME = {
      cat: 'hygiene',
      theme: 'cleanobjects',
      game: 'cleanobjects',
      runPath: './vr-clean/home-clean.html'
    };

    const ctx = {
      pid: String(qs('pid','anon')).trim() || 'anon',
      view: normView(qs('view','mobile')),
      run: String(qs('run','play')).trim() || 'play',
      diff: String(qs('diff','normal')).trim() || 'normal',
      time: String(safeNum(qs('time','80'),80)),
      seed: String(qs('seed', String(Date.now()))),
      zone: String(qs('zone','hygiene')).trim() || 'hygiene',
      hub: normalizeHub(),
      boss: String(qs('boss','toilet_flush')).trim() || 'toilet_flush',
      bossType: String(qs('bossType','')).trim().toLowerCase()
    };

    document.getElementById('uiPid').textContent = ctx.pid;
    document.getElementById('uiView').textContent = ctx.view;
    document.getElementById('uiRun').textContent = ctx.run;
    document.getElementById('uiDiff').textContent = ctx.diff;
    document.getElementById('uiTime').textContent = ctx.time;
    document.getElementById('uiBossType').textContent = ctx.bossType || 'auto';

    function copyPassthrough(u){
      const sp = new URL(location.href).searchParams;
      [
        'run','diff','time','seed','studyId','phase','conditionGroup','log','view','pid','api','ai','debug',
        'planSeq','planDay','planSlot','planMode','planSlots','planIndex','autoNext',
        'plannedGame','finalGame','zone','cdnext','grade','boss','bossType','pro'
      ].forEach(k=>{
        const v = sp.get(k);
        if(v != null && v !== '') u.searchParams.set(k, v);
      });
    }

    function buildRunUrl(){
      const u = new URL(GAME.runPath, location.href);
      copyPassthrough(u);

      if(!u.searchParams.get('pid')) u.searchParams.set('pid', ctx.pid);
      if(!u.searchParams.get('view')) u.searchParams.set('view', ctx.view);
      if(!u.searchParams.get('run')) u.searchParams.set('run', ctx.run);
      if(!u.searchParams.get('diff')) u.searchParams.set('diff', ctx.diff);
      if(!u.searchParams.get('time')) u.searchParams.set('time', ctx.time);
      if(!u.searchParams.get('seed')) u.searchParams.set('seed', ctx.seed);
      if(!u.searchParams.get('zone')) u.searchParams.set('zone', ctx.zone);
      if(!u.searchParams.get('boss')) u.searchParams.set('boss', ctx.boss);
      if(ctx.bossType && !u.searchParams.get('bossType')) u.searchParams.set('bossType', ctx.bossType);

      u.searchParams.set('hub', ctx.hub);
      return u.toString();
    }

    function buildWarmupUrl(){
      const warm = new URL('./warmup-gate.html', location.href);
      copyPassthrough(warm);

      warm.searchParams.set('gatePhase', 'warmup');
      warm.searchParams.set('phase', 'warmup');
      warm.searchParams.set('cat', GAME.cat);
      warm.searchParams.set('theme', GAME.theme);
      warm.searchParams.set('game', GAME.game);
      warm.searchParams.set('pid', ctx.pid);
      warm.searchParams.set('hub', ctx.hub);
      warm.searchParams.set('next', buildRunUrl());
      warm.searchParams.set('run', ctx.run);
      warm.searchParams.set('diff', ctx.diff);
      warm.searchParams.set('time', ctx.time);
      warm.searchParams.set('view', ctx.view);
      warm.searchParams.set('seed', ctx.seed);
      warm.searchParams.set('boss', ctx.boss);
      if(ctx.bossType) warm.searchParams.set('bossType', ctx.bossType);

      return warm.toString();
    }

    function buildCooldownUrl(){
      const cool = new URL('./warmup-gate.html', location.href);
      copyPassthrough(cool);

      cool.searchParams.set('gatePhase', 'cooldown');
      cool.searchParams.set('phase', 'cooldown');
      cool.searchParams.set('cat', GAME.cat);
      cool.searchParams.set('theme', GAME.theme);
      cool.searchParams.set('game', GAME.game);
      cool.searchParams.set('pid', ctx.pid);
      cool.searchParams.set('hub', ctx.hub);
      cool.searchParams.set('next', ctx.hub);
      cool.searchParams.set('run', ctx.run);
      cool.searchParams.set('diff', ctx.diff);
      cool.searchParams.set('time', ctx.time);
      cool.searchParams.set('view', ctx.view);
      cool.searchParams.set('seed', ctx.seed);
      cool.searchParams.set('boss', ctx.boss);
      if(ctx.bossType) cool.searchParams.set('bossType', ctx.bossType);

      return cool.toString();
    }

    const debugBox = document.getElementById('debugBox');
    debugBox.textContent =
      '[Clean Objects Launcher]\\n' +
      'launcher: ' + location.href + '\\n' +
      'hub:      ' + ctx.hub + '\\n' +
      'warmup:   ' + buildWarmupUrl() + '\\n' +
      'run:      ' + buildRunUrl() + '\\n' +
      'cooldown: ' + buildCooldownUrl() + '\\n';

    document.getElementById('btnStart').onclick = ()=> location.href = buildWarmupUrl();
    document.getElementById('btnOpenRun').onclick = ()=> location.href = buildRunUrl();
    document.getElementById('btnOpenCooldown').onclick = ()=> location.href = buildCooldownUrl();
    document.getElementById('btnHub').onclick = ()=> location.href = ctx.hub;

    setTimeout(()=>{
      try{
        location.href = buildWarmupUrl();
      }catch(err){
        debugBox.textContent += '\\nredirect failed: ' + (err?.message || String(err));
      }
    }, 120);
  </script>
</body>
</html>
