<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>GoodJunk • Samsung Hand AR v9</title>
  <style>
    html,body{margin:0;width:100%;height:100%;display:grid;place-items:center;background:#ecfdf5;font-family:system-ui,sans-serif;color:#166534}
    .loading{padding:24px;text-align:center;font-size:clamp(18px,4vw,28px);font-weight:900}
  </style>
</head>
<body>
  <div class="loading">🖐️ กำลังเปิด Samsung Hand AR Compatibility v9…</div>
  <script>
    (async () => {
      try {
        const response = await fetch('./goodjunk-ar-production.html?v=20260722-v90-source', { cache: 'no-store' });
        if (!response.ok) throw new Error('HTTP ' + response.status);
        let html = await response.text();

        html = html.replace(
          './patches/goodjunk/goodjunk-mobile-handlandmarker-v7.js?v=20260722-83',
          './patches/goodjunk/goodjunk-mobile-hand-runtime-v9.js?v=20260722-90'
        );
        html = html.replace(
          './patches/goodjunk/goodjunk-mobile-handlandmarker-v7.js?v=20260722-82',
          './patches/goodjunk/goodjunk-mobile-hand-runtime-v9.js?v=20260722-90'
        );
        html = html.replace(
          "const WORKER_BOOTSTRAP_JS = './patches/goodjunk/goodjunk-worker-v83-bootstrap.js?v=20260722-83';",
          "const WORKER_BOOTSTRAP_JS = './patches/goodjunk/goodjunk-worker-v83-bootstrap.js?v=20260722-90';"
        );
        html = html.replaceAll('WORKER-V83', 'SAMSUNG-MAINTHREAD-V90');
        html = html.replaceAll('Worker v8.3', 'Samsung Hand AR v9');
        html = html.replace(
          '<title>HeroHealth • GoodJunk AR Production</title>',
          '<title>HeroHealth • GoodJunk Samsung Hand AR v9</title>'
        );

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.body.innerHTML = '<div class="loading">⚠️ เปิด Samsung Hand AR v9 ไม่สำเร็จ<br><small>' + String(error.message || error) + '</small><br><button onclick="location.reload()" style="margin-top:14px;min-height:46px;padding:9px 15px;border:0;border-radius:14px;font:inherit;font-weight:900">ลองใหม่</button></div>';
      }
    })();
  </script>
</body>
</html>
