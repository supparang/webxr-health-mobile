<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>GoodJunk • Samsung Hand AR v9.1</title>
  <style>
    html,body{margin:0;width:100%;height:100%;display:grid;place-items:center;background:#ecfdf5;font-family:system-ui,sans-serif;color:#166534}
    .loading{padding:24px;text-align:center;font-size:clamp(18px,4vw,28px);font-weight:900}
  </style>
</head>
<body>
  <div class="loading">🖐️ กำลังเปิด Samsung Hand AR Compatibility v9.1…</div>
  <script>
    (async () => {
      try {
        const RELEASE = '20260722-samsung-loader-v91';
        const response = await fetch('./goodjunk-ar-production.html?source=' + RELEASE + '&t=' + Date.now(), { cache: 'no-store' });
        if (!response.ok) throw new Error('HTTP ' + response.status);
        let html = await response.text();

        const runtimeAssignment = /const\s+HAND_V7_JS\s*=\s*['"][^'"]+goodjunk-mobile-handlandmarker-v7\.js[^'"]*['"]\s*;/;
        if (!runtimeAssignment.test(html)) {
          throw new Error('Samsung runtime injection point not found');
        }
        html = html.replace(
          runtimeAssignment,
          "const HAND_V7_JS = './patches/goodjunk/goodjunk-mobile-hand-runtime-v9.js?v=20260722-91';"
        );

        html = html.replace(
          /const\s+WORKER_BOOTSTRAP_JS\s*=\s*['"][^'"]+['"]\s*;/,
          "const WORKER_BOOTSTRAP_JS = './patches/goodjunk/goodjunk-worker-v83-bootstrap.js?v=20260722-91';"
        );

        html = html.replaceAll('WORKER-V83', 'SAMSUNG-MAINTHREAD-V91');
        html = html.replaceAll('Worker v8.3', 'Samsung Hand AR v9.1');
        html = html.replaceAll('Mobile Hand Worker runtime v8.3 not loaded', 'Samsung Hand AR runtime v9.1 not loaded');
        html = html.replace(
          '<title>HeroHealth • GoodJunk AR Production</title>',
          '<title>HeroHealth • GoodJunk Samsung Hand AR v9.1</title>'
        );

        console.info('[GoodJunk Samsung Loader]', {
          release: RELEASE,
          samsungBrowser: /SamsungBrowser/i.test(navigator.userAgent || ''),
          runtimeInjected: html.includes('goodjunk-mobile-hand-runtime-v9.js?v=20260722-91')
        });

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.body.innerHTML = '<div class="loading">⚠️ เปิด Samsung Hand AR v9.1 ไม่สำเร็จ<br><small>' + String(error.message || error) + '</small><br><button onclick="location.reload()" style="margin-top:14px;min-height:46px;padding:9px 15px;border:0;border-radius:14px;font:inherit;font-weight:900">ลองใหม่</button></div>';
      }
    })();
  </script>
</body>
</html>
