<!-- NOTE: แก้เฉพาะ data-href ของ BrushVR ให้เป็น "./brush-vr.html" (root) -->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth — Hub</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="./favicon.ico" />
  <style>
    /* (คง CSS เดิมของคุณทั้งหมดได้เลย) */
  </style>
</head>

<body>
  <!-- (คง body เดิมของคุณทั้งหมดได้เลย) -->

  <!-- ✅ ส่วน Hygiene games: แก้ BrushVR ให้ชี้ root launcher -->
  <!-- ... -->

  <script>
  (function(){
    'use strict';

    function pageUrl(){ return location.href.split('#')[0]; }
    function parseQS(){ try{ return new URL(pageUrl()).searchParams; }catch{ return new URLSearchParams(); } }
    const QS = parseQS();

    const PASS_KEYS = ['pid','run','diff','time','seed','studyId','phase','conditionGroup','log','view','api','ai','debug'];

    function applyPassThrough(href){
      const u = new URL(href, location.href);
      for (const k of PASS_KEYS){
        if (!u.searchParams.has(k) && QS.has(k)){
          const v = QS.get(k);
          if (v != null && String(v).trim() !== '') u.searchParams.set(k, v);
        }
      }
      if (!u.searchParams.has('hub') || String(u.searchParams.get('hub')||'').trim()===''){
        u.searchParams.set('hub', location.href);
      }
      return u.toString();
    }

    function bindGames(){
      const cards = document.querySelectorAll('.game[data-href]');
      cards.forEach(card=>{
        card.addEventListener('click', ()=>{
          const href = card.getAttribute('data-href');
          if(!href) return;
          location.href = applyPassThrough(href);
        }, { passive:true });
      });
    }

    bindGames();
  })();
  </script>

</body>
</html>
