<script>
'use strict';

// ====== CONFIG ======
const API_ENDPOINT = 'https://sfd8q2ch3k.execute-api.us-east-2.amazonaws.com/';

// ====== helpers ======
function qs(k, d=''){
  try { return new URL(location.href).searchParams.get(k) ?? d; }
  catch { return d; }
}
function clamp(v,min,max){ v = Number(v); if(!Number.isFinite(v)) v=min; return Math.max(min, Math.min(max, v)); }
function nowSeed(){ return String(Date.now()); }

// ✅ normalize/clean URL-like params (กันคนส่งมาแบบ encode แล้ว/หรือมี %3A%2F%2F)
function normalizeMaybeEncodedUrl(v){
  v = String(v ?? '').trim();
  if(!v) return '';
  // ถ้ามี %3A หรือ %2F เยอะ ๆ ลอง decode 1 รอบ
  if(/%3A|%2F|%3F|%26|%3D/i.test(v)){
    try { v = decodeURIComponent(v); } catch(e){}
  }
  return v.trim();
}

// ====== params (pass-through) ======
const P = {
  run:  String(qs('run','play')).toLowerCase() || 'play',
  diff: String(qs('diff','normal')).toLowerCase() || 'normal',
  time: clamp(qs('time','80'), 20, 300),
  seed: String(qs('seed','') || nowSeed()),
  pid:  String(qs('pid','')).trim() || 'anon',
  view: String(qs('view','')).toLowerCase(),

  // ✅ logger flags
  log:  String(qs('log','')),
  api:  normalizeMaybeEncodedUrl(qs('api','')),  // ✅ Apps Script /exec (สำคัญ)

  // research params
  studyId: String(qs('studyId','')),
  phase: String(qs('phase','')),
  conditionGroup: String(qs('conditionGroup',''))
};

// show chips
document.getElementById('cRun').textContent = P.run;
document.getElementById('cDiff').textContent = P.diff;
document.getElementById('cTime').textContent = String(P.time);
document.getElementById('cPid').textContent = P.pid;

// ✅ build hub url (self) for pass-through
function buildHubUrl(){
  const u = new URL(location.href);
  u.search = '';
  const sp = u.searchParams;

  sp.set('run', P.run);
  sp.set('diff', P.diff);
  sp.set('time', String(P.time));
  sp.set('seed', P.seed);
  sp.set('pid', P.pid);

  if(P.view) sp.set('view', P.view);

  // ✅ logger pass-through
  if(P.log !== '') sp.set('log', P.log);
  if(P.api) sp.set('api', P.api); // ✅ URLSearchParams จะ encode ให้เอง

  // research pass-through
  if(P.studyId) sp.set('studyId', P.studyId);
  if(P.phase) sp.set('phase', P.phase);
  if(P.conditionGroup) sp.set('conditionGroup', P.conditionGroup);

  return u.toString();
}

// ✅ attach common params to any game link safely
function withCommonParams(url){
  const u = new URL(url, location.href);
  const sp = u.searchParams;

  // ⚠️ ใส่ hub เป็น "value" เฉย ๆ ไม่ต้อง encode เอง (URLSearchParams ทำให้)
  sp.set('hub', buildHubUrl());

  sp.set('run', P.run);
  sp.set('diff', P.diff);
  sp.set('time', String(P.time));
  sp.set('seed', P.seed);
  sp.set('pid', P.pid);

  if(P.view) sp.set('view', P.view);

  // ✅ logger pass-through
  if(P.log !== '') sp.set('log', P.log);
  if(P.api) sp.set('api', P.api);

  // research pass-through
  if(P.studyId) sp.set('studyId', P.studyId);
  if(P.phase) sp.set('phase', P.phase);
  if(P.conditionGroup) sp.set('conditionGroup', P.conditionGroup);

  return u.toString();
}

// patch all game links to include pass-through params
const linkIds = [
  'goGoodJunk','goGroups','goHydration','goPlate',
  'goHandwash','goBrush','goMaskCough',
  'goPlanner','goShadow','goRhythm','goJumpDuck','goBalanceHold'
];
for(const id of linkIds){
  const a = document.getElementById(id);
  if(!a) continue;
  a.href = withCommonParams(a.getAttribute('href'));
}

// reset today: clears daily gates for all categories (best-effort)
function getLocalDayKey(){
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${yyyy}-${mm}-${dd}`;
}
function resetToday(){
  const day = getLocalDayKey();
  const prefixes = ['HHA_WARMUP_DONE','HHA_COOLDOWN_DONE','HHA_ZONE_DONE'];
  const cats = ['nutrition','hygiene','fitness'];
  try{
    const keys = [];
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(k) keys.push(k);
    }
    for(const k of keys){
      const hitPrefix = prefixes.some(p=>k.startsWith(p+':') || k.startsWith(p+'::'));
      if(!hitPrefix) continue;
      if(!k.includes(day)) continue;
      const hitCat = cats.some(c=>k.includes(':'+c+':') || k.includes('::'+c+'::') || k.includes('::'+c+':'));
      if(!hitCat) continue;
      localStorage.removeItem(k);
    }
  }catch(_){}
}

// tiny toast
let toastT = 0;
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(()=>{ el.classList.remove('show'); }, 1200);
}
document.getElementById('btnResetToday').addEventListener('click', (e)=>{
  e.preventDefault();
  resetToday();
  toast('Reset today ✅');
});

// ====== 403-safe API probe (no Apollo needed) ======
const apiDot = document.getElementById('apiDot');
const apiTitle = document.getElementById('apiTitle');
const apiMsg = document.getElementById('apiMsg');
const btnRetry = document.getElementById('btnRetry');

let probeLock = false;
function setBanner(state, title, msg){
  apiDot.className = 'dot ' + (state==='ok' ? 'ok' : state==='bad' ? 'bad' : 'warn');
  apiTitle.textContent = title;
  apiMsg.textContent = msg;
}
async function probeAPI(){
  if(probeLock) return;
  probeLock = true;

  setBanner('warn', 'กำลังตรวจสอบระบบ…', 'กำลัง ping API แบบสั้น ๆ (ถ้า 403 จะใช้โหมดออฟไลน์)');

  try{
    const res = await fetch(API_ENDPOINT, {
      method: 'POST',
      mode: 'cors',
      headers: { 'content-type':'application/json' },
      body: JSON.stringify({ ping: true })
    });

    if(res.status === 200){
      setBanner('ok', 'ออนไลน์ ✅', 'API ตอบกลับปกติ (Hub ใช้งานเต็มรูปแบบ)');
    }else if(res.status === 403){
      setBanner('bad', '403 Forbidden ⚠️', 'API ปฏิเสธสิทธิ์/Origin (แต่ Hub ยังเข้าเกมได้ปกติ) — แนะนำแก้ CORS/Authorizer');
    }else{
      setBanner('warn', `API ตอบ ${res.status}`, 'Hub ยังเข้าเกมได้ปกติ • ถ้าต้องใช้ข้อมูลจาก API ให้ตรวจ route/headers');
    }
  }catch(err){
    setBanner('bad', 'ออฟไลน์/เชื่อมต่อไม่ได้', 'Hub ยังเข้าเกมได้ปกติ • ถ้าใช้ Wi-Fi โรงเรียนลองเปลี่ยนเครือข่ายหรือดู CORS');
  }finally{
    probeLock = false;
  }
}
btnRetry.addEventListener('click', (e)=>{
  e.preventDefault();
  probeAPI();
});
probeAPI();
</script>
