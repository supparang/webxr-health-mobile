<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • Gate</title>
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#9ad7ff" />
  <style>
    :root{
      --bg1:#f4fbff;
      --bg2:#edf8ff;
      --bg3:#fff8ef;

      --card:#ffffff;
      --card2:#f9fdff;

      --line:#d7edf7;
      --line2:#c7e5f5;

      --text:#514a43;
      --muted:#7d766e;

      --blue:#76caff;
      --blue2:#4aacf0;
      --green:#85de77;
      --green2:#56c455;
      --pink:#ff9eca;
      --pink2:#ff78b1;
      --yellow:#ffd86c;
      --yellow2:#ffbc38;
      --red:#ff9393;
      --red2:#f06d6d;

      --shadow:0 18px 40px rgba(88,153,190,.14);
      --shadow-soft:0 10px 24px rgba(88,153,190,.10);

      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      min-height:100%;
      background:
        radial-gradient(circle at top, #ffffff, transparent 32%),
        linear-gradient(180deg,var(--bg1),var(--bg2) 50%,var(--bg3));
      color:var(--text);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    body{
      min-height:100dvh;
      padding:
        calc(12px + var(--safe-top))
        calc(12px + var(--safe-right))
        calc(16px + var(--safe-bottom))
        calc(12px + var(--safe-left));
    }

    #gate-app{
      width:min(980px,100%);
      margin:0 auto;
    }

    .gate-shell{
      display:grid;
      gap:14px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .brand-badge{
      width:58px;
      height:58px;
      border-radius:18px;
      display:grid;
      place-items:center;
      background:linear-gradient(180deg,#fff,#f2fbff);
      border:2px solid var(--line);
      box-shadow:var(--shadow-soft);
      font-size:28px;
      flex:0 0 auto;
    }

    .brand-copy h1{
      margin:0;
      font-size:clamp(26px,4vw,42px);
      line-height:1;
      font-weight:1000;
      color:#7a4b2e;
      letter-spacing:-.02em;
    }

    .brand-copy p{
      margin:6px 0 0;
      color:#7b756d;
      font-size:13px;
      line-height:1.45;
      font-weight:900;
    }

    .chip-link,
    .chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:10px 14px;
      border-radius:999px;
      background:#fff;
      border:2px solid var(--line);
      color:#637786;
      text-decoration:none;
      font-size:14px;
      font-weight:1000;
      box-shadow:var(--shadow-soft);
    }

    .panel{
      background:linear-gradient(180deg,var(--card),var(--card2));
      border:3px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
    }

    .hero{
      padding:18px;
      display:grid;
      grid-template-columns:1.18fr .92fr;
      gap:14px;
      align-items:stretch;
    }

    .hero-copy{
      display:grid;
      gap:10px;
      align-content:start;
    }

    .kicker{
      display:inline-flex;
      align-items:center;
      width:max-content;
      min-height:34px;
      padding:8px 12px;
      border-radius:999px;
      background:#f1fbff;
      border:2px solid var(--line);
      color:#72a5c7;
      font-size:12px;
      font-weight:1000;
      letter-spacing:.08em;
    }

    .hero-copy h2{
      margin:0;
      font-size:clamp(34px,6vw,66px);
      line-height:.96;
      font-weight:1000;
      color:#7b4b2e;
      letter-spacing:-.03em;
    }

    .hero-copy p{
      margin:0;
      font-size:15px;
      line-height:1.7;
      font-weight:900;
      color:#756d66;
    }

    .tag-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .tag{
      min-height:36px;
      padding:8px 12px;
      border-radius:999px;
      background:#fff;
      border:2px solid var(--line);
      color:#687c89;
      font-size:13px;
      font-weight:1000;
    }

    .hero-art{
      position:relative;
      min-height:240px;
      border-radius:24px;
      overflow:hidden;
      background:
        radial-gradient(circle at 72% 10%, rgba(255,255,255,.9), transparent 24%),
        linear-gradient(180deg,#def3ff 0%,#d8efff 48%,#ddefcc 48%,#d7efc9 100%);
      border:2px solid var(--line);
    }

    .hero-lane{
      position:absolute;
      top:0;
      bottom:0;
      width:10px;
      background:rgba(255,255,255,.24);
      border-left:2px solid rgba(255,255,255,.26);
      border-right:2px solid rgba(255,255,255,.26);
    }

    .hero-lane.l1{ left:28%; }
    .hero-lane.l2{ left:44%; }

    .hero-ground{
      position:absolute;
      left:8%;
      right:8%;
      bottom:68px;
      border-top:3px dashed rgba(124,145,110,.28);
    }

    .hero-kid{
      position:absolute;
      left:12%;
      bottom:54px;
      width:104px;
      height:132px;
    }

    .hero-kid .head{
      position:absolute;
      left:24px;
      top:0;
      width:58px;
      height:58px;
      border-radius:50%;
      background:#f2e4bf;
      border:3px solid #e4d4af;
    }

    .hero-kid .body{
      position:absolute;
      left:16px;
      top:52px;
      width:74px;
      height:56px;
      border-radius:18px;
      background:linear-gradient(180deg,#78c8ff,#4fa9ea);
      border:3px solid #6abaf0;
    }

    .hero-kid .arm-l,
    .hero-kid .arm-r,
    .hero-kid .leg-l,
    .hero-kid .leg-r{
      position:absolute;
      background:#f2e4bf;
      border:3px solid #e4d4af;
      border-radius:999px;
    }

    .hero-kid .arm-l{ left:2px; top:60px; width:20px; height:58px; transform:rotate(30deg); }
    .hero-kid .arm-r{ right:2px; top:60px; width:20px; height:58px; transform:rotate(-28deg); }
    .hero-kid .leg-l{ left:28px; top:100px; width:22px; height:60px; transform:rotate(10deg); }
    .hero-kid .leg-r{ left:56px; top:100px; width:22px; height:60px; transform:rotate(-10deg); }

    .hero-obstacle-low,
    .hero-obstacle-high{
      position:absolute;
      right:12%;
      border-radius:20px;
      background:#fff;
      border:3px solid #d6e9f6;
      box-shadow:0 14px 28px rgba(100,160,190,.14);
    }

    .hero-obstacle-low{
      bottom:60px;
      width:82px;
      height:46px;
    }

    .hero-obstacle-high{
      bottom:156px;
      width:82px;
      height:20px;
    }

    .stats-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:12px;
    }

    .stat-card{
      background:#fff;
      border:2px solid var(--line);
      border-radius:20px;
      padding:12px;
      box-shadow:var(--shadow-soft);
      min-width:0;
    }

    .stat-card .k{
      font-size:12px;
      color:#7a91a2;
      font-weight:1000;
      text-transform:uppercase;
      letter-spacing:.06em;
    }

    .stat-card .v{
      margin-top:6px;
      font-size:22px;
      line-height:1.1;
      font-weight:1000;
      color:#4f4841;
      word-break:break-word;
    }

    .warmup-wrap{
      padding:16px;
      display:grid;
      gap:14px;
    }

    .warmup-grid{
      display:grid;
      grid-template-columns:1.15fr .95fr;
      gap:14px;
      align-items:start;
    }

    .stage{
      position:relative;
      min-height:440px;
      border-radius:28px;
      overflow:hidden;
      background:
        radial-gradient(circle at 72% 10%, rgba(255,255,255,.9), transparent 24%),
        linear-gradient(180deg,#def3ff 0%,#d8efff 48%,#ddefcc 48%,#d7efc9 100%);
      border:3px solid var(--line);
      box-shadow:var(--shadow);
    }

    .stage-lane{
      position:absolute;
      top:0;
      bottom:0;
      width:10px;
      background:rgba(255,255,255,.24);
      border-left:2px solid rgba(255,255,255,.26);
      border-right:2px solid rgba(255,255,255,.26);
    }

    .stage-lane.l1{ left:28%; }
    .stage-lane.l2{ left:44%; }

    .stage-ground{
      position:absolute;
      left:6%;
      right:6%;
      bottom:88px;
      border-top:3px dashed rgba(124,145,110,.28);
      z-index:2;
    }

    .runner{
      position:absolute;
      left:12%;
      bottom:30px;
      width:116px;
      height:150px;
      z-index:5;
      transition:transform .14s ease;
    }

    .runner .head{
      position:absolute;
      left:26px;
      top:0;
      width:58px;
      height:58px;
      border-radius:50%;
      background:#f2e4bf;
      border:3px solid #e4d4af;
    }

    .runner .body{
      position:absolute;
      left:18px;
      top:54px;
      width:78px;
      height:58px;
      border-radius:18px;
      background:linear-gradient(180deg,#78c8ff,#4fa9ea);
      border:3px solid #6abaf0;
    }

    .runner .arm-l,
    .runner .arm-r,
    .runner .leg-l,
    .runner .leg-r{
      position:absolute;
      background:#f2e4bf;
      border:3px solid #e4d4af;
      border-radius:999px;
      transition:transform .14s ease, top .14s ease;
    }

    .runner .arm-l{ left:2px; top:60px; width:20px; height:58px; transform:rotate(30deg); }
    .runner .arm-r{ right:2px; top:60px; width:20px; height:58px; transform:rotate(-28deg); }
    .runner .leg-l{ left:30px; top:102px; width:22px; height:60px; transform:rotate(8deg); }
    .runner .leg-r{ left:58px; top:102px; width:22px; height:60px; transform:rotate(-8deg); }

    .runner.jump{ transform:translateY(-42px); }
    .runner.jump .leg-l{ transform:rotate(-18deg); }
    .runner.jump .leg-r{ transform:rotate(18deg); }
    .runner.jump .arm-l{ transform:rotate(-16deg); }
    .runner.jump .arm-r{ transform:rotate(16deg); }

    .runner.duck{ transform:translateY(16px) scaleY(.84); }
    .runner.duck .leg-l{ transform:rotate(44deg); top:108px; }
    .runner.duck .leg-r{ transform:rotate(-44deg); top:108px; }

    .obstacle{
      position:absolute;
      right:12%;
      z-index:7;
      border-radius:22px;
      background:#fff;
      border:3px solid #d6e9f6;
      box-shadow:0 14px 28px rgba(100,160,190,.14);
      display:grid;
      place-items:center;
      text-align:center;
      color:#4e6b7d;
      font-weight:1000;
    }

    .obstacle.low{
      bottom:58px;
      width:100px;
      height:52px;
    }

    .obstacle.high{
      bottom:164px;
      width:110px;
      height:24px;
    }

    .obstacle span{
      display:block;
      font-size:12px;
      padding:0 8px;
      line-height:1.2;
    }

    .stage-pop{
      position:absolute;
      left:50%;
      top:20px;
      transform:translateX(-50%);
      z-index:20;
      min-height:44px;
      padding:10px 16px;
      border-radius:999px;
      background:rgba(255,255,255,.96);
      border:2px solid var(--line);
      box-shadow:var(--shadow-soft);
      color:#6a6159;
      font-weight:1000;
      opacity:0;
      transition:opacity .14s ease, transform .14s ease;
      pointer-events:none;
    }

    .stage-pop.show{
      opacity:1;
      transform:translateX(-50%) translateY(-4px);
    }

    .warmup-side{
      display:grid;
      gap:12px;
    }

    .mission-card,
    .coach-card,
    .summary-card{
      background:#fff;
      border:2px solid var(--line);
      border-radius:24px;
      padding:16px;
      box-shadow:var(--shadow-soft);
    }

    .mission-card h3,
    .coach-card h3,
    .summary-card h3{
      margin:0 0 12px;
      font-size:18px;
      font-weight:1000;
      color:#6b4327;
    }

    .mission-card p,
    .coach-card p,
    .summary-card p{
      margin:0;
      color:#756d66;
      line-height:1.7;
      font-weight:900;
      font-size:14px;
    }

    .meter{
      display:grid;
      gap:6px;
      margin-top:12px;
    }

    .meter-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      font-size:13px;
      font-weight:1000;
      color:#708595;
    }

    .bar{
      height:16px;
      border-radius:999px;
      overflow:hidden;
      background:#eef6fa;
      border:2px solid #dceef7;
    }

    .bar-fill{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#7fcfff,#7ed957);
      transition:width .18s ease;
    }

    .control-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:12px;
    }

    .control-btn{
      appearance:none;
      border:none;
      min-height:78px;
      border-radius:24px;
      font-size:22px;
      font-weight:1000;
      cursor:pointer;
      box-shadow:var(--shadow-soft);
    }

    .control-btn.jump{
      background:linear-gradient(180deg,var(--blue),var(--blue2));
      color:#fff;
    }

    .control-btn.duck{
      background:linear-gradient(180deg,var(--pink),var(--pink2));
      color:#fff;
    }

    .control-btn:disabled{
      opacity:.5;
      cursor:not-allowed;
    }

    .goal-note{
      margin-top:12px;
      border-radius:18px;
      background:#fffef6;
      border:2px dashed #eadba1;
      padding:12px;
      color:#73673f;
      font-size:13px;
      line-height:1.7;
      font-weight:1000;
    }

    .action-row{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:12px;
    }

    .btn{
      appearance:none;
      border:none;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:52px;
      padding:12px 16px;
      border-radius:20px;
      font-size:17px;
      font-weight:1000;
      cursor:pointer;
      box-shadow:var(--shadow-soft);
    }

    .btn.primary{
      background:linear-gradient(180deg,var(--green),var(--green2));
      color:#173d12;
    }

    .btn.secondary{
      background:#fff;
      color:#66727a;
      border:2px solid var(--line);
    }

    .btn.yellow{
      background:linear-gradient(180deg,var(--yellow),var(--yellow2));
      color:#6e4300;
    }

    .cooldown-grid{
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:14px;
    }

    .grade-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:84px;
      height:84px;
      border-radius:50%;
      background:#fff;
      border:3px solid var(--line);
      box-shadow:var(--shadow-soft);
      font-size:34px;
      font-weight:1000;
      color:#6a6159;
    }

    .grade-pill.s{ background:#fff8d8; border-color:#ffe08a; color:#9e6900; }
    .grade-pill.a{ background:#f3ffe6; border-color:#cae8a4; color:#4d8225; }
    .grade-pill.b{ background:#eefaff; border-color:#cde7f6; color:#3c6a85; }
    .grade-pill.c{ background:#fff5ef; border-color:#efd8c5; color:#8b6148; }
    .grade-pill.d{ background:#fff1f1; border-color:#f1c7c7; color:#985353; }

    .cooldown-head{
      display:flex;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;
    }

    .cooldown-copy{
      flex:1 1 280px;
      min-width:0;
    }

    .cooldown-copy h2{
      margin:0;
      font-size:clamp(28px,4vw,42px);
      line-height:1.05;
      font-weight:1000;
      color:#7b4b2e;
    }

    .cooldown-copy p{
      margin:8px 0 0;
      color:#776f67;
      line-height:1.65;
      font-weight:900;
    }

    .summary-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:12px;
      margin-top:14px;
    }

    .sum-card{
      border-radius:22px;
      background:#fff;
      border:2px solid var(--line);
      padding:14px;
      text-align:center;
      box-shadow:var(--shadow-soft);
    }

    .sum-card .k{
      font-size:12px;
      color:#7990a0;
      font-weight:1000;
      text-transform:uppercase;
      letter-spacing:.06em;
    }

    .sum-card .v{
      margin-top:8px;
      font-size:30px;
      line-height:1;
      font-weight:1000;
      color:#534c45;
    }

    .reward-box{
      display:grid;
      grid-template-columns:84px 1fr;
      gap:12px;
      align-items:center;
      padding:14px;
      border-radius:24px;
      background:linear-gradient(180deg,#fffef5,#fff);
      border:2px solid #f0e0a5;
    }

    .reward-icon{
      width:84px;
      height:84px;
      border-radius:22px;
      display:grid;
      place-items:center;
      background:#fff;
      border:2px solid #f0e0a5;
      font-size:42px;
    }

    .reward-copy h3{
      margin:0;
      font-size:24px;
      line-height:1.1;
      font-weight:1000;
      color:#80591b;
    }

    .reward-copy p{
      margin:6px 0 0;
      color:#7d745d;
      line-height:1.6;
      font-size:14px;
      font-weight:900;
    }

    .small-note{
      color:#8a837c;
      font-size:12px;
      font-weight:1000;
      text-align:center;
      margin-top:2px;
    }

    .error-card{
      padding:18px;
      white-space:pre-wrap;
      word-break:break-word;
      line-height:1.6;
      color:#7f1d1d;
      background:#fff1f1;
      border:2px solid #f3c9c9;
      border-radius:24px;
      box-shadow:var(--shadow-soft);
    }

    @media (max-width:920px){
      .hero,
      .warmup-grid,
      .cooldown-grid{
        grid-template-columns:1fr;
      }

      .stats-grid{
        grid-template-columns:1fr 1fr;
      }

      .summary-grid{
        grid-template-columns:1fr;
      }

      .action-row{
        grid-template-columns:1fr;
      }
    }

    @media (max-width:640px){
      .stats-grid,
      .control-grid{
        grid-template-columns:1fr;
      }

      .stage{
        min-height:400px;
      }

      .runner{
        width:102px;
        height:138px;
      }

      .runner .head{
        width:54px;
        height:54px;
        left:22px;
      }

      .runner .body{
        width:72px;
        height:54px;
        left:14px;
        top:50px;
      }

      .runner .arm-l,
      .runner .arm-r{
        width:18px;
        height:54px;
        top:56px;
      }

      .runner .leg-l,
      .runner .leg-r{
        width:20px;
        height:54px;
        top:96px;
      }

      .runner .leg-l{ left:24px; }
      .runner .leg-r{ left:50px; }
    }
  </style>
</head>
<body>
  <div id="gate-app"></div>

  <script type="module">
    import bootGate from './gate/gate-core.js?v=20260414a-jumpduck-gate-final';

    const root = document.getElementById('gate-app');
    const JD_DEFAULT_HUB = 'https://supparang.github.io/webxr-health-mobile/herohealth/fitness-zone.html';
    const JD_DEFAULT_LAUNCHER = 'https://supparang.github.io/webxr-health-mobile/fitness/jumpduck.html';

    function qs(name, fallback = '') {
      try {
        return new URL(location.href).searchParams.get(name) ?? fallback;
      } catch (_) {
        return fallback;
      }
    }

    function safeAbsUrl(raw, fallback = '') {
      const value = String(raw || '').trim();
      try {
        if (value) return new URL(value, location.href).href;
      } catch (_) {}
      return fallback || '';
    }

    function normalizeHubHref(raw) {
      const href = safeAbsUrl(raw, JD_DEFAULT_HUB);
      const s = String(href || '').toLowerCase();

      if (
        !href ||
        s.endsWith('/webxr-health-mobile/fitness') ||
        s.endsWith('/webxr-health-mobile/fitness/') ||
        s === 'https://supparang.github.io/webxr-health-mobile/fitness/' ||
        s === 'https://supparang.github.io/webxr-health-mobile/fitness'
      ) {
        return JD_DEFAULT_HUB;
      }
      return href;
    }

    function compactId(id = '') {
      return String(id || '')
        .trim()
        .toLowerCase()
        .replace(/[_\s]+/g, '-')
        .replace(/[^a-z0-9-]/g, '')
        .replace(/--+/g, '-')
        .replace(/^-+|-+$/g, '');
    }

    function normalizeGameId(id = '') {
      const raw = compactId(id);
      if (raw === 'jumpduck') return 'jump-duck';
      return raw;
    }

    function safeNum(v, fallback = 0) {
      const n = Number(v);
      return Number.isFinite(n) ? n : fallback;
    }

    function esc(s = '') {
      return String(s)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function buildRunUrl(ctx) {
      const launcher = safeAbsUrl(ctx.launcher, JD_DEFAULT_LAUNCHER);
      const u = new URL(launcher, location.href);

      u.searchParams.set('pid', ctx.pid);
      u.searchParams.set('name', ctx.name);
      u.searchParams.set('run', ctx.run);
      u.searchParams.set('diff', ctx.diff);
      u.searchParams.set('time', ctx.time);
      u.searchParams.set('view', ctx.view);
      u.searchParams.set('seed', ctx.seed);
      u.searchParams.set('mode', ctx.mode);
      u.searchParams.set('game', 'jump-duck');
      u.searchParams.set('gameId', 'jump-duck');
      u.searchParams.set('theme', 'jump-duck');
      u.searchParams.set('zone', 'fitness');
      u.searchParams.set('cat', 'fitness');
      u.searchParams.set('hub', ctx.hub);
      u.searchParams.set('launcher', launcher);
      u.searchParams.set('wgskip', '1');
      u.searchParams.set('autostart', '1');
      u.searchParams.set('entry', 'warmup-gate');

      if (ctx.studyId) u.searchParams.set('studyId', ctx.studyId);
      if (ctx.debug) u.searchParams.set('debug', '1');

      return u.toString();
    }

    function buildCtx() {
      const game = normalizeGameId(
        qs('game', qs('gameId', qs('theme', '')))
      );

      const phaseRaw = String(qs('phase', qs('gatePhase', 'warmup'))).trim().toLowerCase();
      const phase = phaseRaw === 'cooldown' ? 'cooldown' : 'warmup';

      const hub = normalizeHubHref(qs('hub', qs('hubRoot', JD_DEFAULT_HUB)));
      const launcher = safeAbsUrl(qs('launcher', JD_DEFAULT_LAUNCHER), JD_DEFAULT_LAUNCHER);

      const ctx = {
        game,
        phase,
        pid: String(qs('pid', 'anon')).trim() || 'anon',
        name: String(qs('name', qs('nickName', 'Hero'))).trim() || 'Hero',
        studyId: String(qs('studyId', '')).trim(),
        run: String(qs('run', 'play')).trim() || 'play',
        diff: String(qs('diff', 'normal')).trim().toLowerCase() || 'normal',
        time: String(qs('time', '60')).trim() || '60',
        view: String(qs('view', 'mobile')).trim().toLowerCase() || 'mobile',
        seed: String(qs('seed', Date.now())).trim(),
        mode: String(qs('mode', 'training')).trim().toLowerCase() || 'training',
        hub,
        launcher,
        next: safeAbsUrl(qs('next', ''), ''),
        cdnext: safeAbsUrl(qs('cdnext', ''), ''),
        score: safeNum(qs('score', '0'), 0),
        accuracy: safeNum(qs('accuracy', '0'), 0),
        bestStreak: safeNum(qs('bestStreak', '0'), 0),
        grade: String(qs('grade', 'C')).trim().toUpperCase() || 'C',
        debug: qs('debug', '') === '1'
      };

      if (!ctx.next) ctx.next = buildRunUrl(ctx);
      if (!ctx.cdnext) ctx.cdnext = ctx.hub;

      return ctx;
    }

      root.innerHTML = `

                <p>${ctx.phase === 'cooldown'

                  : 'อุ่นเครื่อง jump / duck ให้พร้อมก่อนเข้าเกมหลัก'}</p>

            <a class="chip-link" href="${esc(ctx.hub)}">🏠 กลับ Fitness Zone</a>

              <p>
                ${ctx.phase === 'cooldown'

                  : 'มินิเกมนี้จะเช็กว่าพร้อมอ่านอุปสรรคต่ำและสูงแล้วหรือยัง low = jump / high = duck'}
              </p>

              <div class="tag-row">
                <div class="tag">👤 ${esc(ctx.name)}</div>
                <div class="tag">🎮 ${esc(ctx.mode)}</div>
                <div class="tag">⚙️ ${esc(ctx.diff)}</div>
                <div class="tag">⏱️ ${esc(ctx.time)}s</div>
              </div>
            </div>

            <div class="hero-art" aria-hidden="true">
              <div class="hero-lane l1"></div>
              <div class="hero-lane l2"></div>
              <div class="hero-ground"></div>

              <div class="hero-kid">
                <div class="head"></div>
                <div class="body"></div>
                <div class="arm-l"></div>
                <div class="arm-r"></div>

              <div class="hero-obstacle-low"></div>

          </section>

          <section class="stats-grid">
            <div class="stat-card">

            </div>
            <div class="stat-card">
              <div class="k">Game</div>
              <div class="v">JumpDuck</div>
            </div>
            <div class="stat-card">
              <div class="k">Hub</div>
              <div class="v">Fitness Zone</div>
            </div>
            <div class="stat-card">
              <div class="k">Flow</div>
              <div class="v">${ctx.phase === 'cooldown' ? 'Zone Return' : 'Warmup → Run'}</div>
            </div>
          </section>

          <div id="jdGateContent"></div>
        </main>
      `;
    }

    function bootJumpDuckWarmup(ctx) {
      const content = document.getElementById('jdGateContent');
      const GOAL = 4;
      const TIME_LIMIT = 15;

      content.innerHTML = `
        <section class="warmup-wrap">
          <div class="warmup-grid">
            <section class="stage" id="jdWarmStage">
              <div class="stage-lane l1"></div>
              <div class="stage-lane l2"></div>
              <div class="stage-ground"></div>

              <div id="jdWarmPop" class="stage-pop">พร้อมแล้ว!</div>

              <div id="jdRunner" class="runner">
                <div class="head"></div>
                <div class="body"></div>
                <div class="arm-l"></div>
                <div class="arm-r"></div>
                <div class="leg-l"></div>
                <div class="leg-r"></div>
              </div>

              <div id="jdObstacle" class="obstacle low">
                <span>LOW<br>JUMP</span>
              </div>
            </section>

            <aside class="warmup-side">
              <section class="mission-card">
                <h3>🎯 เป้าหมาย Warmup</h3>
                <p id="jdWarmDesc">
                  กดให้ถูกว่าอุปสรรคนี้ต้อง <b>JUMP</b> หรือ <b>DUCK</b>
                  เก็บให้ครบ <b>${GOAL}</b> ครั้ง ภายใน <b>${TIME_LIMIT}</b> วินาที
                </p>

                <div class="meter">
                  <div class="meter-head">
                    <span>Progress</span>
                    <strong id="jdWarmScoreText">0 / ${GOAL}</strong>
                  </div>
                  <div class="bar">
                    <div id="jdWarmScoreFill" class="bar-fill"></div>
                  </div>
                </div>

                <div class="meter">
                  <div class="meter-head">
                    <span>Time Left</span>
                    <strong id="jdWarmTimeText">${TIME_LIMIT}s</strong>
                  </div>
                  <div class="bar">
                    <div id="jdWarmTimeFill" class="bar-fill" style="width:100%;"></div>
                  </div>
                </div>

                <div class="goal-note" id="jdWarmNeedText">
                  ตอนนี้: เห็นอุปสรรคต่ำ = กด JUMP
                </div>

                <div class="control-grid">
                  <button id="jdWarmJump" class="control-btn jump" type="button" disabled>⬆️ JUMP</button>
                  <button id="jdWarmDuck" class="control-btn duck" type="button" disabled>⬇️ DUCK</button>
                </div>
              </section>

              <section class="coach-card">
                <h3>🧠 Coach Tip</h3>
                <p id="jdWarmCoach">
                  จำง่าย ๆ เลย: low obstacle อยู่ระดับขา = jump, high obstacle อยู่ระดับหัว = duck
                </p>
              </section>
            </aside>
          </div>

          <div class="action-row">
            <button id="jdWarmStart" class="btn primary" type="button">🎮 เริ่ม Warmup</button>
            <a class="btn secondary" href="${esc(ctx.hub)}">🏠 กลับ Fitness Zone</a>
            <a class="btn secondary" href="${esc(ctx.launcher)}">🕹️ ไปหน้า JumpDuck</a>
          </div>

          <p class="small-note">เมื่อผ่าน warmup ระบบจะเข้า jumpduck.html อัตโนมัติ</p>
        </section>
      `;

      const stage = document.getElementById('jdWarmStage');
      const popEl = document.getElementById('jdWarmPop');
      const runner = document.getElementById('jdRunner');
      const obstacle = document.getElementById('jdObstacle');
      const startBtn = document.getElementById('jdWarmStart');
      const jumpBtn = document.getElementById('jdWarmJump');
      const duckBtn = document.getElementById('jdWarmDuck');
      const scoreText = document.getElementById('jdWarmScoreText');
      const scoreFill = document.getElementById('jdWarmScoreFill');
      const timeText = document.getElementById('jdWarmTimeText');
      const timeFill = document.getElementById('jdWarmTimeFill');
      const needText = document.getElementById('jdWarmNeedText');
      const coachText = document.getElementById('jdWarmCoach');

      const patterns = ['low','high','low','high','low','high','low','high'];
      let state = {
        started: false,
        ended: false,
        timerId: 0,
        timeLeft: TIME_LIMIT,
        correct: 0,
        idx: 0,
        current: 'low'
      };

      function shuffle(arr) {
        const out = [...arr];
        for (let i = out.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [out[i], out[j]] = [out[j], out[i]];
        }
        return out;
      }

      const seq = shuffle(patterns).slice(0, 6);

      function showPop(text) {
        popEl.textContent = text;
        popEl.classList.add('show');
        clearTimeout(popEl._t);
        popEl._t = setTimeout(() => {
          popEl.classList.remove('show');
        }, 560);
      }

      function setRunnerPose(type) {
        runner.classList.remove('jump', 'duck');
        if (type) runner.classList.add(type);

        clearTimeout(runner._t);
        runner._t = setTimeout(() => {
          runner.classList.remove('jump', 'duck');
        }, 180);
      }

      function currentNeedLabel(type) {
        return type === 'low'
          ? 'ตอนนี้: เห็นอุปสรรคต่ำ = กด JUMP'
          : 'ตอนนี้: เห็นอุปสรรคสูง = กด DUCK';
      }

      function renderObstacle() {
        state.current = seq[state.idx % seq.length] || (Math.random() > 0.5 ? 'low' : 'high');

        obstacle.classList.remove('low', 'high');
        obstacle.classList.add(state.current);

        if (state.current === 'low') {
          obstacle.innerHTML = '<span>LOW<br>JUMP</span>';
          needText.textContent = currentNeedLabel('low');
          coachText.textContent = 'ดีมาก ดูระดับขาไว้ก่อน ถ้าต่ำให้กระโดด';
        } else {
          obstacle.innerHTML = '<span>HIGH<br>DUCK</span>';
          needText.textContent = currentNeedLabel('high');
          coachText.textContent = 'ดีมาก ดูระดับหัวไว้ ถ้าสูงให้หมอบ';
        }
      }

      function renderHud() {
        scoreText.textContent = `${state.correct} / ${GOAL}`;
        scoreFill.style.width = `${Math.min(100, (state.correct / GOAL) * 100)}%`;

        timeText.textContent = `${state.timeLeft}s`;
        timeFill.style.width = `${Math.max(0, (state.timeLeft / TIME_LIMIT) * 100)}%`;
      }

      function saveWarmupSnapshot(success) {
        try {
          localStorage.setItem('HHA_JD_LAST_WARMUP', JSON.stringify({
            game: 'jump-duck',
            pid: ctx.pid,
            name: ctx.name,
            diff: ctx.diff,
            mode: ctx.mode,
            success: !!success,
            correct: state.correct,
            target: GOAL,
            timeLeft: state.timeLeft,
            ts: Date.now(),
            next: ctx.next,
            hub: ctx.hub
          }));
        } catch (_) {}
      }

      function goNext() {
        location.href = ctx.next;
      }

      function finishSuccess() {
        state.ended = true;
        clearInterval(state.timerId);
        jumpBtn.disabled = true;
        duckBtn.disabled = true;
        startBtn.disabled = true;
        startBtn.textContent = 'กำลังเข้าเกมหลัก...';
        showPop('ผ่านแล้ว! 🚀');
        needText.textContent = 'เยี่ยมมาก! พร้อมเข้า JumpDuck แล้ว';
        coachText.textContent = 'Warmup ผ่านแล้ว ระบบจะพาเข้าเกมหลักอัตโนมัติ';
        saveWarmupSnapshot(true);
        setTimeout(goNext, 700);
      }

      function finishFail() {
        state.ended = true;
        clearInterval(state.timerId);
        jumpBtn.disabled = true;
        duckBtn.disabled = true;
        startBtn.disabled = false;
        startBtn.textContent = '🔁 ลอง Warmup อีกครั้ง';
        showPop('ลองอีกครั้ง 💪');
        needText.textContent = 'ยังไม่ครบเป้าหมาย ลองใหม่อีกครั้ง';
        coachText.textContent = 'จำให้ชัดอีกครั้ง: low = jump / high = duck';
        saveWarmupSnapshot(false);
      }

      function handleChoice(choice) {
        if (!state.started || state.ended) return;

        const need = state.current === 'low' ? 'jump' : 'duck';
        const ok = choice === need;

        setRunnerPose(choice);

        if (ok) {
          state.correct += 1;
          state.idx += 1;
          showPop('ถูกต้อง!');
          renderHud();

          if (state.correct >= GOAL) {
            finishSuccess();
            return;
          }

          renderObstacle();
        } else {
          state.timeLeft = Math.max(0, state.timeLeft - 2);
          showPop('ยังไม่ใช่');
          renderHud();

          if (state.timeLeft <= 0) {
            finishFail();
          }
        }
      }

      function startWarmup() {
        state = {
          started: true,
          ended: false,
          timerId: 0,
          timeLeft: TIME_LIMIT,
          correct: 0,
          idx: 0,
          current: 'low'
        };

        startBtn.disabled = true;
        startBtn.textContent = 'กำลังเล่น...';
        jumpBtn.disabled = false;
        duckBtn.disabled = false;

        renderObstacle();
        renderHud();
        showPop('เริ่ม!');

        clearInterval(state.timerId);
        state.timerId = setInterval(() => {
          state.timeLeft -= 1;
          renderHud();

          if (state.timeLeft <= 0) {
            finishFail();
          }
        }, 1000);
      }

      startBtn.addEventListener('click', startWarmup);
      jumpBtn.addEventListener('click', () => handleChoice('jump'));
      duckBtn.addEventListener('click', () => handleChoice('duck'));

      stage.addEventListener('pointerdown', (ev) => {
        if (!state.started || state.ended) return;
        const rect = stage.getBoundingClientRect();
        const midY = rect.top + rect.height / 2;
        handleChoice(ev.clientY < midY ? 'jump' : 'duck');
      }, { passive:true });

      window.addEventListener('keydown', (ev) => {
        if (!state.started || state.ended) return;
        const k = String(ev.key || '').toLowerCase();
        if (k === 'arrowup' || k === 'w') handleChoice('jump');
        if (k === 'arrowdown' || k === 's') handleChoice('duck');
      });
    }

    function rewardByGrade(grade) {
      if (grade === 'S') return { icon:'🏆', title:'Legend Return', sub:'รอบนี้ยอดเยี่ยมมาก ทั้งแม่นและนิ่งสุด ๆ' };
      if (grade === 'A') return { icon:'🥇', title:'Gold Return', sub:'ดีมากเลย! พร้อมกลับไปลุยต่อใน Fitness Zone' };
      if (grade === 'B') return { icon:'🥈', title:'Strong Finish', sub:'จบรอบได้ดีแล้ว รอบหน้าดัน accuracy ได้อีกแน่' };
      if (grade === 'C') return { icon:'🥉', title:'Nice Try', sub:'พักสั้น ๆ แล้วค่อยกลับไปลองใหม่อีกครั้ง' };
      return { icon:'⭐', title:'Keep Moving', sub:'ค่อย ๆ ฝึกต่อ เดี๋ยวรอบหน้าจะดีขึ้นอีกมาก' };
    }

    function leadByGrade(grade, acc) {
      if (grade === 'S') return 'สุดยอดมาก! รอบนี้คุมจังหวะ jump และ duck ได้เฉียบสุด ๆ';
      if (grade === 'A') return 'เยี่ยมมาก! รอบนี้ทั้งเร็วและแม่น';
      if (grade === 'B') return 'ทำได้ดีนะ เหลืออีกนิดก็จะขึ้นระดับสูงกว่าเดิม';
      if (acc >= 60) return 'ผ่านได้ดีแล้ว พักก่อนแล้วค่อยกลับไปเล่นต่อ';
      return 'ยังซ้อมต่อได้อีก แต่ตอนนี้กลับไปพักที่ Fitness Zone ก่อน';
    }

    function bootJumpDuckCooldown(ctx) {
      const content = document.getElementById('jdGateContent');
      const grade = String(ctx.grade || 'C').toUpperCase();
      const reward = rewardByGrade(grade);

      try {
        localStorage.setItem('HHA_JD_LAST_COOLDOWN', JSON.stringify({
          game: 'jump-duck',
          pid: ctx.pid,
          name: ctx.name,
          score: ctx.score,
          accuracy: ctx.accuracy,
          bestStreak: ctx.bestStreak,
          grade,
          ts: Date.now(),
          hub: ctx.hub
        }));
      } catch (_) {}

      content.innerHTML = `
        <section class="warmup-wrap">
          <div class="cooldown-grid">
            <section class="panel" style="padding:16px;">
              <div class="cooldown-head">
                <div class="grade-pill ${esc(grade.toLowerCase())}">${esc(grade)}</div>

                <div class="cooldown-copy">
                  <h2>JumpDuck Complete</h2>
                  <p>${esc(leadByGrade(grade, ctx.accuracy))}</p>
                </div>
              </div>

              <div class="summary-grid">
                <div class="sum-card">
                  <div class="k">Score</div>
                  <div class="v">${ctx.score}</div>
                </div>
                <div class="sum-card">
                  <div class="k">Accuracy</div>
                  <div class="v">${ctx.accuracy}%</div>
                </div>
                <div class="sum-card">
                  <div class="k">Best Streak</div>
                  <div class="v">${ctx.bestStreak}</div>
                </div>
              </div>
            </section>

            <aside class="warmup-side">
              <section class="summary-card">
                <h3>🎁 Reward</h3>
                <div class="reward-box">
                  <div class="reward-icon">${reward.icon}</div>
                  <div class="reward-copy">
                    <h3>${esc(reward.title)}</h3>
                    <p>${esc(reward.sub)}</p>
                  </div>
                </div>
              </section>

              <section class="coach-card">
                <h3>🧘 Cooldown Note</h3>
                <p>
                  หายใจเข้าออกช้า ๆ พักสายตาและผ่อนคลายสั้น ๆ
                  จากนั้นค่อยกลับไปเลือกเกมถัดไปใน Fitness Zone
                </p>
              </section>
            </aside>
          </div>

          <div class="action-row">
            <a class="btn primary" href="${esc(ctx.hub)}">🏠 กลับ Fitness Zone</a>
            <a class="btn secondary" href="${esc(ctx.launcher)}">🔁 เล่น JumpDuck อีกครั้ง</a>
            <a class="btn secondary" href="${esc(ctx.hub)}">🗺️ ไปหน้าโซน</a>
          </div>

          <p class="small-note">Cooldown ของ JumpDuck จะพากลับ Fitness Zone เป็นหลัก</p>
        </section>
      `;
    }

    function renderBootError(err) {
      root.innerHTML = `
        <div class="error-card">
Gate load failed

${esc(String(err?.stack || err || 'Unknown error'))}
        </div>
      `;
    }

    async function boot() {
      const ctx = buildCtx();

      if (ctx.game === 'jump-duck') {
        renderJumpDuckShell(ctx);

        if (ctx.phase === 'cooldown') {
          bootJumpDuckCooldown(ctx);
        } else {
          bootJumpDuckWarmup(ctx);
        }
        return;
      }

      try {
        await bootGate(root);
      } catch (err) {
        console.error('[warmup-gate] boot failed:', err);
        renderBootError(err);
      }
    }

    boot();
  </script>
