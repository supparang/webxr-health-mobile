<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth — Warmup/Cooldown Gate</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="./favicon.ico" />
  <link rel="stylesheet" href="./gate/gate-common.css?v=20260314e" />
  <style>
    html,body{
      margin:0;
      min-height:100%;
      background:linear-gradient(180deg,#020617,#0b1226);
      color:#e5e7eb;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans Thai",sans-serif;
    }
    #gate-app{ min-height:100vh; }
    .gate-fatal{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
    }
    .gate-fatal-card{
      width:min(760px,100%);
      border:1px solid rgba(148,163,184,.18);
      background:rgba(2,6,23,.72);
      border-radius:20px;
      padding:18px;
      box-shadow:0 20px 60px rgba(0,0,0,.35);
    }
    .gate-fatal-title{
      font-size:24px;
      font-weight:1100;
      margin-bottom:8px;
    }
    .gate-fatal-msg{
      opacity:.95;
      line-height:1.6;
      word-break:break-word;
      white-space:pre-wrap;
    }
    .gate-fatal-actions{
      margin-top:14px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .gate-fatal-btn{
      min-height:44px;
      padding:10px 14px;
      border-radius:14px;
      border:1px solid rgba(148,163,184,.18);
      background:rgba(148,163,184,.10);
      color:#fff;
      font:inherit;
      font-weight:1000;
      cursor:pointer;
    }
    .gate-fatal-btn.primary{
      border-color:rgba(59,130,246,.28);
      background:rgba(59,130,246,.16);
    }
    .gate-fatal-btn.good{
      border-color:rgba(34,197,94,.28);
      background:rgba(34,197,94,.14);
    }
  </style>
</head>
<body>
  <div id="gate-app"></div>

  <script type="module">
    import { bootGate } from './gate/gate-core.js?v=20260314e';

    const root = document.getElementById('gate-app');

    bootGate(root).catch(err => {
      console.error('[warmup-gate] boot failed', err);

      const hub = (() => {
        try{
          return new URL(location.href).searchParams.get('hub') || './hub.html';
        }catch(e){
          return './hub.html';
        }
      })();

      const next = (() => {
        try{
          return new URL(location.href).searchParams.get('next') || hub;
        }catch(e){
          return hub;
        }
      })();

      root.innerHTML = `
        <div class="gate-fatal">
          <div class="gate-fatal-card">
            <div class="gate-fatal-title">Gate โหลดไม่สำเร็จ</div>
            <div class="gate-fatal-msg">${String(err?.message || err)}</div>
            <div class="gate-fatal-actions">
              <button class="gate-fatal-btn primary" id="gateRetryBtn" type="button">ลองใหม่</button>
              <button class="gate-fatal-btn good" id="gateSkipBtn" type="button">ข้ามไปต่อ</button>
              <button class="gate-fatal-btn" id="gateHubBtn" type="button">กลับหน้าหลัก</button>
            </div>
          </div>
        </div>
      `;

      document.getElementById('gateRetryBtn')?.addEventListener('click', () => location.reload());
      document.getElementById('gateSkipBtn')?.addEventListener('click', () => location.href = next);
      document.getElementById('gateHubBtn')?.addEventListener('click', () => location.href = hub);
    });
  </script>
</body>
</html>
