<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <title>HeroHealth • Gate</title>
  <meta name="theme-color" content="#0f172a" />
  <meta name="color-scheme" content="dark" />
  <link rel="icon" href="./favicon.ico" />

  <style>
    :root{
      --bg:#020617;
      --panel:#0f172a;
      --panel2:#111827;
      --line:rgba(148,163,184,.18);
      --text:#f8fafc;
      --muted:#cbd5e1;
      --blue:#38bdf8;
      --green:#22c55e;
      --gold:#facc15;
      --bad:#ef4444;
      --shadow:0 24px 80px rgba(0,0,0,.38);

      --sat:env(safe-area-inset-top,0px);
      --sar:env(safe-area-inset-right,0px);
      --sab:env(safe-area-inset-bottom,0px);
      --sal:env(safe-area-inset-left,0px);
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      width:100%;
      min-height:100%;
      background:
        radial-gradient(circle at 12% 0%, rgba(56,189,248,.18), transparent 30%),
        radial-gradient(circle at 88% 0%, rgba(34,197,94,.14), transparent 28%),
        linear-gradient(180deg,#020617 0%,#0f172a 56%,#111827 100%);
      color:var(--text);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      -webkit-tap-highlight-color:transparent;
      overscroll-behavior:none;
    }

    body{
      min-height:100dvh;
      overflow:hidden;
    }

    #gate-app{
      width:100vw;
      height:100dvh;
      min-height:100dvh;
      overflow:auto;
      position:relative;
    }

    .gateBoot{
      min-height:100dvh;
      display:grid;
      place-items:center;
      padding:
        calc(18px + var(--sat))
        calc(18px + var(--sar))
        calc(18px + var(--sab))
        calc(18px + var(--sal));
    }

    .gateBootCard{
      width:min(92vw,680px);
      border-radius:30px;
      border:1px solid var(--line);
      background:
        radial-gradient(circle at 50% -10%, rgba(56,189,248,.14), transparent 42%),
        linear-gradient(180deg,rgba(15,23,42,.94),rgba(2,6,23,.90));
      box-shadow:var(--shadow);
      padding:24px;
      text-align:center;
    }

    .gateBootIcon{
      width:88px;
      height:88px;
      border-radius:28px;
      margin:0 auto 14px;
      display:grid;
      place-items:center;
      font-size:48px;
      background:linear-gradient(180deg,#dbeafe,#93c5fd);
      box-shadow:0 20px 42px rgba(56,189,248,.22);
    }

    .gateBootTitle{
      margin:0;
      font-size:clamp(28px,6vw,46px);
      line-height:1.05;
      font-weight:1000;
      letter-spacing:-.04em;
    }

    .gateBootSub{
      margin:10px auto 0;
      max-width:560px;
      color:var(--muted);
      font-size:15px;
      line-height:1.6;
      font-weight:850;
    }

    .gateBootStatus{
      margin-top:16px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      min-height:42px;
      padding:9px 14px;
      border-radius:999px;
      background:rgba(15,23,42,.76);
      border:1px solid var(--line);
      color:#dbeafe;
      font-size:13px;
      font-weight:1000;
    }

    .gateSpin{
      width:18px;
      height:18px;
      border-radius:999px;
      border:3px solid rgba(255,255,255,.24);
      border-top-color:#38bdf8;
      animation:gateSpin .82s linear infinite;
    }

    @keyframes gateSpin{
      to{ transform:rotate(360deg); }
    }

    .gateBootError{
      margin-top:14px;
      display:none;
      text-align:left;

    }

    .gateBootActions{
      margin-top:16px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .gateBootBtn{
      min-height:48px;
      padding:0 16px;
      border:none;
      border-radius:16px;
      font:inherit;

      cursor:pointer;
      color:#052e16;
      background:linear-gradient(180deg,#86efac,#22c55e);
      box-shadow:0 14px 30px rgba(34,197,94,.18);
    }

    .gateBootBtn.secondary{
      color:var(--text);
      background:rgba(15,23,42,.78);
      border:1px solid var(--line);
      box-shadow:none;
    }

    .gateBootMeta{
      margin-top:12px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;

    }

    .gateBootChip{
      min-height:32px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:7px 11px;
      border-radius:999px;
      background:rgba(15,23,42,.62);
      border:1px solid rgba(148,163,184,.15);
      color:#e5e7eb;
      font-size:12px;
      font-weight:1000;
    }

    @media (max-width:640px){
      .gateBootCard{
        border-radius:24px;
        padding:18px;
      }

      .gateBootIcon{
        width:76px;
        height:76px;
        border-radius:24px;
        font-size:42px;
      }

      .gateBootActions{
        flex-direction:column;
      }

      .gateBootBtn{
        width:100%;
      }
    }
  </style>
</head>

<body>
  <main id="gate-app">
    <section class="gateBoot" id="gateBoot">
      <div class="gateBootCard">
        <div class="gateBootIcon" id="gateBootIcon">🎮</div>
        <h1 class="gateBootTitle" id="gateBootTitle">กำลังโหลด Gate</h1>
        <p class="gateBootSub" id="gateBootSub">
          ระบบกำลังโหลด mini-game สำหรับ warmup/cooldown ของเกมนี้
        </p>

        <div class="gateBootMeta">
          <span class="gateBootChip" id="gateBootGame">game</span>
          <span class="gateBootChip" id="gateBootPhase">phase</span>
          <span class="gateBootChip" id="gateBootDiff">normal</span>
        </div>

        <div class="gateBootStatus">
          <span class="gateSpin" aria-hidden="true"></span>
          <span id="gateBootStatusText">Loading gate-core...</span>
        </div>

        <div class="gateBootActions" id="gateBootActions" style="display:none;">
          <button class="gateBootBtn" id="gateRetryBtn" type="button">โหลดใหม่</button>
          <button class="gateBootBtn secondary" id="gateContinueBtn" type="button">ไปต่อ</button>
          <button class="gateBootBtn secondary" id="gateBackBtn" type="button">กลับ</button>
        </div>

        <div class="gateBootError" id="gateBootError"></div>
      </div>
    </section>
  </main>

  <script>
    (function(){
      'use strict';

      const q = new URLSearchParams(location.search);

      const GOODJUNK_LAUNCHER =
        'https://supparang.github.io/webxr-health-mobile/herohealth/goodjunk-launcher.html';

      const HUB_V2 =
        'https://supparang.github.io/webxr-health-mobile/herohealth/hub-v2.html';

      function clean(v, d=''){
        v = String(v ?? '').trim();
        return v || d;
      }

      function safeDecode(v){
        v = String(v || '');
        if(!v) return '';
        try{ return decodeURIComponent(v); }
        catch(_){ return v; }
      }

      function safeUrl(raw, fallback){
        try{
          if(!String(raw || '').trim()) return fallback;
          return new URL(String(raw), location.href).toString();
        }catch(_){
          return fallback;
        }
      }

      function phase(){
        const p = clean(q.get('phase') || q.get('gatePhase'), 'warmup').toLowerCase();
        return p === 'cooldown' ? 'cooldown' : 'warmup';
      }

      function game(){
        return clean(q.get('game') || q.get('gameId') || q.get('theme'), 'game').toLowerCase();
      }

      function isGoodJunkCooldown(){
        const g = game();
        return g === 'goodjunk' && phase() === 'cooldown';
      }

      function defaultZone(){
        const z = clean(q.get('zone') || q.get('cat'), '');
        if(z === 'fitness') return './fitness-zone.html';
        if(z === 'hygiene') return './hygiene-zone.html';
        return './nutrition-zone.html';
      }

      function nextHref(){
        if(isGoodJunkCooldown()){
          return GOODJUNK_LAUNCHER;
        }

        const n = safeDecode(q.get('next') || '');
        if(n) return safeUrl(n, defaultZone());

        if(phase() === 'cooldown'){
          const b = safeDecode(q.get('back') || '');
          if(b) return safeUrl(b, defaultZone());

          return safeUrl(q.get('hub'), defaultZone());
        }

        return defaultZone();
      }

      function backHref(){
        if(isGoodJunkCooldown()){
          return GOODJUNK_LAUNCHER;
        }

        const b = safeDecode(q.get('back') || '');
        if(b) return safeUrl(b, defaultZone());

        return safeUrl(q.get('hub'), defaultZone());
      }

      function hubHref(){
        if(isGoodJunkCooldown()){
          return HUB_V2;
        }

        return safeUrl(q.get('hub'), defaultZone());
      }

      window.HHA_GATE_BOOT = {
        patch: 'v20260505g-GOODJUNK-FINAL-BRUSH-COOLDOWN-RETURN-FIX',
        phase: phase(),
        game: game(),
        nextHref: nextHref(),
        backHref: backHref(),
        hubHref: hubHref(),
        params: Object.fromEntries(q.entries()),
        isGoodJunkCooldown: isGoodJunkCooldown()
      };

      if(isGoodJunkCooldown()){
        window.HH_GATE_FORCE_NEXT = GOODJUNK_LAUNCHER;
        window.HH_GATE_FORCE_BACK = GOODJUNK_LAUNCHER;
        window.HH_GATE_FORCE_HUB = HUB_V2;
      }

      const icon = document.getElementById('gateBootIcon');
      const title = document.getElementById('gateBootTitle');
      const sub = document.getElementById('gateBootSub');
      const gameChip = document.getElementById('gateBootGame');
      const phaseChip = document.getElementById('gateBootPhase');
      const diffChip = document.getElementById('gateBootDiff');
      const status = document.getElementById('gateBootStatusText');
      const errorBox = document.getElementById('gateBootError');
      const actions = document.getElementById('gateBootActions');
      const retryBtn = document.getElementById('gateRetryBtn');
      const continueBtn = document.getElementById('gateContinueBtn');
      const backBtn = document.getElementById('gateBackBtn');

      const g = game();
      const p = phase();

      if(icon){
        icon.textContent =
          g === 'goodjunk' ? '🍎' :
          g === 'plate' ? '🍽️' :
          g === 'hydration' ? '💧' :
          g === 'brush' ? '🪥' :
          g === 'groups' ? '🥦' :
          g === 'jump-duck' || g === 'jumpduck' ? '🐶' :
          '🎮';
      }

      if(title){
        title.textContent = p === 'cooldown'
          ? 'กำลังโหลด Cooldown'
          : 'กำลังโหลด Warmup';
      }

      if(sub){
        sub.textContent = p === 'cooldown'
          ? 'ระบบจะเปิด mini-game ทบทวนหลังเล่น ก่อนกลับปลายทาง'
          : 'ระบบจะเปิด mini-game เตรียมตัวก่อนเข้าเกมหลัก';
      }

      if(gameChip) gameChip.textContent = g;
      if(phaseChip) phaseChip.textContent = p;
      if(diffChip) diffChip.textContent = clean(q.get('diff'), 'normal');

      retryBtn?.addEventListener('click', function(){
        location.reload();
      });

      continueBtn?.addEventListener('click', function(ev){
        ev.preventDefault();
        ev.stopPropagation();
        location.href = nextHref();
      });

      backBtn?.addEventListener('click', function(ev){
        ev.preventDefault();
        ev.stopPropagation();
        location.href = backHref();
      });

      window.HHA_GATE_SHOW_ERROR = function(err){
        if(status) status.textContent = 'โหลด Gate ไม่สำเร็จ';
        if(errorBox){
          errorBox.style.display = 'block';
          errorBox.textContent = String(err && (err.stack || err.message) || err || 'Unknown error');
        }
        if(actions){
          actions.style.display = 'flex';
        }
      };

      window.HHA_GATE_HIDE_BOOT = function(){
        const boot = document.getElementById('gateBoot');
        if(boot) boot.remove();
      };
    })();
  </script>

  <script>
    /*
      === PATCH v20260505g-BRUSH-WARMUP-COOLDOWN-RETURN-FIX ===
      Brush only:
      - phase=warmup: complete 8/8 -> next brush.html
      - phase=cooldown: complete 6/6 / Brush Smile Cooldown -> Hygiene Zone
      - keeps shared warmup-gate.html, same pattern as Handwash
      - does not affect GoodJunk / other games
    */
    (function(){
      'use strict';

      const q = new URLSearchParams(location.search || '');
      const game = String(q.get('game') || q.get('gameId') || q.get('theme') || '').toLowerCase();
      const phase = String(q.get('phase') || q.get('gatePhase') || 'warmup').toLowerCase() === 'cooldown'
        ? 'cooldown'
        : 'warmup';

      if(game !== 'brush') return;

      let fired = false;
      let observer = null;
      let intervalId = 0;
      const startedAt = Date.now();

      function decodeMaybeTwice(v){
        v = String(v || '').trim();
        for(let i = 0; i < 2; i++){
          try{
            const next = decodeURIComponent(v);
            if(next === v) break;
            v = next;
          }catch(_){
            break;
          }
        }
        return v;
      }

      function heroBase(){
        try{
          const marker = '/herohealth/';
          const idx = location.pathname.indexOf(marker);
          if(idx >= 0){
            return location.origin + location.pathname.slice(0, idx + marker.length);
          }
          return new URL('./', location.href).toString();
        }catch(_){
          return 'https://supparang.github.io/webxr-health-mobile/herohealth/';
        }
      }

      function heroUrl(path){
        return new URL(String(path || '').replace(/^\/+/, ''), heroBase());
      }

      function safeUrl(raw){
        raw = String(raw || '').trim();
        if(!raw) return '';
        try{
          return new URL(decodeMaybeTwice(raw), heroBase()).toString();
        }catch(_){
          return '';
        }
      }

      function fallbackHygieneZone(){
        const u = heroUrl('hygiene-zone.html');

        ['pid','name','diff','time','view'].forEach(k => {
          const v = q.get(k);
          if(v) u.searchParams.set(k, v);
        });

        u.searchParams.set(
          'hub',
          q.get('hubRoot') ||
          q.get('rootHub') ||
          'https://supparang.github.io/webxr-health-mobile/herohealth/hub.html'
        );

        return u.toString();
      }

      function rejectLoop(url){
        if(!url) return true;
        if(/warmup-gate\.html/i.test(url)) return true;
        if(/vr-brush-kids\/brush\.html/i.test(url)) return true;
        return false;
      }

      function warmupTarget(){
        const next = safeUrl(q.get('next'));
        if(next) return next;

        const key = q.get('nextKey');
        if(key){
          try{
            const stored = sessionStorage.getItem(key);
            const ok = safeUrl(stored);
            if(ok) return ok;
          }catch(_){}
        }

        try{
          const stored = sessionStorage.getItem('HHA_BRUSH_NEXT');
          const ok = safeUrl(stored);
          if(ok) return ok;
        }catch(_){}

        const u = heroUrl('vr-brush-kids/brush.html');
        [
          'pid','name','nick','diff','time','view','run','zone','cat',
          'game','gameId','variant','mode','entry','theme','launcher',
          'hub','back','return','seed'
        ].forEach(k => {
          const v = q.get(k);
          if(v) u.searchParams.set(k, v);
        });

        u.searchParams.set('game', 'brush');
        u.searchParams.set('gameId', 'brush');
        u.searchParams.set('zone', 'hygiene');
        u.searchParams.set('cat', 'hygiene');
        u.searchParams.set('stage', 'howto');
        u.searchParams.set('wgok', '1');
        u.searchParams.set('fromWarmup', '1');

        return u.toString();
      }

      function cooldownTarget(){
        const candidates = [
          q.get('cdnext'),
          q.get('next'),
          q.get('return'),
          q.get('back'),
          q.get('hub')
        ];

        for(const raw of candidates){
          const url = safeUrl(raw);
          if(!url) continue;
          if(rejectLoop(url)) continue;
          if(/hygiene-zone\.html/i.test(url)) return url;
        }

        for(const raw of candidates){
          const url = safeUrl(raw);
          if(!url) continue;
          if(rejectLoop(url)) continue;
          return url;
        }

        return fallbackHygieneZone();
      }

      function targetHref(){
        return phase === 'cooldown' ? cooldownTarget() : warmupTarget();
      }

      function stopWatchers(){
        try{ if(observer) observer.disconnect(); }catch(_){}
        if(intervalId) clearInterval(intervalId);
      }

      function go(reason){
        if(fired) return;
        fired = true;
        stopWatchers();

        const target = targetHref();
        console.log('[brush gate return fix]', phase, reason, target);

        const status = document.getElementById('gateBootStatusText');
        if(status){
          status.textContent = phase === 'cooldown'
            ? 'Brush cooldown complete → returning to Hygiene Zone...'
            : 'Brush warmup complete → continuing...';
        }

        window.setTimeout(() => {
          location.replace(target);
        }, 280);
      }

      function pageText(){
        return String((document.body && document.body.innerText) || '')
          .replace(/\u00a0/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
      }

      function warmupDone(text){
        return /\b8\s*\/\s*8\b/.test(text) ||
          text.includes('ไปแปรงฟัน') ||
          text.includes('แปรงฟันกันเลย') ||
          (text.includes('พร้อมแล้ว') && (text.includes('แปรง') || text.includes('ไปต่อ')));
      }

      function cooldownDone(text){
        return /\b6\s*\/\s*6\b/.test(text) ||
          /ดาว\s*6\s*\/\s*6/.test(text) ||
          text.includes('Brush Smile Cooldown') ||
          text.includes('รอยยิ้มสดใสแล้ว') ||
          text.includes('กลับ HUB ได้เลย') ||
          text.includes('กลับ Hygiene Zone') ||
          text.includes('กลับโซน');
      }

      function ensureBrushReturnButton(){
        if(phase !== 'cooldown') return;

        if(document.getElementById('brushCooldownReturnBtn')) return;

        const btn = document.createElement('button');
        btn.id = 'brushCooldownReturnBtn';
        btn.type = 'button';
        btn.textContent = '🏠 กลับ Hygiene Zone';
        btn.setAttribute('aria-label', 'กลับ Hygiene Zone');
        btn.style.cssText = [
          'position:fixed',
          'right:18px',
          'bottom:18px',
          'z-index:2147483647',
          'min-height:56px',
          'padding:12px 18px',
          'border:0',
          'border-radius:999px',
          'background:linear-gradient(180deg,#dcfff2,#baf4cf)',
          'color:#143a22',
          'font:900 16px system-ui,-apple-system,Segoe UI,sans-serif',
          'box-shadow:0 14px 28px rgba(0,0,0,.28)',
          'cursor:pointer'
        ].join(';');

        btn.addEventListener('click', function(e){
          e.preventDefault();
          e.stopPropagation();
          go('fixed-return-button');
        });

        document.documentElement.appendChild(btn);
      }

      function patchBootButtons(){
        const actions = document.getElementById('gateBootActions');
        const continueBtn = document.getElementById('gateContinueBtn');
        const backBtn = document.getElementById('gateBackBtn');

        if(actions) actions.style.display = 'flex';

        if(continueBtn){
          continueBtn.textContent = phase === 'cooldown' ? 'กลับ Hygiene Zone' : 'ไปต่อ';
          continueBtn.onclick = function(e){
            if(e){
              e.preventDefault();
              e.stopPropagation();
            }
            go('gate-continue-button');
          };
        }

        if(backBtn){
          backBtn.textContent = 'กลับ Hygiene Zone';
          backBtn.onclick = function(e){
            if(e){
              e.preventDefault();
              e.stopPropagation();
            }
            location.href = fallbackHygieneZone();
          };
        }
      }

      function tick(){
        if(fired) return;

        ensureBrushReturnButton();

        const text = pageText();

        if(phase === 'cooldown'){
          if(cooldownDone(text)){
            go('cooldown-complete');
            return;
          }

          /*
            In case gate-core's rendered content does not expose readable "6/6"
            but the URL is already Brush cooldown, never allow it to hang.
          */
          if(Date.now() - startedAt > 4500){
            go('cooldown-timeout-fallback');
            return;
          }
        }else{
          if(warmupDone(text)){
            go('warmup-complete');
            return;
          }

          if(Date.now() - startedAt > 45000){
            patchBootButtons();
          }
        }
      }

      document.addEventListener('click', function(e){
        if(phase !== 'cooldown') return;

        const btn = e.target && e.target.closest
          ? e.target.closest('button,a,[role="button"]')
          : null;

        if(!btn) return;

        const label = String(btn.textContent || btn.getAttribute('aria-label') || '')
          .replace(/\s+/g, ' ')
          .trim();

        if(label.includes('กลับ') || label.includes('HUB') || label.includes('Zone') || label.includes('โซน')){
          e.preventDefault();
          e.stopPropagation();
          if(e.stopImmediatePropagation) e.stopImmediatePropagation();
          go('captured-return-click');
        }
      }, true);

      observer = new MutationObserver(tick);
      observer.observe(document.documentElement, {
        childList:true,
        subtree:true,
        characterData:true,
        attributes:true
      });

      intervalId = window.setInterval(tick, 250);

      window.addEventListener('DOMContentLoaded', tick);
      window.addEventListener('load', tick);
      window.addEventListener('pageshow', tick);

      window.setTimeout(tick, 60);
      window.setTimeout(tick, 500);
      window.setTimeout(tick, 1500);
    })();
  </script>

<script>
    /*
      === PATCH v20260505-GOODJUNK-COOLDOWN-FINAL-LINK-FIX ===
      FINAL RULE:
      - กลับหน้าหลัก / Home => hub-v2.html
      - กลับหน้าโหมดเกม / กลับหน้าเลือกเกม / เลือกโหมด => goodjunk-launcher.html
      สำคัญ:
      - ไม่ใช้ MutationObserver
      - ไม่ใช้ setInterval ถาวร
      - ใช้ capture click ดักตอนกดจริง
      - mark ปุ่มซ้ำแค่ไม่กี่รอบหลัง gate-core render
    */
    (function(){
      'use strict';

      const qs = new URLSearchParams(location.search || '');

      const GOODJUNK_LAUNCHER =
        'https://supparang.github.io/webxr-health-mobile/herohealth/goodjunk-launcher.html';

      const HUB_V2 =
        'https://supparang.github.io/webxr-health-mobile/herohealth/hub-v2.html';

      function isGoodJunkCooldown(){
        const game = String(qs.get('game') || qs.get('gameId') || '').toLowerCase();
        const phase = String(qs.get('phase') || '').toLowerCase();
        return game === 'goodjunk' && phase === 'cooldown';
      }

      if(!isGoodJunkCooldown()) return;

      window.HH_GATE_FORCE_NEXT = GOODJUNK_LAUNCHER;
      window.HH_GATE_FORCE_BACK = GOODJUNK_LAUNCHER;
      window.HH_GATE_FORCE_HUB = HUB_V2;

      function go(url){
        window.location.href = url;
      }

      function labelOf(el){
        return String(
          (el && (
            el.textContent ||
            el.getAttribute('aria-label') ||
            el.getAttribute('title') ||
            ''
          )) || ''
        ).replace(/\s+/g, ' ').trim();
      }

      function isGameModeButton(el){
        const text = labelOf(el);
        return (
          text.includes('กลับหน้าเลือกเกม') ||
          text.includes('กลับหน้าโหมดเกม') ||
          text.includes('หน้าโหมดเกม') ||
          text.includes('เลือกเกม') ||
          text.includes('เลือกโหมด') ||
          text.includes('กลับเลือกโหมด')
        );
      }

      function isMainButton(el){
        const text = labelOf(el);
        return (
          text.includes('กลับหน้าหลัก') ||
          text.includes('หน้าหลัก') ||
          text.includes('Home')
        );
      }

      function markButtons(){
        const buttons = Array.from(document.querySelectorAll('button, a, [role="button"]'));

        buttons.forEach(el => {
          if(isGameModeButton(el)){
            el.dataset.hhFixedTarget = 'goodjunk-launcher';

            if(el.tagName && el.tagName.toLowerCase() === 'a'){
              el.setAttribute('href', GOODJUNK_LAUNCHER);
            }
          }

          if(isMainButton(el)){
            el.dataset.hhFixedTarget = 'hub-v2';

            if(el.tagName && el.tagName.toLowerCase() === 'a'){
              el.setAttribute('href', HUB_V2);
            }
          }
        });
      }

      document.addEventListener('click', function(ev){
        const el = ev.target && ev.target.closest
          ? ev.target.closest('button, a, [role="button"]')
          : null;

        if(!el) return;

        const fixed = el.dataset ? el.dataset.hhFixedTarget : '';

        if(fixed === 'goodjunk-launcher' || isGameModeButton(el)){
          ev.preventDefault();
          ev.stopPropagation();
          if(ev.stopImmediatePropagation) ev.stopImmediatePropagation();
          go(GOODJUNK_LAUNCHER);
          return false;
        }

        if(fixed === 'hub-v2' || isMainButton(el)){
          ev.preventDefault();
          ev.stopPropagation();
          if(ev.stopImmediatePropagation) ev.stopImmediatePropagation();
          go(HUB_V2);
          return false;
        }
      }, true);

      function boot(){
        markButtons();

        /*
          gate-core render ปุ่มทีหลังได้ จึง mark ซ้ำแค่ไม่กี่รอบพอ
          ห้ามใช้ MutationObserver / setInterval ถาวรใน GoodJunk cooldown อีก
        */
        window.setTimeout(markButtons, 300);
        window.setTimeout(markButtons, 900);
        window.setTimeout(markButtons, 1800);
        window.setTimeout(markButtons, 3000);

        try{
          localStorage.setItem('HH_GATE_GOODJUNK_COOLDOWN_TARGET', JSON.stringify({
            patch: 'v20260505g-GOODJUNK-FINAL-BRUSH-COOLDOWN-RETURN-FIX',
            rule: {
              main: HUB_V2,
              mode: GOODJUNK_LAUNCHER
            },
            savedAt: new Date().toISOString()
          }));
        }catch(e){}
      }

      if(document.readyState === 'loading'){
        document.addEventListener('DOMContentLoaded', boot);
      }else{
        boot();
      }
    })();
  </script>

  <script type="module">
    import bootGate from './gate/gate-core.js?v=20260503n-gate-core-goodjunk-flow';

    const root = document.getElementById('gate-app');
    const status = document.getElementById('gateBootStatusText');

    try{
      if(status) status.textContent = 'Starting gate-core...';

      await bootGate(root);

      if(window.HHA_GATE_HIDE_BOOT){
        window.HHA_GATE_HIDE_BOOT();
      }
    }catch(err){
      console.error('[warmup-gate] boot failed', err);

      if(window.HHA_GATE_SHOW_ERROR){
        window.HHA_GATE_SHOW_ERROR(err);
      }
    }
  </script>
</body>
</html>
