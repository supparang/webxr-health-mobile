<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • Gate</title>
  <meta name="color-scheme" content="dark light" />
  <meta name="theme-color" content="#0f172a" />
  <style>
    html,body{
      margin:0;
      min-height:100%;
      background:#020617;
    }
    body{
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    #gate-app{
      min-height:100dvh;
    }
  </style>
</head>
<body>
  <div id="gate-app"></div>

  <script type="module">
    import bootGate from './gate/gate-core.js?v=20260407b-GATE-DAILY-WARMUP-COOLDOWN-HUBV2-CDNEXT-FLOW';

    const root = document.getElementById('gate-app');

    function esc(s=''){
      return String(s)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function fallbackHubHref(){
      try{
        const q = new URLSearchParams(location.search);
        const raw = (q.get('hub') || '').trim();
        if (raw) {
          const resolved = new URL(raw, location.href).href;
          if (
            resolved.includes('/herohealth/hub.html') ||
            resolved.includes('/herohealth/hub-v2.html')
          ) {
            return resolved;
          }
        }
      }catch(_){}
      return new URL('./hub-v2.html', location.href).href;
    }

    function renderBootError(err){
      if (!root) return;

      root.innerHTML = `
        <div style="
          min-height:100dvh;
          display:grid;
          place-items:center;
          padding:18px;
          background:
            radial-gradient(circle at top, rgba(59,130,246,.18), transparent 32%),
            linear-gradient(180deg,#020617 0%,#0f172a 55%,#111827 100%);
          color:#e5e7eb;
          font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
        ">
          <div style="
            width:min(760px,100%);
            border-radius:24px;
            background:rgba(15,23,42,.86);
            border:1px solid rgba(148,163,184,.16);
            box-shadow:0 20px 60px rgba(0,0,0,.34);
            padding:22px;
          ">
            <div style="
              font-size:12px;
              font-weight:800;
              letter-spacing:.08em;
              text-transform:uppercase;
              color:#93c5fd;
              margin-bottom:8px;
            ">HeroHealth Gate</div>

            <h1 style="margin:0 0 10px;font-size:30px;line-height:1.05;">
              Gate load failed
            </h1>

            <p style="margin:0 0 14px;color:#cbd5e1;line-height:1.6;">
              ระบบโหลด warmup / cooldown ไม่สำเร็จ
            </p>

            <pre style="
              margin:0 0 16px;
              white-space:pre-wrap;
              word-break:break-word;
              overflow:auto;
              padding:14px;
              border-radius:16px;
              background:rgba(127,29,29,.28);
              border:1px solid rgba(239,68,68,.22);
              color:#fecaca;
              font:600 12px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace;
            ">${esc(err?.stack || err || 'Unknown error')}</pre>

            <div style="display:flex;gap:10px;flex-wrap:wrap">
              <button id="gateReloadBtn" type="button" style="
                appearance:none;
                border:0;
                border-radius:18px;
                padding:14px 18px;
                font-size:15px;
                font-weight:900;
                cursor:pointer;
                min-width:170px;
                background:linear-gradient(135deg,#38bdf8,#2563eb);
                color:#fff;
                box-shadow:0 12px 26px rgba(37,99,235,.32);
              ">ลองใหม่</button>

              <button id="gateBackBtn" type="button" style="
                appearance:none;
                border:1px solid rgba(148,163,184,.16);
                border-radius:18px;
                padding:14px 18px;
                font-size:15px;
                font-weight:900;
                cursor:pointer;
                min-width:170px;
                background:rgba(15,23,42,.85);
                color:#e5e7eb;
              ">กลับ HUB</button>
            </div>
          </div>
        </div>
      `;

      document.getElementById('gateReloadBtn')?.addEventListener('click', () => {
        location.reload();
      });

      document.getElementById('gateBackBtn')?.addEventListener('click', () => {
        location.href = fallbackHubHref();
      });
    }

    bootGate(root).catch((err) => {
      console.error('[warmup-gate] boot failed:', err);
      renderBootError(err);
    });
  </script>
</body>
</html>
