<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth — Gate Recovery</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="./favicon.ico" />
  <style>
    :root{
      --bg1:#020617;
      --bg2:#0b1226;
      --panel:rgba(2,6,23,.78);
      --stroke:rgba(148,163,184,.18);
      --text:#e5e7eb;
      --muted:#94a3b8;
      --blue:#3b82f6;
      --good:#22c55e;
      --warn:#f59e0b;
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
      --sar: env(safe-area-inset-right, 0px);
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      min-height:100%;
      background:
        radial-gradient(1000px 720px at 50% -10%, rgba(59,130,246,.18), transparent 60%),
        radial-gradient(900px 640px at 10% 10%, rgba(34,197,94,.12), transparent 60%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans Thai", Arial, sans-serif;
    }

    .wrap{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:
        calc(18px + var(--sat))
        calc(18px + var(--sar))
        calc(18px + var(--sab))
        calc(18px + var(--sal));
    }

    .card{
      width:min(760px, 100%);
      border:1px solid var(--stroke);
      background:var(--panel);
      backdrop-filter:blur(10px);
      border-radius:24px;
      box-shadow:0 24px 80px rgba(0,0,0,.35);
      padding:20px;
      display:grid;
      gap:14px;
    }

    .kicker{
      display:inline-flex;
      align-items:center;
      gap:8px;
      width:max-content;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,.18);
      background:rgba(2,6,23,.30);
      color:var(--muted);
      font-size:12px;
      font-weight:1000;
    }

    .title{
      margin:0;
      font-size:clamp(26px, 5vw, 42px);
      line-height:1.05;
      font-weight:1100;
    }

    .sub{
      color:var(--muted);
      font-size:14px;
      font-weight:900;
      line-height:1.6;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }

    @media (max-width:700px){
      .grid{ grid-template-columns:1fr; }
    }

    .panel{
      border:1px solid rgba(148,163,184,.16);
      background:rgba(15,23,42,.42);
      border-radius:18px;
      padding:14px;
    }

    .label{
      color:var(--muted);
      font-size:12px;
      font-weight:1000;
      margin-bottom:6px;
    }

    .value{
      font-size:24px;
      font-weight:1100;
      line-height:1.15;
      word-break:break-word;
    }

    .mono{
      font:12px/1.6 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color:#cbd5e1;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      cursor:pointer;
      min-height:48px;
      padding:12px 14px;
      border-radius:16px;
      border:1px solid rgba(148,163,184,.18);
      background:rgba(148,163,184,.10);
      color:var(--text);
      font:inherit;
      font-weight:1100;
      box-shadow:0 12px 28px rgba(0,0,0,.20);
    }

    .btn.primary{
      border-color:rgba(59,130,246,.28);
      background:rgba(59,130,246,.16);
    }

    .btn.good{
      border-color:rgba(34,197,94,.28);
      background:rgba(34,197,94,.14);
    }

    .btn.warn{
      border-color:rgba(245,158,11,.28);
      background:rgba(245,158,11,.14);
    }

    .note{
      color:var(--muted);
      font-size:12px;
      font-weight:900;
      line-height:1.55;
    }

    .ok{ color:#bbf7d0; }
    .warnTxt{ color:#fde68a; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="kicker">🛟 Gate Recovery Mode</div>
      <h1 class="title" id="title">กำลังพาไปต่อ…</h1>
      <div class="sub" id="sub">หน้า gate กลางถูกเปลี่ยนเป็นโหมดกู้ระบบชั่วคราว เพื่อไม่ให้ทุกเกมจอดำ</div>

      <div class="grid">
        <div class="panel">
          <div class="label">โหมด</div>
          <div class="value" id="uiPhase">—</div>
        </div>
        <div class="panel">
          <div class="label">เกม</div>
          <div class="value" id="uiGame">—</div>
        </div>
        <div class="panel">
          <div class="label">สถานะที่บันทึก</div>
          <div class="value ok" id="uiSaved">—</div>
        </div>
        <div class="panel">
          <div class="label">ปลายทาง</div>
          <div class="value" id="uiTarget">—</div>
        </div>
      </div>

      <div class="panel">
        <div class="label">รายละเอียด</div>
        <div class="mono" id="uiCtx">—</div>
      </div>

      <div class="actions">
        <button class="btn primary" id="btnContinue" type="button">ไปต่อเลย</button>
        <button class="btn good" id="btnHub" type="button">กลับหน้าหลัก</button>
        <button class="btn warn" id="btnReload" type="button">โหลดใหม่</button>
      </div>

      <div class="note">
        โหมดนี้จะ <span class="ok">mark warmup/cooldown ให้ก่อน</span> แล้วพาไปหน้า next/hub โดยไม่เรียก gate-core.js
      </div>
    </div>
  </div>

  <script>
    const qs = (k,d='')=>{ try{ return (new URL(location.href)).searchParams.get(k) ?? d; }catch(e){ return d; } };

    function hhDayKey(){
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function safeAbs(raw, fallback=''){
      try{
        if(!raw) return fallback;
        return new URL(raw, location.href).toString();
      }catch(e){
        return fallback;
      }
    }

    const phaseRaw = String(qs('gatePhase', qs('Phase', qs('phase', 'warmup')))).toLowerCase();
    const phase = phaseRaw === 'cooldown' ? 'cooldown' : 'warmup';
    const game = String(qs('game', 'unknown')).trim() || 'unknown';
    const cat  = String(qs('cat', 'general')).trim() || 'general';
    const pid  = String(qs('pid', 'anon')).trim() || 'anon';
    const hub  = safeAbs(qs('hub', './hub.html'), './hub.html');
    const next = safeAbs(qs('next', ''), hub);
    const target = phase === 'cooldown' ? hub : next;

    function setDone(){
      const day = hhDayKey();
      try{
        localStorage.setItem(`HHA_${phase.toUpperCase()}_DONE:${cat}:${game}:${pid}:${day}`, '1');

        if(phase === 'cooldown'){
          localStorage.setItem(`HHA_COOLDOWN_DONE:${cat}:${game}:${pid}:${day}`, '1');
          localStorage.setItem(`HHA_COOLDOWN_DONE:${cat}:${pid}:${day}`, '1');
        }
      }catch(e){}
    }

    function shortUrl(url){
      try{
        const u = new URL(url);
        const p = u.pathname.split('/').slice(-2).join('/');
        return `${p}${u.search ? ' ?...' : ''}`;
      }catch(e){
        return url;
      }
    }

    function go(url){
      try{
        window.location.assign(url);
      }catch(err1){
        try{
          window.location.href = url;
        }catch(err2){
          try{
            const a = document.createElement('a');
            a.href = url;
            a.rel = 'noopener';
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
            setTimeout(()=>{ try{ a.remove(); }catch(_){} }, 0);
          }catch(err3){
            console.error('[gate-recovery] navigation failed', err3);
          }
        }
      }
    }

    setDone();

    const savedText = phase === 'cooldown'
      ? `บันทึก cooldown แล้ว ✅`
      : `บันทึก warmup แล้ว ✅`;

    document.getElementById('uiPhase').textContent = phase;
    document.getElementById('uiGame').textContent = game;
    document.getElementById('uiSaved').textContent = savedText;
    document.getElementById('uiTarget').textContent = shortUrl(target);

    document.getElementById('title').textContent =
      phase === 'cooldown' ? 'ผ่อนคลายเสร็จแล้ว กำลังกลับ…' : 'วอร์มอัปเสร็จแล้ว กำลังเข้าเกม…';

    document.getElementById('sub').textContent =
      phase === 'cooldown'
        ? 'โหมดกู้ระบบจะพากลับหน้าหลักทันที'
        : 'โหมดกู้ระบบจะพาเข้าเกมหลักทันที';

    document.getElementById('uiCtx').textContent = JSON.stringify({
      phase, game, cat, pid, hub, next, target
    }, null, 2);

    document.getElementById('btnContinue').onclick = ()=> go(target);
    document.getElementById('btnHub').onclick = ()=> go(hub);
    document.getElementById('btnReload').onclick = ()=> location.reload();

    setTimeout(()=> go(target), 450);
  </script>
</body>
</html>
