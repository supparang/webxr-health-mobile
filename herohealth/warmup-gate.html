  <script>
    (function(){
      'use strict';

      const q = new URLSearchParams(location.search || '');

      const BASE = 'https://supparang.github.io/webxr-health-mobile/herohealth/';
      const GOODJUNK_LAUNCHER = BASE + 'goodjunk-launcher.html';
      const HUB_V2 = BASE + 'hub-v2.html';

      function clean(v, d=''){
        v = String(v ?? '').trim();
        return v || d;
      }

      function safeDecode(v){
        v = String(v || '');
        if(!v) return '';
        try{ return decodeURIComponent(v); }
        catch(_){ return v; }
      }

      function normalizeBadGoodJunkPath(url){
        let s = String(url || '');

        s = s.replace(
          'https://supparang.github.io/webxr-health-mobile/goodjunk-launcher.html',
          GOODJUNK_LAUNCHER
        );

        s = s.replace(
          '/webxr-health-mobile/goodjunk-launcher.html',
          '/webxr-health-mobile/herohealth/goodjunk-launcher.html'
        );

        s = s.replace(
          '/herohealth/herohealth/goodjunk-launcher.html',
          '/herohealth/goodjunk-launcher.html'
        );

        return s;
      }

      function safeUrl(raw, fallback){
        try{
          if(!String(raw || '').trim()) return fallback;
          return normalizeBadGoodJunkPath(new URL(String(raw), location.href).toString());
        }catch(_){
          return fallback;
        }
      }

      function phase(){
        const p = clean(q.get('phase') || q.get('gatePhase'), 'warmup').toLowerCase();
        return p === 'cooldown' ? 'cooldown' : 'warmup';
      }

      function game(){
        return clean(q.get('game') || q.get('gameId') || q.get('theme'), 'game').toLowerCase();
      }

      function isGoodJunkCooldown(){
        return game() === 'goodjunk' && phase() === 'cooldown';
      }

      function defaultZone(){
        const z = clean(q.get('zone') || q.get('cat'), '');
        if(z === 'fitness') return BASE + 'fitness-zone.html';
        if(z === 'hygiene') return BASE + 'hygiene-zone.html';
        return BASE + 'nutrition-zone.html';
      }

      function goodJunkTarget(){
        const u = new URL(GOODJUNK_LAUNCHER);

        u.searchParams.set('pid', q.get('pid') || 'anon');
        u.searchParams.set('name', q.get('name') || q.get('nick') || 'Hero');
        u.searchParams.set('diff', q.get('diff') || 'normal');
        u.searchParams.set('time', q.get('time') || '120');
        u.searchParams.set('view', q.get('view') || 'mobile');

        u.searchParams.set('zone', 'nutrition');
        u.searchParams.set('cat', 'nutrition');
        u.searchParams.set('game', 'goodjunk');
        u.searchParams.set('gameId', 'goodjunk');
        u.searchParams.set('mode', 'solo');
        u.searchParams.set('entry', 'cooldown-return');
        u.searchParams.set('theme', 'goodjunk');

        [
          'studyId',
          'conditionGroup',
          'section',
          'session_code',
          'log',
          'api',
          'seed'
        ].forEach(function(k){
          const v = q.get(k);
          if(v) u.searchParams.set(k, v);
        });

        return u.toString();
      }

      function nextHref(){
        if(isGoodJunkCooldown()) return goodJunkTarget();

        const n = safeDecode(q.get('next') || '');
        if(n) return safeUrl(n, defaultZone());

        if(phase() === 'cooldown'){
          const b = safeDecode(q.get('back') || '');
          if(b) return safeUrl(b, defaultZone());

          return safeUrl(q.get('hub'), defaultZone());
        }

        return defaultZone();
      }

      function backHref(){
        if(isGoodJunkCooldown()) return goodJunkTarget();

        const b = safeDecode(q.get('back') || '');
        if(b) return safeUrl(b, defaultZone());

        return safeUrl(q.get('hub'), defaultZone());
      }

      function hubHref(){
        if(isGoodJunkCooldown()) return goodJunkTarget();

        return safeUrl(q.get('hub'), defaultZone());
      }

      window.HHA_GATE_BOOT = {
        patch:'v20260605-GATE-GOODJUNK-PC-MOBILE-PATH-FINAL',
        phase:phase(),
        game:game(),
        nextHref:nextHref(),
        backHref:backHref(),
        hubHref:hubHref(),
        params:Object.fromEntries(q.entries()),
        isGoodJunkCooldown:isGoodJunkCooldown()
      };

      if(isGoodJunkCooldown()){
        const target = goodJunkTarget();

        q.set('hub', target);
        q.set('next', target);
        q.set('back', target);
        q.set('launcher', target);
        q.set('return', target);
        q.set('returnUrl', target);
        q.set('returnTo', target);
        q.set('after', target);
        q.set('done', target);
        q.set('doneUrl', target);
        q.set('cdnext', target);

        history.replaceState(
          null,
          '',
          location.pathname + '?' + q.toString() + (location.hash || '')
        );

        window.HH_GATE_FORCE_NEXT = target;
        window.HH_GATE_FORCE_BACK = target;
        window.HH_GATE_FORCE_HUB = target;

        window.HHA_GATE_RETURN_URL = target;
        window.HHA_GATE_DONE_URL = target;
        window.HHA_NEXT_URL = target;
        window.HHA_BACK_URL = target;
        window.HHA_HUB_URL = target;
        window.HHA_GOODJUNK_COOLDOWN_TARGET = target;

        window.HHA_GATE_BOOT.nextHref = target;
        window.HHA_GATE_BOOT.backHref = target;
        window.HHA_GATE_BOOT.hubHref = target;
        window.HHA_GATE_BOOT.goodjunkCooldownTarget = target;
      }

      const icon = document.getElementById('gateBootIcon');
      const title = document.getElementById('gateBootTitle');
      const sub = document.getElementById('gateBootSub');
      const gameChip = document.getElementById('gateBootGame');
      const phaseChip = document.getElementById('gateBootPhase');
      const diffChip = document.getElementById('gateBootDiff');
      const status = document.getElementById('gateBootStatusText');
      const errorBox = document.getElementById('gateBootError');
      const actions = document.getElementById('gateBootActions');
      const retryBtn = document.getElementById('gateRetryBtn');
      const continueBtn = document.getElementById('gateContinueBtn');
      const backBtn = document.getElementById('gateBackBtn');

      const g = game();
      const p = phase();

      if(icon){
        icon.textContent =
          g === 'goodjunk' ? '🍎' :
          g === 'plate' ? '🍽️' :
          g === 'hydration' ? '💧' :
          g === 'brush' ? '🪥' :
          g === 'groups' ? '🥦' :
          g === 'jump-duck' || g === 'jumpduck' ? '🐶' :
          '🎮';
      }

      if(title){
        title.textContent = p === 'cooldown'
          ? 'กำลังโหลด Cooldown'
          : 'กำลังโหลด Warmup';
      }

      if(sub){
        sub.textContent = p === 'cooldown'
          ? 'ระบบจะเปิด mini-game ทบทวนหลังเล่น ก่อนกลับปลายทาง'
          : 'ระบบจะเปิด mini-game เตรียมตัวก่อนเข้าเกมหลัก';
      }

      if(gameChip) gameChip.textContent = g;
      if(phaseChip) phaseChip.textContent = p;
      if(diffChip) diffChip.textContent = clean(q.get('diff'), 'normal');

      retryBtn?.addEventListener('click', function(){
        location.reload();
      });

      continueBtn?.addEventListener('click', function(ev){
        ev.preventDefault();
        ev.stopPropagation();
        location.href = nextHref();
      });

      backBtn?.addEventListener('click', function(ev){
        ev.preventDefault();
        ev.stopPropagation();
        location.href = backHref();
      });

      window.HHA_GATE_SHOW_ERROR = function(err){
        if(status) status.textContent = 'โหลด Gate ไม่สำเร็จ';
        if(errorBox){
          errorBox.style.display = 'block';
          errorBox.textContent = String(err && (err.stack || err.message) || err || 'Unknown error');
        }
        if(actions) actions.style.display = 'flex';
      };

      window.HHA_GATE_HIDE_BOOT = function(){
        const boot = document.getElementById('gateBoot');
        if(boot) boot.remove();
      };
    })();
  </script>

  <script>
    /*
      === BRUSH WARMUP/COOLDOWN RETURN FIX ===
      Brush only.
    */
    (function(){
      'use strict';

      const q = new URLSearchParams(location.search || '');
      const game = String(q.get('game') || q.get('gameId') || q.get('theme') || '').toLowerCase();
      const phase = String(q.get('phase') || q.get('gatePhase') || 'warmup').toLowerCase() === 'cooldown'
        ? 'cooldown'
        : 'warmup';

      if(game !== 'brush') return;

      let fired = false;
      let observer = null;
      let intervalId = 0;
      const startedAt = Date.now();

      function heroBase(){
        try{
          const marker = '/herohealth/';
          const idx = location.pathname.indexOf(marker);
          if(idx >= 0){
            return location.origin + location.pathname.slice(0, idx + marker.length);
          }
          return new URL('./', location.href).toString();
        }catch(_){
          return 'https://supparang.github.io/webxr-health-mobile/herohealth/';
        }
      }

      function heroUrl(path){
        return new URL(String(path || '').replace(/^\/+/, ''), heroBase());
      }

      function decodeMaybeTwice(v){
        v = String(v || '').trim();
        for(let i = 0; i < 2; i++){
          try{
            const next = decodeURIComponent(v);
            if(next === v) break;
            v = next;
          }catch(_){
            break;
          }
        }
        return v;
      }

      function safeUrl(raw){
        raw = String(raw || '').trim();
        if(!raw) return '';
        try{
          return new URL(decodeMaybeTwice(raw), heroBase()).toString();
        }catch(_){
          return '';
        }
      }

      function fallbackHygieneZone(){
        const u = heroUrl('hygiene-zone.html');

        ['pid','name','diff','time','view'].forEach(function(k){
          const v = q.get(k);
          if(v) u.searchParams.set(k, v);
        });

        u.searchParams.set(
          'hub',
          q.get('hubRoot') ||
          q.get('rootHub') ||
          heroUrl('hub-v2.html').toString()
        );

        return u.toString();
      }

      function rejectLoop(url){
        if(!url) return true;
        if(/warmup-gate\.html/i.test(url)) return true;
        if(/vr-brush-kids\/brush\.html/i.test(url)) return true;
        return false;
      }

      function warmupTarget(){
        const next = safeUrl(q.get('next'));
        if(next) return next;

        const u = heroUrl('vr-brush-kids/brush.html');

        [
          'pid','name','nick','diff','time','view','run','zone','cat',
          'game','gameId','variant','mode','entry','theme','launcher',
          'hub','back','return','seed'
        ].forEach(function(k){
          const v = q.get(k);
          if(v) u.searchParams.set(k, v);
        });

        u.searchParams.set('game', 'brush');
        u.searchParams.set('gameId', 'brush');
        u.searchParams.set('zone', 'hygiene');
        u.searchParams.set('cat', 'hygiene');
        u.searchParams.set('stage', 'howto');
        u.searchParams.set('wgok', '1');
        u.searchParams.set('fromWarmup', '1');

        return u.toString();
      }

      function cooldownTarget(){
        const candidates = [
          q.get('cdnext'),
          q.get('next'),
          q.get('return'),
          q.get('back'),
          q.get('hub')
        ];

        for(const raw of candidates){
          const url = safeUrl(raw);
          if(!url) continue;
          if(rejectLoop(url)) continue;
          if(/hygiene-zone\.html/i.test(url)) return url;
        }

        for(const raw of candidates){
          const url = safeUrl(raw);
          if(!url) continue;
          if(rejectLoop(url)) continue;
          return url;
        }

        return fallbackHygieneZone();
      }

      function targetHref(){
        return phase === 'cooldown' ? cooldownTarget() : warmupTarget();
      }

      function stopWatchers(){
        try{ if(observer) observer.disconnect(); }catch(_){}
        if(intervalId) clearInterval(intervalId);
      }

      function go(reason){
        if(fired) return;
        fired = true;
        stopWatchers();

        const target = targetHref();
        console.log('[brush gate return fix]', phase, reason, target);

        const status = document.getElementById('gateBootStatusText');
        if(status){
          status.textContent = phase === 'cooldown'
            ? 'Brush cooldown complete → returning to Hygiene Zone...'
            : 'Brush warmup complete → continuing...';
        }

        window.setTimeout(function(){
          location.replace(target);
        }, 280);
      }

      function pageText(){
        return String((document.body && document.body.innerText) || '')
          .replace(/\u00a0/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
      }

      function warmupDone(text){
        return /\b8\s*\/\s*8\b/.test(text) ||
          text.includes('ไปแปรงฟัน') ||
          text.includes('แปรงฟันกันเลย') ||
          (text.includes('พร้อมแล้ว') && (text.includes('แปรง') || text.includes('ไปต่อ')));
      }

      function cooldownDone(text){
        return /\b6\s*\/\s*6\b/.test(text) ||
          /ดาว\s*6\s*\/\s*6/.test(text) ||
          text.includes('Brush Smile Cooldown') ||
          text.includes('รอยยิ้มสดใสแล้ว') ||
          text.includes('กลับ HUB ได้เลย') ||
          text.includes('กลับ Hygiene Zone') ||
          text.includes('กลับโซน');
      }

      function tick(){
        if(fired) return;

        const text = pageText();

        if(phase === 'cooldown'){
          if(cooldownDone(text)){
            go('cooldown-complete');
            return;
          }

          if(Date.now() - startedAt > 4500){
            go('cooldown-timeout-fallback');
            return;
          }
        }else{
          if(warmupDone(text)){
            go('warmup-complete');
          }
        }
      }

      document.addEventListener('click', function(e){
        if(phase !== 'cooldown') return;

        const btn = e.target && e.target.closest
          ? e.target.closest('button,a,[role="button"]')
          : null;

        if(!btn) return;

        const label = String(btn.textContent || btn.getAttribute('aria-label') || '')
          .replace(/\s+/g, ' ')
          .trim();

        if(label.includes('กลับ') || label.includes('HUB') || label.includes('Zone') || label.includes('โซน')){
          e.preventDefault();
          e.stopPropagation();
          if(e.stopImmediatePropagation) e.stopImmediatePropagation();
          go('captured-return-click');
        }
      }, true);

      observer = new MutationObserver(tick);
      observer.observe(document.documentElement, {
        childList:true,
        subtree:true,
        characterData:true,
        attributes:true
      });

      intervalId = window.setInterval(tick, 250);

      window.addEventListener('DOMContentLoaded', tick);
      window.addEventListener('load', tick);
      window.addEventListener('pageshow', tick);

      window.setTimeout(tick, 60);
      window.setTimeout(tick, 500);
      window.setTimeout(tick, 1500);
    })();
  </script>

  <script>
    /*
      === GOODJUNK COOLDOWN PC/MOBILE HARD LOCK BEFORE GATE-CORE ===
      แก้ปัญหา PC/Mobile หลุดไป /webxr-health-mobile/goodjunk-launcher.html
      ต้องอยู่ก่อน import gate-core
    */
    (function(){

  <script>
    /*
      === PLATE COOLDOWN RETURN NUTRITION ZONE ===
      Plate only.
    */
    (function(){
      'use strict';

      const BASE = 'https://supparang.github.io/webxr-health-mobile/herohealth/';
      const NUTRITION_ZONE = BASE + 'nutrition-zone.html';
      const HUB = BASE + 'hub.html';

      const qs = new URLSearchParams(location.search || '');

      const game = String(qs.get('game') || '').toLowerCase();
      const gameId = String(qs.get('gameId') || '').toLowerCase();
      const theme = String(qs.get('theme') || '').toLowerCase();
      const entry = String(qs.get('entry') || '').toLowerCase();
      const phase = String(qs.get('phase') || qs.get('gatePhase') || '').toLowerCase();

      const isPlateCooldown =
        phase === 'cooldown' &&
        (
          game === 'plate' ||
          gameId === 'plate' ||
          theme === 'plate' ||
          entry === 'plate' ||
          entry === 'plate-solo' ||
          entry.includes('plate')
        );

      if(!isPlateCooldown) return;

      let fired = false;
      let observer = null;
      let intervalId = 0;

      function setIf(u, k, v){
        v = String(v || '').trim();
        if(v) u.searchParams.set(k, v);
      }

      function nutritionUrl(){
        const u = new URL(NUTRITION_ZONE, location.href);

        u.searchParams.set('pid', qs.get('pid') || 'anon');
        setIf(u, 'name', qs.get('name') || qs.get('nick'));
        setIf(u, 'nick', qs.get('nick') || qs.get('name'));

        u.searchParams.set('diff', qs.get('diff') || 'normal');
        u.searchParams.set('time', qs.get('time') || '120');
        u.searchParams.set('view', qs.get('view') || 'mobile');

        u.searchParams.set('zone', 'nutrition');
        u.searchParams.set('cat', 'nutrition');
        u.searchParams.set('game', 'plate');
        u.searchParams.set('gameId', 'plate');
        u.searchParams.set('mode', qs.get('mode') || 'solo');
        u.searchParams.set('entry', 'plate-solo');
        u.searchParams.set('from', 'plate-cooldown-done');
        u.searchParams.set('hub', HUB);

        [
          'seed',
          'studyId',
          'conditionGroup',
          'section',
          'session_code',
          'log',
          'api'
        ].forEach(function(k){
          setIf(u, k, qs.get(k));
        });

        u.searchParams.delete('run');
        u.searchParams.delete('phase');

        return u.toString();
      }

      const TARGET = nutritionUrl();

      qs.set('next', TARGET);
      qs.set('back', TARGET);
      qs.set('hub', TARGET);
      qs.set('return', TARGET);
      qs.set('returnTo', TARGET);
      qs.set('returnUrl', TARGET);
      qs.set('done', TARGET);
      qs.set('doneUrl', TARGET);
      qs.set('cdnext', TARGET);

      history.replaceState(
        null,
        '',
        location.pathname + '?' + qs.toString() + (location.hash || '')
      );

      window.HH_GATE_FORCE_NEXT = TARGET;
      window.HH_GATE_FORCE_BACK = TARGET;
      window.HH_GATE_FORCE_HUB = TARGET;

      window.HHA_GATE_RETURN_URL = TARGET;
      window.HHA_GATE_DONE_URL = TARGET;
      window.HHA_NEXT_URL = TARGET;
      window.HHA_BACK_URL = TARGET;
      window.HHA_HUB_URL = TARGET;
      window.HHA_PLATE_COOLDOWN_TARGET = TARGET;

      if(window.HHA_GATE_BOOT){
        window.HHA_GATE_BOOT.nextHref = TARGET;
        window.HHA_GATE_BOOT.backHref = TARGET;
        window.HHA_GATE_BOOT.hubHref = TARGET;
        window.HHA_GATE_BOOT.plateCooldownTarget = TARGET;
      }

      function stopWatchers(){
        try{ if(observer) observer.disconnect(); }catch(_){}
        if(intervalId){
          clearInterval(intervalId);
          intervalId = 0;
        }
      }

      function go(reason){
        if(fired) return;

        fired = true;
        stopWatchers();

        try{
          localStorage.setItem('HHA_PLATE_COOLDOWN_RETURN_TARGET', TARGET);
        }catch(e){}

        const status = document.getElementById('gateBootStatusText');
        if(status) status.textContent = 'Plate cooldown complete → returning to Nutrition Zone...';

        window.setTimeout(function(){
          location.replace(TARGET);
        }, 80);
      }

      function labelOf(el){
        return String(
          (el && (
            el.textContent ||
            el.getAttribute('aria-label') ||
            el.getAttribute('title') ||
            ''
          )) || ''
        ).replace(/\s+/g, ' ').trim();
      }

      function isReturnButton(el){
        const text = labelOf(el).toLowerCase();
        const id = String(el && el.id || '').toLowerCase();
        const cls = String(el && el.className || '').toLowerCase();

        return (
          id.includes('gatecontinue') ||
          id.includes('next') ||
          id.includes('done') ||
          id.includes('back') ||
          id.includes('hub') ||
          id.includes('zone') ||
          id.includes('finish') ||
          id.includes('continue') ||
          cls.includes('next') ||
          cls.includes('done') ||
          cls.includes('back') ||
          cls.includes('hub') ||
          cls.includes('zone') ||
          cls.includes('finish') ||
          cls.includes('continue') ||
          text.includes('กลับ') ||
          text.includes('โซน') ||
          text.includes('หน้าหลัก') ||
          text.includes('nutrition') ||
          text.includes('zone') ||
          text.includes('hub') ||
          text.includes('home') ||
          text.includes('เสร็จ') ||
          text.includes('จบ') ||
          text.includes('finish') ||
          text.includes('done')
        );
      }

      function markButtons(){
        const nodes = document.querySelectorAll('a, button, [role="button"]');

        Array.prototype.forEach.call(nodes, function(el){
          if(!isReturnButton(el)) return;

          el.dataset.hhaPlateCooldownReturn = 'nutrition-zone';

          if(el.tagName && el.tagName.toLowerCase() === 'a'){
            el.setAttribute('href', TARGET);
          }
        });
      }

      function pageText(){
        return String((document.body && document.body.innerText) || '')
          .replace(/\u00a0/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
      }

      function cooldownDone(text){
        text = String(text || '');

        return (
          /\b6\s*\/\s*6\b/.test(text) ||
          /\b8\s*\/\s*8\b/.test(text) ||
          /ดาว\s*6\s*\/\s*6/.test(text) ||
          /ดาว\s*8\s*\/\s*8/.test(text) ||
          text.includes('Cooldown complete') ||
          text.includes('cooldown complete') ||
          text.includes('เสร็จสิ้น Cooldown') ||
          text.includes('เสร็จแล้ว') ||
          text.includes('ครบแล้ว') ||
          text.includes('กลับ Nutrition Zone') ||
          text.includes('กลับโซน') ||
          text.includes('กลับ HUB ได้เลย') ||
          text.includes('กลับ Zone')
        );
      }

      function tick(){
        if(fired) return;

        markButtons();

        const text = pageText();
        if(cooldownDone(text)){
          go('cooldown-complete-text');
        }
      }

      document.addEventListener('click', function(ev){
        const el = ev.target && ev.target.closest
          ? ev.target.closest('a, button, [role="button"]')
          : null;

        if(!el) return;
        if(!isReturnButton(el)) return;

        ev.preventDefault();
        ev.stopPropagation();
        if(ev.stopImmediatePropagation) ev.stopImmediatePropagation();

        go('captured-return-click');

        return false;
      }, true);

      window.goDone = function(){ go('goDone'); };
      window.goNext = function(){ go('goNext'); };
      window.goBack = function(){ go('goBack'); };
      window.goHub = function(){ go('goHub'); };
      window.finishGate = function(){ go('finishGate'); };
      window.finishCooldown = function(){ go('finishCooldown'); };
      window.completeCooldown = function(){ go('completeCooldown'); };
      window.HHA_GATE_GO_NEXT = function(){ go('HHA_GATE_GO_NEXT'); };
      window.HHA_GATE_GO_BACK = function(){ go('HHA_GATE_GO_BACK'); };
      window.HHA_GATE_GO_HUB = function(){ go('HHA_GATE_GO_HUB'); };

      try{
        observer = new MutationObserver(tick);
        observer.observe(document.documentElement, {
          childList:true,
          subtree:true,
          characterData:true,
          attributes:true
        });
      }catch(e){}

      intervalId = window.setInterval(tick, 300);

      window.setTimeout(function(){
        if(!fired && intervalId){
          clearInterval(intervalId);
          intervalId = 0;
        }
      }, 120000);

      window.addEventListener('DOMContentLoaded', tick);
      window.addEventListener('load', tick);
      window.addEventListener('pageshow', tick);

      markButtons();
      window.setTimeout(tick, 80);
      window.setTimeout(tick, 400);
      window.setTimeout(tick, 1000);
      window.setTimeout(tick, 2200);
    })();
  </script>
