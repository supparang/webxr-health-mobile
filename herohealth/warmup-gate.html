<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • Gate</title>
  <meta name="color-scheme" content="dark light" />
  <meta name="theme-color" content="#0f172a" />
  <style>
    html,body{
      margin:0;
      min-height:100%;
      background:#020617;
    }
    body{
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    #gate-app{
      min-height:100dvh;
    }
  </style>
</head>
<body>
  <div id="gate-app"></div>

  <script type="module">
    import bootGate from './gate/gate-core.js?v=20260407b-GATE-DAILY-WARMUP-COOLDOWN-HUBV2-CDNEXT-FLOW';

    const root = document.getElementById('gate-app');
    const PATCH = '20260408-gate-next-clean-fix';

    function qs(name, fallback=''){
      try{
        const v = new URL(location.href).searchParams.get(name);
        return v == null || v === '' ? fallback : v;
      }catch(_){
        return fallback;
      }
    }

    function safeAbsUrl(raw, fallback=''){
      const value = String(raw || '').trim();
      try{
        if (value) return new URL(value, location.href).href;
      }catch(_){}
      return fallback || '';
    }

    function phaseValue(){
      const p = String(qs('phase', qs('gatePhase', 'warmup'))).trim().toLowerCase();
      return p === 'cooldown' ? 'cooldown' : 'warmup';
    }

    function fallbackHubHref(){
      return safeAbsUrl(
        qs('hubRoot', qs('hub', '')),
        new URL('./hub-v2.html', location.href).href
      );
    }

    function fallbackLauncherHref(){
      return safeAbsUrl(
        qs('launcher', qs('cdnext', '')),
        ''
      );
    }

    function fallbackNextHref(){
      return safeAbsUrl(qs('next', ''), '');
    }

    function preferredNextHref(){
      const phase = phaseValue();

      if (phase === 'warmup') {
        return fallbackNextHref() || fallbackHubHref();
      }

      return fallbackLauncherHref() || fallbackNextHref() || fallbackHubHref();
    }

    function cleanFlowUrl(rawHref){
      const phase = phaseValue();
      const fallback = fallbackHubHref();

      let u;
      try{
        u = new URL(rawHref || fallback, location.href);
      }catch(_){
        return fallback;
      }

      [
        'phase',
        'gatePhase',
        'returnPhase',
        'cooldown',
        'cd',
        'gate',
        'next',
        'launcher',
        'cdnext'
      ].forEach((key) => u.searchParams.delete(key));

      const currentMode = String(u.searchParams.get('mode') || '').toLowerCase();
      if (currentMode === 'warmup' || currentMode === 'cooldown') {
        u.searchParams.delete('mode');
      }

      const keep = {
        pid: qs('pid', 'anon'),
        name: qs('name', ''),
        studyId: qs('studyId', ''),
        view: qs('view', 'mobile'),
        run: qs('run', 'play'),
        diff: qs('diff', 'normal'),
        time: qs('time', '90'),
        seed: qs('seed', String(Date.now())),
        hub: qs('hub', fallbackHubHref()),
        zone: qs('zone', 'nutrition'),
        cat: qs('cat', 'nutrition'),
        game: qs('game', 'plate'),
        gameId: qs('gameId', qs('game', 'plate')),
        theme: qs('theme', qs('game', 'plate'))
      };

      Object.entries(keep).forEach(([k, v]) => {
        if (v != null && v !== '') {
          u.searchParams.set(k, String(v));
        }
      });

      u.searchParams.set('gate', '1');

      if (phase === 'cooldown') {
        u.searchParams.set('cooldownDone', '1');
      }

      return u.toString();
    }

    function resolvePrimaryFallbackAction(){
      const phase = phaseValue();

      if (phase === 'warmup') {
        const nextHref = fallbackNextHref();
        if (nextHref) {
          return {
            label: 'เข้าเกมหลัก',
            href: cleanFlowUrl(nextHref)
          };
        }

        return {
          label: 'กลับหน้าหลัก',
          href: fallbackHubHref()
        };
      }

      const launcherHref = fallbackLauncherHref();
      if (launcherHref) {
        return {
          label: 'กลับ Launcher',
          href: cleanFlowUrl(launcherHref)
        };
      }

      return {
        label: 'กลับหน้าหลัก',
        href: fallbackHubHref()
      };
    }

    function goNextFromGate(){
      const target = cleanFlowUrl(preferredNextHref());
      console.log(`[HeroHealth Gate][${PATCH}] phase=${phaseValue()} ->`, target);
      location.replace(target);
    }

    function bindOneClick(el){
      if (!el || el.__gatePatchedBound) return;
      el.__gatePatchedBound = true;

      el.addEventListener('click', (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        goNextFromGate();
      }, true);
    }

    function bindFinishButtons(){
      const selectors = [
        '#btnContinue',
        '#btnNext',
        '#btnGoNext',
        '#btnStartGame',
        '#btnFinish',
        '#continueBtn',
        '#nextBtn',
        '#startBtn',
        '#finishBtn',
        '.btn-next',
        '.btn-continue',
        '.btn-start',
        '.btn-finish',
        '[data-next]',
        '[data-action="continue"]',
        '[data-action="next"]',
        '[data-action="finish"]',
        '[data-role="gate-next"]'
      ];

      selectors.forEach((sel) => {
        document.querySelectorAll(sel).forEach(bindOneClick);
      });
    }

    function looksLikeFinishLabel(text){
      const value = String(text || '').trim().toLowerCase();
      if (!value) return false;

      return [
        'ไปต่อ',
        'เริ่มเกม',
        'เล่นต่อ',
        'ต่อเลย',
        'continue',
        'next',
        'เข้าเกมหลัก',
        'เริ่มเลย',
        'start game',
        'finish',
        'done',
        'เสร็จแล้ว',
        'กลับ launcher'
      ].some(token => value.includes(token));
    }

    function bindFinishTextButtons(){
      document.addEventListener('click', (ev) => {
        const t = ev.target.closest('button, a');
        if (!t) return;
        if (!looksLikeFinishLabel(t.textContent || '')) return;

        ev.preventDefault();
        ev.stopPropagation();
        goNextFromGate();
      }, true);
    }

    function bindCustomEvents(){
      window.goNextFromGate = goNextFromGate;
      window.goNextFromWarmup = goNextFromGate;
      window.finishWarmupAndContinue = goNextFromGate;
      window.goNextFromCooldown = goNextFromGate;
      window.finishCooldownAndContinue = goNextFromGate;

      [
        'hha:warmup-complete',
        'hha:cooldown-complete',
        'herohealth:gate-complete',
        'gate:complete',
        'gate:next'
      ].forEach((eventName) => {
        window.addEventListener(eventName, () => {
          goNextFromGate();
        });
      });
    }

    function watchRootForButtons(){
      if (!root || typeof MutationObserver === 'undefined') return;

      const mo = new MutationObserver(() => {
        bindFinishButtons();
      });

      mo.observe(root, {
        childList: true,
        subtree: true
      });
    }

    function renderBootError(err){
      if (!root) return;

      const phase = phaseValue();
      const primary = resolvePrimaryFallbackAction();
      const hubHref = fallbackHubHref();

      const primaryLabel =
        primary?.label ||
        (phase === 'cooldown' ? 'กลับ Launcher' : 'เข้าเกมหลัก');

      const primaryHref =
        primary?.href ||
        hubHref;

      root.innerHTML = `
        <div style="
          min-height:100dvh;
          display:grid;
          place-items:center;
          padding:18px;
          background:
            radial-gradient(circle at top, rgba(59,130,246,.18), transparent 32%),
            linear-gradient(180deg,#020617 0%,#0f172a 55%,#111827 100%);
          color:#e5e7eb;
          font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
        ">
          <div style="
            width:min(760px,100%);
            border-radius:24px;
            background:rgba(15,23,42,.86);
            border:1px solid rgba(148,163,184,.16);
            box-shadow:0 20px 60px rgba(0,0,0,.34);
            padding:22px;
          ">
            <div style="
              font-size:12px;
              font-weight:800;
              letter-spacing:.08em;
              text-transform:uppercase;
              color:#93c5fd;
              margin-bottom:8px;
            ">HeroHealth Gate • ${phase} • ${PATCH}</div>

            <h1 style="margin:0 0 10px;font-size:30px;line-height:1.05;">
              Gate load failed
            </h1>

            <p style="margin:0 0 14px;color:#cbd5e1;line-height:1.6;">
              ระบบโหลด ${phase === 'cooldown' ? 'cooldown' : 'warmup'} ไม่สำเร็จ
            </p>

            <pre style="
              margin:0 0 16px;
              white-space:pre-wrap;
              word-break:break-word;
              overflow:auto;
              padding:14px;
              border-radius:16px;
              background:rgba(127,29,29,.28);
              border:1px solid rgba(239,68,68,.22);
              color:#fecaca;
              font:600 12px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace;
            ">${String(err?.stack || err || 'Unknown error')}</pre>

            <div style="display:flex;gap:10px;flex-wrap:wrap">
              <button id="gateReloadBtn" type="button" style="
                appearance:none;
                border:0;
                border-radius:18px;
                padding:14px 18px;
                font-size:15px;
                font-weight:900;
                cursor:pointer;
                min-width:170px;
                background:linear-gradient(135deg,#38bdf8,#2563eb);
                color:#fff;
                box-shadow:0 12px 26px rgba(37,99,235,.32);
              ">ลองใหม่</button>

              <button id="gatePrimaryBtn" type="button" style="
                appearance:none;
                border:0;
                border-radius:18px;
                padding:14px 18px;
                font-size:15px;
                font-weight:900;
                cursor:pointer;
                min-width:170px;
                background:linear-gradient(135deg,#22c55e,#16a34a);
                color:#fff;
                box-shadow:0 12px 26px rgba(34,197,94,.28);
              ">${primaryLabel}</button>

              <button id="gateBackBtn" type="button" style="
                appearance:none;
                border:1px solid rgba(148,163,184,.16);
                border-radius:18px;
                padding:14px 18px;
                font-size:15px;
                font-weight:900;
                cursor:pointer;
                min-width:170px;
                background:rgba(15,23,42,.85);
                color:#e5e7eb;
              ">กลับหน้าหลัก</button>
            </div>
          </div>
        </div>
      `;

      document.getElementById('gateReloadBtn')?.addEventListener('click', () => {
        location.reload();
      });

      document.getElementById('gatePrimaryBtn')?.addEventListener('click', () => {
        location.href = primaryHref;
      });

      document.getElementById('gateBackBtn')?.addEventListener('click', () => {
        location.href = hubHref;
      });
    }

    bindFinishButtons();
    bindFinishTextButtons();
    bindCustomEvents();
    watchRootForButtons();

    bootGate(root).then(() => {
      bindFinishButtons();
      setTimeout(bindFinishButtons, 250);
      setTimeout(bindFinishButtons, 700);
      setTimeout(bindFinishButtons, 1400);
    }).catch((err) => {
      console.error('[warmup-gate] boot failed:', err);
      renderBootError(err);
    });
  </script>
</body>
</html>
