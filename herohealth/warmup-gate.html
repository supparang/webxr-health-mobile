<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeroHealth • Gate</title>
  <meta name="color-scheme" content="dark light" />
  <meta name="theme-color" content="#0f172a" />
  <style>
    html,body{
      margin:0;
      min-height:100%;
      background:#020617;
    }
    body{
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    #gate-app{
      min-height:100dvh;
    }
  </style>
</head>
<body>
  <div id="gate-app"></div>

  <script type="module">
    import bootGate from './gate/gate-core.js?v=20260414-JUMPDuck-GATE-ZONE-NORMALIZE-FINAL';

    const root = document.getElementById('gate-app');

    function qs(name, fallback=''){
      try{
        return new URL(location.href).searchParams.get(name) ?? fallback;
      }catch(_){
        return fallback;
      }
    }

    function abs(raw, fallback=''){
      const value = String(raw || '').trim();
      try{
        if (value) return new URL(value, location.href).href;
      }catch(_){}
      try{
        if (fallback) return new URL(fallback, location.href).href;
      }catch(_){}
      return fallback || '';
    }

    function looksLikeRoot(href='', zone=''){
      const s = String(href || '').toLowerCase();
      if (!s) return false;

      if (zone === 'fitness') {
        return (
          s === 'https://supparang.github.io/webxr-health-mobile/fitness' ||
          s === 'https://supparang.github.io/webxr-health-mobile/fitness/' ||
          s.endsWith('/webxr-health-mobile/fitness') ||
          s.endsWith('/webxr-health-mobile/fitness/')
        );
      }

      if (zone === 'nutrition') {
        return (
          s === 'https://supparang.github.io/webxr-health-mobile/nutrition' ||
          s === 'https://supparang.github.io/webxr-health-mobile/nutrition/' ||
          s.endsWith('/webxr-health-mobile/nutrition') ||
          s.endsWith('/webxr-health-mobile/nutrition/')
        );
      }

      if (zone === 'hygiene') {
        return (
          s === 'https://supparang.github.io/webxr-health-mobile/hygiene' ||
          s === 'https://supparang.github.io/webxr-health-mobile/hygiene/' ||
          s.endsWith('/webxr-health-mobile/hygiene') ||
          s.endsWith('/webxr-health-mobile/hygiene/')
        );
      }

      return false;
    }

    function normalizeGameId(raw=''){
      const s = String(raw || '').trim().toLowerCase();
      if (!s) return '';
      if (['jumpduck','jump-duck','jump-duck-vr'].includes(s)) return 'jump-duck';
      if (['shadowbreaker','shadow-breaker'].includes(s)) return 'shadow-breaker';
      if (['rhythmboxer','rhythm-boxer'].includes(s)) return 'rhythm-boxer';
      if (['balancehold','balance-hold'].includes(s)) return 'balance-hold';
      if (['fitnessplanner','fitness-planner'].includes(s)) return 'fitness-planner';
      return s.replace(/\s+/g,'-');
    }

    function inferZoneFromCtx(gameId='', zone='', cat=''){
      const z = String(zone || cat || '').trim().toLowerCase();
      if (z) return z;

      const g = normalizeGameId(gameId);
      if (g.includes('jump') || g.includes('shadow') || g.includes('rhythm') || g.includes('balance') || g.includes('fitness')) {
        return 'fitness';
      }
      if (g.includes('goodjunk') || g.includes('plate') || g.includes('group') || g.includes('hydration')) {
        return 'nutrition';
      }
      if (g.includes('brush') || g.includes('handwash') || g.includes('germ') || g.includes('bath') || g.includes('mask')) {
        return 'hygiene';
      }
      return '';
    }

    function zonePageHref(zone=''){
      const z = String(zone || '').trim().toLowerCase();
      if (z === 'fitness') {
        return 'https://supparang.github.io/webxr-health-mobile/herohealth/fitness-zone.html';
      }
      if (z === 'nutrition') {
        return 'https://supparang.github.io/webxr-health-mobile/herohealth/nutrition-zone.html';
      }
      if (z === 'hygiene') {
        return 'https://supparang.github.io/webxr-health-mobile/herohealth/hygiene-zone.html';
      }
      return 'https://supparang.github.io/webxr-health-mobile/herohealth/hub.html';
    }

    function launcherHrefByGame(gameId=''){
      const g = normalizeGameId(gameId);

      if (g === 'jump-duck') {
        return 'https://supparang.github.io/webxr-health-mobile/fitness/jumpduck.html';
      }
      if (g === 'shadow-breaker') {
        return 'https://supparang.github.io/webxr-health-mobile/fitness/shadow-breaker.html';
      }
      if (g === 'rhythm-boxer') {
        return 'https://supparang.github.io/webxr-health-mobile/fitness/rhythm-boxer.html';
      }
      if (g === 'balance-hold') {
        return 'https://supparang.github.io/webxr-health-mobile/fitness/balance-hold.html';
      }
      if (g === 'fitness-planner') {
        return 'https://supparang.github.io/webxr-health-mobile/fitness-planner/index.html';
      }

      if (g === 'groups') {
        return 'https://supparang.github.io/webxr-health-mobile/herohealth/groups-v1.html';
      }
      if (g === 'plate') {
        return 'https://supparang.github.io/webxr-health-mobile/herohealth/plate-v1.html';
      }
      if (g === 'goodjunk') {
        return 'https://supparang.github.io/webxr-health-mobile/herohealth/goodjunk-launcher.html';
      }

      return '';
    }

    function buildLauncherWithCtx(gameId, params, zoneHref){
      const base = launcherHrefByGame(gameId);
      if (!base) return '';

      const u = new URL(base, location.href);

      const keep = [
        'pid','name','nick','nickName','run','diff','time','view','seed',
        'mode','studyId','debug','log','api','ai','pro',
        'game','gameId','theme','zone','cat'
      ];

      keep.forEach((key) => {
        const v = params.get(key);
        if (v != null && v !== '') u.searchParams.set(key, v);
      });

      u.searchParams.set('game', normalizeGameId(gameId));
      u.searchParams.set('gameId', normalizeGameId(gameId));

      if (!u.searchParams.get('theme')) {
        u.searchParams.set('theme', normalizeGameId(gameId));
      }
      if (!u.searchParams.get('zone') && zoneHref) {
        const zoneName = inferZoneFromCtx(gameId, params.get('zone'), params.get('cat'));
        if (zoneName) u.searchParams.set('zone', zoneName);
      }
      if (!u.searchParams.get('cat') && zoneHref) {
        const zoneName = inferZoneFromCtx(gameId, params.get('zone'), params.get('cat'));
        if (zoneName) u.searchParams.set('cat', zoneName);
      }

      if (zoneHref) {
        u.searchParams.set('hub', zoneHref);
      }

      return u.toString();
    }

    function buildWarmupNextHref(gameId, params, zoneHref){
      const launcher = buildLauncherWithCtx(gameId, params, zoneHref);
      if (!launcher) return zoneHref;

      const u = new URL(launcher);
      u.searchParams.set('wgskip', '1');
      u.searchParams.set('autostart', '1');
      u.searchParams.set('entry', 'warmup-gate');
      return u.toString();
    }

    function normalizeGateQueryParams(){
      const url = new URL(location.href);
      const p = url.searchParams;

      const gameId = normalizeGameId(
        p.get('game') ||
        p.get('gameId') ||
        p.get('theme') ||
        ''
      );

      const phaseRaw = String(
        p.get('phase') ||
        p.get('gatePhase') ||
        'warmup'
      ).trim().toLowerCase();

      const phase = phaseRaw === 'cooldown' ? 'cooldown' : 'warmup';
      const zone = inferZoneFromCtx(gameId, p.get('zone'), p.get('cat'));
      const zoneHref = zonePageHref(zone);

      const rawHub = abs(p.get('hub') || '', '');
      const rawHubRoot = abs(p.get('hubRoot') || '', '');
      const rawLauncher = abs(p.get('launcher') || '', '');

      const normalizedHub =
        looksLikeRoot(rawHub, zone) || !rawHub
          ? zoneHref
          : rawHub;

      const normalizedHubRoot =
        looksLikeRoot(rawHubRoot, zone) || !rawHubRoot
          ? zoneHref
          : rawHubRoot;

      if (normalizedHub) p.set('hub', normalizedHub);
      if (normalizedHubRoot) p.set('hubRoot', normalizedHubRoot);

      const defaultLauncher = buildLauncherWithCtx(gameId, p, zoneHref);
      if (!rawLauncher && defaultLauncher) {
        p.set('launcher', defaultLauncher);
      } else if (looksLikeRoot(rawLauncher, zone) && defaultLauncher) {
        p.set('launcher', defaultLauncher);
      }

      if (!p.get('game') && gameId) p.set('game', gameId);
      if (!p.get('gameId') && gameId) p.set('gameId', gameId);
      if (!p.get('theme') && gameId) p.set('theme', gameId);
      if (!p.get('zone') && zone) p.set('zone', zone);
      if (!p.get('cat') && zone) p.set('cat', zone);

      if (phase === 'warmup') {
        if (!p.get('next')) {
          const nextHref = buildWarmupNextHref(gameId, p, zoneHref);
          if (nextHref) p.set('next', nextHref);
        }

        if (!p.get('cdnext')) {
          p.set('cdnext', zoneHref);
        }
      }

      if (phase === 'cooldown') {
        if (!p.get('next')) p.set('next', zoneHref);
        if (!p.get('cdnext')) p.set('cdnext', zoneHref);
      }

      if (String(p.get('view') || '').trim() === '') {
        p.set('view', 'mobile');
      }

      if (String(p.get('run') || '').trim() === '') {
        p.set('run', 'play');
      }

      if (String(p.get('pid') || '').trim() === '') {
        p.set('pid', 'anon');
      }

      history.replaceState({}, '', url.toString());

      return {
        url,
        params: p,
        gameId,
        phase,
        zone,
        zoneHref
      };
    }

    function renderBootError(err, ctx){
      if (!root) return;

      const zoneHref = ctx?.zoneHref || zonePageHref('fitness');
      const gameId = ctx?.gameId || normalizeGameId(qs('game', qs('gameId', '')));
      const phase = ctx?.phase || 'warmup';
      const launcherHref = buildLauncherWithCtx(gameId, new URL(location.href).searchParams, zoneHref) || zoneHref;
      const nextHref = buildWarmupNextHref(gameId, new URL(location.href).searchParams, zoneHref) || launcherHref;

      const primaryLabel = phase === 'cooldown' ? 'กลับ Fitness Zone' : 'เข้าเกมหลัก';
      const primaryHref = phase === 'cooldown' ? zoneHref : nextHref;

      root.innerHTML = `
        <div style="
          min-height:100dvh;
          display:grid;
          place-items:center;
          padding:18px;
          background:
            radial-gradient(circle at top, rgba(59,130,246,.18), transparent 32%),
            linear-gradient(180deg,#020617 0%,#0f172a 55%,#111827 100%);
          color:#e5e7eb;
          font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
        ">
          <div style="
            width:min(760px,100%);
            border-radius:24px;
            background:rgba(15,23,42,.86);
            border:1px solid rgba(148,163,184,.16);
            box-shadow:0 20px 60px rgba(0,0,0,.34);
            padding:22px;
          ">
            <div style="
              font-size:12px;
              font-weight:800;
              letter-spacing:.08em;
              text-transform:uppercase;
              color:#93c5fd;
              margin-bottom:8px;
            ">HeroHealth Gate • ${phase}</div>

            <h1 style="margin:0 0 10px;font-size:30px;line-height:1.05;">
              Gate load failed
            </h1>

            <p style="margin:0 0 14px;color:#cbd5e1;line-height:1.6;">
              ระบบโหลด ${phase === 'cooldown' ? 'cooldown' : 'warmup'} ไม่สำเร็จ
            </p>

            <pre style="
              margin:0 0 16px;
              white-space:pre-wrap;
              word-break:break-word;
              overflow:auto;
              padding:14px;
              border-radius:16px;
              background:rgba(127,29,29,.28);
              border:1px solid rgba(239,68,68,.22);
              color:#fecaca;
              font:600 12px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace;
            ">${String(err?.stack || err || 'Unknown error')}</pre>

            <div style="display:flex;gap:10px;flex-wrap:wrap">
              <button id="gateReloadBtn" type="button" style="
                appearance:none;
                border:0;
                border-radius:18px;
                padding:14px 18px;
                font-size:15px;
                font-weight:900;
                cursor:pointer;
                min-width:170px;
                background:linear-gradient(135deg,#38bdf8,#2563eb);
                color:#fff;
                box-shadow:0 12px 26px rgba(37,99,235,.32);
              ">ลองใหม่</button>

              <button id="gatePrimaryBtn" type="button" style="
                appearance:none;
                border:0;
                border-radius:18px;
                padding:14px 18px;
                font-size:15px;
                font-weight:900;
                cursor:pointer;
                min-width:170px;
                background:linear-gradient(135deg,#22c55e,#16a34a);
                color:#fff;
                box-shadow:0 12px 26px rgba(34,197,94,.28);
              ">${primaryLabel}</button>

              <button id="gateBackBtn" type="button" style="
                appearance:none;
                border:1px solid rgba(148,163,184,.16);
                border-radius:18px;
                padding:14px 18px;
                font-size:15px;
                font-weight:900;
                cursor:pointer;
                min-width:170px;
                background:rgba(15,23,42,.85);
                color:#e5e7eb;
              ">กลับ Zone</button>
            </div>
          </div>
        </div>
      `;

      document.getElementById('gateReloadBtn')?.addEventListener('click', () => {
        location.reload();
      });

      document.getElementById('gatePrimaryBtn')?.addEventListener('click', () => {
        location.href = primaryHref;
      });

      document.getElementById('gateBackBtn')?.addEventListener('click', () => {
        location.href = zoneHref;
      });
    }

    const gateCtx = normalizeGateQueryParams();

    bootGate(root).catch((err) => {
      console.error('[warmup-gate] boot failed:', err);
      renderBootError(err, gateCtx);
    });
  </script>
</body>
</html>
