<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>HeroHealth • GoodJunk AR Production</title>
  <style>
    html,body{margin:0;width:100%;height:100%;display:grid;place-items:center;background:linear-gradient(135deg,#fef9c3,#bbf7d0,#dbeafe);font-family:system-ui,sans-serif;color:#166534}
    .loading{font-size:clamp(18px,4vw,28px);font-weight:900;text-align:center;padding:24px}
  </style>
</head>
<body>
  <div class="loading">🍎 กำลังเตรียม GoodJunk AR Production…</div>
  <script>
    (async () => {
      const FINAL_URL = './goodjunk-ar-production-final.html?v=20260722-worker-reconnect-v82';
      const PATCH_CSS = './patches/goodjunk/goodjunk-mobile-battle-compact-v1.css?v=20260722-82';
      const HAND_V7_JS = './patches/goodjunk/goodjunk-mobile-handlandmarker-v7.js?v=20260722-82';
      const PATCH_JS = './patches/goodjunk/goodjunk-mobile-battle-compact-v1.js?v=20260722-82';
      const UA = navigator.userAgent || '';
      const MOBILE_DEVICE = /Android|iPhone|iPad|iPod|Mobile/i.test(UA) || innerWidth <= 760;

      const OLD_SAFE = `function safe(r){const cx=innerWidth/2,cy=innerHeight*.52;for(let n=0;n<100;n++){const p={x:r+20+Math.random()*(innerWidth-r*2-40),y:130+r+Math.random()*Math.max(1,innerHeight-240-r*2)};if(Math.hypot(p.x-cx,p.y-cy)<Math.min(innerWidth*.22,210))continue;if(state.objects.every(o=>Math.hypot(o.x-p.x,o.y-p.y)>o.r+r+14))return p}return{x:r+20,y:innerHeight/2}}`;
      const NEW_SAFE = `function safe(r){const mobile=innerWidth<=760,boss=state.phase==='boss',gap=mobile?10:14,rawTop=mobile?(boss?220:140):(boss?165:120),top=Math.min(rawTop,innerHeight*.42),bottom=Math.max(top+r*2+gap,innerHeight-(mobile?95:85)),left=r+12,right=Math.max(left+1,innerWidth-r-12),usableW=Math.max(1,right-left),usableH=Math.max(1,bottom-top),cols=Math.max(2,Math.floor(usableW/(r*2+gap))+1),rows=Math.max(2,Math.floor(usableH/(r*2+gap))+1),slots=[];for(let row=0;row<rows;row++){for(let col=0;col<cols;col++){const x=left+usableW*(cols===1?.5:col/(cols-1)),y=top+usableH*(rows===1?.5:row/(rows-1));slots.push({x,y})}}const mixed=shuffle(slots);let best=mixed[0]||{x:innerWidth/2,y:innerHeight/2},bestClear=-Infinity;for(const p of mixed){const clear=state.objects.length?Math.min(...state.objects.map(o=>Math.hypot(o.x-p.x,o.y-p.y)-o.r-r)):999;if(clear>bestClear){best=p;bestClear=clear}if(clear>=gap)return p}return best}`;

      const OLD_UPDATE = `function update(){state.objects.forEach(o=>{o.w+=.03;let sx=o.vx,sy=o.vy;if(o.move==='zigzag')sx+=Math.sin(o.w)*.55;if(o.move==='bounce')sy+=Math.sin(o.w)*.35;if(o.move==='escape')sx+=Math.sign(o.x-innerWidth/2)*.12;o.x+=sx;o.y+=sy;if(o.x<o.r||o.x>innerWidth-o.r)o.vx*=-1;if(o.y<120+o.r||o.y>innerHeight-85-o.r)o.vy*=-1})}`;
      const NEW_UPDATE = `function update(){const mobile=innerWidth<=760,boss=state.phase==='boss',rawTop=mobile?(boss?220:140):(boss?165:120),top=Math.min(rawTop,innerHeight*.42),bottom=innerHeight-(mobile?95:85),gap=mobile?8:12;state.objects.forEach(o=>{o.w+=.03;let sx=o.vx,sy=o.vy;if(o.move==='zigzag')sx+=Math.sin(o.w)*.55;if(o.move==='bounce')sy+=Math.sin(o.w)*.35;if(o.move==='escape')sx+=Math.sign(o.x-innerWidth/2)*.12;o.x+=sx;o.y+=sy;if(o.x<o.r){o.x=o.r;o.vx=Math.abs(o.vx)}else if(o.x>innerWidth-o.r){o.x=innerWidth-o.r;o.vx=-Math.abs(o.vx)}if(o.y<top){o.y=top;o.vy=Math.abs(o.vy)}else if(o.y>bottom){o.y=bottom;o.vy=-Math.abs(o.vy)}});for(let i=0;i<state.objects.length;i++){for(let j=i+1;j<state.objects.length;j++){const a=state.objects[i],b=state.objects[j],dx=b.x-a.x,dy=b.y-a.y,dist=Math.hypot(dx,dy)||.001,min=a.r+b.r+gap;if(dist<min){const push=(min-dist)/2,nx=dx/dist,ny=dy/dist;a.x-=nx*push;a.y-=ny*push;b.x+=nx*push;b.y+=ny*push;a.x=Math.max(a.r,Math.min(innerWidth-a.r,a.x));b.x=Math.max(b.r,Math.min(innerWidth-b.r,b.x));a.y=Math.max(top,Math.min(bottom,a.y));b.y=Math.max(top,Math.min(bottom,b.y))}}}}`;

      const OLD_BOOT = `window.boot=async m=>{mode=m;canvas=$('canvas');video=$('video');ctx=canvas.getContext('2d');resize();addEventListener('resize',resize);canvas.addEventListener('pointerdown',e=>{if(mode==='touch'&&state.playing)hit(e.clientX,e.clientY)});$('loadMsg').textContent=m==='camera'?'กำลังเปิดกล้อง…':'กำลังเปิด Touch Mode…';if(m==='camera'){try{hands=new Hands({locateFile:f=>\`https://cdn.jsdelivr.net/npm/@mediapipe/hands/\${f}\`});hands.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:.55,minTrackingConfidence:.55});hands.onResults(onHands);camera=new Camera(video,{onFrame:async()=>{if(state.playing)await hands.send({image:video})},width:640,height:480});await camera.start()}catch(e){mode='touch';$('loadMsg').textContent='กล้องไม่พร้อม จึงสลับเป็น Touch Mode'}}$('start').classList.add('hidden');$('game').classList.remove('hidden');startFullGame()};`;
      const NEW_BOOT = `window.boot=async m=>{mode=m;canvas=$('canvas');video=$('video');ctx=canvas.getContext('2d');resize();addEventListener('resize',resize);window.__GJ_SELECT_AT__=(x,y,source='unknown')=>{if(!state.playing)return false;let target=null,best=Infinity;for(const o of state.objects){const d=Math.hypot(o.x-x,o.y-y),limit=o.r+(innerWidth<=760?90:20);if(d<=limit&&d<best){target=o;best=d}}if(!target)return false;hit(target.x,target.y);try{ev('hand_select_attempt',{source,food:target.name,distancePx:Math.round(best)})}catch(_){}return true};window.__GJ_IS_PLAYING__=()=>!!state.playing;window.__GJ_SHOW__=t=>show(t);window.__GJ_RETRY_HAND__=()=>window.GJMobileHandV7?.retryNow?.();canvas.addEventListener('pointerdown',e=>{if(state.playing)window.__GJ_SELECT_AT__(e.clientX,e.clientY,'touch')});$('loadMsg').textContent=m==='camera'?'กำลังเปิดกล้อง…':'กำลังเปิด Touch Mode…';window.__GJ_HAND_POINTS__=[];window.__GJ_HAND_BUSY__=false;window.__GJ_LAST_HAND_SEND_AT__=0;window.__GJ_CAMERA_LITE__=false;window.__GJ_HANDLANDMARKER_V7__=false;if(m==='camera'){try{const mobile=/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent||'')||innerWidth<=760;if(mobile){if(!window.GJMobileHandV7)throw new Error('Mobile Hand Worker runtime v8.2 not loaded');await window.GJMobileHandV7.start(video);mode='camera';$('loadMsg').textContent='Worker Hand AR v8.2 พร้อม — ชี้ค้างเหนืออาหาร'}else{hands=new Hands({locateFile:f=>\`https://cdn.jsdelivr.net/npm/@mediapipe/hands/\${f}\`});hands.setOptions({maxNumHands:1,modelComplexity:1,minDetectionConfidence:.55,minTrackingConfidence:.55});hands.onResults(onHands);camera=new Camera(video,{onFrame:()=>{if(!state.playing||window.__GJ_HAND_BUSY__)return;const now=performance.now();if(now-window.__GJ_LAST_HAND_SEND_AT__<55)return;window.__GJ_LAST_HAND_SEND_AT__=now;window.__GJ_HAND_BUSY__=true;Promise.resolve(hands.send({image:video})).catch(()=>{}).finally(()=>{window.__GJ_HAND_BUSY__=false})},width:640,height:480});await camera.start();$('loadMsg').textContent='Hand AR พร้อม'}}catch(e){console.warn('Camera/Hand AR fallback',e);const detail=String(e?.message||e).replace(/\s+/g,' ').slice(0,150);try{if(video.srcObject){mode='camera';window.__GJ_CAMERA_LITE__=true;$('loadMsg').textContent='Hand AR กำลังเชื่อมใหม่ • '+detail+' • แตะอาหารได้'}else{mode='touch';$('loadMsg').textContent='กล้องไม่พร้อม • '+detail}}catch(_){mode='touch'}}}$('start').classList.add('hidden');$('game').classList.remove('hidden');startFullGame()};`;

      const OLD_LOOP = `function loop(){if(!state.playing)return;if(mode==='touch'){drawBg();update();draw()}raf=requestAnimationFrame(loop)}`;
      const NEW_LOOP = `function loop(ts=0){if(!state.playing)return;raf=requestAnimationFrame(loop);const mobile=innerWidth<=760,minFrameMs=mobile?50:20;if(ts-(window.__GJ_LAST_RENDER_AT__||0)<minFrameMs)return;window.__GJ_LAST_RENDER_AT__=ts;ctx.clearRect(0,0,innerWidth,innerHeight);if(mode==='camera'&&video&&video.readyState>=2){ctx.save();ctx.translate(innerWidth,0);ctx.scale(-1,1);ctx.drawImage(video,0,0,innerWidth,innerHeight);ctx.restore();ctx.fillStyle='#02061718';ctx.fillRect(0,0,innerWidth,innerHeight)}else{drawBg()}update();draw();(window.__GJ_HAND_POINTS__||[]).forEach(p=>pointer(p.x,p.y))}`;

      const OLD_ON_HANDS = `function onHands(res){if(!state.playing)return;ctx.clearRect(0,0,innerWidth,innerHeight);ctx.save();ctx.translate(innerWidth,0);ctx.scale(-1,1);ctx.drawImage(res.image,0,0,innerWidth,innerHeight);ctx.restore();ctx.fillStyle='#02061718';ctx.fillRect(0,0,innerWidth,innerHeight);update();draw();(res.multiHandLandmarks||[]).forEach(l=>{const x=(1-l[8].x)*innerWidth,y=l[8].y*innerHeight;pointer(x,y);hit(x,y)})}`;
      const NEW_ON_HANDS = `function onHands(res){if(!state.playing)return;window.__GJ_LAST_HAND_RESULT_AT__=Date.now();const points=(res.multiHandLandmarks||[]).map(l=>({x:(1-l[8].x)*innerWidth,y:l[8].y*innerHeight}));window.__GJ_HAND_POINTS__=points;points.forEach(p=>window.__GJ_SELECT_AT__?.(p.x,p.y,'desktop-hand'))}`;

      try {
        const response = await fetch(FINAL_URL, { cache: 'no-store' });
        if (!response.ok) throw new Error('HTTP ' + response.status);
        let html = await response.text();

        if (MOBILE_DEVICE) {
          html = html.replace(/<script[^>]+@mediapipe\/camera_utils\/[^>]*><\/script>/gi, '');
          html = html.replace(/<script[^>]+@mediapipe\/hands\/[^>]*><\/script>/gi, '');
        }

        html = html.replace(
          "ev('correct',{food:o.name,topic:state.mission.topic,reaction});",
          "ev('correct',{food:o.name,topic:state.mission.topic,reactionSec:state.reactionN?Number((state.reactionSum/state.reactionN).toFixed(3)):0});"
        );

        const replacements = [
          ['safe', OLD_SAFE, NEW_SAFE],
          ['update', OLD_UPDATE, NEW_UPDATE],
          ['boot', OLD_BOOT, NEW_BOOT],
          ['loop', OLD_LOOP, NEW_LOOP],
          ['onHands', OLD_ON_HANDS, NEW_ON_HANDS]
        ];
        const patchStatus = {};
        replacements.forEach(([name, oldCode, newCode]) => {
          patchStatus[name] = html.includes(oldCode);
          if (patchStatus[name]) html = html.replace(oldCode, newCode);
        });

        if (!patchStatus.boot || !patchStatus.loop || !patchStatus.onHands) throw new Error('Core stability patch signature mismatch');

        const cssTag = '<link rel="stylesheet" href="' + PATCH_CSS + '">';
        const handTag = '<scr' + 'ipt type="module" src="' + HAND_V7_JS + '"></scr' + 'ipt>';
        const jsTag = '<scr' + 'ipt src="' + PATCH_JS + '"></scr' + 'ipt>';
        html = html.replace('</head>', cssTag + '</head>');
        html = html.replace('</body>', handTag + jsTag + '</body>');
        html = html.replace('<title>HeroHealth • GoodJunk AR Production Final</title>','<title>HeroHealth • GoodJunk AR Worker Reconnect v8.2</title>');

        console.info('[GoodJunk Production Loader]', {release:'20260722-WORKER-RECONNECT-V82',mobileDevice:MOBILE_DEVICE,patchStatus});
        document.open(); document.write(html); document.close();
      } catch (error) {
        document.body.innerHTML = '<div class="loading">⚠️ โหลดเกมไม่สำเร็จ<br><small>' + String(error.message || error) + '</small><br><button onclick="location.reload()" style="margin-top:14px;min-height:46px;padding:9px 15px;border:0;border-radius:14px;font:inherit;font-weight:900">ลองใหม่</button></div>';
      }
    })();
  </script>
</body>
</html>
