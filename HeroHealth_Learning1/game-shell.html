<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><meta name="theme-color" content="#082f49"><title>HeroHealth Classroom Game</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#03131d;font-family:system-ui,sans-serif}.bar{position:fixed;z-index:20;top:0;left:0;right:0;height:60px;display:flex;align-items:center;gap:8px;padding:8px 10px;background:#03131df5;color:#fff}.bar b{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.bar button,.btn{border:0;border-radius:12px;min-height:44px;padding:9px 12px;font:inherit;font-weight:900}.back{background:#173b4b;color:#fff}.status{font-size:13px;opacity:.9}iframe{position:fixed;top:60px;left:0;width:100%;height:calc(100% - 60px);border:0;background:#000}.overlay{position:fixed;z-index:50;inset:60px 0 0;display:none;place-items:center;padding:18px;background:#010a12e8}.overlay.show{display:grid}.card{width:min(520px,96vw);padding:24px;border-radius:24px;background:#fff;color:#12302c;text-align:center}.score{font-size:42px;font-weight:1000;color:#0f766e}.btn{width:100%;background:#0f766e;color:#fff}.hint{font-size:12px;opacity:.75}.loading{position:fixed;z-index:45;inset:60px 0 0;display:grid;place-items:center;background:#03131d;color:#fff;text-align:center}.loading.hide{display:none}.spinner{width:46px;height:46px;border:5px solid #ffffff35;border-top-color:#67eda9;border-radius:50%;animation:spin .8s linear infinite;margin:auto auto 14px}@keyframes spin{to{transform:rotate(360deg)}}</style></head><body><header class="bar"><button id="back" class="back">← ออกชั่วคราว</button><b id="title">HeroHealth</b><small id="status" class="status">กำลังเตรียมเกม</small></header><iframe id="game" allow="camera;microphone;fullscreen;autoplay"></iframe><section id="loading" class="loading"><div><div class="spinner"></div><b>กำลังเตรียมภารกิจ</b><p>ระบบจะบันทึกเวลาเริ่มและผลการเล่นอัตโนมัติ</p></div></section><section id="overlay" class="overlay"><div class="card"><div style="font-size:56px">🏆</div><h1>จบภารกิจแล้ว</h1><div id="score" class="score">0 คะแนน</div><p id="detail">ผลการเล่นพร้อมบันทึก</p><button id="returnBtn" class="btn">บันทึกผลและกลับ HeroHealth</button><p class="hint">ภารกิจถัดไปจะเปิดให้อัตโนมัติ</p></div></section><script src="./data/backend-config.js?v=20260723-game-session2"></script><script>(()=>{'use strict';const q=new URLSearchParams(location.search),target=q.get('target'),back=q.get('return')||'./index.html',sid=q.get('studentId')||'',zone=q.get('zone')||'',gameId=q.get('gameId')||'',section=q.get('section')||'',group=q.get('group')||'';const f=document.getElementById('game'),ov=document.getElementById('overlay'),loading=document.getElementById('loading'),statusEl=document.getElementById('status');const endpoint=String(window.HH_CONFIG?.backend?.webAppUrl||'');const sessionId=`GS-${sid}-${zone}-${gameId}-${Date.now()}-${Math.random().toString(36).slice(2,7)}`;const openedAt=new Date().toISOString();let startedAt='',ended=false,inputMode='ar',fallbackUsed=false,result={completed:false,passed:false,score:0,accuracy:0,eventId:''};document.getElementById('title').textContent=q.get('title')||gameId;if(!target){statusEl.textContent='ไม่พบเกม';return}const n=v=>{const x=Number(String(v??'').replace(/[^0-9.\-]/g,''));return Number.isFinite(x)?x:0};const eid=()=>`${gameId}-${Date.now()}-${Math.random().toString(36).slice(2,8)}`;function duration(){return startedAt?Math.max(0,Math.round((Date.now()-Date.parse(startedAt))/1000)):0}function sendLifecycle(phase,extra={}){if(!endpoint||!sid)return;const payload={eventType:'game_lifecycle',eventId:`HH-GL-${sessionId}-${phase}`,studentId:sid,profile:{section,group},clientTs:new Date().toISOString(),currentStep:`${zone}:${gameId}`,status:phase==='open'?'เปิดเกม':phase==='start'?'เริ่มเกม':phase==='complete'?'จบเกม':phase==='abandon'?'ออกกลางเกม':'กำลังเล่น',gameSession:{sessionId,phase,zone,gameId,openedAt,startedAt,endedAt:['complete','abandon'].includes(phase)?new Date().toISOString():'',durationSec:duration(),inputMode,fallbackUsed,score:Number(extra.score)||0,accuracy:Number(extra.accuracy)||0,completed:extra.completed===true,passed:extra.passed===true,reason:extra.reason||''}};try{const form=new URLSearchParams();form.set('payload',JSON.stringify(payload));if(navigator.sendBeacon)navigator.sendBeacon(endpoint,new Blob([form.toString()],{type:'application/x-www-form-urlencoded;charset=UTF-8'}));else fetch(endpoint,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8'},body:form.toString(),keepalive:true})}catch(_){}}function markInProgress(){try{const key='herohealth_learning_platform_rc2',s=JSON.parse(localStorage.getItem(key)||'{}');s.inProgress={studentId:sid,zone,gameId,sessionId,openedAt,startedAt,updatedAt:new Date().toISOString()};localStorage.setItem(key,JSON.stringify(s))}catch(_){}}function clearInProgress(){try{const key='herohealth_learning_platform_rc2',s=JSON.parse(localStorage.getItem(key)||'{}');if(s.inProgress?.sessionId===sessionId){delete s.inProgress;localStorage.setItem(key,JSON.stringify(s))}}catch(_){}}function buttonByText(d,tests){return[...d.querySelectorAll('button,[role="button"],a')].find(el=>tests.some(t=>String(el.textContent||'').toLowerCase().includes(t)))}function normalizeGameUI(){try{const d=f.contentDocument;if(!d)return;const hideTests=['touch fallback','ใช้ touch','เล่นอีกครั้ง','cooldown','กลับ zone','กลับ nutrition','skip','ข้าม'];[...d.querySelectorAll('button,[role="button"],a')].forEach(el=>{const txt=String(el.textContent||'').trim().toLowerCase();if(hideTests.some(t=>txt.includes(t)))el.style.display='none'});const start=buttonByText(d,['เริ่ม ar-lite','เปิด ar','เริ่มเกม','start game','start']);if(start){const txt=String(start.textContent||'');if(/ar-lite|เปิด ar/i.test(txt))start.textContent='เริ่มเกม';start.style.display='';start.addEventListener('click',onRealStart,{once:true})}const resultBtn=buttonByText(d,['ไปต่อ','กลับ herohealth','บันทึกผล']);if(resultBtn&&/ไปต่อ|กลับ herohealth|บันทึกผล/i.test(resultBtn.textContent||'')){resultBtn.style.display='none'}const errText=String(d.body?.innerText||'').toLowerCase();if(/เปิดกล้องไม่ได้|camera.*denied|hand tracking ไม่พร้อม/.test(errText))activateFallback(d,'camera_or_tracking_unavailable')}catch(_){}}function onRealStart(){if(startedAt)return;startedAt=new Date().toISOString();statusEl.textContent='กำลังเล่น';markInProgress();sendLifecycle('start');}function activateFallback(d,reason){if(fallbackUsed)return;const touch=buttonByText(d,['touch fallback','ใช้ touch','👆 touch','touch']);if(!touch)return;fallbackUsed=true;inputMode='touch-auto';sendLifecycle('fallback',{reason});touch.click();statusEl.textContent='โหมดสัมผัสอัตโนมัติ'}function read(){try{const w=f.contentWindow,d=f.contentDocument,raw=JSON.parse(w.localStorage.getItem('HHA_GROUPS_AR_LAST_RESULT')||w.localStorage.getItem('toothbrush_pending_result')||'null')||w.__TOOTHBRUSH_LAST_RESULT__||{};const ids=['score','scoreText','summaryScore','sumScore','finalScore'];let score=n(raw.score);for(const id of ids)score=Math.max(score,n(d.getElementById(id)?.textContent));let accuracy=n(raw.accuracy??raw.direction_accuracy);for(const id of ['acc','accuracy','accuracyText','summaryAccuracy','sumAccuracy'])accuracy=Math.max(accuracy,n(d.getElementById(id)?.textContent));result={completed:true,passed:raw.passed===true||raw.challenge_passed==='yes',score,accuracy,eventId:raw.eventId||raw.record_id||result.eventId||eid()}}catch(_){result.completed=true;result.eventId=result.eventId||eid()}return result}function show(payload={}){if(ended)return;result={...result,...payload,completed:true};read();ended=true;if(!startedAt)startedAt=openedAt;sendLifecycle('complete',result);document.getElementById('score').textContent=`${result.score} คะแนน`;document.getElementById('detail').textContent=result.score>0?'บันทึกคะแนนและข้อมูลการเล่นแล้ว':'เกมจบรอบแล้วและพร้อมบันทึก';ov.classList.add('show');statusEl.textContent='จบเกมแล้ว'}function finishAndGo(){read();if(!ended)show(result);clearInProgress();const u=new URL(back,location.href);[['hhReturn','game'],['studentId',sid],['zone',zone],['gameId',gameId],['completed','true'],['passed',String(result.passed)],['score',String(result.score)],['accuracy',String(result.accuracy)],['eventId',result.eventId||eid()],['sessionId',sessionId],['openedAt',openedAt],['startedAt',startedAt||openedAt],['durationSec',String(duration())],['inputMode',inputMode],['fallbackUsed',String(fallbackUsed)]].forEach(([k,v])=>u.searchParams.set(k,v));location.href=u.href}function leaveInProgress(){if(!ended)sendLifecycle('abandon',{reason:'temporary_exit'});markInProgress();location.href=new URL(back,location.href).href}document.getElementById('returnBtn').onclick=finishAndGo;document.getElementById('back').onclick=()=>{if(confirm('ออกชั่วคราวใช่ไหม? ระบบจะไม่ปลดล็อกเกมถัดไป และกลับมาเล่นเกมเดิม'))leaveInProgress()};sendLifecycle('open');f.src=target;f.addEventListener('load',()=>{loading.classList.add('hide');statusEl.textContent='พร้อมเริ่มเกม';normalizeGameUI();const d=f.contentDocument;if(d){new MutationObserver(normalizeGameUI).observe(d.documentElement,{subtree:true,childList:true,characterData:true})}setTimeout(()=>{try{const d=f.contentDocument;if(!startedAt)activateFallback(d,'readiness_timeout')}catch(_){}},15000)});addEventListener('message',e=>{if(e.origin!==location.origin)return;const m=e.data||{};if(m.type==='HEROHEALTH_GAME_STARTED')onRealStart();if(m.type==='HEROHEALTH_GAME_COMPLETE'&&m.payload)show(m.payload)});addEventListener('pagehide',()=>{if(!ended)sendLifecycle('abandon',{reason:'pagehide'})})})();</script></body></html>
