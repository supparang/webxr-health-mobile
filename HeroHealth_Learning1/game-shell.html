<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><meta name="theme-color" content="#082f49"><title>HeroHealth Classroom Game</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#03131d;font-family:system-ui,sans-serif}.bar{position:fixed;z-index:20;top:0;left:0;right:0;height:60px;display:flex;align-items:center;gap:8px;padding:8px 10px;background:#03131df5;color:#fff}.bar b{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.bar button,.btn{border:0;border-radius:12px;min-height:44px;padding:9px 12px;font:inherit;font-weight:900}.back{background:#173b4b;color:#fff}.finish,.btn{background:#67eda9;color:#062519}iframe{position:fixed;top:60px;left:0;width:100%;height:calc(100% - 60px);border:0;background:#000}.overlay{position:fixed;z-index:50;inset:60px 0 0;display:none;place-items:center;padding:18px;background:#010a12e8}.overlay.show{display:grid}.card{width:min(520px,96vw);padding:24px;border-radius:24px;background:#fff;color:#12302c;text-align:center}.score{font-size:42px;font-weight:1000;color:#0f766e}.btn{width:100%;background:#0f766e;color:#fff}</style></head><body><header class="bar"><button id="back" class="back">← ออกชั่วคราว</button><b id="title">HeroHealth</b><small id="status">กำลังโหลด</small><button id="finish" class="finish">จบรอบ</button></header><iframe id="game" allow="camera;microphone;fullscreen;autoplay"></iframe><section id="overlay" class="overlay"><div class="card"><div style="font-size:56px">🏆</div><h1>จบภารกิจ 1 รอบแล้ว</h1><div id="score" class="score">0 คะแนน</div><p id="detail">บันทึกผลและไปภารกิจถัดไป</p><button id="returnBtn" class="btn">บันทึกและไปต่อ</button></div></section><script>(()=>{'use strict';const q=new URLSearchParams(location.search),target=q.get('target'),back=q.get('return')||'./index.html',sid=q.get('studentId')||'',zone=q.get('zone')||'',gameId=q.get('gameId')||'';const f=document.getElementById('game'),ov=document.getElementById('overlay');let result={completed:false,passed:false,score:0,accuracy:0,eventId:''};document.getElementById('title').textContent=q.get('title')||gameId;if(!target){document.getElementById('status').textContent='ไม่พบเกม';return}f.src=target;const n=v=>{const x=Number(String(v??'').replace(/[^0-9.\-]/g,''));return Number.isFinite(x)?x:0};const eid=()=>`${gameId}-${Date.now()}-${Math.random().toString(36).slice(2,8)}`;function markInProgress(){try{const key='herohealth_learning_platform_rc2';const s=JSON.parse(localStorage.getItem(key)||'{}');s.inProgress={studentId:sid,zone,gameId,startedAt:s.inProgress?.gameId===gameId?s.inProgress.startedAt:Date.now(),updatedAt:Date.now()};localStorage.setItem(key,JSON.stringify(s))}catch(_){}}function clearInProgress(){try{const key='herohealth_learning_platform_rc2';const s=JSON.parse(localStorage.getItem(key)||'{}');if(s.inProgress?.gameId===gameId){delete s.inProgress;localStorage.setItem(key,JSON.stringify(s))}}catch(_){}}function read(){try{const w=f.contentWindow,d=f.contentDocument,raw=JSON.parse(w.localStorage.getItem('HHA_GROUPS_AR_LAST_RESULT')||w.localStorage.getItem('toothbrush_pending_result')||'null')||w.__TOOTHBRUSH_LAST_RESULT__||{};const ids=['score','scoreText','summaryScore','sumScore','finalScore'];let score=n(raw.score);for(const id of ids)score=Math.max(score,n(d.getElementById(id)?.textContent));let accuracy=n(raw.accuracy??raw.direction_accuracy);for(const id of ['acc','accuracy','accuracyText','summaryAccuracy','sumAccuracy'])accuracy=Math.max(accuracy,n(d.getElementById(id)?.textContent));result={completed:true,passed:raw.passed===true||raw.challenge_passed==='yes',score,accuracy,eventId:raw.eventId||raw.record_id||result.eventId||eid()}}catch(_){result.completed=true;result.eventId=result.eventId||eid()}return result}function show(){read();document.getElementById('score').textContent=`${result.score} คะแนน`;document.getElementById('detail').textContent=result.score>0?'อ่านคะแนนจากเกมแล้ว พร้อมบันทึก':'จบรอบแล้ว แต่เกมยังไม่ส่งคะแนน';ov.classList.add('show')}function finishAndGo(){read();clearInProgress();const u=new URL(back,location.href);[['hhReturn','game'],['studentId',sid],['zone',zone],['gameId',gameId],['completed','true'],['passed',String(result.passed)],['score',String(result.score)],['accuracy',String(result.accuracy)],['eventId',result.eventId||eid()]].forEach(([k,v])=>u.searchParams.set(k,v));location.href=u.href}function leaveInProgress(){markInProgress();location.href=new URL(back,location.href).href}document.getElementById('finish').onclick=show;document.getElementById('returnBtn').onclick=finishAndGo;document.getElementById('back').onclick=()=>{if(confirm('ออกชั่วคราวโดยยังไม่จบรอบใช่ไหม? กลับมาแล้วระบบจะเปิดภารกิจเดิม'))leaveInProgress()};f.addEventListener('load',()=>{markInProgress();document.getElementById('status').textContent='กำลังเล่น';try{f.contentWindow.addEventListener('message',e=>{const m=e.data||{};if(m.type==='HEROHEALTH_GAME_COMPLETE'&&m.payload){result={...result,...m.payload,completed:true};show()}})}catch(_){}})})();</script></body></html>
