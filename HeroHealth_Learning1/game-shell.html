<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><meta name="theme-color" content="#082f49"><title>HeroHealth Classroom Game</title><style>*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#03131d;font-family:Inter,"Noto Sans Thai",system-ui,sans-serif}.bar{position:fixed;z-index:20;top:0;left:0;right:0;min-height:60px;display:flex;align-items:center;gap:8px;padding:8px 10px calc(8px + env(safe-area-inset-top));background:rgba(3,19,29,.96);color:#fff}.bar b{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.bar button{border:0;border-radius:12px;min-height:44px;padding:9px 12px;font:inherit;font-weight:900}.back{background:#173b4b;color:#fff}.finish{background:#67eda9;color:#062519}.status{font-size:11px;color:#b7d4df}iframe{position:fixed;top:60px;left:0;width:100%;height:calc(100% - 60px);border:0;background:#000}.overlay{position:fixed;z-index:50;inset:60px 0 0;display:none;place-items:center;padding:18px;background:rgba(1,10,18,.88)}.overlay.show{display:grid}.card{width:min(560px,96vw);padding:24px;border-radius:24px;background:#fff;color:#12302c;text-align:center}.score{font-size:42px;font-weight:1000;color:#0f766e}.btn{width:100%;border:0;border-radius:14px;min-height:50px;padding:14px;font:inherit;font-weight:900;background:#0f766e;color:#fff}</style></head><body><header class="bar"><button id="back" class="back">← กลับ</button><b id="title">HeroHealth</b><span id="status" class="status">กำลังโหลด</span><button id="finish" class="finish">จบรอบ</button></header><iframe id="game" allow="camera;microphone;fullscreen;autoplay" referrerpolicy="same-origin"></iframe><section id="overlay" class="overlay"><div class="card"><div style="font-size:56px">🏆</div><h1>จบภารกิจ 1 รอบแล้ว</h1><div id="score" class="score">0 คะแนน</div><p id="detail">ระบบจะบันทึกผล ไม่ว่าคะแนนจะผ่านเกณฑ์หรือไม่</p><button id="returnBtn" class="btn">บันทึกและไปภารกิจถัดไป</button></div></section><script>
(()=>{'use strict';const q=new URLSearchParams(location.search),target=q.get('target'),returnUrl=q.get('return')||'./index.html',sid=q.get('studentId')||'',zone=q.get('zone')||'',gameId=q.get('gameId')||'',title=q.get('title')||gameId;const frame=document.getElementById('game'),status=document.getElementById('status'),overlay=document.getElementById('overlay');let latest={completed:false,passed:false,score:0,accuracy:0,eventId:''},watchTimer=null,startedAt=Date.now();document.getElementById('title').textContent=title;if(!target){status.textContent='ไม่พบ URL เกม';return}frame.src=target;
function eventId(){return `${gameId}-${Date.now()}-${Math.random().toString(36).slice(2,8)}`}
function num(v){const n=Number(String(v??'').replace(/[^0-9.\-]/g,''));return Number.isFinite(n)?n:0}
function normalize(r){r=r||{};return{completed:true,passed:r.passed===true||r.techniquePassed===true,score:num(r.score),accuracy:num(r.accuracy),eventId:r.eventId||eventId()}}
function show(r){latest=normalize(r);status.textContent=latest.passed?'ผ่านเกณฑ์':'จบรอบ';document.getElementById('score').textContent=`${latest.score} คะแนน`;document.getElementById('detail').textContent=latest.passed?'ผ่านเกณฑ์และพร้อมไปต่อ':'บันทึกว่าเล่นครบหนึ่งรอบแล้ว และพร้อมไปต่อ';overlay.classList.add('show')}
function inspectHandwash(){try{const d=frame.contentDocument;if(!d)return;const root=d.documentElement,committed=root?.dataset?.handwashFinish==='committed',nativeSummary=d.getElementById('summaryOverlay')?.classList.contains('show'),top=d.getElementById('handwashTopLayerSummaryR24'),topOpen=!!(top&&(top.open||top.hasAttribute('open')));if(!(committed||nativeSummary||topOpen))return;show({completed:true,passed:true,score:num(d.getElementById('hw24Score')?.textContent||d.getElementById('sumScore')?.textContent),accuracy:num(d.getElementById('hw24Accuracy')?.textContent||d.getElementById('sumAccuracy')?.textContent)})}catch(_){}}
function goBack(){if(!latest.completed)latest={completed:true,passed:false,score:0,accuracy:0,eventId:eventId()};const u=new URL(returnUrl,location.href);[['hhReturn','game'],['studentId',sid],['zone',zone],['gameId',gameId],['completed','true'],['passed',String(latest.passed)],['score',String(latest.score)],['accuracy',String(latest.accuracy)],['eventId',latest.eventId||eventId()]].forEach(([k,v])=>u.searchParams.set(k,v));location.href=u.href}
document.getElementById('finish').onclick=()=>{inspectHandwash();if(Date.now()-startedAt<15000&&!confirm('เพิ่งเริ่มเกม ต้องการจบรอบนี้และไปต่อเลยหรือไม่?'))return;show(latest.completed?latest:{completed:true,passed:false,score:0,accuracy:0})};document.getElementById('back').onclick=()=>{if(confirm('กลับ HeroHealth และบันทึกว่าจบรอบนี้แล้ว?'))goBack()};document.getElementById('returnBtn').onclick=goBack;
frame.addEventListener('load',()=>{status.textContent='กำลังเล่น';try{const w=frame.contentWindow;w.addEventListener('herohealth:game-result',e=>show(e.detail),{capture:true});w.addEventListener('message',e=>{const m=e.data||{};if(m.type==='HEROHEALTH_GAME_COMPLETE'&&m.payload)show(m.payload)});const d=frame.contentDocument;new MutationObserver(inspectHandwash).observe(d.documentElement,{subtree:true,childList:true,attributes:true});watchTimer=setInterval(inspectHandwash,400)}catch(_){}});addEventListener('beforeunload',()=>clearInterval(watchTimer));})();
</script></body></html>
