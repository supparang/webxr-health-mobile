<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#082f49"><title>HeroHealth Game</title><style>*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#03131d;font-family:Inter,"Noto Sans Thai",system-ui,sans-serif}.bar{position:fixed;z-index:20;top:0;left:0;right:0;height:56px;display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(3,19,29,.94);color:#fff;border-bottom:1px solid rgba(255,255,255,.15)}.bar b{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.bar button{border:0;border-radius:12px;padding:10px 13px;font:inherit;font-weight:900;cursor:pointer}.back{background:#173b4b;color:#fff}.finish{background:#67eda9;color:#062519;display:none}.status{font-size:12px;color:#b7d4df}iframe{position:fixed;top:56px;left:0;width:100%;height:calc(100% - 56px);border:0;background:#000}.overlay{position:fixed;z-index:50;inset:56px 0 0;display:none;place-items:center;padding:18px;background:rgba(1,10,18,.86);backdrop-filter:blur(10px)}.overlay.show{display:grid}.card{width:min(560px,96vw);padding:24px;border-radius:24px;background:#fff;color:#12302c;text-align:center}.card h1{margin:8px 0}.score{font-size:42px;font-weight:1000;color:#0f766e}.btn{width:100%;border:0;border-radius:14px;padding:14px;font:inherit;font-weight:900;background:#0f766e;color:#fff;cursor:pointer}</style></head><body><header class="bar"><button id="back" class="back">← กลับ</button><b id="title">HeroHealth Game</b><span id="status" class="status">กำลังโหลดเกม</span><button id="finish" class="finish">กลับ HeroHealth</button></header><iframe id="game" allow="camera;microphone;fullscreen;autoplay" referrerpolicy="same-origin"></iframe><section id="overlay" class="overlay"><div class="card"><div style="font-size:56px">🏆</div><h1>ภารกิจสำเร็จ</h1><div id="score" class="score">0</div><p id="detail">กำลังเตรียมผลลัพธ์</p><button id="returnBtn" class="btn">บันทึกผลและกลับ HeroHealth</button></div></section><script>
(()=>{'use strict';const q=new URLSearchParams(location.search);const target=q.get('target'),returnUrl=q.get('return')||'./index.html',sid=q.get('studentId')||'',zone=q.get('zone')||'',gameId=q.get('gameId')||'',title=q.get('title')||gameId;const frame=document.getElementById('game');const status=document.getElementById('status');const overlay=document.getElementById('overlay');let latest=null,watchTimer=null;document.getElementById('title').textContent=title;if(!target){status.textContent='ไม่พบ URL เกม';return}frame.src=target;
function eventId(){return `${gameId}-${Date.now()}-${Math.random().toString(36).slice(2,8)}`}
function num(v){const n=Number(String(v??'').replace(/[^0-9.\-]/g,''));return Number.isFinite(n)?n:0}
function normalize(r){r=r||{};return{passed:r.passed===true||r.techniquePassed===true||r.completed===true,score:num(r.score),accuracy:num(r.accuracy),eventId:r.eventId||eventId()}}
function show(r){const n=normalize(r);if(latest?.passed&&n.passed)return;latest=n;status.textContent=latest.passed?'ผ่านแล้ว':'จบรอบ';document.getElementById('score').textContent=`${latest.score} คะแนน`;document.getElementById('detail').textContent=latest.passed?'ระบบพร้อมบันทึกผลและกลับสู่ภารกิจถัดไป':'ยังไม่ผ่าน สามารถกลับไปฝึกใหม่ได้';overlay.classList.add('show');document.getElementById('finish').style.display='block'}
function inspectHandwash(){try{const d=frame.contentDocument;if(!d)return;const root=d.documentElement;const committed=root?.dataset?.handwashFinish==='committed';const nativeSummary=d.getElementById('summaryOverlay')?.classList.contains('show');const top=d.getElementById('handwashTopLayerSummaryR24');const topOpen=!!(top&&(top.open||top.hasAttribute('open')));if(!(committed||nativeSummary||topOpen))return;const score=num(d.getElementById('hw24Score')?.textContent||d.getElementById('sumScore')?.textContent||d.getElementById('scoreText')?.textContent);const accuracy=num(d.getElementById('hw24Accuracy')?.textContent||d.getElementById('sumAccuracy')?.textContent);show({passed:true,completed:true,score,accuracy})}catch(err){console.warn('Handwash inspection failed',err)}}
function goBack(){const r=latest||{passed:false,score:0,accuracy:0,eventId:eventId()};const u=new URL(returnUrl,location.href);u.searchParams.set('hhReturn','game');u.searchParams.set('studentId',sid);u.searchParams.set('zone',zone);u.searchParams.set('gameId',gameId);u.searchParams.set('passed',String(r.passed));u.searchParams.set('score',String(r.score));u.searchParams.set('accuracy',String(r.accuracy));u.searchParams.set('eventId',r.eventId);location.href=u.href}
document.getElementById('back').onclick=()=>{inspectHandwash();if(latest?.passed){goBack();return}if(confirm('ออกจากเกมและกลับ HeroHealth โดยยังไม่บันทึกว่าผ่าน?'))location.href=returnUrl};document.getElementById('finish').onclick=goBack;document.getElementById('returnBtn').onclick=goBack;
frame.addEventListener('load',()=>{status.textContent='กำลังเล่น';try{const w=frame.contentWindow;w.addEventListener('herohealth:game-result',e=>show(e.detail),{capture:true});w.addEventListener('message',e=>{const m=e.data||{};if(m.type==='HEROHEALTH_GAME_COMPLETE'&&m.payload)show(m.payload)});const d=frame.contentDocument;new MutationObserver(inspectHandwash).observe(d.documentElement,{subtree:true,childList:true,attributes:true,attributeFilter:['class','open','data-handwash-finish']});clearInterval(watchTimer);watchTimer=setInterval(inspectHandwash,300)}catch(err){console.warn('Game shell listener unavailable',err)}});
addEventListener('beforeunload',()=>clearInterval(watchTimer));
})();</script></body></html>
