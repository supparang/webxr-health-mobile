<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>HeroHealth Teacher Login</title><style>:root{font-family:Inter,"Noto Sans Thai",system-ui,sans-serif;background:#f3faf8;color:#17332f}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:20px}.card{width:min(430px,100%);background:#fff;border:1px solid #d8e9e5;border-radius:24px;padding:26px;box-shadow:0 18px 60px #0f766e18}.logo{font-size:42px}.muted{color:#6b807b}input,button{width:100%;min-height:52px;border-radius:14px;font:inherit;padding:12px}input{border:1px solid #cfe3df;font-size:22px;text-align:center;letter-spacing:8px}button{border:0;background:#0f766e;color:#fff;font-weight:900;margin-top:12px}.error{color:#b91c1c;min-height:24px;margin-top:10px}</style></head><body><main class="card"><div class="logo">💚</div><h1>เข้าสู่ระบบครู</h1><p class="muted">สำหรับอาจารย์ผู้ควบคุม HeroHealth Live Classroom เท่านั้น</p><form id="form"><input id="pin" type="password" inputmode="numeric" autocomplete="current-password" maxlength="12" placeholder="PIN ครู" required><button>เข้าสู่ Dashboard</button><div class="error" id="error"></div></form></main><script src="./data/backend-config.js?v=20260723-teacher1"></script><script>(()=>{'use strict';const cfg=window.HH_CONFIG?.teacherAccess||{},key=cfg.sessionKey||'herohealth_teacher_authorized_v1';if(sessionStorage.getItem(key)==='1')location.replace('./teacher-live.html');document.getElementById('form').onsubmit=e=>{e.preventDefault();const pin=document.getElementById('pin').value.trim();if(pin&&pin===String(cfg.pin||'')){sessionStorage.setItem(key,'1');location.replace('./teacher-live.html')}else{document.getElementById('error').textContent='PIN ไม่ถูกต้อง';document.getElementById('pin').select()}}})();</script></body></html>
