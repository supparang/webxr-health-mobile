const form=document.getElementById('form');form.innerHTML=items.map((it,i)=>`<section class="card" data-qid="${it.id}"><div class="q">${i+1}. ${it.text}</div><div class="opts">${it.displayOptions.map((o,j)=>`<label class="opt"><input type="radio" name="q${i}" value="${j}" required><span>${String.fromCharCode(65+j)}. ${o.text}</span></label>`).join('')}</div></section>`).join('')+`<section class="card"><button class="btn">ส่งคำตอบ Post-test</button><p class="muted">แต่ละรหัสได้สถานการณ์และลำดับตัวเลือกต่างกัน โดยคง Blueprint เท่ากันทุกคน</p></section>`;
form.onchange=()=>document.getElementById('bar').style.width=`${form.querySelectorAll('input:checked').length/items.length*100}%`;
form.onsubmit=e=>{e.preventDefault();const fd=new FormData(form);let score=0;const responses=items.map((it,i)=>{const selectedIndex=Number(fd.get(`q${i}`));const correct=selectedIndex===it.correctDisplayIndex;if(correct)score++;return{questionId:it.id,domain:it.domain,selectedOptionIndex:it.displayOptions[selectedIndex]?.index??null,correct}});try{sessionStorage.setItem('HH_POSTTEST_LAST',JSON.stringify({studentId:sid,score,total:items.length,responses,submittedAt:new Date().toISOString(),form:formCode,seed,blueprint:{hygiene:5,nutrition:5,fitness:5},bankSize:45}))}catch(_){}form.classList.add('hidden');const r=document.getElementById('result');r.classList.remove('hidden');r.innerHTML=`<h2>ส่ง Post-test แล้ว</h2><p>คะแนน ${score}/15</p><p class="muted">แบบทดสอบ ${formCode}</p><button class="btn" id="back">กลับ HeroHealth</button>`;document.getElementById('back').onclick=()=>{const u=new URL(back,location.href);u.searchParams.set('hhReturn','assessment');u.searchParams.set('task','posttest');u.searchParams.set('score',score);u.searchParams.set('studentId',sid);u.searchParams.set('form',formCode);location.href=u.href};scrollTo(0,0)};
})();</script></body></html>
