<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0f766e">
<title>HeroHealth Post-test</title>
<style>
:root{font-family:Inter,"Noto Sans Thai",system-ui,sans-serif;color:#12302c;background:#f3fbf9}*{box-sizing:border-box}body{margin:0}.wrap{width:min(860px,100%);margin:auto;padding:16px}.head,.card{background:#fff;border:1px solid #d6e9e4;border-radius:22px}.head{padding:22px;background:linear-gradient(135deg,#0f766e,#14b8a6);color:#fff}.card{padding:18px;margin-top:14px}.q{font-size:18px;font-weight:900;margin-bottom:12px}.opts{display:grid;gap:9px}.opt{display:flex;gap:10px;padding:13px;border:1px solid #cfe3df;border-radius:14px}.opt:has(input:checked){border-color:#0f766e;background:#e8f8f4}.btn{width:100%;min-height:50px;border:0;border-radius:15px;padding:14px;font:inherit;font-weight:900;background:#0f766e;color:#fff}.progress{height:10px;background:#dcebe8;border-radius:99px;overflow:hidden}.progress i{display:block;height:100%;background:#14b8a6}.hidden{display:none}
</style>
</head>
<body>
<main class="wrap">
<section class="head"><small>HSAS-P5 • FORM B</small><h1>Post-test หลังจบเกม</h1><p id="who"></p><div class="progress"><i id="bar"></i></div></section>
<form id="form"></form>
<section id="result" class="card hidden"></section>
</main>
<script>
(()=>{'use strict';
const KEY='herohealth_learning_platform_rc2';
let state={};try{state=JSON.parse(localStorage.getItem(KEY)||'{}')}catch(_){}
const sid=String(state.profile?.studentId||'');
document.getElementById('who').textContent=`${state.profile?.fullName||'ผู้เล่น'} • 15 ข้อ • ประมาณ 5 นาที`;
const bank=[
{id:'PST-HYG01',text:'ก่อนรับประทานอาหารควรทำสิ่งใด',options:['ล้างมือด้วยสบู่','เช็ดมือกับกางเกง','เป่ามือ','ไม่ต้องทำ'],answer:0},
{id:'PST-HYG02',text:'ควรแปรงฟันอย่างน้อยวันละกี่ครั้ง',options:['2 ครั้ง','1 ครั้ง','สัปดาห์ละครั้ง','เมื่อปวดฟัน'],answer:0},
{id:'PST-HYG03',text:'หลังไอหรือจามควรทำอย่างไร',options:['ล้างมือ','จับของต่อทันที','เช็ดกับเสื้อเพื่อน','ไม่ต้องทำ'],answer:0},
{id:'PST-NUT01',text:'อาหาร 5 หมู่ช่วยอะไร',options:['ให้สารอาหารหลากหลาย','ทำให้กินหวานได้มาก','แทนน้ำเปล่า','ไม่เกี่ยวกับสุขภาพ'],answer:0},
{id:'PST-NUT02',text:'ข้อใดเป็นโปรตีน',options:['ไข่','ลูกอม','น้ำหวาน','มันทอด'],answer:0},
{id:'PST-NUT03',text:'ถ้าต้องเลือกเครื่องดื่มควรเลือก',options:['น้ำเปล่า','น้ำอัดลม','ชานมหวาน','น้ำเชื่อม'],answer:0},
{id:'PST-NUT04',text:'อาหารว่างที่เหมาะสมคือ',options:['ผลไม้สด','ลูกอม','มันทอด','น้ำอัดลม'],answer:0},
{id:'PST-NUT05',text:'วิธีลดน้ำตาลคือ',options:['เลือกหวานน้อย','เพิ่มน้ำเชื่อม','เพิ่มท็อปปิง','ดื่มหลายแก้ว'],answer:0},
{id:'PST-NUT06',text:'จานสุขภาพควรมีลักษณะใด',options:['หลากหลายและพอเหมาะ','ของทอดทั้งหมด','ขนมทั้งหมด','ข้าวอย่างเดียว'],answer:0},
{id:'PST-FIT01',text:'ก่อนออกกำลังกายควร',options:['อบอุ่นร่างกาย','วิ่งเต็มแรงทันที','กินมื้อใหญ่','นั่งนิ่ง'],answer:0},
{id:'PST-FIT02',text:'เมื่อเจ็บระหว่างเล่นควร',options:['หยุดและบอกครู','ฝืนต่อ','เร่งความเร็ว','ปิดบัง'],answer:0},
{id:'PST-FIT03',text:'กิจกรรมฝึกการทรงตัวคือ',options:['ยืนขาเดียวอย่างปลอดภัย','นอนดูโทรศัพท์','กินขนม','วาดภาพ'],answer:0},
{id:'PST-FIT04',text:'หลังออกกำลังกายควรดื่ม',options:['น้ำเปล่า','น้ำอัดลม','น้ำหวานจัด','ชานม'],answer:0},
{id:'PST-FIT05',text:'การเคลื่อนไหวที่ดีควรเป็นอย่างไร',options:['สม่ำเสมอและปลอดภัย','หนักที่สุดเสมอ','ทำเมื่อถูกบังคับ','เล่นต่อแม้เจ็บ'],answer:0},
{id:'PST-MIX01',text:'ข้อใดเป็นพฤติกรรมฮีโร่สุขภาพ',options:['ล้างมือ กินดี และเคลื่อนไหว','กินหวานทุกมื้อ','ไม่พักผ่อน','ใช้ของส่วนตัวร่วมกัน'],answer:0}
];
function hash(str){let h=2166136261>>>0;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}
function rng(seed){let x=seed||123456789;return()=>{x+=0x6D2B79F5;let t=x;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}}
function shuffle(arr,random){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
const random=rng(hash(`herohealth-posttest-form-b-v2|${sid||'guest'}`));
const items=shuffle(bank,random).map(item=>{const displayOptions=shuffle(item.options.map((text,index)=>({text,index})),random);return{...item,displayOptions,correctDisplayIndex:displayOptions.findIndex(o=>o.index===item.answer)}});
const form=document.getElementById('form');
form.innerHTML=items.map((it,i)=>`<section class="card" data-qid="${it.id}"><div class="q">${i+1}. ${it.text}</div><div class="opts">${it.displayOptions.map((o,j)=>`<label class="opt"><input type="radio" name="q${i}" value="${j}" required><span>${String.fromCharCode(65+j)}. ${o.text}</span></label>`).join('')}</div></section>`).join('')+'<section class="card"><button class="btn">ส่งคำตอบ Post-test</button></section>';
form.onchange=()=>document.getElementById('bar').style.width=`${form.querySelectorAll('input:checked').length/items.length*100}%`;
form.onsubmit=e=>{
e.preventDefault();
const fd=new FormData(form);let score=0;
const responses=items.map((it,i)=>{const selected=Number(fd.get(`q${i}`));const correct=selected===it.correctDisplayIndex;if(correct)score++;return{questionId:it.id,selectedOptionIndex:it.displayOptions[selected]?.index??null,correct}});
try{sessionStorage.setItem('HH_POSTTEST_LAST',JSON.stringify({studentId:sid,form:'B',score,total:items.length,responses,submittedAt:new Date().toISOString()}))}catch(_){}
form.classList.add('hidden');
const r=document.getElementById('result');r.classList.remove('hidden');
r.innerHTML=`<h2>ส่ง Post-test แล้ว</h2><p>คะแนน ${score}/15</p><button class="btn" id="back">กลับ HeroHealth</button>`;
document.getElementById('back').onclick=()=>{const u=new URL('../index.html',location.href);u.searchParams.set('hhReturn','assessment');u.searchParams.set('task','posttest');u.searchParams.set('score',score);u.searchParams.set('studentId',sid);location.href=u.href};
scrollTo(0,0)
};
})();
</script>
</body>
</html>
