<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><meta name="theme-color" content="#0f766e"><title>HeroHealth Post-test</title><style>:root{font-family:Inter,"Noto Sans Thai",system-ui,sans-serif;color:#12302c;background:#f3fbf9}*{box-sizing:border-box}body{margin:0}.wrap{width:min(860px,100%);margin:auto;padding:16px}.head,.card{background:#fff;border:1px solid #d6e9e4;border-radius:22px}.head{padding:22px;background:linear-gradient(135deg,#0f766e,#14b8a6);color:#fff}.card{padding:18px;margin-top:14px}.q{font-size:18px;font-weight:900;margin-bottom:12px}.opts{display:grid;gap:9px}.opt{display:flex;gap:10px;padding:13px;border:1px solid #cfe3df;border-radius:14px}.opt:has(input:checked){border-color:#0f766e;background:#e8f8f4}.btn{width:100%;min-height:50px;border:0;border-radius:15px;padding:14px;font:inherit;font-weight:900;background:#0f766e;color:#fff}.progress{height:10px;background:#dcebe8;border-radius:99px;overflow:hidden}.progress i{display:block;height:100%;background:#14b8a6}.hidden{display:none}</style></head><body><main class="wrap"><section class="head"><small>HSAS-P5 • FORM B</small><h1>Post-test หลังจบเกม</h1><p id="who"></p><div class="progress"><i id="bar"></i></div></section><form id="form"></form><section id="result" class="card hidden"></section></main><script>(()=>{'use strict';const KEY='herohealth_learning_platform_rc2';let state={};try{state=JSON.parse(localStorage.getItem(KEY)||'{}')}catch(_){}const sid=state.profile?.studentId||'';document.getElementById('who').textContent=`${state.profile?.fullName||'ผู้เล่น'} • 15 ข้อ • ประมาณ 5 นาที`;const items=[['ก่อนรับประทานอาหารควรทำสิ่งใด',['ล้างมือด้วยสบู่','เช็ดมือกับกางเกง','เป่ามือ','ไม่ต้องทำ'],0],['ควรแปรงฟันอย่างน้อยวันละกี่ครั้ง',['2 ครั้ง','1 ครั้ง','สัปดาห์ละครั้ง','เมื่อปวดฟัน'],0],['หลังไอหรือจามควรทำอย่างไร',['ล้างมือ','จับของต่อทันที','เช็ดกับเสื้อเพื่อน','ไม่ต้องทำ'],0],['อาหาร 5 หมู่ช่วยอะไร',['ให้สารอาหารหลากหลาย','ทำให้กินหวานได้มาก','แทนน้ำเปล่า','ไม่เกี่ยวกับสุขภาพ'],0],['ข้อใดเป็นโปรตีน',['ไข่','ลูกอม','น้ำหวาน','มันทอด'],0],['ถ้าต้องเลือกเครื่องดื่มควรเลือก',['น้ำเปล่า','น้ำอัดลม','ชานมหวาน','น้ำเชื่อม'],0],['อาหารว่างที่เหมาะสมคือ',['ผลไม้สด','ลูกอม','มันทอด','น้ำอัดลม'],0],['วิธีลดน้ำตาลคือ',['เลือกหวานน้อย','เพิ่มน้ำเชื่อม','เพิ่มท็อปปิง','ดื่มหลายแก้ว'],0],['จานสุขภาพควรมีลักษณะใด',['หลากหลายและพอเหมาะ','ของทอดทั้งหมด','ขนมทั้งหมด','ข้าวอย่างเดียว'],0],['ก่อนออกกำลังกายควร',['อบอุ่นร่างกาย','วิ่งเต็มแรงทันที','กินมื้อใหญ่','นั่งนิ่ง'],0],['เมื่อเจ็บระหว่างเล่นควร',['หยุดและบอกครู','ฝืนต่อ','เร่งความเร็ว','ปิดบัง'],0],['กิจกรรมฝึกการทรงตัวคือ',['ยืนขาเดียวอย่างปลอดภัย','นอนดูโทรศัพท์','กินขนม','วาดภาพ'],0],['หลังออกกำลังกายควรดื่ม',['น้ำเปล่า','น้ำอัดลม','น้ำหวานจัด','ชานม'],0],['การเคลื่อนไหวที่ดีควรเป็นอย่างไร',['สม่ำเสมอและปลอดภัย','หนักที่สุดเสมอ','ทำเมื่อถูกบังคับ','เล่นต่อแม้เจ็บ'],0],['ข้อใดเป็นพฤติกรรมฮีโร่สุขภาพ',['ล้างมือ กินดี และเคลื่อนไหว','กินหวานทุกมื้อ','ไม่พักผ่อน','ใช้ของส่วนตัวร่วมกัน'],0]];const form=document.getElementById('form');form.innerHTML=items.map((it,i)=>`<section class="card"><div class="q">${i+1}. ${it[0]}</div><div class="opts">${it[1].map((o,j)=>`<label class="opt"><input type="radio" name="q${i}" value="${j}" required><span>${String.fromCharCode(65+j)}. ${o}</span></label>`).join('')}</div></section>`).join('')+'<section class="card"><button class="btn">ส่งคำตอบ Post-test</button></section>';form.onchange=()=>document.getElementById('bar').style.width=`${form.querySelectorAll('input:checked').length/items.length*100}%`;form.onsubmit=e=>{e.preventDefault();const fd=new FormData(form);let score=0;items.forEach((it,i)=>{if(Number(fd.get(`q${i}`))===it[2])score++});form.classList.add('hidden');const r=document.getElementById('result');r.classList.remove('hidden');r.innerHTML=`<h2>ส่ง Post-test แล้ว</h2><p>คะแนน ${score}/15</p><button class="btn" id="back">กลับ HeroHealth</button>`;document.getElementById('back').onclick=()=>{const u=new URL('../index.html',location.href);u.searchParams.set('hhReturn','assessment');u.searchParams.set('task','posttest');u.searchParams.set('score',score);u.searchParams.set('studentId',sid);location.href=u.href};scrollTo(0,0)}})();</script></body></html>
