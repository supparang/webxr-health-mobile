];function hash(str){let h=2166136261>>>0;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}function rng(seed){let x=seed||123456789;return()=>{x+=0x6D2B79F5;let t=x;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}}function shuffle(arr,random){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}const random=rng(hash(`herohealth-posttest-formb-v3|${sid||'guest'}`));const items=shuffle(bank,random).map(item=>{const opts=shuffle(item.options.map((text,index)=>({text,index})),random);return{...item,displayOptions:opts,correctDisplayIndex:opts.findIndex(o=>o.index===item.answer)}});const form=document.getElementById('form');form.innerHTML=items.map((it,i)=>`<section class="card" data-qid="${it.id}"><div class="q">${i+1}. ${it.text}</div><div class="opts">${it.displayOptions.map((o,j)=>`<label class="opt"><input type="radio" name="q${i}" value="${j}" required><span>${String.fromCharCode(65+j)}. ${o.text}</span></label>`).join('')}</div></section>`).join('')+'<section class="card"><button class="btn">ส่งคำตอบ Post-test</button></section>';form.onchange=()=>document.getElementById('bar').style.width=`${form.querySelectorAll('input:checked').length/items.length*100}%`;form.onsubmit=e=>{e.preventDefault();const fd=new FormData(form);let score=0;const responses=items.map((it,i)=>{const selected=Number(fd.get(`q${i}`));const correct=selected===it.correctDisplayIndex;if(correct)score++;return{questionId:it.id,selectedOptionIndex:it.displayOptions[selected]?.index??null,correct}});try{sessionStorage.setItem('HH_POSTTEST_LAST',JSON.stringify({studentId:sid,score,total:items.length,responses,submittedAt:new Date().toISOString(),form:'B-SCENARIO'}))}catch(_){}form.classList.add('hidden');const r=document.getElementById('result');r.classList.remove('hidden');r.innerHTML=`<h2>ส่ง Post-test แล้ว</h2><p>คะแนน ${score}/15</p><button class="btn" id="back">กลับ HeroHealth</button>`;document.getElementById('back').onclick=()=>{const u=new URL('../index.html',location.href);u.searchParams.set('hhReturn','assessment');u.searchParams.set('task','posttest');u.searchParams.set('score',score);u.searchParams.set('studentId',sid);location.href=u.href};scrollTo(0,0)}})();</script></body></html>
