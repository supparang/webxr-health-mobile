<!doctype html>
<html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0f766e"><title>HeroHealth Pre-test</title><style>
:root{font-family:Inter,"Noto Sans Thai",system-ui,sans-serif;color:#12302c;background:#f3fbf9}*{box-sizing:border-box}body{margin:0}.wrap{width:min(860px,100%);margin:auto;padding:18px}.head,.card{background:#fff;border:1px solid #d6e9e4;border-radius:22px;box-shadow:0 12px 30px rgba(15,118,110,.1)}.head{padding:22px;background:linear-gradient(135deg,#0f766e,#14b8a6);color:#fff}.head p{margin:6px 0 0;color:#d9fffa}.card{padding:18px;margin-top:14px}.q{font-size:18px;font-weight:900;margin-bottom:12px}.opts{display:grid;gap:9px}.opt{display:flex;gap:10px;align-items:flex-start;padding:12px;border:1px solid #cfe3df;border-radius:14px;cursor:pointer}.opt:has(input:checked){border-color:#0f766e;background:#e8f8f4}.btn{width:100%;border:0;border-radius:15px;padding:14px;font:inherit;font-weight:900;background:#0f766e;color:#fff;cursor:pointer}.muted{color:#5f7470}.progress{height:10px;background:#dcebe8;border-radius:99px;overflow:hidden}.progress i{display:block;height:100%;background:#14b8a6}.hidden{display:none}</style></head>
<body><main class="wrap"><section class="head"><small>HSAS-P5 • QA FORM A</small><h1>Pre-test ก่อนเริ่มภารกิจ</h1><p id="who">กำลังตรวจข้อมูลผู้เล่น</p><div class="progress"><i id="bar" style="width:0%"></i></div></section><form id="form"></form><section id="result" class="card hidden"></section></main><script>
(()=>{'use strict';
const q=new URLSearchParams(location.search),sid=q.get('studentId')||'',back=q.get('return')||'../index.html';
document.getElementById('who').textContent=`รหัส ${sid||'-'} • 15 ข้อ • ใช้เวลาประมาณ 5 นาที`;
const bank=[
{id:'HYG01',text:'ก่อนกินอาหารควรทำอะไร',options:['ล้างมือด้วยสบู่','เช็ดมือกับเสื้อ','เป่ามืออย่างเดียว','ไม่ต้องทำอะไร'],answer:0},
{id:'HYG02',text:'เมื่อจะจามควรปิดปากและจมูกด้วยอะไร',options:['ข้อพับแขน','ฝ่ามือแล้วจับของต่อ','ไหล่เพื่อน','ไม่ต้องปิด'],answer:0},
{id:'HYG03',text:'ของใช้ใดไม่ควรใช้ร่วมกัน',options:['แปรงสีฟัน','หนังสือ','ลูกบอล','ดินสอสี'],answer:0},
{id:'HYG04',text:'หลังเล่นจนเหงื่อออกควรทำอย่างไร',options:['อาบน้ำและเปลี่ยนเสื้อผ้า','ใส่เสื้อตัวเดิมนอน','ฉีดน้ำหอมแทน','ไม่ต้องทำอะไร'],answer:0},
{id:'HYG05',text:'เมื่อพบพื้นเปียกควรทำอย่างไร',options:['แจ้งผู้ใหญ่และหลีกเลี่ยง','วิ่งข้าม','ชวนเพื่อนกระโดด','ปล่อยไว้'],answer:0},
{id:'NUT01',text:'เมื่อกระหายน้ำควรเลือกอะไร',options:['น้ำเปล่า','น้ำอัดลม','ชานม','น้ำหวาน'],answer:0},
{id:'NUT02',text:'จานอาหารที่ดีควรเป็นอย่างไร',options:['มีอาหารหลายกลุ่มพอเหมาะ','มีของทอดทั้งหมด','มีขนมทั้งหมด','มีข้าวอย่างเดียว'],answer:0},
{id:'NUT03',text:'ข้อใดเป็นอาหารกลุ่มโปรตีน',options:['ไข่','น้ำหวาน','ลูกอม','น้ำอัดลม'],answer:0},
{id:'NUT04',text:'วิธีใดช่วยลดน้ำตาล',options:['เลือกหวานน้อยหรือไม่หวาน','เติมน้ำเชื่อม','เพิ่มท็อปปิง','ดื่มหลายแก้ว'],answer:0},
{id:'NUT05',text:'ของว่างใดเหมาะกว่า',options:['ผลไม้สด','ลูกอม','มันทอด','น้ำอัดลม'],answer:0},
{id:'FIT01',text:'ก่อนออกกำลังกายควรทำอะไร',options:['อบอุ่นร่างกาย','วิ่งเต็มแรงทันที','นั่งนิ่ง','กินมื้อใหญ่'],answer:0},
{id:'FIT02',text:'เมื่อรู้สึกเจ็บระหว่างเล่นควรทำอย่างไร',options:['หยุดและบอกครู','ฝืนเล่นต่อ','เพิ่มความเร็ว','ไม่บอกใคร'],answer:0},
{id:'FIT03',text:'กิจกรรมใดช่วยฝึกการทรงตัว',options:['ยืนขาเดียวอย่างปลอดภัย','นั่งอ่าน','ร้องเพลง','วาดรูป'],answer:0},
{id:'FIT04',text:'หลังออกกำลังกายควรเลือกอะไร',options:['น้ำเปล่า','น้ำอัดลม','น้ำหวานจัด','ชานม'],answer:0},
{id:'FIT05',text:'นิสัยใดเหมาะสมที่สุด',options:['เคลื่อนไหวสม่ำเสมอและพักพอ','ออกแรงหนักวันเดียว','นั่งทั้งวัน','เล่นแม้เจ็บ'],answer:0}
];
function hash(str){let h=2166136261>>>0;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}
function rng(seed){let x=seed||123456789;return()=>{x+=0x6D2B79F5;let t=x;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}}
function shuffle(arr,random){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
const random=rng(hash(`herohealth-pretest-v2|${sid||'guest'}`));
const items=shuffle(bank,random).map(item=>{const opts=shuffle(item.options.map((text,index)=>({text,index})),random);return{...item,displayOptions:opts,correctDisplayIndex:opts.findIndex(o=>o.index===item.answer)}});
const form=document.getElementById('form');
form.innerHTML=items.map((it,i)=>`<section class="card" data-qid="${it.id}"><div class="q">${i+1}. ${it.text}</div><div class="opts">${it.displayOptions.map((o,j)=>`<label class="opt"><input type="radio" name="q${i}" value="${j}" required><span>${String.fromCharCode(65+j)}. ${o.text}</span></label>`).join('')}</div></section>`).join('')+`<section class="card"><button class="btn">ส่งคำตอบ Pre-test</button><p class="muted">ต้องตอบครบทุกข้อก่อนส่ง</p></section>`;
form.addEventListener('change',()=>{const n=form.querySelectorAll('input:checked').length;document.getElementById('bar').style.width=`${n/items.length*100}%`});
form.addEventListener('submit',e=>{e.preventDefault();const fd=new FormData(form);let score=0;const responses=items.map((it,i)=>{const selected=Number(fd.get(`q${i}`));const correct=selected===it.correctDisplayIndex;if(correct)score++;return{questionId:it.id,selectedOptionIndex:it.displayOptions[selected]?.index??null,correct}});try{sessionStorage.setItem('HH_PRETEST_LAST',JSON.stringify({studentId:sid,score,total:items.length,responses,submittedAt:new Date().toISOString()}))}catch(_){}form.classList.add('hidden');const r=document.getElementById('result');r.classList.remove('hidden');r.innerHTML=`<h2>ส่ง Pre-test แล้ว</h2><p>คะแนนทดสอบ ${score}/15</p><button id="back" class="btn">กลับ HeroHealth</button>`;document.getElementById('back').onclick=()=>{const u=new URL(back,location.href);u.searchParams.set('hhReturn','assessment');u.searchParams.set('task','pretest');u.searchParams.set('score',score);u.searchParams.set('studentId',sid);location.href=u.href};window.scrollTo({top:0,behavior:'smooth'})});
})();
</script></body></html>
