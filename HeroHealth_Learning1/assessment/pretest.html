function hash(str){let h=2166136261>>>0;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}
function rng(seed){let x=seed||123456789;return()=>{x+=0x6D2B79F5;let t=x;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}}
function shuffle(arr,random){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

const items=shuffle(selected,random).map(item=>{const opts=shuffle(item.options.map((text,index)=>({text,index})),random);return{...item,displayOptions:opts,correctDisplayIndex:opts.findIndex(o=>o.index===item.answer)}});

document.getElementById('who').textContent=`รหัส ${sid||'-'} • 15 ข้อจากคลัง 45 ข้อ • ใช้เวลาประมาณ 5 นาที`;
const form=document.getElementById('form');form.innerHTML=items.map((it,i)=>`<section class="card" data-qid="${it.id}"><div class="q">${i+1}. ${it.text}</div><div class="opts">${it.displayOptions.map((o,j)=>`<label class="opt"><input type="radio" name="q${i}" value="${j}" required><span>${String.fromCharCode(65+j)}. ${o.text}</span></label>`).join('')}</div></section>`).join('')+`<section class="card"><button class="btn">ส่งคำตอบ Pre-test</button><p class="muted">แต่ละรหัสได้ชุดและลำดับตัวเลือกต่างกัน แต่ยังคงสัดส่วนสุขอนามัย โภชนาการ และการเคลื่อนไหวเท่ากัน</p></section>`;
form.addEventListener('change',()=>{document.getElementById('bar').style.width=`${form.querySelectorAll('input:checked').length/items.length*100}%`});
form.addEventListener('submit',e=>{e.preventDefault();const fd=new FormData(form);let score=0;const responses=items.map((it,i)=>{const selectedIndex=Number(fd.get(`q${i}`));const correct=selectedIndex===it.correctDisplayIndex;if(correct)score++;return{questionId:it.id,domain:it.domain,selectedOptionIndex:it.displayOptions[selectedIndex]?.index??null,correct}});try{sessionStorage.setItem('HH_PRETEST_LAST',JSON.stringify({studentId:sid,score,total:items.length,responses,submittedAt:new Date().toISOString(),form:formCode,seed,blueprint:{hygiene:5,nutrition:5,fitness:5},bankSize:45}))}catch(_){}form.classList.add('hidden');const r=document.getElementById('result');r.classList.remove('hidden');r.innerHTML=`<h2>ส่ง Pre-test แล้ว</h2><p>คะแนนทดสอบ ${score}/15</p><p class="muted">แบบทดสอบ ${formCode}</p><button id="back" class="btn">กลับ HeroHealth</button>`;document.getElementById('back').onclick=()=>{const u=new URL(back,location.href);u.searchParams.set('hhReturn','assessment');u.searchParams.set('task','pretest');u.searchParams.set('score',score);u.searchParams.set('studentId',sid);u.searchParams.set('form',formCode);location.href=u.href};window.scrollTo({top:0,behavior:'smooth'})});
})();
