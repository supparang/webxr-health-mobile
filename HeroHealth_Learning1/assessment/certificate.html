<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><meta name="theme-color" content="#f59e0b"><title>HeroHealth Certificate</title><style>:root{font-family:Inter,"Noto Sans Thai",system-ui,sans-serif;color:#3b2505;background:#fff8e7}*{box-sizing:border-box}body{margin:0}.wrap{min-height:100vh;display:grid;place-items:center;padding:18px}.cert{width:min(760px,100%);background:#fff;border:8px double #f59e0b;border-radius:28px;padding:26px;text-align:center;box-shadow:0 18px 50px rgba(146,89,0,.18)}.hero{font-size:72px}.name{font-size:clamp(30px,8vw,54px);font-weight:1000;color:#0f766e;margin:16px 0}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:20px 0}.box{background:#fff7d6;border-radius:16px;padding:14px}.btn{width:100%;min-height:50px;border:0;border-radius:15px;padding:14px;font:inherit;font-weight:900;background:#0f766e;color:#fff}.muted{color:#765d32}@media print{.btn{display:none}.wrap{padding:0}.cert{box-shadow:none}}</style></head><body><main class="wrap"><section class="cert"><div class="hero">🏆</div><small>HEROHEALTH CLASSROOM MISSION 60 MINUTES</small><h1>ใบประกาศฮีโร่สุขภาพ</h1><p>มอบให้แก่</p><div id="name" class="name">ผู้เล่น</div><p>ที่เข้าร่วมภารกิจครบทั้งสุขอนามัย โภชนาการ และการเคลื่อนไหวบนมือถือ</p><div class="grid"><div class="box"><b>Pre-test</b><div id="pre">-</div></div><div class="box"><b>Post-test</b><div id="post">-</div></div><div class="box"><b>เกมที่เล่น</b><div id="games">6 รอบ</div></div><div class="box"><b>สถานะ</b><div>Mission Complete</div></div></div><p id="date" class="muted"></p><button class="btn" onclick="location.href='../index.html'">กลับหน้า Hero Passport</button></section></main><script>(()=>{let s={};try{s=JSON.parse(localStorage.getItem('herohealth_learning_platform_rc2')||'{}')}catch(_){}document.getElementById('name').textContent=s.profile?.fullName||'ผู้เล่น';document.getElementById('pre').textContent=`${s.scores?.pretest??'-'}/15`;document.getElementById('post').textContent=`${s.scores?.posttest??'-'}/15`;const count=Object.values(s.gameCompleted||{}).reduce((n,z)=>n+Object.values(z||{}).filter(Boolean).length,0);document.getElementById('games').textContent=`${count} รอบ`;document.getElementById('date').textContent=new Intl.DateTimeFormat('th-TH',{dateStyle:'long'}).format(new Date())})();</script></body></html>
