<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><meta name="theme-color" content="#7c3aed"><title>HeroHealth Reflection</title><style>:root{font-family:Inter,"Noto Sans Thai",system-ui,sans-serif;color:#241442;background:#f7f3ff}*{box-sizing:border-box}body{margin:0}.wrap{width:min(760px,100%);margin:auto;padding:16px}.head,.card{background:#fff;border:1px solid #e5d9fa;border-radius:22px}.head{padding:22px;background:linear-gradient(135deg,#6d28d9,#8b5cf6);color:#fff}.card{padding:18px;margin-top:14px}.choice{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.choice label{padding:14px 8px;border:1px solid #ddd0f4;border-radius:15px;text-align:center;font-weight:800}.choice label:has(input:checked){border-color:#7c3aed;background:#f0e9ff}.choice input{display:block;margin:0 auto 8px}textarea{width:100%;min-height:110px;border:1px solid #d8c8ee;border-radius:14px;padding:12px;font:inherit}.btn{width:100%;min-height:50px;border:0;border-radius:15px;padding:14px;font:inherit;font-weight:900;background:#7c3aed;color:#fff}.muted{color:#695c7a}</style></head><body><main class="wrap"><section class="head"><small>HERO REFLECTION</small><h1>ฉันได้เรียนรู้อะไรวันนี้</h1><p id="who"></p></section><form id="form"><section class="card"><h2>1. วันนี้ฉันเข้าใจเรื่องสุขภาพมากขึ้นแค่ไหน</h2><div class="choice"><label><input type="radio" name="understand" value="1" required>🙂 เล็กน้อย</label><label><input type="radio" name="understand" value="2">😊 มากขึ้น</label><label><input type="radio" name="understand" value="3">🌟 มากที่สุด</label></div></section><section class="card"><h2>2. ภารกิจใดช่วยให้ฉันเรียนรู้มากที่สุด</h2><div class="choice"><label><input type="radio" name="best" value="hygiene" required>🧼 สุขอนามัย</label><label><input type="radio" name="best" value="nutrition">🥗 โภชนาการ</label><label><input type="radio" name="best" value="fitness">🏃 การเคลื่อนไหว</label></div></section><section class="card"><h2>3. พรุ่งนี้ฉันจะทำพฤติกรรมสุขภาพอะไร</h2><textarea name="action" required maxlength="240" placeholder="ตัวอย่าง: ฉันจะล้างมือก่อนกินอาหารทุกครั้ง"></textarea><p class="muted">เขียนสั้น ๆ อย่างน้อย 1 ประโยค</p></section><section class="card"><button class="btn">ส่ง Reflection</button></section></form></main><script>(()=>{'use strict';const KEY='herohealth_learning_platform_rc2';let s={};try{s=JSON.parse(localStorage.getItem(KEY)||'{}')}catch(_){}const sid=s.profile?.studentId||'';document.getElementById('who').textContent=s.profile?.fullName||'ผู้เล่น';document.getElementById('form').onsubmit=e=>{e.preventDefault();const fd=new FormData(e.currentTarget);s.reflection={understand:Number(fd.get('understand'))||0,best:String(fd.get('best')||''),action:String(fd.get('action')||'').trim(),submittedAt:new Date().toISOString()};localStorage.setItem(KEY,JSON.stringify(s));const u=new URL('../index.html',location.href);u.searchParams.set('hhReturn','assessment');u.searchParams.set('task','reflection');u.searchParams.set('score',s.reflection.understand);u.searchParams.set('studentId',sid);location.href=u.href}})();</script></body></html>
