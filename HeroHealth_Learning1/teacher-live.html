<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>HeroHealth Live Teacher Dashboard</title><style>:root{font-family:Inter,"Noto Sans Thai",system-ui,sans-serif;color:#17332f;background:#f3faf8}*{box-sizing:border-box}body{margin:0}.top{position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid #d7e8e4;padding:14px 18px;display:flex;justify-content:space-between}.brand{font-weight:900;font-size:20px}.wrap{width:min(1450px,100%);margin:auto;padding:18px}.toolbar,.card{background:#fff;border:1px solid #d8e9e5;border-radius:18px}.toolbar{padding:14px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.toolbar input,.toolbar select,.toolbar button{min-height:44px;border:1px solid #cfe3df;border-radius:12px;padding:10px;font:inherit}.toolbar button{background:#0f766e;color:#fff;font-weight:800;border:0}.status{font-size:13px;color:#617873}.groups{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px;margin:16px 0}.group{padding:16px;cursor:pointer}.group.active{outline:3px solid #14b8a6}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.kpi{background:#eef8f5;border-radius:12px;padding:9px;text-align:center}.kpi b{display:block;font-size:20px}.scroll{overflow:auto;max-height:62vh}table{width:100%;border-collapse:collapse;min-width:1050px}th,td{padding:11px;border-top:1px solid #e4efec;text-align:left;white-space:nowrap}th{position:sticky;top:0;background:#f8fcfb}.badge{display:inline-block;padding:5px 9px;border-radius:999px;background:#e9f7f3;font-size:12px;font-weight:800}.online{background:#dcfce7;color:#166534}.offline{background:#f1f5f9;color:#64748b}.complete{background:#fef3c7;color:#92400e}.stalled{background:#fee2e2;color:#991b1b}.namebtn{border:0;background:none;color:#0f766e;font:inherit;font-weight:900;cursor:pointer}.empty{padding:40px;text-align:center}.modal{position:fixed;inset:0;background:#0008;display:none;align-items:center;justify-content:center;padding:18px;z-index:99}.modal.open{display:flex}.dialog{width:min(760px,100%);max-height:90vh;overflow:auto;background:#fff;border-radius:22px;padding:20px}.detailGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.detail{background:#eef8f5;border-radius:14px;padding:12px}.close{float:right;border:0;background:#edf2f7;border-radius:10px;padding:8px 12px;font-weight:900}.danger{color:#b91c1c}@media(max-width:760px){.toolbar{grid-template-columns:1fr 1fr}.groups{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(4,1fr)}.detailGrid{grid-template-columns:1fr 1fr}}</style></head><body><header class="top"><div><div class="brand">💚 HeroHealth Live Classroom</div><div class="status" id="status">กำลังเชื่อมต่อ...</div></div><a href="./index.html">← กลับ Platform</a></header><main class="wrap"><section class="toolbar"><select id="section"><option value="">ทุกห้อง</option></select><select id="group"><option value="">ทุกกลุ่ม</option></select><select id="state"><option value="">ทุกสถานะ</option><option value="online">ออนไลน์</option><option value="offline">ออฟไลน์</option><option value="stalled">ค้างเกิน 5 นาที</option><option value="complete">ทำครบแล้ว</option><option value="incomplete">ยังไม่ครบ</option></select><input id="q" placeholder="ค้นหารหัสหรือชื่อ"><button id="refresh">รีเฟรชทันที</button><button id="auto">Auto refresh: ON</button></section><section class="groups" id="groups"></section><section class="card"><div style="padding:14px"><b id="title">รายชื่อนักเรียนทั้งหมด</b><div class="status" id="count"></div></div><div class="scroll"><table><thead><tr><th>กลุ่ม</th><th>รหัส</th><th>ชื่อ</th><th>ห้อง</th><th>ขั้นปัจจุบัน</th><th>สถานะ</th><th>ความคืบหน้า</th><th>ออนไลน์</th><th>อัปเดตล่าสุด</th></tr></thead><tbody id="rows"></tbody></table><div class="empty" id="empty" hidden>ยังไม่มีข้อมูลนักเรียน</div></div></section></main><div class="modal" id="modal"><div class="dialog"><button class="close" id="close">ปิด</button><h2 id="dname">รายละเอียดนักเรียน</h2><div id="detail">กำลังโหลด...</div></div></div><script src="./data/backend-config.js?v=20260723-live2"></script><script>(()=>{'use strict';const endpoint=window.HH_CONFIG?.backend?.webAppUrl||'';let data={students:[],summary:[]},auto=true,activeGroup='';const $=id=>document.getElementById(id),esc=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));const ageMin=x=>x.lastSeen?(Date.now()-new Date(x.lastSeen).getTime())/60000:999;const complete=x=>x.missionComplete===true||String(x.missionComplete)==='TRUE';
function call(action,params,cb){const name='HH_'+action+'_'+Date.now();window[name]=x=>{delete window[name];document.getElementById(name)?.remove();cb(x)};const s=document.createElement('script');s.id=name;s.onerror=()=>cb({ok:false});s.src=endpoint+'?action='+action+'&callback='+name+'&_='+Date.now()+Object.entries(params||{}).map(([k,v])=>'&'+k+'='+encodeURIComponent(v)).join('');document.body.appendChild(s)}
function load(){call('live',{},x=>{if(!x?.ok){$('status').innerHTML='<span class="danger">เชื่อมต่อ Backend ไม่สำเร็จ</span>';return}data=x;filters();render();$('status').textContent='อัปเดตล่าสุด '+new Date(x.generatedAt).toLocaleTimeString('th-TH')+' • นักเรียน '+x.students.length+' คน'})}
function filters(){const ss=[...new Set(data.students.map(x=>String(x.section||'')).filter(Boolean))].sort(),gg=[...new Set(data.students.map(x=>String(x.group||'')).filter(Boolean))].sort(),ks=$('section').value,kg=$('group').value;$('section').innerHTML='<option value="">ทุกห้อง</option>'+ss.map(x=>`<option ${x===ks?'selected':''}>${esc(x)}</option>`).join('');$('group').innerHTML='<option value="">ทุกกลุ่ม</option>'+gg.map(x=>`<option ${x===kg?'selected':''}>${esc(x)}</option>`).join('')}
function list(){const sec=$('section').value,g=$('group').value||activeGroup,st=$('state').value,q=$('q').value.toLowerCase();return data.students.filter(x=>(!sec||String(x.section)===sec)&&(!g||String(x.group)===g)&&(!q||(String(x.studentId)+' '+String(x.fullName)).toLowerCase().includes(q))&&(!st||(st==='online'&&x.online)||(st==='offline'&&!x.online)||(st==='stalled'&&!complete(x)&&ageMin(x)>5)||(st==='complete'&&complete(x))||(st==='incomplete'&&!complete(x))))}
function groupCards(){const by={};data.students.forEach(s=>{const g=String(s.group||'-');if(!by[g])by[g]={group:g,total:0,online:0,complete:0,pretest:0,playing:0,posttest:0,reflection:0,stalled:0};const a=by[g],step=String(s.currentStep||'');a.total++;if(s.online)a.online++;if(complete(s))a.complete++;if(step!=='pretest')a.pretest++;if(step.includes(':'))a.playing++;if(step==='reflection'||step==='certificate')a.posttest++;if(step==='certificate')a.reflection++;if(!complete(s)&&ageMin(s)>5)a.stalled++});$('groups').innerHTML=Object.values(by).sort((a,b)=>a.group.localeCompare(b.group)).map(x=>`<article class="card group ${activeGroup===x.group?'active':''}" data-g="${esc(x.group)}"><h3>กลุ่ม ${esc(x.group)}</h3><div class="kpis"><div class="kpi">ทั้งหมด<b>${x.total}</b></div><div class="kpi">ออนไลน์<b>${x.online}</b></div><div class="kpi">ครบแล้ว<b>${x.complete}</b></div><div class="kpi">ค้าง >5 นาที<b>${x.stalled}</b></div><div class="kpi">Pre-test<b>${x.pretest}</b></div><div class="kpi">กำลังเล่น<b>${x.playing}</b></div><div class="kpi">Post-test<b>${x.posttest}</b></div><div class="kpi">Reflection<b>${x.reflection}</b></div></div></article>`).join('');$('groups').querySelectorAll('[data-g]').forEach(e=>e.onclick=()=>{activeGroup=activeGroup===e.dataset.g?'':e.dataset.g;$('group').value=activeGroup;render()})}
function rows(){const a=list();$('title').textContent=(activeGroup||$('group').value)?'รายชื่อกลุ่ม '+(activeGroup||$('group').value):'รายชื่อนักเรียนทั้งหมด';$('count').textContent='แสดง '+a.length+' คน';$('empty').hidden=!!a.length;$('rows').innerHTML=a.sort((x,y)=>String(x.group).localeCompare(String(y.group))||String(x.studentId).localeCompare(String(y.studentId))).map(x=>{const stalled=!complete(x)&&ageMin(x)>5,when=x.lastSeen?new Date(x.lastSeen).toLocaleTimeString('th-TH'):'-';return `<tr><td><b>${esc(x.group||'-')}</b></td><td>${esc(x.studentId)}</td><td><button class="namebtn" data-sid="${esc(x.studentId)}">${esc(x.fullName)}</button></td><td>${esc(x.section)}</td><td>${esc(x.currentStep||'-')}</td><td><span class="badge ${complete(x)?'complete':stalled?'stalled':''}">${stalled?'ค้างเกิน 5 นาที':esc(x.status||'-')}</span></td><td>${Number(x.progressPct)||0}% (${Number(x.completedCount)||0}/9)</td><td><span class="badge ${x.online?'online':'offline'}">${x.online?'ออนไลน์':'ออฟไลน์'}</span></td><td>${esc(when)}</td></tr>`}).join('');document.querySelectorAll('[data-sid]').forEach(b=>b.onclick=()=>detail(b.dataset.sid))}
function detail(sid){$('modal').classList.add('open');$('detail').textContent='กำลังโหลด...';call('student',{studentId:sid},x=>{if(!x?.ok){$('detail').textContent='โหลดรายละเอียดไม่สำเร็จ';return}const p=x.profile||{},l=x.live||{};$('dname').textContent=(p.fullName||l.fullName||sid)+' ('+sid+')';$('detail').innerHTML=`<div class="detailGrid"><div class="detail">ห้อง<b>${esc(p.section||l.section||'-')}</b></div><div class="detail">กลุ่ม<b>${esc(p.group||l.group||'-')}</b></div><div class="detail">ขั้นปัจจุบัน<b>${esc(l.currentStep||'-')}</b></div><div class="detail">ความคืบหน้า<b>${Number(l.progressPct)||0}%</b></div><div class="detail">ทำครบ<b>${complete(l)?'ใช่':'ยัง'}</b></div><div class="detail">อัปเดตล่าสุด<b>${l.lastSeen?new Date(l.lastSeen).toLocaleString('th-TH'):'-'}</b></div></div><p>สถานะล่าสุด: <b>${esc(l.status||'-')}</b></p><p class="status">คะแนน Pre-test, Post-test และผลเกมรายเกมจะแสดงเมื่ออัปเดต Receiver เป็นรุ่น Detail API</p>`})}
function render(){groupCards();rows()}['section','group','state'].forEach(id=>$(id).onchange=()=>{if(id==='group')activeGroup=$('group').value;render()});$('q').oninput=render;$('refresh').onclick=load;$('auto').onclick=()=>{auto=!auto;$('auto').textContent='Auto refresh: '+(auto?'ON':'OFF')};$('close').onclick=()=>$('modal').classList.remove('open');$('modal').onclick=e=>{if(e.target===$('modal'))$('modal').classList.remove('open')};setInterval(()=>{if(auto)load()},15000);load()})();</script></body></html>
