<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>HeroHealth Live Teacher Dashboard</title>
<style>
:root{font-family:Inter,"Noto Sans Thai",system-ui,sans-serif;color:#17332f;background:#f3faf8}*{box-sizing:border-box}body{margin:0}.top{position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid #d7e8e4;padding:14px 18px;display:flex;gap:12px;align-items:center;justify-content:space-between}.brand{font-weight:900;font-size:20px}.wrap{width:min(1400px,100%);margin:auto;padding:18px}.toolbar,.card{background:#fff;border:1px solid #d8e9e5;border-radius:18px}.toolbar{padding:14px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.toolbar input,.toolbar select,.toolbar button{min-height:44px;border:1px solid #cfe3df;border-radius:12px;padding:10px;font:inherit}.toolbar button{background:#0f766e;color:#fff;font-weight:800;border:0}.status{font-size:13px;color:#617873}.groups{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;margin:16px 0}.group{padding:16px;cursor:pointer}.group.active{outline:3px solid #14b8a6}.group h3{margin:0 0 10px}.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.kpi{background:#eef8f5;border-radius:12px;padding:10px;text-align:center}.kpi b{display:block;font-size:22px}.tableCard{overflow:hidden}.tableHead{padding:14px;display:flex;justify-content:space-between;gap:10px;align-items:center}.scroll{overflow:auto;max-height:62vh}table{width:100%;border-collapse:collapse;min-width:960px}th,td{padding:11px;border-top:1px solid #e4efec;text-align:left;white-space:nowrap}th{position:sticky;top:0;background:#f8fcfb;z-index:1}.badge{display:inline-block;padding:5px 9px;border-radius:999px;background:#e9f7f3;font-size:12px;font-weight:800}.online{background:#dcfce7;color:#166534}.offline{background:#f1f5f9;color:#64748b}.complete{background:#fef3c7;color:#92400e}.muted{color:#6b807b}.empty{padding:40px;text-align:center}.danger{color:#b91c1c}@media(max-width:760px){.toolbar{grid-template-columns:1fr 1fr}.top{align-items:flex-start;flex-direction:column}.wrap{padding:10px}.groups{grid-template-columns:1fr 1fr}.kpis{grid-template-columns:1fr 1fr 1fr}}
</style>
</head>
<body>
<header class="top"><div><div class="brand">💚 HeroHealth Live Classroom</div><div class="status" id="status">กำลังเชื่อมต่อ...</div></div><div><a href="./index.html" style="color:#0f766e;font-weight:800;text-decoration:none">← กลับ Platform</a></div></header>
<main class="wrap">
<section class="toolbar">
<select id="section"><option value="">ทุกห้อง</option></select>
<select id="group"><option value="">ทุกกลุ่ม</option></select>
<select id="state"><option value="">ทุกสถานะ</option><option value="online">ออนไลน์</option><option value="offline">ออฟไลน์</option><option value="complete">ทำครบแล้ว</option><option value="incomplete">ยังไม่ครบ</option></select>
<input id="q" placeholder="ค้นหารหัสหรือชื่อ">
<button id="refresh">รีเฟรชทันที</button>
<button id="auto">Auto refresh: ON</button>
</section>
<section class="groups" id="groups"></section>
<section class="card tableCard"><div class="tableHead"><div><b id="title">รายชื่อนักเรียนทั้งหมด</b><div class="status" id="count"></div></div><div class="status">ออนไลน์ = อัปเดตภายใน 2 นาที</div></div><div class="scroll"><table><thead><tr><th>กลุ่ม</th><th>รหัส</th><th>ชื่อ</th><th>ห้อง</th><th>ขั้นปัจจุบัน</th><th>สถานะ</th><th>ความคืบหน้า</th><th>ออนไลน์</th><th>อัปเดตล่าสุด</th></tr></thead><tbody id="rows"></tbody></table><div class="empty" id="empty" hidden>ยังไม่มีข้อมูลนักเรียน</div></div></section>
</main>
<script src="./data/backend-config.js?v=20260723-live1"></script>
<script>
(()=>{'use strict';const endpoint=window.HH_CONFIG?.backend?.webAppUrl||'';let data={students:[],summary:[]},auto=true,timer=null,activeGroup='';const $=id=>document.getElementById(id);const esc=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function jsonp(){if(!endpoint){$('status').innerHTML='<span class="danger">ยังไม่ได้ตั้งค่า Backend URL</span>';return}const cb='HH_LIVE_'+Date.now();window[cb]=x=>{delete window[cb];document.getElementById(cb)?.remove();if(!x?.ok){fail('Backend ตอบกลับไม่สำเร็จ');return}data=x;fillFilters();render();$('status').textContent='อัปเดตล่าสุด '+new Date(x.generatedAt).toLocaleTimeString('th-TH')+' • นักเรียน '+x.students.length+' คน'};const s=document.createElement('script');s.id=cb;s.onerror=()=>{delete window[cb];fail('เชื่อมต่อ Dashboard API ไม่สำเร็จ — ตรวจ deployment รุ่นล่าสุด')};s.src=endpoint+(endpoint.includes('?')?'&':'?')+'action=live&callback='+encodeURIComponent(cb)+'&_='+Date.now();document.body.appendChild(s)}
function fail(msg){$('status').innerHTML='<span class="danger">'+esc(msg)+'</span>'}
function fillFilters(){const sections=[...new Set(data.students.map(x=>String(x.section||'')).filter(Boolean))].sort(),groups=[...new Set(data.students.map(x=>String(x.group||'')).filter(Boolean))].sort();const keepS=$('section').value,keepG=$('group').value;$('section').innerHTML='<option value="">ทุกห้อง</option>'+sections.map(x=>`<option ${x===keepS?'selected':''}>${esc(x)}</option>`).join('');$('group').innerHTML='<option value="">ทุกกลุ่ม</option>'+groups.map(x=>`<option ${x===keepG?'selected':''}>${esc(x)}</option>`).join('')}
function filtered(){const sec=$('section').value,g=$('group').value||activeGroup,st=$('state').value,q=$('q').value.trim().toLowerCase();return data.students.filter(x=>(!sec||String(x.section)===sec)&&(!g||String(x.group)===g)&&(!q||(String(x.studentId)+' '+String(x.fullName)).toLowerCase().includes(q))&&(!st||(st==='online'&&x.online)||(st==='offline'&&!x.online)||(st==='complete'&&(x.missionComplete===true||String(x.missionComplete)==='TRUE'))||(st==='incomplete'&&!(x.missionComplete===true||String(x.missionComplete)==='TRUE'))))}
function renderGroups(){const cards=(data.summary||[]).map(x=>`<article class="card group ${activeGroup===String(x.group)?'active':''}" data-g="${esc(x.group)}"><h3>กลุ่ม ${esc(x.group)}</h3><div class="kpis"><div class="kpi"><span>ทั้งหมด</span><b>${x.total}</b></div><div class="kpi"><span>ออนไลน์</span><b>${x.online}</b></div><div class="kpi"><span>ครบแล้ว</span><b>${x.complete}</b></div><div class="kpi"><span>Pre-test</span><b>${x.pretest}</b></div><div class="kpi"><span>กำลังเล่น</span><b>${x.playing}</b></div><div class="kpi"><span>Post-test</span><b>${x.posttest}</b></div></div></article>`).join('');$('groups').innerHTML=cards||'<div class="card empty">ยังไม่มีข้อมูลรายกลุ่ม</div>';$('groups').querySelectorAll('[data-g]').forEach(el=>el.onclick=()=>{activeGroup=activeGroup===el.dataset.g?'':el.dataset.g;$('group').value=activeGroup;render()})}
function renderRows(){const list=filtered();$('title').textContent=activeGroup||$('group').value?'รายชื่อกลุ่ม '+(activeGroup||$('group').value):'รายชื่อนักเรียนทั้งหมด';$('count').textContent='แสดง '+list.length+' คน';$('empty').hidden=list.length>0;$('rows').innerHTML=list.sort((a,b)=>String(a.group).localeCompare(String(b.group))||String(a.studentId).localeCompare(String(b.studentId))).map(x=>{const complete=x.missionComplete===true||String(x.missionComplete)==='TRUE';const when=x.lastSeen?new Date(x.lastSeen).toLocaleTimeString('th-TH'): '-';return `<tr><td><b>${esc(x.group||'-')}</b></td><td>${esc(x.studentId)}</td><td>${esc(x.fullName)}</td><td>${esc(x.section)}</td><td>${esc(x.currentStep||'-')}</td><td><span class="badge ${complete?'complete':''}">${esc(x.status||'-')}</span></td><td>${Number(x.progressPct)||0}% (${Number(x.completedCount)||0}/9)</td><td><span class="badge ${x.online?'online':'offline'}">${x.online?'ออนไลน์':'ออฟไลน์'}</span></td><td>${esc(when)}</td></tr>`}).join('')}
function render(){renderGroups();renderRows()}
['section','group','state'].forEach(id=>$(id).onchange=()=>{if(id==='group')activeGroup=$('group').value;render()});$('q').oninput=render;$('refresh').onclick=jsonp;$('auto').onclick=()=>{auto=!auto;$('auto').textContent='Auto refresh: '+(auto?'ON':'OFF')};timer=setInterval(()=>{if(auto)jsonp()},15000);jsonp()})();
</script>
</body></html>
