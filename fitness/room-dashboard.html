<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Shadow Breaker — Room Dashboard</title>
  <meta name="color-scheme" content="light" />
  <style>
    :root{
      --bg:#f8fafc; --card:#fff; --stroke:#e2e8f0; --text:#0f172a; --muted:#64748b;
      --r:16px;
    }
    *{box-sizing:border-box;}
    body{
      margin:0; padding:16px;
      font-family: system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header{
      display:flex; justify-content:space-between; gap:12px; align-items:flex-start;
      margin-bottom: 12px;
    }
    h1{ margin:0; font-size:18px; }
    .sub{ margin-top:4px; font-size:13px; color:var(--muted); }

    .bar{
      background: var(--card);
      border:1px solid var(--stroke);
      border-radius: var(--r);
      padding:12px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      margin-bottom: 12px;
    }
    .left, .right{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }

    label{ font-size:12px; color:var(--muted); }
    select, button, input{
      border:1px solid var(--stroke);
      border-radius: 999px;
      background:#fff;
      padding:8px 12px;
      font-weight:800;
      color: var(--text);
      font-size:13px;
    }
    input{ font-weight:700; cursor:text; border-radius: 14px; }
    button.primary{ background:#0ea5e9; border-color:#0ea5e9; color:#fff; }
    button.ghost{ background:#fff; }
    button:disabled{ opacity:.55; cursor:not-allowed; }

    .hint{
      font-size:12px;
      color: var(--muted);
      margin: 8px 0 12px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap:12px;
    }
    .card{
      background: var(--card);
      border:1px solid var(--stroke);
      border-radius: var(--r);
      padding: 12px;
    }
    .kv{
      display:flex; flex-wrap:wrap; gap:8px;
      font-size:12px; color:var(--muted);
      margin-top:6px;
    }
    .chip{
      padding:3px 9px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background:#fff;
      color:var(--text);
      font-weight:800;
      font-size:11px;
    }

    table{
      width:100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 13px;
    }
    th, td{
      border-top:1px solid var(--stroke);
      padding: 8px 6px;
      vertical-align: middle;
      text-align:left;
    }
    th{ font-size:12px; color:var(--muted); font-weight:900; }
    td .btns{
      display:flex; gap:6px; flex-wrap:wrap;
    }
    .small{
      padding:6px 10px;
      font-size:12px;
      font-weight:900;
    }
    .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .toast{
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      background: rgba(15,23,42,.92);
      color: #e5e7eb;
      border: 1px solid rgba(148,163,184,.25);
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 12px;
      display:none;
      z-index: 9999;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
<header>
  <div>
    <h1>Shadow Breaker — Room Dashboard</h1>
    <div class="sub">เลือก Room → รายชื่อ PID → Copy ลิงก์ Play/Research → เปิด QR เฉพาะห้อง</div>
  </div>
  <div class="right">
    <button id="btnBack" class="ghost">← Back</button>
    <button id="btnReload" class="ghost">↻ Reload</button>
  </div>
</header>

<section class="bar">
  <div class="left">
    <div>
      <label>Room Code</label><br/>
      <select id="selRoom"></select>
    </div>

    <div>
      <label>QR Mode</label><br/>
      <select id="selQrMode">
        <option value="play" selected>Play</option>
        <option value="research">Research</option>
      </select>
    </div>

    <div>
      <label>QR Columns</label><br/>
      <select id="selCols">
        <option value="auto" selected>Auto</option>
        <option value="2">2</option>
        <option value="3">3</option>
      </select>
    </div>

    <div>
      <label>QR Size</label><br/>
      <select id="selSize">
        <option value="200">200</option>
        <option value="240" selected>240</option>
        <option value="280">280</option>
      </select>
    </div>

    <div>
      <label>Search PID</label><br/>
      <input id="inpSearch" placeholder="พิมพ์ PID บางส่วน..." />
    </div>
  </div>

  <div class="right">
    <button id="btnOpenQR" class="primary">🔳 Open QR (Room)</button>
    <button id="btnCopyQR" class="ghost">📋 Copy QR Link</button>
    <button id="btnExportRoom" class="ghost">⬇ Export CSV (Room)</button>
  </div>
</section>

<div class="hint">
  อ่านข้อมูลจาก localStorage: <span class="mono">SB_BATCH_ROWS_V1</span> (สร้างจากหน้า Batch generator)
</div>

<section class="card" id="summary"></section>

<section class="card">
  <table>
    <thead>
      <tr>
        <th style="width:28%;">PID</th>
        <th style="width:36%;">Seed / Diff / Time</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</section>

<div class="toast" id="toast"></div>

<script>
  const KEY = 'SB_BATCH_ROWS_V1';

  const selRoom = document.getElementById('selRoom');
  const selQrMode = document.getElementById('selQrMode');
  const selCols = document.getElementById('selCols');
  const selSize = document.getElementById('selSize');
  const inpSearch = document.getElementById('inpSearch');

  const btnBack = document.getElementById('btnBack');
  const btnReload = document.getElementById('btnReload');
  const btnOpenQR = document.getElementById('btnOpenQR');
  const btnCopyQR = document.getElementById('btnCopyQR');
  const btnExportRoom = document.getElementById('btnExportRoom');

  const summary = document.getElementById('summary');
  const tbody = document.getElementById('tbody');
  const toastEl = document.getElementById('toast');

  function toast(msg){
    toastEl.textContent = msg;
    toastEl.style.display = 'block';
    clearTimeout(toastEl._t);
    toastEl._t = setTimeout(()=> toastEl.style.display='none', 2200);
  }

  function loadBatch(){
    try{
      const raw = localStorage.getItem(KEY);
      if(!raw) return { rows:[], savedAt:'' };
      const obj = JSON.parse(raw) || {};
      return { rows: Array.isArray(obj.rows)?obj.rows:[], savedAt: obj.savedAt || '' };
    }catch{
      return { rows:[], savedAt:'' };
    }
  }

  function uniqRooms(rows){
    const s = new Set();
    for(const r of rows){
      const room = (r.room_code || r.roomCode || '').trim();
      if(room) s.add(room);
    }
    return Array.from(s).sort((a,b)=>a.localeCompare(b));
  }

  function getBaseForQr(){
    try{
      const u = new URL(location.href);
      u.pathname = u.pathname.replace(/\/[^\/]*$/, '/qr-batch.html');
      u.search = '';
      u.hash = '';
      return u;
    }catch{
      return null;
    }
  }

  function buildQrUrl(){
    const u = getBaseForQr();
    const m = selQrMode.value || 'play';
    const c = selCols.value || 'auto';
    const s = selSize.value || '240';

    // PDF name suggest
    const room = selRoom.value || 'room';
    const d = new Date();
    const y = d.getFullYear();
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    const pdf = `${room}_${m==='research'?'Research':'Play'}_${y}-${mm}-${dd}.pdf`;

    if(u){
      u.searchParams.set('m', m);
      u.searchParams.set('c', c);
      u.searchParams.set('s', s);
      u.searchParams.set('pdf', pdf);
      return u.toString();
    }
    return `./qr-batch.html?m=${encodeURIComponent(m)}&c=${encodeURIComponent(c)}&s=${encodeURIComponent(s)}&pdf=${encodeURIComponent(pdf)}`;
  }

  async function copyTextAny(text){
    try{
      if(navigator.clipboard?.writeText){
        await navigator.clipboard.writeText(text);
        return true;
      }
    }catch{}
    try{
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position='fixed';
      ta.style.left='-9999px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
      return true;
    }catch{
      return false;
    }
  }

  function downloadText(filename, text){
    const blob = new Blob([text], { type:'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    setTimeout(()=> URL.revokeObjectURL(a.href), 800);
  }

  function rowsToCsv(rows){
    const cols = [
      'school_code','school_name','class_room','teacher_name','room_code',
      'pid','seed','diff','time','preset','safe',
      'link_play','link_research'
    ];
    const esc = (v)=> `"${String(v ?? '').replace(/"/g,'""')}"`;
    const lines = [ cols.map(esc).join(',') ];
    for(const r of rows){
      lines.push(cols.map(c=>esc(r[c])).join(','));
    }
    return lines.join('\n');
  }

  function render(){
    const meta = loadBatch();
    const all = meta.rows;

    if(!all.length){
      summary.innerHTML = `
        <div style="font-weight:950;font-size:16px;">ไม่มีข้อมูล</div>
        <div style="color:#64748b;font-size:13px;margin-top:6px;">
          ไปหน้า <b>shadow-breaker.html</b> → Batch → Generate ก่อน
        </div>`;
      selRoom.innerHTML = `<option value="">(no rooms)</option>`;
      tbody.innerHTML = '';
      btnOpenQR.disabled = true;
      btnCopyQR.disabled = true;
      btnExportRoom.disabled = true;
      return;
    }

    // rooms
    const rooms = uniqRooms(all);
    const cur = selRoom.value;
    if(!rooms.includes(cur)){
      selRoom.innerHTML = rooms.map(r=>`<option value="${r}">${r}</option>`).join('');
    }else{
      selRoom.innerHTML = rooms.map(r=>`<option value="${r}" ${r===cur?'selected':''}>${r}</option>`).join('');
    }

    const room = selRoom.value || rooms[0] || '';
    const q = (inpSearch.value || '').trim().toLowerCase();

    const filtered = all.filter(r=>{
      const rc = (r.room_code || r.roomCode || '').trim();
      if(rc !== room) return false;
      if(!q) return true;
      return String(r.pid||'').toLowerCase().includes(q);
    });

    // summary
    const r0 = filtered[0] || all.find(r=>(r.room_code||'')===room) || all[0] || {};
    const chips = [];
    const addChip = (t)=> chips.push(`<span class="chip">${t}</span>`);

    const sch = (r0.school_code||'').trim();
    const cls = (r0.class_room||'').trim();
    const diff = r0.diff || '';
    const time = r0.time || '';
    const preset = r0.preset || '';
    const safe = (r0.safe===1 || r0.safe==='1') ? 'safe=1' : 'safe=0';

    if(sch) addChip('School: '+sch);
    if(cls) addChip('Class: '+cls);
    addChip('Room: '+room);
    if(preset) addChip('preset='+preset);
    if(diff) addChip('diff='+diff);
    if(time) addChip('time='+time);
    addChip(safe);

    summary.innerHTML = `
      <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap;">
        <div>
          <div style="font-weight:950;font-size:16px;">Room Dashboard</div>
          <div style="color:#64748b;font-size:12px;margin-top:4px;">savedAt: ${meta.savedAt || '-'}</div>
        </div>
        <div style="color:#64748b;font-size:12px;">จำนวน: <b>${filtered.length}</b> คน</div>
      </div>
      <div class="kv" style="margin-top:10px;">${chips.join('')}</div>
    `;

    // table
    tbody.innerHTML = filtered.map(r=>{
      const pid = r.pid || '';
      const seed = r.seed || '';
      const dt = `${r.diff||''} • ${r.time||''}s`;
      const play = r.link_play || '';
      const research = r.link_research || '';
      return `
        <tr>
          <td><span class="mono" style="font-weight:950;">${pid}</span></td>
          <td><div class="mono" style="font-size:12px;color:#64748b;">seed=${seed}</div><div>${dt}</div></td>
          <td>
            <div class="btns">
              <button class="small ghost" data-copy="play" data-url="${encodeURIComponent(play)}">Copy Play</button>
              <button class="small ghost" data-copy="research" data-url="${encodeURIComponent(research)}">Copy Research</button>
            </div>
          </td>
        </tr>
      `;
    }).join('');

    btnOpenQR.disabled = false;
    btnCopyQR.disabled = false;
    btnExportRoom.disabled = false;
  }

  tbody.addEventListener('click', async (e)=>{
    const btn = e.target.closest('button[data-copy]');
    if(!btn) return;
    const kind = btn.getAttribute('data-copy');
    const url = decodeURIComponent(btn.getAttribute('data-url') || '');
    if(!url) return toast('ไม่มีลิงก์');
    const ok = await copyTextAny(url);
    toast(ok ? `Copy ${kind} ✅` : 'Copy ไม่ได้');
  });

  selRoom.addEventListener('change', render);
  inpSearch.addEventListener('input', render);

  btnReload.addEventListener('click', render);
  btnBack.addEventListener('click', ()=> history.back());

  btnOpenQR.addEventListener('click', ()=>{
    // เปิด qr-batch.html (จะอ่าน rows จาก localStorage) และใช้ query ตั้งค่า m/c/s/pdf
    const url = buildQrUrl();
    window.open(url, '_blank', 'noopener');
    toast('เปิดหน้า QR แล้ว ✅');
  });

  btnCopyQR.addEventListener('click', async ()=>{
    const url = buildQrUrl();
    const ok = await copyTextAny(url);
    toast(ok ? 'Copy QR link ✅' : 'Copy ไม่ได้');
  });

  btnExportRoom.addEventListener('click', ()=>{
    const meta = loadBatch();
    const all = meta.rows;
    const room = selRoom.value || '';
    const rows = all.filter(r => String(r.room_code||'').trim() === room);
    if(!rows.length) return toast('ไม่มีข้อมูล room');
    const csv = rowsToCsv(rows);
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const dd= String(d.getDate()).padStart(2,'0');
    downloadText(`room_${room}_${y}-${m}-${dd}.csv`, csv);
    toast('ดาวน์โหลด CSV แล้ว ✅');
  });

  render();
</script>
</body>
</html>
