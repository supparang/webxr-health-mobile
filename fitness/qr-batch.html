<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Shadow Breaker — QR Batch</title>
  <meta name="color-scheme" content="light" />
  <style>
    :root{
      --bg:#f8fafc; --card:#ffffff; --stroke:#e2e8f0; --text:#0f172a; --muted:#64748b;
      --r:16px;
    }
    *{box-sizing:border-box;}
    body{
      margin:0; padding:16px;
      font-family: system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header{
      display:flex; justify-content:space-between; align-items:flex-start; gap:12px;
      margin-bottom: 14px;
    }
    h1{ margin:0; font-size: 18px; }
    .sub{ color:var(--muted); font-size: 13px; margin-top:4px; }
    .btns{ display:flex; gap:8px; flex-wrap:wrap; }
    button{
      border-radius: 999px; border:1px solid var(--stroke);
      background: var(--card); padding:8px 12px;
      cursor:pointer; font-weight:700;
    }
    button.primary{ background:#0ea5e9; border-color:#0ea5e9; color:#fff; }
    .note{ color:var(--muted); font-size:12px; margin: 10px 0 14px; }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap:12px;
    }
    .card{
      background: var(--card);
      border:1px solid var(--stroke);
      border-radius: var(--r);
      padding: 12px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .top{
      display:flex; justify-content:space-between; align-items:flex-start; gap:8px;
    }
    .pid{ font-weight:900; font-size:16px; }
    .meta{ color:var(--muted); font-size:12px; }
    .qrwrap{
      display:flex; justify-content:center; align-items:center;
      padding: 8px;
      border:1px dashed #cbd5e1;
      border-radius: 14px;
      background:#fff;
    }
    canvas{ max-width: 100%; height:auto; }

    .links{
      font-size:12px; color:var(--muted);
      word-break: break-all;
      line-height: 1.25;
    }

    @media print{
      body{ padding:0; }
      header, .note { display:none; }
      .card{ break-inside: avoid; page-break-inside: avoid; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Shadow Breaker — QR Batch</h1>
      <div class="sub">ใช้ Batch generator แล้วกด “เปิดหน้า QR” • จากนั้นพิมพ์แจกหน้าห้อง</div>
    </div>
    <div class="btns">
      <button id="btnReload">↻ Reload from localStorage</button>
      <button id="btnPrint" class="primary">🖨 Print</button>
      <button id="btnBack">← Back</button>
    </div>
  </header>

  <div class="note">
    ถ้าไม่เห็นข้อมูล: กลับไปหน้าเกม → Batch → Generate → Open QR •
    (ระบบอ่านจาก localStorage key <code>SB_BATCH_ROWS_V1</code>)
  </div>

  <main class="grid" id="grid"></main>

  <script src="./js/qrcode-lite.js"></script>
  <script>
    const KEY = 'SB_BATCH_ROWS_V1';

    function getRows(){
      try{
        const raw = localStorage.getItem(KEY);
        if(!raw) return [];
        const obj = JSON.parse(raw);
        const rows = obj && obj.rows ? obj.rows : [];
        return Array.isArray(rows) ? rows : [];
      }catch{
        return [];
      }
    }

    function render(){
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      const rows = getRows();

      if(!rows.length){
        const d = document.createElement('div');
        d.className = 'card';
        d.innerHTML = '<div class="pid">ไม่มีข้อมูล</div><div class="meta">กลับไปหน้า Batch generator แล้วกด Generate ก่อน</div>';
        grid.appendChild(d);
        return;
      }

      for(const r of rows){
        const card = document.createElement('section');
        card.className = 'card';

        const pid = r.pid || '';
        const cls = r.class_room || r.classRoom || '';
        const sch = r.school_code || r.schoolCode || '';
        const seed = r.seed || '';

        const link = r.link_play || r.link || r.linkPlay || '';
        const meta = `${sch}${cls ? ' • '+cls : ''}${seed ? ' • seed='+seed : ''}`;

        const top = document.createElement('div');
        top.className = 'top';
        top.innerHTML = `<div><div class="pid">${pid}</div><div class="meta">${meta}</div></div>`;

        const qrwrap = document.createElement('div');
        qrwrap.className = 'qrwrap';
        const canvas = document.createElement('canvas');
        qrwrap.appendChild(canvas);

        const links = document.createElement('div');
        links.className = 'links';
        links.textContent = link;

        card.appendChild(top);
        card.appendChild(qrwrap);
        card.appendChild(links);
        grid.appendChild(card);

        // render QR
        try{
          window.QRLite.toCanvas(canvas, link, { size: 240, margin: 8 });
        }catch(e){
          links.textContent = 'QR error: ' + (e && e.message ? e.message : String(e));
        }
      }
    }

    document.getElementById('btnReload').addEventListener('click', render);
    document.getElementById('btnPrint').addEventListener('click', ()=> window.print());
    document.getElementById('btnBack').addEventListener('click', ()=> history.back());

    render();
  </script>
</body>
</html>
