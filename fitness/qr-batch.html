<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Shadow Breaker — QR Batch</title>
  <meta name="color-scheme" content="light" />
  <style>
    :root{
      --bg:#f8fafc; --card:#ffffff; --stroke:#e2e8f0; --text:#0f172a; --muted:#64748b;
      --r:16px;
      --cols:auto;
      --qr:240px;
    }
    *{box-sizing:border-box;}
    body{
      margin:0; padding:16px;
      font-family: system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header{
      display:flex; justify-content:space-between; align-items:flex-start; gap:12px;
      margin-bottom: 12px;
    }
    h1{ margin:0; font-size: 18px; }
    .sub{ color:var(--muted); font-size: 13px; margin-top:4px; }

    .toolbar{
      margin: 10px 0 14px;
      padding: 12px;
      border-radius: 16px;
      border:1px solid var(--stroke);
      background: var(--card);
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      justify-content:space-between;
    }
    .tool-left, .tool-right{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }

    .group{
      display:flex;
      gap:6px;
      align-items:center;
      font-size: 13px;
      color: var(--muted);
    }
    select, button{
      border-radius: 999px;
      border:1px solid var(--stroke);
      background: var(--card);
      padding:8px 12px;
      cursor:pointer;
      font-weight:800;
      color: var(--text);
      font-size: 13px;
    }
    button.primary{ background:#0ea5e9; border-color:#0ea5e9; color:#fff; }
    button.ghost{ background:#fff; }

    .note{ color:var(--muted); font-size:12px; margin: 8px 0 10px; }

    .grid{
      display:grid;
      gap:12px;
    }
    /* columns control */
    .grid.cols-auto{
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }
    .grid.cols-2{
      grid-template-columns: repeat(2, minmax(0,1fr));
    }
    .grid.cols-3{
      grid-template-columns: repeat(3, minmax(0,1fr));
    }

    .card{
      background: var(--card);
      border:1px solid var(--stroke);
      border-radius: var(--r);
      padding: 12px;
      display:flex;
      flex-direction:column;
      gap:10px;
      break-inside: avoid;
      page-break-inside: avoid;
    }
    .top{
      display:flex; justify-content:space-between; align-items:flex-start; gap:8px;
    }
    .pid{ font-weight:950; font-size:16px; }
    .meta{ color:var(--muted); font-size:12px; }

    .qrwrap{
      display:flex; justify-content:center; align-items:center;
      padding: 8px;
      border:1px dashed #cbd5e1;
      border-radius: 14px;
      background:#fff;
    }
    canvas{
      width: var(--qr);
      height: auto;
      max-width: 100%;
    }

    .links{
      font-size:11px; color:var(--muted);
      word-break: break-all;
      line-height: 1.25;
    }

    @media (max-width:860px){
      .grid.cols-3{ grid-template-columns: repeat(2, minmax(0,1fr)); }
    }
    @media (max-width:640px){
      .grid.cols-2, .grid.cols-3{ grid-template-columns: 1fr; }
      canvas{ width: min(260px, 85vw); }
    }

    @media print{
      body{ padding:0; }
      header, .toolbar, .note { display:none; }
      .grid{ gap: 8px; }
      .card{ border-color:#cbd5e1; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Shadow Breaker — QR Batch</h1>
      <div class="sub">พิมพ์แจกหน้าห้อง: QR ต่อคน • เลือก Play/Research ได้ • ปรับ 2/3 คอลัมน์</div>
    </div>
    <div class="tool-right">
      <button id="btnBack" class="ghost">← Back</button>
      <button id="btnPrint" class="primary">🖨 Print</button>
    </div>
  </header>

  <div class="toolbar">
    <div class="tool-left">
      <div class="group">
        QR:
        <select id="selMode">
          <option value="play" selected>Play</option>
          <option value="research">Research</option>
        </select>
      </div>

      <div class="group">
        Columns:
        <select id="selCols">
          <option value="auto" selected>Auto</option>
          <option value="2">2</option>
          <option value="3">3</option>
        </select>
      </div>

      <div class="group">
        QR size:
        <select id="selQr">
          <option value="200">200</option>
          <option value="240" selected>240</option>
          <option value="280">280</option>
        </select>
      </div>

      <button id="btnReload">↻ Reload</button>
    </div>

    <div class="tool-right">
      <button id="btnTop">⬆ Top</button>
    </
