<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"
  />
  <title>HeroHealth • Balance Hold</title>

  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#bfe9ff" />
  <link rel="icon" href="../herohealth/favicon.ico" />

  <style>
    :root{
      --sky1:#eaf8ff;
      --sky2:#d7f1ff;
      --sky3:#fff7dc;

      --card:#fffdf8;
      --card2:#f9fffd;
      --line:#bfe3ef;

      --text:#33424f;
      --muted:#6f8190;

      --blue:#7fcfff;
      --blue2:#59bdf7;
      --green:#7ed957;
      --green2:#52c83a;
      --yellow:#ffd45c;
      --orange:#ffb347;
      --pink:#ff99c8;
      --purple:#c3a6ff;

      --shadow:0 14px 40px rgba(37, 85, 120, .14);
      --shadow-soft:0 8px 24px rgba(37, 85, 120, .10);

      --safe-top:max(12px, env(safe-area-inset-top));
      --safe-right:max(12px, env(safe-area-inset-right));
      --safe-bottom:max(12px, env(safe-area-inset-bottom));
      --safe-left:max(12px, env(safe-area-inset-left));
    }

    *{ box-sizing:border-box; }
    html,body{ margin:0; padding:0; min-height:100%; }
    body{
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, var(--sky3) 0%, var(--sky1) 28%, var(--sky2) 72%, #cdeeff 100%);
      overflow:hidden;
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
    }

    .page-bg{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:0;
    }
    .cloud{
      position:absolute;
      border-radius:999px;
      background:rgba(255,255,255,.68);
      filter:blur(2px);
      box-shadow:0 8px 22px rgba(255,255,255,.35);
    }
    .cloud.c1{ width:150px; height:52px; left:6%; top:8%; }
    .cloud.c2{ width:120px; height:42px; right:10%; top:12%; }
    .cloud.c3{ width:180px; height:58px; left:20%; bottom:16%; opacity:.35; }

    .spark{
      position:absolute;
      width:16px; height:16px;
      border-radius:50%;
      background:rgba(255,255,255,.42);
      box-shadow:0 0 0 8px rgba(255,255,255,.10);
    }
    .spark.s1{ left:12%; top:24%; }
    .spark.s2{ right:18%; top:30%; }
    .spark.s3{ left:72%; bottom:28%; }

    #bhGame{
      position:relative;
      min-height:100vh;
      z-index:1;
      display:flex;
      flex-direction:column;
      padding:
        calc(var(--safe-top) + 10px)
        calc(var(--safe-right) + 12px)
        calc(var(--safe-bottom) + 10px)
        calc(var(--safe-left) + 12px);
      gap:12px;
    }

    #bhTopbar{
      position:relative;
      z-index:5;
      display:grid;
      grid-template-columns:auto 1fr auto auto auto;
      gap:10px;
      align-items:center;
      width:min(1180px, 100%);
      margin:0 auto;
    }

    .hh-chip,
    .hh-btn{
      border:0;
      border-radius:999px;
      background:rgba(255,255,255,.88);
      color:var(--text);
      box-shadow:var(--shadow-soft);
      min-height:44px;
    }

    .hh-chip{
      padding:10px 14px;
      font-weight:800;
      letter-spacing:.1px;
      display:flex;
      align-items:center;
      gap:8px;
      white-space:nowrap;
    }

    .hh-chip.soft{
      background:rgba(255,255,255,.74);
      font-weight:700;
    }

    .hh-btn{
      padding:10px 14px;
      font-weight:800;
      cursor:pointer;
      transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
    }
    .hh-btn:active{ transform:scale(.98); }
    .hh-btn.primary{
      background:linear-gradient(180deg, #fff7b9, #ffd45c);
    }
    .hh-btn.blue{
      background:linear-gradient(180deg, #dff5ff, #9fddff);
    }
    .hh-btn.pink{
      background:linear-gradient(180deg, #ffe7f2, #ffbfd9);
    }

    .arena-wrap{
      position:relative;
      z-index:2;
      width:min(1180px, 100%);
      margin:0 auto;
      flex:1;
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
      min-height:0;
    }

    .arena-card{
      position:relative;
      min-height:0;
      border-radius:30px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.92), rgba(246,252,255,.96));
      box-shadow:var(--shadow);
      border:2px solid rgba(255,255,255,.75);
      overflow:hidden;
    }

    .arena-head{
      position:absolute;
      z-index:7;
      top:14px;
      left:14px;
      right:14px;
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
      pointer-events:none;
    }

    .arena-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      width:max-content;
      max-width:100%;
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.86);
      box-shadow:0 10px 24px rgba(55,100,140,.10);
      font-weight:800;
      font-size:16px;
      line-height:1;
    }

    .arena-badge.small{
      font-size:14px;
      font-weight:700;
      color:var(--muted);
    }

    #bhArena{
      position:relative;
      width:100%;
      min-height:clamp(420px, 62vh, 760px);
      height:100%;
      overflow:hidden;
      touch-action:none;
      user-select:none;
      background:
        radial-gradient(circle at 50% 55%, rgba(255,255,255,.98), rgba(238,249,255,.98) 62%, rgba(218,242,255,.98) 100%);
    }

    .rhythm-mat{
      position:absolute;
      left:50%;
      top:57%;
      width:min(86%, 940px);
      height:min(70%, 540px);
      transform:translate(-50%,-50%);
      border-radius:36px;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.72), rgba(255,255,255,.18) 62%, rgba(255,255,255,0) 100%),
        linear-gradient(180deg, rgba(255,255,255,.58), rgba(255,255,255,.28));
      border:3px dashed rgba(121,191,235,.35);
      box-shadow:inset 0 0 0 16px rgba(255,255,255,.22);
      pointer-events:none;
      z-index:0;
    }

    .lane-ring{
      position:absolute;
      left:50%;
      top:55%;
      transform:translate(-50%,-50%);
      border-radius:999px;
      pointer-events:none;
      z-index:0;
    }
    .lane-ring.r1{
      width:160px; height:160px;
      border:4px solid rgba(127,207,255,.22);
    }
    .lane-ring.r2{
      width:280px; height:280px;
      border:4px dashed rgba(255,212,92,.24);
    }
    .lane-ring.r3{
      width:420px; height:420px;
      border:4px dotted rgba(255,153,200,.18);
    }

    .post-mark{
      position:absolute;
      z-index:0;
      width:60px; height:60px;
      border-radius:999px;
      display:grid;
      place-items:center;
      font-size:24px;
      color:#4f7592;
      background:rgba(255,255,255,.70);
      box-shadow:0 8px 18px rgba(64,120,160,.12);
      border:2px solid rgba(127,207,255,.28);
      pointer-events:none;
      transform:translate(-50%,-50%);
    }
    .p1{ left:50%; top:55%; }
    .p2{ left:32%; top:56%; }
    .p3{ left:68%; top:56%; }
    .p4{ left:50%; top:38%; }
    .p5{ left:38%; top:60%; }
    .p6{ left:62%; top:44%; }

    #bhTarget,
    #bhCursor,
    #bhGhost{
      position:absolute;
      border-radius:999px;
    }

    #bhTarget{
      z-index:2;
      left:50%;
      top:55%;
      width:120px;
      height:120px;
      margin-left:-60px;
      margin-top:-60px;
      border:5px solid var(--blue2);
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.68), rgba(127,207,255,.16));
      box-shadow:
        0 0 0 10px rgba(127,207,255,.08),
        0 0 38px rgba(127,207,255,.20);
      pointer-events:none;
      transition:
        box-shadow .18s ease,
        border-color .18s ease,
        filter .18s ease;
    }
    #bhTarget.is-in-zone{
      border-color:#52c83a;
      box-shadow:
        0 0 0 12px rgba(126,217,87,.10),
        0 0 42px rgba(126,217,87,.22);
    }
    #bhTarget.is-warning{
      border-color:#ffb347;
      box-shadow:
        0 0 0 12px rgba(255,179,71,.10),
        0 0 42px rgba(255,179,71,.22);
    }

    #bhCursor{
      z-index:4;
      left:50%;
      top:55%;
      width:28px;
      height:28px;
      margin-left:-14px;
      margin-top:-14px;
      background:
        radial-gradient(circle at 32% 32%, #fff6d9, var(--orange));
      box-shadow:
        0 0 0 8px rgba(255,179,71,.20),
        0 0 18px rgba(255,179,71,.22);
      pointer-events:none;
      transition:filter .14s ease, box-shadow .14s ease, transform .10s ease;
    }
    #bhCursor.is-in-zone{
      box-shadow:
        0 0 0 10px rgba(126,217,87,.18),
        0 0 18px rgba(126,217,87,.22);
      filter:brightness(1.05);
    }
    #bhCursor.is-warning{
      box-shadow:
        0 0 0 10px rgba(255,179,71,.18),
        0 0 18px rgba(255,179,71,.22);
    }

    #bhGhost{
      z-index:1;
      left:50%;
      top:54%;
      width:108px;
      height:170px;
      transform:translate(-50%,-50%);
      border-radius:26px;
      background:rgba(255,255,255,.32);
      border:3px dashed rgba(95,136,165,.24);
      pointer-events:none;
    }

    #bhGhost::before,
    #bhGhost::after{
      content:"";
      position:absolute;
      background:rgba(123,168,198,.18);
      border-radius:999px;
    }

    #bhGhost[data-ghost="center"]::before{
      width:34px; height:34px; left:50%; top:12px; transform:translateX(-50%);
    }
    #bhGhost[data-ghost="center"]::after{
      width:18px; height:92px; left:50%; top:48px; transform:translateX(-50%);
    }

    #bhGhost[data-ghost="left-right"]{
      transform:translate(-50%,-50%) rotate(-10deg);
    }
    #bhGhost[data-ghost="left-right"]::before{
      width:34px; height:34px; left:46%; top:12px; transform:translateX(-50%);
    }
    #bhGhost[data-ghost="left-right"]::after{
      width:18px; height:92px; left:46%; top:48px; transform:translateX(-50%);
    }

    #bhGhost[data-ghost="one-leg"]{
      transform:translate(-50%,-50%) rotate(8deg);
    }
    #bhGhost[data-ghost="one-leg"]::before{
      width:34px; height:34px; left:50%; top:12px; transform:translateX(-50%);
    }
    #bhGhost[data-ghost="one-leg"]::after{
      width:18px; height:82px; left:50%; top:48px; transform:translateX(-50%);
      box-shadow:20px 66px 0 0 rgba(123,168,198,.18);
    }

    #bhGhost[data-ghost="forward"]{
      transform:translate(-50%,-50%) rotate(-6deg) scaleY(1.02);
    }
    #bhGhost[data-ghost="forward"]::before{
      width:34px; height:34px; left:50%; top:12px; transform:translateX(-50%);
    }
    #bhGhost[data-ghost="forward"]::after{
      width:18px; height:104px; left:50%; top:42px; transform:translateX(-50%);
    }

    #bhGhost[data-ghost="beam"]{
      transform:translate(-50%,-50%) rotate(14deg);
    }
    #bhGhost[data-ghost="beam"]::before{
      width:34px; height:34px; left:50%; top:12px; transform:translateX(-50%);
    }
    #bhGhost[data-ghost="beam"]::after{
      width:18px; height:86px; left:50%; top:48px; transform:translateX(-50%);
      box-shadow:-26px 78px 0 -3px rgba(123,168,198,.16);
    }

    #bhGhost[data-ghost="finale"]{
      transform:translate(-50%,-50%) rotate(-4deg) scale(1.04);
      border-color:rgba(255,153,200,.30);
      background:rgba(255,245,250,.34);
    }
    #bhGhost[data-ghost="finale"]::before{
      width:34px; height:34px; left:50%; top:12px; transform:translateX(-50%);
      background:rgba(255,153,200,.20);
    }
    #bhGhost[data-ghost="finale"]::after{
      width:18px; height:96px; left:50%; top:48px; transform:translateX(-50%);
      background:rgba(255,153,200,.18);
    }

    #bhCue{
      position:absolute;
      z-index:6;
      top:18px;
      left:50%;
      transform:translateX(-50%);
      min-width:min(72vw, 320px);
      max-width:min(86vw, 520px);
      padding:10px 16px;
      text-align:center;
      border-radius:999px;
      background:rgba(255,255,255,.92);
      box-shadow:0 10px 24px rgba(55,100,140,.12);
      font-size:clamp(15px, 2.2vw, 20px);
      font-weight:900;
      letter-spacing:.1px;
      color:#33526a;
      pointer-events:none;
    }

    #bhBeat{
      position:absolute;
      z-index:6;
      right:18px;
      top:18px;
      width:28px;
      height:28px;
      border-radius:999px;
      background:radial-gradient(circle at 30% 30%, #f4ffd8, var(--green));
      box-shadow:
        0 0 0 8px rgba(126,217,87,.12),
        0 0 22px rgba(126,217,87,.22);
      opacity:.28;
      pointer-events:none;
    }

    /* =========================
       VISUAL FX
       ========================= */

    #bhFXLayer{
      position:absolute;
      inset:0;
      z-index:8;
      pointer-events:none;
      overflow:hidden;
    }

    #bhTargetPulse{
      position:absolute;
      left:50%;
      top:55%;
      width:150px;
      height:150px;
      margin-left:-75px;
      margin-top:-75px;
      border-radius:999px;
      background:
        radial-gradient(circle, rgba(127,207,255,.18) 0%, rgba(127,207,255,.10) 38%, rgba(127,207,255,0) 72%);
      opacity:0;
      transform:scale(.85);
    }

    #bhSuccessFlash{
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 54%, rgba(255,255,255,.58), rgba(255,255,255,.16) 42%, rgba(255,255,255,0) 72%);
      opacity:0;
    }

    .bh-float-text{
      position:absolute;
      left:50%;
      top:42%;
      transform:translate(-50%, 0) scale(.84);
      min-width:140px;
      text-align:center;
      padding:10px 16px;
      border-radius:999px;
      font-size:20px;
      font-weight:1000;
      letter-spacing:.2px;
      opacity:0;
      box-shadow:0 10px 22px rgba(55,100,140,.14);
    }

    #bhRecoverPop{
      color:#21546d;
      background:linear-gradient(180deg, #e8f8ff, #a8e0ff);
    }

    #bhPerfectPop{
      color:#6a4d00;
      background:linear-gradient(180deg, #fff3b8, #ffd45c);
    }

    #bhCoachMood{
      position:absolute;
      right:18px;
      bottom:92px;
      width:58px;
      height:58px;
      display:grid;
      place-items:center;
      border-radius:999px;
      background:rgba(255,255,255,.92);
      box-shadow:0 10px 24px rgba(55,100,140,.14);
      font-size:28px;
      font-weight:900;
      opacity:.96;
      transform:scale(1);
      transition:
        transform .18s ease,
        filter .18s ease,
        background .18s ease,
        opacity .18s ease;
    }

    #bhCoachMood[data-mood="neutral"]{ background:rgba(255,255,255,.92); }
    #bhCoachMood[data-mood="happy"]{
      background:linear-gradient(180deg, #eaffde, #bdf09d);
      transform:scale(1.08);
    }
    #bhCoachMood[data-mood="great"]{
      background:linear-gradient(180deg, #fff4bf, #ffd45c);
      transform:scale(1.14);
    }
    #bhCoachMood[data-mood="warn"]{
      background:linear-gradient(180deg, #ffe9cf, #ffc68b);
      transform:scale(.98);
    }
    #bhCoachMood[data-mood="sad"]{
      background:linear-gradient(180deg, #ffe7ee, #ffc8d9);
      opacity:.9;
    }

    #bhPostBanner{
      position:absolute;
      left:50%;
      top:20%;
      transform:translate(-50%, -10px) scale(.92);
      padding:12px 18px;
      border-radius:999px;
      background:linear-gradient(180deg, #fff6c8, #ffd45c);
      color:#6e5100;
      font-size:22px;
      font-weight:1000;
      letter-spacing:.4px;
      box-shadow:0 14px 26px rgba(255,212,92,.24);
      opacity:0;
    }

    #bhStarBurst{
      position:absolute;
      inset:0;
      opacity:0;
    }

    #bhStarBurst .star{
      position:absolute;
      width:18px;
      height:18px;
      transform:translate(-50%, -50%) rotate(0deg) scale(.7);
      opacity:0;
    }

    #bhStarBurst .star::before{
      content:"⭐";
      display:block;
      width:100%;
      height:100%;
      font-size:18px;
      line-height:18px;
      text-align:center;
      filter:drop-shadow(0 6px 10px rgba(255,200,80,.25));
    }

    .bh-target-perfect{
      animation:bhTargetPerfect .42s ease;
    }
    @keyframes bhTargetPerfect{
      0%   { transform:scale(1); filter:brightness(1); }
      40%  { transform:scale(1.1); filter:brightness(1.18); }
      100% { transform:scale(1); filter:brightness(1); }
    }

    .bh-pulse-on{
      animation:bhTargetPulseFx .55s ease;
    }
    @keyframes bhTargetPulseFx{
      0%   { opacity:.0; transform:scale(.78); }
      35%  { opacity:.9; transform:scale(1.06); }
      100% { opacity:0; transform:scale(1.36); }
    }

    .bh-flash-on{
      animation:bhFlashFx .42s ease;
    }
    @keyframes bhFlashFx{
      0%   { opacity:0; }
      24%  { opacity:.88; }
      100% { opacity:0; }
    }

    .bh-pop-show{
      animation:bhPopFloat .9s ease forwards;
    }
    @keyframes bhPopFloat{
      0%   { opacity:0; transform:translate(-50%, 8px) scale(.76); }
      20%  { opacity:1; transform:translate(-50%, -6px) scale(1.05); }
      100% { opacity:0; transform:translate(-50%, -48px) scale(.96); }
    }

    .bh-banner-show{
      animation:bhBannerFx 1.05s ease forwards;
    }
    @keyframes bhBannerFx{
      0%   { opacity:0; transform:translate(-50%, -10px) scale(.86); }
      18%  { opacity:1; transform:translate(-50%, 0) scale(1.02); }
      100% { opacity:0; transform:translate(-50%, -26px) scale(.98); }
    }

    .bh-coach-bounce{
      animation:bhCoachBounce .46s ease;
    }
    @keyframes bhCoachBounce{
      0%   { transform:scale(1); }
      40%  { transform:scale(1.18); }
      100% { transform:scale(1); }
    }

    .bh-star-burst-on{
      opacity:1 !important;
    }
    #bhStarBurst .star.burst{
      animation:bhStarBurstFx .95s ease forwards;
    }
    @keyframes bhStarBurstFx{
      0%{
        opacity:0;
        transform:translate(-50%, -50%) scale(.5) rotate(0deg);
      }
      18%{
        opacity:1;
        transform:translate(-50%, -50%) scale(1.1) rotate(14deg);
      }
      100%{
        opacity:0;
        transform:translate(var(--tx), var(--ty)) scale(.9) rotate(120deg);
      }
    }

    #bhArena::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,0) 28%, rgba(255,255,255,.08) 100%);
      z-index:0;
    }

    #bhBottombar{
      position:relative;
      z-index:5;
      width:min(1180px, 100%);
      margin:0 auto;
      display:grid;
      grid-template-columns:1.2fr 1fr;
      gap:12px;
      align-items:stretch;
    }

    .panel{
      background:rgba(255,255,255,.88);
      border-radius:22px;
      box-shadow:var(--shadow-soft);
      padding:12px 14px;
      min-height:74px;
    }

    .panel-title{
      font-size:13px;
      color:var(--muted);
      font-weight:800;
      margin-bottom:6px;
    }

    #bhCoach{
      font-size:18px;
      font-weight:900;
      line-height:1.25;
      color:#36586f;
      transition:transform .16s ease, color .16s ease;
    }
    #bhCoach.is-happy{
      transform:scale(1.02);
      color:#2f6b2d;
    }
    #bhCoach.is-warn{
      color:#a46315;
    }

    #bhProgress{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
    }

    .bh-dot{
      width:36px;
      height:36px;
      border-radius:999px;
      display:grid;
      place-items:center;
      font-weight:900;
      font-size:14px;
      color:#4c6476;
      background:rgba(255,255,255,.92);
      box-shadow:inset 0 0 0 2px rgba(127,207,255,.24);
    }
    .bh-dot.active{
      background:linear-gradient(180deg, #fff2b8, #ffd45c);
      color:#785700;
    }
    .bh-dot.done{
      background:linear-gradient(180deg, #d9ffd0, #7ed957);
      color:#194d17;
    }

    .help-card{
      position:absolute;
      z-index:10;
      left:16px;
      bottom:16px;
      max-width:min(86vw, 340px);
      background:rgba(255,255,255,.90);
      border-radius:20px;
      padding:12px 14px;
      box-shadow:0 14px 30px rgba(50,90,120,.12);
      border:2px solid rgba(255,255,255,.70);
    }
    .help-card h3{
      margin:0 0 6px;
      font-size:16px;
    }
    .help-card p{
      margin:0;
      font-size:14px;
      line-height:1.45;
      color:var(--muted);
    }

    #bhOverlay{
      position:fixed;
      inset:0;
      z-index:30;
      display:grid;
      place-items:center;
      padding:20px;
      background:rgba(30,48,66,.34);
    }
    #bhOverlay[hidden]{ display:none; }

    .bh-summary-card{
      width:min(94vw, 760px);
      background:linear-gradient(180deg, #fffef9, #fffaf0);
      border-radius:28px;
      padding:20px;
      box-shadow:0 28px 80px rgba(0,0,0,.20);
      border:2px solid rgba(255,255,255,.80);
    }

    .bh-summary-card h2{
      margin:0 0 10px;
      font-size:clamp(24px, 4vw, 34px);
      color:#34506a;
    }

    .bh-summary-main,
    .bh-summary-sub{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:10px;
      margin:12px 0;
    }

    .bh-summary-main > div,
    .bh-summary-sub > div{
      background:#fff;
      border-radius:18px;
      padding:12px 14px;
      box-shadow:0 8px 18px rgba(50,90,120,.08);
      font-weight:800;
    }

    .bh-summary-list{
      margin-top:10px;
      background:#fff;
      border-radius:20px;
      padding:10px 14px;
      box-shadow:0 8px 18px rgba(50,90,120,.08);
    }

    .bh-sum-head,
    .bh-sum-row{
      display:grid;
      grid-template-columns:1.6fr .6fr .7fr;
      gap:10px;
      align-items:center;
      padding:10px 0;
    }

    .bh-sum-head{
      font-size:13px;
      color:var(--muted);
      font-weight:900;
      border-bottom:1px solid rgba(0,0,0,.08);
    }

    .bh-sum-row{
      font-weight:800;
      border-bottom:1px dashed rgba(0,0,0,.07);
    }
    .bh-sum-row:last-child{ border-bottom:0; }

    .bh-summary-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:16px;
    }

    .bh-summary-actions button{
      min-height:50px;
      border:0;
      border-radius:18px;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 10px 22px rgba(60,100,130,.10);
    }

    .bh-summary-actions button:first-child{
      background:linear-gradient(180deg, #fff2b7, #ffd45c);
      color:#6b4f00;
    }
    .bh-summary-actions button:last-child{
      background:linear-gradient(180deg, #dff5ff, #9fddff);
      color:#184c6a;
    }

    @media (max-width: 900px){
      #bhTopbar{
        grid-template-columns:1fr 1fr;
      }
      #bhTopbar .stretch{
        grid-column:1 / -1;
      }
      #bhBottombar{
        grid-template-columns:1fr;
      }
      .arena-head{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 640px){
      #bhGame{
        gap:10px;
        padding:
          calc(var(--safe-top) + 8px)
          calc(var(--safe-right) + 8px)
          calc(var(--safe-bottom) + 8px)
          calc(var(--safe-left) + 8px);
      }

      #bhTopbar{
        gap:8px;
      }

      .hh-chip,
      .hh-btn{
        min-height:40px;
        padding:9px 12px;
        font-size:14px;
      }

      .arena-card{
        border-radius:24px;
      }

      #bhArena{
        min-height:58vh;
      }

      .help-card{
        left:10px;
        right:10px;
        bottom:10px;
        max-width:none;
      }

      .bh-summary-main,
      .bh-summary-sub,
      .bh-summary-actions{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page-bg" aria-hidden="true">
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>
    <div class="spark s1"></div>
    <div class="spark s2"></div>
    <div class="spark s3"></div>
  </div>

  <div id="bhGame">
    <div id="bhTopbar">
      <button id="bhBackBtn" class="hh-btn blue" type="button">← กลับ</button>

      <div id="bhPost" class="hh-chip">Post 1 / 6</div>

      <div id="bhStars" class="hh-chip soft stretch">⭐ 0</div>
      <div id="bhScore" class="hh-chip soft">0</div>

      <button id="bhHowBtn" class="hh-btn pink" type="button">วิธีเล่น</button>
    </div>

    <div class="arena-wrap">
      <div class="arena-card">
        <div class="arena-head">
          <div class="arena-badge">🎵 Balance Hold • 6 Post Circuit</div>
          <div class="arena-badge small">ลากนิ้วเบา ๆ เพื่อคุมจุดสมดุลให้อยู่ในเป้า</div>
        </div>

        <div id="bhArena">
          <div class="rhythm-mat"></div>
          <div class="lane-ring r1"></div>
          <div class="lane-ring r2"></div>
          <div class="lane-ring r3"></div>

          <div class="post-mark p1">1</div>
          <div class="post-mark p2">2</div>
          <div class="post-mark p3">3</div>
          <div class="post-mark p4">4</div>
          <div class="post-mark p5">5</div>
          <div class="post-mark p6">6</div>

          <div id="bhTarget" aria-hidden="true"></div>
          <div id="bhCursor" aria-hidden="true"></div>
          <div id="bhGhost" data-ghost="center" aria-hidden="true"></div>

          <div id="bhCue">เตรียมตัว</div>
          <div id="bhBeat" aria-hidden="true"></div>

          <div id="bhFXLayer" aria-hidden="true">
            <div id="bhTargetPulse"></div>
            <div id="bhSuccessFlash"></div>
            <div id="bhRecoverPop" class="bh-float-text">Great!</div>
            <div id="bhPerfectPop" class="bh-float-text">Perfect!</div>
            <div id="bhCoachMood" data-mood="neutral">🙂</div>
            <div id="bhPostBanner">POST CLEAR!</div>
            <div id="bhStarBurst"></div>
          </div>

          <div id="bhHelpCard" class="help-card">
            <h3>วิธีเล่น</h3>
            <p>
              พาจุดสีส้มให้อยู่ในวงเป้า แล้วค้างตามจังหวะ
              ผ่านให้ครบทั้ง 6 ฐาน เพื่อเก็บดาวและคะแนน
            </p>
          </div>
        </div>
      </div>
    </div>

    <div id="bhBottombar">
      <div class="panel">
        <div class="panel-title">Coach</div>
        <div id="bhCoach">ยืนให้นิ่งในวงเป้าตามจังหวะ</div>
      </div>

      <div class="panel">
        <div class="panel-title">Progress</div>
        <div id="bhProgress"></div>
      </div>
    </div>

    <div id="bhOverlay" hidden></div>
  </div>

  <script>
    (function(){
      'use strict';

      const qs = new URLSearchParams(location.search);
      const hub = qs.get('hub') || '../herohealth/hub-v2.html';

      const backBtn = document.getElementById('bhBackBtn');
      const howBtn = document.getElementById('bhHowBtn');
      const helpCard = document.getElementById('bhHelpCard');

      if (backBtn) {
        backBtn.addEventListener('click', () => {
          location.href = hub;
        });
      }

      if (howBtn && helpCard) {
        let open = true;
        howBtn.addEventListener('click', () => {
          open = !open;
          helpCard.style.display = open ? '' : 'none';
        });
      }
    })();
  </script>

  <script src="./js/balance-hold.js?v=20260406c-balance-visual-full"></script>
</body>
</html>
