<!-- === /fitness/balance-hold.html ===
Balance Hold — LAUNCHER (PC/Mobile/cVR) — PRODUCTION
PATCH v20260305-BH-LAUNCHER-FIX-RUNPATH
✅ FIX: Run page -> /fitness/balance-hold-run.html (avoid recursion)
✅ Supports: autostart=1 (redirect immediately using incoming params)
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Balance Hold — Launcher</title>
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="../herohealth/favicon.ico" />
  <style>
    :root{
      --bg1:#020617; --bg2:#0b1226;
      --panel:rgba(2,6,23,.72);
      --stroke:rgba(148,163,184,.18);
      --text:#e5e7eb; --muted:#94a3b8;
      --good:#22c55e; --cyan:#22d3ee; --warn:#f59e0b;
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans Thai",sans-serif;color:var(--text);
      background:
        radial-gradient(1200px 700px at 15% 15%, rgba(34,197,94,.14), transparent 55%),
        radial-gradient(1000px 600px at 85% 20%, rgba(34,211,238,.12), transparent 55%),
        radial-gradient(900px 520px at 55% 90%, rgba(167,139,250,.12), transparent 55%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
    }
    .wrap{max-width:880px;margin:0 auto;padding:calc(14px + var(--sat)) 14px calc(18px + var(--sab))}
    .card{border:1px solid var(--stroke);background:rgba(2,6,23,.55);border-radius:20px;padding:14px;box-shadow:0 18px 60px rgba(0,0,0,.45)}
    h1{margin:0;font-size:26px}
    p{margin:8px 0 0;color:rgba(229,231,235,.78);font-weight:750;line-height:1.45}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 12px;border-radius:14px;border:1px solid var(--stroke);background:rgba(2,6,23,.35);color:var(--text);font-weight:1000;cursor:pointer}
    .btn.primary{border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.14)}
    .btn.ghost{background:rgba(2,6,23,.18);color:rgba(229,231,235,.85)}
    .grid{margin-top:12px;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
    @media (max-width:700px){.grid{grid-template-columns:1fr}}
    label{display:block;font-size:12px;color:rgba(229,231,235,.72);font-weight:900;margin-bottom:6px}
    select{width:100%;padding:10px 12px;border-radius:14px;border:1px solid var(--stroke);background:rgba(2,6,23,.45);color:var(--text);font:inherit;font-weight:900}
    .pillrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .pill{border:1px solid var(--stroke);background:rgba(2,6,23,.35);border-radius:999px;padding:7px 10px;font-size:12px;font-weight:900;color:rgba(229,231,235,.88)}
    .pill b{color:#fff}
    code{background:rgba(2,6,23,.5);padding:2px 6px;border-radius:8px;border:1px solid rgba(148,163,184,.16)}
    .small{margin-top:10px;font-size:12px;color:rgba(229,231,235,.72);font-weight:850}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>⚖️ Balance Hold — Launcher</h1>
      <p>เลือกระดับ/เวลา/โหมดมุมมองก่อนเข้าเล่น (กันกรณีเข้าจาก HUB แล้ว “วิ่งเลย” ไม่มีให้เลือก)</p>

      <div class="pillrow" id="ctx"></div>

      <div class="grid">
        <div>
          <label>Difficulty</label>
          <select id="diff">
            <option value="easy">Easy</option>
            <option value="normal" selected>Normal</option>
            <option value="hard">Hard</option>
          </select>
        </div>

        <div>
          <label>Duration (sec)</label>
          <select id="time">
            <option value="45">45</option>
            <option value="60">60</option>
            <option value="80" selected>80</option>
            <option value="90">90</option>
            <option value="120">120</option>
          </select>
        </div>

        <div>
          <label>View</label>
          <select id="view">
            <option value="pc" selected>PC</option>
            <option value="mobile">Mobile</option>
            <option value="cvr">Cardboard / cVR</option>
          </select>
        </div>
      </div>

      <div class="row">
        <button class="btn primary" id="btnStart">▶ Start</button>
        <button class="btn" id="btnOpen">Open RUN (no autostart)</button>
        <button class="btn ghost" id="btnReseed">🔁 Reseed</button>
        <a class="btn ghost" id="btnBackHub" href="#">↩ Back HUB</a>
      </div>

      <div class="small">
        RUN page: <code>/fitness/balance-hold-run.html</code> (รับพารามิเตอร์จากที่นี่)
      </div>
    </div>
  </div>

<script>
(function(){
  'use strict';
  function qs(k,d=''){ try{return new URL(location.href).searchParams.get(k) ?? d;}catch{return d;} }
  function setQS(u,k,v){ if(v!=null && String(v).trim()!=='') u.searchParams.set(k,String(v)); }
  function nowSeed(){ return String(Date.now()); }

  const RUN_PATH = './balance-hold-run.html';

  const P = {
    hub: qs('hub',''),
    run: qs('run','play'),
    pid: qs('pid','anon'),
    seed: qs('seed','') || nowSeed(),
    diff: qs('diff','normal'),
    time: qs('time','80'),
    view: qs('view','pc'),
    autostart: qs('autostart','')
  };

  // init form from URL
  const elDiff = document.getElementById('diff');
  const elTime = document.getElementById('time');
  const elView = document.getElementById('view');
  if(elDiff) elDiff.value = P.diff || 'normal';
  if(elTime) elTime.value = P.time || '80';
  if(elView) elView.value = P.view || 'pc';

  // render ctx pills
  const ctx = document.getElementById('ctx');
  const pills = [
    ['pid',P.pid],['seed',P.seed],['run',P.run],['diff',P.diff],['time',P.time],['view',P.view]
  ];
  ctx.innerHTML = pills.map(([k,v])=>`<span class="pill"><b>${k}</b>: ${String(v).replace(/</g,'&lt;')}</span>`).join('');

  // back hub
  const back = document.getElementById('btnBackHub');
  if(P.hub){
    back.href = P.hub;
  }else{
    back.href = '../herohealth/hub.html';
  }

  function buildRunUrl(withAutostart){
    const u = new URL(RUN_PATH, location.href);
    setQS(u,'hub',P.hub);
    setQS(u,'run',P.run);
    setQS(u,'pid',P.pid);
    setQS(u,'seed',P.seed);
    setQS(u,'diff', elDiff ? elDiff.value : P.diff);
    setQS(u,'time', elTime ? elTime.value : P.time);
    setQS(u,'view', elView ? elView.value : P.view);
    if(withAutostart) setQS(u,'autostart','1');
    return u.toString();
  }

  document.getElementById('btnStart').onclick = ()=>{ location.href = buildRunUrl(true); };
  document.getElementById('btnOpen').onclick  = ()=>{ location.href = buildRunUrl(false); };
  document.getElementById('btnReseed').onclick= ()=>{
    P.seed = nowSeed();
    const url = new URL(location.href);
    url.searchParams.set('seed', P.seed);
    location.href = url.toString();
  };

  // ✅ autostart=1 on launcher => redirect immediately to RUN (fix "can't enter")
  if(String(P.autostart)==='1'){
    location.replace(buildRunUrl(true));
  }
})();
</script>
</body>
</html>
