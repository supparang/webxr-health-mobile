<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Redirecting… Shadow Breaker</title>
  <meta name="color-scheme" content="dark light" />
  <meta http-equiv="refresh" content="0; url=/webxr-health-mobile/fitness/shadow-breaker.html" />
  <style>
    :root{
      color-scheme: dark;
      --bg1:#020617;
      --bg2:#0b1226;
      --panel:rgba(2,6,23,.72);
      --stroke:rgba(148,163,184,.18);
      --text:#e5e7eb;
      --muted:#94a3b8;
      --blue:#3b82f6;
      --violet:#a78bfa;
    }
    *{ box-sizing:border-box; }
    html,body{
      margin:0;
      min-height:100%;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 15% 10%, rgba(59,130,246,.18), transparent 45%),
        radial-gradient(circle at 85% 90%, rgba(167,139,250,.16), transparent 45%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      color:var(--text);
    }
    .wrap{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
    }
    .card{
      width:min(680px,100%);
      border-radius:24px;
      border:1px solid var(--stroke);
      background:var(--panel);
      box-shadow:0 24px 80px rgba(0,0,0,.38);
      padding:22px 20px;
    }
    .kicker{
      color:var(--muted);
      font-size:.82rem;
      font-weight:800;
      letter-spacing:.2px;
    }
    h1{
      margin:8px 0 6px;
      font-size:1.5rem;
      line-height:1.15;
    }
    p{
      margin:8px 0 0;
      color:var(--muted);
      line-height:1.5;
    }
    .row{
      margin-top:14px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background:rgba(15,23,42,.52);
      color:var(--muted);
      font-size:.84rem;
      font-weight:800;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(59,130,246,.28);
      background:rgba(59,130,246,.16);
      color:var(--text);
      text-decoration:none;
      font-weight:900;
    }
    code{
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      font-size:.92em;
      color:#c7d2fe;
    }
  </style>
  <script>
    (function(){
      'use strict';

      // run page จริงของ Shadow Breaker
      const RUN_PATH = '/webxr-health-mobile/fitness/shadow-breaker.html';

      const q = location.search || '';
      const h = location.hash || '';
      const target = location.origin + RUN_PATH + q + h;
      const current = location.origin + location.pathname + q + h;

      // กัน redirect วน ถ้าเผลอชี้ path เดิม
      if (current === target) {
        document.addEventListener('DOMContentLoaded', function(){
          const msg = document.getElementById('bootMsg');
          const debug = document.getElementById('debugBox');
          if (msg) msg.textContent = 'พบการตั้งค่า launcher ผิด: target ซ้ำกับไฟล์ launcher เอง';
          if (debug) {
            debug.innerHTML =
              '<p>ตรวจสอบค่า <code>RUN_PATH</code> ในไฟล์ <code>/herohealth/shadow-breaker-vr.html</code></p>' +
              '<p><b>Launcher:</b> <code>' + location.pathname + '</code></p>' +
              '<p><b>Target:</b> <code>' + RUN_PATH + '</code></p>';
          }
        });
        return;
      }

      try {
        location.replace(target);
      } catch (e) {
        location.href = target;
      }
    })();
  </script>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="kicker">HeroHealth • Exercise Zone</div>
      <h1>กำลังเปิด Shadow Breaker…</h1>
      <p id="bootMsg">ระบบกำลังส่งต่อไปยังหน้าเล่นจริงของเกม</p>

      <div class="row">
        <span class="pill">Launcher: <code>/herohealth/shadow-breaker-vr.html</code></span>
        <span class="pill">Run: <code>/fitness/shadow-breaker.html</code></span>
      </div>

      <div class="row">
        <a class="btn" href="/webxr-health-mobile/fitness/shadow-breaker.html">เปิดหน้าเกมตรง ๆ</a>
      </div>

      <div id="debugBox"></div>
    </div>
  </div>
</body>
</html>
